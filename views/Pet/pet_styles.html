<style>
  @import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap");

  #page-pet {
    --pet-bg-start: #fff8e8;
    --pet-bg-end: #eefbf1;
    --pet-surface: var(--theme-card, rgba(255, 255, 255, 0.78));
    --pet-border: var(--theme-card-border, rgba(22, 101, 52, 0.16));
    --pet-shadow: 0 18px 40px rgba(20, 83, 45, 0.1);
    --pet-text: var(--theme-text, #1f2937);
    --pet-subtle: var(--theme-text-secondary, #5b6678);
    --pet-primary: #f59e0b;
    --pet-primary-strong: #ea580c;
    --pet-secondary: #22c55e;
    --pet-secondary-soft: rgba(34, 197, 94, 0.16);
    --pet-track: rgba(15, 118, 110, 0.16);

    min-height: 100vh;
    position: relative;
    padding: 1.5rem;
    overflow: hidden;
    background:
      radial-gradient(circle at 12% 10%, rgba(249, 168, 37, 0.24), transparent 36%),
      radial-gradient(circle at 88% 84%, rgba(34, 197, 94, 0.24), transparent 34%),
      linear-gradient(155deg, var(--pet-bg-start) 0%, var(--pet-bg-end) 100%);
  }

  #page-pet::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: linear-gradient(
      45deg,
      rgba(255, 255, 255, 0.28) 25%,
      transparent 25%,
      transparent 50%,
      rgba(255, 255, 255, 0.2) 50%,
      rgba(255, 255, 255, 0.2) 75%,
      transparent 75%,
      transparent
    );
    background-size: 42px 42px;
    opacity: 0.35;
    z-index: 0;
  }

  .pet-page-shell {
    position: relative;
    z-index: 1;
    max-width: 1240px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .pet-reveal {
    opacity: 0;
    transform: translateY(14px) scale(0.985);
    animation: petReveal 0.58s ease-out forwards;
    animation-delay: var(--pet-delay, 0s);
  }

  @keyframes petReveal {
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .pet-hero-card {
    display: grid;
    grid-template-columns: minmax(0, 1.25fr) minmax(260px, 0.75fr);
    gap: 1rem;
    border-radius: 26px;
    border: 1px solid var(--pet-border);
    background: linear-gradient(140deg, rgba(255, 255, 255, 0.92), rgba(255, 255, 255, 0.8));
    box-shadow: var(--pet-shadow);
    padding: 1.35rem;
    overflow: hidden;
  }

  .pet-hero-copy h1 {
    margin: 0.25rem 0 0.45rem;
    color: var(--pet-text);
    font-family: "Baloo 2", "Nunito", sans-serif;
    font-size: clamp(1.8rem, 3.8vw, 2.8rem);
    line-height: 1.02;
    letter-spacing: 0.02em;
  }

  .pet-eyebrow {
    margin: 0;
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b45309;
  }

  .pet-hero-subtitle {
    margin: 0;
    max-width: 62ch;
    color: var(--pet-subtle);
    line-height: 1.55;
    font-family: "Nunito", sans-serif;
    font-size: 1rem;
  }

  .pet-user-chip {
    margin-top: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    border-radius: 999px;
    padding: 0.45rem 0.85rem;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(180, 83, 9, 0.2);
    color: #7c2d12;
    font-family: "Nunito", sans-serif;
  }

  .pet-user-label {
    font-size: 0.82rem;
    font-weight: 700;
  }

  .pet-hero-actions {
    margin-top: 0.9rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.65rem;
  }

  .pet-btn {
    border: 0;
    border-radius: 12px;
    padding: 0.62rem 0.95rem;
    font-family: "Nunito", sans-serif;
    font-weight: 800;
    font-size: 0.92rem;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .pet-btn:hover {
    transform: translateY(-1px);
  }

  .pet-btn-primary {
    color: #fff;
    background: linear-gradient(135deg, var(--pet-primary), var(--pet-primary-strong));
    box-shadow: 0 10px 20px rgba(249, 115, 22, 0.28);
  }

  .pet-btn-secondary {
    color: #14532d;
    background: linear-gradient(135deg, #bef264, #4ade80);
    box-shadow: 0 10px 18px rgba(34, 197, 94, 0.22);
  }

  .pet-hero-visual {
    position: relative;
    border-radius: 18px;
    border: 1px solid rgba(250, 204, 21, 0.25);
    background: linear-gradient(180deg, rgba(254, 243, 199, 0.58), rgba(187, 247, 208, 0.56));
    min-height: 220px;
    overflow: hidden;
  }

  .pet-sun {
    position: absolute;
    top: 20px;
    right: 24px;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: radial-gradient(circle, #fde68a 20%, #f59e0b 100%);
    box-shadow: 0 0 0 12px rgba(254, 215, 170, 0.35);
  }

  .pet-cloud {
    position: absolute;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.8);
    filter: blur(0.4px);
  }

  .pet-cloud-1 {
    width: 84px;
    height: 26px;
    top: 24px;
    left: 18px;
    animation: petCloudDrift 9s ease-in-out infinite;
  }

  .pet-cloud-2 {
    width: 62px;
    height: 22px;
    top: 62px;
    left: 72px;
    animation: petCloudDrift 10s ease-in-out infinite reverse;
  }

  @keyframes petCloudDrift {
    0%,
    100% {
      transform: translateX(0);
    }
    50% {
      transform: translateX(8px);
    }
  }

  .pet-nest {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 128px;
    height: 66px;
    border-radius: 60% 60% 52% 52%;
    background: linear-gradient(180deg, #d97706, #92400e);
    box-shadow: inset 0 7px 0 rgba(255, 255, 255, 0.16);
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .pet-egg {
    margin-top: -38px;
    width: 84px;
    height: 106px;
    border-radius: 50% 50% 48% 48%;
    background: linear-gradient(180deg, #fff7cc, #fde68a 65%, #fbbf24 100%);
    border: 3px solid rgba(217, 119, 6, 0.36);
    position: relative;
    animation: petEggBounce 2.4s ease-in-out infinite;
  }

  @keyframes petEggBounce {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-7px);
    }
  }

  .pet-egg-spark {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
    animation: petSparkle 1.8s ease-in-out infinite;
  }

  .pet-spark-1 {
    top: 16px;
    left: 10px;
  }

  .pet-spark-2 {
    right: 8px;
    top: 34px;
    animation-delay: 0.35s;
  }

  .pet-spark-3 {
    bottom: 16px;
    left: 16px;
    animation-delay: 0.65s;
  }

  @keyframes petSparkle {
    0%,
    100% {
      opacity: 0.3;
      transform: scale(0.8);
    }
    50% {
      opacity: 1;
      transform: scale(1.2);
    }
  }

  .pet-main-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 1rem;
  }

  .pet-panel,
  .pet-showcase,
  .pet-shop-preview {
    border-radius: 20px;
    border: 1px solid var(--pet-border);
    background: var(--pet-surface);
    backdrop-filter: blur(6px);
    box-shadow: var(--pet-shadow);
    padding: 1.1rem 1.2rem;
  }

  .pet-panel-head,
  .pet-showcase-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.8rem;
    margin-bottom: 0.95rem;
  }

  .pet-panel-head h2,
  .pet-showcase-head h2 {
    margin: 0;
    font-size: 1.18rem;
    font-family: "Baloo 2", "Nunito", sans-serif;
    color: var(--pet-text);
  }

  .pet-showcase-head p {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.92rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-stage-pill {
    border-radius: 999px;
    padding: 0.28rem 0.72rem;
    background: rgba(249, 115, 22, 0.14);
    color: #9a3412;
    font-size: 0.82rem;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
  }

  .pet-progress-overview {
    display: grid;
    grid-template-columns: 130px minmax(0, 1fr);
    gap: 0.9rem;
    align-items: center;
    margin-bottom: 0.8rem;
  }

  .pet-kpi-label {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
  }

  .pet-kpi-value {
    margin: 0.15rem 0 0;
    font-size: 1.55rem;
    line-height: 1;
    color: #14532d;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-kpi-progress-track,
  .pet-track {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    background: var(--pet-track);
    overflow: hidden;
  }

  .pet-kpi-progress-fill,
  .pet-track span {
    display: block;
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(135deg, #f59e0b, #16a34a);
    transition: width 0.45s ease;
  }

  .pet-kpi-caption {
    margin: 0.45rem 0 0;
    font-size: 0.84rem;
    color: var(--pet-subtle);
    font-family: "Nunito", sans-serif;
  }

  .pet-check-list {
    display: flex;
    flex-direction: column;
    gap: 0.68rem;
  }

  .pet-check-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 130px;
    gap: 0.75rem;
    align-items: center;
    padding: 0.75rem;
    border-radius: 14px;
    background: rgba(255, 255, 255, 0.58);
    border: 1px solid rgba(22, 101, 52, 0.12);
  }

  .pet-check-title {
    margin: 0;
    font-size: 0.94rem;
    color: var(--pet-text);
    font-weight: 800;
    font-family: "Nunito", sans-serif;
  }

  .pet-check-desc {
    margin: 0.15rem 0 0;
    font-size: 0.82rem;
    color: var(--pet-subtle);
    font-family: "Nunito", sans-serif;
  }

  .pet-check-meta {
    display: flex;
    flex-direction: column;
    gap: 0.32rem;
    font-size: 0.82rem;
    color: #14532d;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
  }

  .pet-status-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.7rem;
    margin-bottom: 0.82rem;
  }

  .pet-status-item {
    border-radius: 14px;
    padding: 0.72rem;
    background: rgba(255, 255, 255, 0.58);
    border: 1px solid rgba(22, 101, 52, 0.12);
  }

  .pet-status-item p {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.8rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-status-item strong {
    margin-top: 0.22rem;
    display: block;
    color: #14532d;
    font-size: 1.16rem;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-note-box {
    border-radius: 12px;
    padding: 0.75rem 0.85rem;
    background: var(--pet-secondary-soft);
    border: 1px dashed rgba(22, 163, 74, 0.36);
  }

  .pet-note-box p {
    margin: 0;
    color: #166534;
    line-height: 1.45;
    font-size: 0.85rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-evolution-lane {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.7rem;
  }

  .pet-evolution-node {
    border-radius: 14px;
    padding: 0.82rem;
    border: 1px solid rgba(22, 101, 52, 0.12);
    background: rgba(255, 255, 255, 0.6);
    transition: transform 0.2s ease;
  }

  .pet-evolution-node:hover {
    transform: translateY(-2px);
  }

  .pet-evolution-node.active {
    border-color: rgba(249, 115, 22, 0.45);
    background: rgba(254, 243, 199, 0.78);
  }

  .pet-evolution-icon {
    font-size: 1.5rem;
  }

  .pet-evolution-node h3 {
    margin: 0.35rem 0 0.12rem;
    color: var(--pet-text);
    font-size: 0.95rem;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-evolution-node p {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.82rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-item-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.7rem;
  }

  .pet-item-card {
    border-radius: 14px;
    border: 1px solid rgba(22, 101, 52, 0.12);
    background: rgba(255, 255, 255, 0.6);
    padding: 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .pet-item-icon {
    font-size: 1.5rem;
  }

  .pet-item-card h3 {
    margin: 0;
    font-size: 0.94rem;
    color: var(--pet-text);
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-item-card p {
    margin: 0;
    font-size: 0.82rem;
    color: var(--pet-subtle);
    font-family: "Nunito", sans-serif;
  }

  .pet-item-btn {
    margin-top: 0.42rem;
    border: 0;
    border-radius: 10px;
    padding: 0.48rem 0.72rem;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #ffffff;
    font-size: 0.82rem;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
    cursor: pointer;
    transition: transform 0.18s ease;
  }

  .pet-item-btn:hover {
    transform: translateY(-1px);
  }

  .pet-coin-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.3rem 0.68rem;
    border-radius: 999px;
    background: rgba(250, 204, 21, 0.22);
    border: 1px solid rgba(217, 119, 6, 0.3);
    color: #9a3412;
    font-size: 0.82rem;
    font-family: "Nunito", sans-serif;
    font-weight: 800;
  }

  @media (max-width: 1100px) {
    .pet-main-grid {
      grid-template-columns: 1fr;
    }

    .pet-evolution-lane,
    .pet-item-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 720px) {
    #page-pet {
      padding: 1rem 0.8rem;
    }

    .pet-hero-card {
      grid-template-columns: 1fr;
      padding: 1rem;
    }

    .pet-hero-visual {
      min-height: 190px;
    }

    .pet-progress-overview {
      grid-template-columns: 1fr;
    }

    .pet-check-row {
      grid-template-columns: 1fr;
    }

    .pet-status-grid,
    .pet-evolution-lane,
    .pet-item-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
