<style>
  @import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap");

  #page-pet {
    --pet-bg-start: var(--theme-surface, #f8fafc);
    --pet-bg-end: var(--theme-card, #eefbf1);
    --pet-surface: var(--theme-card, rgba(255, 255, 255, 0.8));
    --pet-border: var(--theme-card-border, rgba(22, 101, 52, 0.16));
    --pet-shadow: 0 18px 40px rgba(20, 83, 45, 0.1);
    --pet-text: var(--theme-text, #1f2937);
    --pet-subtle: var(--theme-text-secondary, #5b6678);
    --pet-primary: #f59e0b;
    --pet-primary-strong: #ea580c;
    --pet-track: rgba(15, 118, 110, 0.16);
    min-height: 100vh;
    width: 100%;
    position: relative;
    padding: 0 1.5rem 1.8rem;
    overflow-x: hidden;
    overflow-y: auto;
    background:
      radial-gradient(circle at 10% 8%, color-mix(in srgb, var(--theme-primary, #5b6ff8) 18%, transparent), transparent 34%),
      radial-gradient(circle at 90% 82%, color-mix(in srgb, var(--theme-secondary, #7b6cf6) 16%, transparent), transparent 34%),
      var(--theme-dashboard-bg, transparent),
      linear-gradient(155deg, var(--pet-bg-start) 0%, var(--pet-bg-end) 100%);
    transition: margin-right 0.24s ease;
  }

  body.pet-food-sidebar-open #page-pet {
    margin-right: min(560px, 95vw);
  }

  #page-pet::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: linear-gradient(
      45deg,
      color-mix(in srgb, var(--theme-hover, rgba(255, 255, 255, 0.08)) 58%, transparent) 25%,
      transparent 25%,
      transparent 50%,
      color-mix(in srgb, var(--theme-hover, rgba(255, 255, 255, 0.08)) 34%, transparent) 50%,
      color-mix(in srgb, var(--theme-hover, rgba(255, 255, 255, 0.08)) 34%, transparent) 75%,
      transparent 75%,
      transparent
    );
    background-size: 40px 40px;
    opacity: 0.3;
    z-index: 0;
  }

  .pet-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
    filter: grayscale(0.35);
  }

  .pet-name-tag:disabled {
    opacity: 0.62;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .pet-hatch-notice {
    position: absolute;
    top: 60px;
    left: 14px;
    z-index: 3;
    max-width: min(72%, 420px);
    padding: 0.55rem 0.72rem;
    border-radius: 12px;
    border: 1px solid rgba(217, 119, 6, 0.32);
    background: rgba(255, 255, 255, 0.86);
    box-shadow: 0 8px 20px rgba(146, 64, 14, 0.12);
  }

  .pet-hatch-notice-title {
    margin: 0;
    color: #92400e;
    font-size: 0.84rem;
    font-weight: 800;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-hatch-notice-meta {
    margin: 0.18rem 0 0;
    color: #7c2d12;
    font-size: 0.75rem;
    line-height: 1.4;
    font-family: "Nunito", sans-serif;
  }

  .pet-egg.hatching {
    animation:
      petEggHatchShake 0.9s ease-in-out 1,
      petEggBounce 2.4s ease-in-out infinite;
  }

  .pet-egg.hatched {
    animation: none;
    opacity: 0;
    transform: translateY(42px) scale(0.72) rotate(5deg);
    transition: opacity 0.35s ease, transform 0.45s ease;
    pointer-events: none;
  }

  @keyframes petEggHatchShake {
    0% {
      transform: translateY(0) rotate(-2deg);
    }
    18% {
      transform: translateY(-4px) rotate(8deg);
    }
    36% {
      transform: translateY(-2px) rotate(-10deg);
    }
    54% {
      transform: translateY(-6px) rotate(11deg);
    }
    72% {
      transform: translateY(-3px) rotate(-7deg);
    }
    100% {
      transform: translateY(0) rotate(0deg);
    }
  }

  .pet-chick {
    position: absolute;
    left: 50%;
    bottom: 14px;
    width: 244px;
    height: 192px;
    transform: translate(-50%, 24px) scale(0.62);
    opacity: 0;
    z-index: 2;
    pointer-events: none;
  }

  .pet-chick-character {
    position: relative;
    width: 100%;
    height: 100%;
    transform-origin: 50% 90%;
    animation:
        petCharacterIdleScale 3s ease-in-out infinite,
        petCharacterSway 4.2s ease-in-out infinite;
  }

  .pet-chick-aura {
    position: absolute;
    left: 50%;
    top: 42px;
    width: 176px;
    height: 128px;
    border-radius: 50%;
    transform: translateX(-50%);
    background: radial-gradient(circle, rgba(218, 184, 138, 0.64) 0%, rgba(218, 184, 138, 0) 72%);
    filter: blur(6px);
    opacity: 0.48;
  }

  .pet-chick-shadow {
    position: absolute;
    left: 50%;
    bottom: 10px;
    width: 112px;
    height: 23px;
    border-radius: 50%;
    transform: translateX(-50%);
    background: rgba(100, 47, 8, 0.22);
    filter: blur(7px);
  }

  .pet-chick-head,
  .pet-chick-body,
  .pet-chick-wing,
  .pet-chick-comb,
  .pet-chick-beak,
  .pet-chick-eye,
  .pet-chick-blush,
  .pet-chick-accessory,
  .pet-chick-rimlight {
    position: absolute;
    display: block;
  }

  .pet-chick-body {
    left: 50%;
    bottom: 28px;
    width: 156px;
    height: 88px;
    transform: translateX(-50%);
    border-radius: 58% 58% 52% 52%;
    background: linear-gradient(180deg, #d9b48c 0%, #c99564 66%, #a86f45 100%);
    box-shadow:
      inset -10px -14px 18px rgba(104, 68, 41, 0.28),
      inset 10px 10px 16px rgba(245, 229, 208, 0.5);
  }

  .pet-chick-body::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: radial-gradient(circle at 32% 28%, rgba(255, 255, 255, 0.52), transparent 38%);
    pointer-events: none;
  }

  .pet-chick-head {
    left: 50%;
    top: 16px;
    width: 148px;
    height: 122px;
    transform: translateX(-50%);
    border-radius: 58%;
    background: linear-gradient(180deg, #dfbb92 0%, #ca9b6d 66%, #ab7449 100%);
    box-shadow:
      inset -12px -16px 19px rgba(108, 74, 49, 0.3),
      inset 12px 11px 18px rgba(246, 234, 214, 0.62);
  }

  .pet-chick-wing {
    width: 30px;
    height: 20px;
    top: 140px;
    border-radius: 48% 48% 55% 55%;
    background: linear-gradient(180deg, #b78257, #905d38);
    box-shadow: inset 4px 3px 7px rgba(232, 215, 194, 0.3);
  }

  .pet-chick-wing-left {
    left: 64px;
    transform: rotate(-8deg);
  }

  .pet-chick-wing-right {
    right: 64px;
    transform: rotate(8deg);
  }

  .pet-chick-comb {
    top: 18px;
    left: 50%;
    width: 76px;
    height: 20px;
    transform: translateX(-50%);
    background: transparent;
    opacity: 0.9;
  }

  .pet-chick-comb::before,
  .pet-chick-comb::after {
    content: "";
    position: absolute;
    top: 0;
    width: 16px;
    height: 16px;
    border-radius: 52% 52% 46% 46%;
    background: linear-gradient(180deg, #c79b70, #9f6d44);
    box-shadow: inset -2px -3px 5px rgba(94, 62, 37, 0.25), inset 2px 2px 4px rgba(240, 225, 204, 0.45);
  }

  .pet-chick-comb::before {
    left: 8px;
  }

  .pet-chick-comb::after {
    right: 8px;
  }

  .pet-chick-beak {
    top: 82px;
    left: 50%;
    width: 62px;
    height: 28px;
    transform: translateX(-50%);
    border-radius: 48% 48% 52% 52%;
    background: linear-gradient(180deg, #d9b38c, #b37f55);
    box-shadow: inset 0 4px 0 rgba(245, 230, 210, 0.55);
  }

  .pet-chick-beak::before,
  .pet-chick-beak::after {
    content: "";
    position: absolute;
    top: 9px;
    width: 6px;
    height: 5px;
    border-radius: 50%;
    background: rgba(80, 50, 30, 0.65);
  }

  .pet-chick-beak::before {
    left: 18px;
  }

  .pet-chick-beak::after {
    right: 18px;
  }

  .pet-chick-eye {
    width: 18px;
    height: 12px;
    top: 70px;
    border-radius: 999px;
    background: #1b1b1b;
    overflow: hidden;
    animation: petChickBlink 3.6s ease-in-out infinite;
  }

  .pet-chick-eye-left {
    left: 44px;
  }

  .pet-chick-eye-right {
    right: 44px;
  }

  .pet-chick-eye-inner {
    position: absolute;
    width: 8px;
    height: 6px;
    left: 5px;
    top: 3px;
    border-radius: 50%;
    background: #101010;
  }

  .pet-eye-highlight {
    position: absolute;
    border-radius: 50%;
    background: #ffffff;
    opacity: 0.95;
  }

  .pet-eye-highlight-big {
    width: 4px;
    height: 4px;
    top: 2px;
    left: 3px;
  }

  .pet-eye-highlight-small {
    width: 2px;
    height: 2px;
    top: 6px;
    left: 10px;
    opacity: 0.82;
  }

  .pet-chick-blush {
    top: 96px;
    width: 22px;
    height: 12px;
    border-radius: 50%;
    background: rgba(255, 132, 153, 0.55);
    filter: blur(0.2px);
    opacity: 0;
  }

  .pet-chick-blush-left {
    left: 28px;
  }

  .pet-chick-blush-right {
    right: 28px;
  }

  .pet-chick-accessory {
    opacity: 0;
  }

  .pet-chick-accessory-bow {
    top: 48px;
    right: 18px;
    width: 20px;
    height: 14px;
    border-radius: 46% 46% 46% 46%;
    background: linear-gradient(180deg, #ff7aa7, #f34e8a);
    box-shadow:
      -8px 2px 0 0 #ff7aa7,
      8px 2px 0 0 #ff7aa7;
  }

  .pet-chick-accessory-scarf {
    top: 108px;
    left: 50%;
    width: 56px;
    height: 16px;
    border-radius: 999px;
    transform: translateX(-50%);
    background: linear-gradient(180deg, #f97316, #dc5b07);
  }

  .pet-chick-rimlight {
    right: 24px;
    top: 46px;
    width: 16px;
    height: 74px;
    border-radius: 50%;
    background: linear-gradient(180deg, rgba(255, 255, 255, 0.58), rgba(255, 255, 255, 0));
    filter: blur(1px);
    opacity: 0.66;
  }

  #page-pet.pet-stage-2 .pet-chick {
    width: 196px;
    height: 162px;
  }

  #page-pet.pet-stage-3 .pet-chick {
    width: 220px;
    height: 198px;
  }

  #page-pet.pet-stage-4 .pet-chick {
    width: 252px;
    height: 202px;
  }

  #page-pet.pet-stage-5 .pet-chick {
    width: 266px;
    height: 206px;
  }

  #page-pet.pet-stage-3 .pet-chick-blush,
  #page-pet.pet-stage-4 .pet-chick-blush,
  #page-pet.pet-stage-5 .pet-chick-blush {
    opacity: 1;
  }

  #page-pet.pet-stage-4 .pet-chick-wing,
  #page-pet.pet-stage-5 .pet-chick-wing {
    width: 34px;
    height: 22px;
  }

  #page-pet.pet-stage-4 .pet-chick-body,
  #page-pet.pet-stage-5 .pet-chick-body {
    border-radius: 58% 58% 50% 50%;
    width: 172px;
  }

  #page-pet.pet-stage-5 .pet-chick-aura {
    opacity: 0.7;
    filter: blur(7px);
  }

  #page-pet.pet-gender-male .pet-chick-head,
  #page-pet.pet-gender-male .pet-chick-body {
    background: linear-gradient(180deg, #c18d60 0%, #a97349 64%, #875634 100%);
  }

  #page-pet.pet-gender-male .pet-chick-comb {
    width: 84px;
    height: 21px;
    opacity: 0.97;
  }

  #page-pet.pet-gender-male .pet-chick-accessory-scarf {
    opacity: 1;
  }

  #page-pet.pet-gender-female .pet-chick-head,
  #page-pet.pet-gender-female .pet-chick-body {
    background: linear-gradient(180deg, #e4c4a2 0%, #cfaa81 66%, #b3845a 100%);
  }

  #page-pet.pet-gender-female .pet-chick-comb {
    width: 76px;
    height: 20px;
    opacity: 0.76;
  }

  #page-pet.pet-gender-female .pet-chick-accessory-bow {
    opacity: 1;
  }

  #page-pet.pet-gender-neutral .pet-chick-accessory {
    opacity: 0;
  }

  #page-pet.pet-state-happy .pet-chick-character {
    filter: saturate(1.08);
  }

  #page-pet.pet-state-happy .pet-chick-aura {
    opacity: 0.62;
  }

  #page-pet.pet-state-hungry .pet-chick-character {
    transform: translateY(6px);
    filter: saturate(0.85) brightness(0.95);
  }

  #page-pet.pet-state-hungry .pet-chick-eye {
    height: 8px;
    top: 74px;
  }

  #page-pet.pet-state-hungry .pet-chick-aura {
    opacity: 0.24;
  }

  #page-pet.pet-state-clean .pet-chick-character::after {
    content: "";
    position: absolute;
    inset: 18px 26px 32px;
    background:
      radial-gradient(circle at 20% 22%, rgba(255, 255, 255, 0.95) 0 2px, transparent 3px),
      radial-gradient(circle at 82% 28%, rgba(255, 255, 255, 0.92) 0 2px, transparent 3px),
      radial-gradient(circle at 68% 72%, rgba(255, 255, 255, 0.9) 0 2px, transparent 3px);
    animation: petSparkleOrbit 1.9s ease-in-out infinite;
    pointer-events: none;
  }

  #page-pet.pet-state-dirty .pet-chick-body::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background:
      radial-gradient(circle at 25% 52%, rgba(113, 86, 46, 0.32) 0 8px, transparent 9px),
      radial-gradient(circle at 70% 42%, rgba(113, 86, 46, 0.28) 0 7px, transparent 8px),
      radial-gradient(circle at 50% 78%, rgba(113, 86, 46, 0.24) 0 6px, transparent 7px);
  }

  #page-pet.pet-state-dirty .pet-chick-character {
    filter: saturate(0.77) brightness(0.93);
  }

  .pet-hero-visual.pet-hatching .pet-chick {
    animation: petChickPop 0.95s ease forwards;
  }

  .pet-hero-visual.pet-hatched .pet-chick {
    opacity: 1;
    transform: translate(-50%, 0) scale(1);
    animation: petChickIdle 2.1s ease-in-out infinite;
  }

  .pet-hero-visual.pet-hatched .pet-egg-spark {
    opacity: 0;
    animation: none;
  }

  @keyframes petChickPop {
    0% {
      opacity: 0;
      transform: translate(-50%, 24px) scale(0.62);
    }
    55% {
      opacity: 1;
      transform: translate(-50%, -6px) scale(1.08);
    }
    100% {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }
  }

  @keyframes petCharacterIdleScale {
    0%,
    28%,
    62%,
    100% {
      transform: scale(0.97);
    }
    44%,
    82% {
      transform: scale(1);
    }
  }

  @keyframes petCharacterSway {
    0%,
    24%,
    52%,
    100% {
      rotate: -1.2deg;
    }
    36%,
    70% {
      rotate: 1.2deg;
    }
    44%,
    46% {
      rotate: 0deg;
    }
  }

  @keyframes petChickIdle {
    0%,
    100% {
      transform: translate(-50%, 0) scale(1);
    }
    50% {
      transform: translate(-50%, -4px) scale(1.02);
    }
  }

  @keyframes petChickBlink {
    0%,
    78%,
    100% {
      transform: scaleY(1);
    }
    80%,
    83% {
      transform: scaleY(0.12);
    }
  }

  @keyframes petSparkleOrbit {
    0%,
    100% {
      opacity: 0.35;
      transform: translateY(0);
    }
    50% {
      opacity: 1;
      transform: translateY(-3px);
    }
  }

  #page-pet.pet-locked .pet-level-track {
    opacity: 0.6;
    filter: grayscale(0.45);
  }

  #page-pet.pet-locked .pet-level-fill {
    width: 0% !important;
  }

  #page-pet.pet-locked .pet-top-status-quick-actions .pet-btn,
  #page-pet.pet-locked .pet-name-tag {
    pointer-events: none;
  }

  .pet-page-shell {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: none;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding-bottom: 1rem;
  }

  .pet-reveal {
    opacity: 0;
    transform: translateY(14px) scale(0.985);
    animation: petReveal 0.55s ease-out forwards;
    animation-delay: var(--pet-delay, 0s);
  }

  @keyframes petReveal {
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .pet-top-status,
  .pet-hero-visual,
  .pet-character-system,
  .pet-showcase,
  .pet-shop-preview {
    border-radius: 22px;
    border: 1px solid var(--pet-border);
    background: var(--pet-surface);
    backdrop-filter: blur(6px);
    box-shadow: var(--pet-shadow);
    padding: 1rem 1.2rem;
  }

  .pet-top-status-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.9rem;
    margin-bottom: 0.8rem;
  }

  .pet-top-status-title {
    margin: 0.2rem 0 0;
    font-size: 1.18rem;
    color: var(--pet-text);
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-top-status-controls {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 0.6rem;
  }

  .pet-top-status-quick-actions {
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 0.5rem;
  }

  .pet-top-status-quick-actions .pet-user-chip {
    margin-top: 0;
    background: rgba(245, 158, 11, 0.17);
  }

  .pet-top-status-quick-actions .pet-btn {
    padding: 0.56rem 0.8rem;
    font-size: 0.84rem;
  }

  .pet-top-status-quick-actions .pet-btn.pet-btn-icon {
    width: 42px;
    height: 42px;
    padding: 0;
    border-radius: 11px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    line-height: 1;
  }

  .pet-icon-toggle {
    width: 44px;
    height: 44px;
    border: 0;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(135deg, #fde047, #f59e0b);
    font-size: 1.3rem;
    box-shadow: 0 10px 18px rgba(234, 88, 12, 0.2);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .pet-icon-toggle:hover {
    transform: translateY(-1px) scale(1.02);
    box-shadow: 0 14px 24px rgba(234, 88, 12, 0.24);
  }

  .pet-eyebrow {
    margin: 0;
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b45309;
  }

  .pet-coin-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.32rem 0.7rem;
    border-radius: 999px;
    background: rgba(250, 204, 21, 0.22);
    border: 1px solid rgba(217, 119, 6, 0.3);
    color: #9a3412;
    font-size: 0.84rem;
    font-family: "Nunito", sans-serif;
    font-weight: 800;
  }

  .pet-status-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.7rem;
  }

  .pet-status-item {
    border-radius: 14px;
    padding: 0.78rem;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(22, 101, 52, 0.12);
  }

  .pet-status-item p {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.8rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-status-item strong {
    margin-top: 0.22rem;
    display: block;
    color: #14532d;
    font-size: 1.16rem;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-level-track {
    margin-top: 0.36rem;
    width: 100%;
    height: 10px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--theme-surface, rgba(255, 255, 255, 0.1)) 70%, transparent);
    border: 1px solid color-mix(in srgb, var(--theme-border-light, rgba(22, 101, 52, 0.14)) 80%, transparent);
    overflow: hidden;
  }

  .pet-level-fill {
    display: block;
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(135deg, #f59e0b, #16a34a);
    transition: width 0.32s ease;
  }

  .pet-level-points {
    margin-top: 0.28rem;
    display: inline-block;
    font-size: 0.76rem;
    font-weight: 800;
    color: var(--pet-subtle);
    font-family: "Nunito", sans-serif;
  }

  .pet-user-chip {
    margin-top: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    border-radius: 999px;
    padding: 0.45rem 0.85rem;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(180, 83, 9, 0.2);
    color: #7c2d12;
    font-family: "Nunito", sans-serif;
  }

  .pet-user-label {
    font-size: 0.82rem;
    font-weight: 700;
  }

  .pet-btn {
    border: 0;
    border-radius: 12px;
    padding: 0.62rem 0.95rem;
    font-family: "Nunito", sans-serif;
    font-weight: 800;
