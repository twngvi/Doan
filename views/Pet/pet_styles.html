<style>
  .pet-page {
    min-height: 100vh;
    padding: 28px 20px 40px;
    background:
      radial-gradient(circle at 20% 10%, rgba(16, 185, 129, 0.12), transparent 45%),
      radial-gradient(circle at 85% 20%, rgba(59, 130, 246, 0.1), transparent 50%),
      linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
  }

  .pet-shell {
    max-width: 980px;
    margin: 0 auto;
  }

  .pet-header {
    margin-bottom: 20px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }

  .pet-name-tag {
    margin: 0;
    border: 1px solid #93c5fd;
    border-radius: 999px;
    background: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 100%);
    color: #0f172a;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    cursor: pointer;
    transition: transform 0.16s ease, box-shadow 0.16s ease;
    box-shadow: 0 8px 18px rgba(14, 116, 144, 0.12);
  }

  .pet-name-tag:hover {
    transform: translateY(-1px);
  }

  .pet-name-tag-label {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: #0c4a6e;
  }

  .pet-name-tag-value {
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 0.01em;
  }

  .pet-subtitle {
    margin: 8px 0 0;
    color: #334155;
    font-size: 0.98rem;
  }

  .pet-card {
    display: grid;
    grid-template-columns: minmax(260px, 360px) minmax(0, 1fr);
    gap: 22px;
    border-radius: 22px;
    border: 1px solid #dbeafe;
    background: rgba(255, 255, 255, 0.88);
    box-shadow: 0 20px 45px rgba(15, 23, 42, 0.14);
    padding: 22px;
  }

  .pet-stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 320px;
    border-radius: 18px;
    background: linear-gradient(160deg, #f0f9ff 0%, #ecfeff 100%);
    border: 1px solid #c7d2fe;
    overflow: hidden;
  }

  .pet-stage-meta {
    position: absolute;
    top: 10px;
    left: 12px;
    right: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    z-index: 5;
    pointer-events: none;
  }

  .pet-stage-meta .pet-name-tag,
  .pet-stage-meta .pet-level-badge {
    pointer-events: auto;
  }

  .pet-stage-meta .pet-name-tag {
    box-shadow: 0 6px 14px rgba(14, 116, 144, 0.14);
    background: rgba(255, 255, 255, 0.92);
    backdrop-filter: blur(2px);
    padding: 7px 12px;
  }

  .pet-stage-meta .pet-level-badge {
    background: rgba(236, 253, 245, 0.95);
    box-shadow: 0 6px 14px rgba(4, 120, 87, 0.08);
  }

  .pet-animator {
    position: relative;
    width: min(100%, 320px);
    height: 280px;
  }

  .pet-animator.anim-level1-roll {
    animation: petRollFromLeft 0.95s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .pet-animator.anim-level2-drop {
    animation: petDropFromTop 0.95s cubic-bezier(0.2, 0.8, 0.25, 1) both;
  }

  .pet-visual {
    position: absolute;
    inset: 0;
    transform-origin: center 72%;
    transform: rotate(0deg) scaleX(1) scaleY(1) skewX(0deg);
    transition: transform 0.17s ease;
  }

  .pet-visual.level1-tilt-left {
    transform: rotate(-9deg);
  }

  .pet-visual.level1-tilt-right {
    transform: rotate(9deg);
  }

  .pet-visual.level2-press-left {
    transform-origin: 25% 74%;
    transform: scaleX(0.9) scaleY(1.04) skewX(-7deg);
  }

  .pet-visual.level2-press-right {
    transform-origin: 75% 74%;
    transform: scaleX(0.9) scaleY(1.04) skewX(7deg);
  }

  .pet-visual.level2-press-center {
    transform-origin: 50% 82%;
    transform: scaleX(1.09) scaleY(0.82);
  }

  .pet-preview-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .pet-eyes-image {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 44%;
    height: auto;
    transform: translate(-50%, -50%);
    object-fit: contain;
    pointer-events: none;
    display: none;
    z-index: 2;
  }

  .pet-accessory-image {
    position: absolute;
    top: var(--pet-accessory-top, 12%);
    left: var(--pet-accessory-left, 50%);
    width: var(--pet-accessory-width, 34%);
    height: auto;
    transform: translate(-50%, -50%) rotate(var(--pet-accessory-rot, 0deg))
      scale(var(--pet-accessory-scale, 1));
    transform-origin: center 72%;
    transition:
      transform 0.18s ease,
      left 0.18s ease,
      top 0.18s ease;
    object-fit: contain;
    pointer-events: none;
    display: none;
    z-index: 3;
  }

  .pet-image-error {
    margin: 0;
    font-size: 0.95rem;
    font-weight: 600;
    color: #b91c1c;
    background: rgba(254, 226, 226, 0.8);
    border: 1px solid #fecaca;
    border-radius: 10px;
    padding: 8px 12px;
  }

  .pet-info {
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .pet-meta-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
  }

  .pet-name {
    margin: 0;
    font-size: clamp(1.25rem, 2.3vw, 1.9rem);
    color: #0f172a;
  }

  .pet-level-badge {
    display: inline-flex;
    align-items: center;
    padding: 7px 12px;
    border-radius: 999px;
    border: 1px solid #a7f3d0;
    background: #ecfdf5;
    color: #047857;
    font-weight: 700;
    font-size: 0.86rem;
  }

  .pet-desc {
    margin: 12px 0 0;
    color: #334155;
    line-height: 1.55;
  }

  .pet-controls {
    margin-top: 18px;
    display: flex;
    flex-direction: column;
    flex-wrap: wrap;
    gap: 12px;
  }

  .pet-controls-group {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .pet-controls-group-level .pet-btn {
    min-width: 180px;
  }

  .pet-controls-group-nav .pet-btn {
    min-width: 140px;
  }

  .pet-btn {
    border: 0;
    border-radius: 11px;
    padding: 10px 14px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease;
  }

  .pet-btn:hover {
    transform: translateY(-1px);
  }

  .pet-btn.primary {
    color: #ffffff;
    background: linear-gradient(135deg, #0284c7 0%, #3b82f6 100%);
    box-shadow: 0 8px 20px rgba(2, 132, 199, 0.3);
  }

  .pet-btn.secondary {
    color: #0f172a;
    background: #e2e8f0;
  }

  .pet-color-buttons {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .pet-color-btn {
    border: 0;
    border-radius: 999px;
    padding: 8px 14px;
    font-size: 0.86rem;
    font-weight: 700;
    color: #0f172a;
    background: #e2e8f0;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }

  .pet-color-btn.active {
    color: #ffffff;
    box-shadow: 0 8px 16px rgba(15, 23, 42, 0.2);
  }

  .pet-color-dot {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 999px;
    margin-right: 6px;
    vertical-align: middle;
  }

  .pet-accessory-panel {
    margin-top: 14px;
    border: 1px solid #dbeafe;
    border-radius: 14px;
    background: #f8fbff;
    padding: 12px;
  }

  .pet-accessory-panel.disabled {
    opacity: 0.55;
    filter: saturate(0.75);
  }

  .pet-accessory-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }

  .pet-accessory-title {
    margin: 0;
    font-size: 0.98rem;
    color: #0f172a;
  }

  .pet-accessory-hint {
    font-size: 0.8rem;
    color: #475569;
  }

  .pet-accessory-position {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 10px;
  }

  .pet-pill-btn {
    border: 1px solid #cbd5e1;
    border-radius: 999px;
    padding: 6px 10px;
    background: #ffffff;
    color: #334155;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
  }

  .pet-pill-btn.active {
    border-color: #38bdf8;
    color: #0c4a6e;
    background: #e0f2fe;
  }

  .pet-pill-btn:disabled {
    opacity: 0.45;
    cursor: not-allowed;
  }

  .pet-accessory-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
  }

  .pet-accessory-btn {
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    background: #ffffff;
    padding: 6px 4px;
    font-size: 0.78rem;
    font-weight: 700;
    color: #334155;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-height: 56px;
  }

  .pet-accessory-btn.no-accessory {
    justify-content: center;
    border-style: dashed;
  }

  .pet-accessory-thumb {
    width: 24px;
    height: 24px;
    object-fit: contain;
    display: block;
  }

  .pet-accessory-label {
    line-height: 1;
    font-size: 0.74rem;
    font-weight: 800;
  }

  .pet-accessory-btn.active {
    border-color: #0ea5e9;
    color: #075985;
    background: #e0f2fe;
  }

  @keyframes petRollFromLeft {
    0% {
      transform: translateX(-175%) rotate(-560deg);
    }
    70% {
      transform: translateX(8%) rotate(22deg);
    }
    100% {
      transform: translateX(0) rotate(0deg);
    }
  }

  @keyframes petDropFromTop {
    0% {
      transform: translateY(-170%) scaleX(0.95) scaleY(1.08);
    }
    72% {
      transform: translateY(0) scaleX(1.16) scaleY(0.72);
    }
    100% {
      transform: translateY(0) scaleX(1) scaleY(1);
    }
  }

  @media (max-width: 860px) {
    .pet-card {
      grid-template-columns: 1fr;
      padding: 18px;
    }

    .pet-stage {
      min-height: 250px;
    }

    .pet-animator {
      height: 220px;
    }

    .pet-accessory-grid {
      grid-template-columns: repeat(4, minmax(0, 1fr));
    }
  }
</style>
