<style>
  .pet-page {
    --pet-font-family: "Inter", "Segoe UI", -apple-system, "Helvetica Neue", sans-serif;
    --pet-admin-preview-width: 200px;
    --pet-admin-preview-height: 180px;
    --pet-card-bg: var(--theme-card, rgba(255, 255, 255, 0.05));
    --pet-card-border: var(--theme-card-border, rgba(255, 255, 255, 0.12));
    --pet-soft-surface: var(--theme-surface, rgba(255, 255, 255, 0.08));
    --pet-soft-hover: var(--theme-hover, rgba(255, 255, 255, 0.12));
    --pet-text: var(--theme-text, #ffffff);
    --pet-text-secondary: var(--theme-text-secondary, rgba(255, 255, 255, 0.78));
    --pet-text-muted: var(--theme-text-muted, rgba(255, 255, 255, 0.58));
    --pet-accent: var(--theme-primary, #667eea);
    --pet-accent-strong: var(--theme-primary-hover, #764ba2);
    --pet-success: var(--theme-success, #4ade80);
    --pet-danger: var(--theme-danger, #f87171);
    min-height: 100vh;
    padding: 0 1.5rem 1.5rem;
    background: var(--theme-dashboard-bg, var(--theme-bg, #071a33));
    background-attachment: fixed;
    color: var(--pet-text);
    font-family: var(--pet-font-family);
    position: relative;
    overflow: hidden;
  }

  .pet-page::before {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(
        2px 2px at 20% 30%,
        rgba(255, 255, 255, 0.5),
        transparent
      ),
      radial-gradient(
        2px 2px at 40% 70%,
        rgba(147, 197, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.6),
        transparent
      ),
      radial-gradient(
        2px 2px at 80% 50%,
        rgba(196, 181, 253, 0.4),
        transparent
      );
    background-size: 350px 250px;
    pointer-events: none;
    z-index: 0;
    animation: petGalaxyTwinkle 6s ease-in-out infinite;
  }

  @keyframes petGalaxyTwinkle {
    0%,
    100% {
      opacity: 0.72;
    }
    50% {
      opacity: 1;
    }
  }

  .pet-shell {
    max-width: 1200px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .pet-main-layout,
  .pet-main-layout.with-accessory-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }

  .pet-main-layout .pet-card,
  .pet-main-layout.with-accessory-panel .pet-card {
    min-height: unset;
  }

  .pet-main-layout .pet-stage,
  .pet-main-layout.with-accessory-panel .pet-stage {
    min-height: unset;
  }

  .pet-main-layout .pet-accessory-panel,
  .pet-main-layout.with-accessory-panel .pet-accessory-panel {
    margin-top: 0;
    align-self: start;
  }

  .pet-top-layout {
    display: grid;
    grid-template-columns: 1.35fr 1fr;
    gap: 1.5rem;
    margin-bottom: 2rem;
    position: relative;
    overflow: visible;
    min-height: 420px;
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 0;
  }

  .ptl-left {
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    position: relative;
    z-index: 2;
    aspect-ratio: 1 / 1;
    min-height: 0;
    height: auto;
    background: color-mix(in srgb, var(--pet-card-bg) 85%, transparent);
    border: 1px solid var(--pet-card-border);
    border-radius: 24px;
    padding: 1.75rem;
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    box-shadow: 
      0 12px 40px rgba(0, 0, 0, 0.15),
      inset 0 1px 1px rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
  }

  .ptl-right {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
    justify-content: flex-start;
    position: relative;
    z-index: 2;
    background: color-mix(in srgb, var(--pet-card-bg) 85%, transparent);
    border: 1px solid var(--pet-card-border);
    border-radius: 24px;
    padding: 1.75rem;
    backdrop-filter: blur(16px) saturate(120%);
    -webkit-backdrop-filter: blur(16px) saturate(120%);
    box-shadow: 
      0 12px 40px rgba(0, 0, 0, 0.15),
      inset 0 1px 1px rgba(255, 255, 255, 0.1);
    transition: all 0.3s ease;
  }

  @media (max-width: 992px) {
    .pet-top-layout {
      grid-template-columns: 1fr;
      min-height: auto;
      gap: 2rem;
    }
  }

  .pet-status-area {
    display: flex;
    flex-direction: row;
    gap: 1rem;
    width: 100%;
    position: relative;
    z-index: 5;
  }

  @media (max-width: 600px) {
    .pet-status-area {
      flex-direction: column;
    }
  }

  /* Cards are now styled independently below */

  .pet-header-control-stack {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center; /* Center actions in the right side */
    gap: 1rem;
    width: 100%;
  }

  .pet-header-actions {
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.45rem;
  }

  .pet-header-icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    border: 1px solid var(--pet-card-border);
    background: color-mix(in srgb, var(--pet-soft-surface) 94%, transparent);
    color: var(--sc-text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 6px 16px color-mix(in srgb, var(--pet-accent) 20%, transparent);
  }

  .pet-header-icon-btn .material-symbols-sharp {
    font-size: 21px;
    line-height: 1;
  }

  .pet-header-icon-btn:hover {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--pet-accent) 60%, var(--pet-card-border));
    background: var(--pet-soft-hover);
    box-shadow: 0 10px 18px color-mix(in srgb, var(--pet-accent) 28%, transparent);
  }

  .pet-header-icon-btn.active {
    background: var(--theme-primary-alpha30, color-mix(in srgb, var(--pet-accent) 22%, transparent));
    border-color: var(--theme-primary, color-mix(in srgb, var(--pet-accent) 66%, var(--pet-card-border)));
    color: var(--sc-text);
  }

  .is-hidden {
    display: none !important;
  }

  .pet-header-title-area {
    align-items: flex-start;
  }

  .pet-header-title-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .pet-header-kicker {
    margin: 0;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--sc-text-secondary) 92%, transparent);
  }

  .pet-page-header .uph-title {
    font-size: clamp(1.6rem, 2.45vw, 2.25rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 18px color-mix(in srgb, var(--pet-accent) 45%, transparent);
  }

  .pet-header-subtitle {
    margin: 0;
    font-size: 0.92rem;
    font-weight: 500;
    color: color-mix(in srgb, var(--sc-text-secondary) 94%, transparent);
    text-wrap: balance;
  }

  .pet-page,
  .pet-page-header,
  .pet-level-progress-card,
  .pet-card,
  .pet-stage,
  .pet-name-tag,
  .pet-header-icon-btn,
  .pet-level-badge,
  .pet-header-settings-popover,
  .pet-accessory-panel,
  .pet-pill-btn,
  .pet-accessory-btn,
  .pet-variant-btn {
    transition:
      background 0.25s ease,
      background-color 0.25s ease,
      color 0.25s ease,
      border-color 0.25s ease,
      box-shadow 0.25s ease;
  }

  .pet-header-galaxy-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    background: transparent;
  }

  .pet-header-stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(
        1px 1px at 20% 30%,
        rgba(255, 255, 255, 0.8) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 40% 70%,
        rgba(168, 216, 255, 0.7) 100%,
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.9) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 80% 50%,
        rgba(201, 168, 255, 0.6) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 60%,
        rgba(255, 255, 255, 0.5) 100%,
        transparent
      );
    background-size: 200px 100px;
    animation: petHeaderTwinkle 4s ease-in-out infinite;
    transition: transform 0.3s ease-out;
  }

  .pet-header-nebula {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(
        ellipse 80% 60% at 20% 40%,
        rgba(255, 100, 150, 0.12),
        transparent
      ),
      radial-gradient(
        ellipse 60% 50% at 80% 60%,
        rgba(100, 150, 255, 0.1),
        transparent
      );
    filter: blur(20px);
  }

  .pet-header-meteor-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .pet-header-meteor {
    position: absolute;
    width: 2px;
    height: 80px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(255, 255, 255, 0.28),
      rgba(255, 255, 255, 0.63)
    );
    border-radius: 50%;
    transform: rotate(-45deg);
    opacity: 0;
    animation: petMeteorFall 1s ease-in forwards;
  }

  .pet-header-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -1px;
    width: 4px;
    height: 4px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px rgba(255, 255, 255, 0.6);
  }

  @keyframes petHeaderTwinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  @keyframes petMeteorFall {
    0% {
      opacity: 1;
      transform: rotate(-45deg) translateY(-100px);
    }
    70% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(-45deg) translateY(300px);
    }
  }

  body.hide-galaxy-effects .pet-header-galaxy-bg {
    display: none;
  }

  body.hide-galaxy-effects .pet-page::before {
    display: none;
  }

  .pet-level-progress-card {
    flex: 1.6;
    padding: 1rem 1.25rem;
    border-radius: 20px;
    background: var(--theme-card, linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%));
    border: 1px solid var(--theme-card-border, rgba(255, 255, 255, 0.12));
    backdrop-filter: blur(12px);
    box-shadow: 
      var(--theme-card-shadow, 0 10px 30px rgba(0, 0, 0, 0.25)),
      inset 0 1px 1px rgba(255, 255, 255, 0.15);
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .pet-balance-card {
    flex: 1;
    padding: 1rem 1.25rem;
    border-radius: 20px;
    background: var(--theme-card, linear-gradient(135deg, rgba(255, 215, 0, 0.12) 0%, rgba(255, 255, 255, 0.02) 100%));
    border: 1px solid color-mix(in srgb, #ffd700 30%, var(--theme-card-border));
    backdrop-filter: blur(12px);
    box-shadow: 
      0 8px 24px var(--theme-shadow),
      inset 0 1px 1px rgba(255, 255, 255, 0.1);
    display: flex;
    align-items: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .pet-balance-card:hover {
    transform: translateY(-2px);
    box-shadow: 
      0 12px 30px rgba(0, 0, 0, 0.3),
      inset 0 1px 1px rgba(255, 255, 255, 0.15);
  }

  .pet-balance-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    gap: 12px;
  }

  .pet-balance-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .pet-balance-label {
    font-size: 0.65rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #ffd700;
    text-shadow: 0 0 8px rgba(255, 215, 0, 0.3);
  }

  .pet-balance-value {
    font-size: 1.25rem;
    font-weight: 900;
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
  }

  .pet-balance-icon-box {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    background: linear-gradient(135deg, rgba(255, 215, 0, 0.3) 0%, rgba(255, 165, 0, 0.3) 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #ffd700;
    box-shadow: 
      0 0 15px rgba(255, 215, 0, 0.2),
      inset 0 0 0 1px rgba(255, 255, 255, 0.2);
  }

  .pet-balance-icon-box span {
    font-size: 1.4rem;
  }

  .pet-level-progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .pet-level-progress-meta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .pet-level-progress-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--sc-text-secondary);
  }

  .pet-level-progress-level {
    font-size: 0.84rem;
    font-weight: 800;
    color: var(--sc-text);
  }

  .pet-level-progress-track {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
  }

  .pet-level-progress-fill {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #00f2fe 0%, #4facfe 50%, #00f2fe 100%);
    background-size: 200% 100%;
    animation: progressGlow 3s linear infinite;
    position: relative;
    box-shadow: 0 0 18px rgba(0, 242, 254, 0.6);
  }

  @keyframes progressGlow {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  .pet-level-progress-value {
    font-size: 0.78rem;
    font-weight: 900;
    color: #ffffff;
    padding: 2px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(0, 242, 254, 0.4) 0%, rgba(79, 172, 254, 0.4) 100%);
    border: 1px solid rgba(0, 242, 254, 0.5);
    box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
  }

  .pet-name-tag {
    margin: 0;
    border: 1px solid var(--theme-card-border, rgba(255, 255, 255, 0.25));
    border-radius: 999px;
    background: var(--theme-gradient, linear-gradient(135deg, rgba(102, 126, 234, 0.85) 0%, rgba(118, 75, 162, 0.85) 100%));
    color: var(--theme-text-on-dark, #ffffff);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    cursor: pointer;
    transition: transform 0.16s ease, box-shadow 0.16s ease;
    box-shadow: 0 8px 18px var(--theme-shadow);
    backdrop-filter: blur(6px);
  }

  .pet-name-tag:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(102, 126, 234, 0.45);
  }

  .pet-name-tag-label {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.8);
  }

  .pet-name-tag-value {
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 0.01em;
    color: #ffffff;
  }

  .pet-subtitle {
    margin: 8px 0 0;
    color: var(--pet-text-secondary);
    font-size: 0.98rem;
  }

  .pet-card {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    background: transparent;
    padding: 0;
    height: 100%;
    justify-content: center;
  }

  .pet-stage {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    aspect-ratio: 1;
    min-height: 0;
    border-radius: 18px;
    background: transparent;
    border: none;
    overflow: hidden;
    isolation: isolate;
  }

  .pet-stage::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image: var(--pet-stage-bg-image, none);
    background-repeat: no-repeat;
    background-position: center bottom;
    background-size: cover;
    opacity: 0.92;
    transition: background-image 0.25s ease, opacity 0.25s ease;
    pointer-events: none;
  }

  .pet-stage::after {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 1;
    background:
      linear-gradient(to top, rgba(10, 18, 31, 0.1) 0%, rgba(10, 18, 31, 0.02) 40%, rgba(10, 18, 31, 0) 72%),
      radial-gradient(circle at 50% 100%, color-mix(in srgb, var(--pet-accent) 16%, transparent), transparent 56%);
    pointer-events: none;
  }

  .pet-stage-meta {
    position: absolute;
    top: 10px;
    left: 12px;
    right: 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    z-index: 5;
    pointer-events: none;
  }

  .pet-bag-btn {
    height: 38px;
    border: 1px solid var(--pet-card-border);
    border-radius: 999px;
    background: var(--pet-soft-surface);
    color: var(--pet-text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 12px;
    cursor: pointer;
    transition:
      transform 0.16s ease,
      box-shadow 0.16s ease,
      border-color 0.16s ease,
      background 0.16s ease;
    box-shadow: 0 6px 14px color-mix(in srgb, var(--pet-accent) 24%, transparent);
  }

  .pet-bag-btn .material-symbols-sharp {
    font-size: 20px;
    line-height: 1;
  }

  .pet-bag-btn-label {
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
  }

  .pet-bag-btn:hover {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--pet-accent) 60%, var(--pet-card-border));
    background: var(--pet-soft-hover);
    box-shadow: 0 9px 16px color-mix(in srgb, var(--pet-accent) 28%, transparent);
  }

  .pet-bag-btn.active {
    background: color-mix(in srgb, var(--pet-accent) 20%, transparent);
    border-color: color-mix(in srgb, var(--pet-accent) 66%, var(--pet-card-border));
    color: var(--pet-text);
  }

  .pet-stage-meta .pet-name-tag,
  .pet-stage-meta .pet-level-badge {
    pointer-events: auto;
  }

  .pet-stage-meta .pet-name-tag {
    box-shadow: 0 6px 14px rgba(102, 126, 234, 0.35);
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.88) 0%, rgba(118, 75, 162, 0.88) 100%);
    backdrop-filter: blur(6px);
    padding: 7px 12px;
  }

  .pet-stage-meta .pet-level-badge {
    background: linear-gradient(135deg, rgba(251, 113, 133, 0.9) 0%, rgba(244, 63, 94, 0.9) 100%);
    box-shadow: 0 6px 14px rgba(244, 63, 94, 0.3);
  }

  .pet-animator {
    position: relative;
    width: min(100%, var(--pet-admin-preview-width));
    height: min(100%, var(--pet-admin-preview-height));
    z-index: 2;
  }

  .pet-animator.anim-level1-roll {
    animation: petRollFromLeft 0.95s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  .pet-mover {
    position: absolute;
    inset: 0;
    transform: translate(var(--pet-pos-x, 0), var(--pet-pos-y, 0)) scaleX(var(--pet-flip, 1));
    transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
    will-change: transform;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
  }

  .pet-visual {
    position: relative;
    width: 100%;
    height: 100%;
    transform-origin: center bottom;
    transition: transform 0.15s ease-out;
    cursor: pointer;
  }

  .pet-visual.is-jumping {
    animation: petJumpCycle 0.6s cubic-bezier(0.45, 0, 0.55, 1) forwards;
  }

  @keyframes petJumpCycle {
    0% { transform: translateY(0) scale(1, 1); }
    20% { transform: translateY(0) scale(1.2, 0.8); }
    50% { transform: translateY(-65px) scale(0.9, 1.1); }
    80% { transform: translateY(0) scale(1.2, 0.82); }
    100% { transform: translateY(0) scale(1, 1); }
  }

  /* Level 1 tilt is now applied via inline transform in JS for smooth mouse-follow */

  .pet-visual.level2-press-left {
    transform-origin: 25% 76%;
    transform: translateY(14px) scaleX(1.08) scaleY(0.72) skewX(-8deg);
  }

  .pet-visual.level2-press-right {
    transform-origin: 75% 76%;
    transform: translateY(14px) scaleX(1.08) scaleY(0.72) skewX(8deg);
  }

  .pet-visual.level2-press-center {
    transform-origin: 50% 86%;
    transform: translateY(18px) scaleX(1.18) scaleY(0.62);
  }

  /* Squash effect when clicked */
  .pet-visual.is-pressed {
    transform: scale(1.18, 0.72) translateY(18%) !important;
    transition: transform 0.12s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .pet-preview-image {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .pet-eyes-image {
    position: absolute;
    left: 50%;
    top: 46%;
    width: 44%;
    height: auto;
    transform: translate(-50%, -50%);
    object-fit: contain;
    pointer-events: none;
