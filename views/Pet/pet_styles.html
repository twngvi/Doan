<style>
  @import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap");

  /* ===== PAGE SHELL ===== */
  #page-pet {
    --pet-bg-start: var(--theme-surface, #f0f4ff);
    --pet-bg-end: var(--theme-card, #e8f5e9);
    --pet-surface: var(--theme-card, rgba(255,255,255,0.8));
    --pet-border: var(--theme-card-border, rgba(80,120,200,0.16));
    --pet-shadow: 0 18px 40px rgba(60,80,180,0.1);
    --pet-text: var(--theme-text, #1f2937);
    --pet-subtle: var(--theme-text-secondary, #5b6678);
    --pet-primary: #7c5cf5;
    --pet-primary-strong: #5b3de8;
    --pet-track: rgba(100,140,255,0.16);
    --slime-green: hsl(145,72%,58%);
    --slime-blue: hsl(210,85%,62%);
    --slime-purple: hsl(270,65%,68%);
    --slime-pink: hsl(330,70%,72%);
    min-height:100vh; width:100%; position:relative;
    padding:0 1.5rem 1.8rem; overflow-x:hidden; overflow-y:auto;
    background:
      radial-gradient(circle at 10% 8%, color-mix(in srgb, var(--slime-blue) 18%, transparent), transparent 34%),
      radial-gradient(circle at 90% 82%, color-mix(in srgb, var(--slime-purple) 16%, transparent), transparent 34%),
      var(--theme-dashboard-bg, transparent),
      linear-gradient(155deg, var(--pet-bg-start) 0%, var(--pet-bg-end) 100%);
    transition: margin-right .24s ease;
  }
  body.pet-food-sidebar-open #page-pet { margin-right: min(560px,95vw); }
  #page-pet::before {
    content:""; position:absolute; inset:0; pointer-events:none;
    background-image: linear-gradient(45deg,
      color-mix(in srgb, var(--theme-hover, rgba(255,255,255,0.08)) 58%, transparent) 25%, transparent 25%,
      transparent 50%, color-mix(in srgb, var(--theme-hover, rgba(255,255,255,0.08)) 34%, transparent) 50%,
      color-mix(in srgb, var(--theme-hover, rgba(255,255,255,0.08)) 34%, transparent) 75%, transparent 75%, transparent);
    background-size:40px 40px; opacity:.3; z-index:0;
  }

  .pet-page-shell { position:relative; z-index:1; width:100%; max-width:none; margin:0; display:flex; flex-direction:column; gap:1rem; padding-bottom:1rem; }
  .pet-reveal { opacity:0; transform:translateY(14px) scale(.985); animation:petReveal .55s ease-out forwards; animation-delay:var(--pet-delay,0s); }
  @keyframes petReveal { to { opacity:1; transform:translateY(0) scale(1); } }

  /* ===== BUTTONS & COMMON ===== */
  .pet-btn { border:0; border-radius:12px; padding:.62rem .95rem; font-family:"Nunito",sans-serif; font-weight:800; font-size:.92rem; cursor:pointer; transition:transform .18s ease,box-shadow .18s ease; }
  .pet-btn:hover { transform:translateY(-1px); }
  .pet-btn:disabled { opacity:.55; cursor:not-allowed; transform:none; box-shadow:none; filter:grayscale(.35); }
  .pet-btn-primary { color:#fff; background:linear-gradient(135deg,var(--pet-primary),var(--pet-primary-strong)); box-shadow:0 10px 20px rgba(92,60,245,.28); }
  .pet-btn-secondary { color:#fff; background:linear-gradient(135deg,var(--slime-green),hsl(160,60%,42%)); box-shadow:0 10px 18px rgba(34,197,94,.22); }
  .pet-btn-ghost { color:var(--pet-text); background:rgba(255,255,255,.65); border:1px solid var(--pet-border); box-shadow:none; }
  .pet-name-tag:disabled { opacity:.62; cursor:not-allowed; transform:none; box-shadow:none; }
  .pet-eyebrow { margin:0; font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:.1em; color:var(--pet-primary); }
  .pet-coin-badge { display:inline-flex; align-items:center; gap:.3rem; padding:.32rem .7rem; border-radius:999px; background:rgba(124,92,245,.12); border:1px solid rgba(124,92,245,.3); color:#4c1d95; font-size:.84rem; font-family:"Nunito",sans-serif; font-weight:800; }

  /* ===== TOP STATUS ===== */
  .pet-top-status,.pet-hero-visual,.pet-character-system,.pet-test-panel { border-radius:22px; border:1px solid var(--pet-border); background:var(--pet-surface); backdrop-filter:blur(6px); box-shadow:var(--pet-shadow); padding:1rem 1.2rem; }
  .pet-top-status-head { display:flex; justify-content:space-between; align-items:center; gap:.9rem; margin-bottom:.8rem; }
  .pet-top-status-title { margin:.2rem 0 0; font-size:1.18rem; color:var(--pet-text); font-family:"Baloo 2","Nunito",sans-serif; }
  .pet-top-status-controls { display:flex; align-items:center; justify-content:flex-end; flex-wrap:wrap; gap:.6rem; }
  .pet-top-status-quick-actions { display:inline-flex; align-items:center; flex-wrap:wrap; justify-content:flex-end; gap:.5rem; }
  .pet-top-status-quick-actions .pet-user-chip { margin-top:0; background:rgba(124,92,245,.12); }
  .pet-top-status-quick-actions .pet-btn { padding:.56rem .8rem; font-size:.84rem; }
  .pet-top-status-quick-actions .pet-btn.pet-btn-icon { width:42px; height:42px; padding:0; border-radius:11px; display:inline-flex; align-items:center; justify-content:center; font-size:1.2rem; line-height:1; }
  .pet-user-chip { margin-top:.95rem; display:inline-flex; align-items:center; gap:.45rem; border-radius:999px; padding:.45rem .85rem; background:rgba(124,92,245,.08); border:1px solid rgba(124,92,245,.2); color:#4c1d95; font-family:"Nunito",sans-serif; }
  .pet-user-label { font-size:.82rem; font-weight:700; }

  /* Status grid */
  .pet-status-grid { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:.7rem; }
  .pet-status-item { border-radius:14px; padding:.78rem; background:rgba(255,255,255,.6); border:1px solid rgba(100,140,255,.12); }
  .pet-status-item p { margin:0; color:var(--pet-subtle); font-size:.8rem; font-family:"Nunito",sans-serif; }
  .pet-status-item strong { margin-top:.22rem; display:block; color:#312e81; font-size:1.16rem; font-family:"Baloo 2","Nunito",sans-serif; }
  .pet-level-track { margin-top:.36rem; width:100%; height:10px; border-radius:999px; background:color-mix(in srgb,var(--theme-surface,rgba(255,255,255,.1)) 70%,transparent); border:1px solid color-mix(in srgb,var(--theme-border-light,rgba(100,140,255,.14)) 80%,transparent); overflow:hidden; }
  .pet-level-fill { display:block; width:0%; height:100%; border-radius:inherit; background:linear-gradient(135deg,var(--slime-blue),var(--slime-green)); transition:width .32s ease; }
  .pet-level-points { margin-top:.28rem; display:inline-block; font-size:.76rem; font-weight:800; color:var(--pet-subtle); font-family:"Nunito",sans-serif; }

  /* ===== HERO VISUAL ===== */
  .pet-hero-visual { position:relative; width:100%; border-radius:22px; border:1px solid rgba(124,92,245,.2); background:linear-gradient(180deg,rgba(200,210,255,.5),rgba(180,255,210,.4)); min-height:400px; overflow:hidden; padding:1rem; display:flex; align-items:flex-end; justify-content:center; }
  .pet-name-tag { position:absolute; top:14px; left:14px; z-index:3; border:1px solid rgba(124,92,245,.35); border-radius:999px; background:rgba(255,255,255,.9); display:inline-flex; align-items:center; gap:.45rem; padding:.44rem .8rem; cursor:pointer; color:#4c1d95; box-shadow:0 8px 20px rgba(92,60,245,.16); transition:transform .2s ease,box-shadow .2s ease; }
  .pet-name-tag:hover { transform:translateY(-1px); box-shadow:0 12px 22px rgba(92,60,245,.2); }
  .pet-name-tag-label { font-size:.74rem; text-transform:uppercase; letter-spacing:.08em; font-weight:800; color:var(--pet-primary); font-family:"Nunito",sans-serif; }
  #petDisplayName { font-size:.9rem; font-family:"Baloo 2","Nunito",sans-serif; }
  .pet-hatch-notice { position:absolute; top:60px; left:14px; z-index:3; max-width:min(72%,420px); padding:.55rem .72rem; border-radius:12px; border:1px solid rgba(124,92,245,.32); background:rgba(255,255,255,.86); box-shadow:0 8px 20px rgba(92,60,245,.12); }
  .pet-hatch-notice-title { margin:0; color:#4c1d95; font-size:.84rem; font-weight:800; font-family:"Baloo 2","Nunito",sans-serif; }
  .pet-hatch-notice-meta { margin:.18rem 0 0; color:#5b21b6; font-size:.75rem; line-height:1.4; font-family:"Nunito",sans-serif; }

  /* Scene bubbles */
  .pet-slime-scene-bg { position:absolute; inset:0; pointer-events:none; z-index:0; }
  .pet-slime-bubble { position:absolute; border-radius:50%; background:rgba(255,255,255,.35); animation:slimeBubbleFloat 6s ease-in-out infinite; }
  .pet-slime-bubble-1 { width:18px; height:18px; bottom:30%; left:12%; animation-delay:0s; }
  .pet-slime-bubble-2 { width:12px; height:12px; bottom:40%; right:18%; animation-delay:1.5s; }
  .pet-slime-bubble-3 { width:8px; height:8px; bottom:55%; left:35%; animation-delay:3s; }
  @keyframes slimeBubbleFloat { 0%,100%{transform:translateY(0) scale(1);opacity:.4;} 50%{transform:translateY(-30px) scale(1.15);opacity:.8;} }

  /* ===== ENERGY SEED (pre-hatch) ===== */
  .pet-slime-seed-wrap { position:absolute; bottom:22px; left:50%; transform:translateX(-50%); z-index:1; }
  .pet-egg { --pet-egg-tilt:0deg; width:100px; height:100px; border-radius:50%; background:radial-gradient(circle at 35% 30%,rgba(180,220,255,.9),var(--slime-blue) 50%, hsl(220,70%,45%) 100%); position:relative; transform-origin:50% 86%; animation:petEggBounce 2.4s ease-in-out infinite; box-shadow: inset -6px -8px 16px rgba(40,60,120,.3), inset 6px 6px 14px rgba(200,230,255,.6), 0 0 40px rgba(100,160,255,.4), 0 0 80px rgba(100,160,255,.2); }
  .pet-egg::before { content:""; position:absolute; left:22px; top:18px; width:28px; height:22px; border-radius:50%; background:rgba(255,255,255,.65); filter:blur(1px); }
  .pet-egg.hatched { animation:none; opacity:0; transform:translateY(42px) scale(.72); transition:opacity .35s ease,transform .45s ease; pointer-events:none; }
  .pet-egg.hatching { animation:petEggHatchShake .9s ease-in-out 1, petEggBounce 2.4s ease-in-out infinite; }
  @keyframes petEggBounce { 0%,100%{transform:translateY(0) rotate(var(--pet-egg-tilt));} 50%{transform:translateY(-12px) rotate(var(--pet-egg-tilt));} }
  @keyframes petEggHatchShake { 0%{transform:rotate(-2deg);} 18%{transform:translateY(-4px) rotate(8deg);} 36%{transform:translateY(-2px) rotate(-10deg);} 54%{transform:translateY(-6px) rotate(11deg);} 72%{transform:translateY(-3px) rotate(-7deg);} 100%{transform:rotate(0deg);} }
  .pet-egg-spark { position:absolute; width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,.95); box-shadow:0 0 10px rgba(200,220,255,.9); animation:petSparkle 1.8s ease-in-out infinite; }
  .pet-spark-1 { top:20px; left:18px; }
  .pet-spark-2 { right:14px; top:50px; animation-delay:.35s; }
  .pet-spark-3 { bottom:22px; left:28px; animation-delay:.65s; }
  @keyframes petSparkle { 0%,100%{opacity:.3;transform:scale(.8);} 50%{opacity:1;transform:scale(1.2);} }

  /* ===== SLIME CHARACTER ===== */
  .pet-slime { position:absolute; left:50%; bottom:14px; width:220px; height:220px; transform:translate(-50%, 0); opacity:1; z-index:2; pointer-events:auto; display:flex; align-items:center; justify-content:center; }
  .pet-character-container { position:relative; width:100%; height:100%; display:flex; align-items:center; justify-content:center; animation: petFloat 3s ease-in-out infinite; }
  .pet-character-img { width:100%; height:100%; object-fit:contain; filter: drop-shadow(0 10px 20px rgba(124,92,245,0.2)); }
  @keyframes petFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

  /* Shadow */
  .pet-slime-shadow { position:absolute; left:50%; bottom:-5px; width:120px; height:18px; border-radius:50%; transform:translateX(-50%); background:rgba(60,80,120,.15); filter:blur(6px); animation:slimeShadowPulse 3s ease-in-out infinite; z-index:-1; }
  @keyframes slimeShadowPulse { 0%,100%{transform:translateX(-50%) scaleX(1); opacity:0.15;} 50%{transform:translateX(-50%) scaleX(.85); opacity:0.1;} }



  /* ===== LOCKED ===== */
  #page-pet.pet-locked .pet-level-track { opacity:.6; filter:grayscale(.45); }
  #page-pet.pet-locked .pet-level-fill { width:0% !important; }
  #page-pet.pet-locked .pet-top-status-quick-actions .pet-btn, #page-pet.pet-locked .pet-name-tag { pointer-events:none; }


  @keyframes petMiniBob { 0%,100%{margin-bottom:0;} 50%{margin-bottom:4px;} }
  @keyframes petMiniBobStrong { 0%,100%{margin-bottom:0;} 50%{margin-bottom:6px;} }

  /* ===== MODALS ===== */
  .pet-modal-overlay { position:fixed; inset:0; z-index:2000; display:none; align-items:center; justify-content:center; padding:1rem; background:rgba(15,23,42,.48); backdrop-filter:blur(3px); }
  .pet-modal-overlay.open { display:flex; animation:petModalFadeIn .2s ease; }
  @keyframes petModalFadeIn { from{opacity:0;} to{opacity:1;} }
  .pet-modal { width:min(780px,96vw); max-height:90vh; overflow:auto; border-radius:20px; border:1px solid var(--pet-border); background:#fefeff; box-shadow:0 24px 50px rgba(15,23,42,.25); padding:1.1rem; position:relative; }
  .pet-modal-close { position:absolute; top:10px; right:10px; width:36px; height:36px; border:0; border-radius:10px; background:rgba(248,113,113,.15); color:#b91c1c; font-size:1.4rem; line-height:1; cursor:pointer; }
  #petFoodModal.pet-sidebar-overlay { align-items:stretch; justify-content:flex-end; padding:0; background:transparent; backdrop-filter:none; pointer-events:none; }
  #petFoodModal.pet-sidebar-overlay .pet-sidebar-panel { width:min(560px,95vw); max-height:100vh; height:100vh; border-radius:16px 0 0 16px; border-right:0; overflow:auto; transform:translateX(100%); transition:transform .24s ease; pointer-events:auto; }
  #petFoodModal.pet-sidebar-overlay.open .pet-sidebar-panel { transform:translateX(0); }
  .pet-rename-modal { width:min(520px,94vw); background:radial-gradient(circle at 85% 16%,rgba(100,140,255,.12),transparent 38%), radial-gradient(circle at 12% 88%,rgba(124,92,245,.14),transparent 40%), var(--pet-surface); border:1px solid color-mix(in srgb,var(--theme-primary,#5b6ff8) 24%,var(--pet-border)); }
  .pet-rename-subtitle { margin:0 0 .75rem; color:var(--pet-subtle); font-size:.9rem; font-family:"Nunito",sans-serif; }
  .pet-rename-label { display:block; margin-bottom:.42rem; font-size:.8rem; text-transform:uppercase; letter-spacing:.08em; font-weight:800; color:#4c1d95; font-family:"Nunito",sans-serif; }
  .pet-rename-input { width:100%; border-radius:12px; border:1px solid color-mix(in srgb,var(--theme-primary,#5b6ff8) 26%,var(--pet-border)); background:rgba(255,255,255,.82); color:var(--pet-text); font-size:1rem; padding:.62rem .8rem; font-family:"Nunito",sans-serif; outline:none; transition:border-color .18s ease,box-shadow .18s ease; }
  .pet-rename-input:focus { border-color:var(--theme-primary,#5b6ff8); box-shadow:0 0 0 3px color-mix(in srgb,var(--theme-primary,#5b6ff8) 25%,transparent); }
  .pet-rename-hint { margin:.52rem 0 0; min-height:1.2rem; color:var(--pet-subtle); font-size:.83rem; font-family:"Nunito",sans-serif; }
  .pet-rename-hint.error { color:#b91c1c; font-weight:700; }
  .pet-rename-actions { margin-top:.92rem; display:flex; justify-content:flex-end; gap:.52rem; }
  .pet-food-modal { width:min(560px,95vw); background:radial-gradient(circle at 85% 15%,rgba(100,200,160,.14),transparent 40%), radial-gradient(circle at 12% 82%,rgba(124,92,245,.13),transparent 42%), var(--pet-surface); }
  .pet-food-head { justify-content:flex-start; align-items:center; }
  .pet-food-switch { display:flex; gap:.45rem; flex-wrap:wrap; margin-top:.35rem; }
  .pet-food-switch-btn { border:1px solid rgba(100,140,255,.24); background:rgba(255,255,255,.72); color:var(--pet-text); border-radius:999px; padding:.34rem .68rem; font-size:.78rem; font-weight:800; font-family:"Nunito",sans-serif; cursor:pointer; transition:all .15s ease; }
  .pet-food-switch-btn.active { background:linear-gradient(135deg,rgba(124,92,245,.15),rgba(100,200,160,.15)); border-color:rgba(124,92,245,.5); }
  .pet-food-switch-btn:focus-visible { outline:2px solid rgba(124,92,245,.7); outline-offset:1px; }
  .pet-food-switch-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
  .pet-food-section { margin-top:.9rem; }
  .pet-food-section h3 { margin:0; font-size:1rem; color:var(--pet-text); font-family:"Baloo 2","Nunito",sans-serif; }
  .pet-food-section p { margin:.2rem 0 .62rem; color:var(--pet-subtle); font-size:.84rem; font-family:"Nunito",sans-serif; }
  .pet-food-grid { display:grid; grid-template-columns:1fr; gap:.52rem; }
  .pet-mode-block+.pet-mode-block { margin-top:.8rem; }
  .pet-mode-block-title { margin:0 0 .38rem; color:var(--pet-text); font-size:.88rem; font-family:"Baloo 2","Nunito",sans-serif; }
  .pet-food-icon-card { position:relative; min-height:46px; border-radius:12px; border:1px solid rgba(100,140,255,.14); background:rgba(255,255,255,.75); display:flex; align-items:center; justify-content:space-between; gap:.52rem; width:100%; padding:.42rem .55rem; cursor:pointer; transition:transform .18s ease,box-shadow .18s ease; text-align:left; }
  .pet-food-main-icon { flex:0 0 auto; font-size:1.32rem; line-height:1; }
  .pet-food-inline-meta { flex:1 1 auto; font-size:.8rem; color:var(--pet-text); font-family:"Nunito",sans-serif; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pet-food-icon-card:hover { transform:translateY(-1px); box-shadow:0 8px 18px rgba(100,140,255,.16); }
  .pet-food-icon-card .pet-food-info { flex:0 0 auto; border-radius:8px; background:rgba(15,23,42,.08); color:var(--pet-subtle); padding:.25rem .4rem; font-size:.74rem; text-align:center; font-family:"Nunito",sans-serif; white-space:nowrap; }
  .pet-food-icon-card.disabled { opacity:.66; cursor:not-allowed; }
  .pet-food-buy-btn { margin-top:0; border:0; border-radius:8px; padding:.32rem .44rem; font-size:.72rem; font-weight:800; color:#0f172a; background:rgba(124,92,245,.2); font-family:"Nunito",sans-serif; cursor:pointer; transition:filter .15s ease; }
  .pet-food-buy-btn:hover { filter:brightness(.95); }
  .pet-food-buy-btn:disabled { opacity:.55; cursor:not-allowed; }
  .pet-food-empty { border:1px dashed rgba(100,140,255,.28); border-radius:10px; padding:.75rem; color:var(--pet-subtle); font-size:.82rem; font-family:"Nunito",sans-serif; grid-column:1/-1; }
  body.pet-modal-open { overflow:hidden; }

  /* ===== RESPONSIVE ===== */
  @media (max-width:1100px) {
    .pet-status-grid,.pet-evolution-lane,.pet-evolution-lane-five { grid-template-columns:repeat(2,minmax(0,1fr)); }
    .pet-visual-top-grid { grid-template-columns:1fr; }
    .pet-test-stage-row { justify-content:center; }
  }
  @media (max-width:720px) {
    #page-pet { padding:0 .75rem 1.2rem; margin-right:0 !important; }
    .pet-top-status-head,.pet-panel-head,.pet-showcase-head { flex-direction:column; align-items:flex-start; }
    .pet-top-status-controls { width:100%; justify-content:flex-start; }
    .pet-top-status-quick-actions { width:100%; justify-content:flex-start; }
    .pet-hero-visual { min-height:312px; padding:.9rem; }
    .pet-slime { bottom:12px; }
    .pet-status-grid,.pet-evolution-lane,.pet-evolution-lane-five { grid-template-columns:1fr; }
    .pet-visual-line { flex-direction:column; align-items:flex-start; gap:.2rem; }
    .pet-prompt-output { min-height:190px; }
    .pet-stage-preview { height:100px; }
    .pet-modal { padding:.9rem; }
    #petFoodModal.pet-sidebar-overlay .pet-sidebar-panel { width:100vw; border-radius:0; }
    .pet-food-switch { gap:.35rem; }
    .pet-food-switch-btn { font-size:.74rem; padding:.3rem .56rem; }
    .pet-food-inline-meta { font-size:.75rem; }
    .pet-food-info { display:none; }
    .pet-test-stage-row { gap:.4rem; }
    .pet-test-stage-btn { padding:.5rem .6rem; font-size:.75rem; }
  }
</style>
