<style>
  @import url("https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@500;700;800&display=swap");

  #page-pet {
    --pet-bg-start: var(--theme-surface, #f8fafc);
    --pet-bg-end: var(--theme-card, #eefbf1);
    --pet-surface: var(--theme-card, rgba(255, 255, 255, 0.8));
    --pet-border: var(--theme-card-border, rgba(22, 101, 52, 0.16));
    --pet-shadow: 0 18px 40px rgba(20, 83, 45, 0.1);
    --pet-text: var(--theme-text, #1f2937);
    --pet-subtle: var(--theme-text-secondary, #5b6678);
    --pet-primary: #f59e0b;
    --pet-primary-strong: #ea580c;
    --pet-track: rgba(15, 118, 110, 0.16);

    min-height: 100vh;
    width: 100%;
    position: relative;
    padding: 1.2rem 1.5rem 1.8rem;
    overflow-x: hidden;
    overflow-y: auto;
    background:
      radial-gradient(circle at 10% 8%, color-mix(in srgb, var(--theme-primary, #5b6ff8) 18%, transparent), transparent 34%),
      radial-gradient(circle at 90% 82%, color-mix(in srgb, var(--theme-secondary, #7b6cf6) 16%, transparent), transparent 34%),
      var(--theme-dashboard-bg, transparent),
      linear-gradient(155deg, var(--pet-bg-start) 0%, var(--pet-bg-end) 100%);
  }

  #page-pet::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background-image: linear-gradient(
      45deg,
      color-mix(in srgb, var(--theme-hover, rgba(255, 255, 255, 0.08)) 58%, transparent) 25%,
      transparent 25%,
      transparent 50%,
      color-mix(in srgb, var(--theme-hover, rgba(255, 255, 255, 0.08)) 34%, transparent) 50%,
      color-mix(in srgb, var(--theme-hover, rgba(255, 255, 255, 0.08)) 34%, transparent) 75%,
      transparent 75%,
      transparent
    );
    background-size: 40px 40px;
    opacity: 0.3;
    z-index: 0;
  }

  .pet-page-shell {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: none;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 1rem;
    padding-bottom: 1rem;
  }

  .pet-reveal {
    opacity: 0;
    transform: translateY(14px) scale(0.985);
    animation: petReveal 0.55s ease-out forwards;
    animation-delay: var(--pet-delay, 0s);
  }

  @keyframes petReveal {
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .pet-top-status,
  .pet-hero-visual,
  .pet-showcase,
  .pet-shop-preview {
    border-radius: 22px;
    border: 1px solid var(--pet-border);
    background: var(--pet-surface);
    backdrop-filter: blur(6px);
    box-shadow: var(--pet-shadow);
    padding: 1rem 1.2rem;
  }

  .pet-top-status-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.9rem;
    margin-bottom: 0.8rem;
  }

  .pet-top-status-title {
    margin: 0.2rem 0 0;
    font-size: 1.18rem;
    color: var(--pet-text);
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-top-status-controls {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    flex-wrap: wrap;
    gap: 0.6rem;
  }

  .pet-top-status-quick-actions {
    display: inline-flex;
    align-items: center;
    flex-wrap: wrap;
    justify-content: flex-end;
    gap: 0.5rem;
  }

  .pet-top-status-quick-actions .pet-user-chip {
    margin-top: 0;
    background: rgba(245, 158, 11, 0.17);
  }

  .pet-top-status-quick-actions .pet-btn {
    padding: 0.56rem 0.8rem;
    font-size: 0.84rem;
  }

  .pet-top-status-quick-actions .pet-btn.pet-btn-icon {
    width: 42px;
    height: 42px;
    padding: 0;
    border-radius: 11px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    line-height: 1;
  }

  .pet-icon-toggle {
    width: 44px;
    height: 44px;
    border: 0;
    border-radius: 12px;
    cursor: pointer;
    background: linear-gradient(135deg, #fde047, #f59e0b);
    font-size: 1.3rem;
    box-shadow: 0 10px 18px rgba(234, 88, 12, 0.2);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .pet-icon-toggle:hover {
    transform: translateY(-1px) scale(1.02);
    box-shadow: 0 14px 24px rgba(234, 88, 12, 0.24);
  }

  .pet-eyebrow {
    margin: 0;
    font-size: 0.78rem;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #b45309;
  }

  .pet-coin-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0.32rem 0.7rem;
    border-radius: 999px;
    background: rgba(250, 204, 21, 0.22);
    border: 1px solid rgba(217, 119, 6, 0.3);
    color: #9a3412;
    font-size: 0.84rem;
    font-family: "Nunito", sans-serif;
    font-weight: 800;
  }

  .pet-status-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.7rem;
  }

  .pet-status-item {
    border-radius: 14px;
    padding: 0.78rem;
    background: rgba(255, 255, 255, 0.6);
    border: 1px solid rgba(22, 101, 52, 0.12);
  }

  .pet-status-item p {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.8rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-status-item strong {
    margin-top: 0.22rem;
    display: block;
    color: #14532d;
    font-size: 1.16rem;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-level-track {
    margin-top: 0.36rem;
    width: 100%;
    height: 10px;
    border-radius: 999px;
    background: color-mix(in srgb, var(--theme-surface, rgba(255, 255, 255, 0.1)) 70%, transparent);
    border: 1px solid color-mix(in srgb, var(--theme-border-light, rgba(22, 101, 52, 0.14)) 80%, transparent);
    overflow: hidden;
  }

  .pet-level-fill {
    display: block;
    width: 0%;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(135deg, #f59e0b, #16a34a);
    transition: width 0.32s ease;
  }

  .pet-level-points {
    margin-top: 0.28rem;
    display: inline-block;
    font-size: 0.76rem;
    font-weight: 800;
    color: var(--pet-subtle);
    font-family: "Nunito", sans-serif;
  }

  .pet-user-chip {
    margin-top: 0.95rem;
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    border-radius: 999px;
    padding: 0.45rem 0.85rem;
    background: rgba(245, 158, 11, 0.12);
    border: 1px solid rgba(180, 83, 9, 0.2);
    color: #7c2d12;
    font-family: "Nunito", sans-serif;
  }

  .pet-user-label {
    font-size: 0.82rem;
    font-weight: 700;
  }

  .pet-btn {
    border: 0;
    border-radius: 12px;
    padding: 0.62rem 0.95rem;
    font-family: "Nunito", sans-serif;
    font-weight: 800;
    font-size: 0.92rem;
    cursor: pointer;
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }

  .pet-btn:hover {
    transform: translateY(-1px);
  }

  .pet-btn-primary {
    color: #fff;
    background: linear-gradient(135deg, var(--pet-primary), var(--pet-primary-strong));
    box-shadow: 0 10px 20px rgba(249, 115, 22, 0.28);
  }

  .pet-btn-secondary {
    color: #14532d;
    background: linear-gradient(135deg, #bef264, #4ade80);
    box-shadow: 0 10px 18px rgba(34, 197, 94, 0.22);
  }

  .pet-btn-ghost {
    color: var(--pet-text);
    background: rgba(255, 255, 255, 0.65);
    border: 1px solid var(--pet-border);
    box-shadow: none;
  }

  .pet-hero-visual {
    position: relative;
    width: 100%;
    border-radius: 22px;
    border: 1px solid rgba(250, 204, 21, 0.25);
    background: linear-gradient(180deg, rgba(254, 243, 199, 0.6), rgba(187, 247, 208, 0.58));
    min-height: 400px;
    overflow: hidden;
    padding: 1rem;
    display: flex;
    align-items: flex-end;
    justify-content: flex-start;
  }

  .pet-hero-hud {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 3;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .pet-hero-xp-pill {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    border-radius: 999px;
    padding: 0.32rem 0.7rem;
    border: 1px solid rgba(22, 101, 52, 0.2);
    background: rgba(255, 255, 255, 0.82);
    color: #166534;
    font-size: 0.84rem;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
  }

  .pet-name-tag {
    position: absolute;
    top: 14px;
    left: 14px;
    z-index: 3;
    border: 1px solid rgba(217, 119, 6, 0.45);
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.9);
    display: inline-flex;
    align-items: center;
    gap: 0.45rem;
    padding: 0.44rem 0.8rem;
    cursor: pointer;
    color: #7c2d12;
    box-shadow: 0 8px 20px rgba(146, 64, 14, 0.16);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .pet-name-tag:hover {
    transform: translateY(-1px);
    box-shadow: 0 12px 22px rgba(146, 64, 14, 0.2);
  }

  .pet-name-tag-label {
    font-size: 0.74rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 800;
    color: #b45309;
    font-family: "Nunito", sans-serif;
  }

  #petDisplayName {
    font-size: 0.9rem;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-sun {
    position: absolute;
    top: 72px;
    right: 24px;
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: radial-gradient(circle, #fde68a 20%, #f59e0b 100%);
    box-shadow: 0 0 0 12px rgba(254, 215, 170, 0.35);
  }

  .pet-cloud {
    position: absolute;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.8);
    filter: blur(0.4px);
  }

  .pet-cloud-1 {
    width: 84px;
    height: 26px;
    top: 82px;
    left: 18px;
    animation: petCloudDrift 9s ease-in-out infinite;
  }

  .pet-cloud-2 {
    width: 62px;
    height: 22px;
    top: 120px;
    left: 72px;
    animation: petCloudDrift 10s ease-in-out infinite reverse;
  }

  @keyframes petCloudDrift {
    0%,
    100% {
      transform: translateX(0);
    }
    50% {
      transform: translateX(8px);
    }
  }

  .pet-nest {
    position: absolute;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    width: 256px;
    height: 132px;
    border-radius: 60% 60% 52% 52%;
    background: linear-gradient(180deg, #d97706, #92400e);
    box-shadow: inset 0 7px 0 rgba(255, 255, 255, 0.16);
    display: flex;
    justify-content: center;
    align-items: flex-start;
  }

  .pet-egg {
    --pet-egg-tilt: 0deg;
    margin-top: -76px;
    width: 168px;
    height: 212px;
    border-radius: 50% 50% 48% 48%;
    background: linear-gradient(180deg, #fff7cc, #fde68a 65%, #fbbf24 100%);
    border: 3px solid rgba(217, 119, 6, 0.36);
    position: relative;
    transform-origin: 50% 86%;
    animation: petEggBounce 2.4s ease-in-out infinite;
  }

  @keyframes petEggBounce {
    0%,
    100% {
      transform: translateY(0) rotate(var(--pet-egg-tilt));
    }
    50% {
      transform: translateY(-12px) rotate(var(--pet-egg-tilt));
    }
  }

  .pet-egg-spark {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.95);
    box-shadow: 0 0 10px rgba(255, 255, 255, 0.9);
    animation: petSparkle 1.8s ease-in-out infinite;
  }

  .pet-spark-1 {
    top: 30px;
    left: 22px;
  }

  .pet-spark-2 {
    right: 18px;
    top: 64px;
    animation-delay: 0.35s;
  }

  .pet-spark-3 {
    bottom: 30px;
    left: 34px;
    animation-delay: 0.65s;
  }

  @keyframes petSparkle {
    0%,
    100% {
      opacity: 0.3;
      transform: scale(0.8);
    }
    50% {
      opacity: 1;
      transform: scale(1.2);
    }
  }

  .pet-panel-head,
  .pet-showcase-head,
  .pet-modal-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.8rem;
    margin-bottom: 0.9rem;
  }

  .pet-panel-head h2,
  .pet-showcase-head h2 {
    margin: 0;
    font-size: 1.2rem;
    font-family: "Baloo 2", "Nunito", sans-serif;
    color: var(--pet-text);
  }

  .pet-showcase-head p {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.92rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-stage-pill {
    border-radius: 999px;
    padding: 0.28rem 0.72rem;
    background: rgba(249, 115, 22, 0.14);
    color: #9a3412;
    font-size: 0.82rem;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
    white-space: nowrap;
  }

  .pet-kpi-inline {
    display: flex;
    align-items: baseline;
    gap: 0.55rem;
    margin-bottom: 0.8rem;
  }

  .pet-kpi-label {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
  }

  .pet-kpi-value {
    margin: 0;
    font-size: 1.6rem;
    line-height: 1;
    color: #14532d;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-note-box {
    border-radius: 12px;
    padding: 0.75rem 0.85rem;
    background: rgba(34, 197, 94, 0.14);
    border: 1px dashed rgba(22, 163, 74, 0.36);
  }

  .pet-note-box p {
    margin: 0;
    color: #166534;
    line-height: 1.45;
    font-size: 0.86rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-evolution-lane {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.7rem;
  }

  .pet-evolution-node {
    border-radius: 14px;
    padding: 0.82rem;
    border: 1px solid rgba(22, 101, 52, 0.12);
    background: rgba(255, 255, 255, 0.6);
    transition: transform 0.2s ease;
  }

  .pet-evolution-node:hover {
    transform: translateY(-2px);
  }

  .pet-evolution-node.active {
    border-color: rgba(249, 115, 22, 0.45);
    background: rgba(254, 243, 199, 0.78);
  }

  .pet-evolution-icon {
    font-size: 1.5rem;
  }

  .pet-evolution-node h3 {
    margin: 0.35rem 0 0.12rem;
    color: var(--pet-text);
    font-size: 0.95rem;
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-evolution-node p {
    margin: 0;
    color: var(--pet-subtle);
    font-size: 0.82rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-item-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 0.7rem;
  }

  .pet-item-card {
    border-radius: 14px;
    border: 1px solid rgba(22, 101, 52, 0.12);
    background: rgba(255, 255, 255, 0.6);
    padding: 0.8rem;
    display: flex;
    flex-direction: column;
    gap: 0.35rem;
  }

  .pet-item-icon {
    font-size: 1.5rem;
  }

  .pet-item-card h3 {
    margin: 0;
    font-size: 0.94rem;
    color: var(--pet-text);
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-item-card p {
    margin: 0;
    font-size: 0.82rem;
    color: var(--pet-subtle);
    font-family: "Nunito", sans-serif;
  }

  .pet-item-btn {
    margin-top: 0.42rem;
    border: 0;
    border-radius: 10px;
    padding: 0.48rem 0.72rem;
    background: linear-gradient(135deg, #22c55e, #16a34a);
    color: #ffffff;
    font-size: 0.82rem;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
    cursor: pointer;
    transition: transform 0.18s ease;
  }

  .pet-item-btn:hover {
    transform: translateY(-1px);
  }

  .pet-modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    background: rgba(15, 23, 42, 0.48);
    backdrop-filter: blur(3px);
  }

  .pet-modal-overlay.open {
    display: flex;
    animation: petModalFadeIn 0.2s ease;
  }

  @keyframes petModalFadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  .pet-modal {
    width: min(780px, 96vw);
    max-height: 90vh;
    overflow: auto;
    border-radius: 20px;
    border: 1px solid var(--pet-border);
    background: #fffef8;
    box-shadow: 0 24px 50px rgba(15, 23, 42, 0.25);
    padding: 1.1rem;
    position: relative;
  }

  .pet-rename-modal {
    width: min(520px, 94vw);
    background:
      radial-gradient(circle at 85% 16%, rgba(34, 197, 94, 0.12), transparent 38%),
      radial-gradient(circle at 12% 88%, rgba(249, 115, 22, 0.14), transparent 40%),
      var(--pet-surface);
    border: 1px solid color-mix(in srgb, var(--theme-primary, #5b6ff8) 24%, var(--pet-border));
  }

  .pet-rename-subtitle {
    margin: 0 0 0.75rem;
    color: var(--pet-subtle);
    font-size: 0.9rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-rename-label {
    display: block;
    margin-bottom: 0.42rem;
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-weight: 800;
    color: #92400e;
    font-family: "Nunito", sans-serif;
  }

  .pet-rename-input {
    width: 100%;
    border-radius: 12px;
    border: 1px solid color-mix(in srgb, var(--theme-primary, #5b6ff8) 26%, var(--pet-border));
    background: rgba(255, 255, 255, 0.82);
    color: var(--pet-text);
    font-size: 1rem;
    padding: 0.62rem 0.8rem;
    font-family: "Nunito", sans-serif;
    outline: none;
    transition: border-color 0.18s ease, box-shadow 0.18s ease;
  }

  .pet-rename-input:focus {
    border-color: var(--theme-primary, #5b6ff8);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--theme-primary, #5b6ff8) 25%, transparent);
  }

  .pet-rename-hint {
    margin: 0.52rem 0 0;
    min-height: 1.2rem;
    color: var(--pet-subtle);
    font-size: 0.83rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-rename-hint.error {
    color: #b91c1c;
    font-weight: 700;
  }

  .pet-rename-actions {
    margin-top: 0.92rem;
    display: flex;
    justify-content: flex-end;
    gap: 0.52rem;
  }

  .pet-food-modal {
    width: min(880px, 96vw);
    background:
      radial-gradient(circle at 85% 15%, rgba(34, 197, 94, 0.14), transparent 40%),
      radial-gradient(circle at 12% 82%, rgba(249, 115, 22, 0.13), transparent 42%),
      var(--pet-surface);
  }

  .pet-food-switch {
    display: flex;
    gap: 0.45rem;
    flex-wrap: wrap;
    margin-top: 0.35rem;
  }

  .pet-food-switch-btn {
    border: 1px solid rgba(22, 101, 52, 0.24);
    background: rgba(255, 255, 255, 0.72);
    color: var(--pet-text);
    border-radius: 999px;
    padding: 0.34rem 0.68rem;
    font-size: 0.78rem;
    font-weight: 800;
    font-family: "Nunito", sans-serif;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .pet-food-switch-btn.active {
    background: linear-gradient(135deg, rgba(22, 163, 74, 0.2), rgba(249, 115, 22, 0.18));
    border-color: rgba(22, 163, 74, 0.5);
  }

  .pet-food-section {
    margin-top: 0.9rem;
  }

  .pet-food-section h3 {
    margin: 0;
    font-size: 1rem;
    color: var(--pet-text);
    font-family: "Baloo 2", "Nunito", sans-serif;
  }

  .pet-food-section p {
    margin: 0.2rem 0 0.62rem;
    color: var(--pet-subtle);
    font-size: 0.84rem;
    font-family: "Nunito", sans-serif;
  }

  .pet-food-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.52rem;
  }

  .pet-food-icon-card {
    position: relative;
    min-height: 46px;
    border-radius: 12px;
    border: 1px solid rgba(22, 101, 52, 0.14);
    background: rgba(255, 255, 255, 0.75);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.52rem;
    width: 100%;
    padding: 0.42rem 0.55rem;
    cursor: pointer;
