<style>
  .pet-page {
    --pet-font-family: "Inter", "Segoe UI", -apple-system, "Helvetica Neue", sans-serif;
    --pet-admin-preview-width: 200px;
    --pet-admin-preview-height: 180px;
    --pet-card-bg: var(--theme-card, rgba(255, 255, 255, 0.05));
    --pet-card-border: var(--theme-card-border, rgba(255, 255, 255, 0.12));
    --pet-soft-surface: var(--theme-surface, rgba(255, 255, 255, 0.08));
    --pet-soft-hover: var(--theme-hover, rgba(255, 255, 255, 0.12));
    --pet-text: var(--theme-text, #ffffff);
    --pet-text-secondary: var(--theme-text-secondary, rgba(255, 255, 255, 0.78));
    --pet-text-muted: var(--theme-text-muted, rgba(255, 255, 255, 0.58));
    --pet-accent: var(--theme-primary, #667eea);
    --pet-accent-strong: var(--theme-primary-hover, #764ba2);
    --pet-success: var(--theme-success, #4ade80);
    --pet-danger: var(--theme-danger, #f87171);
    min-height: 100vh;
    padding: 0;
    background: var(--theme-dashboard-bg, var(--theme-bg, #071a33));
    background-attachment: fixed;
    color: var(--pet-text);
    font-family: var(--pet-font-family);
    position: relative;
    overflow: hidden;
    /* Ensure mobile menu button stays visible above pet page */
    isolation: isolate;
  }

  .pet-page::before {
    display: none;
  }

  /* Ensure mobile menu button always visible on top */
  #mobileMenuToggleGlobal {
    z-index: 2000 !important;
    position: fixed !important;
    display: flex !important;
    visibility: visible !important;
    pointer-events: auto !important;
  }

  @keyframes petGalaxyTwinkle {
    0%,
    100% {
      opacity: 0.72;
    }
    50% {
      opacity: 1;
    }
  }

  .pet-shell {
    max-width: none;
    width: 100%;
    height: 100vh;
    margin: 0;
    position: relative;
    z-index: 1;
  }

  .pet-main-layout,
  .pet-main-layout.with-accessory-panel {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    align-items: start;
  }

  .pet-main-layout .pet-card,
  .pet-main-layout.with-accessory-panel .pet-card {
    min-height: unset;
  }

  .pet-main-layout .pet-stage,
  .pet-main-layout.with-accessory-panel .pet-stage {
    min-height: unset;
  }

  .pet-main-layout .pet-accessory-panel,
  .pet-main-layout.with-accessory-panel .pet-accessory-panel {
    margin-top: 0;
    align-self: start;
  }

  .pet-top-layout {
    display: block;
    margin: 0;
    position: relative;
    overflow: visible;
    height: 100vh;
    background: transparent;
    border: none;
    box-shadow: none;
    padding: 0;
  }

  .ptl-left {
    position: absolute;
    inset: 0;
    z-index: 1;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    box-shadow: none;
    margin: 0;
  }

  .ptl-right {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
    flex-direction: row;
    gap: 1rem;
    align-items: center;
    z-index: 10;
    background: transparent;
    border: none;
    border-radius: 0;
    padding: 0;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    box-shadow: none;
    min-height: 0;
  }

  @media (max-width: 992px) {
    .pet-top-layout {
      grid-template-columns: 1fr;
      min-height: auto;
      gap: 2rem;
    }
  }

  .pet-status-area {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 1rem;
    position: relative;
    z-index: 5;
  }

  @media (max-width: 600px) {
    .pet-status-area {
      flex-direction: row; /* keep row */
    }
  }

  /* Cards are now styled independently below */

  .pet-header-control-stack {
    position: relative;
    display: flex;
    flex-direction: row;
    align-items: center; 
    gap: 1rem;
  }

  .pet-popover-owned-summary {
    margin: 0 0 8px;
    font-size: 0.95rem;
    font-weight: 800;
    letter-spacing: 0.01em;
    color: color-mix(in srgb, var(--theme-accent, #ffd700) 88%, #fff);
    text-align: center;
  }

  .pet-header-actions {
    display: inline-flex;
    align-items: center;
    justify-content: flex-end;
    gap: 0.45rem;
  }

  .pet-header-icon-btn {
    width: 42px;
    height: 42px;
    border-radius: 8px;
    border: none;
    background: #fdf6e3;
    color: #000;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .pet-header-icon-btn .material-symbols-sharp {
    font-size: 21px;
    line-height: 1;
  }

  .pet-header-icon-btn:hover {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--pet-accent) 60%, var(--pet-card-border));
    background: var(--pet-soft-hover);
    box-shadow: 0 10px 18px color-mix(in srgb, var(--pet-accent) 28%, transparent);
  }

  .pet-header-icon-btn.active {
    background: var(--theme-primary-alpha30, color-mix(in srgb, var(--pet-accent) 22%, transparent));
    border-color: var(--theme-primary, color-mix(in srgb, var(--pet-accent) 66%, var(--pet-card-border)));
    color: var(--sc-text);
  }

  .is-hidden {
    display: none !important;
  }

  .pet-header-title-area {
    align-items: flex-start;
  }

  .pet-header-title-wrap {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
  }

  .pet-header-kicker {
    margin: 0;
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: color-mix(in srgb, var(--sc-text-secondary) 92%, transparent);
  }

  .pet-page-header .uph-title {
    font-size: clamp(1.6rem, 2.45vw, 2.25rem);
    font-weight: 800;
    letter-spacing: -0.02em;
    text-shadow: 0 4px 18px color-mix(in srgb, var(--pet-accent) 45%, transparent);
  }

  .pet-header-subtitle {
    margin: 0;
    font-size: 0.92rem;
    font-weight: 500;
    color: color-mix(in srgb, var(--sc-text-secondary) 94%, transparent);
    text-wrap: balance;
  }

  .pet-page,
  .pet-page-header,
  .pet-level-progress-card,
  .pet-card,
  .pet-stage,
  .pet-name-tag,
  .pet-header-icon-btn,
  .pet-level-badge,
  .pet-header-settings-popover,
  .pet-accessory-panel,
  .pet-pill-btn,
  .pet-accessory-btn,
  .pet-variant-btn {
    transition:
      background 0.25s ease,
      background-color 0.25s ease,
      color 0.25s ease,
      border-color 0.25s ease,
      box-shadow 0.25s ease;
  }

  .pet-header-galaxy-bg {
    display: none;
  }

  .pet-header-stars {
    position: absolute;
    padding: 8px 12px;
    background-image:
      radial-gradient(
        1px 1px at 20% 30%,
        rgba(255, 255, 255, 0.8) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 45% 70%,
        rgba(168, 216, 255, 0.7) 100%,
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.9) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 80% 50%,
        rgba(201, 168, 255, 0.6) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 60%,
        rgba(255, 255, 255, 0.5) 100%,
        transparent
      );
    background-size: 200px 100px;
    animation: petHeaderTwinkle 4s ease-in-out infinite;
    transition: transform 0.3s ease-out;
  }

  .pet-header-nebula {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(
        ellipse 80% 60% at 20% 40%,
        rgba(255, 100, 150, 0.12),
        transparent
      ),
      radial-gradient(
        ellipse 60% 50% at 80% 60%,
        rgba(100, 150, 255, 0.1),
        transparent
      );
    filter: blur(20px);
  }

  .pet-header-meteor-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .pet-header-meteor {
    position: absolute;
    width: 2px;
    height: 80px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(255, 255, 255, 0.28),
      rgba(255, 255, 255, 0.63)
    );
    border-radius: 50%;
    transform: rotate(-45deg);
    opacity: 0;
    animation: petMeteorFall 1s ease-in forwards;
  }

  .pet-header-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -1px;
    width: 4px;
    height: 4px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px rgba(255, 255, 255, 0.6);
  }

  @keyframes petHeaderTwinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  @keyframes petMeteorFall {
    0% {
      opacity: 1;
      transform: rotate(-45deg) translateY(-100px);
    }
    70% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(-45deg) translateY(300px);
    }
  }

  body.hide-galaxy-effects .pet-header-galaxy-bg {
    display: none;
  }

  body.hide-galaxy-effects .pet-page::before {
    display: none;
  }

  .pet-level-progress-card {
    min-height: 42px;
    padding: 0.5rem 1.5rem;
    border-radius: 20px;
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
    border: 1px solid rgba(255, 255, 255, 0.3);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 1;
    visibility: visible;
    transform: none;
    pointer-events: auto;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
    transition:
      transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
      background 0.25s ease,
      box-shadow 0.25s ease;
  }

  .pet-level-progress-card:hover {
    transform: translateY(-2px) scale(1.02);
    background: linear-gradient(135deg, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.1));
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
  }

  .pet-level-progress-card.is-hover-visible {
    transform: translateY(-1px);
  }

  .pet-level-progress-line {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    text-align: center;
    line-height: 1.2;
  }

  .pet-level-progress-line > :not(.pet-level-pet-name) {
    display: none !important;
  }

  .pet-level-pet-name {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    width: 100%;
    font-size: 1.15rem;
    font-weight: 800;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }

  .pet-level-pet-name::after {
    content: "edit";
    font-family: "Material Symbols Sharp", sans-serif;
    font-size: 1rem;
    opacity: 0.6;
    transition: opacity 0.2s ease;
  }

  .pet-level-progress-card:hover .pet-level-pet-name::after {
    opacity: 1;
  }

  .pet-level-sep {
    color: color-mix(in srgb, var(--pet-text) 76%, transparent);
    font-weight: 800;
  }

  .pet-level-lv,
  .pet-level-xp {
    font-weight: 750;
    color: color-mix(in srgb, var(--pet-text) 92%, #fff);
  }

  .pet-balance-card {
    padding: 0.5rem 1rem;
    border-radius: 8px;
    background: #fff;
    border: none;
    display: flex;
    align-items: center;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .pet-balance-card:hover {
    transform: translateY(-2px);
    box-shadow: 
      0 12px 30px rgba(0, 0, 0, 0.3),
      inset 0 1px 1px rgba(255, 255, 255, 0.15);
  }

  .pet-balance-content {
    display: flex;
    flex-direction: row-reverse;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    gap: 8px;
  }

  .pet-balance-info {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .pet-balance-label {
    display: none;
  }

  .pet-balance-value {
    font-size: 1.1rem;
    font-weight: 800;
    color: #fbbf24;
  }

  .pet-balance-icon-box {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fbbf24;
  }

  .pet-balance-icon-box span {
    font-size: 24px;
  }

  .pet-level-progress-top {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
  }

  .pet-level-progress-meta {
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .pet-level-progress-label {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--sc-text-secondary);
  }

  .pet-level-progress-level {
    font-size: 0.84rem;
    font-weight: 800;
    color: var(--sc-text);
  }

  .pet-level-progress-track {
    width: 100%;
    height: 12px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.2);
  }

  .pet-level-progress-fill {
    display: block;
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, #00f2fe 0%, #4facfe 50%, #00f2fe 100%);
    background-size: 200% 100%;
    animation: progressGlow 3s linear infinite;
    position: relative;
    box-shadow: 0 0 18px rgba(0, 242, 254, 0.6);
  }

  @keyframes progressGlow {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
  }

  .pet-level-progress-value {
    font-size: 0.78rem;
    font-weight: 900;
    color: #ffffff;
    padding: 2px 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, rgba(0, 242, 254, 0.4) 0%, rgba(79, 172, 254, 0.4) 100%);
    border: 1px solid rgba(0, 242, 254, 0.5);
    box-shadow: 0 0 10px rgba(0, 242, 254, 0.2);
  }

  .pet-name-tag {
    margin: 0;
    border: 1px solid var(--theme-card-border, rgba(255, 255, 255, 0.25));
    border-radius: 999px;
    background: var(--theme-gradient, linear-gradient(135deg, rgba(102, 126, 234, 0.85) 0%, rgba(118, 75, 162, 0.85) 100%));
    color: var(--theme-text-on-dark, #ffffff);
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    cursor: pointer;
    transition: transform 0.16s ease, box-shadow 0.16s ease;
    box-shadow: 0 8px 18px var(--theme-shadow);
    backdrop-filter: blur(6px);
  }

  .pet-name-tag:hover {
    transform: translateY(-1px);
    box-shadow: 0 10px 22px rgba(102, 126, 234, 0.45);
  }

  .pet-name-tag-label {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: rgba(255, 255, 255, 0.8);
  }

  .pet-name-tag-value {
    font-size: 1rem;
    font-weight: 900;
    letter-spacing: 0.01em;
    color: #ffffff;
  }

  .pet-subtitle {
    margin: 8px 0 0;
    color: var(--pet-text-secondary);
    font-size: 0.98rem;
  }

  .pet-card {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    background: transparent;
    padding: 0;
    height: 100%;
    justify-content: center;
  }

  .pet-stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 0;
    background: transparent;
    border: none;
    overflow: hidden;
    isolation: isolate;
    padding: 0;
  }

  .pet-stage::before {
    content: "";
    position: absolute;
    inset: 0;
    z-index: 0;
    background-image: var(--pet-stage-bg-image, none);
    background-repeat: no-repeat;
    background-position: center bottom;
    background-size: cover;
    opacity: 0.92;
    transition: background-image 0.25s ease, opacity 0.25s ease;
    pointer-events: none;
  }

  .pet-stage::after {
    display: none;
  }

  .pet-stage-meta {
    position: absolute;
    top: 10px;
    left: auto;
    right: 12px;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 10px;
    z-index: 5;
    pointer-events: none;
  }

  .pet-bag-btn {
    height: 38px;
    border: 1px solid var(--pet-card-border);
    border-radius: 999px;
    background: var(--pet-soft-surface);
    color: var(--pet-text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 12px;
    cursor: pointer;
    transition:
      transform 0.16s ease,
      box-shadow 0.16s ease,
      border-color 0.16s ease,
      background 0.16s ease;
    box-shadow: 0 6px 14px color-mix(in srgb, var(--pet-accent) 24%, transparent);
  }

  .pet-bag-btn .material-symbols-sharp {
    font-size: 20px;
    line-height: 1;
  }

  .pet-bag-btn-label {
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1;
    white-space: nowrap;
  }

  .pet-bag-btn:hover {
    transform: translateY(-1px);
    border-color: color-mix(in srgb, var(--pet-accent) 60%, var(--pet-card-border));
    background: var(--pet-soft-hover);
    box-shadow: 0 9px 16px color-mix(in srgb, var(--pet-accent) 28%, transparent);
  }

  .pet-bag-btn.active {
    background: color-mix(in srgb, var(--pet-accent) 20%, transparent);
    border-color: color-mix(in srgb, var(--pet-accent) 66%, var(--pet-card-border));
    color: var(--pet-text);
  }

  .pet-stage-meta .pet-name-tag,
  .pet-stage-meta .pet-level-badge {
    pointer-events: auto;
  }

  .pet-stage-meta .pet-name-tag {
    box-shadow: 0 6px 14px rgba(102, 126, 234, 0.35);
    background: linear-gradient(135deg, rgba(102, 126, 234, 0.88) 0%, rgba(118, 75, 162, 0.88) 100%);
    backdrop-filter: blur(6px);
    padding: 7px 12px;
  }

  .pet-stage-meta .pet-level-badge {
    background: linear-gradient(135deg, rgba(251, 113, 133, 0.9) 0%, rgba(244, 63, 94, 0.9) 100%);
    box-shadow: 0 6px 14px rgba(244, 63, 94, 0.3);
  }

  .pet-stage-world {
    position: absolute;
    inset: 0;
    z-index: 2;
    overflow: hidden;
    pointer-events: auto;
  }

  .pet-entity {
    position: absolute;
    width: 180px;
    height: 180px;
    transform-origin: center bottom;
    transition: 
      left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1), 
      top 0.6s cubic-bezier(0.34, 1.56, 0.64, 1),
      opacity 0.3s ease,
      transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer;
    user-select: none;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: center;
    will-change: transform, left, top, opacity;
  }

  .pet-entity.drag-over {
    transform: scale(1.1);
    filter: drop-shadow(0 0 15px var(--pet-accent));
  }

  .pet-entity.is-active {
    z-index: 15;
    filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.3));
  }

  .pet-entity-body {
    position: relative;
    width: 100%;
    height: 100%;
    transform-origin: center bottom;
    pointer-events: none;
  }

  .pet-entity-img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .pet-entity-tooltip {
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(15, 23, 42, 0.98);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 999px;
    padding: 6px 14px;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: center;
    gap: 6px;
    white-space: nowrap;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 100;
    pointer-events: none;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
  }

  .pet-entity:hover .pet-entity-tooltip {
    opacity: 1;
    visibility: visible;
    transform: translateX(-50%) translateY(-8px);
  }

  .pet-entity-name {
    font-size: 0.78rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: 0.02em;
    text-align: center;
  }

  .pet-entity-tooltip-progress-track {
    width: 100%;
    height: 6px;
    min-width: 140px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.18);
    overflow: hidden;
  }

  .pet-entity-tooltip-progress-fill {
    display: block;
    height: 100%;
    width: 0;
    border-radius: inherit;
    background: linear-gradient(90deg, #06b6d4 0%, #22c55e 100%);
  }

  /* Level 1: stay still and tilt by hover side */
  .pet-lvl-1 .pet-entity-body {
    animation: none;
    transition: transform 0.16s ease;
  }

  .pet-lvl-1.tilt-right .pet-entity-body {
    transform: rotate(8deg);
  }

  .pet-lvl-1.tilt-left .pet-entity-body {
    transform: rotate(-8deg);
  }

  /* Level 2: regular up/down jump */
  .pet-jump .pet-entity-body {
    animation: petJumpCycle 0.52s cubic-bezier(0.45, 0, 0.55, 1) forwards;
  }

  @keyframes petJumpCycle {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-14px);
    }
  }

  /* Level 3+: realistic jump with crouch before and after landing */
  .pet-lvl-3.pet-jump .pet-entity-body {
    animation: petJumpCycleRealistic 0.74s cubic-bezier(0.2, 0.75, 0.35, 1) forwards;
  }

  @keyframes petJumpCycleRealistic {
    0% {
      transform: translateY(0) scaleX(1) scaleY(1);
    }
    12% {
      transform: translateY(3px) scaleX(1.06) scaleY(0.9);
    }
    40% {
      transform: translateY(-20px) scaleX(0.97) scaleY(1.04);
    }
    70% {
      transform: translateY(2px) scaleX(1.05) scaleY(0.92);
    }
    100% {
      transform: translateY(0) scaleX(1) scaleY(1);
    }
  }

  /* Level 2: Roll */
  .pet-entity.is-rolling {
    transition: left 0.55s linear !important;
  }
  .pet-lvl-2.is-rolling .pet-entity-body {
    transform-origin: 50% 50%;
    animation: petEggRoll 0.5s linear infinite !important;
  }

  .pet-entity.is-rolling .pet-entity-body {
    animation: petRoll 1s linear infinite !important;
  }

  @keyframes petRoll {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes petEggRoll {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  /* Level 3+: Press - gentle squash */
  .pet-entity.is-pressed .pet-entity-body {
    transform: scale(1.1, 0.74) translateY(30%) !important;
    transition: transform 0.09s ease;
  }

  /* Collision Double Jump */
  .pet-collision-double-jump .pet-entity-body {
    animation: petDoubleJump 0.8s ease-in-out forwards;
  }

  @keyframes petDoubleJump {
    0%, 100% { transform: translateY(0); }
    45% { transform: translateY(-52px); }
  }

  /* Triple Jump for Level 2 click */
  .pet-triple-jump .pet-entity-body {
    animation: petTripleJump 1.2s ease-in-out forwards;
  }

  @keyframes petTripleJump {
    0%, 100% { transform: translateY(0); }
    16% { transform: translateY(-35px); }
    33% { transform: translateY(0); }
    50% { transform: translateY(-35px); }
    66% { transform: translateY(0); }
    83% { transform: translateY(-35px); }
  }
