    const state = {

    let petMeteorInterval = null;

    const INTERACTION_CLASSES = [
      "level1-tilt-left",
      "level1-tilt-right",

    const PET_ASSET_BASE_URLS = [
      "https://cdn.jsdelivr.net/gh/twngvi/Doan@main/Image/",
      "https://raw.githubusercontent.com/twngvi/Doan/main/Image/",
      "Image/",
      "/Image/",
    ];
    const PET_ASSET_URLS_LOCAL_CACHE_KEY = "petDriveAssetUrlsCache.v1";
    const PET_ASSET_URLS_LOCAL_CACHE_TTL_MS = 12 * 60 * 60 * 1000;
    const PET_RESOLVED_URLS_LOCAL_CACHE_KEY = "petResolvedAssetUrlsCache.v1";
    const PET_RESOLVED_URLS_CACHE_MAX_SIZE = 200;

    state.driveAssetsLoading = false;
    state.resolvedAssetUrls = {};
    state.failedAssetUrls = {};
    state.preferredAssetBaseUrl = PET_ASSET_BASE_URLS[0] || "";

    function normalizeAssetKey(fileName) {
      return String(fileName || "")
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "D")
        .toLowerCase();
    }

    function findInlineAssetValue(inlineAssets, fileName) {
      if (!inlineAssets || !fileName) return "";
      if (inlineAssets[fileName]) return inlineAssets[fileName];

      const targetKey = normalizeAssetKey(fileName);
      const allKeys = Object.keys(inlineAssets);
      for (let i = 0; i < allKeys.length; i++) {
        const key = allKeys[i];
        if (normalizeAssetKey(key) === targetKey) {
          return inlineAssets[key];
        }
      }
      return "";
    }

    function canUseLocalStorage() {
      try {
        return typeof window !== "undefined" && !!window.localStorage;
      } catch (error) {
        return false;
      }
    }

    function readLocalJson(key) {
      if (!canUseLocalStorage() || !key) return null;
      try {
        const raw = window.localStorage.getItem(key);
        if (!raw) return null;
        return JSON.parse(raw);
      } catch (error) {
        return null;
      }
    }

    function writeLocalJson(key, value) {
      if (!canUseLocalStorage() || !key) return;
      try {
        window.localStorage.setItem(key, JSON.stringify(value));
      } catch (error) {
        // Ignore localStorage quota errors.
      }
    }

    function loadDriveAssetUrlsFromLocalCache() {
      const cached = readLocalJson(PET_ASSET_URLS_LOCAL_CACHE_KEY);
      if (!cached || !cached.urls || typeof cached.urls !== "object") return;

      const cachedAt = Number(cached.cachedAt || 0);
      if (!cachedAt || Date.now() - cachedAt > PET_ASSET_URLS_LOCAL_CACHE_TTL_MS) {
        return;
      }

      state.driveAssetUrls = cached.urls;
    }

    function persistDriveAssetUrlsToLocalCache(urls) {
      if (!urls || typeof urls !== "object") return;
      writeLocalJson(PET_ASSET_URLS_LOCAL_CACHE_KEY, {
        cachedAt: Date.now(),
        urls: urls,
      });
    }

    function loadResolvedAssetUrlsFromLocalCache() {
      const cached = readLocalJson(PET_RESOLVED_URLS_LOCAL_CACHE_KEY);
      if (!cached || !cached.urls || typeof cached.urls !== "object") return;
      state.resolvedAssetUrls = cached.urls;
      if (cached.preferredAssetBaseUrl) {
        state.preferredAssetBaseUrl = String(cached.preferredAssetBaseUrl);
      }
    }

    function persistResolvedAssetUrlsToLocalCache() {
      const keys = Object.keys(state.resolvedAssetUrls || {});
      if (keys.length > PET_RESOLVED_URLS_CACHE_MAX_SIZE) {
        const trimmed = {};
        const startIndex = keys.length - PET_RESOLVED_URLS_CACHE_MAX_SIZE;
        keys.slice(startIndex).forEach(function (key) {
          trimmed[key] = state.resolvedAssetUrls[key];
        });
        state.resolvedAssetUrls = trimmed;
      }

      writeLocalJson(PET_RESOLVED_URLS_LOCAL_CACHE_KEY, {
        updatedAt: Date.now(),
        preferredAssetBaseUrl: state.preferredAssetBaseUrl,
        urls: state.resolvedAssetUrls,
      });
    }

    function getAssetBaseUrl(url) {
      if (!url) return "";
      const value = String(url);
      for (let i = 0; i < PET_ASSET_BASE_URLS.length; i++) {
        const base = PET_ASSET_BASE_URLS[i];
        if (value.indexOf(base) === 0) return base;
      }
      return "";
    }

    function markAssetUrlSuccess(fileName, url) {
      if (!fileName || !url) return;

      const normalized = normalizeAssetKey(fileName);
      state.resolvedAssetUrls[normalized] = String(url);

      const base = getAssetBaseUrl(url);
      if (base) {
        state.preferredAssetBaseUrl = base;
      }

      if (state.failedAssetUrls[url]) {
        delete state.failedAssetUrls[url];
      }

      persistResolvedAssetUrlsToLocalCache();
    }

    function markAssetUrlFailed(url) {
      if (!url) return;
      state.failedAssetUrls[String(url)] = true;
    }

    function shouldSkipLocalImagePaths() {
      try {
        const host = (window.location && window.location.hostname) || "";
        return host.indexOf("googleusercontent.com") >= 0 || host.indexOf("script.google.com") >= 0;
      } catch (error) {
        return false;
      }
    }

    function resolveAssetCandidates(fileName) {
      if (!fileName) return [];

      const driveAssets =
        state.driveAssetUrls && typeof state.driveAssetUrls === "object"
          ? state.driveAssetUrls
          : {};

      const candidates = [];
      const normalizedFileName = normalizeAssetKey(fileName);

      if (state.resolvedAssetUrls && state.resolvedAssetUrls[normalizedFileName]) {
        candidates.push(state.resolvedAssetUrls[normalizedFileName]);
      }

      const driveAssetValue = findInlineAssetValue(driveAssets, fileName);
      if (driveAssetValue) {
        if (Array.isArray(driveAssetValue)) {
          driveAssetValue.forEach(function (url) {
            candidates.push(url);
          });
        } else if (driveAssetValue && typeof driveAssetValue === "object") {
          Object.keys(driveAssetValue).forEach(function (key) {
            candidates.push(driveAssetValue[key]);
          });
        } else {
          candidates.push(driveAssetValue);
        }
      }

      const encodedFileName = encodeURIComponent(fileName || "");
      const skipLocalPaths = shouldSkipLocalImagePaths();
      let baseUrls = PET_ASSET_BASE_URLS.filter(function (baseUrl) {
        if (!skipLocalPaths) return true;
        return baseUrl !== "Image/" && baseUrl !== "/Image/";
      });

      if (state.preferredAssetBaseUrl && baseUrls.indexOf(state.preferredAssetBaseUrl) >= 0) {
        baseUrls = [state.preferredAssetBaseUrl].concat(
          baseUrls.filter(function (baseUrl) {
            return baseUrl !== state.preferredAssetBaseUrl;
          }),
        );
      }

      baseUrls.forEach(function (baseUrl) {
        candidates.push(baseUrl + encodedFileName);
      });

      return candidates.filter(function (value, index, arr) {
        return Boolean(value) && !state.failedAssetUrls[value] && arr.indexOf(value) === index;
      });
    }

    function getAccessoryPreviewSrc(fileName) {
      const candidates = resolveAssetCandidates(fileName);
      return candidates.length > 0 ? candidates[0] : "";
    }

    function loadPetAssetUrlsFromDrive() {
      if (state.driveAssetsLoading) {
        return;
      }

      if (Object.keys(state.driveAssetUrls).length > 0) {
        return;
      }

      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      ) {
        return;
      }

      state.driveAssetsLoading = true;

      google.script.run
        .withSuccessHandler(function (result) {
          state.driveAssetsLoading = false;

          if (!result || !result.success || !result.urls) {
            if (result && result.message && typeof showToast === "function") {
              showToast(result.message, "error");
            }
            renderPet();
            return;
          }

          state.driveAssetUrls = result.urls;
          persistDriveAssetUrlsToLocalCache(result.urls);
          buildAccessoryButtons();
          buildBackgroundButtons();
          renderPet();
        })
        .withFailureHandler(function (error) {
          state.driveAssetsLoading = false;

          if (typeof showToast === "function") {
            showToast(
              "Lỗi tải ảnh PET từ Drive: " +
                (error && error.message ? error.message : error),
              "error",
            );
          }

          renderPet();
        })
        .getPetAssetUrls();
    }

    function setImageWithFallback(img, errorEl, candidates, idx, fileName) {
      if (!img || !candidates || idx >= candidates.length) {
        if (img) {
          img.style.display = "none";
          img.src = "";
        }
        if (errorEl) {
          errorEl.style.display = state.driveAssetsLoading ? "none" : "block";
        }
        return;
      }

      const currentUrl = candidates[idx];
      img.onerror = function () {
        markAssetUrlFailed(currentUrl);
        setImageWithFallback(img, errorEl, candidates, idx + 1, fileName);
      };

      img.onload = function () {
        markAssetUrlSuccess(fileName, currentUrl);
        img.style.display = "block";
        if (errorEl) errorEl.style.display = "none";
      };

      img.src = currentUrl;
    }

    function setOverlayImageWithFallback(img, candidates, idx, fileName) {
      if (!img || !candidates || idx >= candidates.length) {
        if (img) {
          img.style.display = "none";
          img.src = "";
        }
        return;
      }

      const currentUrl = candidates[idx];
      img.onerror = function () {
        markAssetUrlFailed(currentUrl);
        setOverlayImageWithFallback(img, candidates, idx + 1, fileName);
      };

      img.onload = function () {
        markAssetUrlSuccess(fileName, currentUrl);
        img.style.display = "block";
      };

      // Keep eyes visible immediately while switching level/state.
      img.style.display = "block";
      img.src = currentUrl;
    }

    function setStageBackgroundWithFallback(stageEl, candidates, idx, fileName) {
      if (!stageEl || !candidates || idx >= candidates.length) {
        if (stageEl) {
          stageEl.style.setProperty("--pet-stage-bg-image", "none");
        }
        return;
      }

      const testImg = new Image();
      const currentUrl = candidates[idx];
      testImg.onload = function () {
        markAssetUrlSuccess(fileName, currentUrl);
        const safeUrl = String(currentUrl).replace(/"/g, '\\"');
        stageEl.style.setProperty("--pet-stage-bg-image", 'url("' + safeUrl + '")');
      };
      testImg.onerror = function () {
        markAssetUrlFailed(currentUrl);
        setStageBackgroundWithFallback(stageEl, candidates, idx + 1, fileName);
      };
      testImg.src = currentUrl;
    }

    function clearInteractionClasses() {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return;
      INTERACTION_CLASSES.forEach(function (className) {
        visualEl.classList.remove(className);
      });
    }

    function applyLevel1TiltByPointer(clientX) {
      if (state.isLevelTwo || state.isPressing) return;

      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return;

      const rect = visualEl.getBoundingClientRect();
      const halfX = rect.left + rect.width / 2;

      visualEl.classList.remove("level1-tilt-left", "level1-tilt-right");
      if (clientX < halfX) {
        visualEl.classList.add("level1-tilt-right");
      } else {
        visualEl.classList.add("level1-tilt-left");
      }
    }

    function resolvePressZone(clientX) {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return "center";

      const rect = visualEl.getBoundingClientRect();
      const ratio = (clientX - rect.left) / rect.width;
      if (ratio < 0.34) return "left";
      if (ratio > 0.66) return "right";
      return "center";
    }

    function applyPressShape(zone) {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return;

      visualEl.classList.remove(
        "level2-press-left",
        "level2-press-right",
        "level2-press-center",
      );

      if (zone === "left") {
        visualEl.classList.add("level2-press-right");
      } else if (zone === "right") {
        visualEl.classList.add("level2-press-left");
      } else {
        visualEl.classList.add("level2-press-center");
      }
    }

    function releasePressState() {
      if (!state.isPressing) return;

      state.isPressing = false;
      state.pressZone = null;
      state.isEyesClosed = false;
      clearInteractionClasses();
      renderEyes();
    }

    function playLevelTransitionAnimation() {
      const animatorEl = document.getElementById("petAnimator");
      if (!animatorEl) return;

      animatorEl.classList.remove("anim-level1-roll", "anim-level2-drop");
      void animatorEl.offsetWidth;
      animatorEl.classList.add(
        state.isLevelTwo ? "anim-level2-drop" : "anim-level1-roll",
      );
    }

    function updateColorButtons(activeIndex) {
      const buttonsWrap = document.getElementById("petColorButtons");
      if (!buttonsWrap) return;

      const buttons = buttonsWrap.querySelectorAll(".pet-color-btn");
      buttons.forEach((button, index) => {
        button.classList.toggle("active", index === activeIndex);
      });
    }

    function sanitizePetName(value) {
      const raw = String(value || "").trim();
      if (!raw) return DEFAULT_PET_NAME;
      return raw.slice(0, PET_NAME_MAX_LENGTH);
    }

    function updatePetNameTagUI() {
      const nameEl = document.getElementById("petNameTagValue");
      const safeName = sanitizePetName(state.petDisplayName);

      if (nameEl) {
        nameEl.textContent = safeName;
      }

      const headerNameEl = document.getElementById("petHeaderPetName");
      if (headerNameEl) {
        headerNameEl.textContent = safeName;
      }
    }

    function updatePetLevelProgressUI() {
      const level = state.isLevelTwo ? 2 : 1;
      const progressPercent = state.isLevelTwo ? 100 : 50;

      const levelTextEl = document.getElementById("petHeaderLevelText");
      if (levelTextEl) {
        levelTextEl.textContent = "Level " + level;
      }

      const progressFillEl = document.getElementById("petLevelProgressFill");
      if (progressFillEl) {
        progressFillEl.style.width = progressPercent + "%";
      }

      const progressValueEl = document.getElementById("petLevelProgressValue");
      if (progressValueEl) {
        progressValueEl.textContent = progressPercent + "%";
      }
    }

    function savePetNameToServer(newPetName) {
      if (!window.currentUser?.userId) return;
      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      )
        return;

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || !result.success) {
            if (typeof showToast === "function") {
              showToast((result && result.message) || "Không lưu được tên PET", "error");
            }
            return;
          }

          state.petDisplayName = sanitizePetName(result.petName || newPetName);
          updatePetNameTagUI();

          if (typeof showToast === "function") {
            showToast("Đã lưu tên PET", "success");
          }
        })
        .withFailureHandler(function (error) {
          if (typeof showToast === "function") {
            showToast("Lỗi lưu tên PET: " + (error && error.message ? error.message : error), "error");
          }
        })
        .savePetName({
          userId: window.currentUser.userId,
          petName: newPetName,
        });
    }

    function loadPetNameFromServer() {
      const userId = window.currentUser?.userId
        ? String(window.currentUser.userId).trim()
        : "";

      if (!userId) {
        updatePetNameTagUI();
        return;
      }

      if (state.petNameLoading || state.petNameLoadedUserId === userId) {
        updatePetNameTagUI();
        return;
      }

      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      ) {
        updatePetNameTagUI();
        return;
      }

      state.petNameLoading = true;

      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.success && result.petName) {
            state.petDisplayName = sanitizePetName(result.petName);
          }
          state.petNameLoadedUserId = userId;
          state.petNameLoading = false;
          updatePetNameTagUI();
        })
        .withFailureHandler(function () {
          state.petNameLoading = false;
          updatePetNameTagUI();
        })
        .getPetName(userId);
    }

    function updateAccessoryPanelVisibility() {
      const panelEl = document.getElementById("petAccessoryPanel");
      const mainLayoutEl = document.getElementById("petMainLayout");

      state.accessoryPanelOpen = true;

      if (panelEl) {
        panelEl.classList.remove("is-hidden");
      }

      if (mainLayoutEl) {
        mainLayoutEl.classList.add("with-accessory-panel");
      }
    }

    function updatePanelControlsDropdownVisibility() {
      const dropdownEl = document.getElementById("petPanelControlsDropdown");
      const toggleBtn = document.getElementById("petPanelControlsToggleBtn");

      if (toggleBtn) {
        toggleBtn.setAttribute(
          "aria-expanded",
          state.panelControlsDropdownOpen ? "true" : "false",
        );
      }

      if (dropdownEl) {
        dropdownEl.classList.toggle("is-hidden", !state.panelControlsDropdownOpen);
      }
    }

    function updateSettingsPanelVisibility() {
      const panelEl = document.getElementById("petSettingsPopover");
      const toggleBtn = document.getElementById("petSettingsToggleBtn");
      const isVisible = state.panelControlsDropdownOpen && state.settingsPanelOpen;

      if (panelEl) {
        panelEl.classList.toggle("is-hidden", !isVisible);
      }

      if (toggleBtn) {
        toggleBtn.classList.toggle("active", isVisible);
        toggleBtn.setAttribute(
          "aria-expanded",
          isVisible ? "true" : "false",
        );
      }
    }

    function updateBackgroundPanelVisibility() {
      const panelEl = document.getElementById("petBackgroundPopover");
      const toggleBtn = document.getElementById("petBackgroundToggleBtn");
      const isVisible = state.panelControlsDropdownOpen && state.backgroundPanelOpen;

      if (panelEl) {
        panelEl.classList.toggle("is-hidden", !isVisible);
      }

      if (toggleBtn) {
        toggleBtn.classList.toggle("active", isVisible);
        toggleBtn.setAttribute(
          "aria-expanded",
          isVisible ? "true" : "false",
        );
      }
    }

    function bindSettingsPanelToggle() {
      const toggleBtn = document.getElementById("petSettingsToggleBtn");
      const controlsRoot = document.getElementById("petPanelControls");
      if (!toggleBtn || !controlsRoot) return;

      toggleBtn.addEventListener("click", function (event) {
        event.stopPropagation();
        state.panelControlsDropdownOpen = true;
        state.backgroundPanelOpen = false;
        state.settingsPanelOpen = !state.settingsPanelOpen;
        updatePanelControlsDropdownVisibility();
        updateSettingsPanelVisibility();
        updateBackgroundPanelVisibility();
      });
    }

    function bindBackgroundPanelToggle() {
      const toggleBtn = document.getElementById("petBackgroundToggleBtn");
      if (!toggleBtn) return;

      toggleBtn.addEventListener("click", function (event) {
        event.stopPropagation();
        state.panelControlsDropdownOpen = true;
        state.settingsPanelOpen = false;
        state.backgroundPanelOpen = !state.backgroundPanelOpen;
        updatePanelControlsDropdownVisibility();
        updateSettingsPanelVisibility();
        updateBackgroundPanelVisibility();
      });
    }

    function bindPanelControlsDropdown() {
      const toggleBtn = document.getElementById("petPanelControlsToggleBtn");
      const controlsRoot = document.getElementById("petPanelControls");
      if (!toggleBtn || !controlsRoot) return;

      toggleBtn.addEventListener("click", function (event) {
        event.stopPropagation();
        if (state.panelControlsDropdownOpen) {
          state.panelControlsDropdownOpen = false;
          state.settingsPanelOpen = false;
          state.backgroundPanelOpen = false;
        } else {
          state.panelControlsDropdownOpen = true;
        }

        updatePanelControlsDropdownVisibility();
        updateSettingsPanelVisibility();
        updateBackgroundPanelVisibility();
      });

      document.addEventListener("click", function (event) {
        if (
          !state.panelControlsDropdownOpen &&
          !state.settingsPanelOpen &&
          !state.backgroundPanelOpen
        ) {
          return;
        }
        if (controlsRoot.contains(event.target)) return;

        state.panelControlsDropdownOpen = false;
        state.settingsPanelOpen = false;
        state.backgroundPanelOpen = false;

        updatePanelControlsDropdownVisibility();
        updateSettingsPanelVisibility();
        updateBackgroundPanelVisibility();
      });

      document.addEventListener("keydown", function (event) {
        if (event.key !== "Escape") return;
        if (!state.panelControlsDropdownOpen) return;

        state.panelControlsDropdownOpen = false;
        state.settingsPanelOpen = false;
        state.backgroundPanelOpen = false;

        updatePanelControlsDropdownVisibility();
        updateSettingsPanelVisibility();
        updateBackgroundPanelVisibility();
      });

      if (!state.panelControlsDropdownOpen) {
        state.settingsPanelOpen = false;
        state.backgroundPanelOpen = false;
      }

      updatePanelControlsDropdownVisibility();
      updateSettingsPanelVisibility();
      updateBackgroundPanelVisibility();
    }

    function bindPetNameEditor() {
      const tagBtn = document.getElementById("petNameTagButton");
      if (!tagBtn) return;

      tagBtn.addEventListener("click", async function () {
        const currentName = sanitizePetName(state.petDisplayName);
        let input = null;

        if (typeof window.showAppPrompt === "function") {
          input = await window.showAppPrompt("Nhập tên PET mới", currentName, {
            title: "Đổi Tên PET",
            confirmText: "Lưu",
            cancelText: "Hủy",
            inputType: "text",
          });
        } else {
          input = window.prompt("Nhập tên PET mới", currentName);
        }

        if (input === null) return;

        const nextName = sanitizePetName(input);
        state.petDisplayName = nextName;
        updatePetNameTagUI();
        savePetNameToServer(nextName);
      });
    }

    function getAccessoryRule(fileName) {
      if (!fileName) return {};
      return ACCESSORY_RULES[fileName] || {};
    }

    function getAllowedAccessoryPositions(fileName) {
      const rule = getAccessoryRule(fileName);
      return rule.allowedPositions || ["left", "center", "right"];
    }

    function resolveAccessoryPosition(fileName, desiredPosition) {
      const rule = getAccessoryRule(fileName);
      if (rule.forcedPosition) return rule.forcedPosition;

      const allowed = getAllowedAccessoryPositions(fileName);
      if (allowed.indexOf(desiredPosition) >= 0) return desiredPosition;
      return allowed[0] || "center";
    }

    function getAccessoryImageElements() {
      return [1, 2, 3]
        .map(function (index) {
          return document.getElementById("petAccessoryImage" + index);
        })
        .filter(Boolean);
    }

    function getSelectedAccessoryIndex(fileName) {
      return state.selectedAccessories.findIndex(function (item) {
        return item.fileName === fileName;
      });
    }

    function getSelectedAccessoryByFile(fileName) {
      const index = getSelectedAccessoryIndex(fileName);
      if (index < 0) return null;
      return state.selectedAccessories[index];
    }

    function resolveActiveAccessory() {
      if (!state.selectedAccessory) return null;
      const selected = getSelectedAccessoryByFile(state.selectedAccessory);
      if (!selected) {
        state.selectedAccessory = "";
        return null;
      }
      return selected;
    }

    function clearAccessoryImage(accessoryImageEl) {
      if (!accessoryImageEl) return;
      accessoryImageEl.style.display = "none";
      accessoryImageEl.src = "";
    }

    function updateAccessoryPositionClasses(accessoryImageEl, fileName, desiredPosition) {
      if (!accessoryImageEl || !fileName) return "center";

      const rule = getAccessoryRule(fileName);
      const finalPosition = resolveAccessoryPosition(fileName, desiredPosition);

      const baseTop = 12;
      const baseLeftMap = {
        left: 35,
        center: 50,
        right: 65,
      };

      const topValue =
        typeof rule.topOverride === "number"
          ? rule.topOverride
          : baseTop + (rule.topOffset || 0);
      const leftValue =
        typeof rule.leftOverride === "number"
          ? rule.leftOverride
          : baseLeftMap[finalPosition] || 50;
      const rotValue = finalPosition === "left" ? -14 : finalPosition === "right" ? 14 : 0;
      const scaleValue = rule.scale || 1;

      accessoryImageEl.style.setProperty("--pet-accessory-top", topValue + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-left", leftValue + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-rot", rotValue + "deg");
      accessoryImageEl.style.setProperty("--pet-accessory-scale", String(scaleValue));

      return finalPosition;
    }

    function updateAccessoryPanelState() {
      const panelEl = document.getElementById("petAccessoryPanel");
      if (!panelEl) return;

      panelEl.classList.toggle("disabled", !state.isLevelTwo);
      panelEl.setAttribute("aria-disabled", state.isLevelTwo ? "false" : "true");

      const accessoryButtons = panelEl.querySelectorAll(".pet-accessory-btn");
      accessoryButtons.forEach(function (button) {
        button.disabled = !state.isLevelTwo;
      });
    }

    function updateAccessoryButtons() {
      const gridEl = document.getElementById("petAccessoryGrid");
      if (!gridEl) return;

      const selectedMap = {};
      state.selectedAccessories.forEach(function (item) {
        selectedMap[item.fileName] = true;
      });

      const buttons = gridEl.querySelectorAll(".pet-accessory-btn");
      buttons.forEach(function (button) {
        const fileName = button.getAttribute("data-file") || "";
        if (fileName === NO_ACCESSORY_VALUE) {
          button.classList.toggle("active", state.selectedAccessories.length === 0);
          return;
        }
        button.classList.toggle("active", Boolean(selectedMap[fileName]));
      });
    }

    function updateAccessoryPositionButtons() {
      const container = document.getElementById("petAccessoryPosition");
      if (!container) return;

      const activeAccessory = resolveActiveAccessory();
      const allowed = getAllowedAccessoryPositions(
        activeAccessory ? activeAccessory.fileName : "",
      );
      const activePosition = activeAccessory
        ? activeAccessory.position
        : state.accessoryPosition;

      const buttons = container.querySelectorAll(".pet-pill-btn");
      buttons.forEach(function (button) {
        const pos = button.getAttribute("data-pos") || "";
        const isAllowed = state.isLevelTwo && allowed.indexOf(pos) >= 0;
        button.disabled = !isAllowed;
        button.classList.toggle("active", isAllowed && pos === activePosition);
      });
    }

    function renderEyes() {
      const variant = PET_VARIANTS[state.currentIndex];
      if (!variant) return;

      const eyesImageEl = document.getElementById("petEyesImage");
      if (!eyesImageEl) return;

      if (!state.isLevelTwo) {
        eyesImageEl.style.display = "none";
        return;
      }

      const shouldCloseEyes =
        state.isPressing || (state.isLevelTwo && state.isEyesClosed);
      const eyeAsset = shouldCloseEyes ? variant.eyeClosed : variant.eyeOpen;
      const eyeCandidates = resolveAssetCandidates(eyeAsset);
      setOverlayImageWithFallback(eyesImageEl, eyeCandidates, 0, eyeAsset);
    }

    function renderAccessory() {
      const accessoryImageEls = getAccessoryImageElements();
      if (accessoryImageEls.length === 0) return;

      if (!state.isLevelTwo) {
        accessoryImageEls.forEach(clearAccessoryImage);
        return;
      }

      accessoryImageEls.forEach(function (accessoryImageEl, index) {
        const selected = state.selectedAccessories[index];
        if (!selected) {
          clearAccessoryImage(accessoryImageEl);
          return;
        }

        selected.position = updateAccessoryPositionClasses(
          accessoryImageEl,
          selected.fileName,
          selected.position,
        );

        const candidates = resolveAssetCandidates(selected.fileName);
        setOverlayImageWithFallback(accessoryImageEl, candidates, 0, selected.fileName);
      });
    }

    function renderPet() {
      const variant = PET_VARIANTS[state.currentIndex];
      if (!variant) return;

      const levelBadgeEl = document.getElementById("petLevelBadge");
      const previewImageEl = document.getElementById("petPreviewImage");
      const errorEl = document.getElementById("petImageError");
      const stageEl = document.getElementById("petStage");
      const levelBtn = document.getElementById("petToggleLevelBtn");

      updatePetNameTagUI();

      const levelText = state.isLevelTwo ? "Level 2" : "Level 1";
      if (levelBadgeEl) {
        levelBadgeEl.textContent = levelText;
        levelBadgeEl.style.borderColor = variant.tone;
        levelBadgeEl.style.color = variant.tone;
      }

      updatePetLevelProgressUI();

      if (stageEl) {
        stageEl.style.boxShadow = "inset 0 0 0 1px " + variant.tone + "44";
        const activeBackground =
          STAGE_BACKGROUNDS[state.selectedStageBackgroundIndex] || STAGE_BACKGROUNDS[0];
        const stageBackgroundCandidates = resolveAssetCandidates(activeBackground.fileName);
        setStageBackgroundWithFallback(stageEl, stageBackgroundCandidates, 0, activeBackground.fileName);
      }

      if (levelBtn) {
        const nextActionLabel = state.isLevelTwo
          ? "Chuyển về Level 1"
          : "Nâng lên Level 2";
        levelBtn.setAttribute("aria-label", nextActionLabel);
        levelBtn.setAttribute("title", nextActionLabel);

        const levelIconEl = document.getElementById("petToggleLevelIcon");
        if (levelIconEl) {
          levelIconEl.textContent = state.isLevelTwo ? "arrow_downward" : "arrow_upward";
        }
      }

      clearInteractionClasses();
      if (!state.isLevelTwo) {
        state.isPressing = false;
        state.pressZone = null;
      }

      const imageName = state.isLevelTwo ? variant.level2 : variant.level1;
      const candidates = resolveAssetCandidates(imageName);
      setImageWithFallback(previewImageEl, errorEl, candidates, 0, imageName);
      renderEyes();
      renderAccessory();
      playLevelTransitionAnimation();
      updateAccessoryPanelState();

      updateColorButtons(state.currentIndex);
      updateBackgroundButtons(state.selectedStageBackgroundIndex);
      updateAccessoryButtons();
      updateAccessoryPositionButtons();
    }

    function triggerBlink() {
      if (!state.isLevelTwo || state.isPressing) return;

      state.isEyesClosed = true;
      renderEyes();

      if (state.blinkTimeoutId) {
        clearTimeout(state.blinkTimeoutId);
      }

      state.blinkTimeoutId = setTimeout(function () {
        state.isEyesClosed = false;
        renderEyes();
      }, BLINK_CLOSE_DURATION_MS);
    }

    function startBlinkLoop() {
      if (state.blinkIntervalId) {
        clearInterval(state.blinkIntervalId);
      }
      if (state.blinkTimeoutId) {
        clearTimeout(state.blinkTimeoutId);
      }

      state.isEyesClosed = false;
      state.blinkIntervalId = setInterval(triggerBlink, BLINK_INTERVAL_MS);
    }

    function movePet(step) {
      const total = PET_VARIANTS.length;
      state.currentIndex = (state.currentIndex + step + total) % total;
      releasePressState();
      renderPet();
    }

    function buildColorButtons() {
      const buttonsWrap = document.getElementById("petColorButtons");
      if (!buttonsWrap) return;

      buttonsWrap.innerHTML = "";
      PET_VARIANTS.forEach((variant, index) => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pet-color-btn";
        btn.title = variant.name;
        btn.setAttribute("aria-label", variant.name);
        btn.innerHTML =
          '<span class="pet-color-dot" style="background:' +
          variant.tone +
          '"></span>';
        btn.addEventListener("click", function () {
          state.currentIndex = index;
          releasePressState();
          renderPet();
        });
        buttonsWrap.appendChild(btn);
      });
    }

    function updateBackgroundButtons(activeIndex) {
      const buttonsWrap = document.getElementById("petBackgroundButtons");
      if (!buttonsWrap) return;

      const buttons = buttonsWrap.querySelectorAll(".pet-bg-btn");
      buttons.forEach((button, index) => {
        button.classList.toggle("active", index === activeIndex);
      });
    }

    function buildBackgroundButtons() {
      const buttonsWrap = document.getElementById("petBackgroundButtons");
      if (!buttonsWrap) return;

      buttonsWrap.innerHTML = "";

      STAGE_BACKGROUNDS.forEach(function (background, index) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pet-bg-btn";
        btn.title = background.name;
        btn.setAttribute("aria-label", background.name);
        btn.textContent = background.name;
        btn.addEventListener("click", function () {
          state.selectedStageBackgroundIndex = index;
          renderPet();
        });
        buttonsWrap.appendChild(btn);
      });

      updateBackgroundButtons(state.selectedStageBackgroundIndex);
    }

    function buildAccessoryButtons() {
      const gridEl = document.getElementById("petAccessoryGrid");
      if (!gridEl) return;

      gridEl.innerHTML = "";

       const noAccessoryBtn = document.createElement("button");
       noAccessoryBtn.type = "button";
       noAccessoryBtn.className = "pet-accessory-btn no-accessory";
       noAccessoryBtn.title = "Không phụ kiện";
       noAccessoryBtn.setAttribute("aria-label", "Không phụ kiện");
       noAccessoryBtn.setAttribute("data-file", NO_ACCESSORY_VALUE);

       const noAccessoryIcon = document.createElement("span");
       noAccessoryIcon.className = "material-symbols-sharp pet-accessory-empty-icon";
       noAccessoryIcon.setAttribute("aria-hidden", "true");
       noAccessoryIcon.textContent = "block";

       noAccessoryBtn.appendChild(noAccessoryIcon);
       noAccessoryBtn.addEventListener("click", function () {
         if (!state.isLevelTwo) return;

         state.selectedAccessories = [];
         state.selectedAccessory = NO_ACCESSORY_VALUE;
         state.accessoryPosition = "center";
         renderAccessory();
         updateAccessoryButtons();
         updateAccessoryPositionButtons();
       });
       gridEl.appendChild(noAccessoryBtn);

      ACCESSORY_FILES.forEach(function (fileName, index) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pet-accessory-btn";
        btn.title = "PK " + (index + 1);
        btn.setAttribute("aria-label", "Phụ kiện " + (index + 1));
        btn.setAttribute("data-file", fileName);

        const thumb = document.createElement("img");
        thumb.className = "pet-accessory-thumb";
        thumb.alt = "PK " + (index + 1);
        thumb.loading = "lazy";
        thumb.src = getAccessoryPreviewSrc(fileName);
        thumb.onerror = function () {
          thumb.style.visibility = "hidden";
        };

        btn.appendChild(thumb);
        btn.addEventListener("click", function () {
          if (!state.isLevelTwo) return;

          const selectedIndex = getSelectedAccessoryIndex(fileName);
          if (selectedIndex >= 0) {
            if (state.selectedAccessory !== fileName) {
              const selected = state.selectedAccessories[selectedIndex];
              state.selectedAccessory = fileName;
              state.accessoryPosition = selected.position;
            } else {
              state.selectedAccessories.splice(selectedIndex, 1);
              const fallbackSelected =
                state.selectedAccessories[selectedIndex] ||
                state.selectedAccessories[selectedIndex - 1] ||
                null;
              state.selectedAccessory = fallbackSelected ? fallbackSelected.fileName : "";
              if (fallbackSelected) {
                state.accessoryPosition = fallbackSelected.position;
              }
            }

            renderAccessory();
            updateAccessoryButtons();
            updateAccessoryPositionButtons();
            return;
          }

          if (state.selectedAccessories.length >= MAX_ACCESSORIES_PER_PET) {
            if (typeof showToast === "function") {
              showToast("Mỗi pet chỉ gắn tối đa 3 phụ kiện");
            }
            return;
          }

          const finalPosition = resolveAccessoryPosition(fileName, state.accessoryPosition);
          state.selectedAccessories.push({
            fileName: fileName,
            position: finalPosition,
          });
          state.selectedAccessory = fileName;
          state.accessoryPosition = finalPosition;

          renderAccessory();
          updateAccessoryButtons();
          updateAccessoryPositionButtons();
        });
        gridEl.appendChild(btn);
      });
    }

    function bindAccessoryControls() {
      const positionContainer = document.getElementById("petAccessoryPosition");
      if (!positionContainer) return;

      positionContainer.addEventListener("click", function (event) {
        if (!state.isLevelTwo) return;

        const target = event.target.closest(".pet-pill-btn[data-pos]");
        if (!target) return;

        const pos = target.getAttribute("data-pos") || "";
        if (!pos) return;


        const activeAccessory = resolveActiveAccessory();
        const allowed = getAllowedAccessoryPositions(
          activeAccessory ? activeAccessory.fileName : "",
        );
        if (allowed.indexOf(pos) < 0) return;

        if (activeAccessory) {
          const finalPosition = resolveAccessoryPosition(activeAccessory.fileName, pos);
          activeAccessory.position = finalPosition;
          state.accessoryPosition = finalPosition;
        } else {
          state.accessoryPosition = pos;
        }

        updateAccessoryPositionButtons();
        renderAccessory();
      });
    }

    function bindStageInteractions() {
      const stageEl = document.getElementById("petStage");
      if (!stageEl) return;

      stageEl.addEventListener("mousemove", function (event) {
        if (state.isLevelTwo || state.isPressing) return;
        applyLevel1TiltByPointer(event.clientX);
      });

      stageEl.addEventListener("mouseleave", function () {
        if (!state.isLevelTwo) clearInteractionClasses();
      });

      stageEl.addEventListener("mousedown", function (event) {
        if (!state.isLevelTwo) return;

        const zone = resolvePressZone(event.clientX);
        state.isPressing = true;
        state.pressZone = zone;

        clearInteractionClasses();
        applyPressShape(zone);
        renderEyes();

        event.preventDefault();
      });

      document.addEventListener("mouseup", releasePressState);
    }

    function bindControls() {
      const prevBtn = document.getElementById("petPrevBtn");
      const nextBtn = document.getElementById("petNextBtn");
      const toggleLevelBtn = document.getElementById("petToggleLevelBtn");

      if (prevBtn) {
        prevBtn.addEventListener("click", function () {
          movePet(-1);
        });
      }

      if (nextBtn) {
        nextBtn.addEventListener("click", function () {
          movePet(1);
        });
      }

      if (toggleLevelBtn) {
        toggleLevelBtn.addEventListener("click", function () {
          releasePressState();
          state.isLevelTwo = !state.isLevelTwo;
          state.isEyesClosed = false;
          renderPet();
        });
      }
    }

    function startPetHeaderMeteors() {
      const container = document.getElementById("petMeteorContainer");
      if (!container) return;

      if (petMeteorInterval) {
        clearInterval(petMeteorInterval);
      }

      petMeteorInterval = setInterval(function () {
        if (!document.getElementById("petMeteorContainer")) {
          clearInterval(petMeteorInterval);
          return;
        }
        createPetMeteor();
      }, 800);

      createPetMeteor();
    }

    function createPetMeteor() {
      const container = document.getElementById("petMeteorContainer");
      if (!container) return;

      const meteor = document.createElement("div");
      meteor.className = "pet-header-meteor";

      const startX = Math.random() * 40;
      const startY = Math.random() * 20;
      meteor.style.left = startX + "%";
      meteor.style.top = startY + "%";

      const height = 35 + Math.random() * 35;
      meteor.style.height = height + "px";
      meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

      container.appendChild(meteor);

      setTimeout(function () {
        meteor.remove();
      }, 1500);
    }

    function setupPetHeaderMouseEffect() {
      if (petHeaderMouseEffectBound) return;

      const header = document.querySelector("#page-pet .pet-page-header");
      const stars = document.getElementById("petHeaderStars");
      if (!header || !stars) return;

      header.addEventListener("mousemove", function (e) {
        const rect = header.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        stars.style.transform = "translate(" + x * 15 + "px, " + y * 15 + "px)";
      });

      header.addEventListener("mouseleave", function () {
        stars.style.transform = "translate(0, 0)";
      });

      petHeaderMouseEffectBound = true;
    }

    function initPetPage() {
      if (!state.initialized) {
        loadResolvedAssetUrlsFromLocalCache();
        loadDriveAssetUrlsFromLocalCache();
        bindPetNameEditor();
        bindControls();
        bindStageInteractions();
        buildColorButtons();
        buildBackgroundButtons();
        buildAccessoryButtons();
        bindAccessoryControls();
        bindSettingsPanelToggle();
        bindBackgroundPanelToggle();
        bindPanelControlsDropdown();
        startBlinkLoop();
        updatePanelControlsDropdownVisibility();
        updateSettingsPanelVisibility();
        updateBackgroundPanelVisibility();
        updateAccessoryPanelVisibility();
        state.initialized = true;
      }
      loadPetAssetUrlsFromDrive();
      startPetHeaderMeteors();
      setupPetHeaderMouseEffect();
      loadPetNameFromServer();
      renderPet();
    }

    window.initPetPage = initPetPage;
  })();
</script>
