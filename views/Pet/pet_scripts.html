<script>
  (function () {
    "use strict";

    const DEFAULT_STATE = {
      xp: 0,
      coins: 120,
      level: {
        current: 1,
        progress: 0,
      },
      status: {
        energy: 78,
        hunger: 65,
        mood: 82,
        clean: 74,
      },
      requirements: {
        learn: 0,
        quiz: 0,
        matching: 0,
        target: 3,
      },
    };
    const PET_STATE_STORAGE_KEY = "oq_pet_preview_state";
    const PET_NAME_STORAGE_KEY = "oq_pet_preview_name";
    const PET_XP_COIN_DAILY_SYNC_KEY = "oq_pet_xp_coin_daily_sync";
    const PET_FOOD_USER_CACHE_KEY = "oq_pet_food_user_cache";
    const DEFAULT_PET_NAME = "Bé Gà";
    const FALLBACK_FOODS = [
      {
        id: "food_corn",
        name: "Bap ngot",
        icon: "🌽",
        priceXqp: 40,
        xpGain: 12,
        unlockType: "lesson_topic",
        unlockValue: "topic_01",
        starter: true,
      },
      {
        id: "food_carrot",
        name: "Ca rot gion",
        icon: "🥕",
        priceXqp: 55,
        xpGain: 10,
        unlockType: "quiz_topic",
        unlockValue: "topic_02",
        starter: false,
      },
    ];

    let petGlobalEscBound = false;
    let eggHoverRafId = 0;
    let eggHoverRatioX = 0;
    let petModalMode = "food";
    let petModalTab = "owned";
    let petFoodState = {
      foods: FALLBACK_FOODS.slice(),
      accessories: [],
      ownedFoodIds: FALLBACK_FOODS.filter((f) => f.starter).map((f) => f.id),
      ownedAccessoryIds: [],
      loaded: false,
    };

    function clamp(value, min, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return min;
      return Math.min(max, Math.max(min, number));
    }

    function notify(message, type) {
      if (typeof window.showToast === "function") {
        window.showToast(message, type || "info");
      } else {
        console.log("Pet notice:", message);
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getUnlockLabel(item) {
      const type = String(item?.unlockType || "none");
      const value = String(item?.unlockValue || "").trim();
      if (type === "none") return "Khong yeu cau unlock";
      if (!value) return type;
      return `${type}: ${value}`;
    }

    function loadCachedPetFoodState() {
      try {
        const raw = localStorage.getItem(PET_FOOD_USER_CACHE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return;

        const foods = Array.isArray(parsed.foods) ? parsed.foods : FALLBACK_FOODS.slice();
        const accessories = Array.isArray(parsed.accessories) ? parsed.accessories : [];
        const ownedFoodIds = Array.isArray(parsed.ownedFoodIds)
          ? parsed.ownedFoodIds.map(String)
          : foods.filter((f) => f && f.starter).map((f) => String(f.id));
        const ownedAccessoryIds = Array.isArray(parsed.ownedAccessoryIds)
          ? parsed.ownedAccessoryIds.map(String)
          : [];

        petFoodState = {
          foods,
          accessories,
          ownedFoodIds,
          ownedAccessoryIds,
          loaded: !!parsed.loaded,
        };
      } catch (error) {
        console.warn("Pet food cache parse failed:", error);
      }
    }

    function saveCachedPetFoodState() {
      try {
        localStorage.setItem(PET_FOOD_USER_CACHE_KEY, JSON.stringify(petFoodState));
      } catch (error) {
        console.warn("Pet food cache save failed:", error);
      }
    }

    function loadPetPreviewState() {
      try {
        const raw = localStorage.getItem(PET_STATE_STORAGE_KEY);
        if (!raw) return DEFAULT_STATE;

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") {
          return DEFAULT_STATE;
        }

        return {
          xp: clamp(parsed.xp, 0, 999999),
          coins: clamp(parsed.coins, 0, 999999),
          level: {
            current: Math.max(1, Math.floor(clamp(parsed.level?.current, 1, 9999))),
            progress: clamp(
              parsed.level?.progress != null ? parsed.level.progress : parsed.status?.energy,
              0,
              100,
            ),
          },
          status: {
            energy: clamp(parsed.status?.energy, 0, 100),
            hunger: clamp(parsed.status?.hunger, 0, 100),
            mood: clamp(parsed.status?.mood, 0, 100),
            clean: clamp(parsed.status?.clean, 0, 100),
          },
          requirements: {
            target: clamp(parsed.requirements?.target, 1, 10),
            learn: clamp(parsed.requirements?.learn, 0, 10),
            quiz: clamp(parsed.requirements?.quiz, 0, 10),
            matching: clamp(parsed.requirements?.matching, 0, 10),
          },
        };
      } catch (error) {
        console.warn("Pet state parse failed, using defaults:", error);
        return DEFAULT_STATE;
      }
    }

    function savePetPreviewState(state) {
      try {
        const safeState = {
          xp: clamp(state?.xp, 0, 999999),
          coins: clamp(state?.coins, 0, 999999),
          level: {
            current: Math.max(1, Math.floor(clamp(state?.level?.current, 1, 9999))),
            progress: clamp(state?.level?.progress, 0, 100),
          },
          status: {
            energy: clamp(state?.status?.energy, 0, 100),
            hunger: clamp(state?.status?.hunger, 0, 100),
            mood: clamp(state?.status?.mood, 0, 100),
            clean: clamp(state?.status?.clean, 0, 100),
          },
          requirements: {
            target: clamp(state?.requirements?.target, 1, 10),
            learn: clamp(state?.requirements?.learn, 0, 10),
            quiz: clamp(state?.requirements?.quiz, 0, 10),
            matching: clamp(state?.requirements?.matching, 0, 10),
          },
        };

        localStorage.setItem(PET_STATE_STORAGE_KEY, JSON.stringify(safeState));
      } catch (error) {
        console.warn("Pet state save failed:", error);
      }
    }

    function ensureLevelState(state) {
      if (!state.level || typeof state.level !== "object") {
        state.level = {
          current: 1,
          progress: clamp(state?.status?.energy, 0, 100),
        };
      }

      state.level.current = Math.max(1, Math.floor(clamp(state.level.current, 1, 9999)));
      state.level.progress = clamp(state.level.progress, 0, 100);
    }

    function renderLevelStatus(levelState) {
      const current = Math.max(1, Math.floor(clamp(levelState?.current, 1, 9999)));
      const progress = Math.round(clamp(levelState?.progress, 0, 100));

      setText("petLevelValue", `Level ${current}`);
      setText("petLevelPointsText", `${progress} / 100`);
      setProgressBar("petLevelProgress", progress);
    }

    function gainPetLevelProgress(state, amount) {
      ensureLevelState(state);

      let progress = clamp(state.level.progress, 0, 100) + Math.max(0, Number(amount) || 0);
      let levelUpCount = 0;

      while (progress >= 100) {
        progress -= 100;
        state.level.current += 1;
        levelUpCount += 1;
      }

      state.level.progress = clamp(progress, 0, 100);
      renderLevelStatus(state.level);
      savePetPreviewState(state);

      return {
        levelUpCount,
        currentLevel: state.level.current,
        currentProgress: Math.round(state.level.progress),
      };
    }

    function getTodayVNKey() {
      try {
        return new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Ho_Chi_Minh",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(new Date());
      } catch (error) {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        const d = String(now.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }
    }

    function loadDailySyncInfo() {
      try {
        const raw = localStorage.getItem(PET_XP_COIN_DAILY_SYNC_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;

        return {
          date: String(parsed.date || ""),
          lastXP: clamp(parsed.lastXP, 0, 999999),
        };
      } catch (error) {
        console.warn("Pet daily sync parse failed:", error);
        return null;
      }
    }

    function saveDailySyncInfo(sync) {
      try {
        const safeSync = {
          date: String(sync?.date || ""),
          lastXP: clamp(sync?.lastXP, 0, 999999),
        };
        localStorage.setItem(PET_XP_COIN_DAILY_SYNC_KEY, JSON.stringify(safeSync));
      } catch (error) {
        console.warn("Pet daily sync save failed:", error);
      }
    }

    function syncDailyCoinsFromXP(state, currentTotalXP) {
      const today = getTodayVNKey();
      const sync = loadDailySyncInfo();
      const currentXP = clamp(currentTotalXP, 0, 999999);

      if (!sync) {
        state.xp = currentXP;
        saveDailySyncInfo({ date: today, lastXP: currentXP });
        savePetPreviewState(state);
        return 0;
      }

      if (sync.date !== today) {
        const carryDelta = Math.max(0, currentXP - clamp(sync.lastXP, 0, 999999));
        if (carryDelta > 0) {
          state.coins = clamp(state.coins + carryDelta, 0, 999999);
        }

        state.xp = currentXP;
        saveDailySyncInfo({ date: today, lastXP: currentXP });
        savePetPreviewState(state);
        return carryDelta;
      }

      const deltaXP = Math.max(0, currentXP - clamp(sync.lastXP, 0, 999999));

      if (deltaXP > 0) {
        // Rule: XP tăng bao nhiêu trong ngày thì XQP tăng bấy nhiêu.
        // XP và XQP là 2 luồng độc lập, chỉ cộng XQP từ phần XP tăng.
        state.coins = clamp(state.coins + deltaXP, 0, 999999);
      }

      state.xp = currentXP;
      saveDailySyncInfo({ date: today, lastXP: currentXP });
      savePetPreviewState(state);
      return deltaXP;
    }

    function buildHatchTracker(requirements) {
      const target = Math.max(1, Number(requirements?.target) || 3);
      const learn = clamp(requirements?.learn, 0, target);
      const quiz = clamp(requirements?.quiz, 0, target);
      const matching = clamp(requirements?.matching, 0, target);
      const total = learn + quiz + matching;
      const max = target * 3;
      const percent = Math.round((total / max) * 100);

      return {
        target,
        learn,
        quiz,
        matching,
        percent,
        isReady: learn >= target && quiz >= target && matching >= target,
      };
    }

    function normalizePetName(value, fallback) {
      const safeFallback = String(fallback || DEFAULT_PET_NAME).trim() || DEFAULT_PET_NAME;
      const normalized = String(value || "")
        .trim()
        .replace(/\s+/g, " ");

      return normalized || safeFallback;
    }

    function loadPetName(fallbackName) {
      try {
        const raw = localStorage.getItem(PET_NAME_STORAGE_KEY);
        if (!raw || typeof raw !== "string") {
          return normalizePetName("", fallbackName || DEFAULT_PET_NAME);
        }

        return normalizePetName(raw, fallbackName || DEFAULT_PET_NAME);
      } catch (error) {
        console.warn("Pet name parse failed, using default:", error);
        return normalizePetName("", fallbackName || DEFAULT_PET_NAME);
      }
    }

    function savePetName(name) {
      try {
        const safeName = normalizePetName(name, DEFAULT_PET_NAME);
        localStorage.setItem(PET_NAME_STORAGE_KEY, safeName);

        if (typeof google !== "undefined" && google.script && google.script.run) {
          google.script.run
            .withFailureHandler(function (error) {
              console.warn("Sync pet name to backend failed:", error);
            })
            .updateCurrentUserPetName(safeName);
        }
      } catch (error) {
        console.warn("Pet name save failed:", error);
      }
    }

    function applySnapshotToLocal(snapshotData) {
      if (!snapshotData || typeof snapshotData !== "object") return;

      const state = loadPetPreviewState();
      ensureLevelState(state);

      const serverState = snapshotData.petState || {};
      state.coins = clamp(serverState.coins, 0, 999999);
      state.level.current = Math.max(1, parseInt(serverState.levelCurrent, 10) || 1);
      state.level.progress = clamp(serverState.levelProgress, 0, 100);

      const req = serverState.requirements || {};
      state.requirements = {
        target: clamp(req.target != null ? req.target : 3, 1, 10),
        learn: clamp(req.learn, 0, 10),
        quiz: clamp(req.quiz, 0, 10),
        matching: clamp(req.matching, 0, 10),
      };

      savePetPreviewState(state);

      petFoodState = {
        foods: Array.isArray(snapshotData.foods) ? snapshotData.foods : petFoodState.foods,
        accessories: Array.isArray(snapshotData.accessories) ? snapshotData.accessories : [],
        ownedFoodIds: Array.isArray(snapshotData.ownedFoodIds)
          ? snapshotData.ownedFoodIds.map(String)
          : petFoodState.ownedFoodIds,
        ownedAccessoryIds: Array.isArray(snapshotData.ownedAccessoryIds)
          ? snapshotData.ownedAccessoryIds.map(String)
          : petFoodState.ownedAccessoryIds,
        loaded: true,
      };
      saveCachedPetFoodState();

      const serverPetName = normalizePetName(snapshotData.petName, "");
      if (serverPetName) {
        localStorage.setItem(PET_NAME_STORAGE_KEY, serverPetName);
        renderPetName(serverPetName);
      }
    }

    function syncPetStateToBackend(state, petName) {
      if (typeof google === "undefined" || !google.script || !google.script.run) {
        return;
      }

      google.script.run
        .withFailureHandler(function (error) {
          console.warn("Sync pet state failed:", error);
        })
        .syncCurrentUserPetState({
          petName: normalizePetName(petName, DEFAULT_PET_NAME),
          coins: clamp(state?.coins, 0, 999999),
          levelCurrent: Math.max(1, parseInt(state?.level?.current, 10) || 1),
          levelProgress: clamp(state?.level?.progress, 0, 100),
        });
    }

    function renderPetName(name) {
      const safeName = normalizePetName(name, DEFAULT_PET_NAME);
      setText("petDisplayName", safeName);

      const nameTag = document.getElementById("petNameTag");
      if (!nameTag) return;

      nameTag.setAttribute("aria-label", `Tên pet: ${safeName}. Bấm để đổi tên pet`);
      nameTag.setAttribute("title", "Bấm để đổi tên pet");
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function setProgressBar(id, percent) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.width = `${clamp(percent, 0, 100)}%`;
    }

    function setupPetNameEditor() {
      const nameTag = document.getElementById("petNameTag");
      if (!nameTag) {
        return;
      }

      const currentName = document.getElementById("petDisplayName")?.textContent || DEFAULT_PET_NAME;
      renderPetName(currentName);

      if (nameTag.dataset.nameBound === "1") {
        return;
      }
      nameTag.dataset.nameBound = "1";

      nameTag.addEventListener("click", function () {
        openPetRenameModal();
      });
    }

    function normalizePetModalMode(mode) {
      return String(mode || "food") === "accessory" ? "accessory" : "food";
    }

    function setPetModalMode(mode) {
      petModalMode = normalizePetModalMode(mode);
      petModalTab = "owned";
      renderPetFoodModal();
    }

    function renderPetFoodModal() {
      const modePill = document.getElementById("petFoodModePill");
      const sectionTitle = document.getElementById("petFoodSectionTitle");
      const sectionDesc = document.getElementById("petFoodSectionDesc");
      const listEl = document.getElementById("petFoodActiveList");
      const modeFoodBtn = document.getElementById("petModeFoodBtn");
      const modeAccessoryBtn = document.getElementById("petModeAccessoryBtn");
      const tabOwned = document.getElementById("petTabOwned");
      const tabShop = document.getElementById("petTabShop");
      if (!modePill || !sectionTitle || !sectionDesc || !listEl || !modeFoodBtn || !modeAccessoryBtn || !tabOwned || !tabShop) {
        return;
      }

      const foods = Array.isArray(petFoodState.foods) ? petFoodState.foods : [];
      const accessories = Array.isArray(petFoodState.accessories) ? petFoodState.accessories : [];
      const ownedSet = new Set((petFoodState.ownedFoodIds || []).map(String));
      const ownedAccessorySet = new Set((petFoodState.ownedAccessoryIds || []).map(String));

      const isFoodMode = petModalMode === "food";
      modePill.textContent = isFoodMode ? "Quản lý thức ăn" : "Quản lý phụ kiện";

      modeFoodBtn.classList.toggle("active", isFoodMode);
      modeFoodBtn.setAttribute("aria-selected", isFoodMode ? "true" : "false");
      modeAccessoryBtn.classList.toggle("active", !isFoodMode);
      modeAccessoryBtn.setAttribute("aria-selected", !isFoodMode ? "true" : "false");

      [tabOwned, tabShop].forEach(function (tabBtn) {
        const tabValue = tabBtn.getAttribute("data-pet-tab") || "owned";
        const active = tabValue === petModalTab;
        tabBtn.classList.toggle("active", active);
        tabBtn.setAttribute("aria-selected", active ? "true" : "false");
      });

      tabOwned.textContent = isFoodMode ? "Kho thức ăn" : "Phụ kiện đã sở hữu";
      tabShop.textContent = isFoodMode ? "Cửa hàng thức ăn" : "Cửa hàng phụ kiện";

      if (isFoodMode) {
        if (petModalTab === "owned") {
          sectionTitle.textContent = "Kho của tôi";
          sectionDesc.textContent = "Nhấn vào icon thức ăn đã mua để tăng thanh level pet.";
          const ownedFoods = foods.filter((food) => ownedSet.has(String(food.id)));
          if (ownedFoods.length === 0) {
            listEl.innerHTML = '<div class="pet-food-empty">Bạn chưa có thức ăn nào trong kho.</div>';
          } else {
            listEl.innerHTML = ownedFoods
              .map(function (food) {
                return (
                  '<button class="pet-food-icon-card" type="button" data-pet-eat-food-id="' +
                  escapeHtml(food.id) +
                  '">' +
                  '<span class="pet-food-main-icon">' +
                  escapeHtml(food.icon || "🍽️") +
                  '</span>' +
                  '<span class="pet-food-inline-meta">' +
                  escapeHtml(food.name || "Food") +
                  ' | +' +
                  Number(food.xpGain || 0) +
                  ' XP level</span>' +
                  '</button>'
                );
              })
              .join("");
          }
        } else {
          sectionTitle.textContent = "Cửa hàng thức ăn";
          sectionDesc.textContent = "Mua thức ăn bằng XQP. Hệ thống tự kiểm tra điều kiện unlock.";
          if (foods.length === 0) {
            listEl.innerHTML = '<div class="pet-food-empty">Chưa có thức ăn trong cửa hàng.</div>';
          } else {
            listEl.innerHTML = foods
              .map(function (food) {
                const isUnlocked = food.unlocked !== false;
                const canBuy = isUnlocked;
                const unlockLabel = getUnlockLabel(food);
                return (
                  '<div class="pet-food-icon-card ' +
                  (isUnlocked ? "" : "disabled") +
                  '" role="button" tabindex="0" aria-label="' +
                  escapeHtml(food.name || "Food") +
                  '">' +
                  '<span class="pet-food-main-icon">' +
                  escapeHtml(food.icon || "🍽️") +
                  '</span>' +
                  '<span class="pet-food-inline-meta">' +
                  escapeHtml(food.name || "Food") +
                  ' | +' +
                  Number(food.xpGain || 0) +
                  ' XP | ' +
                  Number(food.priceXqp || 0) +
                  ' XQP</span>' +
                  '<span class="pet-food-info">' +
                  escapeHtml(food.unlockReason || unlockLabel) +
                  '</span>' +
                  '<button class="pet-food-buy-btn" type="button" data-pet-buy-food-id="' +
                  escapeHtml(food.id) +
                  '" ' +
                  (canBuy ? "" : "disabled") +
                  '>Mua</button>' +
                  '</div>'
                );
              })
              .join("");
          }
        }
        return;
      }

      if (petModalTab === "owned") {
        sectionTitle.textContent = "Phụ kiện đã sở hữu";
        sectionDesc.textContent = "Danh sách phụ kiện bạn đã có.";
        const ownedAccessories = accessories.filter((acc) => ownedAccessorySet.has(String(acc.id)));
        if (ownedAccessories.length === 0) {
          listEl.innerHTML = '<div class="pet-food-empty">Bạn chưa sở hữu phụ kiện nào.</div>';
        } else {
          listEl.innerHTML = ownedAccessories
            .map(function (acc) {
              return (
                '<div class="pet-food-icon-card" role="img" aria-label="' +
                escapeHtml(acc.name || "Accessory") +
                '">' +
                '<span class="pet-food-main-icon">' +
                escapeHtml(acc.icon || "🎒") +
                '</span>' +
                '<span class="pet-food-inline-meta">' +
                escapeHtml(acc.name || "Accessory") +
                ' | Đã sở hữu</span>' +
                '</div>'
              );
            })
            .join("");
        }
      } else {
        sectionTitle.textContent = "Cửa hàng phụ kiện";
        sectionDesc.textContent = "Danh sách phụ kiện theo điều kiện mở khóa.";
        if (accessories.length === 0) {
          listEl.innerHTML = '<div class="pet-food-empty">Chưa có phụ kiện trong cửa hàng.</div>';
        } else {
          listEl.innerHTML = accessories
            .map(function (acc) {
              const isOwned = ownedAccessorySet.has(String(acc.id));
              const isUnlocked = acc.unlocked !== false;
              const unlockLabel = getUnlockLabel(acc);
              return (
                '<div class="pet-food-icon-card ' +
                (isUnlocked ? "" : "disabled") +
                '" role="img" aria-label="' +
                escapeHtml(acc.name || "Accessory") +
                '">' +
                '<span class="pet-food-main-icon">' +
                escapeHtml(acc.icon || "🎒") +
                '</span>' +
                '<span class="pet-food-inline-meta">' +
                escapeHtml(acc.name || "Accessory") +
                ' | ' +
                Number(acc.priceXqp || 0) +
                ' XQP</span>' +
                '<span class="pet-food-info">' +
                escapeHtml(acc.unlockReason || unlockLabel) +
                '</span>' +
                '<button class="pet-food-buy-btn" type="button" disabled>' +
                (isOwned ? "Đã có" : isUnlocked ? "Sắp mở" : "Khoá") +
                '</button>' +
                '</div>'
              );
            })
            .join("");
        }
      }
    }

    function consumeOwnedFood(foodId) {
      if (!foodId) return;

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        notify("Khong the ket noi server de xu ly cho an.", "warning");
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || !result.success || !result.data) {
            notify((result && result.message) || "Khong the cho pet an.", "error");
            return;
          }

          applySnapshotToLocal(result.data);
          const state = loadPetPreviewState();
          ensureLevelState(state);
          setText("petCoinValue", String(Math.round(state.coins)));
          renderLevelStatus(state.level);
          renderPetFoodModal();
          notify(result.message || "Pet da an xong", "success");
        })
        .withFailureHandler(function (error) {
          notify("Loi cho an: " + error, "error");
        })
        .consumePetFoodForUser(String(foodId));
    }

    function buyFoodForPet(foodId) {
      if (!foodId) return;

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        notify("Khong the ket noi server de mua thuc an.", "warning");
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || !result.success || !result.data) {
            notify((result && result.message) || "Mua that bai", "error");
            return;
          }

          applySnapshotToLocal(result.data);
          const state = loadPetPreviewState();
          ensureLevelState(state);
          setText("petCoinValue", String(Math.round(state.coins)));
          renderPetFoodModal();
          notify(result.message || "Mua thanh cong", "success");
        })
        .withFailureHandler(function (error) {
          notify("Loi mua thuc an: " + error, "error");
        })
        .purchasePetFoodForUser(String(foodId));
    }

    function setFoodModalOpen(isOpen, mode) {
      const modal = document.getElementById("petFoodModal");
      if (!modal) return;

      if (mode) {
        setPetModalMode(mode);
      }

      modal.classList.toggle("open", !!isOpen);
      modal.setAttribute("aria-hidden", isOpen ? "false" : "true");
      refreshBodyModalLock();

      if (isOpen) {
        renderPetFoodModal();
      }
    }

    function openPetFoodModal(mode) {
      setFoodModalOpen(true, mode || "food");
    }

    function closePetFoodModal() {
      setFoodModalOpen(false);
    }

    function fetchPetFoodDataForUser() {
      if (typeof google === "undefined" || !google.script || !google.script.run) {
        petFoodState.loaded = true;
        saveCachedPetFoodState();
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || !result.success || !result.data) {
            petFoodState.loaded = true;
            saveCachedPetFoodState();
            return;
          }

          applySnapshotToLocal(result.data);
          renderPetFoodModal();
        })
        .withFailureHandler(function (error) {
          console.warn("Failed to load pet foods:", error);
          petFoodState.loaded = true;
          saveCachedPetFoodState();
        })
        .getPetFoodCatalogForUser();
    }

    function setupPetFoodModal() {
      loadCachedPetFoodState();

      const modal = document.getElementById("petFoodModal");
      const closeBtn = document.getElementById("petFoodModalClose");
      if (!modal || !closeBtn || modal.dataset.modalBound === "1") {
        fetchPetFoodDataForUser();
        return;
      }

      modal.dataset.modalBound = "1";

      closeBtn.addEventListener("click", closePetFoodModal);

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          closePetFoodModal();
          return;
        }

        const tabBtn = event.target.closest("[data-pet-tab]");
        if (tabBtn) {
          petModalTab = tabBtn.getAttribute("data-pet-tab") === "shop" ? "shop" : "owned";
          renderPetFoodModal();
          return;
        }

        const modeBtn = event.target.closest("[data-pet-mode]");
        if (modeBtn) {
          setPetModalMode(modeBtn.getAttribute("data-pet-mode"));
          return;
        }

        const eatBtn = event.target.closest("[data-pet-eat-food-id]");
        if (eatBtn) {
          consumeOwnedFood(eatBtn.getAttribute("data-pet-eat-food-id"));
          return;
        }

        const buyBtn = event.target.closest("[data-pet-buy-food-id]");
        if (buyBtn && !buyBtn.disabled) {
          buyFoodForPet(buyBtn.getAttribute("data-pet-buy-food-id"));
        }
      });

      fetchPetFoodDataForUser();
      renderPetFoodModal();
    }

    function setupEggHoverTilt() {
      const egg = document.querySelector(".pet-egg");
      if (!egg || egg.dataset.tiltBound === "1") {
        return;
      }
      egg.dataset.tiltBound = "1";

      function stopEggHoverAnimation() {
        if (eggHoverRafId) {
          cancelAnimationFrame(eggHoverRafId);
          eggHoverRafId = 0;
        }
      }

      function runEggHoverAnimation() {
        const baseTilt = clamp(-eggHoverRatioX * 20, -14, 14);
        const wobbleTilt = Math.sin(Date.now() / 90) * 2.4;
        const finalTilt = baseTilt + wobbleTilt;
        egg.style.setProperty("--pet-egg-tilt", `${finalTilt.toFixed(2)}deg`);
        eggHoverRafId = requestAnimationFrame(runEggHoverAnimation);
      }

      egg.addEventListener("mouseenter", function () {
        if (!eggHoverRafId) {
          runEggHoverAnimation();
        }
      });

      egg.addEventListener("mousemove", function (event) {
        const rect = egg.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        eggHoverRatioX = clamp(x - 0.5, -0.5, 0.5);
      });

      egg.addEventListener("mouseleave", function () {
        eggHoverRatioX = 0;
        stopEggHoverAnimation();
        egg.style.setProperty("--pet-egg-tilt", "0deg");
      });

      egg.addEventListener("click", function () {
        const state = loadPetPreviewState();
        const tracker = buildHatchTracker(state.requirements);
        const hatchMessage = tracker.isReady
          ? `Trung da du dieu kien no! Hoc ${tracker.learn}/${tracker.target}, Quiz ${tracker.quiz}/${tracker.target}, Matching ${tracker.matching}/${tracker.target}.`
          : `Trung se no khi dat dieu kien: hoc xong ${tracker.target} topic, hoan thanh ${tracker.target} quiz va ${tracker.target} matching. Hien tai: Hoc ${tracker.learn}/${tracker.target}, Quiz ${tracker.quiz}/${tracker.target}, Matching ${tracker.matching}/${tracker.target} (${tracker.percent}%).`;

        notify(hatchMessage, tracker.isReady ? "success" : "info");
      });
    }

    function setRenameHint(message, isError) {
      const hintEl = document.getElementById("petRenameHint");
      if (!hintEl) return;

      hintEl.textContent = message || "";
      hintEl.classList.toggle("error", !!isError);
    }

    function refreshBodyModalLock() {
      const renameOpen =
        document.getElementById("petRenameModal")?.getAttribute("aria-hidden") === "false";
      const foodOpen =
        document.getElementById("petFoodModal")?.getAttribute("aria-hidden") === "false";

      document.body.classList.toggle("pet-modal-open", renameOpen || foodOpen);
    }

    function setRenameModalOpen(isOpen) {
      const modal = document.getElementById("petRenameModal");
      if (!modal) return;

      modal.classList.toggle("open", !!isOpen);
      modal.setAttribute("aria-hidden", isOpen ? "false" : "true");
      refreshBodyModalLock();
    }

    function openPetRenameModal() {
      const input = document.getElementById("petRenameInput");
      const current = document.getElementById("petDisplayName")?.textContent || DEFAULT_PET_NAME;

      if (input) {
        input.value = normalizePetName(current, DEFAULT_PET_NAME);
      }

      setRenameHint("Tối đa 24 ký tự.", false);
      setRenameModalOpen(true);

      setTimeout(function () {
        if (!input) return;
        input.focus();
        input.select();
      }, 30);
    }

    function closePetRenameModal() {
      setRenameModalOpen(false);
    }

    function submitPetRename() {
      const input = document.getElementById("petRenameInput");
      const rawName = String(input?.value || "")
        .trim()
        .replace(/\s+/g, " ");

      if (!rawName) {
        setRenameHint("Tên pet không được để trống.", true);
        if (input) input.focus();
        return;
      }

      if (rawName.length > 24) {
        setRenameHint("Tên pet tối đa 24 ký tự.", true);
        if (input) input.focus();
        return;
      }

      const nextName = normalizePetName(rawName, DEFAULT_PET_NAME);
      renderPetName(nextName);
      savePetName(nextName);
      syncPetStateToBackend(loadPetPreviewState(), nextName);
      closePetRenameModal();
      notify("Đã đổi tên pet thành công.", "success");
    }

    function setupPetRenameModal() {
      const modal = document.getElementById("petRenameModal");
      const closeBtn = document.getElementById("petRenameModalClose");
      const cancelBtn = document.getElementById("petRenameCancelBtn");
      const saveBtn = document.getElementById("petRenameSaveBtn");
      const input = document.getElementById("petRenameInput");

      if (!modal || !closeBtn || !cancelBtn || !saveBtn || !input) {
        return;
      }

      if (modal.dataset.modalBound === "1") {
        return;
      }
      modal.dataset.modalBound = "1";

      closeBtn.addEventListener("click", closePetRenameModal);
      cancelBtn.addEventListener("click", closePetRenameModal);
      saveBtn.addEventListener("click", submitPetRename);

      input.addEventListener("input", function () {
        const value = String(input.value || "").trim().replace(/\s+/g, " ");
        if (!value) {
          setRenameHint("Tên pet không được để trống.", true);
          return;
        }
        if (value.length > 24) {
          setRenameHint("Tên pet tối đa 24 ký tự.", true);
          return;
        }
        setRenameHint(`${value.length}/24 ký tự`, false);
      });

      input.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          submitPetRename();
        }
      });

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          closePetRenameModal();
        }
      });
    }

    function setupGlobalEscHandler() {
      if (petGlobalEscBound) return;
      petGlobalEscBound = true;

      document.addEventListener("keydown", function (event) {
        if (event.key !== "Escape") return;

        const foodModal = document.getElementById("petFoodModal");
        if (foodModal && foodModal.getAttribute("aria-hidden") === "false") {
          closePetFoodModal();
          return;
        }

        const renameModal = document.getElementById("petRenameModal");
        if (renameModal && renameModal.getAttribute("aria-hidden") === "false") {
          closePetRenameModal();
        }
      });
    }

    function initPetPage() {
      document.body.classList.remove("pet-modal-open");

      const state = loadPetPreviewState();
      const user = window.currentUser || {};
      const name = user.displayName || user.username || "Người chơi";
      const totalXPFromUser = clamp(user.totalXP, 0, 999999);
      const localPetName = loadPetName(DEFAULT_PET_NAME);

      syncDailyCoinsFromXP(state, totalXPFromUser);
      ensureLevelState(state);

      const tracker = buildHatchTracker(state.requirements);

      setText("petUserName", name);
      renderPetName(localPetName);
      setText("petXpValue", String(Math.round(state.xp)));
      setText("petCoinValue", String(Math.round(state.coins)));
      renderLevelStatus(state.level);
      setText("petHungerValue", `${Math.round(state.status.hunger)}%`);
      setText("petMoodValue", `${Math.round(state.status.mood)}%`);
      setText("petCleanValue", `${Math.round(state.status.clean)}%`);

      // Keep hatch counter data in state for future hatch feature rollout.
      state.requirements = {
        target: tracker.target,
        learn: tracker.learn,
        quiz: tracker.quiz,
        matching: tracker.matching,
      };
      savePetPreviewState(state);

      if (typeof google !== "undefined" && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (result) {
            if (!result || !result.success || !result.data) {
              syncPetStateToBackend(state, localPetName);
              return;
            }

            const mergedState = loadPetPreviewState();
            ensureLevelState(mergedState);

            const server = result.data.petState || {};
            const serverLevel = Math.max(1, parseInt(server.levelCurrent, 10) || 1);
            const localLevel = Math.max(1, parseInt(mergedState.level.current, 10) || 1);
            const mergedLevel = Math.max(serverLevel, localLevel);

            let mergedProgress = clamp(server.levelProgress, 0, 100);
            if (mergedLevel === localLevel && mergedLevel === serverLevel) {
              mergedProgress = Math.max(mergedProgress, clamp(mergedState.level.progress, 0, 100));
            } else if (mergedLevel === localLevel) {
              mergedProgress = clamp(mergedState.level.progress, 0, 100);
            }

            mergedState.coins = Math.max(
              clamp(server.coins, 0, 999999),
              clamp(mergedState.coins, 0, 999999),
            );
            mergedState.level.current = mergedLevel;
            mergedState.level.progress = mergedProgress;

            const req = server.requirements || {};
            mergedState.requirements = {
              target: clamp(req.target != null ? req.target : mergedState.requirements.target, 1, 10),
              learn: clamp(req.learn, 0, 10),
              quiz: clamp(req.quiz, 0, 10),
              matching: clamp(req.matching, 0, 10),
            };

            const serverPetName = normalizePetName(result.data.petName, "");
            const finalPetName = serverPetName || localPetName;

            savePetPreviewState(mergedState);
            renderPetName(finalPetName);
            setText("petCoinValue", String(Math.round(mergedState.coins)));
            renderLevelStatus(mergedState.level);

            applySnapshotToLocal(
              Object.assign({}, result.data, {
                petState: {
                  coins: mergedState.coins,
                  levelCurrent: mergedState.level.current,
                  levelProgress: mergedState.level.progress,
                  requirements: mergedState.requirements,
                },
                petName: finalPetName,
              }),
            );

            syncPetStateToBackend(mergedState, finalPetName);
          })
          .withFailureHandler(function () {
            syncPetStateToBackend(state, localPetName);
          })
          .getPetFoodCatalogForUser();
      }

      setupPetNameEditor();
      setupEggHoverTilt();
    }

    function setupPetActions() {
      const actions = document.querySelectorAll("[data-pet-action]");

      actions.forEach((button) => {
        if (button.dataset.petActionBound === "1") {
          return;
        }
        button.dataset.petActionBound = "1";

        button.addEventListener("click", function () {
          const action = button.getAttribute("data-pet-action");

          if (action === "feed") {
            openPetFoodModal("food");
            return;
          }

          if (action === "shop") {
            openPetFoodModal("accessory");
            return;
          }

          notify("Đã nhận thao tác mua vật phẩm (chế độ xem trước).", "success");
        });
      });
    }

    window.initPetPage = initPetPage;

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        setupPetActions();
        setupPetRenameModal();
        setupPetFoodModal();
        setupGlobalEscHandler();
        initPetPage();
      });
    } else {
      setTimeout(function () {
        setupPetActions();
        setupPetRenameModal();
        setupPetFoodModal();
        setupGlobalEscHandler();
        initPetPage();
      }, 80);
    }
  })();
</script>
