<script>
  (function () {
    "use strict";

    const DEFAULT_PET_NAME = "gà con";

    const DEFAULT_STATE = {
      xp: 0,
      coins: 120,
      status: {
        energy: 78,
        hunger: 65,
        mood: 82,
        clean: 74,
      },
      requirements: {
        learn: 0,
        quiz: 0,
        matching: 0,
        target: 3,
      },
    };

    let hatchModalEscBound = false;

    function clamp(value, min, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return min;
      return Math.min(max, Math.max(min, number));
    }

    function notify(message, type) {
      if (typeof window.showToast === "function") {
        window.showToast(message, type || "info");
      } else {
        console.log("Pet notice:", message);
      }
    }

    function loadPetName() {
      const user = window.currentUser || {};
      if (user.petName) return user.petName;
      try {
        const stored = localStorage.getItem("oq_pet_name");
        if (stored) return stored;
      } catch (e) {
        // ignore
      }
      return DEFAULT_PET_NAME;
    }

    function savePetNameLocally(name) {
      try {
        localStorage.setItem("oq_pet_name", name);
      } catch (e) {
        // ignore
      }
    }

    function setupPetNameEdit() {
      const display = document.getElementById("petNameDisplay");
      const editForm = document.getElementById("petNameEditForm");
      const input = document.getElementById("petNameInput");
      const saveBtn = document.getElementById("petNameSaveBtn");
      const cancelBtn = document.getElementById("petNameCancelBtn");

      if (!display || !editForm || !input || !saveBtn || !cancelBtn) return;
      if (display.dataset.nameBound === "1") return;
      display.dataset.nameBound = "1";

      function openEdit() {
        input.value = display.textContent || DEFAULT_PET_NAME;
        editForm.style.display = "flex";
        display.style.display = "none";
        input.focus();
      }

      function closeEdit() {
        editForm.style.display = "none";
        display.style.display = "";
      }

      function applyName(newName) {
        const trimmed = (newName || "").trim() || DEFAULT_PET_NAME;
        display.textContent = trimmed;
        savePetNameLocally(trimmed);
        const user = window.currentUser || {};
        if (user.userId && typeof google !== "undefined" && google.script) {
          google.script.run
            .withSuccessHandler(function (res) {
              if (res && res.success) {
                if (window.currentUser) window.currentUser.petName = trimmed;
                notify("Đã lưu tên thú cưng!", "success");
              } else {
                notify("Lưu tên thất bại, vui lòng thử lại.", "error");
              }
            })
            .withFailureHandler(function () {
              notify("Lỗi kết nối, tên đã được lưu cục bộ.", "warning");
            })
            .savePetName(user.userId, trimmed);
        }
        closeEdit();
      }

      display.addEventListener("click", openEdit);
      display.addEventListener("keydown", function (e) {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openEdit();
        }
      });
      saveBtn.addEventListener("click", function () {
        applyName(input.value);
      });
      cancelBtn.addEventListener("click", closeEdit);
      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter") applyName(input.value);
        if (e.key === "Escape") closeEdit();
      });
    }

    function loadPetPreviewState() {
      try {
        const raw = localStorage.getItem("oq_pet_preview_state");
        if (!raw) return DEFAULT_STATE;

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") {
          return DEFAULT_STATE;
        }

        return {
          xp: clamp(parsed.xp, 0, 999999),
          coins: clamp(parsed.coins, 0, 999999),
          status: {
            energy: clamp(parsed.status?.energy, 0, 100),
            hunger: clamp(parsed.status?.hunger, 0, 100),
            mood: clamp(parsed.status?.mood, 0, 100),
            clean: clamp(parsed.status?.clean, 0, 100),
          },
          requirements: {
            target: clamp(parsed.requirements?.target, 1, 10),
            learn: clamp(parsed.requirements?.learn, 0, 10),
            quiz: clamp(parsed.requirements?.quiz, 0, 10),
            matching: clamp(parsed.requirements?.matching, 0, 10),
          },
        };
      } catch (error) {
        console.warn("Pet state parse failed, using defaults:", error);
        return DEFAULT_STATE;
      }
    }

    function setText(id, value) {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    }

    function setProgressBar(id, percent) {
      const el = document.getElementById(id);
      if (!el) return;
      el.style.width = `${clamp(percent, 0, 100)}%`;
    }

    function calcOverallPercent(requirements) {
      const target = Math.max(1, Number(requirements.target) || 1);
      const total =
        clamp(requirements.learn, 0, target) +
        clamp(requirements.quiz, 0, target) +
        clamp(requirements.matching, 0, target);
      const maxTotal = target * 3;
      return Math.round((total / maxTotal) * 100);
    }

    function resolveStageLabel(percent) {
      if (percent >= 100) return "Sẵn sàng nở";
      if (percent >= 70) return "Trứng phát triển";
      if (percent >= 35) return "Đang ấp";
      return "Giai đoạn Trứng";
    }

    function setHatchModalOpen(isOpen) {
      const modal = document.getElementById("petHatchModal");
      if (!modal) return;

      modal.classList.toggle("open", !!isOpen);
      modal.setAttribute("aria-hidden", isOpen ? "false" : "true");
      document.body.classList.toggle("pet-modal-open", !!isOpen);
    }

    function setupHatchModal() {
      const modal = document.getElementById("petHatchModal");
      const openBtn = document.getElementById("petHatchToggleBtn");
      const closeBtn = document.getElementById("petHatchModalClose");

      if (!modal || !openBtn || !closeBtn) return;

      if (modal.dataset.modalBound === "1") {
        return;
      }
      modal.dataset.modalBound = "1";

      openBtn.addEventListener("click", function () {
        const isHidden = modal.getAttribute("aria-hidden") !== "false";
        setHatchModalOpen(isHidden);
      });

      closeBtn.addEventListener("click", function () {
        setHatchModalOpen(false);
      });

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          setHatchModalOpen(false);
        }
      });

      if (!hatchModalEscBound) {
        hatchModalEscBound = true;
        document.addEventListener("keydown", function (event) {
          if (event.key !== "Escape") return;
          const activeModal = document.getElementById("petHatchModal");
          if (!activeModal) return;
          if (activeModal.getAttribute("aria-hidden") === "false") {
            setHatchModalOpen(false);
          }
        });
      }
    }

    function initPetPage() {
      document.body.classList.remove("pet-modal-open");

      const state = loadPetPreviewState();
      const user = window.currentUser || {};
      const name = user.displayName || user.username || "Người chơi";
      const petName = loadPetName();

      const target = Math.max(1, Number(state.requirements.target) || 3);
      const learn = clamp(state.requirements.learn, 0, target);
      const quiz = clamp(state.requirements.quiz, 0, target);
      const matching = clamp(state.requirements.matching, 0, target);
      const overallPercent = calcOverallPercent({
        target: target,
        learn: learn,
        quiz: quiz,
        matching: matching,
      });
      const stageLabel = resolveStageLabel(overallPercent);

      setText("petUserName", name);
      setText("petNameDisplay", petName);
      setText("petXpValue", String(Math.round(state.xp)));
      setText("petXpValueModal", String(Math.round(state.xp)));
      setText("petCoinValue", String(Math.round(state.coins)));
      setText("petEnergyValue", `${Math.round(state.status.energy)}%`);
      setText("petHungerValue", `${Math.round(state.status.hunger)}%`);
      setText("petMoodValue", `${Math.round(state.status.mood)}%`);
      setText("petCleanValue", `${Math.round(state.status.clean)}%`);
      setText("petLearnText", `${learn} / ${target}`);
      setText("petQuizText", `${quiz} / ${target}`);
      setText("petMatchText", `${matching} / ${target}`);
      setText("petHatchProgressText", `${overallPercent}% điều kiện nở trứng`);
      setText("petStageBadge", stageLabel);
      setText("petStageBadgeModal", stageLabel);

      setProgressBar("petHatchProgress", overallPercent);
      setProgressBar("petLearnProgress", (learn / target) * 100);
      setProgressBar("petQuizProgress", (quiz / target) * 100);
      setProgressBar("petMatchProgress", (matching / target) * 100);
      setHatchModalOpen(false);
    }

    function setupPetActions() {
      const actions = document.querySelectorAll("[data-pet-action]");

      actions.forEach((button) => {
        if (button.dataset.petActionBound === "1") {
          return;
        }
        button.dataset.petActionBound = "1";

        button.addEventListener("click", function () {
          const action = button.getAttribute("data-pet-action");

          if (action === "feed") {
            notify("Tính năng cho ăn sẽ được bật khi backend Pet hoàn thiện.", "info");
            return;
          }

          if (action === "shop") {
            notify("Cửa hàng Pet đang ở chế độ xem trước giao diện.", "info");
            return;
          }

          notify("Đã nhận thao tác mua vật phẩm (chế độ xem trước).", "success");
        });
      });
    }

    window.initPetPage = initPetPage;

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        setupPetActions();
        setupHatchModal();
        setupPetNameEdit();
        initPetPage();
      });
    } else {
      setTimeout(function () {
        setupPetActions();
        setupHatchModal();
        setupPetNameEdit();
        initPetPage();
      }, 80);
    }
  })();
</script>
