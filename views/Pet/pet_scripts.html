    function savePetConfigToServer(options) {
      return new Promise((resolve) => {
        const opts = options || {};
        const silent = !!opts.silent;
        const userId = window.currentUser?.userId;
        if (!userId || typeof google === "undefined" || !google.script?.run) {
           resolve({ success: false, message: "No auth" });
           return;
        }

        const config = buildPersistedConfig();

        const saveBtn = document.getElementById("petSaveConfigBtn");
        if (saveBtn) saveBtn.classList.add("loading");

        google.script.run
          .withSuccessHandler(function(result) {
            if (saveBtn) saveBtn.classList.remove("loading");
            if (result && result.success) {
              state.lastSavedConfig = JSON.parse(JSON.stringify(config));
              updateSaveButtonUI();
              if (!silent && typeof showToast === "function") showToast("Đã lưu cấu hình PET!", "success");
              resolve(result);
            } else {
              if (!silent && typeof showToast === "function") showToast("Lỗi lưu cấu hình: " + (result?.message || "Unknown"), "error");
              resolve(result || { success: false });
            }
          })
          .withFailureHandler(function(err) {
            if (saveBtn) saveBtn.classList.remove("loading");
            if (!silent && typeof showToast === "function") showToast("Lỗi kết nối server: " + err, "error");
            resolve({ success: false, message: err });
          })
          .savePetConfig(userId, config);
      });
    }

    function queuePetConfigAutoSave() {
      if (!window.currentUser?.userId) return;
      if (state.autoSaveTimeoutId) {
        clearTimeout(state.autoSaveTimeoutId);
      }
      state.autoSaveTimeoutId = setTimeout(function () {
        state.autoSaveTimeoutId = null;
        savePetConfigToServer({ silent: true });
      }, 500);
    }

    function loadPetConfigFromServer() {
      const userId = window.currentUser?.userId;
      if (!userId || typeof google === "undefined" || !google.script?.run) return;

      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success && result.config) {
            const config = result.config;
            const loadedIndex = parseInt(config.currentIndex, 10);
            if (Number.isFinite(loadedIndex) && loadedIndex >= 0) {
              state.currentIndex = loadedIndex;
            }
            state.isLevelTwo = !!config.isLevelTwo;
            const loadedCurrentVariantId = String(
              config.currentVariantId || config.lockedVariantId || getVariantIdByIndex(state.currentIndex) || "",
            ).trim();
            const currentIndexById = getVariantIndexById(loadedCurrentVariantId);
            if (currentIndexById >= 0) {
              state.currentIndex = currentIndexById;
            }
            state.selectionLocked = false;
            state.ownedVariantIds = normalizeOwnedVariantIds(
              config.ownedVariantIds,
              loadedCurrentVariantId || getVariantIdByIndex(state.currentIndex),
            );
            state.lockedVariantId = String(
              config.lockedVariantId || state.ownedVariantIds[0] || loadedCurrentVariantId || "",
            ).trim();
            state.selectedAccessories = Array.isArray(config.selectedAccessories) ? config.selectedAccessories : [];
            if (state.catalogLoaded) {
              syncSelectedAccessoriesWithCatalog();
            }
            const loadedAccessoryMap =
              config.petAccessoryByVariantId && typeof config.petAccessoryByVariantId === "object"
                ? config.petAccessoryByVariantId
                : {};

            state.petAccessoryByVariantId = {};
            const usedAccessoryFiles = new Set();
            state.ownedVariantIds.forEach(function (variantId) {
              const safeVariantId = String(variantId || "").trim();
              if (!safeVariantId) return;

              const normalizedAssignment = buildAccessoryAssignmentItem(loadedAccessoryMap[safeVariantId]);
              if (!normalizedAssignment || !normalizedAssignment.fileName) return;
              if (usedAccessoryFiles.has(normalizedAssignment.fileName)) return;

              usedAccessoryFiles.add(normalizedAssignment.fileName);
              state.petAccessoryByVariantId[safeVariantId] = normalizedAssignment;
            });

            if (Object.keys(state.petAccessoryByVariantId).length === 0 && Array.isArray(config.selectedAccessories)) {
              const legacyItem = buildAccessoryAssignmentItem(config.selectedAccessories[0]);
              const activeVariantIdForLegacy = String(
                config.currentVariantId || config.lockedVariantId || loadedCurrentVariantId || "",
              ).trim();
              if (legacyItem && activeVariantIdForLegacy) {
                state.petAccessoryByVariantId[activeVariantIdForLegacy] = legacyItem;
              }
            }

            syncSelectedAccessoriesWithCatalog();
            syncSelectedAccessoriesFromActiveVariant();
            const loadedBackgroundIndex = parseInt(config.selectedStageBackgroundIndex, 10);
            state.selectedStageBackgroundIndex = Number.isFinite(loadedBackgroundIndex)
              ? Math.max(0, loadedBackgroundIndex)
              : 0;

            const loadedProgressMap =
              config.petProgressByVariantId && typeof config.petProgressByVariantId === "object"
                ? config.petProgressByVariantId
                : {};
            const loadedNamesMap =
              config.petNamesByVariantId && typeof config.petNamesByVariantId === "object"
                ? config.petNamesByVariantId
                : {};

            state.petProgressByVariantId = {};
            state.petNamesByVariantId = {};

            state.ownedVariantIds.forEach(function (variantId) {
              const safeVariantId = String(variantId || "").trim();
              if (!safeVariantId) return;

              const variantXP = parseInt(loadedProgressMap[safeVariantId], 10);
              if (Number.isFinite(variantXP) && variantXP >= 0) {
                state.petProgressByVariantId[safeVariantId] = variantXP;
              }

              const variantName = loadedNamesMap[safeVariantId];
              if (typeof variantName === "string" && variantName.trim()) {
                state.petNamesByVariantId[safeVariantId] = sanitizePetName(variantName);
              }
            });

            // Backward compatibility for old single-progression schema.
            if (Object.keys(state.petProgressByVariantId).length === 0) {
              let fallbackXP = parseInt(config.progressionXP, 10);
              if (!(Number.isFinite(fallbackXP) && fallbackXP >= 0)) {
                const loadedLevel = parseInt(config.progressionLevel, 10);
                const loadedProgress = parseInt(config.progressionXPProgress, 10);
                if (Number.isFinite(loadedLevel)) {
                  const safeLevel = Math.max(1, loadedLevel);
                  const safeProgress = Number.isFinite(loadedProgress)
                    ? Math.max(0, Math.min(99, loadedProgress))
                    : 0;
                  fallbackXP = (safeLevel - 1) * 100 + safeProgress;
                } else {
                  fallbackXP = 0;
                }
              }
              const fallbackVariantId = state.ownedVariantIds[0] || loadedCurrentVariantId || getVariantIdByIndex(state.currentIndex);
              if (fallbackVariantId) {
                state.petProgressByVariantId[String(fallbackVariantId).trim()] = Math.max(0, toNonNegativeNumber(fallbackXP, 0));
              }
            }

            ensurePetProgressAndNamesMaps();

            enforceLockedVariantSelection();
            syncLockedVariantByCurrentIndex();

            state.lastSavedConfig = JSON.parse(JSON.stringify(buildPersistedConfig()));
            updateSaveButtonUI();

            // Re-render pet with loaded state
            renderPet();
          }
        })
        .getPetConfig(userId);
    }

        activeAccessory.offsetX = activeProfile.offsetX;

        activeAccessory.scalePercent = activeProfile.scalePercent;
        activeAccessory.rotDeg = activeProfile.rotDeg || 0;

          activeVariantId &&
          state.petAccessoryByVariantId &&
          state.petAccessoryByVariantId[activeVariantId]
        ) {
          state.petAccessoryByVariantId[activeVariantId] = activeAccessory;

    function getAccessoryRule(fileName) {
      // Runtime should follow admin-configured profiles exactly.
      return {};
    }

    function getAllowedAccessoryPositions(fileName) {
      const rule = getAccessoryRule(fileName);
      return rule.allowedPositions || ["left", "center", "right"];
    }

    function resolveAccessoryPosition(fileName, desiredPosition) {
      const rule = getAccessoryRule(fileName);
      if (rule.forcedPosition) return rule.forcedPosition;

      const allowed = getAllowedAccessoryPositions(fileName);
      if (allowed.indexOf(desiredPosition) >= 0) return desiredPosition;
      return allowed[0] || "center";
    }

    function getAccessoryImageElements() {
      return [1, 2, 3]
        .map(function (index) {
          return document.getElementById("petAccessoryImage" + index);
        })
        .filter(Boolean);
    }

    function getSelectedAccessoryIndex(fileName) {
      return state.selectedAccessories.findIndex(function (item) {
        return item.fileName === fileName;
      });
    }

    function getSelectedAccessoryByFile(fileName) {
      const index = getSelectedAccessoryIndex(fileName);
      if (index < 0) return null;
      return state.selectedAccessories[index];
    }

    function resolveActiveAccessory() {
      if (!state.selectedAccessory) return null;
      const selected = getSelectedAccessoryByFile(state.selectedAccessory);
      if (!selected) {
        state.selectedAccessory = "";
        return null;
      }
      return selected;
    }

    function clearAccessoryImage(accessoryImageEl) {
      if (!accessoryImageEl) return;
      accessoryImageEl.classList.remove("is-visible");
      accessoryImageEl.style.display = "none";
      accessoryImageEl.src = "";
      accessoryImageEl.removeAttribute('data-original-file');
    }

    function updateAccessoryPositionClasses(accessoryImageEl, fileName, desiredPosition, accessoryData) {
      if (!accessoryImageEl || !fileName) return "center";

      const accessoryCatalogItem = getAccessoryItemByFileName(fileName) || accessoryData;
      const positionMode = normalizeAccessoryPositionMode((accessoryCatalogItem && accessoryCatalogItem.positionMode) || "center");
      const finalPosition = resolveAccessoryPosition(fileName, desiredPosition || positionMode);
      const activeProfile = getAccessoryProfileByPosition(accessoryCatalogItem, finalPosition);
      const widthPercent = resolveAccessoryWidthPercent(accessoryCatalogItem);

      const baseTop = 27;
      const baseLeftMap = {
        left: 42,
        center: 50,
        right: 58,
      };

      const topValue = baseTop;
      const leftValue = baseLeftMap[finalPosition] || 50;
      const rotValue = activeProfile.rotDeg || 0;
      const scaleValue = 1;

      accessoryImageEl.style.setProperty("--pet-accessory-top", topValue + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-left", leftValue + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-width", widthPercent + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-rot", rotValue + "deg");
      accessoryImageEl.style.setProperty("--pet-accessory-offset-x", (activeProfile.offsetX || 0) + "px");
      accessoryImageEl.style.setProperty("--pet-accessory-offset-y", (activeProfile.offsetY || 0) + "px");
      accessoryImageEl.style.setProperty("--pet-accessory-scale", String(scaleValue * ((activeProfile.scalePercent || 100) / 100)));

      return finalPosition;
    }

    function getAccessoryItemByFileName(fileName) {
      if (!fileName) return null;
      return ACCESSORY_ITEMS.find(function (item) {
        return item.file === fileName;
      }) || null;
    }

    function updateAccessoryPanelState() {
      const panelEl = document.getElementById("petAccessoryPanel");
      if (!panelEl) return;

      const canAnyEquip = canAnyOwnedPetEquipAccessories();
      panelEl.classList.toggle("disabled", !canAnyEquip);
      panelEl.setAttribute("aria-disabled", canAnyEquip ? "false" : "true");

      const accessoryButtons = panelEl.querySelectorAll(".pet-accessory-btn");
      accessoryButtons.forEach(function (button) {
        button.disabled = !canAnyEquip;
      });

    function updateAccessoryButtons() {
      const gridEl = document.getElementById("petAccessoryGrid");
      if (!gridEl) return;

      const selectedMap = {};
      state.selectedAccessories.forEach(function (item) {
        selectedMap[item.fileName] = true;
      });

      const activeVariantId = String(getActiveVariantId() || "").trim();

      const buttons = gridEl.querySelectorAll(".pet-accessory-btn");
      buttons.forEach(function (button) {
        const fileName = button.getAttribute("data-file") || "";
        if (fileName === NO_ACCESSORY_VALUE) {
          button.classList.toggle("active", state.selectedAccessories.length === 0);
          return;
        }

        const ownerVariantId = getAccessoryOwnerVariantId(fileName);
        const inUseByOther = !!ownerVariantId && ownerVariantId !== activeVariantId;
        button.classList.remove("is-locked");
        button.classList.toggle("is-in-use", inUseByOther);
        button.setAttribute("aria-disabled", "false");
        if (inUseByOther) {
          button.setAttribute("title", "Phụ kiện này đã được PET khác sử dụng");
        } else {
          button.removeAttribute("title");
        }

        const lockOverlay = button.querySelector(".pet-item-lock-icon");
        if (lockOverlay) lockOverlay.remove();

        button.classList.toggle("active", Boolean(selectedMap[fileName]));
      });
    }

    function updateAccessoryPositionButtons() {
      const container = document.getElementById("petAccessoryPosition");
      if (!container) return;

      const activeAccessory = resolveActiveAccessory();
      const allowed = getAllowedAccessoryPositions(
        activeAccessory ? activeAccessory.fileName : "",
      );
      const activePosition = normalizeAccessoryPositionMode(
        activeAccessory ? activeAccessory.position : state.accessoryPosition,
      );

      const buttons = container.querySelectorAll(".pet-pill-btn");
      buttons.forEach(function (button) {
        const pos = button.getAttribute("data-pos") || "";
        const isAllowed = canEquipAccessories() && allowed.indexOf(pos) >= 0;
        button.disabled = !isAllowed;
        button.classList.toggle("active", isAllowed && pos === activePosition);
      });
    }

    function triggerBlink() {
      if (!canEquipAccessories() || state.isPressing) return;
      if (typeof renderEyes !== "function") return;

      state.isEyesClosed = true;
      renderEyes();

      if (state.blinkTimeoutId) {
        clearTimeout(state.blinkTimeoutId);
      }

      state.blinkTimeoutId = setTimeout(function () {
        state.isEyesClosed = false;
        if (typeof renderEyes === "function") {
          renderEyes();
        }
      }, BLINK_CLOSE_DURATION_MS);
    }

    function startBlinkLoop() {
      if (state.blinkIntervalId) {
        clearInterval(state.blinkIntervalId);
      }
      if (state.blinkTimeoutId) {
        clearTimeout(state.blinkTimeoutId);
      }

      if (typeof renderEyes !== "function") {
        return;
      }

      state.isEyesClosed = false;
      state.blinkIntervalId = setInterval(triggerBlink, BLINK_INTERVAL_MS);
    }

    function movePet(step) {
      const total = PET_VARIANTS.length;
      state.currentIndex = (state.currentIndex + step + total) % total;
      enforceLockedVariantSelection();
      releasePressState();
      renderPet();
    }

    function ensureCurrentVariantAccessible() {
      if (!Array.isArray(PET_VARIANTS) || PET_VARIANTS.length === 0) return;

      if (state.currentIndex < 0 || state.currentIndex >= PET_VARIANTS.length) {
        state.currentIndex = 0;
      }

      const currentVariant = PET_VARIANTS[state.currentIndex];
      const currentVariantId = String((currentVariant && currentVariant.id) || "").trim();
      if (currentVariant && isVariantOwned(currentVariantId)) {
        return;
      }

      const firstOwnedIndex = PET_VARIANTS.findIndex(function (variant) {
        const variantId = String((variant && variant.id) || "").trim();
        return isVariantOwned(variantId);
      });

      state.currentIndex = firstOwnedIndex >= 0 ? firstOwnedIndex : 0;
    }

    function requestPurchaseConfirmation(variantName, priceXqp) {
      return new Promise(function (resolve) {
        const safeName = String(variantName || "PET");
        const safePrice = Math.max(0, toNonNegativeNumber(priceXqp, 0));
        const message = "Bạn có chắc muốn mua " + safeName + " với giá " + safePrice + " XQP không?";

        if (typeof window.showAppConfirm === "function") {
          window.showAppConfirm(message, {
            title: "Xác nhận mua PET",
            confirmText: "Mua ngay",
            cancelText: "Hủy",
          }).then(function (ok) {
            resolve(!!ok);
          }).catch(function () {
            resolve(false);
          });
          return;
        }

        resolve(window.confirm(message));
      });
    }

    async function purchaseSecondPetVariant(variant, index) {
      const targetVariantId = String((variant && variant.id) || "").trim();
      if (!targetVariantId) return;

      if (!canOwnMoreVariants()) {
        if (typeof showToast === "function") {
          showToast("Bạn đã sở hữu toàn bộ PET hiện có", "info");
        }
        return;
      }

      if (!isPetVariantUnlocked(variant)) {
        if (typeof showToast === "function") {
          showToast(
            "Pet này chưa mở khóa. Cần: " + describeUnlockCondition(variant.unlockCondition),
            "warning",
          );
        }
        return;
      }

      const secondPetPrice = Math.max(0, toNonNegativeNumber(variant.secondPetPriceXqp, 500));
      if ((state.totalXQP || 0) < secondPetPrice) {
        if (typeof showToast === "function") {
          showToast("Không đủ XQP để mua pet này", "warning");
        }
        return;
      }

      const userConfirmed = await requestPurchaseConfirmation(variant.name, secondPetPrice);
      if (!userConfirmed) {
        return;
      }

      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run ||
        !window.currentUser ||
        !window.currentUser.userId
      ) {
        if (typeof showToast === "function") {
          showToast("Không thể mua pet lúc này", "error");
        }
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || result.success !== true) {
            if (typeof showToast === "function") {
              showToast((result && result.message) || "Mua pet thất bại", "error");
            }
            return;
          }

          state.totalXQP = Math.max(0, toNonNegativeNumber(result.newTotalXQP, state.totalXQP || 0));
          if (window.currentUser) {
            window.currentUser.totalXQP = state.totalXQP;
          }
          const xqpDisplay = document.getElementById("petXQPBalance");
          if (xqpDisplay) {
            xqpDisplay.textContent = Number(state.totalXQP).toLocaleString();
          }

          if (result.config && typeof result.config === "object") {
            const configIndex = parseInt(result.config.currentIndex, 10);
            if (Number.isFinite(configIndex) && configIndex >= 0 && configIndex < PET_VARIANTS.length) {
              state.currentIndex = configIndex;
            } else {
              state.currentIndex = index;
            }
            state.ownedVariantIds = normalizeOwnedVariantIds(
              result.config.ownedVariantIds,
              targetVariantId,
            );
            state.selectionLocked = false;
            state.lockedVariantId = String(result.config.lockedVariantId || state.ownedVariantIds[0] || "").trim();

            if (result.config.petProgressByVariantId && typeof result.config.petProgressByVariantId === "object") {
              state.petProgressByVariantId = Object.assign({}, result.config.petProgressByVariantId);
            }
            if (result.config.petNamesByVariantId && typeof result.config.petNamesByVariantId === "object") {
              state.petNamesByVariantId = Object.assign({}, result.config.petNamesByVariantId);
            }
          } else {
            state.ownedVariantIds = normalizeOwnedVariantIds(state.ownedVariantIds, targetVariantId);
            state.currentIndex = index;
          }

          ensurePetProgressAndNamesMaps();
          if (typeof state.petProgressByVariantId[targetVariantId] === "undefined") {
            state.petProgressByVariantId[targetVariantId] = 0;
          }
          if (typeof state.petNamesByVariantId[targetVariantId] === "undefined") {
            state.petNamesByVariantId[targetVariantId] = sanitizePetName((variant && variant.name) || DEFAULT_PET_NAME);
          }

          state.lastSavedConfig = JSON.parse(JSON.stringify(buildPersistedConfig()));
          releasePressState();
          renderPet();
          updateSaveButtonUI();

          if (typeof showToast === "function") {
            showToast("Mua pet thành công", "success");
          }

          updatePetPopoverPreview("settings", {
            name: variant.name,
            isOwned: true,
            secondPetPriceXqp: variant.secondPetPriceXqp,
            description: variant.description,
            unlockCondition: variant.unlockCondition,
          }, "variant");
        })
        .withFailureHandler(function (error) {
          if (typeof showToast === "function") {
            showToast("Lỗi mua pet: " + (error && error.message ? error.message : error), "error");
          }
        })
        .purchasePetVariant({
          userId: window.currentUser.userId,
          variantId: targetVariantId,
        });
    }

              level1: variant.level1,

              unlockCondition: variant.unlockCondition,
              isOwned: owned,
              isLocked: !unlocked && !owned,
            },
            "variant",
          );
        });
        btn.addEventListener("mouseleave", hidePetTooltip);
          btn.addEventListener("focus", function () {
            updatePetPopoverPreview("settings", {
              name: variant.name,
              isOwned: owned,
              secondPetPriceXqp: variant.secondPetPriceXqp,
              description: variant.description,
              unlockCondition: variant.unlockCondition,
            }, "variant");

            secondPetPriceXqp: variant.secondPetPriceXqp,
            description: variant.description,

          }, "variant");

    function updateBackgroundButtons(activeIndex) {
      const buttonsWrap = document.getElementById("petBackgroundButtons");
      if (!buttonsWrap) return;

      ensureValidBackgroundSelection();
      const safeActiveIndex = state.selectedStageBackgroundIndex;

      const buttons = buttonsWrap.querySelectorAll(".pet-bg-btn");
      buttons.forEach((button, index) => {
        const background = STAGE_BACKGROUNDS[index];
        const unlocked = isBackgroundUnlocked(background);
        button.classList.toggle("active", unlocked && index === safeActiveIndex);

        let lockOverlay = button.querySelector(".pet-item-lock-icon");

          lockOverlay = document.createElement("div");
          lockOverlay.className = "pet-item-lock-icon";

          button.appendChild(lockOverlay);

          lockOverlay.remove();
        }
      });

          const activeVariantId = String(getActiveVariantId() || "").trim();
          if (!activeVariantId) return;

              showToast("PET hiện tại chưa đủ Level để gắn phụ kiện", "warning");

          }

          const activeAssigned =
            state.petAccessoryByVariantId && state.petAccessoryByVariantId[activeVariantId]
              ? state.petAccessoryByVariantId[activeVariantId]
              : null;
          const activeAssignedFile = String((activeAssigned && activeAssigned.fileName) || "").trim();
          if (activeAssignedFile === fileName) {

            updateAccessoryButtons();
            updateAccessoryPositionButtons();
            queuePetConfigAutoSave();

            return;
          }

          renderAccessory();
          updateAccessoryButtons();
          updateAccessoryPositionButtons();
          queuePetConfigAutoSave();
          updatePetPopoverPreview("accessory", catalogItem, "accessory");
        });
        gridEl.appendChild(btn);
      });

      updateAccessoryButtons();
    }

    function buildFoodButtons() {
      const gridEl = document.getElementById("petFoodGrid");
      if (!gridEl) return;

      gridEl.innerHTML = "";

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          const img = entry.target;
          const parent = img.closest(".pet-food-item");
          const missingLabel = parent ? parent.querySelector(".pet-food-missing") : null;
          const fileName = img.getAttribute("data-lazy-src");
          if (!fileName) return;

          fetchAssetUrl(fileName).then(function(url) {
            if (url) {
              img.src = url;
              img.style.visibility = "visible";
              if (missingLabel) missingLabel.style.display = "none";
              return;
            }

            img.style.display = "none";
            if (missingLabel) missingLabel.style.display = "inline-flex";
            if (!foodLoadWarningShown && typeof showToast === "function") {
              foodLoadWarningShown = true;
              showToast("Food image chua co tren CDN. Hay push Image/Food len GitHub de hien thi.", "warning");
            }
          });

          obs.unobserve(img);
        });
      }, { root: document.getElementById("petFoodPopover"), rootMargin: "50px" });

      FOOD_ITEMS.forEach(function (foodItem, index) {
        const fileName = foodItem.file;
        const displayName = String(foodItem.name || ("Food " + (index + 1)));

        const item = document.createElement("button");
        item.type = "button";
        item.className = "pet-food-item";
        item.setAttribute("data-file", fileName);
        item.setAttribute("draggable", "true");

        const img = document.createElement("img");
        img.className = "pet-food-thumb";
        img.alt = displayName;
        img.loading = "lazy";
        img.src = resolvePetThumbSrc(fileName);
        img.onerror = function () {
          this.src = "";
          this.style.visibility = "hidden";
        };
        img.onload = function () {
          this.style.visibility = "visible";
        };
        img.style.visibility = "hidden";

        const missingLabel = document.createElement("span");
        missingLabel.className = "pet-food-missing";
        missingLabel.textContent = "No image";
        missingLabel.style.display = "none";

        item.appendChild(img);
        item.appendChild(missingLabel);
        
        item.addEventListener("mouseenter", function(e) {
          const tooltipData = Object.assign({}, foodItem, {
            isLocked: isProgressLevelLocked(foodItem, {
              progressLevel: getHighestOwnedPetProgressLevel(),
            }),
          });
          updatePetPopoverPreview("food", tooltipData, "food");
          showPetTooltip(e, tooltipData, 'food');
        });
        item.addEventListener("mouseleave", hidePetTooltip);
        item.addEventListener("focus", function () {
          updatePetPopoverPreview("food", foodItem, "food");
        });

        item.addEventListener("click", function() {
          const lockedNow = isProgressLevelLocked(foodItem, {
            progressLevel: getHighestOwnedPetProgressLevel(),
          });
          if (lockedNow) {
            if (typeof showToast === "function") {
              showToast(
                "Vật phẩm chưa mở khóa. Cần: " + describeUnlockCondition(foodItem.unlockCondition),
                "warning",
              );
            }
            return;
          }
          const activeVariantId = getActiveVariantId();
          if (!activeVariantId) return;
          feedPetVariant(activeVariantId, foodItem);
          updatePetPopoverPreview("food", foodItem, "food");
        });

        item.draggable = true;
        item.addEventListener("dragstart", function (event) {
          event.dataTransfer.setData("text/pet-food-file", fileName);
          event.dataTransfer.effectAllowed = "copy";
        });
        gridEl.appendChild(item);
      });

      updateFoodButtons();
    }

    function updateFoodButtons() {
      const gridEl = document.getElementById("petFoodGrid");
      if (!gridEl) return;

      const unlockContext = {
        progressLevel: getHighestOwnedPetProgressLevel(),
      };

      const buttons = gridEl.querySelectorAll(".pet-food-item");
      buttons.forEach(function (button) {
        const fileName = button.getAttribute("data-file") || "";
        if (!fileName) return;

        const foodItem = FOOD_ITEMS.find(function (item) {
          return item.file === fileName;
        });
        if (!foodItem) return;

        const locked = isProgressLevelLocked(foodItem, unlockContext);
        button.classList.toggle("is-locked", locked);
        button.setAttribute("aria-disabled", locked ? "true" : "false");

        let lockOverlay = button.querySelector(".pet-item-lock-icon");
        if (locked && !lockOverlay) {
          lockOverlay = document.createElement("div");
          lockOverlay.className = "pet-item-lock-icon";
          lockOverlay.innerHTML = '<span class="material-symbols-sharp">lock</span>';
          button.appendChild(lockOverlay);
        } else if (!locked && lockOverlay) {
          lockOverlay.remove();
        }
      });
    }

    function bindAccessoryControls() {
      // Accessory position interaction is handled by bindAccessoryPositionClick.
    }

    function bindStageInteractions() {
      const stageEl = document.getElementById("petStage");
      if (!stageEl) return;

      document.addEventListener("mouseup", function() {
        if (state.petEntities) {
          state.petEntities.forEach(pet => {
            if (pet.isPressed) {
              pet.isPressed = false;
              pet.el.classList.remove("is-pressed");
            }
          });
        }
      });
    }

    function bindControls() {
      const prevBtn = document.getElementById("petPrevBtn");
      const nextBtn = document.getElementById("petNextBtn");
      const toggleLevelBtn = document.getElementById("petToggleLevelBtn");

      if (prevBtn) {
        prevBtn.addEventListener("click", function () {
          movePet(-1);
        });
      }

      const progressCard = document.querySelector(".pet-level-progress-card");
      if (progressCard) {
        progressCard.style.cursor = "pointer";
        progressCard.addEventListener("click", function (e) {
          e.preventDefault();
          const activeVariantId = getActiveVariantId();
          if (activeVariantId) {
            renamePetByVariantId(activeVariantId);
          }
        });
      }

      if (nextBtn) {
        nextBtn.addEventListener("click", function () {
          movePet(1);
        });
      }

      if (toggleLevelBtn) {
        toggleLevelBtn.addEventListener("click", function () {
          releasePressState();
          state.isLevelTwo = !state.isLevelTwo;
          state.isEyesClosed = false;
          renderPet();
        });
      }

      const saveConfigBtn = document.getElementById("petSaveConfigBtn");
      if (saveConfigBtn) {
        saveConfigBtn.addEventListener("click", function () {
          savePetConfigToServer();
        });
      }

    }


    function startJumpingRoutine() {
      if (state.jumpIntervalId) return;

      const routine = function() {
        updatePetWorld();
        state.jumpIntervalId = setTimeout(routine, 100); // Physics/behavior tick
      };

      state.jumpIntervalId = setTimeout(routine, 100);
    }

    function bindNavigationGuard() {
      // Browser navigation/refresh/close guard
      window.addEventListener('beforeunload', function(e) {
        if (isDirty()) {
          e.preventDefault();
          e.returnValue = ''; // Required for modern browsers
          return '';
        }
      });

      // Internal app navigation guard
      window.onBeforeNavigate = function(pageId, params, addToHistory) {
        const petPage = document.getElementById("page-pet");
        if (!petPage || petPage.style.display === "none") return false;

        if (isDirty()) {
          if (typeof window.showAppConfirm === "function") {
            (async () => {
              const confirmed = await window.showAppConfirm(
                "Bạn có thay đổi chưa lưu cho PET. Bạn có muốn LƯU lại trước khi rời đi không?",
                {
                  title: "Nhắc nhở lưu PET",
                  confirmText: "Lưu và Tiếp tục",
                  cancelText: "Thoát không lưu",
                  allowBackdropClose: false
                }
              );

              if (confirmed !== null) {
                if (confirmed === true) {
                  await savePetConfigToServer();
                }
                // Release guard and proceed
                window.onBeforeNavigate = null;
                if (typeof showPage === "function") {
                  showPage(pageId, params, addToHistory);
                }
              }
            })();
            return true; // Intercept sync navigation
          } else {
            // Fallback to confirm if modal missing
            const msg = "Bạn có thay đổi chưa lưu trên PET. Lưu trước khi thoát?";
            if (confirm(msg)) {
              savePetConfigToServer();
            }
            window.onBeforeNavigate = null;
            return false;
          }
        }
        return false;
      };
    }

    function startPetHeaderMeteors() {
      const container = document.getElementById("petMeteorContainer");
      if (!container) return;

      if (petMeteorInterval) {
        clearInterval(petMeteorInterval);
      }

      petMeteorInterval = setInterval(function () {
        if (!document.getElementById("petMeteorContainer")) {
          clearInterval(petMeteorInterval);
          return;
        }
        createPetMeteor();
      }, 800);

      createPetMeteor();
    }

    function createPetMeteor() {
      const container = document.getElementById("petMeteorContainer");
      if (!container) return;

      const meteor = document.createElement("div");
      meteor.className = "pet-header-meteor";

      const startX = Math.random() * 40;
      const startY = Math.random() * 20;
      meteor.style.left = startX + "%";
      meteor.style.top = startY + "%";

      const height = 35 + Math.random() * 35;
      meteor.style.height = height + "px";
      meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

      container.appendChild(meteor);

      setTimeout(function () {
        meteor.remove();
      }, 1500);
    }

    function setupPetHeaderMouseEffect() {
      if (petHeaderMouseEffectBound) return;

      const header = document.querySelector("#page-pet .pet-page-header");
      const stars = document.getElementById("petHeaderStars");
      if (!header || !stars) return;

      header.addEventListener("mousemove", function (e) {
        const rect = header.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        stars.style.transform = "translate(" + x * 15 + "px, " + y * 15 + "px)";
      });

      header.addEventListener("mouseleave", function () {
        stars.style.transform = "translate(0, 0)";
      });

      petHeaderMouseEffectBound = true;
    }

    function preloadMainAssets() {
      ensureValidBackgroundSelection();
        const variant = PET_VARIANTS[state.currentIndex];
        const bg = STAGE_BACKGROUNDS[state.selectedStageBackgroundIndex] || STAGE_BACKGROUNDS[0];
        if (variant && bg) {
          [variant.level1, variant.level2, bg.fileName].forEach(file => {
               fetchAssetUrl(file); // Fire and forget fetch cache
            });
        }
    }

    function updateXQPUI() {
      const xqpDisplay = document.getElementById("petXQPBalance");
      if (!xqpDisplay) return;

      // 1. Immediately display from window.currentUser (fast, may be stale)
      if (window.currentUser && typeof window.currentUser.totalXQP !== 'undefined') {
        const userBalance = parseInt(window.currentUser.totalXQP) || 0;
        state.totalXQP = userBalance;
      }
      xqpDisplay.textContent = Number(state.totalXQP).toLocaleString();

      // 2. Fetch authoritative value from server to ensure accuracy
      const user = window.currentUser;
      if (user && user.userId && typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.status === 'success' && result.user) {
              const serverXQP = parseInt(result.user.totalXQP) || 0;
              state.totalXQP = serverXQP;

              // Sync back to window.currentUser and storage
              if (window.currentUser) {
                window.currentUser.totalXQP = serverXQP;
                if (typeof result.user.totalXP !== 'undefined') {
                  window.currentUser.totalXP = result.user.totalXP;
                }
                try {
                  var storageKey = localStorage.getItem("currentUser") ? "localStorage" : "sessionStorage";
                  window[storageKey].setItem("currentUser", JSON.stringify(window.currentUser));
                } catch (e) {}
              }

              // Update display with server value
              const el = document.getElementById("petXQPBalance");
              if (el) el.textContent = Number(serverXQP).toLocaleString();
            }
          })
          .withFailureHandler(function(err) {
            console.warn("Pet XQP fetch failed:", err);
          })
          .getUserSession(user.userId);
      }
    }

    function initPetPage() {
      if (!state.initialized) {
        bindPetNameEditor();
        bindControls();
        bindStageInteractions();
        buildVariantButtons();
        buildBackgroundButtons();
        buildAccessoryButtons();
        buildFoodButtons();
        updatePetCatalogHints();
        loadPetItemCatalogFromServer();
        loadTopicProgressCacheForPet();
        bindAccessoryControls();
        bindSettingsPanelToggle();
        bindBackgroundPanelToggle();
        bindAccessoryPanelToggle();
        bindFoodPanelToggle();
        bindPanelControlsClick();
        bindNavigationGuard();
        bindAccessoryPositionClick();
        startBlinkLoop();
        updateSettingsPanelVisibility();
        updateBackgroundPanelVisibility();
        updateAccessoryPanelVisibility();
        updateFoodPanelVisibility();
        startJumpingRoutine();
        state.initialized = true;

        // Initialize lastSavedConfig as a copy of initial state if empty
        if (!state.lastSavedConfig) {
          state.lastSavedConfig = JSON.parse(JSON.stringify(buildPersistedConfig()));
        }
        updateSaveButtonUI();
        registerPetServiceWorker();
        preloadMainAssets();
      }
      startPetHeaderMeteors();
      setupPetHeaderMouseEffect();
      loadTopicProgressCacheForPet();
      loadPetConfigFromServer();
      updateXQPUI();
      renderPet();
    }


    window.initPetPage = initPetPage;
  })();
</script>
