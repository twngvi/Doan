    function resolvePetThumbSrc(fileName) {
      const src = String(fileName || "").trim();
      if (!src) return "";
      if (/^(https?:|data:|blob:)/i.test(src)) {
        return src;
      }
      return PET_ASSET_BASE_URLS[0] + src.replace(/^\/+/, "");
    }

    function getPetTooltip() {
      if (!petTooltipEl) {
        petTooltipEl = document.createElement("div");
        petTooltipEl.className = "pet-item-tooltip";
        document.body.appendChild(petTooltipEl);
      }
      return petTooltipEl;
    }

    function normalizeUnlockConditionEntry(condition) {
      const safeCondition = condition || {};
      const unlockType = String(safeCondition.type || "level").trim() || "level";
      let unlockValue = safeCondition.value;

      if (unlockType === "level") {
        unlockValue = Math.max(1, toNonNegativeNumber(unlockValue, 1));
        return {
          type: "level",
          value: unlockValue,
        };
      }

      unlockValue = String(unlockValue || "").trim();
      if (!unlockValue) return null;

      return {
        type: unlockType,
        value: unlockValue,
      };
    }

    function normalizeUnlockMode(mode) {
      return String(mode || "all") === "any" ? "any" : "all";
    }

    function normalizeUnlockCondition(condition) {
      const raw = condition || {};

      if (raw && Array.isArray(raw.conditions)) {
        const mode = normalizeUnlockMode(raw.mode);
        const conditions = raw.conditions
          .map(normalizeUnlockConditionEntry)
          .filter(Boolean);

        if (conditions.length === 0) {
          return { type: "level", value: 1 };
        }
        if (conditions.length === 1) {
          return conditions[0];
        }

        return {
          mode: mode,
          conditions: conditions,
        };
      }

      return normalizeUnlockConditionEntry(raw) || { type: "level", value: 1 };
    }

    function getUnlockConditionMeta(condition) {
      const normalized = normalizeUnlockCondition(condition);
      if (Array.isArray(normalized.conditions)) {
        return {
          mode: normalizeUnlockMode(normalized.mode),
          conditions: normalized.conditions.slice(),
        };
      }

      return {
        mode: "all",
        conditions: [normalized],
      };
    }

    function unlockConditionToList(condition) {
      return getUnlockConditionMeta(condition).conditions;
    }

    function describeUnlockConditionEntry(condition) {
      const safeCondition = normalizeUnlockConditionEntry(condition) || {
        type: "level",
        value: 1,
      };
      const unlockType = String(safeCondition.type || "level");
      const unlockValue = safeCondition.value;

      if (unlockType === "level") {
        return "Level tiến độ " + unlockValue;
      }
      if (unlockType === "topic") {
        return "Hoàn thành bài học của topic " + unlockValue;
      }
      if (unlockType === "topic_quiz") {
        return "Hoàn thành Quiz của topic " + unlockValue;
      }
      if (unlockType === "topic_matching") {
        return "Hoàn thành Matching của topic " + unlockValue;
      }

      return unlockType + " " + unlockValue;
    }

    function describeUnlockCondition(condition) {
      const meta = getUnlockConditionMeta(condition);
      const separator = meta.mode === "any" ? " HOẶC " : " VÀ ";
      return meta.conditions.map(describeUnlockConditionEntry).join(separator);
    }

    function isSingleUnlockConditionSatisfied(condition) {
      const safeCondition = normalizeUnlockConditionEntry(condition);
      if (!safeCondition) return false;

      const unlockType = String(safeCondition.type || "level");
      if (unlockType === "level") {
        return getCurrentProgressLevel() >= Math.max(1, toNonNegativeNumber(safeCondition.value, 1));
      }

      const topicId = String(safeCondition.value || "").trim();
      if (!topicId) return false;

      const progress = getTopicProgressFromCache(topicId);
      if (!progress) return false;

      if (unlockType === "topic") {
        return !!(progress.completed || progress.lessonCompleted);
      }
      if (unlockType === "topic_quiz") {
        return !!(progress.quizDone || progress.completed);
      }
      if (unlockType === "topic_matching") {
        return !!(progress.matchingDone || progress.completed);
      }

      return false;
    }

    function isUnlockConditionSatisfied(condition) {
      const meta = getUnlockConditionMeta(condition);
      if (meta.mode === "any") {
        return meta.conditions.some(isSingleUnlockConditionSatisfied);
      }
      return meta.conditions.every(isSingleUnlockConditionSatisfied);
    }

    function showPetTooltip(e, itemData, itemType) {
      const tooltip = getPetTooltip();
      const isVariantTooltip = itemType === "variant";
      const isLockedInfoOnly = !!(itemData && itemData.isLocked);
      const unlockText = itemData && itemData.unlockCondition
        ? describeUnlockCondition(itemData.unlockCondition)
        : "";
      tooltip.classList.toggle("is-variant-tooltip", isVariantTooltip);

      let html = "";
      if (!isLockedInfoOnly) {
        html += `<div class="tooltip-img-wrap"><img /></div>`;
      }
      html += `<div class="tooltip-info-wrap"><h4>${itemData.name}</h4>`;

      if (!isLockedInfoOnly && itemData.priceXqp > 0) {
        html += `<div class="tooltip-meta tooltip-price"><span>Giá mua:</span> <strong>${itemData.priceXqp} XQP</strong></div>`;
      }
      if (!isLockedInfoOnly && itemType === 'food' && itemData.petXpGain) {
        html += `<div class="tooltip-meta tooltip-xp"><span>Dinh dưỡng:</span> <strong>+${itemData.petXpGain} XP</strong></div>`;
      }
      if (unlockText) {
        html += `<div class="tooltip-meta tooltip-unlock"><span>Điều kiện mở khóa:</span> <strong>${unlockText}</strong></div>`;
      }
      if (!isLockedInfoOnly && isVariantTooltip) {
        const secondPetPrice = Math.max(0, toNonNegativeNumber(itemData.secondPetPriceXqp, 500));
        if (itemData.isOwned) {
          html += `<div class="tooltip-meta"><span>Trạng thái:</span> <strong>Đã sở hữu</strong></div>`;
        } else {
          html += `<div class="tooltip-meta tooltip-price"><span>Giá pet thứ 2:</span> <strong>${secondPetPrice} XQP</strong></div>`;
          html += `<div class="tooltip-meta"><span>Trạng thái:</span> <strong>Chưa sở hữu</strong></div>`;
        }
      }
      html += `</div>`;
      tooltip.innerHTML = html;
      tooltip.classList.add("visible");

      const img = tooltip.querySelector("img");
      if (img && !isLockedInfoOnly) {
         const previewFile = itemData.file || itemData.level2 || itemData.level1 || "";
         fetchAssetUrl(previewFile).then(u => { if(u) img.src = u; });
      }

      const triggerBtn = e.target.closest('button');
      if (!triggerBtn) return;
      const rect = triggerBtn.getBoundingClientRect();
      const tooltipRect = tooltip.getBoundingClientRect();
      let top = rect.top - tooltipRect.height - 15;
      let left = rect.left + rect.width / 2 - tooltipRect.width / 2;
      
      if (top < 10) top = rect.bottom + 15;
      if (left < 10) left = 10;
      if (left + tooltipRect.width > window.innerWidth - 10) left = window.innerWidth - tooltipRect.width - 10;
      
      tooltip.style.top = top + "px";
      tooltip.style.left = left + "px";
    }

    function hidePetTooltip() {
      const tooltip = getPetTooltip();
      tooltip.classList.remove("visible");

    function toNonNegativeNumber(value, fallback) {
      const parsed = parseInt(value, 10);
      if (!Number.isFinite(parsed) || parsed < 0) return fallback;
      return parsed;
    }

    function toSignedNumber(value, fallback) {
      const parsed = parseInt(value, 10);
      if (!Number.isFinite(parsed)) return fallback;
      return parsed;
    }

    function getActiveVariantId() {
      const byIndex = String(getVariantIdByIndex(state.currentIndex) || "").trim();
      if (byIndex) return byIndex;
      return String((state.lockedVariantId || "")).trim();
    }

    function getPetDisplayNameByVariantId(variantId) {
      const safeVariantId = String(variantId || "").trim();
      const fromMap = safeVariantId ? state.petNamesByVariantId[safeVariantId] : "";
      return sanitizePetName(fromMap || DEFAULT_PET_NAME);
    }

    function setPetDisplayNameByVariantId(variantId, nextName) {
      const safeVariantId = String(variantId || "").trim();
      if (!safeVariantId) return;
      state.petNamesByVariantId[safeVariantId] = sanitizePetName(nextName);
      if (safeVariantId === getActiveVariantId()) {
        state.petDisplayName = state.petNamesByVariantId[safeVariantId];
      }
    }

    function getPetProgressXP(variantId) {
      const safeVariantId = String(variantId || "").trim();
      if (!safeVariantId) return 0;
      const raw = state.petProgressByVariantId[safeVariantId];
      const parsed = parseInt(raw, 10);
      return Number.isFinite(parsed) && parsed >= 0 ? parsed : 0;
    }

    function setPetProgressXP(variantId, xpValue) {
      const safeVariantId = String(variantId || "").trim();
      if (!safeVariantId) return;
      const safeXP = Math.max(0, toNonNegativeNumber(xpValue, 0));
      state.petProgressByVariantId[safeVariantId] = safeXP;
      if (safeVariantId === getActiveVariantId()) {
        state.progressionXP = safeXP;
      }
    }

    function getProgressLevelByXP(xpValue) {
      const safeXP = Math.max(0, toNonNegativeNumber(xpValue, 0));
      return Math.floor(safeXP / 100) + 1;
    }

    function getCurrentProgressLevel(variantId) {
      const targetVariantId = String(variantId || getActiveVariantId() || "").trim();
      const xp = getPetProgressXP(targetVariantId);
      return getProgressLevelByXP(xp);
    }

    function ensurePetProgressAndNamesMaps() {
      const ownedIds = Array.isArray(state.ownedVariantIds) ? state.ownedVariantIds : [];
      ownedIds.forEach(function (variantId) {
        const safeVariantId = String(variantId || "").trim();
        if (!safeVariantId) return;

        if (typeof state.petProgressByVariantId[safeVariantId] === "undefined") {
          state.petProgressByVariantId[safeVariantId] = 0;
        }

        if (typeof state.petNamesByVariantId[safeVariantId] === "undefined") {
          const variantIndex = getVariantIndexById(safeVariantId);
          const variant = variantIndex >= 0 ? PET_VARIANTS[variantIndex] : null;
          state.petNamesByVariantId[safeVariantId] = sanitizePetName((variant && variant.name) || DEFAULT_PET_NAME);
        }
      });

      const activeVariantId = getActiveVariantId();
      if (activeVariantId) {
        state.progressionXP = getPetProgressXP(activeVariantId);
        state.petDisplayName = getPetDisplayNameByVariantId(activeVariantId);
      }
    }

    function canEquipAccessories() {
      return getCurrentProgressLevel() >= 3;
    }

    function isProgressLevelLocked(item) {
      const condition = item && item.unlockCondition
        ? item.unlockCondition
        : { type: "level", value: 1 };
      return !isUnlockConditionSatisfied(condition);
    }

    function normalizeAccessoryPositionMode(positionMode) {
      return ACCESSORY_POSITIONS.indexOf(positionMode) >= 0 ? positionMode : "center";
    }

    function normalizeAccessoryPositionProfiles(rawProfiles, fallbackItem) {
      let safeProfiles = {};
      if (rawProfiles && typeof rawProfiles === "string") {
        try {
          safeProfiles = JSON.parse(rawProfiles);
        } catch (e) {
          safeProfiles = {};
        }
      } else if (rawProfiles && typeof rawProfiles === "object") {
        safeProfiles = rawProfiles;
      }
      const safeFallback = fallbackItem || {};

      const toProfile = function (profile) {
        const safe = profile || {};
        return {
          offsetX: toSignedNumber(safe.offsetX, toSignedNumber(safeFallback.offsetX, 0)),
          offsetY: toSignedNumber(safe.offsetY, toSignedNumber(safeFallback.offsetY, 0)),
          scalePercent: Math.max(40, Math.min(220, toNonNegativeNumber(safe.scalePercent, toNonNegativeNumber(safeFallback.scalePercent, 100)))),
          rotDeg: Math.max(-180, Math.min(180, toSignedNumber(safe.rotDeg, toSignedNumber(safeFallback.rotDeg, 0)))),
        };
      };

      return {
        left: toProfile(safeProfiles.left),
        center: toProfile(safeProfiles.center),
        right: toProfile(safeProfiles.right),
      };
    }

    function getAccessoryProfileByPosition(item, position) {
      const safeItem = item || {};
      const profiles = normalizeAccessoryPositionProfiles(safeItem.positionProfiles, safeItem);
      const mode = normalizeAccessoryPositionMode(position);
      return profiles[mode] || profiles.center;
    }

    function normalizePetItemCatalog(items, itemType) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          const safe = item || {};
          const fallback =
            itemType === "food"
              ? DEFAULT_FOOD_ITEMS[index]
              : DEFAULT_ACCESSORY_ITEMS[index];

          const normalized = {
            id: String(safe.id || (fallback && fallback.id) || ""),
            name: String(safe.name || (fallback && fallback.name) || ""),
            file: String(safe.file || (fallback && fallback.file) || ""),
            priceXqp: toNonNegativeNumber(safe.priceXqp, 0),
            offsetX: toSignedNumber(safe.offsetX, 0),
            offsetY: toSignedNumber(safe.offsetY, 0),
            scalePercent: Math.max(40, Math.min(220, toNonNegativeNumber(safe.scalePercent, 100))),
            positionMode: normalizeAccessoryPositionMode(String(safe.positionMode || 'center')),
            positionProfiles: normalizeAccessoryPositionProfiles(safe.positionProfiles, safe),
            unlockCondition: normalizeUnlockCondition(safe.unlockCondition || { type: 'level', value: 1 })
          };

          if (!normalized.id || !normalized.file) return null;

          if (itemType === "food") {
            normalized.petXpGain = toNonNegativeNumber(safe.petXpGain, (fallback && fallback.petXpGain) || 20);
          }

          return normalized;
        })
        .filter(Boolean);
    }

    function normalizePetBackgroundCatalog(items) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          const safe = item || {};
          const fallback = DEFAULT_STAGE_BACKGROUNDS[index] || DEFAULT_STAGE_BACKGROUNDS[0] || {};
          const fileName = String(safe.file || safe.fileName || fallback.fileName || "").trim();
          if (!fileName) return null;

          return {
            id: String(safe.id || fallback.id || ("bg" + (index + 1))),
            name: String(safe.name || fallback.name || ("Nền " + (index + 1))),
            fileName: fileName,
            unlockCondition: normalizeUnlockCondition(safe.unlockCondition || { type: "level", value: 1 }),
          };
        })
        .filter(Boolean);
    }

    function isBackgroundUnlocked(background) {
      const condition = background && background.unlockCondition
        ? background.unlockCondition
        : { type: "level", value: 1 };
      return isUnlockConditionSatisfied(condition);
    }

    function firstUnlockedBackgroundIndex() {
      for (let i = 0; i < STAGE_BACKGROUNDS.length; i++) {
        if (isBackgroundUnlocked(STAGE_BACKGROUNDS[i])) {
          return i;
        }
      }
      return 0;
    }

    function ensureValidBackgroundSelection() {
      if (!Array.isArray(STAGE_BACKGROUNDS) || STAGE_BACKGROUNDS.length === 0) {
        STAGE_BACKGROUNDS = DEFAULT_STAGE_BACKGROUNDS.slice();
      }

      const maxIndex = STAGE_BACKGROUNDS.length - 1;
      let nextIndex = parseInt(state.selectedStageBackgroundIndex, 10);
      if (!Number.isFinite(nextIndex)) {
        nextIndex = 0;
      }
      nextIndex = Math.max(0, Math.min(maxIndex, nextIndex));

      if (!isBackgroundUnlocked(STAGE_BACKGROUNDS[nextIndex])) {
        nextIndex = firstUnlockedBackgroundIndex();
      }

      state.selectedStageBackgroundIndex = nextIndex;
    }

    function normalizeVariantUnlockCondition(unlockCondition) {
      return normalizeUnlockCondition(unlockCondition);
    }

    function normalizePetVariantsFromServer(items) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          const safe = item || {};
          const fallback = DEFAULT_PET_VARIANTS[index] || DEFAULT_PET_VARIANTS[0] || {};
          const id = String(safe.id || fallback.id || "").trim();
          const level1 = String(safe.level1 || fallback.level1 || DEFAULT_LEVEL1_FILE).trim();
          const level2 = String(safe.level2 || fallback.level2 || "").trim();
          if (!id || !level1) return null;

          let scalePercent = toNonNegativeNumber(safe.scalePercent, 100);
          scalePercent = Math.max(40, Math.min(200, scalePercent));

          return {
            id: id,
            name: String(safe.name || fallback.name || ("Pet " + (index + 1))),
            tone: String(safe.tone || fallback.tone || "#7c8cff"),
            stageBackground: String(safe.stageBackground || fallback.stageBackground || "bg-1.webp"),
            level1: level1,
            level2: level2,
            eyeOpen: String(safe.eyeOpen || fallback.eyeOpen || ""),
            eyeClosed: String(safe.eyeClosed || fallback.eyeClosed || ""),
            description: String(safe.description || fallback.description || ""),
            unlockCondition: normalizeVariantUnlockCondition(safe.unlockCondition),
            scalePercent: scalePercent,
            secondPetPriceXqp: Math.max(0, toNonNegativeNumber(safe.secondPetPriceXqp, 500)),
          };
        })
        .filter(Boolean);
    }

    function getVariantIdByIndex(index) {
      if (!Array.isArray(PET_VARIANTS) || index < 0 || index >= PET_VARIANTS.length) {
        return "";
      }
      const variant = PET_VARIANTS[index] || {};
      return String(variant.id || "").trim();
    }

    function getVariantIndexById(variantId) {
      const targetId = String(variantId || "").trim();
      if (!targetId || !Array.isArray(PET_VARIANTS)) return -1;
      return PET_VARIANTS.findIndex(function (variant) {
        return String((variant && variant.id) || "").trim() === targetId;
      });
    }

    function normalizeOwnedVariantIds(rawOwnedVariantIds, fallbackVariantId) {
      const unique = [];
      if (Array.isArray(rawOwnedVariantIds)) {
        rawOwnedVariantIds.forEach(function (id) {
          const safeId = String(id || "").trim();
          if (!safeId) return;
          if (unique.indexOf(safeId) >= 0) return;
          unique.push(safeId);
        });
      }

      const safeFallback = String(fallbackVariantId || "").trim();
      if (safeFallback && unique.indexOf(safeFallback) < 0) {
        unique.unshift(safeFallback);
      }

      const maxOwned = Math.max(1, Math.min(MAX_OWNED_PET_VARIANTS, PET_VARIANTS.length || MAX_OWNED_PET_VARIANTS));
      return unique.slice(0, maxOwned);
    }

    function isVariantOwned(variantId) {
      const safeVariantId = String(variantId || "").trim();
      if (!safeVariantId) return false;
      return state.ownedVariantIds.indexOf(safeVariantId) >= 0;
    }

    function canOwnMoreVariants() {
      const totalVariants = Array.isArray(PET_VARIANTS) ? PET_VARIANTS.length : 0;
      if (totalVariants <= 0) return false;
      return (state.ownedVariantIds || []).length < totalVariants;
    }

    function syncLockedVariantByCurrentIndex() {
      const currentVariantId = getVariantIdByIndex(state.currentIndex);
      if (!currentVariantId) return;

      state.ownedVariantIds = normalizeOwnedVariantIds(
        state.ownedVariantIds,
        currentVariantId,
      );
      const firstOwnedVariantId = state.ownedVariantIds[0] || "";
      if (state.lockedVariantId !== firstOwnedVariantId) {
        state.lockedVariantId = firstOwnedVariantId;
        queuePetConfigAutoSave();
      }
    }

    function enforceLockedVariantSelection() {
      const currentVariantId = getVariantIdByIndex(state.currentIndex);
      state.ownedVariantIds = normalizeOwnedVariantIds(
        state.ownedVariantIds,
        currentVariantId || state.lockedVariantId,
      );

      if (!isVariantOwned(currentVariantId)) {
        const fallbackOwnedId = state.ownedVariantIds[0] || "";
        const ownedIndex = getVariantIndexById(fallbackOwnedId);
        if (ownedIndex >= 0) {
          state.currentIndex = ownedIndex;
        }
      }

      state.selectionLocked = false;
      state.lockedVariantId = state.ownedVariantIds[0] || currentVariantId || "";
    }

    function getTopicProgressFromCache(topicId) {
      if (!topicId || !window.globalTopicsCache || !window.globalTopicsCache.progress) {
        return null;
      }

      return window.globalTopicsCache.progress[topicId] || null;
    }

    function isPetVariantUnlocked(variant) {
      const condition = variant && variant.unlockCondition ? variant.unlockCondition : { type: "level", value: 1 };
      return isUnlockConditionSatisfied(condition);
    }

    function updatePetCatalogHints() {
      const accessoryHint = document.querySelector("#petAccessoryPopover .pet-accessory-hint");
      const foodHint = document.querySelector("#petFoodPopover .pet-accessory-hint");

      if (accessoryHint) {
        accessoryHint.textContent = "Tối đa 2 / " + ACCESSORY_ITEMS.length + " phụ kiện";
      }
      if (foodHint) {
        foodHint.textContent = FOOD_ITEMS.length + " món";

    function buildSelectedAccessoryFromCatalog(fileName) {
      const safeFileName = String(fileName || "").trim();
      if (!safeFileName) return null;

      const catalogItem = getAccessoryItemByFileName(safeFileName);
      if (!catalogItem) return null;

      const defaultPosition = normalizeAccessoryPositionMode(catalogItem.positionMode || "center");
      const finalPosition = resolveAccessoryPosition(safeFileName, defaultPosition);
      const profiles = normalizeAccessoryPositionProfiles(catalogItem.positionProfiles, catalogItem);
      const activeProfile = profiles[finalPosition] || profiles.center;

      return {
        fileName: safeFileName,
        position: finalPosition,
        positionMode: defaultPosition,
        offsetX: activeProfile.offsetX,
        offsetY: activeProfile.offsetY,
        scalePercent: activeProfile.scalePercent,
        rotDeg: activeProfile.rotDeg || 0,
        positionProfiles: profiles,
      };
    }

    function getPersistedSelectedAccessories() {
      return (state.selectedAccessories || [])
        .map(function (item) {
          if (typeof item === "string") {
            return { fileName: String(item).trim() };
          }
          const safe = item || {};
          return { fileName: String(safe.fileName || "").trim() };
        })
        .filter(function (item) {
          return !!item.fileName;
        });
    }

    function syncSelectedAccessoriesWithCatalog() {
      const allowedFiles = new Set(
        ACCESSORY_ITEMS.map(function (item) {
          return item.file;
        })
      );

      const nextSelected = [];
      (state.selectedAccessories || []).forEach(function (item) {
        const fileName =
          typeof item === "string"
            ? String(item || "").trim()
            : String((item && item.fileName) || "").trim();
        if (!fileName || !allowedFiles.has(fileName)) return;
        if (nextSelected.some(function (selected) { return selected.fileName === fileName; })) return;

        const normalizedItem = buildSelectedAccessoryFromCatalog(fileName);
        if (normalizedItem) {
          nextSelected.push(normalizedItem);
        }
      });

      state.selectedAccessories = nextSelected.slice(0, MAX_ACCESSORIES_PER_PET);

      if (!state.selectedAccessories.length) {
        state.selectedAccessory = "";
        state.accessoryPosition = "center";
        return;
      }

      if (state.selectedAccessory && !allowedFiles.has(state.selectedAccessory)) {
        state.selectedAccessory = state.selectedAccessories[0]
          ? state.selectedAccessories[0].fileName
          : "";
      }

      if (!state.selectedAccessory) {
        state.selectedAccessory = state.selectedAccessories[0].fileName;
      }

      const activeAccessory = resolveActiveAccessory();
      state.accessoryPosition = activeAccessory ? activeAccessory.position : "center";
    }

    function loadPetItemCatalogFromServer() {
      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      ) {
        updatePetCatalogHints();
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || result.success !== true) {
            state.catalogLoaded = false;
            updatePetCatalogHints();
            return;
          }

          const loadedAccessories = normalizePetItemCatalog(result.accessories, "accessories");
          const loadedFood = normalizePetItemCatalog(result.food, "food");
          const loadedBackgrounds = normalizePetBackgroundCatalog(result.backgrounds);
          const loadedVariants = normalizePetVariantsFromServer(result.variants);
          const hasAnyData = loadedAccessories.length > 0 || loadedFood.length > 0 || loadedBackgrounds.length > 0;
          state.catalogLoaded = true;

          STAGE_BACKGROUNDS = loadedBackgrounds.length > 0
            ? loadedBackgrounds
            : DEFAULT_STAGE_BACKGROUNDS.slice();
          ensureValidBackgroundSelection();
          buildBackgroundButtons();

          if (!hasAnyData) {
            if (loadedVariants.length > 0) {
              PET_VARIANTS = loadedVariants;
              if (state.currentIndex >= PET_VARIANTS.length) state.currentIndex = 0;
              enforceLockedVariantSelection();
              syncLockedVariantByCurrentIndex();
              buildVariantButtons();
              renderPet();
            }
            updatePetCatalogHints();
            return;
          }

          ACCESSORY_ITEMS = loadedAccessories;
          FOOD_ITEMS = loadedFood;
          if (loadedVariants.length > 0) {
            PET_VARIANTS = loadedVariants;
            if (state.currentIndex >= PET_VARIANTS.length) state.currentIndex = 0;
          }
          enforceLockedVariantSelection();
          syncLockedVariantByCurrentIndex();
          syncSelectedAccessoriesWithCatalog();
          buildVariantButtons();
          buildAccessoryButtons();
          buildFoodButtons();
          updateAccessoryButtons();
          updateBackgroundButtons(state.selectedStageBackgroundIndex);
          renderAccessory();
          renderPet();
          updatePetCatalogHints();
        })
        .withFailureHandler(function () {
          updatePetCatalogHints();
        })
        .getPetItemsForAdmin();
    }

    function loadTopicProgressCacheForPet() {
      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      ) {
        return;
      }

      google.script.run
        .withSuccessHandler(function (response) {
          if (!response || response.success !== true) return;
          if (!window.globalTopicsCache) window.globalTopicsCache = {};
          window.globalTopicsCache.progress = response.progress || {};
          updateVariantButtons(state.currentIndex);
        })
        .withFailureHandler(function () {})
        .getUserTopicProgress();
    }

    /**
     * Register Service Worker for PET assets
     */
    async function registerPetServiceWorker() {
      if ('serviceWorker' in navigator) {
        try {
          // In GAS, the SW is served from the same domain via a route
          const scriptUrl = window.location.origin + window.location.pathname + "?path=sw.js";
          const registration = await navigator.serviceWorker.register(scriptUrl, {
            scope: window.location.pathname
          });
          console.log('PET Service Worker registered successfully:', registration.scope);
        } catch (error) {
          console.error('PET Service Worker registration failed:', error);
        }
      }
    }

    const blobUrlCache = {};

    async function fetchAssetUrl(fileName) {
      if (!fileName) return "";
      const directSrc = String(fileName).trim();
      if (/^(https?:|data:|blob:)/i.test(directSrc)) {
        blobUrlCache[fileName] = directSrc;
        return directSrc;
      }
      if (Object.prototype.hasOwnProperty.call(blobUrlCache, fileName)) {
        return blobUrlCache[fileName];
      }

      const normalizedFile = String(fileName).replace(/^\/+/, "");
      const candidateUrls = PET_ASSET_BASE_URLS.map(function (baseUrl) {
        return baseUrl + normalizedFile;
      });
      
      // If Cache API is not supported, fallback to first available network URL.
      if (!window.caches) {
        for (let i = 0; i < candidateUrls.length; i++) {
          try {
            const response = await fetch(candidateUrls[i]);
            if (response.ok) {
              blobUrlCache[fileName] = candidateUrls[i];
              return candidateUrls[i];
            }
          } catch (error) {
          }
        }
        blobUrlCache[fileName] = "";
        return "";
      }
      
      try {
        const cache = await caches.open(PET_CACHE_NAME);

        for (let i = 0; i < candidateUrls.length; i++) {
          const candidateUrl = candidateUrls[i];
          let response = await cache.match(candidateUrl);

          if (!response) {
            try {
              response = await fetch(candidateUrl);
              if (response && response.ok) {
                cache.put(candidateUrl, response.clone());
              }
            } catch (fetchError) {
              response = null;
            }
          }

          if (response && response.ok) {
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            blobUrlCache[fileName] = blobUrl;
            return blobUrl;
          }
        }

        console.warn("Asset not found on all configured hosts:", fileName, candidateUrls);
        blobUrlCache[fileName] = "";
        return "";
      } catch (error) {
        console.warn("Manual cache fetch failed for:", fileName, error);
        blobUrlCache[fileName] = "";
        return "";
      }
    }

    async function applySrcAsync(imgEl, fileName) {
      if (!imgEl) return;
      
      if (!fileName) {
        imgEl.classList.remove("is-visible");
        imgEl.style.display = "none"; 
        imgEl.src = "";
        imgEl.removeAttribute('data-original-file');
        return;
      }

      const url = await fetchAssetUrl(fileName);
      if (!url) {
        imgEl.classList.remove("is-visible");
        imgEl.style.display = "none";
        return;
      }

      // Check if current src is already the same or matches via original file attribute
      if (imgEl.src === url || (url.startsWith('blob:') && imgEl.getAttribute('data-original-file') === fileName)) {
        imgEl.style.display = "";
        imgEl.classList.add("is-visible");
        return;
      }

      const onImageLoad = function() {
        imgEl.style.display = "";
        imgEl.classList.add("is-visible");
        imgEl.removeEventListener("load", onImageLoad);
      };

      imgEl.addEventListener("load", onImageLoad);
      imgEl.onerror = function() { 
        console.error("Failed to load pet asset:", fileName, "at", url);
        imgEl.classList.remove("is-visible");
        imgEl.style.display = "none";
      };
      
      imgEl.setAttribute('data-original-file', fileName);
      imgEl.src = url;

      // Handle cases where image is already cached in browser memory
      if (imgEl.complete && imgEl.naturalWidth > 0) {
        onImageLoad();
      }
    }

    async function applyBgAsync(stageEl, fileName) {
      if (!stageEl || !fileName) {
        if (stageEl) stageEl.style.setProperty("--pet-stage-bg-image", "none");
        return;
      }
      const url = await fetchAssetUrl(fileName);
      const testImg = new Image();
      testImg.onload = function () {
        const safeUrl = String(url).replace(/"/g, '\"');
        stageEl.style.setProperty("--pet-stage-bg-image", 'url("' + safeUrl + '")');
      };
      testImg.src = url;
    }

    function clearInteractionClasses() {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return;

      });
    }

    function applyLevel1TiltByPointer(clientX) {
      const progressionLevel = getCurrentProgressLevel();
      if (progressionLevel !== 1 || state.isPressing || state.isRolling) return;

      const visualEl = document.getElementById("petVisual");
      const stageEl = document.getElementById("petStage");
      if (!visualEl || !stageEl) return;

      const stageRect = stageEl.getBoundingClientRect();
      const relX = (clientX - stageRect.left) / stageRect.width - 0.5;
      const rotateDeg = relX * -30;

      visualEl.style.transition = "transform 120ms ease-out";
      visualEl.style.transform = "rotate(" + rotateDeg.toFixed(2) + "deg)";
    }

    function clearLevel1Tilt() {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return;

      visualEl.style.transform = "";
      visualEl.style.transition = "";
    }

    function resolvePressZone(clientX) {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return "center";

      const rect = visualEl.getBoundingClientRect();
      const ratio = (clientX - rect.left) / rect.width;
      if (ratio < 0.34) return "left";
      if (ratio > 0.66) return "right";
      return "center";
    }

    function applyPressShape(zone) {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return;

      visualEl.classList.remove(
        "level2-press-left",
        "level2-press-right",
        "level2-press-center",
      );

      if (zone === "left") {
        visualEl.classList.add("level2-press-right");
      } else if (zone === "right") {
        visualEl.classList.add("level2-press-left");
      } else {
        visualEl.classList.add("level2-press-center");
      }
    }

    function updateVariantButtons(activeIndex) {
      const buttonsWrap = document.getElementById("petVariantButtons");
      if (!buttonsWrap) return;

      const buttons = buttonsWrap.querySelectorAll(".pet-variant-btn");
      buttons.forEach((button, index) => {
        const variant = PET_VARIANTS[index];
        const variantId = String((variant && variant.id) || "").trim();
        const unlocked = !!variant && isPetVariantUnlocked(variant);
        const owned = isVariantOwned(variantId);
        button.classList.toggle("active", index === activeIndex && owned);
        button.classList.toggle("is-owned", owned);
        button.classList.toggle("is-not-owned", !owned);
        button.classList.toggle("is-locked", !owned && !unlocked);
        button.setAttribute("aria-disabled", !owned && !unlocked ? "true" : "false");
      });
    }

    function renderAccessoryOverlays(bodyEl) {
      if (!bodyEl) return;

      bodyEl.querySelectorAll(".pet-entity-accessory").forEach(function (existing) {
        existing.remove();
      });

      const accessories = state.selectedAccessories || [];
      accessories.forEach((acc) => {
        const accImg = document.createElement("img");
        accImg.className = "pet-entity-accessory";
        applySrcAsync(accImg, acc.fileName);

        const catalogItem = getAccessoryItemByFileName(acc.fileName);
        const activePos = acc.position || "center";
        const profile = (catalogItem && catalogItem.positionProfiles)
          ? catalogItem.positionProfiles[activePos]
          : {};

        const baseLeft = activePos === "left" ? 42 : (activePos === "right" ? 58 : 50);
        accImg.style.left = baseLeft + "%";

        if (profile.offsetX) accImg.style.marginLeft = profile.offsetX + "px";
        if (profile.offsetY) accImg.style.marginTop = profile.offsetY + "px";

        const scaleVal = (profile.scalePercent || 100) / 100;
        const rotVal = profile.rotDeg || 0;
        accImg.style.transform = `translate(-50%, -50%) scale(${scaleVal}) rotate(${rotVal}deg)`;

        bodyEl.appendChild(accImg);
      });
    }

    function renderAccessory() {
      const world = document.getElementById("petStageWorld");
      if (!world) return;

      world.querySelectorAll(".pet-entity").forEach(function (entityEl) {
        const bodyEl = entityEl.querySelector(".pet-entity-body");
        if (!bodyEl) return;

        bodyEl.querySelectorAll(".pet-entity-accessory").forEach(function (node) {
          node.remove();
        });

        if (!entityEl.classList.contains("pet-lvl-3")) return;
        renderAccessoryOverlays(bodyEl);
      });
    }

    function renderPetEntities() {
      const worldEl = document.getElementById("petStageWorld");
      if (!worldEl) return;

      worldEl.innerHTML = "";
      state.petEntities = [];

      const activeVariantId = getActiveVariantId();

      (state.ownedVariantIds || []).forEach(function (variantId) {
        const safeVariantId = String(variantId || "").trim();
        const variantIndex = getVariantIndexById(safeVariantId);
        const variant = variantIndex >= 0 ? PET_VARIANTS[variantIndex] : null;
        if (!variant) return;

        const xp = getPetProgressXP(safeVariantId);
        const level = getProgressLevelByXP(xp);
        const progress = xp % 100;
        const progressPercent = Math.max(0, Math.min(100, Math.round((progress / 100) * 100)));
        const displayImage = level >= 3 ? (variant.level2 || variant.level1) : variant.level1;

        // Create entity element
        const entityEl = document.createElement("div");
        entityEl.className = "pet-entity";
        if (level === 1) entityEl.classList.add("pet-lvl-1");
        if (level === 2) entityEl.classList.add("pet-lvl-2");
        if (level >= 3) entityEl.classList.add("pet-lvl-3");
        if (safeVariantId === activeVariantId) entityEl.classList.add("is-active");
        entityEl.setAttribute("data-variant-id", safeVariantId);

        // Tooltip (Simplified: Name • Lv X • XP)
        const tooltipEl = document.createElement("div");
        tooltipEl.className = "pet-entity-tooltip";
        tooltipEl.innerHTML = `
          <span class="pet-entity-name">${getPetDisplayNameByVariantId(safeVariantId)} • Lv ${level} • ${progress}/100 XP</span>
          <span class="pet-entity-tooltip-progress-track" aria-hidden="true">
            <span class="pet-entity-tooltip-progress-fill" style="width:${progressPercent}%"></span>
          </span>
        `;
        entityEl.appendChild(tooltipEl);

        // Body
        const bodyEl = document.createElement("div");
        bodyEl.className = "pet-entity-body";
        
        const imgEl = document.createElement("img");
        imgEl.className = "pet-entity-img";
        applySrcAsync(imgEl, displayImage);
        bodyEl.appendChild(imgEl);

        if (level >= 3) {
          renderAccessoryOverlays(bodyEl);
        }

        entityEl.appendChild(bodyEl);
        worldEl.appendChild(entityEl);

        // Initial position (randomized within the bottom 3/4 area)
        const stageWidth = worldEl.clientWidth || 400;
        const stageHeight = worldEl.clientHeight || 400;
        const startX = Math.random() * (stageWidth - 100);
        const startY = (stageHeight * 0.25) + Math.random() * (stageHeight * 0.75 - 100);
        
        entityEl.style.left = startX + "px";
        entityEl.style.top = startY + "px";

        const petState = {
          id: safeVariantId,
          el: entityEl,
          level: level,
          x: startX,
          y: startY,
          vx: (Math.random() - 0.5) * 1,
          vy: (Math.random() - 0.5) * 0.5,
          isHovered: false,
          isRolling: false,
          isPressed: false,
          direction: Math.random() >= 0.5 ? 1 : -1,
          speed: level >= 3 ? 1.15 : 1.05,
          rollPhase: "",
          rollReturnX: startX,
          rollReturnY: startY,
          laneY: startY,
          rollVelocity: 0,
          isTripleHopping: false,
          collisionCooldownUntil: 0,
          lastJumpTime: Date.now() + Math.random() * 1600,
          lastHopTime: Date.now() + Math.random() * 900,
        };

        state.petEntities.push(petState);

        // Events
        entityEl.addEventListener("mouseenter", () => {
          petState.isHovered = true;
          showHeaderProgressCard(safeVariantId);
        });
        entityEl.addEventListener("mouseleave", () => {
          petState.isHovered = false;
          entityEl.classList.remove("tilt-left", "tilt-right");
          hideHeaderProgressCard();
        });

        entityEl.addEventListener("mousemove", (event) => {
          if (petState.level !== 1) return;
          const rect = entityEl.getBoundingClientRect();
          if (!rect.width) return;

          const isOnLeftSide = (event.clientX - rect.left) < rect.width / 2;
          entityEl.classList.toggle("tilt-right", isOnLeftSide);
          entityEl.classList.toggle("tilt-left", !isOnLeftSide);
        });
        
        entityEl.addEventListener("click", () => {
          // Focus this pet in header
          state.currentIndex = variantIndex; 
          updatePetLevelProgressUI(safeVariantId);

          if (petState.level === 2 && !petState.isTripleHopping) {
            petState.isHovered = false;
            hideHeaderProgressCard();
            startLevel2RollAcrossStage(petState, worldEl);
          }
        });

        // Drag & Drop Feeding
        entityEl.addEventListener("dragover", (e) => {
          e.preventDefault();
          entityEl.classList.add("drag-over");
        });

        entityEl.addEventListener("dragleave", () => {
          entityEl.classList.remove("drag-over");
        });

        entityEl.addEventListener("drop", async (e) => {
          e.preventDefault();
          entityEl.classList.remove("drag-over");
          
          const foodFile = e.dataTransfer.getData("text/pet-food-file");
          if (!foodFile) return;
          
          const foodItem = FOOD_ITEMS.find(f => f.file === foodFile);
          if (foodItem) {
            feedPetVariant(safeVariantId, foodItem);
          }
        });

        entityEl.addEventListener("mousedown", (e) => {
          if (petState.level >= 3) {
            petState.isPressed = true;
            entityEl.classList.add("is-pressed");
          }
        });

        entityEl.addEventListener("dblclick", (e) => {
          e.preventDefault();
          state.currentIndex = variantIndex;
          renderPet(); // Re-renders the world and updates active state
          renamePetByVariantId(safeVariantId);
        });
      });

    }

    function getPetStageBounds(worldEl) {
      const width = Math.max(0, worldEl ? worldEl.clientWidth : 0);
      const height = Math.max(0, worldEl ? worldEl.clientHeight : 0);
      const petSize = 100;

      return {
        minX: 0,
        maxX: Math.max(0, width - petSize),
        minY: Math.max(0, Math.round(height * 0.25)),
        maxY: Math.max(0, height - petSize),
        width: width,
      };
    }

    function clampPetToBounds(pet, bounds) {
      pet.x = Math.max(bounds.minX, Math.min(bounds.maxX, pet.x));
      pet.y = Math.max(bounds.minY, Math.min(bounds.maxY, pet.y));
    }

    function triggerPetHop(pet) {
      pet.el.classList.remove("pet-jump");
      void pet.el.offsetWidth;
      pet.el.classList.add("pet-jump");
    }

    function startLevel2RollAcrossStage(pet, worldEl) {
      const bounds = getPetStageBounds(worldEl);
      pet.isTripleHopping = true;
      pet.isRolling = false;
      pet.rollPhase = "";
      pet.rollReturnX = pet.x;
      pet.rollReturnY = Math.max(bounds.minY, Math.min(bounds.maxY, pet.y));
      pet.laneY = pet.rollReturnY;
      pet.y = pet.rollReturnY;

      triggerPetHop(pet);
      setTimeout(function () { if (pet.isTripleHopping) triggerPetHop(pet); }, 220);
      setTimeout(function () { if (pet.isTripleHopping) triggerPetHop(pet); }, 440);

      setTimeout(function () {
        const minDelta = 80;
        let nextX = Math.random() * (bounds.maxX - bounds.minX) + bounds.minX;
        if (Math.abs(nextX - pet.rollReturnX) < minDelta) {
          nextX = Math.min(bounds.maxX, Math.max(bounds.minX, pet.rollReturnX + (nextX > pet.rollReturnX ? minDelta : -minDelta)));
        }
        pet.x = nextX;
        pet.laneY = Math.max(bounds.minY, Math.min(bounds.maxY, pet.laneY + (Math.random() - 0.5) * 34));
        pet.y = pet.laneY;
        triggerPetHop(pet);
        pet.isTripleHopping = false;
      }, 680);

      pet.el.style.left = pet.x + "px";
      pet.el.style.top = pet.y + "px";
    }

    function updatePetWorld() {
      if (!state.petEntities || state.petEntities.length === 0) return;

      const worldEl = document.getElementById("petStageWorld");
      if (!worldEl) return;

      const now = Date.now();
      const bounds = getPetStageBounds(worldEl);

      state.petEntities.forEach(pet => {
        if (pet.isHovered || pet.isPressed) return;

        // Enforce movement area: lower 3/4 of pet stage.
        clampPetToBounds(pet, bounds);

        if (pet.level === 1) {
          pet.el.style.left = pet.x + "px";
          pet.el.style.top = pet.y + "px";
          return;
        }

        if (pet.level === 2) {
          if (pet.isTripleHopping) {
            pet.el.style.left = pet.x + "px";
            pet.el.style.top = pet.y + "px";
            return;
          }

          pet.y = Math.max(bounds.minY, Math.min(bounds.maxY, pet.laneY));

          if (now - pet.lastHopTime > 850) {
            pet.lastHopTime = now;
            triggerPetHop(pet);
          }

          pet.el.style.left = pet.x + "px";
          pet.el.style.top = pet.y + "px";
          return;
        }

        // Level 3+: jump forward/backward inside lower 3/4.
        const jumpDelay = 900 + Math.random() * 1100;
        if (now - pet.lastJumpTime > jumpDelay) {
          pet.lastJumpTime = now;

          const moveX = pet.direction * (26 + Math.random() * 42);
          const moveY = (Math.random() - 0.5) * 32;
          pet.x += moveX;
          pet.y += moveY;

          if (pet.x <= bounds.minX || pet.x >= bounds.maxX) {
            pet.direction *= -1;
          }
          clampPetToBounds(pet, bounds);
          triggerPetHop(pet);
        }

        pet.el.style.left = pet.x + "px";
        pet.el.style.top = pet.y + "px";
      });

      checkCollisions();
    }

    function checkCollisions() {
      const now = Date.now();
      const entities = state.petEntities;
      for (let i = 0; i < entities.length; i++) {
        for (let j = i + 1; j < entities.length; j++) {
          const p1 = entities[i];
          const p2 = entities[j];

          if (p1.level < 2 || p2.level < 2) continue;
          if (p1.isRolling || p2.isRolling) continue;
          if (p1.isTripleHopping || p2.isTripleHopping) continue;
          if ((p1.collisionCooldownUntil || 0) > now || (p2.collisionCooldownUntil || 0) > now) continue;

          const dx = p1.x - p2.x;
          const dy = p1.y - p2.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < 70) { // Collision threshold
            const safeDistance = Math.max(1, distance);
            const nx = dx / safeDistance;
            const push = (70 - safeDistance) / 2 + 34;

            p1.x += nx * push;
            p2.x -= nx * push;
            p1.direction = nx >= 0 ? 1 : -1;
            p2.direction = -p1.direction;
            p1.collisionCooldownUntil = now + 900;
            p2.collisionCooldownUntil = now + 900;

            triggerCollisionDoubleJump(p1);
            triggerCollisionDoubleJump(p2);
          }
        }
      }
    }

    function triggerCollisionDoubleJump(pet) {
      if (pet.el.classList.contains("pet-collision-double-jump")) return;
      
      pet.el.classList.add("pet-collision-double-jump");
      setTimeout(() => {
        pet.el.classList.remove("pet-collision-double-jump");
      }, 800);
    }

    function showHeaderProgressCard(variantId) {
      const cardEl = document.querySelector(".pet-level-progress-card");
      if (cardEl) {
        cardEl.classList.add("is-hover-visible");
      }
      updatePetLevelProgressUI(variantId);
    }

    function hideHeaderProgressCard() {
      const cardEl = document.querySelector(".pet-level-progress-card");
      if (cardEl) {
        cardEl.classList.remove("is-hover-visible");
      }
    }

    function updatePetLevelProgressUI(variantId) {
      const activeVariantId = String(variantId || getActiveVariantId() || "").trim();
      const xp = getPetProgressXP(activeVariantId);
      const level = getProgressLevelByXP(xp);
      const currentXPProgress = xp % 100;
      const progressPercent = Math.max(0, Math.min(100, Math.round((currentXPProgress / 100) * 100)));
      const petName = getPetDisplayNameByVariantId(activeVariantId);

      const levelTextEl = document.getElementById("petHeaderLevelText");
      if (levelTextEl) {
        levelTextEl.textContent = `${petName} • Lv ${level} • ${currentXPProgress}/100 XP`;
      }

      const progressFillEl = document.getElementById("petHeaderLevelProgressFill");
      if (progressFillEl) {
        progressFillEl.style.width = progressPercent + "%";
      }

      const progressValueEl = document.getElementById("petHeaderLevelProgressValue");
      if (progressValueEl) {
        progressValueEl.textContent = progressPercent + "%";
      }
    }

    function showPetLevelUpPopup(variantId, newLevel) {
      if (newLevel > 3) return; // Only notify for levels 1, 2, 3

      const safeVariantId = String(variantId || "").trim();
      const variantIndex = getVariantIndexById(safeVariantId);
      const variant = variantIndex >= 0 ? PET_VARIANTS[variantIndex] : null;
      if (!variant) return;

      const unlockedImageFile = newLevel >= 3
        ? (variant.level2 || variant.level1)
        : variant.level1;

      const existing = document.getElementById("petLevelUpOverlay");
      if (existing) existing.remove();

      const overlayEl = document.createElement("div");
      overlayEl.id = "petLevelUpOverlay";
      overlayEl.className = "pet-levelup-overlay";
      overlayEl.innerHTML =
        '<div class="pet-levelup-dialog" role="dialog" aria-modal="true">' +
          '<h3 class="pet-levelup-title">' + sanitizePetName(getPetDisplayNameByVariantId(safeVariantId)) + ' đã lên Level ' + newLevel + '!</h3>' +
          '<p class="pet-levelup-subtitle">Hình dạng mới của PET vừa được mở khóa.</p>' +
          '<div class="pet-levelup-preview"><img id="petLevelUpPreviewImg" alt="Unlocked form"></div>' +
          '<button type="button" class="pet-levelup-close" id="petLevelUpCloseBtn">Đã hiểu</button>' +
        '</div>';

      document.body.appendChild(overlayEl);

      const previewImgEl = document.getElementById("petLevelUpPreviewImg");
      if (previewImgEl) {
        applySrcAsync(previewImgEl, unlockedImageFile);
      }

      const closeBtn = document.getElementById("petLevelUpCloseBtn");
      if (closeBtn) {
        closeBtn.addEventListener("click", function () {
          overlayEl.remove();
        });
      }

      overlayEl.addEventListener("click", function (event) {
        if (event.target === overlayEl) {
          overlayEl.remove();
        }
      });
    }

    function deductXQPForFood(priceXqp) {
      return new Promise(function (resolve) {
        const cost = Math.max(0, toNonNegativeNumber(priceXqp, 0));
        if (cost <= 0) {
          resolve({ success: true, newTotalXQP: state.totalXQP });
          return;
        }

        const userEmail = window.currentUser && window.currentUser.email
          ? String(window.currentUser.email).trim()
          : "";
        if (!userEmail || typeof google === "undefined" || !google.script || !google.script.run) {
          resolve({ success: false, message: "Không thể kết nối server để trừ XQP" });
          return;
        }

        google.script.run
          .withSuccessHandler(function (result) {
            resolve(result || { success: false, message: "Không thể trừ XQP" });
          })
          .withFailureHandler(function (error) {
            resolve({ success: false, message: error && error.message ? error.message : String(error) });
          })
          .updateUserXQP(userEmail, -cost, "pet_food");
      });
    }

    async function feedPetVariant(variantId, foodItem) {
      const safeVariantId = String(variantId || getActiveVariantId() || "").trim();
      if (!safeVariantId || !foodItem) return;
      if (state.feedingInProgress) return;

      const lockedNow = isProgressLevelLocked(foodItem);
      if (lockedNow) {
        if (typeof showToast === "function") {
          showToast(
            "Vật phẩm chưa mở khóa. Cần: " + describeUnlockCondition(foodItem.unlockCondition),
            "warning",
          );
        }
        return;
      }

      const gainedXP = Math.max(0, toNonNegativeNumber(foodItem.petXpGain, 20));
      const foodCost = Math.max(0, toNonNegativeNumber(foodItem.priceXqp, 0));
      const safeFoodName = String(foodItem.name || "Food");

      if ((state.totalXQP || 0) < foodCost) {
        if (typeof showToast === "function") {
          showToast("Không đủ XQP để cho ăn " + safeFoodName, "warning");
        }
        return;
      }

      state.feedingInProgress = true;
      const deductionResult = await deductXQPForFood(foodCost);
      state.feedingInProgress = false;

      if (!deductionResult || deductionResult.success !== true) {
        if (typeof showToast === "function") {
          showToast((deductionResult && deductionResult.message) || "Không thể trừ XQP", "error");
        }
        return;
      }

      state.totalXQP = Math.max(0, toNonNegativeNumber(deductionResult.newTotalXQP, state.totalXQP - foodCost));
      if (window.currentUser) {
        window.currentUser.totalXQP = state.totalXQP;
      }

      const xqpDisplay = document.getElementById("petXQPBalance");
      if (xqpDisplay) {
        xqpDisplay.textContent = Number(state.totalXQP).toLocaleString();
      }

      const previousXP = getPetProgressXP(safeVariantId);
      const previousLevel = getProgressLevelByXP(previousXP);
      const nextXP = previousXP + gainedXP;
      setPetProgressXP(safeVariantId, nextXP);
      const currentLevel = getProgressLevelByXP(nextXP);

      if (currentLevel > previousLevel) {
        showPetLevelUpPopup(safeVariantId, currentLevel);
        if (typeof showToast === "function") {
          showToast("PET đã lên Level " + currentLevel + "!", "success");
        }
      } else if (typeof showToast === "function") {
        showToast("PET ăn " + safeFoodName + " (+" + gainedXP + " XP, -" + foodCost + " XQP)", "info");
      }

      renderPet();
      queuePetConfigAutoSave();
    }

    function feedPet(xpGain, foodName) {
      const activeVariantId = getActiveVariantId();
      if (!activeVariantId) return;
      feedPetVariant(activeVariantId, {
        name: foodName || "Food",
        petXpGain: xpGain,
        priceXqp: 0,
        unlockCondition: { type: "level", value: 1 },
      });
    }

    function resetPetProgression() {
      const nextEggIndex = PET_VARIANTS.length
        ? Math.floor(Math.random() * PET_VARIANTS.length)
        : 0;
      const nextVariantId = getVariantIdByIndex(nextEggIndex);

      state.progressionXP = 0;
      state.currentIndex = nextEggIndex;
      state.selectedAccessories = [];
      state.selectedStageBackgroundIndex = 0;
      state.selectionLocked = false;
      state.ownedVariantIds = normalizeOwnedVariantIds([], nextVariantId);
      state.lockedVariantId = state.ownedVariantIds[0] || nextVariantId;
      state.petProgressByVariantId = {};
      state.petNamesByVariantId = {};
      ensurePetProgressAndNamesMaps();
      setPetProgressXP(nextVariantId, 0);
      
      if (typeof showToast === "function") {
        showToast("Đã reset PET về Level 1 và chọn ngẫu nhiên trứng mới", "info");
      }
      
      renderPet();
      updateSaveButtonUI();
      queuePetConfigAutoSave();
    }

    function buildPersistedConfig() {
      ensurePetProgressAndNamesMaps();
      const progressionXP = getPetProgressXP(getActiveVariantId());
      const currentVariantId = String(getVariantIdByIndex(state.currentIndex) || state.lockedVariantId || "").trim();
      const ownedVariantIds = normalizeOwnedVariantIds(state.ownedVariantIds, currentVariantId);
      const lockedVariantId = String(
        ownedVariantIds[0] || currentVariantId,
      ).trim();

      const safeProgressByVariant = {};
      ownedVariantIds.forEach(function (variantId) {
        const safeVariantId = String(variantId || "").trim();
        if (!safeVariantId) return;
        safeProgressByVariant[safeVariantId] = getPetProgressXP(safeVariantId);
      });

      const safeNamesByVariant = {};
      ownedVariantIds.forEach(function (variantId) {
        const safeVariantId = String(variantId || "").trim();
        if (!safeVariantId) return;
        safeNamesByVariant[safeVariantId] = getPetDisplayNameByVariantId(safeVariantId);
      });

      return {
        currentIndex: state.currentIndex,
        isLevelTwo: state.isLevelTwo,
        selectedAccessories: getPersistedSelectedAccessories(),
        selectedStageBackgroundIndex: state.selectedStageBackgroundIndex,
        progressionXP: progressionXP,
        progressionLevel: Math.floor(progressionXP / 100) + 1,
        progressionXPProgress: progressionXP % 100,
        selectionLocked: false,
        currentVariantId: currentVariantId,
        ownedVariantIds: ownedVariantIds,
        ownedPetCount: ownedVariantIds.length,
        lockedVariantId: lockedVariantId,
        petProgressByVariantId: safeProgressByVariant,
        petNamesByVariantId: safeNamesByVariant,
        petConfigVersion: PET_CONFIG_VERSION,
      };
    }

    function isDirty() {
      if (!state.lastSavedConfig) return false;

      const currentSelected = JSON.stringify(getPersistedSelectedAccessories());
      const savedSelected = JSON.stringify(Array.isArray(state.lastSavedConfig.selectedAccessories) ? state.lastSavedConfig.selectedAccessories : []);
      const currentXP = toNonNegativeNumber(getPetProgressXP(getActiveVariantId()), 0);
      const savedXP = toNonNegativeNumber(state.lastSavedConfig.progressionXP, 0);
      const currentVariantId = String(getVariantIdByIndex(state.currentIndex) || "").trim();
      const savedVariantId = String(
        state.lastSavedConfig.currentVariantId ||
          getVariantIdByIndex(state.lastSavedConfig.currentIndex) ||
          state.lastSavedConfig.lockedVariantId ||
          "",
      ).trim();
      const currentOwnedVariantIds = JSON.stringify(
        normalizeOwnedVariantIds(state.ownedVariantIds, currentVariantId),
      );
      const savedOwnedVariantIds = JSON.stringify(
        normalizeOwnedVariantIds(
          state.lastSavedConfig.ownedVariantIds,
          savedVariantId,
        ),
      );
      const currentPetProgressByVariant = {};
      normalizeOwnedVariantIds(state.ownedVariantIds, currentVariantId).forEach(function (variantId) {
        const safeVariantId = String(variantId || "").trim();
        if (!safeVariantId) return;
        currentPetProgressByVariant[safeVariantId] = getPetProgressXP(safeVariantId);
      });
      const savedPetProgressByVariant = state.lastSavedConfig.petProgressByVariantId || {};
      const currentPetNamesByVariant = {};
      normalizeOwnedVariantIds(state.ownedVariantIds, currentVariantId).forEach(function (variantId) {
        const safeVariantId = String(variantId || "").trim();
        if (!safeVariantId) return;
        currentPetNamesByVariant[safeVariantId] = getPetDisplayNameByVariantId(safeVariantId);
      });
      const savedPetNamesByVariant = state.lastSavedConfig.petNamesByVariantId || {};
      
      return state.currentIndex !== state.lastSavedConfig.currentIndex ||
             state.isLevelTwo !== state.lastSavedConfig.isLevelTwo ||
            currentSelected !== savedSelected ||
             state.selectedStageBackgroundIndex !== state.lastSavedConfig.selectedStageBackgroundIndex ||
             currentXP !== savedXP ||
             currentVariantId !== savedVariantId ||
             currentOwnedVariantIds !== savedOwnedVariantIds ||
             JSON.stringify(currentPetProgressByVariant) !== JSON.stringify(savedPetProgressByVariant) ||
             JSON.stringify(currentPetNamesByVariant) !== JSON.stringify(savedPetNamesByVariant);
    }

    function updateSaveButtonUI() {
      const saveBtn = document.getElementById("petSaveConfigBtn");
      if (!saveBtn) return;
      
      const dirty = isDirty();
      saveBtn.classList.toggle("is-dirty", dirty);
    }

    function savePetConfigToServer(options) {
      return new Promise((resolve) => {
        const opts = options || {};
        const silent = !!opts.silent;
        const userId = window.currentUser?.userId;
        if (!userId || typeof google === "undefined" || !google.script?.run) {
           resolve({ success: false, message: "No auth" });
           return;
        }

        const config = buildPersistedConfig();

        const saveBtn = document.getElementById("petSaveConfigBtn");
        if (saveBtn) saveBtn.classList.add("loading");

        google.script.run
          .withSuccessHandler(function(result) {
            if (saveBtn) saveBtn.classList.remove("loading");
            if (result && result.success) {
              state.lastSavedConfig = JSON.parse(JSON.stringify(config));
              updateSaveButtonUI();
              if (!silent && typeof showToast === "function") showToast("Đã lưu cấu hình PET!", "success");
              resolve(result);
            } else {
              if (!silent && typeof showToast === "function") showToast("Lỗi lưu cấu hình: " + (result?.message || "Unknown"), "error");
              resolve(result || { success: false });
            }
          })
          .withFailureHandler(function(err) {
            if (saveBtn) saveBtn.classList.remove("loading");
            if (!silent && typeof showToast === "function") showToast("Lỗi kết nối server: " + err, "error");
            resolve({ success: false, message: err });
          })
          .savePetConfig(userId, config);
      });
    }

    function queuePetConfigAutoSave() {
      if (!window.currentUser?.userId) return;
      if (state.autoSaveTimeoutId) {
        clearTimeout(state.autoSaveTimeoutId);
      }
      state.autoSaveTimeoutId = setTimeout(function () {
        state.autoSaveTimeoutId = null;
        savePetConfigToServer({ silent: true });
      }, 500);
    }

    function loadPetConfigFromServer() {
      const userId = window.currentUser?.userId;
      if (!userId || typeof google === "undefined" || !google.script?.run) return;

      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success && result.config) {
            const config = result.config;
            const loadedIndex = parseInt(config.currentIndex, 10);
            if (Number.isFinite(loadedIndex) && loadedIndex >= 0) {
              state.currentIndex = loadedIndex;
            }
            state.isLevelTwo = !!config.isLevelTwo;
            const loadedCurrentVariantId = String(
              config.currentVariantId || config.lockedVariantId || getVariantIdByIndex(state.currentIndex) || "",
            ).trim();
            const currentIndexById = getVariantIndexById(loadedCurrentVariantId);
            if (currentIndexById >= 0) {
              state.currentIndex = currentIndexById;
            }
            state.selectionLocked = false;
            state.ownedVariantIds = normalizeOwnedVariantIds(
              config.ownedVariantIds,
              loadedCurrentVariantId || getVariantIdByIndex(state.currentIndex),
            );
            state.lockedVariantId = String(
              config.lockedVariantId || state.ownedVariantIds[0] || loadedCurrentVariantId || "",
            ).trim();
            state.selectedAccessories = Array.isArray(config.selectedAccessories) ? config.selectedAccessories : [];
            if (state.catalogLoaded) {
              syncSelectedAccessoriesWithCatalog();
            }
            const loadedBackgroundIndex = parseInt(config.selectedStageBackgroundIndex, 10);
            state.selectedStageBackgroundIndex = Number.isFinite(loadedBackgroundIndex)
              ? Math.max(0, loadedBackgroundIndex)
              : 0;

            const loadedProgressMap =
              config.petProgressByVariantId && typeof config.petProgressByVariantId === "object"
                ? config.petProgressByVariantId
                : {};
            const loadedNamesMap =
              config.petNamesByVariantId && typeof config.petNamesByVariantId === "object"
                ? config.petNamesByVariantId
                : {};

            state.petProgressByVariantId = {};
            state.petNamesByVariantId = {};

            state.ownedVariantIds.forEach(function (variantId) {
              const safeVariantId = String(variantId || "").trim();
              if (!safeVariantId) return;

              const variantXP = parseInt(loadedProgressMap[safeVariantId], 10);
              if (Number.isFinite(variantXP) && variantXP >= 0) {
                state.petProgressByVariantId[safeVariantId] = variantXP;
              }

              const variantName = loadedNamesMap[safeVariantId];
              if (typeof variantName === "string" && variantName.trim()) {
                state.petNamesByVariantId[safeVariantId] = sanitizePetName(variantName);
              }
            });

            // Backward compatibility for old single-progression schema.
            if (Object.keys(state.petProgressByVariantId).length === 0) {
              let fallbackXP = parseInt(config.progressionXP, 10);
              if (!(Number.isFinite(fallbackXP) && fallbackXP >= 0)) {
                const loadedLevel = parseInt(config.progressionLevel, 10);
                const loadedProgress = parseInt(config.progressionXPProgress, 10);
                if (Number.isFinite(loadedLevel)) {
                  const safeLevel = Math.max(1, loadedLevel);
                  const safeProgress = Number.isFinite(loadedProgress)
                    ? Math.max(0, Math.min(99, loadedProgress))
                    : 0;
                  fallbackXP = (safeLevel - 1) * 100 + safeProgress;
                } else {
                  fallbackXP = 0;
                }
              }
              const fallbackVariantId = state.ownedVariantIds[0] || loadedCurrentVariantId || getVariantIdByIndex(state.currentIndex);
              if (fallbackVariantId) {
                state.petProgressByVariantId[String(fallbackVariantId).trim()] = Math.max(0, toNonNegativeNumber(fallbackXP, 0));
              }
            }

            ensurePetProgressAndNamesMaps();

            enforceLockedVariantSelection();
            syncLockedVariantByCurrentIndex();

            state.lastSavedConfig = JSON.parse(JSON.stringify(buildPersistedConfig()));
            updateSaveButtonUI();

            // Re-render pet with loaded state
            renderPet();
          }
        })
        .getPetConfig(userId);
    }

    function updateSettingsPanelVisibility() {
      const panelEl = document.getElementById("petSettingsPopover");
      const toggleBtn = document.getElementById("petSettingsToggleBtn");
      const isVisible = !!state.settingsPanelOpen;
      if (panelEl) panelEl.classList.toggle("is-hidden", !isVisible);

    function getAccessoryRule(fileName) {
      // Runtime should follow admin-configured profiles exactly.
      return {};
    }

    function getAllowedAccessoryPositions(fileName) {
      const rule = getAccessoryRule(fileName);
      return rule.allowedPositions || ["left", "center", "right"];
    }

    function resolveAccessoryPosition(fileName, desiredPosition) {
      const rule = getAccessoryRule(fileName);
      if (rule.forcedPosition) return rule.forcedPosition;

      const allowed = getAllowedAccessoryPositions(fileName);
      if (allowed.indexOf(desiredPosition) >= 0) return desiredPosition;
      return allowed[0] || "center";
    }

    function getAccessoryImageElements() {
      return [1, 2, 3]
        .map(function (index) {
          return document.getElementById("petAccessoryImage" + index);
        })
        .filter(Boolean);
    }

    function getSelectedAccessoryIndex(fileName) {
      return state.selectedAccessories.findIndex(function (item) {
        return item.fileName === fileName;
      });
    }

    function getSelectedAccessoryByFile(fileName) {
      const index = getSelectedAccessoryIndex(fileName);
      if (index < 0) return null;
      return state.selectedAccessories[index];
    }

    function resolveActiveAccessory() {
      if (!state.selectedAccessory) return null;
      const selected = getSelectedAccessoryByFile(state.selectedAccessory);
      if (!selected) {
        state.selectedAccessory = "";
        return null;
      }
      return selected;
    }

    function clearAccessoryImage(accessoryImageEl) {
      if (!accessoryImageEl) return;
      accessoryImageEl.classList.remove("is-visible");
      accessoryImageEl.style.display = "none";
      accessoryImageEl.src = "";
      accessoryImageEl.removeAttribute('data-original-file');
    }

    function updateAccessoryPositionClasses(accessoryImageEl, fileName, desiredPosition, accessoryData) {
      if (!accessoryImageEl || !fileName) return "center";

      const accessoryCatalogItem = getAccessoryItemByFileName(fileName) || accessoryData;
      const positionMode = normalizeAccessoryPositionMode((accessoryCatalogItem && accessoryCatalogItem.positionMode) || "center");
      const finalPosition = resolveAccessoryPosition(fileName, desiredPosition || positionMode);
      const activeProfile = getAccessoryProfileByPosition(accessoryCatalogItem, finalPosition);

      const baseTop = 27;
      const baseLeftMap = {
        left: 42,
        center: 50,
        right: 58,
      };

      const topValue = baseTop;
      const leftValue = baseLeftMap[finalPosition] || 50;
      const rotValue = activeProfile.rotDeg || 0;
      const scaleValue = 1;

      accessoryImageEl.style.setProperty("--pet-accessory-top", topValue + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-left", leftValue + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-rot", rotValue + "deg");
      accessoryImageEl.style.setProperty("--pet-accessory-offset-x", (activeProfile.offsetX || 0) + "px");
      accessoryImageEl.style.setProperty("--pet-accessory-offset-y", (activeProfile.offsetY || 0) + "px");
      accessoryImageEl.style.setProperty("--pet-accessory-scale", String(scaleValue * ((activeProfile.scalePercent || 100) / 100)));

      return finalPosition;
    }

    function getAccessoryItemByFileName(fileName) {
      if (!fileName) return null;
      return ACCESSORY_ITEMS.find(function (item) {
        return item.file === fileName;
      }) || null;
    }

    function movePet(step) {

      state.currentIndex = (state.currentIndex + step + total) % total;

    function ensureCurrentVariantAccessible() {
      if (!Array.isArray(PET_VARIANTS) || PET_VARIANTS.length === 0) return;

      if (state.currentIndex < 0 || state.currentIndex >= PET_VARIANTS.length) {
        state.currentIndex = 0;
      }

      const currentVariant = PET_VARIANTS[state.currentIndex];
      const currentVariantId = String((currentVariant && currentVariant.id) || "").trim();
      if (currentVariant && isVariantOwned(currentVariantId)) {
        return;
      }

      const firstOwnedIndex = PET_VARIANTS.findIndex(function (variant) {
        const variantId = String((variant && variant.id) || "").trim();
        return isVariantOwned(variantId);
      });

      state.currentIndex = firstOwnedIndex >= 0 ? firstOwnedIndex : 0;
    }

    function requestPurchaseConfirmation(variantName, priceXqp) {
      return new Promise(function (resolve) {
        const safeName = String(variantName || "PET");
        const safePrice = Math.max(0, toNonNegativeNumber(priceXqp, 0));
        const message = "Bạn có chắc muốn mua " + safeName + " với giá " + safePrice + " XQP không?";

        if (typeof window.showAppConfirm === "function") {
          window.showAppConfirm(message, {
            title: "Xác nhận mua PET",
            confirmText: "Mua ngay",
            cancelText: "Hủy",
          }).then(function (ok) {
            resolve(!!ok);
          }).catch(function () {
            resolve(false);
          });
          return;
        }

        resolve(window.confirm(message));
      });
    }

    async function purchaseSecondPetVariant(variant, index) {
      const targetVariantId = String((variant && variant.id) || "").trim();
      if (!targetVariantId) return;

      if (!canOwnMoreVariants()) {
        if (typeof showToast === "function") {
          showToast("Bạn đã sở hữu toàn bộ PET hiện có", "info");
        }
        return;
      }

      if (!isPetVariantUnlocked(variant)) {
        if (typeof showToast === "function") {
          showToast(
            "Pet này chưa mở khóa. Cần: " + describeUnlockCondition(variant.unlockCondition),
            "warning",
          );
        }
        return;
      }

      const secondPetPrice = Math.max(0, toNonNegativeNumber(variant.secondPetPriceXqp, 500));
      if ((state.totalXQP || 0) < secondPetPrice) {
        if (typeof showToast === "function") {
          showToast("Không đủ XQP để mua pet này", "warning");
        }
        return;
      }

      const userConfirmed = await requestPurchaseConfirmation(variant.name, secondPetPrice);
      if (!userConfirmed) {
        return;
      }

      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run ||
        !window.currentUser ||
        !window.currentUser.userId
      ) {
        if (typeof showToast === "function") {
          showToast("Không thể mua pet lúc này", "error");
        }
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || result.success !== true) {
            if (typeof showToast === "function") {
              showToast((result && result.message) || "Mua pet thất bại", "error");
            }
            return;
          }

          state.totalXQP = Math.max(0, toNonNegativeNumber(result.newTotalXQP, state.totalXQP || 0));
          if (window.currentUser) {
            window.currentUser.totalXQP = state.totalXQP;
          }
          const xqpDisplay = document.getElementById("petXQPBalance");
          if (xqpDisplay) {
            xqpDisplay.textContent = Number(state.totalXQP).toLocaleString();
          }

          if (result.config && typeof result.config === "object") {
            const configIndex = parseInt(result.config.currentIndex, 10);
            if (Number.isFinite(configIndex) && configIndex >= 0 && configIndex < PET_VARIANTS.length) {
              state.currentIndex = configIndex;
            } else {
              state.currentIndex = index;
            }
            state.ownedVariantIds = normalizeOwnedVariantIds(
              result.config.ownedVariantIds,
              targetVariantId,
            );
            state.selectionLocked = false;
            state.lockedVariantId = String(result.config.lockedVariantId || state.ownedVariantIds[0] || "").trim();

            if (result.config.petProgressByVariantId && typeof result.config.petProgressByVariantId === "object") {
              state.petProgressByVariantId = Object.assign({}, result.config.petProgressByVariantId);
            }
            if (result.config.petNamesByVariantId && typeof result.config.petNamesByVariantId === "object") {
              state.petNamesByVariantId = Object.assign({}, result.config.petNamesByVariantId);
            }
          } else {
            state.ownedVariantIds = normalizeOwnedVariantIds(state.ownedVariantIds, targetVariantId);
            state.currentIndex = index;
          }

          ensurePetProgressAndNamesMaps();
          if (typeof state.petProgressByVariantId[targetVariantId] === "undefined") {
            state.petProgressByVariantId[targetVariantId] = 0;
          }
          if (typeof state.petNamesByVariantId[targetVariantId] === "undefined") {
            state.petNamesByVariantId[targetVariantId] = sanitizePetName((variant && variant.name) || DEFAULT_PET_NAME);
          }

          state.lastSavedConfig = JSON.parse(JSON.stringify(buildPersistedConfig()));
          releasePressState();
          renderPet();
          updateSaveButtonUI();

          if (typeof showToast === "function") {
            showToast("Mua pet thành công", "success");
          }
        })
        .withFailureHandler(function (error) {
          if (typeof showToast === "function") {
            showToast("Lỗi mua pet: " + (error && error.message ? error.message : error), "error");
          }
        })
        .purchasePetVariant({
          userId: window.currentUser.userId,
          variantId: targetVariantId,
        });
    }

          this.src = "";
          this.style.visibility = "hidden";
