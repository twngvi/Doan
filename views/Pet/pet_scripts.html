    function showPetTooltip(e, itemData, itemType) {
      const tooltip = getPetTooltip();
      let html = `<div class="tooltip-img-wrap"><img /></div>`;
      html += `<div class="tooltip-info-wrap"><h4>${itemData.name}</h4>`;
      
      if (itemData.priceXqp > 0) {
        html += `<div class="tooltip-meta tooltip-price"><span>Giá mua:</span> <strong>${itemData.priceXqp} XQP</strong></div>`;
      }
      if (itemType === 'food' && itemData.petXpGain) {
        html += `<div class="tooltip-meta tooltip-xp"><span>Dinh dưỡng:</span> <strong>+${itemData.petXpGain} XP</strong></div>`;
      }
      if (itemData.unlockCondition && itemData.unlockCondition.value && itemData.unlockCondition.value > 0) {
        let condText = "";
        if (itemData.unlockCondition.type === 'level') condText = `Level PET ${itemData.unlockCondition.value}`;
        else condText = `${itemData.unlockCondition.type} ${itemData.unlockCondition.value}`;
        html += `<div class="tooltip-meta tooltip-unlock"><span>Mở khóa:</span> <strong>${condText}</strong></div>`;
      }
      html += `</div>`;
      tooltip.innerHTML = html;
      tooltip.classList.add("visible");
      
      const img = tooltip.querySelector("img");
      if (img) {
         fetchAssetUrl(itemData.file).then(u => { if(u) img.src = u; });
      }

      const rect = e.target.closest('button').getBoundingClientRect();
      const tooltipRect = tooltip.getBoundingClientRect();
      let top = rect.top - tooltipRect.height - 15;
      let left = rect.left + rect.width / 2 - tooltipRect.width / 2;
      
      if (top < 10) top = rect.bottom + 15;
      if (left < 10) left = 10;
      if (left + tooltipRect.width > window.innerWidth - 10) left = window.innerWidth - tooltipRect.width - 10;
      
      tooltip.style.top = top + "px";
      tooltip.style.left = left + "px";
    }

    function toNonNegativeNumber(value, fallback) {
      const parsed = parseInt(value, 10);
      if (!Number.isFinite(parsed) || parsed < 0) return fallback;
      return parsed;
    }

    function normalizePetItemCatalog(items, itemType) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          const safe = item || {};
          const fallback =
            itemType === "food"
              ? DEFAULT_FOOD_ITEMS[index]
              : DEFAULT_ACCESSORY_ITEMS[index];

          const normalized = {
            id: String(safe.id || (fallback && fallback.id) || ""),
            name: String(safe.name || (fallback && fallback.name) || ""),
            file: String(safe.file || (fallback && fallback.file) || ""),
            priceXqp: toNonNegativeNumber(safe.priceXqp, 0),
            offsetX: toNonNegativeNumber(safe.offsetX, 0),
            offsetY: toNonNegativeNumber(safe.offsetY, 0),
            scalePercent: Math.max(40, Math.min(200, toNonNegativeNumber(safe.scalePercent, 100))),
            positionMode: String(safe.positionMode || 'center'),
            unlockCondition: safe.unlockCondition || { type: 'level', value: 1 }
          };

          if (!normalized.id || !normalized.file) return null;

          if (itemType === "food") {
            normalized.petXpGain = toNonNegativeNumber(safe.petXpGain, (fallback && fallback.petXpGain) || 20);
          }

          return normalized;
        })
        .filter(Boolean);
    }

    function normalizeVariantUnlockCondition(unlockCondition) {
      const raw = unlockCondition || {};
      const unlockType = String(raw.type || "level");

      if (unlockType === "level") {
        return {
          type: "level",
          value: Math.max(1, toNonNegativeNumber(raw.value, 1)),
        };
      }

      return {
        type: unlockType,
        value: String(raw.value || ""),
      };
    }

    function normalizePetVariantsFromServer(items) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          const safe = item || {};
          const fallback = DEFAULT_PET_VARIANTS[index] || DEFAULT_PET_VARIANTS[0] || {};
          const id = String(safe.id || fallback.id || "").trim();
          const level1 = String(safe.level1 || fallback.level1 || "").trim();
          const level2 = String(safe.level2 || fallback.level2 || "").trim();
          if (!id || (!level1 && !level2)) return null;

          let scalePercent = toNonNegativeNumber(safe.scalePercent, 100);
          scalePercent = Math.max(40, Math.min(200, scalePercent));

          return {
            id: id,
            name: String(safe.name || fallback.name || ("Pet " + (index + 1))),
            tone: String(safe.tone || fallback.tone || "#7c8cff"),
            stageBackground: String(safe.stageBackground || fallback.stageBackground || "bg-1.webp"),
            level1: level1 || String(fallback.level1 || ""),
            level2: level2 || String(fallback.level2 || ""),
            eyeOpen: String(safe.eyeOpen || fallback.eyeOpen || ""),
            eyeClosed: String(safe.eyeClosed || fallback.eyeClosed || ""),
            description: String(safe.description || fallback.description || ""),
            unlockCondition: normalizeVariantUnlockCondition(safe.unlockCondition),
            scalePercent: scalePercent,
          };
        })
        .filter(Boolean);
    }

    function getTopicProgressFromCache(topicId) {
      if (!topicId || !window.globalTopicsCache || !window.globalTopicsCache.progress) {
        return null;
      }

      return window.globalTopicsCache.progress[topicId] || null;
    }

    function isPetVariantUnlocked(variant) {
      const condition = variant && variant.unlockCondition ? variant.unlockCondition : { type: "level", value: 1 };
      const type = String(condition.type || "level");

      if (type === "level") {
        const currentLevel = Math.floor((state.progressionXP || 0) / 100) + 1;
        return currentLevel >= toNonNegativeNumber(condition.value, 1);
      }

      const topicId = String(condition.value || "").trim();
      if (!topicId) return false;

      const progress = getTopicProgressFromCache(topicId);
      if (!progress) return false;

      if (type === "topic") {
        return !!(progress.completed || progress.lessonCompleted);
      }
      if (type === "topic_quiz") {
        return !!(progress.quizDone || progress.completed);
      }
      if (type === "topic_matching") {
        return !!(progress.matchingDone || progress.completed);
      }

      return false;
    }

    function syncSelectedAccessoriesWithCatalog() {
      const allowedFiles = new Set(
        ACCESSORY_ITEMS.map(function (item) {
          return item.file;
        })
      );

      state.selectedAccessories = state.selectedAccessories.filter(function (item) {
        return item && allowedFiles.has(item.fileName);
      });

      if (state.selectedAccessory && !allowedFiles.has(state.selectedAccessory)) {
        state.selectedAccessory = state.selectedAccessories[0]
          ? state.selectedAccessories[0].fileName
          : "";
      }
    }

    function loadPetItemCatalogFromServer() {
      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      ) {
        updatePetCatalogHints();
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || result.success !== true) {
            updatePetCatalogHints();
            return;
          }

          const loadedAccessories = normalizePetItemCatalog(result.accessories, "accessories");
          const loadedFood = normalizePetItemCatalog(result.food, "food");
          const loadedVariants = normalizePetVariantsFromServer(result.variants);
          const hasAnyData = loadedAccessories.length > 0 || loadedFood.length > 0;

          if (!hasAnyData) {
            if (loadedVariants.length > 0) {
              PET_VARIANTS = loadedVariants;
              if (state.currentIndex >= PET_VARIANTS.length) state.currentIndex = 0;
              buildColorButtons();
              renderPet();
            }
            updatePetCatalogHints();
            return;
          }

          ACCESSORY_ITEMS = loadedAccessories;
          FOOD_ITEMS = loadedFood;
          if (loadedVariants.length > 0) {
            PET_VARIANTS = loadedVariants;
            if (state.currentIndex >= PET_VARIANTS.length) state.currentIndex = 0;
          }
          syncSelectedAccessoriesWithCatalog();
          buildColorButtons();
          buildAccessoryButtons();
          buildFoodButtons();
          updateAccessoryButtons();
          renderAccessory();
          renderPet();
          updatePetCatalogHints();
        })
        .withFailureHandler(function () {
          updatePetCatalogHints();
        })
        .getPetItemsForAdmin();
    }

          window.globalTopicsCache.progress = response.progress || {};

        })
        .withFailureHandler(function () {})
        .getUserTopicProgress();
    }

    /**
     * Register Service Worker for PET assets
     */
    async function registerPetServiceWorker() {
      if ('serviceWorker' in navigator) {
        try {
          // In GAS, the SW is served from the same domain via a route
          const scriptUrl = window.location.origin + window.location.pathname + "?path=sw.js";
          const registration = await navigator.serviceWorker.register(scriptUrl, {
            scope: window.location.pathname
          });
          console.log('PET Service Worker registered successfully:', registration.scope);
        } catch (error) {
          console.error('PET Service Worker registration failed:', error);
        }
      }
    }

    const blobUrlCache = {};

    async function fetchAssetUrl(fileName) {
      if (!fileName) return "";
      const directSrc = String(fileName).trim();
      if (/^(https?:|data:|blob:)/i.test(directSrc)) {
        blobUrlCache[fileName] = directSrc;
        return directSrc;
      }
      if (Object.prototype.hasOwnProperty.call(blobUrlCache, fileName)) {
        return blobUrlCache[fileName];
      }

      const normalizedFile = String(fileName).replace(/^\/+/, "");
      const candidateUrls = PET_ASSET_BASE_URLS.map(function (baseUrl) {
        return baseUrl + normalizedFile;
      });
      
      // If Cache API is not supported, fallback to first available network URL.
      if (!window.caches) {
        for (let i = 0; i < candidateUrls.length; i++) {
          try {
            const response = await fetch(candidateUrls[i]);
            if (response.ok) {
              blobUrlCache[fileName] = candidateUrls[i];
              return candidateUrls[i];
            }
          } catch (error) {
          }
        }
        blobUrlCache[fileName] = "";
        return "";
      }
      
      try {
        const cache = await caches.open(PET_CACHE_NAME);

        for (let i = 0; i < candidateUrls.length; i++) {
          const candidateUrl = candidateUrls[i];
          let response = await cache.match(candidateUrl);

          if (!response) {
            try {
              response = await fetch(candidateUrl);
              if (response && response.ok) {
                cache.put(candidateUrl, response.clone());
              }
            } catch (fetchError) {
              response = null;
            }
          }

          if (response && response.ok) {
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            blobUrlCache[fileName] = blobUrl;
            return blobUrl;
          }
        }

        console.warn("Asset not found on all configured hosts:", fileName, candidateUrls);
        blobUrlCache[fileName] = "";
        return "";
      } catch (error) {
        console.warn("Manual cache fetch failed for:", fileName, error);
        blobUrlCache[fileName] = "";
        return "";
      }
    }

    async function applySrcAsync(imgEl, fileName) {
      if (!imgEl) return;
      
      if (!fileName) {
        imgEl.classList.remove("is-visible");
        imgEl.style.display = "none"; 
        imgEl.src = "";
        imgEl.removeAttribute('data-original-file');
        return;
      }

      const url = await fetchAssetUrl(fileName);
      if (!url) {
        imgEl.classList.remove("is-visible");
        imgEl.style.display = "none";
        return;
      }

      // Check if current src is already the same or matches via original file attribute
      if (imgEl.src === url || (url.startsWith('blob:') && imgEl.getAttribute('data-original-file') === fileName)) {
        imgEl.style.display = "";
        imgEl.classList.add("is-visible");
        return;
      }

      const onImageLoad = function() {
        imgEl.style.display = "";
        imgEl.classList.add("is-visible");
        imgEl.removeEventListener("load", onImageLoad);
      };

      imgEl.addEventListener("load", onImageLoad);
      imgEl.onerror = function() { 
        console.error("Failed to load pet asset:", fileName, "at", url);
        imgEl.classList.remove("is-visible");
        imgEl.style.display = "none";
      };
      
      imgEl.setAttribute('data-original-file', fileName);
      imgEl.src = url;

      // Handle cases where image is already cached in browser memory
      if (imgEl.complete && imgEl.naturalWidth > 0) {
        onImageLoad();
      }
    }

    async function applyBgAsync(stageEl, fileName) {
      if (!stageEl || !fileName) {
        if (stageEl) stageEl.style.setProperty("--pet-stage-bg-image", "none");
        return;
      }
      const url = await fetchAssetUrl(fileName);
      const testImg = new Image();
      testImg.onload = function () {
        const safeUrl = String(url).replace(/"/g, '\"');
        stageEl.style.setProperty("--pet-stage-bg-image", 'url("' + safeUrl + '")');
      };
      testImg.src = url;
    }

    function clearInteractionClasses() {

      if (!visualEl) return;

    function applyLevel1TiltByPointer(clientX, clientY) {
      if (state.isLevelTwo || state.isPressing) return;

      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return;

      const stageEl = document.getElementById("petStage");
      if (!stageEl) return;

      const stageRect = stageEl.getBoundingClientRect();
      // Calculate mouse position relative to stage center (-0.5 to 0.5)
      const relX = (clientX - stageRect.left) / stageRect.width - 0.5;
      const relY = clientY !== undefined ? (clientY - stageRect.top) / stageRect.height - 0.5 : 0;

      // Apply smooth rotation and slight skew based on mouse position
      const rotateAngle = relX * -45; // max ±22.5 degrees tilt
      const skewAngle = relX * 10;     // subtle skew
      const scaleX = 1 + Math.abs(relX) * 0.04; // very subtle stretch

      visualEl.style.transform = 
        'rotate(' + rotateAngle.toFixed(2) + 'deg) ' +
        'skewY(' + skewAngle.toFixed(2) + 'deg) ' +
        'scaleX(' + scaleX.toFixed(3) + ')';
    }

    function clearLevel1Tilt() {
      const visualEl = document.getElementById("petVisual");
      if (visualEl) {
        visualEl.style.transform = '';
      }
    }

    function resolvePressZone(clientX) {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return "center";

      const rect = visualEl.getBoundingClientRect();
      const ratio = (clientX - rect.left) / rect.width;
      if (ratio < 0.34) return "left";
      if (ratio > 0.66) return "right";
      return "center";
    }

    function applyPressShape(zone) {
      const visualEl = document.getElementById("petVisual");
      if (!visualEl) return;

      visualEl.classList.remove(
        "level2-press-left",
        "level2-press-right",
        "level2-press-center",
      );

      if (zone === "left") {
        visualEl.classList.add("level2-press-right");

        visualEl.classList.add("level2-press-left");
      } else {

    function feedPet(xpGain, foodName) {
      const gainedXP = Math.max(0, toNonNegativeNumber(xpGain, 20));
      const previousXP = state.progressionXP || 0;
      state.progressionXP = previousXP + gainedXP;

      // Level up feedback
      const currentLevel = Math.floor(state.progressionXP / 100) + 1;
      const prevLevel = Math.floor(previousXP / 100) + 1;
      
      if (currentLevel > prevLevel) {
        if (typeof showToast === "function") {
          showToast("PET đã lên Level " + currentLevel + "!", "success");
        }
      } else if (typeof showToast === "function") {
        const safeFoodName = String(foodName || "Food");
        showToast("PET ăn " + safeFoodName + " và nhận +" + gainedXP + " XP", "info");
      }

      renderPet();
      updateSaveButtonUI();
      queuePetConfigAutoSave();
    }

    function resetPetProgression() {

    function buildPersistedConfig() {
      const progressionXP = state.progressionXP || 0;
      return {
        currentIndex: state.currentIndex,
        isLevelTwo: state.isLevelTwo,
        selectedAccessories: state.selectedAccessories,
        selectedStageBackgroundIndex: state.selectedStageBackgroundIndex,
        progressionXP: progressionXP,
        progressionLevel: Math.floor(progressionXP / 100) + 1,
        progressionXPProgress: progressionXP % 100,
      };

    function savePetNameToServer(newPetName) {
      if (!window.currentUser?.userId) return;
      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      )
        return;

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || !result.success) {
            if (typeof showToast === "function") {
              showToast((result && result.message) || "Không lưu được tên PET", "error");
            }
            return;
          }

          state.petDisplayName = sanitizePetName(result.petName || newPetName);
          state.originalPetName = state.petDisplayName; // Update original name on successful save
          updatePetNameTagUI();

          if (typeof showToast === "function") {
            showToast("Đã lưu tên PET", "success");
          }
        })
        .withFailureHandler(function (error) {
          if (typeof showToast === "function") {
            showToast("Lỗi lưu tên PET: " + (error && error.message ? error.message : error), "error");
          }
        })
        .savePetName({
          userId: window.currentUser.userId,
          petName: newPetName,
        });
    }

    function loadPetNameFromServer() {
      const userId = window.currentUser?.userId
        ? String(window.currentUser.userId).trim()
        : "";

      if (!userId) {
        updatePetNameTagUI();
        return;
      }

      if (state.petNameLoading || state.petNameLoadedUserId === userId) {
        updatePetNameTagUI();
        return;
      }

      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      ) {
        updatePetNameTagUI();
        return;
      }

      state.petNameLoading = true;

      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.success && result.petName) {
            state.petDisplayName = sanitizePetName(result.petName);
            state.originalPetName = state.petDisplayName; // Store original name
          }
          state.petNameLoadedUserId = userId;
          state.petNameLoading = false;
          updatePetNameTagUI();
        })
        .withFailureHandler(function () {
          state.petNameLoading = false;
          updatePetNameTagUI();
        })
        .getPetName(userId);
    }

    function isDirty() {
      if (!state.lastSavedConfig) return false;
      
      return state.currentIndex !== state.lastSavedConfig.currentIndex ||
             state.isLevelTwo !== state.lastSavedConfig.isLevelTwo ||
             JSON.stringify(state.selectedAccessories) !== JSON.stringify(state.lastSavedConfig.selectedAccessories) ||
             state.selectedStageBackgroundIndex !== state.lastSavedConfig.selectedStageBackgroundIndex ||
             state.petDisplayName !== state.originalPetName;
    }

    function updateSaveButtonUI() {
      const saveBtn = document.getElementById("petSaveConfigBtn");
      if (!saveBtn) return;
      
      const dirty = isDirty();
      saveBtn.classList.toggle("is-dirty", dirty);
    }

    function savePetConfigToServer(options) {
      return new Promise((resolve) => {
        const opts = options || {};
        const silent = !!opts.silent;
        const userId = window.currentUser?.userId;
        if (!userId || typeof google === "undefined" || !google.script?.run) {
           resolve({ success: false, message: "No auth" });
           return;
        }

        const config = buildPersistedConfig();

        const saveBtn = document.getElementById("petSaveConfigBtn");
        if (saveBtn) saveBtn.classList.add("loading");

        google.script.run
          .withSuccessHandler(function(result) {
            if (saveBtn) saveBtn.classList.remove("loading");
            if (result && result.success) {
              state.lastSavedConfig = JSON.parse(JSON.stringify(config));
              updateSaveButtonUI();
              if (!silent && typeof showToast === "function") showToast("Đã lưu cấu hình PET!", "success");
              resolve(result);
            } else {
              if (!silent && typeof showToast === "function") showToast("Lỗi lưu cấu hình: " + (result?.message || "Unknown"), "error");
              resolve(result || { success: false });
            }
          })
          .withFailureHandler(function(err) {
            if (saveBtn) saveBtn.classList.remove("loading");
            if (!silent && typeof showToast === "function") showToast("Lỗi kết nối server: " + err, "error");
            resolve({ success: false, message: err });
          })
          .savePetConfig(userId, config);
      });
    }

    function queuePetConfigAutoSave() {
      if (!window.currentUser?.userId) return;
      if (state.autoSaveTimeoutId) {
        clearTimeout(state.autoSaveTimeoutId);
      }
      state.autoSaveTimeoutId = setTimeout(function () {
        state.autoSaveTimeoutId = null;
        savePetConfigToServer({ silent: true });
      }, 500);
    }

    function loadPetConfigFromServer() {
      const userId = window.currentUser?.userId;
      if (!userId || typeof google === "undefined" || !google.script?.run) return;

      google.script.run
        .withSuccessHandler(function(result) {
          if (result && result.success && result.config) {
            const config = result.config;
            state.currentIndex = typeof config.currentIndex === 'number' ? config.currentIndex : state.currentIndex;
            state.isLevelTwo = !!config.isLevelTwo;
            state.selectedAccessories = Array.isArray(config.selectedAccessories) ? config.selectedAccessories : [];
            state.selectedStageBackgroundIndex = typeof config.selectedStageBackgroundIndex === 'number' ? config.selectedStageBackgroundIndex : 0;
            if (typeof config.progressionXP === 'number') {
              state.progressionXP = config.progressionXP;
            } else {
              const loadedLevel = parseInt(config.progressionLevel, 10);
              const loadedProgress = parseInt(config.progressionXPProgress, 10);
              if (Number.isFinite(loadedLevel)) {
                const safeLevel = Math.max(1, loadedLevel);
                const safeProgress = Number.isFinite(loadedProgress)
                  ? Math.max(0, Math.min(99, loadedProgress))
                  : 0;
                state.progressionXP = (safeLevel - 1) * 100 + safeProgress;
              } else {
                state.progressionXP = state.progressionXP || 0;
              }
            }

            state.lastSavedConfig = JSON.parse(JSON.stringify(buildPersistedConfig()));
            updateSaveButtonUI();

            // Re-render pet with loaded state
            renderPet();
          }
        })
        .getPetConfig(userId);
    }

    function getAccessoryRule(fileName) {
      if (!fileName) return {};
      return ACCESSORY_RULES[fileName] || {};
    }

    function getAllowedAccessoryPositions(fileName) {
      const rule = getAccessoryRule(fileName);
      return rule.allowedPositions || ["left", "center", "right"];
    }

    function resolveAccessoryPosition(fileName, desiredPosition) {
      const rule = getAccessoryRule(fileName);
      if (rule.forcedPosition) return rule.forcedPosition;

      const allowed = getAllowedAccessoryPositions(fileName);
      if (allowed.indexOf(desiredPosition) >= 0) return desiredPosition;
      return allowed[0] || "center";
    }

    function getAccessoryImageElements() {
      return [1, 2, 3]
        .map(function (index) {
          return document.getElementById("petAccessoryImage" + index);
        })
        .filter(Boolean);
    }

    function getSelectedAccessoryIndex(fileName) {
      return state.selectedAccessories.findIndex(function (item) {
        return item.fileName === fileName;
      });
    }

    function getSelectedAccessoryByFile(fileName) {
      const index = getSelectedAccessoryIndex(fileName);
      if (index < 0) return null;
      return state.selectedAccessories[index];
    }

    function resolveActiveAccessory() {
      if (!state.selectedAccessory) return null;
      const selected = getSelectedAccessoryByFile(state.selectedAccessory);
      if (!selected) {
        state.selectedAccessory = "";
        return null;
      }
      return selected;
    }

    function clearAccessoryImage(accessoryImageEl) {
      if (!accessoryImageEl) return;
      accessoryImageEl.classList.remove("is-visible");
      accessoryImageEl.style.display = "none";
      accessoryImageEl.src = "";
      accessoryImageEl.removeAttribute('data-original-file');
    }

    function updateAccessoryPositionClasses(accessoryImageEl, fileName, desiredPosition, accessoryData) {
      if (!accessoryImageEl || !fileName) return "center";

      const rule = getAccessoryRule(fileName);
      const accessoryCatalogItem = accessoryData || getAccessoryItemByFileName(fileName);
      const positionMode = String((accessoryCatalogItem && accessoryCatalogItem.positionMode) || "center");
      const finalPosition = desiredPosition || (positionMode === "custom" ? "center" : positionMode);

      const baseTop = 12;
      const baseLeftMap = {
        left: 25,
        center: 50,
        right: 75,
      };

      const topValue =
        typeof rule.topOverride === "number"
          ? rule.topOverride
          : baseTop + (rule.topOffset || 0);
      const leftValue =
        typeof rule.leftOverride === "number"
          ? rule.leftOverride
          : baseLeftMap[finalPosition] || 50;
      const rotValue = finalPosition === "left" ? -12 : finalPosition === "right" ? 12 : 0;
      const scaleValue = rule.scale || 1;

      accessoryImageEl.style.setProperty("--pet-accessory-top", topValue + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-left", leftValue + "%");
      accessoryImageEl.style.setProperty("--pet-accessory-rot", rotValue + "deg");
      accessoryImageEl.style.setProperty("--pet-accessory-offset-x", ((accessoryCatalogItem && accessoryCatalogItem.offsetX) || 0) + "px");
      accessoryImageEl.style.setProperty("--pet-accessory-offset-y", ((accessoryCatalogItem && accessoryCatalogItem.offsetY) || 0) + "px");
      accessoryImageEl.style.setProperty("--pet-accessory-scale", String(scaleValue * (((accessoryCatalogItem && accessoryCatalogItem.scalePercent) || 100) / 100)));

      return finalPosition;
    }

    function getAccessoryItemByFileName(fileName) {
      if (!fileName) return null;
      return ACCESSORY_ITEMS.find(function (item) {
        return item.file === fileName;
      }) || null;
    }

    function updateAccessoryPanelState() {
      const panelEl = document.getElementById("petAccessoryPanel");
      if (!panelEl) return;

      panelEl.classList.toggle("disabled", !state.isLevelTwo);
      panelEl.setAttribute("aria-disabled", state.isLevelTwo ? "false" : "true");

      const accessoryButtons = panelEl.querySelectorAll(".pet-accessory-btn");
      accessoryButtons.forEach(function (button) {
        button.disabled = !state.isLevelTwo;
      });
    }

    function updateAccessoryButtons() {
      const gridEl = document.getElementById("petAccessoryGrid");
      if (!gridEl) return;

      const selectedMap = {};
      state.selectedAccessories.forEach(function (item) {
        selectedMap[item.fileName] = true;
      });

      const buttons = gridEl.querySelectorAll(".pet-accessory-btn");
      buttons.forEach(function (button) {
        const fileName = button.getAttribute("data-file") || "";
        if (fileName === NO_ACCESSORY_VALUE) {
          button.classList.toggle("active", state.selectedAccessories.length === 0);
          return;
        }
        button.classList.toggle("active", Boolean(selectedMap[fileName]));
      });
    }

    function updateAccessoryPositionButtons() {
      const container = document.getElementById("petAccessoryPosition");
      if (!container) return;

      const activeAccessory = resolveActiveAccessory();
      const allowed = getAllowedAccessoryPositions(
        activeAccessory ? activeAccessory.fileName : "",
      );
      const activePosition = activeAccessory
        ? activeAccessory.position
        : state.accessoryPosition;

      const buttons = container.querySelectorAll(".pet-pill-btn");
      buttons.forEach(function (button) {
        const pos = button.getAttribute("data-pos") || "";
        const isAllowed = state.isLevelTwo && allowed.indexOf(pos) >= 0;
        button.disabled = !isAllowed;
        button.classList.toggle("active", isAllowed && pos === activePosition);
      });
    }

    function renderEyes() {
      const variant = PET_VARIANTS[state.currentIndex];
      if (!variant) return;

      const eyesImageEl = document.getElementById("petEyesImage");
      if (!eyesImageEl) return;

      if (!state.isLevelTwo) {
        eyesImageEl.style.display = "none";
        return;
      }

      const shouldCloseEyes =
        state.isPressing || (state.isLevelTwo && state.isEyesClosed);
      const eyeAsset = shouldCloseEyes ? variant.eyeClosed : variant.eyeOpen;
      applySrcAsync(eyesImageEl, eyeAsset);
    }

    function renderAccessory() {
      const accessoryImageEls = getAccessoryImageElements();
      if (accessoryImageEls.length === 0) return;

      if (!state.isLevelTwo) {
        accessoryImageEls.forEach(clearAccessoryImage);
        return;
      }

      accessoryImageEls.forEach(function (accessoryImageEl, index) {
        const selected = state.selectedAccessories[index];
        if (!selected) {
          clearAccessoryImage(accessoryImageEl);
          return;
        }

        selected.position = updateAccessoryPositionClasses(
          accessoryImageEl,
          selected.fileName,
          selected.position,
          selected,
        );

        applySrcAsync(accessoryImageEl, selected.fileName);
      });
      updateSaveButtonUI();
    }

    function renderPet() {
      ensureCurrentVariantAccessible();
      const xp = state.progressionXP || 0;
      const progressionLevel = Math.floor(xp / 100) + 1;
      
      // Update visual level state: Progression Level 3+ is Mature (Level 2 visuals)
      state.isLevelTwo = (progressionLevel >= 3);

      const variant = PET_VARIANTS[state.currentIndex];
      if (!variant) return;

      const levelBadgeEl = document.getElementById("petLevelBadge");
      const previewImageEl = document.getElementById("petPreviewImage");
      const errorEl = document.getElementById("petImageError");
      const stageEl = document.getElementById("petStage");
      const levelBtn = document.getElementById("petToggleLevelBtn");

      updatePetNameTagUI();

      const levelText = "Level " + progressionLevel;
      if (levelBadgeEl) {
        levelBadgeEl.textContent = levelText;
      }

      updatePetLevelProgressUI();

      if (stageEl) {
        stageEl.style.boxShadow = "inset 0 0 0 1px " + variant.tone + "44";
        const activeBackground =
          STAGE_BACKGROUNDS[state.selectedStageBackgroundIndex] || STAGE_BACKGROUNDS[0];
        applyBgAsync(stageEl, activeBackground.fileName);
      }

      if (levelBtn) {
        levelBtn.style.display = "none"; // Hide explicit level toggle as it's now XP-based
      }

      clearInteractionClasses();
      if (progressionLevel < 2) {
        state.isPressing = false;
        state.pressZone = null;
      }

      const imageName = state.isLevelTwo ? variant.level2 : variant.level1;
      const variantScale = Math.max(40, Math.min(200, toNonNegativeNumber(variant.scalePercent, 100))) / 100;
      if (previewImageEl) {
        previewImageEl.style.transform = "scale(" + variantScale + ")";
        previewImageEl.style.transformOrigin = "center bottom";
      }
      applySrcAsync(previewImageEl, imageName);
      if (errorEl) errorEl.style.display = "none";
      
      // Force render eyes and accessories after main image
      setTimeout(() => {
        renderEyes();
        renderAccessory();
      }, 50);

      playLevelTransitionAnimation();
      updateAccessoryPanelState();

      updateSettingsPanelVisibility();
      updateBackgroundPanelVisibility();

      updateColorButtons(state.currentIndex);
      updateBackgroundButtons(state.selectedStageBackgroundIndex);
      updateAccessoryButtons();
      updateAccessoryPositionButtons();
      updateSaveButtonUI();
    }

    function triggerBlink() {
      if (!state.isLevelTwo || state.isPressing) return;

      state.isEyesClosed = true;
      renderEyes();

      if (state.blinkTimeoutId) {
        clearTimeout(state.blinkTimeoutId);
      }

      state.blinkTimeoutId = setTimeout(function () {
        state.isEyesClosed = false;
        renderEyes();
      }, BLINK_CLOSE_DURATION_MS);
    }

    function startBlinkLoop() {
      if (state.blinkIntervalId) {
        clearInterval(state.blinkIntervalId);
      }
      if (state.blinkTimeoutId) {
        clearTimeout(state.blinkTimeoutId);
      }

      state.isEyesClosed = false;
      state.blinkIntervalId = setInterval(triggerBlink, BLINK_INTERVAL_MS);
    }

    function movePet(step) {
      const total = PET_VARIANTS.length;
      state.currentIndex = (state.currentIndex + step + total) % total;
      releasePressState();
      renderPet();
    }

    function ensureCurrentVariantAccessible() {
      if (!Array.isArray(PET_VARIANTS) || PET_VARIANTS.length === 0) return;

      if (state.currentIndex < 0 || state.currentIndex >= PET_VARIANTS.length) {
        state.currentIndex = 0;
      }

      const currentVariant = PET_VARIANTS[state.currentIndex];
      if (currentVariant && isPetVariantUnlocked(currentVariant)) {
        return;
      }

      const firstUnlockedIndex = PET_VARIANTS.findIndex(function (variant) {
        return isPetVariantUnlocked(variant);
      });

      state.currentIndex = firstUnlockedIndex >= 0 ? firstUnlockedIndex : 0;
    }

    function buildColorButtons() {
      const buttonsWrap = document.getElementById("petColorButtons");
      if (!buttonsWrap) return;

      buttonsWrap.innerHTML = "";
      PET_VARIANTS.forEach((variant, index) => {
        const unlocked = isPetVariantUnlocked(variant);
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pet-color-btn";
        btn.title = variant.name;
        btn.setAttribute("aria-label", variant.name);
        if (!unlocked) {
          btn.classList.add("is-locked");
          btn.setAttribute("aria-disabled", "true");
        }
        btn.innerHTML =
          '<span class="pet-color-dot" style="background:' +
          variant.tone +
          '"></span>';
        btn.addEventListener("click", function () {
          if (!unlocked) {
            if (typeof showToast === "function") {
              const cond = variant.unlockCondition || { type: "level", value: 1 };
              if (cond.type === "level") {
                showToast("Pet này yêu cầu Level " + cond.value, "warning");
              } else {
                showToast("Pet này chưa đủ điều kiện mở khóa", "warning");
              }
            }
            return;
          }
          state.currentIndex = index;
          releasePressState();
          renderPet();
        });
        buttonsWrap.appendChild(btn);
      });
    }

    function updateBackgroundButtons(activeIndex) {
      const buttonsWrap = document.getElementById("petBackgroundButtons");
      if (!buttonsWrap) return;

      const buttons = buttonsWrap.querySelectorAll(".pet-bg-btn");
      buttons.forEach((button, index) => {
        button.classList.toggle("active", index === activeIndex);
      });
    }

    function buildBackgroundButtons() {
      const buttonsWrap = document.getElementById("petBackgroundButtons");
      if (!buttonsWrap) return;

      buttonsWrap.innerHTML = "";

      STAGE_BACKGROUNDS.forEach(function (background, index) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pet-bg-btn";
        btn.title = background.name;
        btn.setAttribute("aria-label", background.name);
        
        const img = document.createElement("img");
        img.className = "pet-bg-thumb";
        img.alt = background.name;
        fetchAssetUrl(background.fileName).then(url => {
            if(url) {
                img.src = url;
            } else {
                img.style.display = 'none';
                btn.textContent = background.name;
            }
        });
        
        btn.appendChild(img);
        
        btn.addEventListener("click", function () {
          state.selectedStageBackgroundIndex = index;
          renderPet();
        });
        buttonsWrap.appendChild(btn);
      });

      updateBackgroundButtons(state.selectedStageBackgroundIndex);
    }

    function buildAccessoryButtons() {
      const gridEl = document.getElementById("petAccessoryGrid");
      if (!gridEl) return;

      gridEl.innerHTML = "";

      const noAccessoryBtn = document.createElement("button");
      noAccessoryBtn.type = "button";
      noAccessoryBtn.className = "pet-accessory-btn no-accessory";
      noAccessoryBtn.setAttribute("data-file", NO_ACCESSORY_VALUE);

      const noAccessoryIcon = document.createElement("span");
      noAccessoryIcon.className = "material-symbols-sharp pet-accessory-empty-icon";
      noAccessoryIcon.setAttribute("aria-hidden", "true");
      noAccessoryIcon.textContent = "block";

      noAccessoryBtn.appendChild(noAccessoryIcon);
      noAccessoryBtn.addEventListener("click", function () {
        if (!state.isLevelTwo) return;

        state.selectedAccessories = [];
        state.selectedAccessory = NO_ACCESSORY_VALUE;
        state.accessoryPosition = "center";
        renderAccessory();
        updateAccessoryButtons();
        updateAccessoryPositionButtons();
      });
      gridEl.appendChild(noAccessoryBtn);

      ACCESSORY_ITEMS.forEach(function (catalogItem, index) {
        const fileName = catalogItem.file;
        const displayName = String(catalogItem.name || ("Phụ kiện " + (index + 1)));

        const currentLevel = Math.floor((state.progressionXP || 0) / 100) + 1;
        const isLocked = catalogItem.unlockCondition && catalogItem.unlockCondition.type === 'level' && catalogItem.unlockCondition.value > currentLevel;

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "pet-accessory-btn";
        btn.setAttribute("data-file", fileName);

        if (isLocked) {
           btn.classList.add("is-locked");
           const lockOverlay = document.createElement("div");
           lockOverlay.className = "pet-item-lock-icon";
           lockOverlay.innerHTML = `<span class="material-symbols-sharp">lock</span>`;
           btn.appendChild(lockOverlay);
        }

        const thumb = document.createElement("img");
        thumb.className = "pet-accessory-thumb";
        thumb.alt = displayName;
        thumb.loading = "lazy";
        thumb.src = resolvePetThumbSrc(fileName);
        thumb.onerror = function () {
          this.src = "";
          this.style.visibility = "hidden";
        };
        thumb.onload = function () {
          this.style.visibility = "visible";
        };
        thumb.style.visibility = "hidden";

        btn.appendChild(thumb);
        
        btn.addEventListener("mouseenter", function(e) {
          showPetTooltip(e, catalogItem, 'accessory');
        });
        btn.addEventListener("mouseleave", hidePetTooltip);

        btn.addEventListener("click", function () {
          if (isLocked) {
            if (typeof showToast === "function") {
              showToast("Vật phẩm yêu cầu Level " + catalogItem.unlockCondition.value, "warning");
            }
            return;
          }
          if (!state.isLevelTwo) return;

          const selectedIndex = getSelectedAccessoryIndex(fileName);
          if (selectedIndex >= 0) {
            if (state.selectedAccessory !== fileName) {
              const selected = state.selectedAccessories[selectedIndex];
              state.selectedAccessory = fileName;
              state.accessoryPosition = selected.position;
            } else {
              state.selectedAccessories.splice(selectedIndex, 1);
              const fallbackSelected =
                state.selectedAccessories[selectedIndex] ||
                state.selectedAccessories[selectedIndex - 1] ||
                null;
              state.selectedAccessory = fallbackSelected ? fallbackSelected.fileName : "";
              if (fallbackSelected) {
                state.accessoryPosition = fallbackSelected.position;
              }
            }

            renderAccessory();
            updateAccessoryButtons();
            updateAccessoryPositionButtons();
            return;
          }

          if (state.selectedAccessories.length >= MAX_ACCESSORIES_PER_PET) {
            if (typeof showToast === "function") {
              showToast("Mỗi pet chỉ gắn tối đa 2 phụ kiện");
            }
            return;
          }

          const catalogItem = getAccessoryItemByFileName(fileName) || { offsetX: 0, offsetY: 0, scalePercent: 100, positionMode: 'center' };
          const finalPosition = catalogItem.positionMode === 'custom'
            ? 'center'
            : resolveAccessoryPosition(fileName, catalogItem.positionMode || state.accessoryPosition);
          state.selectedAccessories.push({
            fileName: fileName,
            position: finalPosition,
            positionMode: catalogItem.positionMode || 'center',
            offsetX: toNonNegativeNumber(catalogItem.offsetX, 0),
            offsetY: toNonNegativeNumber(catalogItem.offsetY, 0),
            scalePercent: Math.max(40, Math.min(200, toNonNegativeNumber(catalogItem.scalePercent, 100))),
          });
          state.selectedAccessory = fileName;
          state.accessoryPosition = finalPosition;

          renderAccessory();
          updateAccessoryButtons();
          updateAccessoryPositionButtons();
        });
        gridEl.appendChild(btn);
      });
    }

    function buildFoodButtons() {
      const gridEl = document.getElementById("petFoodGrid");
      if (!gridEl) return;

      gridEl.innerHTML = "";

      const observer = new IntersectionObserver((entries, obs) => {
        entries.forEach(function(entry) {
          if (!entry.isIntersecting) return;
          const img = entry.target;
          const parent = img.closest(".pet-food-item");
          const missingLabel = parent ? parent.querySelector(".pet-food-missing") : null;
          const fileName = img.getAttribute("data-lazy-src");
          if (!fileName) return;

          fetchAssetUrl(fileName).then(function(url) {
            if (url) {
              img.src = url;
              img.style.visibility = "visible";
              if (missingLabel) missingLabel.style.display = "none";
              return;
            }

            img.style.display = "none";
            if (missingLabel) missingLabel.style.display = "inline-flex";
            if (!foodLoadWarningShown && typeof showToast === "function") {
              foodLoadWarningShown = true;
              showToast("Food image chua co tren CDN. Hay push Image/Food len GitHub de hien thi.", "warning");
            }
          });

          obs.unobserve(img);
        });
      }, { root: document.getElementById("petFoodPopover"), rootMargin: "50px" });

      FOOD_ITEMS.forEach(function (foodItem, index) {
        const fileName = foodItem.file;
        const displayName = String(foodItem.name || ("Food " + (index + 1)));

        const currentLevel = Math.floor((state.progressionXP || 0) / 100) + 1;
        const isLocked = foodItem.unlockCondition && foodItem.unlockCondition.type === 'level' && foodItem.unlockCondition.value > currentLevel;

        const item = document.createElement("button");
        item.type = "button";
        item.className = "pet-food-item";

        if (isLocked) {
           item.classList.add("is-locked");
           const lockOverlay = document.createElement("div");
           lockOverlay.className = "pet-item-lock-icon";
           lockOverlay.innerHTML = `<span class="material-symbols-sharp">lock</span>`;
           item.appendChild(lockOverlay);
        }

        const img = document.createElement("img");
        img.className = "pet-food-thumb";
        img.alt = displayName;
        img.loading = "lazy";
        img.src = resolvePetThumbSrc(fileName);
        img.onerror = function () {
          this.src = "";
          this.style.visibility = "hidden";
        };
        img.onload = function () {
          this.style.visibility = "visible";
        };
        img.style.visibility = "hidden";

        const missingLabel = document.createElement("span");
        missingLabel.className = "pet-food-missing";
        missingLabel.textContent = "No image";
        missingLabel.style.display = "none";

        item.appendChild(img);
        item.appendChild(missingLabel);
        
        item.addEventListener("mouseenter", function(e) {
          showPetTooltip(e, foodItem, 'food');
        });
        item.addEventListener("mouseleave", hidePetTooltip);

        item.addEventListener("click", function() {
          if (isLocked) {
            if (typeof showToast === "function") {
              showToast("Vật phẩm yêu cầu Level " + foodItem.unlockCondition.value, "warning");
            }
            return;
          }
          feedPet(foodItem.petXpGain, displayName);
        });
        gridEl.appendChild(item);
      });
    }

    function bindAccessoryControls() {
      const positionContainer = document.getElementById("petAccessoryPosition");
      if (!positionContainer) return;

      positionContainer.addEventListener("click", function (event) {
        if (!state.isLevelTwo) return;

        const target = event.target.closest(".pet-pill-btn[data-pos]");
        if (!target) return;

        const pos = target.getAttribute("data-pos") || "";
        if (!pos) return;


        const activeAccessory = resolveActiveAccessory();
        const allowed = getAllowedAccessoryPositions(
          activeAccessory ? activeAccessory.fileName : "",
        );
        if (allowed.indexOf(pos) < 0) return;

        if (activeAccessory) {
          const finalPosition = resolveAccessoryPosition(activeAccessory.fileName, pos);
          activeAccessory.position = finalPosition;
          state.accessoryPosition = finalPosition;
        } else {
          state.accessoryPosition = pos;
        }

        updateAccessoryPositionButtons();
        renderAccessory();
      });
    }

    function bindStageInteractions() {
      const stageEl = document.getElementById("petStage");
      const animatorEl = document.getElementById("petAnimator");
      if (!stageEl || !animatorEl) return;

      stageEl.addEventListener("mousemove", function (event) {
        const xp = state.progressionXP || 0;
        const progressionLevel = Math.floor(xp / 100) + 1;
        
        // Level 1: Tilt only
        if (progressionLevel === 1 && !state.isPressing) {
            applyLevel1TiltByPointer(event.clientX, event.clientY);
        }
      });

      stageEl.addEventListener("mouseleave", function () {
        clearInteractionClasses();
        clearLevel1Tilt();
      });

      stageEl.addEventListener("mousedown", function (event) {
        const xp = state.progressionXP || 0;
        const progressionLevel = Math.floor(xp / 100) + 1;
        const visualEl = document.getElementById("petVisual");

        // Level 2: Roll away
        if (progressionLevel === 2) {
          if (state.isRolling) return;
          state.isRolling = true;
          
          const mover = document.getElementById("petMover");
          if (mover) {
            mover.classList.add("pet-rolling-out");
            
            setTimeout(() => {
              mover.classList.remove("pet-rolling-out");
              mover.classList.add("pet-rolling-in");
              
              setTimeout(() => {
                mover.classList.remove("pet-rolling-in");
                state.isRolling = false;
              }, 600);
            }, 600);
          }
        } 
        // Level 3: Squash and hold
        else if (progressionLevel >= 3 && visualEl) {
          state.isPressing = true;
          state.isPaused = true; // Pause jumping

          visualEl.classList.remove("is-jumping");
          visualEl.classList.add("is-pressed");
          
          renderEyes();
        }

        event.preventDefault();
      });

      document.addEventListener("mouseup", function() {
        if (state.isPressing) {
          state.isPressing = false;
          state.isPaused = false; // Resume jumping
          
          const visualEl = document.getElementById("petVisual");
          if (visualEl) {
            visualEl.classList.remove("is-pressed");
          }
          
          renderEyes();
        }
      });
    }

    function bindControls() {
      const prevBtn = document.getElementById("petPrevBtn");
      const nextBtn = document.getElementById("petNextBtn");
      const toggleLevelBtn = document.getElementById("petToggleLevelBtn");

      if (prevBtn) {
        prevBtn.addEventListener("click", function () {
          movePet(-1);
        });
      }

      if (nextBtn) {
        nextBtn.addEventListener("click", function () {
          movePet(1);
        });
      }

      if (toggleLevelBtn) {
        toggleLevelBtn.addEventListener("click", function () {
          releasePressState();
          state.isLevelTwo = !state.isLevelTwo;
          state.isEyesClosed = false;
          renderPet();
        });
      }

      const saveConfigBtn = document.getElementById("petSaveConfigBtn");
      if (saveConfigBtn) {
        saveConfigBtn.addEventListener("click", function () {
          savePetConfigToServer();
        });
      }

      const resetBtn = document.getElementById("petResetBtn");
      if (resetBtn) {
        resetBtn.addEventListener("click", function () {
          resetPetProgression();
        });
      }
    }

    function performJump(targetX, targetY) {
      if (state.isPaused) return;

      const mover = document.getElementById("petMover");
      const visual = document.getElementById("petVisual");
      if (!mover || !visual) return;

      // Trigger jump animation
      visual.classList.remove("is-jumping");
      void visual.offsetWidth; 
      visual.classList.add("is-jumping");

      // Update internal state
      state.posBaseX = targetX;
      state.posBaseY = targetY;

      // Move the element
      mover.style.setProperty("--pet-pos-x", targetX + "px");
      mover.style.setProperty("--pet-pos-y", targetY + "px");
    }

    function startJumpingRoutine() {
      if (state.jumpIntervalId) return;

      let hopCount = 0;
      
      const routine = function() {
        const xp = state.progressionXP || 0;
        const progressionLevel = Math.floor(xp / 100) + 1;

        // Only jump if level >= 2 and not paused
        if (progressionLevel < 2 || state.isPaused || state.isRolling) {
          state.jumpIntervalId = setTimeout(routine, 1500);
          return;
        }

        const stage = document.getElementById("petStage");
        if (!stage) return;

        const stageWidth = stage.clientWidth;
        const stageHeight = stage.clientHeight;
        
        hopCount++;

        // Every 6 hops, do a big random relocation leap
        if (hopCount >= 6) {
          hopCount = 0;
          const maxX = (stageWidth - 230) * 0.4;
          const maxY = (stageHeight - 202) * 0.3;
          const targetX = (Math.random() - 0.5) * maxX * 2;
          const targetY = (Math.random() - 0.5) * maxY * 2;
          performJump(targetX, targetY);
        } else {
          // Normal small hop back and forth
          const dir = Math.sin(Date.now() / 1500) > 0 ? 1 : -1;
          const smallHopX = state.posBaseX + (dir * 40);
          const smallHopY = state.posBaseY + (Math.random() - 0.5) * 10;
          
          // Constrain within stage
          const boundX = (stageWidth - 230) * 0.45;
          const safeX = Math.max(-boundX, Math.min(boundX, smallHopX));
          
          performJump(safeX, smallHopY);
        }
        
        // Schedule next hop with random delay
        const nextDelay = 1800 + Math.random() * 1500;
        state.jumpIntervalId = setTimeout(routine, nextDelay);
      };

      // Initial kick-off
      state.jumpIntervalId = setTimeout(routine, 1000);
    }

    function bindNavigationGuard() {
      // Browser navigation/refresh/close guard
      window.addEventListener('beforeunload', function(e) {
        if (isDirty()) {
          e.preventDefault();
          e.returnValue = ''; // Required for modern browsers
          return '';
        }
      });

      // Internal app navigation guard
      window.onBeforeNavigate = function(pageId, params, addToHistory) {
        const petPage = document.getElementById("page-pet");
        if (!petPage || petPage.style.display === "none") return false;

        if (isDirty()) {
          if (typeof window.showAppConfirm === "function") {
            (async () => {
              const confirmed = await window.showAppConfirm(
                "Bạn có thay đổi chưa lưu cho PET. Bạn có muốn LƯU lại trước khi rời đi không?",
                {
                  title: "Nhắc nhở lưu PET",
                  confirmText: "Lưu và Tiếp tục",
                  cancelText: "Thoát không lưu",
                  allowBackdropClose: false
                }
              );

              if (confirmed !== null) {
                if (confirmed === true) {
                  await savePetConfigToServer();
                }
                // Release guard and proceed
                window.onBeforeNavigate = null;
                if (typeof showPage === "function") {
                  showPage(pageId, params, addToHistory);
                }
              }
            })();
            return true; // Intercept sync navigation
          } else {
            // Fallback to confirm if modal missing
            const msg = "Bạn có thay đổi chưa lưu trên PET. Lưu trước khi thoát?";
            if (confirm(msg)) {
              savePetConfigToServer();
            }
            window.onBeforeNavigate = null;
            return false;
          }
        }
        return false;
      };
    }

    function startPetHeaderMeteors() {
      const container = document.getElementById("petMeteorContainer");
      if (!container) return;

      if (petMeteorInterval) {
        clearInterval(petMeteorInterval);
      }

      petMeteorInterval = setInterval(function () {
        if (!document.getElementById("petMeteorContainer")) {
          clearInterval(petMeteorInterval);
          return;
        }
        createPetMeteor();
      }, 800);

      createPetMeteor();
    }

    function createPetMeteor() {
      const container = document.getElementById("petMeteorContainer");
      if (!container) return;

      const meteor = document.createElement("div");
      meteor.className = "pet-header-meteor";

      const startX = Math.random() * 40;
      const startY = Math.random() * 20;
      meteor.style.left = startX + "%";
      meteor.style.top = startY + "%";

      const height = 35 + Math.random() * 35;
      meteor.style.height = height + "px";
      meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

      container.appendChild(meteor);

      setTimeout(function () {
        meteor.remove();
      }, 1500);
    }

    function setupPetHeaderMouseEffect() {
      if (petHeaderMouseEffectBound) return;

      const header = document.querySelector("#page-pet .pet-page-header");
      const stars = document.getElementById("petHeaderStars");
      if (!header || !stars) return;

      header.addEventListener("mousemove", function (e) {
        const rect = header.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;
        stars.style.transform = "translate(" + x * 15 + "px, " + y * 15 + "px)";
      });

      header.addEventListener("mouseleave", function () {
        stars.style.transform = "translate(0, 0)";
      });

      petHeaderMouseEffectBound = true;
    }

    function preloadMainAssets() {
        const variant = PET_VARIANTS[state.currentIndex];
        const bg = STAGE_BACKGROUNDS[state.selectedStageBackgroundIndex] || STAGE_BACKGROUNDS[0];
        if (variant && bg) {
            [variant.level1, variant.level2, variant.eyeOpen, bg.fileName].forEach(file => {
               fetchAssetUrl(file); // Fire and forget fetch cache
            });
        }
    }

    function updateXQPUI() {
      const xqpDisplay = document.getElementById("petXQPBalance");
      if (!xqpDisplay) return;

      // 1. Immediately display from window.currentUser (fast, may be stale)
      if (window.currentUser && typeof window.currentUser.totalXQP !== 'undefined') {
        const userBalance = parseInt(window.currentUser.totalXQP) || 0;
        state.totalXQP = userBalance;
      }
      xqpDisplay.textContent = Number(state.totalXQP).toLocaleString();

      // 2. Fetch authoritative value from server to ensure accuracy
      const user = window.currentUser;
      if (user && user.userId && typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(result) {
            if (result && result.status === 'success' && result.user) {
              const serverXQP = parseInt(result.user.totalXQP) || 0;
              state.totalXQP = serverXQP;

              // Sync back to window.currentUser and storage
              if (window.currentUser) {
                window.currentUser.totalXQP = serverXQP;
                if (typeof result.user.totalXP !== 'undefined') {
                  window.currentUser.totalXP = result.user.totalXP;
                }
                try {
                  var storageKey = localStorage.getItem("currentUser") ? "localStorage" : "sessionStorage";
                  window[storageKey].setItem("currentUser", JSON.stringify(window.currentUser));
                } catch (e) {}
              }

              // Update display with server value
              const el = document.getElementById("petXQPBalance");
              if (el) el.textContent = Number(serverXQP).toLocaleString();
            }
          })
          .withFailureHandler(function(err) {
            console.warn("Pet XQP fetch failed:", err);
          })
          .getUserSession(user.userId);
      }
    }

    function initPetPage() {
      if (!state.initialized) {
        bindPetNameEditor();
        bindControls();
        bindStageInteractions();
        buildColorButtons();
        buildBackgroundButtons();
        buildAccessoryButtons();
        buildFoodButtons();
        updatePetCatalogHints();
        loadPetItemCatalogFromServer();
        loadTopicProgressCacheForPet();
        bindAccessoryControls();
        bindSettingsPanelToggle();
        bindBackgroundPanelToggle();
        bindAccessoryPanelToggle();
        bindFoodPanelToggle();
        bindPanelControlsClick();
        bindNavigationGuard();
        startBlinkLoop();
        updateSettingsPanelVisibility();
        updateBackgroundPanelVisibility();
        updateAccessoryPanelVisibility();
        updateFoodPanelVisibility();
        startJumpingRoutine();
        state.initialized = true;

        // Initialize lastSavedConfig as a copy of initial state if empty
        if (!state.lastSavedConfig) {
          state.lastSavedConfig = JSON.parse(JSON.stringify(buildPersistedConfig()));
        }
        updateSaveButtonUI();
        registerPetServiceWorker();
        preloadMainAssets();
      }
      startPetHeaderMeteors();
      setupPetHeaderMouseEffect();
      loadPetNameFromServer();
      loadTopicProgressCacheForPet();
      loadPetConfigFromServer();
      updateXQPUI();
      renderPet();
    }


    window.initPetPage = initPetPage;
  })();
</script>
