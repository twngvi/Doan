<script>
  (function () {
    "use strict";

    const DEFAULT_STATE = {
      xp: 0,
      coins: 120,
      level: {
        current: 1,
        progress: 0,
      },
      status: {
        energy: 78,
        hunger: 65,
        mood: 82,
        clean: 74,
      },
      requirements: {
        learn: 0,
        quiz: 0,
        matching: 0,
        target: 3,
      },
      hatch: {
        isHatched: false,
        hatchedAt: "",
      },
    };
    const PET_STATE_STORAGE_KEY = "oq_pet_preview_state";
    const PET_NAME_STORAGE_KEY = "oq_pet_preview_name";
    const PET_XP_COIN_DAILY_SYNC_KEY = "oq_pet_xp_coin_daily_sync";
    const PET_FOOD_USER_CACHE_KEY = "oq_pet_food_user_cache";
    const PET_VISUAL_PROFILE_STORAGE_KEY = "oq_pet_visual_profile_v1";
    const DEFAULT_PET_NAME = "Bé Slime";
    const FALLBACK_FOODS = [
      {
        id: "food_corn",
        name: "Bap ngot",
        icon: "🌽",
        priceXqp: 40,
        xpGain: 12,
        unlockType: "lesson_topic",
        unlockValue: "topic_01",
        starter: true,
      },
      {
        id: "food_carrot",
        name: "Ca rot gion",
        icon: "🥕",
        priceXqp: 55,
        xpGain: 10,
        unlockType: "quiz_topic",
        unlockValue: "topic_02",
        starter: false,
      },
    ];

    const PET_STAGE_CONFIG = [
      {
        index: 1,
        key: "core_slime",
        label: "Giai đoạn 1 - Hạt năng lượng",
        minLevel: 0,
        prompt: "tiny semi-transparent energy droplet, inner pearl glow, gentle pulse, pastel blue-green",
      },
      {
        index: 2,
        key: "baby_slime",
        label: "Giai đoạn 2 - Baby slime",
        minLevel: 1,
        prompt: "small round baby slime blob, simple dot eyes with highlights, strong bounce deformation, pastel green jelly",
      },
      {
        index: 3,
        key: "young_slime",
        label: "Giai đoạn 3 - Slime phát triển",
        minLevel: 4,
        prompt: "1.4x bigger slime, inner gradient layers, expressive eyes, mouth, blush marks, stronger ripple",
      },
      {
        index: 4,
        key: "advanced_slime",
        label: "Giai đoạn 4 - Slime nâng cao",
        minLevel: 8,
        prompt: "stable but soft slime form, gel protrusions, accessories like bow or glasses, particles when moving",
      },
      {
        index: 5,
        key: "mature_slime",
        label: "Giai đoạn 5 - Slime trưởng thành",
        minLevel: 15,
        prompt: "ultra smooth glossy slime, multi-layer internal colors, aura glow, liquid intelligence feel, premium animation",
      },
    ];

    const PET_GENDER_CONFIG = {
      male: {
        label: "Slime đực",
        prompt:
          "slightly squarer blob form, deeper blue-purple tone, tech glasses accessory, stronger bounce deformation",
      },
      female: {
        label: "Slime cái",
        prompt:
          "rounder softer blob, brighter pastel pink palette, bow accessory, smoother gentler movement, sparkle particles",
      },
      neutral: {
        label: "Neutral",
        prompt: "gender-neutral slime blob, keep soft green identity",
      },
    };

    const PET_STATE_CONFIG = {
      happy: {
        label: "Vui",
        prompt: "eyes brighter and slightly wider, gentle body bounce, glow slightly stronger",
      },
      hungry: {
        label: "Đói",
        prompt: "droopy sleepy eyes, slightly flattened body, lighter desaturated tone, reduced glow",
      },
      clean: {
        label: "Sạch",
        prompt: "sparkles around body, glossier fur, subtle water shine and reflections",
      },
      dirty: {
        label: "Bẩn",
        prompt: "light dirt marks on body, duller tone, little to no glow",
      },
    };

    const PET_STATE_PRESETS = {
      happy: { hunger: 78, mood: 92, clean: 74 },
      hungry: { hunger: 18, mood: 42, clean: 58 },
      clean: { hunger: 72, mood: 80, clean: 96 },
      dirty: { hunger: 58, mood: 46, clean: 18 },
    };

    const PET_NEGATIVE_PROMPT =
      "realistic liquid physics too complex, dark horror slime, sharp edges, low quality, noisy texture, dirty background, aggressive style, hard surface, non-deformable";

    let petGlobalEscBound = false;
    let eggHoverRafId = 0;
    let eggHoverRatioX = 0;
    let petIsHatched = false;
    let petIsHatchReady = false;
    let petHatchAnimating = false;
    let petModalMode = "food";
    let petVisualProfile = {
      gender: "female",
      statePreset: "",
    };
    let petFoodState = {
      foods: FALLBACK_FOODS.slice(),
      accessories: [],
      ownedFoodIds: FALLBACK_FOODS.filter((f) => f.starter).map((f) => f.id),
      ownedAccessoryIds: [],
      loaded: false,
    };

    function clamp(value, min, max) {
      const number = Number(value);
      if (!Number.isFinite(number)) return min;
      return Math.min(max, Math.max(min, number));
    }

    function notify(message, type) {
      if (typeof window.showToast === "function") {
        window.showToast(message, type || "info");
      } else {
        console.log("Pet notice:", message);
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function getUnlockLabel(item) {
      const type = String(item?.unlockType || "none");
      const value = String(item?.unlockValue || "").trim();
      if (type === "none") return "Khong yeu cau unlock";
      if (!value) return type;
      return `${type}: ${value}`;
    }

    function loadCachedPetFoodState() {
      try {
        const raw = localStorage.getItem(PET_FOOD_USER_CACHE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return;

        const foods = Array.isArray(parsed.foods) ? parsed.foods : FALLBACK_FOODS.slice();
        const accessories = Array.isArray(parsed.accessories) ? parsed.accessories : [];
        const ownedFoodIds = Array.isArray(parsed.ownedFoodIds)
          ? parsed.ownedFoodIds.map(String)
          : foods.filter((f) => f && f.starter).map((f) => String(f.id));
        const ownedAccessoryIds = Array.isArray(parsed.ownedAccessoryIds)
          ? parsed.ownedAccessoryIds.map(String)
          : [];

        petFoodState = {
          foods,
          accessories,
          ownedFoodIds,
          ownedAccessoryIds,
          loaded: !!parsed.loaded,
        };
      } catch (error) {
        console.warn("Pet food cache parse failed:", error);
      }
    }

    function saveCachedPetFoodState() {
      try {
        localStorage.setItem(PET_FOOD_USER_CACHE_KEY, JSON.stringify(petFoodState));
      } catch (error) {
        console.warn("Pet food cache save failed:", error);
      }
    }

    function loadPetPreviewState() {
      try {
        const raw = localStorage.getItem(PET_STATE_STORAGE_KEY);
        if (!raw) return DEFAULT_STATE;

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") {
          return DEFAULT_STATE;
        }

        return {
          xp: clamp(parsed.xp, 0, 999999),
          coins: clamp(parsed.coins, 0, 999999),
          level: {
            current: Math.max(1, Math.floor(clamp(parsed.level?.current, 1, 9999))),
            progress: clamp(
              parsed.level?.progress != null ? parsed.level.progress : parsed.status?.energy,
              0,
              100,
            ),
          },
          status: {
            energy: clamp(parsed.status?.energy, 0, 100),
            hunger: clamp(parsed.status?.hunger, 0, 100),
            mood: clamp(parsed.status?.mood, 0, 100),
            clean: clamp(parsed.status?.clean, 0, 100),
          },
          requirements: {
            target: clamp(parsed.requirements?.target, 1, 10),
            learn: clamp(parsed.requirements?.learn, 0, 10),
            quiz: clamp(parsed.requirements?.quiz, 0, 10),
            matching: clamp(parsed.requirements?.matching, 0, 10),
          },
          hatch: {
            isHatched: !!parsed.hatch?.isHatched,
            hatchedAt: String(parsed.hatch?.hatchedAt || ""),
          },
        };
      } catch (error) {
        console.warn("Pet state parse failed, using defaults:", error);
        return DEFAULT_STATE;
      }
    }

    function savePetPreviewState(state) {
      try {
        const safeState = {
          xp: clamp(state?.xp, 0, 999999),
          coins: clamp(state?.coins, 0, 999999),
          level: {
            current: Math.max(1, Math.floor(clamp(state?.level?.current, 1, 9999))),
            progress: clamp(state?.level?.progress, 0, 100),
          },
          status: {
            energy: clamp(state?.status?.energy, 0, 100),
            hunger: clamp(state?.status?.hunger, 0, 100),
            mood: clamp(state?.status?.mood, 0, 100),
            clean: clamp(state?.status?.clean, 0, 100),
          },
          requirements: {
            target: clamp(state?.requirements?.target, 1, 10),
            learn: clamp(state?.requirements?.learn, 0, 10),
            quiz: clamp(state?.requirements?.quiz, 0, 10),
            matching: clamp(state?.requirements?.matching, 0, 10),
          },
          hatch: {
            isHatched: !!state?.hatch?.isHatched,
            hatchedAt: String(state?.hatch?.hatchedAt || ""),
          },
        };

        localStorage.setItem(PET_STATE_STORAGE_KEY, JSON.stringify(safeState));
      } catch (error) {
        console.warn("Pet state save failed:", error);
      }
    }

    function ensureLevelState(state) {
      if (!state.level || typeof state.level !== "object") {
        state.level = {
          current: 1,
          progress: clamp(state?.status?.energy, 0, 100),
        };
      }

      state.level.current = Math.max(1, Math.floor(clamp(state.level.current, 1, 9999)));
      state.level.progress = clamp(state.level.progress, 0, 100);
    }

    function renderLevelStatus(levelState) {
      const current = Math.max(1, Math.floor(clamp(levelState?.current, 1, 9999)));
      const progress = Math.round(clamp(levelState?.progress, 0, 100));

      setText("petLevelValue", `Level ${current}`);
      setText("petLevelPointsText", `${progress} / 100`);
      setProgressBar("petLevelProgress", progress);
    }

    function gainPetLevelProgress(state, amount) {
      ensureLevelState(state);

      let progress = clamp(state.level.progress, 0, 100) + Math.max(0, Number(amount) || 0);
      let levelUpCount = 0;

      while (progress >= 100) {
        progress -= 100;
        state.level.current += 1;
        levelUpCount += 1;
      }

      state.level.progress = clamp(progress, 0, 100);
      renderLevelStatus(state.level);
      savePetPreviewState(state);

      return {
        levelUpCount,
        currentLevel: state.level.current,
        currentProgress: Math.round(state.level.progress),
      };
    }

    function getTodayVNKey() {
      try {
        return new Intl.DateTimeFormat("en-CA", {
          timeZone: "Asia/Ho_Chi_Minh",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
        }).format(new Date());
      } catch (error) {
        const now = new Date();
        const y = now.getFullYear();
        const m = String(now.getMonth() + 1).padStart(2, "0");
        const d = String(now.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }
    }

    function loadDailySyncInfo() {
      try {
        const raw = localStorage.getItem(PET_XP_COIN_DAILY_SYNC_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") return null;

        return {
          date: String(parsed.date || ""),
          lastXP: clamp(parsed.lastXP, 0, 999999),
        };
      } catch (error) {
        console.warn("Pet daily sync parse failed:", error);
        return null;
      }
    }

    function saveDailySyncInfo(sync) {
      try {
        const safeSync = {
          date: String(sync?.date || ""),
          lastXP: clamp(sync?.lastXP, 0, 999999),
        };
        localStorage.setItem(PET_XP_COIN_DAILY_SYNC_KEY, JSON.stringify(safeSync));
      } catch (error) {
        console.warn("Pet daily sync save failed:", error);
      }
    }

    function syncDailyCoinsFromXP(state, currentTotalXP) {
      const today = getTodayVNKey();
      const sync = loadDailySyncInfo();
      const currentXP = clamp(currentTotalXP, 0, 999999);

      if (!sync) {
        state.xp = currentXP;
        saveDailySyncInfo({ date: today, lastXP: currentXP });
        savePetPreviewState(state);
        return 0;
      }

      if (sync.date !== today) {
        const carryDelta = Math.max(0, currentXP - clamp(sync.lastXP, 0, 999999));

        state.xp = currentXP;
        saveDailySyncInfo({ date: today, lastXP: currentXP });
        savePetPreviewState(state);
        return carryDelta;
      }

      const deltaXP = Math.max(0, currentXP - clamp(sync.lastXP, 0, 999999));
      // Server is the source of truth for XQP minting from XP gains.
      // Client only tracks latest total XP seen for UI/local cache coherence.

      state.xp = currentXP;
      saveDailySyncInfo({ date: today, lastXP: currentXP });
      savePetPreviewState(state);
      return deltaXP;
    }

    function buildHatchTracker(requirements) {
      const target = Math.max(1, Number(requirements?.target) || 3);
      const learn = clamp(requirements?.learn, 0, target);
      const quiz = clamp(requirements?.quiz, 0, target);
      const matching = clamp(requirements?.matching, 0, target);
      const total = learn + quiz + matching;
      const max = target * 3;
      const percent = Math.round((total / max) * 100);

      return {
        target,
        learn,
        quiz,
        matching,
        percent,
        isReady: learn >= target && quiz >= target && matching >= target,
      };
    }

    function hashStringToInt(value) {
      const text = String(value || "");
      let hash = 0;
      for (let i = 0; i < text.length; i++) {
        hash = (hash << 5) - hash + text.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function loadPetVisualProfile(defaultGender) {
      const safeDefaultGender = defaultGender === "male" ? "male" : "female";
      try {
        const raw = localStorage.getItem(PET_VISUAL_PROFILE_STORAGE_KEY);
        if (!raw) {
          return {
            gender: safeDefaultGender,
            statePreset: "",
          };
        }

        const parsed = JSON.parse(raw);
        if (!parsed || typeof parsed !== "object") {
          return {
            gender: safeDefaultGender,
            statePreset: "",
          };
        }

        const gender = String(parsed.gender || "").toLowerCase();
        const statePreset = String(parsed.statePreset || "").toLowerCase();

        return {
          gender: gender === "male" || gender === "female" ? gender : safeDefaultGender,
          statePreset: PET_STATE_CONFIG[statePreset] ? statePreset : "",
        };
      } catch (error) {
        console.warn("Pet visual profile parse failed:", error);
        return {
          gender: safeDefaultGender,
          statePreset: "",
        };
      }
    }

    function savePetVisualProfile(profile) {
      try {
        const safeProfile = {
          gender: profile?.gender === "male" ? "male" : "female",
          statePreset: PET_STATE_CONFIG[profile?.statePreset] ? profile.statePreset : "",
        };
        localStorage.setItem(PET_VISUAL_PROFILE_STORAGE_KEY, JSON.stringify(safeProfile));
      } catch (error) {
        console.warn("Pet visual profile save failed:", error);
      }
    }

    function resolvePetStage(state) {
      const isHatched = !!state?.hatch?.isHatched;
      if (!isHatched) {
        return PET_STAGE_CONFIG[0];
      }

      const level = Math.max(1, parseInt(state?.level?.current, 10) || 1);
      if (level >= 15) return PET_STAGE_CONFIG[4];
      if (level >= 8) return PET_STAGE_CONFIG[3];
      if (level >= 4) return PET_STAGE_CONFIG[2];
      return PET_STAGE_CONFIG[1];
    }

    function resolvePetPrimaryState(state, forcedPreset) {
      if (PET_STATE_CONFIG[forcedPreset]) {
        return forcedPreset;
      }

      const hunger = clamp(state?.status?.hunger, 0, 100);
      const mood = clamp(state?.status?.mood, 0, 100);
      const clean = clamp(state?.status?.clean, 0, 100);

      if (clean <= 34) return "dirty";
      if (hunger <= 34) return "hungry";
      if (clean >= 86) return "clean";
      if (mood >= 68) return "happy";
      return "happy";
    }

    function resolvePetGender(stage, preferredGender) {
      if (!stage || stage.index < 4) {
        return "neutral";
      }
      return preferredGender === "male" ? "male" : "female";
    }

    function updateClassTokenByPrefix(element, prefix, token) {
      if (!element) return;

      const toRemove = [];
      for (let i = 0; i < element.classList.length; i++) {
        const className = element.classList.item(i);
        if (className && className.indexOf(prefix) === 0) {
          toRemove.push(className);
        }
      }

      toRemove.forEach(function (className) {
        element.classList.remove(className);
      });

      if (token) {
        element.classList.add(token);
      }
    }

    function applyPetVisualClassTokens(stage, gender, stateKey) {
      const page = document.getElementById("page-pet");
      if (!page) return;

      updateClassTokenByPrefix(page, "pet-stage-", "pet-stage-" + String(stage?.index || 1));
      updateClassTokenByPrefix(page, "pet-gender-", "pet-gender-" + String(gender || "neutral"));
      updateClassTokenByPrefix(page, "pet-state-", "pet-state-" + String(stateKey || "happy"));
    }

    function buildPetVisualPrompt(stage, gender, stateKey) {
      const stagePrompt = stage?.prompt || PET_STAGE_CONFIG[0].prompt;
      const genderPrompt = PET_GENDER_CONFIG[gender]?.prompt || PET_GENDER_CONFIG.neutral.prompt;
      const statePrompt = PET_STATE_CONFIG[stateKey]?.prompt || PET_STATE_CONFIG.happy.prompt;

      return (
        "3D cartoon soft slime character, premium mobile casual style, blob form no legs, semi-transparent gel/jelly material, pastel green-blue-purple palette, no hard outline, smooth shading, subsurface scattering, specular highlights, cute dot eyes with highlights.\n" +
        "Maintain same character identity across all evolution stages.\n" +
        "Stage: " +
        stagePrompt +
        ".\n" +
        "Gender variant: " +
        genderPrompt +
        ".\n" +
        "State variant: " +
        statePrompt +
        ".\n" +
        "Lighting and render: key light from top-left, subsurface scattering, soft blurred ground shadow, surrounding glow aura.\n" +
        "Idle animation guide: squash and stretch with physics delay, eye blink every 3 to 4 seconds, ripple when idle, jelly wobble.\n" +
        "Composition: character centered, simple gradient background in soft blue or green, no complex scene clutter.\n" +
        "Negative prompt: " +
        PET_NEGATIVE_PROMPT
      );
    }

    function renderPetEvolutionLane(stage) {
      const nodes = document.querySelectorAll("[data-pet-stage-index]");
      if (!nodes || nodes.length === 0) return;

      const activeIndex = Math.max(1, parseInt(stage?.index, 10) || 1);
      nodes.forEach(function (node) {
        const nodeIndex = Math.max(1, parseInt(node.getAttribute("data-pet-stage-index"), 10) || 1);
        node.classList.toggle("active", nodeIndex === activeIndex);
      });
    }

    function renderPetGenderTabs(gender, allowGender) {
      const genderButtons = document.querySelectorAll("[data-pet-gender-choice]");
      genderButtons.forEach(function (button) {
        const choice = String(button.getAttribute("data-pet-gender-choice") || "");
        const active = allowGender && choice === gender;
        button.classList.toggle("active", active);
        button.setAttribute("aria-selected", active ? "true" : "false");
        button.disabled = !allowGender;
      });

      const hintEl = document.getElementById("petGenderHint");
      if (!hintEl) return;
      hintEl.textContent = allowGender
        ? "Giới tính đang áp dụng cho stage hiện tại."
        : "Giới tính chỉ áp dụng từ giai đoạn 4, hiện đang dùng neutral.";
    }

    function renderStatePresetButtons(activePreset) {
      const stateButtons = document.querySelectorAll("[data-pet-preview-state]");
      stateButtons.forEach(function (button) {
        const preset = String(button.getAttribute("data-pet-preview-state") || "");
        button.classList.toggle("active", preset === activePreset);
      });
    }

    function renderPetVisualSystem(state) {
      const user = window.currentUser || {};
      const level = Math.max(1, parseInt(state?.level?.current, 10) || 1);
      const seed = String(user.userId || user.email || user.username || "guest");

      if (!petVisualProfile || typeof petVisualProfile !== "object") {
        const fallbackGender = hashStringToInt(seed) % 2 === 0 ? "female" : "male";
        petVisualProfile = loadPetVisualProfile(fallbackGender);
      }

      const stage = resolvePetStage(state);
      const allowGender = stage.index >= 4;
      const effectiveGender = resolvePetGender(stage, petVisualProfile.gender);
      const stateKey = resolvePetPrimaryState(state, petVisualProfile.statePreset);

      applyPetVisualClassTokens(stage, effectiveGender, stateKey);
      renderPetEvolutionLane(stage);
      renderPetGenderTabs(petVisualProfile.gender, allowGender);
      renderStatePresetButtons(petVisualProfile.statePreset);

      setText("petVisualStagePill", stage.label);
      setText("petVisualIdentityValue", "Soft 3D Cartoon Slime - L" + level);
      setText("petVisualGenderValue", PET_GENDER_CONFIG[effectiveGender]?.label || "Neutral");
      setText("petVisualStateValue", PET_STATE_CONFIG[stateKey]?.label || "Vui");

      const prompt = buildPetVisualPrompt(stage, effectiveGender, stateKey);
      const promptOutput = document.getElementById("petPromptOutput");
      if (promptOutput) {
        promptOutput.value = prompt;
      }
    }

    function applyPetStatePreset(presetKey) {
      const preset = PET_STATE_PRESETS[presetKey];
      if (!preset) return;

      const state = loadPetPreviewState();
      state.status = Object.assign({}, state.status, {
        hunger: clamp(preset.hunger, 0, 100),
        mood: clamp(preset.mood, 0, 100),
        clean: clamp(preset.clean, 0, 100),
      });

      savePetPreviewState(state);
      setText("petHungerValue", `${Math.round(state.status.hunger)}%`);
      setText("petMoodValue", `${Math.round(state.status.mood)}%`);
      setText("petCleanValue", `${Math.round(state.status.clean)}%`);
      renderPetVisualSystem(state);
    }

    function setPetActionButtonsEnabled(isEnabled) {
      const actionButtons = document.querySelectorAll("[data-pet-action]");
      actionButtons.forEach(function (button) {
        button.disabled = !isEnabled;
        button.setAttribute("aria-disabled", isEnabled ? "false" : "true");
      });

      const nameTag = document.getElementById("petNameTag");
      if (nameTag) {
        nameTag.disabled = !isEnabled;
        nameTag.setAttribute("aria-disabled", isEnabled ? "false" : "true");
      }
    }

    function renderPetLockNotice(tracker, isHatched) {
      const titleEl = document.getElementById("petHatchNoticeTitle");
      const metaEl = document.getElementById("petHatchNoticeMeta");
      if (!titleEl || !metaEl) return;

      const safeTracker = tracker || { target: 3, learn: 0, quiz: 0, matching: 0, percent: 0, isReady: false };

      if (isHatched) {
        titleEl.textContent = "Slime đã mở khóa";
        metaEl.textContent = "Toàn bộ tính năng Slime đã được mở khóa.";
        return;
      }

      if (safeTracker.isReady) {
        titleEl.textContent = "Đã đủ điều kiện tiến hóa";
        metaEl.textContent = "Bấm vào hạt năng lượng để kích hoạt mở khóa slime.";
        return;
      }

      titleEl.textContent = "Hạt năng lượng đang tích tụ";
      metaEl.textContent =
        "Tiến độ mở khóa: Học " +
        safeTracker.learn +
        "/" +
        safeTracker.target +
        ", Quiz " +
        safeTracker.quiz +
        "/" +
        safeTracker.target +
        ", Matching " +
        safeTracker.matching +
        "/" +
        safeTracker.target +
        " (" +
        safeTracker.percent +
        "%).";
    }

    function applyPetLockState(state, tracker) {
      const page = document.getElementById("page-pet");
      const hero = document.querySelector(".pet-hero-visual");
      const egg = document.querySelector(".pet-egg");

      const hatchState = state && state.hatch ? state.hatch : { isHatched: false, hatchedAt: "" };
      const isHatched = !!hatchState.isHatched;
      petIsHatched = isHatched;
      petIsHatchReady = !!(tracker && tracker.isReady);

      if (page) {
        page.classList.toggle("pet-locked", !isHatched);
      }

      if (hero) {
        hero.classList.toggle("pet-hatched", isHatched);
        if (!petHatchAnimating) {
          hero.classList.remove("pet-hatching");
        }
      }

      if (egg) {
        egg.classList.toggle("hatched", isHatched);
      }

      setPetActionButtonsEnabled(isHatched);
      renderPetLockNotice(tracker, isHatched);

      if (!isHatched) {
        setText("petLevelValue", "🔒 Chưa mở khóa");
        setText("petLevelPointsText", "Slime chưa mở khóa");
        setProgressBar("petLevelProgress", 0);
        closePetFoodModal();
        closePetRenameModal();
      } else {
        renderLevelStatus(state.level);
      }

      renderPetVisualSystem(state);
    }

    function playPetHatchAnimation(onDone) {
      const hero = document.querySelector(".pet-hero-visual");
      const egg = document.querySelector(".pet-egg");
      if (!hero || !egg) {
        if (typeof onDone === "function") onDone();
        return;
      }

      petHatchAnimating = true;
      hero.classList.add("pet-hatching");
      hero.classList.remove("pet-hatched");
      egg.classList.add("hatching");
      egg.classList.remove("hatched");

      window.setTimeout(function () {
        egg.classList.remove("hatching");
        egg.classList.add("hatched");
        hero.classList.remove("pet-hatching");
        hero.classList.add("pet-hatched");
        petHatchAnimating = false;

        if (typeof onDone === "function") {
          onDone();
        }
      }, 1050);
    }

    function isPetFeatureLocked() {
      return !petIsHatched;
    }

    function normalizePetName(value, fallback) {
      const safeFallback = String(fallback || DEFAULT_PET_NAME).trim() || DEFAULT_PET_NAME;
      const normalized = String(value || "")
        .trim()
        .replace(/\s+/g, " ");

      const lowered = normalized.toLowerCase();
      if (lowered === "be ga" || lowered === "bé gà" || lowered === "be capi" || lowered === "bé capi") {
        return DEFAULT_PET_NAME;
      }

      return normalized || safeFallback;
    }

    function loadPetName(fallbackName) {
      try {
        const raw = localStorage.getItem(PET_NAME_STORAGE_KEY);
        if (!raw || typeof raw !== "string") {
          return normalizePetName("", fallbackName || DEFAULT_PET_NAME);
        }

        return normalizePetName(raw, fallbackName || DEFAULT_PET_NAME);
      } catch (error) {
        console.warn("Pet name parse failed, using default:", error);
        return normalizePetName("", fallbackName || DEFAULT_PET_NAME);
      }
    }

    function savePetName(name) {
      try {
        const safeName = normalizePetName(name, DEFAULT_PET_NAME);
        localStorage.setItem(PET_NAME_STORAGE_KEY, safeName);

        if (typeof google !== "undefined" && google.script && google.script.run) {
          google.script.run
            .withFailureHandler(function (error) {
              console.warn("Sync pet name to backend failed:", error);
            })
            .updateCurrentUserPetName(safeName);
        }
      } catch (error) {
        console.warn("Pet name save failed:", error);
      }
    }

    function applySnapshotToLocal(snapshotData) {
      if (!snapshotData || typeof snapshotData !== "object") return;

      const state = loadPetPreviewState();
      ensureLevelState(state);

      const serverState = snapshotData.petState || {};
      state.coins = clamp(serverState.coins, 0, 999999);
      state.level.current = Math.max(1, parseInt(serverState.levelCurrent, 10) || 1);
      state.level.progress = clamp(serverState.levelProgress, 0, 100);

      if (serverState.gender != null) {
        petVisualProfile.gender =
          String(serverState.gender || "").toLowerCase() === "male" ? "male" : "female";
        savePetVisualProfile(petVisualProfile);
      }

      const req = serverState.requirements || {};
      state.requirements = {
        target: clamp(req.target != null ? req.target : 3, 1, 10),
        learn: clamp(req.learn, 0, 10),
        quiz: clamp(req.quiz, 0, 10),
        matching: clamp(req.matching, 0, 10),
      };

      state.hatch = {
        isHatched: !!serverState.isHatched,
        hatchedAt: String(serverState.hatchedAt || state?.hatch?.hatchedAt || ""),
      };

      savePetPreviewState(state);

      petFoodState = {
        foods: Array.isArray(snapshotData.foods) ? snapshotData.foods : petFoodState.foods,
        accessories: Array.isArray(snapshotData.accessories) ? snapshotData.accessories : [],
        ownedFoodIds: Array.isArray(snapshotData.ownedFoodIds)
          ? snapshotData.ownedFoodIds.map(String)
          : petFoodState.ownedFoodIds,
        ownedAccessoryIds: Array.isArray(snapshotData.ownedAccessoryIds)
          ? snapshotData.ownedAccessoryIds.map(String)
          : petFoodState.ownedAccessoryIds,
        loaded: true,
      };
      saveCachedPetFoodState();

      const serverPetName = normalizePetName(snapshotData.petName, "");
      if (serverPetName) {
        localStorage.setItem(PET_NAME_STORAGE_KEY, serverPetName);
        renderPetName(serverPetName);
      }
    }

    function syncPetStateToBackend(state, petName) {
      if (typeof google === "undefined" || !google.script || !google.script.run) {
        return;
      }

      if (!state?.hatch?.isHatched) {
        return;
      }

      google.script.run
        .withFailureHandler(function (error) {
          console.warn("Sync pet state failed:", error);
        })
        .syncCurrentUserPetState({
          petName: normalizePetName(petName, DEFAULT_PET_NAME),
          levelCurrent: Math.max(1, parseInt(state?.level?.current, 10) || 1),
          levelProgress: clamp(state?.level?.progress, 0, 100),
          gender: petVisualProfile?.gender === "male" ? "male" : "female",
        });
    }

    function consumeOwnedFood(foodId) {
      if (!foodId) return;

      if (isPetFeatureLocked()) {
        notify("Pet chưa nở, chưa thể cho ăn.", "warning");
        return;
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        notify("Khong the ket noi server de xu ly cho an.", "warning");
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || !result.success || !result.data) {
            notify((result && result.message) || "Khong the cho pet an.", "error");
            return;
          }

          applySnapshotToLocal(result.data);
          const state = loadPetPreviewState();
          ensureLevelState(state);
          applyPetLockState(state, buildHatchTracker(state.requirements));
          setText("petCoinValue", String(Math.round(state.coins)));
          renderLevelStatus(state.level);
          renderPetFoodModal();
          notify(result.message || "Pet da an xong", "success");
        })
        .withFailureHandler(function (error) {
          notify("Loi cho an: " + error, "error");
        })
        .consumePetFoodForUser(String(foodId));
    }

    function setupPetFoodModal() {
      loadCachedPetFoodState();

      const modal = document.getElementById("petFoodModal");
      const closeBtn = document.getElementById("petFoodModalClose");
      if (!modal || !closeBtn || modal.dataset.modalBound === "1") {
        fetchPetFoodDataForUser();
        return;
      }

      modal.dataset.modalBound = "1";

      const tablists = modal.querySelectorAll('[role="tablist"]');
      tablists.forEach(function (tablist) {
        if (!tablist || tablist.dataset.kbdBound === "1") return;
        tablist.dataset.kbdBound = "1";

        tablist.addEventListener("keydown", function (event) {
          if (!["ArrowRight", "ArrowLeft", "Home", "End"].includes(event.key)) return;

          const tabs = Array.from(tablist.querySelectorAll('[role="tab"]')).filter(function (tab) {
            return getComputedStyle(tab).display !== "none";
          });
          if (tabs.length === 0) return;

          const currentIndex = Math.max(0, tabs.indexOf(document.activeElement));
          let nextIndex = currentIndex;

          if (event.key === "ArrowRight") {
            nextIndex = (currentIndex + 1) % tabs.length;
          } else if (event.key === "ArrowLeft") {
            nextIndex = (currentIndex - 1 + tabs.length) % tabs.length;
          } else if (event.key === "Home") {
            nextIndex = 0;
          } else if (event.key === "End") {
            nextIndex = tabs.length - 1;
          }

          event.preventDefault();
          const nextTab = tabs[nextIndex];
          if (nextTab) {
            nextTab.focus();
            nextTab.click();
          }
        });
      });

      closeBtn.addEventListener("click", closePetFoodModal);

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          closePetFoodModal();
          return;
        }

        const modeBtn = event.target.closest("[data-pet-mode]");
        if (modeBtn) {
          setPetModalMode(modeBtn.getAttribute("data-pet-mode"));
          return;
        }

        const eatBtn = event.target.closest("[data-pet-eat-food-id]");
        if (eatBtn) {
          consumeOwnedFood(eatBtn.getAttribute("data-pet-eat-food-id"));
          return;
        }

        const buyBtn = event.target.closest("[data-pet-buy-food-id]");
        if (buyBtn && !buyBtn.disabled) {
          buyFoodForPet(buyBtn.getAttribute("data-pet-buy-food-id"));
        }
      });

      fetchPetFoodDataForUser();
      renderPetFoodModal();
    }

    function requestPetHatch(tracker) {
      if (petHatchAnimating) {
        return;
      }

      if (petIsHatched) {
        notify("Slime đã mở khóa trước đó rồi.", "info");
        return;
      }

      if (!tracker || !tracker.isReady) {
        notify(
          "Chưa đủ điều kiện mở khóa slime. Hãy hoàn thành thêm bài học, quiz và matching.",
          "info",
        );
        return;
      }

      if (typeof google === "undefined" || !google.script || !google.script.run) {
        notify("Không thể kết nối server để mở khóa slime.", "error");
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || !result.success || !result.data) {
            notify((result && result.message) || "Mở khóa slime thất bại.", "error");
            return;
          }

          applySnapshotToLocal(result.data);
          const nextState = loadPetPreviewState();
          ensureLevelState(nextState);
          const nextTracker = buildHatchTracker(nextState.requirements);

          playPetHatchAnimation(function () {
            applyPetLockState(nextState, nextTracker);
            setText("petCoinValue", String(Math.round(nextState.coins)));
            renderPetFoodModal();
            notify(result.message || "Slime đã được mở khóa!", "success");
          });
        })
        .withFailureHandler(function (error) {
          notify("Lỗi mở khóa slime: " + error, "error");
        })
        .hatchCurrentUserPet();
    }

    function setupEggHoverTilt() {
      const egg = document.querySelector(".pet-egg");
      if (!egg || egg.dataset.tiltBound === "1") {
        return;
      }
      egg.dataset.tiltBound = "1";

      function stopEggHoverAnimation() {
        if (eggHoverRafId) {
          cancelAnimationFrame(eggHoverRafId);
          eggHoverRafId = 0;
        }
      }

      function runEggHoverAnimation() {
        const baseTilt = clamp(-eggHoverRatioX * 20, -14, 14);
        const wobbleTilt = Math.sin(Date.now() / 90) * 2.4;
        const finalTilt = baseTilt + wobbleTilt;
        egg.style.setProperty("--pet-egg-tilt", `${finalTilt.toFixed(2)}deg`);
        eggHoverRafId = requestAnimationFrame(runEggHoverAnimation);
      }

      egg.addEventListener("mouseenter", function () {
        if (!eggHoverRafId) {
          runEggHoverAnimation();
        }
      });

      egg.addEventListener("mousemove", function (event) {
        const rect = egg.getBoundingClientRect();
        const x = (event.clientX - rect.left) / rect.width;
        eggHoverRatioX = clamp(x - 0.5, -0.5, 0.5);
      });

      egg.addEventListener("mouseleave", function () {
        eggHoverRatioX = 0;
        stopEggHoverAnimation();
        egg.style.setProperty("--pet-egg-tilt", "0deg");
      });

      egg.addEventListener("click", function () {
        const state = loadPetPreviewState();
        const tracker = buildHatchTracker(state.requirements);
        requestPetHatch(tracker);
      });
    }

    function openPetRenameModal() {

      }

      const input = document.getElementById("petRenameInput");
      const current = document.getElementById("petDisplayName")?.textContent || DEFAULT_PET_NAME;

      if (input) {
        input.value = normalizePetName(current, DEFAULT_PET_NAME);
      }

      setRenameHint("Tối đa 24 ký tự.", false);
      setRenameModalOpen(true);

      setTimeout(function () {
        if (!input) return;
        input.focus();
        input.select();
      }, 30);
    }

    function closePetRenameModal() {
      setRenameModalOpen(false);
    }

    function submitPetRename() {
      if (isPetFeatureLocked()) {
        notify("Pet chưa nở, chưa thể đổi tên.", "info");
        return;
      }

      const input = document.getElementById("petRenameInput");
      const rawName = String(input?.value || "")
        .trim()
        .replace(/\s+/g, " ");

      if (!rawName) {
        setRenameHint("Tên pet không được để trống.", true);
        if (input) input.focus();
        return;
      }

      if (rawName.length > 24) {
        setRenameHint("Tên pet tối đa 24 ký tự.", true);
        if (input) input.focus();
        return;
      }

      const nextName = normalizePetName(rawName, DEFAULT_PET_NAME);
      renderPetName(nextName);
      savePetName(nextName);
      syncPetStateToBackend(loadPetPreviewState(), nextName);
      closePetRenameModal();
      notify("Đã đổi tên pet thành công.", "success");
    }

    function setupPetRenameModal() {
      const modal = document.getElementById("petRenameModal");
      const closeBtn = document.getElementById("petRenameModalClose");
      const cancelBtn = document.getElementById("petRenameCancelBtn");
      const saveBtn = document.getElementById("petRenameSaveBtn");
      const input = document.getElementById("petRenameInput");

      if (!modal || !closeBtn || !cancelBtn || !saveBtn || !input) {
        return;
      }

      if (modal.dataset.modalBound === "1") {
        return;
      }
      modal.dataset.modalBound = "1";

      closeBtn.addEventListener("click", closePetRenameModal);
      cancelBtn.addEventListener("click", closePetRenameModal);
      saveBtn.addEventListener("click", submitPetRename);

      input.addEventListener("input", function () {
        const value = String(input.value || "").trim().replace(/\s+/g, " ");
        if (!value) {
          setRenameHint("Tên pet không được để trống.", true);
          return;
        }
        if (value.length > 24) {
          setRenameHint("Tên pet tối đa 24 ký tự.", true);
          return;
        }
        setRenameHint(`${value.length}/24 ký tự`, false);
      });

      input.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          event.preventDefault();
          submitPetRename();
        }
      });

      modal.addEventListener("click", function (event) {
        if (event.target === modal) {
          closePetRenameModal();
        }
      });
    }

    function setupPetVisualControls() {
      const systemSection = document.querySelector(".pet-character-system");
      if (!systemSection || systemSection.dataset.boundVisualControls === "1") {
        return;
      }
      systemSection.dataset.boundVisualControls = "1";

      systemSection.addEventListener("click", function (event) {
        const genderBtn = event.target.closest("[data-pet-gender-choice]");
        if (genderBtn) {
          const stage = resolvePetStage(loadPetPreviewState());
          if (stage.index < 4) {
            notify("Giới tính chỉ mở từ giai đoạn 4.", "info");
            return;
          }

          const choice = String(genderBtn.getAttribute("data-pet-gender-choice") || "").toLowerCase();
          if (choice !== "male" && choice !== "female") {
            return;
          }

          petVisualProfile.gender = choice;
          savePetVisualProfile(petVisualProfile);
          const liveState = loadPetPreviewState();
          renderPetVisualSystem(liveState);
          syncPetStateToBackend(liveState, loadPetName(DEFAULT_PET_NAME));
          notify("Đã cập nhật biến thể giới tính.", "success");
          return;
        }

        const stateBtn = event.target.closest("[data-pet-preview-state]");
        if (stateBtn) {
          const preset = String(stateBtn.getAttribute("data-pet-preview-state") || "").toLowerCase();
          if (!PET_STATE_PRESETS[preset]) {
            return;
          }

          petVisualProfile.statePreset = petVisualProfile.statePreset === preset ? "" : preset;
          savePetVisualProfile(petVisualProfile);

          if (petVisualProfile.statePreset) {
            applyPetStatePreset(petVisualProfile.statePreset);
          } else {
            renderPetVisualSystem(loadPetPreviewState());
          }

          return;
        }

        const copyBtn = event.target.closest("#petCopyPromptBtn");
        if (copyBtn) {
          const promptOutput = document.getElementById("petPromptOutput");
          const promptText = String(promptOutput?.value || "").trim();
          if (!promptText) {
            notify("Không có prompt để copy.", "warning");
            return;
          }

          if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
            navigator.clipboard
              .writeText(promptText)
              .then(function () {
                notify("Đã copy prompt.", "success");
              })
              .catch(function () {
                if (promptOutput) {
                  promptOutput.focus();
                  promptOutput.select();
                }
                notify("Đã chọn prompt. Nhấn Ctrl + C để copy.", "info");
              });
            return;
          }

          if (promptOutput) {
            promptOutput.focus();
            promptOutput.select();
          }
          notify("Đã chọn prompt. Nhấn Ctrl + C để copy.", "info");
        }
      });
    }

    function setupGlobalEscHandler() {
      if (petGlobalEscBound) return;
      petGlobalEscBound = true;

      document.addEventListener("keydown", function (event) {
        if (event.key !== "Escape") return;

        const foodModal = document.getElementById("petFoodModal");
        if (foodModal && foodModal.getAttribute("aria-hidden") === "false") {
          closePetFoodModal();
          return;
        }

        const renameModal = document.getElementById("petRenameModal");
        if (renameModal && renameModal.getAttribute("aria-hidden") === "false") {
          closePetRenameModal();
        }
      });
    }

    function initPetPage() {
      document.body.classList.remove("pet-modal-open");
      document.body.classList.remove("pet-food-sidebar-open");

      const state = loadPetPreviewState();
      const user = window.currentUser || {};
      const name = user.displayName || user.username || "Người chơi";
      const totalXPFromUser = clamp(user.totalXP, 0, 999999);
      const localPetName = loadPetName(DEFAULT_PET_NAME);
      const visualSeed = String(user.userId || user.email || user.username || "guest");
      const fallbackGender = hashStringToInt(visualSeed) % 2 === 0 ? "female" : "male";

      petVisualProfile = loadPetVisualProfile(fallbackGender);

      syncDailyCoinsFromXP(state, totalXPFromUser);
      ensureLevelState(state);

      const tracker = buildHatchTracker(state.requirements);

      setText("petUserName", name);
      renderPetName(localPetName);
      setText("petXpValue", String(Math.round(state.xp)));
      setText("petCoinValue", String(Math.round(state.coins)));
      setText("petHungerValue", `${Math.round(state.status.hunger)}%`);
      setText("petMoodValue", `${Math.round(state.status.mood)}%`);
      setText("petCleanValue", `${Math.round(state.status.clean)}%`);

      // Keep hatch counter data in state for future hatch feature rollout.
      state.requirements = {
        target: tracker.target,
        learn: tracker.learn,
        quiz: tracker.quiz,
        matching: tracker.matching,
      };
      state.hatch = {
        isHatched: !!state?.hatch?.isHatched,
        hatchedAt: String(state?.hatch?.hatchedAt || ""),
      };
      savePetPreviewState(state);
      applyPetLockState(state, tracker);

      if (typeof google !== "undefined" && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (result) {
            if (!result || !result.success || !result.data) {
              syncPetStateToBackend(state, localPetName);
              return;
            }

            const mergedState = loadPetPreviewState();
            ensureLevelState(mergedState);

            const server = result.data.petState || {};
            if (server.gender != null) {
              petVisualProfile.gender =
                String(server.gender || "").toLowerCase() === "male" ? "male" : "female";
              savePetVisualProfile(petVisualProfile);
            }
            const serverLevel = Math.max(1, parseInt(server.levelCurrent, 10) || 1);
            const localLevel = Math.max(1, parseInt(mergedState.level.current, 10) || 1);
            const mergedLevel = Math.max(serverLevel, localLevel);

            let mergedProgress = clamp(server.levelProgress, 0, 100);
            if (mergedLevel === localLevel && mergedLevel === serverLevel) {
              mergedProgress = Math.max(mergedProgress, clamp(mergedState.level.progress, 0, 100));
            } else if (mergedLevel === localLevel) {
              mergedProgress = clamp(mergedState.level.progress, 0, 100);
            }

            const serverCoinsParsed = parseInt(server.coins, 10);
            mergedState.coins = Number.isFinite(serverCoinsParsed)
              ? clamp(serverCoinsParsed, 0, 999999)
              : clamp(mergedState.coins, 0, 999999);
            mergedState.level.current = mergedLevel;
            mergedState.level.progress = mergedProgress;

            const req = server.requirements || {};
            mergedState.requirements = {
              target: clamp(req.target != null ? req.target : mergedState.requirements.target, 1, 10),
              learn: clamp(req.learn, 0, 10),
              quiz: clamp(req.quiz, 0, 10),
              matching: clamp(req.matching, 0, 10),
            };

            mergedState.hatch = {
              isHatched: !!server.isHatched,
              hatchedAt: String(server.hatchedAt || mergedState?.hatch?.hatchedAt || ""),
            };

            const mergedTracker = buildHatchTracker(mergedState.requirements);

            const serverPetName = normalizePetName(result.data.petName, "");
            const finalPetName = serverPetName || localPetName;

            savePetPreviewState(mergedState);
            renderPetName(finalPetName);
            setText("petCoinValue", String(Math.round(mergedState.coins)));
            applyPetLockState(mergedState, mergedTracker);

            applySnapshotToLocal(
              Object.assign({}, result.data, {
                petState: {
                  coins: mergedState.coins,
                  levelCurrent: mergedState.level.current,
                  levelProgress: mergedState.level.progress,
                  gender: petVisualProfile.gender === "male" ? "male" : "female",
                  requirements: mergedState.requirements,
                  isHatched: mergedState.hatch.isHatched,
                  hatchedAt: mergedState.hatch.hatchedAt,
                },
                petName: finalPetName,
              }),
            );

            syncPetStateToBackend(mergedState, finalPetName);
          })
          .withFailureHandler(function () {
            syncPetStateToBackend(state, localPetName);
          })
          .getPetFoodCatalogForUser();
      }

      setupPetNameEditor();
      setupEggHoverTilt();
      setupSlimeClickBounce();
      setupTestStageButtons();
    }

    function setupPetActions() {
      const actions = document.querySelectorAll("[data-pet-action]");

      actions.forEach((button) => {
        if (button.dataset.petActionBound === "1") {
          return;
        }
        button.dataset.petActionBound = "1";

        button.addEventListener("click", function () {
          const action = button.getAttribute("data-pet-action");

          if (action === "feed") {
            openPetFoodModal("food");
            return;
          }

          if (action === "shop") {
            openPetFoodModal("accessory");
            return;
          }

          notify("Đã nhận thao tác mua vật phẩm (chế độ xem trước).", "success");
        });
      });
    }

    /* ===== SLIME CLICK BOUNCE ===== */
    function setupSlimeClickBounce() {
      const slimeEl = document.getElementById("petSlime");
      if (!slimeEl || slimeEl.dataset.clickBound === "1") return;
      slimeEl.dataset.clickBound = "1";
      slimeEl.addEventListener("click", function () {
        const character = slimeEl.querySelector(".pet-slime-character");
        if (!character) return;
        character.classList.remove("slime-clicked");
        void character.offsetWidth;
        character.classList.add("slime-clicked");
        setTimeout(function () {
          character.classList.remove("slime-clicked");
        }, 700);
      });
    }

    /* ===== TEST STAGE BUTTONS ===== */
    function setupTestStageButtons() {
      const buttons = document.querySelectorAll("[data-pet-test-stage]");
      if (!buttons.length) return;
      buttons.forEach(function (btn) {
        if (btn.dataset.testBound === "1") return;
        btn.dataset.testBound = "1";
        btn.addEventListener("click", function () {
          const stageIndex = parseInt(btn.getAttribute("data-pet-test-stage"), 10);
          if (!stageIndex || stageIndex < 1 || stageIndex > 5) return;
          const state = loadPetPreviewState();
          ensureLevelState(state);
          /* Force hatch so slime is visible */
          state.hatch = { isHatched: true, hatchedAt: new Date().toISOString() };
          /* Set level to match stage */
          var levelMap = { 1: 0, 2: 1, 3: 4, 4: 8, 5: 15 };
          state.level.current = levelMap[stageIndex] || 1;
          state.level.progress = 50;
          savePetPreviewState(state);
          var tracker = buildHatchTracker(state.requirements);
          tracker.isReady = true;
          applyPetLockState(state, tracker);
          setText("petCoinValue", String(Math.round(state.coins)));
          /* Update test button active state */
          buttons.forEach(function (b) {
            b.classList.toggle("active", b === btn);
          });
          notify("Đã chuyển sang Giai đoạn " + stageIndex, "success");
        });
      });
    }

    window.initPetPage = initPetPage;

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () {
        setupPetActions();
        setupPetRenameModal();
        setupPetFoodModal();
        setupPetVisualControls();
        setupGlobalEscHandler();
        initPetPage();
      });
    } else {
      setTimeout(function () {
        setupPetActions();
        setupPetRenameModal();
        setupPetFoodModal();
        setupPetVisualControls();
        setupGlobalEscHandler();
        initPetPage();
      }, 80);
    }
  })();
</script>
