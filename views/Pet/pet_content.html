<section class="pet-page" id="petPage">
  <div class="pet-shell">
    <section class="pet-page-header unified-page-header" id="petPageHeader">
      <div class="pet-header-galaxy-bg">
        <div class="pet-header-stars" id="petHeaderStars"></div>
        <div class="pet-header-nebula"></div>
        <div class="pet-header-meteor-container" id="petMeteorContainer"></div>
      </div>
      <div class="uph-row">
        
        <div class="uph-controls">
          <div class="pet-level-progress-card" role="group" aria-label="Tiến độ level pet">
            <div class="pet-level-progress-top">
              <span class="pet-level-progress-label">Tiến độ level PET</span>
              <span class="pet-level-progress-meta">
                <span class="pet-level-progress-level" id="petHeaderLevelText">Level 1</span>
                <span class="pet-level-progress-value" id="petLevelProgressValue">50%</span>
              </span>
            </div>
            <div class="pet-level-progress-track" id="petLevelProgressTrack">
              <span class="pet-level-progress-fill" id="petLevelProgressFill"></span>
            </div>
          </div>

          <div class="pet-balance-card" role="group" aria-label="Số dư XQP">
            <div class="pet-balance-content">
              <div class="pet-balance-info">
                <span class="pet-balance-label">Số dư XQP</span>
                <span class="pet-balance-value" id="petXQPBalance">0</span>
              </div>
              <div class="pet-balance-icon-box">
                <span class="material-symbols-sharp" aria-hidden="true">payments</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <div class="pet-main-layout" id="petMainLayout">
      <div class="pet-card">
        <div class="pet-stage" id="petStage">
          <div class="pet-stage-meta">
            <button type="button" class="pet-name-tag" id="petNameTagButton" title="Đổi tên PET">
              <span class="pet-name-tag-label">PET</span>
              <span class="pet-name-tag-value" id="petNameTagValue">NAMEPET</span>
            </button>
            <span id="petLevelBadge" class="pet-level-badge">Level 1</span>
          </div>
          <div class="pet-animator" id="petAnimator">
            <div class="pet-mover" id="petMover">
              <div class="pet-visual" id="petVisual">
              <img
                id="petPreviewImage"
                class="pet-preview-image"
                src=""
                alt="Pet preview"
                loading="lazy"
              />
              <img
                id="petEyesImage"
                class="pet-eyes-image"
                src=""
                alt="Pet eyes"
                loading="lazy"
              />
              <img
                id="petAccessoryImage1"
                class="pet-accessory-image pos-center"
                src=""
                alt="Pet accessory"
                loading="lazy"
              />
              <img
                id="petAccessoryImage2"
                class="pet-accessory-image pos-center"
                src=""
                alt="Pet accessory"
                loading="lazy"
              />
              <img
                id="petAccessoryImage3"
                class="pet-accessory-image pos-center"
                src=""
                alt="Pet accessory"
                loading="lazy"
              />
            </div>
          </div>
        </div>
        <p class="pet-image-error" id="petImageError" style="display: none">
          Khong tai duoc anh PET.
        </p>
      </div>

      </div>

      <section class="pet-accessory-panel" id="petAccessoryPanel">
        <div class="pet-panel-controls" id="petPanelControls">
          <div class="pet-header-control-stack">
            <div class="pet-header-actions" role="group" aria-label="Điều khiển PET">
              <button
                type="button"
                class="pet-header-icon-btn"
                id="petToggleLevelBtn"
                aria-label="Nâng lên Level 2"
                title="Nâng lên Level 2"
              >
                <span class="material-symbols-sharp" id="petToggleLevelIcon" aria-hidden="true">arrow_upward</span>
              </button>
              <button
                type="button"
                class="pet-header-icon-btn"
                id="petSettingsToggleBtn"
                aria-label="Mở cài đặt màu PET"
                aria-expanded="false"
                title="Màu sắc PET"
              >
                <span class="material-symbols-sharp" aria-hidden="true">tune</span>
              </button>
              <button
                type="button"
                class="pet-header-icon-btn"
                id="petBackgroundToggleBtn"
                aria-label="Mở cài đặt nền PET"
                aria-expanded="false"
                title="Nền PET"
              >
                <span class="material-symbols-sharp" aria-hidden="true">image</span>
              </button>
              <button
                type="button"
                class="pet-header-icon-btn"
                id="petAccessoryToggleBtn"
                aria-label="Mở cài đặt phụ kiện"
                aria-expanded="false"
                title="Phụ kiện PET"
              >
                <span class="material-symbols-sharp" aria-hidden="true">checkroom</span>
              </button>
              <button
                type="button"
                class="pet-header-icon-btn"
                id="petFoodToggleBtn"
                aria-label="Mở danh sách đồ ăn"
                aria-expanded="false"
                title="Food PET"
              >
                <span class="material-symbols-sharp" aria-hidden="true">restaurant</span>
              </button>
              <button
                type="button"
                class="pet-header-icon-btn"
                id="petSaveConfigBtn"
                aria-label="Lưu cấu hình PET"
                title="Lưu PET"
              >
                <span class="material-symbols-sharp" aria-hidden="true">save</span>
              </button>
            </div>
            <div class="pet-header-settings-popover is-hidden" id="petSettingsPopover" aria-label="Chọn màu pet">
              <div
                class="pet-color-buttons pet-color-buttons-icon"
                id="petColorButtons"
                aria-label="Chọn màu pet"
              ></div>
            </div>
            <div class="pet-header-settings-popover pet-header-background-popover is-hidden" id="petBackgroundPopover" aria-label="Chọn nền pet">
              <div
                class="pet-background-buttons"
                id="petBackgroundButtons"
                aria-label="Chọn nền pet"
              ></div>
            </div>
            <div class="pet-header-settings-popover is-hidden" id="petAccessoryPopover" aria-label="Chọn phụ kiện pet">
              <div class="pet-accessory-header">
                <h3 class="pet-accessory-title">Phụ kiện</h3>
                <span class="pet-accessory-hint">Tối đa 2</span>
              </div>
              <div
                class="pet-accessory-position"
                id="petAccessoryPosition"
                role="group"
                aria-label="Vị trí phụ kiện"
              >
                <button type="button" class="pet-pill-btn active" data-pos="center">Giữa</button>
                <button type="button" class="pet-pill-btn" data-pos="left">Trái</button>
                <button type="button" class="pet-pill-btn" data-pos="right">Phải</button>
              </div>
              <div class="pet-accessory-grid" id="petAccessoryGrid"></div>
            </div>
            <div class="pet-header-settings-popover is-hidden" id="petFoodPopover" aria-label="Danh sách đồ ăn pet">
              <div class="pet-accessory-header">
                <h3 class="pet-accessory-title">Food</h3>
                <span class="pet-accessory-hint">15 món</span>
              </div>
              <div class="pet-food-grid" id="petFoodGrid"></div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </div>
</section>
