<section class="pet-page" id="petPage">
  <div class="pet-shell">


    <div class="pet-card">
      <div class="pet-stage" id="petStage">
        <div class="pet-animator" id="petAnimator">
          <div class="pet-visual" id="petVisual">
            <img
              id="petPreviewImage"
              class="pet-preview-image"
              src=""
              alt="Pet preview"
              loading="lazy"
            />
            <img
              id="petEyesImage"
              class="pet-eyes-image"
              src=""
              alt="Pet eyes"
              loading="lazy"
            />
            <img
              id="petAccessoryImage"
              class="pet-accessory-image pos-center"
              src=""
              alt="Pet accessory"
              loading="lazy"
            />
          </div>
        </div>
        <p class="pet-image-error" id="petImageError" style="display: none">
          Khong tai duoc anh PET.
        </p>
      </div>

      <div class="pet-info">
        <div class="pet-meta-row">
          <button type="button" class="pet-name-tag" id="petNameTagButton" title="Đổi tên PET">
            <span class="pet-name-tag-label">PET</span>
            <span class="pet-name-tag-value" id="petNameTagValue">NAMEPET</span>
          </button>
          <span id="petLevelBadge" class="pet-level-badge">Level 1</span>
        </div>
        <p class="pet-desc" id="petDescription">
          Pet của bạn sẽ xuất hiện tại đây.
        </p>

        <div class="pet-controls">
          <div class="pet-controls-group pet-controls-group-level" role="group" aria-label="Điều khiển cấp pet">
            <button type="button" class="pet-btn primary" id="petToggleLevelBtn">Đổi cấp pet</button>
          </div>
        </div>

        <div class="pet-color-buttons" id="petColorButtons" aria-label="Chọn màu pet"></div>

        <div class="pet-accessory-panel" id="petAccessoryPanel">
          <div class="pet-accessory-header">
            <h3 class="pet-accessory-title">Phụ kiện</h3>
            <span class="pet-accessory-hint">Mỗi lần chỉ chọn 1 phụ kiện</span>
          </div>
          <div
            class="pet-accessory-position"
            id="petAccessoryPosition"
            role="group"
            aria-label="Vị trí phụ kiện"
          >
            <button type="button" class="pet-pill-btn active" data-pos="center">Giữa đầu</button>
            <button type="button" class="pet-pill-btn" data-pos="left">Trái đầu</button>
            <button type="button" class="pet-pill-btn" data-pos="right">Phải đầu</button>
          </div>
          <div class="pet-accessory-grid" id="petAccessoryGrid"></div>
        </div>
      </div>
    </div>
  </div>
</section>
