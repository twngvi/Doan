<section class="pet-page" id="petPage">
  <div class="pet-shell">
    <header class="pet-header">
      <h1 class="pet-title">Pet Đồng Hành</h1>
      <p class="pet-subtitle">Chọn pet bạn thích và chuyển nhanh giữa các phiên bản.</p>
    </header>

    <div class="pet-card">
      <div class="pet-stage" id="petStage">
        <img
          id="petPreviewImage"
          class="pet-preview-image"
          src=""
          alt="Pet preview"
          loading="lazy"
        />
        <p class="pet-image-error" id="petImageError" style="display: none">
          Khong tai duoc anh PET.
        </p>
      </div>

      <div class="pet-info">
        <div class="pet-meta-row">
          <h2 id="petName" class="pet-name">Pet</h2>
          <span id="petLevelBadge" class="pet-level-badge">Level 1</span>
        </div>
        <p class="pet-desc" id="petDescription">
          Pet của bạn sẽ xuất hiện tại đây.
        </p>

        <div class="pet-controls">
          <button type="button" class="pet-btn secondary" id="petPrevBtn">Pet trước</button>
          <button type="button" class="pet-btn primary" id="petToggleLevelBtn">Đổi cấp pet</button>
          <button type="button" class="pet-btn secondary" id="petNextBtn">Pet tiếp theo</button>
        </div>

        <div class="pet-switch-dots" id="petSwitchDots" aria-label="Chọn pet nhanh"></div>
      </div>
    </div>
  </div>
</section>
