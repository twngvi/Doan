<!-- Login Page -->
<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-teal-600 via-cyan-500 to-blue-600 px-4 relative overflow-hidden"
>
  <!-- Mountain Background SVG -->
  <div class="absolute inset-0 opacity-10">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 1440 320"
      class="absolute bottom-0"
    >
      <path
        fill="#0C6478"
        fill-opacity="0.8"
        d="M0,96L48,112C96,128,192,160,288,186.7C384,213,480,235,576,213.3C672,192,768,128,864,128C960,128,1056,192,1152,197.3C1248,203,1344,149,1392,122.7L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"
      ></path>
    </svg>
  </div>

  <div class="max-w-md w-full relative z-10">
    <!-- Header -->
    <div class="text-center mb-8 animate-fade-in">
      <div
        class="inline-block bg-white/90 backdrop-blur-sm rounded-full p-4 mb-4 shadow-xl"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-16 w-16 text-teal-600"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"
          />
        </svg>
      </div>
      <h1 class="text-5xl font-bold text-white mb-2 drop-shadow-lg">Doanv3</h1>
      <p class="text-cyan-50 text-lg font-medium">Chinh phục đỉnh tri thức</p>
    </div>

    <!-- Login Form Card -->
    <div
      class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 animate-slide-in-right border-2 border-cyan-100"
    >
      <div class="flex items-center mb-6">
        <div
          class="h-1 flex-1 bg-gradient-to-r from-teal-500 to-cyan-500 rounded-full"
        ></div>
        <h2 class="text-2xl font-bold text-gray-800 mx-4">Đăng nhập</h2>
        <div
          class="h-1 flex-1 bg-gradient-to-l from-teal-500 to-cyan-500 rounded-full"
        ></div>
      </div>

      <form id="login-form" onsubmit="return false;">
        <!-- Email -->
        <div class="mb-5">
          <label
            for="login-email"
            class="block text-sm font-semibold text-gray-700 mb-2"
          >
            📧 Địa chỉ Email
          </label>
          <input
            type="email"
            id="login-email"
            name="email"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-cyan-200 focus:border-cyan-500 transition-all duration-300"
            placeholder="vidu@email.com"
            required
          />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label
            for="login-password"
            class="block text-sm font-semibold text-gray-700 mb-2"
          >
            🔒 Mật khẩu
          </label>
          <input
            type="password"
            id="login-password"
            name="password"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-cyan-200 focus:border-cyan-500 transition-all duration-300"
            placeholder="Nhập mật khẩu của bạn"
            required
          />
        </div>

        <!-- Remember & Forgot Password -->
        <div class="flex items-center justify-between mb-6">
          <label class="flex items-center cursor-pointer">
            <input
              type="checkbox"
              class="form-checkbox h-5 w-5 text-teal-600 rounded border-gray-300 focus:ring-cyan-500"
            />
            <span class="ml-2 text-sm text-gray-600 font-medium"
              >Ghi nhớ đăng nhập</span
            >
          </label>
          <a
            href="#"
            class="text-sm text-teal-600 hover:text-cyan-700 font-semibold hover:underline"
            onclick="showPage('page-forgot-password'); return false;"
          >
            Quên mật khẩu?
          </a>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          id="btn-login"
          class="w-full bg-gradient-to-r from-teal-600 to-cyan-600 hover:from-teal-700 hover:to-cyan-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300 flex items-center justify-center space-x-2"
          onclick="handleLoginFormSubmit()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"
            />
          </svg>
          <span class="text-lg">Bắt đầu leo núi</span>
        </button>

        <!-- Register Link -->
        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Chưa có tài khoản?
            <a
              href="#"
              class="text-teal-600 hover:text-cyan-700 font-bold text-lg hover:underline"
              onclick="showPage('page-register')"
            >
              Đăng ký ngay
            </a>
          </p>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-white text-sm font-medium drop-shadow">
      <p>&copy; 2025 Doanv3. Chinh phục mọi đỉnh cao tri thức.</p>
    </div>
  </div>
</div>
