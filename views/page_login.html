<!-- Login Page -->
<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4"
>
  <div class="max-w-md w-full">
    <!-- Header -->
    <div class="text-center mb-8 animate-fade-in">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">Doanv3</h1>
      <p class="text-gray-600">Learning Management System</p>
    </div>

    <!-- Login Form Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8 animate-slide-in-right">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Đăng nhập</h2>

      <form id="login-form" onsubmit="return false;">
        <!-- Email -->
        <div class="mb-4">
          <label
            for="login-email"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Email
          </label>
          <input
            type="email"
            id="login-email"
            name="email"
            class="input-field"
            placeholder="example@gmail.com"
            required
          />
        </div>

        <!-- Password -->
        <div class="mb-6">
          <label
            for="login-password"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Mật khẩu
          </label>
          <input
            type="password"
            id="login-password"
            name="password"
            class="input-field"
            placeholder="••••••••"
            required
          />
        </div>

        <!-- Remember & Forgot Password -->
        <div class="flex items-center justify-between mb-6">
          <label class="flex items-center">
            <input
              type="checkbox"
              class="form-checkbox h-4 w-4 text-blue-600 rounded"
            />
            <span class="ml-2 text-sm text-gray-600">Ghi nhớ đăng nhập</span>
          </label>
          <a
            href="#"
            class="text-sm text-blue-600 hover:text-blue-700"
            onclick="showForgotPasswordModal(); return false;"
          >
            Quên mật khẩu?
          </a>
        </div>

        <!-- Login Button -->
        <button
          type="submit"
          id="btn-login"
          class="btn-primary w-full"
          onclick="handleLoginFormSubmit()"
        >
          Đăng nhập
        </button>

        <!-- Divider -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">Hoặc</span>
          </div>
        </div>

        <!-- Google Sign-In Button -->
        <!-- ✅ AUTO-PROVISIONING: Nếu chưa có tài khoản, hệ thống tự động tạo mới -->
        <button
          type="button"
          class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-white hover:bg-gray-50 transition-colors"
          onclick="handleGoogleLogin()"
          title="Đăng nhập hoặc tự động tạo tài khoản mới bằng Google"
        >
          <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          <span class="text-gray-700 font-medium">Đăng nhập với Google</span>
        </button>

        <!-- Info: Auto-provisioning -->
        <div class="mt-2 text-center">
          <p class="text-xs text-gray-500">
            ℹ️ Lần đầu sử dụng? Hệ thống sẽ tự động tạo tài khoản cho bạn
          </p>
          <p class="text-xs text-blue-600 mt-1">
            <a
              href="#"
              onclick="showAccountChooser(); return false;"
              class="underline"
            >
              Đăng nhập bằng tài khoản khác
            </a>
          </p>
        </div>

        <!-- Register Link -->
        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Chưa có tài khoản?
            <a
              href="#"
              class="text-blue-600 hover:text-blue-700 font-semibold"
              onclick="showPage('page-register')"
            >
              Đăng ký ngay
            </a>
          </p>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8 text-gray-600 text-sm">
      <p>&copy; 2025 Doanv3. All rights reserved.</p>
    </div>
  </div>
</div>
