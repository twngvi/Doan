  /* ================================================================
     SCRIPT / CSS LOADER
     ================================================================ */
  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      // Skip if already loaded
      if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
      var s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = function () { reject(new Error('Failed: ' + src)); };
      document.head.appendChild(s);
    });
  }

  function loadCss(href) {
    return new Promise(function (resolve) {
      if (document.querySelector('link[href="' + href + '"]')) { resolve(); return; }
      var l = document.createElement('link');
      l.rel = 'stylesheet'; l.href = href;
      l.onload = resolve; l.onerror = resolve; // non-blocking
      document.head.appendChild(l);
    });
  }

  /* ================================================================
     CODEMIRROR 5 LOADER
     ================================================================ */
  function loadCM5() {
    return loadCss(CM_CDN + 'codemirror.min.css')
      .then(function () { return loadCss(CM_CDN + 'theme/dracula.min.css'); })
      .then(function () { return loadCss(CM_CDN + 'theme/default.min.css'); })
      .then(function () { return loadScript(CM_CDN + 'codemirror.min.js'); })
      // base modes
      .then(function () { return loadScript(CM_CDN + 'mode/xml/xml.min.js'); })
      .then(function () { return loadScript(CM_CDN + 'mode/css/css.min.js'); })
      .then(function () { return loadScript(CM_CDN + 'mode/javascript/javascript.min.js'); })
      // htmlmixed depends on xml + css + javascript
      .then(function () { return loadScript(CM_CDN + 'mode/htmlmixed/htmlmixed.min.js'); })
      // other modes (parallel)
      .then(function () {
        return Promise.all([
          loadScript(CM_CDN + 'mode/python/python.min.js'),
          loadScript(CM_CDN + 'mode/clike/clike.min.js'),
          loadScript(CM_CDN + 'mode/sql/sql.min.js'),
          loadScript(CM_CDN + 'mode/markdown/markdown.min.js')
        ]);
      })
      // addons
      .then(function () {
        return Promise.all([
          loadScript(CM_CDN + 'addon/edit/matchbrackets.min.js'),
          loadScript(CM_CDN + 'addon/edit/closebrackets.min.js')
        ]);
      });
  }

  /* ================================================================
     CREATE / UPDATE EDITOR
     ================================================================ */
  function createEditor(code, lang) {
    var wrap = el.editorWrap;
    if (!wrap) return;

    // Destroy previous instance
    if (cmEditor) {
      cmEditor.toTextArea();
      cmEditor = null;
    }
    // Clear wrap
    wrap.innerHTML = '';
    var ta = document.createElement('textarea');
    ta.id = 'cpCodeTextarea';
    wrap.appendChild(ta);

    var mode = CM5_MODES[lang] || 'htmlmixed';
    cmEditor = window.CodeMirror.fromTextArea(ta, {
      value:           code,
      mode:            mode,
      theme:           isDark ? 'dracula' : 'default',
      lineNumbers:     true,
      tabSize:         2,
      indentUnit:      2,
      indentWithTabs:  false,
      lineWrapping:    false,
      matchBrackets:   true,
      autoCloseBrackets: true,
      extraKeys: {
        'Ctrl-Enter': function () { runCode(false); return true; },
        'Tab': function (cm) { cm.execCommand('insertSoftTab'); }
      }
    });

    // Set initial value explicitly (textarea.value not always picked up)
    cmEditor.setValue(code);

    // Refresh after layout settle (important for correct rendering)
    setTimeout(function () { if (cmEditor) cmEditor.refresh(); }, 100);

    cmEditor.on('change', function (cm) {
      var v = cm.getValue();
      codeStore[currentLang] = v;
      persistCodes();
      updateCharCount(v.length);
      if (['html','css','javascript','markdown'].indexOf(currentLang) !== -1) {
        scheduleAutoRun();
      }
    });

    cmEditor.on('cursorActivity', function (cm) {
      var c = cm.getCursor();
      if (el.cursorPos) el.cursorPos.textContent = 'Ln ' + (c.line + 1) + ', Col ' + (c.ch + 1);
    });
  }

      copyToast:   document.getElementById('cpCopyToast')
    };

    // Restore preferences
    try { codeStore = JSON.parse(localStorage.getItem('cp_codes') || '{}'); } catch(e) { codeStore = {}; }

    // Sync with global theme instead of local storage
    syncSystemTheme();
    
    // Check for future theme changes
    var observer = new MutationObserver(syncSystemTheme);
    observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });

    var savedLang = localStorage.getItem('cp_lang') || 'html';
    if (el.langSelect) el.langSelect.value = savedLang;

    // Events
    if (el.langSelect)  el.langSelect.addEventListener('change', function () { switchLanguage(el.langSelect.value); });
    if (el.runBtn)      el.runBtn.addEventListener('click', function () { runCode(false); });
    if (el.resetBtn)    el.resetBtn.addEventListener('click', resetCode);
    if (el.copyBtn)     el.copyBtn.addEventListener('click', copyCode);
    if (el.fsBtn)       el.fsBtn.addEventListener('click', toggleFullscreen);
    if (el.clearBtn)    el.clearBtn.addEventListener('click', clearOutput);
    if (el.tabPreview)  el.tabPreview.addEventListener('click', function () { switchTab('preview'); });
    if (el.tabConsole)  el.tabConsole.addEventListener('click', function () { switchTab('console'); });

    // Global keyboard shortcut
    document.addEventListener('keydown', function (e) {
      if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runCode(false); }
    });

    setupResizer();
    setStatus('loading', 'Đang tải editor...');

    // Load CM5 then init language
    loadCM5().then(function () {
      cmLoaded = true;
      setStatus('ready', 'Sẵn sàng');
      switchLanguage(savedLang, true);
    }).catch(function (err) {
      setStatus('error', 'Không tải được editor');
      console.error('[CP] CM5 load error:', err);
      // Fallback: show plain textarea
      if (el.editorWrap) {
        el.editorWrap.innerHTML = '';
        var ta = document.createElement('textarea');
        ta.id = 'cpCodeTextarea';
        ta.style.cssText = 'width:100%;height:100%;border:none;outline:none;resize:none;padding:1rem;font-family:monospace;font-size:13px;background:#0f172a;color:#e2e8f0;box-sizing:border-box;';
        ta.value = codeStore[savedLang] !== undefined ? codeStore[savedLang] : (DEFAULT_CODE[savedLang] || '');
        el.editorWrap.appendChild(ta);
      }
      switchLanguage(savedLang, true);
    });
  }

  /* ================================================================
     LANGUAGE SWITCH
     ================================================================ */
  function switchLanguage(lang, skipSave) {
    if (!skipSave && currentLang) {
      codeStore[currentLang] = getCode();
      persistCodes();
    }
    currentLang = lang;
    localStorage.setItem('cp_lang', lang);

    var meta = LANG_META[lang] || LANG_META.html;
    if (el.editorTitle) el.editorTitle.textContent = meta.title;
    if (el.badge) {
      el.badge.textContent = meta.badge;
      el.badge.className = 'cp-lang-badge ' + meta.badgeClass;
    }

    var code = codeStore[lang] !== undefined ? codeStore[lang] : (DEFAULT_CODE[lang] || '');

    if (cmLoaded && window.CodeMirror) {
      createEditor(code, lang);
    } else {
      var ta = document.getElementById('cpCodeTextarea');
      if (ta) ta.value = code;
    }

    updateCharCount((code || '').length);

    if (['html','css','javascript','markdown'].indexOf(lang) !== -1) {
      switchTab('preview');
      scheduleAutoRun();
    } else {
      switchTab('console');
      clearOutputSilent();
    }

    setStatus('ready', 'Sẵn sàng');
  }

  /* ================================================================
     EDITOR HELPERS
     ================================================================ */
  function getCode() {
    if (cmLoaded && cmEditor) return cmEditor.getValue();
    var ta = document.getElementById('cpCodeTextarea');
    return ta ? ta.value : '';
  }

  function setCode(code) {
    if (cmLoaded && cmEditor) {
      cmEditor.setValue(code);
    } else {
      var ta = document.getElementById('cpCodeTextarea');
      if (ta) ta.value = code;
    }
    updateCharCount((code || '').length);
  }

  function updateCharCount(n) {
    if (el.charCount) el.charCount.textContent = n + ' chars';
  }

  function scheduleAutoRun() {
    clearTimeout(autoTimer);
    autoTimer = setTimeout(function () { runCode(true); }, 800);
  }

  function persistCodes() {
    try { localStorage.setItem('cp_codes', JSON.stringify(codeStore)); } catch(e) {}
  }

  /* ================================================================
     RUN CODE
     ================================================================ */
  function runCode(isAuto) {
    var code = getCode();
    if (!code && !isAuto) return;

    var meta  = LANG_META[currentLang] || LANG_META.html;
    var t0    = performance.now();

    if (!isAuto) {
      if (el.runBtn) { el.runBtn.disabled = true; el.runBtn.classList.add('running'); }
      var lbl = el.runBtn && el.runBtn.querySelector('.btn-label');
      if (lbl) lbl.textContent = 'Running...';
    }

    setStatus('running', 'Đang chạy...');

    var done = function (ok, msg) {
      var elapsed = ((performance.now() - t0) / 1000).toFixed(2);
      if (el.statusTime) el.statusTime.textContent = elapsed + 's';
      setStatus(ok ? 'success' : 'error', msg || (ok ? 'Hoàn thành' : 'Lỗi'));
      if (!isAuto) {
        if (el.runBtn) { el.runBtn.disabled = false; el.runBtn.classList.remove('running'); }
        if (lbl) lbl.textContent = 'Run';
      }
    };

    try {
      switch (meta.engine) {
        case 'iframe':   runIframe(code, done);   break;
        case 'wandbox':  runWandbox(code, done);  break;
        case 'sqljs':    runSqlJs(code, done);    break;
        case 'json':     runJson(code, done);     break;
        case 'markdown': runMarkdown(code, done); break;
        default: done(true);
      }
    } catch (err) {
      appendConsole('error', '\u274C ' + (err.message || err));
      done(false, err.message);
    }
  }

  /* ================================================================

     ================================================================ */

    var src;
    if (currentLang === 'html') {
      src = code;

      src = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
            '<style>body{margin:0;padding:1rem;font-family:sans-serif;}</style>' +
            '<style>' + code + '</style></head><body>' +
            '<div class="box">CSS Preview</div>' +
            '<p>Đây là đoạn văn bản mẫu để xem CSS của bạn.</p>' +
            '<a href="#">Link mẫu</a>' +
            '</body></html>';
    } else {
      // JavaScript: wrap in console interceptor
      src = '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
            '<style>body{margin:0;padding:1rem;font-family:\'Segoe UI\',sans-serif;background:#0f172a;color:#e2e8f0;}' +
            '#out{white-space:pre-wrap;font-family:monospace;font-size:13px;line-height:1.6;}' +
            '.e{color:#f87171;}.w{color:#fbbf24;}</style></head><body>' +
            '<div id="out"></div><script>' +
            '(function(){var out=document.getElementById("out");' +
            'function ln(t,c){var d=document.createElement("div");if(c)d.className=c;' +
            'd.textContent=t;out.appendChild(d);}' +
            'var ol=console.log,oe=console.error,ow=console.warn;' +
            'console.log=function(){ol.apply(console,arguments);ln(Array.from(arguments).map(function(x){return typeof x==="object"?JSON.stringify(x,null,2):String(x);}).join(" "));};' +
            'console.error=function(){oe.apply(console,arguments);ln(Array.from(arguments).join(" "),"e");};' +
            'console.warn=function(){ow.apply(console,arguments);ln(Array.from(arguments).join(" "),"w");};' +
            'window.onerror=function(m){ln("Error: "+m,"e");return true;};' +
            'try{' + code + '}catch(e){ln("Error: "+e.message,"e");}' +
            '})();<\/script></body></html>';
    }
    switchTab('preview');
    showSpinner(false);
    if (el.previewFrame) el.previewFrame.srcdoc = src;
    done(true);
  }

  /* ================================================================
     ENGINE: Wandbox API (free, no auth needed)
     https://wandbox.org/
     ================================================================ */
  function runWandbox(code, done) {
    switchTab('console');
    showSpinner(true, 'Đang biên dịch & chạy...');
    clearOutputSilent();

    var cfg = WANDBOX_CONFIGS[currentLang];
    if (!cfg) { done(false, 'Unsupported language'); return; }

    var payload = {
      compiler:              cfg.compiler,
      code:                  code,
      options:               '',
      stdin:                 el.stdin ? el.stdin.value : '',
      'compiler-option-raw': cfg.rawOptions || '',
      'runtime-option-raw':  ''
    };

    fetch('https://wandbox.org/api/compile.json', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    }).then(function (res) {
      if (!res.ok) throw new Error('Wandbox API ' + res.status);
      return res.json();
    }).then(function (r) {
      showSpinner(false);

      // Compiler messages
      if (r.compiler_error && r.compiler_error.trim()) {
        r.compiler_error.trim().split('\n').forEach(function (l) { appendConsole('error', l); });
      }
      if (r.compiler_output && r.compiler_output.trim()) {
        r.compiler_output.trim().split('\n').forEach(function (l) { appendConsole('info', l); });
      }
      // Program output
      if (r.program_output && r.program_output.trim()) {
        r.program_output.trim().split('\n').forEach(function (l) { appendConsole('output', l); });
      }
      // Runtime errors
      if (r.program_error && r.program_error.trim()) {
        r.program_error.trim().split('\n').forEach(function (l) { appendConsole('error', l); });
      }

      if (!r.program_output && !r.program_error && !r.compiler_error) {
        appendConsole('info', '(Không có output)');
      }

      // status is returned as a string "0" for success
      var ok = String(r.status) === '0';
      appendConsole(ok ? 'success' : 'error', ok ? '\u2713 Completed (exit 0)' : 'Exit code: ' + r.status);
      done(ok);
    }).catch(function (err) {
      showSpinner(false);
      // If Wandbox is down, show helpful message
      appendConsole('error', '\u274C ' + err.message);
      if (err.message.indexOf('Failed to fetch') !== -1 || err.message.indexOf('NetworkError') !== -1) {
        appendConsole('info', 'Không thể kết nối tới Wandbox API. Vui lòng kiểm tra kết nối mạng.');
      }
      done(false, err.message);
    });
  }

  /* ================================================================
     ENGINE: sql.js (SQLite WebAssembly)
     ================================================================ */
  function runSqlJs(code, done) {
    switchTab('console');
    showSpinner(true, 'Khởi tạo SQLite...');
    clearOutputSilent();

    var doRun = function () {
      showSpinner(false);
      var stmts = code.split(/;(?=(?:[^']*'[^']*')*[^']*$)/g)
        .map(function (s) { return s.trim(); })
        .filter(function (s) { return s.length > 0; });

      var ok = true;
      stmts.forEach(function (stmt) {
        try {
          appendConsole('info', '\u25B6 ' + stmt.substring(0, 80) + (stmt.length > 80 ? '...' : ''));
          var results = sqlDb.exec(stmt);
          if (results && results.length > 0) {
            results.forEach(function (r) {
              appendConsole('output', r.columns.join(' | '));
              appendConsole('output', r.columns.map(function (c) { return '-'.repeat(c.length + 2); }).join('-|-'));
              r.values.forEach(function (row) {
                appendConsole('output', row.map(function (v) { return v === null ? 'NULL' : String(v); }).join(' | '));
              });
              appendConsole('success', '(' + r.values.length + ' rows)');
            });
          } else {
            appendConsole('success', 'OK');
          }
        } catch (e) {
          appendConsole('error', '\u274C ' + e.message);
          ok = false;
        }
        appendConsole('output', '');
      });
      done(ok);
    };

    if (sqlDb) { doRun(); return; }

    loadScript('https://cdn.jsdelivr.net/npm/sql.js@1.10.2/dist/sql-wasm.js')
      .then(function () {
        return window.initSqlJs({
          locateFile: function (f) { return 'https://cdn.jsdelivr.net/npm/sql.js@1.10.2/dist/' + f; }
        });
      })
      .then(function (SQL) {
        sqlDb = new SQL.Database();
        doRun();
      })
      .catch(function (err) {
        showSpinner(false);
        appendConsole('error', '\u274C Không tải được sql.js: ' + err.message);
        done(false, err.message);
      });
  }

  /* ================================================================
     ENGINE: JSON validate
     ================================================================ */
  function runJson(code, done) {
    switchTab('console');
    clearOutputSilent();
    try {
      var parsed = JSON.parse(code);
      var fmt    = JSON.stringify(parsed, null, 2);
      appendConsole('success', '\u2713 JSON hợp lệ (' + fmt.split('\n').length + ' dòng)');
      appendConsole('output', '');
      fmt.split('\n').forEach(function (l) { appendConsole('output', l); });
      done(true);
    } catch (e) {
      appendConsole('error', '\u274C JSON không hợp lệ: ' + e.message);
      done(false, e.message);
    }
  }

  /* ================================================================
     ENGINE: Markdown
     ================================================================ */
  function runMarkdown(code, done) {
    switchTab('preview');
    showSpinner(false);
    if (el.previewFrame) el.previewFrame.style.display = 'none';
    if (el.mdPreview)    el.mdPreview.classList.add('active');

    var render = function () {
      try {
        if (el.mdPreview) el.mdPreview.innerHTML = window.marked.parse(code, { breaks: true, gfm: true });
        done(true);
      } catch (e) {
        done(false, e.message);
      }
    };

    if (markedReady) { render(); return; }
    loadScript('https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js')
      .then(function () { markedReady = true; render(); })
      .catch(function (e) { done(false, e.message); });
  }

  /* ================================================================
     OUTPUT HELPERS
     ================================================================ */
  function switchTab(tab) {
    var isPreview = (tab === 'preview');
    var isConsole = (tab === 'console');

    if (el.tabPreview) { el.tabPreview.classList.toggle('active', isPreview); el.tabPreview.setAttribute('aria-selected', isPreview); }
    if (el.tabConsole) { el.tabConsole.classList.toggle('active', isConsole); el.tabConsole.setAttribute('aria-selected', isConsole); }

    // Hide all containers
    if (el.previewContainer) el.previewContainer.style.display = 'none';
    if (el.terminalWrapper)  el.terminalWrapper.classList.remove('active');

    if (isPreview) {
      if (el.previewContainer) el.previewContainer.style.display = 'block';
      // Toggle sub-elements based on language
      if (currentLang === 'markdown') {
        if (el.previewFrame) el.previewFrame.style.display = 'none';
        if (el.mdPreview)    el.mdPreview.classList.add('active');
      } else {
        if (el.previewFrame) el.previewFrame.style.display = 'block';
        if (el.mdPreview)    el.mdPreview.classList.remove('active');
      }
    } else if (isConsole) {
      if (el.terminalWrapper) el.terminalWrapper.classList.add('active');
    }
  }

  function clearOutput() {
    if (el.previewFrame) el.previewFrame.srcdoc = '';
    if (el.mdPreview)    el.mdPreview.innerHTML = '';
    clearOutputSilent();
  }

  function clearOutputSilent() {
    if (!el.console) return;
    el.console.innerHTML = '';
    var empty = document.createElement('div');
    empty.className = 'cp-output-empty';
    empty.innerHTML = '<span class="material-symbols-sharp">terminal</span><p>Nhấn <strong>Run</strong> để xem kết quả</p>';
    el.console.appendChild(empty);
  }

  function appendConsole(type, text) {
    if (!el.console) return;
    var emp = el.console.querySelector('.cp-output-empty');
    if (emp) emp.remove();

    var row = document.createElement('div');
    row.className = 'cp-console-line line-' + type;

    var pre = document.createElement('span');
    pre.className = 'cp-console-prefix';
    pre.textContent = type === 'error' ? '\u2715' : type === 'success' ? '\u2713' : type === 'info' ? '\u00BB' : ' ';

    var txt = document.createElement('span');
    txt.className = 'cp-console-text';
    txt.textContent = text;

    row.appendChild(pre);
    row.appendChild(txt);
    el.console.appendChild(row);
    el.console.scrollTop = el.console.scrollHeight;
  }

  function showSpinner(show, text) {
    if (!el.spinner) return;
    el.spinner.classList.toggle('visible', show);
    if (text && el.spinnerText) el.spinnerText.textContent = text;
  }

  function setStatus(state, text) {
    if (el.statusText) el.statusText.textContent = text;
    if (el.statusDot) {
      el.statusDot.className = 'cp-status-dot';
      if (state === 'running') el.statusDot.classList.add('dot-running');
      else if (state === 'success') el.statusDot.classList.add('dot-success');
      else if (state === 'error')   el.statusDot.classList.add('dot-error');
    }
  }

  /* ================================================================
     RESET / COPY / THEME / FULLSCREEN
     ================================================================ */
  function resetCode() {
    var def = DEFAULT_CODE[currentLang] || '';
    setCode(def);
    codeStore[currentLang] = def;
    persistCodes();
    if (['html','css','javascript','markdown'].indexOf(currentLang) !== -1) scheduleAutoRun();
  }

  function copyCode() {
    var code = getCode();
    var success = function () {
      if (el.copyToast) { el.copyToast.classList.add('show'); setTimeout(function () { el.copyToast.classList.remove('show'); }, 2000); }
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(success).catch(function () { fallbackCopy(code, success); });
    } else {
      fallbackCopy(code, success);
    }
  }

  function fallbackCopy(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;top:-999px;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); cb(); } catch(e) {}
    document.body.removeChild(ta);
  }

  /* =====================================================
     THEME SYNC (System Integration)
     ===================================================== */
  function syncSystemTheme() {
    // Check global ACTIVE_THEME or body class
    var activeTheme = window.ACTIVE_THEME || 'default';
    var isForest = (activeTheme === 'forest' || document.body.classList.contains('theme-forest'));
    
    // Toggle CP-light class for specific override logic in CSS
    if (el.root) {
      if (isForest) el.root.classList.add('cp-light');
      else el.root.classList.remove('cp-light');
    }

    // Update CodeMirror Theme (Galaxy: dracula, Forest: default)
    if (cmEditor) {
      var cmTheme = isForest ? 'default' : 'dracula';
      cmEditor.setOption('theme', cmTheme);
      setTimeout(function() { if (cmEditor) cmEditor.refresh(); }, 100);
    }
    
    isDark = !isForest;
  }

  function toggleFullscreen() {
    isFullscreen = !isFullscreen;
    if (el.root) el.root.classList.toggle('cp-fullscreen', isFullscreen);
    if (el.fsIcon) el.fsIcon.textContent = isFullscreen ? 'fullscreen_exit' : 'fullscreen';
    if (el.fsBtn) el.fsBtn.classList.toggle('active', isFullscreen);
    // Refresh editor after layout change
    setTimeout(function () { if (cmEditor) cmEditor.refresh(); }, 50);
  }

  /* ================================================================
     RESIZER
     ================================================================ */
  function setupResizer() {
    if (!el.resizer || !el.editorPanel || !el.outputPanel) return;
    var dragging = false, startX = 0, startW = 0;

    el.resizer.addEventListener('mousedown', function (e) {
      dragging = true; startX = e.clientX; startW = el.editorPanel.offsetWidth;
      el.resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });
    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      var split = document.getElementById('cpSplit');
      var total = split ? split.offsetWidth : window.innerWidth;
      var newW  = Math.max(180, Math.min(total - 180, startW + e.clientX - startX));
      el.editorPanel.style.width = newW + 'px';
      el.editorPanel.style.flex  = 'none';
      el.outputPanel.style.flex  = '1';
      if (cmEditor) cmEditor.refresh();
    });
    document.addEventListener('mouseup', function () {
      if (!dragging) return;
      dragging = false;
      el.resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      if (cmEditor) cmEditor.refresh();
    });
  }

  /* ================================================================
     PAGE LIFECYCLE HOOK
     ================================================================ */
  var cpInitialized = false;

  function onPageShow() {
    if (cpInitialized) {
      // Already initialized – just refresh editor if visible
      if (cmEditor) setTimeout(function () { cmEditor.refresh(); }, 50);
      return;
    }
    cpInitialized = true;
    cpInit();
  }

  // Hook into the app's showPage system
  // Use a polling approach to safely wrap showPage after all scripts load
  function hookShowPage() {
    var prev = window.showPage;
    window.showPage = function (pageId) {
      var args = Array.prototype.slice.call(arguments);
      if (typeof prev === 'function') prev.apply(window, args);
      if (pageId === 'page-code-playground') {
        setTimeout(onPageShow, 50);
      }
    };
  }

  // Run when DOM is ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      hookShowPage();
      // Check if page is immediately visible
      var pg = document.getElementById('page-code-playground');
      if (pg && pg.style.display !== 'none') onPageShow();
    });
  } else {
    hookShowPage();
    var pg = document.getElementById('page-code-playground');
    if (pg && pg.style.display !== 'none') onPageShow();
  }

  // Expose globally for debugging
  window.CodePlayground = { init: cpInit, run: function () { runCode(false); } };

})();
</script>
