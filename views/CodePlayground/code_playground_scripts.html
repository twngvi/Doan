          'style.css': 'body{margin:0;font-family:system-ui,Segoe UI,sans-serif;background:#0b1f17;color:#f5fff6;}\n.app{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.75rem;padding:1.25rem;}\nh1{margin:0;font-size:2rem;letter-spacing:0.02em;}\np{margin:0;opacity:0.85;}\nbutton{padding:0.7rem 1.1rem;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(74,155,95,0.25);color:#f5fff6;font-weight:700;cursor:pointer;}\nbutton:hover{background:rgba(74,155,95,0.35);}',

  var el = {};

  /* ================================================================
     LOADERS
     ================================================================ */
  function loadScript(src) {
    return new Promise(function (resolve, reject) {
      if (document.querySelector('script[src="' + src + '"]')) { resolve(); return; }
      var s = document.createElement('script');
      s.src = src;
      s.onload = resolve;
      s.onerror = function () { reject(new Error('Failed to load: ' + src)); };
      document.head.appendChild(s);
    });
  }

  function loadCss(href) {
    return new Promise(function (resolve) {
      if (document.querySelector('link[href="' + href + '"]')) { resolve(); return; }
      var l = document.createElement('link');
      l.rel = 'stylesheet';
      l.href = href;
      l.onload = resolve;
      l.onerror = resolve;
      document.head.appendChild(l);
    });
  }

  function loadCM5() {
    if (cmLoadPromise) return cmLoadPromise;
    cmLoadPromise = loadCss(CM_CDN + 'codemirror.min.css')
      .then(function () { return loadCss(CM_CDN + 'theme/dracula.min.css'); })
      .then(function () { return loadCss(CM_CDN + 'theme/default.min.css'); })
      .then(function () { return loadScript(CM_CDN + 'codemirror.min.js'); })
      .then(function () {
        return Promise.all([
          loadScript(CM_CDN + 'mode/xml/xml.min.js'),
          loadScript(CM_CDN + 'mode/css/css.min.js'),
          loadScript(CM_CDN + 'mode/javascript/javascript.min.js'),
          loadScript(CM_CDN + 'mode/htmlmixed/htmlmixed.min.js'),
          loadScript(CM_CDN + 'mode/python/python.min.js'),
          loadScript(CM_CDN + 'mode/clike/clike.min.js'),
          loadScript(CM_CDN + 'mode/sql/sql.min.js'),
          loadScript(CM_CDN + 'mode/markdown/markdown.min.js')
        ]);
      })
      .then(function () {
        return Promise.all([
          loadScript(CM_CDN + 'addon/edit/matchbrackets.min.js'),
          loadScript(CM_CDN + 'addon/edit/closebrackets.min.js')
        ]);
      });
    return cmLoadPromise;
  }

  function ensureCommentAddon() {
    // Lazy-load only when Ctrl+/ is used
    return Promise.all([
      loadScript(CM_CDN + 'addon/comment/comment.min.js'),
      loadScript(CM_CDN + 'addon/comment/continuecomment.min.js')
    ]);
  }

  function ensureMarked() {
    if (markedReady) return Promise.resolve();
    return loadScript(MARKED_URL).then(function () { markedReady = true; });
  }

  function ensureSqlJs() {
    if (SQL) return Promise.resolve(SQL);
    if (sqlInitPromise) return sqlInitPromise;
    sqlInitPromise = loadScript(SQLJS_URL)
      .then(function () {
        return window.initSqlJs({ locateFile: function (f) { return SQLJS_BASE + f; } });
      })
      .then(function (SQLMod) {
        SQL = SQLMod;
        return SQL;
      });
    return sqlInitPromise;
  }

  /* ================================================================
     STORAGE
     ================================================================ */
  function safeParseJson(s) {
    if (!s) return null;
    try { return JSON.parse(s); } catch (e) { return null; }
  }

  function deepClone(obj) {
    try { return JSON.parse(JSON.stringify(obj)); } catch (e) { return obj; }
  }

  function loadState() {
    var saved = safeParseJson(localStorage.getItem(STORAGE_SAVED));
    var draft = safeParseJson(localStorage.getItem(STORAGE_DRAFT));
    var base = deepClone(DEFAULT_PROJECT);

    if (saved) base = mergeState(base, saved);
    if (draft) base = mergeState(base, draft);

    // Backward compat: older cp_lang values
    if (base.activeWorkspace === 'html' || base.activeWorkspace === 'css' || base.activeWorkspace === 'javascript') {
      base.activeWorkspace = 'web';
    }
    if (!WORKSPACES[base.activeWorkspace]) base.activeWorkspace = 'web';
    return base;
  }

  function mergeState(dst, src) {
    if (!src) return dst;
    var k;
    for (k in src) {
      if (!Object.prototype.hasOwnProperty.call(src, k)) continue;
      if (src[k] && typeof src[k] === 'object' && !Array.isArray(src[k])) {
        if (!dst[k] || typeof dst[k] !== 'object') dst[k] = {};
        mergeState(dst[k], src[k]);
      } else {
        dst[k] = src[k];
      }
    }
    return dst;
  }

  function scheduleDraftSave() {
    clearTimeout(draftSaveTimer);
    draftSaveTimer = setTimeout(function () {
      try { localStorage.setItem(STORAGE_DRAFT, JSON.stringify(ide.state)); } catch (e) {}
    }, 350);
  }

  function saveExplicit() {
    syncEditorToState();
    syncStdinToState();
    try { localStorage.setItem(STORAGE_SAVED, JSON.stringify(ide.state)); } catch (e) {}
    ide.dirty = false;
    updateStateBadge();
    toast('Saved');
  }

  /* ================================================================
     DOM HELPERS
     ================================================================ */
  function byId(id) { return document.getElementById(id); }

  function isPageActive() {
    var pg = byId('page-code-playground');
    if (!pg) return false;
    if (pg.style && pg.style.display === 'none') return false;
    try {
      var cs = window.getComputedStyle ? window.getComputedStyle(pg) : null;
      if (cs && (cs.display === 'none' || cs.visibility === 'hidden')) return false;
    } catch (e) {}
    return true;
  }

  function setHidden(node, hidden) {
    if (!node) return;
    if (hidden) node.setAttribute('hidden', '');
    else node.removeAttribute('hidden');
  }

  function toast(msg) {
    if (!el.toast) return;
    el.toast.textContent = msg;
    el.toast.classList.add('show');
    clearTimeout(el.toast._t);
    el.toast._t = setTimeout(function () {
      el.toast.classList.remove('show');
    }, 1600);
  }

  function setStatus(state, text) {
    if (el.statusText) el.statusText.textContent = text || '';
    if (el.statusDot) {
      el.statusDot.className = 'cp-status-dot';
      if (state === 'running') el.statusDot.classList.add('dot-running');
      if (state === 'success') el.statusDot.classList.add('dot-success');
      if (state === 'error') el.statusDot.classList.add('dot-error');
    }
  }

  function setSpinner(show, text) {
    if (!el.spinner) return;
    if (text && el.spinnerText) el.spinnerText.textContent = text;
    el.spinner.classList.toggle('visible', !!show);
  }

  function updateStateBadge() {
    if (!el.stateBadge) return;
    if (ide.running) {
      el.stateBadge.textContent = 'Running';
      return;
    }
    if (ide.lastRunHadError) {
      el.stateBadge.textContent = 'Error';
      return;
    }
    if (ide.completed) {
      el.stateBadge.textContent = 'Completed';
      return;
    }
    el.stateBadge.textContent = ide.dirty ? 'Unsaved' : 'Saved';
  }

  function setEngineLabels() {
    var ws = WORKSPACES[ide.state.activeWorkspace] || WORKSPACES.web;
    if (el.engineLabel) el.engineLabel.textContent = ws.engine;
  }

  function clearConsole() {
    if (!el.console) return;
    el.console.innerHTML = '';
    appendConsole('info', 'Ready.');
  }

  function appendConsole(level, text) {
    if (!el.console) return;
    var row = document.createElement('div');
    row.className = 'cp-console-line line-' + level;

    var pre = document.createElement('span');
    pre.className = 'cp-console-prefix';
    pre.textContent = level === 'error' ? '✕' : level === 'success' ? '✓' : level === 'warn' ? '!' : level === 'info' ? '»' : ' ';

    var txt = document.createElement('span');
    txt.className = 'cp-console-text';
    txt.textContent = text;

    row.appendChild(pre);
    row.appendChild(txt);
    el.console.appendChild(row);
    el.console.scrollTop = el.console.scrollHeight;
  }

  function setConsoleMeta(runState, exitCode, runTime) {
    if (el.runStatePill) el.runStatePill.textContent = runState || '—';
    if (el.exitCode) el.exitCode.textContent = exitCode === undefined || exitCode === null ? '—' : String(exitCode);
    if (el.runTime) el.runTime.textContent = runTime || '—';
  }

  /* ================================================================
     MENUS
     ================================================================ */
  function toggleMenu(btn, menu, show) {
    if (!btn || !menu) return;
    var next = (show === undefined) ? menu.hasAttribute('hidden') : show;
    setHidden(menu, !next);
    btn.setAttribute('aria-expanded', next ? 'true' : 'false');
  }

  function closeAllMenus() {
    toggleMenu(el.langBtn, el.langMenu, false);
    toggleMenu(el.moreBtn, el.moreMenu, false);
  }

  function isClickInside(node, target) {
    if (!node || !target) return false;
    return node === target || node.contains(target);
  }

  /* ================================================================
     FILES + EDITOR
     ================================================================ */
  function getWorkspaceState(wsId) {
    if (!ide.state.workspaces[wsId]) ide.state.workspaces[wsId] = { files: {}, activeFile: '', stdin: '' };
    return ide.state.workspaces[wsId];
  }

  function getActiveWorkspaceState() {
    return getWorkspaceState(ide.state.activeWorkspace);
  }

  function getActiveFileName() {
    var ws = getActiveWorkspaceState();
    return ws.activeFile;
  }

  function getFileExt(name) {
    var idx = name.lastIndexOf('.');
    if (idx === -1) return 'txt';
    return name.substring(idx + 1).toLowerCase();
  }

  function getCurrentCode() {
    if (cmLoaded && cmEditor) return cmEditor.getValue();
    var ta = byId('cpCodeTextarea');
    return ta ? ta.value : '';
  }

  function setCurrentCode(code) {
    if (cmLoaded && cmEditor) {
      cmEditor.setValue(code || '');
    } else {
      var ta = byId('cpCodeTextarea');
      if (ta) ta.value = code || '';
    }
    updateCharCount();
  }

  function updateCharCount() {
    if (!el.charCount) return;
    var code = getCurrentCode();
    el.charCount.textContent = String((code || '').length) + ' chars';
  }

  function syncEditorToState() {
    var ws = getActiveWorkspaceState();
    var file = ws.activeFile;
    if (!file) return;
    ws.files[file] = getCurrentCode();
  }

  function syncStdinToState() {
    var ws = getActiveWorkspaceState();
    if (el.stdin) ws.stdin = el.stdin.value || '';
  }

  function applyEditorModeForFile(fileName) {
    var ext = getFileExt(fileName);
    var mode = CM_MODE_BY_EXT[ext] || 'htmlmixed';
    if (cmLoaded && cmEditor) cmEditor.setOption('mode', mode);
  }

  function applySettingsToEditor() {
    if (!cmLoaded || !cmEditor) return;
    var s = ide.state.settings;
    cmEditor.setOption('lineWrapping', !!s.wordWrap);
    cmEditor.setOption('tabSize', Number(s.tabSize) || 2);
    cmEditor.setOption('indentUnit', Number(s.tabSize) || 2);

    var isMobile = window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
    var fontSize = Number(s.fontSize) || 14;
    if (isMobile && fontSize < 14) fontSize = 14;
    var wrap = el.editorWrap;
    if (wrap) {
      var cmEl = wrap.querySelector('.CodeMirror');
      if (cmEl) cmEl.style.fontSize = fontSize + 'px';
    }

    var theme = resolveEditorTheme();
    cmEditor.setOption('theme', theme);
    setTimeout(function () { if (cmEditor) cmEditor.refresh(); }, 60);
  }

  function resolveEditorTheme() {
    var s = ide.state.settings;
    if (s.theme === 'light') return 'default';
    if (s.theme === 'dark') return 'dracula';
    // auto: follow body class (forest is light), but IDE is dark -> keep dracula.
    return 'dracula';
  }

  function createEditorOnce() {
    if (!el.editorWrap) return;
    if (!window.CodeMirror) return;

    if (cmEditor) return;
    var ta = byId('cpCodeTextarea');
    if (!ta) return;

    cmEditor = window.CodeMirror.fromTextArea(ta, {
      value: '',
      mode: 'htmlmixed',
      theme: resolveEditorTheme(),
      lineNumbers: true,
      lineWrapping: !!ide.state.settings.wordWrap,
      tabSize: Number(ide.state.settings.tabSize) || 2,
      indentUnit: Number(ide.state.settings.tabSize) || 2,
      indentWithTabs: false,
      matchBrackets: true,
      autoCloseBrackets: true,
      extraKeys: {
        'Ctrl-Enter': function () { runCode(false); return true; },
        'Ctrl-S': function () { saveExplicit(); return true; },
        'Ctrl-/': function (cm) {
          ensureCommentAddon().then(function () {
            try { cm.execCommand('toggleComment'); } catch (e) {}
          });
          return true;
        },
        'Tab': function (cm) { cm.execCommand('insertSoftTab'); }
      }
    });

    cmEditor.on('change', function () {
      ide.dirty = true;
      ide.completed = false;
      updateStateBadge();
      scheduleDraftSave();
      updateCharCount();
      if (ide.state.settings.autoRun) scheduleAutoRunMaybe();
    });

    cmEditor.on('cursorActivity', function () {
      if (!el.cursorPos) return;
      var c = cmEditor.getCursor();
      el.cursorPos.textContent = 'Ln ' + (c.line + 1) + ', Col ' + (c.ch + 1);
    });

    applySettingsToEditor();
  }

  function renderFiles() {
    var ws = getActiveWorkspaceState();
    var files = Object.keys(ws.files || {});
    if (files.length === 0) {
      ws.files = {};
      ws.activeFile = '';
      return;
    }
    if (!ws.activeFile || !ws.files[ws.activeFile]) ws.activeFile = files[0];

    if (el.fileTabs) {
      el.fileTabs.innerHTML = '';
      files.forEach(function (name) {
        var ext = getFileExt(name);
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cp-filetab' + (name === ws.activeFile ? ' active' : '');
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', name === ws.activeFile ? 'true' : 'false');
        btn.setAttribute('data-file', name);

        var icon = document.createElement('span');
        icon.className = 'material-symbols-sharp';
        icon.textContent = FILE_ICONS[ext] || 'description';

        var label = document.createElement('span');
        label.textContent = name;

        btn.appendChild(icon);
        btn.appendChild(label);
        btn.addEventListener('click', function () { switchFile(name); });
        el.fileTabs.appendChild(btn);
      });
    }

    if (el.fileList) {
      el.fileList.innerHTML = '';
      files.forEach(function (name) {
        var ext = getFileExt(name);
        var item = document.createElement('div');
        item.className = 'cp-file-item' + (name === ws.activeFile ? ' active' : '');
        item.setAttribute('data-file', name);

        var icon = document.createElement('span');
        icon.className = 'material-symbols-sharp';
        icon.textContent = FILE_ICONS[ext] || 'description';

        var label = document.createElement('span');
        label.className = 'cp-file-name';
        label.textContent = name;

        item.appendChild(icon);
        item.appendChild(label);
        item.addEventListener('click', function () { switchFile(name); });
        el.fileList.appendChild(item);
      });
    }

    if (el.statusWorkspace) el.statusWorkspace.textContent = (WORKSPACES[ide.state.activeWorkspace] || WORKSPACES.web).label;
    if (el.statusFile) el.statusFile.textContent = ws.activeFile;
  }

  function switchFile(fileName) {
    syncEditorToState();
    var ws = getActiveWorkspaceState();
    if (!ws.files[fileName]) return;
    ws.activeFile = fileName;
    renderFiles();
    applyEditorModeForFile(fileName);
    setCurrentCode(ws.files[fileName] || '');
    ide.dirty = true;
    updateStateBadge();
    scheduleDraftSave();
  }

  function switchWorkspace(nextWs) {
    if (!WORKSPACES[nextWs]) return;
    syncEditorToState();
    syncStdinToState();

    ide.state.activeWorkspace = nextWs;
    ide.completed = false;
    ide.lastRunHadError = false;
    ide.dirty = true;
    updateLangUi();
    updateStateBadge();

    var wsState = getActiveWorkspaceState();
    if (el.stdin) el.stdin.value = wsState.stdin || '';

    renderFiles();
    applyEditorModeForFile(wsState.activeFile);
    setCurrentCode(wsState.files[wsState.activeFile] || '');
    switchOutputTab(defaultOutputTabForWorkspace(nextWs));
    applyPreviewVisibilityForWorkspace();
    setPreviewOverlay(false, '');
    setEngineLabels();
    scheduleDraftSave();

    if (ide.state.settings.autoRun) scheduleAutoRunMaybe();
  }

  function updateLangUi() {
    var ws = WORKSPACES[ide.state.activeWorkspace] || WORKSPACES.web;
    if (el.langLabel) el.langLabel.textContent = ws.label;
    if (el.langIcon) el.langIcon.textContent = ws.icon;
  }

  function defaultOutputTabForWorkspace(wsId) {
    var engine = (WORKSPACES[wsId] || WORKSPACES.web).engine;
    if (engine === 'iframe' || engine === 'marked') return 'preview';
    return 'console';
  }

  /* ================================================================
     OUTPUT TABS + MOBILE TABS
     ================================================================ */
  function switchOutputTab(tab) {
    if (!el.outputTabs) return;
    var btns = el.outputTabs.querySelectorAll('.cp-output-tab');
    for (var i = 0; i < btns.length; i++) {
      var b = btns[i];
      var t = b.getAttribute('data-tab');
      var active = (t === tab);
      b.classList.toggle('active', active);
      b.setAttribute('aria-selected', active ? 'true' : 'false');
    }

    setHidden(el.panelPreview, tab !== 'preview');
    setHidden(el.panelConsole, tab !== 'console');
    setHidden(el.panelInput, tab !== 'input');
    setHidden(el.panelTests, tab !== 'tests');

    if (tab === 'console') {
      // no-op
    }
  }

  function setMobileView(view) {
    if (!el.root) return;
    el.root.setAttribute('data-mobile-view', view);
    if (el.mobileTabs) {
      var tabs = el.mobileTabs.querySelectorAll('.cp-mobile-tab');
      for (var i = 0; i < tabs.length; i++) {
        var t = tabs[i].getAttribute('data-view');
        var active = (t === view);
        tabs[i].classList.toggle('active', active);
        tabs[i].setAttribute('aria-selected', active ? 'true' : 'false');
      }
    }

    if (view === 'code') return;
    if (view === 'preview') switchOutputTab('preview');
    if (view === 'console') switchOutputTab('console');
    if (view === 'input') switchOutputTab('input');
  }

  function applyPreviewVisibilityForWorkspace() {
    var isMd = ide.state && ide.state.activeWorkspace === 'markdown';
    if (el.previewViewport) setHidden(el.previewViewport, !!isMd);
    if (el.mdPreview) el.mdPreview.classList.toggle('active', !!isMd);
  }

  /* ================================================================
     PREVIEW
     ================================================================ */
  function setPreviewOverlay(show, message) {
    if (!el.previewOverlay) return;
    if (el.previewOverlayBody) el.previewOverlayBody.textContent = message || '';
    setHidden(el.previewOverlay, !show);
  }

  function applyZoom() {
    if (!el.previewFrame) return;
    var val = el.zoomSelect ? el.zoomSelect.value : '100';
    if (val === 'fit') {
      el.previewFrame.style.transform = 'scale(1)';
      el.previewFrame.style.width = '100%';
      return;
    }
    var n = Number(val) || 100;
    var s = Math.max(0.25, Math.min(1.5, n / 100));
    el.previewFrame.style.transform = 'scale(' + s + ')';
    el.previewFrame.style.width = (100 / s) + '%';
  }

  function buildWebSrcdoc(files) {
    var html = files['index.html'] || '<!doctype html><html><body></body></html>';
    var css = files['style.css'] || '';
    var js = files['script.js'] || '';

    var bridge = '';
    bridge += '(function(){\n';
    bridge += '  function toText(x){\n';
    bridge += '    try{\n';
    bridge += '      if(x===undefined) return "undefined";\n';
    bridge += '      if(x===null) return "null";\n';
    bridge += '      if(typeof x==="string") return x;\n';
    bridge += '      if(typeof x==="number"||typeof x==="boolean") return String(x);\n';
    bridge += '      return JSON.stringify(x);\n';
    bridge += '    }catch(e){ return String(x); }\n';
    bridge += '  }\n';
    bridge += '  function post(level,args){\n';
    bridge += '    try{ parent.postMessage({__cp:1,type:"console",level:level,text:args.map(toText).join(" ")},"*"); }catch(e){}\n';
    bridge += '  }\n';
    bridge += '  var ol=console.log, ow=console.warn, oe=console.error;\n';
    bridge += '  console.log=function(){ ol&&ol.apply(console,arguments); post("output", Array.prototype.slice.call(arguments)); };\n';
    bridge += '  console.warn=function(){ ow&&ow.apply(console,arguments); post("warn", Array.prototype.slice.call(arguments)); };\n';
    bridge += '  console.error=function(){ oe&&oe.apply(console,arguments); post("error", Array.prototype.slice.call(arguments)); };\n';
    bridge += '  window.addEventListener("error", function(ev){\n';
    bridge += '    var msg = (ev && ev.message) ? ev.message : "Runtime error";\n';
    bridge += '    try{ parent.postMessage({__cp:1,type:"error",message:msg},"*"); }catch(e){}\n';
    bridge += '  });\n';
    bridge += '  window.addEventListener("unhandledrejection", function(ev){\n';
    bridge += '    var msg = "Unhandled promise rejection";\n';
    bridge += '    try{ msg = ev && ev.reason ? (ev.reason.message || String(ev.reason)) : msg; }catch(e){}\n';
    bridge += '    try{ parent.postMessage({__cp:1,type:"error",message:msg},"*"); }catch(e){}\n';
    bridge += '  });\n';
    bridge += '})();\n';

    var styleTag = '<style id="cpStyle">\n' + css + '\n</style>';
    var scriptTag = '<script id="cpRuntime">\n' + bridge + '\ntry{\n' + js + '\n}catch(e){\n  try{ parent.postMessage({__cp:1,type:"error",message:e.message||String(e)},"*"); }catch(_e){}\n}\n<\/script>';

    // Insert CSS before </head>
    if (html.indexOf('</head>') !== -1) {
      html = html.replace('</head>', styleTag + '\n</head>');
    } else {
      html = '<head>' + styleTag + '</head>\n' + html;
    }

    // Insert JS before </body>
    if (html.indexOf('</body>') !== -1) {
      html = html.replace('</body>', scriptTag + '\n</body>');
    } else {
      html = html + '\n' + scriptTag;
    }

    return html;
  }

  function openPreviewInNewTab() {
    if (!ide.lastPreviewHtml) {
      toast('No preview available');
      return;
    }
    try {
      var blob = new Blob([ide.lastPreviewHtml], { type: 'text/html' });
      var url = URL.createObjectURL(blob);
      window.open(url, '_blank', 'noopener');
      setTimeout(function () {
        try { URL.revokeObjectURL(url); } catch (e) {}
      }, 15000);
    } catch (e) {
      toast('Cannot open preview');
    }
  }

  /* ================================================================
     RUN ENGINES
     ================================================================ */
  function canRunNow(isAuto) {
    if (ide.running) return false;
    if (!isAuto) return true;
    // auto-run only for realtime preview types
    var ws = WORKSPACES[ide.state.activeWorkspace] || WORKSPACES.web;
    return (ws.engine === 'iframe' || ws.engine === 'marked');
  }

  function scheduleAutoRunMaybe() {
    clearTimeout(autoRunTimer);
    if (!ide.state.settings.autoRun) return;
    if (!canRunNow(true)) return;
    autoRunTimer = setTimeout(function () {
      runCode(true);
    }, 650);
  }

  function setRunningUi(running) {
    ide.running = !!running;
    updateStateBadge();
    if (el.runBtn) {
      el.runBtn.disabled = running;
      el.runBtn.classList.toggle('running', running);
    }
    if (el.runBtnMobile) {
      el.runBtnMobile.disabled = running;
      el.runBtnMobile.classList.toggle('running', running);
    }
    if (el.stopBtn) el.stopBtn.disabled = !running;
  }

  function stopRun() {
    if (ide.runAbort) {
      try { ide.runAbort.abort(); } catch (e) {}
    }
    ide.runAbort = null;
    setSpinner(false);
    setRunningUi(false);
    setConsoleMeta('Stopped', '—', '—');
    setStatus('error', 'Đã dừng');
    appendConsole('warn', 'Stopped by user.');
  }

  function runCode(isAuto) {
    if (!canRunNow(!!isAuto)) return;

    syncEditorToState();
    syncStdinToState();

    var wsId = ide.state.activeWorkspace;
    var wsMeta = WORKSPACES[wsId] || WORKSPACES.web;
    var ws = getActiveWorkspaceState();
    var file = ws.activeFile;
    var code = ws.files[file] || '';
    var t0 = performance.now();
    var runSeq = ++ide.currentRunSeq;

    ide.completed = false;
    ide.lastRunHadError = false;
    updateStateBadge();

    if (!isAuto) {
      // Switch to the most relevant panel
      switchOutputTab(defaultOutputTabForWorkspace(wsId));
      var isMobile = window.matchMedia && window.matchMedia('(max-width: 768px)').matches;
      if (isMobile) {
        if (wsMeta.engine === 'iframe' || wsMeta.engine === 'marked') setMobileView('preview');
        else setMobileView('console');
      }
    }

    setRunningUi(true);
    setStatus('running', 'Đang chạy...');
    setConsoleMeta('Running', '—', '—');
    setEngineLabels();
    setPreviewOverlay(false, '');

    if (wsMeta.engine === 'iframe') {
      clearConsole();
      appendConsole('info', 'Preview refreshed.');
      ide.lastPreviewHtml = buildWebSrcdoc(ws.files);
      if (el.previewFrame) el.previewFrame.srcdoc = ide.lastPreviewHtml;
      if (el.mdPreview) el.mdPreview.classList.remove('active');
      setHidden(el.previewViewport, false);
      applyZoom();

      var elapsed = ((performance.now() - t0) / 1000).toFixed(2) + 's';
      if (el.statusTime) el.statusTime.textContent = elapsed;
      setRunningUi(false);
      setConsoleMeta('Completed', '0', elapsed);
      setStatus('success', 'Hoàn thành');
      updateStateBadge();
      return;
    }

    if (wsMeta.engine === 'marked') {
      clearConsole();
      setSpinner(false);
      ensureMarked().then(function () {
        if (runSeq !== ide.currentRunSeq) return;
        try {
          if (el.mdPreview) {
            el.mdPreview.classList.add('active');
            el.mdPreview.innerHTML = window.marked.parse(code, { breaks: true, gfm: true });
          }
          if (el.previewViewport) setHidden(el.previewViewport, true);
          if (el.previewFrame) el.previewFrame.srcdoc = '';
          ide.lastPreviewHtml = '<!doctype html><meta charset="utf-8"><title>Markdown Preview</title><body>' + (el.mdPreview ? el.mdPreview.innerHTML : '') + '</body>';
          var elapsed2 = ((performance.now() - t0) / 1000).toFixed(2) + 's';
          if (el.statusTime) el.statusTime.textContent = elapsed2;
          setConsoleMeta('Completed', '0', elapsed2);
          setStatus('success', 'Hoàn thành');
          setRunningUi(false);
        } catch (e) {
          ide.lastRunHadError = true;
          appendConsole('error', e.message || String(e));
          setConsoleMeta('Error', '1', '—');
          setStatus('error', 'Lỗi');
          setRunningUi(false);
        }
        updateStateBadge();
      }).catch(function (e) {
        ide.lastRunHadError = true;
        appendConsole('error', 'Cannot load marked.js: ' + (e.message || e));
        setStatus('error', 'Lỗi');
        setRunningUi(false);
        updateStateBadge();
      });
      return;
    }

    if (wsMeta.engine === 'json') {
      clearConsole();
      try {
        var parsed = JSON.parse(code);
        var fmt = JSON.stringify(parsed, null, 2);
        appendConsole('success', '✓ JSON valid');
        appendConsole('output', fmt);
        var elapsed3 = ((performance.now() - t0) / 1000).toFixed(2) + 's';
        if (el.statusTime) el.statusTime.textContent = elapsed3;
        setConsoleMeta('Completed', '0', elapsed3);
        setStatus('success', 'Hoàn thành');
      } catch (e) {
        ide.lastRunHadError = true;
        appendConsole('error', 'JSON invalid: ' + (e.message || e));
        setConsoleMeta('Error', '1', '—');
        setStatus('error', 'Lỗi');
      }
      setRunningUi(false);
      updateStateBadge();
      return;
    }

    if (wsMeta.engine === 'sqljs') {
      clearConsole();
      setSpinner(true, 'Khởi tạo SQLite...');
      ensureSqlJs().then(function (SQLMod) {
        if (runSeq !== ide.currentRunSeq) return;
        setSpinner(false);
        // Reset DB every run (no accumulation)
        var db = new SQLMod.Database();
        var ok = true;
        try {
          var stmts = splitSqlStatements(code);
          for (var i = 0; i < stmts.length; i++) {
            var stmt = stmts[i];
            appendConsole('info', '▶ ' + shorten(stmt, 120));
            var results = db.exec(stmt);
            renderSqlResults(results);
          }
        } catch (e) {
          ok = false;
          ide.lastRunHadError = true;
          appendConsole('error', e.message || String(e));
        }

        var elapsed4 = ((performance.now() - t0) / 1000).toFixed(2) + 's';
        if (el.statusTime) el.statusTime.textContent = elapsed4;
        setConsoleMeta(ok ? 'Completed' : 'Error', ok ? '0' : '1', elapsed4);
        setStatus(ok ? 'success' : 'error', ok ? 'Hoàn thành' : 'Lỗi');
        setRunningUi(false);
        updateStateBadge();
      }).catch(function (e) {
        setSpinner(false);
        ide.lastRunHadError = true;
        appendConsole('error', 'Cannot load sql.js: ' + (e.message || e));
        setStatus('error', 'Lỗi');
        setConsoleMeta('Error', '1', '—');
        setRunningUi(false);
        updateStateBadge();
      });
      return;
    }

    if (wsMeta.engine === 'wandbox') {
      clearConsole();
      setSpinner(true, 'Đang biên dịch & chạy...');
      var cfg = WANDBOX_CONFIGS[wsId];
      if (!cfg) {
        setSpinner(false);
        ide.lastRunHadError = true;
        appendConsole('error', 'Unsupported language');
        setRunningUi(false);
        updateStateBadge();
        return;
      }

      var payload = {
        compiler: cfg.compiler,
        code: code,
        options: '',
        stdin: ws.stdin || '',
        'compiler-option-raw': cfg.rawOptions || '',
        'runtime-option-raw': ''
      };

      var controller = (window.AbortController ? new AbortController() : null);
      ide.runAbort = controller;

      var timeoutId = setTimeout(function () {
        if (controller) {
          try { controller.abort(); } catch (e) {}
        }
      }, WANDBOX_TIMEOUT_MS);

      fetch(WANDBOX_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal: controller ? controller.signal : undefined
      })
      .then(function (res) {
        clearTimeout(timeoutId);
        if (!res.ok) throw new Error('Wandbox API ' + res.status);
        return res.json();
      })
      .then(function (r) {
        if (runSeq !== ide.currentRunSeq) return;
        setSpinner(false);
        ide.runAbort = null;

        var ok2 = String(r.status) === '0';
        if (r.compiler_error && r.compiler_error.trim()) {
          ide.lastRunHadError = true;
          appendBlock('error', r.compiler_error);
        }
        if (r.compiler_output && r.compiler_output.trim()) {
          appendBlock('info', r.compiler_output);
        }
        if (r.program_output && r.program_output.trim()) {
          appendBlock('output', r.program_output);
        }
        if (r.program_error && r.program_error.trim()) {
          ide.lastRunHadError = true;
          appendBlock('error', r.program_error);
        }

        var elapsed5 = ((performance.now() - t0) / 1000).toFixed(2) + 's';
        if (el.statusTime) el.statusTime.textContent = elapsed5;
        setConsoleMeta(ok2 && !ide.lastRunHadError ? 'Completed' : 'Error', r.status, elapsed5);
        setStatus(ok2 && !ide.lastRunHadError ? 'success' : 'error', ok2 ? 'Hoàn thành' : 'Lỗi');
        setRunningUi(false);
        updateStateBadge();
      })
      .catch(function (err) {
        if (runSeq !== ide.currentRunSeq) return;
        clearTimeout(timeoutId);
        setSpinner(false);
        ide.runAbort = null;
        ide.lastRunHadError = true;

        if (String(err && err.name) === 'AbortError') {
          appendConsole('warn', 'Timeout after ' + Math.round(WANDBOX_TIMEOUT_MS / 1000) + 's');
        } else {
          appendConsole('error', '✕ ' + (err.message || String(err)));
          if ((err.message || '').indexOf('Failed to fetch') !== -1) {
            appendConsole('info', 'Network error: check your connection.');
          }
        }

        setConsoleMeta('Error', '—', '—');
        setStatus('error', 'Lỗi');
        setRunningUi(false);
        updateStateBadge();
      });
      return;
    }

    // Fallback
    setSpinner(false);
    setRunningUi(false);
  }

  function appendBlock(level, text) {
    var lines = String(text || '').replace(/\r\n/g, '\n').split('\n');
    for (var i = 0; i < lines.length; i++) {
      if (lines[i] === '' && i === lines.length - 1) continue;
      appendConsole(level, lines[i]);
    }
  }

  function shorten(s, n) {
    s = String(s || '').trim();
    if (s.length <= n) return s;
    return s.substring(0, n) + '...';
  }

  function splitSqlStatements(sql) {
    var out = [];
    var cur = '';
    var inStr = false;
    for (var i = 0; i < sql.length; i++) {
      var ch = sql.charAt(i);
      var next = sql.charAt(i + 1);
      
      // Handle escaped single quotes in SQL ('')
      if (ch === "'" && inStr && next === "'") {
        cur += ch;
        cur += next;
        i++;
        continue;
      }
      
      if (ch === "'") inStr = !inStr;
      if (ch === ';' && !inStr) {
        if (cur.trim()) out.push(cur.trim());
        cur = '';
      } else {
        cur += ch;
      }
    }
    if (cur.trim()) out.push(cur.trim());
    return out;
  }

  function renderSqlResults(results) {
    if (!results || !results.length) {
      appendConsole('success', 'OK');
      return;
    }
    for (var i = 0; i < results.length; i++) {
      var r = results[i];
      appendConsole('output', (r.columns || []).join(' | '));
      appendConsole('output', (r.columns || []).map(function (c) { return repeat('-', String(c).length); }).join('-|-'));
      for (var j = 0; j < (r.values || []).length; j++) {
        var row = r.values[j];
        appendConsole('output', row.map(function (v) { return v === null ? 'NULL' : String(v); }).join(' | '));
      }
      appendConsole('success', '(' + (r.values ? r.values.length : 0) + ' rows)');
      appendConsole('output', '');
    }
  }

  function repeat(ch, n) {
    var s = '';
    for (var i = 0; i < n; i++) s += ch;
    return s;
  }

  /* ================================================================
     TEST CASES
     ================================================================ */
  function renderTests() {
    if (!el.testsList) return;
    el.testsList.innerHTML = '';

    var wsId = ide.state.activeWorkspace;
    var tests = ide.state.tests[wsId] || null;

    if (!tests || !tests.length) {
      var note = document.createElement('div');
      note.style.opacity = '0.9';
      note.style.padding = '0.5rem';
      note.textContent = 'Test cases hiện hỗ trợ cho Python / C / C++ / Java.';
      el.testsList.appendChild(note);
      if (el.testsSummary) el.testsSummary.textContent = '';
      if (el.runTestsBtn) el.runTestsBtn.disabled = true;
      return;
    }
    if (el.runTestsBtn) el.runTestsBtn.disabled = false;

    tests.forEach(function (tc, idx) {
      var card = document.createElement('div');
      card.className = 'cp-test';

      var header = document.createElement('div');
      header.className = 'cp-test-header';
      
      var titleSpan = document.createElement('span');
      titleSpan.textContent = 'Test #' + (idx + 1);
      header.appendChild(titleSpan);

      var actions = document.createElement('div');
      actions.className = 'cp-test-actions';
      actions.style.display = 'flex';
      actions.style.alignItems = 'center';
      actions.style.gap = '0.5rem';

      var badge = document.createElement('span');
      badge.className = 'cp-test-badge';
      if (tc.status === 'pass') badge.classList.add('pass');
      if (tc.status === 'fail') badge.classList.add('fail');
      badge.textContent = tc.status === 'pass' ? 'Passed' : tc.status === 'fail' ? 'Failed' : 'Pending';
      actions.appendChild(badge);

      var delBtn = document.createElement('button');
      delBtn.className = 'cp-btn cp-btn-icon';
      delBtn.style.padding = '2px';
      delBtn.style.borderRadius = '6px';
      delBtn.innerHTML = '<span class="material-symbols-sharp" style="font-size:1.1rem">delete</span>';
      delBtn.title = 'Remove test case';
      delBtn.onclick = function() { removeTestCase(idx); };
      actions.appendChild(delBtn);

      header.appendChild(actions);

      var body = document.createElement('div');
      body.className = 'cp-test-body';

      var fIn = buildTestField('Input', tc.input, function (v) { tc.input = v; ide.dirty = true; scheduleDraftSave(); });
      var fEx = buildTestField('Expected output', tc.expected, function (v) { tc.expected = v; ide.dirty = true; scheduleDraftSave(); });
      var fAc = buildTestField('Actual output', tc.actual || '', null, true);

      body.appendChild(fIn);
      body.appendChild(fEx);
      body.appendChild(fAc);

      card.appendChild(header);
      card.appendChild(body);
      el.testsList.appendChild(card);
    });

    updateTestsSummary();
  }

  function buildTestField(label, value, onChange, readonly) {
    var wrap = document.createElement('div');
    wrap.className = 'cp-test-field';
    var l = document.createElement('label');
    l.textContent = label;
    var ta = document.createElement('textarea');
    ta.value = value || '';
    if (readonly) ta.setAttribute('readonly', '');
    if (onChange) {
      ta.addEventListener('input', function () {
        onChange(ta.value);
      });
    }
    wrap.appendChild(l);
    wrap.appendChild(ta);
    return wrap;
  }

  function updateTestsSummary() {
    if (!el.testsSummary) return;
    var wsId = ide.state.activeWorkspace;
    var tests = ide.state.tests[wsId] || [];
    if (!tests.length) { el.testsSummary.textContent = ''; return; }
    var pass = 0;
    for (var i = 0; i < tests.length; i++) if (tests[i].status === 'pass') pass++;
    el.testsSummary.textContent = pass + '/' + tests.length + ' passed.';
  }

  function normalizeOutput(s) {
    s = String(s || '').replace(/\r\n/g, '\n');
    // Trim trailing spaces on each line, keep final newline significance loosely
    var lines = s.split('\n');
    for (var i = 0; i < lines.length; i++) lines[i] = lines[i].replace(/\s+$/g, '');
    return lines.join('\n').trim() + '\n';
  }

  function runTests() {
    var wsId = ide.state.activeWorkspace;
    var tests = ide.state.tests[wsId];
    if (!tests || !tests.length) return;
    if (ide.running) return;

    if (!WANDBOX_CONFIGS[wsId]) {
      toast('Tests only for Wandbox languages');
      return;
    }

    syncEditorToState();
    var ws = getActiveWorkspaceState();
    var file = ws.activeFile;
    var code = ws.files[file] || '';

    ide.completed = false;
    ide.lastRunHadError = false;
    updateStateBadge();

    setRunningUi(true);
    setSpinner(true, 'Running tests...');
    switchOutputTab('tests');
    setConsoleMeta('Running', '—', '—');
    setStatus('running', 'Đang chạy tests...');

    // Reset statuses
    for (var i = 0; i < tests.length; i++) {
      tests[i].status = 'pending';
      tests[i].actual = '';
    }
    renderTests();

    var t0 = performance.now();
    var idx = 0;
    var passedAll = true;

    function next() {
      if (!ide.running) return; // Stopped by user
      if (idx >= tests.length) {
        setSpinner(false);
        setRunningUi(false);
        var elapsed = ((performance.now() - t0) / 1000).toFixed(2) + 's';
        if (el.statusTime) el.statusTime.textContent = elapsed;
        setConsoleMeta(passedAll ? 'Completed' : 'Error', passedAll ? '0' : '1', elapsed);
        setStatus(passedAll ? 'success' : 'error', passedAll ? 'Completed' : 'Failed');
        if (passedAll) {
          ide.completed = true;
          ide.lastRunHadError = false;
          updateStateBadge();
          dispatchTestsCompletedEvent(true, elapsed);
        } else {
          ide.completed = false;
          ide.lastRunHadError = true;
          updateStateBadge();
          dispatchTestsCompletedEvent(false, elapsed);
        }
        updateTestsSummary();
        scheduleDraftSave();
        return;
      }

      var tc = tests[idx];
      runWandboxForTest(wsId, code, tc.input || '', function (result) {
        var out = normalizeOutput(result.output);
        var exp = normalizeOutput(tc.expected || '');
        tc.actual = result.rawOutput;
        if (result.ok && out === exp) {
          tc.status = 'pass';
        } else {
          tc.status = 'fail';
          passedAll = false;
        }
        idx++;
        renderTests();
        next();
      });
    }

    next();
  }

  function runWandboxForTest(wsId, code, stdin, cb) {
    var cfg = WANDBOX_CONFIGS[wsId];
    var payload = {
      compiler: cfg.compiler,
      code: code,
      options: '',
      stdin: stdin,
      'compiler-option-raw': cfg.rawOptions || '',
      'runtime-option-raw': ''
    };

    var controller = (window.AbortController ? new AbortController() : null);
    ide.runAbort = controller;
    var timeoutId = setTimeout(function () {
      if (controller) {
        try { controller.abort(); } catch (e) {}
      }
    }, WANDBOX_TIMEOUT_MS);

    fetch(WANDBOX_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
      signal: controller ? controller.signal : undefined
    })
    .then(function (res) {
      clearTimeout(timeoutId);
      if (!res.ok) throw new Error('Wandbox API ' + res.status);
      return res.json();
    })
    .then(function (r) {
      clearTimeout(timeoutId);
      ide.runAbort = null;
      var ok = String(r.status) === '0' && !(r.compiler_error && r.compiler_error.trim());
      var out = '';
      if (r.program_output) out += r.program_output;
      if (r.program_error) out += r.program_error;
      cb({ ok: ok, output: out, rawOutput: out });
    })
    .catch(function (err) {
      clearTimeout(timeoutId);
      ide.runAbort = null;
      cb({ ok: false, output: '', rawOutput: 'ERROR: ' + (err.message || String(err)) + '\n' });
    });
  }

  function copyCurrentFile() {
    syncEditorToState();
    var ws = getActiveWorkspaceState();
    var code = ws.files[ws.activeFile] || '';

    var ok = function () { toast('Copied'); };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(code).then(ok).catch(function () { fallbackCopy(code, ok); });
    } else {
      fallbackCopy(code, ok);
    }
  }

  function fallbackCopy(text, cb) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-9999px;top:-9999px;opacity:0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); } catch (e) {}
    document.body.removeChild(ta);
    if (cb) cb();
  }

  function downloadExport() {
    syncEditorToState();
    syncStdinToState();
    var payload = JSON.stringify(ide.state, null, 2);
    try {
      var blob = new Blob([payload], { type: 'application/json' });
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = (ide.state.projectName || 'code-playground') + '.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { try { URL.revokeObjectURL(url); } catch (e) {} }, 8000);
      toast('Downloaded');
    } catch (e) {
      toast('Download failed');
    }
  }

  function ensureWorkspaceFileExtension(wsId, fileName) {
    fileName = String(fileName || '').trim();
    if (!fileName) return fileName;
    if (fileName.indexOf('.') !== -1) return fileName;
    var extMap = {
      python: 'py',
      c: 'c',
      cpp: 'cpp',
      java: 'java',
      sql: 'sql',
      markdown: 'md',
      json: 'json'
    };
    var ext = extMap[String(wsId || '')] || '';
    if (!ext) return fileName;
    return fileName + '.' + ext;
  }

  function downloadWorkspaceSources() {
    syncEditorToState();
    syncStdinToState();

    var wsId = ide.state.activeWorkspace;
    var ws = getActiveWorkspaceState();
    var files = (ws && ws.files) ? ws.files : {};
    var names = Object.keys(files);
    if (!names.length) {
      toast('Nothing to download');
      return;
    }

    for (var i = 0; i < names.length; i++) {
      var originalName = names[i];
      var name = ensureWorkspaceFileExtension(wsId, originalName);
      var content = String(files[originalName] || '');
      try {
        var blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        a.href = url;
        a.download = name;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        (function (u) { setTimeout(function () { try { URL.revokeObjectURL(u); } catch (e) {} }, 8000); })(url);
      } catch (e) {}
    }

    toast('Downloaded');
  }

  /* ================================================================

     ================================================================ */
  function setupResizer() {
    if (!el.resizer || !el.editorPane || !el.outputPane) return;
    var dragging = false;
    var startX = 0;
    var startW = 0;

    el.resizer.addEventListener('mousedown', function (e) {
      dragging = true;
      startX = e.clientX;
      startW = el.editorPane.getBoundingClientRect().width;
      el.resizer.classList.add('dragging');
      document.body.style.cursor = 'col-resize';
      document.body.style.userSelect = 'none';
    });

    document.addEventListener('mousemove', function (e) {
      if (!dragging) return;
      var mainW = el.main ? el.main.getBoundingClientRect().width : window.innerWidth;
      var min = 280;
      var max = Math.max(min, mainW - 320);
      var next = Math.max(min, Math.min(max, startW + (e.clientX - startX)));
      el.editorPane.style.flex = 'none';
      el.editorPane.style.width = next + 'px';
      el.outputPane.style.flex = '1';
      if (cmEditor) cmEditor.refresh();
    });

    document.addEventListener('mouseup', function () {
      if (!dragging) return;
      dragging = false;
      el.resizer.classList.remove('dragging');
      document.body.style.cursor = '';
      document.body.style.userSelect = '';
      if (cmEditor) cmEditor.refresh();
    });
  }

  function setupPreviewBridge() {
    window.addEventListener('message', function (ev) {
      if (!el.previewFrame || ev.source !== el.previewFrame.contentWindow) return;
      var data = ev.data;
      if (!data || data.__cp !== 1) return;

      if (data.type === 'console') {
        appendConsole(data.level || 'output', String(data.text || ''));
      }
      if (data.type === 'error') {
        ide.lastRunHadError = true;
        updateStateBadge();
        appendConsole('error', String(data.message || 'Runtime error'));
        setPreviewOverlay(true, String(data.message || 'Runtime error'));
      }
    });
  }

  function bindEvents() {
    // Global shortcuts
    document.addEventListener('keydown', function (e) {
      if (!isPageActive()) return;
      if (e.ctrlKey && (e.key === 'Enter' || e.keyCode === 13)) {
        e.preventDefault();
        runCode(false);
      }
      if (e.ctrlKey && (e.key === 's' || e.key === 'S' || e.keyCode === 83)) {
        e.preventDefault();
        saveExplicit();
      }
      if (e.key === 'Escape' || e.keyCode === 27) {
        closeAllMenus();
        closeSettings();
      }
    });

    document.addEventListener('click', function (e) {
      if (!isPageActive()) return;
      var t = e.target;
      // Close menus on outside click
      if (el.langMenu && !el.langMenu.hasAttribute('hidden')) {
        if (!isClickInside(el.langMenu, t) && !isClickInside(el.langBtn, t)) {
          toggleMenu(el.langBtn, el.langMenu, false);
        }
      }
      if (el.moreMenu && !el.moreMenu.hasAttribute('hidden')) {
        if (!isClickInside(el.moreMenu, t) && !isClickInside(el.moreBtn, t)) {
          toggleMenu(el.moreBtn, el.moreMenu, false);
        }
      }
    });

    if (el.langBtn) el.langBtn.addEventListener('click', function () {
      toggleMenu(el.langBtn, el.langMenu);
      toggleMenu(el.moreBtn, el.moreMenu, false);
    });

    if (el.langMenu) {
      el.langMenu.addEventListener('click', function (e) {
        var btn = e.target && e.target.closest ? e.target.closest('.cp-menu-item') : null;
        if (!btn) return;
        var ws = btn.getAttribute('data-workspace');
        toggleMenu(el.langBtn, el.langMenu, false);
        switchWorkspace(ws);
        renderTests();

    if (el.moreBtn) el.moreBtn.addEventListener('click', function () {

      toggleMenu(el.langBtn, el.langMenu, false);

  function boot() {
    bindDom();
    if (!el.root) return;

    ide.state = loadState();
    ide.dirty = false;
    ide.completed = false;
    ide.lastRunHadError = false;

    bindEvents();
    setupResizer();
    setupPreviewBridge();

    initUiFromState();
    setStatus('running', 'Đang tải editor...');

    loadCM5().then(function () {
      cmLoaded = true;
      createEditorOnce();

      var ws = getActiveWorkspaceState();
      applyEditorModeForFile(ws.activeFile);
      setCurrentCode(ws.files[ws.activeFile] || '');
      applySettingsToEditor();
      setStatus('success', 'Sẵn sàng');
      updateStateBadge();
      if (ide.state.settings.autoRun) scheduleAutoRunMaybe();
    }).catch(function (err) {
      cmLoaded = false;
      setStatus('error', 'Không tải được editor');
      appendConsole('error', 'CodeMirror load error: ' + (err.message || String(err)));
      // Fallback textarea already present
      var ws2 = getActiveWorkspaceState();
      setCurrentCode(ws2.files[ws2.activeFile] || '');
      updateStateBadge();
    });
  }

  var initialized = false;

  function onPageShow() {
    if (initialized) {
      applyTabletLayoutSetting();
      if (cmEditor) setTimeout(function () { cmEditor.refresh(); }, 60);
      return;
    }
    initialized = true;
    boot();
  }

  function hookShowPage() {
    var prev = window.showPage;
    window.showPage = function (pageId) {
      var args = Array.prototype.slice.call(arguments);
      if (typeof prev === 'function') prev.apply(window, args);
      if (pageId === 'page-code-playground') setTimeout(onPageShow, 50);
    };
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function () {
      hookShowPage();
      var pg = byId('page-code-playground');
      if (pg && pg.style.display !== 'none') onPageShow();
    });
  } else {
    hookShowPage();
    var pg2 = byId('page-code-playground');
    if (pg2 && pg2.style.display !== 'none') onPageShow();
  }

  // Public API (minimal)
  window.CodePlayground = {
    init: onPageShow,
    run: function () { runCode(false); },
    export: function () { return deepClone(ide.state); }
  };
})();
</script>
