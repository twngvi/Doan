<style>
  /* =====================================================
     CODE PLAYGROUND – Mini Online IDE (scoped)
     ===================================================== */
  #page-code-playground {
    min-height: 100dvh;
    background: var(--theme-bg);
    font-family: Inter, 'Segoe UI', system-ui, sans-serif;
  }

  #page-code-playground .cp-root {
    height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow: hidden;

    /* IDE palette – derived from theme tokens + neutral overlays */
    --cp-bg: var(--theme-sidebar-bg, var(--theme-gradient));
    --cp-panel: rgba(0, 0, 0, 0.26);
    --cp-panel-2: rgba(0, 0, 0, 0.34);
    --cp-border: rgba(255, 255, 255, 0.10);
    --cp-border-2: rgba(255, 255, 255, 0.14);
    --cp-text: var(--theme-text-on-dark, #f5fff6);
    --cp-text-muted: var(--theme-text-on-dark-muted, rgba(245, 255, 246, 0.68));
    --cp-text-secondary: var(--theme-text-on-dark-secondary, rgba(245, 255, 246, 0.86));

    --cp-accent: var(--theme-sidebar-accent, var(--theme-primary));
    --cp-accent-2: var(--theme-sidebar-accent-secondary, var(--theme-secondary));
    --cp-run: var(--theme-success);
    --cp-warn: var(--theme-warning);
    --cp-danger: var(--theme-danger);
  }

  /* =====================================================
     TOPBAR
     ===================================================== */
  #page-code-playground .cp-topbar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.65rem 0.85rem;
    color: var(--cp-text);
    background: var(--cp-panel);
    border-bottom: 1px solid var(--cp-border);
    backdrop-filter: blur(10px);
    min-height: 56px;
  }

  #page-code-playground .cp-brand {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    white-space: nowrap;
  }
  #page-code-playground .cp-brand-icon { color: var(--cp-accent); font-size: 1.35rem; }
  #page-code-playground .cp-brand-text { font-size: 0.95rem; }

  #page-code-playground .cp-project {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    min-width: 160px;
    max-width: 420px;
    flex: 0 1 auto;
  }

  #page-code-playground .cp-project-input {
    width: 100%;
    min-width: 120px;
    max-width: 320px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid var(--cp-border);
    border-radius: 10px;
    padding: 0.4rem 0.6rem;
    color: var(--cp-text);
    outline: none;
    font-size: 0.82rem;
    font-weight: 600;
  }
  #page-code-playground .cp-project-input:focus {
    border-color: var(--cp-accent);
    box-shadow: 0 0 0 3px rgba(74, 155, 95, 0.18);
  }

  #page-code-playground .cp-state-badge {
    font-size: 0.72rem;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 0.22rem 0.5rem;
    border-radius: 999px;
    border: 1px solid var(--cp-border);
    color: var(--cp-text-secondary);
    background: rgba(255, 255, 255, 0.05);
    user-select: none;
  }

  #page-code-playground .cp-topbar-spacer { flex: 1; }

  /* =====================================================
     BUTTONS + MENUS
     ===================================================== */
  #page-code-playground .cp-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.75rem;
    border-radius: 10px;
    border: 1px solid var(--cp-border);
    background: rgba(255, 255, 255, 0.06);
    color: var(--cp-text-secondary);
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease, border-color 0.15s ease;
    white-space: nowrap;
    outline: none;
  }

  #page-code-playground .cp-btn:hover:not(:disabled) {
    background: rgba(255, 255, 255, 0.10);
    border-color: var(--cp-border-2);
    transform: translateY(-1px);
  }

  #page-code-playground .cp-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  #page-code-playground .cp-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: none;
  }

  #page-code-playground .cp-btn-icon {
    padding: 0.45rem 0.55rem;
  }

  #page-code-playground .cp-btn-run {
    background: var(--theme-gradient);
    border-color: rgba(255, 255, 255, 0.12);
    color: var(--theme-text-on-dark, #f5fff6);
    box-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
  }

  #page-code-playground .cp-btn-run.running {
    background: rgba(196, 163, 90, 0.35);
    border-color: rgba(196, 163, 90, 0.55);
    animation: cp-pulse 0.9s ease-in-out infinite;
  }

  #page-code-playground .cp-btn-stop {
    background: rgba(184, 92, 74, 0.18);
    border-color: rgba(184, 92, 74, 0.35);
    color: var(--cp-text-secondary);
  }

  @keyframes cp-pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.75; }
  }

  #page-code-playground .cp-actions { display: flex; align-items: center; gap: 0.45rem; }
  #page-code-playground .cp-actions-mobile { display: none; }

  /* Menu (shared) */
  #page-code-playground .cp-lang { position: relative; }
  #page-code-playground .cp-lang-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.45rem 0.7rem;
    border-radius: 10px;
    border: 1px solid var(--cp-border);
    background: rgba(255, 255, 255, 0.06);
    color: var(--cp-text-secondary);
    font-weight: 800;
    font-size: 0.82rem;
    cursor: pointer;
  }
  #page-code-playground .cp-lang-icon { color: var(--cp-accent); font-size: 1.1rem; }
  #page-code-playground .cp-lang-caret { opacity: 0.85; font-size: 1.1rem; }

  #page-code-playground .cp-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 220px;
    background: rgba(20, 40, 32, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    box-shadow: 0 18px 45px rgba(0, 0, 0, 0.35);
    backdrop-filter: blur(12px);
    padding: 0.35rem;
    z-index: 100;
  }

  #page-code-playground .cp-menu-item {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.55rem 0.65rem;
    border: 1px solid transparent;
    border-radius: 10px;
    background: transparent;
    color: var(--cp-text-secondary);
    font-weight: 700;
    cursor: pointer;
    font-size: 0.82rem;
    text-align: left;
  }

  #page-code-playground .cp-menu-item:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.10);
  }
  #page-code-playground .cp-menu-sep {
    height: 1px;
    margin: 0.35rem 0.2rem;
    background: rgba(255, 255, 255, 0.10);
  }

  /* =====================================================
     WORKSPACE LAYOUT
     ===================================================== */
  #page-code-playground .cp-workspace {
    flex: 1;
    min-height: 0;
    display: flex;
    background: var(--cp-bg);
    color: var(--cp-text);
  }

  #page-code-playground .cp-sidebar {
    width: 260px;
    flex: none;
    min-height: 0;
    background: var(--cp-panel);
    border-right: 1px solid var(--cp-border);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #page-code-playground .cp-sidebar-header {
    padding: 0.65rem 0.75rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-size: 0.72rem;
    color: var(--cp-text-muted);
    border-bottom: 1px solid var(--cp-border);
  }
  #page-code-playground .cp-sidebar-body {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 0.6rem 0.55rem;
  }
  #page-code-playground .cp-sidebar-section-title {
    font-size: 0.72rem;
    font-weight: 800;
    color: var(--cp-text-muted);
    margin: 0.2rem 0.35rem 0.4rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  #page-code-playground .cp-filelist {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }
  #page-code-playground .cp-file-item {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.5rem 0.55rem;
    border-radius: 10px;
    border: 1px solid transparent;
    cursor: pointer;
    color: var(--cp-text-secondary);
    background: transparent;
    user-select: none;
  }
  #page-code-playground .cp-file-item:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.10);
  }
  #page-code-playground .cp-file-item.active {
    background: rgba(74, 155, 95, 0.18);
    border-color: rgba(74, 155, 95, 0.35);
  }
  #page-code-playground .cp-file-item .material-symbols-sharp { font-size: 1.05rem; color: var(--cp-accent); }
  #page-code-playground .cp-file-item .cp-file-name {
    font-size: 0.83rem;
    font-weight: 700;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  #page-code-playground .cp-main {
    flex: 1;
    min-width: 0;
    min-height: 0;
    display: flex;
  }

  #page-code-playground .cp-editor-pane,
  #page-code-playground .cp-output-pane {
    min-height: 0;
    display: flex;
    flex-direction: column;
    background: var(--cp-panel);
  }

  #page-code-playground .cp-editor-pane {
    flex: 1 1 auto;
    min-width: 320px;
  }

  #page-code-playground .cp-output-pane {
    flex: 0 0 42%;
    min-width: 340px;
    border-left: 1px solid var(--cp-border);
  }

  /* Resizer (desktop only) */
  #page-code-playground .cp-resizer {
    width: 6px;
    flex: none;
    cursor: col-resize;
    background: rgba(255, 255, 255, 0.08);
    position: relative;
  }
  #page-code-playground .cp-resizer:hover,
  #page-code-playground .cp-resizer.dragging {
    background: rgba(74, 155, 95, 0.35);
  }

  /* =====================================================
     FILE TABS + EDITOR
     ===================================================== */
  #page-code-playground .cp-filetabs {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.45rem 0.55rem;
    border-bottom: 1px solid var(--cp-border);
    background: rgba(0, 0, 0, 0.12);
    overflow: auto;
  }

  #page-code-playground .cp-filetab {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    padding: 0.4rem 0.6rem;
    border-radius: 10px;
    border: 1px solid rgba(255, 255, 255, 0.10);
    background: rgba(255, 255, 255, 0.06);
    color: var(--cp-text-secondary);
    font-weight: 800;
    font-size: 0.78rem;
    cursor: pointer;
    user-select: none;
  }
  #page-code-playground .cp-filetab.active {
    background: rgba(74, 155, 95, 0.18);
    border-color: rgba(74, 155, 95, 0.35);
  }
  #page-code-playground .cp-filetab .material-symbols-sharp { font-size: 1rem; color: var(--cp-accent); }

  #page-code-playground .cp-editor-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }
  
  /* Hide the raw textarea before CodeMirror loads to prevent white box flash */
  #page-code-playground #cpCodeTextarea {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0;
    pointer-events: none;
    resize: none;
  }

  #page-code-playground .cp-editor-wrap .CodeMirror {
    height: 100%;
    font-family: ui-monospace, 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    font-size: 14px;
    line-height: 1.65;
    background: rgba(0, 0, 0, 0.20) !important;
    color: var(--cp-text) !important;
  }
  #page-code-playground .cp-editor-wrap .CodeMirror-gutters {
    background: rgba(0, 0, 0, 0.22) !important;
    border-right-color: rgba(255, 255, 255, 0.08) !important;
    color: var(--cp-text-muted) !important;
  }
  #page-code-playground .cp-editor-wrap .CodeMirror-linenumber {
    color: var(--cp-text-muted) !important;
  }
  #page-code-playground .cp-editor-wrap .CodeMirror-cursor {
    border-left-color: var(--cp-accent) !important;
  }
  #page-code-playground .cp-editor-wrap .CodeMirror-selected {
    background: rgba(74, 155, 95, 0.25) !important;
  }

  /* =====================================================
     OUTPUT TABS + PANELS
     ===================================================== */
  #page-code-playground .cp-output-tabs {
    display: flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.4rem 0.5rem;
    border-bottom: 1px solid var(--cp-border);
    background: rgba(0, 0, 0, 0.12);
  }
  #page-code-playground .cp-output-tab {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.4rem 0.65rem;
    border-radius: 10px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--cp-text-muted);
    cursor: pointer;
    font-size: 0.78rem;
    font-weight: 900;
    user-select: none;
  }
  #page-code-playground .cp-output-tab:hover {
    background: rgba(255, 255, 255, 0.07);
    color: var(--cp-text-secondary);
  }
  #page-code-playground .cp-output-tab.active {
    background: rgba(74, 155, 95, 0.18);
    border-color: rgba(74, 155, 95, 0.35);
    color: var(--cp-text-secondary);
  }
  #page-code-playground .cp-output-tab .material-symbols-sharp { font-size: 1rem; }
  #page-code-playground .cp-tabs-spacer { flex: 1; }

  #page-code-playground .cp-output-body {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: hidden;
  }

  #page-code-playground .cp-tabpanel {
    height: 100%;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  #page-code-playground .cp-tabpanel[hidden] { display: none !important; }

  /* Preview */
  #page-code-playground .cp-preview-header {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.5rem 0.55rem;
    border-bottom: 1px solid var(--cp-border);
    background: rgba(0, 0, 0, 0.10);
  }
  #page-code-playground .cp-preview-spacer { flex: 1; }
  #page-code-playground .cp-inline-select {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    padding: 0.15rem 0.15rem;
  }
  #page-code-playground .cp-inline-label {
    font-size: 0.72rem;
    font-weight: 900;
    color: var(--cp-text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #page-code-playground .cp-inline-select select {
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    color: var(--cp-text-secondary);
    padding: 0.35rem 0.55rem;
    font-weight: 800;
    outline: none;
    color-scheme: dark;
  }
  #page-code-playground .cp-inline-select select option {
    background: #173125;
    color: var(--cp-text-secondary);
  }

  #page-code-playground .cp-preview-stage {
    flex: 1;
    min-height: 0;
    position: relative;
    overflow: auto;
    padding: 0.75rem;
  }
  #page-code-playground .cp-preview-viewport {
    margin: 0 auto;
    width: 100%;
    max-width: 100%;
    background: rgba(0, 0, 0, 0.18);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 14px;
    overflow: hidden;
  }
  #page-code-playground .cp-preview-viewport { max-width: 100%; }

  #page-code-playground .cp-preview-iframe {
    width: 100%;
    height: 70vh;
    min-height: 420px;
    border: none;
    background: #ffffff;
    display: block;
    transform-origin: 0 0;
  }

  #page-code-playground .cp-preview-overlay {
    position: absolute;
    inset: 0.75rem;
    border-radius: 14px;
    background: rgba(20, 40, 32, 0.92);
    border: 1px solid rgba(255, 255, 255, 0.14);
    padding: 1rem;
    color: var(--cp-text);
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
    justify-content: center;
    align-items: flex-start;
  }
  #page-code-playground .cp-preview-overlay-title {
    font-weight: 900;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-size: 0.82rem;
    color: rgba(255, 255, 255, 0.92);
  }
  #page-code-playground .cp-preview-overlay-body {
    font-family: ui-monospace, 'JetBrains Mono', Consolas, monospace;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.86);
    white-space: pre-wrap;
  }

  /* Markdown preview */
  #page-code-playground .cp-markdown-preview {
    display: none;
    width: 100%;
    background: rgba(0, 0, 0, 0.12);
    border: 1px solid rgba(255, 255, 255, 0.10);
    border-radius: 14px;
    padding: 1rem 1.1rem;
    color: rgba(255, 255, 255, 0.90);
    overflow: auto;
  }
  #page-code-playground .cp-markdown-preview.active { display: block; }

  /* Console */
  #page-code-playground .cp-console-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--cp-border);
    background: rgba(0, 0, 0, 0.10);
    color: var(--cp-text-muted);
    font-size: 0.75rem;
    font-weight: 800;
  }
  #page-code-playground .cp-meta-pill {
    padding: 0.22rem 0.55rem;
    border-radius: 999px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    background: rgba(255, 255, 255, 0.06);
    color: var(--cp-text-secondary);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #page-code-playground .cp-console {
    flex: 1;
    min-height: 0;
    overflow: auto;
    padding: 0.9rem 1rem;
    background: rgba(0, 0, 0, 0.34);
    color: rgba(245, 255, 246, 0.92);
    font-family: ui-monospace, 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    font-size: 13px;
    line-height: 1.65;
  }
  #page-code-playground .cp-console-line {
    display: flex;
    gap: 0.55rem;
    padding: 0.12rem 0;
    align-items: flex-start;
  }
  #page-code-playground .cp-console-prefix {
    width: 1.2rem;
    opacity: 0.75;
    user-select: none;
    flex: none;
  }
  #page-code-playground .cp-console-text {
    flex: 1;
    white-space: pre-wrap;
    word-break: break-word;
  }
  #page-code-playground .line-error { color: rgba(255, 180, 170, 0.95); }
  #page-code-playground .line-warn { color: rgba(255, 230, 160, 0.95); }
  #page-code-playground .line-info { color: rgba(190, 230, 210, 0.95); }
  #page-code-playground .line-success { color: rgba(200, 255, 210, 0.95); }
  #page-code-playground .line-input { color: rgba(220, 220, 255, 0.88); opacity: 0.75; }

  /* Console Input Area */
  #page-code-playground .cp-console-input-area {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.7rem 1rem;
    border-top: 1px solid rgba(255, 255, 255, 0.10);
    background: rgba(0, 0, 0, 0.20);
  }
  #page-code-playground .cp-console-input {
    flex: 1;
    min-height: 0;
    padding: 0.5rem 0.7rem;
    outline: none;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 8px;
    background: rgba(255, 255, 255, 0.04);
    color: rgba(245, 255, 246, 0.94);
    font-family: ui-monospace, 'JetBrains Mono', Consolas, monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  #page-code-playground .cp-console-input::placeholder { color: rgba(245, 255, 246, 0.45); }
  #page-code-playground .cp-console-input:focus {
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.20);
  }
  #page-code-playground #cpConsoleSendBtn { flex: none; padding: 0.5rem 0.7rem; }

  /* Input */
  #page-code-playground .cp-input-header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 0.55rem 0.7rem;
    border-bottom: 1px solid var(--cp-border);
    background: rgba(0, 0, 0, 0.10);
  }
  #page-code-playground .cp-input-title {
    font-weight: 900;
    font-size: 0.8rem;
    color: var(--cp-text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }
  #page-code-playground .cp-sidebar-toggle {
    margin-right: 0.5rem;
    color: var(--cp-text-muted);
  }
  #page-code-playground .cp-sidebar-toggle:hover {
    color: var(--cp-text);
    background: rgba(255, 255, 255, 0.08);
  }
  #page-code-playground .cp-root.sidebar-collapsed .cp-sidebar {
    width: 0;
    padding: 0;
    overflow: hidden;
    border-right: none;
  }
  #page-code-playground .cp-root.sidebar-collapsed .cp-sidebar-toggle .material-symbols-sharp {
    transform: rotate(180deg);
  }
  #page-code-playground .cp-input-hint {
    font-size: 0.72rem;
    color: var(--cp-text-muted);
    font-weight: 700;
  }
  #page-code-playground #cpStdin {
    flex: 1;
    min-height: 0;
    width: 100%;
    resize: none;
    outline: none;
    border: none;
    padding: 0.9rem 1rem;
    color: rgba(245, 255, 246, 0.94);
    background: rgba(0, 0, 0, 0.34);
