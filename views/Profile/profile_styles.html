<!-- Profile Page Styles -->
<style>
  #page-profile {
    background: #ffffff;
    min-height: 100vh;
  }

  .profile-container {
    min-height: 100vh;
    padding: 1.5rem 0.875rem;
  }

  .profile-wrapper {
    max-width: 1100px;
    margin: 0 auto;
  }

  /* ========================================
     PROFILE HEADER - GALAXY THEME
     ======================================== */
  .profile-header {
    position: relative;
    background: linear-gradient(
      135deg,
      #030014 0%,
      #0a0520 30%,
      #1a0a3e 60%,
      #0d1b4c 100%
    );
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    overflow: hidden;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
  }

  /* Galaxy Background Effects for Profile Header */
  .profile-header-galaxy-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .profile-header-stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(
        1px 1px at 20% 30%,
        rgba(255, 255, 255, 0.8) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 40% 70%,
        rgba(168, 216, 255, 0.7) 100%,
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.9) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 80% 50%,
        rgba(201, 168, 255, 0.6) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 60%,
        rgba(255, 255, 255, 0.5) 100%,
        transparent
      );
    background-size: 200px 100px;
    animation: profileHeaderTwinkle 4s ease-in-out infinite;
    transition: transform 0.3s ease-out;
  }

  @keyframes profileHeaderTwinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  .profile-header-nebula {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(
        ellipse 80% 60% at 20% 40%,
        rgba(255, 100, 150, 0.12),
        transparent
      ),
      radial-gradient(
        ellipse 60% 50% at 80% 60%,
        rgba(100, 150, 255, 0.1),
        transparent
      );
    filter: blur(20px);
  }

  /* Header Meteor Effect - 45 degree from left to right */
  .profile-header-meteor-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .profile-header-meteor {
    position: absolute;
    width: 2px;
    height: 80px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(255, 255, 255, 0.28),
      rgba(255, 255, 255, 0.63)
    );
    border-radius: 50%;
    transform: rotate(-45deg);
    opacity: 0;
    animation: profileMeteorFall 1s ease-in forwards;
  }

  .profile-header-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -1px;
    width: 4px;
    height: 4px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px rgba(255, 255, 255, 0.6);
  }

  @keyframes profileMeteorFall {
    0% {
      opacity: 1;
      transform: rotate(-45deg) translateY(-100px);
    }
    70% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(-45deg) translateY(300px);
    }
  }

  /* Profile Header Content */
  .profile-header-content {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 1.5rem;
    flex-wrap: wrap;
    width: 100%;
  }

  .profile-avatar-section {
    position: relative;
  }

  .profile-avatar {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #22d3ee;
    box-shadow: 0 4px 16px rgba(34, 211, 238, 0.4);
  }

  .avatar-upload-btn {
    position: absolute;
    bottom: 0;
    right: 0;
    background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
    color: white;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    transition: all 0.3s ease;
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
  }

  .avatar-upload-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 16px rgba(139, 92, 246, 0.5);
  }

  .profile-info {
    flex: 1;
  }

  .profile-name {
    font-size: 1.75rem;
    font-weight: bold;
    color: #ffffff;
    margin-bottom: 0.375rem;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  }

  .profile-email {
    color: rgba(255, 255, 255, 0.7);
    font-size: 0.875rem;
    margin-bottom: 0.375rem;
  }

  .profile-stats {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.875rem;
  }

  .stat-item {
    text-align: center;
    padding: 0.5rem 1rem;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 10px;
    backdrop-filter: blur(10px);
  }

  .stat-value {
    font-size: 1.25rem;
    font-weight: bold;
    color: #22d3ee;
  }

  .stat-label {
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.7);
  }

  .profile-content {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
    gap: 1.5rem;
  }

  .profile-card {
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
  }

  .profile-card-title {
    font-size: 1.25rem;
    font-weight: bold;
    color: #2d3748;
    margin-bottom: 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.375rem;
  }

  .form-group {
    margin-bottom: 1.25rem;
  }

  .form-label {
    display: block;
    font-size: 0.8125rem;
    font-weight: 600;
    color: #4a5568;
    margin-bottom: 0.375rem;
  }

  .form-input {
    width: 100%;
    padding: 0.625rem 0.875rem;
    border: 2px solid #e2e8f0;
    border-radius: 8px;
    font-size: 0.875rem;
    transition: all 0.3s ease;
    background: #f7fafc;
  }

  .form-input:focus {
    outline: none;
    border-color: #5b6ff8;
    background: white;
    box-shadow: 0 0 0 3px rgba(91, 111, 248, 0.1);
  }

  .form-input:disabled {
    background: #edf2f7;
    cursor: not-allowed;
  }

  .form-input.error {
    border-color: #fc8181;
  }

  .password-input-wrapper {
    position: relative;
  }

  .password-toggle {
    position: absolute;
    right: 0.875rem;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 1.125rem;
    -webkit-user-select: none;
    user-select: none;
  }

  .password-verify-icon {
    position: absolute;
    right: 2.625rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.125rem;
    color: #3ccb7f;
  }

  .password-strength {
    margin-top: 0.375rem;
    font-size: 0.75rem;
  }

  .strength-bar {
    height: 3px;
    background: #e2e8f0;
    border-radius: 2px;
    margin-top: 0.2rem;
    overflow: hidden;
  }

  .strength-bar-fill {
    height: 100%;
    transition: all 0.3s ease;
    border-radius: 2px;
  }

  .strength-weak {
    width: 33%;
    background: #fc8181;
  }

  .strength-medium {
    width: 66%;
    background: #ffb020;
  }

  .strength-strong {
    width: 100%;
    background: #3ccb7f;
  }

  .btn-primary {
    background: linear-gradient(135deg, #5b6ff8 0%, #7b6cf6 100%);
    color: white;
    padding: 0.625rem 1.5rem;
    border: none;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.375rem;
    width: 100%;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 16px rgba(91, 111, 248, 0.3);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .btn-secondary {
    background: white;
    color: #5b6ff8;
    border: 2px solid #5b6ff8;
    padding: 0.625rem 1.5rem;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.375rem;
    width: 100%;
    margin-top: 0.375rem;
  }

  .btn-secondary:hover {
    background: #f7fafc;
  }

  .hidden {
    display: none;
  }

  /* ⭐ Avatar Selection Modal Styles */
  .avatar-tabs {
    display: flex;
    gap: 0.375rem;
    margin-bottom: 1.25rem;
    border-bottom: 2px solid #e2e8f0;
    padding-bottom: 0.375rem;
    flex-wrap: wrap;
  }

  .avatar-tabs .filter-tab {
    padding: 0.625rem 1.25rem;
    border: 2px solid transparent;
    background: transparent;
    border-radius: 0.5rem 0.5rem 0 0;
    font-size: 0.875rem;
    font-weight: 600;
    color: #4a5568;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .avatar-tabs .filter-tab:hover {
    background: rgba(91, 111, 248, 0.1);
    color: #5b6ff8;
  }

  .avatar-tabs .filter-tab.active {
    background: linear-gradient(135deg, #5b6ff8 0%, #7b6cf6 100%);
    color: white;
    border-bottom-color: transparent;
  }

  .avatar-grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
    gap: 0.875rem;
    padding: 0.875rem 0;
    max-height: 400px;
    overflow-y: auto;
  }

  .avatar-option {
    width: 100%;
    aspect-ratio: 1;
    border-radius: 50%;
    cursor: pointer;
    border: 3px solid #e2e8f0;
    transition: all 0.2s ease;
    background: #f7fafc;
    object-fit: cover;
  }

  .avatar-option:hover {
    transform: scale(1.12);
    box-shadow: 0 6px 14px rgba(91, 111, 248, 0.3);
    border-color: #5b6ff8;
  }

  .avatar-option.selected {
    border-color: #5b6ff8;
    background: #ebf4ff;
    box-shadow: 0 4px 10px rgba(91, 111, 248, 0.4);
  }

  /* Scrollbar styling for avatar grid */
  .avatar-grid-container::-webkit-scrollbar {
    width: 6px;
  }

  .avatar-grid-container::-webkit-scrollbar-track {
    background: #f1f1f1;
    border-radius: 10px;
  }

  .avatar-grid-container::-webkit-scrollbar-thumb {
    background: #667eea;
    border-radius: 10px;
  }

  .avatar-grid-container::-webkit-scrollbar-thumb:hover {
    background: #764ba2;
  }

  /* ⭐ AVATAR CONTAINER & CHANGE BUTTON */
  .avatar-container {
    position: relative;
    width: 120px;
    height: 120px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #667eea;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
  }

  .avatar-image {
    width: 100%;

  }

  .avatar-level-badge {
    position: absolute;
    bottom: -5px;
    right: -5px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);

    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 0.9rem;

    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
  }

  /* ⭐ NÚT THAY ĐỔI AVATAR - FIXED */
  .avatar-change-btn {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: 3px solid white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
    z-index: 10; /* ⭐ QUAN TRỌNG: Phải cao hơn avatar */
  }

  .avatar-change-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.5);
  }

  .avatar-change-btn:active {
    transform: scale(0.95);
  }

  .avatar-change-btn svg {
    width: 20px;
    height: 20px;
  }

  @media (max-width: 768px) {
    .profile-header {
      flex-direction: column;
      text-align: center;
    }

    .profile-stats {
      justify-content: center;
    }

    .profile-content {
      grid-template-columns: 1fr;
    }
  }
</style>
