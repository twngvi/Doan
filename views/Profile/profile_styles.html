<!-- Profile Page Styles - Professional Redesign -->
<style>
  /* ========================================
     BASE & BACKGROUND EFFECTS
     ======================================== */
  #page-profile {
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    padding: 0;
    margin: 0;
    /* Galaxy Background */
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    background-attachment: fixed;
  }

  .profile-page {
    position: relative;
    min-height: 100vh;
    padding: 0;
    margin: 0;
    /* Galaxy Background */
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    background-attachment: fixed;
  }

  /* Galaxy Stars Effect */
  .profile-page::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      radial-gradient(
        2px 2px at 20% 30%,
        rgba(255, 255, 255, 0.5),
        transparent
      ),
      radial-gradient(
        2px 2px at 40% 70%,
        rgba(147, 197, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.6),
        transparent
      ),
      radial-gradient(
        2px 2px at 80% 50%,
        rgba(196, 181, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 80%,
        rgba(255, 255, 255, 0.3),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 90% 10%,
        rgba(147, 197, 253, 0.5),
        transparent
      ),
      radial-gradient(
        1px 1px at 30% 90%,
        rgba(255, 255, 255, 0.25),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 70% 40%,
        rgba(196, 181, 253, 0.35),
        transparent
      );
    background-size: 350px 250px;
    pointer-events: none;
    z-index: 0;
    animation: galaxyTwinkle 6s ease-in-out infinite;
  }

  @keyframes galaxyTwinkle {
    0%,
    100% {
      opacity: 0.7;
    }
    50% {
      opacity: 1;
    }
  }

  /* Animated Background Orbs */
  .profile-bg-effects {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .profile-gradient-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: orbFloat 20s ease-in-out infinite;
  }

  .orb-1 {
    width: 400px;
    height: 400px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    top: -100px;
    right: -100px;
    animation-delay: 0s;
  }

  .orb-2 {
    width: 300px;
    height: 300px;
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    bottom: 20%;
    left: -80px;
    animation-delay: -7s;
  }

  .orb-3 {
    width: 250px;
    height: 250px;
    background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
    bottom: -50px;
    right: 20%;
    animation-delay: -14s;
  }

  @keyframes orbFloat {
    0%,
    100% {
      transform: translate(0, 0) scale(1);
    }
    25% {
      transform: translate(30px, -30px) scale(1.05);
    }
    50% {
      transform: translate(-20px, 20px) scale(0.95);
    }
    75% {
      transform: translate(40px, 10px) scale(1.02);
    }
  }

  /* ========================================
     METEOR SHOWER EFFECT
     ======================================== */
  .profile-meteor-container {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
  }

  .profile-meteor {
    position: absolute;
    width: 2px;
    height: 120px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(255, 255, 255, 0.3),
      rgba(255, 255, 255, 0.8)
    );
    border-radius: 50%;
    transform: rotate(-45deg);
    opacity: 0;
    animation: profileMeteorFall 1.5s ease-in forwards;
  }

  .profile-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -2px;
    width: 6px;
    height: 6px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50%;
    box-shadow:
      0 0 12px 4px rgba(255, 255, 255, 0.7),
      0 0 30px 8px rgba(147, 197, 253, 0.5);
  }

  @keyframes profileMeteorFall {
    0% {
      opacity: 1;
      transform: rotate(-45deg) translateY(-150px);
    }
    70% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(-45deg) translateY(calc(100vh + 200px));
    }
  }

  /* ========================================
     CONTAINER
     ======================================== */
  .profile-container-pro {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 2rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ========================================
     CENTERED AVATAR SECTION
     ======================================== */
  .profile-avatar-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem 0 3rem 0;
    text-align: center;
  }

  .hero-avatar-wrapper.avatar-large {
    transform: scale(1.3);
    margin-bottom: 2rem;
  }

  .profile-name-center {
    font-size: 2.2rem;
    font-weight: 800;
    color: white;
    margin: 1.5rem 0 0.5rem 0;
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
    animation: fadeSlideIn 0.6s ease-out;
  }

  .profile-email-center {
    color: rgba(255, 255, 255, 0.7);
    font-size: 1rem;
    margin: 0;
    animation: fadeSlideIn 0.6s ease-out 0.1s backwards;
  }

  /* ========================================
     COLLAPSIBLE SETTINGS LIST
     ======================================== */
  .profile-settings-list {
    width: 100%;
    max-width: 500px;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .collapsible-section {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 16px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    overflow: hidden;
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
  }

  .collapsible-section:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(139, 92, 246, 0.3);
  }

  .collapsible-header {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.25rem 1.5rem;
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .collapsible-header:hover {
    background: rgba(255, 255, 255, 0.05);
  }

  .collapsible-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
  }

  .collapsible-icon.gradient-blue {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
  }

  .collapsible-icon.gradient-purple {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    box-shadow: 0 4px 15px rgba(245, 87, 108, 0.3);
  }

  .collapsible-title {
    flex: 1;
    text-align: left;
    font-size: 1.1rem;
    font-weight: 600;
    color: white;
  }

  .collapsible-arrow {
    color: rgba(255, 255, 255, 0.6);
    transition: transform 0.3s ease;
  }

  .collapsible-section.open .collapsible-arrow {
    transform: rotate(180deg);
  }

  .collapsible-content {
    max-height: 0;
    overflow: hidden;
    transition:
      max-height 0.4s ease,
      padding 0.3s ease;
    padding: 0 1.5rem;
  }

  .collapsible-section.open .collapsible-content {
    max-height: 600px;
    padding: 0 1.5rem 1.5rem 1.5rem;
  }

  /* ========================================
     AVATAR SECTION
     ======================================== */
  .hero-avatar-wrapper {
    position: relative;
    flex-shrink: 0;
  }

  .avatar-glow-ring {
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: conic-gradient(from 0deg, #667eea, #764ba2, #f093fb, #667eea);
    animation: rotateGlow 4s linear infinite;
    opacity: 0.6;
  }

  .avatar-glow-ring.ring-2 {
    inset: -8px;
    animation-direction: reverse;
    animation-duration: 6s;
    opacity: 0.4;
  }

  @keyframes rotateGlow {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }

  .avatar-container-pro {
    position: relative;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    padding: 4px;
    z-index: 2;
  }

  .avatar-image-pro {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid rgba(255, 255, 255, 0.2);
    transition:
      transform 0.3s ease,
      box-shadow 0.3s ease;
  }

  .avatar-image-pro:hover {
    transform: scale(1.05);
    box-shadow: 0 0 30px rgba(102, 126, 234, 0.5);
  }

  .avatar-status {
    position: absolute;
    bottom: 8px;
    right: 8px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 3px solid #1a1a2e;
  }

  .avatar-status.online {
    background: #22c55e;
    box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
    animation: pulseStatus 2s ease-in-out infinite;
  }

  @keyframes pulseStatus {
    0%,
    100% {
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.6);
    }
    50% {
      box-shadow: 0 0 20px rgba(34, 197, 94, 0.9);
    }
  }

  .avatar-edit-btn {
    position: absolute;
    top: 0;
    right: -5px;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border: 3px solid rgba(255, 255, 255, 0.3);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  }

  .avatar-edit-btn:hover {
    transform: scale(1.15) rotate(15deg);
    box-shadow: 0 6px 25px rgba(102, 126, 234, 0.6);
  }

  /* ========================================
     HERO INFO
     ======================================== */
  .hero-info {
    flex: 1;
    min-width: 250px;
  }

  .hero-name {
    font-size: 2rem;
    font-weight: 800;
    color: white;
    margin: 0 0 0.25rem 0;
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.3);
    animation: fadeSlideIn 0.6s ease-out;
  }

  .hero-email {
    color: rgba(255, 255, 255, 0.7);
    font-size: 0.95rem;
    margin: 0 0 1.25rem 0;
    animation: fadeSlideIn 0.6s ease-out 0.1s backwards;
  }

  @keyframes fadeSlideIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Stats Cards */
  .hero-stats {
    display: flex;
    gap: 1rem;
    flex-wrap: wrap;
  }

  .stat-card-pro {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.875rem 1.25rem;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    animation: fadeSlideIn 0.6s ease-out calc(var(--i, 0) * 0.1s + 0.2s)
      backwards;
  }

  .stat-card-pro:nth-child(1) {
    --i: 1;
  }
  .stat-card-pro:nth-child(2) {
    --i: 2;
  }
  .stat-card-pro:nth-child(3) {
    --i: 3;
  }

  .stat-card-pro:hover {
    transform: translateY(-4px);
    background: rgba(255, 255, 255, 0.12);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
  }

  .stat-icon-pro {
    width: 40px;
    height: 40px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stat-level .stat-icon-pro {
    background: linear-gradient(
      135deg,
      rgba(34, 211, 238, 0.2),
      rgba(34, 211, 238, 0.1)
    );
    color: #22d3ee;
  }

  .stat-xp .stat-icon-pro {
    background: linear-gradient(
      135deg,
      rgba(163, 230, 53, 0.2),
      rgba(163, 230, 53, 0.1)
    );
    color: #a3e635;
  }

  .stat-mountain .stat-icon-pro {
    background: linear-gradient(
      135deg,
      rgba(249, 115, 22, 0.2),
      rgba(249, 115, 22, 0.1)
    );
    color: #f97316;
  }

  .stat-content-pro {
    display: flex;
    flex-direction: column;
  }

  .stat-value-pro {
    font-size: 1.5rem;
    font-weight: 800;
    color: white;
    line-height: 1.2;
  }

  .stat-label-pro {
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ========================================
     CONTENT GRID & CARDS
     ======================================== */
  .profile-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 1.5rem;
  }

  .profile-card-pro {
    background: white;
    border-radius: 20px;
    padding: 1.75rem;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
    border: 1px solid rgba(0, 0, 0, 0.05);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .profile-card-pro:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
  }

  .card-animate {
    opacity: 0;
    animation: cardSlideUp 0.6s ease-out forwards;
    animation-delay: var(--delay, 0s);
  }

  @keyframes cardSlideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .card-header-pro {
    display: flex;
    align-items: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .card-icon-pro {
    width: 48px;
    height: 48px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
  }

  .card-icon-pro.gradient-blue {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
  }

  .card-icon-pro.gradient-purple {
    background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    box-shadow: 0 8px 20px rgba(245, 87, 108, 0.3);
  }

  .card-title-pro {
    font-size: 1.25rem;
    font-weight: 700;
    color: #1a1a2e;
    margin: 0;
  }

  /* ========================================
     FORM STYLES
     ======================================== */
  .card-form-pro {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  .form-group-pro {
    position: relative;
  }

  .form-group-pro.floating {
    margin-top: 0.5rem;
  }

  .form-input-pro {
    width: 100%;
    padding: 1rem 1rem 1rem 1rem;
    font-size: 0.95rem;
    border: 2px solid #e5e7eb;
    border-radius: 12px;
    background: #f9fafb;
    transition: all 0.3s ease;
    outline: none;
  }

  .form-input-pro:focus {
    border-color: #667eea;
    background: white;
    box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
  }

  .form-input-pro:disabled {
    background: #f3f4f6;
    color: #6b7280;
    cursor: not-allowed;
  }

  .form-group-pro.floating .form-label-pro {
    position: absolute;
    left: 1rem;
    top: 1rem;
    font-size: 0.95rem;
    color: #9ca3af;
    pointer-events: none;
    transition: all 0.2s ease;
    background: transparent;
    padding: 0 0.25rem;
  }

  .form-input-pro:focus ~ .form-label-pro,
  .form-input-pro:not(:placeholder-shown) ~ .form-label-pro {
    top: -0.5rem;
    left: 0.75rem;
    font-size: 0.75rem;
    color: #667eea;
    background: white;
    font-weight: 600;
  }

  .input-highlight {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 0;
    height: 2px;
    background: linear-gradient(90deg, #667eea, #764ba2);
    transition: all 0.3s ease;
    transform: translateX(-50%);
    border-radius: 2px;
  }

  .form-input-pro:focus ~ .input-highlight {
    width: calc(100% - 4px);
  }

  .input-lock {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    color: #9ca3af;
  }

  /* Password Toggle */
  .password-toggle-btn {
    position: absolute;
    right: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #9ca3af;
    cursor: pointer;
    padding: 0.25rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: color 0.2s;
  }

  .password-toggle-btn:hover {
    color: #667eea;
  }

  /* Password Strength */
  .password-strength-pro {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .strength-bars {
    display: flex;
    gap: 4px;
    flex: 1;
  }

  .strength-bar-item {
    height: 4px;
    flex: 1;
    background: #e5e7eb;
    border-radius: 2px;
    transition: all 0.3s ease;
  }

  .strength-bar-item.active {
    background: var(--strength-color, #22c55e);
  }

  .strength-text-pro {
    font-size: 0.75rem;
    font-weight: 600;
    min-width: 60px;
    text-align: right;
  }

  /* Password Match Icon */
  .password-match-icon {
    position: absolute;
    right: 2.5rem;
    top: 50%;
    transform: translateY(-50%);
    color: #22c55e;
    opacity: 0;
    transition: all 0.3s ease;
  }

  .password-match-icon.show {
    opacity: 1;
  }

  /* ========================================
     BUTTONS
     ======================================== */
  .btn-gradient-pro {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.875rem 1.5rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
  }

  .btn-gradient-pro:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
  }

  .btn-gradient-pro:active {
    transform: translateY(0);
  }

  .btn-shimmer {
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.3),
      transparent
    );
    transition: left 0.5s ease;
  }

  .btn-gradient-pro:hover .btn-shimmer {
    left: 100%;
  }

  .btn-icon-pro {
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* ========================================
     MODAL STYLES
     ======================================== */
  .modal-overlay-pro {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 1rem;
    animation: fadeIn 0.3s ease;
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
    }
    to {
      opacity: 1;
    }
  }

  .modal-content-pro {
    background: white;
    border-radius: 24px;
    max-width: 700px;
    width: 100%;
    max-height: 85vh;
    overflow: hidden;
    box-shadow: 0 25px 80px rgba(0, 0, 0, 0.3);
    animation: modalSlideUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalSlideUp {
    from {
      opacity: 0;
      transform: translateY(40px) scale(0.95);
    }
    to {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
  }

  .modal-header-pro {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid #e5e7eb;
    background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  }

  .modal-title-pro {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1.25rem;
    font-weight: 700;
    color: #1a1a2e;
  }

  .modal-icon {
    font-size: 1.5rem;
  }

  .modal-close-pro {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: none;
    background: #f1f5f9;
    color: #64748b;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }

  .modal-close-pro:hover {
    background: #fee2e2;
    color: #ef4444;
  }
