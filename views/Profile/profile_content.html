<!-- Profile Page Content - Professional Redesign -->
<div class="profile-page">
  <!-- Animated Background -->
  <div class="profile-bg-effects">
    <div class="profile-gradient-orb orb-1"></div>
    <div class="profile-gradient-orb orb-2"></div>
    <div class="profile-gradient-orb orb-3"></div>
    <!-- Meteor Shower Container -->
    <div class="profile-meteor-container" id="profileMeteorContainer"></div>
  </div>

  <div class="profile-container-pro">
    <!-- Centered Avatar Section -->
    <div class="profile-avatar-center">
      <!-- Avatar Section with Glow Effect -->
      <div class="hero-avatar-wrapper avatar-large">
        <div class="avatar-glow-ring"></div>
        <div class="avatar-glow-ring ring-2"></div>
        <div class="avatar-container-pro" id="avatarContainerPro">
          <img
            id="profile-avatar"
            src="https://api.dicebear.com/9.x/bottts/svg?seed=User"
            alt="Avatar"
            class="avatar-image-pro"
          />
          <div class="avatar-status online"></div>
        </div>
        <button
          type="button"
          onclick="openAvatarModal()"
          class="avatar-edit-btn"
          title="Đổi avatar"
        >
          <svg
            width="16"
            height="16"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"
            />
            <circle cx="12" cy="13" r="4" />
          </svg>
        </button>
        <div class="avatar-level-ring">
          <span id="profile-level-badge">1</span>
        </div>
      </div>

      <!-- User Name -->
      <h1 class="profile-name-center" id="profile-fullname">User</h1>
    </div>

    <!-- Collapsible Settings List -->
    <div class="profile-settings-list">
      <!-- Personal Info Collapsible -->
      <div class="collapsible-section">
        <button class="collapsible-header" onclick="toggleCollapsible(this)">
          <div class="collapsible-icon gradient-blue">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
          <span class="collapsible-title">Thông tin cá nhân</span>
          <svg
            class="collapsible-arrow"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="collapsible-content">
          <form id="profileForm" class="card-form-pro">
            <div class="form-group-pro floating">
              <input
                type="text"
                id="displayName"
                class="form-input-pro"
                placeholder=" "
                required
              />
              <label class="form-label-pro" for="displayName"></label>
              <div class="input-highlight"></div>
            </div>

            <div class="form-group-pro floating">
              <input
                type="email"
                id="email"
                class="form-input-pro"
                placeholder=" "
                disabled
              />
              <label class="form-label-pro" for="email"></label>
              <div class="input-highlight"></div>
              <div class="input-lock">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </div>
            </div>

            <button type="submit" class="btn-gradient-pro btn-save">
              <span class="btn-text">Lưu thay đổi</span>
              <span class="btn-icon-pro">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"
                  />
                  <polyline points="17 21 17 13 7 13 7 21" />
                  <polyline points="7 3 7 8 15 8" />
                </svg>
              </span>
              <div class="btn-shimmer"></div>
            </button>
          </form>
        </div>
      </div>

      <!-- Change Password Collapsible -->
      <div class="collapsible-section">
        <button class="collapsible-header" onclick="toggleCollapsible(this)">
          <div class="collapsible-icon gradient-purple">
            <svg
              width="22"
              height="22"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
          </div>
          <span class="collapsible-title">Đổi mật khẩu</span>
          <svg
            class="collapsible-arrow"
            width="20"
            height="20"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="collapsible-content">
          <form id="passwordForm" class="card-form-pro">
            <div class="form-group-pro floating">
              <input
                type="password"
                id="currentPassword"
                class="form-input-pro"
                placeholder=" "
              />
              <label class="form-label-pro" for="currentPassword"
                >Mật khẩu hiện tại</label
              >
              <div class="input-highlight"></div>
              <button
                type="button"
                class="password-toggle-btn"
                data-target="currentPassword"
              >
                <svg
                  class="eye-open"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>

            <div class="form-group-pro floating">
              <input
                type="password"
                id="newPassword"
                class="form-input-pro"
                placeholder=" "
              />
              <label class="form-label-pro" for="newPassword"
                >Mật khẩu mới</label
              >
              <div class="input-highlight"></div>
              <button
                type="button"
                class="password-toggle-btn"
                data-target="newPassword"
              >
                <svg
                  class="eye-open"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>

            <div class="password-strength-pro">
              <div class="strength-bars">
                <div class="strength-bar-item" data-level="1"></div>
                <div class="strength-bar-item" data-level="2"></div>
                <div class="strength-bar-item" data-level="3"></div>
                <div class="strength-bar-item" data-level="4"></div>
              </div>
              <span class="strength-text-pro" id="strengthText"></span>
            </div>

            <div class="form-group-pro floating">
              <input
                type="password"
                id="confirmPassword"
                class="form-input-pro"
                placeholder=" "
              />
              <label class="form-label-pro" for="confirmPassword"
                >Xác nhận mật khẩu</label
              >
              <div class="input-highlight"></div>
              <span class="password-match-icon" id="passwordMatchIcon">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2.5"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
              </span>
              <button
                type="button"
                class="password-toggle-btn"
                data-target="confirmPassword"
              >
                <svg
                  class="eye-open"
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>

            <button type="submit" class="btn-gradient-pro btn-change-password">
              <span class="btn-text">Đổi mật khẩu</span>
              <span class="btn-icon-pro">
                <svg
                  width="18"
                  height="18"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path
                    d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"
                  />
                </svg>
              </span>
              <div class="btn-shimmer"></div>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Avatar Selection Modal -->
<div
  id="avatarSelectionModal"
  class="modal-overlay-pro"
  style="display: none"
  onclick="closeAvatarModal(event)"
>
  <div class="modal-content-pro" onclick="event.stopPropagation()">
    <div class="modal-header-pro">
      <div class="modal-title-pro">
        <span class="modal-icon">&#127912;</span>
        <span>Chọn Avatar</span>
      </div>
      <button class="modal-close-pro" onclick="closeAvatarModal()">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    </div>

    <div class="modal-body-pro">
      <div class="avatar-tabs-pro">
        <button
          class="tab-btn-pro active"
          data-type="all"
          onclick="filterAvatars('all')"
        >
          Tất cả
        </button>
        <button
          class="tab-btn-pro"
          data-type="bottts"
          onclick="filterAvatars('bottts')"
        >
          Robots
        </button>
        <button
          class="tab-btn-pro"
          data-type="dylan"
          onclick="filterAvatars('dylan')"
        >
          Người
        </button>
        <button
          class="tab-btn-pro"
          data-type="shapes"
          onclick="filterAvatars('shapes')"
        >
          Hình học
        </button>
      </div>
      <div id="avatarGrid" class="avatar-grid-pro">
        <div class="avatar-loading">
          <div class="loading-spinner-pro"></div>
          <p>Đang tải avatars...</p>
        </div>
      </div>
    </div>
  </div>
</div>
