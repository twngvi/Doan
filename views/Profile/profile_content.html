<!-- Profile Page Content -->
<div class="profile-container">
  <div class="profile-wrapper">
    <!-- Profile Header -->
    <div class="profile-header card mb-8">
      <div class="flex flex-col md:flex-row items-center gap-6">
        <!-- Avatar Section -->
        <div class="relative group">
          <div class="avatar-container">
            <img
              id="profile-avatar"
              src="https://ui-avatars.com/api/?name=User&size=120&background=random"
              alt="Avatar"
              class="avatar-image"
            />
            <div class="avatar-level-badge">
              <span id="profile-level-badge">1</span>
            </div>
          </div>
          <!-- ⭐ NÚT THAY ĐỔI AVATAR - PHẢI ĐÚNG TÊN HÀM -->
          <button
            type="button"
            onclick="openAvatarModal()"
            class="avatar-change-btn"
            id="avatar-change-button"
          >
            <svg
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"
              />
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"
              />
            </svg>
          </button>
        </div>

        <!-- User Info -->
        <div class="flex-1">
          <h2 class="text-2xl font-bold mb-2">
            <span class="user-name" id="profile-fullname">User</span>
          </h2>
          <p id="profile-email" class="text-gray-600 mb-4">Email...</p>

          <!-- Stats Grid -->
          <div class="grid grid-cols-3 gap-4">
            <div class="text-center">
              <p class="text-2xl font-bold text-purple-600" id="profile-level">
                1
              </p>
              <p class="text-sm text-gray-600">Level</p>
            </div>
            <div class="text-center">
              <p class="text-2xl font-bold text-blue-600" id="profile-xp">0</p>
              <p class="text-sm text-gray-600">XP</p>
            </div>
            <div class="text-center">
              <p
                class="text-2xl font-bold text-green-600"
                id="profile-mountain-stage"
              >
                1
              </p>
              <p class="text-sm text-gray-600">Mountain</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Profile Content -->
    <div class="profile-content">
      <!-- Edit Profile Card -->
      <div class="profile-card">
        <h2 class="profile-card-title">
          <span>✏️</span>
          <span>Thông tin cá nhân</span>
        </h2>

        <form id="profileForm">
          <div class="form-group">
            <label class="form-label" for="displayName">Tên hiển thị</label>
            <input
              type="text"
              id="displayName"
              class="form-input"
              placeholder="Nhập tên của bạn"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="email">Email</label>
            <input
              type="email"
              id="email"
              class="form-input"
              disabled
              placeholder="email@example.com"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="username">Username</label>
            <input
              type="text"
              id="username"
              class="form-input"
              disabled
              placeholder="username"
            />
          </div>

          <button type="submit" class="btn-primary">
            <span>💾</span>
            <span>Lưu thay đổi</span>
          </button>
        </form>
      </div>

      <!-- Change Password Card -->
      <div class="profile-card">
        <h2 class="profile-card-title">
          <span>🔒</span>
          <span>Đổi mật khẩu</span>
        </h2>

        <form id="passwordForm">
          <div class="form-group">
            <label class="form-label" for="currentPassword"
              >Mật khẩu hiện tại</label
            >
            <div class="password-input-wrapper">
              <input
                type="password"
                id="currentPassword"
                class="form-input"
                placeholder="Nhập mật khẩu hiện tại"
              />
              <span class="password-toggle" data-target="currentPassword"
                >👁️</span
              >
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="newPassword">Mật khẩu mới</label>
            <div class="password-input-wrapper">
              <input
                type="password"
                id="newPassword"
                class="form-input"
                placeholder="Nhập mật khẩu mới"
              />
              <span class="password-toggle" data-target="newPassword">👁️</span>
            </div>
            <div class="password-strength">
              <div class="strength-bar">
                <div id="strengthBarFill" class="strength-bar-fill"></div>
              </div>
              <span id="strengthText"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirmPassword"
              >Xác nhận mật khẩu mới</label
            >
            <div class="password-input-wrapper">
              <input
                type="password"
                id="confirmPassword"
                class="form-input"
                placeholder="Nhập lại mật khẩu mới"
              />
              <span
                id="confirmPasswordCheck"
                class="password-verify-icon hidden"
                >✓</span
              >
              <span class="password-toggle" data-target="confirmPassword"
                >👁️</span
              >
            </div>
          </div>

          <button type="submit" class="btn-primary">
            <span>🔑</span>
            <span>Đổi mật khẩu</span>
          </button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- ⭐ Avatar Selection Modal - PHẢI CÓ ID ĐÚNG -->
<div
  id="avatarSelectionModal"
  class="modal-overlay"
  style="display: none"
  onclick="closeAvatarModal(event)"
>
  <div
    class="modal-content"
    style="max-width: 800px; width: 90%"
    onclick="event.stopPropagation()"
  >
    <div class="modal-header">
      <h3 class="modal-title">🎨 Chọn Avatar đại diện</h3>
      <button class="modal-close" onclick="closeAvatarModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="avatar-tabs">
        <button
          class="filter-tab active"
          data-type="all"
          onclick="filterAvatars('all')"
        >
          Tất cả
        </button>
        <button
          class="filter-tab"
          data-type="bottts"
          onclick="filterAvatars('bottts')"
        >
          🤖 Robots
        </button>
        <button
          class="filter-tab"
          data-type="dylan"
          onclick="filterAvatars('dylan')"
        >
          👤 Người
        </button>
        <button
          class="filter-tab"
          data-type="shapes"
          onclick="filterAvatars('shapes')"
        >
          🔷 Hình khối
        </button>
      </div>

      <div id="avatarGrid" class="avatar-grid-container">
        <div class="text-center py-8">
          <div
            class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto mb-4"
          ></div>
          <p class="text-gray-600">Đang tải avatars...</p>
        </div>
      </div>
    </div>
  </div>
</div>
