<script>
  console.log("🎨 Profile scripts loading...");

  // ⭐ COLLAPSIBLE TOGGLE FUNCTION
  function toggleCollapsible(button) {
    const section = button.closest(".collapsible-section");
    if (section) {
      section.classList.toggle("open");
    }
  }

  function openProfileSection(sectionKey) {
    const sections = document.querySelectorAll(
      ".profile-settings-list .collapsible-section",
    );
    if (!sections || sections.length === 0) return;

    sections.forEach((section) => section.classList.remove("open"));

    const selector = `.profile-settings-list .collapsible-section[data-profile-section="${sectionKey}"]`;
    const targetSection = document.querySelector(selector);
    const sectionToOpen = targetSection || sections[0];

    sectionToOpen.classList.add("open");
    sectionToOpen.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function triggerProfileSearchAction(actionKey) {
    if (!actionKey) return;

    if (actionKey === "avatar") {
      if (typeof openAvatarModal === "function") {
        setTimeout(() => openAvatarModal(), 120);
      }
      return;
    }

    if (
      actionKey === "personal" ||
      actionKey === "password" ||
      actionKey === "ai-key" ||
      actionKey === "theme" ||
      actionKey === "danger"
    ) {
      openProfileSection(actionKey);
    }
  }

  async function handleClearAllLearningData(event) {
    const btn =
      (event && event.currentTarget) ||
      document.getElementById("btn-clear-all-learning");

    const confirmed =
      typeof window.showAppConfirm === "function"
        ? await window.showAppConfirm(
            "Bạn có chắc muốn RESET TOÀN BỘ tiến độ học?\n\nHành động này sẽ xóa dữ liệu Topic, Quiz, Matching, Flashcard và lịch sử hoạt động.",
            {
              title: "Xác nhận reset dữ liệu",
              confirmText: "Reset toàn bộ",
              cancelText: "Hủy",
            },
          )
        : false;
    if (!confirmed) return;

    const user = profileData || window.currentUser;
    if (!user || !user.userId) {
      showToast("Không tìm thấy thông tin người dùng", "error");
      return;
    }

    let originalHtml = "";
    if (btn) {
      originalHtml = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<span class="btn-text">Đang reset...</span>';
    }

    google.script.run
      .withSuccessHandler(function (res) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = originalHtml;
        }

        if (res && res.success) {
          try {
            localStorage.removeItem("recentActivities");
            localStorage.removeItem("streakData");
            localStorage.removeItem("oq_mcq_unlocked_topics_v1");
            localStorage.removeItem("oq_matching_unlocked_topics_v1");
            localStorage.removeItem("oq_quiz_stats_cache_v1");
            localStorage.removeItem("oq_matching_stats_cache_v1");

            window.mcqUnlockedTopicsCache = {};
            window.matchingUnlockedTopicsCache = {};

            if (window.quizStatsCache) {
              window.quizStatsCache.stats = {};
              window.quizStatsCache.lastLoadTime = 0;
            }

            if (window.matchingStatsCache) {
              window.matchingStatsCache.stats = {};
              window.matchingStatsCache.lastLoadTime = 0;
            }

            if (window.globalTopicsCache) {
              window.globalTopicsCache.data = null;
              window.globalTopicsCache.progress = null;
              window.globalTopicsCache.lastLoadTime = 0;
            }
          } catch (e) {
            console.warn("Cache cleanup warning:", e);
          }

          window.dispatchEvent(new Event("dashboard-needs-refresh"));
          showToast(
            "Đã reset toàn bộ tiến độ! Đã xóa " +
              (res.totalDeleted || 0) +
              " dòng dữ liệu.",
            "success",
          );
        } else {
          showToast(res?.message || "Không thể reset dữ liệu", "error");
        }
      })
      .withFailureHandler(function (error) {
        if (btn) {
          btn.disabled = false;
          btn.innerHTML = originalHtml;
        }
        console.error("Clear all learning data error:", error);
        showToast("Lỗi reset dữ liệu", "error");
      })
      .clearAllLearningData({
        userId: user.userId,
        email: user.email,
      });
  }

  // ⭐ AVATAR MODAL FUNCTIONS
  function openAvatarModal() {
    console.log("🎨 Opening avatar modal...");
    const modal = document.getElementById("avatarSelectionModal");
    if (!modal) {
      console.error("❌ Modal not found");
      showToast("Lỗi: Không tìm thấy modal", "error");
      return;
    }
    modal.style.display = "flex";
    renderAvatarGrid();
  }

  function closeAvatarModal(e) {
    if (e && e.target !== e.currentTarget && e.type === "click") return;
    const modal = document.getElementById("avatarSelectionModal");
    if (modal) modal.style.display = "none";
  }

  function renderAvatarGrid() {
    const container = document.getElementById("avatarGrid");
    if (!container) return;

    container.innerHTML = "";
    let filtered = PRESET_AVATARS;

    console.log(`Rendering ${filtered.length} avatars`);

    filtered.forEach((url) => {
      const img = document.createElement("img");
      img.src = url;
      img.className = "avatar-option";
      img.onclick = () => selectAvatar(url);
      img.style.opacity = "0";
      img.style.transition = "opacity 0.3s ease";
      img.onload = () => {
        img.style.opacity = "1";
      };
      container.appendChild(img);
    });
  }

  function selectAvatar(url) {
    console.log("Selected:", url);

    // Lấy user từ global hoặc sessionStorage
    let user = window.currentUser || profileData;

    if (!user) {
      const userData = sessionStorage.getItem("currentUser");
      if (userData) {
        try {
          user = JSON.parse(userData);
        } catch (e) {
          console.error("Parse error:", e);
        }
      }
    }

    if (!user) {
      showToast("Phiên đăng nhập hết hạn", "error");
      setTimeout(() => showPage("page-login"), 1500);
      return;
    }

    // Update UI immediately
    const profileAvatar = document.getElementById("profile-avatar");
    const sidebarAvatar = document.getElementById("sidebar-avatar");
    if (profileAvatar) profileAvatar.src = url;
    if (sidebarAvatar) sidebarAvatar.src = url;

    closeAvatarModal();
    showToast("Đang lưu avatar...", "info");

    // Save to server
    google.script.run
      .withSuccessHandler(function (res) {
        console.log("💾 Save avatar response:", res);
        if (res.success) {
          // 1. Update user object
          user.avatarUrl = url;

          // 2. Update global variables
          window.currentUser = user;
          profileData = user;

          // 3. ⭐ LƯU VÀO CẢ localStorage VÀ sessionStorage
          try {
            localStorage.setItem("currentUser", JSON.stringify(user));
            console.log("✅ Avatar saved to localStorage");
          } catch (e) {
            console.warn("⚠️ localStorage blocked:", e);
          }

          try {
            sessionStorage.setItem("currentUser", JSON.stringify(user));
            console.log("✅ Avatar saved to sessionStorage");
          } catch (e) {
            console.warn("⚠️ sessionStorage blocked:", e);
          }

          // 4. Update UI globally
          showToast("Đổi avatar thành công!", "success");

          // 5. Dispatch event để các component khác update
          window.dispatchEvent(
            new CustomEvent("avatar-updated", { detail: { url } }),
          );

          // 6. Update tất cả avatar elements trong DOM
          setTimeout(() => {
            updateAllAvatars(url);
            // Gọi hàm global nếu có
            if (typeof window.updateAllUserAvatars === "function") {
              window.updateAllUserAvatars(url);
            }
          }, 100);

          console.log("✅ Avatar update complete:", url);
        } else {
          showToast("Lỗi: " + res.message, "error");
          // Rollback UI
          if (profileAvatar && user.avatarUrl)
            profileAvatar.src = user.avatarUrl;
          if (sidebarAvatar && user.avatarUrl)
            sidebarAvatar.src = user.avatarUrl;
        }
      })
      .withFailureHandler(function (err) {
        console.error("❌ Save avatar error:", err);
        showToast("Lỗi kết nối: " + err.message, "error");
        // Rollback UI
        if (profileAvatar && user.avatarUrl) profileAvatar.src = user.avatarUrl;
        if (sidebarAvatar && user.avatarUrl) sidebarAvatar.src = user.avatarUrl;
      })
      .saveAvatarUrl(user.userId, url);
  }

  function updateAllAvatars(url) {
    console.log("🖼️ Updating all avatar elements to:", url);

    // Danh sách tất cả các ID có thể chứa avatar
    const avatarIds = [
      "profile-avatar",
      "sidebar-avatar",
      "dashboard-avatar",
      "topbar-avatar",
      "user-avatar",
    ];

    let updated = 0;

    // Update by ID
    avatarIds.forEach((id) => {
      const el = document.getElementById(id);
      if (el) {
        el.src = url;
        el.style.display = "block";
        updated++;
        console.log("✅ Updated #" + id);
      }
    });

    // Update by class
    document.querySelectorAll(".user-avatar").forEach((el) => {
      el.src = url;
      el.style.display = "block";
      updated++;
    });

    // Update by data attribute
    document.querySelectorAll("[data-user-avatar]").forEach((el) => {
      el.src = url;
      el.style.display = "block";
      updated++;
    });

    console.log("✅ Total avatar elements updated:", updated);
  }

  // ⭐ PROFILE PAGE INITIALIZATION
  let profileData = null;
  let profileSubmitGuardBound = false;

  function initProfilePage() {
    console.log("Initializing Profile...");
    bindProfileSubmitGuard();
    loadProfileData();
    setupEventListeners();
    // Start meteor shower effect (every 5 seconds)
    startProfileMeteorShower();
    // Load theme selection state
    loadUserTheme();

  function checkPasswordStrength() {
    const pwd = this.value;
    const bars = document.querySelectorAll(".strength-bar-item");
    const text = document.getElementById("strengthText");

    let strength = 0;
    if (pwd.length >= 6) strength++;
    if (pwd.length >= 10) strength++;
    if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) strength++;
    if (/\d/.test(pwd)) strength++;
    if (/[^a-zA-Z0-9]/.test(pwd)) strength++;

    // Update strength bars
    let strengthLevel = Math.ceil(strength / 1.25); // Convert 0-5 to 0-4
    let color = "#ef4444"; // red
    let label = "Yếu";

    if (strengthLevel >= 4) {
      color = "#22c55e"; // green
      label = "Mạnh";
    } else if (strengthLevel >= 3) {
      color = "#f59e0b"; // orange
      label = "Khá";
    } else if (strengthLevel >= 2) {
      color = "#fbbf24"; // yellow
      label = "Trung bình";
    }

    bars.forEach((bar, index) => {
      if (index < strengthLevel) {
        bar.classList.add("active");
        bar.style.setProperty("--strength-color", color);
        bar.style.background = color;
      } else {
        bar.classList.remove("active");
        bar.style.background = "#e5e7eb";
      }
    });

    if (text) {
      text.textContent = pwd.length > 0 ? label : "";
      text.style.color = color;
    }
  }

  function checkPasswordMatch() {
    const newPwd = document.getElementById("newPassword").value;
    const confirmPwd = this.value;
    const icon = document.getElementById("passwordMatchIcon");

    if (!icon) return;

    if (confirmPwd === "") {
      icon.classList.remove("show");
    } else if (newPwd === confirmPwd) {
      icon.classList.add("show");
      icon.style.color = "#22c55e";
    } else {
      icon.classList.remove("show");
    }
  }

    const newDisplayName = displayNameInput?.value?.trim();

    if ((profileData?.displayName || "").trim() === newDisplayName) {

      return;
    }

    // Kiểm tra user

      showToast("Không tìm thấy thông tin người dùng", "error");
      return;
    }

    // Hiển thị loading
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalText = submitBtn ? submitBtn.innerHTML : "";
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = "<span>⏳</span><span>Đang lưu...</span>";
    }

    // Gọi backend để cập nhật
    google.script.run
      .withSuccessHandler(function (response) {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }

        if (response.success) {
          console.log("✅ Profile updated:", response);

          const updatedUser = (response && response.user) || {
            ...(window.currentUser || profileData || {}),
            displayName: newDisplayName,
          };

          // Cập nhật dữ liệu local state
          profileData = { ...(profileData || {}), ...updatedUser };
          window.currentUser = {
            ...(window.currentUser || {}),
            ...updatedUser,
          };
          if (typeof currentUser !== "undefined") {
            currentUser = window.currentUser;
          }

          // Cập nhật sessionStorage và localStorage
          sessionStorage.setItem(
            "currentUser",
            JSON.stringify(window.currentUser),
          );
          localStorage.setItem(
            "currentUser",
            JSON.stringify(window.currentUser),
          );

          // Cập nhật UI
          updateProfileHeader(window.currentUser);

          // Cập nhật tất cả nơi hiển thị tên (dashboard, sidebar, etc.)
          updateAllUserNames(window.currentUser.displayName || newDisplayName);

          showToast("Cập nhật thông tin thành công!", "success");
        } else {
          console.error("❌ Update failed:", response.message);
          showToast(response.message || "Lỗi cập nhật thông tin", "error");
        }
      })
      .withFailureHandler(function (error) {
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
        console.error("❌ Error:", error);
        showToast(
          "Lỗi kết nối server: " + (error?.message || "Unknown"),
          "error",
        );
      })
      .updateProfile({
        userId: profileData.userId,
        displayName: newDisplayName,

          // ⭐ IMPORTANT: Clear ALL client-side caches
          // This prevents blank screen issues caused by stale cache data
          try {
            // Clear localStorage progress keys
            const keysToRemove = [];
            for (let i = 0; i < localStorage.length; i++) {
              const key = localStorage.key(i);
              if (
                key &&
                (key.indexOf("lesson_progress_") === 0 ||
                  key === "streakData" ||
                  key === "topicsCache" ||
                  key === "progressCache" ||
                  key === "dashboardCache")
              ) {
                keysToRemove.push(key);
              }
            }
            keysToRemove.forEach((key) => localStorage.removeItem(key));
            console.log(
              "🧹 Cleared",
              keysToRemove.length,
              "cached items from localStorage",
            );

            // Clear global window caches and state
            if (window.DashboardCache) {
              window.DashboardCache.data = null;
              window.DashboardCache.lastFetch = null;
            }
            if (window.invalidateTopicsLocalCache) {
              window.invalidateTopicsLocalCache();

            // ⭐ Reset dashboard state to force fresh load

              window.dashboardInitialized = false;
              window.dashboardInitRetryCount = 0;
              window.dashboardHasLoadedOnce = false;
            }

            console.log("🧹 Cleared all caches and reset dashboard state");
          } catch (e) {
            console.warn("⚠️ Warning during cache clearing:", e);
          }

          // ⭐ Navigate to Dashboard instead of reload
          // This gives fresh initialization without stale cache data
          setTimeout(() => {
            if (typeof showPage === "function") {
              showPage("page-dashboard");
            } else {
              location.reload();
            }
          }, 1500);
        } else {
          showToast(
            "❌ Lỗi: " + (response.message || "Không xóa được dữ liệu"),
            "error",
          );
        }
      })

          confirmBtn.innerHTML = originalText;

        console.error("❌ Reset error:", error);
        showToast("❌ Lỗi kết nối server: " + error.message, "error");
      })
      .clearAllLearningData();
  }

  // ===== METEOR SHOWER FOR PROFILE PAGE =====
  let profileMeteorInterval = null;
  let meteorShowerTimeout = null;

  function startProfileMeteorShower() {
    const container = document.getElementById("profileMeteorContainer");
    if (!container) return;

    // Clear any existing intervals
    if (profileMeteorInterval) {
      clearInterval(profileMeteorInterval);
    }
    if (meteorShowerTimeout) {
      clearTimeout(meteorShowerTimeout);
    }

    // Function to create a meteor shower burst
    function createMeteorShower() {
      if (!document.getElementById("profileMeteorContainer")) {
        clearInterval(profileMeteorInterval);
        clearTimeout(meteorShowerTimeout);
        return;
      }

      // Create 8-12 meteors in quick succession
      const meteorCount = 8 + Math.floor(Math.random() * 5);
      for (let i = 0; i < meteorCount; i++) {
        setTimeout(() => {
          createProfileMeteor();
        }, i * 150); // Stagger each meteor by 150ms
      }
    }

    // Initial meteor shower
    createMeteorShower();

    // Repeat meteor shower every 5 seconds
    profileMeteorInterval = setInterval(() => {
      createMeteorShower();
    }, 5000);
  }

  function createProfileMeteor() {
    const container = document.getElementById("profileMeteorContainer");
    if (!container) return;

    const meteor = document.createElement("div");
    meteor.className = "profile-meteor";

    // Random position from top-left area (spread across screen)
    const startX = Math.random() * 80; // 0-80% from left
    const startY = -10 + Math.random() * 30; // -10 to 20% from top

    meteor.style.left = startX + "%";
    meteor.style.top = startY + "%";

    // Random size for variety
    const height = 35 + Math.random() * 35;
    meteor.style.height = height + "px";
    meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

    container.appendChild(meteor);

    setTimeout(() => {
      meteor.remove();
    }, 1500);
  }

    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  // ⭐ THEME MANAGEMENT (delegates to ThemeManager)
  const AVAILABLE_THEMES = window.getAvailableThemes
    ? window.getAvailableThemes()
    : ["default", "forest"];

  /**
   * Apply theme to the UI (delegates to ThemeManager)
   */
  function applyTheme(themeName) {
    if (window.ThemeManager) {
      window.ThemeManager.applyTheme(themeName);
    }
    console.log("Theme applied:", themeName);
  }

  /**
   * Update theme card UI to show selected state
   */
  function updateThemeCardUI(themeName) {
    var cards = document.querySelectorAll(".theme-card");
    cards.forEach(function (card) {
      if (card.getAttribute("data-theme") === themeName) {
        card.classList.add("selected");
      } else {
        card.classList.remove("selected");
      }
    });
  }

  /**
   * Select a theme: apply immediately, save to localStorage and server
   */
  function selectTheme(themeName) {
    if (!AVAILABLE_THEMES.includes(themeName)) return;

    console.log("Selecting theme:", themeName);

    // ThemeManager handles: apply CSS vars + body class + persist + save to server
    if (window.ThemeManager) {
      window.ThemeManager.setTheme(themeName);
    }

    // Update profile card UI
    updateThemeCardUI(themeName);

    // Keep profile-local data in sync
    if (profileData) profileData.theme = themeName;

    showToast("Giao diện đã được thay đổi!", "success");
  }

  /**
   * Load theme on page init: from user data or localStorage
   */
  function loadUserTheme() {
    var theme = window.ThemeManager
      ? window.ThemeManager.getCurrentTheme()
      : "default";
    applyTheme(theme);
    updateThemeCardUI(theme);
    return theme;
  }

  // ⭐ EXPORT FUNCTIONS
  window.initProfilePage = initProfilePage;
  window.openAvatarModal = openAvatarModal;
  window.closeAvatarModal = closeAvatarModal;
  window.filterAvatars = filterAvatars;
  window.selectAvatar = selectAvatar;
  window.updateAllAvatars = updateAllAvatars;
  window.updateAllUserNames = updateAllUserNames;
  window.startProfileMeteorShower = startProfileMeteorShower;
  window.setupProfileHeaderMouseEffect = setupProfileHeaderMouseEffect;
  window.selectTheme = selectTheme;
  window.applyTheme = applyTheme;
  window.loadUserTheme = loadUserTheme;
  window.openProfileSection = openProfileSection;
  window.triggerProfileSearchAction = triggerProfileSearchAction;
  window.handleClearAllLearningData = handleClearAllLearningData;
  window.toggleCollapsible = toggleCollapsible;
  window.handleProfileUpdate = handleProfileUpdate;
  window.handlePasswordChange = handlePasswordChange;
  window.handleGeminiKeySave = handleGeminiKeySave;
  window.handleGeminiKeyDelete = handleGeminiKeyDelete;

  console.log("✅ Profile scripts loaded");
  console.log("✅ initProfilePage:", typeof window.initProfilePage);
  console.log("✅ openAvatarModal:", typeof window.openAvatarModal);
</script>
