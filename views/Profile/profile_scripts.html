  // ⭐ AVATAR MODAL FUNCTIONS
  function openAvatarModal() {
    console.log("🎨 Opening avatar modal...");
    const modal = document.getElementById("avatarSelectionModal");
    if (!modal) {
      console.error("❌ Modal not found");
      showToast("Lỗi: Không tìm thấy modal", "error");
      return;
    }
    modal.style.display = "flex";
    renderAvatarGrid("all");
  }

  function closeAvatarModal(e) {
    if (e && e.target !== e.currentTarget && e.type === "click") return;
    const modal = document.getElementById("avatarSelectionModal");
    if (modal) modal.style.display = "none";
  }

  function filterAvatars(type) {
    console.log("Filtering:", type);
    document.querySelectorAll(".avatar-tabs .filter-tab").forEach((btn) => {
      btn.classList.remove("active");
      if (btn.dataset.type === type) btn.classList.add("active");
    });
    renderAvatarGrid(type);
  }

  function renderAvatarGrid(filterType) {
    const container = document.getElementById("avatarGrid");
    if (!container) return;

    container.innerHTML = "";
    let filtered =
      filterType === "all"
        ? PRESET_AVATARS
        : PRESET_AVATARS.filter((url) => url.includes(`/${filterType}/`));

    console.log(`Rendering ${filtered.length} avatars`);

    filtered.forEach((url) => {
      const img = document.createElement("img");
      img.src = url;
      img.className = "avatar-option";
      img.onclick = () => selectAvatar(url);
      img.style.opacity = "0";
      img.style.transition = "opacity 0.3s ease";
      img.onload = () => {
        img.style.opacity = "1";
      };
      container.appendChild(img);
    });
  }

  function selectAvatar(url) {
    console.log("Selected:", url);

    // Lấy user từ global hoặc sessionStorage
    let user = window.currentUser || profileData;

    if (!user) {
      const userData = sessionStorage.getItem("currentUser");
      if (userData) {
        try {
          user = JSON.parse(userData);
        } catch (e) {
          console.error("Parse error:", e);
        }
      }
    }

    if (!user) {
      showToast("Phiên đăng nhập hết hạn", "error");
      setTimeout(() => showPage("page-login"), 1500);
      return;
    }

    // Update UI immediately
    const profileAvatar = document.getElementById("profile-avatar");
    const sidebarAvatar = document.getElementById("sidebar-avatar");
    if (profileAvatar) profileAvatar.src = url;
    if (sidebarAvatar) sidebarAvatar.src = url;

    closeAvatarModal();
    showToast("Đang lưu avatar...", "info");

    // Save to server
    google.script.run
      .withSuccessHandler(function (res) {
        console.log("💾 Save avatar response:", res);
        if (res.success) {
          // 1. Update user object
          user.avatarUrl = url;

          // 2. Update global variables
          window.currentUser = user;
          profileData = user;

          // 3. ⭐ LƯU VÀO CẢ localStorage VÀ sessionStorage
          try {
            localStorage.setItem("currentUser", JSON.stringify(user));
            console.log("✅ Avatar saved to localStorage");
          } catch (e) {
            console.warn("⚠️ localStorage blocked:", e);
          }

          try {
            sessionStorage.setItem("currentUser", JSON.stringify(user));
            console.log("✅ Avatar saved to sessionStorage");
          } catch (e) {
            console.warn("⚠️ sessionStorage blocked:", e);
          }

          // 4. Update UI globally
          showToast("Đổi avatar thành công!", "success");

          // 5. Dispatch event để các component khác update
          window.dispatchEvent(
            new CustomEvent("avatar-updated", { detail: { url } }),
          );

          // 6. Update tất cả avatar elements trong DOM
          setTimeout(() => {
            updateAllAvatars(url);
            // Gọi hàm global nếu có
            if (typeof window.updateAllUserAvatars === "function") {
              window.updateAllUserAvatars(url);
            }
          }, 100);

          console.log("✅ Avatar update complete:", url);
        } else {
          showToast("Lỗi: " + res.message, "error");
          // Rollback UI
          if (profileAvatar && user.avatarUrl)
            profileAvatar.src = user.avatarUrl;
          if (sidebarAvatar && user.avatarUrl)
            sidebarAvatar.src = user.avatarUrl;
        }
      })
      .withFailureHandler(function (err) {
        console.error("❌ Save avatar error:", err);
        showToast("Lỗi kết nối: " + err.message, "error");
        // Rollback UI
        if (profileAvatar && user.avatarUrl) profileAvatar.src = user.avatarUrl;
        if (sidebarAvatar && user.avatarUrl) sidebarAvatar.src = user.avatarUrl;
      })
      .saveAvatarUrl(user.userId, url);
  }

  function updateAllAvatars(url) {
    console.log("🖼️ Updating all avatar elements to:", url);

    // Danh sách tất cả các ID có thể chứa avatar
    const avatarIds = [
      "profile-avatar",
      "sidebar-avatar",
      "dashboard-avatar",
      "topbar-avatar",
      "user-avatar",
    ];

    let updated = 0;

    // Update by ID
    avatarIds.forEach((id) => {
      const el = document.getElementById(id);
      if (el) {
        el.src = url;
        el.style.display = "block";
        updated++;
        console.log("✅ Updated #" + id);
      }
    });

    // Update by class
    document.querySelectorAll(".user-avatar").forEach((el) => {
      el.src = url;
      el.style.display = "block";
      updated++;
    });

    // Update by data attribute
    document.querySelectorAll("[data-user-avatar]").forEach((el) => {
      el.src = url;
      el.style.display = "block";
      updated++;
    });

    console.log("✅ Total avatar elements updated:", updated);
  }

    console.log("Initializing Profile...");

    // Start meteor shower effect (every 5 seconds)
    startProfileMeteorShower();

  function loadProfileData() {
    // Kiểm tra user từ nhiều nguồn
    let user = null;

    console.log("🔍 DEBUG: Checking user sources...");
    console.log("  - typeof currentUser:", typeof currentUser);
    console.log("  - currentUser value:", currentUser);
    console.log("  - window.currentUser:", window.currentUser);
    console.log(
      "  - sessionStorage currentUser:",
      sessionStorage.getItem("currentUser") ? "EXISTS" : "NULL",
    );

    // 1. Kiểm tra biến currentUser trong scope (ưu tiên cao nhất)
    if (typeof currentUser !== "undefined" && currentUser) {
      user = currentUser;
      console.log("✅ Found user from scope variable:", user.email);
    }
    // 2. Kiểm tra window.currentUser
    else if (window.currentUser) {
      user = window.currentUser;
      console.log("✅ Found user from window.currentUser:", user.email);
    }
    // 3. Kiểm tra sessionStorage (fallback cuối cùng)
    else {
      const saved = sessionStorage.getItem("currentUser");
      if (saved) {
        try {
          user = JSON.parse(saved);
          window.currentUser = user; // Sync to global
          currentUser = user; // ⭐ QUAN TRỌNG: Đồng bộ vào biến global
          console.log("✅ Found user from sessionStorage:", user.email);
        } catch (e) {
          console.error("❌ Error parsing user data:", e);
        }
      }
    }

    // Nếu không tìm thấy user -> Redirect login
    if (!user) {
      console.warn("⚠️ No user found, redirecting to login");
      console.error("❌ ALL SOURCES FAILED:");
      console.error("  - currentUser:", typeof currentUser, currentUser);
      console.error("  - window.currentUser:", window.currentUser);
      console.error(
        "  - sessionStorage:",
        sessionStorage.getItem("currentUser"),
      );
      showToast("Vui lòng đăng nhập", "error");
      setTimeout(() => showPage("page-login"), 1500);
      return;
    }

    // Load profile với user data
    try {
      console.log("✅ User loaded:", user);
      profileData = user; // Lưu vào biến global
      updateProfileHeader(user);
      updateProfileForm(user);
    } catch (e) {
      console.error("❌ Load profile error:", e);
      showToast("Lỗi tải profile", "error");
    }
  }

  function updateProfileHeader(user) {
    console.log("Updating header");

    const fullname = document.getElementById("profile-fullname");
    const email = document.getElementById("profile-email");

    if (fullname) {
      // ⭐ CHỈ lấy displayName từ cột displayName trong database
      const name = user.displayName || "";
      fullname.textContent = name;
      console.log("Fullname updated:", name);
    }

    if (email) {
      email.textContent = user.email || "N/A";
      console.log("Email updated:", user.email);
    }

    const avatar = document.getElementById("profile-avatar");
    if (avatar) {
      if (user.avatarUrl && user.avatarUrl !== "") {
        avatar.src = user.avatarUrl;
        console.log("Avatar loaded:", user.avatarUrl);
      } else {
        // Ẩn avatar nếu không có
        avatar.style.display = "none";
        console.log("No avatar, element hidden");
      }
    }

    const level = document.getElementById("profile-level");
    const xp = document.getElementById("profile-xp");
    const mountain = document.getElementById("profile-mountain-stage");

    if (level) level.textContent = user.level || 1;
    if (xp) xp.textContent = user.totalXP || 0;
    if (mountain) mountain.textContent = user.mountainStage || 1;

    console.log("Header updated successfully");
  }

  function updateProfileForm(user) {
    const displayName = document.getElementById("displayName");
    const email = document.getElementById("email");
    const username = document.getElementById("username");

    // ⭐ Lấy displayName từ cột displayName trong database
    if (displayName) displayName.value = user.displayName || "";
    if (email) email.value = user.email || "";
    if (username) username.value = user.username || "";
  }

  function setupEventListeners() {
    // Password toggle - Updated for new HTML structure
    document.querySelectorAll(".password-toggle-btn").forEach((toggle) => {
      toggle.addEventListener("click", function () {
        const input = document.getElementById(this.dataset.target);
        const eyeOpen = this.querySelector(".eye-open");
        const eyeClosed = this.querySelector(".eye-closed");

        if (input.type === "password") {
          input.type = "text";
          if (eyeOpen) eyeOpen.style.display = "none";
          if (eyeClosed) eyeClosed.style.display = "block";
        } else {
          input.type = "password";
          if (eyeOpen) eyeOpen.style.display = "block";
          if (eyeClosed) eyeClosed.style.display = "none";
        }
      });
    });

    // Password strength
    const newPwd = document.getElementById("newPassword");
    if (newPwd) newPwd.addEventListener("input", checkPasswordStrength);

    // Confirm password
    const confirmPwd = document.getElementById("confirmPassword");
    if (confirmPwd) confirmPwd.addEventListener("input", checkPasswordMatch);

    // Forms
    const profileForm = document.getElementById("profileForm");
    if (profileForm)
      profileForm.addEventListener("submit", handleProfileUpdate);

    const pwdForm = document.getElementById("passwordForm");
    if (pwdForm) pwdForm.addEventListener("submit", handlePasswordChange);
  }

  function checkPasswordStrength() {
    const pwd = this.value;
    const bars = document.querySelectorAll(".strength-bar-item");
    const text = document.getElementById("strengthText");

    let strength = 0;
    if (pwd.length >= 6) strength++;
    if (pwd.length >= 10) strength++;
    if (/[a-z]/.test(pwd) && /[A-Z]/.test(pwd)) strength++;
    if (/\d/.test(pwd)) strength++;
    if (/[^a-zA-Z0-9]/.test(pwd)) strength++;

    // Update strength bars
    let strengthLevel = Math.ceil(strength / 1.25); // Convert 0-5 to 0-4
    let color = "#ef4444"; // red
    let label = "Yếu";

    if (strengthLevel >= 4) {
      color = "#22c55e"; // green
      label = "Mạnh";
    } else if (strengthLevel >= 3) {
      color = "#f59e0b"; // orange
      label = "Khá";
    } else if (strengthLevel >= 2) {
      color = "#fbbf24"; // yellow
      label = "Trung bình";
    }

    bars.forEach((bar, index) => {
      if (index < strengthLevel) {
        bar.classList.add("active");
        bar.style.setProperty("--strength-color", color);
        bar.style.background = color;
      } else {
        bar.classList.remove("active");
        bar.style.background = "#e5e7eb";
      }
    });

    if (text) {
      text.textContent = pwd.length > 0 ? label : "";
      text.style.color = color;
    }
  }

  function checkPasswordMatch() {
    const newPwd = document.getElementById("newPassword").value;
    const confirmPwd = this.value;
    const icon = document.getElementById("passwordMatchIcon");

    if (!icon) return;

    if (confirmPwd === "") {
      icon.classList.remove("show");
    } else if (newPwd === confirmPwd) {
      icon.classList.add("show");
      icon.style.color = "#22c55e";
    } else {
      icon.classList.remove("show");
    }
  }

  function handleProfileUpdate(e) {
    e.preventDefault();

    console.log("💾 Saving profile...");

    // Lấy giá trị từ form
    const displayNameInput = document.getElementById("displayName");
    const newDisplayName = displayNameInput?.value?.trim();

    if (!newDisplayName) {
      showToast("Vui lòng nhập tên hiển thị", "error");
      return;
    }

    // Kiểm tra user
    if (!profileData || !profileData.userId) {
      showToast("Không tìm thấy thông tin người dùng", "error");
      return;
    }

    // Hiển thị loading
    const submitBtn = e.target.querySelector('button[type="submit"]');
    const originalText = submitBtn.innerHTML;
    submitBtn.disabled = true;
    submitBtn.innerHTML = "<span>⏳</span><span>Đang lưu...</span>";

    // Gọi backend để cập nhật
    google.script.run
      .withSuccessHandler(function (response) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;

        if (response.success) {
          console.log("✅ Profile updated:", response);

          // Cập nhật profileData và currentUser
          profileData.displayName = newDisplayName;
          currentUser.displayName = newDisplayName;
          window.currentUser.displayName = newDisplayName;

          // Cập nhật sessionStorage và localStorage
          sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
          localStorage.setItem("currentUser", JSON.stringify(currentUser));

          // Cập nhật UI
          updateProfileHeader(currentUser);

          // Cập nhật tất cả nơi hiển thị tên (dashboard, sidebar, etc.)
          updateAllUserNames(newDisplayName);

          showToast("Cập nhật thông tin thành công!", "success");
        } else {
          console.error("❌ Update failed:", response.message);
          showToast(response.message || "Lỗi cập nhật thông tin", "error");
        }
      })
      .withFailureHandler(function (error) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = originalText;
        console.error("❌ Error:", error);
        showToast("Lỗi kết nối server", "error");
      })
      .updateUserProfile({
        userId: profileData.userId,
        displayName: newDisplayName,
      });
  }

  // Hàm cập nhật tên ở tất cả các nơi
  function updateAllUserNames(displayName) {
    const nameElements = document.querySelectorAll(
      "#userName, #userNameWelcome, #dashboard-user-name, #profile-fullname, #sidebar-user-name",
    );

    nameElements.forEach((el) => {
      if (el) {
        el.textContent = displayName;
        console.log("Updated element:", el.id, "→", displayName);
      }
    });
  }

  function handlePasswordChange(e) {

  // ===== METEOR SHOWER FOR PROFILE PAGE =====
  let profileMeteorInterval = null;
  let meteorShowerTimeout = null;

  function startProfileMeteorShower() {
    const container = document.getElementById("profileMeteorContainer");
    if (!container) return;

    // Clear any existing intervals
    if (profileMeteorInterval) {
      clearInterval(profileMeteorInterval);
    }
    if (meteorShowerTimeout) {
      clearTimeout(meteorShowerTimeout);
    }

    // Function to create a meteor shower burst
    function createMeteorShower() {
      if (!document.getElementById("profileMeteorContainer")) {
        clearInterval(profileMeteorInterval);
        clearTimeout(meteorShowerTimeout);
        return;
      }

      // Create 8-12 meteors in quick succession
      const meteorCount = 8 + Math.floor(Math.random() * 5);
      for (let i = 0; i < meteorCount; i++) {
        setTimeout(() => {
          createProfileMeteor();
        }, i * 150); // Stagger each meteor by 150ms
      }
    }

    // Initial meteor shower
    createMeteorShower();

    // Repeat meteor shower every 5 seconds
    profileMeteorInterval = setInterval(() => {
      createMeteorShower();
    }, 5000);
  }

  function createProfileMeteor() {
    const container = document.getElementById("profileMeteorContainer");
    if (!container) return;

    const meteor = document.createElement("div");
    meteor.className = "profile-meteor";

    // Random position from top-left area (spread across screen)
    const startX = Math.random() * 80; // 0-80% from left
    const startY = -10 + Math.random() * 30; // -10 to 20% from top

    meteor.style.left = startX + "%";
    meteor.style.top = startY + "%";

    // Random size for variety
    const height = 35 + Math.random() * 35;
    meteor.style.height = height + "px";
    meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

    container.appendChild(meteor);

    setTimeout(() => {
      meteor.remove();
    }, 1500);
  }

  // ===== MOUSE-RESPONSIVE STARS EFFECT =====
  function setupProfileHeaderMouseEffect() {
    const header = document.querySelector(".profile-header");
    const stars = document.getElementById("profileHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  // ⭐ EXPORT FUNCTIONS
  window.initProfilePage = initProfilePage;
  window.openAvatarModal = openAvatarModal;
  window.closeAvatarModal = closeAvatarModal;
  window.filterAvatars = filterAvatars;
  window.selectAvatar = selectAvatar;
  window.updateAllAvatars = updateAllAvatars;
  window.updateAllUserNames = updateAllUserNames;
  window.startProfileMeteorShower = startProfileMeteorShower;
  window.setupProfileHeaderMouseEffect = setupProfileHeaderMouseEffect;

  console.log("✅ Profile scripts loaded");
  console.log("✅ initProfilePage:", typeof window.initProfilePage);
  console.log("✅ openAvatarModal:", typeof window.openAvatarModal);
