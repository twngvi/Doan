  // ===== AUTH TOAST NOTIFICATION SYSTEM =====
  let authToastTimeout = null;

  function showAuthToast(message, type = "info") {
    // Sử dụng showToast global nếu có, nếu không thì dùng toast riêng
    if (typeof window.showToast === "function") {
      window.showToast(message, type);
      return;
    }

    // Tạo toast container nếu chưa có
    let toastContainer = document.getElementById("auth-toast-container");
    if (!toastContainer) {
      toastContainer = document.createElement("div");
      toastContainer.id = "auth-toast-container";
      toastContainer.style.cssText = `
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 9999999;
        display: flex;
        flex-direction: column;
        gap: 10px;
        pointer-events: none;
      `;
      document.body.appendChild(toastContainer);
    }

    // Tạo toast element
    const toast = document.createElement("div");
    toast.className = "auth-toast auth-toast-" + type;

    const icons = {
      success: "✅",
      error: "❌",
      warning: "⚠️",
      info: "ℹ️",
    };

    const colors = {
      success: "linear-gradient(135deg, #10b981, #059669)",
      error: "linear-gradient(135deg, #ef4444, #dc2626)",
      warning: "linear-gradient(135deg, #f59e0b, #d97706)",
      info: "linear-gradient(135deg, #3b82f6, #2563eb)",
    };

    toast.style.cssText = `
      background: ${colors[type] || colors.info};
      color: white;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      display: flex;
      align-items: center;
      gap: 10px;
      pointer-events: auto;
      animation: authToastSlideIn 0.3s ease-out;
      max-width: 350px;
      backdrop-filter: blur(10px);
    `;

    toast.innerHTML = `
      <span style="font-size: 18px;">${icons[type] || icons.info}</span>
      <span>${message}</span>
    `;

    // Thêm animation styles nếu chưa có
    if (!document.getElementById("auth-toast-styles")) {
      const style = document.createElement("style");
      style.id = "auth-toast-styles";
      style.textContent = `
        @keyframes authToastSlideIn {
          from { transform: translateX(100%); opacity: 0; }
          to { transform: translateX(0); opacity: 1; }
        }
        @keyframes authToastSlideOut {
          from { transform: translateX(0); opacity: 1; }
          to { transform: translateX(100%); opacity: 0; }
        }
      `;
      document.head.appendChild(style);
    }

    toastContainer.appendChild(toast);

    // Tự động ẩn sau 4 giây
    setTimeout(() => {
      toast.style.animation = "authToastSlideOut 0.3s ease-in forwards";
      setTimeout(() => toast.remove(), 300);
    }, 4000);
  }

  // ===== AUTH SUCCESS POPUP SYSTEM =====
  function showAuthSuccess(
    title = "Đăng nhập thành công!",
    subtitle = "Chào mừng bạn quay trở lại",
  ) {
    const overlay = document.getElementById("auth-success-overlay");
    if (!overlay) return;

    // Update text
    const titleEl = overlay.querySelector(".success-title");
    const subtitleEl = overlay.querySelector(".success-subtitle");
    if (titleEl) titleEl.textContent = title;
    if (subtitleEl) subtitleEl.textContent = subtitle;

    // Show overlay
    overlay.classList.add("active");

    // Reset loading bar animation
    const loadingFill = overlay.querySelector(".success-loading-fill");
    if (loadingFill) {
      loadingFill.style.animation = "none";
      loadingFill.offsetHeight; // Force reflow
      loadingFill.style.animation =
        "successLoadingProgress 1.5s ease-out forwards, successLoadingShimmer 1s linear infinite";
    }
  }

  function hideAuthSuccess() {
    const overlay = document.getElementById("auth-success-overlay");
    if (overlay) {
      overlay.classList.remove("active");
    }
  }

  // Auto hide and redirect after showing success
  function showAuthSuccessAndRedirect(
    title,
    subtitle,
    redirectPage,
    delay = 1800,
  ) {
    showAuthSuccess(title, subtitle);

    setTimeout(() => {
      hideAuthSuccess();
      closeAuthPanel();
      if (typeof showPage === "function" && redirectPage) {
        showPage(redirectPage);
      }
    }, delay);
  }

  // ===== METEOR SHOWER EFFECT =====
  function createMeteorShower() {
    const container = document.getElementById("meteor-shower");
    if (!container) return;

    // Create 8-15 meteors per shower
    const meteorCount = Math.floor(Math.random() * 8) + 8;

    for (let i = 0; i < meteorCount; i++) {
      setTimeout(() => {
        const meteor = document.createElement("div");
        meteor.className = "meteor";

        // Random position across the screen
        meteor.style.left = Math.random() * 100 + "%";
        meteor.style.top = Math.random() * 40 + "%";

        // Random delay and duration
        meteor.style.animationDelay = Math.random() * 0.5 + "s";
        meteor.style.animationDuration = 0.8 + Math.random() * 0.5 + "s";

        container.appendChild(meteor);

        // Remove meteor after animation
        setTimeout(() => {
          meteor.remove();
        }, 2000);
      }, i * 100); // Stagger meteor creation
    }
  }

  // Start meteor shower every 10 seconds
  setInterval(createMeteorShower, 10000);
  // Initial shower after 2 seconds
  setTimeout(createMeteorShower, 2000);

  // ===== NAVIGATION FUNCTIONS =====
  function navigateToLogin() {
    if (typeof showPage === "function") {

  function navigateToRegister() {

  // ===== SPLIT AUTH PANEL SYSTEM =====
  let isAuthPanelOpen = false;
  let currentAuthForm = "login";

  // ===== AUTH TRANSITION METEOR SHOWER =====
  function createAuthMeteorShower() {
    const container = document.getElementById("auth-meteor-shower");
    if (!container) return;

    // Clear previous meteors
    container.innerHTML = "";
    container.classList.add("active");

    // Create 40-60 meteors for a dense shower
    const meteorCount = Math.floor(Math.random() * 20) + 40;

    for (let i = 0; i < meteorCount; i++) {
      setTimeout(() => {
        const meteor = document.createElement("div");
        meteor.className = "auth-meteor";

        // Random position across the left half
        meteor.style.left = Math.random() * 100 + "%";
        meteor.style.top = -10 + Math.random() * 60 + "%";

        // Random size variation
        const scale = 0.5 + Math.random() * 1;
        meteor.style.height = 80 * scale + "px";

        // Random delay and duration
        meteor.style.animationDelay = Math.random() * 2 + "s";
        meteor.style.animationDuration = 0.8 + Math.random() * 0.8 + "s";

        container.appendChild(meteor);

        // Remove meteor after animation
        setTimeout(() => {
          meteor.remove();
        }, 4000);
      }, i * 50); // Stagger meteor creation
    }

    // Hide container after 3 seconds
    setTimeout(() => {
      container.classList.remove("active");
    }, 3000);
  }

  function openAuthPanel(formType = "login") {
    const landing = document.getElementById("galaxy-landing");
    const authLayer = document.getElementById("auth-layer");

    if (!landing || !authLayer) return;

    isAuthPanelOpen = true;
    currentAuthForm = formType;

    // Trigger meteor shower
    createAuthMeteorShower();

    // Lưu trạng thái để khôi phục khi reload
    sessionStorage.setItem("authPanelOpen", "true");
    sessionStorage.setItem("authFormType", formType);

    // Add split mode to landing
    landing.classList.add("split-mode");

    // Show auth layer
    authLayer.classList.add("active");

    // Show correct form
    switchAuthForm(formType);

    // Focus first input after animation
    setTimeout(() => {
      const firstInput = authLayer.querySelector(
        'input:not([type="checkbox"])',
      );
      if (firstInput) firstInput.focus();
    }, 550);

    console.log("🚀 Auth panel opened:", formType);
  }

  function closeAuthPanel() {
    const landing = document.getElementById("galaxy-landing");
    const authLayer = document.getElementById("auth-layer");

    if (!landing || !authLayer) return;

    isAuthPanelOpen = false;

    // Trigger meteor shower
    createAuthMeteorShower();

    // Xóa trạng thái lưu
    sessionStorage.removeItem("authPanelOpen");
    sessionStorage.removeItem("authFormType");

    // Start closing animations simultaneously
    // 1. Auth layer slides out
    authLayer.classList.remove("active");

    // 2. Galaxy landing expands back with orbit scaling up
    landing.classList.add("closing");

    // After animation completes, clean up classes
    setTimeout(() => {
      landing.classList.remove("split-mode");
      landing.classList.remove("closing");
    }, 550);

    console.log("← Auth panel closed");
  }

  function switchAuthForm(formType) {
    const loginForm = document.getElementById("auth-login-form");
    const registerForm = document.getElementById("auth-register-form");
    const forgotForm = document.getElementById("auth-forgot-form");
    const verifyForm = document.getElementById("auth-verify-form");

    if (!loginForm || !registerForm) return;

    currentAuthForm = formType;

    // Cập nhật trạng thái lưu
    if (isAuthPanelOpen) {
      sessionStorage.setItem("authFormType", formType);
    }

    // Hide all forms
    loginForm.style.display = "none";
    registerForm.style.display = "none";
    if (forgotForm) forgotForm.style.display = "none";
    if (verifyForm) verifyForm.style.display = "none";

    // Show the requested form
    let targetForm = null;
    if (formType === "login") {
      targetForm = loginForm;
    } else if (formType === "register") {
      targetForm = registerForm;
    } else if (formType === "forgot") {
      targetForm = forgotForm;
      // Reset to step 1
      showForgotStep1();
    } else if (formType === "verify") {
      targetForm = verifyForm;
      // Load pending verification email
      initSplitVerifyPage();
    }

    if (targetForm) {
      targetForm.style.display = "block";
      // Re-trigger animation
      targetForm.style.animation = "none";
      targetForm.offsetHeight; // Trigger reflow
      targetForm.style.animation = "authFadeIn 0.4s ease-out";
    }
  }

  function toggleSplitPassword(inputId) {
    const input = document.getElementById(inputId);
    if (input) {
      input.type = input.type === "password" ? "text" : "password";
    }
  }

  // ===== SPLIT AUTH FORM HANDLERS =====
  async function handleSplitLogin() {
    const email = document.getElementById("split-login-email")?.value?.trim();
    const password = document.getElementById("split-login-password")?.value;
    const remember = document.getElementById("split-remember")?.checked;

    if (!email || !password) {
      showAuthToast("Vui lòng nhập đầy đủ thông tin!", "error");
      return;
    }

    // Show loading overlay
    const loadingOverlay = document.getElementById("auth-loading-overlay");
    if (loadingOverlay) {
      const loadingText = loadingOverlay.querySelector(".auth-loading-text");
      if (loadingText) loadingText.textContent = "Đang đăng nhập...";
      loadingOverlay.classList.add("active");
    }

    const submitBtn = document.querySelector(
      "#auth-login-form .auth-submit-btn",
    );
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = "<span>Đang đăng nhập...</span>";
    }

    try {
      // Call existing login function if available
      if (typeof google !== "undefined" && google.script) {
        google.script.run
          .withSuccessHandler((result) => {
            // Hide loading overlay
            if (loadingOverlay) loadingOverlay.classList.remove("active");

            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Đăng nhập</span>";
            }
            if (result.success) {
              // Show galaxy-themed success popup
              showAuthSuccessAndRedirect(
                "Đăng nhập thành công!",
                "Chào mừng bạn quay trở lại",
                "page-dashboard",
                1800,
              );
            } else {
              showAuthToast(result.message || "Đăng nhập thất bại!", "error");
            }
          })
          .withFailureHandler((error) => {
            // Hide loading overlay
            if (loadingOverlay) loadingOverlay.classList.remove("active");

            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Đăng nhập</span>";
            }
            showAuthToast("Lỗi: " + error.message, "error");
          })
          .loginUser({ email, password, remember });
      } else {
        // Fallback for testing - simulate loading
        setTimeout(() => {
          if (loadingOverlay) loadingOverlay.classList.remove("active");

          console.log("Login attempt:", { email, remember });
          // Show galaxy-themed success popup (demo)
          showAuthSuccessAndRedirect(
            "Đăng nhập thành công!",
            "Chào mừng bạn quay trở lại",
            null,
            1800,
          );
          if (submitBtn) {
            submitBtn.disabled = false;
            submitBtn.innerHTML = "<span>Đăng nhập</span>";
          }
        }, 1500);
      }
    } catch (error) {
      console.error("Login error:", error);
      if (loadingOverlay) loadingOverlay.classList.remove("active");
      showAuthToast("Có lỗi xảy ra!", "error");
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "<span>Đăng nhập</span>";
      }
    }
  }

  async function handleSplitRegister() {
    const name = document.getElementById("split-register-name")?.value?.trim();
    const email = document
      .getElementById("split-register-email")
      ?.value?.trim();
    const password = document.getElementById("split-register-password")?.value;
    const confirm = document.getElementById("split-register-confirm")?.value;
    const terms = document.getElementById("split-terms")?.checked;

    if (!name || !email || !password || !confirm) {
      showAuthToast("Vui lòng nhập đầy đủ thông tin!", "error");
      return;
    }

    if (password !== confirm) {
      showAuthToast("Mật khẩu xác nhận không khớp!", "error");
      return;
    }

    if (!terms) {
      showAuthToast("Vui lòng đồng ý với Điều khoản sử dụng!", "warning");
      return;
    }

    const submitBtn = document.querySelector(
      "#auth-register-form .auth-submit-btn",
    );
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = "<span>Đang tạo tài khoản...</span>";
    }

    try {
      if (typeof google !== "undefined" && google.script) {
        google.script.run
          .withSuccessHandler((result) => {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Tạo tài khoản</span>";
            }
            if (result.success) {
              // Lưu email vào localStorage để sử dụng trong trang verify
              localStorage.setItem(
                "pendingVerification",
                JSON.stringify({ email }),
              );
              showAuthToast(
                "Đăng ký thành công! Vui lòng kiểm tra email.",
                "success",
              );
              setTimeout(() => switchAuthForm("verify"), 1500);
            } else {
              showAuthToast(result.message || "Đăng ký thất bại!", "error");
            }
          })
          .withFailureHandler((error) => {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Tạo tài khoản</span>";
            }
            showAuthToast("Lỗi: " + error.message, "error");
          })
          .registerUser({ fullName: name, email, password });
      } else {
        // Fallback for testing
        console.log("Register attempt:", { name, email });
        localStorage.setItem("pendingVerification", JSON.stringify({ email }));
        showAuthToast("Đăng ký thành công (demo)!", "success");
        setTimeout(() => switchAuthForm("verify"), 1500);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = "<span>Tạo tài khoản</span>";
        }
      }
    } catch (error) {
      console.error("Register error:", error);
      showAuthToast("Có lỗi xảy ra!", "error");
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "<span>Tạo tài khoản</span>";
      }
    }
  }

  // ===== FORGOT PASSWORD HANDLERS =====
  function showForgotStep1() {
    const step1 = document.getElementById("auth-forgot-step1");
    const step2 = document.getElementById("auth-forgot-step2");
    if (step1) step1.style.display = "block";
    if (step2) step2.style.display = "none";
  }

  function showForgotStep2() {
    const step1 = document.getElementById("auth-forgot-step1");
    const step2 = document.getElementById("auth-forgot-step2");
    if (step1) step1.style.display = "none";
    if (step2) step2.style.display = "block";
  }

  async function handleSplitForgotPassword() {
    const email = document.getElementById("split-forgot-email")?.value?.trim();

    if (!email) {
      showAuthToast("Vui lòng nhập email!", "error");
      return;
    }

    const submitBtn = document.querySelector(
      "#split-forgot-form .auth-submit-btn",
    );
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = "<span>Đang gửi...</span>";
    }

    try {
      if (typeof google !== "undefined" && google.script) {
        google.script.run
          .withSuccessHandler((result) => {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Gửi mã xác thực</span>";
            }
            if (result.success) {
              showAuthToast(
                "Đã gửi mã xác thực! Vui lòng kiểm tra email.",
                "success",
              );
              document.getElementById("split-reset-email").value = email;
              showForgotStep2();
            } else {
              showAuthToast(result.message || "Gửi mã thất bại!", "error");
            }
          })
          .withFailureHandler((error) => {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Gửi mã xác thực</span>";
            }
            showAuthToast("Lỗi: " + error.message, "error");
          })
          .requestPasswordReset(email);
      } else {
        // Fallback for testing
        console.log("Forgot password request:", { email });
        showAuthToast("Đã gửi mã xác thực (demo)!", "success");
        document.getElementById("split-reset-email").value = email;
        showForgotStep2();
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = "<span>Gửi mã xác thực</span>";
        }
      }
    } catch (error) {
      console.error("Forgot password error:", error);
      showAuthToast("Có lỗi xảy ra!", "error");
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "<span>Gửi mã xác thực</span>";
      }
    }
  }

  async function handleSplitResetPassword() {
    const email = document.getElementById("split-reset-email")?.value;
    const code = document.getElementById("split-reset-code")?.value?.trim();
    const password = document.getElementById("split-reset-password")?.value;
    const confirm = document.getElementById("split-reset-confirm")?.value;

    if (!code || code.length !== 6) {
      showAuthToast("Vui lòng nhập mã 6 chữ số!", "error");
      return;
    }

    if (!password || password.length < 6) {
      showAuthToast("Mật khẩu phải có ít nhất 6 ký tự!", "error");
      return;
    }

    if (password !== confirm) {
      showAuthToast("Mật khẩu xác nhận không khớp!", "error");
      return;
    }

    const submitBtn = document.querySelector(
      "#split-reset-form .auth-submit-btn",
    );
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = "<span>Đang xử lý...</span>";
    }

    try {
      if (typeof google !== "undefined" && google.script) {
        google.script.run
          .withSuccessHandler((result) => {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Xác nhận đổi mật khẩu</span>";
            }
            if (result.success) {
              showAuthToast("Đổi mật khẩu thành công!", "success");
              setTimeout(() => switchAuthForm("login"), 1500);
            } else {
              showAuthToast(
                result.message || "Đổi mật khẩu thất bại!",
                "error",
              );
            }
          })
          .withFailureHandler((error) => {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Xác nhận đổi mật khẩu</span>";
            }
            showAuthToast("Lỗi: " + error.message, "error");
          })
          .resetPasswordWithCode({
            email,
            code,
            newPassword: password,
            confirmPassword: password,
          });
      } else {
        // Fallback for testing
        console.log("Reset password:", { email, code });
        showAuthToast("Đổi mật khẩu thành công (demo)!", "success");
        setTimeout(() => switchAuthForm("login"), 1500);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = "<span>Xác nhận đổi mật khẩu</span>";
        }
      }
    } catch (error) {
      console.error("Reset password error:", error);
      showAuthToast("Có lỗi xảy ra!", "error");
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "<span>Xác nhận đổi mật khẩu</span>";
      }
    }
  }

  function handleSplitResendResetCode() {
    const email = document.getElementById("split-reset-email")?.value;
    if (email) {
      document.getElementById("split-forgot-email").value = email;
      handleSplitForgotPassword();
    }
  }

  // ===== VERIFY EMAIL HANDLERS =====
  let splitVerifyTimer = null;
  let splitVerifySeconds = 60;

  function initSplitVerifyPage() {
    const verificationData = localStorage.getItem("pendingVerification");
    if (verificationData) {
      const data = JSON.parse(verificationData);
      const emailDisplay = document.getElementById(
        "split-verify-email-display",
      );
      if (emailDisplay) {
        emailDisplay.textContent = data.email || "";
      }
    }
    startSplitResendTimer();
  }

  function startSplitResendTimer() {
    const resendBtn = document.getElementById("split-resend-code-btn");
    const timerDisplay = document.getElementById("split-resend-timer");
    const timerSeconds = document.getElementById("split-timer-seconds");

    if (resendBtn) resendBtn.style.display = "none";
    if (timerDisplay) timerDisplay.style.display = "block";

    splitVerifySeconds = 60;

    if (splitVerifyTimer) clearInterval(splitVerifyTimer);

    splitVerifyTimer = setInterval(() => {
      splitVerifySeconds--;
      if (timerSeconds) timerSeconds.textContent = splitVerifySeconds;

      if (splitVerifySeconds <= 0) {
        clearInterval(splitVerifyTimer);
        if (resendBtn) resendBtn.style.display = "inline";
        if (timerDisplay) timerDisplay.style.display = "none";
        splitVerifySeconds = 60;
      }
    }, 1000);
  }

  async function handleSplitVerifyEmail() {
    const code = document.getElementById("split-verify-code")?.value?.trim();

    if (!code || code.length !== 6) {
      showAuthToast("Vui lòng nhập mã 6 chữ số!", "error");
      return;
    }

    const submitBtn = document.querySelector(
      "#split-verify-form .auth-submit-btn",
    );
    if (submitBtn) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = "<span>Đang xác thực...</span>";
    }

    try {
      const verificationData = localStorage.getItem("pendingVerification");
      let email = "";
      if (verificationData) {
        const data = JSON.parse(verificationData);
        email = data.email;
      }

      if (typeof google !== "undefined" && google.script) {
        google.script.run
          .withSuccessHandler((result) => {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Xác thực</span>";
            }
            if (result.success) {
              showAuthToast("Xác thực thành công!", "success");
              localStorage.removeItem("pendingVerification");
              setTimeout(() => {
                closeAuthPanel();
                switchAuthForm("login");
              }, 1500);
            } else {
              showAuthToast(result.message || "Xác thực thất bại!", "error");
            }
          })
          .withFailureHandler((error) => {
            if (submitBtn) {
              submitBtn.disabled = false;
              submitBtn.innerHTML = "<span>Xác thực</span>";
            }
            showAuthToast("Lỗi: " + error.message, "error");
          })
          .verifyEmail({ email, code });
      } else {
        // Fallback for testing
        console.log("Verify email:", { email, code });
        showAuthToast("Xác thực thành công (demo)!", "success");
        localStorage.removeItem("pendingVerification");
        setTimeout(() => switchAuthForm("login"), 1500);
        if (submitBtn) {
          submitBtn.disabled = false;
          submitBtn.innerHTML = "<span>Xác thực</span>";
        }
      }
    } catch (error) {
      console.error("Verify email error:", error);
      showAuthToast("Có lỗi xảy ra!", "error");
      if (submitBtn) {
        submitBtn.disabled = false;
        submitBtn.innerHTML = "<span>Xác thực</span>";
      }
    }
  }

  async function handleSplitResendVerifyCode() {
    const verificationData = localStorage.getItem("pendingVerification");
    if (!verificationData) {
      showAuthToast("Không tìm thấy thông tin xác thực!", "error");

    }

    const data = JSON.parse(verificationData);
    const email = data.email;

    try {
      if (typeof google !== "undefined" && google.script) {

            if (result.success) {
              showAuthToast("Đã gửi lại mã xác thực!", "success");
              startSplitResendTimer();
            } else {
              showAuthToast(result.message || "Gửi lại thất bại!", "error");

          })
          .withFailureHandler((error) => {

        startSplitResendTimer();

  // ===== PLANET FOCUS SYSTEM =====
  function focusPlanet(planetId) {
    // Don't show info-capsule when auth panel is open
    if (isAuthPanelOpen) {
      return;
    }

    const landing = document.getElementById("galaxy-landing");
    const capsules = document.querySelectorAll(".info-capsule");

    // If clicking the same planet, close it
    if (GalaxyState.focusedPlanet === planetId) {
      resetFocus();
      return;
    }

    GalaxyState.focusedPlanet = planetId;

    // Add focus mode
    landing.classList.add("focus-mode");

    // Slow down the focused planet's orbit
    const planetWrapper = document.querySelector(`[data-planet="${planetId}"]`);
    if (planetWrapper) {
      planetWrapper.style.animationPlayState = "paused";
    }

    // Show corresponding capsule
    capsules.forEach((capsule) => {
      capsule.classList.remove("active");
      if (capsule.dataset.capsule === planetId) {
        capsule.classList.add("active");
      }
    });

    // Track event
    trackEvent("planet_focus", { planet: planetId });
  }

  function resetFocus() {
    const landing = document.getElementById("galaxy-landing");
    const capsules = document.querySelectorAll(".info-capsule");
    const planetWrappers = document.querySelectorAll(".planet-wrapper");

    GalaxyState.focusedPlanet = null;

    // Remove focus mode
    landing.classList.remove("focus-mode");

    // Resume all orbits
    planetWrappers.forEach((wrapper) => {
      wrapper.style.animationPlayState = "running";
    });

    // Hide all capsules
    capsules.forEach((capsule) => {
      capsule.classList.remove("active");
    });
  }

  // ===== DEMO MODAL SYSTEM =====
  function openDemo(type) {
    // Close auth panel if open
    if (isAuthPanelOpen) {
      closeAuthPanel();
    }

    const overlay = document.getElementById("demo-modal-overlay");
    if (!overlay) return;

    const demoContents = document.querySelectorAll(".demo-content");
    const capsules = document.querySelectorAll(".info-capsule");

    GalaxyState.isDemoOpen = true;
    GalaxyState.demoType = type;

    // Hide all info-capsules first
    capsules.forEach((capsule) => {
      capsule.classList.remove("active");
    });

    // Reset all demo states
    resetDemoStates();

    // Show overlay
    overlay.classList.add("active");

    // Show specific demo content
    demoContents.forEach((content) => {
      content.classList.remove("active");
      if (content.id === `demo-${type}`) {
        content.classList.add("active");
      }
    });

    // Track event
    trackEvent("demo_open", { type: type });
  }

  function closeDemoModal(event) {
    if (event && event.target !== event.currentTarget) return;

    const overlay = document.getElementById("demo-modal-overlay");
    overlay.classList.remove("active");

    GalaxyState.isDemoOpen = false;
    GalaxyState.demoType = null;

    // Also reset focus mode
    resetFocus();
  }

  function resetDemoStates() {
    // Reset MCQ options
    document.querySelectorAll(".demo-option").forEach((option) => {
      option.classList.remove("correct", "incorrect", "disabled");
    });

    // Hide all feedback
    document.querySelectorAll(".demo-feedback").forEach((feedback) => {
      feedback.classList.remove("show", "correct", "incorrect");
      feedback.textContent = "";
    });

    // Reset matching
    document.querySelectorAll(".matching-slot").forEach((slot) => {
      slot.classList.remove("matched", "dragover");
    });
    document.querySelectorAll(".matching-term").forEach((term) => {
      term.classList.remove("dragging");
      term.style.display = "";
    });
  }

  // ===== DEMO ANSWER CHECKING =====
  function checkDemoAnswer(button) {
    const isCorrect = button.dataset.correct === "true";
    const container = button.closest(".demo-content");
    const feedbackId = `demo-feedback-${container.id.replace("demo-", "")}`;
    const feedback = document.getElementById(feedbackId);
    const allOptions = container.querySelectorAll(".demo-option");

    // Disable all options
    allOptions.forEach((opt) => {
      opt.classList.add("disabled");
      if (opt.dataset.correct === "true") {
        opt.classList.add("correct");
      }
    });

    // Mark selected answer
    if (!isCorrect) {
      button.classList.add("incorrect");
    }

    // Show feedback
    if (feedback) {
      feedback.classList.add("show");
      if (isCorrect) {
        feedback.classList.add("correct");
        feedback.innerHTML =
          "✅ <strong>Chính xác!</strong> Biến trong Python phải bắt đầu bằng chữ cái hoặc dấu gạch dưới (_).";
      } else {
        feedback.classList.add("incorrect");
        feedback.innerHTML =
          "❌ <strong>Chưa đúng.</strong> Đáp án đúng là B. Biến không thể bắt đầu bằng số hoặc ký tự đặc biệt.";
      }
    }

    // Track event
    trackEvent("demo_complete", {
      type: GalaxyState.demoType,
      correct: isCorrect,
    });
  }

  // ===== LEGAL MODAL SYSTEM =====
  function openModal(type) {
    const overlay = document.getElementById("legal-modal-overlay");
    const legalContents = document.querySelectorAll(".legal-content");

    GalaxyState.isLegalOpen = true;

  function closeLegalModal(event) {
    if (event && event.target !== event.currentTarget) return;

    const overlay = document.getElementById("legal-modal-overlay");
    overlay.classList.remove("active");

    GalaxyState.isLegalOpen = false;

  // ===== MATCHING DEMO DRAG & DROP =====
  function initMatchingDemo() {
    const terms = document.querySelectorAll(".matching-term");
    const slots = document.querySelectorAll(".matching-slot");

    terms.forEach((term) => {
      term.addEventListener("dragstart", handleDragStart);
      term.addEventListener("dragend", handleDragEnd);
    });

    slots.forEach((slot) => {
      slot.addEventListener("dragover", handleDragOver);
      slot.addEventListener("dragleave", handleDragLeave);
      slot.addEventListener("drop", handleDrop);
    });
  }

  let draggedItem = null;

  function handleDragStart(e) {
    draggedItem = e.target;
    e.target.classList.add("dragging");
    e.dataTransfer.effectAllowed = "move";
    e.dataTransfer.setData("text/plain", e.target.dataset.match);
  }

  function handleDragEnd(e) {
    e.target.classList.remove("dragging");
    draggedItem = null;
  }

  function handleDragOver(e) {
    e.preventDefault();
    e.target.classList.add("dragover");
  }

  function handleDragLeave(e) {
    e.target.classList.remove("dragover");
  }

  function handleDrop(e) {
    e.preventDefault();
    e.target.classList.remove("dragover");

    const matchId = e.dataTransfer.getData("text/plain");
    const acceptId = e.target.dataset.accept;

    if (matchId === acceptId) {
      e.target.classList.add("matched");
      e.target.textContent = `${draggedItem.textContent} → ${e.target.textContent}`;
      draggedItem.style.display = "none";

      // Check if all matched
      const allSlots = document.querySelectorAll(".matching-slot");
      const matchedSlots = document.querySelectorAll(".matching-slot.matched");

      if (allSlots.length === matchedSlots.length) {
        const feedback = document.getElementById("demo-feedback-matching");
        if (feedback) {
          feedback.classList.add("show", "correct");
          feedback.innerHTML =
            "🎉 <strong>Tuyệt vời!</strong> Bạn đã ghép đúng tất cả!";
        }
        trackEvent("demo_complete", { type: "matching", correct: true });
      }
    }
  }

  // ===== PARALLAX EFFECT =====
  function initParallax() {
    const starsNear = document.querySelector(".stars-near");
    const starsFar = document.querySelector(".stars-far");

    document.addEventListener("mousemove", (e) => {
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches) return;

      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;

      if (starsNear) {
        starsNear.style.transform = `translate(${x * 12}px, ${y * 12}px)`;
      }
      if (starsFar) {
        starsFar.style.transform = `translate(${x * 6}px, ${y * 6}px)`;
      }
    });
  }

  // ===== KEYBOARD NAVIGATION =====
  function initKeyboardNav() {
    document.addEventListener("keydown", (e) => {
      // ESC to close modals/focus
      if (e.key === "Escape") {
        if (isAuthPanelOpen) {
          closeAuthPanel();
        } else if (GalaxyState.isDemoOpen) {
          closeDemoModal();
        } else if (GalaxyState.isLegalOpen) {
          closeLegalModal();
        } else if (GalaxyState.focusedPlanet) {
          resetFocus();
        }
      }
    });
  }

  // ===== EVENT TRACKING =====
  function trackEvent(eventName, data) {
    console.log(`📊 Track: ${eventName}`, data);
    // Future: Send to analytics
  }

  // ===== INTRO ANIMATION =====
  function playIntroAnimation() {
    const corePlanet = document.getElementById("core-planet");
    const tagline = document.getElementById("core-tagline");

    // Core planet appears with pulse
    if (corePlanet) {
      corePlanet.style.animation = "coreFadeIn 1s ease-out forwards";
    }
  }

  // ===== CHECK AUTH STATUS =====
  function checkAuthStatus() {
    const currentUser =
      localStorage.getItem("currentUser") ||
      sessionStorage.getItem("currentUser");

    if (currentUser) {
      // User is logged in, update CTA
      const ctaPrimary = document.querySelector(".cta-primary");
      if (ctaPrimary) {
        ctaPrimary.innerHTML =
          '<span class="cta-icon">🚀</span><span>Vào Dashboard</span>';
        ctaPrimary.onclick = () => {
          if (typeof showPage === "function") {
            showPage("page-dashboard");
          }
        };
      }

      const ctaGhost = document.querySelector(".cta-ghost");
      if (ctaGhost) {
        ctaGhost.style.display = "none";
      }
    }
  }

  // ===== TYPING EFFECT FOR CODE SLOGAN =====
  function initCodeSloganTyping() {
    const container = document.getElementById("code-slogan");
    const line1 = document.getElementById("slogan-line-1");
    const line2 = document.getElementById("slogan-line-2");
    const line3 = document.getElementById("slogan-line-3");

    if (!container || !line1 || !line2 || !line3) return;

    // Lines to type with syntax highlighting
    const lines = [
      {
        el: line1,
        html: '&lt;<span class="keyword-blue">Hello World</span>, Master <span class="highlight-cyan">O</span><span class="highlight-orange">.</span><span class="highlight-lime">uiz</span> /&gt;',
        speed: 40,
      },
      {
        el: line2,
        html: '<span class="keyword-blue">if</span> (<span class="var-white">knowledge</span> &lt; <span class="string-orange">100%</span>) { <span class="keyword-purple">return</span> <span class="string-lime">"Practice"</span>; }',
        speed: 30,
      },
      {
        el: line3,
        html: '<span class="ready-text">_Ready to Code?</span><span class="blink-cursor">█</span>',
        speed: 50,
      },
    ];

    // Extract plain text from HTML for typing
    function stripHtml(html) {
      const tmp = document.createElement("div");
      tmp.innerHTML = html;
      return tmp.textContent || tmp.innerText || "";
    }

    // Type one line character by character
    async function typeLine(lineObj) {
      const plainText = stripHtml(lineObj.html);
      lineObj.el.innerHTML = '<span class="blink-cursor">█</span>';

      for (let i = 0; i <= plainText.length; i++) {
        lineObj.el.innerHTML =
          plainText.substring(0, i) + '<span class="blink-cursor">█</span>';
        await new Promise((r) => setTimeout(r, lineObj.speed));
      }

      // Replace with full styled HTML
      lineObj.el.innerHTML = lineObj.html;
    }

    // Clear all lines
    function clearLines() {
      line1.innerHTML = "";
      line2.innerHTML = "";
      line3.innerHTML = "";
    }

    // Run full typing sequence
    async function runTypingSequence() {
      container.classList.add("visible");
      await new Promise((r) => setTimeout(r, 300));

      for (let i = 0; i < lines.length; i++) {
        await typeLine(lines[i]);
        if (i < lines.length - 1) {
          await new Promise((r) => setTimeout(r, 300));
        }
      }
    }

    // Start immediately, then loop every 19 seconds
    runTypingSequence();

    setInterval(async () => {
      clearLines();
      await runTypingSequence();
    }, 19000);
  }

  // ===== INITIALIZATION =====
  function initGalaxyLanding() {
    console.log("🌌 Initializing Galaxy Landing...");

    initMatchingDemo();
    initParallax();
    initKeyboardNav();
    checkAuthStatus();
    playIntroAnimation();
    initCodeSloganTyping();

    // Khôi phục trạng thái auth panel khi reload trang
    restoreAuthPanelState();

    // Close capsule when clicking outside
    document.addEventListener("click", (e) => {
      const isClickOnPlanet =
        e.target.closest(".planet") || e.target.closest(".core-planet");
      const isClickOnCapsule = e.target.closest(".info-capsule");

      if (!isClickOnPlanet && !isClickOnCapsule && GalaxyState.focusedPlanet) {
        resetFocus();
      }
    });

    console.log("✅ Galaxy Landing initialized");
  }

  // Khôi phục trạng thái auth panel khi reload
  function restoreAuthPanelState() {
    const savedPanelOpen = sessionStorage.getItem("authPanelOpen");
    const savedFormType = sessionStorage.getItem("authFormType");

    if (savedPanelOpen === "true" && savedFormType) {
      console.log("🔄 Restoring auth panel state:", savedFormType);
      // Delay nhỏ để đảm bảo DOM đã sẵn sàng
      setTimeout(() => {
        openAuthPanel(savedFormType);
      }, 100);
    }
  }

  // Run on load
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", initGalaxyLanding);
  } else {
    initGalaxyLanding();
  }

  // ===== CONSOLE WELCOME =====
  console.log(
    "%c🌌 O.uiz Galaxy",
    "background: linear-gradient(135deg, #1a0a3e, #2563eb); color: white; font-size: 20px; font-weight: bold; padding: 10px 20px; border-radius: 8px;",
  );
  console.log(
    "%cHọc lập trình cơ bản qua trò chơi vũ trụ 🚀",
    "font-size: 14px; color: #a78bfa;",
  );
</script>
