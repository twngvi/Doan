<script>
// ===== NAVIGATION FUNCTIONS =====
function navigateToLogin() {
    showPage('page-login');
}

function navigateToRegister() {
    showPage('page-register');
}

function scrollToSection(sectionId) {
    const section = document.getElementById(sectionId);
    if (section) {
        section.scrollIntoView({ behavior: 'smooth', block: 'start' });
        
        // Update active nav link
        document.querySelectorAll('.landing-nav-link').forEach(link => {
            link.classList.remove('active');
        });
        event.target.classList.add('active');
    }
}

// ===== NAVIGATION SCROLL EFFECT =====
window.addEventListener('scroll', () => {
    const navbar = document.querySelector('.landing-navbar');
    if (navbar) {
        if (window.pageYOffset > 50) {
            navbar.classList.add('scrolled');
        } else {
            navbar.classList.remove('scrolled');
        }
    }
});

// ===== PARALLAX EFFECT FOR HERO SHAPES =====
window.addEventListener('mousemove', (e) => {
    const shapes = document.querySelectorAll('.landing-hero-shape');
    const mouseX = e.clientX / window.innerWidth;
    const mouseY = e.clientY / window.innerHeight;
    
    shapes.forEach((shape, index) => {
        const speed = (index + 1) * 0.5;
        const x = (mouseX - 0.5) * speed * 50;
        const y = (mouseY - 0.5) * speed * 50;
        
        shape.style.transform = `translate(${x}px, ${y}px)`;
    });
});

// ===== CONSOLE WELCOME MESSAGE =====
console.log('%c🎮 CodeQuest ', 'background: #2563EB; color: white; font-size: 20px; font-weight: bold; padding: 10px;');
console.log('%cChào mừng bạn đến với CodeQuest! 🚀', 'font-size: 14px; color: #2563EB;');
console.log('%cHọc lập trình qua trò chơi - Vui học, Hiệu quả cao!', 'font-size: 12px; color: #6B7280;');
</script>
