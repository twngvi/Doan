<style>
  /* ===== CODARY GALAXY LANDING - IMMERSIVE SPACE THEME ===== */

  /* CSS Variables */
  :root {
    --galaxy-dark: #f7fee7;
    --galaxy-deep: #ecfccb;
    --galaxy-purple: #dcfce7;
    --galaxy-blue: #d9f99d;
    --star-white: #14532d;
    --star-blue: #166534;
    --star-purple: #15803d;
    --nebula-pink: rgba(34, 197, 94, 0.12);
    --nebula-blue: rgba(16, 185, 129, 0.1);
    --planet-glow: rgba(22, 163, 74, 0.32);
    --core-glow: rgba(22, 163, 74, 0.42);
    --accent-lime: #84cc16;
    --accent-cyan: #10b981;
    --accent-orange: #22c55e;
    --primary-blue: #16a34a;
    --primary-light: #22c55e;
    --white: #ffffff;
    --text-light: rgba(20, 83, 45, 0.95);
    --text-muted: rgba(22, 101, 52, 0.72);
    --glass-bg: rgba(236, 253, 245, 0.72);
    --glass-border: rgba(34, 197, 94, 0.3);
    --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ===== BASE STYLES ===== */
  .galaxy-landing {
    position: fixed; /* Fixed để luôn full viewport */
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    max-width: 100%; /* Ngăn vượt quá viewport */
    max-height: 100%; /* Ngăn vượt quá viewport */
    overflow: hidden !important; /* Ẩn mọi overflow */
    font-family:
      "Inter",
      -apple-system,
      BlinkMacSystemFont,
      sans-serif;
    color: var(--text-light);
    background: var(--galaxy-dark);
    /* Tạo stacking context mới */
    isolation: isolate;
  }

  .galaxy-landing * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ===== GALAXY BACKGROUND ===== */
  .galaxy-bg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    max-width: 100vw; /* Không vượt viewport */
    max-height: 100vh; /* Không vượt viewport */
    background: radial-gradient(
      ellipse at 50% 50%,
      var(--galaxy-purple) 0%,
      var(--galaxy-deep) 45%,
      var(--galaxy-dark) 100%
    );
    overflow: hidden !important;
    pointer-events: none; /* Không chặn click */
  }

  /* Stars Layers */
  .stars-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
    background-image:
      radial-gradient(1px 1px at 10% 20%, var(--star-white) 100%, transparent),
      radial-gradient(1px 1px at 30% 60%, var(--star-blue) 100%, transparent),
      radial-gradient(
        1.5px 1.5px at 50% 10%,
        var(--star-white) 100%,
        transparent
      ),
      radial-gradient(1px 1px at 70% 40%, var(--star-purple) 100%, transparent),
      radial-gradient(1px 1px at 90% 80%, var(--star-white) 100%, transparent),
      radial-gradient(
        1.5px 1.5px at 15% 85%,
        var(--star-blue) 100%,
        transparent
      ),
      radial-gradient(1px 1px at 45% 75%, var(--star-white) 100%, transparent),
      radial-gradient(1px 1px at 85% 15%, var(--star-purple) 100%, transparent);
    background-size: 200px 200px;
    animation: twinkle 4s ease-in-out infinite;
    pointer-events: none;
  }

  .stars-near {
    opacity: 0.8;
    animation-delay: 0s;
  }

  .stars-far {
    opacity: 0.4;
    background-size: 300px 300px;
    animation-delay: 2s;
  }

  @keyframes twinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  /* Nebula Layer */
  .nebula-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
    background:
      radial-gradient(
        ellipse 80% 50% at 20% 30%,
        var(--nebula-pink),
        transparent
      ),
      radial-gradient(
        ellipse 60% 40% at 80% 70%,
        var(--nebula-blue),
        transparent
      );
    opacity: 0.6;
    filter: blur(60px);
  }

  /* ===== FIREFLY FIELD ===== */
  .meteor-shower {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    max-width: 100vw;
    max-height: 100vh;
    overflow: hidden !important;
    pointer-events: none;
  }

  .firefly {
    position: absolute;
    width: 6px;
    height: 6px;
    background: radial-gradient(circle, rgba(22, 163, 74, 0.98) 0%, rgba(21, 128, 61, 0.35) 58%, transparent 100%);
    border-radius: 50%;
    opacity: 0;
    box-shadow: 0 0 8px rgba(22, 163, 74, 0.65);
    animation: fireflyFloat 6s ease-in-out forwards;
  }

  .firefly::before {
    content: "";
    position: absolute;
    inset: -6px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34, 197, 94, 0.35) 0%, transparent 75%);
    animation: fireflyPulse 1.9s ease-in-out infinite;
  }

  @keyframes fireflyFloat {
    0% {
      opacity: 0;
      transform: translate3d(0, 12px, 0) scale(0.7);
    }
    15% {
      opacity: 1;
    }
    80% {
      opacity: 0.9;
      transform: translate3d(18px, -20px, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate3d(-14px, -36px, 0) scale(0.75);
    }
  }

  @keyframes fireflyPulse {
    0%,
    100% {
      transform: scale(0.8);
      opacity: 0.35;
    }
    50% {
      transform: scale(1.15);
      opacity: 0.85;
    }
  }

  /* ===== HOME LOGO ===== */
  .galaxy-home-logo {
    position: fixed;
    top: 28px;
    left: 28px;
    z-index: 100;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: auto;
    padding: 0;
    border: 0;
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    cursor: pointer;
    transition:
      transform var(--transition-smooth),
      filter var(--transition-smooth);
    filter: drop-shadow(0 0 10px rgba(34, 211, 238, 0.35));
    overflow: visible;
  }

  .galaxy-home-logo:hover {
    transform: scale(1.08);
    filter:
      drop-shadow(0 0 12px rgba(34, 211, 238, 0.7))
      drop-shadow(0 0 28px rgba(59, 130, 246, 0.55));
  }

  .galaxy-home-logo-image {
    display: block;
    width: 120px;
    height: auto;
    max-width: none;
    transition: transform var(--transition-smooth);
  }

  .galaxy-home-logo:hover .galaxy-home-logo-image {
    transform: scale(1.02);
  }

  .landing-logo-accessories {
    position: absolute;
    top: 4px;
    left: calc(100% + 10px);
    display: flex;
    align-items: flex-start;
    gap: 6px;
    pointer-events: none;
  }

  .landing-logo-accessory {
    display: block;
    height: auto;
    filter: drop-shadow(0 6px 16px rgba(34, 197, 94, 0.28));
  }

  .landing-logo-accessory-1 {
    width: 34px;
  }

  .landing-logo-accessory-2 {
    width: 30px;
    margin-top: 8px;
  }

  /* ===== CODE-STYLE SLOGAN ===== */
  .code-slogan-container {
    position: absolute;
    bottom: 100px;
    right: 24px;
    text-align: left;
    z-index: 20;
    font-family: "Consolas", "Fira Code", "Courier New", monospace;
    opacity: 1;
    transform: translateY(0);
  }

  .code-slogan-container.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .code-slogan-line {
    min-height: 1.5em;
    margin-bottom: 0.5rem;
    white-space: pre-wrap;
    overflow: hidden;
  }

  .code-slogan-line:last-child {
    margin-bottom: 0;
  }

  .code-slogan-main {
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 700;
    color: var(--white);
    letter-spacing: 1px;
    position: relative;
    display: inline-block;
  }

  /* Syntax Highlighting Colors */
  .highlight-cyan {
    color: var(--accent-cyan);
  }
  .highlight-orange {
    color: var(--accent-orange);
  }
  .highlight-lime {
    color: var(--accent-lime);
  }
  .keyword-blue {
    color: #569cd6;
  }
  .keyword-purple {
    color: #c586c0;
  }
  .var-white {
    color: #9cdcfe;
  }
  .string-orange {
    color: #ce9178;
  }
  .string-lime {
    color: #6a9955;
  }

  .code-slogan-sub {
    font-size: clamp(0.75rem, 1.5vw, 1rem);
    margin-top: 0.75rem;
    opacity: 0.85;
  }

  .code-slogan-ready {
    font-size: clamp(1rem, 2vw, 1.5rem);
    margin-top: 1.25rem;
    color: var(--accent-cyan);
  }

  .ready-text {
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-lime));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Blinking Cursor Effect */
  .blink-cursor {
    display: inline-block;
    color: var(--accent-lime);
    animation: blinkCursor 1s step-end infinite;
    margin-left: 2px;
  }

  @keyframes blinkCursor {
    0%,
    50% {
      opacity: 1;
    }
    51%,
    100% {
      opacity: 0;
    }
  }

  /* Glitch Effect */
  .glitch {
    animation: glitch 3s infinite;
  }

  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
  }

  .glitch::before {
    color: #ff0080;
    z-index: -1;
  }

  .glitch::after {
    color: #00ffff;
    z-index: -2;
  }

  @keyframes glitch {
    0%,
    90%,
    100% {
      opacity: 1;
    }
    92% {
      opacity: 0.8;
    }
    92.5% {
      opacity: 1;
    }
    93% {
      opacity: 0.9;
    }
  }

  .glitch:hover::before {
    animation: glitchBefore 0.3s linear infinite;
    opacity: 0.8;
  }

  .glitch:hover::after {
    animation: glitchAfter 0.3s linear infinite;
    opacity: 0.8;
  }

  @keyframes glitchBefore {
    0% {
      transform: translate(-2px, 0);
    }
    20% {
      transform: translate(2px, -1px);
    }
    40% {
      transform: translate(-1px, 1px);
    }
    60% {
      transform: translate(1px, 0);
    }
    80% {
      transform: translate(-1px, -1px);
    }
    100% {
      transform: translate(2px, 1px);
    }
  }

  @keyframes glitchAfter {
    0% {
      transform: translate(2px, 0);
    }
    20% {
      transform: translate(-2px, 1px);
    }
    40% {
      transform: translate(1px, -1px);
    }
    60% {
      transform: translate(-1px, 0);
    }
    80% {
      transform: translate(1px, 1px);
    }
    100% {
      transform: translate(-2px, -1px);
    }
  }

  /* ===== ORBIT SYSTEM ===== */
  .orbit-system {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1800px;
    height: 900px;
    max-width: 98vw;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Orbit Rings - Ellipse shape (1.5x scale) */
  .orbit-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(22, 101, 52, 0.45);
    border-radius: 50%;
    pointer-events: none;
  }

  /* Animation for closing auth panel */
  .galaxy-landing.closing {
    animation: landingExpandBack 0.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  }

  /* Orbit system uses transition, not animation to preserve planet rotation */
  .galaxy-landing.closing .orbit-system {
    transform: translate(-50%, -50%) scale(1);
  }

  .galaxy-landing.closing .cta-dock {
    animation: fadeInUp 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
  }

  .galaxy-landing.closing .code-slogan-container {
    animation: fadeIn 0.5s cubic-bezier(0.4, 0, 0.2, 1) 0.3s forwards;
  }

  .galaxy-landing.closing .capsules-container {
    animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
  }

  .galaxy-landing.closing .core-tagline {
    animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) 0.2s forwards;
  }

  @keyframes landingExpandBack {
    from {
      width: 50%;
    }
    to {
      width: 100%;
    }
  }

  @keyframes orbitScaleUp {
    from {
      transform: translate(-50%, -50%) scale(0.45);
    }
    to {
      transform: translate(-50%, -50%) scale(1);
    }
  }

  @keyframes fadeIn {
    from {
      opacity: 0;
      visibility: hidden;
    }
    to {
      opacity: 1;
      visibility: visible;
    }
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      visibility: hidden;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
  }

  .orbit-1 {
    width: 270px;
    height: 135px;
  }
  .orbit-2 {
    width: 450px;
    height: 225px;
  }
  .orbit-3 {
    width: 660px;
    height: 330px;
  }
  .orbit-4 {
    width: 900px;
    height: 450px;
  }
  .orbit-5 {
    width: 1170px;
    height: 585px;
  }

  /* ===== CORE PLANET (SUN) ===== */
  .core-planet {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 75px;
    height: 75px;
    cursor: pointer;
    z-index: 10;
  }

  .core-glow {
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, var(--core-glow) 0%, transparent 70%);
    border-radius: 50%;
    animation: corePulse 3s ease-in-out infinite;
  }

  @keyframes corePulse {
    0%,
    100% {
      transform: scale(1);
      opacity: 0.6;
    }
    50% {
      transform: scale(1.15);
      opacity: 0.9;
    }
  }

  .core-ring {
    position: absolute;
    inset: -5px;
    border: 1px solid rgba(22, 163, 74, 0.42);
    border-radius: 50%;
    animation: coreRingSpin 20s linear infinite;
  }

  @keyframes coreRingSpin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }

  .core-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #86efac 0%, #22c55e 50%, #15803d 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 40px rgba(34, 197, 94, 0.45),
      inset 0 -10px 30px rgba(0, 0, 0, 0.2);
    transition: transform var(--transition-bounce);
  }

  .core-planet:hover .core-body {
    transform: scale(1.08);
  }

  .core-icon {
    font-size: 1.2rem;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
  }

  .core-label {
    display: none;
  }

  /* Core Logo Text Style */
  .core-logo-text {
    display: flex;
    align-items: baseline;
    font-family: "Fredoka One", "Baloo 2", sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
  }

  .core-logo-text .core-o {
    color: #052e16;
    text-shadow: 0 0 10px rgba(240, 253, 244, 0.8);
  }

  .core-logo-text .core-dot {
    color: var(--accent-orange);
    margin-left: 1px;
    animation: coreDotPulse 1.5s ease-in-out infinite;
  }

  @keyframes coreDotPulse {
    0%,
    100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.3);
    }
  }

  .core-label {
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1rem;
    font-weight: 700;
    color: var(--text-light);
    white-space: nowrap;
    text-shadow: 0 2px 8px rgba(20, 83, 45, 0.16);
  }

  /* ===== TAGLINE ===== */
  .core-tagline {
    position: absolute;
    top: calc(50% + 200px);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    max-width: 450px;
    opacity: 1;
    animation: taglineFadeIn 1.2s ease-out 0.5s both;
    z-index: 10;
  }

  @keyframes taglineFadeIn {
    from {
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  }

  .tagline-text {
    font-size: 1.375rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 1rem;
    color: var(--text-light);
    text-shadow: 0 2px 18px rgba(22, 101, 52, 0.18);
  }

  .tagline-chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    animation: chipsSlideIn 0.8s ease-out 1.5s both;
  }

  @keyframes chipsSlideIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .tagline-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.375rem 0.75rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 9999px;
    font-size: 0.8125rem;
    font-weight: 500;
    backdrop-filter: blur(10px);
    transition: all var(--transition-smooth);
  }

  .tagline-chip:hover {
    background: rgba(167, 243, 208, 0.45);
    transform: translateY(-2px);
  }

  /* ===== ORBITING PLANETS ===== */
  .planet-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;

    /* CSS Motion Path - bám đường cong chính xác */
    offset-anchor: center;
    offset-rotate: 0deg;
  }

  /* Keyframe chung cho tất cả quỹ đạo */
  @keyframes orbitRun {
    0% {
      offset-distance: 0%;
    }
    100% {
      offset-distance: 100%;
    }
  }

  /* Orbit 1: 270x135 => Bán kính 135px 67.5px */
  .orbit-path-1 {
    offset-path: ellipse(135px 67.5px at center);
    animation: orbitRun 14s linear infinite;
  }

  /* Orbit 2: 450x225 => Bán kính 225px 112.5px - ngược chiều */
  .orbit-path-2 {
    offset-path: ellipse(225px 112.5px at center);
    animation: orbitRun 18s linear infinite reverse;
  }

  /* Orbit 3: 660x330 => Bán kính 330px 165px */
  .orbit-path-3 {
    offset-path: ellipse(330px 165px at center);
    animation: orbitRun 23s linear infinite;
  }

  /* Orbit 4: 900x450 => Bán kính 450px 225px - ngược chiều */
  .orbit-path-4 {
    offset-path: ellipse(450px 225px at center);
    animation: orbitRun 28s linear infinite reverse;
  }

  /* Orbit 5: 1170x585 => Bán kính 585px 292.5px */
  .orbit-path-5 {
    offset-path: ellipse(585px 292.5px at center);
    animation: orbitRun 35s linear infinite;
  }

  .planet {
    position: relative;
    width: 54px;
    height: 54px;
    cursor: pointer;
    transition: all var(--transition-smooth);
    /* Center the planet on the wrapper point */
    margin-left: -27px;
    margin-top: -27px;
  }

  .planet-glow {
    position: absolute;
    inset: -12px;
    background: radial-gradient(circle, var(--planet-glow) 0%, transparent 70%);
    border-radius: 50%;
    opacity: 0.5;
    transition: opacity var(--transition-smooth);
  }

  .planet:hover .planet-glow {
    opacity: 1;
  }

  .planet-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #86efac 0%, #22c55e 50%, #15803d 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow:
      0 0 20px rgba(22, 163, 74, 0.35),
      inset 0 -5px 15px rgba(0, 0, 0, 0.2);
    transition: transform var(--transition-bounce);
  }

  .planet:hover .planet-body {
    transform: scale(1.15);
  }

  /* Planet color variations */
  .orbit-path-1 .planet-body {
    background: linear-gradient(135deg, #bbf7d0 0%, #4ade80 50%, #16a34a 100%);
  }
  .orbit-path-2 .planet-body {
    background: linear-gradient(135deg, #6ee7b7 0%, #10b981 50%, #047857 100%);
  }
  .orbit-path-3 .planet-body {
    background: linear-gradient(135deg, #d9f99d 0%, #84cc16 50%, #3f6212 100%);
  }
  .orbit-path-4 .planet-body {
    background: linear-gradient(135deg, #a7f3d0 0%, #22c55e 50%, #166534 100%);
  }
  .orbit-path-5 .planet-body {
    background: linear-gradient(135deg, #bef264 0%, #65a30d 50%, #365314 100%);
  }

  .planet-icon {
    font-size: 1.5rem;
    filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.2));
  }

  .planet-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-light);
    white-space: nowrap;
    text-shadow: 0 1px 8px rgba(20, 83, 45, 0.2);
    opacity: 0.8;
    transition: opacity var(--transition-smooth);
  }

  .planet:hover .planet-label {
    opacity: 1;
  }

  /* ===== SATURN RING EFFECT ===== */
  .saturn-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotateX(70deg);
    width: 82px;
    height: 82px;
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 50%;
    pointer-events: none;
  }

  .saturn-ring::before {
    content: "";
    position: absolute;
    inset: -7px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 50%;
  }

  /* Apply Saturn ring to orbit-path-2 and orbit-path-4 */
  .orbit-path-2 .saturn-ring {
    border-color: rgba(52, 211, 153, 0.4);
  }
  .orbit-path-2 .saturn-ring::before {
    border-color: rgba(52, 211, 153, 0.2);
  }
  .orbit-path-4 .saturn-ring {
    border-color: rgba(96, 165, 250, 0.4);
  }
  .orbit-path-4 .saturn-ring::before {
    border-color: rgba(96, 165, 250, 0.2);
  }

  /* ===== INFO CAPSULES ===== */
  .capsules-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  .info-capsule {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    width: min(90vw, 380px);
    padding: 1.5rem;
    background: rgba(255, 255, 255, 0.9);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: all var(--transition-smooth);
  }

  .info-capsule.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }

  .capsule-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .capsule-icon {
    font-size: 2rem;
  }

  .capsule-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--text-light);
  }

  .capsule-body {
    font-size: 0.9375rem;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .capsule-bullets {
    list-style: none;
    margin-bottom: 1.25rem;
  }

  .capsule-bullets li {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.375rem 0;
    font-size: 0.875rem;
    color: var(--text-light);
  }

  .capsule-actions {
    display: flex;
    gap: 0.75rem;
  }

  .capsule-btn {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-smooth);
    border: none;
  }

  .capsule-btn-primary {
    background: linear-gradient(135deg, var(--primary-blue) 0%, #15803d 100%);
    color: #f0fdf4;
  }

  .capsule-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(22, 163, 74, 0.35);
  }

  .capsule-btn-secondary {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-light);
  }

  .capsule-btn-secondary:hover {
    background: rgba(167, 243, 208, 0.35);
  }

  /* ===== CTA DOCK ===== */
  .cta-dock {
    position: fixed;
    top: 24px;
    right: 24px;
    left: auto;
    bottom: auto;
    transform: none;
    display: flex;
    flex-direction: row;
    gap: 1rem;
    z-index: 100;
  }

  .cta-dock-btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.875rem 1.5rem;
    border-radius: 14px;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-smooth);
    border: none;
    white-space: nowrap;
    background: transparent;
    box-shadow: none;
  }

  .cta-dock-btn-icon {
    width: 18px;
    height: 18px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .cta-dock-btn-icon-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .cta-primary {
    background: linear-gradient(135deg, var(--primary-blue) 0%, #15803d 100%);
    color: #f0fdf4;
    box-shadow: 0 4px 20px rgba(22, 163, 74, 0.35);
  }

  .cta-primary:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 30px rgba(22, 163, 74, 0.45);
  }

  .cta-ghost {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-light);
    backdrop-filter: blur(10px);
  }

  .cta-ghost:hover {
    background: rgba(167, 243, 208, 0.38);
    transform: translateY(-2px);
  }

  .cta-dock-btn:focus-visible {
    outline: 2px solid rgba(34, 197, 94, 0.9);
    outline-offset: 4px;
  }

  /* SVG CTA and Capsule Buttons */
  .cta-dock-btn-svg,
  .capsule-btn-svg {
    background: transparent;
    border: none;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .cta-dock-btn-svg img {
    height: 48px;
    width: auto;
    transition: transform 0.3s ease;
  }

  .capsule-btn-svg img {
    height: 54px;
    width: auto;
    transition: transform 0.3s ease;
  }

  .cta-dock-btn-svg:hover img,
  .capsule-btn-svg:hover img {
    transform: translateY(-3px) scale(1.05);
    filter: drop-shadow(0 12px 24px rgba(22, 163, 74, 0.4));
  }

  .cta-dock-btn-svg:active img,
  .capsule-btn-svg:active img {
    transform: scale(0.96);
  }

  /* ===== MICRO HUD ===== */
  .micro-hud {
    position: fixed;
    bottom: 24px;
    left: 24px;
    display: flex;
    gap: 0.5rem;
    z-index: 99999;
  }

  .hud-btn {
    position: relative;
    width: 56px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(236, 253, 245, 0.7);
    border: 1px solid rgba(34, 197, 94, 0.24);
    border-radius: 999px;
    font-size: 0;
    cursor: pointer;
    transition:
      transform var(--transition-smooth),
      filter var(--transition-smooth);
  }

  .hud-btn-icon-svg {
    width: 48px;
    height: 48px;
    display: block;
    filter: drop-shadow(0 4px 12px rgba(22, 163, 74, 0.22));
    transition:
      transform var(--transition-smooth),
      filter var(--transition-smooth);
  }

  .hud-btn::after {
    content: attr(data-label);
    position: absolute;
    left: 50%;
    bottom: calc(100% + 10px);
    transform: translateX(-50%) translateY(4px);
    padding: 0.3rem 0.6rem;
    border-radius: 999px;
    background: rgba(22, 101, 52, 0.92);
    color: #dcfce7;
    font-size: 0.75rem;
    font-weight: 600;
    line-height: 1;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition:
      opacity var(--transition-smooth),
      transform var(--transition-smooth);
  }

  .hud-btn:hover {
    transform: translateY(-2px) scale(1.05);
    filter: drop-shadow(0 0 14px rgba(34, 197, 94, 0.42));
  }

  .hud-btn:hover .hud-btn-icon-svg {
    transform: scale(1.06);
    filter: drop-shadow(0 8px 16px rgba(22, 163, 74, 0.32));
  }

  .hud-btn:hover::after {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ===== DEMO MODAL - SIMPLE VERSION ===== */
  .demo-modal-overlay {
    position: fixed !important;
    top: 0 !important;
    left: 0 !important;
    width: 100vw !important;
    height: 100vh !important;
    max-width: 100% !important;
    max-height: 100% !important;
    background: rgba(0, 0, 0, 0.92) !important;
    z-index: 999999 !important; /* Cao hơn mọi thứ */
    display: none;
    align-items: center;
    justify-content: center;
    /* Thoát khỏi stacking context của parent */
    isolation: isolate;
    /* Khóa scroll khi modal mở */
    overflow: hidden;
  }

  .demo-modal-overlay.active {
    display: flex !important;
  }

  .demo-modal {
    position: relative;
    width: 90%;
    max-width: 400px;
    max-height: 70vh;
    padding: 16px;
    background: #1e293b;
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    z-index: 1000000; /* Cao hơn overlay */
  }

  .demo-modal-close {
    position: absolute;
    top: 12px;
    right: 12px;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50%;
    font-size: 1.25rem;
    color: #94a3b8;
    cursor: pointer;
  }

  .demo-modal-close:hover {
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
  }

  .demo-content {
    display: none;
  }

  .demo-content.active {
    display: block;
  }

  .demo-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  .demo-subtitle {
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    font-size: 0.8125rem;
  }

  .demo-question-text {
    font-size: 0.875rem;
    color: var(--text-light);
    margin-bottom: 0.5rem;
  }

  .demo-options {
    display: flex;
    flex-direction: column;
    gap: 0.375rem;
  }

  .demo-option {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.625rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 8px;
    font-size: 0.8125rem;
    color: var(--text-light);
    cursor: pointer;
    transition: all var(--transition-smooth);
    text-align: left;
  }

  .demo-option:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: var(--primary-blue);
  }

  .demo-option.correct {
    background: rgba(34, 197, 94, 0.2);
    border-color: #22c55e;
  }

  .demo-option.incorrect {
    background: rgba(239, 68, 68, 0.2);
    border-color: #ef4444;
  }

  .demo-option.disabled {
    pointer-events: none;
    opacity: 0.6;
  }

  .option-letter {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    font-weight: 600;
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  .demo-feedback {
    margin-top: 0.75rem;
    padding: 0.625rem 0.75rem;
    border-radius: 8px;
    display: none;
    font-size: 0.8125rem;
  }

  .demo-feedback.show {
    display: block;
  }

  .demo-feedback.correct {
    background: rgba(34, 197, 94, 0.15);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #86efac;
  }

  .demo-feedback.incorrect {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
  }

  /* Code Demo */
  .code-demo-container {
    border: 1px solid rgba(56, 189, 248, 0.28);
    border-radius: 12px;
    padding: 0.7rem;
    background:
      linear-gradient(150deg, rgba(14, 116, 144, 0.14), rgba(217, 249, 157, 0.1)),
      rgba(2, 44, 34, 0.42);
    box-shadow:
      inset 0 1px 0 rgba(255, 255, 255, 0.08),
      0 10px 24px rgba(5, 46, 22, 0.25);
  }

  .demo-code-block {
    background: linear-gradient(145deg, rgba(2, 6, 23, 0.9) 0%, rgba(15, 23, 42, 0.88) 48%, rgba(2, 44, 34, 0.92) 100%);
    border: 1px solid rgba(110, 231, 183, 0.28);
    border-radius: 8px;
    padding: 0.625rem 0.75rem;
    margin-bottom: 0.75rem;
    font-family: "Fira Code", "Consolas", monospace;
    font-size: 0.8125rem;
    color: #dcfce7;
    overflow-x: auto;
    box-shadow:
      inset 0 0 0 1px rgba(148, 163, 184, 0.16),
      0 6px 16px rgba(2, 6, 23, 0.45);
  }

  .demo-code-block .code-line {
    display: block;
    line-height: 1.6;
  }

  .demo-code-block .code-var {
    color: #7dd3fc;
    font-weight: 600;
  }

  .demo-code-block .code-op {
    color: #f59e0b;
    font-weight: 600;
  }

  .demo-code-block .code-num {
    color: #f472b6;
    font-weight: 700;
  }

  .demo-code-block .code-fn {
    color: #86efac;
    font-weight: 700;
  }

  .demo-code-block .code-paren {
    color: #fde047;
  }

  /* Progress Demo */
  .progress-demo-header {
    display: flex;
    justify-content: space-around;
    margin-bottom: 0.75rem;
    padding: 0.625rem;
    background: var(--glass-bg);
    border-radius: 10px;
  }

  .progress-demo-stat {
    text-align: center;
  }

  .progress-demo-stat .stat-value {
    display: block;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--accent-cyan);
  }

  .progress-demo-stat .stat-label {
    font-size: 0.625rem;
    color: var(--text-muted);
  }

  .chart-title {
    font-weight: 600;
    margin-bottom: 0.5rem;
    font-size: 0.875rem;
    color: var(--white);
  }

  .chart-bar {
    display: grid;
    grid-template-columns: 100px 1fr 40px;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.375rem;
  }

  .chart-label {
    font-size: 0.6875rem;
    color: var(--text-muted);
    text-align: right;
  }

  .chart-track {
    height: 6px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 3px;
    overflow: hidden;
  }

  .chart-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan));
    border-radius: 3px;
    transition: width 1s ease-out;
  }

  .chart-bar.weak .chart-fill {
    background: linear-gradient(90deg, #ef4444, #f97316);
  }

  .chart-percent {
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--text-light);
  }

  /* Roadmap Demo */
  .roadmap-demo {
    display: flex;
    flex-direction: column;
  }

  .roadmap-stage {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.375rem 0;
  }

  .stage-marker {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--glass-bg);
    border: 2px solid var(--glass-border);
    border-radius: 50%;
    font-size: 0.75rem;
    flex-shrink: 0;
  }

  .roadmap-stage.completed .stage-marker {
    background: rgba(34, 197, 94, 0.2);
    border-color: #22c55e;
    color: #22c55e;
  }

  .roadmap-stage.current .stage-marker {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--primary-blue);
    color: var(--primary-blue);
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
  }

  .roadmap-stage.locked .stage-marker {
    opacity: 0.5;
  }

  .stage-info {
    display: flex;
    flex-direction: column;
  }

  .stage-name {
    font-weight: 600;
    font-size: 0.8125rem;
    color: var(--white);
  }

  .stage-status {
    font-size: 0.6875rem;
    color: var(--text-muted);
  }

  .roadmap-stage.locked .stage-name,
  .roadmap-stage.locked .stage-status {
    opacity: 0.5;
  }

  .roadmap-connector {
    width: 2px;
    height: 12px;
    background: var(--glass-border);
    margin-left: 13px;
  }

  /* Matching Demo */
  .matching-demo-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .matching-left,
  .matching-right {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .matching-item {
    padding: 0.875rem 1rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    font-size: 0.9375rem;
    text-align: center;
    cursor: grab;
    transition: all var(--transition-smooth);
  }

  .matching-item:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: var(--primary-blue);
  }

  .matching-item.dragging {
    opacity: 0.5;
  }

  .matching-slot {
    padding: 0.875rem 1rem;
    background: rgba(59, 130, 246, 0.1);
    border: 2px dashed rgba(59, 130, 246, 0.3);
    border-radius: 10px;
    font-size: 0.875rem;
    text-align: center;
    color: var(--text-muted);
    transition: all var(--transition-smooth);
  }

  .matching-slot.dragover {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--primary-blue);
  }

  .matching-slot.matched {
    background: rgba(34, 197, 94, 0.15);
    border: 2px solid rgba(34, 197, 94, 0.4);
    border-style: solid;
  }

  /* ===== LEGAL MODAL ===== */

    background: rgba(0, 0, 0, 0.8);

  .legal-content h3 {

  .legal-content p {

  .faq-item h4 {

  .faq-item p {

  /* ===== FOCUS MODE ===== */
  .galaxy-landing.focus-mode .orbit-system {
    opacity: 0.3;
  }

  .galaxy-landing.focus-mode .core-tagline {
    opacity: 0;
  }

  @media (max-width: 1024px) {
    .orbit-system {
      transform: translate(-50%, -50%) scale(0.65);
    }

    .core-tagline {
      top: calc(50% + 240px);
      max-width: 90vw;
    }

    .cta-dock {
      top: 20px;
      right: 20px;
    }

    .code-slogan-container {
      bottom: 90px;
      right: 20px;
    }
  }

  @media (max-width: 768px) {
    .orbit-system {
      transform: translate(-50%, -50%) scale(0.4);
    }

    .galaxy-home-logo {
      top: 16px;
      left: 16px;
    }

    .galaxy-home-logo-image {
      width: 92px;
    }

    .core-tagline {
      top: calc(50% + 180px);
    }

    .tagline-text {
      font-size: 1.125rem;

    .tagline-chip {
      font-size: 0.6875rem;
      padding: 0.25rem 0.5rem;

    .cta-dock {

      top: 16px;
      right: 16px;
      left: auto;
      bottom: auto;
      gap: 0.5rem;
    }

    .cta-dock-btn {
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
    }

    .micro-hud {
      bottom: 16px;
      left: 16px;
    }

    .hud-btn {
      width: 46px;
      height: 46px;
    }

    .hud-btn-icon-svg {
      width: 38px;
      height: 38px;
    }

    .info-capsule {
      width: calc(100vw - 32px);
      max-height: 60vh;
