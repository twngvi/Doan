<style>
  /* ===== O.UIZ GALAXY LANDING - IMMERSIVE SPACE THEME ===== */

  /* CSS Variables */
  :root {
    --galaxy-dark: #030014;
    --galaxy-deep: #0a0520;
    --galaxy-purple: #1a0a3e;
    --galaxy-blue: #0d1b4c;
    --star-white: #ffffff;
    --star-blue: #a8d8ff;
    --star-purple: #c9a8ff;
    --nebula-pink: rgba(255, 100, 150, 0.15);
    --nebula-blue: rgba(100, 150, 255, 0.12);
    --planet-glow: rgba(100, 200, 255, 0.4);
    --core-glow: rgba(255, 200, 100, 0.5);
    --accent-lime: #a3e635;
    --accent-cyan: #22d3ee;
    --accent-orange: #f97316;
    --primary-blue: #3b82f6;
    --primary-light: #60a5fa;
    --white: #ffffff;
    --text-light: rgba(255, 255, 255, 0.9);
    --text-muted: rgba(255, 255, 255, 0.6);
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-border: rgba(255, 255, 255, 0.15);
    --transition-smooth: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    --transition-bounce: 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ===== BASE STYLES ===== */
  .galaxy-landing {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
    color: var(--text-light);
    background: var(--galaxy-dark);
  }

  .galaxy-landing * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* ===== GALAXY BACKGROUND ===== */
  .galaxy-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(
      ellipse at 50% 50%,
      var(--galaxy-purple) 0%,
      var(--galaxy-deep) 40%,
      var(--galaxy-dark) 100%
    );
    overflow: hidden;
  }

  /* Stars Layers */
  .stars-layer {
    position: absolute;
    inset: 0;
    background-image: radial-gradient(
        1px 1px at 10% 20%,
        var(--star-white) 100%,
        transparent
      ),
      radial-gradient(1px 1px at 30% 60%, var(--star-blue) 100%, transparent),
      radial-gradient(
        1.5px 1.5px at 50% 10%,
        var(--star-white) 100%,
        transparent
      ),
      radial-gradient(1px 1px at 70% 40%, var(--star-purple) 100%, transparent),
      radial-gradient(1px 1px at 90% 80%, var(--star-white) 100%, transparent),
      radial-gradient(
        1.5px 1.5px at 15% 85%,
        var(--star-blue) 100%,
        transparent
      ),
      radial-gradient(1px 1px at 45% 75%, var(--star-white) 100%, transparent),
      radial-gradient(1px 1px at 85% 15%, var(--star-purple) 100%, transparent);
    background-size: 200px 200px;
    animation: twinkle 4s ease-in-out infinite;
  }

  .stars-near {
    opacity: 0.8;
    animation-delay: 0s;
  }

  .stars-far {
    opacity: 0.4;
    background-size: 300px 300px;
    animation-delay: 2s;
  }

  @keyframes twinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  /* Nebula Layer */
  .nebula-layer {
    position: absolute;
    inset: 0;
    background: radial-gradient(
        ellipse 80% 50% at 20% 30%,
        var(--nebula-pink),
        transparent
      ),
      radial-gradient(
        ellipse 60% 40% at 80% 70%,
        var(--nebula-blue),
        transparent
      );
    opacity: 0.6;
    filter: blur(60px);
  }

  /* ===== METEOR SHOWER ===== */
  .meteor-shower {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .meteor {
    position: absolute;
    width: 2px;
    height: 80px;
    background: linear-gradient(
      to bottom,
      rgba(255, 255, 255, 0.63),
      rgba(255, 255, 255, 0.28),
      transparent
    );
    border-radius: 50%;
    opacity: 0;
    transform: rotate(-45deg);
    animation: meteorFall 1s ease-in forwards;
  }

  .meteor::before {
    content: "";
    position: absolute;
    top: 0;
    left: -1px;
    width: 4px;
    height: 4px;
    background: rgba(255, 255, 255, 0.7);
    border-radius: 50%;
    box-shadow: 0 0 6px 2px rgba(255, 255, 255, 0.42);
  }

  @keyframes meteorFall {
    0% {
      opacity: 1;
      transform: rotate(-45deg) translateY(-100px);
    }
    70% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(-45deg) translateY(300px);
    }
  }

  /* ===== HOME LOGO ===== */
  .galaxy-home-logo {
    position: fixed;
    top: 28px;
    left: 28px;
    z-index: 100;
    display: flex;
    align-items: baseline;
    font-size: 2.75rem;
    font-family: "Fredoka One", "Baloo 2", sans-serif;
    cursor: pointer;
    transition: transform var(--transition-smooth);
    text-shadow: 0 2px 20px rgba(59, 130, 246, 0.5);
  }

  .galaxy-home-logo:hover {
    transform: scale(1.05);
  }

  .galaxy-home-logo .logo-letter {
    color: var(--primary-blue);
  }

  .galaxy-home-logo .logo-dot {
    color: var(--accent-orange);
    margin: 0 2px;
    animation: dotBounce 2s ease-in-out infinite;
  }

  .galaxy-home-logo .logo-text {
    color: var(--primary-blue);
  }

  @keyframes dotBounce {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-4px);
    }
  }

  /* ===== CODE-STYLE SLOGAN ===== */
  .code-slogan-container {
    position: absolute;
    bottom: 100px;
    right: 24px;
    text-align: left;
    z-index: 20;
    font-family: "Consolas", "Fira Code", "Courier New", monospace;
    opacity: 1;
    transform: translateY(0);
  }

  .code-slogan-container.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .code-slogan-line {
    min-height: 1.5em;
    margin-bottom: 0.5rem;
    white-space: nowrap;
    overflow: hidden;
  }

  .code-slogan-line:last-child {
    margin-bottom: 0;
  }

  .code-slogan-main {
    font-size: clamp(1rem, 2.5vw, 1.5rem);
    font-weight: 700;
    color: var(--white);
    letter-spacing: 1px;
    position: relative;
    display: inline-block;
  }

  /* Syntax Highlighting Colors */
  .highlight-cyan {
    color: var(--accent-cyan);
  }
  .highlight-orange {
    color: var(--accent-orange);
  }
  .highlight-lime {
    color: var(--accent-lime);
  }
  .keyword-blue {
    color: #569cd6;
  }
  .keyword-purple {
    color: #c586c0;
  }
  .var-white {
    color: #9cdcfe;
  }
  .string-orange {
    color: #ce9178;
  }
  .string-lime {
    color: #6a9955;
  }

  .code-slogan-sub {
    font-size: clamp(0.75rem, 1.5vw, 1rem);
    margin-top: 0.75rem;
    opacity: 0.85;
  }

  .code-slogan-ready {
    font-size: clamp(1rem, 2vw, 1.5rem);
    margin-top: 1.25rem;
    color: var(--accent-cyan);
  }

  .ready-text {
    background: linear-gradient(90deg, var(--accent-cyan), var(--accent-lime));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Blinking Cursor Effect */
  .blink-cursor {
    display: inline-block;
    color: var(--accent-lime);
    animation: blinkCursor 1s step-end infinite;
    margin-left: 2px;
  }

  @keyframes blinkCursor {
    0%,
    50% {
      opacity: 1;
    }
    51%,
    100% {
      opacity: 0;
    }
  }

  /* Glitch Effect */
  .glitch {
    animation: glitch 3s infinite;
  }

  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
  }

  .glitch::before {
    color: #ff0080;
    z-index: -1;
  }

  .glitch::after {
    color: #00ffff;
    z-index: -2;
  }

  @keyframes glitch {
    0%,
    90%,
    100% {
      opacity: 1;
    }
    92% {
      opacity: 0.8;
    }
    92.5% {
      opacity: 1;
    }
    93% {
      opacity: 0.9;
    }
  }

  .glitch:hover::before {
    animation: glitchBefore 0.3s linear infinite;
    opacity: 0.8;
  }

  .glitch:hover::after {
    animation: glitchAfter 0.3s linear infinite;
    opacity: 0.8;
  }

  @keyframes glitchBefore {
    0% {
      transform: translate(-2px, 0);
    }
    20% {
      transform: translate(2px, -1px);
    }
    40% {
      transform: translate(-1px, 1px);
    }
    60% {
      transform: translate(1px, 0);
    }
    80% {
      transform: translate(-1px, -1px);
    }
    100% {
      transform: translate(2px, 1px);
    }
  }

  @keyframes glitchAfter {
    0% {
      transform: translate(2px, 0);
    }
    20% {
      transform: translate(-2px, 1px);
    }
    40% {
      transform: translate(1px, -1px);
    }
    60% {
      transform: translate(-1px, 0);
    }
    80% {
      transform: translate(1px, 1px);
    }
    100% {
      transform: translate(-2px, -1px);
    }
  }

  /* ===== ORBIT SYSTEM ===== */
  .orbit-system {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 1800px;
    height: 900px;
    max-width: 98vw;
  }

  /* Orbit Rings - Ellipse shape (1.5x scale) */
  .orbit-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 50%;
    pointer-events: none;
  }

  .orbit-1 {
    width: 270px;
    height: 135px;
  }
  .orbit-2 {
    width: 450px;
    height: 225px;
  }
  .orbit-3 {
    width: 660px;
    height: 330px;
  }
  .orbit-4 {
    width: 900px;
    height: 450px;
  }
  .orbit-5 {
    width: 1170px;
    height: 585px;
  }

  /* ===== CORE PLANET (SUN) ===== */
  .core-planet {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 75px;
    height: 75px;
    cursor: pointer;
    z-index: 10;
  }

  .core-glow {
    position: absolute;
    inset: -20px;
    background: radial-gradient(circle, var(--core-glow) 0%, transparent 70%);
    border-radius: 50%;
    animation: corePulse 3s ease-in-out infinite;
  }

  @keyframes corePulse {
    0%,
    100% {
      transform: scale(1);
      opacity: 0.6;
    }
    50% {
      transform: scale(1.15);
      opacity: 0.9;
    }
  }

  .core-ring {
    position: absolute;
    inset: -5px;
    border: 1px solid rgba(255, 200, 100, 0.3);
    border-radius: 50%;
    animation: coreRingSpin 20s linear infinite;
  }

  @keyframes coreRingSpin {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }

  .core-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #fcd34d 0%, #f59e0b 50%, #d97706 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 40px rgba(251, 191, 36, 0.5),
      inset 0 -10px 30px rgba(0, 0, 0, 0.2);
    transition: transform var(--transition-bounce);
  }

  .core-planet:hover .core-body {
    transform: scale(1.08);
  }

  .core-icon {
    font-size: 1.2rem;
    filter: drop-shadow(0 2px 4px rgba(0, 0, 0, 0.3));
  }

  .core-label {
    display: none;
  }

  /* Core Logo Text Style */
  .core-logo-text {
    display: flex;
    align-items: baseline;
    font-family: "Fredoka One", "Baloo 2", sans-serif;
    font-size: 1.25rem;
    font-weight: 700;
  }

  .core-logo-text .core-o {
    color: var(--white);
    text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
  }

  .core-logo-text .core-dot {
    color: var(--accent-orange);
    margin-left: 1px;
    animation: coreDotPulse 1.5s ease-in-out infinite;
  }

  @keyframes coreDotPulse {
    0%,
    100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.3);
    }
  }

  .core-label {
    position: absolute;
    bottom: -32px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1rem;
    font-weight: 700;
    color: var(--white);
    white-space: nowrap;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
  }

  /* ===== TAGLINE ===== */
  .core-tagline {
    position: absolute;
    top: calc(50% + 200px);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    max-width: 450px;
    opacity: 1;
    animation: taglineFadeIn 1.2s ease-out 0.5s both;
    z-index: 10;
  }

  @keyframes taglineFadeIn {
    from {
      opacity: 0;
      transform: translateX(-50%) translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
  }

  .tagline-text {
    font-size: 1.375rem;
    font-weight: 700;
    line-height: 1.4;
    margin-bottom: 1rem;
    color: var(--white);
    text-shadow: 0 2px 20px rgba(0, 0, 0, 0.5);
  }

  .tagline-chips {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem;
    animation: chipsSlideIn 0.8s ease-out 1.5s both;
  }

  @keyframes chipsSlideIn {
    from {
      opacity: 0;
      transform: translateY(10px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .tagline-chip {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.375rem 0.75rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 9999px;
    font-size: 0.8125rem;
    font-weight: 500;
    backdrop-filter: blur(10px);
    transition: all var(--transition-smooth);
  }

  .tagline-chip:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  /* ===== ORBITING PLANETS ===== */
  .planet-wrapper {
    position: absolute;
    top: 50%;
    left: 50%;
    width: 0;
    height: 0;

    /* CSS Motion Path - bám đường cong chính xác */
    offset-anchor: center;
    offset-rotate: 0deg;
  }

  /* Keyframe chung cho tất cả quỹ đạo */
  @keyframes orbitRun {
    0% {
      offset-distance: 0%;
    }
    100% {
      offset-distance: 100%;
    }
  }

  /* Orbit 1: 270x135 => Bán kính 135px 67.5px */
  .orbit-path-1 {
    offset-path: ellipse(135px 67.5px at center);
    animation: orbitRun 14s linear infinite;
  }

  /* Orbit 2: 450x225 => Bán kính 225px 112.5px - ngược chiều */
  .orbit-path-2 {
    offset-path: ellipse(225px 112.5px at center);
    animation: orbitRun 18s linear infinite reverse;
  }

  /* Orbit 3: 660x330 => Bán kính 330px 165px */
  .orbit-path-3 {
    offset-path: ellipse(330px 165px at center);
    animation: orbitRun 23s linear infinite;
  }

  /* Orbit 4: 900x450 => Bán kính 450px 225px - ngược chiều */
  .orbit-path-4 {
    offset-path: ellipse(450px 225px at center);
    animation: orbitRun 28s linear infinite reverse;
  }

  /* Orbit 5: 1170x585 => Bán kính 585px 292.5px */
  .orbit-path-5 {
    offset-path: ellipse(585px 292.5px at center);
    animation: orbitRun 35s linear infinite;
  }

  .planet {
    position: relative;
    width: 54px;
    height: 54px;
    cursor: pointer;
    transition: all var(--transition-smooth);
    /* Center the planet on the wrapper point */
    margin-left: -27px;
    margin-top: -27px;
  }

  .planet-glow {
    position: absolute;
    inset: -12px;
    background: radial-gradient(circle, var(--planet-glow) 0%, transparent 70%);
    border-radius: 50%;
    opacity: 0.5;
    transition: opacity var(--transition-smooth);
  }

  .planet:hover .planet-glow {
    opacity: 1;
  }

  .planet-body {
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #2563eb 100%);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.4),
      inset 0 -5px 15px rgba(0, 0, 0, 0.2);
    transition: transform var(--transition-bounce);
  }

  .planet:hover .planet-body {
    transform: scale(1.15);
  }

  /* Planet color variations */
  .orbit-path-1 .planet-body {
    background: linear-gradient(135deg, #a78bfa 0%, #8b5cf6 50%, #7c3aed 100%);
  }
  .orbit-path-2 .planet-body {
    background: linear-gradient(135deg, #34d399 0%, #10b981 50%, #059669 100%);
  }
  .orbit-path-3 .planet-body {
    background: linear-gradient(135deg, #f472b6 0%, #ec4899 50%, #db2777 100%);
  }
  .orbit-path-4 .planet-body {
    background: linear-gradient(135deg, #60a5fa 0%, #3b82f6 50%, #2563eb 100%);
  }
  .orbit-path-5 .planet-body {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #d97706 100%);
  }

  .planet-icon {
    font-size: 1.5rem;
    filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.2));
  }

  .planet-label {
    position: absolute;
    bottom: -24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--text-light);
    white-space: nowrap;
    text-shadow: 0 1px 8px rgba(0, 0, 0, 0.5);
    opacity: 0.8;
    transition: opacity var(--transition-smooth);
  }

  .planet:hover .planet-label {
    opacity: 1;
  }

  /* ===== SATURN RING EFFECT ===== */
  .saturn-ring {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotateX(70deg);
    width: 82px;
    height: 82px;
    border: 2px solid rgba(255, 255, 255, 0.25);
    border-radius: 50%;
    pointer-events: none;
  }

  .saturn-ring::before {
    content: "";
    position: absolute;
    inset: -7px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 50%;
  }

  /* Apply Saturn ring to orbit-path-2 and orbit-path-4 */
  .orbit-path-2 .saturn-ring {
    border-color: rgba(52, 211, 153, 0.4);
  }
  .orbit-path-2 .saturn-ring::before {
    border-color: rgba(52, 211, 153, 0.2);
  }
  .orbit-path-4 .saturn-ring {
    border-color: rgba(96, 165, 250, 0.4);
  }
  .orbit-path-4 .saturn-ring::before {
    border-color: rgba(96, 165, 250, 0.2);
  }

  /* ===== INFO CAPSULES ===== */
  .capsules-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  .info-capsule {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);
    width: min(90vw, 380px);
    padding: 1.5rem;
    background: rgba(15, 23, 42, 0.9);
    border: 1px solid var(--glass-border);
    border-radius: 20px;
    backdrop-filter: blur(20px);
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transition: all var(--transition-smooth);
  }

  .info-capsule.active {
    opacity: 1;
    visibility: visible;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }

  .capsule-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .capsule-icon {
    font-size: 2rem;
  }

  .capsule-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--white);
  }

  .capsule-body {
    font-size: 0.9375rem;
    line-height: 1.6;
    color: var(--text-muted);
    margin-bottom: 1rem;
  }

  .capsule-bullets {
    list-style: none;
    margin-bottom: 1.25rem;
  }

  .capsule-bullets li {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.375rem 0;
    font-size: 0.875rem;
    color: var(--text-light);
  }

  .capsule-actions {
    display: flex;
    gap: 0.75rem;
  }

  .capsule-btn {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 12px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-smooth);
    border: none;
  }

  .capsule-btn-primary {
    background: linear-gradient(135deg, var(--primary-blue) 0%, #2563eb 100%);
    color: var(--white);
  }

  .capsule-btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(59, 130, 246, 0.4);
  }

  .capsule-btn-secondary {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-light);
  }

  .capsule-btn-secondary:hover {
    background: rgba(255, 255, 255, 0.15);
  }

  /* ===== CTA DOCK ===== */
  .cta-dock {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: row;
    gap: 1rem;
    z-index: 100;
  }

  .cta-dock-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    padding: 0.875rem 1.5rem;
    border-radius: 14px;
    font-size: 0.9375rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-smooth);
    border: none;
    white-space: nowrap;
  }

  .cta-primary {
    background: linear-gradient(135deg, var(--primary-blue) 0%, #2563eb 100%);
    color: var(--white);
    box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
  }

  .cta-primary:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 0 8px 30px rgba(59, 130, 246, 0.5);
  }

  .cta-icon {
    font-size: 1.1rem;
  }

  .cta-ghost {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    color: var(--text-light);
    backdrop-filter: blur(10px);
  }

  .cta-ghost:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  /* ===== MICRO HUD ===== */
  .micro-hud {
    position: fixed;
    bottom: 24px;
    left: 24px;
    display: flex;
    gap: 0.5rem;
    z-index: 100;
  }

  .hud-btn {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    font-size: 1.25rem;
    cursor: pointer;
    backdrop-filter: blur(10px);
    transition: all var(--transition-smooth);
  }

  .hud-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    transform: translateY(-2px);
  }

  /* ===== DEMO MODAL ===== */
  .demo-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    visibility: hidden;
    transition: all var(--transition-smooth);
  }

  .demo-modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .demo-modal {
    position: relative;
    width: min(90vw, 460px);
    max-height: 70vh;
    padding: 1.5rem;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    overflow-y: auto;
    transform: scale(0.9);
    transition: transform var(--transition-smooth);
  }

  .demo-modal-overlay.active .demo-modal {
    transform: scale(1);
  }

  .demo-modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    font-size: 1.5rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all var(--transition-smooth);
  }

  .demo-modal-close:hover {
    background: rgba(255, 255, 255, 0.15);
    color: var(--white);
  }

  .demo-content {
    display: none;
  }

  .demo-content.active {
    display: block;
  }

  .demo-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 0.75rem;
  }

  .demo-subtitle {
    color: var(--text-muted);
    margin-bottom: 1rem;
    font-size: 0.875rem;
  }

  .demo-question-text {
    font-size: 0.9375rem;
    color: var(--text-light);
    margin-bottom: 0.75rem;
  }

  .demo-options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .demo-option {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.75rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    font-size: 0.875rem;
    color: var(--text-light);
    cursor: pointer;
    transition: all var(--transition-smooth);
    text-align: left;
  }

  .demo-option:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: var(--primary-blue);
  }

  .demo-option.correct {
    background: rgba(34, 197, 94, 0.2);
    border-color: #22c55e;
  }

  .demo-option.incorrect {
    background: rgba(239, 68, 68, 0.2);
    border-color: #ef4444;
  }

  .demo-option.disabled {
    pointer-events: none;
    opacity: 0.6;
  }

  .option-letter {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 8px;
    font-weight: 600;
    font-size: 0.875rem;
  }

  .demo-feedback {
    margin-top: 1.25rem;
    padding: 1rem;
    border-radius: 12px;
    display: none;
  }

  .demo-feedback.show {
    display: block;
  }

  .demo-feedback.correct {
    background: rgba(34, 197, 94, 0.15);
    border: 1px solid rgba(34, 197, 94, 0.3);
    color: #86efac;
  }

  .demo-feedback.incorrect {
    background: rgba(239, 68, 68, 0.15);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: #fca5a5;
  }

  /* Code Demo */
  .demo-code-block {
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid var(--glass-border);
    border-radius: 12px;
    padding: 1rem;
    margin-bottom: 1rem;
    font-family: "Fira Code", "Consolas", monospace;
    font-size: 0.9375rem;
    color: var(--accent-lime);
    overflow-x: auto;
  }

  /* Progress Demo */
  .progress-demo-header {
    display: flex;
    justify-content: space-around;
    margin-bottom: 1.5rem;
    padding: 1rem;
    background: var(--glass-bg);
    border-radius: 16px;
  }

  .progress-demo-stat {
    text-align: center;
  }

  .progress-demo-stat .stat-value {
    display: block;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--accent-cyan);
  }

  .progress-demo-stat .stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .chart-title {
    font-weight: 600;
    margin-bottom: 1rem;
    color: var(--white);
  }

  .chart-bar {
    display: grid;
    grid-template-columns: 140px 1fr 50px;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .chart-label {
    font-size: 0.8125rem;
    color: var(--text-muted);
    text-align: right;
  }

  .chart-track {
    height: 8px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 4px;
    overflow: hidden;
  }

  .chart-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary-blue), var(--accent-cyan));
    border-radius: 4px;
    transition: width 1s ease-out;
  }

  .chart-bar.weak .chart-fill {
    background: linear-gradient(90deg, #ef4444, #f97316);
  }

  .chart-percent {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--text-light);
  }

  /* Roadmap Demo */
  .roadmap-demo {
    display: flex;
    flex-direction: column;
  }

  .roadmap-stage {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 0;
  }

  .stage-marker {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--glass-bg);
    border: 2px solid var(--glass-border);
    border-radius: 50%;
    font-size: 1rem;
    flex-shrink: 0;
  }

  .roadmap-stage.completed .stage-marker {
    background: rgba(34, 197, 94, 0.2);
    border-color: #22c55e;
    color: #22c55e;
  }

  .roadmap-stage.current .stage-marker {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--primary-blue);
    color: var(--primary-blue);
    box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
  }

  .roadmap-stage.locked .stage-marker {
    opacity: 0.5;
  }

  .stage-info {
    display: flex;
    flex-direction: column;
  }

  .stage-name {
    font-weight: 600;
    color: var(--white);
  }

  .stage-status {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .roadmap-stage.locked .stage-name,
  .roadmap-stage.locked .stage-status {
    opacity: 0.5;
  }

  .roadmap-connector {
    width: 2px;
    height: 20px;
    background: var(--glass-border);
    margin-left: 17px;
  }

  /* Matching Demo */
  .matching-demo-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
  }

  .matching-left,
  .matching-right {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .matching-item {
    padding: 0.875rem 1rem;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    font-size: 0.9375rem;
    text-align: center;
    cursor: grab;
    transition: all var(--transition-smooth);
  }

  .matching-item:hover {
    background: rgba(255, 255, 255, 0.12);
    border-color: var(--primary-blue);
  }

  .matching-item.dragging {
    opacity: 0.5;
  }

  .matching-slot {
    padding: 0.875rem 1rem;
    background: rgba(59, 130, 246, 0.1);
    border: 2px dashed rgba(59, 130, 246, 0.3);
    border-radius: 10px;
    font-size: 0.875rem;
    text-align: center;
    color: var(--text-muted);
    transition: all var(--transition-smooth);
  }

  .matching-slot.dragover {
    background: rgba(59, 130, 246, 0.2);
    border-color: var(--primary-blue);
  }

  .matching-slot.matched {
    background: rgba(34, 197, 94, 0.15);
    border: 2px solid rgba(34, 197, 94, 0.4);
    border-style: solid;
  }

  /* ===== LEGAL MODAL ===== */
  .legal-modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.8);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    opacity: 0;
    visibility: hidden;
    transition: all var(--transition-smooth);
  }

  .legal-modal-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .legal-modal {
    position: relative;
    width: min(90vw, 480px);
    max-height: 80vh;
    padding: 2rem;
    background: rgba(15, 23, 42, 0.95);
    border: 1px solid var(--glass-border);
    border-radius: 24px;
    backdrop-filter: blur(20px);
    overflow-y: auto;
  }

  .legal-modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 50%;
    font-size: 1.5rem;
    color: var(--text-muted);
    cursor: pointer;
    transition: all var(--transition-smooth);
  }

  .legal-modal-close:hover {
    background: rgba(255, 255, 255, 0.15);
    color: var(--white);
  }

  .legal-content {
    display: none;
  }

  .legal-content.active {
    display: block;
  }

  .legal-content h3 {
    font-size: 1.5rem;
    margin-bottom: 1.5rem;
    color: var(--white);
  }

  .legal-content p {
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 1rem;
  }

  .faq-item {
    margin-bottom: 1.25rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--glass-border);
  }

  .faq-item:last-child {
    border-bottom: none;
    margin-bottom: 0;
    padding-bottom: 0;
  }

  .faq-item h4 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--white);
    margin-bottom: 0.5rem;
  }

  .faq-item p {
    font-size: 0.9375rem;
    margin-bottom: 0;
  }

  /* ===== FOCUS MODE ===== */
  .galaxy-landing.focus-mode .orbit-system {
    opacity: 0.3;
  }

  .galaxy-landing.focus-mode .core-tagline {
    opacity: 0;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1024px) {
    .orbit-system {
      transform: translate(-50%, -50%) scale(0.65);
    }

    .core-tagline {
      top: calc(50% + 240px);
      max-width: 90vw;
    }

    .cta-dock {
      bottom: 24px;
    }

    .code-slogan-container {
      bottom: 90px;
      right: 20px;
    }
  }

  @media (max-width: 768px) {
    .orbit-system {
      transform: translate(-50%, -50%) scale(0.4);
    }

    .galaxy-home-logo {
      font-size: 2rem;
      top: 16px;
      left: 16px;
    }

    .core-tagline {
      top: calc(50% + 180px);
    }

    .tagline-text {
      font-size: 1.125rem;
    }

    .tagline-chip {
      font-size: 0.6875rem;
      padding: 0.25rem 0.5rem;
    }

    .cta-dock {
      flex-direction: column;
      bottom: 16px;
      gap: 0.5rem;
    }

    .cta-dock-btn {
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
    }

    .micro-hud {
      bottom: 16px;
      left: 16px;
    }

    .hud-btn {
      width: 38px;
      height: 38px;
      font-size: 1rem;
    }

    .info-capsule {
      width: calc(100vw - 32px);
      max-height: 60vh;
      top: auto;
      bottom: 100px;
      transform: translateX(-50%) translateY(20px);
    }

    .info-capsule.active {
      transform: translateX(-50%) translateY(0);
    }

    .galaxy-home-logo {
      font-size: 1.5rem;
      top: 16px;
      left: 16px;
    }

    .code-slogan-container {
      bottom: 80px;
      right: 16px;
      left: auto;
      width: auto;
      max-width: calc(100vw - 32px);
    }

    .code-slogan-main {
      font-size: 0.875rem;
    }

    .code-slogan-sub {
      font-size: 0.5625rem;
    }

    .code-slogan-ready {
      font-size: 0.75rem;
    }
  }

  /* Reduced Motion */
  @media (prefers-reduced-motion: reduce) {
    .orbit-path-1,
    .orbit-path-2,
    .orbit-path-3,
    .orbit-path-4,
    .orbit-path-5,
    .orbit-path-1 .planet,
    .orbit-path-2 .planet,
    .orbit-path-3 .planet,
    .orbit-path-4 .planet,
    .orbit-path-5 .planet,
    .core-glow,
    .core-ring,
    .stars-layer {
      animation: none !important;
    }

    .galaxy-home-logo .logo-dot {
      animation: none;
    }
  }

  /* ===== AUTH LAYER - SPLIT MODE ===== */
  .auth-layer {
    position: fixed;
    top: 0;
    right: 0;
    width: 50%;
    height: 100vh;
    background: linear-gradient(
      135deg,
      rgba(15, 23, 42, 0.98) 0%,
      rgba(30, 41, 59, 0.98) 100%
    );
    backdrop-filter: blur(20px);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    transform: translateX(100%);
    opacity: 0;
    visibility: hidden;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1),
      opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), visibility 0.5s;
  }

  .auth-layer.active {
    transform: translateX(0);
    opacity: 1;
    visibility: visible;
  }

  /* Auth Loading Overlay - Google Login */
  .auth-loading-overlay {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(15, 23, 42, 0.95);
    backdrop-filter: blur(12px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2000;
    opacity: 0;
    visibility: hidden;
    transition: all 0.3s ease;
  }

  .auth-loading-overlay.active {
    opacity: 1;
    visibility: visible;
  }

  .auth-loading-content {
    text-align: center;
  }

  .auth-loading-logo {
    font-size: 4rem;
    font-weight: 400;
    font-family: "Fredoka One", "Baloo 2", sans-serif;
    display: flex;
    align-items: baseline;
    justify-content: center;
    margin-bottom: 1.5rem;
    text-shadow: 0 2px 20px rgba(59, 130, 246, 0.5);
  }

  .loading-logo-o {
    color: #60a5fa;
    display: inline-block;
    animation: dotBounce 1.2s ease-in-out infinite;
  }

  .loading-logo-dots {
    display: inline-flex;
    align-items: center;
    margin-left: 2px;
    height: 1.2rem;
  }

  .loading-logo-dots .dot {
    width: 0.6rem;
    height: 0.6rem;
    border-radius: 50%;
    background: linear-gradient(135deg, #60a5fa 0%, #818cf8 100%);
    margin: 0 2px;
    animation: authDotDrop 1.4s ease-in-out infinite;
  }

  .loading-logo-dots .dot:nth-child(1) {
    animation-delay: 0s;
  }
  .loading-logo-dots .dot:nth-child(2) {
    animation-delay: 0.2s;
  }
  .loading-logo-dots .dot:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes authDotDrop {
    0%,
    80%,
    100% {
      transform: translateY(0);
      opacity: 0.5;
    }
    40% {
      transform: translateY(-10px);
      opacity: 1;
    }
  }

  .auth-loading-text {
    color: var(--text-muted);
    font-size: 1rem;
    margin: 0;
    animation: fadeInOut 1.5s ease-in-out infinite;
  }

  @keyframes fadeInOut {
    0%,
    100% {
      opacity: 0.5;
    }
    50% {
      opacity: 1;
    }
  }

  /* Back Button */
  .auth-back-btn {
    position: absolute;
    top: 24px;
    left: 24px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 16px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 12px;
    color: var(--text-muted);
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .auth-back-btn:hover {
    background: rgba(255, 255, 255, 0.15);
    color: var(--white);
  }

  .back-arrow {
    font-size: 1.125rem;
  }

  /* Auth Card */
  .auth-card {
    width: 100%;
    max-width: 420px;
    background: transparent;
    border: none;
    border-radius: 24px;
    padding: 1rem;
    box-shadow: none;
  }

  .auth-form-content {
    animation: authFadeIn 0.4s ease-out;
  }

  @keyframes authFadeIn {
    from {
      opacity: 0;
      transform: translateY(12px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Auth Header */
  .auth-header {
    text-align: center;
    margin-bottom: 1rem;
  }

  .auth-logo {
    font-size: 2rem;
    font-weight: 400;
    font-family: "Fredoka One", "Baloo 2", sans-serif;
    margin-bottom: 0.75rem;
    display: flex;
    align-items: baseline;
    justify-content: center;
    text-shadow: 0 2px 20px rgba(59, 130, 246, 0.5);
  }

  .auth-logo-o {
    color: var(--primary-blue);
  }

  .auth-logo-dot {
    color: var(--accent-orange);
    margin: 0 2px;
    animation: authDotBounce 2s ease-in-out infinite;
  }

  .auth-logo-text {
    color: var(--primary-blue);
  }

  @keyframes authDotBounce {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-4px);
    }
  }

  .auth-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 0.25rem;
  }

  .auth-subtitle {
    font-size: 0.8125rem;
    color: var(--text-muted);
    line-height: 1.4;
  }

  /* Auth Form */
  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
  }

  .auth-google-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 10px 16px;
    background: var(--white);
    border: none;
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 600;
    color: #1f2937;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .auth-google-btn:hover {
    background: #f3f4f6;
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
  }

  .auth-divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--text-muted);
    font-size: 0.8125rem;
  }

  .auth-divider::before,
  .auth-divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: rgba(255, 255, 255, 0.1);
  }

  .auth-input-group {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .auth-label {
    font-size: 0.875rem;
    font-weight: 500;
    color: var(--text-light);
