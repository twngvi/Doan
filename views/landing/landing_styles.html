<style>

}

.landing-card-icon {

}

.landing-card-title {
    font-size: 0.875rem;
    color: #6B7280;
}

.landing-card-value {
    font-size: 1.25rem;
    font-weight: 700;
    color: #2563EB;
}

.landing-hero-illustration {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

.landing-mountain-illustration {
    position: relative;
    width: 300px;
    height: 300px;
}

.landing-mountain-peak {
    position: absolute;
    width: 0;
    height: 0;
    border-left: 150px solid transparent;
    border-right: 150px solid transparent;
    border-bottom: 250px solid #2563EB;
    opacity: 0.2;
    animation: scaleUp 1s ease-out 1s both;
}

.landing-mountain-path {
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 150px;
    background: #F59E0B;
    border-radius: 9999px;
}

.landing-climber-avatar {
    position: absolute;
    bottom: 150px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 3rem;
    animation: climb 2s ease-in-out infinite;
}

    padding: 4rem 0;
    background: #FFFFFF;
}

}

.landing-game-card-accent .landing-game-button {

}

.landing-game-button:hover {

}

.landing-btn-arrow {
    transition: transform 0.3s;
}

.landing-game-button:hover .landing-btn-arrow {

}

.landing-features {

}

}

.landing-feature-card:hover {

}

/* ===== ANIMATIONS ===== */
@keyframes slideDown {
    from {
        opacity: 0;
        transform: translateY(-20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeInUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}

@keyframes float {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-20px);
    }
}

@keyframes scaleUp {
    from {
        transform: scale(0);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 0.2;
    }
}

@keyframes climb {
    0%, 100% {
        bottom: 150px;
    }
    50% {
        bottom: 170px;
    }
}

/* ===== RESPONSIVE DESIGN ===== */
@media (max-width: 1024px) {
    .landing-hero .landing-container {
        grid-template-columns: 1fr;

    .landing-hero-image {

    .landing-games-grid,
    .landing-features-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .landing-footer-content {
        grid-template-columns: 1fr 1fr;
    }
}

@media (max-width: 768px) {
    .landing-nav-menu {
        display: none;
    }
    
    .landing-hero-title {
        font-size: 2.5rem;
    }
    
    .landing-hero-actions {
        flex-direction: column;
    }
    
    .landing-games-grid,
    .landing-features-grid {
        grid-template-columns: 1fr;
    }
    
    .landing-footer-content {
        grid-template-columns: 1fr;
    }
}
