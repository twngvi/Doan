<script>
  /**
   * client_js.html - Client-Side JavaScript
   *
   * Handles all frontend logic, API calls, navigation, and UI updates
   */

  // ==================== Global Variables ====================
  var currentUser = null; // ⭐ Dùng var để tự động gắn vào window
  window.currentUser = null; // ⭐ Gán trực tiếp để chắc chắn
  let isGoogleAuthInProgress = false; // Prevent multiple simultaneous requests
  let googleClientInitialized = false;

  // ==================== Initialization ====================
  document.addEventListener("DOMContentLoaded", function () {
    console.log("App initialized");

    // Initialize Google Sign-In
    initGoogleSignIn();

    // Check if user is logged in
    // Đổi thành sessionStorage để khi tắt tab sẽ tự đăng xuất
    const savedUser = sessionStorage.getItem("currentUser");
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        console.log("Found saved user:", currentUser.username);
        showPage("page-dashboard");
        loadDashboardData();
      } catch (error) {
        console.error("Error parsing saved user:", error);
        sessionStorage.removeItem("currentUser");
        showPage("page-landing");
      }
    } else {
      // Show landing page for new visitors
      showPage("page-landing");
    }

    // ⭐ Debug session khi app khởi động
    console.log("🔍 =".repeat(30));
    console.log("🔍 APP INITIALIZED - CHECKING SESSION");
    console.log("🔍 =".repeat(30));

    const isLoggedIn = sessionStorage.getItem("isLoggedIn");
    const userId = sessionStorage.getItem("userId");

    console.log("📦 Session Storage:");
    console.log("  - currentUser:", savedUser ? "EXISTS" : "NULL");
    console.log("  - isLoggedIn:", isLoggedIn);
    console.log("  - userId:", userId);

    if (savedUser) {
      try {
        const user = JSON.parse(savedUser);
        console.log("✅ User data parsed:");
        console.log("  - userId:", user.userId);
        console.log("  - email:", user.email);
        console.log("  - avatarUrl:", user.avatarUrl);

        currentUser = user;
        window.currentUser = user; // ⭐ Đồng bộ vào window
        console.log("✅ Current user synced to window:", currentUser);
        showPage("page-dashboard");
        loadDashboardData();
      } catch (error) {
        console.error("❌ Error parsing saved user:", error);
        sessionStorage.clear();
        showPage("page-landing");
      }
    } else {
      console.log("ℹ️ No saved session, showing landing page");
      showPage("page-landing");
    }

    console.log("🔍 =".repeat(30));
  });

  // ==================== Page Navigation ====================

  /**
   * Show specific page and hide others
   * @param {string} pageId - ID of the page to show
   * @param {object} params - Optional parameters to pass to the page
   * @param {boolean} addToHistory - Whether to add this navigation to browser history
   */
  function showPage(pageId, params = {}, addToHistory = true) {
    console.log("Showing page:", pageId, params);

    // Hide toast when changing pages
    hideToast();

    // Hide all pages
    const allPages = document.querySelectorAll(".page-content");
    allPages.forEach((page) => {
      page.style.display = "none";
    });

    // Show requested page
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
      targetPage.style.display = "block";

      // Update browser history
      if (addToHistory) {
        const state = { pageId: pageId, params: params };
        const url =
          window.location.pathname + "#" + pageId.replace("page-", "");
        history.pushState(state, "", url);
      }

      // Update navbar active state if on dashboard
      if (pageId === "page-dashboard") {
        updateNavbarActive("page-dashboard");
      }

      // ⭐ Pass parameters to page BEFORE initializing (fix race condition)
      if (Object.keys(params).length > 0) {
        window.currentPageParams = params;
        console.log("Page parameters set:", params);
      } else {
        // Clear old params if no new params provided
        window.currentPageParams = {};
      }

      // Initialize page-specific logic
      if (pageId === "page-topics") {
        // Initialize Topics page with retry mechanism
        const tryInitTopics = (retries = 0) => {
          if (typeof window.initTopicsPageOnShow === "function") {
            console.log("Triggering Topics page initialization...");
            window.initTopicsPageOnShow();
          } else if (retries < 5) {
            console.warn(
              `Topics initialization function not found, retrying... (${
                retries + 1
              }/5)`
            );
            setTimeout(() => tryInitTopics(retries + 1), 200);
          } else {
            console.error(
              "Topics initialization function not found after 5 retries"
            );
            // Fallback: try to call directly
            if (typeof initTopicsPage === "function") {
              console.log("Using fallback initTopicsPage");
              initTopicsPage();
            }
          }
        };
        tryInitTopics();
      }

      // Initialize verify email page
      if (pageId === "page-verify-email") {
        console.log("🔐 Verify email page shown, calling init...");
        const verifyPageElement = document.getElementById("page-verify-email");
        console.log("📄 Verify page element:", verifyPageElement);
        console.log(
          "👁️ Verify page display:",
          verifyPageElement?.style.display
        );

        if (typeof window.initVerifyEmailPage === "function") {
          window.initVerifyEmailPage();
        } else {
          console.error("❌ initVerifyEmailPage function not found");
        }
      }

      // ⭐ Initialize Lesson page
      if (pageId === "page-lesson") {
        if (typeof window.initLessonPage === "function") {
          console.log("Initializing Lesson page...");
          window.initLessonPage();
        } else {
          console.error("initLessonPage function not found");
        }
      }

      // ⭐ Initialize MCQ page
      if (pageId === "page-mcq") {
        if (typeof window.initMCQPage === "function") {
          console.log("Initializing MCQ page...");
          window.initMCQPage();
        } else {
          console.error("initMCQPage function not found");
        }
      }

      // ⭐ Initialize Profile page
      if (pageId === "page-profile") {
        if (typeof window.initProfilePage === "function") {
          console.log("Initializing Profile page...");
          setTimeout(() => {
            window.initProfilePage();
          }, 100);
        } else {
          console.error("initProfilePage function not found");
        }
      }
    } else {
      console.error("Page not found:", pageId);
    }
  }

  // ==================== Browser History Handling ====================

  /**
   * Handle browser back/forward buttons
   */
  window.addEventListener("popstate", function (event) {
    console.log("Popstate event:", event.state);

    if (event.state && event.state.pageId) {
      // Navigate to the page from history without adding to history again
      showPage(event.state.pageId, event.state.params || {}, false);
    } else {
      // No state - go to default page
      const savedUser = sessionStorage.getItem("currentUser");
      if (savedUser) {
        showPage("page-dashboard", {}, false);
      } else {
        showPage("page-landing", {}, false);
      }
    }
  });

  // Initialize history state on first load
  window.addEventListener("load", function () {
    if (!history.state) {
      const savedUser = sessionStorage.getItem("currentUser");
      const initialPage = savedUser ? "page-dashboard" : "page-landing";
      const state = { pageId: initialPage, params: {} };
      history.replaceState(
        state,
        "",
        window.location.pathname + "#" + initialPage.replace("page-", "")
      );
    }
  });

  /**
   * Update navbar active state
   */
  function updateNavbarActive(activePageId) {
    const navItems = document.querySelectorAll(".navbar-item");
    navItems.forEach((item) => {
      item.classList.remove("active");
    });
  }

  // ==================== Authentication ====================

  /**
   * Initialize Google Sign-In
   * ⚠️ FIX FedCM Error: Không dùng Google Identity Services trong Apps Script iframe
   * Chỉ dùng OAuth2 flow truyền thống qua backend
   */
  function initGoogleSignIn() {
    // ✅ Đánh dấu đã sẵn sàng (không cần load Google API nữa)
    googleClientInitialized = true;
    console.log(
      "✅ Google OAuth2 ready (FedCM/One Tap disabled - using backend OAuth2 flow)"
    );
    console.log(
      "ℹ️ Apps Script runs in iframe - FedCM not supported. Using traditional OAuth2."
    );
  }

  /**
   * Handle Google credential response
   * ⚠️ DEPRECATED: Không dùng nữa vì đã tắt Google Identity Services
   * Giữ lại để tránh lỗi nếu có reference cũ
   */
  function handleGoogleCredentialResponse(response) {
    console.warn(
      "⚠️ handleGoogleCredentialResponse called - this should not happen"
    );
    console.log("Falling back to OAuth2 flow...");

    // Fallback: Nếu vẫn được gọi, chuyển sang OAuth2
    handleGoogleLogin();
  }

  /**
   * Handle login form submission
   */
  function handleLoginFormSubmit() {
    console.log("Login form submitted");

    // Get form data
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    // Validation
    if (!username || !password) {
      showToast("Vui lòng nhập đầy đủ thông tin", "error");
      return false;
    }

    // Prepare payload
    const payload = {
      username: username,
      password: password,
    };

    // Show loading
    showLoading(true);
    disableButton("btn-login");

    // Call backend function
    google.script.run
      .withSuccessHandler(onLoginSuccess)
      .withFailureHandler(onApiError)
      .loginUser(payload);

    return false;
  }

  /**
   * Handle successful login
   */
  function onLoginSuccess(response) {
    console.log("Login response:", JSON.stringify(response));
    console.log("Response status:", response.status);
    console.log("Response message:", response.message);
    hideLoading();
    enableButton("btn-login");

    if (response.status === "success") {
      // Save user to sessionStorage (auto logout when closing tab)
      currentUser = response.user;
      window.currentUser = response.user; // ⭐ Đồng bộ vào window
      sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
      console.log("✅ Current user synced to window:", currentUser);

      // Show success message
      showToast("Đăng nhập thành công!", "success");

      // Navigate to dashboard
      setTimeout(() => {
        showPage("page-dashboard");
        loadDashboardData();
      }, 500);
    } else {
      showToast(response.message || "Đăng nhập thất bại", "error");
    }
  }

  /**
   * Handle register form submission - NEW VERSION
   */
  function handleRegisterFormSubmit() {
    console.log("📝 Register form submitted");

    // Get form data
    const fullName = document.getElementById("register-fullname").value.trim();
    const email = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    const confirmPassword = document.getElementById(
      "register-confirm-password"
    ).value;

    // Validation
    if (!fullName || !email || !password || !confirmPassword) {
      showToast("Vui lòng điền đầy đủ thông tin", "error");
      return false;
    }

    if (password.length < 6) {
      showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
      return false;
    }

    if (password !== confirmPassword) {
      showToast("Mật khẩu xác nhận không khớp", "error");
      return false;
    }

    // Prepare payload
    const userData = {
      email: email,
      password: password,
      confirmPassword: confirmPassword,
      fullName: fullName,
    };

    // Show loading
    showLoading(true);

    // Call backend function
    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Register Response:", response);

        if (response.success) {
          // Hiển thị thông báo xác thực email
          showToast(response.message, "success");

          // --- PHẦN SỬA ĐỔI QUAN TRỌNG Ở ĐÂY ---

          // Kiểm tra xem server có yêu cầu xác thực không
          if (response.requiresVerification) {
            console.log("🔏 Yêu cầu xác thực email, đang chuyển hướng...");

            // 1. Lưu email vào localStorage để trang Verify biết xác thực cho ai
            const verificationData = {
              email: email,
              timestamp: new Date().getTime(),
            };
            localStorage.setItem(
              "pendingVerification",
              JSON.stringify(verificationData)
            );

            // 2. Chuyển sang trang Verify thay vì Login
            setTimeout(() => {
              showPage("page-verify-email");
            }, 1500);
          } else {
            // Nếu không cần xác thực thì mới về Login
            setTimeout(() => {
              showPage("page-login");
            }, 3000);
          }
          // --------------------------------------
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Register Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .registerWithEmailPassword(userData);

    return false;
  }

  /**
   * Handle login form submission - NEW VERSION
   */
  function handleLoginFormSubmit() {
    console.log("🔐 Login form submitted");

    // Get form data
    const email = document.getElementById("login-email")
      ? document.getElementById("login-email").value.trim()
      : document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    // Validation
    if (!email || !password) {
      showToast("Vui lòng nhập email và mật khẩu", "error");
      return false;
    }

    // Prepare credentials
    const credentials = {
      email: email,
      password: password,
    };

    // Show loading
    showLoading(true);

    // Call backend function
    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Login Response:", response);

        if (response.success) {
          // ⭐ LƯU SESSION ĐẦY ĐỦ
          currentUser = response.user;
          sessionStorage.setItem("currentUser", JSON.stringify(response.user));
          sessionStorage.setItem("isLoggedIn", "true");
          sessionStorage.setItem("userId", response.user.userId);

          console.log("✅ Session saved:", {
            userId: response.user.userId,
            email: response.user.email,
            avatarUrl: response.user.avatarUrl,
          });

          showToast(response.message, "success");

          setTimeout(() => {
            showPage("page-dashboard");
            loadDashboardData();
          }, 1000);
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Login Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .loginWithEmailPassword(credentials);

    return false;
  }

  /**
   * OLD VERSION - Keep for backward compatibility
   * Handle register form submission
   */
  function handleRegisterFormSubmitOLD() {
    console.log("Register form submitted");

    // Get form data
    const fullName = document.getElementById("register-fullname").value.trim();
    const username = document.getElementById("register-username").value.trim();
    const email = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    const confirmPassword = document.getElementById(
      "register-confirm-password"
    ).value;

    // Validation
    if (!fullName || !username || !password) {
      showToast("Vui lòng nhập đầy đủ thông tin bắt buộc", "error");
      return false;
    }

    if (username.length < 3) {
      showToast("Tên đăng nhập phải có ít nhất 3 ký tự", "error");
      return false;
    }

    if (password.length < 6) {
      showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
      return false;
    }

    if (password !== confirmPassword) {
      showToast("Mật khẩu xác nhận không khớp", "error");
      return false;
    }

    // Prepare payload
    const payload = {
      fullName: fullName,
      username: username,
      email: email,
      password: password,
    };

    // Show loading
    showLoading(true);
    disableButton("btn-register");

    // Call backend function
    google.script.run
      .withSuccessHandler(onRegisterSuccess)
      .withFailureHandler(onApiError)
      .registerUser(payload);

    return false;
  }

  /**
   * Handle successful registration
   */
  function onRegisterSuccess(response) {
    console.log("Register response:", JSON.stringify(response));
    console.log("Response status:", response.status);
    console.log("Response message:", response.message);
    hideLoading();
    enableButton("btn-register");

    if (response.status === "success") {
      // Save user to sessionStorage (auto logout when closing tab)
      currentUser = response.user;
      window.currentUser = response.user; // ⭐ Đồng bộ vào window
      sessionStorage.setItem("currentUser", JSON.stringify(currentUser));
      console.log("✅ Current user synced to window:", currentUser);

      // Show success message
      showToast("Đăng ký thành công! Đang chuyển tới trang chủ...", "success");

      // Navigate to dashboard
      setTimeout(() => {
        showPage("page-dashboard");
        loadDashboardData();
      }, 1000);
    } else {
      showToast(response.message || "Đăng ký thất bại", "error");
    }
  }

  /**
   * Handle logout
   */
  function handleLogout() {
    console.log("Logging out...");

    // Clear user data from all storage
    currentUser = null;
    window.currentUser = null; // ⭐ Xóa khỏi window
    sessionStorage.removeItem("currentUser");
    sessionStorage.removeItem("userSession");

    // Clear Google auth state if needed
    if (
      googleClientInitialized &&
      typeof google !== "undefined" &&
      google.accounts
    ) {
      try {
        google.accounts.id.disableAutoSelect();
        console.log("Google auto-select disabled");
      } catch (e) {
        console.log("Error disabling Google auto-select:", e);
      }
    }

    // Show message
    if (typeof showToast === "function") {
      showToast("Đã đăng xuất", "info");
    } else {
      alert("Đã đăng xuất");
    }

    // Navigate to login
    setTimeout(() => {
      if (typeof showPage === "function") {
        showPage("page-login");
      } else {
        // Fallback if showPage is not defined
        document
          .querySelectorAll(".page-content")
          .forEach((p) => (p.style.display = "none"));
        const loginPage = document.getElementById("page-login");
        if (loginPage) loginPage.style.display = "block";
      }

      // Clear form fields
      const emailInput = document.getElementById("login-email");
      const passwordInput = document.getElementById("login-password");
      if (emailInput) emailInput.value = "";
      if (passwordInput) passwordInput.value = "";
    }, 500);
  }

  /**
   * Show Account Chooser - Hướng dẫn user đăng xuất và chọn tài khoản khác
   */
  function showAccountChooser() {
    const message = `Để chọn tài khoản Google khác:

1. Mở tab mới
2. Truy cập: https://accounts.google.com
3. Đăng xuất tài khoản hiện tại
4. Quay lại đây và nhấn "Đăng nhập với Google"

Hoặc bạn có thể:
• Sử dụng chế độ ẩn danh (Incognito)
• Mở URL này trong profile Chrome khác`;

    if (confirm(message + "\n\nBạn có muốn mở trang Google Accounts không?")) {
      window.open("https://accounts.google.com/SignOutOptions", "_blank");
      showToast("Vui lòng đăng xuất Google rồi quay lại đây", "info");
    }
  }

  /**
   * Handle Google Login - Auto detect email from Google Account
   * Không cần prompt - hệ thống tự động lấy email từ Session.getActiveUser().getEmail()
   */
  function handleGoogleLogin() {
    console.log("🔐 Google Auto Login - Đang xác thực...");

    // Prevent multiple simultaneous requests
    if (isGoogleAuthInProgress) {
      console.log("⚠️ Google auth already in progress");
      return;
    }

    isGoogleAuthInProgress = true;
    showLoading(true);

    const timeoutId = setTimeout(() => {
      console.error("❌ Google auth timeout");
      hideLoading();
      isGoogleAuthInProgress = false;
      showToast("Timeout: Vui lòng thử lại.", "error");
    }, 30000);

    // ✅ Gọi autoLoginWithGoogle() - tự động lấy email từ Google Account
    google.script.run
      .withSuccessHandler(function (response) {
        clearTimeout(timeoutId);
        isGoogleAuthInProgress = false;
        hideLoading();

        console.log("✅ Auto Login Response:", response);

        if (response.success) {
          // Đăng nhập thành công
          sessionStorage.setItem("currentUser", JSON.stringify(response.user));
          sessionStorage.setItem("isLoggedIn", "true");

          showToast(response.message || "Đăng nhập thành công!", "success");

          setTimeout(() => {
            showPage("page-dashboard");
          }, 1000);
        } else if (response.autoRegister) {
          // Tài khoản chưa tồn tại - hiện form đăng ký
          console.log("📝 Tài khoản chưa tồn tại, chuyển sang đăng ký");
          showToast(
            "Tài khoản chưa tồn tại. Vui lòng hoàn tất đăng ký.",
            "info"
          );

          // Chỉ hỏi tên, email đã được tự động lấy
          const fullName = prompt(
            "Nhập họ tên của bạn:",
            response.email.split("@")[0]
          );

          if (fullName) {
            handleAutoRegister({ fullName: fullName.trim() });
          } else {
            showToast("Đăng ký bị hủy", "warning");
          }
        } else {
          // Lỗi khác
          showToast(response.message || "Đăng nhập thất bại", "error");
        }
      })
      .withFailureHandler(function (error) {
        clearTimeout(timeoutId);
        isGoogleAuthInProgress = false;
        hideLoading();
        console.error("❌ Auto Login Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .autoLoginWithGoogle();
  }

  /**
   * Alternative: Open Google Account Chooser in new window
   */
  function handleGoogleLoginAlternative() {
    console.log("Google login (alternative method) initiated");

    // Prevent multiple simultaneous requests
    if (isGoogleAuthInProgress) {
      console.log(
        "Google auth already in progress, ignoring duplicate request"
      );
      return;
    }

    isGoogleAuthInProgress = true;

    // Show loading
    showLoading(true);

    // Call backend function with timeout
    const timeoutId = setTimeout(() => {
      console.error("Google auth timeout");
      hideLoading();
      isGoogleAuthInProgress = false;
      showToast("Timeout: Vui lòng thử lại sau.", "error");
    }, 30000); // 30 second timeout

    google.script.run
      .withSuccessHandler(function (response) {
        clearTimeout(timeoutId);
        isGoogleAuthInProgress = false;
        onGoogleAuthSuccess(response);
      })
      .withFailureHandler(function (error) {
        clearTimeout(timeoutId);
        isGoogleAuthInProgress = false;
        onApiError(error);
      })
      .handleGoogleAuth();
  }

  /**
   * Handle Google Signup - Same as login (auto-provisioning)
   */
  function handleGoogleSignup() {
    console.log("Google signup initiated");
    // Đăng ký và đăng nhập dùng cùng logic
    handleGoogleLogin();
  }

  /**
   * Handle Auto Register - Đăng ký tự động với thông tin bổ sung
   */
  function handleAutoRegister(userData) {
    console.log("📝 Auto Register - Đang tạo tài khoản...");

    if (!userData || !userData.fullName) {
      showToast("Thiếu thông tin họ tên", "error");
      return;
    }

    showLoading(true);

    const timeoutId = setTimeout(() => {
      console.error("❌ Auto register timeout");
      hideLoading();
      showToast("Timeout: Vui lòng thử lại.", "error");
    }, 30000);

    // Gọi autoRegisterWithGoogle() - email tự động lấy từ Session
    google.script.run
      .withSuccessHandler(function (response) {
        clearTimeout(timeoutId);
        hideLoading();

        console.log("✅ Auto Register Response:", response);

        if (response.success) {
          // Đăng ký thành công

  /**

  function formatDate(dateString) {
    if (!dateString) return "";

    try {
      const date = new Date(dateString);
      return date.toLocaleDateString("vi-VN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    } catch (error) {
      return dateString;
    }
  }

    // Try to get params from server injection first

    let token = window.SERVER_PARAMS?.token || "";

  function showToast(message, type = "info") {
    const toast = document.getElementById("toast");

    if (!toast || !toastMessage) return;

    // Set message
    toastMessage.textContent = message;

    );

        toast.classList.add("bg-red-500");
        break;
      case "warning":
        toast.classList.add("bg-yellow-500");
        break;
      default:
        toast.classList.add("bg-blue-500");
    }

    // Show toast with animation
    toast.classList.remove("translate-x-full");
    toast.classList.add("translate-x-0");

    // Create star effect
    createStarEffect(toast);

    // Auto hide after 3 seconds
    setTimeout(() => {

      toast.classList.add("translate-x-full");

  /**
   * Create star effect around toast
   */
  function createStarEffect(element) {
    const starContainer = document.createElement("div");
    starContainer.style.position = "fixed";
    starContainer.style.top = element.offsetTop + "px";
    starContainer.style.right = "1rem";
    starContainer.style.width = element.offsetWidth + "px";
    starContainer.style.height = element.offsetHeight + "px";
    starContainer.style.pointerEvents = "none";
    starContainer.style.zIndex = "9999";
    document.body.appendChild(starContainer);

    const stars = ["⭐", "✨", "🌟", "💫"];
    const starCount = 8;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement("div");
      star.textContent = stars[Math.floor(Math.random() * stars.length)];
      star.style.position = "absolute";
      star.style.fontSize = "1.5rem";
      star.style.animation = "starBurst 1s ease-out forwards";

      const angle = (Math.PI * 2 * i) / starCount;
      const distance = 50 + Math.random() * 30;
      star.style.left = "50%";
      star.style.top = "50%";
      star.style.setProperty("--tx", Math.cos(angle) * distance + "px");
      star.style.setProperty("--ty", Math.sin(angle) * distance + "px");

      starContainer.appendChild(star);
    }

    if (!document.getElementById("star-animation-style")) {
      const style = document.createElement("style");
      style.id = "star-animation-style";
      style.textContent = `
        @keyframes starBurst {
          0% {
            transform: translate(-50%, -50%) scale(0);
            opacity: 1;
          }
          50% {
            transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.2);
            opacity: 1;
          }
          100% {
            transform: translate(calc(-50% + var(--tx) * 1.5), calc(-50% + var(--ty) * 1.5)) scale(0);
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(style);
    }

    setTimeout(() => {
      starContainer.remove();
    }, 1000);
  }

      ".notification-btn, #notificationBtn"
    );
    const closeNotifBtn = e.target.closest(".close-notif-btn, #closeNotifBtn");
    const notificationPanel =
      document.getElementById("notificationPanel") ||
      document.querySelector(".notification-panel");

    if (notificationBtn && notificationPanel) {
      const isVisible = notificationPanel.style.display === "block";
      notificationPanel.style.display = isVisible ? "none" : "block";

      if (!isVisible) {
        window.createFallingFlowers();
      } else {
        globalFlowerContainer.style.display = "none";
      }
      e.stopPropagation();
    } else if (closeNotifBtn && notificationPanel) {
      notificationPanel.style.display = "none";
      globalFlowerContainer.style.display = "none";
      e.stopPropagation();
    } else if (
      notificationPanel &&
      notificationPanel.style.display === "block"
    ) {
      if (!notificationPanel.contains(e.target)) {
        notificationPanel.style.display = "none";
        globalFlowerContainer.style.display = "none";
      }
    }
  });

  // ==================== Dashboard Data Loading ====================

  function loadDashboardData() {
    console.log("Loading dashboard data...");

    const savedUser = sessionStorage.getItem("currentUser");
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        console.log("Current user:", currentUser);
        updateDashboardUserName();
      } catch (error) {
        console.error("Error loading dashboard data:", error);
      }
    }
  }

  function updateDashboardUserName() {
    if (!currentUser) return;

    const name =
      currentUser.fullName ||
      currentUser.username ||
      currentUser.email?.split("@")[0] ||
      "User";
    console.log("Updating dashboard with name:", name);

    const userNameEl = document.getElementById("userName");
    const userNameWelcomeEl = document.getElementById("userNameWelcome");

    if (userNameEl) {
      userNameEl.textContent = name;
      console.log("Updated userName element");
    }

    if (userNameWelcomeEl) {
      userNameWelcomeEl.textContent = name;
      console.log("Updated userNameWelcome element");
    }
  }

  window.loadDashboardData = loadDashboardData;
</script>
