<script>
  /**
   * client_js.html - Client-Side JavaScript
   *
   * Handles all frontend logic, API calls, navigation, and UI updates
   */

  // ==================== Global Variables ====================
  var currentUser = null; // â­ DÃ¹ng var Ä‘á»ƒ tá»± Ä‘á»™ng gáº¯n vÃ o window
  window.currentUser = null; // â­ GÃ¡n trá»±c tiáº¿p Ä‘á»ƒ cháº¯c cháº¯n
  let isGoogleAuthInProgress = false; // Prevent multiple simultaneous requests
  let googleClientInitialized = false;

  // ==================== Initialization ====================
  document.addEventListener("DOMContentLoaded", function () {
    console.log("App Initializing...");

    // Initialize Google Sign-In
    initGoogleSignIn();

    // BƯỚC 1: Khôi phục Session NGAY LẬP TỨC
    // Phải làm điều này trước khi quyết định hiển thị trang nào
    try {
      const savedUserStr = localStorage.getItem("currentUser");
      const isLoggedInStr = localStorage.getItem("isLoggedIn");

      if (savedUserStr && isLoggedInStr === "true") {
        const user = JSON.parse(savedUserStr);
        // Đồng bộ vào biến toàn cục
        currentUser = user;
        window.currentUser = user;
        console.log(" Session recovered for:", user.email || user.username);
        console.log("🎭 Display Name:", user.displayName);

        // ⭐ CẬP NHẬT UI NGAY - Tất cả vị trí hiển thị tên
        setTimeout(() => {
          if (typeof window.updateAllUserNames === "function") {
            window.updateAllUserNames(
              user.displayName || user.username || "User",
            );
          }
          if (typeof window.updateAllUserAvatars === "function") {
            window.updateAllUserAvatars(user.avatarUrl);
          }
        }, 100);
      } else {
        console.log("ℹ No active session found");
        currentUser = null;
        window.currentUser = null;
      }
    } catch (e) {
      console.error(" Error recovering session:", e);
      localStorage.clear();
      currentUser = null;
      window.currentUser = null;
    }

    // BƯỚC 1.5: Khôi phục Theme ngay lập tức
    try {
      var savedTheme = "default";
      if (currentUser && currentUser.theme) {
        savedTheme = currentUser.theme;
      } else {
        var t = localStorage.getItem("userTheme");
        if (t) savedTheme = t;
      }
      if (savedTheme && savedTheme !== "default") {
        document.body.classList.add("theme-" + savedTheme);
      }
      console.log("Theme restored:", savedTheme);
    } catch (e) {
      console.warn("Theme restore failed:", e);
    }

    // BƯỚC 2: Xác định trang đích (Routing Logic)

    // Ưu tiên 1: Link từ email/server (window.SERVER_PARAMS.page)
    let requestedPageName = window.SERVER_PARAMS?.page || "";

    // Ưu tiên 2: Trạng thái cũ khi F5 (localStorage)
    if (!requestedPageName) {
      requestedPageName = localStorage.getItem("lastActivePage");
      if (requestedPageName) {
        console.log(" Recovered page from storage:", requestedPageName);
      }
    } else {
      console.log(" Server requested page:", requestedPageName);
    }

    // Định nghĩa danh sách trang
    const pageMap = {
      dashboard: "page-dashboard",
      topics: "page-topics",
      mcq: "page-mcq",
      lesson: "page-lesson",
      matching: "page-matching",
      profile: "page-profile",
      landing: "page-landing",
      // Auth pages giờ nằm trong auth layer của landing
      login: "page-landing",
      register: "page-landing",
      "verify-email": "page-landing",
      "forgot-password": "page-landing",
    };

    const protectedPages = [
      "dashboard",
      "topics",
      "mcq",
      "lesson",
      "matching",
      "profile",
    ];
    const authPages = [
      "login",
      "register",
      "landing",
      "forgot-password",
      "verify-email",
    ];

    // Mapping auth page name to auth form type
    const authFormMap = {
      login: "login",
      register: "register",
      "verify-email": "verify",
      "forgot-password": "forgot",
    };

    // Mặc định là landing
    let targetPageId = "page-landing";
    let finalPageName = "landing";

    // Logic định tuyến
    if (requestedPageName && pageMap[requestedPageName]) {
      finalPageName = requestedPageName;
    } else {
      // Nếu không có trang yêu cầu, nhưng đã login -> vào dashboard
      if (window.currentUser) {
        finalPageName = "dashboard";
      }
    }

    // BƯỚC 3: Kiểm tra quyền truy cập (Auth Guard)
    const isProtected = protectedPages.includes(finalPageName);
    const isAuthPage = authPages.includes(finalPageName);

    if (isProtected) {
      if (window.currentUser) {
        // Đã login + Trang bảo vệ -> CHO PHÉP
        targetPageId = pageMap[finalPageName];
        console.log(" Authenticated access to:", finalPageName);
      } else {
        // Chưa login + Trang bảo vệ -> ĐÁ VỀ LOGIN
        console.warn(" Unauthorized access. Redirecting to Login.");
        targetPageId = "page-login";
        finalPageName = "login";
      }
    } else if (isAuthPage) {
      if (window.currentUser && finalPageName !== "verify-email") {
        // Đã login mà vào Login/Register/Landing -> ĐẨY VÀO DASHBOARD
        console.log("ℹ User already logged in. Redirecting to Dashboard.");
        targetPageId = "page-dashboard";
        finalPageName = "dashboard";
      } else {
        // Chưa login + Trang public -> CHO PHÉP
        targetPageId = pageMap[finalPageName];
      }
    } else {
      targetPageId = pageMap[finalPageName] || "page-landing";
    }

    console.log(" Final Target Page:", targetPageId);

    // Đánh dấu đang restore trang (để không scroll lên đầu)
    window._isRestoringPage = true;

    // Hiển thị trang cuối cùng
    showPage(targetPageId, {}, false);

    // Khôi phục vị trí scroll sau khi trang đã hiển thị
    restoreScrollPosition(finalPageName);

    // Reset flag sau khi restore xong
    setTimeout(() => {
      window._isRestoringPage = false;
    }, 500);

    // Load dữ liệu dashboard nếu cần
    if (
      targetPageId === "page-dashboard" &&
      typeof loadDashboardData === "function"
    ) {
      setTimeout(loadDashboardData, 100);
    }
  });
  // ==================== URL State Management ====================

  /**
   * Cáº­p nháº­t URL state mÃ  khÃ´ng reload trang
   * @param {string} pageName - TÃªn trang (dashboard, topics, login, etc.)
   */
  function updateURLState(pageName) {
    if (!pageName) return;

    const newURL = window.location.pathname + "?page=" + pageName;
    console.log("ðŸ”— Updating URL to:", newURL);

    // Sá»­ dá»¥ng replaceState Ä‘á»ƒ khÃ´ng táº¡o entry má»›i trong history
    window.history.replaceState({ page: pageName }, "", newURL);
  }

  // ==================== Page Navigation ====================

  /**
   * Show specific page and hide others
   * @param {string} pageId - ID of the page to show
   * @param {object} params - Optional parameters to pass to the page
   * @param {boolean} addToHistory - Whether to add this navigation to browser history
   */
  function showPage(pageId, params = {}, addToHistory = true) {
    console.log("Showing page:", pageId);

    // ===== AUTH LAYER INTEGRATION =====
    // Các trang auth cũ giờ được xử lý trong auth layer của landing
    const authPageIds = [
      "page-login",
      "page-register",
      "page-verify-email",
      "page-forgot-password",
    ];
    const authFormMapping = {
      "page-login": "login",
      "page-register": "register",
      "page-verify-email": "verify",
      "page-forgot-password": "forgot",
    };

    if (authPageIds.includes(pageId)) {
      const formType = authFormMapping[pageId];
      // Hiện landing page trước
      const allPages = document.querySelectorAll(".page-content");
      allPages.forEach((page) => (page.style.display = "none"));
      const landingPage = document.getElementById("page-landing");
      if (landingPage) {
        landingPage.style.display = "block";
      }
      // Mở auth panel với form tương ứng
      if (typeof openAuthPanel === "function") {
        setTimeout(() => openAuthPanel(formType), 100);
        console.log("🔄 Redirected to auth panel:", formType);
        return;
      }
    }
    // ===================================

    // Safety check: Nếu pageId không tồn tại trong DOM, về landing
    if (!document.getElementById(pageId)) {
      console.error("Page ID not found:", pageId);
      pageId = "page-landing";
    }

    // Hide toast when changing pages
    if (typeof hideToast === "function") hideToast();

    // 1. Ẩn tất cả trang
    const allPages = document.querySelectorAll(".page-content");
    allPages.forEach((page) => (page.style.display = "none"));

    // 2. Hiện trang đích
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
      targetPage.style.display = "block"; // Dòng này hiện trang

      // ⭐ Xử lý class no-scroll: chỉ áp dụng cho landing page
      if (pageId === "page-landing") {
        document.body.classList.add("no-scroll");
      } else {
        document.body.classList.remove("no-scroll");
      }

      // 3. Lưu trạng thái
      const pageName = pageId.replace("page-", "");
      localStorage.setItem("lastActivePage", pageName);

      // Cập nhật URL ảo
      if (typeof updateURLState === "function") updateURLState(pageName);

      // Cập nhật title của trang
      const pageTitles = {
        landing: "O.Uiz - Learning Platform",
        dashboard: "Dashboard - O.Uiz",
        topics: "Chủ đề - O.Uiz",
        lesson: "Bài học - O.Uiz",
        mcq: "Trắc nghiệm - O.Uiz",
        matching: "Nối từ - O.Uiz",
        profile: "Hồ sơ - O.Uiz",
      };
      document.title = pageTitles[pageName] || "O.Uiz";

      // Update browser history
      if (addToHistory) {
        const state = { pageId: pageId, params: params };
        const url = window.location.pathname + "?page=" + pageName;
        history.pushState(state, "", url);
      }

      // Scroll lên đầu trang khi chuyển trang (trừ khi đang restore)
      if (!window._isRestoringPage) {
        window.scrollTo({ top: 0, behavior: "instant" });
      }

      // --- KHU VỰC SỬA LỖI (FIX CRASH) ---
      // Bọc việc update UI trong try-catch để nếu lỗi giao diện thì trang vẫn load được
      if (pageId === "page-dashboard") {
        try {
          // Kiểm tra các biến thể hàm update navbar
          if (typeof updateNavbarActive === "function") {
            updateNavbarActive("page-dashboard");
          } else if (
            typeof Sidebar !== "undefined" &&
            typeof Sidebar.updateActiveNav === "function"
          ) {
            Sidebar.updateActiveNav("page-dashboard");
          }
        } catch (e) {
          console.warn("Navbar update failed (ignored to allow page load):", e);
        }
      }
      // --------------------------------------

      // Pass params logic
      if (Object.keys(params).length > 0) {
        window.currentPageParams = params;
      }

      // Các xử lý khởi tạo trang con (dùng try-catch để an toàn)
      try {
        if (pageId === "page-dashboard") {
          if (typeof refreshDashboardOnReturn === "function")
            refreshDashboardOnReturn();
        }
        if (pageId === "page-topics") {
          if (typeof initTopicsPage === "function") initTopicsPage();
          else if (typeof window.initTopicsPageOnShow === "function")
            window.initTopicsPageOnShow();
        }
        if (
          pageId === "page-lesson" &&
          typeof window.initLessonPage === "function"
        )
          window.initLessonPage();
        if (pageId === "page-mcq" && typeof window.initMCQPage === "function")
          window.initMCQPage();
        if (
          pageId === "page-matching" &&
          typeof window.initMatchingPage === "function"
        )
          window.initMatchingPage();
        if (
          pageId === "page-profile" &&
          typeof window.initProfilePage === "function"
        )
          setTimeout(() => window.initProfilePage(), 100);
      } catch (subPageError) {
        console.error("Error initializing sub-page:", subPageError);
      }
    } else {
      console.error("Page not found:", pageId);
    }
  }
  // ==================== Browser History Handling ====================

  /**
   * Handle browser back/forward buttons
   */
  window.addEventListener("popstate", function (event) {
    console.log("Popstate event:", event.state);

    if (event.state && event.state.pageId) {
      // Navigate to the page from history without adding to history again
      showPage(event.state.pageId, event.state.params || {}, false);
    } else {
      // No state - go to default page
      const savedUser = localStorage.getItem("currentUser");
      if (savedUser) {
        showPage("page-dashboard", {}, false);
      } else {
        showPage("page-landing", {}, false);
      }
    }
  });

  // Initialize history state on first load
  window.addEventListener("load", function () {
    if (!history.state) {
      const currentPage = localStorage.getItem("lastActivePage") || "landing";
      const pageId = "page-" + currentPage;
      const state = { pageId: pageId, params: {} };
      history.replaceState(
        state,
        "",
        window.location.pathname + "?page=" + currentPage,
      );
    }
  });

  /**
   * Update navbar active state
   */
  function updateNavbarActive(activePageId) {
    const navItems = document.querySelectorAll(".navbar-item");
    navItems.forEach((item) => {
      item.classList.remove("active");
    });
  }

  // ==================== Authentication ====================

  /**
   * Initialize Google Sign-In
   * âš ï¸ FIX FedCM Error: KhÃ´ng dÃ¹ng Google Identity Services trong Apps Script iframe
   * Chá»‰ dÃ¹ng OAuth2 flow truyá»n thá»‘ng qua backend
   */
  function initGoogleSignIn() {
    // âœ… ÄÃ¡nh dáº¥u Ä‘Ã£ sáºµn sÃ ng (khÃ´ng cáº§n load Google API ná»¯a)
    googleClientInitialized = true;
    console.log(
      "âœ… Google OAuth2 ready (FedCM/One Tap disabled - using backend OAuth2 flow)",
    );
    console.log(
      "â„¹ï¸ Apps Script runs in iframe - FedCM not supported. Using traditional OAuth2.",
    );
  }

  /**
   * Handle Google credential response
   * âš ï¸ DEPRECATED: KhÃ´ng dÃ¹ng ná»¯a vÃ¬ Ä‘Ã£ táº¯t Google Identity Services
   * Giá»¯ láº¡i Ä‘á»ƒ trÃ¡nh lá»—i náº¿u cÃ³ reference cÅ©
   */
  function handleGoogleCredentialResponse(response) {
    console.warn(
      "âš ï¸ handleGoogleCredentialResponse called - this should not happen",
    );
    console.log("Falling back to OAuth2 flow...");

    // Fallback: Náº¿u váº«n Ä‘Æ°á»£c gá»i, chuyá»ƒn sang OAuth2
    handleGoogleLogin();
  }

  /**
   * Handle login form submission
   */
  function handleLoginFormSubmit() {
    console.log("Login form submitted");

    // Get form data
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    // Validation
    if (!username || !password) {
      showToast("Vui lòng nhập đầy đủ thông tin", "error");
      return false;
    }

    // Prepare payload
    const payload = {
      username: username,
      password: password,
    };

    // Show loading
    showLoading(true);
    disableButton("btn-login");

    // Call backend function
    google.script.run
      .withSuccessHandler(onLoginSuccess)
      .withFailureHandler(onApiError)
      .loginUser(payload);

    return false;
  }

  /**
   * Handle successful login
   */
  function onLoginSuccess(response) {
    console.log("Login response:", JSON.stringify(response));
    console.log("Response status:", response.status);
    console.log("Response message:", response.message);
    hideLoading();
    enableButton("btn-login");

    if (response.status === "success") {
      // Save user to localStorage (auto logout when closing tab)
      currentUser = response.user;
      window.currentUser = response.user; // â­ Äá»“ng bá»™ vÃ o window
      localStorage.setItem("currentUser", JSON.stringify(currentUser));
      localStorage.setItem("isLoggedIn", "true");
      console.log("âœ… Current user synced to window:", currentUser);

      // Show success message
      showToast("Đăng nhập thành công!", "success");

      // Navigate to dashboard
      setTimeout(() => {
        showPage("page-dashboard");
        loadDashboardData();
      }, 500);
    } else {
      showToast(response.message || "Đăng nhập thất bại", "error");
    }
  }

  /**
   * Handle register form submission - NEW VERSION
   */
  function handleRegisterFormSubmit() {
    console.log("ðŸ“ Register form submitted");

    // Get form data
    const fullName = document.getElementById("register-fullname").value.trim();
    const email = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    const confirmPassword = document.getElementById(
      "register-confirm-password",
    ).value;

    // Validation
    if (!fullName || !email || !password || !confirmPassword) {
      showToast("Vui lòng điền đầy đủ thông tin", "error");
      return false;
    }

    if (password.length < 6) {
      showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
      return false;
    }

    if (password !== confirmPassword) {
      showToast("Mật khẩu xác nhận không khớp", "error");
      return false;
    }

    // Prepare payload
    const userData = {
      email: email,
      password: password,
      confirmPassword: confirmPassword,
      fullName: fullName,
    };

    // Show loading
    showLoading(true);

    // Call backend function
    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("âœ… Register Response:", response);

        if (response.success) {
          // Hiá»ƒn thá»‹ thÃ´ng bÃ¡o xÃ¡c thá»±c email
          showToast(response.message, "success");

          // --- PHáº¦N Sá»¬A Äá»”I QUAN TRá»ŒNG á»ž ÄÃ‚Y ---

          // Kiá»ƒm tra xem server cÃ³ yÃªu cáº§u xÃ¡c thá»±c khÃ´ng
          if (response.requiresVerification) {
            console.log(
              "ðŸ” YÃªu cáº§u xÃ¡c thá»±c email, Ä‘ang chuyá»ƒn hÆ°á»›ng...",
            );

            // 1. LÆ°u email vÃ o localStorage Ä‘á»ƒ trang Verify biáº¿t xÃ¡c thá»±c cho ai
            const verificationData = {
              email: email,
              timestamp: new Date().getTime(),
            };
            localStorage.setItem(
              "pendingVerification",
              JSON.stringify(verificationData),
            );

            // 2. Chuyá»ƒn sang trang Verify thay vÃ¬ Login
            setTimeout(() => {
              showPage("page-verify-email");
            }, 1500);
          } else {
            // Náº¿u khÃ´ng cáº§n xÃ¡c thá»±c thÃ¬ má»›i vá» Login
            setTimeout(() => {
              showPage("page-login");
            }, 3000);
          }
          // --------------------------------------
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("âŒ Register Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .registerWithEmailPassword(userData);

    return false;
  }

  /**
   * Handle successful registration
   */
  function onRegisterSuccess(response) {

  /**
   * Handle logout
   */
  function handleLogout() {
    console.log("Logging out...");

    let errorMessage = "Có lỗi xảy ra";

      if (msg.includes("429") || msg.includes("too many requests")) {
        errorMessage = "Quá nhiều yêu cầu. Vui lòng đợi 1 phút và thử lại.";
      } else if (msg.includes("timeout")) {
        errorMessage =
          "Hết thời gian chờ. Vui lòng kiểm tra kết nối và thử lại.";
      } else if (msg.includes("network")) {
        errorMessage =
          "Lỗi kết nối mạng. Vui lòng kiểm tra internet và thử lại.";
      } else {
        errorMessage = "Có lỗi xảy ra: " + error.message;
      }
    }

    showToast(errorMessage, "error");
  }

  /**

   */
  function formatDate(dateString) {
    if (!dateString) return "";

    try {
      const date = new Date(dateString);
      return date.toLocaleDateString("vi-VN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    } catch (error) {
      return dateString;
    }
  }

  /**
   * Handle Reset Password with Code (Step 2)
   */
  function handleResetPassword() {
    const email = document.getElementById("reset-email").value;
    const code = document.getElementById("verification-code").value.trim();
    const newPassword = document.getElementById("new-password").value;
    const confirmPassword = document.getElementById(
      "confirm-new-password",
    ).value;

    // Validation
    if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) {
      showToast("Vui lòng nhập mã xác thực 6 chữ số", "error");
      return;
    }

    if (!newPassword || newPassword.length < 6) {
      showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
      return;
    }

    if (newPassword !== confirmPassword) {

        } else {

        hideLoading();
        console.error("âŒ Reset Password Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .resetPasswordWithCode({

        code: code,

  // ==================== Toast Notification System ====================

  /**
   * Show toast notification with star effect
   * @param {string} message - Message to display
   * @param {string} type - Type: 'success', 'error', 'info', 'warning'
   */
  function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toast-message");

    if (!toast || !toastMessage) return;

    // Set message
    toastMessage.textContent = message;

    // Set colors based on type
    toast.classList.remove(
      "bg-green-500",
      "bg-red-500",
      "bg-blue-500",
      "bg-yellow-500",
    );
    switch (type) {
      case "success":
        toast.classList.add("bg-green-500");
        break;
      case "error":
        toast.classList.add("bg-red-500");
        break;
      case "warning":
        toast.classList.add("bg-yellow-500");
        break;
      default:
        toast.classList.add("bg-blue-500");
    }

    // Show toast with animation
    toast.classList.remove("translate-x-full");
    toast.classList.add("translate-x-0");

    // Auto hide after 3 seconds
    setTimeout(() => {
      hideToast();
    }, 3000);
  }

  /**
   * Hide toast notification
   */
  function hideToast() {
    const toast = document.getElementById("toast");
    if (toast) {
      toast.classList.remove("translate-x-0");
      toast.classList.add("translate-x-full");
    }
  }

  // ==================== Notification Panel Toggle ====================

  document.addEventListener("click", function (e) {
    const notificationBtn = e.target.closest(
      ".notification-btn, #notificationBtn",
    );
    const closeNotifBtn = e.target.closest(".close-notif-btn, #closeNotifBtn");
    const notificationPanel =
      document.getElementById("notificationPanel") ||
      document.querySelector(".notification-panel");

    if (notificationBtn && notificationPanel) {
      const isVisible = notificationPanel.style.display === "block";
      notificationPanel.style.display = isVisible ? "none" : "block";
      e.stopPropagation();
    } else if (closeNotifBtn && notificationPanel) {
      notificationPanel.style.display = "none";
      e.stopPropagation();
    } else if (
      notificationPanel &&
      notificationPanel.style.display === "block"
    ) {
      if (!notificationPanel.contains(e.target)) {
        notificationPanel.style.display = "none";
      }
    }
  });

  // LEARNING TIME TRACKER - Client Side

  /**
   * Learning Time Tracker
   * Tracks time spent in learning activities and syncs to server
   */
  window.LearningTracker = (function () {
    let isTracking = false;
    let currentActivity = null; // 'lesson' | 'mindmap' | 'flashcard' | 'quiz'
    let accumulatedSeconds = 0;
    let saveInterval = null;
    let tickInterval = null;

    const SAVE_INTERVAL_MS = 60000; // Save every 1 minute
    const GOAL_MINUTES = 15; // Daily goal for streak

    /**
     * Start tracking for a specific activity
     */
    function start(activityType) {
      if (isTracking && currentActivity === activityType) {
        return;
      }

      if (isTracking) {
        stop();
      }

      currentActivity = activityType;
      accumulatedSeconds = 0;
      isTracking = true;

      console.log(`⏱️ Started tracking: ${activityType}`);

      tickInterval = setInterval(function () {
        if (!document.hidden) {
          accumulatedSeconds++;
          updateLocalStorage();
        }
      }, 1000);

      saveInterval = setInterval(function () {
        saveToServer();
      }, SAVE_INTERVAL_MS);

      document.addEventListener("visibilitychange", handleVisibilityChange);
    }

    function stop() {
      if (!isTracking) return;

      console.log(
        `⏱️ Stopped tracking: ${currentActivity}, accumulated: ${accumulatedSeconds}s`,
      );

      if (accumulatedSeconds >= 60) {
        saveToServer();
      }

      if (tickInterval) clearInterval(tickInterval);
      if (saveInterval) clearInterval(saveInterval);
      document.removeEventListener("visibilitychange", handleVisibilityChange);

      isTracking = false;
      currentActivity = null;
      accumulatedSeconds = 0;
    }

    function handleVisibilityChange() {
      if (document.hidden) {
        console.log("⏸️ Tab hidden - pausing");
      } else {
        console.log("▶️ Tab visible - resuming");
      }
    }

    function updateLocalStorage() {
      var today = new Date().toISOString().split("T")[0];
      var storageKey = "dailyLearningTime";
      var data = {};

      try {
        var stored = localStorage.getItem(storageKey);
        if (stored) data = JSON.parse(stored);
      } catch (e) {}

      if (data.date !== today) {
        data = {
          date: today,
          totalMinutes: 0,
          streakAchieved: false,
          pendingSeconds: 0,
        };
      }

      data.pendingSeconds = (data.pendingSeconds || 0) + 1;
      data[currentActivity + "Seconds"] =
        (data[currentActivity + "Seconds"] || 0) + 1;

      var totalSeconds =
        (data.lessonSeconds || 0) +
        (data.mindmapSeconds || 0) +
        (data.flashcardSeconds || 0) +
        (data.quizSeconds || 0);
      data.totalMinutes = Math.floor(totalSeconds / 60);

      localStorage.setItem(storageKey, JSON.stringify(data));
      updateDashboardTimeUI(data);
    }

    function saveToServer() {
      var minutesToSave = Math.floor(accumulatedSeconds / 60);
      if (minutesToSave < 1) {
        console.log(
          "⏳ Not enough time yet: " + accumulatedSeconds + " seconds",
        );
        return;
      }

      console.log(
        "💾 Saving " +
          minutesToSave +
          " minutes of " +
          currentActivity +
          " to server...",
      );

      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.success) {
            console.log("✅ Saved. Daily total: " + result.dailyTotal + " min");

            var storageKey = "dailyLearningTime";
            var data = {};
            try {
              var stored = localStorage.getItem(storageKey);
              if (stored) data = JSON.parse(stored);
            } catch (e) {}

            data.serverTotal = result.dailyTotal;
            data.streakAchieved = result.streakAchieved;
            localStorage.setItem(storageKey, JSON.stringify(data));
            updateDashboardTimeUI(data);

            if (result.streakAchieved && !data.notifiedStreak) {
              data.notifiedStreak = true;
              localStorage.setItem(storageKey, JSON.stringify(data));
              if (typeof window.showNotification === "function") {
                window.showNotification(
                  "🎉 Tuyệt vời! Bạn đã học đủ 15 phút hôm nay!",
                  "success",
                );
              }
            }
          }
        })
        .withFailureHandler(function (error) {
          console.error("❌ Failed to save learning time:", error);
        })
        .saveLearningTime({
          minutes: minutesToSave,
          activityType: currentActivity,
        });

      accumulatedSeconds = accumulatedSeconds % 60;
    }

    function updateDashboardTimeUI(data) {
      var todayTimeEl = document.getElementById("today-time");
      var todayMinutesEl = document.getElementById("today-minutes");
      var timeStatusEl = document.getElementById("time-status");

      var totalMinutes = data.serverTotal || data.totalMinutes || 0;

      if (todayTimeEl) todayTimeEl.textContent = totalMinutes;
      if (todayMinutesEl) todayMinutesEl.textContent = totalMinutes;

      if (timeStatusEl) {
        if (totalMinutes >= GOAL_MINUTES) {
          timeStatusEl.textContent = "Đã đạt";
          timeStatusEl.classList.add("achieved");
        } else {
          timeStatusEl.textContent = GOAL_MINUTES - totalMinutes + " phút nữa";
          timeStatusEl.classList.remove("achieved");
        }
      }
    }

    function getStats() {
      try {
        var stored = localStorage.getItem("dailyLearningTime");
        if (stored) return JSON.parse(stored);
      } catch (e) {}
      return null;
    }

    function loadFromServer(callback) {
      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.success) {
            var today = new Date().toISOString().split("T")[0];
            var data = {
              date: today,
              totalMinutes: result.dailyTotal || 0,
              serverTotal: result.dailyTotal || 0,
              streakAchieved: result.streakAchieved || false,
            };
            localStorage.setItem("dailyLearningTime", JSON.stringify(data));
            updateDashboardTimeUI(data);
            if (callback) callback(data);
          }
        })
        .withFailureHandler(function (error) {
          console.error("Failed to load learning stats:", error);
          if (callback) callback(null);
        })
        .getTodayLearningStats();
    }

    return {
      start: start,
      stop: stop,
      getStats: getStats,
      loadFromServer: loadFromServer,
      GOAL_MINUTES: GOAL_MINUTES,
    };
  })();

  window.loadDashboardData = loadDashboardData;
