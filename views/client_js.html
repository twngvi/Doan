<script>
  /**
   * client_js.html - Client-Side JavaScript
   *
   * Handles all frontend logic, API calls, navigation, and UI updates
   */

  // ==================== Global Variables ====================
  var currentUser = null; // â­ DÃ¹ng var Ä‘á»ƒ tá»± Ä‘á»™ng gáº¯n vÃ o window
  window.currentUser = null; // â­ GÃ¡n trá»±c tiáº¿p Ä‘á»ƒ cháº¯c cháº¯n
  let isGoogleAuthInProgress = false; // Prevent multiple simultaneous requests
  let googleClientInitialized = false;
  let heartbeatIntervalId = null;
  let heartbeatMonitorId = null;
  let heartbeatEventsBound = false;
  let lastHeartbeatAt = 0;
  const GLOBAL_BACK_TO_TOP_SHOW_OFFSET = 220;
  let appBackToTopBound = false;
  let appBackToTopScrollHandler = null;
  let appBackToTopScrollSource = null;

  const HEARTBEAT_INTERVAL_MS = 30000;
  const HEARTBEAT_ACTIVITY_THROTTLE_MS = 20000;

  function getStoredCurrentUser() {
    try {
      const raw = localStorage.getItem("currentUser");
      return raw ? JSON.parse(raw) : null;
    } catch (e) {
      console.warn("Parse currentUser failed:", e);
      return null;
    }
  }

  function getHeartbeatUser() {
    return window.currentUser || currentUser || getStoredCurrentUser();
  }

  function isSessionLoggedIn() {
    return (
      localStorage.getItem("isLoggedIn") === "true" && !!getHeartbeatUser()
    );
  }

  function sendUserHeartbeat(reason = "interval") {
    const user = getHeartbeatUser();
    if (!user || !isSessionLoggedIn()) return;
    if (typeof google === "undefined" || !google.script || !google.script.run)
      return;

    const now = Date.now();
    if (
      reason === "activity" &&
      now - lastHeartbeatAt < HEARTBEAT_ACTIVITY_THROTTLE_MS
    ) {
      return;
    }

    lastHeartbeatAt = now;
    const page = (localStorage.getItem("lastActivePage") || "").toString();

    google.script.run
      .withFailureHandler((error) => {
        console.warn("Heartbeat failed:", error);
      })
      .updateUserHeartbeat({
        userId: user.userId || "",
        email: user.email || "",
        page: page,
      });
  }

  function bindHeartbeatEventsOnce() {
    if (heartbeatEventsBound) return;
    heartbeatEventsBound = true;

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) sendUserHeartbeat("visibility");
    });
    window.addEventListener("focus", () => sendUserHeartbeat("focus"));
    window.addEventListener("online", () => sendUserHeartbeat("online"));

    const passiveEvents = [
      "click",
      "keydown",
      "mousemove",
      "touchstart",
      "scroll",
    ];
    passiveEvents.forEach((eventName) => {
      window.addEventListener(eventName, () => sendUserHeartbeat("activity"), {
        passive: true,
      });
    });
  }

  function startUserHeartbeat() {
    if (!isSessionLoggedIn()) return;
    if (heartbeatIntervalId) return;

    bindHeartbeatEventsOnce();
    sendUserHeartbeat("start");
    heartbeatIntervalId = setInterval(() => {
      sendUserHeartbeat("interval");
    }, HEARTBEAT_INTERVAL_MS);
  }

  function stopUserHeartbeat() {
    if (!heartbeatIntervalId) return;
    clearInterval(heartbeatIntervalId);
    heartbeatIntervalId = null;
  }

  function initHeartbeatMonitor() {
    if (heartbeatMonitorId) return;
    heartbeatMonitorId = setInterval(() => {
      if (isSessionLoggedIn()) {
        startUserHeartbeat();
      } else {
        stopUserHeartbeat();
      }
    }, 5000);
  }

  function applyThemeFromAuthenticatedUser(user) {
    try {
      if (!user) return;
      currentUser = user;
      window.currentUser = user;
      if (window.ThemeManager) {
        window.ThemeManager.initTheme();
      }
    } catch (e) {
      console.warn("Apply user theme failed:", e);
    }
  }

  function getVisiblePageContent() {
    const pages = document.querySelectorAll(".page-content");
    for (const page of pages) {
      if (window.getComputedStyle(page).display !== "none") {
        return page;
      }
    }
    return null;
  }

  function resolveAppBackToTopScrollSource() {
    const visiblePage = getVisiblePageContent();
    return visiblePage || window;
  }

  function getAppScrollTop(scrollSource) {
    if (scrollSource === window) {
      return (
        window.pageYOffset ||
        document.documentElement.scrollTop ||
        document.body.scrollTop ||
        0
      );
    }
    return Number(scrollSource.scrollTop) || 0;
  }

  function updateAppBackToTopVisibility() {
    const button = document.getElementById("app-back-to-top");
    if (!button) return;

    const source = appBackToTopScrollSource || resolveAppBackToTopScrollSource();
    const shouldShow = getAppScrollTop(source) > GLOBAL_BACK_TO_TOP_SHOW_OFFSET;
    button.classList.toggle("show", shouldShow);
  }

  function scrollActivePageToTop() {
    const source = appBackToTopScrollSource || resolveAppBackToTopScrollSource();
    if (source === window) {
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }

    if (typeof source.scrollTo === "function") {
      source.scrollTo({ top: 0, behavior: "smooth" });
    } else {
      source.scrollTop = 0;
    }
  }

  function syncAppBackToTopScrollSource() {
    if (!appBackToTopScrollHandler) {
      appBackToTopScrollHandler = updateAppBackToTopVisibility;
    }

    const nextSource = resolveAppBackToTopScrollSource();
    if (appBackToTopScrollSource && appBackToTopScrollSource !== nextSource) {
      appBackToTopScrollSource.removeEventListener(
        "scroll",
        appBackToTopScrollHandler,
      );
    }

    if (appBackToTopScrollSource !== nextSource) {
      nextSource.addEventListener("scroll", appBackToTopScrollHandler, {
        passive: true,
      });
      appBackToTopScrollSource = nextSource;
    }

    updateAppBackToTopVisibility();
  }

  function initGlobalBackToTop() {
    const button = document.getElementById("app-back-to-top");
    if (!button) return;

    if (!appBackToTopBound) {
      button.addEventListener("click", scrollActivePageToTop);
      appBackToTopBound = true;
    }

    syncAppBackToTopScrollSource();
  }

  // ==================== Initialization ====================
  document.addEventListener("DOMContentLoaded", function () {
    console.log("App Initializing...");

    // Initialize Google Sign-In
    initGoogleSignIn();

    // BƯỚC 1: Khôi phục Session NGAY LẬP TỨC
    // Phải làm điều này trước khi quyết định hiển thị trang nào
    try {
      const savedUserStr = localStorage.getItem("currentUser");
      const isLoggedInStr = localStorage.getItem("isLoggedIn");

      if (savedUserStr && isLoggedInStr === "true") {
        const user = JSON.parse(savedUserStr);
        // Đồng bộ vào biến toàn cục
        currentUser = user;
        window.currentUser = user;
        console.log(" Session recovered for:", user.email || user.username);
        console.log("🎭 Display Name:", user.displayName);

        // ⭐ CẬP NHẬT UI NGAY - Tất cả vị trí hiển thị tên
        setTimeout(() => {
          if (typeof window.updateAllUserNames === "function") {
            window.updateAllUserNames(
              user.displayName || user.username || "User",
            );
          }
          if (typeof window.updateAllUserAvatars === "function") {
            window.updateAllUserAvatars(user.avatarUrl);
          }
        }, 100);
      } else {
        console.log("ℹ No active session found");
        currentUser = null;
        window.currentUser = null;
      }
    } catch (e) {
      console.error(" Error recovering session:", e);
      localStorage.clear();
      currentUser = null;
      window.currentUser = null;
    }

    if (isSessionLoggedIn()) {
      startUserHeartbeat();
    }
    initHeartbeatMonitor();

    // BƯỚC 1.5: Khôi phục Theme ngay lập tức (via ThemeManager)
    try {
      if (window.ThemeManager) {
        window.ThemeManager.initTheme();
      }
    } catch (e) {
      console.warn("Theme restore failed:", e);
    }

    // BƯỚC 2: Xác định trang đích (Routing Logic)

    // Ưu tiên 1: Link từ email/server (window.SERVER_PARAMS.page)
    let requestedPageName = window.SERVER_PARAMS?.page || "";

    // Ưu tiên 2: Trạng thái cũ khi F5 (localStorage)
    if (!requestedPageName) {
      requestedPageName = localStorage.getItem("lastActivePage");
      if (requestedPageName) {
        console.log(" Recovered page from storage:", requestedPageName);
      }
    } else {
      console.log(" Server requested page:", requestedPageName);
    }

    // Định nghĩa danh sách trang
    const pageMap = {
      dashboard: "page-dashboard",
      topics: "page-topics",
      mcq: "page-mcq",
      lesson: "page-lesson",
      matching: "page-matching",
      pet: "page-pet",
      profile: "page-profile",
      admin: "page-admin",
      landing: "page-landing",
      // Auth pages giờ nằm trong auth layer của landing
      login: "page-landing",
      register: "page-landing",
      "verify-email": "page-landing",
      "forgot-password": "page-landing",
    };

    // ⭐ Tách riêng trang cho từng role
    const adminOnlyPages = ["admin"]; // Chỉ admin được vào
    const userOnlyPages = [
      "dashboard",
      "topics",
      "mcq",
      "lesson",
      "matching",
      "pet",
      "profile",
    ]; // Chỉ user được vào
    const protectedPages = [...adminOnlyPages, ...userOnlyPages]; // Tất cả trang cần login

    const authPages = [
      "login",
      "register",
      "landing",
      "forgot-password",
      "verify-email",
    ];

    // Mapping auth page name to auth form type
    const authFormMap = {
      login: "login",
      register: "register",
      "verify-email": "verify",
      "forgot-password": "forgot",
    };

    // Mặc định là landing
    let targetPageId = "page-landing";
    let finalPageName = "landing";

    // Logic định tuyến
    if (requestedPageName && pageMap[requestedPageName]) {
      finalPageName = requestedPageName;
    } else {
      // Nếu không có trang yêu cầu, nhưng đã login -> kiểm tra role
      if (window.currentUser) {
        // ⭐ Admin vào trang admin, User vào dashboard
        finalPageName =
          window.currentUser.role === "ADMIN" ? "admin" : "dashboard";
      }
    }

    // BƯỚC 3: Kiểm tra quyền truy cập (Auth Guard)
    const isProtected = protectedPages.includes(finalPageName);
    const isAuthPage = authPages.includes(finalPageName);
    const userRole = window.currentUser?.role || "";
    const isAdmin = userRole === "ADMIN";

    // ⭐ ROLE-BASED ACCESS CONTROL
    if (isProtected) {
      if (window.currentUser) {
        // Đã login - kiểm tra quyền theo role
        const isAdminPage = adminOnlyPages.includes(finalPageName);
        const isUserPage = userOnlyPages.includes(finalPageName);

        if (isAdmin) {
          // ADMIN chỉ được vào trang admin
          if (isUserPage) {
            console.warn(
              "🛡️ Admin không được vào trang user. Redirect về admin.",
            );
            targetPageId = "page-admin";
            finalPageName = "admin";
          } else {
            targetPageId = pageMap[finalPageName];
            console.log("🛡️ Admin access to:", finalPageName);
          }
        } else {
          // USER chỉ được vào trang user
          if (isAdminPage) {
            console.warn(
              "🚫 User không được vào trang admin. Redirect về dashboard.",
            );
            targetPageId = "page-dashboard";
            finalPageName = "dashboard";
          } else {
            targetPageId = pageMap[finalPageName];
            console.log("👤 User access to:", finalPageName);
          }
        }
      } else {
        // Chưa login + Trang bảo vệ -> ĐÁ VỀ LOGIN
        console.warn(" Unauthorized access. Redirecting to Login.");
        targetPageId = "page-login";
        finalPageName = "login";
      }
    } else if (isAuthPage) {
      if (window.currentUser && finalPageName !== "verify-email") {
        // ⭐ Đã login mà vào Login/Register/Landing -> Redirect theo role
        const defaultPage = isAdmin ? "admin" : "dashboard";
        console.log("ℹ User already logged in. Redirecting to:", defaultPage);
        targetPageId = pageMap[defaultPage];
        finalPageName = defaultPage;
      } else {
        // Chưa login + Trang public -> CHO PHÉP
        targetPageId = pageMap[finalPageName];
      }
    } else {
      targetPageId = pageMap[finalPageName] || "page-landing";
    }

    console.log(" Final Target Page:", targetPageId);

    // Đánh dấu đang restore trang (để không scroll lên đầu)
    window._isRestoringPage = true;

    // Hiển thị trang cuối cùng
    showPage(targetPageId, {}, false);

    initGlobalBackToTop();

    // Khôi phục vị trí scroll sau khi trang đã hiển thị
    restoreScrollPosition(finalPageName);

    setTimeout(syncAppBackToTopScrollSource, 0);

    // Reset flag sau khi restore xong
    setTimeout(() => {
      window._isRestoringPage = false;
    }, 500);

    // Load dữ liệu dashboard nếu cần
    if (
      targetPageId === "page-dashboard" &&
      typeof loadDashboardData === "function"
    ) {
      setTimeout(loadDashboardData, 100);
    }
  });
  // ==================== URL State Management ====================

  /**
   * Cáº­p nháº­t URL state mÃ  khÃ´ng reload trang
   * @param {string} pageName - TÃªn trang (dashboard, topics, login, etc.)
   */
  function updateURLState(pageName) {
    if (!pageName) return;

    const newURL = window.location.pathname + "?page=" + pageName;
    console.log("ðŸ”— Updating URL to:", newURL);

    // Sá»­ dá»¥ng replaceState Ä‘á»ƒ khÃ´ng táº¡o entry má»›i trong history
    window.history.replaceState({ page: pageName }, "", newURL);
  }

  // ==================== Page Navigation ====================

  function updateBodyPageClass(pageId) {
    if (!document.body) return;

    // Remove every previous page marker class to avoid style leakage between pages.
    Array.from(document.body.classList).forEach((cls) => {
      if (cls.indexOf("page-") === 0) {
        document.body.classList.remove(cls);
      }
    });

    document.body.classList.remove(
      "page-dashboard",
      "page-topics",
      "page-code-playground",
      "page-lesson",
      "page-mcq",
      "page-matching",
      "page-pet",
      "page-profile",
      "page-admin",
      "page-landing",
    );

    if (pageId) {
      document.body.classList.add(pageId);
    }
  }

  /**
   * Show specific page and hide others
   * @param {string} pageId - ID of the page to show
   * @param {object} params - Optional parameters to pass to the page
   * @param {boolean} addToHistory - Whether to add this navigation to browser history
   */
  function showPage(pageId, params = {}, addToHistory = true) {
    console.log("Showing page:", pageId);

    const incomingPageName = (pageId || "").replace("page-", "");
    if (!isAuthPageName(incomingPageName)) {
      // Prevent stale overlay from leaking into app pages after login.
      hideLoading();
    }

    // ⭐ ROLE-BASED ACCESS CONTROL
    const adminOnlyPageIds = ["page-admin"];
    const userOnlyPageIds = [
      "page-dashboard",
      "page-topics",
      "page-mcq",
      "page-lesson",
      "page-matching",
      "page-pet",
      "page-profile",
    ];
    const userRole = window.currentUser?.role || "";
    const isAdmin = userRole === "ADMIN";

    // Kiểm tra quyền truy cập
    if (window.currentUser) {
      if (isAdmin && userOnlyPageIds.includes(pageId)) {
        console.warn("🛡️ Admin không được vào trang user:", pageId);
        showToast("Admin chỉ có thể truy cập Admin Panel", "warning");
        pageId = "page-admin";
      } else if (!isAdmin && adminOnlyPageIds.includes(pageId)) {
        console.warn("🚫 User không được vào trang admin:", pageId);
        showToast("Bạn không có quyền truy cập trang này", "error");
        pageId = "page-dashboard";
      }
    }

    // ===== AUTH LAYER INTEGRATION =====
    // Các trang auth cũ giờ được xử lý trong auth layer của landing
    const authPageIds = [
      "page-login",
      "page-register",
      "page-verify-email",
      "page-forgot-password",
    ];
    const authFormMapping = {
      "page-login": "login",
      "page-register": "register",
      "page-verify-email": "verify",
      "page-forgot-password": "forgot",
    };

    if (authPageIds.includes(pageId)) {
      const formType = authFormMapping[pageId];
      // Hiện landing page trước
      const allPages = document.querySelectorAll(".page-content");
      allPages.forEach((page) => (page.style.display = "none"));
      const landingPage = document.getElementById("page-landing");
      if (landingPage) {
        landingPage.style.display = "block";
      }

      updateBodyPageClass("page-landing");

      // Mở auth panel với form tương ứng
      if (typeof openAuthPanel === "function") {
        setTimeout(() => openAuthPanel(formType), 100);
        console.log("🔄 Redirected to auth panel:", formType);
        return;
      }
    }
    // ===================================

    // Safety check: Nếu pageId không tồn tại trong DOM, về landing
    if (!document.getElementById(pageId)) {
      console.error("Page ID not found:", pageId);
      pageId = "page-landing";
    }

    // Hide toast when changing pages
    if (typeof hideToast === "function") hideToast();

    // 1. Ẩn tất cả trang
    const allPages = document.querySelectorAll(".page-content");
    allPages.forEach((page) => (page.style.display = "none"));

    // 2. Hiện trang đích
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
      targetPage.style.display = "block"; // Dòng này hiện trang

      updateBodyPageClass(pageId);

      // ⭐ Xử lý class no-scroll: chỉ áp dụng cho landing page
      if (pageId === "page-landing") {
        document.body.classList.add("no-scroll");
      } else {
        document.body.classList.remove("no-scroll");
      }

      // 3. Lưu trạng thái
      const pageName = pageId.replace("page-", "");
      localStorage.setItem("lastActivePage", pageName);

      // Cập nhật URL ảo
      if (typeof updateURLState === "function") updateURLState(pageName);

      // Cập nhật title của trang
      const pageTitles = {
        landing: "O.Uiz - Learning Platform",
        dashboard: "Dashboard - O.Uiz",
        topics: "Chủ đề - O.Uiz",
        lesson: "Bài học - O.Uiz",
        mcq: "Trắc nghiệm - O.Uiz",
        matching: "Nối từ - O.Uiz",
        pet: "Pet - O.Uiz",
        profile: "Hồ sơ - O.Uiz",
        admin: "Admin Panel - O.Uiz",
      };
      document.title = pageTitles[pageName] || "O.Uiz";

      // Update browser history
      if (addToHistory) {
        const state = { pageId: pageId, params: params };
        const url = window.location.pathname + "?page=" + pageName;
        history.pushState(state, "", url);
      }

      // Scroll lên đầu trang khi chuyển trang (trừ khi đang restore)
      if (!window._isRestoringPage) {
        window.scrollTo({ top: 0, behavior: "instant" });
      }

      if (typeof syncAppBackToTopScrollSource === "function") {
        setTimeout(syncAppBackToTopScrollSource, 0);
      }

      // --- KHU VỰC SỬA LỖI (FIX CRASH) ---
      // Bọc việc update UI trong try-catch để nếu lỗi giao diện thì trang vẫn load được
      if (pageId === "page-dashboard") {
        try {
          // Kiểm tra các biến thể hàm update navbar
          if (typeof updateNavbarActive === "function") {
            updateNavbarActive("page-dashboard");
          } else if (
            typeof Sidebar !== "undefined" &&
            typeof Sidebar.updateActiveNav === "function"
          ) {
            Sidebar.updateActiveNav("page-dashboard");
          }
        } catch (e) {
          console.warn("Navbar update failed (ignored to allow page load):", e);
        }
      }
      // --------------------------------------

      // Pass params logic
      if (Object.keys(params).length > 0) {
        window.currentPageParams = params;
      }

      // Các xử lý khởi tạo trang con (dùng try-catch để an toàn)
      try {
        if (pageId === "page-dashboard") {
          if (typeof refreshDashboardOnReturn === "function")
            refreshDashboardOnReturn();
        }
        if (pageId === "page-topics") {
          if (typeof initTopicsPage === "function") initTopicsPage();
          else if (typeof window.initTopicsPageOnShow === "function")
            window.initTopicsPageOnShow();
        }
        if (
          pageId === "page-lesson" &&
          typeof window.initLessonPage === "function"
        )
          window.initLessonPage();
        if (pageId === "page-mcq" && typeof window.initMCQPage === "function")
          window.initMCQPage();
        if (
          pageId === "page-matching" &&
          typeof window.initMatchingPage === "function"
        )
          window.initMatchingPage();
        if (pageId === "page-pet" && typeof window.initPetPage === "function")
          window.initPetPage();
        if (pageId === "page-profile") {
          const runProfileInit = () => {
            if (typeof window.initProfilePage === "function") {
              window.initProfilePage();
              return true;
            }
            return false;
          };

          // Retry init a few times in case showPage wrappers are attached asynchronously.
          if (!runProfileInit()) {
            setTimeout(runProfileInit, 200);
            setTimeout(runProfileInit, 500);
          }
        }
      } catch (subPageError) {
        console.error("Error initializing sub-page:", subPageError);
      }
    } else {
      console.error("Page not found:", pageId);
    }
  }
  // ==================== Browser History Handling ====================

  /**
   * Handle browser back/forward buttons
   */
  window.addEventListener("popstate", function (event) {
    console.log("Popstate event:", event.state);

    if (event.state && event.state.pageId) {
      // Navigate to the page from history without adding to history again
      showPage(event.state.pageId, event.state.params || {}, false);
    } else {
      // No state - go to default page
      const savedUser = localStorage.getItem("currentUser");
      if (savedUser) {
        showPage("page-dashboard", {}, false);
      } else {
        showPage("page-landing", {}, false);
      }
    }
  });

  // Initialize history state on first load
  window.addEventListener("load", function () {
    if (!history.state) {
      const currentPage = localStorage.getItem("lastActivePage") || "landing";
      const pageId = "page-" + currentPage;
      const state = { pageId: pageId, params: {} };
      history.replaceState(
        state,
        "",
        window.location.pathname + "?page=" + currentPage,
      );
    }
  });

  /**
   * Update navbar active state
   */
  function updateNavbarActive(activePageId) {
    const navItems = document.querySelectorAll(".navbar-item");
    navItems.forEach((item) => {
      item.classList.remove("active");
    });
  }

  // ==================== Authentication ====================

  /**
   * Initialize Google Sign-In
   * âš ï¸ FIX FedCM Error: KhÃ´ng dÃ¹ng Google Identity Services trong Apps Script iframe
   * Chá»‰ dÃ¹ng OAuth2 flow truyá»n thá»‘ng qua backend
   */
  function initGoogleSignIn() {
    // âœ… ÄÃ¡nh dáº¥u Ä‘Ã£ sáºµn sÃ ng (khÃ´ng cáº§n load Google API ná»¯a)
    googleClientInitialized = true;
    console.log(
      "âœ… Google OAuth2 ready (FedCM/One Tap disabled - using backend OAuth2 flow)",
    );
    console.log(
      "â„¹ï¸ Apps Script runs in iframe - FedCM not supported. Using traditional OAuth2.",
    );
  }

  /**
   * Handle Google credential response
   * âš ï¸ DEPRECATED: KhÃ´ng dÃ¹ng ná»¯a vÃ¬ Ä‘Ã£ táº¯t Google Identity Services
   * Giá»¯ láº¡i Ä‘á»ƒ trÃ¡nh lá»—i náº¿u cÃ³ reference cÅ©
   */
  function handleGoogleCredentialResponse(response) {

  // ==================== Login Rate Limiting ====================
  var _loginAttempts = [];
  var LOGIN_MAX_ATTEMPTS = 5;
  var LOGIN_WINDOW_MS = 5 * 60 * 1000; // 5 phút

  /**
   * Handle login form submission
   * ⭐ Unified version with rate limiting
   */
  function handleLoginFormSubmit() {
    console.log("🔑 Login form submitted");

    // ⭐ RATE LIMITING: Chống brute force
    var now = Date.now();
    _loginAttempts = _loginAttempts.filter(function (t) {
      return now - t < LOGIN_WINDOW_MS;
    });
    if (_loginAttempts.length >= LOGIN_MAX_ATTEMPTS) {
      var waitSeconds = Math.ceil(
        (LOGIN_WINDOW_MS - (now - _loginAttempts[0])) / 1000,
      );
      showToast(
        "Quá nhiều lần thử. Vui lòng đợi " + waitSeconds + " giây.",
        "error",
      );
      return false;
    }
    _loginAttempts.push(now);

    // Get form data - hỗ trợ cả login-email và login-username
    const email = document.getElementById("login-email")
      ? document.getElementById("login-email").value.trim()
      : document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    // Validation
    if (!email || !password) {
      showToast("Vui lòng nhập email và mật khẩu", "error");
      return false;
    }

    // Prepare credentials
    const credentials = {
      email: email,
      password: password,
    };

    // Show loading
    showLoading(true);
    disableButton("btn-login");

    // Call backend function
    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        enableButton("btn-login");
        console.log("✅ Login Response:", response);

        if (response.success) {
          // ⭐ Reset login attempts khi thành công
          _loginAttempts = [];

          // ⭐ LƯU SESSION ĐẦY ĐỦ
          currentUser = response.user;
          window.currentUser = response.user;
          localStorage.setItem("currentUser", JSON.stringify(response.user));
          localStorage.setItem("isLoggedIn", "true");

        showToast("Lỗi: " + error.message, "error");
      })

    return false;
  }

  // ==================== UI Utilities ====================

  /**
   * Loading overlay state — anti-duplication guard
   * Prevents multiple triggers from stacking overlays.
   * Background refreshes are silently ignored.
   */
  let _loadingCount = 0;
  let _loadingReason = null;
  let _loadingHideTimer = null;
  let _loadingVisibleSince = 0;
  let _loadingLastShowAt = 0;

  // Disable full-screen loading popup to avoid blocking user interactions
  // during frequent background/network requests.
  const ENABLE_GLOBAL_LOADING_OVERLAY = false;

  const LOADING_REOPEN_COOLDOWN_MS = 900;
  const LOADING_MIN_VISIBLE_MS = 220;

  function isDashboardPageActive() {
    const lastActivePage = localStorage.getItem("lastActivePage");
    if (lastActivePage === "dashboard") return true;

    const dashboardPage = document.getElementById("page-dashboard");
    if (!dashboardPage) return false;
    return dashboardPage.style.display === "block";
  }

  function isAuthPageName(pageName) {
    return (
      pageName === "landing" ||
      pageName === "login" ||
      pageName === "register" ||
      pageName === "verify-email" ||
      pageName === "forgot-password"
    );
  }

  function shouldSuppressOverlayForLoggedInApp(reason, forceBlocking) {
    if (forceBlocking) return false;
    if (!isSessionLoggedIn()) return false;

    const currentPage = (
      localStorage.getItem("lastActivePage") || ""
    ).toString();
    if (isAuthPageName(currentPage)) return false;

    const allowedBlockingReasons = new Set([
      "initial-load",
      "route-change",
      "page-transition",
      "blocking",
    ]);

    return !allowedBlockingReasons.has(reason || "");
  }

  function shouldSuppressGlobalOverlay(reason, forceBlocking) {
    if (forceBlocking) return false;

    if (shouldSuppressOverlayForLoggedInApp(reason, forceBlocking)) {
      return true;
    }

    if (reason === "background") {
      return true;
    }

    // While user is on dashboard, do not show full-screen overlay for
    // implicit/background actions. Allow only explicit blocking reasons.
    if (isDashboardPageActive()) {
      const allowedDashboardReasons = new Set([
        "initial-load",
        "route-change",
        "page-transition",
        "blocking",
      ]);
      return !allowedDashboardReasons.has(reason || "");
    }

    return false;
  }

  /**
   * Show/hide loading overlay
   * @param {boolean} show - true to show, false to hide
   * @param {string|object} [reasonOrOptions] - optional reason/options
   */
  function showLoading(show, reasonOrOptions) {
    const overlay = document.getElementById("loading-overlay");
    if (!overlay) return;

    if (!ENABLE_GLOBAL_LOADING_OVERLAY) {
      if (show) {
        _loadingCount++;
      } else {
        _loadingCount = Math.max(0, _loadingCount - 1);
      }
      overlay.style.display = "none";
      return;
    }

    const options =
      reasonOrOptions && typeof reasonOrOptions === "object"
        ? reasonOrOptions
        : { reason: reasonOrOptions };
    const reason = options.reason || "";
    const forceBlocking = !!options.forceBlocking;

    if (show) {
      if (shouldSuppressGlobalOverlay(reason, forceBlocking)) {
        return;
      }

      const now = Date.now();

      if (
        !forceBlocking &&
        now - _loadingLastShowAt < LOADING_REOPEN_COOLDOWN_MS
      ) {
        return;
      }

      if (_loadingHideTimer) {
        clearTimeout(_loadingHideTimer);
        _loadingHideTimer = null;
      }

      _loadingCount++;
      _loadingReason = reason || "unknown";
      _loadingVisibleSince = now;
      _loadingLastShowAt = now;

      if (overlay.style.display !== "flex") {
        overlay.style.display = "flex";
      }
    } else {
      _loadingCount = Math.max(0, _loadingCount - 1);
      if (_loadingCount === 0) {
        const elapsed = Date.now() - _loadingVisibleSince;
        const remainingVisibleMs = Math.max(
          0,
          LOADING_MIN_VISIBLE_MS - elapsed,
        );

        if (_loadingHideTimer) {
          clearTimeout(_loadingHideTimer);
          _loadingHideTimer = null;
        }

        if (remainingVisibleMs > 0) {
          _loadingHideTimer = setTimeout(() => {
            if (_loadingCount === 0) {
              overlay.style.display = "none";
              _loadingReason = null;
            }
            _loadingHideTimer = null;
          }, remainingVisibleMs);
        } else {
          overlay.style.display = "none";
          _loadingReason = null;
        }
      }
    }
  }

  /**
   * Force-hide loading overlay — resets counter completely
   */
  function hideLoading() {
    if (_loadingHideTimer) {
      clearTimeout(_loadingHideTimer);
      _loadingHideTimer = null;
    }
    _loadingCount = 0;
    _loadingReason = null;
    const overlay = document.getElementById("loading-overlay");
    if (overlay) overlay.style.display = "none";
  }

  let appDialogQueue = [];
  let appDialogActive = false;

  function getAppDialogElements() {
    return {
      overlay: document.getElementById("app-dialog-overlay"),
      title: document.getElementById("app-dialog-title"),
      message: document.getElementById("app-dialog-message"),
      inputWrap: document.getElementById("app-dialog-input-wrap"),

  function showAppAlert(message, options) {

  }

  function showAppConfirm(message, options) {

    });
  }

  function showAppPrompt(message, defaultValue, options) {
    const opts = options || {};
    return openAppDialog({
      type: "prompt",
      title: opts.title || "Nhập thông tin",
      message: String(message || ""),
      confirmText: opts.confirmText || "Xác nhận",
      cancelText: opts.cancelText || "Hủy",
      defaultValue: defaultValue || "",
      placeholder: opts.placeholder || "",
      allowBackdropClose: opts.allowBackdropClose !== false,
    });
  }

  function openAppDialog(config) {
    return new Promise(function (resolve) {
      appDialogQueue.push({ config: config, resolve: resolve });
      processAppDialogQueue();
    });
  }

  function processAppDialogQueue() {
    if (appDialogActive || appDialogQueue.length === 0) return;
    appDialogActive = true;

    const payload = appDialogQueue.shift();
    const config = payload.config;
    const resolve = payload.resolve;
    const els = getAppDialogElements();

    if (!els.overlay || !els.title || !els.message || !els.okBtn || !els.cancelBtn) {
      appDialogActive = false;
      console.warn("App dialog elements are missing in DOM");
      if (config.type === "confirm") resolve(false);
      else if (config.type === "prompt") resolve(null);
      else resolve(true);
      processAppDialogQueue();
      return;
    }

    const isPrompt = config.type === "prompt";
    const isConfirm = config.type === "confirm";
    const allowBackdropClose = config.allowBackdropClose !== false;

    els.title.textContent = config.title || "Thông báo";
    els.message.textContent = config.message || "";
    els.okBtn.textContent = config.confirmText || "OK";
    els.cancelBtn.textContent = config.cancelText || "Hủy";
    els.cancelBtn.style.display = isConfirm || isPrompt ? "inline-flex" : "none";

    if (isPrompt && els.inputWrap && els.input) {
      els.inputWrap.style.display = "block";
      els.input.value = String(config.defaultValue || "");
      els.input.placeholder = config.placeholder || "";
    } else if (els.inputWrap && els.input) {
      els.inputWrap.style.display = "none";
      els.input.value = "";
      els.input.placeholder = "";
    }

    let closed = false;
    let keyHandler = null;

    function cleanup() {
      els.overlay.classList.remove("active");
      els.overlay.setAttribute("aria-hidden", "true");
      els.okBtn.onclick = null;
      els.cancelBtn.onclick = null;
      els.overlay.onclick = null;
      if (keyHandler) document.removeEventListener("keydown", keyHandler);
    }

    function finalize(value) {
      if (closed) return;
      closed = true;
      cleanup();
      resolve(value);
      appDialogActive = false;
      processAppDialogQueue();
    }

    els.okBtn.onclick = function () {
      if (isPrompt && els.input) {
        finalize(els.input.value);
        return;
      }
      finalize(true);
    };

    els.cancelBtn.onclick = function () {
      if (isPrompt) {
        finalize(null);
        return;
      }
      finalize(false);
    };

    els.overlay.onclick = function (event) {
      if (!allowBackdropClose || event.target !== els.overlay) return;
      if (isPrompt) {
        finalize(null);
      } else if (isConfirm) {
        finalize(false);
      } else {
        finalize(true);
      }
    };

    keyHandler = function (event) {
      if (event.key === "Escape") {
        event.preventDefault();
        if (!allowBackdropClose) return;
        if (isPrompt) {
          finalize(null);
        } else if (isConfirm) {
          finalize(false);
        } else {
          finalize(true);
        }
      } else if (event.key === "Enter" && isPrompt && document.activeElement === els.input) {
        event.preventDefault();
        finalize(els.input.value);
      }
    };

    document.addEventListener("keydown", keyHandler);
    els.overlay.classList.add("active");
    els.overlay.setAttribute("aria-hidden", "false");

    if (isPrompt && els.input) {
      setTimeout(function () {
        els.input.focus();
        els.input.select();
      }, 20);
    } else {
      setTimeout(function () {
        els.okBtn.focus();
      }, 20);
    }
  }

  /**

   */
  function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toast-message");

    if (!toast || !toastMessage) return;

    // Set message
    toastMessage.textContent = message;

    // Set colors based on type
    toast.classList.remove(
      "bg-green-500",
      "bg-red-500",
      "bg-blue-500",
      "bg-yellow-500",
    );
    switch (type) {
      case "success":
        toast.classList.add("bg-green-500");
        break;
      case "error":
        toast.classList.add("bg-red-500");
        break;
      case "warning":
        toast.classList.add("bg-yellow-500");
        break;
      default:
        toast.classList.add("bg-blue-500");
    }

    // Show toast with animation
    toast.classList.remove("translate-x-full");
    toast.classList.add("translate-x-0");

    // Auto hide after 3 seconds
    setTimeout(() => {
      hideToast();
    }, 3000);
  }

    const toast = document.getElementById("toast");
    if (toast) {
      toast.classList.remove("translate-x-0");
      toast.classList.add("translate-x-full");
    }
  }

  // ==================== Notification Panel Toggle ====================

  document.addEventListener("click", function (e) {
    const notificationBtn = e.target.closest(
      ".notification-btn, #notificationBtn",
    );
    const closeNotifBtn = e.target.closest(".close-notif-btn, #closeNotifBtn");
    const notificationPanel =
      document.getElementById("notificationPanel") ||
      document.querySelector(".notification-panel");

    if (notificationBtn && notificationPanel) {
      const isVisible = notificationPanel.style.display === "block";
      notificationPanel.style.display = isVisible ? "none" : "block";
      e.stopPropagation();
    } else if (closeNotifBtn && notificationPanel) {
      notificationPanel.style.display = "none";
      e.stopPropagation();
    } else if (
      notificationPanel &&
      notificationPanel.style.display === "block"
    ) {
      if (!notificationPanel.contains(e.target)) {
        notificationPanel.style.display = "none";
      }
    }
  });

  // ⭐ loadDashboardData đã được gộp vào phiên bản duy nhất ở trên (Dashboard section)
  // Đã xóa duplicate để tránh conflict

    // â­ CHá»ˆ láº¥y displayName tá»« cá»™t displayName trong sheet Users (KHÃ”NG cÃ³ fallback)

  // ========================================
  // LEARNING TIME TRACKER - Client Side
  // ========================================

  /**
   * Learning Time Tracker
   * Tracks time spent in learning activities and syncs to server
   */
  window.LearningTracker = (function () {
    let isTracking = false;
    let currentActivity = null; // 'lesson' | 'mindmap' | 'flashcard' | 'quiz'
    let accumulatedSeconds = 0;
    let saveInterval = null;
    let tickInterval = null;

    const SAVE_INTERVAL_MS = 60000; // Save every 1 minute
    const GOAL_MINUTES = 15; // Daily goal for streak

    /**
     * Start tracking for a specific activity
     */
    function start(activityType) {
      if (isTracking && currentActivity === activityType) {
        return;
      }

      if (isTracking) {
        stop();
      }

      currentActivity = activityType;
      accumulatedSeconds = 0;
      isTracking = true;

      console.log(`⏱️ Started tracking: ${activityType}`);

      tickInterval = setInterval(function () {
        if (!document.hidden) {
          accumulatedSeconds++;
          updateLocalStorage();
        }
      }, 1000);

      saveInterval = setInterval(function () {
        saveToServer();
      }, SAVE_INTERVAL_MS);

      document.addEventListener("visibilitychange", handleVisibilityChange);
    }

    function stop() {
      if (!isTracking) return;

      console.log(
        `⏱️ Stopped tracking: ${currentActivity}, accumulated: ${accumulatedSeconds}s`,
      );

      if (accumulatedSeconds >= 60) {
        saveToServer();
      }

      if (tickInterval) clearInterval(tickInterval);
      if (saveInterval) clearInterval(saveInterval);
      document.removeEventListener("visibilitychange", handleVisibilityChange);

      isTracking = false;
      currentActivity = null;
      accumulatedSeconds = 0;
    }

    function handleVisibilityChange() {
      if (document.hidden) {
        console.log("⏸️ Tab hidden - pausing");
      } else {
        console.log("▶️ Tab visible - resuming");
      }
    }

    function updateLocalStorage() {
      var today = new Date().toISOString().split("T")[0];
      var storageKey = "dailyLearningTime";
      var data = {};

      try {
        var stored = localStorage.getItem(storageKey);
        if (stored) data = JSON.parse(stored);
      } catch (e) {}

      if (data.date !== today) {
        data = {
          date: today,
          totalMinutes: 0,
          streakAchieved: false,
          pendingSeconds: 0,
        };
      }

      data.pendingSeconds = (data.pendingSeconds || 0) + 1;
      data[currentActivity + "Seconds"] =
        (data[currentActivity + "Seconds"] || 0) + 1;

      var totalSeconds =
        (data.lessonSeconds || 0) +
        (data.mindmapSeconds || 0) +
        (data.flashcardSeconds || 0) +
        (data.quizSeconds || 0);
      data.totalMinutes = Math.floor(totalSeconds / 60);

      localStorage.setItem(storageKey, JSON.stringify(data));
      updateDashboardTimeUI(data);
    }

    function saveToServer() {
      var minutesToSave = Math.floor(accumulatedSeconds / 60);
      if (minutesToSave < 1) {
        console.log(
          "⏳ Not enough time yet: " + accumulatedSeconds + " seconds",
        );
        return;
      }

      console.log(
        "💾 Saving " +
          minutesToSave +
          " minutes of " +
          currentActivity +
          " to server...",
      );

      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.success) {
            console.log("✅ Saved. Daily total: " + result.dailyTotal + " min");

            var storageKey = "dailyLearningTime";
            var data = {};
            try {
              var stored = localStorage.getItem(storageKey);
              if (stored) data = JSON.parse(stored);
            } catch (e) {}

            data.serverTotal = result.dailyTotal;
            data.streakAchieved = result.streakAchieved;
            localStorage.setItem(storageKey, JSON.stringify(data));
            updateDashboardTimeUI(data);

            if (result.streakAchieved && !data.notifiedStreak) {
              data.notifiedStreak = true;
              localStorage.setItem(storageKey, JSON.stringify(data));
              if (typeof window.showNotification === "function") {
                window.showNotification(
                  "🎉 Tuyệt vời! Bạn đã học đủ 15 phút hôm nay!",
                  "success",
                );
              }
            }
          }
        })
        .withFailureHandler(function (error) {
          console.error("❌ Failed to save learning time:", error);
        })
        .saveLearningTime({
          minutes: minutesToSave,
          activityType: currentActivity,
        });

      accumulatedSeconds = accumulatedSeconds % 60;
    }

    function updateDashboardTimeUI(data) {
      var todayTimeEl = document.getElementById("today-time");
      var todayMinutesEl = document.getElementById("today-minutes");
      var timeStatusEl = document.getElementById("time-status");

      var totalMinutes = data.serverTotal || data.totalMinutes || 0;

      if (todayTimeEl) todayTimeEl.textContent = totalMinutes;
      if (todayMinutesEl) todayMinutesEl.textContent = totalMinutes;

      if (timeStatusEl) {
        if (totalMinutes >= GOAL_MINUTES) {
          timeStatusEl.textContent = "Đã đạt";
          timeStatusEl.classList.add("achieved");
        } else {
          timeStatusEl.textContent = GOAL_MINUTES - totalMinutes + " phút nữa";
          timeStatusEl.classList.remove("achieved");
        }
      }
    }

    function getStats() {
      try {
        var stored = localStorage.getItem("dailyLearningTime");
        if (stored) return JSON.parse(stored);
      } catch (e) {}
      return null;
    }

    function loadFromServer(callback) {
      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.success) {
            var today = new Date().toISOString().split("T")[0];
            var data = {
              date: today,
              totalMinutes: result.dailyTotal || 0,
              serverTotal: result.dailyTotal || 0,
              streakAchieved: result.streakAchieved || false,
            };
            localStorage.setItem("dailyLearningTime", JSON.stringify(data));
            updateDashboardTimeUI(data);
            if (callback) callback(data);
          }
        })
        .withFailureHandler(function (error) {
          console.error("Failed to load learning stats:", error);
          if (callback) callback(null);
        })
        .getTodayLearningStats();
    }

    return {
      start: start,
      stop: stop,
      getStats: getStats,
      loadFromServer: loadFromServer,
      GOAL_MINUTES: GOAL_MINUTES,
    };
  })();

  window.loadDashboardData = loadDashboardData;
</script>
