<script>
  /**
   * client_js.html - Client-Side JavaScript
   *
   * Handles all frontend logic, API calls, navigation, and UI updates
   */

  // ==================== Global Variables ====================
  let currentUser = null;
  let isGoogleAuthInProgress = false; // Prevent multiple simultaneous requests
  let googleClientInitialized = false;

  // ==================== Initialization ====================
  document.addEventListener("DOMContentLoaded", function () {
    console.log("App initialized");

    // Initialize Google Sign-In
    initGoogleSignIn();

    // Check if user is logged in
    const savedUser = localStorage.getItem("currentUser");
    if (savedUser) {
      try {
        currentUser = JSON.parse(savedUser);
        console.log("Found saved user:", currentUser.username);
        showPage("page-dashboard");
        loadDashboardData();
      } catch (error) {
        console.error("Error parsing saved user:", error);
        localStorage.removeItem("currentUser");
        showPage("page-landing");
      }
    } else {
      // Show landing page for new visitors
      showPage("page-landing");
    }
  });

  // ==================== Page Navigation ====================

  /**
   * Show specific page and hide others
   * @param {string} pageId - ID of the page to show
   */
  function showPage(pageId) {
    console.log("Showing page:", pageId);

    // Hide all pages
    const allPages = document.querySelectorAll(".page-content");
    allPages.forEach((page) => {
      page.style.display = "none";
    });

    // Show requested page
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
      targetPage.style.display = "block";

      // Update navbar active state if on dashboard
      if (pageId === "page-dashboard") {
        updateNavbarActive("page-dashboard");
      }
    } else {
      console.error("Page not found:", pageId);
    }
  }

  /**
   * Update navbar active state
   */
  function updateNavbarActive(activePageId) {
    const navItems = document.querySelectorAll(".navbar-item");
    navItems.forEach((item) => {
      item.classList.remove("active");
    });
  }

  // ==================== Authentication ====================

  /**
   * Initialize Google Sign-In
   * ⚠️ FIX FedCM Error: Không dùng Google Identity Services trong Apps Script iframe
   * Chỉ dùng OAuth2 flow truyền thống qua backend
   */
  function initGoogleSignIn() {
    // ✅ Đánh dấu đã sẵn sàng (không cần load Google API nữa)
    googleClientInitialized = true;
    console.log(
      "✅ Google OAuth2 ready (FedCM/One Tap disabled - using backend OAuth2 flow)"
    );
    console.log(
      "ℹ️ Apps Script runs in iframe - FedCM not supported. Using traditional OAuth2."
    );
  }

  /**
   * Handle Google credential response
   * ⚠️ DEPRECATED: Không dùng nữa vì đã tắt Google Identity Services
   * Giữ lại để tránh lỗi nếu có reference cũ
   */
  function handleGoogleCredentialResponse(response) {
    console.warn(
      "⚠️ handleGoogleCredentialResponse called - this should not happen"
    );
    console.log("Falling back to OAuth2 flow...");

    // Fallback: Nếu vẫn được gọi, chuyển sang OAuth2
    handleGoogleLogin();
  }

  /**
   * Handle login form submission
   */
  function handleLoginFormSubmit() {
    console.log("Login form submitted");

    // Get form data
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    // Validation
    if (!username || !password) {
      showToast("Vui lòng nhập đầy đủ thông tin", "error");
      return false;
    }

    // Prepare payload
    const payload = {
      username: username,
      password: password,
    };

    // Show loading
    showLoading(true);
    disableButton("btn-login");

    // Call backend function
    google.script.run
      .withSuccessHandler(onLoginSuccess)
      .withFailureHandler(onApiError)
      .loginUser(payload);

    return false;
  }

  /**
   * Handle successful login
   */
  function onLoginSuccess(response) {
    console.log("Login response:", JSON.stringify(response));
    console.log("Response status:", response.status);
    console.log("Response message:", response.message);
    hideLoading();
    enableButton("btn-login");

    if (response.status === "success") {
      // Save user to localStorage
      currentUser = response.user;
      localStorage.setItem("currentUser", JSON.stringify(currentUser));

      // Show success message
      showToast("Đăng nhập thành công!", "success");

      // Navigate to dashboard
      setTimeout(() => {
        showPage("page-dashboard");
        loadDashboardData();
      }, 500);
    } else {
      showToast(response.message || "Đăng nhập thất bại", "error");
    }
  }

  /**
   * Handle register form submission - NEW VERSION
   */
  function handleRegisterFormSubmit() {
    console.log("📝 Register form submitted");

    // Get form data
    const fullName = document.getElementById("register-fullname").value.trim();
    const email = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    const confirmPassword = document.getElementById(
      "register-confirm-password"
    ).value;

    // Validation
    if (!fullName || !email || !password || !confirmPassword) {
      showToast("Vui lòng điền đầy đủ thông tin", "error");
      return false;
    }

    if (password.length < 6) {
      showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
      return false;
    }

    if (password !== confirmPassword) {
      showToast("Mật khẩu xác nhận không khớp", "error");
      return false;
    }

    // Prepare payload
    const userData = {
      email: email,
      password: password,
      confirmPassword: confirmPassword,
      fullName: fullName,
    };

    // Show loading
    showLoading(true);

    // Call backend function
    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Register Response:", response);

        if (response.success) {
          // Hiển thị thông báo xác thực email
          showToast(response.message, "success");

          // Nếu email không được gửi, hiển thị nút "Gửi lại"
          if (!response.emailSent) {
            showResendVerificationOption(userData.email);
          }

          // Chuyển về trang login sau 3 giây
          setTimeout(() => {
            showPage("page-login");
          }, 3000);
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Register Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .registerWithEmailPassword(userData);

    return false;
  }

  /**
   * Handle login form submission - NEW VERSION
   */
  function handleLoginFormSubmit() {
    console.log("🔐 Login form submitted");

    // Get form data
    const email = document.getElementById("login-email")
      ? document.getElementById("login-email").value.trim()
      : document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    // Validation
    if (!email || !password) {
      showToast("Vui lòng nhập email và mật khẩu", "error");
      return false;
    }

    // Prepare credentials
    const credentials = {
      email: email,
      password: password,
    };

    // Show loading
    showLoading(true);

    // Call backend function
    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Login Response:", response);

        if (response.success) {
          // Lưu session
          sessionStorage.setItem("currentUser", JSON.stringify(response.user));
          sessionStorage.setItem("isLoggedIn", "true");
          currentUser = response.user;

          showToast(response.message, "success");

          setTimeout(() => {
            showPage("page-dashboard");
            loadDashboardData();
          }, 1000);
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Login Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .loginWithEmailPassword(credentials);

    return false;
  }

  /**
   * OLD VERSION - Keep for backward compatibility
   * Handle register form submission
   */
  function handleRegisterFormSubmitOLD() {
    console.log("Register form submitted");

    // Get form data
    const fullName = document.getElementById("register-fullname").value.trim();
    const username = document.getElementById("register-username").value.trim();
    const email = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    const confirmPassword = document.getElementById(
      "register-confirm-password"
    ).value;

    // Validation
    if (!fullName || !username || !password) {
      showToast("Vui lòng nhập đầy đủ thông tin bắt buộc", "error");
      return false;
    }

    if (username.length < 3) {
      showToast("Tên đăng nhập phải có ít nhất 3 ký tự", "error");
      return false;
    }

    if (password.length < 6) {
      showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
      return false;
    }

    if (password !== confirmPassword) {
      showToast("Mật khẩu xác nhận không khớp", "error");
      return false;
    }

    // Prepare payload
    const payload = {
      fullName: fullName,
      username: username,
      email: email,
      password: password,
    };

    // Show loading
    showLoading(true);
    disableButton("btn-register");

    // Call backend function
    google.script.run
      .withSuccessHandler(onRegisterSuccess)
      .withFailureHandler(onApiError)
      .registerUser(payload);

    return false;
  }

  /**
   * Handle successful registration
   */
  function onRegisterSuccess(response) {
    console.log("Register response:", JSON.stringify(response));
    console.log("Response status:", response.status);
    console.log("Response message:", response.message);
    hideLoading();
    enableButton("btn-register");

    if (response.status === "success") {
      // Save user to localStorage
      currentUser = response.user;
      localStorage.setItem("currentUser", JSON.stringify(currentUser));

      // Show success message
      showToast("Đăng ký thành công! Đang chuyển tới trang chủ...", "success");

      // Navigate to dashboard
      setTimeout(() => {
        showPage("page-dashboard");
        loadDashboardData();
      }, 1000);
    } else {
      showToast(response.message || "Đăng ký thất bại", "error");
    }
  }

  /**
   * Handle logout
   */
  function handleLogout() {
    console.log("Logging out...");

    // Clear user data
    currentUser = null;
    localStorage.removeItem("currentUser");

    // Clear Google auth state to force account chooser next time
    if (
      googleClientInitialized &&
      typeof google !== "undefined" &&
      google.accounts
    ) {
      try {
        google.accounts.id.disableAutoSelect();
        console.log("Google auto-select disabled");
      } catch (e) {
        console.log("Error disabling Google auto-select:", e);
      }
    }

    // Show message
    showToast("Đã đăng xuất", "info");

    // Navigate to login
    setTimeout(() => {
      showPage("page-login");

      // Clear form fields
      document.getElementById("login-username").value = "";
      document.getElementById("login-password").value = "";
    }, 500);
  }

  /**
   * Show Account Chooser - Hướng dẫn user đăng xuất và chọn tài khoản khác
   */
  function showAccountChooser() {
    const message = `Để chọn tài khoản Google khác:

1. Mở tab mới
2. Truy cập: https://accounts.google.com
3. Đăng xuất tài khoản hiện tại
4. Quay lại đây và nhấn "Đăng nhập với Google"

Hoặc bạn có thể:
• Sử dụng chế độ ẩn danh (Incognito)
• Mở URL này trong profile Chrome khác`;

    if (confirm(message + "\n\nBạn có muốn mở trang Google Accounts không?")) {
      window.open("https://accounts.google.com/SignOutOptions", "_blank");
      showToast("Vui lòng đăng xuất Google rồi quay lại đây", "info");
    }
  }

  /**
   * Handle Google Login - Auto detect email from Google Account
   * Không cần prompt - hệ thống tự động lấy email từ Session.getActiveUser().getEmail()
   */
  function handleGoogleLogin() {
    console.log("🔐 Google Auto Login - Đang xác thực...");

    // Prevent multiple simultaneous requests
    if (isGoogleAuthInProgress) {
      console.log("⚠️ Google auth already in progress");
      return;
    }

    isGoogleAuthInProgress = true;
    showLoading(true);

    const timeoutId = setTimeout(() => {
      console.error("❌ Google auth timeout");
      hideLoading();
      isGoogleAuthInProgress = false;
      showToast("Timeout: Vui lòng thử lại.", "error");
    }, 30000);

    // ✅ Gọi autoLoginWithGoogle() - tự động lấy email từ Google Account
    google.script.run
      .withSuccessHandler(function (response) {
        clearTimeout(timeoutId);
        isGoogleAuthInProgress = false;
        hideLoading();

        console.log("✅ Auto Login Response:", response);

        if (response.success) {
          // Đăng nhập thành công
          sessionStorage.setItem("currentUser", JSON.stringify(response.user));
          sessionStorage.setItem("isLoggedIn", "true");

          showToast(response.message || "Đăng nhập thành công!", "success");

          setTimeout(() => {
            showPage("page-dashboard");
          }, 1000);
        } else if (response.autoRegister) {
          // Tài khoản chưa tồn tại - hiện form đăng ký
          console.log("📝 Tài khoản chưa tồn tại, chuyển sang đăng ký");
          showToast(
            "Tài khoản chưa tồn tại. Vui lòng hoàn tất đăng ký.",
            "info"
          );

          // Chỉ hỏi tên, email đã được tự động lấy
          const fullName = prompt(
            "Nhập họ tên của bạn:",
            response.email.split("@")[0]
          );

          if (fullName) {
            handleAutoRegister({ fullName: fullName.trim() });
          } else {
            showToast("Đăng ký bị hủy", "warning");
          }
        } else {
          // Lỗi khác
          showToast(response.message || "Đăng nhập thất bại", "error");
        }
      })
      .withFailureHandler(function (error) {
        clearTimeout(timeoutId);
        isGoogleAuthInProgress = false;
        hideLoading();
        console.error("❌ Auto Login Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .autoLoginWithGoogle();
  }

  /**
   * Alternative: Open Google Account Chooser in new window
   */
  function handleGoogleLoginAlternative() {
    console.log("Google login (alternative method) initiated");

    // Prevent multiple simultaneous requests
    if (isGoogleAuthInProgress) {
      console.log(
        "Google auth already in progress, ignoring duplicate request"
      );
      return;
    }

    isGoogleAuthInProgress = true;

    // Show loading
    showLoading(true);

    // Call backend function with timeout
    const timeoutId = setTimeout(() => {
      console.error("Google auth timeout");
      hideLoading();
      isGoogleAuthInProgress = false;
      showToast("Timeout: Vui lòng thử lại sau.", "error");
    }, 30000); // 30 second timeout

    google.script.run
      .withSuccessHandler(function (response) {
        clearTimeout(timeoutId);
        isGoogleAuthInProgress = false;
        onGoogleAuthSuccess(response);
      })
      .withFailureHandler(function (error) {
        clearTimeout(timeoutId);
        isGoogleAuthInProgress = false;
        onApiError(error);
      })
      .handleGoogleAuth();
  }

  /**
   * Handle Google Signup - Same as login (auto-provisioning)
   */
  function handleGoogleSignup() {
    console.log("Google signup initiated");
    // Đăng ký và đăng nhập dùng cùng logic
    handleGoogleLogin();
  }

  /**
   * Handle Auto Register - Đăng ký tự động với thông tin bổ sung
   */
  function handleAutoRegister(userData) {
    console.log("📝 Auto Register - Đang tạo tài khoản...");

    if (!userData || !userData.fullName) {
      showToast("Thiếu thông tin họ tên", "error");
      return;
    }

    showLoading(true);

    const timeoutId = setTimeout(() => {
      console.error("❌ Auto register timeout");
      hideLoading();
      showToast("Timeout: Vui lòng thử lại.", "error");
    }, 30000);

    // Gọi autoRegisterWithGoogle() - email tự động lấy từ Session
    google.script.run
      .withSuccessHandler(function (response) {
        clearTimeout(timeoutId);
        hideLoading();

        console.log("✅ Auto Register Response:", response);

        if (response.success) {
          // Đăng ký thành công
          sessionStorage.setItem("currentUser", JSON.stringify(response.user));
          sessionStorage.setItem("isLoggedIn", "true");

          showToast(response.message || "Đăng ký thành công!", "success");

          setTimeout(() => {
            showPage("page-dashboard");
          }, 1500);
        } else {
          showToast(response.message || "Đăng ký thất bại", "error");
        }
      })
      .withFailureHandler(function (error) {
        clearTimeout(timeoutId);
        hideLoading();
        console.error("❌ Auto Register Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .autoRegisterWithGoogle(userData);
  }

  /**
   * Handle successful Google authentication
   */
  function onGoogleAuthSuccess(response) {
    console.log("Google auth response:", JSON.stringify(response));
    hideLoading();

    // Check if response is valid
    if (!response) {
      console.error("Response is null or undefined");
      showToast(
        "Lỗi: Không nhận được phản hồi từ server. Vui lòng thử lại.",
        "error"
      );
      return;
    }

    console.log("Response status:", response.status);

    if (response.status === "success") {
      console.log("Google auth successful, saving user data...");

      // Save user to localStorage
      currentUser = response.user;
      localStorage.setItem("currentUser", JSON.stringify(currentUser));

      console.log("User saved to localStorage:", currentUser.username);
      console.log("Is new user:", response.isNewUser);

      // Show appropriate success message
      if (response.isNewUser) {
        showToast(
          "🎉 " +
            (response.message ||
              "Tài khoản mới đã được tạo! Chào mừng " + response.user.fullName),
          "success"
        );
        console.log("✅ New user registered via Google Sign-In");
      } else {
        showToast(
          response.message ||
            "Đăng nhập thành công! Chào mừng trở lại " + response.user.fullName,
          "success"
        );
        console.log("✅ Existing user logged in via Google Sign-In");
      }

      // Navigate to dashboard
      console.log("Navigating to dashboard...");
      setTimeout(() => {
        console.log("Showing dashboard page");
        showPage("page-dashboard");
        loadDashboardData();
      }, 500);
    } else {
      console.error("Login failed with status:", response.status);
      showToast(response.message || "Đăng nhập Google thất bại", "error");
    }
  }

  // ==================== Dashboard ====================

  /**
   * Load dashboard data
   */
  function loadDashboardData() {
    console.log("Loading dashboard data...");

    if (!currentUser) {
      console.error("No current user");
      return;
    }

    // Update user display name
    const displayElements = document.querySelectorAll(
      "#user-display-name, #dashboard-user-name"
    );
    displayElements.forEach((el) => {
      if (el) {
        el.textContent = currentUser.fullName || currentUser.username;
      }
    });

    // Load stats (placeholder values for now)
    updateDashboardStats({
      totalTopics: 0,
      completed: 0,
      avgScore: 0,
      streak: 0,
    });

    // TODO: Load actual data from user progress sheet
    console.log("Dashboard loaded for user:", currentUser.userId);
  }

  /**
   * Update dashboard statistics
   */
  function updateDashboardStats(stats) {
    const elements = {
      totalTopics: document.getElementById("stat-total-topics"),
      completed: document.getElementById("stat-completed"),
      avgScore: document.getElementById("stat-avg-score"),
      streak: document.getElementById("stat-streak"),
    };

    if (elements.totalTopics)
      elements.totalTopics.textContent = stats.totalTopics || 0;
    if (elements.completed)
      elements.completed.textContent = stats.completed || 0;
    if (elements.avgScore) elements.avgScore.textContent = stats.avgScore || 0;
    if (elements.streak) elements.streak.textContent = stats.streak || 0;
  }

  // ==================== UI Utilities ====================

  /**
   * Hide loading overlay

  /**
   * Show toast notification
   * @param {string} message - Message to display
   * @param {string} type - Type: success, error, info, warning
   */
  function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toast-message");

    if (!toast || !toastMessage) return;

    // Set message
    toastMessage.textContent = message;

    // Remove all type classes
    toast.classList.remove(
      "toast-success",
      "toast-error",
      "toast-info",
      "toast-warning"
    );

    // Add type class
    toast.classList.add("toast-" + type);

    // Show toast
    toast.classList.remove("translate-x-full");
    toast.classList.add("translate-x-0");

    // Hide after 3 seconds
    setTimeout(() => {
      toast.classList.remove("translate-x-0");
      toast.classList.add("translate-x-full");
    }, 3000);
  }

  /**
   * Show resend verification option
   * @param {string} email - User's email
   */
  function showResendVerificationOption(email) {
    const resendHTML = `
      <div id="resend-verification-banner" class="fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-white px-6 py-3 rounded-lg shadow-lg z-50">
        <p class="mb-2">Không nhận được email xác thực?</p>
        <button 
          onclick="resendVerificationEmail('${email}')" 
          class="bg-white text-yellow-600 px-4 py-2 rounded hover:bg-yellow-50 font-medium">
          Gửi lại email
        </button>
      </div>
    `;

    // Remove existing banner if any
    const existingBanner = document.getElementById(
      "resend-verification-banner"
    );
    if (existingBanner) {
      existingBanner.remove();
    }

    // Add new banner
    document.body.insertAdjacentHTML("beforeend", resendHTML);

    // Auto-remove after 10 seconds
    setTimeout(() => {
      const banner = document.getElementById("resend-verification-banner");
      if (banner) banner.remove();
    }, 10000);
  }

  /**
   * Resend verification email
   * @param {string} email - User's email
   */
  function resendVerificationEmail(email) {
    console.log("📧 Resending verification email to:", email);

    // Remove banner
    const banner = document.getElementById("resend-verification-banner");
    if (banner) banner.remove();

    showLoading(true);

    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Resend Response:", response);

        if (response.success) {
          showToast(response.message, "success");
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Resend Error:", error);
        showToast("Lỗi khi gửi email: " + error.message, "error");
      })
      .resendVerificationEmailToUser(email);
  }

  /**
   * Disable button
   */
  function disableButton(buttonId) {
    const button = document.getElementById(buttonId);
    if (button) {
      button.disabled = true;
      button.classList.add("opacity-50", "cursor-not-allowed");
    }
  }

  /**
   * Enable button
   */
  function enableButton(buttonId) {
    const button = document.getElementById(buttonId);
    if (button) {
      button.disabled = false;
      button.classList.remove("opacity-50", "cursor-not-allowed");
    }
  }

  /**
   * Handle API errors
   */
  function onApiError(error) {
    console.error("API Error:", error);
    hideLoading();

    // Re-enable buttons
    enableButton("btn-login");
    enableButton("btn-register");

    // Check for specific error types
    let errorMessage = "Có lỗi xảy ra";

    if (error && error.message) {
      const msg = error.message.toLowerCase();

      if (msg.includes("429") || msg.includes("too many requests")) {
        errorMessage = "Quá nhiều yêu cầu. Vui lòng đợi 1 phút và thử lại.";
      } else if (msg.includes("timeout")) {
        errorMessage =
          "Hết thời gian chờ. Vui lòng kiểm tra kết nối và thử lại.";
      } else if (msg.includes("network")) {
        errorMessage =
          "Lỗi kết nối mạng. Vui lòng kiểm tra internet và thử lại.";
      } else {
        errorMessage = "Có lỗi xảy ra: " + error.message;
      }
    }

    showToast(errorMessage, "error");
  }

  // ==================== Helper Functions ====================

  /**
   * Format date to Vietnamese format
   */
  function formatDate(dateString) {
    if (!dateString) return "";

    try {
      const date = new Date(dateString);
      return date.toLocaleDateString("vi-VN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    } catch (error) {
      return dateString;
    }
  }

  /**
   * Validate email format
   */
  function isValidEmail(email) {
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    return regex.test(email);
  }

  /**
   * ========================================
   * FORGOT PASSWORD & RESET PASSWORD
   * ========================================
   */

  /**
   * Show forgot password modal
   */
  function showForgotPasswordModal() {
    const email = prompt("Nhập email của bạn để nhận link reset mật khẩu:");

    if (!email) {
      return;
    }

    if (!isValidEmail(email)) {
      showToast("Email không hợp lệ", "error");
      return;
    }

    showLoading(true);

    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Forgot Password Response:", response);

        if (response.success) {
          showToast(response.message, "success");
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Forgot Password Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .requestResetPassword(email);
  }

  /**
   * Handle email verification from URL
   */
  function handleEmailVerification() {
    console.log("🔍 Checking for verification/reset action...");

    // Try to get params from server injection first
    let action = window.SERVER_PARAMS?.action || "";
    let token = window.SERVER_PARAMS?.token || "";

    // Fallback: try URL params (may not work in iframe)
    if (!action || !token) {
      const urlParams = new URLSearchParams(window.location.search);
      action = urlParams.get("action") || "";
      token = urlParams.get("token") || "";
    }

    console.log("📦 Server params:", window.SERVER_PARAMS);
    console.log("🔗 URL search:", window.location.search);
    console.log("Action:", action);
    console.log("Token:", token ? token.substring(0, 10) + "..." : "none");

    if (action === "verify" && token) {
      console.log("🔐 Verifying email with token");
      showLoading(true);

      // Show login page
      showPage("page-login");

      google.script.run
        .withSuccessHandler(function (response) {
          hideLoading();
          console.log("✅ Verification Response:", response);

          if (response.success) {
            showToast(
              response.message + " Bạn có thể đăng nhập ngay!",
              "success"
            );
          } else {
            showToast(response.message, "error");
          }
        })
        .withFailureHandler(function (error) {
          hideLoading();
          console.error("❌ Verification Error:", error);
          showToast("Lỗi xác thực: " + error.message, "error");
        })
        .verifyEmailToken(token);
    } else if (action === "reset" && token) {
      console.log("🔐 Reset password with token");
      showResetPasswordForm(token);
    } else {
      console.log("ℹ️ No verification or reset action found");
    }
  }

  /**
   * Handle Request Reset Code (Step 1)
   */
  function handleRequestResetCode() {
    const email = document.getElementById("forgot-email").value.trim();

    if (!email || !isValidEmail(email)) {
      showToast("Vui lòng nhập email hợp lệ", "error");
      return;
    }

    showLoading(true);

    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Request Reset Code Response:", response);

        if (response.success) {
          showToast(response.message, "success");

          // Store email and show step 2
          document.getElementById("reset-email").value = email;
          document.getElementById("step-request-code").style.display = "none";
          document.getElementById("step-reset-password").style.display =
            "block";
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Request Reset Code Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .requestResetPassword(email);
  }

  /**
   * Handle Reset Password with Code (Step 2)
   */
  function handleResetPassword() {
    const email = document.getElementById("reset-email").value;
    const code = document.getElementById("verification-code").value.trim();
    const newPassword = document.getElementById("new-password").value;
    const confirmPassword = document.getElementById(
      "confirm-new-password"
    ).value;

    // Validation
    if (!code || code.length !== 6 || !/^\d{6}$/.test(code)) {
      showToast("Vui lòng nhập mã xác thực 6 chữ số", "error");
      return;
    }

    if (!newPassword || newPassword.length < 6) {
      showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
      return;
    }

    if (newPassword !== confirmPassword) {
      showToast("Mật khẩu xác nhận không khớp", "error");
      return;
    }

    showLoading(true);

    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Reset Password Response:", response);

        if (response.success) {
          showToast(response.message, "success");

          // Reset form and go back to login
          document.getElementById("reset-password-form").reset();
          setTimeout(() => {
            showPage("page-login");
            backToStep1(); // Reset forgot password form
          }, 2000);
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Reset Password Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .resetPasswordWithCode({
        email: email,
        code: code,
        newPassword: newPassword,
        confirmPassword: confirmPassword,
      });
  }

  /**
   * Handle Resend Reset Code
   */
  function handleResendResetCode() {
    const email = document.getElementById("reset-email").value;

    if (!email) {
      showToast("Email không hợp lệ", "error");
      return;
    }

    showLoading(true);

    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Resend Code Response:", response);

        if (response.success) {
          showToast("Mã xác thực mới đã được gửi!", "success");
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Resend Code Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .requestResetPassword(email);
  }

  /**
   * Back to Step 1
   */
  function backToStep1() {
    document.getElementById("step-reset-password").style.display = "none";
    document.getElementById("step-request-code").style.display = "block";
    document.getElementById("request-code-form").reset();
    document.getElementById("reset-password-form").reset();
  }

  /**
   * Show forgot password modal (Legacy - kept for compatibility)
   */
  function showForgotPasswordModal() {
    // Redirect to new forgot password page
    showPage("page-forgot-password");
  }

  /**
   * Show reset password form (Legacy - kept for compatibility)
   */
  function showResetPasswordForm(token) {
    const newPassword = prompt("Nhập mật khẩu mới (tối thiểu 6 ký tự):");

    if (!newPassword) {
      return;
    }

    if (newPassword.length < 6) {
      showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
      setTimeout(() => showResetPasswordForm(token), 500);
      return;
    }

    const confirmPassword = prompt("Xác nhận mật khẩu mới:");

    if (newPassword !== confirmPassword) {
      showToast("Mật khẩu xác nhận không khớp", "error");
      setTimeout(() => showResetPasswordForm(token), 500);
      return;
    }

    showLoading(true);

    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("✅ Reset Password Response:", response);

        if (response.success) {
          showToast(response.message, "success");
          setTimeout(() => {
            showPage("page-login");
          }, 2000);
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("❌ Reset Password Error:", error);
        showToast("Lỗi: " + error.message, "error");
      })
      .resetPasswordWithToken({
        token: token,
        newPassword: newPassword,
        confirmPassword: confirmPassword,
      });
  }

  // Make functions available globally
  window.showPage = showPage;
  window.handleLoginFormSubmit = handleLoginFormSubmit;
  window.handleRegisterFormSubmit = handleRegisterFormSubmit;
  window.handleLogout = handleLogout;
  window.showToast = showToast;
  window.showForgotPasswordModal = showForgotPasswordModal;
  window.handleGoogleLogin = handleGoogleLogin;
  window.showAccountChooser = showAccountChooser;
  window.handleRequestResetCode = handleRequestResetCode;
  window.handleResetPassword = handleResetPassword;
  window.handleResendResetCode = handleResendResetCode;
  window.backToStep1 = backToStep1;

  console.log("Client JavaScript loaded successfully");

  // Check for email verification or password reset on page load
  setTimeout(handleEmailVerification, 500);
</script>
