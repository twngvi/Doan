п»ҝ<script>
  /**
   * client_js.html - Client-Side JavaScript
   *
   * Handles all frontend logic, API calls, navigation, and UI updates
   */

  // ==================== Global Variables ====================
  var currentUser = null; // ГўВӯВҗ DГғВ№ng var Г„вҖҳГЎВ»Ж’ tГЎВ»Вұ Г„вҖҳГЎВ»в„ўng gГЎВәВҜn vГғВ o window
  window.currentUser = null; // ГўВӯВҗ GГғВЎn trГЎВ»Вұc tiГЎВәВҝp Г„вҖҳГЎВ»Ж’ chГЎВәВҜc chГЎВәВҜn
  let isGoogleAuthInProgress = false; // Prevent multiple simultaneous requests
  let googleClientInitialized = false;

  // ==================== Initialization ====================
  document.addEventListener("DOMContentLoaded", function () {
    console.log("App Initializing...");

    // Initialize Google Sign-In
    initGoogleSignIn();

    // BЖҜб»ҡC 1: KhГҙi phб»Ҙc Session NGAY Lбә¬P Tб»ЁC
    // PhбәЈi lГ m Д‘iб»Ғu nГ y trЖ°б»ӣc khi quyбәҝt Д‘б»Ӣnh hiб»ғn thб»Ӣ trang nГ o
    try {
      const savedUserStr = localStorage.getItem("currentUser");
      const isLoggedInStr = localStorage.getItem("isLoggedIn");

      if (savedUserStr && isLoggedInStr === "true") {
        const user = JSON.parse(savedUserStr);
        // Дҗб»“ng bб»ҷ vГ o biбәҝn toГ n cб»Ҙc
        currentUser = user;
        window.currentUser = user;
        console.log(" Session recovered for:", user.email || user.username);
        console.log("рҹҺӯ Display Name:", user.displayName);

        // вӯҗ Cбә¬P NHбә¬T UI NGAY - TбәҘt cбәЈ vб»Ӣ trГӯ hiб»ғn thб»Ӣ tГӘn
        setTimeout(() => {
          if (typeof window.updateAllUserNames === "function") {
            window.updateAllUserNames(
              user.displayName || user.username || "User"
            );
          }
          if (typeof window.updateAllUserAvatars === "function") {
            window.updateAllUserAvatars(user.avatarUrl);
          }
        }, 100);
      } else {
        console.log("в„№ No active session found");
        currentUser = null;
        window.currentUser = null;
      }
    } catch (e) {
      console.error(" Error recovering session:", e);
      localStorage.clear();
      currentUser = null;
      window.currentUser = null;
    }

    // BЖҜб»ҡC 2: XГЎc Д‘б»Ӣnh trang Д‘Гӯch (Routing Logic)

    // ЖҜu tiГӘn 1: Link tб»« email/server (window.SERVER_PARAMS.page)
    let requestedPageName = window.SERVER_PARAMS?.page || "";

    // ЖҜu tiГӘn 2: TrбәЎng thГЎi cЕ© khi F5 (localStorage)
    if (!requestedPageName) {
      requestedPageName = localStorage.getItem("lastActivePage");
      if (requestedPageName) {
        console.log(" Recovered page from storage:", requestedPageName);
      }
    } else {
      console.log(" Server requested page:", requestedPageName);
    }

    // Дҗб»Ӣnh nghД©a danh sГЎch trang
    const pageMap = {
      dashboard: "page-dashboard",
      topics: "page-topics",
      mcq: "page-mcq",
      lesson: "page-lesson",
      matching: "page-matching",
      profile: "page-profile",
      login: "page-login",
      register: "page-register",
      landing: "page-landing",
      "verify-email": "page-verify-email",
      "forgot-password": "page-forgot-password",
    };

    const protectedPages = [
      "dashboard",
      "topics",
      "mcq",
      "lesson",
      "matching",
      "profile",
    ];
    const authPages = ["login", "register", "landing", "forgot-password"];

    // Mбә·c Д‘б»Ӣnh lГ  landing
    let targetPageId = "page-landing";
    let finalPageName = "landing";

    // Logic Д‘б»Ӣnh tuyбәҝn
    if (requestedPageName && pageMap[requestedPageName]) {
      finalPageName = requestedPageName;
    } else {
      // Nбәҝu khГҙng cГі trang yГӘu cбә§u, nhЖ°ng Д‘ГЈ login -> vГ o dashboard
      if (window.currentUser) {
        finalPageName = "dashboard";
      }
    }

    // BЖҜб»ҡC 3: Kiб»ғm tra quyб»Ғn truy cбәӯp (Auth Guard)
    const isProtected = protectedPages.includes(finalPageName);
    const isAuthPage = authPages.includes(finalPageName);

    if (isProtected) {
      if (window.currentUser) {
        // ДҗГЈ login + Trang bбәЈo vб»Ү -> CHO PHГүP
        targetPageId = pageMap[finalPageName];
        console.log(" Authenticated access to:", finalPageName);
      } else {
        // ChЖ°a login + Trang bбәЈo vб»Ү -> ДҗГҒ Vб»Җ LOGIN
        console.warn(" Unauthorized access. Redirecting to Login.");
        targetPageId = "page-login";
        finalPageName = "login";
      }
    } else if (isAuthPage) {
      if (window.currentUser && finalPageName !== "verify-email") {
        // ДҗГЈ login mГ  vГ o Login/Register/Landing -> ДҗбәЁY VГҖO DASHBOARD
        console.log("в„№ User already logged in. Redirecting to Dashboard.");
        targetPageId = "page-dashboard";
        finalPageName = "dashboard";
      } else {
        // ChЖ°a login + Trang public -> CHO PHГүP
        targetPageId = pageMap[finalPageName];
      }
    } else {
      targetPageId = pageMap[finalPageName] || "page-landing";
    }

    console.log(" Final Target Page:", targetPageId);

    // Hiб»ғn thб»Ӣ trang cuб»‘i cГ№ng
    showPage(targetPageId, {}, false);

    // Load dб»Ҝ liб»Үu dashboard nбәҝu cбә§n
    if (
      targetPageId === "page-dashboard" &&
      typeof loadDashboardData === "function"
    ) {
      setTimeout(loadDashboardData, 100);
    }
  });
  // ==================== URL State Management ====================

  /**
   * CГЎВәВӯp nhГЎВәВӯt URL state mГғВ  khГғВҙng reload trang
   * @param {string} pageName - TГғВӘn trang (dashboard, topics, login, etc.)
   */
  function updateURLState(pageName) {
    if (!pageName) return;

    const newURL = window.location.pathname + "?page=" + pageName;
    console.log("Г°ЕёвҖқвҖ” Updating URL to:", newURL);

    // SГЎВ»Вӯ dГЎВ»ВҘng replaceState Г„вҖҳГЎВ»Ж’ khГғВҙng tГЎВәВЎo entry mГЎВ»вҖәi trong history
    window.history.replaceState({ page: pageName }, "", newURL);
  }

  // ==================== Page Navigation ====================

  /**
   * Show specific page and hide others
   * @param {string} pageId - ID of the page to show
   * @param {object} params - Optional parameters to pass to the page
   * @param {boolean} addToHistory - Whether to add this navigation to browser history
   */
  function showPage(pageId, params = {}, addToHistory = true) {
    console.log("Showing page:", pageId);

    // Safety check: Nбәҝu pageId khГҙng tб»“n tбәЎi trong DOM, vб»Ғ landing
    if (!document.getElementById(pageId)) {
      console.error("Page ID not found:", pageId);
      pageId = "page-landing";
    }

    // Hide toast when changing pages
    if (typeof hideToast === "function") hideToast();

    // 1. бәЁn tбәҘt cбәЈ trang
    const allPages = document.querySelectorAll(".page-content");
    allPages.forEach((page) => (page.style.display = "none"));

    // 2. Hiб»Үn trang Д‘Гӯch
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
      targetPage.style.display = "block"; // DГІng nГ y hiб»Үn trang

      // 3. LЖ°u trбәЎng thГЎi
      const pageName = pageId.replace("page-", "");
      localStorage.setItem("lastActivePage", pageName);

      // Cбәӯp nhбәӯt URL бәЈo
      if (typeof updateURLState === "function") updateURLState(pageName);

      // Update browser history
      if (addToHistory) {
        const state = { pageId: pageId, params: params };
        const url = window.location.pathname + "?page=" + pageName;
        history.pushState(state, "", url);
      }

      // --- KHU Vб»°C Sб»¬A Lб»–I (FIX CRASH) ---
      // Bб»Қc viб»Үc update UI trong try-catch Д‘б»ғ nбәҝu lб»—i giao diб»Үn thГ¬ trang vбә«n load Д‘Ж°б»Јc
      if (pageId === "page-dashboard") {
        try {
          // Kiб»ғm tra cГЎc biбәҝn thб»ғ hГ m update navbar
          if (typeof updateNavbarActive === "function") {
            updateNavbarActive("page-dashboard");
          } else if (
            typeof Sidebar !== "undefined" &&
            typeof Sidebar.updateActiveNav === "function"
          ) {
            Sidebar.updateActiveNav("page-dashboard");
          }
        } catch (e) {
          console.warn("Navbar update failed (ignored to allow page load):", e);
        }
      }
      // --------------------------------------

      // Pass params logic
      if (Object.keys(params).length > 0) {
        window.currentPageParams = params;
      }

      // CГЎc xб»ӯ lГҪ khб»ҹi tбәЎo trang con (dГ№ng try-catch Д‘б»ғ an toГ n)
      try {
        if (pageId === "page-topics") {
          if (typeof initTopicsPage === "function") initTopicsPage();
          else if (typeof window.initTopicsPageOnShow === "function")
            window.initTopicsPageOnShow();
        }
        if (
          pageId === "page-lesson" &&
          typeof window.initLessonPage === "function"
        )
          window.initLessonPage();
        if (pageId === "page-mcq" && typeof window.initMCQPage === "function")
          window.initMCQPage();
        if (
          pageId === "page-profile" &&
          typeof window.initProfilePage === "function"
        )
          setTimeout(() => window.initProfilePage(), 100);
      } catch (subPageError) {
        console.error("Error initializing sub-page:", subPageError);
      }
    } else {
      console.error("Page not found:", pageId);
    }
  }
  // ==================== Browser History Handling ====================

  /**
   * Handle browser back/forward buttons
   */
  window.addEventListener("popstate", function (event) {
    console.log("Popstate event:", event.state);

    if (event.state && event.state.pageId) {
      // Navigate to the page from history without adding to history again
      showPage(event.state.pageId, event.state.params || {}, false);
    } else {
      // No state - go to default page
      const savedUser = localStorage.getItem("currentUser");
      if (savedUser) {
        showPage("page-dashboard", {}, false);
      } else {
        showPage("page-landing", {}, false);
      }
    }
  });

  // Initialize history state on first load
  window.addEventListener("load", function () {
    if (!history.state) {
      const savedUser = localStorage.getItem("currentUser");
      const initialPage = savedUser ? "page-dashboard" : "page-landing";
      const state = { pageId: initialPage, params: {} };
      history.replaceState(
        state,
        "",
        window.location.pathname + "#" + initialPage.replace("page-", "")
      );
    }
  });

  /**
   * Update navbar active state
   */
  function updateNavbarActive(activePageId) {
    const navItems = document.querySelectorAll(".navbar-item");
    navItems.forEach((item) => {
      item.classList.remove("active");
    });
  }

  // ==================== Authentication ====================

  /**
   * Initialize Google Sign-In
   * ГўЕЎВ ГҜВёВҸ FIX FedCM Error: KhГғВҙng dГғВ№ng Google Identity Services trong Apps Script iframe
   * ChГЎВ»вҖ° dГғВ№ng OAuth2 flow truyГЎВ»ВҒn thГЎВ»вҖҳng qua backend
   */
  function initGoogleSignIn() {
    // ГўЕ“вҖҰ Г„ВҗГғВЎnh dГЎВәВҘu Г„вҖҳГғВЈ sГЎВәВөn sГғВ ng (khГғВҙng cГЎВәВ§n load Google API nГЎВ»ВҜa)
    googleClientInitialized = true;
    console.log(
      "ГўЕ“вҖҰ Google OAuth2 ready (FedCM/One Tap disabled - using backend OAuth2 flow)"
    );
    console.log(
      "ГўвҖһВ№ГҜВёВҸ Apps Script runs in iframe - FedCM not supported. Using traditional OAuth2."
    );
  }

  /**
   * Handle Google credential response
   * ГўЕЎВ ГҜВёВҸ DEPRECATED: KhГғВҙng dГғВ№ng nГЎВ»ВҜa vГғВ¬ Г„вҖҳГғВЈ tГЎВәВҜt Google Identity Services
   * GiГЎВ»ВҜ lГЎВәВЎi Г„вҖҳГЎВ»Ж’ trГғВЎnh lГЎВ»вҖ”i nГЎВәВҝu cГғВі reference cГ…В©
   */
  function handleGoogleCredentialResponse(response) {
    console.warn(
      "ГўЕЎВ ГҜВёВҸ handleGoogleCredentialResponse called - this should not happen"
    );
    console.log("Falling back to OAuth2 flow...");

    // Fallback: NГЎВәВҝu vГЎВәВ«n Г„вҖҳГҶВ°ГЎВ»ВЈc gГЎВ»ВҚi, chuyГЎВ»Ж’n sang OAuth2
    handleGoogleLogin();
  }

  /**
   * Handle login form submission
   */
  function handleLoginFormSubmit() {
    console.log("Login form submitted");

    // Get form data
    const username = document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    // Validation
    if (!username || !password) {
      showToast("Vui lГғВІng nhГЎВәВӯp Г„вҖҳГЎВәВ§y Г„вҖҳГЎВ»В§ thГғВҙng tin", "error");
      return false;
    }

    // Prepare payload
    const payload = {
      username: username,
      password: password,
    };

    // Show loading
    showLoading(true);
    disableButton("btn-login");

    // Call backend function
    google.script.run
      .withSuccessHandler(onLoginSuccess)
      .withFailureHandler(onApiError)
      .loginUser(payload);

    return false;
  }

  /**
   * Handle successful login
   */
  function onLoginSuccess(response) {
    console.log("Login response:", JSON.stringify(response));
    console.log("Response status:", response.status);
    console.log("Response message:", response.message);
    hideLoading();
    enableButton("btn-login");

    if (response.status === "success") {
      // Save user to localStorage (auto logout when closing tab)
      currentUser = response.user;
      window.currentUser = response.user; // ГўВӯВҗ Г„ВҗГЎВ»вҖңng bГЎВ»в„ў vГғВ o window
      localStorage.setItem("currentUser", JSON.stringify(currentUser));
      console.log("ГўЕ“вҖҰ Current user synced to window:", currentUser);

      // Show success message
      showToast("Г„ВҗГ„Ж’ng nhГЎВәВӯp thГғВ nh cГғВҙng!", "success");

      // Navigate to dashboard
      setTimeout(() => {
        showPage("page-dashboard");
        loadDashboardData();
      }, 500);
    } else {
      showToast(response.message || "Г„ВҗГ„Ж’ng nhГЎВәВӯp thГЎВәВҘt bГЎВәВЎi", "error");
    }
  }

  /**
   * Handle register form submission - NEW VERSION
   */
  function handleRegisterFormSubmit() {
    console.log("Г°ЕёвҖңВқ Register form submitted");

    // Get form data
    const fullName = document.getElementById("register-fullname").value.trim();
    const email = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    const confirmPassword = document.getElementById(
      "register-confirm-password"
    ).value;

    // Validation
    if (!fullName || !email || !password || !confirmPassword) {
      showToast("Vui lГғВІng Г„вҖҳiГЎВ»ВҒn Г„вҖҳГЎВәВ§y Г„вҖҳГЎВ»В§ thГғВҙng tin", "error");
      return false;
    }

    if (password.length < 6) {
      showToast("MГЎВәВӯt khГЎВәВ©u phГЎВәВЈi cГғВі ГғВӯt nhГЎВәВҘt 6 kГғВҪ tГЎВ»Вұ", "error");
      return false;
    }

    if (password !== confirmPassword) {
      showToast("MГЎВәВӯt khГЎВәВ©u xГғВЎc nhГЎВәВӯn khГғВҙng khГЎВ»вҖәp", "error");
      return false;
    }

    // Prepare payload
    const userData = {
      email: email,
      password: password,
      confirmPassword: confirmPassword,
      fullName: fullName,
    };

    // Show loading
    showLoading(true);

    // Call backend function
    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("ГўЕ“вҖҰ Register Response:", response);

        if (response.success) {
          // HiГЎВ»Ж’n thГЎВ»вҖ№ thГғВҙng bГғВЎo xГғВЎc thГЎВ»Вұc email
          showToast(response.message, "success");

          // --- PHГЎВәВҰN SГЎВ»В¬A Г„ВҗГЎВ»вҖқI QUAN TRГЎВ»Е’NG ГЎВ»Еҫ Г„ВҗГғвҖҡY ---

          // KiГЎВ»Ж’m tra xem server cГғВі yГғВӘu cГЎВәВ§u xГғВЎc thГЎВ»Вұc khГғВҙng
          if (response.requiresVerification) {
            console.log(
              "Г°ЕёвҖқВҸ YГғВӘu cГЎВәВ§u xГғВЎc thГЎВ»Вұc email, Г„вҖҳang chuyГЎВ»Ж’n hГҶВ°ГЎВ»вҖәng..."
            );

            // 1. LГҶВ°u email vГғВ o localStorage Г„вҖҳГЎВ»Ж’ trang Verify biГЎВәВҝt xГғВЎc thГЎВ»Вұc cho ai
            const verificationData = {
              email: email,
              timestamp: new Date().getTime(),
            };
            localStorage.setItem(
              "pendingVerification",
              JSON.stringify(verificationData)
            );

            // 2. ChuyГЎВ»Ж’n sang trang Verify thay vГғВ¬ Login
            setTimeout(() => {
              showPage("page-verify-email");
            }, 1500);
          } else {
            // NГЎВәВҝu khГғВҙng cГЎВәВ§n xГғВЎc thГЎВ»Вұc thГғВ¬ mГЎВ»вҖәi vГЎВ»ВҒ Login
            setTimeout(() => {
              showPage("page-login");
            }, 3000);
          }
          // --------------------------------------
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("ГўВқЕ’ Register Error:", error);
        showToast("LГЎВ»вҖ”i: " + error.message, "error");
      })
      .registerWithEmailPassword(userData);

    return false;
  }

  /**
   * Handle login form submission - NEW VERSION
   */
  function handleLoginFormSubmit() {
    console.log("Г°ЕёвҖқВҗ Login form submitted");

    // Get form data
    const email = document.getElementById("login-email")
      ? document.getElementById("login-email").value.trim()
      : document.getElementById("login-username").value.trim();
    const password = document.getElementById("login-password").value;

    // Validation
    if (!email || !password) {
      showToast("Vui lГғВІng nhГЎВәВӯp email vГғВ  mГЎВәВӯt khГЎВәВ©u", "error");
      return false;
    }

    // Prepare credentials
    const credentials = {
      email: email,
      password: password,
    };

    // Show loading
    showLoading(true);

    // Call backend function
    google.script.run
      .withSuccessHandler(function (response) {
        hideLoading();
        console.log("ГўЕ“вҖҰ Login Response:", response);

        if (response.success) {
          // ГўВӯВҗ LГҶВҜU SESSION Г„ВҗГЎВәВҰY Г„ВҗГЎВ»ВҰ
          currentUser = response.user;
          localStorage.setItem("currentUser", JSON.stringify(response.user));
          localStorage.setItem("isLoggedIn", "true");
          localStorage.setItem("userId", response.user.userId);

          console.log("ГўЕ“вҖҰ Session saved:", {
            userId: response.user.userId,
            email: response.user.email,
            avatarUrl: response.user.avatarUrl,
          });

          showToast(response.message, "success");

          setTimeout(() => {
            showPage("page-dashboard");
            loadDashboardData();
          }, 1000);
        } else {
          showToast(response.message, "error");
        }
      })
      .withFailureHandler(function (error) {
        hideLoading();
        console.error("ГўВқЕ’ Login Error:", error);
        showToast("LГЎВ»вҖ”i: " + error.message, "error");
      })
      .loginWithEmailPassword(credentials);

    return false;
  }

  /**
   * OLD VERSION - Keep for backward compatibility
   * Handle register form submission
   */
  function handleRegisterFormSubmitOLD() {
    console.log("Register form submitted");

    // Get form data
    const fullName = document.getElementById("register-fullname").value.trim();
    const username = document.getElementById("register-username").value.trim();
    const email = document.getElementById("register-email").value.trim();
    const password = document.getElementById("register-password").value;
    const confirmPassword = document.getElementById(
      "register-confirm-password"
    ).value;

    // Validation
    if (!fullName || !username || !password) {
      showToast(
        "Vui lГғВІng nhГЎВәВӯp Г„вҖҳГЎВәВ§y Г„вҖҳГЎВ»В§ thГғВҙng tin bГЎВәВҜt buГЎВ»в„ўc",
        "error"
      );
      return false;
    }

    if (username.length < 3) {
      showToast("TГғВӘn Г„вҖҳГ„Ж’ng nhГЎВәВӯp phГЎВәВЈi cГғВі ГғВӯt nhГЎВәВҘt 3 kГғВҪ tГЎВ»Вұ", "error");
      return false;
    }

    if (password.length < 6) {
      showToast("MГЎВәВӯt khГЎВәВ©u phГЎВәВЈi cГғВі ГғВӯt nhГЎВәВҘt 6 kГғВҪ tГЎВ»Вұ", "error");
      return false;
    }

    if (password !== confirmPassword) {

    google.script.run
      .withSuccessHandler(function (response) {

        isGoogleAuthInProgress = false;
        hideLoading();

        console.log("ГўЕ“вҖҰ Auto Login Response:", response);

        if (response.success) {

  /**
   * Show toast notification
   * @param {string} message - Message to display
   * @param {string} type - Type: success, error, info, warning
   */
  function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toast-message");

    if (!toast || !toastMessage) return;

    // Set message
    toastMessage.textContent = message;

    // Remove all type classes
    toast.classList.remove(
      "toast-success",
      "toast-error",
      "toast-info",
      "toast-warning"
    );

    // Add type class
    toast.classList.add("toast-" + type);

    // Show toast
    toast.classList.remove("translate-x-full");
    toast.classList.add("translate-x-0");

    // Hide after 3 seconds
    setTimeout(() => {
      toast.classList.remove("translate-x-0");
      toast.classList.add("translate-x-full");
    }, 3000);
  }

    enableButton("btn-register");

    // Check for specific error types
    let errorMessage = "CГғВі lГЎВ»вҖ”i xГЎВәВЈy ra";

    if (error && error.message) {
      const msg = error.message.toLowerCase();

      if (msg.includes("429") || msg.includes("too many requests")) {
        errorMessage =
          "QuГғВЎ nhiГЎВ»ВҒu yГғВӘu cГЎВәВ§u. Vui lГғВІng Г„вҖҳГЎВ»ВЈi 1 phГғВәt vГғВ  thГЎВ»Вӯ lГЎВәВЎi.";
      } else if (msg.includes("timeout")) {
        errorMessage =
          "HГЎВәВҝt thГЎВ»Вқi gian chГЎВ»Вқ. Vui lГғВІng kiГЎВ»Ж’m tra kГЎВәВҝt nГЎВ»вҖҳi vГғВ  thГЎВ»Вӯ lГЎВәВЎi.";
      } else if (msg.includes("network")) {
        errorMessage =
          "LГЎВ»вҖ”i kГЎВәВҝt nГЎВ»вҖҳi mГЎВәВЎng. Vui lГғВІng kiГЎВ»Ж’m tra internet vГғВ  thГЎВ»Вӯ lГЎВәВЎi.";
      } else {
        errorMessage = "CГғВі lГЎВ»вҖ”i xГЎВәВЈy ra: " + error.message;
      }
    }

    showToast(errorMessage, "error");

  /**

   */
  function formatDate(dateString) {
    if (!dateString) return "";

    try {
      const date = new Date(dateString);
      return date.toLocaleDateString("vi-VN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
      });
    } catch (error) {
      return dateString;
    }
  }

  /**
   * Handle email verification from URL
   */
  function handleEmailVerification() {
    console.log("Г°ЕёвҖқВҚ Checking for verification/reset action...");

    // Try to get params from server injection first
    let action = window.SERVER_PARAMS?.action || "";
    let token = window.SERVER_PARAMS?.token || "";

    // Fallback: try URL params (may not work in iframe)
    if (!action || !token) {
      const urlParams = new URLSearchParams(window.location.search);
      action = urlParams.get("action") || "";
      token = urlParams.get("token") || "";
    }

    console.log("Г°ЕёвҖңВҰ Server params:", window.SERVER_PARAMS);
    console.log("Г°ЕёвҖқвҖ” URL search:", window.location.search);
    console.log("Action:", action);
    console.log("Token:", token ? token.substring(0, 10) + "..." : "none");

    if (action === "verify" && token) {
      console.log("Г°ЕёвҖқВҗ Verifying email with token");
      showLoading(true);

      // Show login page
      showPage("page-login");

      google.script.run
        .withSuccessHandler(function (response) {
          hideLoading();
          console.log("ГўЕ“вҖҰ Verification Response:", response);

          if (response.success) {
            showToast(
              response.message + " BГЎВәВЎn cГғВі thГЎВ»Ж’ Г„вҖҳГ„Ж’ng nhГЎВәВӯp ngay!",
              "success"
            );
          } else {
            showToast(response.message, "error");
          }
        })
        .withFailureHandler(function (error) {
          hideLoading();
          console.error("ГўВқЕ’ Verification Error:", error);
          showToast("LГЎВ»вҖ”i xГғВЎc thГЎВ»Вұc: " + error.message, "error");
        })
        .verifyEmailToken(token);
    } else if (action === "reset" && token) {
      console.log("Г°ЕёвҖқВҗ Reset password with token");
      showResetPasswordForm(token);
    } else {
      console.log("ГўвҖһВ№ГҜВёВҸ No verification or reset action found");
    }
  }

  // ==================== Toast Notification System ====================

  /**
   * Show toast notification with star effect
   * @param {string} message - Message to display
   * @param {string} type - Type: 'success', 'error', 'info', 'warning'
   */
  function showToast(message, type = "info") {
    const toast = document.getElementById("toast");
    const toastMessage = document.getElementById("toast-message");

    if (!toast || !toastMessage) return;

    // Set message
    toastMessage.textContent = message;

    // Set colors based on type
    toast.classList.remove(
      "bg-green-500",
      "bg-red-500",
      "bg-blue-500",
      "bg-yellow-500"
    );
    switch (type) {
      case "success":
        toast.classList.add("bg-green-500");
        break;
      case "error":
        toast.classList.add("bg-red-500");
        break;
      case "warning":
        toast.classList.add("bg-yellow-500");
        break;
      default:
        toast.classList.add("bg-blue-500");
    }

    // Show toast with animation
    toast.classList.remove("translate-x-full");
    toast.classList.add("translate-x-0");

    // Create star effect
    createStarEffect(toast);

    // Auto hide after 3 seconds
    setTimeout(() => {
      hideToast();
    }, 3000);
  }

  /**
   * Hide toast notification
   */
  function hideToast() {
    const toast = document.getElementById("toast");
    if (toast) {
      toast.classList.remove("translate-x-0");
      toast.classList.add("translate-x-full");
    }
  }

  /**
   * Create star effect around toast
   */
  function createStarEffect(element) {
    const starContainer = document.createElement("div");
    starContainer.style.position = "fixed";
    starContainer.style.top = element.offsetTop + "px";
    starContainer.style.right = "1rem";
    starContainer.style.width = element.offsetWidth + "px";
    starContainer.style.height = element.offsetHeight + "px";
    starContainer.style.pointerEvents = "none";
    starContainer.style.zIndex = "9999";
    document.body.appendChild(starContainer);

    const stars = ["ГўВӯВҗ", "ГўЕ“ВЁ", "Г°ЕёЕ’Её", "Г°ЕёвҖҷВ«"];
    const starCount = 8;

    for (let i = 0; i < starCount; i++) {
      const star = document.createElement("div");
      star.textContent = stars[Math.floor(Math.random() * stars.length)];
      star.style.position = "absolute";
      star.style.fontSize = "1.5rem";
      star.style.animation = "starBurst 1s ease-out forwards";

      const angle = (Math.PI * 2 * i) / starCount;
      const distance = 50 + Math.random() * 30;
      star.style.left = "50%";
      star.style.top = "50%";
      star.style.setProperty("--tx", Math.cos(angle) * distance + "px");
      star.style.setProperty("--ty", Math.sin(angle) * distance + "px");

      starContainer.appendChild(star);
    }

    if (!document.getElementById("star-animation-style")) {
      const style = document.createElement("style");
      style.id = "star-animation-style";
      style.textContent = `
        @keyframes starBurst {
          0% {
            transform: translate(-50%, -50%) scale(0);
            opacity: 1;
          }
          50% {
            transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.2);
            opacity: 1;
          }
          100% {
            transform: translate(calc(-50% + var(--tx) * 1.5), calc(-50% + var(--ty) * 1.5)) scale(0);
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(style);
    }

    setTimeout(() => {
      starContainer.remove();
    }, 1000);
  }

  // ==================== Notification Panel Toggle ====================

  document.addEventListener("click", function (e) {
    const notificationBtn = e.target.closest(
      ".notification-btn, #notificationBtn"
    );
    const closeNotifBtn = e.target.closest(".close-notif-btn, #closeNotifBtn");
    const notificationPanel =
      document.getElementById("notificationPanel") ||
      document.querySelector(".notification-panel");

    if (notificationBtn && notificationPanel) {
      const isVisible = notificationPanel.style.display === "block";
      notificationPanel.style.display = isVisible ? "none" : "block";
      e.stopPropagation();
    } else if (closeNotifBtn && notificationPanel) {
      notificationPanel.style.display = "none";
      e.stopPropagation();
    } else if (
      notificationPanel &&
      notificationPanel.style.display === "block"
    ) {
      if (!notificationPanel.contains(e.target)) {
        notificationPanel.style.display = "none";
      }
    }
  });
