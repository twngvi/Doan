<style>
  /* ========================================
     MATCHING CONTAINER - MULTI-THEME SUPPORT
     ======================================== */
  #page-matching {
    /* Local variables referencing theme vars with Galaxy fallbacks */
    --mg-bg: var(--theme-dashboard-bg, var(--theme-bg, #0f0c29));
    --mg-text: var(--theme-text, #e0e7ff);
    --mg-text-secondary: var(--theme-text-secondary, rgba(255, 255, 255, 0.7));
    --mg-text-muted: var(--theme-text-muted, rgba(255, 255, 255, 0.5));
    --mg-primary: var(--theme-primary, #5b6ff8);
    --mg-primary-hover: var(--theme-primary-hover, #4a5ee7);
    --mg-secondary: var(--theme-secondary, #7b6cf6);
    --mg-card: var(--theme-card, rgba(255, 255, 255, 0.05));
    --mg-card-border: var(--theme-card-border, rgba(255, 255, 255, 0.1));
    --mg-card-shadow: var(--theme-card-shadow, 0 2px 12px rgba(0, 0, 0, 0.3));
    --mg-card-hover-shadow: var(
      --theme-card-hover-shadow,
      0 8px 24px rgba(0, 0, 0, 0.4)
    );
    --mg-border: var(--theme-border, rgba(255, 255, 255, 0.1));
    --mg-border-light: var(--theme-border-light, rgba(255, 255, 255, 0.06));
    --mg-surface: var(--theme-surface, rgba(255, 255, 255, 0.08));
    --mg-hover: var(--theme-hover, rgba(255, 255, 255, 0.12));
    --mg-success: var(--theme-success, #4ade80);
    --mg-warning: var(--theme-warning, #fbbf24);
    --mg-danger: var(--theme-danger, #f87171);
    --mg-gradient: var(--theme-gradient, linear-gradient(135deg, #5b6ff8 0%, #7b6cf6 100%));
    --mg-gradient-soft: var(
      --theme-gradient-soft,
      linear-gradient(
        135deg,
        #1a0a3e 0%,
        #2d1b69 30%,
        #1e3a5f 60%,
        #0d2847 100%
      )
    );
    --mg-gradient-accent: var(--theme-gradient-accent, linear-gradient(135deg, #764ba2 0%, #f093fb 100%));
    --mg-shadow: var(--theme-shadow, rgba(0, 0, 0, 0.3));

    min-height: 100vh;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: stretch;
    justify-content: flex-start;
    padding: 0;
    margin: 0;
    background: var(--mg-bg);
    background-attachment: fixed;
    position: relative;
  }

  /* Galaxy Stars Effect */
  #page-matching::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      radial-gradient(
        2px 2px at 20% 30%,
        rgba(255, 255, 255, 0.5),
        transparent
      ),
      radial-gradient(
        2px 2px at 40% 70%,
        rgba(147, 197, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.6),
        transparent
      ),
      radial-gradient(
        2px 2px at 80% 50%,
        rgba(196, 181, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 80%,
        rgba(255, 255, 255, 0.3),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 90% 10%,
        rgba(147, 197, 253, 0.5),
        transparent
      ),
      radial-gradient(
        1px 1px at 30% 90%,
        rgba(255, 255, 255, 0.25),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 70% 40%,
        rgba(196, 181, 253, 0.35),
        transparent
      );
    background-size: 350px 250px;
    pointer-events: none;
    z-index: 0;
    animation: matchingGalaxyTwinkle 6s ease-in-out infinite;
  }

  /* Hide galaxy effects for non-galaxy themes */
  .hide-galaxy-effects #page-matching::before,
  .hide-galaxy-effects .matching-header-galaxy-bg,
  .hide-galaxy-effects .matching-header-stars,
  .hide-galaxy-effects .matching-header-nebula,
  .hide-galaxy-effects .matching-header-meteor-container,
  .hide-galaxy-effects .matching-header-meteor {
    display: none;
  }

  @keyframes matchingGalaxyTwinkle {
    0%,
    100% {
      opacity: 0.7;
    }
    50% {
      opacity: 1;
    }
  }

  .matching-container {
    padding: 0 1.5rem 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    min-height: 100vh;
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    position: relative;
    z-index: 1;
  }

  .matching-container .matching-header.unified-page-header {
    display: block;
    margin-bottom: 1.5rem;
  }

  /* ========================================
     MATCHING HEADER - PROMINENT GALAXY THEME
     ======================================== */
  .matching-header:not(.unified-page-header) {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding: 2rem 2.5rem;
    background: var(--mg-gradient-soft);
    border-radius: 16px;
    border: 1px solid var(--mg-card-border);
    box-shadow: var(--mg-card-shadow);
    overflow: hidden;
  }

  /* Galaxy Background Effects for Matching Header */
  .matching-header-galaxy-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .matching-header-stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(
        1px 1px at 20% 30%,
        rgba(255, 255, 255, 0.8) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 40% 70%,
        rgba(168, 216, 255, 0.7) 100%,
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.9) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 80% 50%,
        rgba(201, 168, 255, 0.6) 100%,
        transparent
      );
    background-size: 200px 100px;
    animation: matchingHeaderTwinkle 4s ease-in-out infinite;
    transition: transform 0.3s ease-out;
  }

  @keyframes matchingHeaderTwinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  .matching-header-nebula {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(
        ellipse 80% 60% at 20% 40%,
        rgba(255, 100, 150, 0.12),
        transparent
      ),
      radial-gradient(
        ellipse 60% 50% at 80% 60%,
        rgba(100, 150, 255, 0.1),
        transparent
      );
    filter: blur(20px);
  }

  /* Header Meteor Effect - 45 degree from left to right */
  .matching-header-meteor-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .matching-header-meteor {
    position: absolute;
    width: 2px;
    height: 50px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(168, 216, 255, 0.5),
      rgba(255, 255, 255, 0.9)
    );
    border-radius: 50%;
    transform: rotate(45deg);
    opacity: 0;
    animation: matchingMeteorFall 1s ease-in forwards;
  }

  .matching-header-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -1.5px;
    width: 5px;
    height: 5px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px rgba(168, 216, 255, 0.7);
  }

  @keyframes matchingMeteorFall {
    0% {
      opacity: 0;
      transform: rotate(45deg) translate(0, 0);
    }
    15% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(45deg) translate(300px, 300px);
    }
  }

  .matching-header-content {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    width: 100%;
  }

  .matching-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--mg-text);
    text-shadow: 0 2px 10px var(--mg-shadow);
  }

  .matching-header-search {
    position: relative;
    width: 200px;
  }

  .matching-search-input {
    width: 100%;
    height: 38px;
    padding: 0 1rem;
    border: 1px solid var(--mg-border);
    border-radius: 10px;
    font-size: 0.85rem;
    transition: all 0.3s ease;
    background: var(--mg-surface);
    color: var(--mg-text);
    backdrop-filter: blur(5px);
    font-family: "Inter", "Segoe UI", sans-serif;
  }

  .matching-search-input:focus {
    outline: none;
    border-color: var(--mg-primary);
    background: var(--mg-hover);
    box-shadow: 0 0 15px color-mix(in srgb, var(--mg-primary) 20%, transparent);
  }

  .matching-search-input::placeholder {
    color: var(--mg-text-muted);
  }

  /* ========================================
     MATCHING TOPIC SELECTION - LIST LAYOUT
     ======================================== */
  .matching-topics-grid {
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
    margin-bottom: 2rem;
  }

  .matching-topic-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: var(--mg-surface);
    backdrop-filter: blur(10px);
    border-radius: 14px;
    padding: 1.125rem 1.5rem;
    border: 1px solid var(--mg-card-border);
    cursor: pointer;
    transition:
      transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow 0.3s ease,
      border-color 0.3s ease,
      background 0.3s ease;
    position: relative;
    overflow: visible;
    opacity: 0;
    animation: matchingItemSlideUp 0.4s ease forwards;
  }

  @keyframes matchingItemSlideUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .matching-topic-card:not(.locked):not(.no-content):hover {
    transform: translateY(-12px) scale(1.02);
    border-color: var(--mg-primary);
    box-shadow: 0 18px 42px rgba(139, 92, 246, 0.28);
    background: var(--mg-hover);
  }

  .matching-topic-card.locked {
    opacity: 0.65;
  }

  .matching-topic-card.locked:hover {
    transform: translateY(-6px) scale(1.01);
    border-color: var(--mg-card-border);
    box-shadow: 0 4px 14px rgba(15, 23, 42, 0.2);
    background: var(--mg-surface);
  }

  .matching-topic-card-index {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--mg-gradient);
    color: var(--mg-text);
    font-size: 0.8rem;
    font-weight: 700;
    border-radius: 10px;
    flex-shrink: 0;
    opacity: 0.7;
  }

  .matching-topic-card.played .matching-topic-card-index {
    background: var(--mg-success);
    opacity: 0.5;
  }

  .matching-topic-card.no-content .matching-topic-card-index {
    background: var(--mg-surface);
    opacity: 0.5;
  }

  .matching-topic-card-icon {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--mg-surface);
    border-radius: 10px;
    color: var(--mg-primary);
  }

  .matching-topic-card-icon svg {
    stroke: var(--mg-primary);
  }

  .matching-topic-card-body {
    flex: 1;
    min-width: 0;
  }

  .matching-topic-card-name {
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--mg-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 0.25rem;
  }

  .matching-topic-card-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }

  .matching-topic-card-category {
    font-size: 0.75rem;
    color: var(--mg-text-muted);
    background: var(--mg-border-light);
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
  }

  /* Topic Card - No Content State */
  .matching-topic-card.no-content {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .matching-topic-card.no-content:hover {
    transform: none;
    border-color: var(--mg-card-border);
    box-shadow: none;
    background: var(--mg-surface);
  }

  .matching-topic-card.no-content .matching-topic-card-icon {
    background: var(--mg-border-light);
  }

  .matching-topic-card.no-content .matching-topic-card-icon svg {
    stroke: var(--mg-text-muted);
  }

  /* Topic Card - Played State */
  .matching-topic-card.played {
    border-color: color-mix(in srgb, var(--mg-success) 30%, transparent);
  }

  .matching-topic-card.played .matching-topic-card-icon {
    background: color-mix(in srgb, var(--mg-success) 15%, transparent);
  }

  .matching-topic-card.played .matching-topic-card-icon svg {
    stroke: var(--mg-success);
  }

  /* Topic Status Icon (circle like MCQ) */
  .matching-topic-status {
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }

  .matching-topic-status.ready {
    color: var(--mg-primary);
    background: color-mix(in srgb, var(--mg-primary) 15%, transparent);
  }

  .matching-topic-status.played {
    color: var(--mg-success);
    background: color-mix(in srgb, var(--mg-success) 15%, transparent);
  }

  .matching-topic-status.locked {
    color: var(--mg-text-muted);
    background: var(--mg-border-light);
  }

  .matching-topic-card-arrow {
    color: var(--mg-text-muted);
    flex-shrink: 0;
    transition:
      transform 0.2s ease,
      color 0.2s ease;
  }

  .matching-topic-card:hover .matching-topic-card-arrow {
    color: var(--mg-primary);
    transform: translateX(2px);
  }

  .matching-topic-card.played .matching-topic-card-badge {
    background: color-mix(in srgb, var(--mg-success) 20%, transparent);
    color: var(--mg-success);
    padding: 0.125rem 0.5rem;
    border-radius: 10px;
    font-size: 0.6875rem;
    font-weight: 600;
  }

  .matching-topic-card-badge.best-score {
    display: inline-flex;
    align-items: center;
    gap: 0.25rem;
    padding: 0.125rem 0.5rem;
    border-radius: 10px;
    border: 1px solid currentColor;
    background: color-mix(in srgb, currentColor 8%, transparent);
    font-size: 0.6875rem;
    font-weight: 600;
    line-height: 1.1;
  }

  .matching-topic-card-badge.best-score svg {
    flex-shrink: 0;
  }

  /* Search Empty State */
  .matching-search-empty {
    text-align: center;
    padding: 4rem 2rem;
  }

  .matching-search-empty-keyword {
    color: var(--mg-primary);
    font-weight: 600;
  }

  /* ========================================
     MATCHING TOPIC HUB (INTERMEDIATE VIEW)
     ======================================== */
  .matching-topic-detail {
    margin-bottom: 1.5rem;
  }

  .matching-topic-detail-card {
    position: relative;
    isolation: isolate;
    background:
      linear-gradient(
        145deg,
        color-mix(in srgb, var(--mg-surface) 95%, transparent) 0%,
        color-mix(in srgb, var(--mg-card) 88%, transparent) 100%
      ),
      radial-gradient(
        circle at 90% 10%,
        color-mix(in srgb, var(--mg-primary) 28%, transparent),
        transparent 40%
      );
    border: 1px solid
      color-mix(in srgb, var(--mg-primary) 32%, var(--mg-card-border));
    border-radius: 16px;
    padding: 1.35rem;
    box-shadow:
      0 18px 42px color-mix(in srgb, var(--mg-shadow) 50%, transparent),
      0 0 0 1px color-mix(in srgb, var(--mg-secondary) 18%, transparent) inset;
    backdrop-filter: blur(10px);
  }

  .matching-topic-detail-card::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 16px;
    background: linear-gradient(
      115deg,
      color-mix(in srgb, white 16%, transparent),
      transparent 42%
    );
    pointer-events: none;
    z-index: -1;
  }

  .matching-topic-detail-head h2 {
    margin: 0.75rem 0 0.5rem;
    color: var(--mg-text);
    font-size: 1.65rem;
    letter-spacing: 0.01em;
    text-shadow: 0 8px 28px
      color-mix(in srgb, var(--mg-primary) 35%, transparent);
  }

  .matching-topic-detail-description {
    margin: 0;
    color: var(--mg-text-secondary);
  }

  .matching-topic-detail-meta {
    margin-top: 0.85rem;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .matching-topic-detail-tag {
    color: var(--mg-text);
    border: 1px solid
      color-mix(in srgb, var(--mg-primary) 38%, var(--mg-border));
    border-radius: 999px;
    padding: 0.35rem 0.78rem;
    font-size: 0.8rem;
    background: linear-gradient(
      145deg,
      color-mix(in srgb, var(--mg-primary) 18%, transparent),
      color-mix(in srgb, var(--mg-secondary) 14%, transparent)
    );
  }

  .matching-topic-detail-actions {
    margin-top: 1rem;
    display: flex;
    align-items: center;
    gap: 0.65rem;
    flex-wrap: wrap;
  }

  .matching-topic-settings-icon-btn {
    width: 44px;
    height: 44px;
    padding: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 1.15rem;
    border-radius: 12px;
    border: 1px solid color-mix(in srgb, var(--mg-primary) 35%, var(--mg-border));
    background: color-mix(in srgb, var(--mg-card) 85%, transparent);
    color: var(--mg-text);
  }

  .matching-topic-settings-icon-btn:hover {
    transform: translateY(-1px) rotate(12deg);
    border-color: color-mix(in srgb, var(--mg-primary) 65%, var(--mg-border));
    box-shadow: 0 10px 22px color-mix(in srgb, var(--mg-primary) 24%, transparent);
  }

  .matching-topic-settings {
    margin-top: 1rem;
    border: 1px solid color-mix(in srgb, var(--mg-primary) 24%, var(--mg-border));
    border-radius: 12px;
    padding: 0.9rem;
    background: color-mix(in srgb, var(--mg-surface) 80%, transparent);
  }

  .matching-topic-settings-head {
    color: var(--mg-text);
    font-size: 0.92rem;
    font-weight: 700;
    margin-bottom: 0.25rem;
  }

  .matching-topic-settings-note {
    color: var(--mg-text-muted);
    font-size: 0.78rem;
    margin-bottom: 0.65rem;
  }

  .matching-topic-setting-group {
    margin-bottom: 0.65rem;
  }

  .matching-topic-setting-group:last-child {
    margin-bottom: 0;
  }

  .matching-topic-setting-label {
    color: var(--mg-text-secondary);
    font-size: 0.78rem;
    font-weight: 600;
    margin-bottom: 0.4rem;
  }

  .matching-topic-setting-options {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .matching-setting-chip {
    border: 1px solid var(--mg-border);
    background: var(--mg-card);
    color: var(--mg-text-secondary);
    border-radius: 999px;
    padding: 0.35rem 0.75rem;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .matching-setting-chip:hover {
    border-color: color-mix(in srgb, var(--mg-primary) 65%, var(--mg-border));
    color: var(--mg-text);
  }

  .matching-setting-chip.active {
    border-color: color-mix(in srgb, var(--mg-primary) 70%, var(--mg-border));
    background: color-mix(in srgb, var(--mg-primary) 20%, transparent);
    color: var(--mg-text);
    box-shadow: 0 4px 14px color-mix(in srgb, var(--mg-primary) 24%, transparent);
  }

  .matching-topic-detail-actions .matching-btn-primary {
    min-width: 240px;
    font-weight: 700;
    letter-spacing: 0.01em;
    box-shadow: 0 14px 30px
      color-mix(in srgb, var(--mg-primary) 36%, transparent);
  }

  .matching-topic-history {
    margin-top: 1.25rem;
    border: 1px solid
      color-mix(in srgb, var(--mg-primary) 25%, var(--mg-border));
    border-radius: 12px;
    padding: 1rem;
    background: linear-gradient(
      145deg,
      color-mix(in srgb, var(--mg-card) 88%, transparent),
      color-mix(in srgb, var(--mg-surface) 80%, transparent)
    );
  }

  .matching-topic-history-head {
    color: var(--mg-text);
    font-weight: 600;
    margin-bottom: 0.75rem;
  }

  .matching-topic-history-loading,
  .matching-topic-history-empty {
    color: var(--mg-text-secondary);
    font-size: 0.9rem;
  }

  .matching-topic-history-list {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .matching-topic-history-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    border: 1px solid var(--mg-border-light);
    border-radius: 10px;
    padding: 0.65rem 0.75rem;
    background: color-mix(in srgb, var(--mg-surface) 70%, transparent);
  }

  .matching-history-inline-detail {
    margin-top: -0.1rem;
    margin-bottom: 0.5rem;
    border: 1px solid var(--mg-border-light);
    border-radius: 10px;
    padding: 0.72rem;
    background: color-mix(in srgb, var(--mg-surface) 78%, transparent);
    animation: matchingHistoryInlineDrop 0.2s ease;
  }

  .matching-history-inline-loading,
  .matching-history-inline-error {
    margin: 0;
    color: var(--mg-text-secondary);
    font-size: 0.86rem;
  }

  @keyframes matchingHistoryInlineDrop {
    from {
      opacity: 0;
      transform: translateY(-6px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .matching-topic-history-item-main {
    min-width: 0;
  }

  .matching-topic-history-attempt {
    color: var(--mg-text);
    font-weight: 600;
  }

  .matching-topic-history-meta {
    color: var(--mg-text-secondary);
    font-size: 0.82rem;
  }

  .matching-history-detail-body {
    color: var(--mg-text);
    text-align: left;
    max-height: 55vh;
    overflow: auto;
  }

  .matching-history-detail-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.75rem;
    font-size: 0.92rem;
  }

  .matching-history-detail-grid > div {
    border: 1px solid var(--mg-border-light);
    border-radius: 10px;
    padding: 0.65rem;
    background: color-mix(in srgb, var(--mg-surface) 65%, transparent);
  }

  .matching-history-detail-pairs {
    margin-top: 0.85rem;
    border-top: 1px dashed var(--mg-border-light);
    padding-top: 0.75rem;
  }

  .matching-history-detail-pairs h4 {
    margin: 0 0 0.55rem;
    font-size: 0.92rem;
    color: var(--mg-text);
  }

  .matching-history-pair-item {
    border: 1px solid var(--mg-border-light);
    border-radius: 10px;
    padding: 0.6rem;
    margin-bottom: 0.45rem;
    background: color-mix(in srgb, var(--mg-surface) 60%, transparent);
    font-size: 0.86rem;
    line-height: 1.45;
  }

  /* ========================================
     MATCHING - NO CONTENT MODAL
     ======================================== */
  .matching-no-content-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .matching-no-content-modal.active {
    display: flex;
  }

  .matching-no-content-dialog {
    background: var(--mg-gradient-soft);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    max-width: 380px;
    width: 90%;
    border: 1px solid color-mix(in srgb, var(--mg-warning) 30%, transparent);
    box-shadow: 0 16px 48px var(--mg-shadow);
    animation: matchingModalIn 0.3s ease;
  }

  .matching-no-content-icon {
    margin-bottom: 1rem;
  }

  .matching-no-content-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--mg-warning);
    margin-bottom: 0.75rem;
  }

  .matching-no-content-text {
    font-size: 0.9rem;
    color: var(--mg-text);
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }

  .matching-no-content-sub {
    font-size: 0.8rem;
    color: var(--mg-text-muted);
    margin-bottom: 1.25rem;
  }

    /* ========================================
      MATCHING - GENERIC OVERLAY DIALOG
      ======================================== */
    .matching-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .matching-overlay.active {
    display: flex;
  }

  .matching-dialog {
    background: var(--mg-gradient-soft);
    border-radius: 20px;
    padding: 2rem;
    max-width: 420px;
    width: 90%;
    border: 1px solid var(--mg-card-border);
    box-shadow: 0 20px 60px var(--mg-shadow);
    animation: matchingModalIn 0.4s ease;
  }

  .matching-dialog-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .matching-dialog-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--mg-text);
    margin-bottom: 0.35rem;
  }

  .matching-dialog-cancel {
    width: 100%;
    text-align: center;
    justify-content: center;
  }

  .matching-settings-dialog {
    max-width: 520px;
  }

  .matching-settings-subtitle {
    margin: 0.25rem 0 0;
    color: var(--mg-text-muted);
    font-size: 0.85rem;
  }

  .matching-topic-settings-popup {
    margin-top: 0;
    margin-bottom: 0.9rem;
    background: color-mix(in srgb, var(--mg-card) 75%, transparent);
  }

  /* ========================================
     MATCHING GAME BOARD
     ======================================== */
  .matching-game-wrapper {
    display: none;
  }

  .matching-game-wrapper.active {
    display: block;
  }

  .matching-game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.9rem;
    flex-wrap: wrap;
    background: color-mix(in srgb, var(--mg-card) 92%, var(--mg-surface));
    border: 1px solid color-mix(in srgb, var(--mg-primary) 20%, var(--mg-border));
    border-radius: 16px;
    padding: 1rem 1.25rem;
    backdrop-filter: blur(10px);
    box-shadow: 0 8px 28px color-mix(in srgb, var(--mg-shadow) 65%, transparent);
    margin-bottom: 1rem;
  }

  .matching-game-back-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 0.35rem;
    background: color-mix(in srgb, var(--mg-primary) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--mg-primary) 40%, var(--mg-border));
    color: var(--mg-text);
    padding: 0 1rem;
    border-radius: 10px;
    font-size: 0.85rem;
    font-weight: 600;
    transition: all 0.2s ease;
    height: 40px;
    min-width: 120px;
    order: 4;
    margin-left: 0.5rem;
  }

  .matching-game-back-btn:hover {
    background: color-mix(in srgb, var(--mg-primary) 20%, transparent);
    border-color: var(--mg-primary);
    box-shadow: 0 4px 12px color-mix(in srgb, var(--mg-primary) 25%, transparent);
  }

  .matching-game-header-content {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    flex: 1 1 280px;
    min-width: 0;
    order: 1;
  }

  .matching-game-header-icon {
    width: 42px;
    height: 42px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: color-mix(in srgb, var(--mg-primary) 16%, transparent);
    color: var(--mg-primary);
    flex-shrink: 0;
  }

  .matching-game-title {
    margin: 0;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--mg-text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .matching-game-subtitle {
    margin: 0.15rem 0 0;
    font-size: 0.8rem;
    color: var(--mg-text-secondary);
  }

  .matching-game-restart-btn {
    flex-shrink: 0;
    font-size: 0.85rem;
    padding: 0 1rem;
    height: 40px;
    min-width: 120px;
    border-radius: 10px;
    background: color-mix(in srgb, var(--mg-primary) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--mg-primary) 40%, var(--mg-border));
    color: var(--mg-text);
    order: 3;
    margin-left: auto;
  }

  .matching-game-restart-btn:hover {
    background: color-mix(in srgb, var(--mg-primary) 20%, transparent);
    border-color: var(--mg-primary);
    box-shadow: 0 4px 12px color-mix(in srgb, var(--mg-primary) 25%, transparent);
  }

  .matching-game-stats {
    display: flex;
    justify-content: flex-start;
    gap: 0.55rem;
    margin: 0;
    flex: 2 1 420px;
    flex-wrap: wrap;
    order: 2;
  }

  .matching-stat-item {
    display: flex;
    align-items: center;
    gap: 0;
    min-width: 100px;
    padding: 0.48rem 0.72rem;
    background: var(--mg-surface);
    backdrop-filter: blur(10px);
    border-radius: 10px;
    border: 1px solid var(--mg-border);
  }

  .matching-stat-label {
    font-size: 0.72rem;
    color: var(--mg-text-muted);
  }

  .matching-stat-value {
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--mg-text);
  }

  .matching-board {
    display: flex;
    gap: 2.4rem;
    max-width: 1120px;
    margin: 0 auto;
    position: relative;
  }

  .matching-board.matching-board-wireless {
    gap: 3rem;
    max-width: 1240px;
  }

  .matching-connection-layer {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 5;
  }

  .matching-connection-line {
    stroke: color-mix(in srgb, var(--mg-primary) 70%, white);
    stroke-width: 2.5;
    opacity: 0.85;
    fill: none;
    stroke-linecap: round;
    stroke-dasharray: 6 4;
  }

  .matching-connection-line.preview {
    stroke: color-mix(in srgb, var(--mg-warning) 70%, white);
    stroke-width: 2;
    opacity: 0.8;
  }

  .matching-connection-line.matched {
    stroke: color-mix(in srgb, var(--mg-success) 70%, white);
    stroke-width: 2.8;
    stroke-dasharray: none;
    opacity: 0.9;
  }

  /* ===== COLUMN ===== */
  .matching-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    min-width: 0;
  }

  .matching-column-header {
    text-align: center;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--mg-text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--mg-border-light);
    margin-bottom: 0.15rem;
  }

  .matching-column-grid .matching-grid-items {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 0.85rem;
  }

  /* ===== ITEM (button/card) ===== */
  .matching-item {
    width: 100%;
    padding: 0.9rem 1.15rem;
    border-radius: 12px;
    border: 2px solid var(--mg-border);
    background: var(--mg-card);
    backdrop-filter: blur(10px);
    color: var(--mg-text);
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    line-height: 1.45;
    font-family: "Inter", "Segoe UI", sans-serif;
    position: relative;
  }

  .matching-item:hover:not(.matched):not(:disabled) {
    border-color: var(--mg-primary);
    background: color-mix(in srgb, var(--mg-primary) 8%, transparent);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px
      color-mix(in srgb, var(--mg-primary) 12%, transparent);
  }

  /* --- SELECTED state --- */
  .matching-item.selected {
    border-color: var(--mg-primary);
    background: color-mix(in srgb, var(--mg-primary) 18%, transparent);
    box-shadow: 0 0 24px color-mix(in srgb, var(--mg-primary) 20%, transparent);
    transform: translateY(-2px);
  }

  .matching-item-left.selected {
    border-color: var(--mg-primary);
    background: color-mix(in srgb, var(--mg-primary) 18%, transparent);
    box-shadow: 0 0 24px color-mix(in srgb, var(--mg-primary) 20%, transparent);
  }

  .matching-item-right.selected {
    border-color: var(--mg-secondary);
    background: color-mix(in srgb, var(--mg-secondary) 18%, transparent);
    box-shadow: 0 0 24px
      color-mix(in srgb, var(--mg-secondary) 20%, transparent);
  }

  /* --- MATCHED state --- */
  .matching-item.matched {
    border-color: color-mix(in srgb, var(--mg-success) 40%, transparent);
    background: color-mix(in srgb, var(--mg-success) 12%, transparent);
    color: var(--mg-success);
    cursor: default;
    opacity: 0.7;
    transform: none;
    box-shadow: none;
  }

  .matching-item.matched .matching-item-text {
    text-decoration: line-through;
    text-decoration-color: color-mix(
      in srgb,
      var(--mg-success) 40%,
      transparent
    );
  }

  /* --- WRONG state --- */
  .matching-item.wrong {
    border-color: var(--mg-danger);
    background: color-mix(in srgb, var(--mg-danger) 15%, transparent);
    animation: matchingItemShake 0.5s ease;
  }

  @keyframes matchingItemShake {
    0%,
    100% {
      transform: translateX(0);
    }
    20% {
      transform: translateX(-6px);
    }
    40% {
      transform: translateX(6px);
    }
    60% {
      transform: translateX(-4px);
    }
    80% {
      transform: translateX(4px);
    }
  }

  @keyframes matchingSoftShake {
    0%,
    100% {
      transform: translateX(0);
    }
    25% {
      transform: translateX(-3px);
    }
    50% {
      transform: translateX(3px);
    }
    75% {
      transform: translateX(-2px);
    }
  }

  .matching-item-text {
    display: block;
    word-break: break-word;
  }

  .matching-item-square {
    aspect-ratio: 1 / 1;
    min-height: 86px;
    padding: 0.45rem;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    font-size: 0.74rem;
    line-height: 1.25;
  }

  .matching-item.placed {
    opacity: 0.35;
    border-style: dashed;
    cursor: grab;
  }

  .matching-item.drag-selected {
    border-color: var(--mg-primary);
    background: color-mix(in srgb, var(--mg-primary) 18%, transparent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--mg-primary) 16%, transparent);
    transform: translateY(-1px);
  }

  .matching-board-drag {
    align-items: stretch;
    gap: 1rem;
  }

  .matching-dropzone-column {
    width: 260px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }

  .matching-dropzone-header {
    text-align: center;
    font-size: 0.76rem;
    font-weight: 700;
    color: var(--mg-text-muted);
    text-transform: uppercase;
    letter-spacing: 1.3px;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid var(--mg-border-light);
  }

  .matching-drop-slot {
    border: 2px dashed var(--mg-border);
    border-radius: 12px;
    background: color-mix(in srgb, var(--mg-card) 88%, transparent);
    min-height: 76px;
    padding: 0.45rem;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0.35rem;
    transition: all 0.2s ease;
  }

  .matching-drop-slot.drag-over {
    border-color: var(--mg-primary);
    background: color-mix(in srgb, var(--mg-primary) 10%, transparent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--mg-primary) 16%, transparent);
  }

  .matching-drop-slot.correct {
    border-color: color-mix(in srgb, var(--mg-success) 50%, transparent);
    background: color-mix(in srgb, var(--mg-success) 12%, transparent);
  }

  .matching-drop-slot.wrong {
    border-color: color-mix(in srgb, var(--mg-danger) 55%, transparent);
    background: color-mix(in srgb, var(--mg-danger) 12%, transparent);
    animation: matchingSoftShake 0.35s ease;
  }

  .matching-board.drag-wrong-feedback {
    animation: matchingSoftShake 0.28s ease;
  }

  .matching-drop-slot-label {
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--mg-text-muted);
    margin-bottom: 0.2rem;
  }

  .matching-drop-slot-card {
    border: 1px solid var(--mg-border-light);
    border-radius: 8px;
    padding: 0.35rem 0.45rem;
    background: color-mix(in srgb, var(--mg-surface) 70%, transparent);
    color: var(--mg-text);
    font-size: 0.75rem;
    line-height: 1.4;
    cursor: grab;
    user-select: none;
    pointer-events: none;
  }

  .matching-drop-slot-card-wrap {
    display: flex;
    align-items: flex-start;
    gap: 0.45rem;
  }

  .matching-drop-slot-clear {
    flex-shrink: 0;
    width: 22px;
    height: 22px;
    border: 1px solid color-mix(in srgb, var(--mg-danger) 40%, var(--mg-border));
    border-radius: 999px;
    background: color-mix(in srgb, var(--mg-danger) 14%, transparent);
    color: var(--mg-danger);
    font-size: 0.82rem;
    font-weight: 700;
    line-height: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.18s ease;
  }

  .matching-drop-slot-clear:hover {
    background: color-mix(in srgb, var(--mg-danger) 22%, transparent);
    transform: scale(1.06);
  }

  .matching-drop-slot-placeholder {
    text-align: center;
    font-size: 0.72rem;
    color: var(--mg-text-muted);
    padding: 0.25rem;
  }

  /* ========================================
     MATCHING GAME CONTROLS
     ======================================== */
  .matching-controls {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  @media (max-width: 900px) {
    .matching-game-header {
      flex-direction: column;
      align-items: stretch;
      gap: 0.65rem;
      padding: 0.85rem 1rem;
    }

    .matching-board.matching-board-drag {
      flex-direction: column;
    }

    .matching-board.matching-board-wireless {
      flex-direction: column;
      gap: 1.15rem;
    }

    .matching-column-grid .matching-grid-items {
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 0.7rem;
    }

    .matching-item-square {
      min-height: 76px;
      font-size: 0.7rem;
    }

    .matching-board.matching-board-drag .matching-dropzone-column {
      width: 100%;
    }

    .matching-game-back-btn,
    .matching-game-restart-btn {
      width: 100%;
      justify-content: center;
      margin-left: 0;
    }

    .matching-game-header-content {
      width: 100%;
      justify-content: center;
      text-align: center;
    }

    .matching-game-header-icon {
      width: 36px;
      height: 36px;
    }

    .matching-game-title {
      white-space: normal;
      text-align: center;
      line-height: 1.25;
    }

    .matching-game-subtitle {
      text-align: center;
    }

    .matching-game-stats {
      width: 100%;
      justify-content: space-between;
      gap: 0.45rem;
    }
  }

  .matching-btn {
    padding: 0.75rem 1.5rem;
    border-radius: 12px;
    border: 1px solid var(--mg-border);
    background: var(--mg-surface);
    color: var(--mg-text);
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
    font-family: "Inter", "Segoe UI", sans-serif;
  }

  .matching-btn:hover {
    background: color-mix(in srgb, var(--mg-primary) 20%, transparent);
    border-color: var(--mg-primary);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px
      color-mix(in srgb, var(--mg-primary) 20%, transparent);
  }

  .matching-btn-primary {
    background: var(--mg-gradient);
    border-color: var(--mg-primary);
  }

  .matching-btn-primary:hover {
    background: var(--mg-gradient);
    box-shadow: 0 4px 20px
      color-mix(in srgb, var(--mg-primary) 40%, transparent);
    filter: brightness(1.1);
  }

  .matching-btn-back {
    background: var(--mg-card);
  }

  /* ========================================
     MATCHING RESULT PAGE (MCQ-LIKE)
     ======================================== */
  .matching-result-view {
    display: none;
  }

  .matching-result-page-card {
    background: var(--mg-card);
    border: 1px solid var(--mg-card-border);
    border-radius: 20px;
    box-shadow: 0 16px 48px var(--mg-shadow);
    animation: matchingResultIn 0.5s ease;
    margin-top: 0.5rem;
    overflow: hidden;
  }

  .matching-results-content {
    background: transparent;
  }

  .matching-results-icon {
    font-size: 4rem;
    line-height: 1;
    width: auto;
    height: auto;
    border: none;
    background: transparent;
    animation: matchingTrophyBounce 0.6s ease 0.2s both;
  }

  @keyframes matchingResultIn {
    from {
      opacity: 0;
      transform: scale(0.8) translateY(20px);
    }
    to {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  @keyframes matchingTrophyBounce {
    0% {
      transform: scale(0);
    }
    50% {
      transform: scale(1.2);
    }
    70% {
      transform: scale(0.9);
    }
    100% {
      transform: scale(1);
    }
  }

  /* Topic & Difficulty Meta */
  .matching-result-meta {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .matching-result-topic {
    background: color-mix(in srgb, var(--mg-primary) 20%, transparent);
    border: 1px solid color-mix(in srgb, var(--mg-primary) 30%, transparent);
    color: var(--mg-primary);
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .matching-result-difficulty {
    padding: 0.3rem 0.75rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: none;
    letter-spacing: 0.2px;
  }

  .matching-result-difficulty[data-diff="wired"] {
    background: color-mix(in srgb, var(--mg-primary) 18%, transparent);
    border: 1px solid color-mix(in srgb, var(--mg-primary) 30%, transparent);
    color: var(--mg-primary);
  }

  .matching-result-difficulty[data-diff="wireless"] {
    background: color-mix(in srgb, var(--mg-secondary) 22%, transparent);
    border: 1px solid color-mix(in srgb, var(--mg-secondary) 36%, transparent);
    color: var(--mg-secondary);
  }

  .matching-results-stats-grid {
    grid-template-columns: repeat(3, minmax(0, 1fr));
  }

  /* Pairs Summary */
  .matching-result-pairs-summary {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    font-size: 0.85rem;
    color: var(--mg-text-muted);
  }

  .matching-result-pairs-summary strong {
    color: var(--mg-primary);
  }

  .matching-result-pairs-divider {
    color: var(--mg-border);
  }

  #matchingResultFeedback {
    border: 1px solid color-mix(in srgb, var(--mg-primary) 20%, var(--mg-border));
    background: color-mix(in srgb, var(--mg-primary) 10%, transparent);
  }

  #matchingResultAttempts .review-item {
    border-color: var(--mg-border-light);
    background: var(--mg-surface);
  }

  #matchingResultAttempts .review-item.correct {
    border-left: 4px solid var(--mg-success);
  }

  #matchingResultAttempts .review-item.incorrect {
    border-left: 4px solid var(--mg-danger);
