<style>
  /* ========================================
     MATCHING CONTAINER - GALAXY THEME
     ======================================== */
  #page-matching {
    min-height: 100vh;
    padding: 0;
    margin: 0;
    /* Galaxy Background */
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    background-attachment: fixed;
    position: relative;
  }

  /* Galaxy Stars Effect */
  #page-matching::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      radial-gradient(
        2px 2px at 20% 30%,
        rgba(255, 255, 255, 0.5),
        transparent
      ),
      radial-gradient(
        2px 2px at 40% 70%,
        rgba(147, 197, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.6),
        transparent
      ),
      radial-gradient(
        2px 2px at 80% 50%,
        rgba(196, 181, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 80%,
        rgba(255, 255, 255, 0.3),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 90% 10%,
        rgba(147, 197, 253, 0.5),
        transparent
      ),
      radial-gradient(
        1px 1px at 30% 90%,
        rgba(255, 255, 255, 0.25),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 70% 40%,
        rgba(196, 181, 253, 0.35),
        transparent
      );
    background-size: 350px 250px;
    pointer-events: none;
    z-index: 0;
    animation: matchingGalaxyTwinkle 6s ease-in-out infinite;
  }

  @keyframes matchingGalaxyTwinkle {
    0%,
    100% {
      opacity: 0.7;
    }
    50% {
      opacity: 1;
    }
  }

  .matching-container {
    padding: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    z-index: 1;
  }

  /* ========================================
     MATCHING HEADER - PROMINENT GALAXY THEME
     ======================================== */
  .matching-header {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1.5rem;
    padding: 2rem 2.5rem;
    /* More Prominent Gradient */
    background: linear-gradient(
      135deg,
      #1a0a3e 0%,
      #2d1b69 30%,
      #1e3a5f 60%,
      #0d2847 100%
    );
    border-radius: 16px;
    /* Glowing Border Effect */
    border: 1px solid rgba(139, 92, 246, 0.4);
    box-shadow:
      0 8px 32px rgba(139, 92, 246, 0.2),
      0 0 60px rgba(59, 130, 246, 0.1),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    overflow: hidden;
  }

  /* Galaxy Background Effects for Matching Header */
  .matching-header-galaxy-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .matching-header-stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(
        1px 1px at 20% 30%,
        rgba(255, 255, 255, 0.8) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 40% 70%,
        rgba(168, 216, 255, 0.7) 100%,
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.9) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 80% 50%,
        rgba(201, 168, 255, 0.6) 100%,
        transparent
      );
    background-size: 200px 100px;
    animation: matchingHeaderTwinkle 4s ease-in-out infinite;
    transition: transform 0.3s ease-out;
  }

  @keyframes matchingHeaderTwinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  .matching-header-nebula {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(
        ellipse 80% 60% at 20% 40%,
        rgba(255, 100, 150, 0.12),
        transparent
      ),
      radial-gradient(
        ellipse 60% 50% at 80% 60%,
        rgba(100, 150, 255, 0.1),
        transparent
      );
    filter: blur(20px);
  }

  /* Header Meteor Effect - 45 degree from left to right */
  .matching-header-meteor-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .matching-header-meteor {
    position: absolute;
    width: 2px;
    height: 50px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(168, 216, 255, 0.5),
      rgba(255, 255, 255, 0.9)
    );
    border-radius: 50%;
    transform: rotate(45deg);
    opacity: 0;
    animation: matchingMeteorFall 1s ease-in forwards;
  }

  .matching-header-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -1.5px;
    width: 5px;
    height: 5px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px rgba(168, 216, 255, 0.7);
  }

  @keyframes matchingMeteorFall {
    0% {
      opacity: 0;
      transform: rotate(45deg) translate(0, 0);
    }
    15% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(45deg) translate(300px, 300px);
    }
  }

  .matching-header-content {
    position: relative;
    z-index: 1;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    width: 100%;
  }

  .matching-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: #ffffff;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  }

  .matching-header-search {
    position: relative;
    width: 200px;
  }

  .matching-search-input {
    width: 100%;
    height: 38px;
    padding: 0 1rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    font-size: 0.85rem;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.08);
    color: white;
    backdrop-filter: blur(5px);
    font-family: "Inter", "Segoe UI", sans-serif;
  }

  .matching-search-input:focus {
    outline: none;
    border-color: rgba(139, 92, 246, 0.5);
    background: rgba(255, 255, 255, 0.12);
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
  }

  .matching-search-input::placeholder {
    color: rgba(255, 255, 255, 0.45);
  }

  /* ========================================
     MATCHING TOPIC SELECTION
     ======================================== */
  .matching-topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.25rem;
    margin-bottom: 2rem;
  }

  .matching-topic-card {
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border-radius: 16px;
    padding: 1.5rem;
    border: 1px solid rgba(255, 255, 255, 0.12);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .matching-topic-card:hover {
    transform: translateY(-4px);
    border-color: rgba(139, 92, 246, 0.5);
    box-shadow: 0 8px 32px rgba(139, 92, 246, 0.2);
    background: rgba(255, 255, 255, 0.12);
  }

  .matching-topic-card-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
  }

  .matching-topic-card-name {
    font-size: 1.1rem;
    font-weight: 600;
    color: #e0e7ff;
    margin-bottom: 0.5rem;
  }

  .matching-topic-card-desc {
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.5);
    line-height: 1.4;
  }

  .matching-topic-card-pairs {
    display: inline-block;
    margin-top: 0.75rem;
    padding: 0.25rem 0.75rem;
    background: rgba(139, 92, 246, 0.2);
    border-radius: 20px;
    font-size: 0.75rem;
    color: #c4b5fd;
  }

  /* Topic Card - Layout with icon + body + status */
  .matching-topic-card {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .matching-topic-card-icon {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(139, 92, 246, 0.15);
    border-radius: 12px;
    color: #c4b5fd;
    font-size: 1.5rem;
  }

  .matching-topic-card-icon svg {
    stroke: #c4b5fd;
  }

  .matching-topic-card-body {
    flex: 1;
    min-width: 0;
  }

  .matching-topic-card-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }

  .matching-topic-card-category {
    font-size: 0.75rem;
    color: rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.06);
    padding: 0.15rem 0.5rem;
    border-radius: 6px;
  }

  /* Topic Card - No Content State */
  .matching-topic-card.no-content {
    opacity: 0.55;
    cursor: not-allowed;
  }

  .matching-topic-card.no-content:hover {
    transform: none;
    border-color: rgba(255, 255, 255, 0.12);
    box-shadow: none;
    background: rgba(255, 255, 255, 0.08);
  }

  .matching-topic-card.no-content .matching-topic-card-icon {
    background: rgba(255, 255, 255, 0.06);
  }

  .matching-topic-card.no-content .matching-topic-card-icon svg {
    stroke: rgba(255, 255, 255, 0.35);
  }

  /* Topic Card - Played State */
  .matching-topic-card.played {
    border-color: rgba(16, 185, 129, 0.2);
  }

  .matching-topic-card.played .matching-topic-card-icon {
    background: rgba(16, 185, 129, 0.15);
  }

  .matching-topic-card.played .matching-topic-card-icon svg {
    stroke: #34d399;
  }

  /* Topic Status Badge */
  .matching-topic-status {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0.35rem;
    font-size: 0.7rem;
    padding: 0.3rem 0.6rem;
    border-radius: 8px;
    white-space: nowrap;
  }

  .matching-topic-status.ready {
    color: #c4b5fd;
    background: rgba(139, 92, 246, 0.12);
  }

  .matching-topic-status.played {
    color: #34d399;
    background: rgba(16, 185, 129, 0.12);
  }

  .matching-topic-status.locked {
    color: rgba(255, 255, 255, 0.4);
    background: rgba(255, 255, 255, 0.06);
  }

  /* Topic Card - Slide-up Animation */
  .matching-topic-card {
    animation: matchingTopicSlideUp 0.4s ease both;
  }

  @keyframes matchingTopicSlideUp {
    from {
      opacity: 0;
      transform: translateY(16px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .matching-topic-card.no-content {
    animation: matchingTopicSlideUp 0.4s ease both;
  }

  /* Search Empty State */
  .matching-search-empty {
    text-align: center;
    padding: 4rem 2rem;
  }

  .matching-search-empty-keyword {
    color: #c4b5fd;
    font-weight: 600;
  }

  /* ========================================
     MATCHING - NO CONTENT MODAL
     ======================================== */
  .matching-no-content-modal {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .matching-no-content-modal.active {
    display: flex;
  }

  .matching-no-content-dialog {
    background: linear-gradient(135deg, #1a0a3e 0%, #2d1b69 50%, #1e3a5f 100%);
    border-radius: 16px;
    padding: 2rem;
    text-align: center;
    max-width: 380px;
    width: 90%;
    border: 1px solid rgba(255, 152, 0, 0.3);
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
    animation: matchingModalIn 0.3s ease;
  }

  .matching-no-content-icon {
    margin-bottom: 1rem;
  }

  .matching-no-content-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: #ff9800;
    margin-bottom: 0.75rem;
  }

  .matching-no-content-text {
    font-size: 0.9rem;
    color: #e0e7ff;
    line-height: 1.5;
    margin-bottom: 0.5rem;
  }

  .matching-no-content-sub {
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.4);
    margin-bottom: 1.25rem;
  }

  /* ========================================
     MATCHING - DIFFICULTY SELECTOR MODAL
     ======================================== */
  .matching-difficulty-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.65);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .matching-difficulty-overlay.active {
    display: flex;
  }

  .matching-difficulty-modal {
    background: linear-gradient(135deg, #1a0a3e 0%, #2d1b69 50%, #1e3a5f 100%);
    border-radius: 20px;
    padding: 2rem;
    max-width: 420px;
    width: 90%;
    border: 1px solid rgba(139, 92, 246, 0.4);
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
    animation: matchingModalIn 0.4s ease;
  }

  .matching-difficulty-header {
    text-align: center;
    margin-bottom: 1.5rem;
  }

  .matching-difficulty-title {
    font-size: 1.35rem;
    font-weight: 700;
    color: #e0e7ff;
    margin-bottom: 0.35rem;
  }

  .matching-difficulty-topic {
    font-size: 0.85rem;
    color: #c4b5fd;
    font-weight: 500;
  }

  .matching-difficulty-options {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    margin-bottom: 1.25rem;
  }

  .matching-difficulty-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    padding: 1rem 1.25rem;
    border-radius: 14px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.05);
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    font-family: "Inter", "Segoe UI", sans-serif;
    color: inherit;
  }

  .matching-difficulty-card:hover {
    background: rgba(139, 92, 246, 0.15);
    border-color: rgba(139, 92, 246, 0.45);
    transform: translateX(4px);
    box-shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
  }

  .matching-difficulty-card:active {
    transform: translateX(2px) scale(0.98);
  }

  /* Easy accent */
  .matching-difficulty-card[data-difficulty="easy"]:hover {
    border-color: rgba(16, 185, 129, 0.5);
    background: rgba(16, 185, 129, 0.1);
    box-shadow: 0 4px 20px rgba(16, 185, 129, 0.12);
  }

  /* Medium accent */
  .matching-difficulty-card[data-difficulty="medium"]:hover {
    border-color: rgba(245, 158, 11, 0.5);
    background: rgba(245, 158, 11, 0.1);
    box-shadow: 0 4px 20px rgba(245, 158, 11, 0.12);
  }

  /* Hard accent */
  .matching-difficulty-card[data-difficulty="hard"]:hover {
    border-color: rgba(239, 68, 68, 0.5);
    background: rgba(239, 68, 68, 0.1);
    box-shadow: 0 4px 20px rgba(239, 68, 68, 0.12);
  }

  .matching-difficulty-icon {
    font-size: 1.75rem;
    flex-shrink: 0;
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.06);
    border-radius: 12px;
  }

  .matching-difficulty-info {
    flex: 1;
    min-width: 0;
  }

  .matching-difficulty-label {
    font-size: 1rem;
    font-weight: 700;
    color: #e0e7ff;
    margin-bottom: 0.15rem;
  }

  .matching-difficulty-desc {
    font-size: 0.78rem;
    color: rgba(255, 255, 255, 0.45);
  }

  .matching-difficulty-pairs {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0.4rem 0.75rem;
    background: rgba(139, 92, 246, 0.15);
    border-radius: 10px;
    min-width: 48px;
  }

  .matching-difficulty-pairs-count {
    font-size: 1.15rem;
    font-weight: 800;
    color: #c4b5fd;
    line-height: 1;
  }

  .matching-difficulty-pairs-text {
    font-size: 0.6rem;
    color: rgba(255, 255, 255, 0.4);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 0.15rem;
  }

  .matching-difficulty-cancel {
    width: 100%;
    text-align: center;
    justify-content: center;
  }

  /* ========================================
     MATCHING GAME BOARD
     ======================================== */
  .matching-game-wrapper {
    display: none;
  }

  .matching-game-wrapper.active {
    display: block;
  }

  .matching-game-stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }

  .matching-stat-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.75rem 1.25rem;
    background: rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(10px);
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.1);
  }

  .matching-stat-icon {
    font-size: 1.25rem;
  }

  .matching-stat-label {
    font-size: 0.8rem;
    color: rgba(255, 255, 255, 0.5);
  }

  .matching-stat-value {
    font-size: 1.1rem;
    font-weight: 700;
    color: #e0e7ff;
  }

  .matching-board {
    display: flex;
    gap: 1.5rem;
    max-width: 960px;
    margin: 0 auto;
  }

  /* ===== COLUMN ===== */
  .matching-column {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 0.65rem;
    min-width: 0;
  }

  .matching-column-header {
    text-align: center;
    font-size: 0.78rem;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.45);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding-bottom: 0.6rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    margin-bottom: 0.15rem;
  }

  /* ===== ITEM (button/card) ===== */
  .matching-item {
    width: 100%;
    padding: 0.9rem 1.15rem;
    border-radius: 12px;
    border: 2px solid rgba(255, 255, 255, 0.1);
    background: rgba(255, 255, 255, 0.06);
    backdrop-filter: blur(10px);
    color: #e0e7ff;
    font-size: 0.88rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.25s ease;
    text-align: left;
    line-height: 1.45;
    font-family: "Inter", "Segoe UI", sans-serif;
    position: relative;
  }

  .matching-item:hover:not(.matched):not(:disabled) {
    border-color: rgba(139, 92, 246, 0.4);
    background: rgba(139, 92, 246, 0.08);
    transform: translateY(-2px);
    box-shadow: 0 4px 16px rgba(139, 92, 246, 0.12);
  }

  /* --- SELECTED state --- */
  .matching-item.selected {
    border-color: rgba(139, 92, 246, 0.7);
    background: rgba(139, 92, 246, 0.18);
    box-shadow: 0 0 24px rgba(139, 92, 246, 0.2);
    transform: translateY(-2px);
  }

  .matching-item-left.selected {
    border-color: rgba(99, 102, 241, 0.7);
    background: rgba(99, 102, 241, 0.18);
    box-shadow: 0 0 24px rgba(99, 102, 241, 0.2);
  }

  .matching-item-right.selected {
    border-color: rgba(168, 85, 247, 0.7);
    background: rgba(168, 85, 247, 0.18);
    box-shadow: 0 0 24px rgba(168, 85, 247, 0.2);
  }

  /* --- MATCHED state --- */
  .matching-item.matched {
    border-color: rgba(16, 185, 129, 0.4);
    background: rgba(16, 185, 129, 0.12);
    color: rgba(52, 211, 153, 0.8);
    cursor: default;
    opacity: 0.7;
    transform: none;
    box-shadow: none;
  }

  .matching-item.matched .matching-item-text {
    text-decoration: line-through;
    text-decoration-color: rgba(52, 211, 153, 0.4);
  }

  /* --- WRONG state --- */
  .matching-item.wrong {
    border-color: rgba(239, 68, 68, 0.6);
    background: rgba(239, 68, 68, 0.15);
    animation: matchingItemShake 0.5s ease;
  }

  @keyframes matchingItemShake {
    0%,
    100% {
      transform: translateX(0);
    }
    20% {
      transform: translateX(-6px);
    }
    40% {
      transform: translateX(6px);
    }
    60% {
      transform: translateX(-4px);
    }
    80% {
      transform: translateX(4px);
    }
  }

  .matching-item-text {
    display: block;
    word-break: break-word;
  }

  /* ========================================
     MATCHING GAME CONTROLS
     ======================================== */
  .matching-controls {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
  }

  .matching-btn {
    padding: 0.75rem 1.5rem;
    border-radius: 12px;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.08);
    color: #e0e7ff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
    font-family: "Inter", "Segoe UI", sans-serif;
  }

  .matching-btn:hover {
    background: rgba(139, 92, 246, 0.2);
    border-color: rgba(139, 92, 246, 0.5);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.2);
  }

  .matching-btn-primary {
    background: linear-gradient(135deg, #8b5cf6, #6366f1);
    border-color: rgba(139, 92, 246, 0.5);
  }

  .matching-btn-primary:hover {
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    box-shadow: 0 4px 20px rgba(139, 92, 246, 0.4);
  }
