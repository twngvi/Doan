<script>
  // ========================================
  // MATCHING GAME - SCRIPTS
  // ========================================

  // ===== CACHE (tái sử dụng globalTopicsCache giống MCQ) =====
  if (!window.globalTopicsCache) {
    window.globalTopicsCache = {
      data: null,
      progress: null,
      lastLoadTime: 0,
      cacheDuration: 60000,
    };
  }

  // Matching stats cache by topic.
  // Format: { topicId: { hasPlayed, bestScore, bestPercent, bestAccuracy, bestTotalPairs, playCount, lastPlayedAt } }
  if (!window.matchingStatsCache) {
    window.matchingStatsCache = {
      stats: {},
      lastLoadTime: 0,
      cacheDuration: 5 * 60 * 1000,
    };
  }

  // Local cache fallback
  let matchingTopicsCache = null;
  let matchingLastLoadTime = 0;
  const MATCHING_CACHE_DURATION = 60000;
  const MATCHING_TOPICS_PERSIST_KEY = "oq_topics_cache_v1";
  const MATCHING_TOPICS_PERSIST_TTL = 10 * 60 * 1000;
  const MATCHING_STATS_PERSIST_KEY = "oq_matching_stats_cache_v1";
  const MATCHING_STATS_PERSIST_TTL = 5 * 60 * 1000;
  const MATCHING_UNLOCKED_TOPICS_PERSIST_KEY = "oq_matching_unlocked_topics_v1";
  const MATCHING_TOPICS_LOAD_TIMEOUT = 15000;
  const MATCHING_GOOGLE_RUN_MAX_RETRY = 25;
  const MATCHING_GOOGLE_RUN_RETRY_DELAY = 100;
  let matchingAllTopicsForSearch = null;
  let matchingTopicsLoadTimeoutId = null;
  let matchingGoogleRunRetryCount = 0;
  let matchingLastInitAt = 0;
  let matchingTopicsRequestSeq = 0;
  let matchingActiveTopicsRequestId = 0;

  function readMatchingUnlockedTopicsCache() {
    try {
      var raw = localStorage.getItem(MATCHING_UNLOCKED_TOPICS_PERSIST_KEY);
      if (!raw) return {};
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return {};
      return parsed;
    } catch (error) {
      console.warn("⚠️ Failed to read Matching unlocked topics cache:", error);
      return {};
    }
  }

  function writeMatchingUnlockedTopicsCache(unlockedMap) {
    try {
      localStorage.setItem(
        MATCHING_UNLOCKED_TOPICS_PERSIST_KEY,
        JSON.stringify(unlockedMap && typeof unlockedMap === "object" ? unlockedMap : {}),
      );
    } catch (error) {
      console.warn("⚠️ Failed to persist Matching unlocked topics cache:", error);
    }
  }

  function ensureMatchingUnlockedTopicsCache() {
    if (
      !window.matchingUnlockedTopicsCache ||
      typeof window.matchingUnlockedTopicsCache !== "object"
    ) {
      window.matchingUnlockedTopicsCache = readMatchingUnlockedTopicsCache();
    }
    return window.matchingUnlockedTopicsCache;
  }

  function isMatchingTopicPermanentlyUnlocked(topicId) {
    var id = String(topicId || "").trim();
    if (!id) return false;
    var cache = ensureMatchingUnlockedTopicsCache();
    return cache[id] === true;
  }

  function markMatchingTopicUnlocked(topicId) {
    var id = String(topicId || "").trim();
    if (!id) return;
    var cache = ensureMatchingUnlockedTopicsCache();
    if (cache[id] === true) return;
    cache[id] = true;
    writeMatchingUnlockedTopicsCache(cache);
  }

  function readMatchingPersistedTopicsCache(options) {
    var opts = options || {};
    var allowExpired = !!opts.allowExpired;

    try {
      var raw = localStorage.getItem(MATCHING_TOPICS_PERSIST_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      var topics = Array.isArray(parsed && parsed.data) ? parsed.data : null;
      var lastLoadTime = Number(parsed && parsed.lastLoadTime);
      if (!topics || !Number.isFinite(lastLoadTime)) return null;

      var age = Date.now() - lastLoadTime;
      if (!allowExpired && age > MATCHING_TOPICS_PERSIST_TTL) return null;

      return {
        topics: topics,
        lastLoadTime: lastLoadTime,
      };
    } catch (error) {
      console.warn("⚠️ Failed to read persisted Matching topics cache:", error);
      return null;
    }
  }

  function writeMatchingPersistedTopicsCache(topics) {
    try {
      localStorage.setItem(
        MATCHING_TOPICS_PERSIST_KEY,
        JSON.stringify({
          data: Array.isArray(topics) ? topics : [],
          lastLoadTime: Date.now(),
        }),
      );
    } catch (error) {
      console.warn("⚠️ Failed to persist Matching topics cache:", error);
    }
  }

  function hydrateMatchingGlobalCacheFromPersisted() {
    var globalCache = window.globalTopicsCache;
    if (
      globalCache &&
      Array.isArray(globalCache.data) &&
      globalCache.data.length > 0 &&
      Date.now() - Number(globalCache.lastLoadTime || 0) <
        Number(globalCache.cacheDuration || MATCHING_CACHE_DURATION)
    ) {
      return;
    }

    var persisted = readMatchingPersistedTopicsCache();
    if (!persisted) return;

    if (globalCache) {
      globalCache.data = persisted.topics;
      globalCache.lastLoadTime = persisted.lastLoadTime;
    }
    matchingTopicsCache = persisted.topics;
    matchingLastLoadTime = persisted.lastLoadTime;
  }

  hydrateMatchingGlobalCacheFromPersisted();
  hydrateMatchingStatsCacheFromPersisted();
  ensureMatchingUnlockedTopicsCache();

  function readMatchingStatsPersistedCache(options) {
    var opts = options || {};
    var allowExpired = !!opts.allowExpired;

    try {
      var raw = localStorage.getItem(MATCHING_STATS_PERSIST_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      var stats =
        parsed && parsed.stats && typeof parsed.stats === "object"
          ? parsed.stats
          : null;
      var lastLoadTime = Number(parsed && parsed.lastLoadTime);
      if (!stats || !Number.isFinite(lastLoadTime)) return null;

      var age = Date.now() - lastLoadTime;
      if (!allowExpired && age > MATCHING_STATS_PERSIST_TTL) return null;

      return {
        stats: stats,
        lastLoadTime: lastLoadTime,
      };
    } catch (error) {
      console.warn("⚠️ Failed to read persisted Matching stats cache:", error);
      return null;
    }
  }

  function writeMatchingStatsPersistedCache(stats, lastLoadTime) {
    try {
      localStorage.setItem(
        MATCHING_STATS_PERSIST_KEY,
        JSON.stringify({
          stats: stats && typeof stats === "object" ? stats : {},
          lastLoadTime: Number(lastLoadTime) || Date.now(),
        }),
      );
    } catch (error) {
      console.warn("⚠️ Failed to persist Matching stats cache:", error);
    }
  }

  function hydrateMatchingStatsCacheFromPersisted() {
    if (!window.matchingStatsCache) return;
    var persisted = readMatchingStatsPersistedCache();
    if (!persisted) return;

    window.matchingStatsCache.stats = persisted.stats;
    window.matchingStatsCache.lastLoadTime = persisted.lastLoadTime;
    window.matchingStatsCache.cacheDuration = MATCHING_STATS_PERSIST_TTL;
  }

  // ===== MATCHING STATS PERSISTENCE (localStorage) =====
  function readMatchingPersistedStatsCache() {
    try {
      var raw = localStorage.getItem(MATCHING_STATS_PERSIST_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      var stats = parsed && parsed.stats && typeof parsed.stats === "object" ? parsed.stats : null;
      var lastLoadTime = Number(parsed && parsed.lastLoadTime);
      if (!stats || !Number.isFinite(lastLoadTime)) return null;
      var age = Date.now() - lastLoadTime;
      if (age > MATCHING_STATS_PERSIST_TTL) return null;
      return { stats: stats, lastLoadTime: lastLoadTime };
    } catch (e) {
      return null;
    }
  }

  function writeMatchingPersistedStatsCache(stats) {
    try {
      localStorage.setItem(
        MATCHING_STATS_PERSIST_KEY,
        JSON.stringify({ stats: stats || {}, lastLoadTime: Date.now() })
      );
    } catch (e) {}
  }

  function hydrateMatchingStatsFromPersisted() {
    var statsCache = window.matchingStatsCache;
    if (
      statsCache &&
      statsCache.stats &&
      Object.keys(statsCache.stats).length > 0 &&
      Date.now() - Number(statsCache.lastLoadTime || 0) < Number(statsCache.cacheDuration || 60000)
    ) {
      return; // Đã có cache hợp lệ trong bộ nhớ
    }
    var persisted = readMatchingPersistedStatsCache();
    if (!persisted) return;
    if (statsCache) {
      statsCache.stats = persisted.stats;
      statsCache.lastLoadTime = persisted.lastLoadTime;
    }
  }

  hydrateMatchingStatsFromPersisted();

  function mergeMatchingLocalStorageProgress(progress, options) {
    var merged = Object.assign({}, progress || {});
    var opts = options || {};
    var serverAuthoritative = !!opts.serverAuthoritative;

    try {
      for (var i = localStorage.length - 1; i >= 0; i--) {
        var key = localStorage.key(i);
        if (!key || key.indexOf("lesson_progress_") !== 0) continue;

        var topicId = key.replace("lesson_progress_", "");
        var localData = JSON.parse(localStorage.getItem(key) || "null");
        if (!localData) continue;

        if (serverAuthoritative && !merged[topicId]) {
          localStorage.removeItem(key);
          continue;
        }

        if (!merged[topicId]) {
          merged[topicId] = {
            topicId: topicId,
            completed: false,
            progress: 0,
          };
        }

        merged[topicId].lessonCompleted =
          merged[topicId].lessonCompleted || localData.lessonRead || false;
        merged[topicId].mindmapViewed =
          merged[topicId].mindmapViewed || localData.mindmapViewed || false;
        merged[topicId].flashcardsCompleted =
          merged[topicId].flashcardsCompleted || localData.flashcardsDone || false;
        merged[topicId].miniQuizCompleted =
          merged[topicId].miniQuizCompleted || localData.lessonQuiz || false;
        merged[topicId].quizDone =
          merged[topicId].quizDone || localData.quizDone || false;
        merged[topicId].matchingDone =
          merged[topicId].matchingDone || localData.matchingDone || false;

        var count = 0;
        if (merged[topicId].lessonCompleted) count++;
        if (merged[topicId].mindmapViewed) count++;
        if (merged[topicId].flashcardsCompleted) count++;
        if (merged[topicId].miniQuizCompleted) count++;
        merged[topicId].progress = Math.round((count / 4) * 100);
        merged[topicId].completed = count === 4;
      }
    } catch (e) {
      console.warn("⚠️ Could not merge localStorage progress for Matching:", e);
    }
    return merged;
  }

  function updateMatchingHeaderProgress() {
    // ⭐ FIX: Count from matchingStatsCache (same source as "Đã chơi" badges in topic list)
    // instead of Topic_Progress.matchingDone which may not be in sync.
    var completed = 0;
    var statsCache = window.matchingStatsCache;
    if (statsCache && statsCache.stats) {
      var statsMap = statsCache.stats;
      var topicIds = Object.keys(statsMap);
      for (var i = 0; i < topicIds.length; i++) {
        var entry = statsMap[topicIds[i]];
        if (entry && entry.hasPlayed === true) {
          completed++;
        }
      }
    }

    var completedEl = document.getElementById("completedMatchingTopics");
    if (completedEl) {
      completedEl.textContent = completed;
    }
  }

  function refreshMatchingProgressFromServer() {
    // ⭐ Header counter now uses matchingStatsCache, so we just refresh the display.
    // The stats cache is already loaded/updated by loadMatchingStatsIfNeeded() and updateLocalMatchingStats().
    updateMatchingHeaderProgress();
  }

  // ===== STATE =====
  let matchingMeteorInterval = null;
  let matchingTimerInterval = null;
  const MATCHING_DEFAULT_PAIR_COUNT = 10;
  const MATCHING_SETTINGS_PERSIST_KEY = "oq_matching_settings_v1";

  function getDefaultMatchingSettings() {
    return {
      showConnectionLines: true,
    };
  }

  let matchingState = {
    // Topic selector state
    topics: [],
    filteredTopics: [],
    selectedTopic: null,
    topicHistory: [],
    searchKeyword: "",
    loadingTopics: false,
    topicError: null,
    // Game mode state
    selectedModeKey: null, // wire-10pair | nowire-10pair
    pairLimit: MATCHING_DEFAULT_PAIR_COUNT,
    interactionMode: "click", // fixed click mode
    showConnectionLines: true,
    settings: getDefaultMatchingSettings(),
    // Data loader state
    matchingPairs: [], // Normalized pairs for current game
    loadingPairs: false, // Loading indicator
    pairsError: null, // Error message if load failed
    // Board state (2-column matching)
    leftItems: [], // Shuffled left column items
    rightItems: [], // Shuffled right column items
    selectedLeftId: null, // Currently selected left item pairId
    selectedRightId: null, // Currently selected right item pairId
    matchedPairIds: [], // Array of matched pairIds
    wrongAttemptPair: null, // {leftId, rightId} for wrong animation
    // Game stats
    totalPairs: 0,
    moves: 0,
    score: 0,
    elapsedTime: 0,
    isLocked: false,
    // Timer state
    timerRunning: false,
    startTime: null,
    endTime: null,
    timerMode: "countup", // 'countup' | 'countdown'
    countdownLimit: 0, // seconds, only used in countdown mode
    // Match tracking
    attemptCount: 0,
    wrongCount: 0,
    correctCount: 0,
    pairAttemptDetails: [],
    dragSlots: [],
    dragCardPlacement: {},
    dragHoverSlotId: null,
    draggingRightPairId: null,
    selectedDragCardId: null,
    wrongResetTimeoutId: null,
    gameCompleted: false,
    isCheckingMatch: false,
    // Result modal
    showResultModal: false,
    resultData: null,
    // Topic info
    currentTopicId: null,
    currentTopicName: "",
    currentContentDocId: "",
  };

  function loadMatchingGameSettings() {
    var defaults = getDefaultMatchingSettings();
    try {
      var raw = localStorage.getItem(MATCHING_SETTINGS_PERSIST_KEY);
      if (!raw) {
        matchingState.settings = defaults;
        matchingState.interactionMode = "click";
        matchingState.showConnectionLines = defaults.showConnectionLines;
        return;
      }

      var parsed = JSON.parse(raw);
      var merged = Object.assign({}, defaults, parsed || {});
      merged.showConnectionLines = merged.showConnectionLines !== false;

      matchingState.settings = merged;
      matchingState.interactionMode = "click";
      matchingState.showConnectionLines = merged.showConnectionLines;
    } catch (error) {
      console.warn("⚠️ Failed to load matching settings:", error);
      matchingState.settings = defaults;
      matchingState.interactionMode = "click";
      matchingState.showConnectionLines = defaults.showConnectionLines;
    }
  }

  function saveMatchingGameSettings() {
    try {
      var payload = {
        showConnectionLines:
          matchingState.settings && matchingState.settings.showConnectionLines !== false,
        pairCount: MATCHING_DEFAULT_PAIR_COUNT,
      };
      localStorage.setItem(MATCHING_SETTINGS_PERSIST_KEY, JSON.stringify(payload));
    } catch (error) {
      console.warn("⚠️ Failed to save matching settings:", error);
    }
  }

  function applyMatchingSettings(partialSettings) {
    var next = Object.assign({}, matchingState.settings || getDefaultMatchingSettings(), partialSettings || {});
    next.showConnectionLines = next.showConnectionLines !== false;

    matchingState.settings = next;
    matchingState.interactionMode = "click";
    matchingState.showConnectionLines = next.showConnectionLines;
    saveMatchingGameSettings();
  }

  // ===== PAGE INIT =====
  window.initMatchingPage = function () {
    matchingLastInitAt = Date.now();
    console.log("🎮 Initializing Matching Page...");
    console.log("📋 currentPageParams:", window.currentPageParams);

    loadMatchingGameSettings();

    if (!window.__matchingConnectionResizeHandlerBound) {
      window.__matchingConnectionResizeHandlerBound = true;
      window.addEventListener("resize", function () {
        var wrapper = document.getElementById("matchingGameWrapper");
        if (!wrapper || !wrapper.classList.contains("active")) return;

        renderMatchingInteractionHint();

        if (matchingState.interactionMode !== "click") return;
        if (matchingState.showConnectionLines === false) return;
        requestAnimationFrame(drawMatchingConnectionLines);
      });
    }

    startMatchingHeaderMeteors();
    setupMatchingHeaderMouseEffect();

    // Check if navigated with params (from dashboard/lesson/topics)
    const params = window.currentPageParams;
    showMatchingTopicSelection();
    loadMatchingTopics();

    if (params && params.topicId) {
      console.log("📌 Got topic params, opening topic detail hub");
      openMatchingTopicHubFromParams(params);
    } else {
      console.log("📋 No topic params, showing topic selection");
    }
  };

  function openMatchingTopicHubFromParams(params) {
    var topicId = String((params && params.topicId) || "").trim();
    if (!topicId) return;

    var allSources = [];
    if (Array.isArray(matchingState.topics) && matchingState.topics.length > 0) {
      allSources = allSources.concat(matchingState.topics);
    }
    if (
      window.globalTopicsCache &&
      Array.isArray(window.globalTopicsCache.data) &&
      window.globalTopicsCache.data.length > 0
    ) {
      allSources = allSources.concat(window.globalTopicsCache.data);
    }

    var topic = allSources.find(function (t) {
      return String((t && t.topicId) || "").trim() === topicId;
    });

    if (!topic) {
      topic = {
        topicId: topicId,
        title: params.topicTitle || "Matching",
        contentDocId: params.contentDocId || "",
        category: params.category || "Chung",
        description: "",
        estimatedTime: "Không giới hạn",
      };
    }

    matchingState.selectedTopic = topic;
    matchingState.currentTopicId = topic.topicId;
    matchingState.currentTopicName = topic.title;
    matchingState.currentContentDocId = topic.contentDocId || "";
    openMatchingTopicHub(topic);
  }

  // ===== HEADER EFFECTS =====
  function startMatchingHeaderMeteors() {
    const container = document.getElementById("matchingMeteorContainer");
    if (!container) return;

    if (matchingMeteorInterval) {
      clearInterval(matchingMeteorInterval);
    }

    matchingMeteorInterval = setInterval(() => {
      if (!document.getElementById("matchingMeteorContainer")) {
        clearInterval(matchingMeteorInterval);
        return;
      }
      createMatchingMeteor();
    }, 800);

    createMatchingMeteor();
  }

  function createMatchingMeteor() {
    const container = document.getElementById("matchingMeteorContainer");
    if (!container) return;

    const meteor = document.createElement("div");
    meteor.className = "matching-header-meteor";

    const startX = Math.random() * 40;
    const startY = Math.random() * 20;

    meteor.style.left = startX + "%";
    meteor.style.top = startY + "%";

    const height = 35 + Math.random() * 35;
    meteor.style.height = height + "px";
    meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

    container.appendChild(meteor);

    setTimeout(() => {
      meteor.remove();
    }, 1500);
  }

  function setupMatchingHeaderMouseEffect() {
    const header = document.querySelector("#page-matching .matching-header");
    const stars = document.getElementById("matchingHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  function setMatchingPreplayMode(isPreplay) {
    const container = document.querySelector(
      "#page-matching .matching-container",
    );
    if (!container) return;
    container.classList.toggle("matching-game-active", !isPreplay);
  }

  function updateMatchingGameHeader(topic) {
    const titleEl = document.getElementById("matchingGameTopicTitle");
    if (!titleEl) return;

    const fallbackTitle =
      matchingState.currentTopicName ||
      (matchingState.selectedTopic && matchingState.selectedTopic.title) ||
      "Matching Game";
    titleEl.textContent = (topic && topic.title) || fallbackTitle;
    if (typeof window.applyHeaderTitleBounce === "function") {
      window.applyHeaderTitleBounce(titleEl);
    }
  }

  // ===== VIEW MANAGEMENT =====
  function showMatchingTopicSelection() {
    const topicSelection = document.getElementById("matchingTopicSelection");
    const topicDetail = document.getElementById("matchingTopicDetail");
    const gameWrapper = document.getElementById("matchingGameWrapper");
    const resultView = document.getElementById("matchingResultView");
    setMatchingPreplayMode(true);
    if (topicSelection) topicSelection.style.display = "";
    if (topicDetail) topicDetail.style.display = "none";
    if (gameWrapper) gameWrapper.classList.remove("active");
    if (resultView) resultView.style.display = "none";
  }

  function showMatchingTopicDetail() {
    const topicSelection = document.getElementById("matchingTopicSelection");
    const topicDetail = document.getElementById("matchingTopicDetail");
    const gameWrapper = document.getElementById("matchingGameWrapper");
    const resultView = document.getElementById("matchingResultView");
    setMatchingPreplayMode(true);
    if (topicSelection) topicSelection.style.display = "none";
    if (topicDetail) topicDetail.style.display = "";
    if (gameWrapper) gameWrapper.classList.remove("active");
    if (resultView) resultView.style.display = "none";
  }

  function isMatchingPageVisible() {
    const page = document.getElementById("page-matching");
    return !!page && page.style.display !== "none";
  }

  function isGoogleScriptRunReady() {
    return (
      typeof google !== "undefined" &&
      google.script &&
      typeof google.script.run !== "undefined"
    );
  }

  function clearMatchingTopicsLoadTimeout() {
    if (matchingTopicsLoadTimeoutId) {
      clearTimeout(matchingTopicsLoadTimeoutId);
      matchingTopicsLoadTimeoutId = null;
    }
  }

  function setMatchingTopicsLoadingState(isLoading) {
    const loading = document.getElementById("matchingLoading");
    const grid = document.getElementById("matchingTopicsGrid");
    const empty = document.getElementById("matchingEmpty");
    const searchEmpty = document.getElementById("matchingSearchEmpty");

    if (loading) loading.style.display = isLoading ? "flex" : "none";
    if (isLoading) {
      if (grid) grid.style.display = "none";
      if (empty) empty.style.display = "none";
      if (searchEmpty) searchEmpty.style.display = "none";
    }
  }

  function getMatchingErrorMessage(error) {
    if (!error) return "Không thể kết nối server";
    if (typeof error === "string") return error;
    if (error && typeof error.message === "string" && error.message.trim()) {
      return error.message;
    }
    try {
      return JSON.stringify(error);
    } catch (e) {
      return String(error);
    }
  }

  // ===== TOPIC LOADING (reuse globalTopicsCache giống MCQ) =====
  function loadMatchingTopics(forceRefresh) {
    console.log("📥 Loading topics for matching...");
    hydrateMatchingGlobalCacheFromPersisted();

    const requestId = ++matchingTopicsRequestSeq;
    matchingActiveTopicsRequestId = requestId;
    const isStaleRequest = function () {
      return requestId !== matchingActiveTopicsRequestId;
    };

    matchingState.loadingTopics = true;
    matchingState.topicError = null;
    setMatchingTopicsLoadingState(true);

    // Load matching stats in parallel so topic cards can show played + best score.
    loadMatchingStatsIfNeeded(forceRefresh);

    const now = Date.now();

    // ƯU TIÊN 1: Global Cache (chia sẻ từ Topics/MCQ page)
    const globalCache = window.globalTopicsCache;
    if (
      !forceRefresh &&
      globalCache &&
      globalCache.data &&
      now - globalCache.lastLoadTime < globalCache.cacheDuration
    ) {
      console.log("✅ Matching: Using GLOBAL cached topics");
      if (isStaleRequest()) return;
      handleMatchingTopicsLoaded(globalCache.data);
      return;
    }

    // ƯU TIÊN 2: Local cache
    if (
      !forceRefresh &&
      matchingTopicsCache &&
      now - matchingLastLoadTime < MATCHING_CACHE_DURATION
    ) {
      console.log("✅ Matching: Using LOCAL cached topics");
      if (isStaleRequest()) return;
      handleMatchingTopicsLoaded(matchingTopicsCache);
      return;
    }

    // ƯU TIÊN 3: Load từ server
    console.log("📡 Matching: Loading topics from server...");

    clearMatchingTopicsLoadTimeout();
    matchingTopicsLoadTimeoutId = setTimeout(function () {
      if (isStaleRequest()) return;
      if (matchingState.loadingTopics) {
        handleMatchingTopicsError({
          message: "Tải chủ đề quá thời gian. Vui lòng thử lại.",
        });
      }
    }, MATCHING_TOPICS_LOAD_TIMEOUT);

    // Chờ google.script.run sẵn sàng tương tự flow Quiz, không fail sớm.
    if (!isGoogleScriptRunReady()) {
      var persistedWhenWaiting = readMatchingPersistedTopicsCache({
        allowExpired: true,
      });
      if (
        persistedWhenWaiting &&
        Array.isArray(persistedWhenWaiting.topics) &&
        persistedWhenWaiting.topics.length > 0
      ) {
        console.warn(
          "⚠️ Matching: google.script.run chưa sẵn sàng, dùng dữ liệu cache cục bộ",
        );
        if (isStaleRequest()) return;
        handleMatchingTopicsLoaded(persistedWhenWaiting.topics);
        return;
      }

      if (matchingGoogleRunRetryCount < MATCHING_GOOGLE_RUN_MAX_RETRY) {
        matchingGoogleRunRetryCount++;
        setTimeout(function () {
          if (isStaleRequest()) return;
          loadMatchingTopics(forceRefresh);
        }, MATCHING_GOOGLE_RUN_RETRY_DELAY);
        return;
      }

      matchingGoogleRunRetryCount = 0;
      handleMatchingTopicsError({
        message:
          "Không thể kết nối Apps Script (google.script.run chưa sẵn sàng).",
      });
      return;
    }

    matchingGoogleRunRetryCount = 0;

    google.script.run
      .withSuccessHandler(function (response) {
        if (isStaleRequest()) return;
        clearMatchingTopicsLoadTimeout();
        let topics = [];
        if (response && response.success && Array.isArray(response.topics)) {
          topics = response.topics;
        } else if (Array.isArray(response)) {
          topics = response;
        } else if (response && !response.success) {
          handleMatchingTopicsError({
            message: response.message || "Lỗi từ server",
          });
          return;
        }

        // Lưu vào LOCAL cache
        matchingTopicsCache = topics;
        matchingLastLoadTime = Date.now();

        // Lưu vào GLOBAL cache
        if (window.globalTopicsCache) {
          window.globalTopicsCache.data = topics;
          window.globalTopicsCache.lastLoadTime = Date.now();
        }
        writeMatchingPersistedTopicsCache(topics);

        handleMatchingTopicsLoaded(topics);
      })
      .withFailureHandler(function (error) {
        if (isStaleRequest()) return;
        clearMatchingTopicsLoadTimeout();
        handleMatchingTopicsError(error);
      })
      .getAllTopics();
  }

  function loadMatchingStatsIfNeeded(forceRefresh) {
    if (!isGoogleScriptRunReady()) {
      console.warn(
        "⚠️ Matching stats skipped: google.script.run chưa sẵn sàng",
      );
      return;
    }

    var now = Date.now();
    var statsCache = window.matchingStatsCache;

    if (
      !forceRefresh &&
      statsCache &&
      statsCache.stats &&
      Object.keys(statsCache.stats).length > 0 &&
      now - statsCache.lastLoadTime < statsCache.cacheDuration
    ) {
      console.log("✅ Matching: using cached stats per topic");
      return;
    }

    console.log("📊 Matching: loading stats per topic from server...");
    google.script.run
      .withSuccessHandler(function (response) {
        if (response && response.success && response.stats) {
          var existingStats =
            window.matchingStatsCache && window.matchingStatsCache.stats
              ? window.matchingStatsCache.stats
              : {};
          window.matchingStatsCache.stats = mergeMatchingStatsMap(existingStats, response.stats);
          window.matchingStatsCache.lastLoadTime = Date.now();
          writeMatchingStatsPersistedCache(
            window.matchingStatsCache.stats,
            window.matchingStatsCache.lastLoadTime,
          );
          console.log(
            "✅ Matching stats loaded for",
            Object.keys(response.stats).length,
            "topics",
          );

          // ⭐ Lưu vào localStorage để tái sử dụng khi navigate lại trang
          writeMatchingPersistedStatsCache(response.stats);

          // Re-render current list when stats arrive.
          rerenderCurrentMatchingTopics();
        }
      })
      .withFailureHandler(function (error) {
        console.warn("⚠️ Failed to load matching stats:", error);
      })
      .getMatchingStatsPerTopic();
  }

  function getMatchingStatsForTopic(topicId) {
    var statsCache = window.matchingStatsCache;
    if (!statsCache || !statsCache.stats) return null;
    return statsCache.stats[topicId] || null;
  }

  function getMatchingBestPercent(stats) {
    if (!stats) return 0;

    var byPercent = Number(stats.bestPercent);
    var byAccuracy = Number(stats.bestAccuracy);
    var bestCandidate = -1;

    if (Number.isFinite(byPercent) && byPercent >= 0) {
      bestCandidate = Math.max(bestCandidate, byPercent);
    }

    if (Number.isFinite(byAccuracy) && byAccuracy >= 0) {
      bestCandidate = Math.max(bestCandidate, byAccuracy);
    }

    var byScore = Number(stats.bestScore);
    var totalPairs = Number(stats.bestTotalPairs);
    if (
      Number.isFinite(byScore) &&
      Number.isFinite(totalPairs) &&
      totalPairs > 0
    ) {
      var percent = Math.round((byScore / (totalPairs * 10)) * 100);
      bestCandidate = Math.max(bestCandidate, percent);
    }

    if (bestCandidate >= 0) {
      return Math.max(0, Math.min(100, Math.round(bestCandidate)));
    }

    return 0;
  }

  function mergeMatchingStatEntry(existing, incoming) {
    var oldStat = existing && typeof existing === "object" ? existing : {};
    var newStat = incoming && typeof incoming === "object" ? incoming : {};

    var oldBest = getMatchingBestPercent(oldStat);
    var newBest = getMatchingBestPercent(newStat);
    var keepIncomingAsBest = newBest >= oldBest;
    var bestSource = keepIncomingAsBest ? newStat : oldStat;

    return {
      hasPlayed: Boolean(oldStat.hasPlayed || newStat.hasPlayed),
      bestScore: Number(bestSource.bestScore || 0),
      bestPercent: Math.max(oldBest, newBest),
      bestAccuracy: Number(bestSource.bestAccuracy || Math.max(oldBest, newBest)),
      bestTotalPairs: Number(bestSource.bestTotalPairs || 0),
      playCount: Math.max(Number(oldStat.playCount || 0), Number(newStat.playCount || 0)),
      lastPlayedAt: newStat.lastPlayedAt || oldStat.lastPlayedAt || null,
    };
  }

  function mergeMatchingStatsMap(existingMap, incomingMap) {
    var merged = {};
    var base = existingMap && typeof existingMap === "object" ? existingMap : {};
    var incoming = incomingMap && typeof incomingMap === "object" ? incomingMap : {};
    var allIds = {};

    Object.keys(base).forEach(function (id) {
      allIds[id] = true;
    });
    Object.keys(incoming).forEach(function (id) {
      allIds[id] = true;
    });

    Object.keys(allIds).forEach(function (id) {
      merged[id] = mergeMatchingStatEntry(base[id], incoming[id]);
    });

    return merged;
  }

  function updateLocalMatchingStats(topicId, percent, accuracy, totalPairs) {
    if (!topicId) return;

    if (!window.matchingStatsCache) {
      window.matchingStatsCache = {
        stats: {},
        lastLoadTime: 0,
        cacheDuration: 60000,
      };
    }

    var nowIso = new Date().toISOString();
    var stats = window.matchingStatsCache.stats[topicId];
    var normalizedPercent = Math.max(
      0,
      Math.min(100, Math.round(percent || 0)),
    );
    var normalizedAccuracy = Math.max(
      0,
      Math.min(100, Math.round(accuracy || normalizedPercent)),
    );

    if (!stats) {
      window.matchingStatsCache.stats[topicId] = {
        hasPlayed: true,
        bestScore: normalizedPercent,
        bestPercent: normalizedPercent,
        bestAccuracy: normalizedAccuracy,
        bestTotalPairs: totalPairs,
        playCount: 1,
        lastPlayedAt: nowIso,
      };
    } else {
      stats.hasPlayed = true;
      stats.playCount = (stats.playCount || 0) + 1;
      stats.lastPlayedAt = nowIso;
      var oldBestPercent = getMatchingBestPercent(stats);

      if (
        normalizedPercent > oldBestPercent ||
        (normalizedPercent === oldBestPercent &&
          normalizedAccuracy > (stats.bestAccuracy || 0))
      ) {
        stats.bestScore = normalizedPercent;
        stats.bestPercent = normalizedPercent;
        stats.bestAccuracy = normalizedAccuracy;
        stats.bestTotalPairs = totalPairs;
      }
    }

    window.matchingStatsCache.lastLoadTime = Date.now();
    writeMatchingStatsPersistedCache(
      window.matchingStatsCache.stats,
      window.matchingStatsCache.lastLoadTime,
    );

    // ⭐ Lưu vào localStorage để tái sử dụng khi navigate lại trang
    writeMatchingPersistedStatsCache(window.matchingStatsCache.stats);
  }

  function rerenderCurrentMatchingTopics() {
    if (matchingState.searchKeyword && matchingState.searchKeyword.trim()) {
      renderMatchingTopics(matchingState.filteredTopics || []);
      return;
    }

    if (matchingAllTopicsForSearch && matchingAllTopicsForSearch.length) {
      renderMatchingTopics(matchingAllTopicsForSearch);
      return;
    }

    if (matchingState.topics && matchingState.topics.length) {
      renderMatchingTopics(matchingState.topics);
    }
  }

  function handleMatchingTopicsLoaded(topics) {
    clearMatchingTopicsLoadTimeout();
    matchingState.loadingTopics = false;
    setMatchingTopicsLoadingState(false);

    try {
      var normalizedTopics = Array.isArray(topics)
        ? topics
            .filter(function (t) {
              return t && (t.topicId || t.title);
            })
            .map(function (t, idx) {
              return {
                topicId: String(t.topicId || t.id || ""),
                title: String(t.title || "Chủ đề chưa đặt tên"),
                description: String(t.description || ""),
                category: String(t.category || "Chung"),
                estimatedTime: String(t.estimatedTime || "Không giới hạn"),
                contentDocId: String(t.contentDocId || ""),
                order: Number(t.order) || idx + 1,
              };
            })
        : [];

      if (normalizedTopics.length === 0) {
        matchingState.topics = [];
        matchingState.filteredTopics = [];
        matchingAllTopicsForSearch = [];
        var emptyEl = document.getElementById("matchingEmpty");
        if (emptyEl) emptyEl.style.display = "block";
        refreshMatchingProgressFromServer();
        return;
      }

      matchingState.topics = normalizedTopics;
      matchingState.filteredTopics = normalizedTopics;
      matchingAllTopicsForSearch = normalizedTopics;

      // Sync local cache
      matchingTopicsCache = normalizedTopics;
      matchingLastLoadTime = Date.now();

      renderMatchingTopics(normalizedTopics);
      refreshMatchingProgressFromServer();
    } catch (renderError) {
      console.error("❌ Matching render topics failed:", renderError);
      handleMatchingTopicsError({
        message: renderError && renderError.message ? renderError.message : "Lỗi render danh sách chủ đề",
      });
    } finally {
      matchingState.loadingTopics = false;
      setMatchingTopicsLoadingState(false);
    }
  }

  function handleMatchingTopicsError(error) {
    clearMatchingTopicsLoadTimeout();

    console.error("❌ Error loading matching topics:", error);

    var persisted = readMatchingPersistedTopicsCache({ allowExpired: true });
    if (persisted && Array.isArray(persisted.topics) && persisted.topics.length > 0) {
      console.warn("⚠️ Matching fallback to persisted topics cache");
      handleMatchingTopicsLoaded(persisted.topics);
      return;
    }

    const empty = document.getElementById("matchingEmpty");

    matchingState.loadingTopics = false;
    matchingState.topicError = getMatchingErrorMessage(error);

    setMatchingTopicsLoadingState(false);
    if (empty) {
      empty.style.display = "block";
      empty.innerHTML = `
        <div class="matching-empty-icon">❌</div>
        <p class="matching-empty-text">Lỗi tải dữ liệu</p>

        </button>

  }

  // ⭐ Helper function to check if a topic is unlocked for Matching
  window.checkMatchingTopicUnlocked = function (topicId) {
    const originalTopics = matchingAllTopicsForSearch || matchingState.topics;
    if (!originalTopics || originalTopics.length === 0) return true;
    const index = originalTopics.findIndex(
      (t) => String(t.topicId) === String(topicId),
    );
    if (index === -1) return false; // Not found? Play it safe and lock.
    if (index === 0) return true; // First topic is always unlocked

    const prevTopic = originalTopics[index - 1];
    if (!prevTopic || !prevTopic.topicId) return false;

    if (isMatchingTopicPermanentlyUnlocked(topicId)) {
      return true;
    }

    const prevStats = getMatchingStatsForTopic(prevTopic.topicId);
    var unlockedNow = prevStats && getMatchingBestPercent(prevStats) >= 80;
    if (unlockedNow) {
      markMatchingTopicUnlocked(topicId);
    }

    return unlockedNow;
  };

  // ===== SEARCH =====
  window.searchMatchingTopics = function (query) {
    matchingState.searchKeyword = query;

    if (!matchingAllTopicsForSearch) return;

    if (!query.trim()) {
      matchingState.filteredTopics = matchingAllTopicsForSearch;
      renderMatchingTopics(matchingAllTopicsForSearch);
      return;
    }

    const searchLower = query.toLowerCase();
    const filtered = matchingAllTopicsForSearch.filter(
      (topic) =>
        String(topic.title || "")
          .toLowerCase()
          .includes(searchLower) ||
        String(topic.category || "")
          .toLowerCase()
          .includes(searchLower),
    );

    matchingState.filteredTopics = filtered;
    renderMatchingTopics(filtered);
  };

    if (
      window.checkMatchingTopicUnlocked &&
      !window.checkMatchingTopicUnlocked(topic.topicId)
    ) {
      showMatchingLockedTopicModal(topic.title);
      return;

    // Validate: topic phải có contentDocId

      showMatchingNoContentModal(topic.title);

    matchingState.currentTopicId = topic.topicId;

  window.openMatchingHistoryDetail = function (resultId, triggerButton) {
    if (!resultId) return;

      matchingState.openHistoryDetail = {
        id: null,
        panel: null,
        button: null,
      };
    }

    if (triggerButton) {
      var current = matchingState.openHistoryDetail;
      if (current.panel) {
        current.panel.remove();
      }
      if (current.button) {
        current.button.textContent = "Chi tiết";
      }

      if (current.id === resultId && current.button === triggerButton) {
        current.id = null;
        current.panel = null;
        current.button = null;
        return;
      }

      var row = triggerButton.closest(".matching-topic-history-item");
      if (!row || !row.parentNode) return;

      var panel = document.createElement("div");
      panel.className = "matching-history-inline-detail";
      panel.innerHTML = '<div class="matching-history-inline-loading">Đang tải chi tiết...</div>';
      row.parentNode.insertBefore(panel, row.nextSibling);
      triggerButton.textContent = "Đóng";

      current.id = resultId;
      current.panel = panel;
      current.button = triggerButton;

      google.script.run
        .withSuccessHandler(function (response) {
          if (!matchingState.openHistoryDetail || matchingState.openHistoryDetail.id !== resultId) {
            return;
          }
          if (!response || !response.success || !response.detail) {
            panel.innerHTML = '<p class="matching-history-inline-error">Không tìm thấy chi tiết lượt chơi.</p>';
            return;
          }
          panel.innerHTML = renderMatchingHistoryDetailHtml(response.detail);
          panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
        })
        .withFailureHandler(function () {
          if (!matchingState.openHistoryDetail || matchingState.openHistoryDetail.id !== resultId) {
            return;
          }
          panel.innerHTML = '<p class="matching-history-inline-error">Không thể tải chi tiết lượt chơi.</p>';
        })
        .getMatchingResultDetailById(resultId);

      return;
    }

    var modal = document.getElementById("matchingHistoryDetailModal");
    var body = document.getElementById("matchingHistoryDetailBody");
    if (!modal || !body) return;

    modal.classList.add("active");
    body.innerHTML = "<p>Đang tải chi tiết...</p>";

    google.script.run
      .withSuccessHandler(function (response) {
        if (!response || !response.success || !response.detail) {
          body.innerHTML = "<p>Không tìm thấy chi tiết lượt chơi.</p>";
          return;
        }

        body.innerHTML = renderMatchingHistoryDetailHtml(response.detail);
      })
      .withFailureHandler(function () {
        body.innerHTML = "<p>Không thể tải chi tiết lượt chơi.</p>";

  function startMatchingGameFromTopic(topic) {
    // Hide topic selection, show game
    setMatchingPreplayMode(false);
    updateMatchingGameHeader(topic);
    document.getElementById("matchingTopicSelection").style.display = "none";
    var topicDetail = document.getElementById("matchingTopicDetail");
    if (topicDetail) topicDetail.style.display = "none";
    const gameWrapper = document.getElementById("matchingGameWrapper");
    const resultView = document.getElementById("matchingResultView");
    gameWrapper.classList.add("active");
    if (resultView) resultView.style.display = "none";

    // Reset game state
    matchingState.leftItems = [];
    matchingState.rightItems = [];
    matchingState.selectedLeftId = null;
    matchingState.selectedRightId = null;
    matchingState.matchedPairIds = [];
    matchingState.wrongAttemptPair = null;
    matchingState.dragSlots = [];
    matchingState.dragCardPlacement = {};
    matchingState.dragHoverSlotId = null;
    matchingState.draggingRightPairId = null;
    matchingState.selectedDragCardId = null;
    clearMatchingDragWrongResetTimeout();
    matchingState.totalPairs = 0;
    matchingState.moves = 0;
    matchingState.score = 0;
    matchingState.elapsedTime = 0;
    matchingState.isLocked = false;
    matchingState.timerRunning = false;
    matchingState.startTime = null;
    matchingState.endTime = null;
    matchingState.attemptCount = 0;
    matchingState.wrongCount = 0;
    matchingState.correctCount = 0;
    matchingState.pairAttemptDetails = [];
    matchingState.gameCompleted = false;
    matchingState.isCheckingMatch = false;
    matchingState.matchingPairs = [];
    matchingState.loadingPairs = true;
    matchingState.pairsError = null;

    matchingState.interactionMode = "click";
    matchingState.showConnectionLines = true;
    matchingState.selectedModeKey = "wire-10pair";
    matchingState.pairLimit = MATCHING_DEFAULT_PAIR_COUNT;

    var gameSubtitleEl = document.querySelector(
      "#matchingGameWrapper .matching-game-subtitle",
    );
    if (gameSubtitleEl) {
      gameSubtitleEl.textContent = "Ghép nhanh 10 cặp";
    }

    renderMatchingInteractionHint();

    updateMatchingUI();

    // Load pairs from server with pairLimit
    const board = document.getElementById("matchingBoard");
    board.innerHTML =
      '<div class="matching-loading"><div class="matching-loading-spinner"></div><p>Đang tạo câu hỏi matching...</p></div>';

    const pairLimit = matchingState.pairLimit || MATCHING_DEFAULT_PAIR_COUNT;
    console.log(
      "🎮 Starting matching game:",
      topic.title,
      "| Line mode:",
      "wired",
      "| Pairs:",
      pairLimit,
    );

    google.script.run
      .withSuccessHandler(function (pairs) {
        matchingState.loadingPairs = false;

        if (isMissingGeminiKeyError(pairs)) {
          matchingState.pairsError =
            pairs?.message ||
            "Bạn chưa gắn Gemini API key cá nhân. Vui lòng vào Profile/Settings.";
          showGeminiKeyConfigWarning(matchingState.pairsError);
          board.innerHTML =
            '<div class="matching-empty"><div class="matching-empty-icon">🔐</div><p class="matching-empty-text">Thiếu Gemini API key cá nhân</p><p class="matching-empty-sub">' +
            matchingState.pairsError +
            '</p><button class="matching-btn matching-btn-primary" onclick="matchingBackToTopics()" style="margin-top:1rem;">Quay lại</button></div>';
          return;
        }

        // Validate response
        if (!pairs || !Array.isArray(pairs) || pairs.length === 0) {
          matchingState.pairsError =
            "Không nhận được dữ liệu matching từ server";
          matchingState.matchingPairs = [];
          board.innerHTML =
            '<div class="matching-empty"><div class="matching-empty-icon">📭</div>' +
            '<p class="matching-empty-text">Chưa có dữ liệu cho chủ đề này</p>' +
            '<button class="matching-btn matching-btn-primary" onclick="matchingBackToTopics()" style="margin-top:1rem;">Quay lại</button></div>';
          console.error("Empty matching pairs response");
          return;
        }

        // Client-side normalize & validate each pair
        var normalizedPairs = [];
        for (var i = 0; i < pairs.length; i++) {
          var p = pairs[i];
          if (
            p &&
            p.question &&
            p.answer &&
            String(p.question).trim() !== "" &&
            String(p.answer).trim() !== ""
          ) {
            normalizedPairs.push({
              question: String(p.question).trim(),
              answer: String(p.answer).trim(),
              hint: p.hint ? String(p.hint).trim() : "",
              difficulty: p.difficulty || "medium",
              itemType: "text",
            });
          }
        }

        if (normalizedPairs.length < pairLimit) {
          matchingState.pairsError =
            "Dữ liệu không đủ: cần " +
            pairLimit +
            " cặp, chỉ có " +
            normalizedPairs.length +
            " cặp hợp lệ";
          matchingState.matchingPairs = [];
          board.innerHTML =
            '<div class="matching-empty"><div class="matching-empty-icon">⚠️</div>' +
            '<p class="matching-empty-text">Không đủ dữ liệu</p>' +
            '<p class="matching-empty-sub">Cần ' +
            pairLimit +
            " cặp nhưng chỉ có " +
            normalizedPairs.length +
            " cặp hợp lệ</p>" +
            '<button class="matching-btn matching-btn-primary" onclick="matchingBackToTopics()" style="margin-top:1rem;">Quay lại</button></div>';
          console.error(
            "Not enough pairs:",
            normalizedPairs.length,
            "/",
            pairLimit,
          );
          return;
        }

        // Store normalized pairs
        matchingState.matchingPairs = normalizedPairs;
        matchingState.pairsError = null;

        console.log(
          "✅ Loaded " + normalizedPairs.length + " valid matching pairs",
        );

        initMatchingBoard(normalizedPairs);
        startMatchingTimer();
      })
      .withFailureHandler(function (err) {
        matchingState.loadingPairs = false;
        if (isMissingGeminiKeyError(err)) {
          showGeminiKeyConfigWarning(err?.message || err?.toString());
        }
        matchingState.pairsError = err.message || "Vui lòng thử lại";
        matchingState.matchingPairs = [];

        board.innerHTML =
          '<div class="matching-empty"><div class="matching-empty-icon">❌</div><p class="matching-empty-text">Lỗi tải câu hỏi</p><p class="matching-empty-sub">' +
          (err.message || "Vui lòng thử lại") +
          '</p><button class="matching-btn matching-btn-primary" onclick="matchingRestartGame()" style="margin-top:1rem;">🔄 Thử lại</button></div>';
        console.error("Error loading matching pairs:", err);
      })
      .getMatchingPairs(topic.topicId, pairLimit, {
        userId: currentUser?.userId || window.currentUser?.userId || "",
      });
  }

  function isMissingGeminiKeyError(payload) {
    const code = String(payload?.code || "").toUpperCase();
    const message = String(payload?.message || payload?.toString?.() || "").toLowerCase();
    return (
      code === "AI_KEY_NOT_CONFIGURED" ||
      message.includes("chưa cấu hình gemini api key") ||
      message.includes("chưa gắn gemini api key") ||
      message.includes("profile/settings")
    );
  }

  function showGeminiKeyConfigWarning(message) {
    showToast(
      message ||
        "Bạn chưa gắn Gemini API key cá nhân. Vui lòng vào Profile/Settings để cấu hình.",
      "warning",
    );
    redirectToProfileAiKeySetup();
  }

  function redirectToProfileAiKeySetup() {
    if (typeof window.showPage === "function") {
      window.showPage("page-profile");

    setTimeout(function () {
      if (typeof window.openProfileSection === "function") {
        window.openProfileSection("ai-key");

    }, 220);

  // ===== BOARD INIT =====
  function initMatchingBoard(pairs) {
    if (!pairs || pairs.length === 0) {
      document.getElementById("matchingBoard").innerHTML =
        '<div class="matching-empty"><div class="matching-empty-icon">📭</div><p class="matching-empty-text">Chưa có dữ liệu cho chủ đề này</p></div>';
      return;
    }

    matchingState.totalPairs = pairs.length;

    // Create left items (questions) and right items (answers)
    const leftItems = pairs.map(function (pair, index) {
      return { pairId: index, content: pair.question };
    });
    const rightItems = pairs.map(function (pair, index) {
      return { pairId: index, content: pair.answer };
    });

    // Shuffle each column independently
    matchingState.leftItems = shuffleArray(leftItems);
    matchingState.rightItems = shuffleArray(rightItems);
    matchingState.selectedLeftId = null;
    matchingState.selectedRightId = null;
    matchingState.matchedPairIds = [];
    matchingState.wrongAttemptPair = null;
    matchingState.dragHoverSlotId = null;
    matchingState.draggingRightPairId = null;
    matchingState.dragCardPlacement = {};
    matchingState.selectedDragCardId = null;
    matchingState.dragSlots = matchingState.leftItems.map(function (item) {
      return {
        slotPairId: item.pairId,
        rightPairId: null,
        status: null,
      };
    });

    renderMatchingBoard();
    updateMatchingUI();
  }

          matchingState.wrongAttemptPair &&
          matchingState.wrongAttemptPair.rightId === item.pairId;

        var cls = "matching-item matching-item-right matching-item-square";
        if (isMatched) cls += " matched";
        else if (isWrong) cls += " wrong";
        else if (isSelected) cls += " selected";

        return (
          '<button class="' +
          cls +
          '" id="matching-right-item-' +
          item.pairId +
          '" data-pair-id="' +
          item.pairId +

          (isMatched ? " disabled" : "") +
          " onclick=\"selectMatchingItem('right'," +
          item.pairId +
          ')">' +
          '<span class="matching-item-text">' +
          item.content +

        );
      })
