<!-- Forest Theme - Thiên nhiên, dịu mắt, học tập -->
<style>
  /* ============================================================
     FOREST THEME - CSS OVERRIDES
     Kích hoạt bằng body.theme-forest
     ============================================================ */

  /* --- ROOT VARIABLES OVERRIDE --- */
  body.theme-forest {
    --forest-bg-primary: #f0f5f0;
    --forest-bg-secondary: #e8efe4;
    --forest-bg-card: #ffffff;
    --forest-accent: #2d5a3d;
    --forest-accent-light: #3a7a52;
    --forest-accent-hover: #1e4a2e;
    --forest-moss: #6b8f5e;
    --forest-olive: #7a8b5c;
    --forest-success: #4a9b5f;
    --forest-warning: #c4a35a;
    --forest-danger: #b85c4a;
    --forest-text: #1a3328;
    --forest-text-secondary: #4a6b5a;
    --forest-text-muted: #7a9b8a;
    --forest-border: #c8d8c8;
    --forest-border-light: #dce8dc;
    --forest-glass-bg: rgba(45, 90, 61, 0.06);
    --forest-glass-border: rgba(45, 90, 61, 0.12);
    --forest-shadow: rgba(45, 90, 61, 0.1);
    --forest-gradient: linear-gradient(135deg, #2d5a3d 0%, #3a7a52 100%);
    --forest-gradient-soft: linear-gradient(135deg, #e8f0e8 0%, #f0f5f0 100%);
    --forest-gradient-accent: linear-gradient(135deg, #3a7a52 0%, #6b8f5e 100%);
  }

  /* --- BODY & PAGE BACKGROUND --- */
  body.theme-forest {
    background: var(--forest-bg-primary) !important;
  }

  body.theme-forest .page-content {
    background: var(--forest-bg-primary) !important;
  }

  /* --- SCROLLBAR --- */
  body.theme-forest ::-webkit-scrollbar-track {
    background: var(--forest-bg-secondary) !important;
  }

  body.theme-forest ::-webkit-scrollbar-thumb {
    background: var(--forest-gradient) !important;
    border: 2px solid var(--forest-bg-secondary) !important;
  }

  body.theme-forest ::-webkit-scrollbar-thumb:hover {
    background: var(--forest-gradient-accent) !important;
  }

  body.theme-forest * {
    scrollbar-color: var(--forest-accent) var(--forest-bg-secondary) !important;
  }

  /* ============================================================
     SIDEBAR OVERRIDES
     ============================================================ */
  body.theme-forest .global-sidebar {
    background: linear-gradient(
      180deg,
      #1a3328 0%,
      #213d30 30%,
      #2a4e3a 70%,
      #1e3b2c 100%
    ) !important;
    border-right: 1px solid rgba(74, 155, 95, 0.3) !important;
    box-shadow:
      4px 0 20px rgba(45, 90, 61, 0.15),
      0 0 40px rgba(74, 155, 95, 0.1) inset !important;
  }

  body.theme-forest .global-sidebar .sidebar-header {
    border-bottom: 1px solid rgba(74, 155, 95, 0.2) !important;
  }

  body.theme-forest .global-sidebar .logo-letter {
    background: linear-gradient(135deg, #4a9b5f 0%, #8bc34a 100%) !important;
    -webkit-background-clip: text !important;
    background-clip: text !important;
  }

  body.theme-forest .global-sidebar .logo-dot {
    color: var(--forest-warning) !important;
    -webkit-text-fill-color: var(--forest-warning) !important;
  }

  body.theme-forest .global-sidebar .logo-text {
    background: linear-gradient(135deg, #4a9b5f 0%, #8bc34a 100%) !important;
    -webkit-background-clip: text !important;
    background-clip: text !important;
  }

  /* Sidebar nav items */
  body.theme-forest .global-sidebar .nav-item {
    background: linear-gradient(
      135deg,
      rgba(74, 155, 95, 0.1) 0%,
      rgba(107, 143, 94, 0.1) 100%
    ) !important;
    border: 1px solid rgba(74, 155, 95, 0.15) !important;
    color: #c8e6c9 !important;
  }

  body.theme-forest .global-sidebar .nav-item:hover {
    background: var(--forest-gradient) !important;
    border-color: rgba(74, 155, 95, 0.4) !important;
    box-shadow: 0 4px 12px rgba(74, 155, 95, 0.4) !important;
  }

  body.theme-forest .global-sidebar .nav-item.active {
    background: var(--forest-gradient) !important;
    box-shadow: 0 4px 16px rgba(74, 155, 95, 0.5) !important;
  }

  body.theme-forest .global-sidebar .nav-icon {
    background: linear-gradient(
      135deg,
      rgba(74, 155, 95, 0.2) 0%,
      rgba(107, 143, 94, 0.2) 100%
    ) !important;
    color: #8bc34a !important;
    box-shadow: 0 2px 8px rgba(74, 155, 95, 0.2) !important;
  }

  body.theme-forest .global-sidebar .nav-item:hover .nav-icon,
  body.theme-forest .global-sidebar .nav-item.active .nav-icon {
    background: rgba(255, 255, 255, 0.25) !important;
    color: #fff !important;
    box-shadow: 0 0 12px rgba(139, 195, 74, 0.5) !important;
  }

  body.theme-forest .global-sidebar .nav-item:hover .nav-label,
  body.theme-forest .global-sidebar .nav-item.active .nav-label {
    color: #fff !important;
  }

  /* Sidebar user profile */
  body.theme-forest .sidebar-user-profile {
    background: linear-gradient(
      135deg,
      rgba(74, 155, 95, 0.15) 0%,
      rgba(107, 143, 94, 0.15) 100%
    ) !important;
    border: 1px solid rgba(74, 155, 95, 0.2) !important;
  }

  body.theme-forest .sidebar-user-profile:hover {
    background: var(--forest-gradient) !important;
    box-shadow: 0 4px 12px rgba(74, 155, 95, 0.4) !important;
  }

  body.theme-forest .sidebar-avatar {
    border-color: var(--forest-accent-light) !important;
    box-shadow: 0 2px 8px rgba(74, 155, 95, 0.2) !important;
  }

  body.theme-forest .sidebar-username {
    color: #c8e6c9 !important;
  }

  /* Sidebar search */
  body.theme-forest .sidebar-search-item {
    background: linear-gradient(
      135deg,
      rgba(74, 155, 95, 0.15) 0%,
      rgba(107, 143, 94, 0.15) 100%
    ) !important;
    border: 1px solid rgba(74, 155, 95, 0.2) !important;
  }

  body.theme-forest .sidebar-search-item:hover {
    background: linear-gradient(
      135deg,
      rgba(74, 155, 95, 0.25) 0%,
      rgba(107, 143, 94, 0.25) 100%
    ) !important;
    border-color: rgba(74, 155, 95, 0.4) !important;
  }

  body.theme-forest .sidebar-search-wrapper {
    border-bottom: 1px solid rgba(74, 155, 95, 0.2) !important;
  }

  body.theme-forest .search-icon {
    background: rgba(74, 155, 95, 0.15) !important;
    color: #8bc34a !important;
  }

  /* Sidebar footer & logout */
  body.theme-forest .global-sidebar .sidebar-footer {
    border-top: 1px solid rgba(74, 155, 95, 0.2) !important;
  }

  body.theme-forest .sidebar-toggle-btn:hover {
    color: #8bc34a !important;
  }

  /* ============================================================
     DASHBOARD OVERRIDES
     ============================================================ */
  body.theme-forest #page-dashboard,
  body.theme-forest .dashboard-container {
    background: linear-gradient(
      135deg,
      var(--forest-bg-primary) 0%,
      var(--forest-bg-secondary) 50%,
      #dce8dc 100%
    ) !important;
  }

  /* Remove galaxy stars effect */
  body.theme-forest #page-dashboard::before,
  body.theme-forest .topics-container::before,
  body.theme-forest .profile-page::before {
    display: none !important;
  }

  /* Dashboard glass cards */
  body.theme-forest .glass-card,
  body.theme-forest .zone-card,
  body.theme-forest .stat-card,
  body.theme-forest .dashboard-card {
    background: var(--forest-bg-card) !important;
    border: 1px solid var(--forest-border-light) !important;
    box-shadow: 0 2px 12px var(--forest-shadow) !important;
    color: var(--forest-text) !important;
    backdrop-filter: none !important;
  }

  body.theme-forest .glass-card:hover,
  body.theme-forest .zone-card:hover,
  body.theme-forest .dashboard-card:hover {
    box-shadow: 0 8px 24px rgba(45, 90, 61, 0.15) !important;
    transform: translateY(-2px);
  }

  /* Dashboard text colors */
  body.theme-forest .zone-title,
  body.theme-forest .stat-value,
  body.theme-forest .card-title,
  body.theme-forest .dashboard-title,
  body.theme-forest .welcome-text {
    color: var(--forest-text) !important;
  }

  body.theme-forest .zone-desc,
  body.theme-forest .stat-label,
  body.theme-forest .card-desc {
    color: var(--forest-text-secondary) !important;
  }

  /* Dashboard progress bars */
  body.theme-forest .progress-bar,
  body.theme-forest .xp-progress-fill {
    background: var(--forest-gradient) !important;
    border-radius: 8px !important;
  }

  body.theme-forest .progress-track,
  body.theme-forest .xp-progress-track {
    background: var(--forest-border-light) !important;
    border-radius: 8px !important;
  }

  /* ============================================================
     TOPICS PAGE OVERRIDES
     ============================================================ */
  body.theme-forest .topics-container {
    background: var(--forest-gradient-soft) !important;
  }

  body.theme-forest .topics-header h1,
  body.theme-forest .topics-title {
    color: var(--forest-text) !important;
    text-shadow: none !important;
  }

  body.theme-forest .topics-subtitle,
  body.theme-forest .topics-header p {
    color: var(--forest-text-secondary) !important;
  }

  body.theme-forest .topic-card {
    background: var(--forest-bg-card) !important;
    border: 1px solid var(--forest-border-light) !important;
    box-shadow: 0 2px 12px var(--forest-shadow) !important;
    border-radius: 16px !important;
    backdrop-filter: none !important;
  }

  body.theme-forest .topic-card:hover {
    box-shadow: 0 8px 24px rgba(45, 90, 61, 0.18) !important;
    border-color: var(--forest-accent-light) !important;
    transform: translateY(-4px);
  }

  body.theme-forest .topic-name,
  body.theme-forest .topic-title {
    color: var(--forest-text) !important;
  }

  body.theme-forest .topic-description,
  body.theme-forest .topic-desc {
    color: var(--forest-text-secondary) !important;
  }

  body.theme-forest .topic-tag,
  body.theme-forest .topic-badge {
    background: rgba(45, 90, 61, 0.1) !important;
    color: var(--forest-accent) !important;
    border: 1px solid rgba(45, 90, 61, 0.2) !important;
  }

  /* ============================================================
     LESSON PAGE OVERRIDES
     ============================================================ */
  body.theme-forest .lesson-container,
  body.theme-forest #page-lesson {
    background: var(--forest-bg-primary) !important;
  }

  body.theme-forest .lesson-content {
    background: var(--forest-bg-card) !important;
    color: var(--forest-text) !important;
    border: 1px solid var(--forest-border-light) !important;
    box-shadow: 0 2px 12px var(--forest-shadow) !important;
  }

  body.theme-forest .lesson-title {
    color: var(--forest-text) !important;
  }

  /* ============================================================
     MCQ PAGE OVERRIDES
     ============================================================ */
  body.theme-forest .mcq-container,
  body.theme-forest #page-mcq {
    background: var(--forest-gradient-soft) !important;
  }

  body.theme-forest .mcq-card,
  body.theme-forest .question-card {
    background: var(--forest-bg-card) !important;
    border: 1px solid var(--forest-border-light) !important;
    box-shadow: 0 2px 12px var(--forest-shadow) !important;
    backdrop-filter: none !important;
  }

  body.theme-forest .mcq-question,
  body.theme-forest .question-text {
    color: var(--forest-text) !important;
  }

  body.theme-forest .mcq-option,
  body.theme-forest .answer-option {
    background: var(--forest-bg-primary) !important;
    border: 2px solid var(--forest-border) !important;
    color: var(--forest-text) !important;
    border-radius: 12px !important;
  }

  body.theme-forest .mcq-option:hover,
  body.theme-forest .answer-option:hover {
    border-color: var(--forest-accent-light) !important;
    background: rgba(45, 90, 61, 0.06) !important;
  }

  body.theme-forest .mcq-option.selected,
  body.theme-forest .answer-option.selected {
    border-color: var(--forest-accent) !important;
    background: rgba(45, 90, 61, 0.1) !important;
  }

  body.theme-forest .mcq-option.correct,
  body.theme-forest .answer-option.correct {
    border-color: var(--forest-success) !important;
    background: rgba(74, 155, 95, 0.1) !important;
  }

  body.theme-forest .mcq-option.incorrect,
  body.theme-forest .answer-option.incorrect {
    border-color: var(--forest-danger) !important;
    background: rgba(184, 92, 74, 0.1) !important;
  }

  /* ============================================================
     MATCHING GAME OVERRIDES
     ============================================================ */
  body.theme-forest .matching-container,
  body.theme-forest #page-matching {
    background: var(--forest-gradient-soft) !important;
  }

  body.theme-forest .matching-card {
    background: var(--forest-bg-card) !important;
    border: 1px solid var(--forest-border-light) !important;
    color: var(--forest-text) !important;
    backdrop-filter: none !important;
  }

  /* ============================================================
     PROFILE PAGE OVERRIDES
     ============================================================ */
  body.theme-forest #page-profile,
  body.theme-forest .profile-page {
    background: var(--forest-gradient-soft) !important;
  }

  /* Hide galaxy effects in forest theme */
  body.theme-forest .profile-bg-effects,
  body.theme-forest .profile-meteor-container,
  body.theme-forest .profile-gradient-orb {
    display: none !important;
  }

  body.theme-forest .profile-name-center {
    color: var(--forest-text) !important;
    text-shadow: none !important;
  }

  body.theme-forest .avatar-glow-ring {
    background: conic-gradient(
      from 0deg,
      #4a9b5f,
      #6b8f5e,
      #8bc34a,
      #4a9b5f
    ) !important;
  }

  body.theme-forest .avatar-container-pro {
    background: linear-gradient(135deg, #e8f0e8, #f0f5f0) !important;
  }

  body.theme-forest .avatar-edit-btn {
    background: var(--forest-gradient) !important;
    box-shadow: 0 4px 15px rgba(45, 90, 61, 0.4) !important;
  }

  body.theme-forest .collapsible-section {
    background: var(--forest-bg-card) !important;
    border: 1px solid var(--forest-border-light) !important;
    backdrop-filter: none !important;
  }

  body.theme-forest .collapsible-section:hover {
    background: var(--forest-bg-card) !important;
    border-color: var(--forest-border) !important;
  }

  body.theme-forest .collapsible-title {
    color: var(--forest-text) !important;
  }

  body.theme-forest .collapsible-arrow {
    color: var(--forest-text-muted) !important;
  }

  body.theme-forest .collapsible-header:hover {
    background: var(--forest-glass-bg) !important;
  }

  body.theme-forest .collapsible-icon.gradient-blue {
    background: var(--forest-gradient) !important;
    box-shadow: 0 4px 15px rgba(45, 90, 61, 0.3) !important;
  }

  body.theme-forest .collapsible-icon.gradient-purple {
    background: linear-gradient(
      135deg,
      var(--forest-moss) 0%,
      var(--forest-olive) 100%
    ) !important;
    box-shadow: 0 4px 15px rgba(107, 143, 94, 0.3) !important;
  }

  /* Profile form inputs */
  body.theme-forest .form-input-pro {
    border-color: var(--forest-border) !important;
    background: var(--forest-bg-primary) !important;
    color: var(--forest-text) !important;
  }

  body.theme-forest .form-input-pro:focus {
    border-color: var(--forest-accent-light) !important;
    background: var(--forest-bg-card) !important;
    box-shadow: 0 0 0 4px rgba(45, 90, 61, 0.1) !important;
  }

  body.theme-forest .form-input-pro:focus ~ .form-label-pro,
  body.theme-forest .form-input-pro:not(:placeholder-shown) ~ .form-label-pro {
    color: var(--forest-accent-light) !important;
    background: var(--forest-bg-card) !important;
  }

  body.theme-forest .input-highlight {
    background: var(--forest-gradient) !important;
  }

  /* Profile buttons */
  body.theme-forest .btn-gradient-pro {
    background: var(--forest-gradient) !important;
    box-shadow: 0 4px 15px rgba(45, 90, 61, 0.3) !important;
  }

  body.theme-forest .btn-gradient-pro:hover {
    box-shadow: 0 8px 25px rgba(45, 90, 61, 0.4) !important;
  }

  /* Profile modal */
  body.theme-forest .modal-content-pro {
    background: var(--forest-bg-card) !important;
  }

  body.theme-forest .modal-header-pro {
    background: var(--forest-gradient-soft) !important;
    border-bottom: 1px solid var(--forest-border-light) !important;
  }

  body.theme-forest .modal-title-pro {
    color: var(--forest-text) !important;
  }

  body.theme-forest .avatar-option:hover {
    border-color: var(--forest-accent-light) !important;
    box-shadow: 0 8px 25px rgba(45, 90, 61, 0.3) !important;
  }

  body.theme-forest .avatar-option.selected {
    border-color: var(--forest-accent-light) !important;
    box-shadow: 0 0 0 4px rgba(45, 90, 61, 0.2) !important;
  }

  /* ============================================================
     GLOBAL BUTTON OVERRIDES
     ============================================================ */
  body.theme-forest .btn-primary {
    background: var(--forest-accent) !important;
  }

  body.theme-forest .btn-primary:hover {
    background: var(--forest-accent-hover) !important;
  }

  body.theme-forest .btn-success {
    background: var(--forest-success) !important;
  }

  body.theme-forest .btn-danger {
    background: var(--forest-danger) !important;
  }

  /* ============================================================
     GLOBAL TOAST OVERRIDES
     ============================================================ */
  body.theme-forest .toast-success {
    background: var(--forest-success) !important;
  }

  body.theme-forest .toast-error {
    background: var(--forest-danger) !important;
  }

  body.theme-forest .toast-info {
    background: var(--forest-accent-light) !important;
  }

  body.theme-forest .toast-warning {
    background: var(--forest-warning) !important;
  }

  /* ============================================================
     NOTIFICATION PANEL OVERRIDES
     ============================================================ */
  body.theme-forest .notification-panel {
    background: var(--forest-bg-card) !important;
    border: 2px solid var(--forest-border) !important;
  }

  body.theme-forest .notification-header {
    background: var(--forest-bg-card) !important;
    border-bottom: 2px solid var(--forest-border-light) !important;
  }

  body.theme-forest .notification-header h3 {
    color: var(--forest-text) !important;
  }

  /* ============================================================
     MOBILE MENU BUTTON
     ============================================================ */
  body.theme-forest .mobile-menu-toggle {
    background: var(--forest-accent) !important;
  }

  /* ============================================================
     LOGOUT MODAL
     ============================================================ */
  body.theme-forest .logout-modal .btn-confirm {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%) !important;
  }

  /* ============================================================
     STAT CARDS (Dashboard) - keep readable
     ============================================================ */
  body.theme-forest .stat-card-pro {
    background: var(--forest-bg-card) !important;
    border: 1px solid var(--forest-border-light) !important;
    backdrop-filter: none !important;
  }

  body.theme-forest .stat-card-pro:hover {
    background: var(--forest-bg-card) !important;
    box-shadow: 0 10px 30px rgba(45, 90, 61, 0.12) !important;
  }

  body.theme-forest .stat-value-pro {
    color: var(--forest-text) !important;
  }

  body.theme-forest .stat-label-pro {
    color: var(--forest-text-secondary) !important;
  }

  /* ============================================================
     LOADING OVERLAY
     ============================================================ */
  body.theme-forest .loading-spinner-pro {
    border-top-color: var(--forest-accent-light) !important;
  }

  /* ============================================================
     GENERAL TEXT COLOR RESETS FOR LIGHT BG
     ============================================================ */
  body.theme-forest h1,
  body.theme-forest h2,
  body.theme-forest h3,
  body.theme-forest h4 {
    color: var(--forest-text);
  }

  body.theme-forest p,
  body.theme-forest span,
  body.theme-forest label {
    color: var(--forest-text-secondary);
  }

  /* Ensure page-specific dark text doesn't bleed into white-on-dark elements */
  body.theme-forest .global-sidebar h1,
  body.theme-forest .global-sidebar h2,
  body.theme-forest .global-sidebar h3,
  body.theme-forest .global-sidebar p,
  body.theme-forest .global-sidebar span,
  body.theme-forest .global-sidebar label {
    color: inherit;
  }
</style>
