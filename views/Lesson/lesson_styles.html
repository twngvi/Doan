    padding: 0;
    margin: 0;
    color: #1e40af;
    font-size: 0.875rem;
  }

  .tips-list li {
    margin-bottom: 0.25rem;
  }

  /* Buttons */
  .btn-primary {
    background: linear-gradient(135deg, #5b6ff8 0%, #7b6cf6 100%);
    color: white;
    border: none;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(91, 111, 248, 0.3);
  }

  .btn-secondary {
    background: white;
    color: #5b6ff8;
    border: 2px solid #5b6ff8;
    padding: 0.625rem 1.25rem;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-secondary:hover {
    background: #f0f4ff;
  }

  /* ========================================
     SYNTAX HIGHLIGHTING - CODE BLOCKS
     ======================================== */
  .code-block-wrapper {
    position: relative;
    margin: 1.5rem 0;
    border-radius: 12px;
    overflow: hidden;
    background: #1e1e2e;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  }

  .code-block-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    background: linear-gradient(135deg, #2d2d44 0%, #1e1e2e 100%);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  }

  .code-block-lang {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: #a5b4fc;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .code-block-lang::before {
    content: "";
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #22c55e;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.5;
    }
  }

  /* Code block action buttons container */
  .code-block-actions {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn-copy-code {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.375rem 0.75rem;
    font-size: 0.75rem;
    font-weight: 500;
    color: #94a3b8;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-copy-code:hover {
    background: rgba(255, 255, 255, 0.15);
    color: #f1f5f9;
    transform: translateY(-1px);
  }

  .btn-copy-code.copied {
    background: rgba(34, 197, 94, 0.2);
    border-color: #22c55e;
    color: #22c55e;
  }

  /* ▶ Run Python button */
  .btn-run-code {
    display: flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.375rem 0.75rem;
    font-size: 0.75rem;
    font-weight: 600;
    color: #22c55e;
    background: rgba(34, 197, 94, 0.15);
    border: 1px solid rgba(34, 197, 94, 0.3);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-run-code:hover {
    background: rgba(34, 197, 94, 0.25);
    color: #4ade80;
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(34, 197, 94, 0.2);
  }

  .btn-run-code:active {
    transform: translateY(0);
  }

  .btn-run-code.running {
    color: #fbbf24;
    background: rgba(251, 191, 36, 0.15);
    border-color: rgba(251, 191, 36, 0.3);
    cursor: wait;
  }

  .btn-run-code .spin-icon {
    animation: spin-loading 1s linear infinite;
  }

  @keyframes spin-loading {
    from {
      transform: rotate(0deg);
    }
    to {
      transform: rotate(360deg);
    }
  }

  /* Python code output panel */
  .code-output-panel {
    border-top: 1px solid rgba(255, 255, 255, 0.08);
    background: #0d1117;
    border-radius: 0 0 12px 12px;
    overflow: hidden;
  }

  .code-output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 1rem;
    background: rgba(255, 255, 255, 0.03);
    border-bottom: 1px solid rgba(255, 255, 255, 0.06);
  }

  .code-output-title {
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }

  .code-output-title::before {
    content: "▸";
    color: #22c55e;
    font-size: 0.85rem;
  }

  .btn-clear-output {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 22px;
    height: 22px;
    background: transparent;
    border: none;
    border-radius: 4px;
    color: #6b7280;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn-clear-output:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #ef4444;
  }

  .code-output-body {
    padding: 0.75rem 1.25rem !important;
    margin: 0 !important;
    background: transparent !important;
    color: #e2e8f0 !important;
    font-family:
      "JetBrains Mono", "Fira Code", "Consolas", monospace !important;
    font-size: 0.825rem !important;
    line-height: 1.6 !important;
    white-space: pre-wrap;
    word-wrap: break-word;
    max-height: 300px;
    overflow-y: auto;
    border: none !important;
  }

  .code-output-body::before {
    display: none !important;
  }

  .code-output-body.has-error {
    color: #f87171 !important;
  }

  .code-block-wrapper pre {
    margin: 0 !important;
    padding: 1rem 1.25rem !important;
    background: transparent !important;
    overflow-x: auto;
  }

  .code-block-wrapper code {
    font-family:
      "JetBrains Mono", "Fira Code", "Consolas", monospace !important;
    font-size: 0.875rem !important;
    line-height: 1.6 !important;
    color: #e2e8f0 !important;
  }

  /* Prism.js theme overrides */
  .code-block-wrapper .token.comment {
    color: #6b7280;
    font-style: italic;
  }
  .code-block-wrapper .token.keyword {
    color: #c084fc;
  }
  .code-block-wrapper .token.string {
    color: #86efac;
  }
  .code-block-wrapper .token.number {
    color: #fbbf24;
  }
  .code-block-wrapper .token.function {
    color: #60a5fa;
  }
  .code-block-wrapper .token.operator {
    color: #f472b6;
  }
  .code-block-wrapper .token.class-name {
    color: #fcd34d;
  }
  .code-block-wrapper .token.punctuation {
    color: #94a3b8;
  }
  .code-block-wrapper .token.boolean {
    color: #f97316;
  }
  .code-block-wrapper .token.property {
    color: #7dd3fc;
  }

  /* ========================================
     CALLOUT BLOCKS (TIP, WARNING, NOTE)
     ======================================== */
  .callout-block {
    position: relative;
    padding: 1rem 1.25rem 1rem 3.5rem;
    margin: 1.5rem 0;
    border-radius: 12px;
    border-left: 4px solid;
    box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
  }

  .callout-icon {
    position: absolute;
    left: 1rem;
    top: 1rem;
    font-size: 1.5rem;
    line-height: 1;
  }

  .callout-title {
    font-weight: 700;
    font-size: 0.9375rem;
    margin: 0 0 0.5rem 0;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .callout-content {
    font-size: 0.9375rem;
    line-height: 1.6;
  }

  .callout-content p {
    margin: 0;
  }

  /* Tip - 💡 */
  .callout-tip {
    background: linear-gradient(135deg, #fef9c3 0%, #fef3c7 100%);
    border-color: #f59e0b;
  }
  .callout-tip .callout-title {
    color: #92400e;
  }
  .callout-tip .callout-content {
    color: #78350f;
  }

  /* Warning - ⚠️ */
  .callout-warning {
    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
    border-color: #ef4444;
  }
  .callout-warning .callout-title {
    color: #991b1b;
  }
  .callout-warning .callout-content {
    color: #7f1d1d;
  }

  /* Note - 📝 */
  .callout-note {
    background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
    border-color: #8b5cf6;
  }
  .callout-note .callout-title {
    color: #5b21b6;
  }
  .callout-note .callout-content {
    color: #4c1d95;
  }

  /* Info - ℹ️ */
  .callout-info {
    background: linear-gradient(135deg, #dbeafe 0%, #bfdbfe 100%);
    border-color: #3b82f6;
  }
  .callout-info .callout-title {
    color: #1e40af;
  }
  .callout-info .callout-content {
    color: #1e3a8a;
  }

  /* ========================================
     GRID CARDS (Short Lists) - Premium Design
     ======================================== */
  .list-grid-cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
    margin: 1.5rem 0;
    padding: 0;
    list-style: none;
  }

  .list-grid-cards li {
    position: relative;
    background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
    padding: 1.25rem 1.25rem 1.25rem 3.25rem;
    border-radius: 16px;
    border: 1px solid rgba(139, 92, 246, 0.15);
    box-shadow:
      0 4px 6px -1px rgba(0, 0, 0, 0.05),
      0 2px 4px -1px rgba(0, 0, 0, 0.03),
      inset 0 1px 0 rgba(255, 255, 255, 0.8);
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    cursor: default;
    overflow: hidden;
    font-size: 0.9375rem;
    line-height: 1.5;
    color: #334155;
  }

  .list-grid-cards li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: linear-gradient(180deg, #8b5cf6 0%, #a78bfa 50%, #c4b5fd 100%);
    border-radius: 4px 0 0 4px;
    opacity: 0.7;
    transition: all 0.3s ease;
  }

  .list-grid-cards li::after {
    content: "";
    position: absolute;
    left: 1rem;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Numbered badges */
  .list-grid-cards li:nth-child(1)::after {
    content: "1";
  }
  .list-grid-cards li:nth-child(2)::after {
    content: "2";
  }
  .list-grid-cards li:nth-child(3)::after {
    content: "3";
  }
  .list-grid-cards li:nth-child(4)::after {
    content: "4";
  }
  .list-grid-cards li:nth-child(5)::after {
    content: "5";
  }
  .list-grid-cards li:nth-child(6)::after {
    content: "6";
  }

  .list-grid-cards li::after {
    font-size: 0.75rem;
    font-weight: 700;
    color: #7c3aed;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .list-grid-cards li:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow:
      0 20px 25px -5px rgba(139, 92, 246, 0.15),
      0 8px 10px -6px rgba(139, 92, 246, 0.1);
    border-color: rgba(139, 92, 246, 0.4);
  }

  .list-grid-cards li:hover::before {
    opacity: 1;
    width: 5px;
  }

  /* Color variants for different items */
  .list-grid-cards li:nth-child(3n + 1)::before {
    background: linear-gradient(180deg, #8b5cf6 0%, #a78bfa 100%);
  }
  .list-grid-cards li:nth-child(3n + 2)::before {
    background: linear-gradient(180deg, #06b6d4 0%, #22d3ee 100%);
  }
  .list-grid-cards li:nth-child(3n)::before {
    background: linear-gradient(180deg, #f59e0b 0%, #fbbf24 100%);
  }

  .list-grid-cards li:nth-child(3n + 1)::after {
    background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
    color: #7c3aed;
  }
  .list-grid-cards li:nth-child(3n + 2)::after {
    background: linear-gradient(135deg, #cffafe 0%, #a5f3fc 100%);
    color: #0891b2;
  }
  .list-grid-cards li:nth-child(3n)::after {
    background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
    color: #d97706;
  }

  /* ========================================
     YOUTUBE EMBED
     ======================================== */
  .youtube-embed-wrapper {
    position: relative;
    width: 100%;
    max-width: 720px;
    margin: 1.5rem auto;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
  }

  .youtube-embed-wrapper::before {
    content: "";
    display: block;
    padding-top: 56.25%; /* 16:9 aspect ratio */
  }

  .youtube-embed-wrapper iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }

  /* ========================================
     TABLE OF CONTENTS (TOC) - Premium Design
     ======================================== */
  .lesson-toc {
    position: fixed;
    right: 1.5rem;
    top: 50%;
    transform: translateY(-50%);
    width: 280px;
    max-height: 75vh;
    background: linear-gradient(
      165deg,
      rgba(255, 255, 255, 0.98) 0%,
      rgba(248, 250, 252, 0.95) 100%
    );
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 0;
    box-shadow:
      0 25px 50px -12px rgba(0, 0, 0, 0.15),
      0 0 0 1px rgba(255, 255, 255, 0.5),
      inset 0 1px 0 rgba(255, 255, 255, 0.8);
    border: 1px solid rgba(139, 92, 246, 0.1);
    overflow: hidden;
    z-index: 100;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .lesson-toc::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(90deg, #8b5cf6 0%, #06b6d4 50%, #f59e0b 100%);
    border-radius: 20px 20px 0 0;
  }

  .lesson-toc.collapsed {
    width: 56px;
    border-radius: 16px;
    cursor: pointer;
  }

  .lesson-toc.collapsed .toc-content {
    display: none;
  }
  .lesson-toc.collapsed .toc-toggle-icon {
    transform: rotate(180deg);
  }
  .lesson-toc.collapsed .toc-header {
    padding: 1rem 0.75rem;
    margin: 0;
    border: none;
    justify-content: center;
  }
  .lesson-toc.collapsed .toc-title-text {
    display: none;
  }

  .toc-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.25rem 1rem;
    margin-bottom: 0;
    background: linear-gradient(
      135deg,
      rgba(139, 92, 246, 0.08) 0%,
      rgba(6, 182, 212, 0.05) 100%
    );
    border-bottom: 1px solid rgba(139, 92, 246, 0.1);
  }

  .toc-title {
    font-size: 0.75rem;
    font-weight: 800;
    color: #5b21b6;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex;
    align-items: center;
    gap: 0.625rem;
  }

  .toc-title svg {
    color: #8b5cf6;
  }

  .toc-toggle {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    border: 1px solid rgba(139, 92, 246, 0.2);
    border-radius: 10px;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #64748b;
    transition: all 0.3s ease;
  }

  .toc-toggle:hover {
    background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%);
    color: white;
    border-color: transparent;
    transform: scale(1.05);
  }

  .toc-content {
    padding: 0.75rem 0;
    max-height: calc(75vh - 80px);
    overflow-y: auto;
  }

  .toc-content::-webkit-scrollbar {
    width: 4px;
  }

  .toc-content::-webkit-scrollbar-track {
    background: transparent;
  }

  .toc-content::-webkit-scrollbar-thumb {
    background: rgba(139, 92, 246, 0.3);
    border-radius: 4px;
  }

  .toc-content::-webkit-scrollbar-thumb:hover {
    background: rgba(139, 92, 246, 0.5);
  }

  .toc-list {
    list-style: none;
    padding: 0;
    margin: 0;
  }

  .toc-item {
    margin: 2px 0.75rem;
  }

  .toc-link {
    position: relative;
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0.625rem 1rem;
    font-size: 0.8125rem;
    font-weight: 500;
    color: #475569;
    text-decoration: none;
    border-radius: 10px;
    border-left: 3px solid transparent;
    transition: all 0.25s ease;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .toc-link::before {
    content: "";
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
    width: 0;
    background: linear-gradient(
      135deg,
      rgba(139, 92, 246, 0.1) 0%,
      rgba(6, 182, 212, 0.05) 100%
    );
    transition: width 0.3s ease;
    z-index: -1;
    border-radius: 10px;
  }

  .toc-link:hover {
    color: #5b21b6;
    padding-left: 1.25rem;
  }

  .toc-link:hover::before {
    width: 100%;
  }

  .toc-link.active {
    background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
    color: #7c3aed;
    font-weight: 600;
    border-left-color: #8b5cf6;
    box-shadow: 0 2px 8px rgba(139, 92, 246, 0.15);
  }

  .toc-link.active::after {
    content: "";
    position: absolute;
    right: 0.75rem;
    width: 6px;
    height: 6px;
    background: #8b5cf6;
    border-radius: 50%;
    animation: toc-pulse 2s infinite;
  }

  @keyframes toc-pulse {
    0%,
    100% {
      opacity: 1;
      transform: scale(1);
    }
    50% {
      opacity: 0.5;
      transform: scale(1.2);
    }
  }

  .toc-link.level-1 {
    font-weight: 600;
    color: #1e293b;
    font-size: 0.8125rem;
  }

  .toc-link.level-2 {
    padding-left: 1.75rem;
    font-size: 0.75rem;
    color: #64748b;
  }

  .toc-link.level-3 {
    padding-left: 2.5rem;
    font-size: 0.6875rem;
    color: #94a3b8;
  }

  /* Progress indicator */
  .toc-progress {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: #e2e8f0;
  }

  .toc-progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #8b5cf6 0%, #06b6d4 100%);
    width: 0%;
    transition: width 0.3s ease;
    border-radius: 0 0 20px 20px;
  }

  /* ========================================
     MINI-QUIZ CHECKPOINTS
     ======================================== */
  .mini-quiz {
    background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
    border: 2px solid #0ea5e9;
    border-radius: 16px;
    padding: 1.5rem;
    margin: 2rem 0;
    box-shadow: 0 4px 16px rgba(14, 165, 233, 0.15);
  }

  .mini-quiz-header {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 1rem;
  }

  .mini-quiz-icon {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, #0ea5e9 0%, #06b6d4 100%);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.25rem;
    color: white;
  }

  .mini-quiz-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: #0369a1;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .mini-quiz-question {
    font-size: 1.0625rem;
    font-weight: 600;
    color: #0c4a6e;
    margin: 0 0 1.25rem 0;
  }

  .mini-quiz-options {
    display: flex;
    flex-direction: column;
    gap: 0.625rem;
  }

  .mini-quiz-option {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.875rem 1rem;
    background: white;
    border: 2px solid #e0f2fe;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .mini-quiz-option:hover {
    border-color: #0ea5e9;
    background: #f0f9ff;
    transform: translateX(4px);
  }

  .mini-quiz-option.selected {
    border-color: #0ea5e9;
    background: #e0f2fe;
  }

  .mini-quiz-option.correct {
    border-color: #22c55e;
    background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
    animation: quiz-correct 0.5s ease;
  }

  .mini-quiz-option.incorrect {
    border-color: #ef4444;
    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
    animation: quiz-shake 0.5s ease;
  }

  @keyframes quiz-correct {
    0%,
    100% {
      transform: scale(1);
    }
    50% {
      transform: scale(1.02);
    }
  }

  @keyframes quiz-shake {
    0%,
    100% {
      transform: translateX(0);
    }
    25% {
      transform: translateX(-5px);
    }
    75% {
      transform: translateX(5px);
    }
  }

  .mini-quiz-radio {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s ease;
  }

  .mini-quiz-option.selected .mini-quiz-radio {
    border-color: #0ea5e9;
    background: #0ea5e9;
  }

  .mini-quiz-option.correct .mini-quiz-radio {
    border-color: #22c55e;
    background: #22c55e;
  }

  .mini-quiz-option.incorrect .mini-quiz-radio {
    border-color: #ef4444;
    background: #ef4444;
  }

  .mini-quiz-radio::after {
    content: "";
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: white;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .mini-quiz-option.selected .mini-quiz-radio::after,
  .mini-quiz-option.correct .mini-quiz-radio::after,
  .mini-quiz-option.incorrect .mini-quiz-radio::after {
    opacity: 1;
  }

  .mini-quiz-text {
    font-size: 0.9375rem;
    color: #334155;
    flex: 1;
  }

  .mini-quiz-feedback {
    margin-top: 1rem;
    padding: 0.875rem 1rem;
    border-radius: 10px;
    font-weight: 500;
    display: none;
  }

  .mini-quiz-feedback.show {
    display: block;
  }
  .mini-quiz-feedback.correct {
    background: #dcfce7;
    color: #166534;
  }
  .mini-quiz-feedback.incorrect {
    background: #fee2e2;
    color: #991b1b;
  }

  /* Confetti animation for correct answer */
  .confetti-container {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 9999;
  }

  /* ========================================
     MINI QUIZ DROPDOWN SECTION
     ======================================== */
  .mini-quiz-section {
    margin-top: 1.5rem;
    border-radius: 16px;
    overflow: hidden;
    border: 2px solid #e2e8f0;
    background: white;
    transition: all 0.3s ease;
  }

  .mini-quiz-section.locked {
    opacity: 0.6;
    border-color: #e2e8f0;
  }

  .mini-quiz-section.expanded {
    border-color: #8b5cf6;
    box-shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
  }

  .mini-quiz-dropdown-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 1rem 1.25rem;
    background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
    border: none;
    cursor: pointer;
    transition: all 0.25s ease;
    font-family: inherit;
  }

  .mini-quiz-dropdown-toggle:not(:disabled):hover {
    background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
  }

  .mini-quiz-dropdown-toggle:disabled {
    cursor: not-allowed;
  }

  .mini-quiz-toggle-left {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .mini-quiz-toggle-icon {
    font-size: 1.375rem;
  }

  .mini-quiz-toggle-info {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 0.125rem;
  }

  .mini-quiz-toggle-title {
    font-size: 0.9375rem;
    font-weight: 700;
    color: #1e293b;
  }

  .mini-quiz-toggle-desc {
    font-size: 0.75rem;
    color: #64748b;
  }

  .mini-quiz-toggle-right {
    display: flex;
    align-items: center;
    gap: 0.625rem;
  }

  .mini-quiz-status-badge {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.625rem;
    border-radius: 20px;
    background: #f1f5f9;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .mini-quiz-status-badge.ready {
    background: #ede9fe;
    color: #7c3aed;
  }

  .mini-quiz-status-badge.completed {
    background: #dcfce7;
    color: #16a34a;
  }

  .mini-quiz-chevron {
    transition: transform 0.3s ease;
    color: #94a3b8;
  }

  .mini-quiz-section.expanded .mini-quiz-chevron {
    transform: rotate(180deg);
  }

  .mini-quiz-section.locked .mini-quiz-chevron {
    opacity: 0.3;
  }

  .mini-quiz-dropdown-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    background: white;
  }

  .mini-quiz-dropdown-content.open {
    max-height: 8000px;
    border-top: 1px solid #e2e8f0;
  }

  .mini-quiz-loading {
    padding: 2rem;
    text-align: center;
  }

  .mini-quiz-error-box {
    padding: 1.5rem;
    text-align: center;
    color: #dc2626;
  }

  /* Mini Quiz Header */
  .mq-header-info {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1.25rem 1.5rem;
    background: linear-gradient(135deg, #ede9fe 0%, #ddd6fe 100%);
    border-bottom: 1px solid #c4b5fd;
  }

  .mq-header-icon {
    font-size: 1.5rem;
  }

  .mq-header-title {
    font-size: 1rem;
    font-weight: 700;
    color: #4c1d95;
  }

  .mq-header-subtitle {
    font-size: 0.75rem;
    color: #6d28d9;
    margin-top: 0.125rem;
  }

  /* Progress bar */
  .mq-progress-bar {
    height: 4px;
    background: #e2e8f0;
    width: 100%;
  }

  .mq-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #8b5cf6, #a78bfa);
    border-radius: 0 2px 2px 0;
    transition: width 0.5s ease;
  }

  .mq-progress-text {
    text-align: center;
    font-size: 0.75rem;
    color: #64748b;
    padding: 0.5rem;
    font-weight: 500;
  }

  /* Question card */
  .mq-question {
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid #f1f5f9;
    transition: background 0.2s ease;
  }

  .mq-question:last-of-type {
    border-bottom: none;
  }

  .mq-question-number {
    font-size: 0.6875rem;
    font-weight: 700;
    color: #8b5cf6;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 0.5rem;
  }

  .mq-question-text {
    font-size: 0.9375rem;
    font-weight: 600;
    color: #1e293b;
    margin: 0 0 1rem 0;
    line-height: 1.5;
  }

  .mq-options {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .mq-option {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    background: #f8fafc;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .mq-option:hover {
    border-color: #8b5cf6;
    background: #faf5ff;
    transform: translateX(3px);
  }

  .mq-question.answered .mq-option {
    cursor: default;
    transform: none !important;
  }

  .mq-question.answered .mq-option:not(.correct):not(.incorrect) {
    opacity: 0.5;
  }

  .mq-option.selected.correct {
    border-color: #22c55e;
    background: linear-gradient(135deg, #dcfce7 0%, #bbf7d0 100%);
  }

  .mq-option.selected.incorrect {
    border-color: #ef4444;
    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
  }

  .mq-option.correct:not(.selected) {
    border-color: #22c55e;
    background: #f0fdf4;
  }

  .mq-option-radio {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 2px solid #cbd5e1;
    flex-shrink: 0;
    transition: all 0.2s ease;
    position: relative;
  }

  .mq-option.selected .mq-option-radio {
    border-color: #8b5cf6;
    background: #8b5cf6;
  }

  .mq-option.correct .mq-option-radio {
    border-color: #22c55e;
    background: #22c55e;
  }

  .mq-option.incorrect .mq-option-radio {
    border-color: #ef4444;
    background: #ef4444;
  }

  .mq-option.selected .mq-option-radio::after,
  .mq-option.correct .mq-option-radio::after,
  .mq-option.incorrect .mq-option-radio::after {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: white;
    transform: translate(-50%, -50%);
  }

  .mq-option-text {
    font-size: 0.875rem;
    color: #334155;
    flex: 1;
  }

  /* Explanation block */
  .mq-explanation {
    margin-top: 0.75rem;
    padding: 0.875rem 1rem;
    border-radius: 10px;
    border-left: 4px solid #e2e8f0;
  }

  .mq-explanation.correct {
    background: #f0fdf4;
    border-left-color: #22c55e;
  }

  .mq-explanation.incorrect {
    background: #fff7ed;
    border-left-color: #f97316;
  }

  .mq-explain-header {
    font-weight: 700;
    font-size: 0.875rem;
    margin-bottom: 0.375rem;
    color: #1e293b;
  }

  .mq-explain-text {
    font-size: 0.8125rem;
    color: #475569;
    line-height: 1.6;
  }

  /* Result card */
  .mq-result {
    padding: 1.5rem;
  }

  .mq-result-card {
    text-align: center;
    padding: 2rem;
    background: linear-gradient(135deg, #f0fdf4 0%, #dcfce7 100%);
    border: 2px solid #86efac;
    border-radius: 16px;
  }

  .mq-result-icon {
    font-size: 2.5rem;
    margin-bottom: 0.75rem;
  }

  .mq-result-title {
    font-size: 1.25rem;
    font-weight: 800;
    color: #166534;
    margin-bottom: 0.5rem;
  }

  .mq-result-score {
    font-size: 1rem;
    font-weight: 600;
    color: #15803d;
    margin-bottom: 0.5rem;
  }

  .mq-result-msg {
    font-size: 0.8125rem;
    color: #4ade80;
  }

  .mq-result-card-fail {
    background: #fff5f5;
    border: 1px solid #fc8181;
  }

  .mq-result-title-fail {
    color: #c53030;
  }

  .mq-result-score-fail {
    color: #e53e3e;
  }

  .mq-result-msg-fail {
    color: #742a2a;
  }

  .mq-attempts-note {
    margin-top: 0.625rem;
    font-size: 0.8125rem;
    color: #7f1d1d;
    font-weight: 600;
  }

  .mq-result-actions {
    margin-top: 1rem;
  }

  .mq-retry-btn {
    border: none;
    border-radius: 10px;
    background: #dc2626;
    color: #fff;
    font-weight: 700;
    padding: 0.6rem 1.25rem;
    cursor: pointer;
    transition: background 0.2s ease, transform 0.2s ease;
  }

  .mq-retry-btn:hover:not(:disabled) {
    background: #b91c1c;
    transform: translateY(-1px);
  }

  .mq-retry-btn:disabled {
    background: #bdbdbd;
    cursor: not-allowed;
    transform: none;
  }

  /* Mobile responsive */
  @media (max-width: 768px) {
    .mini-quiz-dropdown-toggle {
      padding: 0.875rem 1rem;
    }
    .mini-quiz-toggle-title {
      font-size: 0.8125rem;
    }
    .mq-question {
      padding: 1rem;
    }
    .mq-option {
      padding: 0.625rem 0.875rem;
    }
    .mini-quiz-status-badge {
      display: none;
    }
  }

  /* ========================================
     SPOILER EFFECT
     ======================================== */
  .spoiler {
    background: #1e293b;
    color: transparent;
    padding: 0.125rem 0.5rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.3s ease;
    user-select: none;
  }

  .spoiler:hover,
  .spoiler.revealed {
    background: #f1f5f9;
    color: #334155;
  }

  .spoiler::before {
    content: "🔒 Click để xem";
    color: #64748b;
    font-size: 0.75rem;
    font-style: italic;
  }

  .spoiler:hover::before,
  .spoiler.revealed::before {
    content: none;
  }

  /* ========================================
     RESPONSIVE TOC
     ======================================== */
  @media (max-width: 1400px) {
    .lesson-toc {
      right: 1rem;
      width: 220px;
    }
  }

  @media (max-width: 1200px) {
    .lesson-toc {
      display: none;
    }
  }

  /* Mobile Mini Quiz */
  @media (max-width: 640px) {
    .mini-quiz {
      padding: 1rem;
    }
    .mini-quiz-option {
      padding: 0.75rem;
    }
    .list-grid-cards {
      grid-template-columns: 1fr;
    }
  }

  /* ========================================
     DEFINITION / EXAMPLE / NOTE BADGES
     ======================================== */
  .lesson-badge-block {
    margin: 1.25rem 0;
    padding: 1rem 1.25rem;
    border-radius: 12px;
    position: relative;
    border-left: 4px solid;
  }

  .lesson-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.375rem;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 0.625rem;
  }

  .lesson-badge-block.definition {
    background: linear-gradient(135deg, #ede9fe 0%, #f3e8ff 100%);
    border-color: #8b5cf6;
  }
  .lesson-badge-block.definition .lesson-badge {
    background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
    color: white;
  }

  .lesson-badge-block.example {
    background: linear-gradient(135deg, #dcfce7 0%, #d1fae5 100%);
    border-color: #22c55e;
  }
  .lesson-badge-block.example .lesson-badge {
    background: linear-gradient(135deg, #22c55e 0%, #4ade80 100%);
    color: white;
  }

  .lesson-badge-block.note {
    background: linear-gradient(135deg, #fef3c7 0%, #fef9c3 100%);
    border-color: #eab308;
  }
  .lesson-badge-block.note .lesson-badge {
    background: linear-gradient(135deg, #eab308 0%, #facc15 100%);
    color: white;
  }

  .lesson-badge-block.important {
    background: linear-gradient(135deg, #fee2e2 0%, #fecaca 100%);
    border-color: #ef4444;
  }
  .lesson-badge-block.important .lesson-badge {
    background: linear-gradient(135deg, #ef4444 0%, #f87171 100%);
    color: white;
  }

  .lesson-badge-content {
    color: #374151;
    line-height: 1.6;
  }

  /* ========================================
     LESSON CONTENT IMPROVEMENTS
     ======================================== */
  .lesson-content-wrapper {
    position: relative;
  }

  /* Better link styling */
  .lesson-content-wrapper a {
    color: #a5b4fc;
    text-decoration: underline;
    text-underline-offset: 2px;
    transition: color 0.2s ease;
  }
  .lesson-content-wrapper a:hover {
    color: #c7d2fe;
  }

  /* Better hr styling */
  .lesson-content-wrapper hr {
    border: none;
    height: 2px;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.1),
      transparent
    );
    margin: 2rem 0;
  }

  /* Definition list styling */
  .lesson-content-wrapper dl {
    margin-bottom: 1.25rem;
  }
  .lesson-content-wrapper dt {
    font-weight: 600;
    color: #a5b4fc;
    margin-top: 1rem;
  }
  .lesson-content-wrapper dd {
    margin-left: 1.5rem;
    color: #cbd5e1;
    padding-left: 1rem;
    border-left: 2px solid rgba(255, 255, 255, 0.15);
  }

  /* ========================================
     2-COLUMN LAYOUT (Desktop/Tablet)
     ======================================== */
  .lesson-two-col {
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 1.5rem;
    align-items: start;
  }

  .lesson-main-content {
    min-width: 0;
  }

  /* ========================================
     RIGHT SIDEBAR - Navigation
     ======================================== */
  .lesson-sidebar {
    position: sticky;
    top: 1.5rem;
