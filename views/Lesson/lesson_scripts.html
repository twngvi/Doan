  /**
   * Detect programming language from code content
   */
  function detectLanguage(code) {
    const patterns = {
      python: [
        /\bdef\s+\w+\(/,
        /\bimport\s+\w+/,
        /\bprint\s*\(/,
        /\bclass\s+\w+:/,
        /\bif\s+__name__/,
      ],
      javascript: [
        /\bfunction\s+\w+/,
        /\bconst\s+\w+/,
        /\blet\s+\w+/,
        /=>/,
        /\bconsole\.log/,
      ],
      java: [
        /\bpublic\s+class/,
        /\bpublic\s+static\s+void/,
        /System\.out\.println/,
      ],
      csharp: [/\busing\s+System/, /\bnamespace\s+\w+/, /Console\.WriteLine/],
      html: [/<\/?[a-z][\s\S]*>/i, /<!DOCTYPE/i],
      css: [/\{[\s\S]*:[\s\S]*;[\s\S]*\}/, /@media/, /@keyframes/],
      sql: [/\bSELECT\b/i, /\bFROM\b/i, /\bWHERE\b/i, /\bINSERT\b/i],
      bash: [/^\s*#!\/bin\/bash/, /\$\(/, /\becho\s+/],
    };

    for (const [lang, regexps] of Object.entries(patterns)) {
      if (regexps.some((regex) => regex.test(code))) {
        return lang;
      }
    }
    return "plaintext";
  }

  // ========================================
  // ▶️ PYTHON CODE EXECUTION (Pyodide)
  // ========================================

  let pyodideInstance = null;
  let pyodideLoading = false;
  let pyodideLoadPromise = null;

  /**
   * Load Pyodide runtime (lazy - only on first Run click)
   */
  async function loadPyodideRuntime() {
    if (pyodideInstance) return pyodideInstance;
    if (pyodideLoadPromise) return pyodideLoadPromise;

    pyodideLoading = true;
    pyodideLoadPromise = (async () => {
      // Inject Pyodide script if not already loaded
      if (!window.loadPyodide) {
        await new Promise((resolve, reject) => {
          const script = document.createElement("script");
          script.src =
            "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js";
          script.onload = resolve;
          script.onerror = () =>
            reject(new Error("Không thể tải Pyodide runtime"));
          document.head.appendChild(script);
        });
      }
      pyodideInstance = await window.loadPyodide({
        indexURL: "https://cdn.jsdelivr.net/pyodide/v0.25.1/full/",
      });
      pyodideLoading = false;
      console.log("✅ Pyodide loaded successfully");
      return pyodideInstance;
    })();

    return pyodideLoadPromise;
  }

  /**
   * Run Python code from a code block
   */
  async function runPythonCode(button) {
    const wrapper = button.closest(".code-block-wrapper");
    const codeEl = wrapper.querySelector("code");
    const code = codeEl.textContent;

    // Find or create output panel
    let outputPanel = wrapper.querySelector(".code-output-panel");
    if (!outputPanel) {
      outputPanel = document.createElement("div");
      outputPanel.className = "code-output-panel";
      outputPanel.innerHTML = `
        <div class="code-output-header">
          <span class="code-output-title">Output</span>
          <button class="btn-clear-output" onclick="this.closest('.code-output-panel').remove()">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
        <pre class="code-output-body"></pre>
      `;
      wrapper.appendChild(outputPanel);
    }

    const outputBody = outputPanel.querySelector(".code-output-body");
    outputPanel.style.display = "block";

    // Update button state to loading
    const originalContent = button.innerHTML;
    button.innerHTML = `
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin-icon">
        <circle cx="12" cy="12" r="10"/>
        <path d="M12 6v6l4 2"/>
      </svg>
      Đang chạy...
    `;
    button.disabled = true;
    button.classList.add("running");
    outputBody.textContent = "Đang tải Python runtime...";
    outputBody.className = "code-output-body";

    try {
      const pyodide = await loadPyodideRuntime();

      outputBody.textContent = "Đang thực thi...";

      // Redirect stdout and stderr
      pyodide.runPython(`
import sys
from io import StringIO
__stdout_capture = StringIO()
__stderr_capture = StringIO()
sys.stdout = __stdout_capture
sys.stderr = __stderr_capture
`);

      let result;
      let hasError = false;
      try {
        result = pyodide.runPython(code);
      } catch (pyErr) {
        hasError = true;
        result = pyErr.message;
      }

      // Get captured output
      const stdout = pyodide.runPython("__stdout_capture.getvalue()");
      const stderr = pyodide.runPython("__stderr_capture.getvalue()");

      // Reset stdout/stderr
      pyodide.runPython(`
import sys
sys.stdout = sys.__stdout__
sys.stderr = sys.__stderr__
`);

      // Build output text
      let output = "";
      if (stdout) output += stdout;
      if (stderr) output += (output ? "\n" : "") + stderr;
      if (hasError) {
        output += (output ? "\n" : "") + result;
        outputBody.classList.add("has-error");
      } else {
        outputBody.classList.remove("has-error");
        // Show return value if no print output and result is not undefined/None
        if (
          !stdout &&
          result !== undefined &&
          result !== null &&
          String(result) !== "undefined" &&
          String(result) !== "None"
        ) {
          output += String(result);
        }
      }

      outputBody.textContent = output || "(Không có output)";
    } catch (err) {
      outputBody.textContent = "Lỗi: " + err.message;
      outputBody.classList.add("has-error");
    } finally {
      // Restore button
      button.innerHTML = originalContent;
      button.disabled = false;
      button.classList.remove("running");
    }
  }

            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>

      ) {

  /**
   * Auto-embed YouTube links as iframes
   */
  function enhanceYouTubeLinks(container) {
    console.log("🎬 Enhancing YouTube links...");

    const youtubeRegex =
      /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})(?:[^\s<]*)?/g;

    // Find text nodes containing YouTube links
    const walker = document.createTreeWalker(
      container,
      NodeFilter.SHOW_TEXT,
      null,
      false,
    );
    const nodesToReplace = [];

    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (youtubeRegex.test(node.textContent)) {
        nodesToReplace.push(node);
      }
      youtubeRegex.lastIndex = 0;
    }

    nodesToReplace.forEach((node) => {
      const text = node.textContent;
      const matches = text.matchAll(youtubeRegex);

      for (const match of matches) {
        const videoId = match[1];
        const fullUrl = match[0];

        const wrapper = document.createElement("div");
        wrapper.className = "youtube-embed-wrapper";
        wrapper.innerHTML = `
          <iframe
            src="https://www.youtube.com/embed/${videoId}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        `;

        // Replace link with embed
        const parent = node.parentNode;
        if (parent) {
          const newText = document.createTextNode(text.replace(fullUrl, ""));
          parent.replaceChild(wrapper, node);
          if (newText.textContent.trim()) {
            parent.insertBefore(newText, wrapper);
          }
        }
      }
    });

    // Also handle <a> tags with YouTube links
    const links = container.querySelectorAll(
      'a[href*="youtube.com"], a[href*="youtu.be"]',
    );
    links.forEach((link) => {
      const href = link.href;
      const match = href.match(
        /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/,
      );

      if (match) {
        const videoId = match[1];
        const wrapper = document.createElement("div");
        wrapper.className = "youtube-embed-wrapper";
        wrapper.innerHTML = `
          <iframe
            src="https://www.youtube.com/embed/${videoId}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        `;
        link.replaceWith(wrapper);
      }
    });
  }

  // ========================================
  // 5️⃣ TABLE OF CONTENTS
  // ========================================

  /**
   * Generate sticky Table of Contents with ScrollSpy - Premium Design
   */
  function generateTableOfContents(container) {
    console.log("📚 Generating Table of Contents...");

    const headings = container.querySelectorAll("h1, h2, h3");
    if (headings.length < 3) return; // Don't show TOC for very short content

    // Add IDs to headings
    headings.forEach((heading, index) => {
      if (!heading.id) {
        heading.id = `heading-${index}`;
      }
    });

    // Create TOC element
    const toc = document.createElement("div");
    toc.className = "lesson-toc";
    toc.innerHTML = `
      <div class="toc-header">
        <span class="toc-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16"/>
            <path d="M4 12h12"/>
            <path d="M4 18h8"/>
          </svg>
          <span class="toc-title-text">MỤC LỤC</span>
        </span>
        <button class="toc-toggle" onclick="toggleTOC()" title="Thu gọn">
          <svg class="toc-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>
      <div class="toc-content">
        <ul class="toc-list">
          ${Array.from(headings)
            .map((h, i) => {
              const level = parseInt(h.tagName.charAt(1));
              const icon = level === 1 ? "📑" : level === 2 ? "📄" : "📝";
              return `
              <li class="toc-item">
                <a href="#${h.id}" class="toc-link level-${level}" data-target="${h.id}" onclick="smoothScrollToHeading(event, '${h.id}')">
                  ${h.textContent}
                </a>
              </li>
            `;
            })
            .join("")}
        </ul>
      </div>
      <div class="toc-progress">
        <div class="toc-progress-bar" id="toc-progress-bar"></div>
      </div>
    `;

    // Add to page
    document.querySelector(".lesson-container").appendChild(toc);

    // Setup ScrollSpy
    setupScrollSpy(headings);

    // Setup progress tracking
    setupTocProgress();
  }

  /**
   * Smooth scroll to heading
   */
  function smoothScrollToHeading(event, targetId) {
    event.preventDefault();
    const target = document.getElementById(targetId);
    if (target) {
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  /**
   * Setup ScrollSpy for TOC highlighting
   */
  function setupScrollSpy(headings) {
    const tocLinks = document.querySelectorAll(".toc-link");

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            tocLinks.forEach((link) => link.classList.remove("active"));
            const activeLink = document.querySelector(
              `.toc-link[data-target="${entry.target.id}"]`,
            );
            if (activeLink) {
              activeLink.classList.add("active");
              // Scroll TOC to show active item
              activeLink.scrollIntoView({
                behavior: "smooth",
                block: "nearest",
              });
            }
          }
        });
      },
      {
        rootMargin: "-20% 0px -70% 0px",
      },
    );

    headings.forEach((heading) => observer.observe(heading));
  }

  /**
   * Setup TOC progress bar
   */
  function setupTocProgress() {
    const progressBar = document.getElementById("toc-progress-bar");
    if (!progressBar) return;

    window.addEventListener("scroll", () => {
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;
      const scrollTop =
        window.pageYOffset || document.documentElement.scrollTop;
      const scrollable = documentHeight - windowHeight;
      const progress = scrollable > 0 ? (scrollTop / scrollable) * 100 : 0;
      progressBar.style.width = Math.min(progress, 100) + "%";
    });
  }

  /**
   * Toggle TOC collapse
   */
  function toggleTOC() {
    const toc = document.querySelector(".lesson-toc");
    if (toc) {
      toc.classList.toggle("collapsed");
    }
  }

  // Expose to global
  window.smoothScrollToHeading = smoothScrollToHeading;

  // ========================================
  // 6️⃣ MINI-QUIZ CHECKPOINTS
  // ========================================

  /**
   * Parse and create mini-quiz widgets
   * Format: [QUIZ: Question? | Option1 | Option2 | Option3*]
   * Asterisk (*) marks the correct answer
   */
  function enhanceMiniQuizzes(container) {
    console.log("🎯 Enhancing mini-quizzes...");

    const quizRegex = /\[QUIZ:\s*(.+?)\s*\|\s*(.+?)\]/g;

    // Find text containing quiz format
    const walker = document.createTreeWalker(
      container,
      NodeFilter.SHOW_TEXT,
      null,
      false,
    );
    const nodesToReplace = [];

    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (quizRegex.test(node.textContent)) {
        nodesToReplace.push(node);
      }
      quizRegex.lastIndex = 0;
    }

    nodesToReplace.forEach((node) => {
      const text = node.textContent;
      const match = text.match(/\[QUIZ:\s*(.+?)\s*\|\s*(.+?)\]/);

      if (match) {
        const question = match[1].trim();
        const optionsStr = match[2];
        const options = optionsStr.split("|").map((opt) => {
          const isCorrect = opt.trim().endsWith("*");
          return {
            text: opt.trim().replace(/\*$/, ""),
            correct: isCorrect,
          };
        });

        const quizId = "quiz-" + Math.random().toString(36).substr(2, 9);

        const quiz = document.createElement("div");
        quiz.className = "mini-quiz";
        quiz.id = quizId;
        quiz.innerHTML = `
          <div class="mini-quiz-header">
            <div class="mini-quiz-icon">❓</div>
            <span class="mini-quiz-label">Kiểm tra nhanh</span>
          </div>
          <p class="mini-quiz-question">${question}</p>
          <div class="mini-quiz-options">
            ${options
              .map(
                (opt, i) => `
              <div class="mini-quiz-option" onclick="handleMiniQuizAnswer(this, ${opt.correct}, '${quizId}')" data-correct="${opt.correct}">
                <div class="mini-quiz-radio"></div>
                <span class="mini-quiz-text">${opt.text}</span>
              </div>
            `,
              )
              .join("")}
          </div>
          <div class="mini-quiz-feedback"></div>
        `;

        const parent = node.parentNode;
        if (parent) {
          const remaining = text.replace(match[0], "");
          if (remaining.trim()) {
            const textNode = document.createTextNode(remaining);
            parent.insertBefore(textNode, node);
          }
          parent.replaceChild(quiz, node);
        }
      }
    });
  }

  /**
   * Handle mini-quiz answer selection
   */
  function handleMiniQuizAnswer(option, isCorrect, quizId) {
    const quiz = document.getElementById(quizId);
    if (!quiz) return;

    // Check if already answered
    if (quiz.dataset.answered === "true") return;

    const options = quiz.querySelectorAll(".mini-quiz-option");
    const feedback = quiz.querySelector(".mini-quiz-feedback");

    // Mark as answered
    quiz.dataset.answered = "true";

    // Clear previous selections
    options.forEach((opt) => {
      opt.classList.remove("selected", "correct", "incorrect");
    });

    // Show result
    option.classList.add("selected");

    if (isCorrect) {
      option.classList.add("correct");
      feedback.className = "mini-quiz-feedback show correct";
      feedback.innerHTML = "🎉 Chính xác! Bạn đã hiểu đúng rồi!";

      // Mark mini quiz completed for overall progress
      onMiniQuizCompleted();

      // Confetti effect
      createConfetti();
    } else {
      option.classList.add("incorrect");
      feedback.className = "mini-quiz-feedback show incorrect";

      // Show correct answer
      options.forEach((opt) => {
        if (opt.dataset.correct === "true") {
          opt.classList.add("correct");
        }
      });
      feedback.innerHTML = "❌ Chưa chính xác. Hãy xem lại đáp án đúng nhé!";
    }
  }

  /**
   * Create confetti celebration effect
   */
  function createConfetti() {
    const colors = ["#5b6ff8", "#f59e0b", "#22c55e", "#ec4899", "#8b5cf6"];
    const container = document.createElement("div");
    container.className = "confetti-container";
    document.body.appendChild(container);

    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement("div");
      confetti.style.cssText = `
        position: absolute;
        width: 10px;
        height: 10px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        left: ${Math.random() * 100}%;
        top: -10px;
        border-radius: ${Math.random() > 0.5 ? "50%" : "0"};
        animation: confetti-fall ${1 + Math.random() * 2}s linear forwards;
      `;
      container.appendChild(confetti);
    }

    // Add keyframes dynamically
    if (!document.getElementById("confetti-keyframes")) {
      const style = document.createElement("style");
      style.id = "confetti-keyframes";
      style.textContent = `
        @keyframes confetti-fall {
          to {
            top: 100vh;
            transform: rotate(${Math.random() * 720}deg);
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(style);
    }

    setTimeout(() => container.remove(), 3000);
  }

  // ========================================
  // 7️⃣ SPOILER EFFECTS
  // ========================================

  /**
   * Transform highlighted (black background) text into spoilers
   */
  function enhanceSpoilers(container) {
    console.log("🔒 Enhancing spoilers...");

    // Find spans with black background
    const spans = container.querySelectorAll('span[style*="background"]');

    spans.forEach((span) => {
      const style = span.getAttribute("style") || "";
      const hasBlackBg =
        style.includes("background-color: rgb(0, 0, 0)") ||
        style.includes("background-color:#000") ||
        style.includes("background:black") ||
        style.includes("background: black") ||
        style.includes("background-color: black");

      if (hasBlackBg && span.textContent.trim()) {
        const spoiler = document.createElement("span");
        spoiler.className = "spoiler";
        spoiler.textContent = span.textContent;
        spoiler.onclick = () => toggleSpoiler(spoiler);
        span.replaceWith(spoiler);
      }
    });

    // Also look for [SPOILER: text] format
    const spoilerRegex = /\[SPOILER:\s*(.+?)\]/g;
    const walker = document.createTreeWalker(
      container,
      NodeFilter.SHOW_TEXT,
      null,
      false,
    );
    const nodesToReplace = [];

    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (spoilerRegex.test(node.textContent)) {
        nodesToReplace.push(node);
      }
      spoilerRegex.lastIndex = 0;
    }

    nodesToReplace.forEach((node) => {
      const text = node.textContent;
      const newHtml = text.replace(
        /\[SPOILER:\s*(.+?)\]/g,
        (match, content) => {
          return `<span class="spoiler" onclick="toggleSpoiler(this)">${content}</span>`;
        },
      );

      const temp = document.createElement("span");
      temp.innerHTML = newHtml;
      node.parentNode.replaceChild(temp, node);
    });
  }

  /**
   * Toggle spoiler visibility
   */
  function toggleSpoiler(element) {
    element.classList.toggle("revealed");
  }

  // ========================================
  // UTILITY FUNCTIONS
  // ========================================

  /**
   * Escape HTML to prevent XSS in code blocks
   */
  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  // ========================================
  // GALAXY HEADER EFFECTS
  // ========================================

  // Meteor shower for lesson header
  let lessonMeteorInterval = null;

  function startLessonHeaderMeteors() {
    const container = document.getElementById("lessonMeteorContainer");
    if (!container) return;

    if (lessonMeteorInterval) {
      clearInterval(lessonMeteorInterval);
    }

    lessonMeteorInterval = setInterval(() => {
      if (!document.getElementById("lessonMeteorContainer")) {
        clearInterval(lessonMeteorInterval);
        return;
      }
      createLessonMeteor();
    }, 800);

    createLessonMeteor();
  }

  function createLessonMeteor() {
    const container = document.getElementById("lessonMeteorContainer");
    if (!container) return;

    const meteor = document.createElement("div");
    meteor.className = "lesson-header-meteor";

    // Random position from top-left area
    const startX = Math.random() * 40; // 0-40% from left
    const startY = Math.random() * 20; // 0-20% from top

    meteor.style.left = startX + "%";
    meteor.style.top = startY + "%";

    // Random size for variety
    const height = 35 + Math.random() * 35;
    meteor.style.height = height + "px";
    meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

    container.appendChild(meteor);

    setTimeout(() => {
      meteor.remove();
    }, 1500);
  }

  // ===== MOUSE-RESPONSIVE STARS EFFECT =====
  function setupLessonHeaderMouseEffect() {
    const header = document.querySelector(".lesson-header");
    const stars = document.getElementById("lessonHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  // ========================================
  // 📚 TOPIC SWITCHER - Chuyển đổi chủ đề
  // ========================================

  let topicSwitcherOpen = false;

  /**
   * Initialize topic switcher: load topics from global cache
   */
  function initTopicSwitcher() {
    console.log("📚 Initializing Topic Switcher...");
    const listEl = document.getElementById("topicSwitcherList");
    if (!listEl) return;

    // Try to get topics from global cache
    let topics = null;
    if (window.globalTopicsCache && window.globalTopicsCache.data) {
      topics = window.globalTopicsCache.data;
    }

    if (topics && topics.length > 0) {
      renderTopicSwitcherList(topics);
    } else {
      // If no cache, load from server
      listEl.innerHTML =
        '<div class="topic-switcher-loading">Đang tải...</div>';
      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.topics) {
            renderTopicSwitcherList(result.topics);
          } else {
            listEl.innerHTML =
              '<div class="topic-switcher-loading">Không có chủ đề</div>';
          }
        })
        .withFailureHandler(function () {
          listEl.innerHTML =
            '<div class="topic-switcher-loading">Lỗi tải danh sách</div>';
        })
        .getAllTopics();
    }

    // Close dropdown when clicking outside
    document.addEventListener("click", function (e) {
      const bar = document.querySelector(".topic-switcher-bar");
      if (bar && !bar.contains(e.target) && topicSwitcherOpen) {
        closeTopicSwitcher();
      }
    });
  }

  /**
   * Render the topic list inside the switcher dropdown
   */
  function renderTopicSwitcherList(topics) {
    const listEl = document.getElementById("topicSwitcherList");
    if (!listEl) return;

    const currentTopicId = currentLessonData ? currentLessonData.topicId : null;

    // Sort topics by order if available
    const sorted = [...topics].sort((a, b) => (a.order || 0) - (b.order || 0));

    let html = "";
    sorted.forEach(function (topic, index) {
      const isActive = topic.topicId === currentTopicId;
      const hasContent =
        topic.contentDocId &&
        topic.contentDocId.trim() !== "" &&
        topic.contentDocId !== "undefined" &&
        topic.contentDocId !== "null";

      let statusIcon = "";
      if (isActive) {
        statusIcon = "▶";
      } else if (!hasContent) {
        statusIcon = "🔒";
      } else {
        // Check progress from global cache
        let progress = null;
        if (window.globalTopicsCache && window.globalTopicsCache.progress) {
          progress = window.globalTopicsCache.progress[topic.topicId];
        }
        if (progress && progress.lessonCompleted) {
          statusIcon = "✅";
        }
      }

      const itemClass =
        "topic-switcher-item" +
        (isActive ? " active" : "") +
        (!hasContent ? " no-content" : "");
      const clickHandler =
        hasContent && !isActive
          ? "switchToTopic('" +
            topic.topicId +
            "', '" +
            encodeURIComponent(topic.title) +
            "', '" +
            (topic.contentDocId || "") +
            "')"
          : "";

      html +=
        '<div class="' +
        itemClass +
        '"' +
        (clickHandler ? ' onclick="' + clickHandler + '"' : "") +
        ">";
      html += '<span class="topic-item-order">' + (index + 1) + "</span>";
      html += '<span class="topic-item-title">' + topic.title + "</span>";
      html += '<span class="topic-item-status">' + statusIcon + "</span>";
      html += "</div>";
    });

    listEl.innerHTML = html;

    // Scroll active item into view
    setTimeout(function () {
      const activeItem = listEl.querySelector(".topic-switcher-item.active");
      if (activeItem) {
        activeItem.scrollIntoView({ block: "nearest", behavior: "smooth" });
      }
    }, 100);
  }

  /**
   * Toggle the topic switcher dropdown
   */
  function toggleTopicSwitcher() {
    topicSwitcherOpen = !topicSwitcherOpen;
    const bar = document.querySelector(".topic-switcher-bar");
    if (bar) {
      bar.classList.toggle("open", topicSwitcherOpen);
    }
  }

  /**
   * Close the topic switcher dropdown
   */
  function closeTopicSwitcher() {
    topicSwitcherOpen = false;
    const bar = document.querySelector(".topic-switcher-bar");
    if (bar) {
      bar.classList.remove("open");
    }
  }

  /**
   * Switch to a different topic
   */
  function switchToTopic(topicId, encodedTitle, contentDocId) {
    const topicTitle = decodeURIComponent(encodedTitle);
    console.log("🔄 Switching to topic:", topicId, topicTitle);

    closeTopicSwitcher();

    // Navigate to the new topic via showPage
    showPage("page-lesson", {
      topicId: topicId,
      topicTitle: topicTitle,
      contentDocId: contentDocId.trim(),
    });
  }

  // ========================================
  // ⚡ GO TO QUIZ FROM LESSON
  // ========================================

  /**
   * Navigate to Quiz page directly from Lesson
   * - Saves current lesson progress
   * - Passes topic params + gameMode=instant to skip mode selection
   */
  function goToQuizFromLesson() {
    if (!currentLessonData?.topicId || !currentLessonData?.contentDocId) {
      showToast("⚠️ Không có thông tin topic để tạo Quiz", "warning");
      return;
    }

    console.log("⚡ Going to Quiz from Lesson:", currentLessonData.topicId);

    // Save current lesson progress before navigating
    if (currentLessonData.topicId) {
      google.script.run
        .withSuccessHandler(function (res) {
          if (res && res.success) {
            console.log("✅ Lesson progress saved before Quiz");
            invalidateProgressCache();
          }
        })
        .withFailureHandler(function (err) {
          console.warn("⚠️ Could not save lesson progress:", err);
        })
        .saveLearningProgressForWeb(currentLessonData.topicId, "lesson", {
          topicTitle: currentLessonData.topicTitle,
          scrollDepth: scrollProgress,
          completed: tabCompletion.lessonRead,
        });
    }

    // Navigate to MCQ page with params for instant quiz mode
    showPage("page-mcq", {
      topicId: currentLessonData.topicId,
      topicTitle: currentLessonData.topicTitle,
      contentDocId: currentLessonData.contentDocId,
      gameMode: "instant",
      fromLesson: true,
    });
  }

  // Export functions to global
  window.initLessonPage = initLessonPage;
  window.switchLessonTab = switchLessonTab;
  window.startLessonHeaderMeteors = startLessonHeaderMeteors;
  window.setupLessonHeaderMouseEffect = setupLessonHeaderMouseEffect;
  window.toggleTopicSwitcher = toggleTopicSwitcher;
  window.closeTopicSwitcher = closeTopicSwitcher;
  window.switchToTopic = switchToTopic;
  window.goToQuizFromLesson = goToQuizFromLesson;
</script>
