<script>
  /**
   * Lesson Page Scripts
   * Phase 3: AI Content Integration
   *
   * ======================================
   * 🧠 INTERACTIVE NETWORK MINDMAP v2.0
   * ======================================
   *
   * Visual Structure:
   *
   *           Detail Pills (Level 2)
   *              ┌─────┐
   *              │ RAM │
   *              └─────┘
   *                  ╲
   *                   ╲
   *        📚───────── 🔵 Biến ──────╱────┌────────┐
   *      Khái niệm    (Satellite)          │ Gán (=)│
   *                         │              └────────┘
   *                         │
   *                    🧠 Center
   *                   (Tư Duy LT)
   *                    ╱       ╲
   *                   ╱         ╲
   *            🟣 Quy trình    🟢 Thuật toán
   *
   * Features:
   * - Radial layout (center + satellites)
   * - Progressive disclosure (click to expand)
   * - Animated SVG connections
   * - Pulse effects on center node
   * - Detail pills appear on click
   *
   */

  let currentLessonData = null;
  let scrollProgress = 0;

  // AI Content State
  let aiContentLoaded = {
    mindmap: false,
    flashcards: false,
  };
  let flashcardsData = [];
  let fullFlashcardsData = []; // Immutable source for replaying full deck
  let currentFlashcardIndex = 0;

  // ⭐ Progress Saving State
  let progressSaved = {
    lesson: false,
    mindmap: false,
    flashcards: false,
  };

  // ⭐ Tab Completion State (for overall progress tracking)
  let tabCompletion = {
    lessonRead: false, // User checked "Đã đọc xong"
    lessonQuiz: false, // User completed Mini Quiz
    mindmapViewed: false, // User checked "Đã xem Mindmap"
    flashcardsDone: false, // User viewed all flashcards
  };

  // ========================================
  // ⭐ LOCAL PROGRESS CACHE (per topicId)
  // Ensures state persists across topic switches even if server save is slow
  // ========================================
  function getLocalProgressKey(topicId) {
    return "lesson_progress_" + topicId;
  }

  function saveLocalProgress(topicId) {
    if (!topicId) return;
    try {
      var cacheData = {
        lessonRead: tabCompletion.lessonRead,
        lessonQuiz: tabCompletion.lessonQuiz,
        mindmapViewed: tabCompletion.mindmapViewed,
        flashcardsDone: tabCompletion.flashcardsDone,
        savedAt: new Date().toISOString(),
      };
      localStorage.setItem(
        getLocalProgressKey(topicId),
        JSON.stringify(cacheData),
      );
    } catch (e) {
      console.warn("⚠️ Could not save local progress:", e);
    }
  }

  function loadLocalProgress(topicId) {
    if (!topicId) return null;
    try {
      var stored = localStorage.getItem(getLocalProgressKey(topicId));
      return stored ? JSON.parse(stored) : null;
    } catch (e) {
      console.warn("⚠️ Could not load local progress:", e);
      return null;
    }
  }

  /**
   * Initialize Lesson Page
   */
  function initLessonPage() {
    console.log("📚 Initializing Lesson Page...");
    console.log("🔍 window.currentPageParams:", window.currentPageParams);

    // ⭐ Start Learning Time Tracker
    if (window.LearningTracker) {
      console.log("✅ LearningTracker found, starting lesson tracking...");
      window.LearningTracker.start("lesson");
    } else {
      console.warn("⚠️ LearningTracker NOT found!");
    }

    // ⭐ Reset previous lesson data to avoid cache issues
    currentLessonData = null;
    scrollProgress = 0;
    aiContentLoaded = { mindmap: false, flashcards: false };
    progressSaved = { lesson: false, mindmap: false, flashcards: false };
    tabCompletion = {
      lessonRead: false,
      lessonQuiz: false,
      mindmapViewed: false,
      flashcardsDone: false,
    };
    flashcardsData = [];
    fullFlashcardsData = [];
    currentFlashcardIndex = 0;

    // Reset mini quiz state
    miniQuizData = null;
    miniQuizAnswered = 0;
    miniQuizLoaded = false;

    // ⭐ Reset ALL lesson UI to clean defaults (important when switching topics)
    resetAllLessonUI();

    // Start meteor shower and mouse effects for header
    startLessonHeaderMeteors();
    setupLessonHeaderMouseEffect();

    // Initialize topic switcher
    initTopicSwitcher();

    // Clear previous content
    const contentArea = document.getElementById("lesson-content-area");
    if (contentArea) {
      contentArea.innerHTML = "";
    }

    // Reset tabs to default (lesson tab)
    switchLessonTab("lesson");

    // Get params from window.currentPageParams
    if (window.currentPageParams) {
      currentLessonData = window.currentPageParams;
      console.log("✅ Lesson params:", currentLessonData);
      console.log("📄 contentDocId:", currentLessonData.contentDocId);
      console.log("📋 topicId:", currentLessonData.topicId);
      console.log("🏷️ topicTitle:", currentLessonData.topicTitle);

      // Update header
      document.getElementById("lesson-topic-title").textContent =
        currentLessonData.topicTitle || "Bài học";

      // Update topic switcher current topic name
      const switcherLabel = document.getElementById("switcherCurrentTopic");
      if (switcherLabel)
        switcherLabel.textContent = currentLessonData.topicTitle || "Chủ đề";

      // Save Learning activity to personal Google Sheet
      google.script.run.saveActivityLog({
        type: "Learning",
        topicId: currentLessonData.topicId,
        topicTitle: currentLessonData.topicTitle,
      });

      // Notify dashboard to refresh leaderboard + history
      window.dispatchEvent(new Event("dashboard-needs-refresh"));

      // Load lesson content
      if (currentLessonData.contentDocId) {
        console.log(
          "🚀 Calling loadLessonContent with docId:",
          currentLessonData.contentDocId,
        );
        loadLessonContent(currentLessonData.contentDocId);
      } else {
        console.error("❌ No contentDocId found");
        showLessonError("Không tìm thấy nội dung bài học");
      }

      // ⭐ Load saved progress for this topic (restore sidebar/checkbox states)
      loadSavedTopicProgress(currentLessonData.topicId);
    } else {
      console.error("❌ No currentPageParams found");
      showLessonError("Thiếu thông tin bài học");
    }

    // Setup scroll tracking
    setupScrollTracking();
  }

  /**
   * Switch between lesson tabs
   */
  function switchLessonTab(tabName) {
    console.log("🔄 Switching to tab:", tabName);

    // ⭐ Update Learning Tracker based on tab
    if (window.LearningTracker) {
      if (tabName === "lesson") {
        window.LearningTracker.start("lesson");
      } else if (tabName === "mindmap") {
        window.LearningTracker.start("mindmap");
      } else if (tabName === "flashcards") {
        window.LearningTracker.start("flashcard");
      }
    }

    // Update sidebar nav tabs (new 2-column layout)
    document.querySelectorAll(".lesson-nav-tab").forEach((tab) => {
      tab.classList.remove("active");
      if (tab.dataset.tab === tabName) {
        tab.classList.add("active");
      }
    });

    // Also update old horizontal tabs if they exist (backward compat)
    document.querySelectorAll(".lesson-tab").forEach((tab) => {
      tab.classList.remove("active");
      if (tab.dataset.tab === tabName) {
        tab.classList.add("active");
      }
    });

    // Update tab panels
    document.querySelectorAll(".tab-panel").forEach((panel) => {
      panel.style.display = "none";
      panel.classList.remove("active");
    });

    const activePanel = document.getElementById("tab-" + tabName);
    if (activePanel) {
      activePanel.style.display = "block";
      activePanel.classList.add("active");
    }

    // Load AI content if not loaded yet
    if (tabName === "mindmap" && !aiContentLoaded.mindmap) {
      loadMindmap();
    } else if (tabName === "flashcards" && !aiContentLoaded.flashcards) {
      loadFlashcards();
    }
  }

  /**
   * Load lesson content from Google Doc
   */
  function loadLessonContent(docId) {
    console.log("📄 Loading lesson content from Doc ID:", docId);
    console.log("🔍 docId type:", typeof docId);
    console.log("🔍 docId value:", docId);

    // Show loading
    document.getElementById("lesson-loading").style.display = "block";
    document.getElementById("lesson-error").style.display = "none";
    document.getElementById("lesson-content-area").style.display = "none";
    const tabActionsEl = document.getElementById("lesson-tab-actions");
    if (tabActionsEl) tabActionsEl.style.display = "none";

    // ⭐ KIỂM TRA XEM HÀM google.script.run CÓ TỒN TẠI KHÔNG
    if (typeof google === "undefined" || !google.script || !google.script.run) {
      console.error("❌ google.script.run not available!");
      showLessonError("Lỗi: Không thể kết nối với server. Vui lòng thử lại.");
      return;
    }

    console.log("✅ google.script.run available");
    console.log("🚀 Calling getTopicContentByDocId...");

    // Call server function
    google.script.run
      .withSuccessHandler(function (response) {
        console.log("✅ Lesson content response:", response);
        console.log("📊 Response type:", typeof response);
        console.log("📊 Response.success:", response?.success);
        console.log("📊 Response.message:", response?.message);
        console.log("📊 Response.content length:", response?.content?.length);

        if (response && response.success) {
          // Hide loading
          document.getElementById("lesson-loading").style.display = "none";

          // Show content - Render Google Doc then enhance
          const contentArea = document.getElementById("lesson-content-area");
          contentArea.innerHTML = response.content;
          contentArea.style.display = "block";

          // ⭐ ENHANCE LESSON CONTENT - Apply all enhancements
          enhanceLessonContent();

          // Show lesson completion actions
          setTimeout(() => {
            const tabActions = document.getElementById("lesson-tab-actions");
            if (tabActions) tabActions.style.display = "flex";
          }, 2000);

          showToast("✅ Đã tải bài giảng", "success");
        } else {
          console.error("❌ Response failed:", response);
          showLessonError(response?.message || "Lỗi không xác định");
        }
      })
      .withFailureHandler(function (error) {
        console.error("❌ Error loading lesson:", error);
        console.error("❌ Error type:", typeof error);
        console.error("❌ Error message:", error?.message);
        console.error("❌ Error toString:", error?.toString());
        showLessonError(
          "Lỗi: " + (error?.message || error?.toString() || "Không xác định"),
        );
      })
      .getTopicContentByDocId(docId);
  }

  // ========== AI CONTENT LOADERS ==========

  /**
   * Load Mindmap from AI
   */
  function loadMindmap(forceRegenerate = false) {
    console.log("🧠 Loading Mindmap...");

    if (!currentLessonData?.topicId) {
      showMindmapError("Thiếu thông tin topic");
      return;
    }

    // Show loading
    document.getElementById("mindmap-loading").style.display = "block";
    document.getElementById("mindmap-error").style.display = "none";
    document.getElementById("mindmap-content").style.display = "none";

    google.script.run
      .withSuccessHandler(function (response) {
        console.log("✅ Mindmap response:", response);
        console.log("Response type:", typeof response);
        console.log("Response.success:", response?.success);
        console.log("Response.data type:", typeof response?.data);
        console.log("Response._isStringified:", response?._isStringified);

        document.getElementById("mindmap-loading").style.display = "none";

        if (response === null || response === undefined) {
          console.error("❌ Response is NULL - Server error occurred");
          showMindmapError(
            "Lỗi server: Không nhận được dữ liệu.\n\n" +
              "Kiểm tra:\n" +
              "1. API Key đã setup chưa?\n" +
              "2. Google Doc có quyền truy cập?\n" +
              "3. Xem Apps Script Logs để biết lỗi chi tiết",
          );
          return;
        }

        if (response && response.success && response.data) {
          // ⭐ Parse data nếu đã được stringify từ server
          let mindmapData = response.data;
          if (typeof mindmapData === "string") {
            try {
              mindmapData = JSON.parse(mindmapData);
              console.log("✅ Parsed mindmap data:", mindmapData);
            } catch (e) {
              console.error("❌ Failed to parse mindmap data:", e);
              showMindmapError("Lỗi parse dữ liệu mindmap");
              return;
            }
          }

          renderMindmap(mindmapData);
          document.getElementById("mindmap-content").style.display = "block";
          aiContentLoaded.mindmap = true;

          // Show mindmap completion checkbox
          const mindmapActions = document.getElementById("mindmap-tab-actions");
          if (mindmapActions) mindmapActions.style.display = "flex";

          // ⭐ Save mindmap progress when viewed
          saveMindmapProgress();

          showToast("✅ Đã tải Mindmap", "success");
        } else {
          console.error("❌ Response failed:", response?.message);
          showMindmapError(
            response?.message ||
              "Không thể tải Mindmap.\n\nKiểm tra Apps Script Logs.",
          );
        }
      })
      .withFailureHandler(function (error) {
        console.error("❌ Mindmap error:", error);
        document.getElementById("mindmap-loading").style.display = "none";
        showMindmapError(
          "Lỗi kết nối server:\n" +
            (error?.message || error?.toString() || "Unknown error"),
        );
      })
      .getAIContentForWeb(
        currentLessonData.topicId,
        "mindmap",
        forceRegenerate,
      );
  }

  /**
   * Load Flashcards from AI
   */
  function loadFlashcards(forceRegenerate = false) {
    console.log("🃏 Loading Flashcards...");
    console.log("🔄 Force Regenerate: " + forceRegenerate);

    if (!currentLessonData?.topicId) {
      showFlashcardsError("Thiếu thông tin topic");
      return;
    }

    // Show loading
    document.getElementById("flashcards-loading").style.display = "block";
    document.getElementById("flashcards-error").style.display = "none";
    document.getElementById("flashcards-content").style.display = "none";

    // Gọi backend với forceRegenerate flag
    google.script.run
      .withSuccessHandler(function (response) {
        console.log("✅ Flashcards response:", response);
        console.log("Response type:", typeof response);
        console.log("Response.success:", response?.success);
        console.log("Response.data type:", typeof response?.data);
        console.log("Response._isStringified:", response?._isStringified);

        document.getElementById("flashcards-loading").style.display = "none";

        if (response === null || response === undefined) {
          console.error("❌ Response is NULL - Server error occurred");
          showFlashcardsError(
            "Lỗi server: Không nhận được dữ liệu.\n\n" +
              "Kiểm tra:\n" +
              "1. API Key đã setup chưa?\n" +
              "2. Google Doc có quyền truy cập?\n" +
              "3. Xem Apps Script Logs để biết lỗi chi tiết",
          );
          return;
        }

        if (response && response.success && response.data) {
          // ⭐ Parse data nếu đã được stringify từ server
          let flashcardsRawData = response.data;
          if (typeof flashcardsRawData === "string") {
            try {
              flashcardsRawData = JSON.parse(flashcardsRawData);
              console.log("✅ Parsed flashcards data:", flashcardsRawData);
            } catch (e) {
              console.error("❌ Failed to parse flashcards data:", e);
              showFlashcardsError("Lỗi parse dữ liệu flashcards");
              return;
            }
          }

          const loadedCards = flashcardsRawData.cards || flashcardsRawData;
          fullFlashcardsData = JSON.parse(JSON.stringify(loadedCards || []));
          flashcardsData = JSON.parse(JSON.stringify(fullFlashcardsData));
          if (flashcardsData.length > 0) {
            currentFlashcardIndex = 0;
            initDeckState(); // Initialize deck tracking

            // Update total count
            const totalEl = document.getElementById("flashcard-total");
            if (totalEl) totalEl.textContent = flashcardsData.length;

            // Render flashcard FIRST (while still hidden)
            renderCurrentFlashcard();

            // THEN show content after card is ready
            const flashcardsContentEl =
              document.getElementById("flashcards-content");
            if (flashcardsContentEl) flashcardsContentEl.style.display = "flex";
            aiContentLoaded.flashcards = true;

            // Setup swipe gestures after content is visible
            setTimeout(() => {
              setupSwipeGestures();
            }, 100);

            showToast(
              "✅ Đã tải " + flashcardsData.length + " Flashcards",
              "success",
            );
          } else {
            showFlashcardsError("Không có flashcard nào");
          }
        } else {
          showFlashcardsError(response?.message || "Không thể tải Flashcards");
        }
      })
      .withFailureHandler(function (error) {
        console.error("❌ Flashcards error:", error);
        document.getElementById("flashcards-loading").style.display = "none";
        showFlashcardsError(error?.message || "Lỗi kết nối server");
      })
      .getAIContentForWeb(
        currentLessonData.topicId,
        "flashcards",
        forceRegenerate,
      );
  }

  // ========== SIMPLE TREE MINDMAP ==========

  // Color palette for branches
  const branchColors = [
    "purple",
    "blue",
    "green",
    "pink",
    "cyan",
    "yellow",
    "red",
    "indigo",
  ];

  /**
   * Render Simple Tree Mindmap
   * Layout: Root (left) → Branches (middle) → Children (right)
   * All content displayed at once, smooth curved connections
   */
  function renderMindmap(data) {
    const treeContainer = document.getElementById("tree-container");
    const connectionsLayer = document.getElementById("mindmap-connections");

    // Handle if data is still a string
    if (typeof data === "string") {
      console.warn("⚠️ Mindmap data is string, attempting to parse");
      try {
        data = JSON.parse(data);
      } catch (e) {
        console.error("❌ Cannot parse mindmap data:", e);
        showMindmapError("Lỗi: Dữ liệu mindmap không hợp lệ");
        return;
      }
    }

    // Validate data structure
    if (!data || typeof data !== "object") {
      console.error("❌ Invalid mindmap data structure:", data);
      showMindmapError("Lỗi: Cấu trúc dữ liệu mindmap không hợp lệ");
      return;
    }

    console.log("🌳 Rendering tree mindmap with data:", data);

    // Get root title
    const rootTitle =
      data.title ||
      data.centralIdea ||
      currentLessonData?.topicTitle ||
      "Chủ đề chính";

    // Get branches
    const branches = data.branches || data.nodes || [];

    // Clear containers
    treeContainer.innerHTML = "";
    connectionsLayer.innerHTML = "";

    if (branches.length === 0) {
      treeContainer.innerHTML = `
        <div style="text-align: center; color: #64748b; padding: 2rem;">
          <p>Không có dữ liệu mindmap</p>
        </div>
      `;
      return;
    }

    // Build tree structure
    // 1. Root node
    const rootEl = document.createElement("div");
    rootEl.className = "tree-root";
    rootEl.innerHTML = `<div class="root-node" id="root-node">${rootTitle}</div>`;
    treeContainer.appendChild(rootEl);

    // 2. Branches column
    const branchesEl = document.createElement("div");
    branchesEl.className = "tree-branches";

    branches.forEach((branch, index) => {
      const branchLabel = branch.label || branch.name || "Nhánh " + (index + 1);
      const branchColor = branchColors[index % branchColors.length];
      const children = branch.children || [];

      // Create branch row — collapsed by default
      const branchRow = document.createElement("div");
      branchRow.className = "tree-branch collapsed";
      branchRow.setAttribute("data-color", branchColor);
      branchRow.setAttribute("data-index", index);

      // Branch node — clickable to toggle children
      const branchNodeEl = document.createElement("div");
      branchNodeEl.className = "branch-node";
      branchNodeEl.id = `branch-${index}`;
      branchNodeEl.innerHTML =
        `<span class="branch-label">${branchLabel}</span>` +
        (children.length > 0
          ? `<span class="branch-toggle-icon">▸</span>`
          : "");

      if (children.length > 0) {
        branchNodeEl.style.cursor = "pointer";
        branchNodeEl.addEventListener("click", function () {
          const row = this.closest(".tree-branch");
          const isCollapsed = row.classList.contains("collapsed");
          row.classList.toggle("collapsed");
          row.classList.toggle("expanded");
          // Redraw connections after expand/collapse animation
          setTimeout(() => drawTreeConnections(branches), 320);
        });
      }
      branchRow.appendChild(branchNodeEl);

      // Children column (hidden by default via CSS .collapsed)
      if (children.length > 0) {
        const childrenEl = document.createElement("div");
        childrenEl.className = "branch-children";
        childrenEl.id = `children-${index}`;

        children.forEach((child, childIdx) => {
          const childText =
            typeof child === "string" ? child : child.label || child.name || "";

          const childNode = document.createElement("div");
          childNode.className = "child-node";
          childNode.id = `child-${index}-${childIdx}`;
          childNode.textContent = childText;
          childrenEl.appendChild(childNode);
        });

        branchRow.appendChild(childrenEl);
      }

      branchesEl.appendChild(branchRow);
    });

    treeContainer.appendChild(branchesEl);

    // Draw initial connections (root→branch only, children hidden)
    setTimeout(() => {
      drawTreeConnections(branches);
    }, 50);
  }

  /**
   * Draw smooth curved connections between nodes
   */
  function drawTreeConnections(branches) {
    const svg = document.getElementById("mindmap-connections");
    const container = document.querySelector(".mindmap-tree");

    if (!svg || !container) return;

    svg.innerHTML = "";

    // Get container bounds for relative positioning
    const containerRect = container.getBoundingClientRect();

    // Get root node position
    const rootNode = document.getElementById("root-node");
    if (!rootNode) return;

    const rootRect = rootNode.getBoundingClientRect();
    const rootX = rootRect.right - containerRect.left;
    const rootCenterY = rootRect.top + rootRect.height / 2 - containerRect.top;

    // Draw connections for each branch
    branches.forEach((branch, index) => {
      const branchNode = document.getElementById(`branch-${index}`);
      if (!branchNode) return;

      const branchRect = branchNode.getBoundingClientRect();
      const branchX = branchRect.left - containerRect.left;
      const branchCenterY =
        branchRect.top + branchRect.height / 2 - containerRect.top;

      // Get color for this branch
      const branchColor = branchColors[index % branchColors.length];
      const lineColor = getLineColor(branchColor);

      // Draw root → branch curved line
      const rootPath = createCurvedPath(
        rootX,
        rootCenterY,
        branchX,
        branchCenterY,
        lineColor,
        2,
        "root-branch",
      );
      svg.appendChild(rootPath);

      // Draw branch → children connections only if expanded
      const branchEl = document.querySelector(
        `.tree-branch[data-index="${index}"]`,
      );
      const isExpanded = branchEl && !branchEl.classList.contains("collapsed");

      if (isExpanded) {
        const children = branch.children || [];
        children.forEach((child, childIdx) => {
          const childNode = document.getElementById(
            `child-${index}-${childIdx}`,
          );
          if (!childNode) return;

          const childRect = childNode.getBoundingClientRect();
          const branchRightX = branchRect.right - containerRect.left;
          const childX = childRect.left - containerRect.left;
          const childCenterY =
            childRect.top + childRect.height / 2 - containerRect.top;

          const childPath = createCurvedPath(
            branchRightX,
            branchCenterY,
            childX,
            childCenterY,
            lineColor,
            1.5,
            "branch-child",
          );
          svg.appendChild(childPath);
        });
      }
    });
  }

  /**
   * Create a smooth curved SVG path
   */
  function createCurvedPath(x1, y1, x2, y2, color, strokeWidth, className) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    // Control point offset for smooth S-curve
    const cpOffset = (x2 - x1) * 0.5;

    // Path: start → curve → end
    const d = `M ${x1} ${y1} C ${x1 + cpOffset} ${y1}, ${
      x2 - cpOffset
    } ${y2}, ${x2} ${y2}`;

    path.setAttribute("d", d);
    path.setAttribute("stroke", color);
    path.setAttribute("stroke-width", strokeWidth);
    path.setAttribute("fill", "none");
    path.setAttribute("stroke-linecap", "round");
    path.setAttribute("class", `tree-line ${className}`);

    return path;
  }

  /**
   * Get line color based on branch color name
   */
  function getLineColor(colorName) {
    const colorMap = {
      purple: "#a78bfa",
      blue: "#93c5fd",
      green: "#86efac",
      pink: "#f9a8d4",
      cyan: "#67e8f9",
      yellow: "#fde047",
      red: "#fca5a5",
      indigo: "#a5b4fc",
    };
    return colorMap[colorName] || "#94a3b8";
  }

  /**
   * Redraw connections on window resize
   */
  let resizeTimeout;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      // Get branches from current tree

  /**
   * Render current flashcard
   */
  function renderCurrentFlashcard() {
    if (!flashcardsData || flashcardsData.length === 0) return;

    const card = flashcardsData[currentFlashcardIndex];
    const flashcardWrapper = document.getElementById("flashcard-wrapper");
    const flashcardEl = document.getElementById("current-flashcard");
    const frontTextEl = document.getElementById("flashcard-front-text");
    const backTextEl = document.getElementById("flashcard-back-text");
    const currentEl = document.getElementById("flashcard-current");

    // Check if elements exist
    if (!flashcardEl || !frontTextEl || !backTextEl) {
      console.error("❌ Flashcard DOM elements not found:", {
        flashcardEl: !!flashcardEl,
        frontTextEl: !!frontTextEl,
        backTextEl: !!backTextEl,
      });
      return;
    }

    // Remove flipped state
    flashcardEl.classList.remove("flipped");

    console.log("🃏 Rendering flashcard:", card);

    // Xử lý dữ liệu lồng nhau từ AI
    let frontText = "";
    let backText = "";

    // Xử lý front (mặt trước)
    if (card.front && typeof card.front === "object") {
      frontText = card.front.content || card.front.term || "";
    } else {
      frontText = card.term || card.front || "";
    }

    // Xử lý back (mặt sau)
    if (card.back && typeof card.back === "object") {
      backText = card.back.content || card.back.definition || "";
    } else {
      backText = card.definition || card.back || "";
    }

    // Fallback nếu không có dữ liệu
    if (!frontText && !backText) {
      console.error("❌ Unknown flashcard structure:", card);
      frontText = "Lỗi dữ liệu flashcard";
      backText = JSON.stringify(card);
    }

    // Update content
    frontTextEl.textContent = frontText;
    backTextEl.textContent = backText;
    if (currentEl) currentEl.textContent = currentFlashcardIndex + 1;

    // Update progress bar
    updateDeckProgress();
  }

    if (flashcardResults[currentFlashcardIndex] !== "learned") {
      // Remove from review if it was there
      if (flashcardResults[currentFlashcardIndex] === "review") {
        reviewCount--;
      }
      flashcardResults[currentFlashcardIndex] = "learned";
      learnedCount++;
      updateDeckProgress(); // Update progress bar immediately
    }

    // Animate card flying right
    animateCardOut("right", () => {
      if (currentFlashcardIndex < flashcardsData.length - 1) {
        currentFlashcardIndex++;
        animateCardIn();
        renderCurrentFlashcard();
      } else {
        showDeckComplete();
      }
    });
  }

  /**

    if (flashcardResults[currentFlashcardIndex] !== "review") {

      if (flashcardResults[currentFlashcardIndex] === "learned") {
        learnedCount--;
      }
      flashcardResults[currentFlashcardIndex] = "review";
      reviewCount++;
      updateDeckProgress(); // Update progress bar immediately

    // Animate card flying left
    animateCardOut("left", () => {
      if (currentFlashcardIndex < flashcardsData.length - 1) {

      } else {

  function shuffleFlashcards() {
    // Fisher-Yates shuffle
    for (let i = flashcardsData.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [flashcardsData[i], flashcardsData[j]] = [
        flashcardsData[j],
        flashcardsData[i],

    }
    currentFlashcardIndex = 0;
    initDeckState();
    renderCurrentFlashcard();
    showToast("🔀 Đã xáo trộn thẻ", "success");

  /**
   * Setup swipe gestures for flashcards
   */
  function setupSwipeGestures() {
    const flashcardWrapper = document.getElementById("flashcard-wrapper");
    if (!flashcardWrapper) return;

    let startX = 0;
    let startY = 0;
    let currentX = 0;
    let isDragging = false;

    const swipeLeftIndicator = document.getElementById("swipe-left-indicator");
    const swipeRightIndicator = document.getElementById(
      "swipe-right-indicator",
    );

    flashcardWrapper.addEventListener(
      "touchstart",
      (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isDragging = true;
        flashcardWrapper.classList.add("dragging");
      },
      { passive: true },
    );

    flashcardWrapper.addEventListener(
      "touchmove",
      (e) => {
        if (!isDragging) return;

        currentX = e.touches[0].clientX - startX;
        const currentY = e.touches[0].clientY - startY;

        // Only handle horizontal swipes
        if (Math.abs(currentX) > Math.abs(currentY)) {
          flashcardWrapper.style.transform = `translateX(${currentX}px) rotate(${
            currentX * 0.05
          }deg)`;

          // Show swipe indicators
          if (currentX < -50 && swipeLeftIndicator) {
            swipeLeftIndicator.classList.add("visible");
            swipeRightIndicator?.classList.remove("visible");
          } else if (currentX > 50 && swipeRightIndicator) {
            swipeRightIndicator.classList.add("visible");
            swipeLeftIndicator?.classList.remove("visible");
          } else {
            swipeLeftIndicator?.classList.remove("visible");
            swipeRightIndicator?.classList.remove("visible");
          }
        }
      },
      { passive: true },
    );

    flashcardWrapper.addEventListener("touchend", () => {
      isDragging = false;
      flashcardWrapper.classList.remove("dragging");
      flashcardWrapper.style.transform = "";

      swipeLeftIndicator?.classList.remove("visible");
      swipeRightIndicator?.classList.remove("visible");

      // Trigger action based on swipe distance
      if (currentX < -100) {
        markAsReview();
      } else if (currentX > 100) {
        markAsLearned();
      }

      currentX = 0;
    });
  }

  /**
   * Setup keyboard shortcuts for flashcards

    document.addEventListener("keydown", (e) => {
      // Only handle if flashcards tab is active
      const flashcardsTab = document.getElementById("tab-flashcards");
      if (!flashcardsTab || !flashcardsTab.classList.contains("active")) return;
      if (!flashcardsData || flashcardsData.length === 0) return;

      switch (e.key) {
        case " ":
        case "Enter":
          e.preventDefault();
          flipFlashcard();
          break;
        case "ArrowLeft":
          e.preventDefault();
          markAsReview();
          break;
        case "ArrowRight":
          e.preventDefault();
          markAsLearned();
          break;
        case "ArrowUp":
          e.preventDefault();
          prevFlashcard();
          break;
        case "ArrowDown":
          e.preventDefault();
          nextFlashcard();
          break;
      }
    });
  }

  /**
   * Setup scroll tracking for reading progress
   */
  function setupScrollTracking() {
    // Use page-level scroll since #page-lesson is the scroll container
    window.addEventListener("scroll", function () {
      const contentArea = document.getElementById("lesson-content-area");
      if (!contentArea || contentArea.style.display === "none") return;

      // Only track when lesson tab is active
      const lessonTab = document.getElementById("tab-lesson");
      if (!lessonTab || !lessonTab.classList.contains("active")) return;

      const rect = contentArea.getBoundingClientRect();
      const contentHeight = contentArea.scrollHeight;
      const viewportHeight = window.innerHeight;

      // How much of the content has scrolled past the top of the viewport
      const scrolled = -rect.top;
      const scrollable = contentHeight - viewportHeight;
      const progress =
        scrollable > 0
          ? Math.min(100, Math.max(0, (scrolled / scrollable) * 100))
          : 100;

      scrollProgress = progress;
    });
  }

    // Update the global cache progress for current topic
    if (window.globalTopicsCache) {
      if (!window.globalTopicsCache.progress) {
        window.globalTopicsCache.progress = {};
      }
      if (!window.globalTopicsCache.progress[currentTopicId]) {
        window.globalTopicsCache.progress[currentTopicId] = {};
      }
      window.globalTopicsCache.progress[currentTopicId].lessonCompleted =
        isCompleted;
    }

    // Re-render the topic list with updated statuses
    const listEl = document.getElementById("topicSwitcherList");
    if (listEl) {
      let topics = null;
      if (window.globalTopicsCache && window.globalTopicsCache.data) {
        topics = window.globalTopicsCache.data;
      }
      if (topics && topics.length > 0) {
        renderTopicSwitcherList(topics);
      }
    }
  }

  // ========================================
  // ⭐ OVERALL PROGRESS TRACKING (33% each tab)
  // ========================================

  /**
   * Calculate and update overall progress
   * 4 phần riêng biệt, mỗi phần 25%:
   * - Bài học (Lesson read): 25%
   * - Mindmap (viewed checkbox): 25%
   * - Flashcard (all cards viewed): 25%
   * - Mini Quiz (completed all 5 questions): 25%
   */
  function updateOverallProgress() {
    // Lesson progress (25%)
    let lessonPct = tabCompletion.lessonRead ? 100 : 0;

    // Mindmap progress (25%)
    let mindmapPct = tabCompletion.mindmapViewed ? 100 : 0;

    // Flashcard progress (25%)
    let flashcardPct = tabCompletion.flashcardsDone ? 100 : 0;
    if (!tabCompletion.flashcardsDone && flashcardsData.length > 0) {
      const seen = learnedCount + reviewCount;
      flashcardPct = Math.round((seen / flashcardsData.length) * 100);
    }

    // Mini Quiz progress (25%)
    let miniQuizPct = tabCompletion.lessonQuiz ? 100 : 0;

    // Overall progress (25% each)
    const overallPct = Math.round(
      lessonPct * 0.25 +
        mindmapPct * 0.25 +
        flashcardPct * 0.25 +
        miniQuizPct * 0.25,
    );

    // Update overall progress bar
    const progressBar = document.getElementById("overall-progress-bar");
    const progressText = document.getElementById("overall-progress-text");
    if (progressBar) progressBar.style.width = overallPct + "%";
    if (progressText) progressText.textContent = overallPct + "%";

    // Update sidebar progress
    const sidebarBar = document.getElementById("sidebar-progress-bar");
    const sidebarText = document.getElementById("sidebar-progress-text");
    if (sidebarBar) sidebarBar.style.width = overallPct + "%";
    if (sidebarText) sidebarText.textContent = overallPct + "% hoàn thành";

    // Update segment statuses
    const segLessonStatus = document.getElementById("seg-lesson-status");
    const segMindmapStatus = document.getElementById("seg-mindmap-status");
    const segFlashcardsStatus = document.getElementById(
      "seg-flashcards-status",
    );
    const segMiniQuizStatus = document.getElementById("seg-miniquiz-status");
    if (segLessonStatus) segLessonStatus.textContent = lessonPct + "%";
    if (segMindmapStatus) segMindmapStatus.textContent = mindmapPct + "%";
    if (segFlashcardsStatus)
      segFlashcardsStatus.textContent = flashcardPct + "%";
    if (segMiniQuizStatus) segMiniQuizStatus.textContent = miniQuizPct + "%";

    // Update segment completed state
    const segLesson = document.getElementById("seg-lesson");
    const segMindmap = document.getElementById("seg-mindmap");
    const segFlashcards = document.getElementById("seg-flashcards");
    const segMiniQuiz = document.getElementById("seg-miniquiz");
    if (segLesson) segLesson.classList.toggle("completed", lessonPct >= 100);
    if (segMindmap) segMindmap.classList.toggle("completed", mindmapPct >= 100);
    if (segFlashcards)
      segFlashcards.classList.toggle("completed", flashcardPct >= 100);
    if (segMiniQuiz)
      segMiniQuiz.classList.toggle("completed", miniQuizPct >= 100);

    // Update sidebar nav tab check marks
    const checkLesson = document.getElementById("nav-check-lesson");
    const checkMindmap = document.getElementById("nav-check-mindmap");
    const checkFlashcards = document.getElementById("nav-check-flashcards");
    const checkMiniQuiz = document.getElementById("nav-check-miniquiz");
    if (checkLesson) checkLesson.textContent = lessonPct >= 100 ? "✅" : "";
    if (checkMindmap) checkMindmap.textContent = mindmapPct >= 100 ? "✅" : "";
    if (checkFlashcards)
      checkFlashcards.textContent = flashcardPct >= 100 ? "✅" : "";
    if (checkMiniQuiz)
      checkMiniQuiz.textContent = miniQuizPct >= 100 ? "✅" : "";

    // Update nav tab completed class
    document.querySelectorAll(".lesson-nav-tab").forEach((tab) => {
      const tabName = tab.dataset.tab;
      if (tabName === "lesson") {
        tab.classList.toggle(
          "completed",
          lessonPct >= 100 && miniQuizPct >= 100,
        );
      }
      if (tabName === "mindmap") {
        tab.classList.toggle("completed", mindmapPct >= 100);
      }
      if (tabName === "flashcards") {
        tab.classList.toggle("completed", flashcardPct >= 100);
      }
    });

    // Show celebration if 100%
    if (overallPct >= 99) {
      showToast("🎉 Chúc mừng! Bạn đã hoàn thành 100% bài học!", "success");
    }

    console.log("📊 Overall progress:", overallPct + "%", {
      lesson: lessonPct,
      mindmap: mindmapPct,
      flashcard: flashcardPct,
      miniQuiz: miniQuizPct,
    });
  }

  /**
   * Handler: Lesson "Đánh dấu đã đọc" checkbox
   * One-way: once checked, cannot be unchecked. Permanently locks per topic.
   */
  window.onLessonReadChecked = function (checkbox) {
    // One-way: if already completed, force back to checked and do nothing
    if (tabCompletion.lessonRead) {
      checkbox.checked = true;
      return;
    }

    if (!checkbox.checked) return; // Only react to checking, not unchecking

    // Mark as read — permanent for this topic
    tabCompletion.lessonRead = true;
    console.log(
      "📖 Lesson read completed (permanent) for topic:",
      currentLessonData?.topicId,
    );

    // ⭐ Save to localStorage immediately (survives topic switches)
    saveLocalProgress(currentLessonData?.topicId);
    // ⭐ Invalidate topics cache IMMEDIATELY so Topics page refetches
    invalidateProgressCache();

    // Lock checkbox so user cannot uncheck
    checkbox.disabled = true;
    var label = document.getElementById("lesson-read-check");
    if (label) label.classList.add("completed-locked");

    // Save to server with timestamp
    saveLessonProgress(true);
    showToast("✅ Đã đánh dấu đọc xong!", "success");

    // Unlock mini quiz dropdown for this topic
    unlockMiniQuizDropdown();
    updateOverallProgress();

  /**
   * Load saved progress for this topic from backend and restore UI state
   */
  function loadSavedTopicProgress(topicId) {
    if (!topicId) return;
    console.log("📊 Loading saved progress for topic:", topicId);

    // ⭐ STEP 1: Restore from localStorage immediately (synchronous, no latency)
    var localData = loadLocalProgress(topicId);
    if (localData) {
      console.log("📦 Restoring from localStorage cache:", localData);
      restoreTopicProgress({
        lessonCompleted: localData.lessonRead || false,
        miniQuizCompleted: localData.lessonQuiz || false,
        mindmapViewed: localData.mindmapViewed || false,
        flashcardsCompleted: localData.flashcardsDone || false,
      });
    }

    // ⭐ STEP 2: Also fetch from server (source of truth) — merges on arrival
    google.script.run
      .withSuccessHandler(function (response) {
        console.log("📊 Topic progress from server:", response);
        if (response && response.success && response.data) {
          // Merge: server true values always win over local false values
          var merged = response.data;
          if (localData) {
            merged.lessonCompleted =
              merged.lessonCompleted || localData.lessonRead || false;
            merged.miniQuizCompleted =
              merged.miniQuizCompleted || localData.lessonQuiz || false;
            merged.mindmapViewed =
              merged.mindmapViewed || localData.mindmapViewed || false;
            merged.flashcardsCompleted =
              merged.flashcardsCompleted || localData.flashcardsDone || false;
          }
          restoreTopicProgress(merged);
          // Update localStorage with merged data
          saveLocalProgress(topicId);
        }
      })
      .withFailureHandler(function (error) {
        console.warn("⚠️ Could not load topic progress from server:", error);
        // localStorage data already restored above, so UI is correct
      })
      .getTopicProgressForWeb(topicId);
  }

  /**
   * Restore UI state from saved progress data
   */
  function restoreTopicProgress(data) {
    console.log("🔄 Restoring topic progress:", data);

    // Restore lesson read checkbox (one-way: check + disable permanently)
    if (data.lessonCompleted) {
      tabCompletion.lessonRead = true;
      var readCheckbox = document.getElementById("lesson-read-checkbox");
      if (readCheckbox) {
        readCheckbox.checked = true;
        readCheckbox.disabled = true;
      }
      var readLabel = document.getElementById("lesson-read-check");
      if (readLabel) readLabel.classList.add("completed-locked");
    }

    // Restore mini quiz completed state
    if (data.miniQuizCompleted) {
      tabCompletion.lessonQuiz = true;
      // Mark as loaded so unlockMiniQuizDropdown won't auto-load from server
      miniQuizLoaded = true;
    }

    // Unlock mini quiz dropdown if lesson was read (must be after miniQuizLoaded flag)
    if (data.lessonCompleted) {
      unlockMiniQuizDropdown();
    }

    // Override badge to completed state if quiz was done
    if (data.miniQuizCompleted) {
      var badge = document.getElementById("mini-quiz-status-badge");
      if (badge) {
        badge.textContent = "Hoàn thành ✅";
        badge.classList.add("completed");
        badge.classList.remove("ready");
      }
      var icon = document.getElementById("mini-quiz-toggle-icon");
      if (icon) icon.textContent = "✅";
      var desc = document.getElementById("mini-quiz-toggle-desc");
      if (desc) desc.textContent = "Bạn đã hoàn thành Mini Quiz cho topic này";
    }

    // Restore mindmap viewed
    if (data.mindmapViewed) {
      tabCompletion.mindmapViewed = true;
      var mindmapCheckbox = document.getElementById("mindmap-view-checkbox");
      if (mindmapCheckbox) mindmapCheckbox.checked = true;
    }

    // Restore flashcards completed
    if (data.flashcardsCompleted) {
      tabCompletion.flashcardsDone = true;
    }

    // Update overall progress bar & sidebar
    updateOverallProgress();
  }

  let miniQuizData = null; // Stores the 5 questions from AI
  let miniQuizAnswered = 0; // How many questions have been answered

  /**
   * Reset ALL lesson completion UI to clean defaults.
   * Must be called on every topic switch so no stale state leaks between topics.
   */
  function resetAllLessonUI() {
    // 1) Reset "Đã đọc xong" checkbox to unchecked + enabled
    var readCheckbox = document.getElementById("lesson-read-checkbox");
    if (readCheckbox) {
      readCheckbox.checked = false;
      readCheckbox.disabled = false;
    }
    var readLabel = document.getElementById("lesson-read-check");
    if (readLabel) readLabel.classList.remove("completed-locked");

    var mindmapCheckbox = document.getElementById("mindmap-view-checkbox");

      mindmapCheckbox.checked = false;
      mindmapCheckbox.disabled = false;
    }
    var mindmapLabel = document.getElementById("mindmap-view-check");
    if (mindmapLabel) mindmapLabel.classList.remove("completed-locked");

    // 3) Reset Mini Quiz DOM (questions, result, lock state)
    resetMiniQuizUI();

  /**
   * Reset Mini Quiz DOM to initial locked state
   * Called when switching topics to clear old quiz and re-lock

    // Clear questions & result
    const questionsEl = document.getElementById("mini-quiz-questions");
    const resultEl = document.getElementById("mini-quiz-result");
    const loadingEl = document.getElementById("mini-quiz-loading");

  /**
   * Unlock the mini quiz dropdown after marking lesson as read
   */

  /**
   * Lock the mini quiz dropdown
   */
  function lockMiniQuizDropdown() {
    const section = document.getElementById("mini-quiz-section");
    const toggle = document.getElementById("mini-quiz-toggle");
    const icon = document.getElementById("mini-quiz-toggle-icon");
    const desc = document.getElementById("mini-quiz-toggle-desc");
    const badge = document.getElementById("mini-quiz-status-badge");
    const content = document.getElementById("mini-quiz-dropdown-content");

    if (section) section.classList.add("locked");
    if (toggle) toggle.disabled = true;
    if (icon) icon.textContent = "🔒";
    if (desc) desc.textContent = "Đánh dấu đã đọc xong để mở khóa";
    if (badge) {
      badge.textContent = "Chưa mở khóa";
      badge.classList.remove("ready", "completed");
    }
    if (content) content.classList.remove("open");
    if (section) section.classList.remove("expanded");
  }

  /**
   * Toggle mini quiz dropdown open/close
   */
  function toggleMiniQuizDropdown() {
    const section = document.getElementById("mini-quiz-section");
    const content = document.getElementById("mini-quiz-dropdown-content");

    if (!section || section.classList.contains("locked")) return;

    const isOpen = content.classList.contains("open");
    if (isOpen) {
      content.classList.remove("open");
      section.classList.remove("expanded");
    } else {
      content.classList.add("open");
      section.classList.add("expanded");
    }
  }

  /**
   * Load Mini Quiz from AI (5 key questions from lesson content)
   */
  function loadMiniQuiz(forceRegenerate) {
    if (!currentLessonData?.topicId) return;

    console.log("🧠 Loading Mini Quiz...");

    const loadingEl = document.getElementById("mini-quiz-loading");
    const errorEl = document.getElementById("mini-quiz-error");
    const questionsEl = document.getElementById("mini-quiz-questions");
    const resultEl = document.getElementById("mini-quiz-result");

    if (loadingEl) loadingEl.style.display = "block";
    if (errorEl) errorEl.style.display = "none";
    if (questionsEl) {
      questionsEl.style.display = "none";
      questionsEl.innerHTML = "";
    }
    if (resultEl) resultEl.style.display = "none";

    google.script.run
      .withSuccessHandler(function (response) {
        console.log("✅ Mini Quiz response:", response);
        if (loadingEl) loadingEl.style.display = "none";

        if (response && response.success && response.data) {
          let quizData = response.data;
          if (typeof quizData === "string") {
            try {
              quizData = JSON.parse(quizData);
            } catch (e) {
              showMiniQuizError("Lỗi parse dữ liệu Mini Quiz");
              return;
            }
          }

          miniQuizData = quizData.questions || quizData;
          if (!Array.isArray(miniQuizData) || miniQuizData.length === 0) {
            showMiniQuizError("Không có câu hỏi nào được tạo");
            return;
          }

          miniQuizLoaded = true;
          miniQuizAnswered = 0;
          renderMiniQuizQuestions(miniQuizData);
          if (questionsEl) questionsEl.style.display = "block";
        } else {
          showMiniQuizError(response?.message || "Không thể tạo Mini Quiz");
        }
      })
      .withFailureHandler(function (error) {
        console.error("❌ Mini Quiz error:", error);
        if (loadingEl) loadingEl.style.display = "none";
        showMiniQuizError(error?.message || "Lỗi kết nối server");
      })
      .getAIContentForWeb(
        currentLessonData.topicId,
        "mini_quiz",
        forceRegenerate || false,
      );
  }

  /**
   * Show mini quiz error
   */
  function showMiniQuizError(msg) {
    const errorEl = document.getElementById("mini-quiz-error");
    const errorMsg = document.getElementById("mini-quiz-error-msg");
    if (errorEl) errorEl.style.display = "block";
    if (errorMsg) errorMsg.textContent = msg;
  }

  /**
   * Render the 5 mini quiz questions
   */
  function renderMiniQuizQuestions(questions) {
    const container = document.getElementById("mini-quiz-questions");
    if (!container) return;

    container.innerHTML = `

  /**

  function selectMiniQuizOption(optionEl, qIdx, optIdx) {
    var qEl = document.getElementById("mq-q-" + qIdx);
    if (!qEl || qEl.dataset.answered === "true") return; // Already answered

    // Mark as answered
    qEl.dataset.answered = "true";
    qEl.classList.add("answered");

    var question = miniQuizData[qIdx];
    var correctIdx = question.correctAnswer;
    if (typeof correctIdx === "undefined") correctIdx = 0;

    var isCorrect = optIdx === correctIdx;

    // Show selection
    optionEl.classList.add("selected");
    if (isCorrect) {
      optionEl.classList.add("correct");
    } else {
      optionEl.classList.add("incorrect");
      // Highlight correct answer
      var correctOpt = qEl.querySelector(
        '.mq-option[data-idx="' + correctIdx + '"]',
      );
      if (correctOpt) correctOpt.classList.add("correct");
    }

    // Show explanation
    var explainEl = document.getElementById("mq-explain-" + qIdx);
    if (explainEl) {
      var explanation =
        question.explanation ||
        "Đáp án đúng là: " +
          (question.options[correctIdx]?.text ||
            question.options[correctIdx] ||
            "");
      explainEl.innerHTML =
        '<div class="mq-explain-header">' +
        (isCorrect ? "✅ Chính xác!" : "❌ Chưa đúng") +
        "</div>" +
        '<div class="mq-explain-text">' +
        explanation +
        "</div>";
      explainEl.style.display = "block";
      explainEl.className =
        "mq-explanation " + (isCorrect ? "correct" : "incorrect");
    }

    // Update progress
    miniQuizAnswered++;
    var progressFill = document.getElementById("mq-progress-fill");
    var progressText = document.getElementById("mq-progress-text");
    var pct = Math.round((miniQuizAnswered / 5) * 100);
    if (progressFill) progressFill.style.width = pct + "%";

  // ========================================

  /**
   * Parse and transform content markers from Google Doc
   * Supports: [[COLOR:X]], [[CODE:X]], [[EXAMPLE]], [[NOTE]], [[TIP]], [[WARNING]], [[CHECKPOINT]], [[TASK]], [[QA]]
   */
  function parseContentMarkers(container) {
    console.log("🏷️ Parsing content markers...");
    let html = container.innerHTML;

    // === 1. COLOR SECTIONS [[COLOR:X]] ... [[/COLOR]] or until next H3 ===
    const colorMap = {
      ORANGE: "lesson-section-orange",
      RED: "lesson-section-red",
      BLUE: "lesson-section-blue",
      GREEN: "lesson-section-green",
      PURPLE: "lesson-section-purple",
      CYAN: "lesson-section-cyan",
    };

    // Simple color marker at start of section
    for (const [color, className] of Object.entries(colorMap)) {
      const regex = new RegExp(`\\[\\[COLOR:${color}\\]\\]`, "gi");
      html = html.replace(regex, `<div class="${className}">`);
    }
    html = html.replace(/\[\[\/COLOR\]\]/gi, "</div>");

    // === 2. CODE BLOCKS [[CODE:PYTHON]] ... [[/CODE]] ===
    html = html.replace(
      /\[\[CODE:(\w+)\]\]([\s\S]*?)\[\[\/CODE\]\]/gi,
      (match, lang, code) => {
        const cleanCode = code
          .trim()
          .replace(/<\/p>/gi, "\n")
          .replace(/<br\s*\/?>/gi, "\n")
          .replace(/<\/div>/gi, "\n")
          .replace(/<[^>]*>/g, "")
          .replace(/&nbsp;/g, " ")
          .replace(/&lt;/g, "<")
          .replace(/&gt;/g, ">")
          .replace(/&amp;/g, "&")
          .replace(/^\n+|\n+$/g, "");
        const isPython = lang.toLowerCase() === "python";
        const runBtn = isPython
          ? `
            <button class="btn-run-code" onclick="runPythonCode(this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5,3 19,12 5,21"/>
              </svg>
              Run
            </button>`
          : "";
        return `
        <div class="code-block-wrapper">
          <div class="code-block-header">
            <span class="code-block-lang">${lang.toUpperCase()}</span>
            <div class="code-block-actions">
              ${runBtn}
              <button class="btn-copy-code" onclick="copyCodeToClipboard(this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy
              </button>
            </div>
          </div>
          <pre><code class="language-${lang.toLowerCase()}">${escapeHtml(cleanCode)}</code></pre>
        </div>`;
      },
    );

    // === 3. EXAMPLE BLOCKS [[EXAMPLE]] ... [[/EXAMPLE]] ===
    html = html.replace(
      /\[\[EXAMPLE\]\]([\s\S]*?)\[\[\/EXAMPLE\]\]/gi,
      (match, content) => {
        return `<div class="example-block">${content}</div>`;
      },
    );

    // === 4. CALLOUT BLOCKS ===
    const calloutTypes = [
      { marker: "NOTE", class: "callout-note" },
      { marker: "TIP", class: "callout-tip" },
      { marker: "WARNING", class: "callout-warning" },
      { marker: "CHECKPOINT", class: "callout-checkpoint" },
      { marker: "TASK", class: "callout-task" },
      { marker: "QA", class: "callout-qa" },
      { marker: "HIGHLIGHT", class: "callout-highlight" },
    ];

    for (const type of calloutTypes) {
      const regex = new RegExp(
        `\\[\\[${type.marker}\\]\\]([\\s\\S]*?)\\[\\[\\/${type.marker}\\]\\]`,
        "gi",
      );
      html = html.replace(regex, (match, content) => {
        return `<div class="${type.class}">${content}</div>`;
      });
    }

    // === 5. MARKDOWN CODE BLOCKS ```python ... ``` ===
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
      const language = lang || "plaintext";
      const cleanCode = code
        .trim()
        .replace(/<\/p>/gi, "\n")
        .replace(/<br\s*\/?>/gi, "\n")
        .replace(/<\/div>/gi, "\n")
        .replace(/<[^>]*>/g, "")
        .replace(/&nbsp;/g, " ")
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">")
        .replace(/&amp;/g, "&")
        .replace(/^\n+|\n+$/g, "");
      const isPython = language.toLowerCase() === "python";
      const runBtn = isPython
        ? `
            <button class="btn-run-code" onclick="runPythonCode(this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                <polygon points="5,3 19,12 5,21"/>
              </svg>
              Run
            </button>`
        : "";
      return `
        <div class="code-block-wrapper">
          <div class="code-block-header">
            <span class="code-block-lang">${language.toUpperCase()}</span>
            <div class="code-block-actions">
              ${runBtn}
              <button class="btn-copy-code" onclick="copyCodeToClipboard(this)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                  <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
                </svg>
                Copy
              </button>
            </div>
          </div>
          <pre><code class="language-${language.toLowerCase()}">${escapeHtml(cleanCode)}</code></pre>
        </div>`;
    });

    // === 6. RESOURCE LINKS section ===
    html = html.replace(
      /\[\[RESOURCES\]\]([\s\S]*?)\[\[\/RESOURCES\]\]/gi,
      (match, content) => {
        return `<div class="resource-links">${content}</div>`;
      },
    );

    // === 7. FIGURE with caption ===
    html = html.replace(
      /\[\[FIGURE:([^\]]*)\]\]([\s\S]*?)\[\[\/FIGURE\]\]/gi,
      (match, caption, content) => {
        return `<figure>${content}<figcaption>${caption}</figcaption></figure>`;
      },
    );

    // === 8. ⭐ GRID CARDS [[GRID]] ... [[/GRID]] ===
    // Chỉ list bên trong marker này mới được biến thành grid cards
    html = html.replace(
      /\[\[GRID\]\]([\s\S]*?)\[\[\/GRID\]\]/gi,
      (match, content) => {
        return `<div class="grid-cards-section">${content}</div>`;
      },
    );

    // === 9. 🖥️ TERMINAL / CONSOLE OUTPUT [[TERMINAL]] ... [[/TERMINAL]] ===
    // Hiển thị output terminal/console dạng nền đen, có syntax highlighting
    // Hỗ trợ: [[TERMINAL:PYTHON]] hoặc [[TERMINAL]] (mặc định)
    html = html.replace(
      /\[\[TERMINAL(?::([\w]*))?\]\]([\s\S]*?)\[\[\/TERMINAL\]\]/gi,
      (match, lang, content) => {
        const language = (lang || "shell").toLowerCase();
        const cleanContent = content
          .trim()
          .replace(/<\/p>/gi, "\n")
          .replace(/<br\s*\/?>/gi, "\n")
          .replace(/<\/div>/gi, "\n")
          .replace(/<[^>]*>/g, "")
          .replace(/&nbsp;/g, " ")
          .replace(/&lt;/g, "<")
          .replace(/&gt;/g, ">")
          .replace(/&amp;/g, "&")
          .replace(/^\n+|\n+$/g, "");

        // Highlight từng dòng: prompt (>>>), output, path (C:\...>), comment (#)
        const lines = cleanContent.split("\n");
        const highlightedLines = lines
          .map((line) => {
            const escaped = escapeHtml(line);
            // Python prompt >>>
            if (/^\s*>>>/.test(line)) {
              return `<span class="terminal-prompt">${escaped.replace(/^(\s*&gt;&gt;&gt;|\s*>>>)/, '<span class="terminal-prompt-symbol">$1</span>')}</span>`;
            }
            // Python continuation ...
            if (/^\s*\.\.\./.test(line)) {
              return `<span class="terminal-prompt">${escaped}</span>`;
            }
            // Windows/Linux shell prompt (C:\...> or $ or %)
            if (/^\s*[A-Z]:\\.*>/.test(line) || /^\s*[\$%#]\s/.test(line)) {
              return `<span class="terminal-prompt">${escaped.replace(/^(\s*[A-Z]:\\[^>]*>|\s*[\$%#])/, '<span class="terminal-prompt-symbol">$1</span>')}</span>`;
            }
            // Comment lines (# ...)
            if (/^\s*#/.test(line)) {
              return `<span class="terminal-comment">${escaped}</span>`;
            }
            // Single-pass highlighting to avoid regex conflicts between string/number/keyword
            const highlighted = escaped.replace(
              /(&quot;[^&]*&quot;|'[^']*'|"[^"]*")|(\b\d+\.?\d*\b)|(\b(?:True|False|None|Error|Exception|Traceback|def|import|from|return|if|else|for|while|not|and|or|try|except|raise|with|lambda|yield|pass|break|continue|print)\b)/g,
              (m, str, num, kw) => {
                if (str)
                  return '<span class="terminal-string">' + str + "</span>";
                if (num)
                  return '<span class="terminal-number">' + num + "</span>";
                if (kw)
                  return '<span class="terminal-keyword">' + kw + "</span>";
                return m;
              },
            );
            return `<span class="terminal-output">${highlighted}</span>`;
          })
          .join("\n");

        const langLabel =
          language === "shell"
            ? "Terminal"
            : language.charAt(0).toUpperCase() + language.slice(1) + " Console";

        return `
        <div class="terminal-block">
          <div class="terminal-header">
            <div class="terminal-dots">
              <span class="terminal-dot red"></span>
              <span class="terminal-dot yellow"></span>
              <span class="terminal-dot green"></span>
            </div>
            <span class="terminal-title">${langLabel}</span>
            <button class="btn-copy-code" onclick="copyCodeToClipboard(this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy
            </button>
          </div>
          <pre class="terminal-body"><code>${highlightedLines}</code></pre>
        </div>`;
      },
    );

    // === 10. 📝 CMD / COMMAND BLOCK [[CMD]] ... [[/CMD]] ===
    // Nền xám nhạt, font monospace – dùng cho lệnh/command ngắn
    html = html.replace(
      /\[\[CMD\]\]([\s\S]*?)\[\[\/CMD\]\]/gi,
      (match, content) => {
        const cleanContent = content
          .trim()
          .replace(/<\/p>/gi, "\n")
          .replace(/<br\s*\/?>/gi, "\n")
          .replace(/<\/div>/gi, "\n")
          .replace(/<[^>]*>/g, "")
          .replace(/&nbsp;/g, " ")
          .replace(/&lt;/g, "<")
          .replace(/&gt;/g, ">")
          .replace(/&amp;/g, "&")
          .replace(/^\n+|\n+$/g, "");

        // Highlight: $ prompt, # comment, C:\...> prompt
        const lines = cleanContent.split("\n");
        const highlightedLines = lines
          .map((line) => {
            const escaped = escapeHtml(line);
            // Shell prompt $ or %
            if (/^\s*[\$%]\s/.test(line)) {
              return `<span class="cmd-prompt">${escaped}</span>`;
            }
            // Windows prompt C:\...>
            if (/^\s*[A-Z]:\s*>/.test(line) || /^\s*[A-Z]:\\.*>/.test(line)) {
              return `<span class="cmd-prompt">${escaped}</span>`;
            }
            // Python prompt
            if (/^\s*(>>>|python%)/.test(line)) {
              return `<span class="cmd-prompt">${escaped}</span>`;
            }
            // Comment (# ...)
            if (/^\s*#/.test(line) || /#\s/.test(line)) {
              return escaped.replace(
                /(#\s.*)$/,
                '<span class="cmd-comment">$1</span>',
              );
            }
            return escaped;
          })
          .join("\n");

        return `<div class="cmd-block"><pre class="cmd-body"><code>${highlightedLines}</code></pre></div>`;
      },
    );

    // === 11. 📝 OUTPUT BLOCK [[OUTPUT]] ... [[/OUTPUT]] ===
    // Nền xám nhạt, chữ monospace – dùng hiển thị kết quả output đơn giản
    html = html.replace(
      /\[\[OUTPUT\]\]([\s\S]*?)\[\[\/OUTPUT\]\]/gi,
      (match, content) => {
        const cleanContent = content
          .trim()
          .replace(/<\/p>/gi, "\n")
          .replace(/<br\s*\/?>/gi, "\n")
          .replace(/<\/div>/gi, "\n")
          .replace(/<[^>]*>/g, "")
          .replace(/&nbsp;/g, " ")
          .replace(/&lt;/g, "<")
          .replace(/&gt;/g, ">")
          .replace(/&amp;/g, "&")
          .replace(/^\n+|\n+$/g, "");
        return `<div class="output-block"><pre class="output-body"><code>${escapeHtml(cleanContent)}</code></pre></div>`;
      },
    );

    container.innerHTML = html;
    console.log("✅ Markers parsed and transformed");
  }

  /**
   * Escape HTML special characters
   */
  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  // ========================================
  // 📄 NORMALIZE GOOGLE DOC CONTENT
  // ========================================

  /**
   * Clean and normalize HTML from Google Doc
   * Remove inline styles, fix spacing, standardize elements
   */
  function normalizeDocContent(container) {
    console.log("📄 Normalizing Google Doc content...");

    // === STEP 1: Unwrap unnecessary spans from Google Doc ===
    // Google Doc wraps each word/phrase in <span> with inline styles
    // We need to unwrap these to fix the word-by-word line break issue
    const spans = container.querySelectorAll("span");
    spans.forEach((span) => {
      // Check if span only contains text (no special elements)
      const hasOnlyText =
        span.childNodes.length === 1 &&
        span.childNodes[0].nodeType === Node.TEXT_NODE;
      const hasOnlyInlineChildren = Array.from(span.children).every((child) =>
        ["SPAN", "A", "STRONG", "B", "EM", "I", "U", "CODE"].includes(
          child.tagName,
        ),
      );

      // If span has no special attributes worth keeping, unwrap it
      const keepSpan =
        span.classList.length > 0 || span.id || span.dataset.length > 0;

      if (
        !keepSpan &&
        (hasOnlyText || hasOnlyInlineChildren || span.children.length === 0)
      ) {
        // Replace span with its contents
        const parent = span.parentNode;
        while (span.firstChild) {
          parent.insertBefore(span.firstChild, span);
        }
        parent.removeChild(span);
      }
    });

    // === STEP 2: Remove all inline font styles ===
    // ⭐ But PRESERVE list-related styles on ul/ol/li so bullets show correctly
    const allElements = container.querySelectorAll("*");
    allElements.forEach((el) => {
      const style = el.getAttribute("style");
      if (style) {
        const tagName = el.tagName.toUpperCase();
        const isListElement =
          tagName === "UL" || tagName === "OL" || tagName === "LI";

        // Keep essential styles + list styles for ul/ol/li
        const allowedProps = ["text-align", "width", "height", "max-width"];
        // ⭐ For list elements, also preserve list-style and padding/margin
        if (isListElement) {
          allowedProps.push(
            "list-style-type",
            "list-style",
            "padding-left",
            "margin-left",
          );
        }

        const newStyle = allowedProps
          .map((prop) => {
            const match = style.match(new RegExp(`${prop}\\s*:\\s*[^;]+`, "i"));
            return match ? match[0] : null;
          })
          .filter(Boolean)
          .join("; ");

        // ⭐ For list elements: if Google Doc set list-style-type:none, REMOVE it
        // so our CSS can properly show bullets/numbers
        let finalStyle = newStyle
          .replace(/list-style-type\s*:\s*none/gi, "")
          .replace(/;;/g, ";")
          .replace(/^\s*;|;\s*$/g, "")
          .trim();

        if (finalStyle) {
          el.setAttribute("style", finalStyle);
        } else {
          el.removeAttribute("style");
        }
      }
    });

    // === STEP 2.5: ⭐ Force remove list-style-type:none from Google Doc ===
    // Google Doc adds class-based CSS that hides bullets - override via inline
    const allLists = container.querySelectorAll("ul, ol");
    allLists.forEach((list) => {
      const computed = window.getComputedStyle(list);
      if (computed.listStyleType === "none") {
        // Force show bullets/numbers
        if (list.tagName === "UL") {
          list.style.listStyleType = "disc";
        } else {
          list.style.listStyleType = "decimal";
        }
      }
      // Ensure proper padding for bullets to be visible
      if (!list.style.paddingLeft || parseFloat(computed.paddingLeft) < 10) {
        list.style.paddingLeft = "1.5rem";
      }
    });

    // === STEP 3: Fix line breaks in headings and paragraphs ===
    // Google Doc sometimes adds <br> inside headings
    const headingsAndParagraphs = container.querySelectorAll(
      "h1, h2, h3, h4, h5, h6, p",
    );
    headingsAndParagraphs.forEach((el) => {
      // Replace multiple spaces with single space
      el.innerHTML = el.innerHTML
        .replace(/\s+/g, " ")
        .replace(/<br\s*\/?>\s*/gi, " ")
        .trim();
    });

    // === STEP 4: Normalize empty paragraphs (spacers) ===
    const paragraphs = container.querySelectorAll("p");
    paragraphs.forEach((p) => {
      if (!p.textContent.trim() && !p.querySelector("img")) {
        p.classList.add("spacer");
      }
    });

    // === STEP 5: Add IDs to headings ===
    const headings = container.querySelectorAll("h1, h2, h3, h4, h5, h6");
    headings.forEach((h, index) => {

    // === STEP 6: Normalize lists ===
    const lists = container.querySelectorAll("ul, ol");

  // ========================================
  // ⭐ BULLET & NUMBERING FORMATTER (CLIENT-SIDE)
  // ========================================

  /**
   * ⭐ Format text-based bullet & numbering characters
   * Detects <p> tags with leading bullet chars or number patterns
   * and converts consecutive ones into proper <ul>/<ol> lists.
   *
   * Bullet chars: • ● ○ ■ ▪ ▸ ▹ ★ ✓ ✔ ➤ ➜ → ▶ - – —
   * Number patterns: 1. 2. | a. b. | i. ii. | (1) (a) (i)
   */
  function formatBulletAndNumbering(container) {
    console.log("⭐ Formatting bullet & numbering...");

    const BULLET_CHARS = "•●○■▪▸▹►▻★☆✓✔✗✘➤➜➡→▶◆◇⦿⁃";
    const DASH_CHARS = ["-", "–", "—"];
    const NUMBER_REGEX =
      /^(?:(\d{1,3})\.\s|\((\d{1,3})\)\s|([a-zA-Z])\.\s|\(([a-zA-Z])\)\s|([ivxlIVXL]{1,4})\.\s|\(([ivxlIVXL]{1,4})\)\s)/;

    // Get all direct children paragraphs
    const children = Array.from(container.children);
    let bulletBuffer = [];
    let numberBuffer = [];

    function flushBulletBuffer() {
      if (bulletBuffer.length === 0) return;
      const ul = document.createElement("ul");
      ul.className = "doc-formatted-list doc-bullet-list";
      bulletBuffer.forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = item.content;
        // Nested indent via CSS class
        if (item.indent > 0)
          li.classList.add("doc-indent-" + Math.min(item.indent, 3));
        ul.appendChild(li);
      });
      // Insert before the first buffered element's position
      bulletBuffer[0].element.parentNode.insertBefore(
        ul,
        bulletBuffer[0].element,
      );
      // Remove original <p> elements
      bulletBuffer.forEach((item) => item.element.remove());
      bulletBuffer = [];
    }

    function flushNumberBuffer() {
      if (numberBuffer.length === 0) return;
      const ol = document.createElement("ol");
      ol.className = "doc-formatted-list doc-number-list";

      // Detect list type for proper numbering
      const firstText = numberBuffer[0].text;
      if (/^[a-zA-Z]\./.test(firstText) || /^\([a-zA-Z]\)/.test(firstText)) {
        ol.setAttribute("type", "a");
      } else if (
        /^[ivxlIVXL]{1,4}\./.test(firstText) ||
        /^\([ivxlIVXL]{1,4}\)/.test(firstText)
      ) {
        ol.setAttribute("type", "i");
      }

      numberBuffer.forEach((item) => {
        const li = document.createElement("li");
        li.innerHTML = item.content;
        if (item.indent > 0)
          li.classList.add("doc-indent-" + Math.min(item.indent, 3));
        ol.appendChild(li);
      });
      numberBuffer[0].element.parentNode.insertBefore(
        ol,
        numberBuffer[0].element,
      );
      numberBuffer.forEach((item) => item.element.remove());
      numberBuffer = [];
    }

    children.forEach((el) => {
      // Only process <p> tags (not already list elements)
      if (el.tagName !== "P") {
        flushBulletBuffer();
        flushNumberBuffer();
        return;
      }

      const text = el.textContent.trim();
      if (!text) {
        // Empty paragraph - flush buffers
        flushBulletBuffer();
        flushNumberBuffer();
        return;
      }

      // Detect indentation from inline style
      let indentLevel = 0;
      const style = el.getAttribute("style") || "";
      const marginMatch = style.match(
        /margin-left\s*:\s*([\d.]+)\s*(px|pt|rem|em)/i,
      );
      if (marginMatch) {
        let val = parseFloat(marginMatch[1]);
        const unit = marginMatch[2].toLowerCase();
        if (unit === "pt") val *= 1.333;
        if (unit === "rem" || unit === "em") val *= 16;
        indentLevel = Math.floor(val / 36);
      }

      // --- Check for BULLET ---
      let isBullet = false;
      let bulletContent = "";
      const firstChar = text.charAt(0);

      if (BULLET_CHARS.indexOf(firstChar) !== -1) {
        isBullet = true;
        // Get rich HTML content, removing the bullet char
        bulletContent = removeBulletFromHtml(
          el.innerHTML,
          BULLET_CHARS,
          DASH_CHARS,
        );
      }
      if (!isBullet) {
        for (const dash of DASH_CHARS) {
          if (text.startsWith(dash + " ") || text.startsWith(dash + "\u00a0")) {
            isBullet = true;
            bulletContent = removeBulletFromHtml(
              el.innerHTML,
              BULLET_CHARS,
              DASH_CHARS,
            );
            break;
          }
        }
      }

      // --- Check for NUMBERING ---
      let isNumbered = false;
      let numberContent = "";
      if (!isBullet && NUMBER_REGEX.test(text)) {
        isNumbered = true;
        numberContent = removeNumberFromHtml(el.innerHTML);
      }

      // --- Buffer items ---
      if (isBullet) {
        flushNumberBuffer();
        bulletBuffer.push({
          element: el,
          content: bulletContent,
          indent: indentLevel,
        });
      } else if (isNumbered) {
        flushBulletBuffer();
        numberBuffer.push({
          element: el,
          content: numberContent,
          indent: indentLevel,
          text: text,
        });
      } else {
        flushBulletBuffer();
        flushNumberBuffer();
      }
    });

    // Flush remaining buffers
    flushBulletBuffer();
    flushNumberBuffer();

    console.log("✅ Bullet & numbering formatted");
  }

  /**
   * Remove leading bullet character from innerHTML while preserving HTML tags
   */
  function removeBulletFromHtml(html, bulletChars, dashChars) {
    // Remove leading bullet Unicode character
    let cleaned = html.replace(
      /^(\s*(?:<[^>]*>\s*)*)([•●○■▪▸▹►▻★☆✓✔✗✘➤➜➡→▶◆◇⦿⁃])\s*/,
      "$1",
    );
    // Remove leading dash bullet
    if (cleaned === html) {
      cleaned = html.replace(
        /^(\s*(?:<[^>]*>\s*)*)([\-–—])(?:\s|&nbsp;)+/,
        "$1",
      );
    }
    // Clean up empty leading spans
    cleaned = cleaned.replace(/^\s*<span[^>]*>\s*<\/span>\s*/, "").trim();
    return cleaned || html.trim();
  }

  /**
   * Remove leading number/letter pattern from innerHTML
   */
  function removeNumberFromHtml(html) {
    let cleaned = html.replace(
      /^(\s*(?:<[^>]*>\s*)*)(?:\d{1,3}\.\s|\(\d{1,3}\)\s|[a-zA-Z]\.\s|\([a-zA-Z]\)\s|[ivxlIVXL]{1,4}\.\s|\([ivxlIVXL]{1,4}\)\s)/,
      "$1",
    );
    cleaned = cleaned.replace(/^\s*<span[^>]*>\s*<\/span>\s*/, "").trim();
    return cleaned || html.trim();
  }

  /**
   * Detect and enhance code blocks with Prism.js highlighting
   */
  function enhanceSyntaxHighlighting(container) {
    console.log("📝 Enhancing code blocks...");

    // Method 1: Find existing <pre><code> blocks
    const existingCodeBlocks = container.querySelectorAll(
      "pre:not(.code-block-wrapper pre):not(.terminal-block pre):not(.cmd-block pre):not(.output-block pre), code:not(.code-block-wrapper code):not(.terminal-block code):not(.cmd-block code):not(.output-block code)",
    );

    // Method 2: Find monospace font spans (from Google Docs)
    const monoSpans = container.querySelectorAll("span");
    let codeBuffer = [];
    let lastCodeParent = null;

    monoSpans.forEach((span) => {
      const style = span.getAttribute("style") || "";
      const isMonospace =
        style.includes("Courier") ||
        style.includes("Consolas") ||
        style.includes("monospace") ||
        style.includes("Monaco") ||
        style.includes("Source Code");

      if (isMonospace && span.textContent.trim()) {
        // Check if it's a substantial code block (not just inline code)
        const text = span.textContent;
        if (text.includes("\n") || text.length > 50 || codeBuffer.length > 0) {
          codeBuffer.push(span.textContent);
          if (!lastCodeParent) lastCodeParent = span.parentElement;
        }
      } else if (codeBuffer.length > 0 && lastCodeParent) {
        // End of code block detected
        createCodeBlock(lastCodeParent, codeBuffer.join(""));
        codeBuffer = [];
        lastCodeParent = null;
      }
    });

    // Handle remaining buffer
    if (codeBuffer.length > 0 && lastCodeParent) {
      createCodeBlock(lastCodeParent, codeBuffer.join(""));
    }

    // Enhance existing code blocks
    existingCodeBlocks.forEach((el) => {
      if (
        el.closest(".code-block-wrapper") ||
        el.closest(".terminal-block") ||
        el.closest(".cmd-block") ||
        el.closest(".output-block")
      )
        return; // Skip already enhanced

      const isPreTag = el.tagName === "PRE";
      const code = isPreTag
        ? el.querySelector("code")?.textContent || el.textContent
        : el.textContent;

      if (code.trim().length > 20) {
        createCodeBlock(el, code);
      }
    });
  }

  /**
   * Create a styled code block with copy button
   */
  function createCodeBlock(targetElement, code) {
    const language = detectLanguage(code);

    const wrapper = document.createElement("div");
    wrapper.className = "code-block-wrapper";
    wrapper.innerHTML = `
      <div class="code-block-header">

    if (targetElement.parentElement) {
