<script>
  /**
   * Lesson Page Scripts
   * Phase 3: AI Content Integration
   *
   * ======================================
   * 🧠 INTERACTIVE NETWORK MINDMAP v2.0
   * ======================================
   *
   * Visual Structure:
   *
   *           Detail Pills (Level 2)
   *              ┌─────┐
   *              │ RAM │
   *              └─────┘
   *                  ╲
   *                   ╲
   *        📚───────── 🔵 Biến ──────╱──── ┌────────┐
   *      Khái niệm    (Satellite)          │ Gán (=)│
   *                         │              └────────┘
   *                         │
   *                    🧠 Center
   *                   (Tư Duy LT)
   *                    ╱       ╲
   *                   ╱         ╲
   *            🟣 Quy trình    🟢 Thuật toán
   *
   * Features:
   * - Radial layout (center + satellites)
   * - Progressive disclosure (click to expand)
   * - Animated SVG connections
   * - Pulse effects on center node
   * - Detail pills appear on click
   *
   */

  let currentLessonData = null;
  let scrollProgress = 0;

  // AI Content State
  let aiContentLoaded = {
    mindmap: false,
    flashcards: false,
  };
  let flashcardsData = [];
  let currentFlashcardIndex = 0;

  // ⭐ Progress Saving State
  let progressSaved = {
    lesson: false,
    mindmap: false,
    flashcards: false,
  };

  // ⭐ Tab Completion State (for overall progress tracking)
  let tabCompletion = {
    lessonRead: false, // User checked "Đã đọc xong"
    lessonQuiz: false, // User completed Mini Quiz
    mindmapViewed: false, // User checked "Đã xem Mindmap"
    flashcardsDone: false, // User viewed all flashcards
  };

  /**
   * Initialize Lesson Page
   */
  function initLessonPage() {
    console.log("📚 Initializing Lesson Page...");
    console.log("🔍 window.currentPageParams:", window.currentPageParams);

    // ⭐ Start Learning Time Tracker
    if (window.LearningTracker) {
      console.log("✅ LearningTracker found, starting lesson tracking...");
      window.LearningTracker.start("lesson");
    } else {
      console.warn("⚠️ LearningTracker NOT found!");
    }

    // ⭐ Reset previous lesson data to avoid cache issues
    currentLessonData = null;
    scrollProgress = 0;
    aiContentLoaded = { mindmap: false, flashcards: false };
    progressSaved = { lesson: false, mindmap: false, flashcards: false };
    tabCompletion = {
      lessonRead: false,
      lessonQuiz: false,
      mindmapViewed: false,
      flashcardsDone: false,
    };
    flashcardsData = [];
    currentFlashcardIndex = 0;

    // Start meteor shower and mouse effects for header
    startLessonHeaderMeteors();
    setupLessonHeaderMouseEffect();

    // Clear previous content
    const contentArea = document.getElementById("lesson-content-area");
    if (contentArea) {
      contentArea.innerHTML = "";
    }

    // Reset tabs to default (lesson tab)
    switchLessonTab("lesson");

    // Get params from window.currentPageParams
    if (window.currentPageParams) {
      currentLessonData = window.currentPageParams;
      console.log("✅ Lesson params:", currentLessonData);
      console.log("📄 contentDocId:", currentLessonData.contentDocId);
      console.log("📋 topicId:", currentLessonData.topicId);
      console.log("🏷️ topicTitle:", currentLessonData.topicTitle);

      // Update header
      document.getElementById("lesson-topic-title").textContent =
        currentLessonData.topicTitle || "Bài học";

      // Save Learning activity to personal Google Sheet
      google.script.run.saveActivityLog({
        type: "Learning",
        topicId: currentLessonData.topicId,
        topicTitle: currentLessonData.topicTitle,
      });

      // Notify dashboard to refresh leaderboard + history
      window.dispatchEvent(new Event("dashboard-needs-refresh"));

      // Load lesson content
      if (currentLessonData.contentDocId) {
        console.log(
          "🚀 Calling loadLessonContent with docId:",
          currentLessonData.contentDocId,
        );
        loadLessonContent(currentLessonData.contentDocId);
      } else {
        console.error("❌ No contentDocId found");
        showLessonError("Không tìm thấy nội dung bài học");
      }
    } else {
      console.error("❌ No currentPageParams found");
      showLessonError("Thiếu thông tin bài học");
    }

    // Setup scroll tracking
    setupScrollTracking();
  }

  /**
   * Switch between lesson tabs
   */
  function switchLessonTab(tabName) {
    console.log("🔄 Switching to tab:", tabName);

    // ⭐ Update Learning Tracker based on tab
    if (window.LearningTracker) {
      if (tabName === "lesson") {
        window.LearningTracker.start("lesson");
      } else if (tabName === "mindmap") {
        window.LearningTracker.start("mindmap");
      } else if (tabName === "flashcards") {
        window.LearningTracker.start("flashcard");
      }
    }

    // Update sidebar nav tabs (new 2-column layout)
    document.querySelectorAll(".lesson-nav-tab").forEach((tab) => {
      tab.classList.remove("active");
      if (tab.dataset.tab === tabName) {
        tab.classList.add("active");
      }
    });

    // Also update old horizontal tabs if they exist (backward compat)
    document.querySelectorAll(".lesson-tab").forEach((tab) => {
      tab.classList.remove("active");
      if (tab.dataset.tab === tabName) {
        tab.classList.add("active");
      }
    });

    // Update tab panels
    document.querySelectorAll(".tab-panel").forEach((panel) => {
      panel.style.display = "none";
      panel.classList.remove("active");
    });

    const activePanel = document.getElementById("tab-" + tabName);
    if (activePanel) {
      activePanel.style.display = "block";
      activePanel.classList.add("active");
    }

    // Load AI content if not loaded yet
    if (tabName === "mindmap" && !aiContentLoaded.mindmap) {
      loadMindmap();
    } else if (tabName === "flashcards" && !aiContentLoaded.flashcards) {
      loadFlashcards();
    }
  }

  /**
   * Load lesson content from Google Doc
   */
  function loadLessonContent(docId) {
    console.log("📄 Loading lesson content from Doc ID:", docId);
    console.log("🔍 docId type:", typeof docId);
    console.log("🔍 docId value:", docId);

    // Show loading
    document.getElementById("lesson-loading").style.display = "block";
    document.getElementById("lesson-error").style.display = "none";
    document.getElementById("lesson-content-area").style.display = "none";
    document.getElementById("lesson-actions").style.display = "none";

    // ⭐ KIỂM TRA XEM HÀM google.script.run CÓ TỒN TẠI KHÔNG
    if (typeof google === "undefined" || !google.script || !google.script.run) {
      console.error("❌ google.script.run not available!");
      showLessonError("Lỗi: Không thể kết nối với server. Vui lòng thử lại.");
      return;
    }

    console.log("✅ google.script.run available");
    console.log("🚀 Calling getTopicContentByDocId...");

    // Call server function
    google.script.run
      .withSuccessHandler(function (response) {
        console.log("✅ Lesson content response:", response);
        console.log("📊 Response type:", typeof response);
        console.log("📊 Response.success:", response?.success);
        console.log("📊 Response.message:", response?.message);
        console.log("📊 Response.content length:", response?.content?.length);

        if (response && response.success) {
          // Hide loading
          document.getElementById("lesson-loading").style.display = "none";

          // Show content - Render Google Doc then enhance
          const contentArea = document.getElementById("lesson-content-area");
          contentArea.innerHTML = response.content;
          contentArea.style.display = "block";

          // ⭐ ENHANCE LESSON CONTENT - Apply all enhancements
          enhanceLessonContent();

          // Show lesson completion actions
          setTimeout(() => {
            const tabActions = document.getElementById("lesson-tab-actions");
            if (tabActions) tabActions.style.display = "flex";
          }, 2000);

          showToast("✅ Đã tải bài giảng", "success");
        } else {
          console.error("❌ Response failed:", response);
          showLessonError(response?.message || "Lỗi không xác định");
        }
      })
      .withFailureHandler(function (error) {
        console.error("❌ Error loading lesson:", error);
        console.error("❌ Error type:", typeof error);
        console.error("❌ Error message:", error?.message);
        console.error("❌ Error toString:", error?.toString());
        showLessonError(
          "Lỗi: " + (error?.message || error?.toString() || "Không xác định"),
        );
      })
      .getTopicContentByDocId(docId);
  }

  // ========== AI CONTENT LOADERS ==========

  /**
   * Load Mindmap from AI
   */
  function loadMindmap(forceRegenerate = false) {
    console.log("🧠 Loading Mindmap...");

    if (!currentLessonData?.topicId) {
      showMindmapError("Thiếu thông tin topic");
      return;
    }

    // Show loading
    document.getElementById("mindmap-loading").style.display = "block";
    document.getElementById("mindmap-error").style.display = "none";
    document.getElementById("mindmap-content").style.display = "none";

    google.script.run
      .withSuccessHandler(function (response) {
        console.log("✅ Mindmap response:", response);
        console.log("Response type:", typeof response);
        console.log("Response.success:", response?.success);
        console.log("Response.data type:", typeof response?.data);
        console.log("Response._isStringified:", response?._isStringified);

        document.getElementById("mindmap-loading").style.display = "none";

        if (response === null || response === undefined) {
          console.error("❌ Response is NULL - Server error occurred");
          showMindmapError(
            "Lỗi server: Không nhận được dữ liệu.\n\n" +
              "Kiểm tra:\n" +
              "1. API Key đã setup chưa?\n" +
              "2. Google Doc có quyền truy cập?\n" +
              "3. Xem Apps Script Logs để biết lỗi chi tiết",

          return;
        }

        if (response && response.success && response.data) {
          // ⭐ Parse data nếu đã được stringify từ server
          let mindmapData = response.data;
          if (typeof mindmapData === "string") {
            try {
              mindmapData = JSON.parse(mindmapData);
              console.log("✅ Parsed mindmap data:", mindmapData);
            } catch (e) {
              console.error("❌ Failed to parse mindmap data:", e);
              showMindmapError("Lỗi parse dữ liệu mindmap");
              return;
            }
          }

          renderMindmap(mindmapData);
          document.getElementById("mindmap-content").style.display = "block";
          aiContentLoaded.mindmap = true;

          // Show mindmap completion checkbox
          const mindmapActions = document.getElementById("mindmap-tab-actions");
          if (mindmapActions) mindmapActions.style.display = "flex";

          // ⭐ Save mindmap progress when viewed
          saveMindmapProgress();

          showToast("✅ Đã tải Mindmap", "success");
        } else {
          console.error("❌ Response failed:", response?.message);
          showMindmapError(
            response?.message ||
              "Không thể tải Mindmap.\n\nKiểm tra Apps Script Logs.",
          );
        }
      })
      .withFailureHandler(function (error) {
        console.error("❌ Mindmap error:", error);
        document.getElementById("mindmap-loading").style.display = "none";
        showMindmapError(
          "Lỗi kết nối server:\n" +
            (error?.message || error?.toString() || "Unknown error"),
        );
      })
      .getAIContentForWeb(
        currentLessonData.topicId,
        "mindmap",
        forceRegenerate,
      );
  }

  // ========== SIMPLE TREE MINDMAP ==========

  // Color palette for branches
  const branchColors = [
    "purple",
    "blue",
    "green",
    "pink",
    "cyan",
    "yellow",
    "red",
    "indigo",
  ];

  /**
   * Render Simple Tree Mindmap
   * Layout: Root (left) → Branches (middle) → Children (right)
   * All content displayed at once, smooth curved connections
   */
  function renderMindmap(data) {
    const treeContainer = document.getElementById("tree-container");
    const connectionsLayer = document.getElementById("mindmap-connections");

    // Handle if data is still a string
    if (typeof data === "string") {
      console.warn("⚠️ Mindmap data is string, attempting to parse");
      try {
        data = JSON.parse(data);
      } catch (e) {
        console.error("❌ Cannot parse mindmap data:", e);
        showMindmapError("Lỗi: Dữ liệu mindmap không hợp lệ");
        return;
      }
    }

    // Validate data structure
    if (!data || typeof data !== "object") {
      console.error("❌ Invalid mindmap data structure:", data);
      showMindmapError("Lỗi: Cấu trúc dữ liệu mindmap không hợp lệ");
      return;
    }

    console.log("🌳 Rendering tree mindmap with data:", data);

    // Get root title
    const rootTitle =
      data.title ||
      data.centralIdea ||
      currentLessonData?.topicTitle ||
      "Chủ đề chính";

    // Get branches
    const branches = data.branches || data.nodes || [];

    // Clear containers
    treeContainer.innerHTML = "";
    connectionsLayer.innerHTML = "";

    if (branches.length === 0) {
      treeContainer.innerHTML = `
        <div style="text-align: center; color: #64748b; padding: 2rem;">
          <p>Không có dữ liệu mindmap</p>
        </div>
      `;
      return;
    }

    // Build tree structure
    // 1. Root node
    const rootEl = document.createElement("div");
    rootEl.className = "tree-root";
    rootEl.innerHTML = `<div class="root-node" id="root-node">${rootTitle}</div>`;
    treeContainer.appendChild(rootEl);

    // 2. Branches column
    const branchesEl = document.createElement("div");
    branchesEl.className = "tree-branches";

    branches.forEach((branch, index) => {
      const branchLabel = branch.label || branch.name || "Nhánh " + (index + 1);
      const branchColor = branchColors[index % branchColors.length];
      const children = branch.children || [];

      // Create branch row
      const branchRow = document.createElement("div");
      branchRow.className = "tree-branch";
      branchRow.setAttribute("data-color", branchColor);
      branchRow.setAttribute("data-index", index);

      // Branch node
      const branchNodeEl = document.createElement("div");
      branchNodeEl.className = "branch-node";
      branchNodeEl.id = `branch-${index}`;
      branchNodeEl.textContent = branchLabel;
      branchRow.appendChild(branchNodeEl);

      // Children column (if any)
      if (children.length > 0) {
        const childrenEl = document.createElement("div");
        childrenEl.className = "branch-children";
        childrenEl.id = `children-${index}`;

        children.forEach((child, childIdx) => {
          const childText =
            typeof child === "string" ? child : child.label || child.name || "";

          const childNode = document.createElement("div");
          childNode.className = "child-node";
          childNode.id = `child-${index}-${childIdx}`;
          childNode.textContent = childText;
          childrenEl.appendChild(childNode);
        });

        branchRow.appendChild(childrenEl);
      }

      branchesEl.appendChild(branchRow);
    });

    treeContainer.appendChild(branchesEl);

    // Draw connection lines after DOM renders
    setTimeout(() => {
      drawTreeConnections(branches);
    }, 50);
  }

  /**
   * Draw smooth curved connections between nodes
   */
  function drawTreeConnections(branches) {
    const svg = document.getElementById("mindmap-connections");
    const container = document.querySelector(".mindmap-tree");

    if (!svg || !container) return;

    svg.innerHTML = "";

    // Get container bounds for relative positioning
    const containerRect = container.getBoundingClientRect();

    // Get root node position
    const rootNode = document.getElementById("root-node");
    if (!rootNode) return;

    const rootRect = rootNode.getBoundingClientRect();
    const rootX = rootRect.right - containerRect.left;
    const rootCenterY = rootRect.top + rootRect.height / 2 - containerRect.top;

    // Draw connections for each branch
    branches.forEach((branch, index) => {
      const branchNode = document.getElementById(`branch-${index}`);
      if (!branchNode) return;

      const branchRect = branchNode.getBoundingClientRect();
      const branchX = branchRect.left - containerRect.left;
      const branchCenterY =
        branchRect.top + branchRect.height / 2 - containerRect.top;

      // Get color for this branch
      const branchColor = branchColors[index % branchColors.length];
      const lineColor = getLineColor(branchColor);

      // Draw root → branch curved line
      const rootPath = createCurvedPath(
        rootX,
        rootCenterY,
        branchX,
        branchCenterY,
        lineColor,
        2,
        "root-branch",
      );
      svg.appendChild(rootPath);

      // Draw branch → children connections
      const children = branch.children || [];
      children.forEach((child, childIdx) => {
        const childNode = document.getElementById(`child-${index}-${childIdx}`);
        if (!childNode) return;

        const childRect = childNode.getBoundingClientRect();
        const branchRightX = branchRect.right - containerRect.left;
        const childX = childRect.left - containerRect.left;
        const childCenterY =
          childRect.top + childRect.height / 2 - containerRect.top;

        const childPath = createCurvedPath(
          branchRightX,
          branchCenterY,
          childX,
          childCenterY,
          lineColor,
          1.5,
          "branch-child",
        );
        svg.appendChild(childPath);
      });
    });
  }

  /**
   * Create a smooth curved SVG path
   */
  function createCurvedPath(x1, y1, x2, y2, color, strokeWidth, className) {
    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");

    // Control point offset for smooth S-curve
    const cpOffset = (x2 - x1) * 0.5;

    // Path: start → curve → end
    const d = `M ${x1} ${y1} C ${x1 + cpOffset} ${y1}, ${
      x2 - cpOffset
    } ${y2}, ${x2} ${y2}`;

    path.setAttribute("d", d);
    path.setAttribute("stroke", color);
    path.setAttribute("stroke-width", strokeWidth);
    path.setAttribute("fill", "none");
    path.setAttribute("stroke-linecap", "round");
    path.setAttribute("class", `tree-line ${className}`);

    return path;
  }

  /**
   * Get line color based on branch color name
   */
  function getLineColor(colorName) {
    const colorMap = {
      purple: "#a78bfa",
      blue: "#93c5fd",
      green: "#86efac",
      pink: "#f9a8d4",
      cyan: "#67e8f9",
      yellow: "#fde047",
      red: "#fca5a5",
      indigo: "#a5b4fc",
    };
    return colorMap[colorName] || "#94a3b8";
  }

  /**
   * Redraw connections on window resize
   */
  let resizeTimeout;
  window.addEventListener("resize", () => {
    clearTimeout(resizeTimeout);
    resizeTimeout = setTimeout(() => {
      // Get branches from current tree
      const branchEls = document.querySelectorAll(".tree-branch");
      if (branchEls.length > 0) {
        // Reconstruct branches data for redraw
        const branches = Array.from(branchEls).map((el, idx) => {
          const childrenContainer = el.querySelector(".branch-children");
          const childNodes = childrenContainer
            ? childrenContainer.querySelectorAll(".child-node")
            : [];
          return {
            children: Array.from(childNodes).map(() => ({})),
          };
        });
        drawTreeConnections(branches);
      }
    }, 100);
  });

  // ========== RENDER FUNCTIONS ==========

  // Flashcard state variablesv
  let learnedCount = 0;
  let reviewCount = 0;
  let flashcardResults = []; // Track learned/review status for each card

  /**
   * Render current flashcard
   */
  function renderCurrentFlashcard() {
    if (!flashcardsData || flashcardsData.length === 0) return;

    const card = flashcardsData[currentFlashcardIndex];
    const flashcardWrapper = document.getElementById("flashcard-wrapper");
    const flashcardEl = document.getElementById("current-flashcard");
    const frontTextEl = document.getElementById("flashcard-front-text");
    const backTextEl = document.getElementById("flashcard-back-text");
    const currentEl = document.getElementById("flashcard-current");

    // Check if elements exist
    if (!flashcardEl || !frontTextEl || !backTextEl) {
      console.error("❌ Flashcard DOM elements not found:", {
        flashcardEl: !!flashcardEl,
        frontTextEl: !!frontTextEl,
        backTextEl: !!backTextEl,
      });
      return;
    }

    // Remove flipped state
    flashcardEl.classList.remove("flipped");

    console.log("🃏 Rendering flashcard:", card);

    // Xử lý dữ liệu lồng nhau từ AI
    let frontText = "";
    let backText = "";

    // Xử lý front (mặt trước)
    if (card.front && typeof card.front === "object") {
      frontText = card.front.content || card.front.term || "";
    } else {
      frontText = card.term || card.front || "";
    }

    // Xử lý back (mặt sau)
    if (card.back && typeof card.back === "object") {
      backText = card.back.content || card.back.definition || "";
    } else {
      backText = card.definition || card.back || "";
    }

    // Fallback nếu không có dữ liệu
    if (!frontText && !backText) {
      console.error("❌ Unknown flashcard structure:", card);
      frontText = "Lỗi dữ liệu flashcard";
      backText = JSON.stringify(card);
    }

    // Update content
    frontTextEl.textContent = frontText;
    backTextEl.textContent = backText;

    // Update progress bar
    updateDeckProgress();

  /**
   * Update deck progress UI
   */
  function updateDeckProgress() {
    const total = flashcardsData.length;
    const completed = learnedCount + reviewCount;
    const progressPercent = total > 0 ? (completed / total) * 100 : 0;

    // Update progress bar
    const progressFill = document.getElementById("deck-progress-bar");
    if (progressFill) {
      progressFill.style.width = progressPercent + "%";
    }

    // Update counter
    const progressCounter = document.querySelector(".progress-counter");
    if (progressCounter) {
      progressCounter.textContent = `${currentFlashcardIndex + 1}/${total}`;
    }

    // Update stats
    const statLearned = document.getElementById("learned-count");
    const statReview = document.getElementById("review-count");
    if (statLearned) statLearned.textContent = learnedCount;
    if (statReview) statReview.textContent = reviewCount;

  /**
   * Mark current card as learned and go to next
   */
  function markAsLearned() {
    if (flashcardResults[currentFlashcardIndex] !== "learned") {
      // Remove from review if it was there
      if (flashcardResults[currentFlashcardIndex] === "review") {
        reviewCount--;
      }
      flashcardResults[currentFlashcardIndex] = "learned";
      learnedCount++;
      updateDeckProgress(); // Update progress bar immediately
    }

    // Animate card flying right
    animateCardOut("right", () => {
      if (currentFlashcardIndex < flashcardsData.length - 1) {
        currentFlashcardIndex++;
        animateCardIn();
        renderCurrentFlashcard();
      } else {
        showDeckComplete();
      }
    });
  }

  /**
   * Mark current card as review and go to next
   */
  function markAsReview() {
    if (flashcardResults[currentFlashcardIndex] !== "review") {
      // Remove from learned if it was there
      if (flashcardResults[currentFlashcardIndex] === "learned") {
        learnedCount--;
      }
      flashcardResults[currentFlashcardIndex] = "review";
      reviewCount++;
      updateDeckProgress(); // Update progress bar immediately
    }

    // Animate card flying left
    animateCardOut("left", () => {
      if (currentFlashcardIndex < flashcardsData.length - 1) {
        currentFlashcardIndex++;
        animateCardIn();
        renderCurrentFlashcard();
      } else {
        showDeckComplete();
      }
    });
  }

    setTimeout(() => {

  function shuffleFlashcards() {
    // Fisher-Yates shuffle
    for (let i = flashcardsData.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [flashcardsData[i], flashcardsData[j]] = [
        flashcardsData[j],
        flashcardsData[i],
      ];

    currentFlashcardIndex = 0;
    initDeckState();
    renderCurrentFlashcard();
    showToast("🔀 Đã xáo trộn thẻ", "success");

  /**
   * Setup swipe gestures for flashcards
   */
  function setupSwipeGestures() {
    const flashcardWrapper = document.getElementById("flashcard-wrapper");
    if (!flashcardWrapper) return;

    let startX = 0;
    let startY = 0;
    let currentX = 0;
    let isDragging = false;

    const swipeLeftIndicator = document.getElementById("swipe-left-indicator");
    const swipeRightIndicator = document.getElementById(
      "swipe-right-indicator",
    );

    flashcardWrapper.addEventListener(
      "touchstart",
      (e) => {
        startX = e.touches[0].clientX;
        startY = e.touches[0].clientY;
        isDragging = true;
        flashcardWrapper.classList.add("dragging");
      },
      { passive: true },
    );

    flashcardWrapper.addEventListener(
      "touchmove",
      (e) => {
        if (!isDragging) return;

        currentX = e.touches[0].clientX - startX;
        const currentY = e.touches[0].clientY - startY;

        // Only handle horizontal swipes
        if (Math.abs(currentX) > Math.abs(currentY)) {
          flashcardWrapper.style.transform = `translateX(${currentX}px) rotate(${
            currentX * 0.05
          }deg)`;

          // Show swipe indicators
          if (currentX < -50 && swipeLeftIndicator) {
            swipeLeftIndicator.classList.add("visible");
            swipeRightIndicator?.classList.remove("visible");
          } else if (currentX > 50 && swipeRightIndicator) {
            swipeRightIndicator.classList.add("visible");
            swipeLeftIndicator?.classList.remove("visible");
          } else {
            swipeLeftIndicator?.classList.remove("visible");
            swipeRightIndicator?.classList.remove("visible");
          }
        }
      },
      { passive: true },
    );

    flashcardWrapper.addEventListener("touchend", () => {
      isDragging = false;
      flashcardWrapper.classList.remove("dragging");
      flashcardWrapper.style.transform = "";

      swipeLeftIndicator?.classList.remove("visible");
      swipeRightIndicator?.classList.remove("visible");

      // Trigger action based on swipe distance
      if (currentX < -100) {
        markAsReview();
      } else if (currentX > 100) {
        markAsLearned();
      }

      currentX = 0;
    });
  }

  /**
   * Setup keyboard shortcuts for flashcards
   */
  function setupFlashcardKeyboard() {
    document.addEventListener("keydown", (e) => {
      // Only handle if flashcards tab is active
      const flashcardsTab = document.getElementById("tab-flashcards");
      if (!flashcardsTab || !flashcardsTab.classList.contains("active")) return;
      if (!flashcardsData || flashcardsData.length === 0) return;

      switch (e.key) {
        case " ":
        case "Enter":
          e.preventDefault();
          flipFlashcard();
          break;
        case "ArrowLeft":
          e.preventDefault();
          markAsReview();
          break;
        case "ArrowRight":
          e.preventDefault();
          markAsLearned();
          break;
        case "ArrowUp":
          e.preventDefault();
          prevFlashcard();
          break;
        case "ArrowDown":
          e.preventDefault();
          nextFlashcard();
          break;
      }
    });
  }

  /**

   */
  function setupScrollTracking() {
    window.addEventListener("scroll", function () {
      const contentArea = document.getElementById("lesson-content-area");
      if (!contentArea || contentArea.style.display === "none") return;

      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;
      const scrollTop =
        window.pageYOffset || document.documentElement.scrollTop;

      // Calculate progress
      const scrollable = documentHeight - windowHeight;
      const progress = scrollable > 0 ? (scrollTop / scrollable) * 100 : 0;

      // Update progress bar
      document.getElementById("lesson-progress-bar").style.width =
        progress + "%";
      document.getElementById("lesson-progress-text").textContent =
        Math.round(progress) + "%";

      scrollProgress = progress;
    });
  }

  /**
   * Calculate and update overall progress

   * - Flashcard tab: 33% (all cards viewed)

  function updateOverallProgress() {
    // Lesson tab progress (33% total)
    let lessonPct = 0;
    if (tabCompletion.lessonRead) lessonPct += 50;
    if (tabCompletion.lessonQuiz) lessonPct += 50;

  // ========================================

  /**
   * Parse and transform content markers from Google Doc
   * Supports: [[COLOR:X]], [[CODE:X]], [[EXAMPLE]], [[NOTE]], [[TIP]], [[WARNING]], [[CHECKPOINT]], [[TASK]], [[QA]]
   */
  function parseContentMarkers(container) {
    console.log("🏷️ Parsing content markers...");
    let html = container.innerHTML;

    // === 1. COLOR SECTIONS [[COLOR:X]] ... [[/COLOR]] or until next H3 ===
    const colorMap = {
      ORANGE: "lesson-section-orange",
      RED: "lesson-section-red",
      BLUE: "lesson-section-blue",
      GREEN: "lesson-section-green",
      PURPLE: "lesson-section-purple",
      CYAN: "lesson-section-cyan",
    };

    // Simple color marker at start of section
    for (const [color, className] of Object.entries(colorMap)) {
      const regex = new RegExp(`\\[\\[COLOR:${color}\\]\\]`, "gi");
      html = html.replace(regex, `<div class="${className}">`);
    }
    html = html.replace(/\[\[\/COLOR\]\]/gi, "</div>");

    // === 2. CODE BLOCKS [[CODE:PYTHON]] ... [[/CODE]] ===
    html = html.replace(
      /\[\[CODE:(\w+)\]\]([\s\S]*?)\[\[\/CODE\]\]/gi,
      (match, lang, code) => {
        const cleanCode = code
          .trim()
          .replace(/<[^>]*>/g, "") // Remove HTML tags
          .replace(/&nbsp;/g, " ")
          .replace(/&lt;/g, "<")
          .replace(/&gt;/g, ">")
          .replace(/&amp;/g, "&");
        return `
        <div class="code-block-wrapper">
          <div class="code-block-header">
            <span class="code-block-lang">${lang.toUpperCase()}</span>
            <button class="btn-copy-code" onclick="copyCodeToClipboard(this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy
            </button>
          </div>
          <pre><code class="language-${lang.toLowerCase()}">${escapeHtml(cleanCode)}</code></pre>
        </div>`;
      },
    );

    // === 3. EXAMPLE BLOCKS [[EXAMPLE]] ... [[/EXAMPLE]] ===
    html = html.replace(
      /\[\[EXAMPLE\]\]([\s\S]*?)\[\[\/EXAMPLE\]\]/gi,
      (match, content) => {
        return `<div class="example-block">${content}</div>`;
      },
    );

    // === 4. CALLOUT BLOCKS ===
    const calloutTypes = [
      { marker: "NOTE", class: "callout-note" },
      { marker: "TIP", class: "callout-tip" },
      { marker: "WARNING", class: "callout-warning" },
      { marker: "CHECKPOINT", class: "callout-checkpoint" },
      { marker: "TASK", class: "callout-task" },
      { marker: "QA", class: "callout-qa" },
    ];

    for (const type of calloutTypes) {
      const regex = new RegExp(
        `\\[\\[${type.marker}\\]\\]([\\s\\S]*?)\\[\\[\\/${type.marker}\\]\\]`,
        "gi",
      );
      html = html.replace(regex, (match, content) => {
        return `<div class="${type.class}">${content}</div>`;
      });
    }

    // === 5. MARKDOWN CODE BLOCKS ```python ... ``` ===
    html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (match, lang, code) => {
      const language = lang || "plaintext";
      const cleanCode = code
        .trim()
        .replace(/<[^>]*>/g, "")
        .replace(/&nbsp;/g, " ")
        .replace(/&lt;/g, "<")
        .replace(/&gt;/g, ">")
        .replace(/&amp;/g, "&");
      return `
        <div class="code-block-wrapper">
          <div class="code-block-header">
            <span class="code-block-lang">${language.toUpperCase()}</span>
            <button class="btn-copy-code" onclick="copyCodeToClipboard(this)">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              Copy
            </button>
          </div>
          <pre><code class="language-${language.toLowerCase()}">${escapeHtml(cleanCode)}</code></pre>
        </div>`;
    });

    // === 6. RESOURCE LINKS section ===
    html = html.replace(
      /\[\[RESOURCES\]\]([\s\S]*?)\[\[\/RESOURCES\]\]/gi,
      (match, content) => {
        return `<div class="resource-links">${content}</div>`;
      },
    );

    // === 7. FIGURE with caption ===
    html = html.replace(
      /\[\[FIGURE:([^\]]*)\]\]([\s\S]*?)\[\[\/FIGURE\]\]/gi,
      (match, caption, content) => {
        return `<figure>${content}<figcaption>${caption}</figcaption></figure>`;
      },
    );

    container.innerHTML = html;
    console.log("✅ Markers parsed and transformed");
  }

  /**
   * Escape HTML special characters
   */
  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  // ========================================
  // 📄 NORMALIZE GOOGLE DOC CONTENT
  // ========================================

  /**
   * Clean and normalize HTML from Google Doc
   * Remove inline styles, fix spacing, standardize elements
   */
  function normalizeDocContent(container) {
    console.log("📄 Normalizing Google Doc content...");

    // === STEP 1: Unwrap unnecessary spans from Google Doc ===
    // Google Doc wraps each word/phrase in <span> with inline styles
    // We need to unwrap these to fix the word-by-word line break issue
    const spans = container.querySelectorAll("span");
    spans.forEach((span) => {
      // Check if span only contains text (no special elements)
      const hasOnlyText =
        span.childNodes.length === 1 &&
        span.childNodes[0].nodeType === Node.TEXT_NODE;
      const hasOnlyInlineChildren = Array.from(span.children).every((child) =>
        ["SPAN", "A", "STRONG", "B", "EM", "I", "U", "CODE"].includes(
          child.tagName,
        ),
      );

      // If span has no special attributes worth keeping, unwrap it
      const keepSpan =
        span.classList.length > 0 || span.id || span.dataset.length > 0;

      if (
        !keepSpan &&
        (hasOnlyText || hasOnlyInlineChildren || span.children.length === 0)
      ) {
        // Replace span with its contents
        const parent = span.parentNode;
        while (span.firstChild) {
          parent.insertBefore(span.firstChild, span);
        }
        parent.removeChild(span);
      }
    });

    // === STEP 2: Remove all inline font styles ===
    const allElements = container.querySelectorAll("*");
    allElements.forEach((el) => {
      const style = el.getAttribute("style");
      if (style) {
        // Keep only essential styles like text-align, width for images
        const allowedProps = ["text-align", "width", "height", "max-width"];
        const newStyle = allowedProps
          .map((prop) => {
            const match = style.match(new RegExp(`${prop}\\s*:\\s*[^;]+`, "i"));
            return match ? match[0] : null;
          })
          .filter(Boolean)
          .join("; ");
        if (newStyle) {
          el.setAttribute("style", newStyle);
        } else {
          el.removeAttribute("style");
        }
      }
    });

    // === STEP 3: Fix line breaks in headings and paragraphs ===
    // Google Doc sometimes adds <br> inside headings
    const headingsAndParagraphs = container.querySelectorAll(
      "h1, h2, h3, h4, h5, h6, p",
    );
    headingsAndParagraphs.forEach((el) => {
      // Replace multiple spaces with single space
      el.innerHTML = el.innerHTML
        .replace(/\s+/g, " ")
        .replace(/<br\s*\/?>\s*/gi, " ")
        .trim();
    });

    // === STEP 4: Normalize empty paragraphs (spacers) ===
    const paragraphs = container.querySelectorAll("p");
    paragraphs.forEach((p) => {
      if (!p.textContent.trim() && !p.querySelector("img")) {
        p.classList.add("spacer");
      }
    });

    // === STEP 5: Add IDs to headings ===
    const headings = container.querySelectorAll("h1, h2, h3, h4, h5, h6");
    headings.forEach((h, index) => {
      if (!h.id) {
        h.id = `heading-${index}`;
      }
    });

    // === STEP 6: Normalize lists ===
    const lists = container.querySelectorAll("ul, ol");
    lists.forEach((list) => {
      const items = list.querySelectorAll("li");
      items.forEach((li) => {
        if (!li.textContent.trim()) {
          li.remove();
        }
      });
    });

    console.log("✅ Content normalized");
  }

  // ========================================
  // 🏷️ DEFINITION / EXAMPLE / NOTE BADGES
  // ========================================

  /**
   * Transform lines starting with "Định nghĩa:", "Ví dụ:", "Lưu ý:", etc.
   */
  function enhanceDefinitionBlocks(container) {
    console.log("🏷️ Enhancing definition blocks...");

    const patterns = [
      {
        regex: /^(Định nghĩa|Definition)\s*:/i,
        type: "definition",
        icon: "📖",
        label: "Định nghĩa",
      },
      {
        regex: /^(Ví dụ|Example)\s*:/i,
        type: "example",
        icon: "💡",
        label: "Ví dụ",
      },
      {
        regex: /^(Lưu ý|Note|Chú ý)\s*:/i,
        type: "note",
        icon: "📝",
        label: "Lưu ý",
      },
      {
        regex: /^(Quan trọng|Important)\s*:/i,
        type: "important",
        icon: "⚠️",
        label: "Quan trọng",
      },
      {
        regex: /^(Cú pháp|Syntax)\s*:/i,
        type: "definition",
        icon: "📐",
        label: "Cú pháp",
      },
    ];

    // Find all paragraphs and list items
    const elements = container.querySelectorAll("p, li");

    elements.forEach((el) => {
      const text = el.textContent.trim();

      for (const pattern of patterns) {
        if (pattern.regex.test(text)) {
          // Extract content after the label
          const content = text.replace(pattern.regex, "").trim();

          // Create badge block
          const badgeBlock = document.createElement("div");
          badgeBlock.className = `lesson-badge-block ${pattern.type}`;
          badgeBlock.innerHTML = `
            <div class="lesson-badge">

              <span>${pattern.label}</span>
            </div>
            <div class="lesson-badge-content">${
              content || el.innerHTML.replace(pattern.regex, "")
            }</div>
          `;

          // Replace original element
          el.replaceWith(badgeBlock);
          break;
        }
      }
    });
  }

  // ========================================
  // 1️⃣ SYNTAX HIGHLIGHTING
  // ========================================

  /**
   * Detect and enhance code blocks with Prism.js highlighting
   */
  function enhanceSyntaxHighlighting(container) {
    console.log("📝 Enhancing code blocks...");

    // Method 1: Find existing <pre><code> blocks
    const existingCodeBlocks = container.querySelectorAll(
      "pre:not(.code-block-wrapper pre), code:not(.code-block-wrapper code)",
    );

    // Method 2: Find monospace font spans (from Google Docs)
    const monoSpans = container.querySelectorAll("span");
    let codeBuffer = [];
    let lastCodeParent = null;

    monoSpans.forEach((span) => {
      const style = span.getAttribute("style") || "";
      const isMonospace =
        style.includes("Courier") ||
        style.includes("Consolas") ||
        style.includes("monospace") ||
        style.includes("Monaco") ||
        style.includes("Source Code");

      if (isMonospace && span.textContent.trim()) {
        // Check if it's a substantial code block (not just inline code)
        const text = span.textContent;
        if (text.includes("\n") || text.length > 50 || codeBuffer.length > 0) {
          codeBuffer.push(span.textContent);
          if (!lastCodeParent) lastCodeParent = span.parentElement;
        }
      } else if (codeBuffer.length > 0 && lastCodeParent) {
        // End of code block detected
        createCodeBlock(lastCodeParent, codeBuffer.join(""));
        codeBuffer = [];
        lastCodeParent = null;
      }
    });

    // Handle remaining buffer
    if (codeBuffer.length > 0 && lastCodeParent) {
      createCodeBlock(lastCodeParent, codeBuffer.join(""));
    }

    // Enhance existing code blocks
    existingCodeBlocks.forEach((el) => {
      if (el.closest(".code-block-wrapper")) return; // Skip already enhanced

      const isPreTag = el.tagName === "PRE";
      const code = isPreTag
        ? el.querySelector("code")?.textContent || el.textContent
        : el.textContent;

      if (code.trim().length > 20) {
        createCodeBlock(el, code);
      }
    });
  }

  /**
   * Create a styled code block with copy button
   */
  function createCodeBlock(targetElement, code) {
    const language = detectLanguage(code);

    const wrapper = document.createElement("div");
    wrapper.className = "code-block-wrapper";
    wrapper.innerHTML = `
      <div class="code-block-header">
        <span class="code-block-lang">${language}</span>
        <button class="btn-copy-code" onclick="copyCodeToClipboard(this)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        </button>
      </div>
      <pre><code class="language-${language}">${escapeHtml(
        code.trim(),
      )}</code></pre>
    `;

    // Replace target element
    if (targetElement.parentElement) {
      targetElement.parentElement.replaceChild(wrapper, targetElement);
    }
  }

  /**
   * Detect programming language from code content
   */
  function detectLanguage(code) {
    const patterns = {
      python: [
        /\bdef\s+\w+\(/,
        /\bimport\s+\w+/,
        /\bprint\s*\(/,
        /\bclass\s+\w+:/,
        /\bif\s+__name__/,
      ],
      javascript: [
        /\bfunction\s+\w+/,
        /\bconst\s+\w+/,
        /\blet\s+\w+/,
        /=>/,
        /\bconsole\.log/,
      ],
      java: [
        /\bpublic\s+class/,
        /\bpublic\s+static\s+void/,
        /System\.out\.println/,
      ],
      csharp: [/\busing\s+System/, /\bnamespace\s+\w+/, /Console\.WriteLine/],
      html: [/<\/?[a-z][\s\S]*>/i, /<!DOCTYPE/i],
      css: [/\{[\s\S]*:[\s\S]*;[\s\S]*\}/, /@media/, /@keyframes/],
      sql: [/\bSELECT\b/i, /\bFROM\b/i, /\bWHERE\b/i, /\bINSERT\b/i],
      bash: [/^\s*#!\/bin\/bash/, /\$\(/, /\becho\s+/],
    };

    for (const [lang, regexps] of Object.entries(patterns)) {
      if (regexps.some((regex) => regex.test(code))) {
        return lang;
      }
    }
    return "plaintext";
  }

  /**
   * Copy code to clipboard
   */
  function copyCodeToClipboard(button) {
    const wrapper = button.closest(".code-block-wrapper");
    const code = wrapper.querySelector("code").textContent;

    navigator.clipboard.writeText(code).then(() => {
      button.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 6L9 17l-5-5"/>
        </svg>
        Copied!
      `;
      button.classList.add("copied");

      setTimeout(() => {
        button.innerHTML = `
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          Copy
        `;
        button.classList.remove("copied");
      }, 2000);
    });
  }

  // ========================================
  // 2️⃣ CALLOUT BLOCKS
  // ========================================

  /**
   * Transform blockquotes with emojis into styled callout blocks
   */
  function enhanceCalloutBlocks(container) {
    console.log("📦 Enhancing callout blocks...");

    // Find blockquotes or indented paragraphs
    const blockquotes = container.querySelectorAll(
      'blockquote, [style*="margin-left"]',
    );

    blockquotes.forEach((block) => {
      const text = block.textContent.trim();
      const firstChar = text.charAt(0);

      let calloutType = null;
      let title = "";
      let icon = "";

      // Detect callout type by emoji
      if (
        text.startsWith("💡") ||
        text.toLowerCase().includes("tip:") ||
        text.toLowerCase().includes("mẹo:")
      ) {
        calloutType = "tip";
        title = "Mẹo hay";
        icon = "💡";
      } else if (
        text.startsWith("⚠️") ||
        text.toLowerCase().includes("warning:") ||
        text.toLowerCase().includes("cảnh báo:")
      ) {
        calloutType = "warning";
        title = "Lưu ý";
        icon = "⚠️";
      } else if (
        text.startsWith("📝") ||
        text.toLowerCase().includes("note:") ||
        text.toLowerCase().includes("ghi chú:")
      ) {
        calloutType = "note";
        title = "Ghi nhớ";
        icon = "📝";
      } else if (
        text.startsWith("ℹ️") ||
        text.toLowerCase().includes("info:") ||
        text.toLowerCase().includes("thông tin:")
      ) {
        calloutType = "info";
        title = "Thông tin";
        icon = "ℹ️";
      }

      if (calloutType) {
        // Remove emoji from content
        let content = block.innerHTML.replace(/^[💡⚠️📝ℹ️]\s*/, "");
        content = content.replace(
          /^(tip|warning|note|info|mẹo|cảnh báo|ghi chú|thông tin):\s*/i,
          "",
        );

        const callout = document.createElement("div");
        callout.className = `callout-block callout-${calloutType}`;
        callout.innerHTML = `
          <span class="callout-icon">${icon}</span>
          <div class="callout-title">${title}</div>
          <div class="callout-content">${content}</div>
        `;

        block.replaceWith(callout);
      }
    });
  }

  // ========================================
  // 3️⃣ GRID CARDS FOR SHORT LISTS
  // ========================================

  /**
   * Transform short lists into grid cards
   */
  function enhanceShortLists(container) {
    console.log("📊 Enhancing short lists...");

    const lists = container.querySelectorAll("ul, ol");

    lists.forEach((list) => {
      const items = list.querySelectorAll("li");

      // Only transform short lists (2-6 items) with short content
      if (items.length >= 2 && items.length <= 6) {
        const allShort = Array.from(items).every((item) => {
          const text = item.textContent.trim();
          return text.length < 80 && !text.includes("\n");
        });

        if (allShort) {
          list.classList.add("list-grid-cards");
        }
      }
    });
  }

  // ========================================
  // 4️⃣ AUTO-EMBED YOUTUBE
  // ========================================

  /**
   * Auto-embed YouTube links as iframes
   */
  function enhanceYouTubeLinks(container) {
    console.log("🎬 Enhancing YouTube links...");

    const youtubeRegex =
      /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})(?:[^\s<]*)?/g;

    // Find text nodes containing YouTube links
    const walker = document.createTreeWalker(
      container,
      NodeFilter.SHOW_TEXT,
      null,
      false,
    );
    const nodesToReplace = [];

    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (youtubeRegex.test(node.textContent)) {
        nodesToReplace.push(node);
      }
      youtubeRegex.lastIndex = 0;
    }

    nodesToReplace.forEach((node) => {
      const text = node.textContent;
      const matches = text.matchAll(youtubeRegex);

      for (const match of matches) {
        const videoId = match[1];
        const fullUrl = match[0];

        const wrapper = document.createElement("div");
        wrapper.className = "youtube-embed-wrapper";
        wrapper.innerHTML = `
          <iframe
            src="https://www.youtube.com/embed/${videoId}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        `;

        // Replace link with embed
        const parent = node.parentNode;
        if (parent) {
          const newText = document.createTextNode(text.replace(fullUrl, ""));
          parent.replaceChild(wrapper, node);
          if (newText.textContent.trim()) {
            parent.insertBefore(newText, wrapper);
          }
        }
      }
    });

    // Also handle <a> tags with YouTube links
    const links = container.querySelectorAll(
      'a[href*="youtube.com"], a[href*="youtu.be"]',
    );
    links.forEach((link) => {
      const href = link.href;
      const match = href.match(
        /(?:youtube\.com\/(?:watch\?v=|embed\/)|youtu\.be\/)([\w-]{11})/,
      );

      if (match) {
        const videoId = match[1];
        const wrapper = document.createElement("div");
        wrapper.className = "youtube-embed-wrapper";
        wrapper.innerHTML = `
          <iframe
            src="https://www.youtube.com/embed/${videoId}"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
          </iframe>
        `;
        link.replaceWith(wrapper);
      }
    });
  }

  // ========================================
  // 5️⃣ TABLE OF CONTENTS
  // ========================================

  /**
   * Generate sticky Table of Contents with ScrollSpy - Premium Design
   */
  function generateTableOfContents(container) {
    console.log("📚 Generating Table of Contents...");

    const headings = container.querySelectorAll("h1, h2, h3");
    if (headings.length < 3) return; // Don't show TOC for very short content

    // Add IDs to headings
    headings.forEach((heading, index) => {
      if (!heading.id) {
        heading.id = `heading-${index}`;
      }
    });

    // Create TOC element
    const toc = document.createElement("div");
    toc.className = "lesson-toc";
    toc.innerHTML = `
      <div class="toc-header">
        <span class="toc-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 6h16"/>
            <path d="M4 12h12"/>
            <path d="M4 18h8"/>
          </svg>
          <span class="toc-title-text">MỤC LỤC</span>
        </span>
        <button class="toc-toggle" onclick="toggleTOC()" title="Thu gọn">
          <svg class="toc-toggle-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
      </div>
      <div class="toc-content">
        <ul class="toc-list">
          ${Array.from(headings)
            .map((h, i) => {
              const level = parseInt(h.tagName.charAt(1));
              const icon = level === 1 ? "📑" : level === 2 ? "📄" : "📝";
              return `
              <li class="toc-item">
                <a href="#${h.id}" class="toc-link level-${level}" data-target="${h.id}" onclick="smoothScrollToHeading(event, '${h.id}')">
                  ${h.textContent}
                </a>
              </li>
            `;
            })
            .join("")}
        </ul>
      </div>
      <div class="toc-progress">
        <div class="toc-progress-bar" id="toc-progress-bar"></div>
      </div>
    `;

    // Add to page
    document.querySelector(".lesson-container").appendChild(toc);

    // Setup ScrollSpy
    setupScrollSpy(headings);

    // Setup progress tracking
    setupTocProgress();
  }

  /**
   * Smooth scroll to heading
   */
  function smoothScrollToHeading(event, targetId) {
    event.preventDefault();
    const target = document.getElementById(targetId);
    if (target) {
      target.scrollIntoView({ behavior: "smooth", block: "start" });
    }
  }

  /**
   * Setup ScrollSpy for TOC highlighting
   */
  function setupScrollSpy(headings) {
    const tocLinks = document.querySelectorAll(".toc-link");

    const observer = new IntersectionObserver(
      (entries) => {
        entries.forEach((entry) => {
          if (entry.isIntersecting) {
            tocLinks.forEach((link) => link.classList.remove("active"));
            const activeLink = document.querySelector(
              `.toc-link[data-target="${entry.target.id}"]`,
            );
            if (activeLink) {
              activeLink.classList.add("active");
              // Scroll TOC to show active item
              activeLink.scrollIntoView({
                behavior: "smooth",
                block: "nearest",
              });
            }
          }
        });
      },
      {
        rootMargin: "-20% 0px -70% 0px",
      },
    );

    headings.forEach((heading) => observer.observe(heading));
  }

  /**
   * Setup TOC progress bar
   */
  function setupTocProgress() {
    const progressBar = document.getElementById("toc-progress-bar");
    if (!progressBar) return;

    window.addEventListener("scroll", () => {
      const windowHeight = window.innerHeight;
      const documentHeight = document.documentElement.scrollHeight;
      const scrollTop =
        window.pageYOffset || document.documentElement.scrollTop;
      const scrollable = documentHeight - windowHeight;
      const progress = scrollable > 0 ? (scrollTop / scrollable) * 100 : 0;
      progressBar.style.width = Math.min(progress, 100) + "%";
    });
  }

  /**
   * Toggle TOC collapse
   */
  function toggleTOC() {
    const toc = document.querySelector(".lesson-toc");
    if (toc) {
      toc.classList.toggle("collapsed");
    }
  }

  // Expose to global
  window.smoothScrollToHeading = smoothScrollToHeading;

  // ========================================
  // 6️⃣ MINI-QUIZ CHECKPOINTS
  // ========================================

  /**
   * Parse and create mini-quiz widgets
   * Format: [QUIZ: Question? | Option1 | Option2 | Option3*]
   * Asterisk (*) marks the correct answer
   */
  function enhanceMiniQuizzes(container) {
    console.log("🎯 Enhancing mini-quizzes...");

    const quizRegex = /\[QUIZ:\s*(.+?)\s*\|\s*(.+?)\]/g;

    // Find text containing quiz format
    const walker = document.createTreeWalker(
      container,
      NodeFilter.SHOW_TEXT,
      null,
      false,
    );
    const nodesToReplace = [];

    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (quizRegex.test(node.textContent)) {
        nodesToReplace.push(node);
      }
      quizRegex.lastIndex = 0;
    }

    nodesToReplace.forEach((node) => {
      const text = node.textContent;
      const match = text.match(/\[QUIZ:\s*(.+?)\s*\|\s*(.+?)\]/);

      if (match) {
        const question = match[1].trim();
        const optionsStr = match[2];
        const options = optionsStr.split("|").map((opt) => {
          const isCorrect = opt.trim().endsWith("*");
          return {
            text: opt.trim().replace(/\*$/, ""),
            correct: isCorrect,
          };
        });

        const quizId = "quiz-" + Math.random().toString(36).substr(2, 9);

        const quiz = document.createElement("div");
        quiz.className = "mini-quiz";
        quiz.id = quizId;
        quiz.innerHTML = `
          <div class="mini-quiz-header">
            <div class="mini-quiz-icon">❓</div>
            <span class="mini-quiz-label">Kiểm tra nhanh</span>
          </div>
          <p class="mini-quiz-question">${question}</p>
          <div class="mini-quiz-options">
            ${options
              .map(
                (opt, i) => `
              <div class="mini-quiz-option" onclick="handleMiniQuizAnswer(this, ${opt.correct}, '${quizId}')" data-correct="${opt.correct}">
                <div class="mini-quiz-radio"></div>
                <span class="mini-quiz-text">${opt.text}</span>
              </div>
            `,
              )
              .join("")}
          </div>
          <div class="mini-quiz-feedback"></div>
        `;

        const parent = node.parentNode;
        if (parent) {
          const remaining = text.replace(match[0], "");
          if (remaining.trim()) {
            const textNode = document.createTextNode(remaining);
            parent.insertBefore(textNode, node);
          }
          parent.replaceChild(quiz, node);
        }
      }
    });
  }

  /**
   * Handle mini-quiz answer selection
   */
  function handleMiniQuizAnswer(option, isCorrect, quizId) {
    const quiz = document.getElementById(quizId);
    if (!quiz) return;

    // Check if already answered
    if (quiz.dataset.answered === "true") return;

    const options = quiz.querySelectorAll(".mini-quiz-option");
    const feedback = quiz.querySelector(".mini-quiz-feedback");

    // Mark as answered
    quiz.dataset.answered = "true";

    // Clear previous selections
    options.forEach((opt) => {
      opt.classList.remove("selected", "correct", "incorrect");
    });

    // Show result
    option.classList.add("selected");

    if (isCorrect) {
      option.classList.add("correct");
      feedback.className = "mini-quiz-feedback show correct";
      feedback.innerHTML = "🎉 Chính xác! Bạn đã hiểu đúng rồi!";

      // Mark mini quiz completed for overall progress
      onMiniQuizCompleted();

      // Confetti effect
      createConfetti();
    } else {
      option.classList.add("incorrect");
      feedback.className = "mini-quiz-feedback show incorrect";

      // Show correct answer
      options.forEach((opt) => {
        if (opt.dataset.correct === "true") {
          opt.classList.add("correct");
        }
      });
      feedback.innerHTML = "❌ Chưa chính xác. Hãy xem lại đáp án đúng nhé!";
    }
  }

  /**
   * Create confetti celebration effect
   */
  function createConfetti() {
    const colors = ["#5b6ff8", "#f59e0b", "#22c55e", "#ec4899", "#8b5cf6"];
    const container = document.createElement("div");
    container.className = "confetti-container";
    document.body.appendChild(container);

    for (let i = 0; i < 50; i++) {
      const confetti = document.createElement("div");
      confetti.style.cssText = `
        position: absolute;
        width: 10px;
        height: 10px;
        background: ${colors[Math.floor(Math.random() * colors.length)]};
        left: ${Math.random() * 100}%;
        top: -10px;
        border-radius: ${Math.random() > 0.5 ? "50%" : "0"};
        animation: confetti-fall ${1 + Math.random() * 2}s linear forwards;
      `;
      container.appendChild(confetti);
    }

    // Add keyframes dynamically
    if (!document.getElementById("confetti-keyframes")) {
      const style = document.createElement("style");
      style.id = "confetti-keyframes";
      style.textContent = `
        @keyframes confetti-fall {
          to {
            top: 100vh;
            transform: rotate(${Math.random() * 720}deg);
            opacity: 0;
          }
        }
      `;
      document.head.appendChild(style);
    }

    setTimeout(() => container.remove(), 3000);
  }

  // ========================================
  // 7️⃣ SPOILER EFFECTS
  // ========================================

  /**
   * Transform highlighted (black background) text into spoilers
   */
  function enhanceSpoilers(container) {
    console.log("🔒 Enhancing spoilers...");

    // Find spans with black background
    const spans = container.querySelectorAll('span[style*="background"]');

    spans.forEach((span) => {
      const style = span.getAttribute("style") || "";
      const hasBlackBg =
        style.includes("background-color: rgb(0, 0, 0)") ||
        style.includes("background-color:#000") ||
        style.includes("background:black") ||
        style.includes("background: black") ||
        style.includes("background-color: black");

      if (hasBlackBg && span.textContent.trim()) {
        const spoiler = document.createElement("span");
        spoiler.className = "spoiler";
        spoiler.textContent = span.textContent;
        spoiler.onclick = () => toggleSpoiler(spoiler);
        span.replaceWith(spoiler);
      }
    });

    // Also look for [SPOILER: text] format
    const spoilerRegex = /\[SPOILER:\s*(.+?)\]/g;
    const walker = document.createTreeWalker(
      container,
      NodeFilter.SHOW_TEXT,
      null,
      false,
    );
    const nodesToReplace = [];

    while (walker.nextNode()) {
      const node = walker.currentNode;
      if (spoilerRegex.test(node.textContent)) {
        nodesToReplace.push(node);
      }
      spoilerRegex.lastIndex = 0;
    }

    nodesToReplace.forEach((node) => {
      const text = node.textContent;
      const newHtml = text.replace(
        /\[SPOILER:\s*(.+?)\]/g,
        (match, content) => {
          return `<span class="spoiler" onclick="toggleSpoiler(this)">${content}</span>`;
        },
      );

      const temp = document.createElement("span");
      temp.innerHTML = newHtml;
      node.parentNode.replaceChild(temp, node);
    });
  }

  /**
   * Toggle spoiler visibility
   */
  function toggleSpoiler(element) {
    element.classList.toggle("revealed");
  }

  // ========================================
  // UTILITY FUNCTIONS
  // ========================================

  /**
   * Escape HTML to prevent XSS in code blocks
   */
  function escapeHtml(text) {
    const div = document.createElement("div");
    div.textContent = text;
    return div.innerHTML;
  }

  // ========================================
  // GALAXY HEADER EFFECTS
  // ========================================

  // Meteor shower for lesson header
  let lessonMeteorInterval = null;

  function startLessonHeaderMeteors() {
    const container = document.getElementById("lessonMeteorContainer");
    if (!container) return;

    if (lessonMeteorInterval) {
      clearInterval(lessonMeteorInterval);
    }

    lessonMeteorInterval = setInterval(() => {
      if (!document.getElementById("lessonMeteorContainer")) {
        clearInterval(lessonMeteorInterval);
        return;
      }
      createLessonMeteor();
    }, 800);

    createLessonMeteor();
  }

  function createLessonMeteor() {
    const container = document.getElementById("lessonMeteorContainer");
    if (!container) return;

    const meteor = document.createElement("div");
    meteor.className = "lesson-header-meteor";

    // Random position from top-left area
    const startX = Math.random() * 40; // 0-40% from left
    const startY = Math.random() * 20; // 0-20% from top

    meteor.style.left = startX + "%";
    meteor.style.top = startY + "%";

    // Random size for variety
    const height = 35 + Math.random() * 35;
    meteor.style.height = height + "px";
    meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

    container.appendChild(meteor);

    setTimeout(() => {
      meteor.remove();
    }, 1500);
  }

  // ===== MOUSE-RESPONSIVE STARS EFFECT =====
  function setupLessonHeaderMouseEffect() {
    const header = document.querySelector(".lesson-header");
    const stars = document.getElementById("lessonHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  // Export functions to global
  window.initLessonPage = initLessonPage;
  window.switchLessonTab = switchLessonTab;
  window.startLessonHeaderMeteors = startLessonHeaderMeteors;
  window.setupLessonHeaderMouseEffect = setupLessonHeaderMouseEffect;
</script>
