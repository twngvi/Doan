<!-- Global Sidebar - Fixed for all pages -->
<aside class="global-sidebar" id="globalSidebar">
  <div class="sidebar-header">
    <div class="logo">
      <img id="sidebarLogo" 
           src="https://cdn.jsdelivr.net/gh/twngvi/Doan@main/Image/landing/LOGO.svg" 
           alt="Terracode" 
           style="max-width: 100%; height: auto; cursor: pointer;" 
           onclick="if(typeof showPage === 'function') showPage('page-dashboard')" />
    </div>
  </div>

  <!-- Search Box - Tách riêng khỏi navbar -->
  <div class="sidebar-search-wrapper">
    <div class="sidebar-search-item" id="sidebarSearchBox">
      <span class="search-icon material-symbols-sharp">search</span>
      <input
        type="text"
        class="sidebar-search-input"
        id="sidebarSearchInput"
        placeholder="Tìm kiếm..."
        autocomplete="off"
      />
    </div>
    <div
      class="sidebar-search-results"
      id="sidebarSearchResults"
      aria-live="polite"
    ></div>
  </div>

  <nav class="sidebar-nav">
    <a href="#" class="nav-item" data-page="page-dashboard">
      <span class="nav-icon material-symbols-sharp">home</span>
      <span class="nav-label">Tổng quan</span>
    </a>
    <a href="#" class="nav-item" data-page="page-topics">
      <span class="nav-icon material-symbols-sharp">topic</span>
      <span class="nav-label">Chủ đề</span>
    </a>
    <!-- Game parent item with flyout submenu -->
    <a href="#" class="nav-item nav-item-game" id="navGameItem" data-submenu="game" role="button" aria-haspopup="true" aria-expanded="false">
      <span class="nav-icon material-symbols-sharp">sports_esports</span>
      <span class="nav-label">Game</span>
      <span class="nav-submenu-chevron material-symbols-sharp">chevron_right</span>
    </a>
    <a href="#" class="nav-item" data-page="page-pet">
      <span class="nav-icon material-symbols-sharp">pets</span>
      <span class="nav-label">Pet</span>
    </a>
    <a href="#" class="nav-item" data-page="page-code-playground">
      <span class="nav-icon material-symbols-sharp">code</span>
      <span class="nav-label">Code Playground</span>
    </a>
  </nav>

  <!-- Toggle Button - Between nav and footer -->
  <button
    class="sidebar-toggle-btn"
    id="sidebarToggleBtn"
    title="Thu gọn/Mở rộng sidebar"
  >
    <span class="toggle-icon material-symbols-sharp"
      >keyboard_double_arrow_left</span
    >
  </button>

  <div class="sidebar-footer">
    <!-- User Avatar - Click to go to profile -->
    <div
      class="sidebar-user-profile"
      id="sidebarUserProfile"
      onclick="showPage('page-profile')"
      title="Xem hồ sơ"
    >
      <img
        src="https://ui-avatars.com/api/?name=User&background=random"
        alt="User"
        class="sidebar-avatar"
        id="sidebar-avatar"
      />
      <span class="sidebar-username" id="sidebar-username">User</span>
    </div>

    <!-- Logout Button - styled like avatar section -->
    <button class="sidebar-logout-btn" id="globalLogoutBtn" title="Đăng xuất">
      <span class="logout-icon material-symbols-sharp">logout</span>
      <span class="logout-label">Đăng xuất</span>
    </button>
  </div>
</aside>

<!-- Logout Confirmation Modal -->
<div class="logout-modal-overlay" id="logoutModalOverlay">
  <div class="logout-modal">
    <div class="logout-modal-icon">
      <span class="material-symbols-sharp">logout</span>
    </div>
    <h3 class="logout-modal-title">Xác nhận đăng xuất</h3>
    <p class="logout-modal-text">Bạn có chắc chắn muốn đăng xuất không?</p>
    <div class="logout-modal-buttons">
      <button class="btn-cancel" id="logoutCancelBtn">Hủy</button>
      <button class="btn-confirm" id="logoutConfirmBtn">Đăng xuất</button>
    </div>
  </div>
</div>

<!-- Mobile Overlay -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<!-- Game Flyout Submenu (body-level portal) -->
<div class="sidebar-flyout" id="gameSubmenu" role="menu" aria-label="Game submenu">
  <div class="sidebar-flyout-arrow"></div>
  <div class="sidebar-flyout-title">
    <span class="material-symbols-sharp">sports_esports</span>
    Game
  </div>
  <a href="#" class="sidebar-flyout-item flyout-highlight" id="flyoutMcq" data-page="page-mcq" role="menuitem">
    <span class="sidebar-flyout-item-icon material-symbols-sharp">quiz</span>
    <div class="sidebar-flyout-item-info">
      <span class="sidebar-flyout-item-label">Quiz Visual</span>
      <span class="sidebar-flyout-item-desc">Câu hỏi trắc nghiệm</span>
    </div>
  </a>
  <a href="#" class="sidebar-flyout-item flyout-highlight" id="flyoutMatching" data-page="page-matching" role="menuitem">
    <span class="sidebar-flyout-item-icon material-symbols-sharp">join_right</span>
    <div class="sidebar-flyout-item-info">
      <span class="sidebar-flyout-item-label">Matching Game</span>
      <span class="sidebar-flyout-item-desc">Ghép cặp từ vựng</span>
    </div>
  </a>
</div>
