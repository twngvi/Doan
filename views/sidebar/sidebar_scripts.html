<script>
  (function () {
    "use strict";

    // Danh sách các trang KHÔNG hiện sidebar (Public Pages + Admin Pages)
    const PUBLIC_PAGES = [
      "page-landing",
      "page-login",
      "page-register",
      "page-verify-email",
      "page-forgot-password",
      "page-admin", // ⭐ Ẩn sidebar cho trang admin
    ];

    // Global Sidebar Management
    const GlobalSidebar = {
      sidebar: null,
      toggleBtn: null,
      overlay: null,
      isCollapsed: false,
      isMobileOpen: false,

      init: function () {
        this.sidebar = document.getElementById("globalSidebar");
        this.toggleBtn = document.getElementById("sidebarToggleBtn");
        this.overlay = document.getElementById("sidebarOverlay");

        if (!this.sidebar) {
          console.error("Global sidebar not found!");
          return;
        }

        console.log("Global sidebar initialized");

        // Load saved state
        this.loadState();

        // Setup event listeners
        this.setupEventListeners();

        // Setup navigation
        this.setupNavigation();

        // Kiểm tra ngay lập tức khi init
        this.checkVisibility(this.getCurrentPageId());
      },

      setupEventListeners: function () {
        // Desktop toggle
        if (this.toggleBtn) {
          this.toggleBtn.addEventListener("click", () => this.toggleCollapse());
        }

        // Mobile overlay
        if (this.overlay) {
          this.overlay.addEventListener("click", () => this.closeMobile());
        }

        // Window resize
        window.addEventListener("resize", () => this.handleResize());

        // Prevent sidebar close on sidebar click
        if (this.sidebar) {
          this.sidebar.addEventListener("click", (e) => {
            e.stopPropagation();
          });
        }

        // Search box - expand sidebar when clicked
        const searchBox = document.getElementById("sidebarSearchBox");
        const searchInput = document.getElementById("sidebarSearchInput");
        if (searchBox && searchInput) {
          searchBox.addEventListener("click", () => {
            if (this.isCollapsed) {
              this.isCollapsed = false;
              this.updateCollapsedState();
              this.saveState();
              // Focus vào input sau khi expand
              setTimeout(() => searchInput.focus(), 300);
            }
          });
        }
      },

      setupNavigation: function () {
        const navItems = this.sidebar.querySelectorAll(".nav-item[data-page]");

        navItems.forEach((item) => {
          item.addEventListener("click", (e) => {
            e.preventDefault();
            const targetPage = item.getAttribute("data-page");

            // Update active state
            navItems.forEach((nav) => nav.classList.remove("active"));
            item.classList.add("active");

            // Clear currentPageParams when navigating from sidebar
            // This ensures pages like MCQ show their selection screen
            window.currentPageParams = null;

            // Navigate to page
            if (typeof showPage === "function") {
              showPage(targetPage);
            }

            // Close mobile menu
            if (window.innerWidth <= 768) {
              this.closeMobile();
            }
          });
        });

        // Logout button - Show confirmation modal
        const logoutBtn = document.getElementById("globalLogoutBtn");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", () => {
            const modal = document.getElementById("logoutModalOverlay");
            if (modal) {
              modal.classList.add("show");
            }
          });
        }

        // Logout Cancel button
        const logoutCancelBtn = document.getElementById("logoutCancelBtn");
        if (logoutCancelBtn) {
          logoutCancelBtn.addEventListener("click", () => {
            const modal = document.getElementById("logoutModalOverlay");
            if (modal) {
              modal.classList.remove("show");
            }
          });
        }

        // Logout Confirm button
        const logoutConfirmBtn = document.getElementById("logoutConfirmBtn");
        if (logoutConfirmBtn) {
          logoutConfirmBtn.addEventListener("click", () => {
            const modal = document.getElementById("logoutModalOverlay");
            if (modal) {
              modal.classList.remove("show");
            }

            if (typeof logout === "function") {
              logout();
            } else {
              // Fallback logout - redirect to landing page
              localStorage.removeItem("currentUser");
              sessionStorage.removeItem("currentUser");
              localStorage.removeItem("authToken");
              localStorage.removeItem("recentActivities");
              localStorage.removeItem("userSession");
              localStorage.removeItem("isLoggedIn");
              sessionStorage.removeItem("authPanelOpen");
              sessionStorage.removeItem("authFormType");

              // Reset landing CTA if function available
              if (typeof resetLandingCTA === "function") {
                resetLandingCTA();
              }

              if (typeof showPage === "function") {
                showPage("page-landing");
              }
            }
          });
        }

        // Close modal when clicking overlay
        const logoutModalOverlay =
          document.getElementById("logoutModalOverlay");
        if (logoutModalOverlay) {
          logoutModalOverlay.addEventListener("click", (e) => {
            if (e.target === logoutModalOverlay) {
              logoutModalOverlay.classList.remove("show");
            }
          });
        }
      },

      toggleCollapse: function () {
        this.isCollapsed = !this.isCollapsed;
        this.updateCollapsedState();
        this.saveState();
      },

      updateCollapsedState: function () {
        if (this.isCollapsed) {
          this.sidebar.classList.add("collapsed");
          document.body.classList.add("sidebar-collapsed");
        } else {
          this.sidebar.classList.remove("collapsed");
          document.body.classList.remove("sidebar-collapsed");
        }
      },

      openMobile: function () {
        this.isMobileOpen = true;
        this.sidebar.classList.add("mobile-open");
        this.overlay.classList.add("active");
        document.body.style.overflow = "hidden";
      },

      closeMobile: function () {
        this.isMobileOpen = false;
        this.sidebar.classList.remove("mobile-open");
        this.overlay.classList.remove("active");
        document.body.style.overflow = "";
      },

       handleResize: function () {
         if (window.innerWidth > 768) {
           this.closeMobile();
         }
       },

       getStoredRole: function (storage) {
         if (!storage) return "";
         try {
           const raw = storage.getItem("currentUser");
           if (!raw) return "";
           const parsed = JSON.parse(raw);
           return (parsed.role || "").toString().toUpperCase();
         } catch (err) {
           return "";
         }
       },

       resolveCurrentUserRole: function () {
         if (window.currentUser?.role) {
           return window.currentUser.role.toString().toUpperCase();
         }

         const localRole = this.getStoredRole(
           typeof localStorage !== "undefined" ? localStorage : null,
         );
         if (localRole) return localRole;

         return this.getStoredRole(
           typeof sessionStorage !== "undefined" ? sessionStorage : null,
         );
       },

       isAdminRoleActive: function () {
         return this.resolveCurrentUserRole() === "ADMIN";
       },

       applyRoleSidebarState: function (isAdminActive) {
         if (this.sidebar) {
           if (isAdminActive) {
             if (!this.sidebar.dataset.prevDisplay) {
               this.sidebar.dataset.prevDisplay =
                 this.sidebar.style.display || "";
             }
             this.sidebar.style.display = "none";
             this.sidebar.setAttribute("aria-hidden", "true");
           } else {
             const prevDisplay = this.sidebar.dataset.prevDisplay || "";
             this.sidebar.style.display = prevDisplay;
             delete this.sidebar.dataset.prevDisplay;
             this.sidebar.removeAttribute("aria-hidden");
           }
         }

         const toggleables = [
           this.toggleBtn,
           this.overlay,
           document.getElementById("mobileMenuToggleGlobal"),
         ];

         toggleables.forEach((el) => {
           if (!el) return;
           el.style.display = isAdminActive ? "none" : "";
         });
       },

       // Thêm hàm lấy ID trang hiện tại an toàn hơn
       getCurrentPageId: function () {
         // Tìm page đang không ẩn
         const pages = document.querySelectorAll(".page-content");
        for (let page of pages) {
          if (page.style.display !== "none") return page.id;
        }
        // Fallback: Kiểm tra URL hash
        const hash = window.location.hash.replace("#", "page-");
        if (hash && document.getElementById(hash)) return hash;

        return "page-landing"; // Mặc định
      },

       // Hàm xử lý hiển thị quan trọng nhất
       checkVisibility: function (pageId) {
         try {
           console.log("Checking visibility for:", pageId);

           const isAdminActive = this.isAdminRoleActive();
           const isAdminPage = pageId === "page-admin";

           this.applyRoleSidebarState(isAdminActive);

           if (isAdminActive) {
             document.body.classList.add("has-admin-sidebar");
             document.body.classList.remove("has-sidebar");
             document.body.classList.add("hide-sidebar");
             console.log("Showing admin sidebar (role-based)");
             return;
           }

           if (isAdminPage) {
             document.body.classList.add("has-admin-sidebar");
             document.body.classList.remove("has-sidebar");
             document.body.classList.add("hide-sidebar");
             console.log("Showing admin sidebar for admin page");
             return;
           }

           document.body.classList.remove("has-admin-sidebar");

           // Nếu pageId nằm trong danh sách Public -> Ẩn Sidebar
           if (PUBLIC_PAGES.includes(pageId)) {
             document.body.classList.remove("has-sidebar");
             document.body.classList.add("hide-sidebar");
             console.log("Hiding sidebar for public page");
           } else {
             // Ngược lại -> Hiện Sidebar
             document.body.classList.add("has-sidebar");
             document.body.classList.remove("hide-sidebar");
             this.updateActiveNav(pageId);
             console.log("Showing sidebar for authenticated page");
             // Ensure mobile menu button is visible on authenticated pages
             ensureMobileMenuButtonVisible();
           }
         } catch (e) {
           console.warn("⚠️ Error in checkVisibility (Ignored):", e);
           // Không làm gì để trang vẫn hiển thị được
         }
       },

      getCurrentPage: function () {
        return this.getCurrentPageId();
      },

      updateActiveNav: function (pageId) {
        try {
          // 1. Kiểm tra container trước
          if (!this.sidebar) {
            console.warn(
              "⚠️ Sidebar container not found inside updateActiveNav",
            );
            return;
          }

          // 2. Nếu có sidebar mới tìm links
          const navItems = this.sidebar.querySelectorAll(
            ".nav-item[data-page]",
          );

          if (!navItems || navItems.length === 0) {
            console.warn("⚠️ No nav items found in sidebar");
            return;
          }

          // 3. Cập nhật active state
          navItems.forEach((item) => {
            if (item.getAttribute("data-page") === pageId) {
              item.classList.add("active");
            } else {
              item.classList.remove("active");
            }
          });
        } catch (e) {
          console.warn("⚠️ Error in updateActiveNav (Ignored):", e);
          // Không làm gì cả để trang vẫn load được
        }
      },

      saveState: function () {
        try {
          localStorage.setItem("sidebarCollapsed", this.isCollapsed);
        } catch (e) {
          console.warn("Could not save sidebar state:", e);
        }
      },

      loadState: function () {
        try {
          const saved = localStorage.getItem("sidebarCollapsed");
          this.isCollapsed = saved === "true";
          if (this.sidebar) {
            // Cập nhật class collapsed ngay lập tức nếu cần
            if (this.isCollapsed) {
              this.sidebar.classList.add("collapsed");
              document.body.classList.add("sidebar-collapsed");
            }
          }
        } catch (e) {
          console.warn("Could not load sidebar state:", e);
        }
      },
    };

    // Initialize when DOM is ready
    console.log("Sidebar script loaded, readyState:", document.readyState);

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", () => {
        console.log("DOM loaded, initializing sidebar");
        GlobalSidebar.init();
      });
    } else {
      console.log("DOM already loaded, initializing sidebar immediately");
      GlobalSidebar.init();
    }

    // Make it globally accessible
    window.GlobalSidebar = GlobalSidebar;

    // --- SỬA ĐỔI QUAN TRỌNG: Ghi đè showPage để xử lý tức thì ---
    const originalShowPage = window.showPage;

    // Ghi đè hàm showPage toàn cục
    window.showPage = function (pageId, params, addToHistory) {
      console.log("Navigating to:", pageId);

      // 1. Gọi hàm gốc để hiển thị nội dung trang TRƯỚC
      if (typeof originalShowPage === "function") {
        originalShowPage(pageId, params, addToHistory);
      }

      // 2. Xử lý Sidebar SAU (Bọc trong try-catch)
      try {
        if (window.GlobalSidebar) {
           window.GlobalSidebar.checkVisibility(pageId);
        } else {
          // Fallback nếu GlobalSidebar chưa load xong
          if (pageId === "page-admin") {
            document.body.classList.add("has-admin-sidebar");
            document.body.classList.remove("has-sidebar");
            document.body.classList.add("hide-sidebar");
          } else {
            document.body.classList.remove("has-admin-sidebar");
            if (PUBLIC_PAGES.includes(pageId)) {
              document.body.classList.remove("has-sidebar");
              document.body.classList.add("hide-sidebar");
            } else {
              document.body.classList.add("has-sidebar");
              document.body.classList.remove("hide-sidebar");
            }
          }
        }
      } catch (e) {
        console.warn("⚠️ Sidebar update error (Ignored):", e);
        // Không làm gì để trang vẫn hiển thị được
      }
    };

    const MOBILE_MENU_POS_KEY = "mobileMenuToggleGlobalPosV1";

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function saveMobileMenuPosition(left, top) {
      try {
        localStorage.setItem(
          MOBILE_MENU_POS_KEY,
          JSON.stringify({
            left: Math.round(left),
            top: Math.round(top),
          }),
        );
      } catch (e) {}
    }

    function applySavedMobileMenuPosition(btn) {
      if (!btn) return;
      // ⭐ Không lưu vị trí - luôn reset về mặc định
      // Menu button luôn trở về góc trái dưới khi load lại trang
      // Chỉ di chuyển được trong phiên làm việc hiện tại
    }

    function enableMobileMenuDrag(btn) {
      if (!btn || btn.dataset.dragBound === "1") return;

      let isDragging = false;
      let moved = false;
      let pointerId = null;
      let startX = 0;
      let startY = 0;
      let startLeft = 0;
      let startTop = 0;
      let suppressClickUntil = 0;

      btn.addEventListener("dragstart", function (e) {
        e.preventDefault();
      });

      btn.addEventListener("pointerdown", function (e) {
        if (window.innerWidth > 768) return;
        if (e.button !== undefined && e.button !== 0) return;

        const rect = btn.getBoundingClientRect();
        isDragging = true;
        moved = false;
        pointerId = e.pointerId;
        startX = e.clientX;
        startY = e.clientY;
        startLeft = rect.left;
        startTop = rect.top;

        btn.style.left = rect.left + "px";
        btn.style.top = rect.top + "px";
        btn.style.bottom = "auto";
        btn.style.right = "auto";
        btn.classList.add("dragging");

        if (btn.setPointerCapture) {
          try {
            btn.setPointerCapture(pointerId);
          } catch (err) {}
        }

        e.preventDefault();
      });

      btn.addEventListener("pointermove", function (e) {
        if (!isDragging || e.pointerId !== pointerId) return;

        const dx = e.clientX - startX;
        const dy = e.clientY - startY;
        if (Math.abs(dx) > 3 || Math.abs(dy) > 3) moved = true;

        const viewportW = window.innerWidth;
        const viewportH = window.innerHeight;
        const rect = btn.getBoundingClientRect();
        const margin = 8;

        const nextLeft = clamp(
          startLeft + dx,
          margin,
          viewportW - rect.width - margin,
        );
        const nextTop = clamp(
          startTop + dy,
          margin,
          viewportH - rect.height - margin,
        );

        btn.style.left = nextLeft + "px";
        btn.style.top = nextTop + "px";
      });

      function finishDrag(e) {
        if (!isDragging || e.pointerId !== pointerId) return;

        isDragging = false;
        btn.classList.remove("dragging");

        if (btn.releasePointerCapture) {
          try {
            btn.releasePointerCapture(pointerId);
          } catch (err) {}
        }

        pointerId = null;

        if (moved) {
          // ⭐ Không lưu vị trí - chỉ di chuyển được trong phiên hiện tại
          // const rect = btn.getBoundingClientRect();
          // saveMobileMenuPosition(rect.left, rect.top);
          suppressClickUntil = Date.now() + 250;
          e.preventDefault();
        }
      }

      btn.addEventListener("pointerup", finishDrag);
      btn.addEventListener("pointercancel", finishDrag);

      btn.addEventListener("click", function (e) {
        if (Date.now() < suppressClickUntil) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        GlobalSidebar.openMobile();
      });

      btn.dataset.dragBound = "1";
    }

    function setupMobileMenuToggleButton(btn) {
      if (!btn) return;
      applySavedMobileMenuPosition(btn);
      enableMobileMenuDrag(btn);
    }

    // Ensure mobile menu button is visible and properly set up
    function ensureMobileMenuButtonVisible() {
      const btn = document.getElementById("mobileMenuToggleGlobal");
      if (btn) {
        btn.style.display = "flex";
        btn.style.visibility = "visible";
        btn.style.pointerEvents = "auto";
        setupMobileMenuToggleButton(btn);
      }
    }

    // Add mobile menu toggle button dynamically
    function addMobileMenuToggle() {
      const existingBtn = document.getElementById("mobileMenuToggleGlobal");
      if (
        !existingBtn &&
        !PUBLIC_PAGES.includes(window.GlobalSidebar?.getCurrentPageId()) &&
        !(
          window.GlobalSidebar?.isAdminRoleActive &&
          window.GlobalSidebar.isAdminRoleActive()
        )
      ) {
        const btn = document.createElement("button");
        btn.id = "mobileMenuToggleGlobal";
        btn.className = "mobile-menu-toggle";
        btn.innerHTML = "☰";
        document.body.appendChild(btn);
        setupMobileMenuToggleButton(btn);
        return;
      }

      if (existingBtn) {
        setupMobileMenuToggleButton(existingBtn);
      }
    }

    // Add mobile button after init
    setTimeout(addMobileMenuToggle, 200);
  })();
</script>

<!-- ============================================================
     Game Flyout Submenu Controller
     ============================================================ -->
<script>
  (function () {
    "use strict";

    // Submenu child pages for active-state detection
    const GAME_CHILD_PAGES = ["page-mcq", "page-matching"];

    let hideTimer = null;
    let showTimer = null;
    const SHOW_DELAY = 80;   // ms before showing (avoids flicker on fast mouse-through)
    const HIDE_DELAY = 180;  // ms before hiding (allows bridge between item and flyout)

    function getEls() {
      return {
        trigger: document.getElementById("navGameItem"),
        flyout:  document.getElementById("gameSubmenu"),
        arrow:   document.querySelector("#gameSubmenu .sidebar-flyout-arrow"),
        items:   document.querySelectorAll("#gameSubmenu .sidebar-flyout-item"),
        sidebar: document.getElementById("globalSidebar"),
      };
    }

    // --------------- Positioning ---------------
    function positionFlyout(trigger, flyout, sidebar) {
      const tr   = trigger.getBoundingClientRect();
      const fw   = flyout.offsetWidth  || 230;
      const fh   = flyout.offsetHeight || 120;
      
      // Mobile handling (accordion style)
      if (window.innerWidth <= 768) {
        flyout.style.left = "1rem";
        flyout.style.width = "calc(100% - 2rem)";
        flyout.style.top = (tr.bottom + 4) + "px";
        flyout.style.transform = "none";
        if (flyout.querySelector(".sidebar-flyout-arrow")) {
          flyout.querySelector(".sidebar-flyout-arrow").style.display = "none";
        }
        return;
      }
      
      const sbW  = sidebar  ? sidebar.getBoundingClientRect().right : tr.right;

      // Place to the right of sidebar, aligned vertically to trigger
      let left = sbW + 8;
      let top  = tr.top + tr.height / 2 - fh / 2;

      // Clamp vertically inside viewport
      const vp = window.innerHeight;
      top = Math.max(8, Math.min(top, vp - fh - 8));

      flyout.style.left = left + "px";
      flyout.style.top  = top  + "px";
      flyout.style.transform = "none";
      flyout.style.width = "auto";
      
      if (flyout.querySelector(".sidebar-flyout-arrow")) {
        flyout.querySelector(".sidebar-flyout-arrow").style.display = "block";
      }

      // Position arrow vertically relative to trigger center
      const flyoutTop = parseFloat(flyout.style.top);
      const arrowTop  = tr.top + tr.height / 2 - flyoutTop;
      if (flyout.querySelector(".sidebar-flyout-arrow")) {
        flyout.querySelector(".sidebar-flyout-arrow").style.top = arrowTop + "px";
        flyout.querySelector(".sidebar-flyout-arrow").style.transform = "none";
      }
    }

    // --------------- Show / Hide ---------------
    function showFlyout() {
      clearTimeout(hideTimer);
      clearTimeout(showTimer);
      showTimer = setTimeout(() => {
        const { trigger, flyout, sidebar } = getEls();
        if (!trigger || !flyout) return;
        positionFlyout(trigger, flyout, sidebar);
        flyout.classList.add("flyout-visible");
        trigger.classList.add("submenu-open");
        trigger.setAttribute("aria-expanded", "true");
        updateFlyoutActiveItems();
      }, SHOW_DELAY);
    }

    function hideFlyout() {
      clearTimeout(showTimer);
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        const { trigger, flyout } = getEls();
        if (!flyout) return;
        flyout.classList.remove("flyout-visible");
        if (trigger) {
          trigger.classList.remove("submenu-open");
          trigger.setAttribute("aria-expanded", "false");
        }
      }, HIDE_DELAY);
    }

    function cancelHide() {
      clearTimeout(hideTimer);
    }

    // --------------- Active child highlight ---------------
    function updateGameItemActive(pageId) {
      const { trigger, items } = getEls();
      if (!trigger) return;
      const isChild = GAME_CHILD_PAGES.includes(pageId);
      trigger.classList.toggle("child-active", isChild);

      // Update flyout item active state
      items.forEach(item => {
        const p = item.getAttribute("data-page");
        item.classList.toggle("flyout-active", p === pageId);
      });
    }

    function updateFlyoutActiveItems() {
      const currentPage =
        (window.GlobalSidebar && window.GlobalSidebar.getCurrentPageId
          ? window.GlobalSidebar.getCurrentPageId()
          : "") || "";
      updateGameItemActive(currentPage);
    }

    // --------------- Navigation ---------------
    function navigateTo(pageId) {
      hideFlyout();
      if (typeof showPage === "function") {
        showPage(pageId);
      }

      // If we're on mobile, close the mobile sidebar after navigation
      try {
        if (
          window.innerWidth <= 768 &&
          window.GlobalSidebar &&
          typeof window.GlobalSidebar.closeMobile === "function"
        ) {
          window.GlobalSidebar.closeMobile();
        }
      } catch (e) {
        // ignore
      }
    }

    // --------------- Setup ---------------
    function setupGameFlyout() {
      const { trigger, flyout, items } = getEls();
      if (!trigger || !flyout) return;

      // Trigger hover
      trigger.addEventListener("mouseenter", showFlyout);
      trigger.addEventListener("mouseleave", hideFlyout);

      // Keep open when mouse is over flyout
      flyout.addEventListener("mouseenter", cancelHide);
      flyout.addEventListener("mouseleave", hideFlyout);

      // Click on trigger (prevents navigation, opens flyout)
      trigger.addEventListener("click", function (e) {
        e.preventDefault();
        const isOpen = flyout.classList.contains("flyout-visible");
        isOpen ? hideFlyout() : showFlyout();
      });

      // Click on flyout items → navigate
      items.forEach(item => {
        item.addEventListener("click", function (e) {
          e.preventDefault();
          const pageId = item.getAttribute("data-page");
          if (pageId) navigateTo(pageId);
        });
      });

      // Keyboard: Escape closes
      document.addEventListener("keydown", function (e) {
        if (e.key === "Escape") hideFlyout();
      });

      // Click outside closes
      document.addEventListener("click", function (e) {
        const { trigger: t, flyout: f } = getEls();
        if (!f || !t) return;
        if (!f.contains(e.target) && !t.contains(e.target)) {
          hideFlyout();
        }
      });

      // Reposition on resize/scroll
      window.addEventListener("resize", function () {
        const f = document.getElementById("gameSubmenu");
        if (f && f.classList.contains("flyout-visible")) {
          const { trigger: t, sidebar: s } = getEls();
          positionFlyout(t, f, s);
        }
      });

      // Hook into showPage to update active state
      const _origShowPage2 = window.showPage;
      window.showPage = function (pageId, ...rest) {
        if (typeof _origShowPage2 === "function") _origShowPage2(pageId, ...rest);
        updateGameItemActive(pageId);
      };

      // Initial active check
      setTimeout(updateFlyoutActiveItems, 300);
    }

    // Init when DOM ready
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", setupGameFlyout);
    } else {
      setupGameFlyout();
    }
  })();
</script>

    const groupLabels = {

    const MCQ_UNLOCKED_TOPICS_PERSIST_KEY = "oq_mcq_unlocked_topics_v1";
    const MATCHING_UNLOCKED_TOPICS_PERSIST_KEY =
      "oq_matching_unlocked_topics_v1";
    const QUIZ_STATS_PERSIST_KEY = "oq_quiz_stats_cache_v1";
    const MATCHING_STATS_PERSIST_KEY = "oq_matching_stats_cache_v1";

    let topicBaseList = [];
    let topicEntries = [];
    let currentResults = [];
    let activeIndex = -1;
    let userTopicProgress = {};
    let quizStatsByTopic = {};
    let matchingStatsByTopic = {};
    let mcqUnlockedTopicsMap = {};
    let matchingUnlockedTopicsMap = {};

    function normalizeText(value) {
      return String(value || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .trim();
    }

    function hasContentDoc(topic) {
      return (
        topic &&
        topic.contentDocId &&
        String(topic.contentDocId).trim().length > 10
      );
    }

    function parseObjectMap(rawValue) {
      if (!rawValue) return {};

      try {
        const parsed = JSON.parse(rawValue);
        return parsed && typeof parsed === "object" ? parsed : {};
      } catch (e) {
        return {};
      }
    }

    function readPersistedMap(key) {
      try {
        return parseObjectMap(localStorage.getItem(key));
      } catch (e) {
        return {};
      }
    }

    function readPersistedStatsMap(key) {
      const parsed = readPersistedMap(key);
      if (parsed && parsed.stats && typeof parsed.stats === "object") {
        return parsed.stats;
      }
      return {};
    }

    function persistUnlockedMap(key, unlockedMap) {
      try {
        localStorage.setItem(
          key,
          JSON.stringify(
            unlockedMap && typeof unlockedMap === "object" ? unlockedMap : {},
          ),
        );
      } catch (e) {}
    }

    function isTruthyProgressValue(value) {
      return (
        value === true ||
        value === 1 ||
        value === "1" ||
        value === "TRUE" ||
        value === "true"
      );
    }

    function isTopicCompleted(progress) {
      if (!progress || typeof progress !== "object") return false;

      if (isTruthyProgressValue(progress.completed)) return true;

      const progressNumber = Number(progress.progress);
      if (Number.isFinite(progressNumber) && progressNumber >= 100) {
        return true;
      }

      const hasDetailedSteps =
        Object.prototype.hasOwnProperty.call(progress, "lessonCompleted") ||
        Object.prototype.hasOwnProperty.call(progress, "mindmapViewed") ||
        Object.prototype.hasOwnProperty.call(progress, "flashcardsCompleted") ||
        Object.prototype.hasOwnProperty.call(progress, "miniQuizCompleted");

      if (!hasDetailedSteps) return false;

      return (
        isTruthyProgressValue(progress.lessonCompleted) &&
        isTruthyProgressValue(progress.mindmapViewed) &&
        isTruthyProgressValue(progress.flashcardsCompleted) &&
        isTruthyProgressValue(progress.miniQuizCompleted)
      );
    }

    function getQuizBestPercent(stats) {
      if (!stats || typeof stats !== "object") return 0;

      const byPercent = Number(stats.bestPercent);
      if (Number.isFinite(byPercent) && byPercent >= 0) {
        return Math.max(0, Math.min(100, Math.round(byPercent)));
      }

      const byScore = Number(stats.bestScore);
      const byTotal = Number(stats.bestTotal);
      if (Number.isFinite(byScore) && Number.isFinite(byTotal) && byTotal > 0) {
        return Math.max(0, Math.min(100, Math.round((byScore / byTotal) * 100)));
      }

      return 0;
    }

    function getMatchingBestPercent(stats) {
      if (!stats || typeof stats !== "object") return 0;

      const byAccuracy = Number(stats.bestAccuracy);
      if (Number.isFinite(byAccuracy) && byAccuracy >= 0) {
        return Math.max(0, Math.min(100, Math.round(byAccuracy)));
      }

      const byPercent = Number(stats.bestPercent);
      if (Number.isFinite(byPercent) && byPercent >= 0) {
        return Math.max(0, Math.min(100, Math.round(byPercent)));
      }

      const byScore = Number(stats.bestScore);
      const byTotalPairs = Number(stats.bestTotalPairs);
      if (
        Number.isFinite(byScore) &&
        Number.isFinite(byTotalPairs) &&
        byTotalPairs > 0
      ) {
        return Math.max(
          0,
          Math.min(100, Math.round((byScore / byTotalPairs) * 100)),
        );
      }

      return 0;
    }

    function normalizeTopicList(topics) {
      const normalized = (topics || []).filter(
        (topic) => topic && String(topic.topicId || "").trim(),
      );

      normalized.sort(
        (a, b) => (Number(a.order) || 0) - (Number(b.order) || 0),
      );
      return normalized;
    }

    function getTopicIndex(topicId) {
      return topicBaseList.findIndex(
        (topic) => String(topic.topicId) === String(topicId),
      );
    }

    function syncSearchCachesFromWindow() {
      try {
        const globalProgress =
          window.globalTopicsCache && window.globalTopicsCache.progress;
        if (globalProgress && typeof globalProgress === "object") {
          userTopicProgress = Object.assign({}, userTopicProgress, globalProgress);
        }

        const quizWindowStats =
          window.quizStatsCache && window.quizStatsCache.stats;
        if (quizWindowStats && typeof quizWindowStats === "object") {
          quizStatsByTopic = Object.assign({}, quizStatsByTopic, quizWindowStats);
        }

        const matchingWindowStats =
          window.matchingStatsCache && window.matchingStatsCache.stats;
        if (matchingWindowStats && typeof matchingWindowStats === "object") {
          matchingStatsByTopic = Object.assign(
            {},
            matchingStatsByTopic,
            matchingWindowStats,
          );
        }

        const persistedQuizStats = readPersistedStatsMap(QUIZ_STATS_PERSIST_KEY);
        if (Object.keys(persistedQuizStats).length > 0) {
          quizStatsByTopic = Object.assign({}, quizStatsByTopic, persistedQuizStats);
        }

        const persistedMatchingStats = readPersistedStatsMap(
          MATCHING_STATS_PERSIST_KEY,
        );
        if (Object.keys(persistedMatchingStats).length > 0) {
          matchingStatsByTopic = Object.assign(
            {},
            matchingStatsByTopic,
            persistedMatchingStats,
          );
        }

        const mcqUnlockedFromWindow =
          window.mcqUnlockedTopicsCache &&
          typeof window.mcqUnlockedTopicsCache === "object"
            ? window.mcqUnlockedTopicsCache
            : null;
        const mcqUnlockedPersisted = readPersistedMap(
          MCQ_UNLOCKED_TOPICS_PERSIST_KEY,
        );
        mcqUnlockedTopicsMap = Object.assign(
          {},
          mcqUnlockedPersisted,
          mcqUnlockedFromWindow || {},
        );

        const matchingUnlockedFromWindow =
          window.matchingUnlockedTopicsCache &&
          typeof window.matchingUnlockedTopicsCache === "object"
            ? window.matchingUnlockedTopicsCache
            : null;
        const matchingUnlockedPersisted = readPersistedMap(
          MATCHING_UNLOCKED_TOPICS_PERSIST_KEY,
        );
        matchingUnlockedTopicsMap = Object.assign(
          {},
          matchingUnlockedPersisted,
          matchingUnlockedFromWindow || {},
        );
      } catch (e) {
        console.warn("Sidebar search: sync cache warning", e);
      }
    }

    function rerunSearchIfInputHasValue() {
      const inputEl = document.getElementById("sidebarSearchInput");
      if (inputEl && inputEl.value && inputEl.value.trim()) {
        runSearch(inputEl.value);
      }
    }

    function setTopicsForSearch(topics) {
      topicBaseList = normalizeTopicList(topics);
      topicEntries = buildTopicEntries(topicBaseList);
      rerunSearchIfInputHasValue();
    }

    function markTopicUnlockedForMode(topicId, mode) {
      const id = String(topicId || "").trim();
      if (!id) return;

      if (mode === "quiz") {
        if (mcqUnlockedTopicsMap[id] === true) return;
        mcqUnlockedTopicsMap[id] = true;
        window.mcqUnlockedTopicsCache = Object.assign({}, mcqUnlockedTopicsMap);
        persistUnlockedMap(MCQ_UNLOCKED_TOPICS_PERSIST_KEY, mcqUnlockedTopicsMap);
        return;
      }

      if (mode === "matching") {
        if (matchingUnlockedTopicsMap[id] === true) return;
        matchingUnlockedTopicsMap[id] = true;
        window.matchingUnlockedTopicsCache = Object.assign(
          {},
          matchingUnlockedTopicsMap,
        );
        persistUnlockedMap(
          MATCHING_UNLOCKED_TOPICS_PERSIST_KEY,
          matchingUnlockedTopicsMap,
        );
      }
    }

    function isLessonTopicUnlocked(topicId) {
      const index = getTopicIndex(topicId);
      if (index < 0) return false;
      if (index === 0) return true;

      const prevTopic = topicBaseList[index - 1];
      if (!prevTopic || !prevTopic.topicId) return false;

      const prevProgress = userTopicProgress[prevTopic.topicId] || {};
      return isTopicCompleted(prevProgress);
    }

    function isQuizTopicUnlocked(topicId) {
      const index = getTopicIndex(topicId);
      if (index < 0) return false;
      if (index === 0) return true;

      const normalizedTopicId = String(topicId || "").trim();
      if (mcqUnlockedTopicsMap[normalizedTopicId] === true) {
        return true;
      }

      const prevTopic = topicBaseList[index - 1];
      if (!prevTopic || !prevTopic.topicId) return false;

      const prevStats = quizStatsByTopic[prevTopic.topicId] || null;
      const unlockedNow = prevStats && getQuizBestPercent(prevStats) >= 80;

      if (unlockedNow) {
        markTopicUnlockedForMode(normalizedTopicId, "quiz");
      }

      return !!unlockedNow;
    }

    function isMatchingTopicUnlocked(topicId) {
      const index = getTopicIndex(topicId);
      if (index < 0) return false;
      if (index === 0) return true;

      const normalizedTopicId = String(topicId || "").trim();
      if (matchingUnlockedTopicsMap[normalizedTopicId] === true) {
        return true;
      }

      const prevTopic = topicBaseList[index - 1];
      if (!prevTopic || !prevTopic.topicId) return false;

      const prevStats = matchingStatsByTopic[prevTopic.topicId] || null;
      const unlockedNow = prevStats && getMatchingBestPercent(prevStats) >= 80;

      if (unlockedNow) {
        markTopicUnlockedForMode(normalizedTopicId, "matching");
      }

      return !!unlockedNow;
    }

    function getPrerequisiteTopicInfo(topicId) {
      const index = getTopicIndex(topicId);
      if (index <= 0) {
        return {
          hasPrerequisite: false,
          topicId: "",
          title: "",
        };
      }

      const prevTopic = topicBaseList[index - 1] || null;
      if (!prevTopic || !prevTopic.topicId) {
        return {
          hasPrerequisite: false,
          topicId: "",
          title: "",
        };
      }

      return {
        hasPrerequisite: true,
        topicId: String(prevTopic.topicId),
        title: String(prevTopic.title || prevTopic.topicId),
      };
    }

    function resolveTopicLockState(topic, mode) {
      const topicId = topic && topic.topicId ? String(topic.topicId).trim() : "";
      if (!topicId) {
        return {
          isLocked: true,
          reason: "Không thể xác định chủ đề",
        };
      }

      if (!hasContentDoc(topic)) {
        return {
          isLocked: true,
          reason: "Chủ đề chưa có nội dung",
        };
      }

      if (mode === "lesson") {
        const isUnlocked = isLessonTopicUnlocked(topicId);
        const prerequisite = getPrerequisiteTopicInfo(topicId);

        let reason = "";
        if (!isUnlocked) {
          if (prerequisite.hasPrerequisite) {
            reason =
              `Chưa mở khóa Bài học - cần hoàn thành chủ đề trước: "${prerequisite.title}"`;
          } else {
            reason = "Chưa mở khóa Bài học";
          }
        }

        return {
          isLocked: !isUnlocked,
          reason: reason,
        };
      }

      if (mode === "quiz") {
        const isUnlocked = isQuizTopicUnlocked(topicId);
        const prerequisite = getPrerequisiteTopicInfo(topicId);

        let reason = "";
        if (!isUnlocked) {
          if (prerequisite.hasPrerequisite) {
            reason =
              `Chưa mở khóa Quiz - cần đạt >=80% ở chủ đề trước: "${prerequisite.title}"`;
          } else {
            reason = "Chưa mở khóa Quiz";
          }
        }

        return {
          isLocked: !isUnlocked,
          reason: reason,
        };
      }

      if (mode === "matching") {
        const isUnlocked = isMatchingTopicUnlocked(topicId);
        const prerequisite = getPrerequisiteTopicInfo(topicId);

        let reason = "";
        if (!isUnlocked) {
          if (prerequisite.hasPrerequisite) {
            reason =
              `Chưa mở khóa Matching - cần đạt >=80% ở chủ đề trước: "${prerequisite.title}"`;
          } else {
            reason = "Chưa mở khóa Matching";
          }
        }

        return {
          isLocked: !isUnlocked,
          reason: reason,
        };
      }

      return {
        isLocked: false,
        reason: "",
      };
    }

    function getTopicModeDescriptors(topic) {
      if (!hasContentDoc(topic)) {
        return [];
      }

      return [
        {
          mode: "lesson",
          tag: "Lesson",
          tagClass: "tag-lesson",
          pageId: "page-lesson",
          subtitlePrefix: "Bài học",
          keywords: "lesson bai hoc hoc",
        },
        {
          mode: "quiz",
          tag: "Quiz",
          tagClass: "tag-quiz",
          pageId: "page-mcq",
          subtitlePrefix: "Quiz",
          keywords: "quiz mcq trac nghiem",
        },
        {
          mode: "matching",
          tag: "Matching",
          tagClass: "tag-matching",
          pageId: "page-matching",
          subtitlePrefix: "Matching",
          keywords: "matching noi cap game",
        },
      ];
    }

    function buildTopicEntries(topics) {
      const entries = [];

      (topics || []).forEach((topic) => {
        const descriptors = getTopicModeDescriptors(topic);
        descriptors.forEach((descriptor) => {
          const lockState = resolveTopicLockState(topic, descriptor.mode);
          entries.push({
            id: `topic-${topic.topicId}-${descriptor.mode}`,
            group: "topics",
            title: topic.title || "Topic",
            subtitle: `${descriptor.subtitlePrefix} - ${topic.category || "Chung"}`,
            tag: descriptor.tag,
            tagClass: descriptor.tagClass,
            keywords: `${descriptor.keywords} ${topic.topicId || ""} ${topic.category || ""} ${lockState.isLocked ? "khoa lock" : ""}`,
            isLocked: lockState.isLocked,
            lockReason: lockState.reason,
            action: {
              type: "topic",
              pageId: descriptor.pageId,
              mode: descriptor.mode,
              topic: topic,
            },
          });
        });
      });

      return entries;
    }

    function fetchTopicsForSearch() {
      syncSearchCachesFromWindow();

      const globalCache = window.globalTopicsCache;
      if (
        globalCache &&
        Array.isArray(globalCache.data) &&
        globalCache.data.length
      ) {
        setTopicsForSearch(globalCache.data);
        return;
      }

      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      ) {
        return;
      }

      google.script.run
        .withSuccessHandler(function (response) {
          let topics = [];
          if (response && response.success && Array.isArray(response.topics)) {
            topics = response.topics;
          } else if (Array.isArray(response)) {
            topics = response;
          }

          setTopicsForSearch(topics);
        })
        .withFailureHandler(function (error) {
          console.warn("Sidebar search: load topics failed", error);
          topicEntries = [];
          topicBaseList = [];
        })
        .getAllTopics();
    }

    function fetchLockDataForSearch() {
      syncSearchCachesFromWindow();

      if (
        typeof google === "undefined" ||
        !google.script ||
        !google.script.run
      ) {
        return;
      }

      google.script.run
        .withSuccessHandler(function (response) {
          if (response && response.success && response.progress) {
            userTopicProgress = Object.assign({}, response.progress);
            if (window.globalTopicsCache) {
              window.globalTopicsCache.progress = response.progress;
            }

            topicEntries = buildTopicEntries(topicBaseList);
            rerunSearchIfInputHasValue();
          }
        })
        .withFailureHandler(function (error) {
          console.warn("Sidebar search: load topic progress failed", error);
        })
        .getUserTopicProgress();

      google.script.run
        .withSuccessHandler(function (response) {
          if (response && response.success && response.stats) {
            quizStatsByTopic = Object.assign({}, response.stats);

            if (!window.quizStatsCache) {
              window.quizStatsCache = {
                stats: {},
                lastLoadTime: 0,
                cacheDuration: 5 * 60 * 1000,
              };
            }
            window.quizStatsCache.stats = Object.assign({}, response.stats);
            window.quizStatsCache.lastLoadTime = Date.now();

            topicEntries = buildTopicEntries(topicBaseList);
            rerunSearchIfInputHasValue();
          }
        })
        .withFailureHandler(function (error) {
          console.warn("Sidebar search: load quiz stats failed", error);
        })
        .getQuizStatsPerTopic();

      google.script.run
        .withSuccessHandler(function (response) {
          if (response && response.success && response.stats) {
            matchingStatsByTopic = Object.assign({}, response.stats);

            if (!window.matchingStatsCache) {
              window.matchingStatsCache = {
                stats: {},
                lastLoadTime: 0,
                cacheDuration: 5 * 60 * 1000,
              };
            }
            window.matchingStatsCache.stats = Object.assign({}, response.stats);
            window.matchingStatsCache.lastLoadTime = Date.now();

            topicEntries = buildTopicEntries(topicBaseList);
            rerunSearchIfInputHasValue();
          }
        })
        .withFailureHandler(function (error) {
          console.warn("Sidebar search: load matching stats failed", error);
        })
        .getMatchingStatsPerTopic();
    }

    function buildSearchEntries() {
      return staticEntries.concat(topicEntries);
    }

    function scoreEntry(entry, normalizedQuery) {
      const title = normalizeText(entry.title);
      const subtitle = normalizeText(entry.subtitle);
      const keywords = normalizeText(entry.keywords);

      if (title.startsWith(normalizedQuery)) return 100;
      if (title.includes(normalizedQuery)) return 80;
      if (keywords.includes(normalizedQuery)) return 60;
      if (subtitle.includes(normalizedQuery)) return 40;
      return -1;
    }

    function groupResults(results) {
      const grouped = {
        pages: [],
        topics: [],
        profile: [],
      };

      results.forEach((entry) => {
        if (grouped[entry.group]) {
          grouped[entry.group].push(entry);
        }
      });

      return grouped;
    }

    function renderResults(results) {
      const resultsEl = document.getElementById("sidebarSearchResults");
      if (!resultsEl) return;

      if (!results || results.length === 0) {
        resultsEl.innerHTML =
          '<div class="sidebar-search-empty">Không có kết quả phù hợp</div>';
        resultsEl.classList.add("open");
        return;
      }

      const grouped = groupResults(results);
      const order = ["pages", "topics", "profile"];
      const html = [];

      order.forEach((groupKey) => {
        const items = grouped[groupKey];
        if (!items || items.length === 0) return;

        html.push(
          `<div class="sidebar-search-group"><div class="sidebar-search-group-label">${groupLabels[groupKey]}</div>`,
        );
        items.forEach((item, index) => {
          const resultIndex = indexMap(results, item.id);
          const isLocked = item.isLocked === true;
          const subtitleText = isLocked
            ? `${item.subtitle || ""} - ${item.lockReason || "Đang khóa"}`
            : item.subtitle || "";

          html.push(`
            <button class="sidebar-search-result-item${isLocked ? " is-locked" : ""}" data-result-index="${resultIndex}"${isLocked ? ' disabled aria-disabled="true"' : ""}>
              <div class="sidebar-search-result-main">
                <div class="sidebar-search-result-title">${escapeHtml(item.title)}</div>
                <div class="sidebar-search-result-subtitle">${escapeHtml(subtitleText)}</div>
              </div>
              <div class="sidebar-search-result-side">
                <span class="sidebar-search-result-tag ${item.tagClass}">${item.tag}</span>
                ${
                  isLocked
                    ? '<span class="sidebar-search-result-lock material-symbols-sharp" aria-hidden="true">lock</span>'
                    : ""
                }
              </div>
            </button>
          `);
        });
        html.push("</div>");
      });

      resultsEl.innerHTML = html.join("");
      resultsEl.classList.add("open");
    }

    function indexMap(results, id) {
      return results.findIndex((entry) => entry.id === id);
    }

    function clearResults() {
      const resultsEl = document.getElementById("sidebarSearchResults");
      if (!resultsEl) return;
      resultsEl.classList.remove("open");
      resultsEl.innerHTML = "";
      currentResults = [];
      activeIndex = -1;
    }

    function updateActiveResult() {
      const resultEls = document.querySelectorAll(
        ".sidebar-search-result-item",
      );
      resultEls.forEach((el) => el.classList.remove("active"));

      if (activeIndex < 0 || activeIndex >= currentResults.length) return;

      const activeEl = document.querySelector(
        `.sidebar-search-result-item[data-result-index="${activeIndex}"]`,
      );
      if (activeEl) {
        activeEl.classList.add("active");
        activeEl.scrollIntoView({ block: "nearest" });
      }
    }

    function runSearch(query) {
      const normalizedQuery = normalizeText(query);
      if (!normalizedQuery) {
        clearResults();
        return;
      }

      const entries = buildSearchEntries();
      currentResults = entries
        .map((entry) => ({
          entry: entry,
          score: scoreEntry(entry, normalizedQuery),
        }))
        .filter((item) => item.score >= 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, SEARCH_LIMIT)
        .map((item) => item.entry);

      activeIndex = -1;
      renderResults(currentResults);
    }

    function notifyLockedResult(result) {
      const lockMessage =
        (result && result.lockReason) ||
        "Chủ đề này đang bị khóa. Vui lòng hoàn thành điều kiện mở khóa.";

      if (typeof window.showToast === "function") {
        window.showToast(lockMessage, "warning");
        return;
      }

      if (typeof window.showNotification === "function") {
        window.showNotification(lockMessage, "warning");
      }
    }

    function navigateWithResult(result) {
      if (!result || !result.action || typeof showPage !== "function") {
        return false;
      }

      if (result.isLocked) {
        notifyLockedResult(result);
        return false;
      }

      const action = result.action;
      if (action.type === "page") {
        window.currentPageParams = null;
        showPage(action.pageId);
        return true;
      }

      if (action.type === "topic") {
        const topic = action.topic || {};
        const params = {
          topicId: topic.topicId,
          topicTitle: topic.title,
          contentDocId: topic.contentDocId,
        };

        if (action.mode === "quiz") {
          showPage(action.pageId, Object.assign({}, params, { mode: "quiz" }));
        } else if (action.mode === "matching") {
          showPage(
            action.pageId,
            Object.assign({}, params, { mode: "matching" }),
          );
        } else {
          showPage(action.pageId, params);
        }
        return true;
      }

      if (action.type === "profile") {
        showPage("page-profile");
        setTimeout(function () {
          if (typeof window.triggerProfileSearchAction === "function") {
            window.triggerProfileSearchAction(action.actionKey);
          }
        }, 180);
        return true;
      }

      return false;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function setupSearch() {
      const input = document.getElementById("sidebarSearchInput");
      const resultsEl = document.getElementById("sidebarSearchResults");
      const searchBox = document.getElementById("sidebarSearchBox");
      const sidebar = document.getElementById("globalSidebar");

      if (!input || !resultsEl || !searchBox || !sidebar) {
        return;
      }

      fetchTopicsForSearch();
      fetchLockDataForSearch();

      input.addEventListener("input", function (e) {
        runSearch(e.target.value || "");
      });

      input.addEventListener("focus", function () {
        if (input.value && input.value.trim()) {
          runSearch(input.value);
        }
      });

      input.addEventListener("keydown", function (e) {
        if (!currentResults.length) return;

        if (e.key === "ArrowDown") {
          e.preventDefault();
          activeIndex = Math.min(activeIndex + 1, currentResults.length - 1);
          updateActiveResult();
        } else if (e.key === "ArrowUp") {
          e.preventDefault();
          activeIndex = Math.max(activeIndex - 1, 0);
          updateActiveResult();
        } else if (e.key === "Enter") {
          e.preventDefault();
          const selected =
            activeIndex >= 0 ? currentResults[activeIndex] : currentResults[0];
          const didNavigate = navigateWithResult(selected);
          if (didNavigate) {
            input.value = "";
            clearResults();
          }
        } else if (e.key === "Escape") {
          clearResults();
          input.blur();
        }
      });

      resultsEl.addEventListener("click", function (e) {
        const item = e.target.closest(".sidebar-search-result-item");
        if (!item) return;

        const index = Number(item.getAttribute("data-result-index"));
        if (Number.isNaN(index) || !currentResults[index]) return;

        if (item.classList.contains("is-locked") || item.disabled) {
          notifyLockedResult(currentResults[index]);
          return;
        }

        const didNavigate = navigateWithResult(currentResults[index]);
        if (didNavigate) {
          input.value = "";
          clearResults();
        }
      });

      document.addEventListener("click", function (e) {
        if (!sidebar.contains(e.target)) {
          clearResults();
        }
      });

      window.addEventListener("topics-cache-updated", function () {
        fetchTopicsForSearch();
        fetchLockDataForSearch();
      });

      window.addEventListener("dashboard-needs-refresh", function () {
        syncSearchCachesFromWindow();
        fetchLockDataForSearch();
        topicEntries = buildTopicEntries(topicBaseList);
        rerunSearchIfInputHasValue();
      });
    }

    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", setupSearch);
    } else {
      setTimeout(setupSearch, 120);
    }
  })();
</script>
<script>
  (function () {
    console.log("🔧 Sidebar scripts loading...");

    /**
     * ⭐ Update sidebar user info - IMPROVED
     */
    function updateSidebarUserInfo() {
      // ⭐ Kiểm tra cả localStorage và sessionStorage
      let savedUser = localStorage.getItem("currentUser");
      if (!savedUser) {
        savedUser = sessionStorage.getItem("currentUser");
      }

      if (savedUser) {
        try {
          const user = JSON.parse(savedUser);
          console.log("📊 Updating sidebar with user:", user);

          // Update name
          const usernameEl = document.getElementById("sidebar-username");
          if (usernameEl) {
            usernameEl.textContent =
              user.displayName || user.fullName || user.username || "User";
          }

          // Update role
          const roleEl = document.getElementById("sidebar-role");
          if (roleEl) {
            roleEl.textContent = user.role || "Student";
          }

          // ⭐ Update avatar
          const avatarEl = document.getElementById("sidebar-avatar");
          if (avatarEl) {
            if (
              user.avatarUrl &&
              user.avatarUrl !== "" &&
              user.avatarUrl !== "undefined" &&
              user.avatarUrl !== "null"
            ) {
              avatarEl.src = user.avatarUrl;
              console.log("✅ Sidebar avatar updated:", user.avatarUrl);
            } else {
              // Fallback to default
              const defaultAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(
                user.displayName || user.fullName || user.username || "User",
              )}&size=80&background=6366f1&color=fff`;
              avatarEl.src = defaultAvatar;
              console.log("⚠️ Using default avatar");
            }
          }

          console.log("✅ Sidebar updated successfully");
        } catch (error) {
          console.error("❌ Error updating sidebar:", error);
        }
      } else {
        console.log("⚠️ No user found in sessionStorage");
      }
    }

    // ⭐ Listen for avatar updates
    window.addEventListener("storage", function (e) {
      if (e.key === "currentUser") {
        console.log("🔄 User data changed, updating sidebar...");
        updateSidebarUserInfo();
      }
    });

    // ⭐ Custom event for avatar update
    window.addEventListener("avatar-updated", function (e) {
      console.log("🔄 Avatar updated event received");
      const avatarEl = document.getElementById("sidebar-avatar");
      if (avatarEl && e.detail && e.detail.url) {
        avatarEl.src = e.detail.url;
        console.log("✅ Sidebar avatar updated from event");
      }
    });

    // ⭐ Export function globally
    window.updateSidebarUserInfo = updateSidebarUserInfo;

    // ⭐ Init sidebar user info on load
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", updateSidebarUserInfo);
    } else {
      // DOM already loaded
      setTimeout(updateSidebarUserInfo, 100);
    }

    console.log("✅ Sidebar scripts loaded");
  })();
</script>
