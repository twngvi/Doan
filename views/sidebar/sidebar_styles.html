<style>
  /* Global Sidebar Styles - Themed */
  :root {
    --sidebar-width: 240px;
    --sidebar-collapsed-width: 76px;
    --sidebar-transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .global-sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: var(--sidebar-width);
    background: var(--theme-sidebar-bg);
    border-right: 1px solid var(--theme-sidebar-border);
    box-shadow: var(--theme-sidebar-shadow);
    display: none;
    flex-direction: column;
    z-index: 1000;
    transition:
      width var(--sidebar-transition),
      transform var(--sidebar-transition);
    overflow: visible;
    font-size: 0.9375rem;
  }

  /* --- SỬA ĐỔI QUAN TRỌNG: Chỉ hiện khi body có class has-sidebar --- */
  body.has-sidebar .global-sidebar {
    display: flex !important;
  }

  .global-sidebar.collapsed {
    width: var(--sidebar-collapsed-width);
  }

  .global-sidebar.collapsed .logo-text,
  .global-sidebar.collapsed .nav-label,
  .global-sidebar.collapsed .sidebar-username,
  .global-sidebar.collapsed .sidebar-role,
  .global-sidebar.collapsed .sidebar-user-info {
    opacity: 0;
    width: 0;
    overflow: hidden;
    white-space: nowrap;
  }

  /* Avatar giữ nguyên kích thước khi collapsed */
  .global-sidebar.collapsed .sidebar-user-profile {
    justify-content: center;
    padding: 0; /* Xóa padding để avatar căn giữa */
    margin: 0.375rem auto;
    width: 50px;
    height: 50px;
  }

  .global-sidebar.collapsed .sidebar-avatar {
    width: 36px;
    height: 36px;
  }

  .global-sidebar.collapsed .sidebar-username {
    display: none;
  }

  .global-sidebar.collapsed .sidebar-search-input {
    width: 0;
    padding: 0;
    opacity: 0;
    position: absolute;
  }

  /* Logout Button - Galaxy Theme */
  .sidebar-logout-btn {
    padding: 0 0.625rem;
    margin: 0.375rem 0.625rem;
    display: flex;
    align-items: center;
    gap: 0.625rem;
    background: linear-gradient(
      135deg,
      rgba(239, 68, 68, 0.15) 0%,
      rgba(220, 38, 38, 0.1) 100%
    );
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    height: 48px;
    border: 1px solid rgba(239, 68, 68, 0.2);
    width: calc(100% - 1.25rem); /* Chiều rộng bằng các nav-item khác */
    font-family: inherit;
    box-sizing: border-box;
  }

  .sidebar-logout-btn:hover {
    background: var(--theme-danger, #ef4444);
    transform: scale(1.02);
    box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3);
  }

  .sidebar-logout-btn:hover .logout-icon {
    background: rgba(255, 255, 255, 0.2);
    color: #fff;
  }

  .sidebar-logout-btn:hover .logout-label {
    color: #fff;
  }

  .logout-icon {
    font-size: 1.25rem;
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(239, 68, 68, 0.2);
    border-radius: 50%;
    color: #f87171;
    transition: all 0.2s ease;
    margin-left: 0; /* Xóa margin-left để icon thẳng hàng */
  }

  .logout-label {
    font-weight: 600;
    color: #f87171;
    font-size: 0.875rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s ease;
  }

  /* Collapsed state for logout button */
  .global-sidebar.collapsed .sidebar-logout-btn {
    justify-content: center;
    padding: 0; /* Xóa padding để icon căn giữa */
    margin: 0.375rem auto;
    width: 50px;
    height: 50px;
  }

  .global-sidebar.collapsed .logout-label {
    opacity: 0;
    width: 0;
    overflow: hidden;
    display: none;
  }

  .global-sidebar.collapsed .logout-icon {
    margin-left: 0;
  }

  /* Nav item khi collapsed */
  .global-sidebar.collapsed .nav-item {
    justify-content: center; /* Căn giữa icon khi thu gọn */
    padding: 0; /* Xóa padding để icon không bị lệch */
    margin: 0.375rem auto;
    width: 50px;
    height: 50px;
  }

  .global-sidebar.collapsed .nav-icon {
    margin: 0;
    width: 36px;
    height: 36px;
  }

  /* Logo khi collapsed - trở về kích thước nhỏ và căn giữa */
  .global-sidebar.collapsed .sidebar-header {
    justify-content: center;
    padding: 0.375rem 0.5rem;
    display: flex;
    height: 92px; /* Đồng nhất với trạng thái mở */
    box-sizing: border-box;
    overflow: visible;
  }

  .global-sidebar.collapsed .logo {
    justify-content: center;
    width: 100%; /* Đảm bảo logo căn giữa */
    font-size: 2.125rem; /* Trở về kích thước nhỏ khi collapsed */
  }

  /* Logo letters khi collapsed - trở về kích thước nhỏ */
  .global-sidebar.collapsed .logo-o {
    font-size: 2.375rem; /* Trở về kích thước nhỏ */
  }

  .global-sidebar.collapsed .logo-dot {
    font-size: 2.125rem; /* Trở về kích thước nhỏ */
  }

  .global-sidebar .sidebar-header {
    padding: 0.375rem 0.5rem;
    border-bottom: 1px solid var(--theme-sidebar-header-border);
    display: flex;
    align-items: center;
    justify-content: center;
    height: 92px; /* Tăng không gian để logo zoom không bị cắt */
    box-sizing: border-box;
    overflow: visible; /* Quan trọng: Cho phép logo to hơn không bị cắt */
  }

  .global-sidebar .logo {
    display: flex;
    align-items: center; /* Changed from baseline for image centering */
    gap: 0;
    font-size: 3rem;
    font-weight: 400;
    white-space: nowrap;
    overflow: visible;
    font-family: "Fredoka One", "Baloo 2", "Nunito", sans-serif;
    justify-content: center;
  }

  #sidebarLogo {
    height: 94px !important; /* Giữ nguyên kích thước ảnh logo */
    width: auto;
    object-fit: contain;
    display: block;
    transform-origin: center center;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: auto;
    transition:
      transform 260ms cubic-bezier(0.22, 1, 0.36, 1),
      filter 260ms cubic-bezier(0.22, 1, 0.36, 1);
    cursor: pointer;
    will-change: transform, filter;
    backface-visibility: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #sidebarLogo:hover,
  #sidebarLogo:active,
  #sidebarLogo:focus-visible {
    transform: scale(1.06);
    filter: none;
  }

  .global-sidebar.collapsed #sidebarLogo {
    height: 94px !important; /* Giữ nguyên kích thước lớn khi collapsed */
    transform-origin: center center;
  }

  .global-sidebar.collapsed #sidebarLogo:hover,
  .global-sidebar.collapsed #sidebarLogo:active,
  .global-sidebar.collapsed #sidebarLogo:focus-visible {
    transform: scale(1.06);
    filter: drop-shadow(0 0 12px rgba(139, 195, 74, 0.8));
  }

  /* Logo letters - themed */
  .logo-letter {
    background: linear-gradient(
      135deg,
      var(--theme-sidebar-accent, #3b82f6) 0%,
      var(--theme-sidebar-icon-color, #22d3ee) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
    text-shadow: none;
  }

  .logo-o {
    font-size: 3.375rem; /* Tăng size chữ O khi mở rộng */
  }

  /* Dấu chấm với hiệu ứng đáp xuống - Galaxy Orange */
  .logo-dot {
    color: var(--theme-warning, #f97316);
    font-size: 3rem;
    font-weight: 400;
    display: inline-block;
    margin-left: -4px;
    margin-right: 2px;
    animation: dotLand 2s ease-in-out infinite;
    transform-origin: bottom center;
    -webkit-text-fill-color: var(--theme-warning, #f97316);
  }

  /* Animation dấu chấm đáp xuống và đứng yên */
  @keyframes dotLand {
    0% {
      transform: translateY(-8px);
      opacity: 0.7;
    }
    15% {
      transform: translateY(0);
      opacity: 1;
    }
    25% {
      transform: translateY(-3px);
    }
    35% {
      transform: translateY(0);
    }
    100% {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .global-sidebar .logo-text {
    background: linear-gradient(
      135deg,
      var(--theme-sidebar-accent, #3b82f6) 0%,
      var(--theme-sidebar-icon-color, #22d3ee) 100%
    );
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    display: inline-block;
    transition:
      opacity var(--sidebar-transition),
      width var(--sidebar-transition);
  }

  /* Collapsed state - chỉ hiện O. */
  .global-sidebar.collapsed .logo-text {
    display: none;
    opacity: 0;
    width: 0;
  }

  /* Search Wrapper */
  .sidebar-search-wrapper {
    position: relative;
    overflow: visible;
    padding: 0.375rem 0.625rem;
    border-bottom: 1px solid var(--theme-sidebar-header-border);
  }

  /* Search Box - themed */
  .sidebar-search-item {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    gap: 0.625rem;
    padding: 0 0.625rem;
    background: var(--theme-sidebar-item-bg);
    border-radius: 10px;
    height: 48px;
    transition: all 0.2s ease;
    box-sizing: border-box;
    width: 100%;
    border: 1px solid var(--theme-sidebar-item-border);
  }

  .sidebar-search-item:hover {
    background: var(--theme-sidebar-item-hover-bg);
    border-color: var(--theme-sidebar-item-hover-border);
  }

  .search-icon {
    font-size: 1.25rem;
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(59, 130, 246, 0.15);
    border-radius: 50%;
    color: var(--theme-sidebar-icon-color, #22d3ee);
    transition: all 0.2s ease;
    margin-left: 0;
    position: static !important;
    top: auto !important;
    right: auto !important;
    left: auto !important;
    transform: none !important;
    opacity: 1 !important;
  }

  .sidebar-search-item .sidebar-search-input {
    flex: 1;
    display: block;
    background: transparent;
    border: none;
    outline: none;
    font-size: 0.8125rem;
    color: var(--theme-sidebar-text, #e0e7ff);
  }

  .sidebar-search-item .sidebar-search-input::placeholder {
    color: var(--theme-text-muted, rgba(255, 255, 255, 0.5));
  }

  .sidebar-search-item .sidebar-search-input:focus {
    outline: none;
    background: transparent;
  }

  .sidebar-search-item:hover .sidebar-search-input {
    color: #fff;
  }

  .sidebar-search-item:hover .sidebar-search-input::placeholder {
    color: rgba(255, 255, 255, 0.7);
  }

  /* Collapsed state for search */
  .global-sidebar.collapsed .sidebar-search-wrapper {
    padding: 0.375rem 0;
    display: flex;
    justify-content: center;
    border-bottom: 1px solid var(--theme-sidebar-header-border);
  }

  .global-sidebar.collapsed .sidebar-search-item {
    justify-content: center;
    padding: 0;
    width: 50px;
    height: 50px;
    background: var(--theme-sidebar-item-bg);
    border-radius: 10px;
    position: relative;
    overflow: hidden;
  }

  .global-sidebar.collapsed .search-icon {
    margin: 0;
    width: 36px;
    height: 36px;
  }

  .global-sidebar.collapsed .sidebar-search-input {
    display: none; /* Ẩn hoàn toàn thay vì dùng opacity */
  }

  .sidebar-search-results {
    display: none;
    position: absolute;
    left: calc(100% + 0.6rem);
    top: 0.25rem;
    width: 330px;
    max-width: min(330px, calc(100vw - var(--sidebar-width) - 2rem));
    max-height: 360px;
    overflow-y: auto;
    border-radius: 12px;
    border: 1px solid var(--theme-sidebar-item-border);
    background: var(--theme-sidebar-bg);
    box-shadow: var(--theme-sidebar-shadow);
    padding: 0.35rem;
    z-index: 1300;
  }

  .sidebar-search-results.open {
    display: block;
  }

  .sidebar-search-group {
    padding: 0.25rem;
  }

  .sidebar-search-group + .sidebar-search-group {
    border-top: 1px solid var(--theme-sidebar-header-border);
  }

  .sidebar-search-group-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--theme-text-muted, rgba(255, 255, 255, 0.6));
    margin: 0.25rem 0.3rem 0.35rem;
  }

  .sidebar-search-result-item {
    width: 100%;
    border: 1px solid transparent;
    background: transparent;
    color: var(--theme-sidebar-text, #e0e7ff);
    border-radius: 10px;
    padding: 0.45rem 0.55rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 0.45rem;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
  }

  .sidebar-search-result-item.is-locked {
    cursor: not-allowed;
    opacity: 0.72;
    border-color: var(--theme-sidebar-item-border);
  }

  .sidebar-search-result-item:hover,
  .sidebar-search-result-item.active {
    background: var(--theme-sidebar-item-hover-bg);
    border-color: var(--theme-sidebar-item-hover-border);
  }

  .sidebar-search-result-item.is-locked:hover,
  .sidebar-search-result-item.is-locked.active {
    background: transparent;
    border-color: var(--theme-sidebar-item-border);
  }

  .sidebar-search-result-main {
    min-width: 0;
    flex: 1;
  }

  .sidebar-search-result-side {
    align-self: center;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
  }

  .sidebar-search-result-title {
    font-size: 0.82rem;
    font-weight: 600;
    line-height: 1.3;
    color: #fff;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-search-result-subtitle {
    font-size: 0.72rem;
    line-height: 1.3;
    color: var(--theme-text-muted, rgba(255, 255, 255, 0.7));
    margin-top: 0.1rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .sidebar-search-result-tag {
    align-self: center;
    font-size: 0.66rem;
    font-weight: 700;
    line-height: 1;
    border-radius: 999px;
    padding: 0.25rem 0.45rem;
    border: 1px solid transparent;
    white-space: nowrap;
  }

  .sidebar-search-result-tag.tag-page {
    color: #67e8f9;
    border-color: rgba(103, 232, 249, 0.45);
    background: rgba(103, 232, 249, 0.14);
  }

  .sidebar-search-result-tag.tag-lesson {
    color: #86efac;
    border-color: rgba(134, 239, 172, 0.5);
    background: rgba(134, 239, 172, 0.14);
  }

  .sidebar-search-result-tag.tag-quiz {
    color: #fde68a;
    border-color: rgba(253, 230, 138, 0.5);
    background: rgba(253, 230, 138, 0.14);
  }

  .sidebar-search-result-tag.tag-matching {
    color: #c4b5fd;
    border-color: rgba(196, 181, 253, 0.5);
    background: rgba(196, 181, 253, 0.14);
  }

  .sidebar-search-result-tag.tag-profile {
    color: #f9a8d4;
    border-color: rgba(249, 168, 212, 0.5);
    background: rgba(249, 168, 212, 0.14);
  }

  .sidebar-search-result-lock {
    font-size: 0.95rem;
    color: var(--theme-warning, #fbbf24);
    line-height: 1;
  }

  .sidebar-search-empty {
    font-size: 0.78rem;
    color: var(--theme-text-muted, rgba(255, 255, 255, 0.7));
    padding: 0.7rem 0.55rem;
    text-align: center;
  }

  .global-sidebar.collapsed .sidebar-search-results {
    display: none !important;
  }

  /* User Profile Section - themed */
  .sidebar-user-profile {
    padding: 0 0.625rem;
    margin: 0.375rem 0.625rem;
    display: flex;
    align-items: center;
    gap: 0.625rem;
    background: var(--theme-sidebar-item-bg);
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
    height: 48px;
    width: calc(100% - 1.25rem);
    box-sizing: border-box;
    border: 1px solid var(--theme-sidebar-item-border);
  }

  .sidebar-user-profile:hover {
    background: var(--theme-sidebar-item-hover-bg);
    transform: scale(1.02);
    box-shadow: var(--theme-sidebar-item-hover-shadow);
  }

  .sidebar-user-profile:hover .sidebar-avatar {
    border-color: #fff;
  }

  .sidebar-user-profile:hover .sidebar-username {
    color: #fff;
  }

  .sidebar-avatar {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--theme-sidebar-accent, #3b82f6);
    flex-shrink: 0;
    background: #fff;
    transition: all 0.2s ease;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
  }

  /* Đồng bộ hóa tất cả icon - căn giữa và cùng kích thước */
  .nav-icon,
  .logout-icon,
  .search-icon,
  .sidebar-avatar {
    width: 36px !important;
    height: 36px !important;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 !important; /* Xóa mọi margin lẻ */
  }

  .sidebar-username {
    font-weight: 600;
    color: var(--theme-sidebar-text, #e0e7ff);
    font-size: 0.875rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color 0.2s ease;
  }

  .sidebar-role {
    font-size: 0.75rem;
    color: var(--theme-text-muted, rgba(255, 255, 255, 0.6));
  }

  .sidebar-toggle-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0.375rem;
    margin: 0.375rem auto;
    background: transparent;
    color: var(--theme-text-muted, rgba(255, 255, 255, 0.5));
    border: none;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .sidebar-toggle-btn:hover {
    color: var(--theme-sidebar-icon-color, #22d3ee);
  }

  .sidebar-toggle-btn .toggle-icon {
    font-size: 1.5rem;
    transition: transform var(--sidebar-transition);
  }

  .global-sidebar.collapsed .sidebar-toggle-btn .toggle-icon {
    transform: rotate(180deg);
  }

  .global-sidebar .sidebar-nav {
    flex: 1;
    padding: 0.75rem 0;
    overflow-y: auto;
    overflow-x: hidden;
  }

  .global-sidebar .sidebar-nav::-webkit-scrollbar {
    width: 4px;
  }

  .global-sidebar .sidebar-nav::-webkit-scrollbar-thumb {
    background: #cbd5e1;
    border-radius: 2px;
  }

  .global-sidebar .nav-item {
    display: flex;
    align-items: center;
    gap: 0.625rem;
    padding: 0 0.625rem;
    margin: 0.375rem 0.625rem;
    color: var(--theme-sidebar-text, #e0e7ff);
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
    white-space: nowrap;
    background: var(--theme-sidebar-item-bg);
    border: 1px solid var(--theme-sidebar-item-border);
    border-radius: 10px;
    width: calc(100% - 1.25rem);
    text-align: left;
    font-size: 0.875rem;
    font-family: inherit;
    height: 48px;
    box-sizing: border-box;
  }

  .global-sidebar .nav-item:hover {
    background: var(--theme-sidebar-item-hover-bg);
    transform: scale(1.02);
    border-color: var(--theme-sidebar-item-hover-border);
    box-shadow: var(--theme-sidebar-item-hover-shadow);
  }

  .global-sidebar .nav-item:hover .nav-icon {
    background: rgba(255, 255, 255, 0.25);
    color: #fff;
    transform: none;
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.5);
  }

  .global-sidebar .nav-item:hover .nav-label {
    color: #fff;
  }

  .global-sidebar .nav-item.active {
    background: var(--theme-sidebar-item-hover-bg);
    box-shadow: var(--theme-sidebar-active-shadow);
  }

  .global-sidebar .nav-item.active .nav-icon {
    background: rgba(255, 255, 255, 0.25);
    color: #fff;
    box-shadow: 0 0 12px rgba(34, 211, 238, 0.6);
  }

  .global-sidebar .nav-item.active .nav-label {
    color: #fff;
    font-weight: 600;
  }

  .global-sidebar .nav-icon {
    font-size: 1.25rem;
    flex-shrink: 0;
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(
      135deg,
      rgba(59, 130, 246, 0.2) 0%,
      rgba(139, 92, 246, 0.2) 100%
    );
    border-radius: 50%;
    color: var(--theme-sidebar-icon-color, #22d3ee);
    transition: all 0.2s ease;
    margin-left: 0.5rem !important;
    box-shadow: 0 2px 8px rgba(139, 92, 246, 0.2);
  }

  .global-sidebar .nav-label {
    transition:
      opacity var(--sidebar-transition),
      width var(--sidebar-transition);
    overflow: hidden;
  }

  .global-sidebar .sidebar-footer {
    padding: 0.75rem 0;
    border-top: 1px solid var(--theme-sidebar-header-border);
  }

  /* Sidebar Overlay for Mobile */
  .sidebar-overlay {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    z-index: 999;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .sidebar-overlay.active {
    display: block;
    opacity: 1;
  }

  /* =================================================================
     SỬA LỖI SIDEBAR & FIX DOUBLE MARGIN (FINAL)
     ================================================================= */

  /* 1. Thiết lập cơ bản */
  .page-content,
  .mcq-container,
  .topics-container,
  .lesson-container,
  .matching-container,
