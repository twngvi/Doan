<!-- Forgot Password Page Styles -->
<style>
  /* Forgot password page uses shared auth styles from Login/login_styles.html */

  /* Step Indicator */
  .forgot-steps {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 2rem;
    padding: 1rem 0;
  }

  .step-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text-muted);
    font-size: 0.875rem;
    font-weight: 500;
    transition: all 0.3s ease;
  }

  .step-item.active {
    color: var(--primary-blue);
  }

  .step-item.completed {
    color: var(--green-success);
  }

  .step-number {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.8125rem;
    background: var(--border-color);
    transition: all 0.3s ease;
  }

  .step-item.active .step-number {
    background: var(--primary-gradient);
    color: white;
  }

  .step-item.completed .step-number {
    background: var(--green-success);
    color: white;
  }

  .step-connector {
    width: 40px;
    height: 2px;
    background: var(--border-color);
    transition: background 0.3s ease;
  }

  .step-connector.active {
    background: var(--primary-blue);
  }

  /* Verification Code Input Enhanced */
  #verification-code {
    text-align: center;
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: 0.75rem;
    padding: 1rem;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: var(--radius-button);
    transition: all 0.3s ease;
  }

  #verification-code:focus {
    border-color: var(--primary-blue);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
  }

  #verification-code::placeholder {
    letter-spacing: 0.3rem;
    font-size: 1.25rem;
    color: var(--text-muted);
  }

  /* Mountain Scene Enhancement for Forgot Password */
  .mountain-scene .mountain {
    width: 0;
    height: 0;
    border-left: 100px solid transparent;
    border-right: 100px solid transparent;
    border-bottom: 140px solid rgba(255, 255, 255, 0.12);
    position: relative;
  }

  .mountain-scene .climber {
    position: absolute;
    font-size: 3rem;
    animation: float 3s ease-in-out infinite;
  }

  .mountain-scene .stars {
    position: absolute;
    top: -40px;
    font-size: 2.5rem;
    animation: twinkle 2s ease-in-out infinite;
  }

  /* Info Box */
  .info-box {
    background: rgba(37, 99, 235, 0.08);
    border: 1px solid rgba(37, 99, 235, 0.2);
    border-radius: var(--radius-button);
    padding: 1rem;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
  }

  .info-box-icon {
    font-size: 1.25rem;
    flex-shrink: 0;
  }

  .info-box-text {
    font-size: 0.875rem;
    color: var(--text-secondary);
    line-height: 1.5;
  }

  /* Success State */
  .success-animation {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .success-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
    animation: bounceIn 0.6s ease;
  }

  .success-title {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
  }

  .success-message {
    color: var(--text-secondary);
    font-size: 0.9375rem;
  }

  @keyframes bounceIn {
    0% {
      transform: scale(0);
      opacity: 0;
    }
    50% {
      transform: scale(1.2);
    }
    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  /* Resend Button Styling */
  .resend-btn {
    background: none;
    border: none;
    color: var(--primary-blue);
    font-weight: 600;
    cursor: pointer;
    padding: 0.5rem 1rem;
    border-radius: var(--radius-small);
    transition: all 0.2s ease;
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
  }

  .resend-btn:hover {
    background: rgba(37, 99, 235, 0.08);
    color: var(--primary-dark);
  }

  .resend-btn:disabled {
    color: var(--text-muted);
    cursor: not-allowed;
  }

  /* Timer Badge */
  .timer-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg-main);
    padding: 0.5rem 1rem;
    border-radius: 9999px;
    font-size: 0.8125rem;
    color: var(--text-secondary);
  }

  .timer-badge .timer-icon {
    font-size: 1rem;
  }
</style>
