<!-- Email Verification Page Styles -->
<style>
  /* Email Verification Page - Enhanced Styles */

  /* Verification Input - Large Code Display */
  .verification-input {
    font-size: 1.75rem !important;
    letter-spacing: 0.75rem !important;
    text-align: center !important;
    font-weight: 700 !important;
    padding: 1rem !important;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: var(--radius-button);
    transition: all 0.3s ease;
  }

  .verification-input:focus {
    border-color: var(--primary-blue);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
  }

  .verification-input::placeholder {
    letter-spacing: 0.3rem;
    font-size: 1.25rem;
    color: var(--text-muted);
  }

  /* Email Icon Animation */
  .email-icon-large {
    font-size: 6rem;
    animation: floatEmail 3s ease-in-out infinite;
    filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.15));
  }

  /* Verification Badge */
  .verification-badge {
    font-size: 3rem;
    position: absolute;
    top: 20%;
    right: 25%;
    animation: pulse 2s ease-in-out infinite;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.1));
  }

  /* Mountain Scene Container */
  .mountain-scene {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 220px;
    padding: 2rem;
  }

  /* Animations */
  @keyframes floatEmail {
    0%,
    100% {
      transform: translateY(0) rotate(0deg);
    }
    25% {
      transform: translateY(-15px) rotate(-3deg);
    }
    50% {
      transform: translateY(-25px) rotate(0deg);
    }
    75% {
      transform: translateY(-15px) rotate(3deg);
    }
  }

  @keyframes pulse {
    0%,
    100% {
      transform: scale(1);
      opacity: 1;
    }
    50% {
      transform: scale(1.15);
      opacity: 0.8;
    }
  }

  /* Email Info Box */
  .email-info-box {
    background: rgba(37, 99, 235, 0.08);
    border: 1px solid rgba(37, 99, 235, 0.15);
    border-radius: var(--radius-button);
    padding: 1rem 1.25rem;
    margin-bottom: 1.5rem;
    text-align: center;
  }

  .email-info-box .email-display {
    font-weight: 700;
    color: var(--primary-blue);
    font-size: 1rem;
    word-break: break-all;
  }

  /* Timer Display */
  .timer-display {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--bg-main);
    border: 1px solid var(--border-color);
    padding: 0.5rem 1rem;
    border-radius: 9999px;
    font-size: 0.8125rem;
    color: var(--text-secondary);
    margin-top: 0.5rem;
  }

  .timer-display .timer-icon {
    font-size: 1rem;
  }

  /* Resend Section */
  .resend-section {
    text-align: center;
    margin-top: 1.5rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border-color);
  }

  .resend-text {
    color: var(--text-secondary);
    font-size: 0.875rem;
    margin-bottom: 0.5rem;
  }

  /* Success State Animation */
  .verify-success {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
  }

  .verify-success.show {
    display: flex;
    animation: fadeInUp 0.5s ease;
  }

  .verify-success .success-icon {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    animation: bounceIn 0.6s ease;
  }

  .verify-success .success-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.75rem;
  }

  .verify-success .success-message {
    color: var(--text-secondary);
    font-size: 1rem;
    line-height: 1.6;
  }

  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes bounceIn {
    0% {
      transform: scale(0);
      opacity: 0;
    }
    50% {
      transform: scale(1.2);
    }
    100% {
      transform: scale(1);
      opacity: 1;
    }
  }

  /* Decorative Elements */
  .confetti-container {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    overflow: hidden;
  }

  /* Help Text */
  .help-text {
    font-size: 0.8125rem;
    color: var(--text-muted);
    text-align: center;
    margin-top: 1rem;
    line-height: 1.5;
  }

  .help-text a {
    color: var(--primary-blue);
    text-decoration: none;
    font-weight: 500;
  }

  .help-text a:hover {
    text-decoration: underline;
  }
</style>
