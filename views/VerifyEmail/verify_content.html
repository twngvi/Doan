<!-- Email Verification Page Content -->
<div class="auth-login-container">
  <!-- Left Side - Illustration -->
  <div class="auth-illustration">
    <div class="illustration-content">
      <div class="logo-section">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Doanv3</span>
      </div>
      <h1 class="illustration-title">Xác thực email</h1>
      <p class="illustration-description">
        Kiểm tra email và nhập mã xác thực để kích hoạt tài khoản
      </p>
      <div class="illustration-image">
        <div class="mountain-scene">
          <div class="email-icon-large">📧</div>
          <div class="verification-badge">✅</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side - Verification Form -->
  <div class="auth-form-container">
    <div class="auth-form-wrapper">
      <div class="form-header">
        <h2 class="form-title">Xác thực Email</h2>
        <p class="form-description">
          Chúng tôi đã gửi mã xác thực đến email: <br />
          <strong id="verify-email-display"></strong>
        </p>
      </div>

      <!-- Verification Form -->
      <form id="verify-form" class="auth-form">
        <!-- Verification Code Input -->
        <div class="form-group">
          <label for="verification-code" class="form-label"
            >🔐 Mã xác thực (6 chữ số)</label
          >
          <div class="input-wrapper">
            <input
              type="text"
              id="verification-code"
              name="code"
              class="form-input verification-input"
              placeholder="Nhập mã 6 chữ số"
              maxlength="6"
              pattern="[0-9]{6}"
              required
              autocomplete="off"
            />
          </div>
          <span class="form-hint">Mã xác thực có hiệu lực trong 24 giờ</span>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-submit" id="btn-verify">
          <span class="btn-text">Xác thực</span>
          <span class="btn-loader"></span>
        </button>

        <!-- Resend Code -->
        <div class="form-options" style="margin-top: 1rem; text-align: center">
          <p class="footer-text">
            Không nhận được mã?
            <a
              href="#"
              class="footer-link"
              id="resend-code-btn"
              onclick="handleResendCode(); return false;"
            >
              Gửi lại mã
            </a>
          </p>
          <p class="form-hint" id="resend-timer" style="display: none">
            Bạn có thể gửi lại sau <span id="timer-seconds">60</span> giây
          </p>
        </div>
      </form>

      <!-- Back to Login -->
      <div class="form-footer">
        <p class="footer-text">
          <a
            href="#"
            class="footer-link"
            onclick="showPage('page-login'); return false;"
          >
            ← Quay lại đăng nhập
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
