<script>
  // ===== DASHBOARD - KNOWLEDGE STUDIO =====

  /**
   * Get user data from storage
   */
  function getUserData() {
    const currentUserData =
      localStorage.getItem("currentUser") ||
      sessionStorage.getItem("currentUser");
    if (currentUserData) {
      try {
        return JSON.parse(currentUserData);
      } catch (e) {
        console.error("Error parsing currentUser:", e);
      }
    }
    return null;
  }

  /**
   * Get streak data from localStorage
   */
  function getStreakData() {
    const streakData = localStorage.getItem("streakData");
    if (streakData) {
      try {
        return JSON.parse(streakData);
      } catch (e) {
        console.error("Error parsing streakData:", e);
      }
    }
    return {
      currentStreak: 0,
      longestStreak: 0,
      lastActiveDate: null,
      dailyActiveMinutes: 0,
      sessionStartTime: null,
    };
  }

  /**
   * Save streak data to localStorage
   */
  function saveStreakData(data) {
    localStorage.setItem("streakData", JSON.stringify(data));
  }

  /**
   * Initialize Dashboard
   */
  function initDashboard() {
    console.log("📊 Initializing Dashboard (Knowledge Studio)...");

    const user = getUserData();
    if (user) {
      updateDashboardUserInfo(user);
    }

    updateGreeting();
    initStreakTracking();
    loadRecentTopics();
    loadProgressByTopic();
    loadKPIs();
  }

  /**
   * Update greeting based on time of day
   */
  function updateGreeting() {
    const hour = new Date().getHours();
    let greeting = "Chào mừng trở lại";

    if (hour >= 5 && hour < 12) {
      greeting = "Chào buổi sáng";
    } else if (hour >= 12 && hour < 18) {
      greeting = "Chào buổi chiều";
    } else if (hour >= 18 && hour < 22) {
      greeting = "Chào buổi tối";
    } else {
      greeting = "Chúc ngủ ngon";
    }

    const greetingEl = document.getElementById("greeting-text");
    const userNameEl = document.getElementById("userNameWelcome");

    if (greetingEl && userNameEl) {
      const userName = userNameEl.textContent || "User";
      greetingEl.innerHTML = `${greeting}, <span id="userNameWelcome">${userName}</span>`;
    }
  }

  /**
   * Update dashboard user info
   */
  function updateDashboardUserInfo(user) {
    const displayName =
      user.displayName || user.fullName || user.username || "User";

    const userNameEl = document.getElementById("userNameWelcome");
    if (userNameEl) {
      userNameEl.textContent = displayName;
    }

    if (typeof window.updateAllUserNames === "function") {
      window.updateAllUserNames(displayName);
    }
    if (typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(user.avatarUrl);
    }
  }

  /**
   * Initialize streak tracking system
   */
  function initStreakTracking() {
    const streakData = getStreakData();
    const today = new Date().toISOString().split("T")[0];

    // Check if it's a new day
    if (streakData.lastActiveDate !== today) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split("T")[0];

      // If last active was not yesterday, reset streak (unless we had ≥5 min yesterday)
      if (
        streakData.lastActiveDate !== yesterdayStr &&
        streakData.dailyActiveMinutes < 5
      ) {
        streakData.currentStreak = 0;
      }

      // Reset daily minutes for new day
      streakData.dailyActiveMinutes = 0;
    }

    // Start session timer
    streakData.sessionStartTime = Date.now();
    saveStreakData(streakData);

    // Update UI
    updateStreakUI(streakData);

    // Track active time every minute
    setInterval(trackActiveTime, 60000);
  }

  /**
   * Track active time (called every minute)
   */
  function trackActiveTime() {
    if (document.hidden) return; // Don't count if tab is hidden

    const streakData = getStreakData();
    const today = new Date().toISOString().split("T")[0];

    // Add 1 minute to daily active time
    streakData.dailyActiveMinutes = (streakData.dailyActiveMinutes || 0) + 1;
    streakData.lastActiveDate = today;

    // Check if reached 5 minutes today (streak milestone)
    if (streakData.dailyActiveMinutes === 5) {
      const yesterday = new Date();
      yesterday.setDate(yesterday.getDate() - 1);
      const yesterdayStr = yesterday.toISOString().split("T")[0];

      // Check if we maintained streak from yesterday
      const prevStreak = streakData.currentStreak || 0;
      streakData.currentStreak = prevStreak + 1;

      // Update longest streak
      if (streakData.currentStreak > (streakData.longestStreak || 0)) {
        streakData.longestStreak = streakData.currentStreak;
      }
    }

    saveStreakData(streakData);
    updateStreakUI(streakData);
  }

  /**
   * Update streak UI elements
   */
  function updateStreakUI(streakData) {
    const streakDaysEl = document.getElementById("streak-days");
    const todayTimeEl = document.getElementById("today-time");
    const todayMinutesEl = document.getElementById("today-minutes");
    const timeStatusEl = document.getElementById("time-status");
    const timeStatEl = document.getElementById("time-stat");

    if (streakDaysEl) {
      streakDaysEl.textContent = `${streakData.currentStreak || 0} ngày`;
    }

    const dailyMinutes = streakData.dailyActiveMinutes || 0;

    if (todayTimeEl) {
      todayTimeEl.textContent = dailyMinutes;
    }

    if (todayMinutesEl) {
      todayMinutesEl.textContent = dailyMinutes;
    }

    if (timeStatusEl && timeStatEl) {
      if (dailyMinutes >= 5) {
        timeStatusEl.textContent = "Đã đạt";
        timeStatusEl.classList.add("achieved");
      } else {
        timeStatusEl.textContent = "Chưa đạt";
        timeStatusEl.classList.remove("achieved");
      }
    }

    // Update KPI longest streak
    const kpiLongestStreak = document.getElementById("kpi-longest-streak");
    if (kpiLongestStreak) {
      kpiLongestStreak.textContent = `${streakData.longestStreak || 0} ngày`;
    }
  }

  /**
   * Load recent topics (activity cards)
   */
  function loadRecentTopics() {
    console.log("📋 Loading recent topics...");

    google.script.run
      .withSuccessHandler(handleRecentTopicsLoaded)
      .withFailureHandler(handleRecentTopicsError)
      .getUserQuizResults();
  }

  /**
   * Handle recent topics loaded
   */
  function handleRecentTopicsLoaded(response) {
    const gridEl = document.getElementById("recent-topics-grid");
    if (!gridEl) return;

    let results = [];
    if (response && response.success && Array.isArray(response.results)) {
      results = response.results;
    } else if (Array.isArray(response)) {
      results = response;
    }

    if (results.length === 0) {
      gridEl.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-state-icon">📚</div>
          <div class="empty-state-title">Bạn chưa có hoạt động nào gần đây</div>
          <div class="empty-state-text">Bắt đầu một bài luyện để hệ thống ghi nhận tiến độ.</div>
        </div>
      `;
      return;
    }

    // Group by topic and get recent unique topics
    const topicMap = new Map();
    results.forEach((result) => {
      const topicId = result.topicId || result.topicTitle;
      if (!topicMap.has(topicId)) {
        topicMap.set(topicId, result);
      }
    });

    const recentTopics = Array.from(topicMap.values()).slice(0, 6);
    const today = new Date().toISOString().split("T")[0];

    gridEl.innerHTML = recentTopics
      .map((topic) => {
        const isToday =
          topic.completedAt && topic.completedAt.startsWith(today);
        const timeAgo = getTimeAgo(topic.completedAt);
        const score = topic.score || 0;
        const total = topic.totalQuestions || 10;
        const percentage =
          topic.percentage || Math.round((score / total) * 100);
        const progress = Math.min(100, percentage);

        // Determine quiz type tag
        let tagClass = "";
        let tagText = "Quiz Visual";
        if (topic.quizType === "matching") {
          tagClass = "matching";
          tagText = "Matching";
        } else if (topic.quizType === "code") {
          tagClass = "code";
          tagText = "Code Puzzle";
        }

        return `
        <div class="topic-card ${isToday ? "today" : ""}">
          <div class="topic-card-header">
            <div>
              <div class="topic-title">${topic.topicTitle || "Chủ đề"}</div>
              <div class="topic-tags">
                <span class="topic-tag ${tagClass}">${tagText}</span>
              </div>
            </div>
            ${isToday ? '<span class="today-chip">Hôm nay</span>' : ""}
          </div>
          <div class="topic-progress">
            <div class="topic-progress-bar">
              <div class="topic-progress-fill" style="width: ${progress}%"></div>
            </div>
          </div>
          <div class="topic-meta">
            <span>Lần chơi: ${timeAgo}</span>
            <span class="topic-result">${score}/${total} · ${percentage}%</span>
          </div>
          <div class="topic-actions">
            <button class="topic-btn topic-btn-primary" onclick="continueQuiz('${
              topic.topicId || ""
            }')">Tiếp tục</button>
            <button class="topic-btn topic-btn-secondary">Xem báo cáo</button>
          </div>
        </div>
      `;
      })
      .join("");
  }

  /**
   * Handle recent topics error
   */
  function handleRecentTopicsError(error) {
    console.error("❌ Recent topics error:", error);
    const gridEl = document.getElementById("recent-topics-grid");
    if (gridEl) {
      gridEl.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-state-icon">⚠️</div>
          <div class="empty-state-text">Không thể tải hoạt động gần đây</div>
        </div>
      `;
    }
  }

  /**
   * Continue quiz for a topic
   */
  function continueQuiz(topicId) {
    if (topicId && typeof showPage === "function") {
      // Store topic ID and navigate to quiz
      localStorage.setItem("selectedTopicId", topicId);
      showPage("page-mcq");
    }
  }

  /**
   * Load progress by topic
   */
  function loadProgressByTopic() {
    console.log("📈 Loading progress by topic...");

    google.script.run
      .withSuccessHandler(handleProgressLoaded)
      .withFailureHandler(handleProgressError)
      .getAllTopics();
  }

  /**
   * Handle progress loaded
   */
  function handleProgressLoaded(response) {
    const progressList = document.getElementById("progress-list");
    if (!progressList) return;

    let topics = [];
    if (response && response.success && Array.isArray(response.topics)) {
      topics = response.topics;
    } else if (Array.isArray(response)) {
      topics = response;
    }

    if (topics.length === 0) {
      progressList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📊</div>
          <div class="empty-state-text">Chưa có dữ liệu tiến độ</div>
        </div>
      `;
      return;
    }

    // Show first 5 topics with simulated progress
    const displayTopics = topics.slice(0, 5);
    progressList.innerHTML = displayTopics
      .map((topic) => {
        const progress = Math.floor(Math.random() * 80) + 10; // 10-90%
        let statusClass = "needs-work";
        let statusText = "Cần luyện thêm";

        if (progress >= 75) {
          statusClass = "strong";
          statusText = "Mạnh";
        } else if (progress >= 50) {
          statusClass = "improving";
          statusText = "Đang cải thiện";
        }

        return `
        <div class="progress-item">
          <div class="progress-header">
            <span class="progress-label">${topic.title}</span>
            <span class="progress-status ${statusClass}">${statusText}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progress}%"></div>
          </div>
        </div>
      `;
      })
      .join("");
  }

  /**
   * Handle progress error
   */
  function handleProgressError(error) {
    console.error("❌ Progress error:", error);
    const progressList = document.getElementById("progress-list");
    if (progressList) {
      progressList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-text">Không thể tải tiến độ</div>
        </div>
      `;
    }
  }

  /**
   * Load KPIs
   */
  function loadKPIs() {
    console.log("📊 Loading KPIs...");

    google.script.run
      .withSuccessHandler(handleKPIsLoaded)
      .withFailureHandler(handleKPIsError)
      .getUserQuizResults();
  }

  /**
   * Handle KPIs loaded
   */
  function handleKPIsLoaded(response) {
    let results = [];
    if (response && response.success && Array.isArray(response.results)) {
      results = response.results;
    } else if (Array.isArray(response)) {
      results = response;
    }

    // Calculate KPIs
    const uniqueTopics = new Set(results.map((r) => r.topicId || r.topicTitle))
      .size;
    const avgAccuracy =
      results.length > 0
        ? Math.round(
            results.reduce((sum, r) => sum + (r.percentage || 0), 0) /
              results.length
          )
        : 0;
    const rank =
      results.length > 0 ? Math.max(1, 50 - results.length * 2) : "--";

    // Update UI
    const kpiTopics = document.getElementById("kpi-topics");
    const kpiAccuracy = document.getElementById("kpi-accuracy");
    const kpiRank = document.getElementById("kpi-rank");

    if (kpiTopics) kpiTopics.textContent = uniqueTopics;
    if (kpiAccuracy)
      kpiAccuracy.textContent = avgAccuracy > 0 ? `${avgAccuracy}%` : "--";
    if (kpiRank) kpiRank.textContent = rank !== "--" ? `#${rank}` : "#--";
  }

  /**
   * Handle KPIs error
   */
  function handleKPIsError(error) {
    console.error("❌ KPIs error:", error);
  }

  /**
   * Get time ago string
   */
  function getTimeAgo(dateString) {
    if (!dateString) return "Vừa xong";

    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return "Vừa xong";
    if (diffMins < 60) return `${diffMins} phút trước`;
    if (diffHours < 24) return `${diffHours} giờ trước`;
    if (diffDays < 7) return `${diffDays} ngày trước`;
    return date.toLocaleDateString("vi-VN");
  }

  // Initialize when script loads
  initDashboard();

  // Listen for user updates
  window.addEventListener("user-info-updated", function (e) {
    if (e.detail) {
      updateDashboardUserInfo(e.detail);
    }
  });

  window.addEventListener("avatar-updated", function (e) {
    if (e.detail?.url && typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(e.detail.url);
    }
  });

  // Track visibility changes for accurate time tracking
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) {
      // User came back to tab, update session
      const streakData = getStreakData();
      streakData.sessionStartTime = Date.now();
      saveStreakData(streakData);
    }
  });

  console.log("✅ Dashboard scripts loaded (Knowledge Studio)");
</script>
