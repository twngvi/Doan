<script>
  // ===== DASHBOARD - GAMIFICATION 4-ZONE =====

  // Cache for dashboard data
  const DashboardCache = {
    data: null,
    lastFetch: null,
    cacheTimeout: 60000,
  };

  /**
   * Get user data from storage
   */
  function getUserData() {
    const currentUserData =
      localStorage.getItem("currentUser") ||
      sessionStorage.getItem("currentUser");
    if (currentUserData) {
      try {
        return JSON.parse(currentUserData);
      } catch (e) {
        console.error("Error parsing currentUser:", e);
      }
    }
    return null;
  }

  /**
   * Build auth context payload for backend calls.
   * Backend still verifies this payload against Users sheet.
   */
  function getDashboardAuthContext() {
    const user = window.currentUser || getUserData();
    if (!user) return null;
    return {
      userId: user.userId || "",
      email: user.email || "",
      username: user.username || "",
      role: user.role || "",
    };
  }

  function hasReadyDashboardAuthContext() {
    const auth = getDashboardAuthContext();
    return !!(auth && auth.userId);
  }

  /**
   * Get/Save streak data from localStorage
   */
  function getStreakData() {
    const streakData = localStorage.getItem("streakData");
    if (streakData) {
      try {
        return JSON.parse(streakData);
      } catch (e) {}
    }
    return {
      currentStreak: 0,
      longestStreak: 0,
      lastActiveDate: null,
      checkedInToday: false,
    };
  }

  function saveStreakData(data) {
    localStorage.setItem("streakData", JSON.stringify(data));
  }

  function getTodayVNKeyForPet() {
    try {
      return new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Ho_Chi_Minh",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
      }).format(new Date());
    } catch (error) {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, "0");
      const d = String(now.getDate()).padStart(2, "0");
      return `${y}-${m}-${d}`;
    }
  }

  function syncPetEconomyFromXPAward(xpAwarded, newTotalXP) {
    try {
      const xpDelta = parseInt(xpAwarded, 10) || 0;
      if (xpDelta <= 0) return;

      const stateKey = "oq_pet_preview_state";
      const syncKey = "oq_pet_xp_coin_daily_sync";
      const rawState = localStorage.getItem(stateKey);
      const baseState = rawState
        ? JSON.parse(rawState)
        : {
            xp: 0,
            coins: 120,
            status: { energy: 78, hunger: 65, mood: 82, clean: 74 },
            requirements: { learn: 0, quiz: 0, matching: 0, target: 3 },
          };

      const safeCoins = Math.max(0, parseInt(baseState.coins, 10) || 0);
      const xpAfter = Math.max(
        0,
        newTotalXP != null && newTotalXP !== ""
          ? parseInt(newTotalXP, 10) || 0
          : (parseInt(baseState.xp, 10) || 0) + xpDelta,
      );

      baseState.coins = safeCoins + xpDelta;
      baseState.xp = xpAfter;

      // XP and XQP are independent; spending XQP never modifies XP.
      // This sync only mirrors positive XP gains into XQP for the same day.
      localStorage.setItem(stateKey, JSON.stringify(baseState));
      localStorage.setItem(
        syncKey,
        JSON.stringify({
          date: getTodayVNKeyForPet(),
          lastXP: xpAfter,
        }),
      );
    } catch (error) {
      console.warn("Pet economy sync from XP failed:", error);
    }
  }

  /**
   * Initialize Dashboard
   */
  let dashboardAutoRefreshInterval = null;
  let dashboardInitialized = false;
  let dashboardInitRetryCount = 0;
  let dashboardHasLoadedOnce = false;
  let dashboardLastBackgroundRefreshAt = 0;
  let dashboardPendingRefreshAfterLoad = null;

  const DASHBOARD_REFRESH_MIN_GAP_MS = 4000;

  function requestDashboardRefresh(options = {}) {
    const opts =
      options && typeof options === "object"
        ? options
        : { forceRefresh: !!options };

    const forceRefresh = !!opts.forceRefresh;
    const backgroundRefresh = !!opts.backgroundRefresh;
    const source = opts.source || "unknown";
    const minGapMs =
      typeof opts.minGapMs === "number"
        ? Math.max(0, opts.minGapMs)
        : DASHBOARD_REFRESH_MIN_GAP_MS;

    if (!isDashboardVisible()) return;

    const now = Date.now();
    if (
      backgroundRefresh &&
      now - dashboardLastBackgroundRefreshAt < minGapMs
    ) {
      console.log("⏭️ Dashboard refresh throttled:", source);
      return;
    }

    if (backgroundRefresh) {
      dashboardLastBackgroundRefreshAt = now;
    }

    loadAllDashboardData({
      ...opts,
      forceRefresh,
      backgroundRefresh,
      source,
    });
  }

  function initDashboard() {
    // Guard: only init if dashboard is visible and user is logged in
    const isLoggedIn = localStorage.getItem("isLoggedIn") === "true";
    if (!isLoggedIn) {
      console.log("📊 Dashboard init skipped - not logged in");
      return;
    }

    if (!hasReadyDashboardAuthContext()) {
      if (dashboardInitRetryCount < 20) {
        dashboardInitRetryCount++;
        console.log(
          "⏳ Dashboard waiting for user context before loading data...",
        );
        setTimeout(initDashboard, 150);
      } else {
        console.warn(
          "⚠️ Dashboard init aborted: missing authenticated user context",
        );
      }
      return;
    }

    dashboardInitRetryCount = 0;

    console.log("📊 Initializing Dashboard (Gamification)...");
    dashboardInitialized = true;

    const user = getUserData();
    if (user) updateDashboardUserInfo(user);

    updateGreeting();
    initStreakTracking();
    initHeaderMeteorShower();
    setupDashboardHeaderMouseEffect();

    // Single API call for all dashboard data
    loadAllDashboardData({
      forceRefresh: false,
      backgroundRefresh: false,
      source: "initial-load",
    });

    // Auto-refresh Lịch sử Thực chiến mỗi 30 giây
    startDashboardAutoRefresh();
  }

  /**
   * Auto-refresh dashboard data (activity history + leaderboard)
   */
  function startDashboardAutoRefresh() {
    if (dashboardAutoRefreshInterval)
      clearInterval(dashboardAutoRefreshInterval);

    dashboardAutoRefreshInterval = setInterval(() => {
      // Chỉ refresh nếu đang ở trang dashboard
      if (isDashboardVisible()) {
        console.log(
          "🔄 Auto-refreshing dashboard data (history + leaderboard)...",
        );
        requestDashboardRefresh({
          forceRefresh: true,
          backgroundRefresh: true,
          source: "auto-refresh",
          minGapMs: 10000,
        });
      }
    }, 30000); // 30 giây
  }

  function stopDashboardAutoRefresh() {
    if (dashboardAutoRefreshInterval) {
      clearInterval(dashboardAutoRefreshInterval);
      dashboardAutoRefreshInterval = null;
    }
  }

  /**
   * Check if dashboard is currently visible
   */
  function isDashboardVisible() {
    const el = document.querySelector(".dashboard-main-content");
    return el && el.offsetParent !== null;
  }

  /**
   * Force refresh dashboard when user returns to dashboard page
   * Called from showPage() in client_js.html
   */
  window.refreshDashboardOnReturn = function () {
    // If dashboard was never initialized, do full init
    if (!dashboardInitialized) {
      console.log("🔄 First-time Dashboard init on navigation...");
      initDashboard();
      return;
    }

    console.log(
      "🔄 Returning to Dashboard — force refreshing all data (leaderboard + history)...",
    );
    requestDashboardRefresh({
      forceRefresh: true,
      backgroundRefresh: true,
      source: "route-return",
      minGapMs: 3000,
    });
    startDashboardAutoRefresh();
  };

  /**
   * Mouse-responsive stars effect
   */
  function setupDashboardHeaderMouseEffect() {
    const header = document.querySelector(".dashboard-header");
    const stars = document.getElementById("dashboardHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  /**
   * Meteor shower effect
   */
  let dashboardMeteorInterval = null;

  function initHeaderMeteorShower() {
    const container = document.getElementById("header-meteor-container");
    if (!container) return;

    if (dashboardMeteorInterval) clearInterval(dashboardMeteorInterval);

    function createMeteor() {
      const meteor = document.createElement("div");
      meteor.className = "header-meteor";
      meteor.style.left = Math.random() * 40 + "%";
      meteor.style.top = Math.random() * 20 + "%";
      meteor.style.height = 35 + Math.random() * 35 + "px";
      meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";
      container.appendChild(meteor);
      setTimeout(() => meteor.remove(), 1200);
    }

    dashboardMeteorInterval = setInterval(() => {
      if (!document.getElementById("header-meteor-container")) {
        clearInterval(dashboardMeteorInterval);
        return;
      }
      createMeteor();
    }, 800);

    createMeteor();
  }

  /**
   * SINGLE API CALL - Load all dashboard data
   * Guarded against concurrent calls from multiple triggers.
   */
  let _dashboardIsLoading = false;

  function loadAllDashboardData(options) {
    // Prevent overlapping API calls from multiple triggers
    if (_dashboardIsLoading) {
      const pendingOpts =
        options && typeof options === "object"
          ? { ...options }
          : { forceRefresh: !!options };
      dashboardPendingRefreshAfterLoad = {
        forceRefresh: !!pendingOpts.forceRefresh,
        backgroundRefresh: !!pendingOpts.backgroundRefresh,
        source: pendingOpts.source || "queued-refresh",
        minGapMs:
          typeof pendingOpts.minGapMs === "number"
            ? pendingOpts.minGapMs
            : DASHBOARD_REFRESH_MIN_GAP_MS,
      };
      console.log(
        "📋 Dashboard load already in progress, queued trailing refresh",
      );
      return;
    }

    console.log("📋 Loading all dashboard data (single API)...");
    _dashboardIsLoading = true;

    const opts =
      options && typeof options === "object"
        ? options
        : { forceRefresh: !!options };
    const forceRefresh = !!opts.forceRefresh;
    const backgroundRefresh = !!opts.backgroundRefresh;
    const initialLoad = !dashboardHasLoadedOnce && !DashboardCache.data;

    const finishLoad = () => {
      _dashboardIsLoading = false;
      if (dashboardPendingRefreshAfterLoad) {
        const nextRefresh = dashboardPendingRefreshAfterLoad;
        dashboardPendingRefreshAfterLoad = null;
        setTimeout(() => {
          requestDashboardRefresh(nextRefresh);
        }, 100);
      }
    };

    const now = Date.now();
    if (
      !forceRefresh &&
      DashboardCache.data &&
      DashboardCache.lastFetch &&
      now - DashboardCache.lastFetch < DashboardCache.cacheTimeout
    ) {
      console.log("📦 Using cached dashboard data");
      renderAllZones(DashboardCache.data);
      dashboardHasLoadedOnce = true;
      finishLoad();
      return;
    }

    // Show large loading placeholders only on first load.
    // Background refresh should keep old data on screen.
    if (initialLoad && !backgroundRefresh) {
      showLoadingStates();
    }

    const handleLoadError = (message) => {
      finishLoad();
      if (initialLoad) {
        showErrorStates(message);
      } else {
        console.warn("Background refresh failed, keeping current UI:", message);
      }
    };

    const loadingTimeout = setTimeout(() => {
      console.warn("⏱️ API taking too long");
    }, 10000);

    google.script.run
      .withSuccessHandler((response) => {
        clearTimeout(loadingTimeout);
        if (response && response.success) {
          DashboardCache.data = response;
          DashboardCache.lastFetch = Date.now();
          renderAllZones(response);
          dashboardHasLoadedOnce = true;
          finishLoad();
        } else {
          console.warn(
            "Dashboard data returned success:false, retrying in 3s...",
          );
          // Retry once after a short delay instead of showing error immediately
          setTimeout(() => {
            google.script.run
              .withSuccessHandler((retryResponse) => {
                if (retryResponse && retryResponse.success) {
                  DashboardCache.data = retryResponse;
                  DashboardCache.lastFetch = Date.now();
                  renderAllZones(retryResponse);
                  dashboardHasLoadedOnce = true;
                  finishLoad();
                } else {
                  handleLoadError("Không thể tải dữ liệu");
                }
              })
              .withFailureHandler(() => {
                handleLoadError("Không thể tải dữ liệu");
              })
              .getDashboardData(getDashboardAuthContext());
          }, 3000);
        }
      })
      .withFailureHandler((error) => {
        clearTimeout(loadingTimeout);
        console.error("❌ getDashboardData error:", error);
        // Retry once on failure
        setTimeout(() => {
          google.script.run
            .withSuccessHandler((retryResponse) => {
              if (retryResponse && retryResponse.success) {
                DashboardCache.data = retryResponse;
                DashboardCache.lastFetch = Date.now();
                renderAllZones(retryResponse);
                dashboardHasLoadedOnce = true;
                finishLoad();
              } else {
                handleLoadError("Lỗi kết nối server");
              }
            })
            .withFailureHandler(() => {
              handleLoadError("Lỗi kết nối server");
            })
            .getDashboardData(getDashboardAuthContext());
        }, 3000);
      })
      .getDashboardData(getDashboardAuthContext());
  }

  /**
   * Render all 4 zones from single data object
   */
  function renderAllZones(data) {
    renderQuickStats(data.quickStats);
    renderActivities(data.activities);
    renderQuests(data.quests);
    renderSkillProgress(data.skillProgress);
    renderLeaderboard(data.leaderboard);
    renderSuggestion(data.suggestion);
  }

  /**
   * ZONE 2: Quick Stats
   */
  function renderQuickStats(stats) {
    if (!stats) return;
    const xpEl = document.getElementById("qs-xp");
    const accEl = document.getElementById("qs-accuracy");
    const badgesEl = document.getElementById("qs-badges");
    const rankEl = document.getElementById("qs-rank");
    const rankIconEl = document.getElementById("qs-rank-icon");

    if (xpEl) xpEl.textContent = stats.totalXP.toLocaleString();
    if (accEl) accEl.textContent = stats.avgAccuracy + "%";
    if (badgesEl) badgesEl.textContent = stats.badges;
    if (rankEl) rankEl.textContent = stats.rankTitle;
    if (rankIconEl) rankIconEl.textContent = stats.rankIcon;
  }

  /**
   * ZONE 3 LEFT: Activity History
   */
  function renderActivities(activities) {
    const container = document.getElementById("activity-history-list");
    if (!container) return;

    if (!activities || activities.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">⚔️</div>
          <div class="empty-state-title">Chưa có trận chiến nào</div>
          <div class="empty-state-text">Bắt đầu học hoặc làm quiz để ghi nhận!</div>
        </div>`;
      return;
    }

    const today = new Date().toISOString().split("T")[0];
    const typeConfig = {
      Learning: {
        icon: "📖",
        label: "Learning",
        color: "#60a5fa",
        bg: "rgba(96,165,250,0.15)",
      },
      MCQ: {
        icon: "🧠",
        label: "MCQ Quiz",
        color: "#34d399",
        bg: "rgba(52,211,153,0.15)",
      },
      Matching: {
        icon: "🔗",
        label: "Matching",
        color: "#a78bfa",
        bg: "rgba(167,139,250,0.15)",
      },
    };

    // Chỉ hiển thị tối đa 4 hoạt động gần nhất
    const recentActivities = activities.slice(0, 4);

    container.innerHTML = recentActivities
      .map((act) => {
        const cfg = typeConfig[act.type] || typeConfig.Learning;
        const timeAgo = getTimeAgo(act.timestamp);
        const isToday = act.timestamp && act.timestamp.startsWith(today);
        const hasScore = act.score !== null && act.score !== undefined;

        // Xác định trang đích khi click
        let targetPage = "page-topics";
        if (act.type === "MCQ") targetPage = "page-mcq";
        else if (act.type === "Matching") targetPage = "page-matching";
        else if (act.type === "Learning") targetPage = "page-lesson";

        // Dot color logic
        let dotClass = "dot-info";
        if (act.type === "Learning") dotClass = "dot-info";
        else if (hasScore) {
          const pct = act.percentage || 0;
          if (pct >= 80) dotClass = "dot-success";
          else if (pct >= 50) dotClass = "dot-warning";
          else dotClass = "dot-danger";
        }

        let scoreHtml = "";
        if (hasScore) {
          const pct = act.percentage || 0;
          let scoreColor = "#f87171";
          if (pct >= 80) scoreColor = "#34d399";
          else if (pct >= 50) scoreColor = "#fbbf24";
          scoreHtml = `
          <div class="activity-hist-score">
            <span class="score-val" style="color:${scoreColor}">${act.score}/${act.totalQuestions}</span>
            <span class="score-pct" style="background:${scoreColor}15;color:${scoreColor}">${pct}%</span>
          </div>`;
        }

        // Escape strings for HTML onclick attribute
        const safeTopicId = String(act.topicId || "").replace(/'/g, "\\&#39;");
        const safeTopicTitle = String(act.topicTitle || "").replace(
          /'/g,
          "\\&#39;",
        );
        const safeContentDocId = String(act.contentDocId || "").replace(
          /'/g,
          "\\&#39;",
        );

        return `
        <div class="activity-hist-item activity-clickable" 
             onclick="navigateToActivity('${targetPage}', '${safeTopicId}', '${safeTopicTitle}', '${act.type}', '${safeContentDocId}')" 
             title="Bấm để thực hiện lại">
          <div class="activity-dot-status ${dotClass}"></div>
          <div class="activity-hist-content">
            <div class="activity-hist-top">
              <span class="activity-hist-badge" style="background:${cfg.bg};color:${cfg.color}">
                ${cfg.icon} ${cfg.label}
              </span>
              <span class="activity-hist-time">${isToday ? "🕐 " : ""}${timeAgo}</span>
            </div>
            <div class="activity-hist-title">${act.topicTitle || "Chủ đề"}</div>
            ${scoreHtml}
          </div>
          <div class="activity-go-icon">›</div>
        </div>`;
      })
      .join("");
  }

  /**
   * Navigate to activity page when clicking on history item
   */
  function navigateToActivity(
    targetPage,
    topicId,
    topicTitle,
    actType,
    contentDocId,
  ) {
    console.log(
      "🔗 Navigating to:",
      targetPage,
      topicId,
      topicTitle,
      actType,
      contentDocId,
    );
    if (typeof showPage !== "function") return;

    // Normalize inputs
    topicId = String(topicId || "").trim();
    topicTitle = String(topicTitle || "").trim();
    contentDocId = String(contentDocId || "").trim();
    if (contentDocId === "undefined" || contentDocId === "null")
      contentDocId = "";

    // For Learning activities, need contentDocId to open lesson
    if (actType === "Learning" && topicId) {
      // 1. Use contentDocId from activity data (enriched by server)
      if (contentDocId) {
        console.log("✅ Using contentDocId from activity data:", contentDocId);
        showPage("page-lesson", {
          topicId: topicId,
          topicTitle: topicTitle,
          contentDocId: contentDocId,
        });
        return;
      }

      // 2. Fallback: look up from global topics cache
      var topic = null;
      if (window.globalTopicsCache && window.globalTopicsCache.data) {
        topic = window.globalTopicsCache.data.find(function (t) {
          return String(t.topicId).trim() === topicId;
        });
      }
      if (
        topic &&
        topic.contentDocId &&
        topic.contentDocId.trim() !== "" &&
        topic.contentDocId !== "undefined"
      ) {
        console.log(
          "✅ Using contentDocId from global cache:",
          topic.contentDocId,
        );
        showPage("page-lesson", {
          topicId: topic.topicId,
          topicTitle: topic.title || topicTitle,
          contentDocId: topic.contentDocId.trim(),
        });
        return;
      }

      // 3. Last resort: fetch topics from server
      console.log(
        "⏳ No contentDocId available, loading topics from server...",
      );
      if (typeof showToast === "function")
        showToast("Đang tải bài học...", "info");
      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.topics) {
            // Save to global cache
            if (!window.globalTopicsCache) {
              window.globalTopicsCache = {
                data: null,
                progress: null,
                lastLoadTime: 0,
                cacheDuration: 60000,
              };
            }
            window.globalTopicsCache.data = result.topics;
            window.globalTopicsCache.lastLoadTime = Date.now();
            var found = result.topics.find(function (t) {
              return String(t.topicId).trim() === topicId;
            });
            if (
              found &&
              found.contentDocId &&
              found.contentDocId.trim() !== ""
            ) {
              showPage("page-lesson", {
                topicId: found.topicId,
                topicTitle: found.title || topicTitle,
                contentDocId: found.contentDocId.trim(),
              });
            } else {
              showNotification("Không tìm thấy nội dung bài học", "warning");
              showPage("page-topics");
            }
          } else {
            showNotification("Không thể tải danh sách chủ đề", "warning");
            showPage("page-topics");
          }
        })
        .withFailureHandler(function (err) {
          console.error("❌ Failed to load topics:", err);
          showNotification("Lỗi tải chủ đề. Vui lòng thử lại.", "error");
          showPage("page-topics");
        })
        .getAllTopics();
      return;
    }

    // For MCQ/Matching - go to the page directly
    showPage(targetPage, {
      topicId: topicId,
      topicTitle: topicTitle,
      type: actType,
    });
  }

  /**
   * ZONE 3 RIGHT TOP: Daily Quests
   */
  function renderQuests(quests) {
    const container = document.getElementById("quests-list");
    if (!container) return;

    if (!quests || quests.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🎯</div>
          <div class="empty-state-text">Không có nhiệm vụ nào</div>
        </div>`;
      return;
    }

    container.innerHTML = quests
      .map((q) => {
        const doneClass = q.done ? "quest-done" : "";
        const claimedClass = q.claimed ? "quest-claimed" : "";
        const bonusClass = q.isBonus ? "quest-bonus" : "";
        const pct =
          q.target > 0 ? Math.round((q.progress / q.target) * 100) : 0;

        // Button logic
        let actionHtml = "";
        if (q.claimed) {
          actionHtml = `<div class="quest-xp quest-xp-claimed">✓ +${q.xpReward} XP</div>`;
        } else if (q.done) {
          actionHtml = `<button class="quest-claim-btn" onclick="claimQuestXP('${q.questId}', this)">Nhận +${q.xpReward} XP</button>`;
        } else {
          actionHtml = `<div class="quest-xp">+${q.xpReward} XP</div>`;
        }

        return `
        <div class="quest-item ${doneClass} ${claimedClass} ${bonusClass}" data-quest-id="${q.questId}">
          <div class="quest-check">${q.claimed ? "✓" : q.done ? "●" : ""}</div>
          <div class="quest-body">
            <div class="quest-title">${q.title}</div>
            <div class="quest-progress-bar">
              <div class="quest-progress-fill" style="width:${pct}%"></div>
            </div>
          </div>
          ${actionHtml}
        </div>`;
      })
      .join("");
  }

  /**
   * Claim XP for a completed quest
   */
  window.claimQuestXP = function (questId, btnEl) {
    if (btnEl) {
      btnEl.disabled = true;
      btnEl.textContent = "Đang nhận...";
    }

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          // Update button to claimed state
          if (btnEl) {
            const questItem = btnEl.closest(".quest-item");
            if (questItem) {
              questItem.classList.add("quest-claimed");
              const checkEl = questItem.querySelector(".quest-check");
              if (checkEl) checkEl.textContent = "✓";
            }
            btnEl.outerHTML = `<div class="quest-xp quest-xp-claimed">✓ +${result.xpAwarded} XP</div>`;
          }

          // Update XP display
          const xpEl = document.getElementById("qs-xp");
          if (xpEl) xpEl.textContent = result.newTotalXP.toLocaleString();

          // Show XP animation
          showXPAnimation(result.xpAwarded);
          syncPetEconomyFromXPAward(result.xpAwarded, result.newTotalXP);

          if (typeof showToast === "function") {
            showToast("+" + result.xpAwarded + " XP! 🌟", "success");
          }

          // Check if bonus quest is now claimable (refresh quests + leaderboard)
          // Always refresh to update leaderboard with new XP
          setTimeout(() => {
            requestDashboardRefresh({
              forceRefresh: true,
              backgroundRefresh: true,
              source: "quest-claim",
              minGapMs: 1500,
            });
          }, 1500);
        } else {
          if (result && result.alreadyClaimed) {
            if (btnEl) {
              btnEl.outerHTML = `<div class="quest-xp quest-xp-claimed">✓ Đã nhận</div>`;
            }
            if (typeof showToast === "function") {
              showToast("Đã nhận thưởng rồi!", "info");
            }
          } else {
            if (btnEl) {
              btnEl.disabled = false;
              btnEl.textContent = "Nhận XP";
            }
            if (typeof showToast === "function") {
              showToast(result?.message || "Không thể nhận XP", "error");
            }
          }
        }
      })
      .withFailureHandler(function (error) {
        console.error("Claim XP error:", error);
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = "Nhận XP";
        }
        if (typeof showToast === "function") {
          showToast("Lỗi khi nhận XP", "error");
        }
      })
      .completeQuestAndAwardXP(questId, getDashboardAuthContext());
  };

  /**
   * Show floating XP animation
   */
  function showXPAnimation(xpAmount) {
    const xpEl = document.getElementById("qs-xp");
    if (!xpEl) return;

    const rect = xpEl.getBoundingClientRect();
    const floater = document.createElement("div");
    floater.className = "xp-float-animation";
    floater.textContent = "+" + xpAmount + " XP";
    floater.style.left = rect.left + rect.width / 2 + "px";
    floater.style.top = rect.top + "px";
    document.body.appendChild(floater);

    setTimeout(() => floater.remove(), 1500);
  }

  /**
   * ZONE 3 RIGHT BOTTOM: Skill Progress
   */
  function renderSkillProgress(skills) {
    const container = document.getElementById("skill-progress-list");
    if (!container) return;

    if (!skills || skills.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📊</div>
          <div class="empty-state-text">Làm quiz để xem tiến độ kỹ năng</div>
        </div>`;
      return;
    }

    container.innerHTML = skills
      .map((s) => {
        let fillClass = "skill-low";
        if (s.progress >= 75) fillClass = "skill-high";
        else if (s.progress >= 50) fillClass = "skill-mid";

        return `
        <div class="skill-item">
          <div class="skill-header">
            <span class="skill-name">${s.title}</span>
            <span class="skill-pct">${s.progress}%</span>
          </div>
          <div class="skill-bar">
            <div class="skill-fill ${fillClass}" style="width:${s.progress}%"></div>
          </div>
        </div>`;
      })
      .join("");
  }

  /**
   * ZONE 4 TOP: Leaderboard (Top 10)
   * Previous leaderboard data for detecting XP changes
   */
  let previousLeaderboard = null;

  function renderLeaderboard(leaderboard) {
    const container = document.getElementById("leaderboard-list");
    if (!container) return;

    if (!leaderboard || leaderboard.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🏅</div>
          <div class="empty-state-text">Chưa có dữ liệu xếp hạng</div>
        </div>`;
      previousLeaderboard = null;
      return;
    }

    // Build map of previous XP for change detection
    const prevMap = {};
    if (previousLeaderboard) {
      previousLeaderboard.forEach((e) => {
        prevMap[e.name] = e.xp;
      });
    }

    const medals = ["🥇", "🥈", "🥉"];
    const now = new Date();
    const timeStr = now.toLocaleTimeString("vi-VN", {
      hour: "2-digit",
      minute: "2-digit",
    });

    container.innerHTML =
      '<div class="leaderboard-table">' +
      leaderboard
        .slice(0, 10)
        .map((entry, idx) => {
          const meClass = entry.isMe ? "lb-me" : "";
          const topClass = idx < 3 ? "lb-top3" : "";
          const rankDisplay = idx < 3 ? medals[idx] : idx + 1;

          // Detect XP change
          let changeHtml = "";
          if (previousLeaderboard && prevMap[entry.name] !== undefined) {
            const diff = entry.xp - prevMap[entry.name];
            if (diff > 0) {
              changeHtml = `<span class="lb-xp-change lb-xp-up">+${diff}</span>`;
            }
          }

          return `
          <div class="lb-row ${meClass} ${topClass}">
            <div class="lb-rank">${rankDisplay}</div>
            <div class="lb-name">${entry.name}${entry.isMe ? " (Bạn)" : ""}</div>
            <div class="lb-xp">${entry.xp.toLocaleString()} XP ${changeHtml}</div>
          </div>`;
        })
        .join("") +
      "</div>" +
      '<div class="lb-updated">Cập nhật lúc ' +
      timeStr +
      "</div>";

    // Save current as previous for next comparison
    previousLeaderboard = leaderboard
      .slice(0, 10)
      .map((e) => ({ name: e.name, xp: e.xp }));
  }

  /**
   * ZONE 4 BOTTOM: Smart Suggestion
   */
  function renderSuggestion(suggestion) {
    const banner = document.getElementById("suggestion-banner");
    const textEl = document.getElementById("suggestion-text");
    if (!banner || !textEl) return;

    if (suggestion) {
      textEl.textContent = suggestion;
      banner.style.display = "flex";
    } else {
      banner.style.display = "none";
    }
  }

  /**
   * Show loading states for all zones (instead of error on first load)
   */
  function showLoadingStates() {
    const ids = [
      "activity-history-list",
      "quests-list",
      "skill-progress-list",
      "leaderboard-list",
    ];
    ids.forEach((id) => {
      const el = document.getElementById(id);
      if (el && !el.querySelector(".loading-state-indicator")) {
        el.innerHTML = `
          <div class="empty-state loading-state-indicator">
            <div class="empty-state-icon" style="animation:pulse 1.5s infinite">⏳</div>
            <div class="empty-state-text">Đang tải dữ liệu...</div>
          </div>`;
      }
    });
  }

  /**
   * Show error states for all zones
   */
  function showErrorStates(msg) {
    const ids = [
      "activity-history-list",
      "quests-list",
      "skill-progress-list",
      "leaderboard-list",
    ];
    ids.forEach((id) => {
      const el = document.getElementById(id);
      if (el) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text">${msg}</div>
          </div>`;
      }
    });
  }

  /**
   * Update greeting based on time of day
   */
  function updateGreeting() {
    const hour = new Date().getHours();
    let greeting = "Chào mừng trở lại";

    if (hour >= 5 && hour < 12) greeting = "Chào buổi sáng";
    else if (hour >= 12 && hour < 18) greeting = "Chào buổi chiều";
    else if (hour >= 18 && hour < 22) greeting = "Chào buổi tối";
    else greeting = "Chúc ngủ ngon";

    const greetingEl = document.getElementById("greeting-text");
    const userNameEl = document.getElementById("userNameWelcome");

    if (greetingEl && userNameEl) {
      const userName = userNameEl.textContent || "User";
      greetingEl.innerHTML = `${greeting}, <span id="userNameWelcome">${userName}</span>`;
    }
  }

  /**
   * Update dashboard user info
   */
  function updateDashboardUserInfo(user) {
    const displayName =
      user.displayName || user.fullName || user.username || "User";
    const userNameEl = document.getElementById("userNameWelcome");
    if (userNameEl) userNameEl.textContent = displayName;

    if (typeof window.updateAllUserNames === "function")
      window.updateAllUserNames(displayName);
    if (typeof window.updateAllUserAvatars === "function")
      window.updateAllUserAvatars(user.avatarUrl);
  }

  /**
   * Initialize streak tracking - server source of truth
   */
  function initStreakTracking() {
    console.log("📋 Initializing daily check-in system...");

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          const streakData = {
            currentStreak: result.currentStreak || 0,
            longestStreak: result.longestStreak || 0,
            lastActiveDate: result.lastActiveDate || null,
            checkedInToday: result.checkedInToday || false,
          };
          saveStreakData(streakData);
          updateStreakUI(streakData);
          if (streakData.checkedInToday) setCheckinDone();
        } else {
          updateStreakUI(getStreakData());
        }
      })
      .withFailureHandler(function (error) {
        console.error("Failed to load streak data:", error);
        updateStreakUI(getStreakData());
      })
      .getUserStreakData(getDashboardAuthContext());
  }

  /**
   * Handle daily check-in
   */
  window.handleDailyCheckin = function () {
    const btn = document.getElementById("checkin-btn");
    if (btn && btn.disabled) return;
    if (btn) btn.disabled = true;

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          setCheckinDone();
          const streakData = {
            currentStreak: result.currentStreak || 0,
            longestStreak: result.longestStreak || 0,
            lastActiveDate: result.serverToday || null,
            checkedInToday: true,
          };
          saveStreakData(streakData);
          updateStreakUI(streakData);

          // Update XP display immediately if XP was awarded
          if (result.xpAwarded) {
            const xpEl = document.getElementById("qs-xp");
            if (xpEl && result.newTotalXP) {
              xpEl.textContent = result.newTotalXP.toLocaleString();
            }
            showXPAnimation(result.xpAwarded);
            syncPetEconomyFromXPAward(result.xpAwarded, result.newTotalXP);
          }

          if (typeof showToast === "function") {
            showToast(
              "Điểm danh thành công! 🔥 Chuỗi: " +
                streakData.currentStreak +
                " ngày" +
                (result.xpAwarded ? " (+" + result.xpAwarded + " XP)" : ""),
              "success",
            );
          }

          // Refresh quests to show check-in quest as done
          setTimeout(() => {
            requestDashboardRefresh({
              forceRefresh: true,
              backgroundRefresh: true,
              source: "daily-checkin",
              minGapMs: 1500,
            });
          }, 1000);
        } else {
          if (result && result.alreadyCheckedIn) {
            setCheckinDone();
            const streakData = {
              currentStreak: result.currentStreak || 0,
              longestStreak: result.longestStreak || 0,
              checkedInToday: true,
            };
            saveStreakData(streakData);
            updateStreakUI(streakData);
            if (typeof showToast === "function")
              showToast("Hôm nay bạn đã điểm danh rồi!", "info");
          } else {
            if (btn) btn.disabled = false;
            if (typeof showToast === "function")
              showToast(
                "Không thể điểm danh: " + (result?.message || "Lỗi"),
                "error",
              );
          }
        }
      })
      .withFailureHandler(function (error) {
        console.error("Check-in failed:", error);
        if (btn) btn.disabled = false;
        if (typeof showToast === "function")
          showToast("Lỗi khi điểm danh", "error");
      })
      .dailyCheckin(getDashboardAuthContext());
  };

  /**
   * Set check-in to done state
   */
  function setCheckinDone() {
    const btn = document.getElementById("checkin-btn");
    const iconEl = document.getElementById("checkin-icon");
    const textEl = document.getElementById("checkin-text");

    if (btn) {
      btn.disabled = true;
      btn.classList.add("checked-in");
    }
    if (textEl) textEl.textContent = "Đã điểm danh";
  }

  /**
   * Update streak UI
   */
  function updateStreakUI(streakData) {
    const streakDaysEl = document.getElementById("streak-days");
    const subtitleEl = document.getElementById("header-subtitle");

    if (streakDaysEl)
      streakDaysEl.textContent = `${streakData.currentStreak || 0} ngày`;
  }

  /**
   * Get time ago string
   */
  function getTimeAgo(dateString) {
    if (!dateString) return "Vừa xong";
    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return "Vừa xong";
    if (diffMins < 60) return `${diffMins} phút trước`;
    if (diffHours < 24) return `${diffHours} giờ trước`;
    if (diffDays < 7) return `${diffDays} ngày trước`;
    return date.toLocaleDateString("vi-VN");
  }

  // Do NOT auto-initialize dashboard on script load.
  // Dashboard will be initialized when user navigates to it via refreshDashboardOnReturn().
  // Only initialize if the dashboard is already visible (page restore on reload).
  if (isDashboardVisible() && localStorage.getItem("isLoggedIn") === "true") {
    initDashboard();
  }

  // Listen for user updates
  window.addEventListener("user-info-updated", function (e) {
    if (e.detail) updateDashboardUserInfo(e.detail);
  });

  window.addEventListener("avatar-updated", function (e) {
    if (e.detail?.url && typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(e.detail.url);
    }
  });

  document.addEventListener("visibilitychange", function () {
    if (!document.hidden && dashboardInitialized) {
      const streakData = getStreakData();
      streakData.sessionStartTime = Date.now();
      saveStreakData(streakData);

      // Force refresh dashboard (leaderboard + history) when tab becomes visible
      if (isDashboardVisible()) {
        console.log("🔄 Tab visible — refreshing leaderboard + history...");
        requestDashboardRefresh({
          forceRefresh: true,
          backgroundRefresh: true,
          source: "tab-visible",
          minGapMs: 6000,
        });
      }
    }
  });

  // Listen for custom event from other pages (quiz/learning completion)
  window.addEventListener("dashboard-needs-refresh", function () {
    if (!dashboardInitialized) return;
    console.log("🔄 Dashboard refresh triggered by activity event");
    if (isDashboardVisible()) {
      requestDashboardRefresh({
        forceRefresh: true,
        backgroundRefresh: true,
        source: "activity-event",
        minGapMs: 2500,
      });
    }
  });

  console.log("✅ Dashboard scripts loaded (Gamification 4-Zone)");
</script>
