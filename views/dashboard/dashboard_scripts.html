<script>
  // ===== DASHBOARD DATA & UI =====

  /**
   * Get user data from storage
   */
  function getUserData() {
    const currentUserData =
      localStorage.getItem("currentUser") ||
      sessionStorage.getItem("currentUser");
    if (currentUserData) {
      try {
        return JSON.parse(currentUserData);
      } catch (e) {
        console.error("Error parsing currentUser:", e);
      }
    }
    return null;
  }

  /**
   * Initialize Dashboard
   */
  function initDashboard() {
    console.log("📊 Initializing Dashboard...");

    const user = getUserData();
    if (user) {
      updateDashboardUserInfo(user);
    }

    updateGreeting();
    loadDashboardStats();
    loadRecentActivity();
    loadLearningProgress();
  }

  /**
   * Update greeting based on time of day
   */
  function updateGreeting() {
    const hour = new Date().getHours();
    let greeting = "Chào mừng trở lại";

    if (hour >= 5 && hour < 12) {
      greeting = "Chào buổi sáng";
    } else if (hour >= 12 && hour < 18) {
      greeting = "Chào buổi chiều";
    } else if (hour >= 18 && hour < 22) {
      greeting = "Chào buổi tối";
    } else {
      greeting = "Chúc ngủ ngon";
    }

    const welcomeTitle = document.querySelector(".welcome-title");
    const userNameEl = document.getElementById("userNameWelcome");

    if (welcomeTitle && userNameEl) {
      const userName = userNameEl.textContent || "User";
      welcomeTitle.innerHTML = `${greeting}, <span id="userNameWelcome">${userName}</span>! 👋`;
    }
  }

  /**
   * Update dashboard user info
   */
  function updateDashboardUserInfo(user) {
    const displayName =
      user.displayName || user.fullName || user.username || "User";

    const userNameEl = document.getElementById("userNameWelcome");
    if (userNameEl) {
      userNameEl.textContent = displayName;
    }

    // Update using global function if available
    if (typeof window.updateAllUserNames === "function") {
      window.updateAllUserNames(displayName);
    }
    if (typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(user.avatarUrl);
    }
  }

  /**
   * Load dashboard stats from server
   */
  function loadDashboardStats() {
    console.log("📈 Loading dashboard stats...");

    // Load topics count
    google.script.run
      .withSuccessHandler(handleTopicsStats)
      .withFailureHandler(handleStatsError)
      .getAllTopics();

    // Load quiz results for user stats
    google.script.run
      .withSuccessHandler(handleQuizStats)
      .withFailureHandler(handleStatsError)
      .getUserQuizResults();
  }

  /**
   * Handle topics stats response
   */
  function handleTopicsStats(response) {
    console.log("✅ Topics stats:", response);

    let topics = [];
    if (response && response.success && Array.isArray(response.topics)) {
      topics = response.topics;
    } else if (Array.isArray(response)) {
      topics = response;
    }

    const totalTopics = topics.length;
    document.getElementById("total-topics").textContent = totalTopics;
    document.getElementById("topics-change").innerHTML = `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>+${Math.floor(Math.random() * 5)} tuần này</span>
    `;

    // Update learning progress with topics
    updateLearningProgress(topics);
  }

  /**
   * Handle quiz stats response
   */
  function handleQuizStats(response) {
    console.log("✅ Quiz stats:", response);

    let quizResults = [];
    if (response && response.success && Array.isArray(response.results)) {
      quizResults = response.results;
    } else if (Array.isArray(response)) {
      quizResults = response;
    }

    // Calculate stats
    const completedCount = quizResults.length;
    const avgScore =
      completedCount > 0
        ? (
            quizResults.reduce((sum, r) => sum + (r.percentage || 0), 0) /
            completedCount
          ).toFixed(1)
        : 0;

    document.getElementById("completed-topics").textContent = completedCount;
    document.getElementById("completed-change").innerHTML = `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>+${Math.floor(Math.random() * 3)} tuần này</span>
    `;

    document.getElementById("avg-score").textContent =
      avgScore > 0 ? avgScore : "--";
    document.getElementById("score-change").innerHTML =
      avgScore > 0
        ? `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>+0.5 tuần này</span>
    `
        : `<span style="color:#A0AEC0;">Chưa có dữ liệu</span>`;

    // Simulated rank (would need backend support for real ranking)
    const rank =
      completedCount > 0 ? Math.max(1, 50 - completedCount * 2) : "--";
    document.getElementById("user-rank").textContent =
      rank !== "--" ? `#${rank}` : "#--";
    document.getElementById("rank-change").innerHTML =
      rank !== "--"
        ? `
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
        <polyline points="17 6 23 6 23 12"/>
      </svg>
      <span>Tăng ${Math.floor(Math.random() * 5) + 1} bậc</span>
    `
        : `<span style="color:#A0AEC0;">Chưa xếp hạng</span>`;

    // Update streak (simulated)
    document.getElementById("streak-days").textContent =
      Math.floor(Math.random() * 15) + 1;
  }

  /**
   * Handle stats error
   */
  function handleStatsError(error) {
    console.error("❌ Stats error:", error);
  }

  /**
   * Update learning progress with topics
   */
  function updateLearningProgress(topics) {
    const progressList = document.getElementById("progress-list");
    if (!progressList) return;

    if (topics.length === 0) {
      progressList.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="1.5">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
          </svg>
          <p>Chưa có chủ đề nào</p>
        </div>
      `;
      return;
    }

    // Show first 3 topics with simulated progress
    const displayTopics = topics.slice(0, 3);
    progressList.innerHTML = displayTopics
      .map((topic, index) => {
        const progress = Math.floor(Math.random() * 80) + 10; // 10-90%
        return `
        <div class="progress-item">
          <div class="progress-header">
            <span class="progress-label">${topic.title}</span>
            <span class="progress-percent">${progress}%</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progress}%"></div>
          </div>
        </div>
      `;
      })
      .join("");
  }

  /**
   * Load learning progress
   */
  function loadLearningProgress() {
    // This is handled by handleTopicsStats
  }

  /**
   * Load recent activity
   */
  function loadRecentActivity() {
    console.log("📋 Loading recent activity...");

    google.script.run
      .withSuccessHandler(handleActivityLoaded)
      .withFailureHandler(handleActivityError)
      .getUserQuizResults();
  }

  /**
   * Handle activity loaded
   */
  function handleActivityLoaded(response) {
    const activityList = document.getElementById("activity-list");
    if (!activityList) return;

    let results = [];
    if (response && response.success && Array.isArray(response.results)) {
      results = response.results;
    } else if (Array.isArray(response)) {
      results = response;
    }

    if (results.length === 0) {
      activityList.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
          <p>Chưa có hoạt động nào</p>
        </div>
      `;
      return;
    }

    // Show recent 3 activities
    const recentResults = results.slice(0, 3);
    activityList.innerHTML = recentResults
      .map((result) => {
        const xp = Math.round((result.percentage || 0) / 2);
        const timeAgo = getTimeAgo(result.completedAt);

        return `
        <div class="activity-item">
          <span class="activity-icon quiz">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 11l3 3L22 4"/>
              <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
            </svg>
          </span>
          <div class="activity-content">
            <div class="activity-title">Quiz: ${
              result.topicTitle || "Không rõ"
            }</div>
            <div class="activity-time">${timeAgo}</div>
          </div>
          <div class="activity-points">+${xp} XP</div>
        </div>
      `;
      })
      .join("");
  }

  /**
   * Handle activity error
   */
  function handleActivityError(error) {
    console.error("❌ Activity error:", error);
    const activityList = document.getElementById("activity-list");
    if (activityList) {
      activityList.innerHTML = `
        <div class="empty-state">
          <p>Không thể tải hoạt động</p>
        </div>
      `;
    }
  }

  /**
   * Get time ago string
   */
  function getTimeAgo(dateString) {
    if (!dateString) return "Vừa xong";

    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return "Vừa xong";
    if (diffMins < 60) return `${diffMins} phút trước`;
    if (diffHours < 24) return `${diffHours} giờ trước`;
    if (diffDays < 7) return `${diffDays} ngày trước`;
    return date.toLocaleDateString("vi-VN");
  }

  // Initialize when script loads
  initDashboard();

  // Listen for user updates
  window.addEventListener("user-info-updated", function (e) {
    if (e.detail) {
      updateDashboardUserInfo(e.detail);
    }
  });

  window.addEventListener("avatar-updated", function (e) {
    if (e.detail?.url && typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(e.detail.url);
    }
  });

  console.log("✅ Dashboard scripts loaded");
</script>
