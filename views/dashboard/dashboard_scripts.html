<script>
  // ===== DASHBOARD - KNOWLEDGE STUDIO =====

  // Cache for dashboard data
  const DashboardCache = {
    quizResults: null,
    topics: null,
    lastFetch: null,
    cacheTimeout: 60000, // 1 minute cache
  };

  // ===== RECENT ACTIVITY SYSTEM =====
  const RECENT_ACTIVITIES_KEY = "recentActivities";
  const MAX_RECENT_ACTIVITIES = 4;

  /**
   * Save activity to localStorage
   * Called when user visits/plays a topic
   */
  window.saveRecentActivity = function (activity) {
    try {
      let activities = JSON.parse(
        localStorage.getItem(RECENT_ACTIVITIES_KEY) || "[]",
      );

      // Remove existing activity with same topicId to avoid duplicates
      activities = activities.filter((a) => a.topicId !== activity.topicId);

      // Add new activity at the beginning
      activities.unshift({
        topicId: activity.topicId,
        topicTitle: activity.topicTitle || "Chủ đề",
        activityType: activity.activityType || "view", // view, quiz, matching
        lastAccess: new Date().toISOString(),
        score: activity.score || null,
        totalQuestions: activity.totalQuestions || null,
        percentage: activity.percentage || null,
      });

      // Keep only latest 4 activities
      activities = activities.slice(0, MAX_RECENT_ACTIVITIES);

      localStorage.setItem(RECENT_ACTIVITIES_KEY, JSON.stringify(activities));
      console.log("📝 Activity saved:", activity.topicTitle);
    } catch (e) {
      console.error("Error saving activity:", e);
    }
  };

  /**
   * Get recent activities from localStorage
   */
  function getRecentActivities() {
    try {
      return JSON.parse(localStorage.getItem(RECENT_ACTIVITIES_KEY) || "[]");
    } catch (e) {
      console.error("Error getting activities:", e);
      return [];
    }
  }

  /**
   * Update activity with quiz result
   */
  window.updateActivityResult = function (topicId, score, totalQuestions) {
    try {
      let activities = getRecentActivities();
      const index = activities.findIndex((a) => a.topicId === topicId);

      if (index !== -1) {
        activities[index].score = score;
        activities[index].totalQuestions = totalQuestions;
        activities[index].percentage = Math.round(
          (score / totalQuestions) * 100,
        );
        activities[index].lastAccess = new Date().toISOString();
        activities[index].activityType = "quiz";

        // Move to top
        const activity = activities.splice(index, 1)[0];
        activities.unshift(activity);

        localStorage.setItem(RECENT_ACTIVITIES_KEY, JSON.stringify(activities));
        console.log("📊 Activity updated with result:", topicId);
      }
    } catch (e) {
      console.error("Error updating activity:", e);
    }
  };

  /**
   * Get user data from storage
   */
  function getUserData() {
    const currentUserData =
      localStorage.getItem("currentUser") ||
      sessionStorage.getItem("currentUser");
    if (currentUserData) {
      try {
        return JSON.parse(currentUserData);
      } catch (e) {
        console.error("Error parsing currentUser:", e);
      }
    }
    return null;
  }

  /**
   * Get streak data from localStorage
   */
  function getStreakData() {
    const streakData = localStorage.getItem("streakData");
    if (streakData) {
      try {
        return JSON.parse(streakData);
      } catch (e) {
        console.error("Error parsing streakData:", e);
      }
    }
    return {
      currentStreak: 0,
      longestStreak: 0,
      lastActiveDate: null,
      dailyActiveMinutes: 0,
      sessionStartTime: null,
    };
  }

  /**
   * Save streak data to localStorage
   */
  function saveStreakData(data) {
    localStorage.setItem("streakData", JSON.stringify(data));
  }

  /**
   * Initialize Dashboard
   */
  function initDashboard() {
    console.log("📊 Initializing Dashboard (Knowledge Studio)...");

    const user = getUserData();
    if (user) {
      updateDashboardUserInfo(user);
    }

    updateGreeting();
    initStreakTracking();

    // Start meteor shower immediately
    initHeaderMeteorShower();

    // Setup mouse-responsive stars effect
    setupDashboardHeaderMouseEffect();

    // Load all dashboard data in parallel with single API calls
    loadAllDashboardData();
  }

  /**
   * Mouse-responsive stars effect for dashboard header
   */
  function setupDashboardHeaderMouseEffect() {
    const header = document.querySelector(".dashboard-header");
    const stars = document.getElementById("dashboardHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  /**
   * Create meteor shower effect in dashboard header - continuous rain
   */
  let dashboardMeteorInterval = null;

  function initHeaderMeteorShower() {
    const container = document.getElementById("header-meteor-container");
    if (!container) return;

    // Clear existing interval
    if (dashboardMeteorInterval) {
      clearInterval(dashboardMeteorInterval);
    }

    function createMeteor() {
      const meteor = document.createElement("div");
      meteor.className = "header-meteor";

      // Start from top-left area
      meteor.style.left = Math.random() * 40 + "%"; // Left 0-40%
      meteor.style.top = Math.random() * 20 + "%"; // Top 0-20%

      // Random size
      const height = 35 + Math.random() * 35;
      meteor.style.height = height + "px";

      // Random duration
      meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

      container.appendChild(meteor);

      // Remove after animation
      setTimeout(() => meteor.remove(), 1200);
    }

    // Create meteor every 800ms for continuous rain
    dashboardMeteorInterval = setInterval(() => {
      if (!document.getElementById("header-meteor-container")) {
        clearInterval(dashboardMeteorInterval);
        return;
      }
      createMeteor();
    }, 800);

    // Create initial meteor
    createMeteor();
  }

  /**
   * Load all dashboard data efficiently
   */
  function loadAllDashboardData() {
    console.log("📋 Loading all dashboard data...");

    // Check cache first
    const now = Date.now();
    if (
      DashboardCache.lastFetch &&
      now - DashboardCache.lastFetch < DashboardCache.cacheTimeout
    ) {
      console.log("📦 Using cached dashboard data");
      if (DashboardCache.quizResults) {
        handleRecentTopicsLoaded(DashboardCache.quizResults);
        handleKPIsLoaded(DashboardCache.quizResults);
      }
      if (DashboardCache.topics) {
        handleProgressLoaded(DashboardCache.topics);
      }
      return;
    }

    // Set timeout fallback for slow API
    const loadingTimeout = setTimeout(() => {
      console.warn("⏱️ API taking too long, showing cached/empty state");
      showFastLoadingFallback();
    }, 5000); // 5 second timeout

    // Load quiz results (for recent topics + KPIs)
    google.script.run
      .withSuccessHandler((response) => {
        clearTimeout(loadingTimeout);
        DashboardCache.quizResults = response;
        DashboardCache.lastFetch = Date.now();
        handleRecentTopicsLoaded(response);
        handleKPIsLoaded(response);
      })
      .withFailureHandler((error) => {
        clearTimeout(loadingTimeout);
        handleRecentTopicsError(error);
        handleKPIsError(error);
      })
      .getUserQuizResults();

    // Load topics (for progress)
    google.script.run
      .withSuccessHandler((response) => {
        DashboardCache.topics = response;
        handleProgressLoaded(response);
      })
      .withFailureHandler(handleProgressError)
      .getAllTopics();
  }

  /**
   * Show fallback state when API is slow
   */
  function showFastLoadingFallback() {
    // Show empty states with friendly message
    const gridEl = document.getElementById("recent-topics-grid");
    if (gridEl && gridEl.querySelector(".loading-state")) {
      gridEl.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-state-icon">⏳</div>
          <div class="empty-state-title">Đang kết nối với server...</div>
          <div class="empty-state-text">Vui lòng đợi hoặc làm mới trang</div>
        </div>
      `;
    }

    const progressList = document.getElementById("progress-list");
    if (progressList && progressList.querySelector(".loading-state")) {
      progressList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">⏳</div>
          <div class="empty-state-text">Đang tải...</div>
        </div>
      `;
    }
  }

  /**
   * Update greeting based on time of day
   */
  function updateGreeting() {
    const hour = new Date().getHours();
    let greeting = "Chào mừng trở lại";

    if (hour >= 5 && hour < 12) {
      greeting = "Chào buổi sáng";
    } else if (hour >= 12 && hour < 18) {
      greeting = "Chào buổi chiều";
    } else if (hour >= 18 && hour < 22) {
      greeting = "Chào buổi tối";
    } else {
      greeting = "Chúc ngủ ngon";
    }

    const greetingEl = document.getElementById("greeting-text");
    const userNameEl = document.getElementById("userNameWelcome");

    if (greetingEl && userNameEl) {
      const userName = userNameEl.textContent || "User";
      greetingEl.innerHTML = `${greeting}, <span id="userNameWelcome">${userName}</span>`;
    }
  }

  /**
   * Update dashboard user info
   */
  function updateDashboardUserInfo(user) {
    const displayName =
      user.displayName || user.fullName || user.username || "User";

    const userNameEl = document.getElementById("userNameWelcome");
    if (userNameEl) {
      userNameEl.textContent = displayName;
    }

    if (typeof window.updateAllUserNames === "function") {
      window.updateAllUserNames(displayName);
    }
    if (typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(user.avatarUrl);
    }
  }

  /**
   * Initialize streak tracking system - Daily check-in based
   */
  function initStreakTracking() {
    console.log("📋 Initializing daily check-in system...");

    // Check if already checked in today (from localStorage for instant UI)
    const todayStr = new Date().toISOString().split("T")[0];
    const lastCheckin = localStorage.getItem("lastCheckinDate");
    if (lastCheckin === todayStr) {
      setCheckinDone();
    }

    // Load streak data from server
    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          console.log("✅ Loaded streak data from server:", result);

          const streakData = {
            currentStreak: result.currentStreak || 0,
            longestStreak: result.longestStreak || 0,
            lastActiveDate: result.lastActiveDate || null,
            checkedInToday: result.checkedInToday || false,
          };

          // Save to localStorage for quick access
          saveStreakData(streakData);
          updateStreakUI(streakData);

          // Update check-in state from server
          if (streakData.checkedInToday) {
            localStorage.setItem("lastCheckinDate", todayStr);
            setCheckinDone();
          }
        } else {
          // Fallback to localStorage
          updateStreakUI(getStreakData());
        }
      })
      .withFailureHandler(function (error) {
        console.error("Failed to load streak data:", error);
        updateStreakUI(getStreakData());
      })
      .getUserStreakData();
  }

  /**
   * Handle daily check-in button click
   */
  window.handleDailyCheckin = function () {
    const btn = document.getElementById("checkin-btn");
    if (btn && btn.disabled) return;

    // Disable button immediately
    if (btn) btn.disabled = true;

    const todayStr = new Date().toISOString().split("T")[0];
    const lastCheckin = localStorage.getItem("lastCheckinDate");
    if (lastCheckin === todayStr) {
      if (typeof showToast === "function") {
        showToast("Hôm nay bạn đã điểm danh rồi!", "info");
      }
      return;
    }

    console.log("📋 Processing daily check-in...");

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          console.log("✅ Check-in successful:", result);
          localStorage.setItem("lastCheckinDate", todayStr);
          setCheckinDone();

          // Update streak display
          const streakData = {
            currentStreak: result.currentStreak || 0,
            longestStreak: result.longestStreak || 0,
            lastActiveDate: todayStr,
            checkedInToday: true,
          };
          saveStreakData(streakData);
          updateStreakUI(streakData);

          if (typeof showToast === "function") {
            showToast(
              "Điểm danh thành công! 🔥 Chuỗi: " +
                streakData.currentStreak +
                " ngày",
              "success",
            );
          }
        } else {
          if (result && result.alreadyCheckedIn) {
            localStorage.setItem("lastCheckinDate", todayStr);
            setCheckinDone();
            if (typeof showToast === "function") {
              showToast("Hôm nay bạn đã điểm danh rồi!", "info");
            }
          } else {
            if (btn) btn.disabled = false;
            if (typeof showToast === "function") {
              showToast(
                "Không thể điểm danh: " + (result?.message || "Lỗi"),
                "error",
              );
            }
          }
        }
      })
      .withFailureHandler(function (error) {
        console.error("Check-in failed:", error);
        if (btn) btn.disabled = false;
        if (typeof showToast === "function") {
          showToast("Lỗi khi điểm danh", "error");
        }
      })
      .dailyCheckin();
  };

  /**
   * Set check-in button to "done" state
   */
  function setCheckinDone() {
    const btn = document.getElementById("checkin-btn");
    const iconEl = document.getElementById("checkin-icon");
    const textEl = document.getElementById("checkin-text");
    const statusEl = document.getElementById("checkin-status");

    if (btn) btn.disabled = true;
    if (iconEl) iconEl.textContent = "✅";
    if (textEl) textEl.textContent = "Đã điểm danh";
    if (statusEl) {
      statusEl.textContent = "Đã điểm danh hôm nay";
      statusEl.classList.add("achieved");
    }
  }

  /**
   * Update streak UI elements - Check-in based
   */
  function updateStreakUI(streakData) {
    const streakDaysEl = document.getElementById("streak-days");
    const subtitleEl = document.getElementById("header-subtitle");

    if (streakDaysEl) {
      streakDaysEl.textContent = `${streakData.currentStreak || 0} ngày`;
    }

    // Update subtitle
    if (subtitleEl) {
      if (streakData.checkedInToday) {
        subtitleEl.innerHTML = `Bạn đã điểm danh hôm nay · Chuỗi hiện tại: <strong>${streakData.currentStreak || 0}</strong> ngày`;
      } else {
        subtitleEl.textContent = "Điểm danh mỗi ngày để tăng chuỗi ngày học!";
      }
    }

    // Update KPI longest streak
    const kpiLongestStreak = document.getElementById("kpi-longest-streak");
    if (kpiLongestStreak) {
      kpiLongestStreak.textContent = `${streakData.longestStreak || 0} ngày`;
    }
  }

  /**
   * Load recent topics (activity cards) - now called internally
   */
  function loadRecentTopics() {
    // This is now handled by loadAllDashboardData
    console.log(
      "📋 loadRecentTopics called - delegating to loadAllDashboardData",
    );
    loadAllDashboardData();
  }

  /**
   * Handle recent topics loaded - prioritize local activities
   */
  function handleRecentTopicsLoaded(response) {
    const gridEl = document.getElementById("recent-topics-grid");
    if (!gridEl) return;

    // Get local activities first (priority)
    const localActivities = getRecentActivities();

    // Also get server results
    let serverResults = [];
    if (response && response.success && Array.isArray(response.results)) {
      serverResults = response.results;
    } else if (Array.isArray(response)) {
      serverResults = response;
    }

    // Merge: local activities first, then server results (avoid duplicates)
    const mergedActivities = [...localActivities];
    const localTopicIds = new Set(localActivities.map((a) => a.topicId));

    serverResults.forEach((result) => {
      const topicId = result.topicId || result.topicTitle;
      if (!localTopicIds.has(topicId)) {
        mergedActivities.push({
          topicId: topicId,
          topicTitle: result.topicTitle || "Chủ đề",
          activityType: result.quizType || "quiz",
          lastAccess: result.completedAt || new Date().toISOString(),
          score: result.score,
          totalQuestions: result.totalQuestions,
          percentage: result.percentage,
        });
      }
    });

    // Sort by lastAccess and take only 4
    const recentActivities = mergedActivities
      .sort((a, b) => new Date(b.lastAccess) - new Date(a.lastAccess))
      .slice(0, 4);

    if (recentActivities.length === 0) {
      gridEl.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-state-icon">📚</div>
          <div class="empty-state-title">Bạn chưa có hoạt động nào gần đây</div>
          <div class="empty-state-text">Bắt đầu một bài luyện để hệ thống ghi nhận tiến độ.</div>
        </div>
      `;
      return;
    }

    const today = new Date().toISOString().split("T")[0];

    gridEl.innerHTML = recentActivities
      .map((activity) => {
        const isToday =
          activity.lastAccess && activity.lastAccess.startsWith(today);
        const timeAgo = getTimeAgo(activity.lastAccess);
        const score = activity.score || 0;
        const total = activity.totalQuestions || 10;
        const percentage =
          activity.percentage ||
          (score > 0 ? Math.round((score / total) * 100) : 0);
        const progress = Math.min(100, percentage);

        // Determine activity type tag
        let tagClass = "";
        let tagText = "Xem chủ đề";
        let tagIcon = "👁️";
        if (
          activity.activityType === "quiz" ||
          activity.activityType === "mcq"
        ) {
          tagClass = "quiz";
          tagText = "Quiz Visual";
          tagIcon = "✅";
        } else if (activity.activityType === "matching") {
          tagClass = "matching";
          tagText = "Matching";
          tagIcon = "🔗";
        } else if (activity.activityType === "view") {
          tagClass = "view";
          tagText = "Xem chủ đề";
          tagIcon = "📖";
        }

        const hasResult =
          activity.score !== null && activity.score !== undefined;

        return `
        <div class="topic-card ${isToday ? "today" : ""}">
          <div class="topic-card-header">
            <div>
              <div class="topic-title">${activity.topicTitle}</div>
              <div class="topic-tags">
                <span class="topic-tag ${tagClass}">${tagIcon} ${tagText}</span>
              </div>
            </div>
            ${isToday ? '<span class="today-chip">Hôm nay</span>' : ""}
          </div>
          ${
            hasResult
              ? `
          <div class="topic-progress">
            <div class="topic-progress-bar">
              <div class="topic-progress-fill" style="width: ${progress}%"></div>
            </div>
          </div>
          <div class="topic-meta">
            <span>Lần chơi: ${timeAgo}</span>
            <span class="topic-result">${score}/${total} · ${percentage}%</span>
          </div>
          `
              : `
          <div class="topic-meta">
            <span>Lần truy cập: ${timeAgo}</span>
          </div>
          `
          }
          <div class="topic-actions">
            <button class="topic-btn topic-btn-primary" onclick="continueQuiz('${
              activity.topicId
            }')">
              ${hasResult ? "Tiếp tục" : "Bắt đầu"}
            </button>
            ${
              hasResult
                ? '<button class="topic-btn topic-btn-secondary">Xem báo cáo</button>'
                : ""
            }
          </div>
        </div>
      `;
      })
      .join("");
  }

  /**
   * Handle recent topics error
   */
  function handleRecentTopicsError(error) {
    console.error("❌ Recent topics error:", error);
    const gridEl = document.getElementById("recent-topics-grid");
    if (gridEl) {
      gridEl.innerHTML = `
        <div class="empty-state" style="grid-column: 1 / -1;">
          <div class="empty-state-icon">⚠️</div>
          <div class="empty-state-text">Không thể tải hoạt động gần đây</div>
        </div>
      `;
    }
  }

  /**
   * Continue quiz for a topic
   */
  function continueQuiz(topicId) {
    if (topicId && typeof showPage === "function") {
      // Store topic ID and navigate to quiz
      localStorage.setItem("selectedTopicId", topicId);
      showPage("page-mcq");
    }
  }

  /**
   * Load progress by topic - now called internally
   */
  function loadProgressByTopic() {
    // This is now handled by loadAllDashboardData
    console.log(
      "📈 loadProgressByTopic called - delegating to loadAllDashboardData",
    );
    loadAllDashboardData();
  }

  /**
   * Handle progress loaded
   */
  function handleProgressLoaded(response) {
    const progressList = document.getElementById("progress-list");
    if (!progressList) return;

    let topics = [];
    if (response && response.success && Array.isArray(response.topics)) {
      topics = response.topics;
    } else if (Array.isArray(response)) {
      topics = response;
    }

    if (topics.length === 0) {
      progressList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📊</div>
          <div class="empty-state-text">Chưa có dữ liệu tiến độ</div>
        </div>
      `;
      return;
    }

    // Show first 5 topics with simulated progress
    const displayTopics = topics.slice(0, 5);
    progressList.innerHTML = displayTopics
      .map((topic) => {
        const progress = Math.floor(Math.random() * 80) + 10; // 10-90%
        let statusClass = "needs-work";
        let statusText = "Cần luyện thêm";

        if (progress >= 75) {
          statusClass = "strong";
          statusText = "Mạnh";
        } else if (progress >= 50) {
          statusClass = "improving";
          statusText = "Đang cải thiện";
        }

        return `
        <div class="progress-item">
          <div class="progress-header">
            <span class="progress-label">${topic.title}</span>
            <span class="progress-status ${statusClass}">${statusText}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progress}%"></div>
          </div>
        </div>
      `;
      })
      .join("");
  }

  /**
   * Handle progress error
   */
  function handleProgressError(error) {
    console.error("❌ Progress error:", error);
    const progressList = document.getElementById("progress-list");
    if (progressList) {
      progressList.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-text">Không thể tải tiến độ</div>
        </div>
      `;
    }
  }

  /**
   * Load KPIs - now called internally
   */
  function loadKPIs() {
    // This is now handled by loadAllDashboardData
    console.log("📊 loadKPIs called - delegating to loadAllDashboardData");
    loadAllDashboardData();
  }

  /**
   * Handle KPIs loaded
   */
  function handleKPIsLoaded(response) {
    let results = [];
    if (response && response.success && Array.isArray(response.results)) {
      results = response.results;
    } else if (Array.isArray(response)) {
      results = response;
    }

    // Calculate KPIs
    const uniqueTopics = new Set(results.map((r) => r.topicId || r.topicTitle))
      .size;
    const avgAccuracy =
      results.length > 0
        ? Math.round(
            results.reduce((sum, r) => sum + (r.percentage || 0), 0) /
              results.length,
          )
        : 0;
    const rank =
      results.length > 0 ? Math.max(1, 50 - results.length * 2) : "--";

    // Update UI
    const kpiTopics = document.getElementById("kpi-topics");
    const kpiAccuracy = document.getElementById("kpi-accuracy");
    const kpiRank = document.getElementById("kpi-rank");

    if (kpiTopics) kpiTopics.textContent = uniqueTopics;
    if (kpiAccuracy)
      kpiAccuracy.textContent = avgAccuracy > 0 ? `${avgAccuracy}%` : "--";
    if (kpiRank) kpiRank.textContent = rank !== "--" ? `#${rank}` : "#--";
  }

  /**
   * Handle KPIs error
   */
  function handleKPIsError(error) {
    console.error("❌ KPIs error:", error);
  }

  /**
   * Get time ago string
   */
  function getTimeAgo(dateString) {
    if (!dateString) return "Vừa xong";

    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return "Vừa xong";
    if (diffMins < 60) return `${diffMins} phút trước`;
    if (diffHours < 24) return `${diffHours} giờ trước`;
    if (diffDays < 7) return `${diffDays} ngày trước`;
    return date.toLocaleDateString("vi-VN");
  }

  // Initialize when script loads
  initDashboard();

  // Listen for user updates
  window.addEventListener("user-info-updated", function (e) {
    if (e.detail) {
      updateDashboardUserInfo(e.detail);
    }
  });

  window.addEventListener("avatar-updated", function (e) {
    if (e.detail?.url && typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(e.detail.url);
    }
  });

  // Track visibility changes for accurate time tracking
  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) {
      // User came back to tab, update session
      const streakData = getStreakData();
      streakData.sessionStartTime = Date.now();
      saveStreakData(streakData);
    }
  });

  console.log("✅ Dashboard scripts loaded (Knowledge Studio)");
</script>
