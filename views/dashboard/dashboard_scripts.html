<script>
  // ===== DASHBOARD - GAMIFICATION 4-ZONE =====

  // 1. Define global exposure early to avoid 'undefined' errors during navigation
  window.DashboardCache = window.DashboardCache || {
    data: null,
    lastFetch: null,
    cacheTimeout: 60000,
  };

  /**
   * Force refresh dashboard when user returns to dashboard page
   * Called from showPage() in client_js.html
   */
  window.refreshDashboardOnReturn = function () {
    // If dashboard was never initialized, do full init
    if (typeof dashboardInitialized === "undefined" || !dashboardInitialized) {
      console.log("🔄 First-time Dashboard init on navigation...");
      initDashboard();
      return;
    }

    console.log(
      "🔄 Returning to Dashboard — force refreshing all data (leaderboard + history)..."
    );
    requestDashboardRefresh({
      forceRefresh: true,
      backgroundRefresh: true,
      source: "route-return",
      minGapMs: 3000,
    });
    startDashboardAutoRefresh();
  };

  /**
   * Get user data from storage
   */
  function getUserData() {
    var currentUserData =
      localStorage.getItem("currentUser") ||
      sessionStorage.getItem("currentUser");
    if (currentUserData) {
      try {
        return JSON.parse(currentUserData);
      } catch (e) {
        console.error("Error parsing currentUser:", e);
      }
    }
    return null;
  }

  function normalizeDashboardUser(user) {
    if (!user || typeof user !== "object") return null;
    var payload =
      user && typeof user.user === "object" && user.user
        ? user.user
        : user;
    return payload && typeof payload === "object" ? payload : null;
  }

  /**
   * Build auth context payload for backend calls.
   * Backend still verifies this payload against Users sheet.
   */
  function getDashboardAuthContext() {
    var user = normalizeDashboardUser(window.currentUser || getUserData());
    if (!user) return null;
    return {
      userId: user.userId || user.id || user.uid || "",
      email: user.email || user.userEmail || user.mail || "",
      username:
        user.username || user.displayName || user.fullName || user.name || "",
      role: user.role || "",
    };
  }

  function hasReadyDashboardAuthContext() {
    var auth = getDashboardAuthContext();
    // Some sessions only have email populated in storage.
    return !!(auth && (auth.userId || auth.email));
  }

  function getDashboardRequestContext(forceRefresh) {
    var auth = getDashboardAuthContext() || {};
    return Object.assign({}, auth, {
      // Let backend bypass short-lived cache on explicit force refresh.
      noCache: !!forceRefresh,
    });
  }

  /**
   * Get/Save streak data from localStorage
   */
  function getStreakData() {
    var streakData = localStorage.getItem("streakData");
    if (streakData) {
      try {
        return JSON.parse(streakData);
      } catch (e) {}
    }
    return {
      currentStreak: 0,
      longestStreak: 0,
      lastActiveDate: null,
      checkedInToday: false,
    };
  }

  function saveStreakData(data) {
    localStorage.setItem("streakData", JSON.stringify(data));
  }

  /**
   * Initialize Dashboard
   */
  var dashboardAutoRefreshInterval = null;
  var dashboardInitialized = false;
  var dashboardInitRetryCount = 0;
  var dashboardHasLoadedOnce = false;
  var dashboardLastBackgroundRefreshAt = 0;
  var dashboardPendingRefreshAfterLoad = null;

  var DASHBOARD_REFRESH_MIN_GAP_MS = 4000;

  function getDashboardDebugSnapshot(source) {
    var auth = getDashboardAuthContext();
    var storageUser = getUserData();
    var isLoggedInRaw = localStorage.getItem("isLoggedIn");
    return {
      source,
      visible: isDashboardVisible(),
      isLoggedInRaw: isLoggedInRaw,
      hasWindowCurrentUser: !!window.currentUser,
      hasStorageUser: !!storageUser,
      userId: auth && auth.userId ? auth.userId : "",
      email: auth && auth.email ? auth.email : "",
      dashboardInitialized,
    };
  }

  function requestDashboardRefresh(options = {}) {
    var opts =
      options && typeof options === "object"
        ? options
        : { forceRefresh: !!options };

    var forceRefresh = !!opts.forceRefresh;
    var backgroundRefresh = !!opts.backgroundRefresh;
    var source = opts.source || "unknown";
    var minGapMs =
      typeof opts.minGapMs === "number"
        ? Math.max(0, opts.minGapMs)
        : DASHBOARD_REFRESH_MIN_GAP_MS;

    if (!isDashboardVisible()) {
      console.log(
        "⏭️ requestDashboardRefresh skipped - dashboard not visible",
        getDashboardDebugSnapshot(source)
      );
      return;
    }

    console.log("🔄 requestDashboardRefresh()", getDashboardDebugSnapshot(source));

    var now = Date.now();
    if (
      backgroundRefresh &&
      now - dashboardLastBackgroundRefreshAt < minGapMs
    ) {
      console.log("⏭️ Dashboard refresh throttled:", source);
      return;
    }

    if (backgroundRefresh) {
      dashboardLastBackgroundRefreshAt = now;
    }

    loadAllDashboardData(Object.assign({}, opts, {
      forceRefresh,
      backgroundRefresh,
      source,
    }));
  }

  function initDashboard() {
    var auth = getDashboardAuthContext();
    var hasAuthContext = !!(auth && (auth.userId || auth.email));

    console.log("📊 initDashboard() called", getDashboardDebugSnapshot("init"));

    if (!isDashboardVisible()) {
      console.log("📊 Dashboard init skipped - page not visible yet");
      return;
    }

    if (!hasAuthContext) {
      if (dashboardInitRetryCount < 8) {
        dashboardInitRetryCount++;
        console.log(
          "⏳ Dashboard waiting for user context before loading data...",
          getDashboardDebugSnapshot("init-retry")
        );
        setTimeout(initDashboard, 150);
        return; // Stop execution until auth context is ready
      } else {
        console.warn(
          "⚠️ Dashboard init continues with server-session auth fallback"
        );
      }
    }

    dashboardInitRetryCount = 0;

    console.log("📊 Initializing Dashboard (Gamification)...");
    dashboardInitialized = true;

    var user = getUserData();
    if (user) updateDashboardUserInfo(user);

    updateGreeting();
    initStreakTracking();
    initHeaderMeteorShower();
    setupDashboardHeaderMouseEffect();

    // Single API call for all dashboard data
    loadAllDashboardData({
      forceRefresh: false,
      backgroundRefresh: false,
      source: "initial-load",
    });

    // Auto-refresh Lịch sử Thực chiến mỗi 30 giây
    startDashboardAutoRefresh();
  }

  /**
   * Auto-refresh dashboard data (activity history + leaderboard)
   */
  function startDashboardAutoRefresh() {
    if (dashboardAutoRefreshInterval)
      clearInterval(dashboardAutoRefreshInterval);

    dashboardAutoRefreshInterval = setInterval(() => {
      // Chỉ refresh nếu đang ở trang dashboard
      if (isDashboardVisible()) {
        console.log(
          "🔄 Auto-refreshing dashboard data (history + leaderboard)..."
        );
        requestDashboardRefresh({
          forceRefresh: true,
          backgroundRefresh: true,
          source: "auto-refresh",
          minGapMs: 10000,
        });
      }
    }, 30000); // 30 giây
  }

  function stopDashboardAutoRefresh() {
    if (dashboardAutoRefreshInterval) {
      clearInterval(dashboardAutoRefreshInterval);
      dashboardAutoRefreshInterval = null;
    }
  }

  /**
   * Check if dashboard is currently visible
   */
  function isDashboardVisible() {
    var el = document.querySelector(".dashboard-main-content");
    return el && el.offsetParent !== null;
  }

  // (refreshDashboardOnReturn moved to top)

  /**
   * Mouse-responsive stars effect
   */
  function setupDashboardHeaderMouseEffect() {
    var header = document.querySelector(".dashboard-header");
    var stars = document.getElementById("dashboardHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      var rect = header.getBoundingClientRect();
      var x = (e.clientX - rect.left) / rect.width - 0.5;
      var y = (e.clientY - rect.top) / rect.height - 0.5;
      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  /**
   * Meteor shower effect
   */
  var dashboardMeteorInterval = null;

  function initHeaderMeteorShower() {
    var container = document.getElementById("header-meteor-container");
    if (!container) return;

    if (dashboardMeteorInterval) clearInterval(dashboardMeteorInterval);

    function createMeteor() {
      var meteor = document.createElement("div");
      meteor.className = "header-meteor";
      meteor.style.left = Math.random() * 40 + "%";
      meteor.style.top = Math.random() * 20 + "%";
      meteor.style.height = 35 + Math.random() * 35 + "px";
      meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";
      container.appendChild(meteor);
      setTimeout(() => meteor.remove(), 1200);
    }

    dashboardMeteorInterval = setInterval(() => {
      if (!document.getElementById("header-meteor-container")) {
        clearInterval(dashboardMeteorInterval);
        return;
      }
      createMeteor();
    }, 800);

    createMeteor();
  }

  /**
   * SINGLE API CALL - Load all dashboard data
   * Guarded against concurrent calls from multiple triggers.
   */
  var _dashboardIsLoading = false;

  function requestDashboardDataWithTimeout(requestContext, requestOptions) {
    var opts = requestOptions || {};
    var hardTimeoutMs = Math.max(1000, opts.hardTimeoutMs || 15000);
    var slowWarningMs = Math.max(1000, opts.slowWarningMs || 8000);
    var onSuccess = typeof opts.onSuccess === "function" ? opts.onSuccess : () => {};
    var onFailure = typeof opts.onFailure === "function" ? opts.onFailure : () => {};
    var label = opts.label || "dashboard-request";

    var settled = false;

    var slowTimer = setTimeout(() => {
      if (!settled) {
        console.warn("⏱️ Dashboard request is slow:", label);
      }
    }, slowWarningMs);

    var hardTimer = setTimeout(() => {
      if (settled) return;
      settled = true;
      clearTimeout(slowTimer);
      onFailure("Tải Dashboard quá lâu, vui lòng thử lại");
    }, hardTimeoutMs);

    var settleSuccess = (payload) => {
      if (settled) return;
      settled = true;
      clearTimeout(slowTimer);
      clearTimeout(hardTimer);
      onSuccess(payload);
    };

    var settleFailure = (errorPayload) => {
      if (settled) return;
      settled = true;
      clearTimeout(slowTimer);
      clearTimeout(hardTimer);
      onFailure(errorPayload);
    };

    google.script.run
      .withSuccessHandler(settleSuccess)
      .withFailureHandler((error) => {
        settleFailure((error && error.message) || error || "Lỗi kết nối server");
      })
      .getDashboardData(requestContext);
  }

  function loadAllDashboardData(options) {
    // Prevent overlapping API calls from multiple triggers
    if (_dashboardIsLoading) {
      var pendingOpts =
        options && typeof options === "object"
          ? Object.assign({}, options)
          : { forceRefresh: !!options };
      dashboardPendingRefreshAfterLoad = {
        forceRefresh: !!pendingOpts.forceRefresh,
        backgroundRefresh: !!pendingOpts.backgroundRefresh,
        source: pendingOpts.source || "queued-refresh",
        minGapMs:
          typeof pendingOpts.minGapMs === "number"
            ? pendingOpts.minGapMs
            : DASHBOARD_REFRESH_MIN_GAP_MS,
      };
      console.log(
        "📋 Dashboard load already in progress, queued trailing refresh"
      );
      return;
    }

    console.log("📋 Loading all dashboard data (single API)...");
    _dashboardIsLoading = true;

    var opts =
      options && typeof options === "object"
        ? options
        : { forceRefresh: !!options };
    var forceRefresh = !!opts.forceRefresh;
    var backgroundRefresh = !!opts.backgroundRefresh;
    var initialLoad = !dashboardHasLoadedOnce && !window.DashboardCache.data;
    var requestContext = getDashboardRequestContext(forceRefresh);

    console.log("📡 loadAllDashboardData()", {
      forceRefresh,
      backgroundRefresh,
      initialLoad,
      visible: isDashboardVisible(),
      userId: (requestContext && requestContext.userId) || "",
      email: (requestContext && requestContext.email) || "",
    });

    var finishLoad = () => {
      _dashboardIsLoading = false;
      if (dashboardPendingRefreshAfterLoad) {
        var nextRefresh = dashboardPendingRefreshAfterLoad;
        dashboardPendingRefreshAfterLoad = null;
        setTimeout(() => {
          requestDashboardRefresh(nextRefresh);
        }, 100);
      }
    };

    var now = Date.now();
    if (
      !forceRefresh &&
      window.DashboardCache.data &&
      window.DashboardCache.lastFetch &&
      now - window.DashboardCache.lastFetch < window.DashboardCache.cacheTimeout
    ) {
      console.log("📦 Using cached dashboard data");
      renderAllZones(window.DashboardCache.data);
      dashboardHasLoadedOnce = true;
      finishLoad();
      return;
    }

    if (!requestContext.userId && !requestContext.email) {
      console.warn(
        "⚠️ Dashboard request has no user context, relying on server session auth"
      );
    }

    // Show large loading placeholders only on first load.
    // Background refresh should keep old data on screen.
    if (initialLoad && !backgroundRefresh) {
      showLoadingStates();
    }

    var handleLoadError = (message) => {
      finishLoad();
      var shouldRenderError = initialLoad || !dashboardHasLoadedOnce;
      if (shouldRenderError) {
        showErrorStates(message);
      } else {
        console.warn("Background refresh failed, keeping current UI:", message);
      }
    };

    var applySuccessResponse = (response) => {
      if (response && response.success) {
        window.DashboardCache.data = response;
        window.DashboardCache.lastFetch = Date.now();
        renderAllZones(response);
        dashboardHasLoadedOnce = true;
        finishLoad();
        return true;
      }
      return false;
    };

    var runRetryOnce = (reasonMessage) => {
      console.warn("🔁 Dashboard retrying once:", reasonMessage);

      setTimeout(() => {
        var retryContext = getDashboardRequestContext(true);
        console.log("📡 Dashboard retry context", {
          userId: (retryContext && retryContext.userId) || "",
          email: (retryContext && retryContext.email) || "",
          reason: reasonMessage,
        });

        requestDashboardDataWithTimeout(retryContext, {
          label: "retry",
          hardTimeoutMs: 14000,
          slowWarningMs: 7000,
          onSuccess: (retryResponse) => {
            if (applySuccessResponse(retryResponse)) return;
            handleLoadError(
              (retryResponse && retryResponse.message) || "Không thể tải dữ liệu"
            );
          },
          onFailure: (retryError) => {
            var msg =
              typeof retryError === "string"
                ? retryError
                : (retryError && retryError.message) || "Lỗi kết nối server";
            handleLoadError(msg);
          },
        });
      }, 1200);
    };

    console.log("📡 Dashboard request context", {
      userId: (requestContext && requestContext.userId) || "",
      email: (requestContext && requestContext.email) || "",
      forceRefresh,
      source: opts.source || "unknown",
    });

    requestDashboardDataWithTimeout(requestContext, {
      label: "initial",
      hardTimeoutMs: 18000,
      slowWarningMs: 9000,
      onSuccess: (response) => {
        if (applySuccessResponse(response)) return;

        var serverMessage =
          (response && typeof response.message === "string"
            ? response.message
            : "") || "Không thể tải dữ liệu";
        var authFailed = /not logged in|chưa đăng nhập|unauthorized/i.test(
          serverMessage
        );

        if (authFailed) {
          handleLoadError("Phiên đăng nhập không hợp lệ, vui lòng đăng nhập lại");
          return;
        }

        runRetryOnce(serverMessage);
      },
      onFailure: (errorMessage) => {
        var message =
          typeof errorMessage === "string"
            ? errorMessage
            : (errorMessage && errorMessage.message) || "Lỗi kết nối server";
        runRetryOnce(message);
      },
    });
  }

  /**
   * Render all 4 zones from single data object
   */
  function renderAllZones(data) {
    try { renderQuickStats(data.quickStats); } catch(e) { console.error("Error renderQuickStats:", e); }
    try { renderActivities(data.activities); } catch(e) { console.error("Error renderActivities:", e); }
    try { renderQuests(data.quests); } catch(e) { console.error("Error renderQuests:", e); }
    try { renderSkillProgress(data.skillProgress); } catch(e) { console.error("Error renderSkillProgress:", e); }
    try { renderLeaderboard(data.leaderboard); } catch(e) { console.error("Error renderLeaderboard:", e); }
    try { renderSuggestion(data.suggestion); } catch(e) { console.error("Error renderSuggestion:", e); }

    // Sync authoritative XP/XQP from server into window.currentUser
    // so Pet page and other modules always read the latest values.
    if (data.quickStats && window.currentUser) {
      var changed = false;
      if (typeof data.quickStats.totalXP === 'number') {
        window.currentUser.totalXP = data.quickStats.totalXP;
        changed = true;
      }
      if (typeof data.quickStats.totalXQP === 'number') {
        window.currentUser.totalXQP = data.quickStats.totalXQP;
        changed = true;
      }
      if (changed) {
        try {
          var storageKey = localStorage.getItem("currentUser") ? "localStorage" : "sessionStorage";
          window[storageKey].setItem("currentUser", JSON.stringify(window.currentUser));
        } catch (e) {
          console.warn("Failed to persist XQP sync:", e);
        }

        // Also update Pet XQP counter immediately if visible
        var xqpEl = document.getElementById("petXQPBalance");
        if (xqpEl) xqpEl.textContent = Number(data.quickStats.totalXQP).toLocaleString();
      }
    }
  }

  /**
   * ZONE 2: Quick Stats
   */
  function renderQuickStats(stats) {
    if (!stats) return;
    var xpEl = document.getElementById("qs-xp");
    var accEl = document.getElementById("qs-accuracy");
    var badgesEl = document.getElementById("qs-badges");
    var rankEl = document.getElementById("qs-rank");
    var rankIconEl = document.getElementById("qs-rank-icon");

    if (xpEl) xpEl.textContent = stats.totalXP.toLocaleString();
    if (accEl) accEl.textContent = stats.avgAccuracy + "%";
    if (badgesEl) badgesEl.textContent = stats.badges;
    if (rankEl) rankEl.textContent = stats.rankTitle;
    if (rankIconEl) rankIconEl.textContent = stats.rankIcon;
  }

  /**
   * ZONE 3 LEFT: Activity History
   */
  function renderActivities(activities) {
    var container = document.getElementById("activity-history-list");
    if (!container) return;

    if (!activities || activities.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📜</div>
          <div class="empty-state-title">Chưa có hoạt động</div>
          <div class="empty-state-text">Học để lưu lịch sử.</div>
        </div>`;
      return;
    }

    var today = new Date().toISOString().split("T")[0];
    var typeConfig = {
      Learning: {
        icon: "📖",
        label: "Học",
        color: "#60a5fa",
        bg: "rgba(96,165,250,0.15)",
      },
      MCQ: {
        icon: "🧠",
        label: "Quiz",
        color: "#34d399",
        bg: "rgba(52,211,153,0.15)",
      },
      Matching: {
        icon: "🔗",
        label: "Ghép",
        color: "#a78bfa",
        bg: "rgba(167,139,250,0.15)",
      },
    };

    // Chỉ hiển thị tối đa 4 hoạt động gần nhất
    var recentActivities = activities.slice(0, 4);

    container.innerHTML = recentActivities
      .map((act) => {
        var cfg = typeConfig[act.type] || typeConfig.Learning;
        var timeAgo = getTimeAgo(act.timestamp);
        var isToday = act.timestamp && act.timestamp.startsWith(today);
        var hasScore = act.score !== null && act.score !== undefined;

        // Xác định trang đích khi click
        var targetPage = "page-topics";
        if (act.type === "MCQ") targetPage = "page-mcq";
        else if (act.type === "Matching") targetPage = "page-matching";
        else if (act.type === "Learning") targetPage = "page-lesson";

        // Dot color logic
        var dotClass = "dot-info";
        if (act.type === "Learning") dotClass = "dot-info";
        else if (hasScore) {
          var pct = act.percentage || 0;
          if (pct >= 80) dotClass = "dot-success";
          else if (pct >= 50) dotClass = "dot-warning";
          else dotClass = "dot-danger";
        }

        var scoreHtml = "";
        if (hasScore) {
          var pct = act.percentage || 0;
          var scoreColor = "#f87171";
          if (pct >= 80) scoreColor = "#34d399";
          else if (pct >= 50) scoreColor = "#fbbf24";
          scoreHtml = `
          <div class="activity-hist-score">
            <span class="score-val" style="color:${scoreColor}">${act.score}/${act.totalQuestions}</span>
            <span class="score-pct" style="background:${scoreColor}15;color:${scoreColor}">${pct}%</span>
          </div>`;
        }

        // Escape strings for HTML onclick attribute
        var safeTopicId = String(act.topicId || "").replace(/'/g, "\\&#39;");
        var safeTopicTitle = String(act.topicTitle || "").replace(
          /'/g,
          "\\&#39;"
        );
        var safeContentDocId = String(act.contentDocId || "").replace(
          /'/g,
          "\\&#39;"
        );

        return `
        <div class="activity-hist-item activity-clickable" 
             onclick="navigateToActivity('${targetPage}', '${safeTopicId}', '${safeTopicTitle}', '${act.type}', '${safeContentDocId}')" 
             title="Bấm để thực hiện lại">
          <div class="activity-dot-status ${dotClass}"></div>
          <div class="activity-hist-content">
            <div class="activity-hist-top">
              <span class="activity-hist-badge" style="background:${cfg.bg};color:${cfg.color}">
                ${cfg.icon} ${cfg.label}
              </span>
              <span class="activity-hist-time">${isToday ? "🕐 " : ""}${timeAgo}</span>
            </div>
            <div class="activity-hist-main">
              <div class="activity-hist-title">${act.topicTitle || "Chủ đề"}</div>
              ${scoreHtml}
            </div>
          </div>
          <div class="activity-go-icon">›</div>
        </div>`;
      })
      .join("");
  }

  /**
   * Navigate to activity page when clicking on history item
   */
  function navigateToActivity(
    targetPage,
    topicId,
    topicTitle,
    actType,
    contentDocId
  ) {
    console.log(
      "🔗 Navigating to:",
      targetPage,
      topicId,
      topicTitle,
      actType,
      contentDocId
    );
    if (typeof showPage !== "function") return;

    // Normalize inputs
    topicId = String(topicId || "").trim();
    topicTitle = String(topicTitle || "").trim();
    contentDocId = String(contentDocId || "").trim();
    if (contentDocId === "undefined" || contentDocId === "null")
      contentDocId = "";

    // For Learning activities, need contentDocId to open lesson
    if (actType === "Learning" && topicId) {
      // 1. Use contentDocId from activity data (enriched by server)
      if (contentDocId) {
        console.log("✅ Using contentDocId from activity data:", contentDocId);
        showPage("page-lesson", {
          topicId: topicId,
          topicTitle: topicTitle,
          contentDocId: contentDocId,
        });
        return;
      }

      // 2. Fallback: look up from global topics cache
      var topic = null;
      if (window.globalTopicsCache && window.globalTopicsCache.data) {
        topic = window.globalTopicsCache.data.find(function (t) {
          return String(t.topicId).trim() === topicId;
        });
      }
      if (
        topic &&
        topic.contentDocId &&
        topic.contentDocId.trim() !== "" &&
        topic.contentDocId !== "undefined"
      ) {
        console.log(
          "✅ Using contentDocId from global cache:",
          topic.contentDocId
        );
        showPage("page-lesson", {
          topicId: topic.topicId,
          topicTitle: topic.title || topicTitle,
          contentDocId: topic.contentDocId.trim(),
        });
        return;
      }

      // 3. Last resort: fetch topics from server
      console.log(
        "⏳ No contentDocId available, loading topics from server..."
      );
      if (typeof showToast === "function")
        showToast("Đang tải bài học...", "info");
      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.topics) {
            // Save to global cache
            if (!window.globalTopicsCache) {
              window.globalTopicsCache = {
                data: null,
                progress: null,
                lastLoadTime: 0,
                cacheDuration: 60000,
              };
            }
            window.globalTopicsCache.data = result.topics;
            window.globalTopicsCache.lastLoadTime = Date.now();
            var found = result.topics.find(function (t) {
              return String(t.topicId).trim() === topicId;
            });
            if (
              found &&
              found.contentDocId &&
              found.contentDocId.trim() !== ""
            ) {
              showPage("page-lesson", {
                topicId: found.topicId,
                topicTitle: found.title || topicTitle,
                contentDocId: found.contentDocId.trim(),
              });
            } else {
              showNotification("Không tìm thấy nội dung bài học", "warning");
              showPage("page-topics");
            }
          } else {
            showNotification("Không thể tải danh sách chủ đề", "warning");
            showPage("page-topics");
          }
        })
        .withFailureHandler(function (err) {
          console.error("❌ Failed to load topics:", err);
          showNotification("Lỗi tải chủ đề. Vui lòng thử lại.", "error");
          showPage("page-topics");
        })
        .getAllTopics();
      return;
    }

    // For MCQ/Matching - go to the page directly
    showPage(targetPage, {
      topicId: topicId,
      topicTitle: topicTitle,
      type: actType,
    });
  }

  /**
   * ZONE 3 RIGHT TOP: Daily Quests
   */
  function renderQuests(quests) {
    var container = document.getElementById("quests-list");
    if (!container) return;

    if (!quests || quests.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🎯</div>
          <div class="empty-state-text">Chưa có nhiệm vụ.</div>
        </div>`;
      return;
    }

    container.innerHTML = quests
      .map((q) => {
        var doneClass = q.done ? "quest-done" : "";
        var claimedClass = q.claimed ? "quest-claimed" : "";
        var bonusClass = q.isBonus ? "quest-bonus" : "";
        var pct =
          q.target > 0 ? Math.round((q.progress / q.target) * 100) : 0;

        // Button logic
        var actionHtml = "";
        if (q.claimed) {
          actionHtml = '<div class="quest-xp quest-xp-claimed">✓ +' + (q.xpReward) + ' XP</div>';
        } else if (q.done) {
          var safeQuestId = String(q.questId || "").replace(/"/g, "&quot;");
          actionHtml =
            '<button class="quest-claim-btn" data-quest-id="' +
            safeQuestId +
            '" onclick="claimQuestXP(this.dataset.questId, this)">Nhận +' +
            (q.xpReward) +
            " XP</button>";
        } else {
          actionHtml = '<div class="quest-xp">+' + (q.xpReward) + ' XP</div>';
        }

        var displayTitle = q.title;
        if (displayTitle.includes("Đạt điểm tuyệt đối 1 bài")) {
          displayTitle = "Đạt 100% Quiz/Matching";
        }

        var highlightTitleClass = "";
        if (displayTitle.includes("Hoàn thành tất cả nhiệm vụ")) {
          displayTitle = "Hoàn thành tất cả nhiệm vụ";
          highlightTitleClass = "quest-title-highlight";
        }

        return `
        <div class="quest-item ${doneClass} ${claimedClass} ${bonusClass}" data-quest-id="${q.questId}">
          <div class="quest-check">${q.claimed ? "✓" : q.done ? "●" : ""}</div>
          <div class="quest-body">
            <div class="quest-title ${highlightTitleClass}">${displayTitle}</div>
            <div class="quest-progress-bar">
              <div class="quest-progress-fill" style="width:${pct}%"></div>
            </div>
          </div>
          ${actionHtml}
        </div>`;
      })
      .join("");
  }

  /**
   * Claim XP for a completed quest
   */
  window.claimQuestXP = function (questId, btnEl) {
    if (btnEl) {
      btnEl.disabled = true;
      btnEl.textContent = "Đang nhận...";
    }

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          // Update button to claimed state
          if (btnEl) {
            var questItem = btnEl.closest(".quest-item");
            if (questItem) {
              questItem.classList.add("quest-claimed");
              var checkEl = questItem.querySelector(".quest-check");
              if (checkEl) checkEl.textContent = "✓";
            }
            btnEl.outerHTML = '<div class="quest-xp quest-xp-claimed">✓ +' + (result.xpAwarded) + ' XP</div>';
          }

          // Update XP and XQP display
          var xpEl = document.getElementById("qs-xp");
          if (xpEl) xpEl.textContent = result.newTotalXP.toLocaleString();
          
          // Update XQP balance in state and any visible counters
          if (result.newTotalXQP !== undefined) {
            if (window.currentUser) {
              window.currentUser.totalXP = result.newTotalXP;
              window.currentUser.totalXQP = result.newTotalXQP;
              
              // Persist to storage
              var storageKey = localStorage.getItem("currentUser") ? "localStorage" : "sessionStorage";
              window[storageKey].setItem("currentUser", JSON.stringify(window.currentUser));
            }

            // Update Pet XQP counter if it exists (for SPA synchronization)
            var xqpEl = document.getElementById("petXQPBalance");
            if (xqpEl) xqpEl.textContent = Number(result.newTotalXQP).toLocaleString();
          }

          // Show XP animation
          showXPAnimation(result.xpAwarded);

          if (typeof showToast === "function") {
            showToast("+" + result.xpAwarded + " XP/XQP! 🌟", "success");
          }

          // Check if bonus quest is now claimable (refresh quests + leaderboard)
          // Always refresh to update leaderboard with new XP
          setTimeout(() => {
            requestDashboardRefresh({
              forceRefresh: true,
              backgroundRefresh: true,
              source: "quest-claim",
              minGapMs: 1500,
            });
          }, 1500);
        } else {
          if (result && result.alreadyClaimed) {
            if (btnEl) {
              btnEl.outerHTML = '<div class="quest-xp quest-xp-claimed">✓ Đã nhận</div>';
            }
            if (typeof showToast === "function") {
              showToast("Đã nhận thưởng rồi!", "info");
            }
          } else {
            if (btnEl) {
              btnEl.disabled = false;
              btnEl.textContent = "Nhận XP";
            }
            if (typeof showToast === "function") {
              showToast((result && result.message) || "Không thể nhận XP", "error");
            }
          }
        }
      })
      .withFailureHandler(function (error) {
        console.error("Claim XP error:", error);
        if (btnEl) {
          btnEl.disabled = false;
          btnEl.textContent = "Nhận XP";
        }
        if (typeof showToast === "function") {
          showToast("Lỗi khi nhận XP", "error");
        }
      })
      .completeQuestAndAwardXP(questId, getDashboardAuthContext());
  };

  /**
   * Show floating XP animation
   */
  function showXPAnimation(xpAmount) {
    var xpEl = document.getElementById("qs-xp");
    if (!xpEl) return;

    var rect = xpEl.getBoundingClientRect();
    var floater = document.createElement("div");
    floater.className = "xp-float-animation";
    floater.textContent = "+" + xpAmount + " XP";
    floater.style.left = rect.left + rect.width / 2 + "px";
    floater.style.top = rect.top + "px";
    document.body.appendChild(floater);

    setTimeout(() => floater.remove(), 1500);
  }

  /**
   * ZONE 3 RIGHT BOTTOM: Skill Progress
   */
  function renderSkillProgress(skills) {
    var container = document.getElementById("skill-progress-list");
    if (!container) return;

    if (!skills || skills.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📊</div>
          <div class="empty-state-text">Làm quiz để xem tiến độ kỹ năng</div>
        </div>`;
      return;
    }

    container.innerHTML = skills
      .map((s) => {
        var fillClass = "skill-low";
        if (s.progress >= 75) fillClass = "skill-high";
        else if (s.progress >= 50) fillClass = "skill-mid";

        return `<div class="skill-item">
          <div class="skill-header">
            <span class="skill-name">${s.title}</span>
            <span class="skill-pct">${s.progress}%</span>
          </div>
          <div class="skill-bar">
            <div class="skill-fill ${fillClass}" style="width:${s.progress}%"></div>
          </div>
        </div>`;
      })
      .join("");
  }

  /**
   * ZONE 4 TOP: Leaderboard (Top 10)
   * Previous leaderboard data for detecting XP changes
   */
  var previousLeaderboard = null;

  function renderLeaderboard(leaderboard) {
    var container = document.getElementById("leaderboard-list");
    if (!container) return;

    if (!leaderboard || leaderboard.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🏅</div>
          <div class="empty-state-text">Chưa có dữ liệu xếp hạng</div>
        </div>`;
      previousLeaderboard = null;
      return;
    }

    // Build map of previous XP for change detection
    var prevMap = {};
    if (previousLeaderboard) {
      previousLeaderboard.forEach((e) => {
        prevMap[e.name] = e.xp;
      });
    }

    var now = new Date();
    var timeStr = now.toLocaleTimeString("vi-VN", {
      hour: "2-digit",
      minute: "2-digit",
    });

    var top10 = leaderboard.slice(0, 10);
    var top3 = top10.slice(0, 3);
    var rest = top10.slice(3, 10);

    var top3Html = '<div class="lb-podium-container">';
    // [FIX] Podium order: 2, 1, 3 -> index 1, 0, 2
    var podiumOrder = [1, 0, 2];
    podiumOrder.forEach((pos) => {
      var entry = top3[pos];
      if (!entry) {
        top3Html += '<div class="lb-podium-item empty-podium podium-rank-' + (pos + 1) + '">' +
          '<div class="lb-podium-stand"></div>' +
          '</div>';
        return;
      }
      var rank = pos + 1;
      var meClass = entry.isMe ? "lb-me" : "";

      var avatarSrc =
        entry.avatarUrl ||
        "https://ui-avatars.com/api/?name=" +
          encodeURIComponent(entry.name) +
          "&background=random";

      // Detect XP change for Top 3
      var changeHtml = "";
      if (previousLeaderboard && prevMap[entry.name] !== undefined) {
        var diff = entry.xp - prevMap[entry.name];
        if (diff > 0) {
          changeHtml = '<div class="lb-xp-change-pop">+' + (diff) + '</div>';
        }
      }

      top3Html += '<div class="lb-podium-item podium-rank-' + rank + ' ' + meClass + '" title="' + entry.name + ' - ' + entry.xp + ' XP">' +
        '<div class="lb-podium-avatar-cluster">' +
          '<div class="lb-podium-avatar-wrapper">' +
            '<img src="' + avatarSrc + '" alt="' + entry.name + '" class="lb-podium-avatar">' +
            '<div class="lb-podium-badge">' + rank + '</div>' +
            changeHtml +
          '</div>' +
          '<div class="lb-podium-name-bar">' +
            '<div class="lb-podium-name">' + entry.name + (entry.isMe ? " (Bạn)" : "") + '</div>' +
            '<div class="lb-podium-xp">' + entry.xp.toLocaleString() + ' XP</div>' +
          '</div>' +
        '</div>' +
        '<div class="lb-podium-stand"></div>' +
      '</div>';
    });
    top3Html += '</div>';

    var restHtml = '<div class="lb-list-container">';
    rest.forEach((entry, idx) => {
      var rank = idx + 4;
      var meClass = entry.isMe ? "lb-me" : "";
      var changeHtml = "";
      if (previousLeaderboard && prevMap[entry.name] !== undefined) {
        var diff = entry.xp - prevMap[entry.name];
        if (diff > 0) {
          changeHtml = '<span class="lb-xp-change lb-xp-up">+' + (diff) + '</span>';
        }
      }

      var avatarSrc =
        entry.avatarUrl ||
        "https://ui-avatars.com/api/?name=" +
          encodeURIComponent(entry.name) +
          "&background=random";

      restHtml += '<div class="lb-list-item ' + meClass + '">' +
        '<div class="lb-list-rank">' + rank + '</div>' +
        '<div class="lb-list-main">' +
          '<div class="lb-list-avatar-wrapper">' +
            '<div class="lb-list-avatar-shell">' +
              '<img src="' + avatarSrc + '" class="lb-list-avatar" alt="' + entry.name + '">' +
            '</div>' +
          '</div>' +
          '<div class="lb-list-info">' +
            '<div class="lb-list-name">' + entry.name + (entry.isMe ? " (Bạn)" : "") + '</div>' +
            '<div class="lb-list-xp">' + entry.xp.toLocaleString() + ' XP ' + changeHtml + '</div>' +
          '</div>' +
        '</div>' +
      '</div>';
    });
    restHtml += '</div>';

    container.innerHTML = top3Html + restHtml + '<div class="lb-updated">Cập nhật lúc ' + timeStr + "</div>";

    // Save current as previous for next comparison
    previousLeaderboard = leaderboard
      .slice(0, 10)
      .map((e) => ({ name: e.name, xp: e.xp }));
  }

  /**
   * ZONE 4 BOTTOM: Smart Suggestion
   */
  function renderSuggestion(suggestion) {
    var banner = document.getElementById("suggestion-banner");
    var textEl = document.getElementById("suggestion-text");
    if (!banner || !textEl) return;

    if (suggestion) {
      textEl.textContent = suggestion;
      banner.style.display = "flex";
    } else {
      banner.style.display = "none";
    }
  }

  /**
   * Show loading states for all zones (instead of error on first load)
   */
  function showLoadingStates() {
    var ids = [
      "activity-history-list",
      "quests-list",
      "skill-progress-list",
      "leaderboard-list",
    ];
    ids.forEach((id) => {
      var el = document.getElementById(id);
      if (el && !el.querySelector(".loading-state-indicator")) {
        el.innerHTML = `
          <div class="empty-state loading-state-indicator">
            <div class="empty-state-icon" style="animation:pulse 1.5s infinite">⏳</div>
            <div class="empty-state-text">Đang tải dữ liệu...</div>
          </div>`;
      }
    });
  }

  /**
   * Show error states for all zones
   */
  function showErrorStates(msg) {
    var ids = [
      "activity-history-list",
      "quests-list",
      "skill-progress-list",
      "leaderboard-list",
    ];
    ids.forEach((id) => {
      var el = document.getElementById(id);
      if (el) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text">${msg}</div>
          </div>`;
      }
    });
  }

  /**
   * Update greeting based on time of day
   */
  function updateGreeting() {
    var hour = new Date().getHours();
    var greeting = "Chào mừng trở lại";

    if (hour >= 5 && hour < 12) greeting = "Chào buổi sáng";
    else if (hour >= 12 && hour < 18) greeting = "Chào buổi chiều";
    else if (hour >= 18 && hour < 22) greeting = "Chào buổi tối";
    else greeting = "Chúc ngủ ngon";

    var greetingEl = document.getElementById("greeting-text");
    var userNameEl = document.getElementById("userNameWelcome");

    if (greetingEl && userNameEl) {
      var userName = userNameEl.textContent || "User";
      greetingEl.innerHTML = `${greeting}, <span id="userNameWelcome">${userName}</span>`;
    }
  }

  /**
   * Update dashboard user info
   */
  function updateDashboardUserInfo(user) {
    var profileName =
      ((document.getElementById("profile-fullname") || {}).textContent || "").trim();
    var displayName =
      profileName || user.displayName || user.fullName || user.username || "User";
    var userNameEl = document.getElementById("userNameWelcome");
    if (userNameEl) userNameEl.textContent = displayName;

    if (typeof window.updateAllUserNames === "function")
      window.updateAllUserNames(displayName);
    if (typeof window.updateAllUserAvatars === "function")
      window.updateAllUserAvatars(user.avatarUrl);
  }

  /**
   * Initialize streak tracking - server source of truth
   */
  function initStreakTracking() {
    console.log("📋 Initializing daily check-in system...");

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          var streakData = {
            currentStreak: result.currentStreak || 0,
            longestStreak: result.longestStreak || 0,
            lastActiveDate: result.lastActiveDate || null,
            checkedInToday: result.checkedInToday || false,
          };
          saveStreakData(streakData);
          updateStreakUI(streakData);
          if (streakData.checkedInToday) setCheckinDone();
        } else {
          updateStreakUI(getStreakData());
        }
      })
      .withFailureHandler(function (error) {
        console.error("Failed to load streak data:", error);
        updateStreakUI(getStreakData());
      })
      .getUserStreakData(getDashboardAuthContext());
  }

  /**
   * Handle daily check-in
   */
  window.handleDailyCheckin = function () {
    var btn = document.getElementById("checkin-btn");
    if (btn && btn.disabled) return;
    if (btn) btn.disabled = true;

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          setCheckinDone();
          var streakData = {
            currentStreak: result.currentStreak || 0,
            longestStreak: result.longestStreak || 0,
            lastActiveDate: result.serverToday || null,
            checkedInToday: true,
          };
          saveStreakData(streakData);
          updateStreakUI(streakData);

          // Update XP and XQP display immediately if XP was awarded
          if (result.xpAwarded) {
            var xpEl = document.getElementById("qs-xp");
            if (xpEl && result.newTotalXP) {
              xpEl.textContent = result.newTotalXP.toLocaleString();
            }

            showXPAnimation(result.xpAwarded);
          }

          // Always sync XQP/XP totals from server response (even if no XP awarded this time)
          if (result.newTotalXQP !== undefined && result.newTotalXQP > 0) {
            if (window.currentUser) {
              window.currentUser.totalXP = result.newTotalXP;
              window.currentUser.totalXQP = result.newTotalXQP;
              
              // Persist
              var storageKey = localStorage.getItem("currentUser") ? "localStorage" : "sessionStorage";
              window[storageKey].setItem("currentUser", JSON.stringify(window.currentUser));
            }

            // Update Pet XQP counter if it exists (for SPA synchronization)
            var xqpEl = document.getElementById("petXQPBalance");
            if (xqpEl) xqpEl.textContent = Number(result.newTotalXQP).toLocaleString();
          }

          if (typeof showToast === "function") {
            showToast(
              "Điểm danh thành công! 🔥 Chuỗi: " +
                streakData.currentStreak +
                " ngày" +
                (result.xpAwarded ? " (+" + result.xpAwarded + " XP/XQP)" : ""),
              "success"
            );
          }

          // Refresh quests to show check-in quest as done
          setTimeout(() => {
            requestDashboardRefresh({
              forceRefresh: true,
              backgroundRefresh: true,
              source: "daily-checkin",
              minGapMs: 1500,
            });
          }, 1000);
        } else {
          if (result && result.alreadyCheckedIn) {
            setCheckinDone();
            var streakData = {
              currentStreak: result.currentStreak || 0,
              longestStreak: result.longestStreak || 0,
              checkedInToday: true,
            };
            saveStreakData(streakData);
            updateStreakUI(streakData);
            if (typeof showToast === "function")
              showToast("Hôm nay bạn đã điểm danh rồi!", "info");
          } else {
            if (btn) btn.disabled = false;
            if (typeof showToast === "function")
              showToast(
                "Không thể điểm danh: " + ((result && result.message) || "Lỗi"),
                "error"
              );
          }
        }
      })
      .withFailureHandler(function (error) {
        console.error("Check-in failed:", error);
        if (btn) btn.disabled = false;
        if (typeof showToast === "function")
          showToast("Lỗi khi điểm danh", "error");
      })
      .dailyCheckin(getDashboardAuthContext());
  };

  /**
   * Set check-in to done state
   */
  function setCheckinDone() {
    var btn = document.getElementById("checkin-btn");
    var iconEl = document.getElementById("checkin-icon");
    var textEl = document.getElementById("checkin-text");

    if (btn) {
      btn.disabled = true;
      btn.classList.add("checked-in");
    }
    if (textEl) textEl.textContent = "Đã điểm danh";
  }

  /**
   * Update streak UI
   */
  function updateStreakUI(streakData) {
    var streakDaysEl = document.getElementById("streak-days");
    var subtitleEl = document.getElementById("header-subtitle");

    if (streakDaysEl)
      streakDaysEl.textContent = '' + (streakData.currentStreak || 0) + ' ngày';
  }

  /**
   * Get time ago string
   */
  function getTimeAgo(dateString) {
    if (!dateString) return "Vừa xong";
    var date = new Date(dateString);
    var now = new Date();
    var diffMs = now - date;
    var diffMins = Math.floor(diffMs / 60000);
    var diffHours = Math.floor(diffMs / 3600000);
    var diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return "Vừa xong";
    if (diffMins < 60) return '' + (diffMins) + ' phút trước';
    if (diffHours < 24) return '' + (diffHours) + ' giờ trước';
    if (diffDays < 7) return '' + (diffDays) + ' ngày trước';
    return date.toLocaleDateString("vi-VN");
  }

  // Self-heal init path for restored sessions: visible dashboard should not stay uninitialized.
  setTimeout(() => {
    if (isDashboardVisible() && !dashboardInitialized) {
      console.log("🩹 Delayed dashboard self-heal init");
      initDashboard();
    }
  }, 400);

  // Listen for user updates
  window.addEventListener("user-info-updated", function (e) {
    if (e.detail) updateDashboardUserInfo(e.detail);

    var shouldReinit = isDashboardVisible() && !dashboardInitialized;
    console.log("👤 user-info-updated", {
      shouldReinit,
      dashboardVisible: isDashboardVisible(),
      dashboardInitialized,
      detailEmail: (e && e.detail && e.detail.email) || "",
      detailUserId: (e && e.detail && e.detail.userId) || "",
    });

    if (shouldReinit) {
      initDashboard();
    }
  });

  window.addEventListener("avatar-updated", function (e) {
    if (e && e.detail && e.detail.url && typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(e.detail.url);
    }
  });

  document.addEventListener("visibilitychange", function () {
    if (!document.hidden && dashboardInitialized) {
      var streakData = getStreakData();
      streakData.sessionStartTime = Date.now();
      saveStreakData(streakData);

      // Force refresh dashboard (leaderboard + history) when tab becomes visible
      if (isDashboardVisible()) {
        console.log("🔄 Tab visible — refreshing leaderboard + history...");
        requestDashboardRefresh({
          forceRefresh: true,
          backgroundRefresh: true,
          source: "tab-visible",
          minGapMs: 6000,
        });
      }
    }
  });

  // Listen for custom event from other pages (quiz/learning completion)
  window.addEventListener("dashboard-needs-refresh", function () {
    if (!dashboardInitialized) return;
    console.log("🔄 Dashboard refresh triggered by activity event");
    if (isDashboardVisible()) {
      requestDashboardRefresh({
        forceRefresh: true,
        backgroundRefresh: true,
        source: "activity-event",
        minGapMs: 2500,
      });
    }
  });

  console.log("✅ Dashboard scripts loaded (Gamification 4-Zone)");
</script>
