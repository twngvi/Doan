<script>
  // ===== DASHBOARD - GAMIFICATION 4-ZONE =====

  // Cache for dashboard data
  const DashboardCache = {
    data: null,
    lastFetch: null,
    cacheTimeout: 60000,
  };

  /**
   * Get user data from storage
   */
  function getUserData() {
    const currentUserData =
      localStorage.getItem("currentUser") ||
      sessionStorage.getItem("currentUser");
    if (currentUserData) {
      try {
        return JSON.parse(currentUserData);
      } catch (e) {
        console.error("Error parsing currentUser:", e);
      }
    }
    return null;
  }

  /**
   * Get/Save streak data from localStorage
   */
  function getStreakData() {
    const streakData = localStorage.getItem("streakData");
    if (streakData) {
      try {
        return JSON.parse(streakData);
      } catch (e) {}
    }
    return {
      currentStreak: 0,
      longestStreak: 0,
      lastActiveDate: null,
      checkedInToday: false,
    };
  }

  function saveStreakData(data) {
    localStorage.setItem("streakData", JSON.stringify(data));
  }

  /**
   * Initialize Dashboard
   */
  let dashboardAutoRefreshInterval = null;

  function initDashboard() {
    console.log("📊 Initializing Dashboard (Gamification)...");

    const user = getUserData();
    if (user) updateDashboardUserInfo(user);

    updateGreeting();
    initStreakTracking();
    initHeaderMeteorShower();
    setupDashboardHeaderMouseEffect();

    // Single API call for all dashboard data
    loadAllDashboardData();

    // Auto-refresh Lịch sử Thực chiến mỗi 30 giây
    startDashboardAutoRefresh();
  }

  /**
   * Auto-refresh dashboard data (activity history)
   */
  function startDashboardAutoRefresh() {
    if (dashboardAutoRefreshInterval)
      clearInterval(dashboardAutoRefreshInterval);

    dashboardAutoRefreshInterval = setInterval(() => {
      // Chỉ refresh nếu đang ở trang dashboard
      if (
        document.querySelector(".dashboard-main-content") &&
        document.querySelector(".dashboard-main-content").offsetParent !== null
      ) {
        console.log("🔄 Auto-refreshing dashboard data...");
        // Xóa cache để force reload
        DashboardCache.data = null;
        DashboardCache.lastFetch = null;
        loadAllDashboardData();
      }
    }, 30000); // 30 giây
  }

  function stopDashboardAutoRefresh() {
    if (dashboardAutoRefreshInterval) {
      clearInterval(dashboardAutoRefreshInterval);
      dashboardAutoRefreshInterval = null;
    }
  }

  /**
   * Mouse-responsive stars effect
   */
  function setupDashboardHeaderMouseEffect() {
    const header = document.querySelector(".dashboard-header");
    const stars = document.getElementById("dashboardHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;
      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  /**
   * Meteor shower effect
   */
  let dashboardMeteorInterval = null;

  function initHeaderMeteorShower() {
    const container = document.getElementById("header-meteor-container");
    if (!container) return;

    if (dashboardMeteorInterval) clearInterval(dashboardMeteorInterval);

    function createMeteor() {
      const meteor = document.createElement("div");
      meteor.className = "header-meteor";
      meteor.style.left = Math.random() * 40 + "%";
      meteor.style.top = Math.random() * 20 + "%";
      meteor.style.height = 35 + Math.random() * 35 + "px";
      meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";
      container.appendChild(meteor);
      setTimeout(() => meteor.remove(), 1200);
    }

    dashboardMeteorInterval = setInterval(() => {
      if (!document.getElementById("header-meteor-container")) {
        clearInterval(dashboardMeteorInterval);
        return;
      }
      createMeteor();
    }, 800);

    createMeteor();
  }

  /**
   * SINGLE API CALL - Load all dashboard data
   */
  function loadAllDashboardData(forceRefresh) {
    console.log("📋 Loading all dashboard data (single API)...");

    const now = Date.now();
    if (
      !forceRefresh &&
      DashboardCache.data &&
      DashboardCache.lastFetch &&
      now - DashboardCache.lastFetch < DashboardCache.cacheTimeout
    ) {
      console.log("📦 Using cached dashboard data");
      renderAllZones(DashboardCache.data);
      return;
    }

    const loadingTimeout = setTimeout(() => {
      console.warn("⏱️ API taking too long");
    }, 10000);

    google.script.run
      .withSuccessHandler((response) => {
        clearTimeout(loadingTimeout);
        if (response && response.success) {
          DashboardCache.data = response;
          DashboardCache.lastFetch = Date.now();
          renderAllZones(response);
        } else {
          showErrorStates("Không thể tải dữ liệu");
        }
      })
      .withFailureHandler((error) => {
        clearTimeout(loadingTimeout);
        console.error("❌ getDashboardData error:", error);
        showErrorStates("Lỗi kết nối server");
      })
      .getDashboardData();
  }

  /**
   * Render all 4 zones from single data object
   */
  function renderAllZones(data) {
    renderQuickStats(data.quickStats);
    renderActivities(data.activities);
    renderQuests(data.quests);
    renderSkillProgress(data.skillProgress);
    renderLeaderboard(data.leaderboard);
    renderSuggestion(data.suggestion);
  }

  /**
   * ZONE 2: Quick Stats
   */
  function renderQuickStats(stats) {
    if (!stats) return;
    const xpEl = document.getElementById("qs-xp");
    const accEl = document.getElementById("qs-accuracy");
    const badgesEl = document.getElementById("qs-badges");
    const rankEl = document.getElementById("qs-rank");
    const rankIconEl = document.getElementById("qs-rank-icon");

    if (xpEl) xpEl.textContent = stats.totalXP.toLocaleString();
    if (accEl) accEl.textContent = stats.avgAccuracy + "%";
    if (badgesEl) badgesEl.textContent = stats.badges;
    if (rankEl) rankEl.textContent = stats.rankTitle;
    if (rankIconEl) rankIconEl.textContent = stats.rankIcon;
  }

  /**
   * ZONE 3 LEFT: Activity History
   */
  function renderActivities(activities) {
    const container = document.getElementById("activity-history-list");
    if (!container) return;

    if (!activities || activities.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">⚔️</div>
          <div class="empty-state-title">Chưa có trận chiến nào</div>
          <div class="empty-state-text">Bắt đầu học hoặc làm quiz để ghi nhận!</div>
        </div>`;
      return;
    }

    const today = new Date().toISOString().split("T")[0];
    const typeConfig = {
      Learning: {
        icon: "📖",
        label: "Learning",
        color: "#60a5fa",
        bg: "rgba(96,165,250,0.15)",
      },
      MCQ: {
        icon: "🧠",
        label: "MCQ Quiz",
        color: "#34d399",
        bg: "rgba(52,211,153,0.15)",
      },
      Matching: {
        icon: "🔗",
        label: "Matching",
        color: "#a78bfa",
        bg: "rgba(167,139,250,0.15)",
      },
    };

    // Chỉ hiển thị tối đa 4 hoạt động gần nhất
    const recentActivities = activities.slice(0, 4);

    container.innerHTML = recentActivities
      .map((act) => {
        const cfg = typeConfig[act.type] || typeConfig.Learning;
        const timeAgo = getTimeAgo(act.timestamp);
        const isToday = act.timestamp && act.timestamp.startsWith(today);
        const hasScore = act.score !== null && act.score !== undefined;

        // Xác định trang đích khi click
        let targetPage = "page-topics";
        if (act.type === "MCQ") targetPage = "page-mcq";
        else if (act.type === "Matching") targetPage = "page-matching";
        else if (act.type === "Learning") targetPage = "page-lesson";

        // Dot color logic
        let dotClass = "dot-info";
        if (act.type === "Learning") dotClass = "dot-info";
        else if (hasScore) {
          const pct = act.percentage || 0;
          if (pct >= 80) dotClass = "dot-success";
          else if (pct >= 50) dotClass = "dot-warning";
          else dotClass = "dot-danger";
        }

        let scoreHtml = "";
        if (hasScore) {
          const pct = act.percentage || 0;
          let scoreColor = "#f87171";
          if (pct >= 80) scoreColor = "#34d399";
          else if (pct >= 50) scoreColor = "#fbbf24";
          scoreHtml = `
          <div class="activity-hist-score">
            <span class="score-val" style="color:${scoreColor}">${act.score}/${act.totalQuestions}</span>
            <span class="score-pct" style="background:${scoreColor}15;color:${scoreColor}">${pct}%</span>
          </div>`;
        }

        return `
        <div class="activity-hist-item activity-clickable" 
             onclick="navigateToActivity('${targetPage}', '${(act.topicTitle || "").replace(/'/g, "\\&#39;")}', '${act.type}')" 
             title="Bấm để thực hiện lại">
          <div class="activity-dot-status ${dotClass}"></div>
          <div class="activity-hist-content">
            <div class="activity-hist-top">
              <span class="activity-hist-badge" style="background:${cfg.bg};color:${cfg.color}">
                ${cfg.icon} ${cfg.label}
              </span>
              <span class="activity-hist-time">${isToday ? "🕐 " : ""}${timeAgo}</span>
            </div>
            <div class="activity-hist-title">${act.topicTitle || "Chủ đề"}</div>
            ${scoreHtml}
          </div>
          <div class="activity-go-icon">›</div>
        </div>`;
      })
      .join("");
  }

  /**
   * Navigate to activity page when clicking on history item
   */
  function navigateToActivity(targetPage, topicTitle, actType) {
    console.log("🔗 Navigating to:", targetPage, topicTitle, actType);
    if (typeof showPage === "function") {
      showPage(targetPage, { topicTitle: topicTitle, type: actType });
    }
  }

  /**
   * ZONE 3 RIGHT TOP: Daily Quests
   */
  function renderQuests(quests) {
    const container = document.getElementById("quests-list");
    if (!container) return;

    if (!quests || quests.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🎯</div>
          <div class="empty-state-text">Không có nhiệm vụ nào</div>
        </div>`;
      return;
    }

    container.innerHTML = quests
      .map((q) => {
        const doneClass = q.done ? "quest-done" : "";
        const pct =
          q.target > 0 ? Math.round((q.progress / q.target) * 100) : 0;

        return `
        <div class="quest-item ${doneClass}">
          <div class="quest-check">${q.done ? "✓" : ""}</div>
          <div class="quest-body">
            <div class="quest-title">${q.title}</div>
            <div class="quest-progress-bar">
              <div class="quest-progress-fill" style="width:${pct}%"></div>
            </div>
          </div>
          <div class="quest-xp">+${q.xpReward} XP</div>
        </div>`;
      })
      .join("");
  }

  /**
   * ZONE 3 RIGHT BOTTOM: Skill Progress
   */
  function renderSkillProgress(skills) {
    const container = document.getElementById("skill-progress-list");
    if (!container) return;

    if (!skills || skills.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📊</div>
          <div class="empty-state-text">Làm quiz để xem tiến độ kỹ năng</div>
        </div>`;
      return;
    }

    container.innerHTML = skills
      .map((s) => {
        let fillClass = "skill-low";
        if (s.progress >= 75) fillClass = "skill-high";
        else if (s.progress >= 50) fillClass = "skill-mid";

        return `
        <div class="skill-item">
          <div class="skill-header">
            <span class="skill-name">${s.title}</span>
            <span class="skill-pct">${s.progress}%</span>
          </div>
          <div class="skill-bar">
            <div class="skill-fill ${fillClass}" style="width:${s.progress}%"></div>
          </div>
        </div>`;
      })
      .join("");
  }

  /**
   * ZONE 4 TOP: Leaderboard
   */
  function renderLeaderboard(leaderboard) {
    const container = document.getElementById("leaderboard-list");
    if (!container) return;

    if (!leaderboard || leaderboard.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🏅</div>
          <div class="empty-state-text">Chưa có dữ liệu xếp hạng</div>
        </div>`;
      return;
    }

    const medals = ["🥇", "🥈", "🥉"];
    container.innerHTML =
      '<div class="leaderboard-table">' +
      leaderboard
        .map((entry, idx) => {
          const meClass = entry.isMe ? "lb-me" : "";
          const rankDisplay = idx < 3 ? medals[idx] : idx + 1;

          return `
          <div class="lb-row ${meClass}">
            <div class="lb-rank">${rankDisplay}</div>
            <div class="lb-name">${entry.name}${entry.isMe ? " (Bạn)" : ""}</div>
            <div class="lb-xp">🌟 ${entry.xp.toLocaleString()} XP</div>
          </div>`;
        })
        .join("") +
      "</div>";
  }

  /**
   * ZONE 4 BOTTOM: Smart Suggestion
   */
  function renderSuggestion(suggestion) {
    const banner = document.getElementById("suggestion-banner");
    const textEl = document.getElementById("suggestion-text");
    if (!banner || !textEl) return;

    if (suggestion) {
      textEl.textContent = suggestion;
      banner.style.display = "flex";
    } else {
      banner.style.display = "none";
    }
  }

  /**
   * Show error states for all zones
   */
  function showErrorStates(msg) {
    const ids = [
      "activity-history-list",
      "quests-list",
      "skill-progress-list",
      "leaderboard-list",
    ];
    ids.forEach((id) => {
      const el = document.getElementById(id);
      if (el) {
        el.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">⚠️</div>
            <div class="empty-state-text">${msg}</div>
          </div>`;
      }
    });
  }

  /**
   * Update greeting based on time of day
   */
  function updateGreeting() {
    const hour = new Date().getHours();
    let greeting = "Chào mừng trở lại";

    if (hour >= 5 && hour < 12) greeting = "Chào buổi sáng";
    else if (hour >= 12 && hour < 18) greeting = "Chào buổi chiều";
    else if (hour >= 18 && hour < 22) greeting = "Chào buổi tối";
    else greeting = "Chúc ngủ ngon";

    const greetingEl = document.getElementById("greeting-text");
    const userNameEl = document.getElementById("userNameWelcome");

    if (greetingEl && userNameEl) {
      const userName = userNameEl.textContent || "User";
      greetingEl.innerHTML = `${greeting}, <span id="userNameWelcome">${userName}</span>`;
    }
  }

  /**
   * Update dashboard user info
   */
  function updateDashboardUserInfo(user) {
    const displayName =
      user.displayName || user.fullName || user.username || "User";
    const userNameEl = document.getElementById("userNameWelcome");
    if (userNameEl) userNameEl.textContent = displayName;

    if (typeof window.updateAllUserNames === "function")
      window.updateAllUserNames(displayName);
    if (typeof window.updateAllUserAvatars === "function")
      window.updateAllUserAvatars(user.avatarUrl);
  }

  /**
   * Initialize streak tracking - server source of truth
   */
  function initStreakTracking() {
    console.log("📋 Initializing daily check-in system...");

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          const streakData = {
            currentStreak: result.currentStreak || 0,
            longestStreak: result.longestStreak || 0,
            lastActiveDate: result.lastActiveDate || null,
            checkedInToday: result.checkedInToday || false,
          };
          saveStreakData(streakData);
          updateStreakUI(streakData);
          if (streakData.checkedInToday) setCheckinDone();
        } else {
          updateStreakUI(getStreakData());
        }
      })
      .withFailureHandler(function (error) {
        console.error("Failed to load streak data:", error);
        updateStreakUI(getStreakData());
      })
      .getUserStreakData();
  }

  /**
   * Handle daily check-in
   */
  window.handleDailyCheckin = function () {
    const btn = document.getElementById("checkin-btn");
    if (btn && btn.disabled) return;
    if (btn) btn.disabled = true;

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success) {
          setCheckinDone();
          const streakData = {
            currentStreak: result.currentStreak || 0,
            longestStreak: result.longestStreak || 0,
            lastActiveDate: result.serverToday || null,
            checkedInToday: true,
          };
          saveStreakData(streakData);
          updateStreakUI(streakData);
          if (typeof showToast === "function") {
            showToast(
              "Điểm danh thành công! 🔥 Chuỗi: " +
                streakData.currentStreak +
                " ngày",
              "success",
            );
          }
        } else {
          if (result && result.alreadyCheckedIn) {
            setCheckinDone();
            const streakData = {
              currentStreak: result.currentStreak || 0,
              longestStreak: result.longestStreak || 0,
              checkedInToday: true,
            };
            saveStreakData(streakData);
            updateStreakUI(streakData);
            if (typeof showToast === "function")
              showToast("Hôm nay bạn đã điểm danh rồi!", "info");
          } else {
            if (btn) btn.disabled = false;
            if (typeof showToast === "function")
              showToast(
                "Không thể điểm danh: " + (result?.message || "Lỗi"),
                "error",
              );
          }
        }
      })
      .withFailureHandler(function (error) {
        console.error("Check-in failed:", error);
        if (btn) btn.disabled = false;
        if (typeof showToast === "function")
          showToast("Lỗi khi điểm danh", "error");
      })
      .dailyCheckin();
  };

  /**
   * Set check-in to done state
   */
  function setCheckinDone() {
    const btn = document.getElementById("checkin-btn");
    const iconEl = document.getElementById("checkin-icon");
    const textEl = document.getElementById("checkin-text");

    if (btn) {
      btn.disabled = true;
      btn.classList.add("checked-in");
    }
    if (textEl) textEl.textContent = "Đã điểm danh";
  }

  /**
   * Update streak UI
   */
  function updateStreakUI(streakData) {
    const streakDaysEl = document.getElementById("streak-days");
    const subtitleEl = document.getElementById("header-subtitle");

    if (streakDaysEl)
      streakDaysEl.textContent = `${streakData.currentStreak || 0} ngày`;
  }

  /**
   * Get time ago string
   */
  function getTimeAgo(dateString) {
    if (!dateString) return "Vừa xong";
    const date = new Date(dateString);
    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);

    if (diffMins < 1) return "Vừa xong";
    if (diffMins < 60) return `${diffMins} phút trước`;
    if (diffHours < 24) return `${diffHours} giờ trước`;
    if (diffDays < 7) return `${diffDays} ngày trước`;
    return date.toLocaleDateString("vi-VN");
  }

  // Initialize when script loads
  initDashboard();

  // Listen for user updates
  window.addEventListener("user-info-updated", function (e) {
    if (e.detail) updateDashboardUserInfo(e.detail);
  });

  window.addEventListener("avatar-updated", function (e) {
    if (e.detail?.url && typeof window.updateAllUserAvatars === "function") {
      window.updateAllUserAvatars(e.detail.url);
    }
  });

  document.addEventListener("visibilitychange", function () {
    if (!document.hidden) {
      const streakData = getStreakData();
      streakData.sessionStartTime = Date.now();
      saveStreakData(streakData);
    }
  });

  console.log("✅ Dashboard scripts loaded (Gamification 4-Zone)");
</script>
