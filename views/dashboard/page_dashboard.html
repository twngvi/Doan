<!-- Dashboard Content - 4-Zone Gamification Design -->

<main class="dashboard-main-content">
  <div class="content-area">
    <!-- ===== ZONE 1: HEADER ===== -->
    <section class="dashboard-header" id="dashboard-header">
      <div class="header-galaxy-bg">
        <div class="header-stars" id="dashboardHeaderStars"></div>
        <div class="header-nebula"></div>
        <div class="header-meteor-container" id="header-meteor-container"></div>
      </div>
      <div class="header-left">
        <h2 class="header-greeting" id="greeting-text">
          Chào buổi chiều, <span id="userNameWelcome">User</span>
        </h2>
        <p class="header-subtitle" id="header-subtitle">
          Điểm danh mỗi ngày để tăng chuỗi ngày học!
        </p>
      </div>
      <div class="header-stats">
        <div class="header-stat streak-stat glow-stat">
          <div class="stat-icon-wrapper fire-glow">
            <span class="stat-icon">🔥</span>
          </div>
          <div class="stat-info">
            <span class="stat-label">CHUỖI NGÀY HỌC</span>
            <span class="stat-value stat-value-large" id="streak-days"
              >0 ngày</span
            >
          </div>
        </div>
        <div class="header-stat checkin-stat" id="checkin-stat">
          <button
            class="checkin-btn"
            id="checkin-btn"
            onclick="handleDailyCheckin()"
          >
            <span class="checkin-icon" id="checkin-icon">📋</span>
            <span class="checkin-text" id="checkin-text">Điểm danh</span>
          </button>
        </div>
      </div>
    </section>

    <!-- ===== ZONE 2: QUICK STATS ===== -->
    <section class="quick-stats-row" id="quick-stats-row">
      <div class="quick-stat-card qs-xp">
        <div class="qs-icon">🌟</div>
        <div class="qs-info">
          <span class="qs-value" id="qs-xp">0</span>
          <span class="qs-label">Tổng XP</span>
        </div>
      </div>
      <div class="quick-stat-card qs-accuracy">
        <div class="qs-icon">🎯</div>
        <div class="qs-info">
          <span class="qs-value" id="qs-accuracy">0%</span>
          <span class="qs-label">Độ chính xác</span>
        </div>
      </div>
      <div class="quick-stat-card qs-badges">
        <div class="qs-icon">🏆</div>
        <div class="qs-info">
          <span class="qs-value" id="qs-badges">0</span>
          <span class="qs-label">Huy hiệu</span>
        </div>
      </div>
      <div class="quick-stat-card qs-rank">
        <div class="qs-icon" id="qs-rank-icon">🌱</div>
        <div class="qs-info">
          <span class="qs-value" id="qs-rank">Chưa xếp hạng</span>
          <span class="qs-label">Hạng hiện tại</span>
        </div>
      </div>
    </section>

    <!-- ===== ZONE 3: TWO-COLUMN (60/40) ===== -->
    <div class="dashboard-zone3">
      <!-- Left Column: Lịch sử Thực chiến (60%) -->
      <section class="zone3-left glass-card">
        <div class="glass-card-header">
          <h3 class="glass-card-title">Lịch sử hoạt động</h3>
        </div>
        <div class="glass-card-body" id="activity-history-list">
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <span>Đang tải lịch sử...</span>
          </div>
        </div>
      </section>

      <!-- Right Column: Nhiệm vụ & Tiến độ (40%) -->
      <section class="zone3-right">
        <!-- Daily Quests -->
        <div class="glass-card quest-card">
          <div class="glass-card-header">
            <h3 class="glass-card-title">🎯 Nhiệm vụ hôm nay</h3>
          </div>
          <div class="glass-card-body" id="quests-list">
            <div class="loading-state">
              <div class="loading-spinner"></div>
              <span>Đang tải nhiệm vụ...</span>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- ===== ZONE 4: LEADERBOARD + SUGGESTION ===== -->
    <div class="dashboard-zone4">
      <!-- Leaderboard -->
      <section class="glass-card leaderboard-card">
        <div class="glass-card-header">
          <h3 class="glass-card-title">🏅 Bảng xếp hạng</h3>
        </div>
        <div class="glass-card-body" id="leaderboard-list">
          <div class="loading-state">
            <div class="loading-spinner"></div>
            <span>Đang tải bảng xếp hạng...</span>
          </div>
        </div>
      </section>


    </div>
  </div>
</main>
