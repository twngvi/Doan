<style>
/* ===== RESET & VARIABLES ===== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

:root {
    --primary: #2563EB;
    --primary-dark: #1d4ed8;
    --secondary: #F59E0B;
    --success: #10B981;
    --error: #EF4444;
    --neutral: #6B7280;
    --neutral-light: #F9FAFB;
    --neutral-dark: #1F2937;
    --white: #FFFFFF;
    --border: #E5E7EB;
    --sidebar-width: 260px;
    --topbar-height: 70px;
    --font-family: 'Inter', -apple-system, sans-serif;
    --transition: 300ms;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
}

/* Scoped to dashboard to avoid conflicts if needed, but variables are global */
#page-dashboard {
    font-family: var(--font-family);
    background: var(--neutral-light);
    color: var(--neutral-dark);
}

/* ===== DASHBOARD LAYOUT ===== */
.dashboard-container {
    display: flex;
    min-height: 100vh;
}

/* ===== SIDEBAR ===== */
.sidebar {
    width: var(--sidebar-width);
    background: var(--white);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    z-index: 100;
    transition: transform var(--transition);
}

.sidebar-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--primary);
}

.logo-icon {
    font-size: 1.75rem;
}

.sidebar-toggle {
    display: none;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
}

.sidebar-nav {
    flex: 1;
    padding: 1rem 0;
    overflow-y: auto;
}

.nav-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.875rem 1.5rem;
    color: var(--neutral);
    text-decoration: none;
    transition: all var(--transition);
    border-left: 3px solid transparent;
    cursor: pointer;
}

.nav-item:hover {
    background: var(--neutral-light);
    color: var(--primary);
}

.nav-item.active {
    background: rgba(37, 99, 235, 0.1);
    color: var(--primary);
    border-left-color: var(--primary);
    font-weight: 600;
}

.nav-icon {
    font-size: 1.5rem;
}

.sidebar-footer {
    padding: 1rem 0;
    border-top: 1px solid var(--border);
}

.logout-btn {
    width: 100%;
    background: none;
    border: none;
    font-family: var(--font-family);
    font-size: 1rem;
}

/* ===== MAIN CONTENT ===== */
.main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    display: flex;
    flex-direction: column;
}

/* ===== TOPBAR ===== */
.topbar {
    height: var(--topbar-height);
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 90;
}

.topbar-left {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.mobile-menu-btn {
    display: none;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
}

.page-title {
    font-size: 1.5rem;
    font-weight: 700;
}

.topbar-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
}

.search-box {
    position: relative;
    display: flex;
    align-items: center;
}

.search-icon {
    position: absolute;
    left: 1rem;
    font-size: 1.25rem;
    opacity: 0.5;
}

.search-input {
    padding: 0.625rem 1rem 0.625rem 3rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 250px;
    font-family: var(--font-family);
    transition: all var(--transition);
}

.search-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

.notification-btn {
    position: relative;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0.5rem;
}

.notif-badge {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--error);
    color: var(--white);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.125rem 0.375rem;
    border-radius: var(--radius-md);
}

.user-menu {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: var(--radius-lg);
    transition: background var(--transition);
}

.user-menu:hover {
    background: var(--neutral-light);
}

.user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
}

.user-name {
    font-weight: 600;
}

/* ===== CONTENT AREA ===== */
.content-area {
    padding: 2rem;
    flex: 1;
}

/* ===== WELCOME SECTION ===== */
.welcome-section {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: var(--white);
    padding: 2rem;
    border-radius: var(--radius-xl);
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.welcome-title {
    font-size: 2rem;
    margin-bottom: 0.5rem;
}

.welcome-text {
    opacity: 0.9;
}

.streak-badge {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(255, 255, 255, 0.2);
    padding: 1.5rem;
    border-radius: var(--radius-xl);
}

.streak-icon {
    font-size: 3rem;
}

.streak-number {
    font-size: 2.5rem;
    font-weight: 700;
}

.streak-label {
    font-size: 0.875rem;
    opacity: 0.9;
}

/* ===== STATS GRID ===== */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
    margin-bottom: 2rem;
}

.stat-card {
    background: var(--white);
    padding: 1.5rem;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: all var(--transition);
}

.stat-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-lg);
}

.stat-icon {
    font-size: 2.5rem;
}

.stat-label {
    font-size: 0.875rem;
    color: var(--neutral);
    margin-bottom: 0.25rem;
}

.stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--neutral-dark);
}

.stat-change {
    font-size: 0.75rem;
    color: var(--neutral);
}

.stat-change.positive {
    color: var(--success);
}

/* ===== DASHBOARD GRID ===== */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
}

.dashboard-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
}

.card-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.card-title {
    font-size: 1.25rem;
    font-weight: 600;
}

.card-action {
    background: none;
    border: none;
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    transition: color var(--transition);
}

.card-action:hover {
    color: var(--primary-dark);
}

.card-body {
    padding: 1.5rem;
}

/* ===== PROGRESS CARD ===== */
.progress-item {
    margin-bottom: 1.5rem;
}

.progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
}

.progress-label {
    font-weight: 500;
}

.progress-percent {
    color: var(--primary);
    font-weight: 600;
}

.progress-bar {
    height: 8px;
    background: var(--neutral-light);
    border-radius: var(--radius-md);
    overflow: hidden;
}

.progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 1s ease;
}

/* ===== MOUNTAIN CARD ===== */
.mini-mountain {
    display: flex;
    flex-direction: column-reverse;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
}

.mountain-level {
    padding: 1rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    position: relative;
}

.mountain-level.current {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: var(--white);
    font-weight: 600;
}

.climber-icon {
    position: absolute;
    right: 1rem;
    font-size: 1.5rem;
}

.level-info {
    padding: 1rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    text-align: center;
}

/* ===== ACTIVITY CARD ===== */
.activity-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
}

.activity-item {
    display: flex;
    align-items: center;
    gap: 1rem;
}

.activity-icon {
    font-size: 1.5rem;
}

.activity-content {
    flex: 1;
}

.activity-title {
    font-weight: 500;
    margin-bottom: 0.25rem;
}

.activity-time {
    font-size: 0.875rem;
    color: var(--neutral);
}

.activity-points {
    color: var(--success);
    font-weight: 600;
}

/* ===== QUICK ACTIONS ===== */
.quick-actions-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
}

.quick-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    padding: 1.5rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    text-decoration: none;
    color: var(--neutral-dark);
    transition: all var(--transition);
}

.quick-action:hover {
    background: var(--primary);
    color: var(--white);
    transform: translateY(-3px);
}

.action-icon {
    font-size: 2.5rem;
}

.action-label {
    font-weight: 600;
}

/* ===== NOTIFICATION PANEL ===== */
.notification-panel {
    position: fixed;
    top: var(--topbar-height);
    right: 2rem;
    width: 350px;
    background: var(--white);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    z-index: 1000;
}

.notification-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.close-notif-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    opacity: 0.5;
}

.notification-list {
    max-height: 400px;
    overflow-y: auto;
}

.notification-item {
    display: flex;
    gap: 1rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background var(--transition);
}

.notification-item:hover {
    background: var(--neutral-light);
}

.notification-item.unread {
    background: rgba(37, 99, 235, 0.05);
}

.notif-title {
    font-weight: 600;
    margin-bottom: 0.25rem;
}

.notif-text {
    font-size: 0.875rem;
    color: var(--neutral);
    margin-bottom: 0.25rem;
}

.notif-time {
    font-size: 0.75rem;
    color: var(--neutral);
}

/* ===== RESPONSIVE ===== */
@media (max-width: 1024px) {
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }
    
    .dashboard-grid {
        grid-template-columns: 1fr;
    }
}

@media (max-width: 768px) {
    .sidebar {
        transform: translateX(-100%);
    }
    
    .sidebar.open {
        transform: translateX(0);
    }
    
    .main-content {
        margin-left: 0;
    }
    
    .mobile-menu-btn {
        display: block;
    }
    
    .topbar {
        padding: 0 1rem;
    }
    
    .search-box {
        display: none;
    }
    
    .stats-grid {
        grid-template-columns: 1fr;
    }
    
    .welcome-section {
        flex-direction: column;
        text-align: center;
        gap: 1rem;
    }
}
</style>
