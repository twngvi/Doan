<style>
  /* ===== RESET & VARIABLES ===== */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --secondary: #f59e0b;
    --success: #10b981;
    --error: #ef4444;
    --neutral: #6b7280;
    --neutral-light: #f9fafb;
    --neutral-dark: #1f2937;
    --white: #ffffff;
    --border: #e5e7eb;
    --sidebar-width: 260px;
    --topbar-height: 70px;
    --font-family: "Inter", -apple-system, sans-serif;
    --transition: 300ms;
    --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    --radius-md: 0.5rem;
    --radius-lg: 0.75rem;
    --radius-xl: 1rem;
  }

  /* Scoped to dashboard to avoid conflicts if needed, but variables are global */
  #page-dashboard {
    font-family: var(--font-family);
    background: var(--neutral-light);
    color: var(--neutral-dark);
    min-height: 100vh;
  }

  /* ===== DASHBOARD LAYOUT (Updated for Global Sidebar) ===== */
  .dashboard-main-content {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    width: 100%;
  }

  /* ===== TOPBAR ===== */
  #page-dashboard .topbar {
    height: var(--topbar-height);
    background: var(--white);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 90;
  }

  #page-dashboard .topbar-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  #page-dashboard .page-title {
    font-size: 1.5rem;
    font-weight: 700;
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .search-box {
    position: relative;
    display: flex;
    align-items: center;
  }

  .search-icon {
    position: absolute;
    left: 1rem;
    font-size: 1.25rem;
    opacity: 0.5;
  }

  .search-input {
    padding: 0.625rem 1rem 0.625rem 3rem;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: 250px;
    font-family: var(--font-family);
    transition: all var(--transition);
  }

  .search-input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }

  .notification-btn {
    position: relative;
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    padding: 0.5rem;
  }

  .notif-badge {
    position: absolute;
    top: 0;
    right: 0;
    background: var(--error);
    color: var(--white);
    font-size: 0.75rem;
    font-weight: 700;
    padding: 0.125rem 0.375rem;
    border-radius: var(--radius-md);
  }

  .user-menu {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    padding: 0.5rem;
    border-radius: var(--radius-lg);
    transition: background var(--transition);
  }

  .user-menu:hover {
    background: var(--neutral-light);
  }

  .user-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
  }

  .user-name {
    font-weight: 600;
  }

  /* ===== CONTENT AREA ===== */
  .content-area {
    padding: 2rem;
    flex: 1;
  }

  /* ===== WELCOME SECTION ===== */
  .welcome-section {
    background: linear-gradient(
      135deg,
      var(--primary) 0%,
      var(--primary-dark) 100%
    );
    color: var(--white);
    padding: 2rem;
    border-radius: var(--radius-xl);
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .welcome-title {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  .welcome-text {
    opacity: 0.9;
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(255, 255, 255, 0.2);
    padding: 1.5rem;
    border-radius: var(--radius-xl);
  }

  .streak-icon {
    font-size: 3rem;
  }

  .streak-number {
    font-size: 2.5rem;
    font-weight: 700;
  }

  .streak-label {
    font-size: 0.875rem;
    opacity: 0.9;
  }

  /* ===== STATS GRID ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.5rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--white);
    padding: 1.5rem;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: all var(--transition);
  }

  .stat-card:hover {
    transform: translateY(-5px);
    box-shadow: var(--shadow-lg);
  }

  .stat-icon {
    font-size: 2.5rem;
  }

  .stat-label {
    font-size: 0.875rem;
    color: var(--neutral);
    margin-bottom: 0.25rem;
  }

  .stat-value {
    font-size: 2rem;
    font-weight: 700;
    color: var(--neutral-dark);
  }

  .stat-change {
    font-size: 0.75rem;
    color: var(--neutral);
  }

  .stat-change.positive {
    color: var(--success);
  }

  /* ===== DASHBOARD GRID ===== */
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.5rem;
  }

  .dashboard-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-sm);
    overflow: hidden;
  }

  .card-header {
    padding: 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-title {
    font-size: 1.25rem;
    font-weight: 600;
  }

  .card-action {
    background: none;
    border: none;
    color: var(--primary);
    font-weight: 600;
    cursor: pointer;
    transition: color var(--transition);
  }

  .card-action:hover {
    color: var(--primary-dark);
  }

  .card-body {
    padding: 1.5rem;
  }

  /* ===== PROGRESS CARD ===== */
  .progress-item {
    margin-bottom: 1.5rem;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .progress-label {
    font-weight: 500;
  }

  .progress-percent {
    color: var(--primary);
    font-weight: 600;
  }

  .progress-bar {
    height: 8px;
    background: var(--neutral-light);
    border-radius: var(--radius-md);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--primary);
    transition: width 1s ease;
  }

  /* ===== MOUNTAIN CARD ===== */
  .mini-mountain {
    display: flex;
    flex-direction: column-reverse;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .mountain-level {
    padding: 1rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    position: relative;
  }

  .mountain-level.current {
    background: linear-gradient(
      135deg,
      var(--primary) 0%,
      var(--primary-dark) 100%
    );
    color: var(--white);
    font-weight: 600;
  }

  .climber-icon {
    position: absolute;
    right: 1rem;
    font-size: 1.5rem;
  }

  .level-info {
    padding: 1rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    text-align: center;
  }

  /* ===== ACTIVITY CARD ===== */
  .activity-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .activity-item {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .activity-icon {
    font-size: 1.5rem;
  }

  .activity-content {
    flex: 1;
  }

  .activity-title {
    font-weight: 500;
    margin-bottom: 0.25rem;
  }

  .activity-time {
    font-size: 0.875rem;
    color: var(--neutral);
  }

  .activity-points {
    color: var(--success);
    font-weight: 600;
  }

  /* ===== QUICK ACTIONS ===== */
  .quick-actions-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1rem;
  }

  .quick-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.75rem;
    padding: 1.5rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    text-decoration: none;
    color: var(--neutral-dark);
    transition: all var(--transition);
  }

  .quick-action:hover {
    background: var(--primary);
    color: var(--white);
    transform: translateY(-3px);
  }

  .action-icon {
    font-size: 2.5rem;
  }

  .action-label {
    font-weight: 600;
  }

  /* ===== NOTIFICATION PANEL ===== */
  .notification-panel {
    position: fixed;
    top: var(--topbar-height);
    right: 2rem;
    width: 350px;
    background: #ffffff;
    border: 2px solid #000000;
    border-radius: var(--radius-xl);
    box-shadow: var(--shadow-lg);
    z-index: 1000;
    overflow: hidden;
  }

  .notification-header {
    padding: 1rem 1.5rem;
    border-bottom: 2px solid #000000;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #ffffff;
  }

  .notification-header h3 {
    color: #000000;
    font-weight: 700;
  }

  .close-notif-btn {
    background: none;
    border: none;
    font-size: 1.5rem;
    cursor: pointer;
    color: #000000;
    opacity: 0.7;
  }

  .close-notif-btn:hover {
    opacity: 1;
  }

  .notification-list {
    max-height: 400px;
    overflow-y: auto;
    background: #ffffff;
    position: relative;
  }

  .notification-item {
    display: flex;
    gap: 1rem;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid #e5e7eb;
    cursor: pointer;
    transition: background var(--transition);
    background: #ffffff;
    color: #000000;
  }

  .notification-item:hover {
    background: #f9fafb;
  }

  .notification-item.unread {
    background: #ffffff;
    border-left: 3px solid #000000;
  }

  .notif-title {
    font-weight: 700;
    margin-bottom: 0.25rem;
    color: #000000;
  }

  .notif-text {
    font-size: 0.875rem;
    color: #1f2937;
    margin-bottom: 0.25rem;
  }

  .notif-time {
    font-size: 0.75rem;
    color: #6b7280;
  }

  /* ===== FLOWER FALLING ANIMATION ===== */
  .flower-container {
    position: fixed;
    top: var(--topbar-height);
    right: 2rem;
    width: 350px;
    height: 400px;
    pointer-events: none;
    z-index: 999;
    overflow: hidden;
  }

  .flower {
    position: absolute;
    font-size: 1.5rem;
    animation: fall linear forwards;
    opacity: 0;
  }

  @keyframes fall {
    0% {
      top: -20px;
      opacity: 1;
      transform: translateX(0) rotate(0deg);
    }
    50% {
      opacity: 1;
    }
    100% {
      top: 400px;
      opacity: 0.3;
      transform: translateX(50px) rotate(360deg);
    }
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1024px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }

    .dashboard-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 768px) {
    #page-dashboard .topbar {
      padding: 0 1rem;
    }

    #page-dashboard .search-box {
      display: none;
    }

    #page-dashboard .stats-grid {
      grid-template-columns: 1fr;
    }

    #page-dashboard .welcome-section {
      flex-direction: column;
      text-align: center;
      gap: 1rem;
    }
  }
</style>
