<style>
  /* ===== DASHBOARD VARIABLES - Knowledge Studio ===== */
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #eff6ff;
    --secondary: #f59e0b;
    --success: #22c55e;
    --warning: #f97316;
    --error: #ef4444;
    --neutral: #64748b;
    --neutral-light: #f8fafc;
    --neutral-dark: #0f172a;
    --white: #ffffff;
    --border: #e2e8f0;
    --font-family: "Inter", -apple-system, sans-serif;
    --transition: 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
    --shadow-lg: 0 8px 24px rgba(15, 23, 42, 0.12);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  #page-dashboard {
    font-family: var(--font-family);
    background: var(--neutral-light);
    color: var(--neutral-dark);
    min-height: 100vh;
    font-size: 0.9375rem;
  }

  /* ===== DASHBOARD LAYOUT ===== */
  .dashboard-main-content {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    width: 100%;
  }

  .content-area {
    padding: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  /* ===== HEADER SECTION ===== */
  .dashboard-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 2rem;
    background: linear-gradient(135deg, #0b1220 0%, #0b2a6f 45%, #2563eb 100%);
    border-radius: var(--radius-xl);
    margin-bottom: 1.5rem;
    color: var(--white);
  }

  .header-left {
    flex: 1;
  }

  .header-greeting {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.375rem;
  }

  .header-subtitle {
    font-size: 0.9375rem;
    opacity: 0.9;
  }

  .header-subtitle strong {
    color: #a3e635;
    font-weight: 600;
  }

  .header-stats {
    display: flex;
    gap: 1rem;
  }

  .header-stat {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.875rem 1.25rem;
    background: rgba(255, 255, 255, 0.1);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
  }

  .header-stat .stat-icon {
    font-size: 1.5rem;
  }

  .header-stat .stat-info {
    display: flex;
    flex-direction: column;
  }

  .header-stat .stat-label {
    font-size: 0.75rem;
    opacity: 0.8;
    margin-bottom: 0.125rem;
  }

  .header-stat .stat-value {
    font-size: 1rem;
    font-weight: 700;
  }

  .stat-status {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.5rem;
    border-radius: 9999px;
    background: rgba(255, 255, 255, 0.2);
    margin-left: 0.5rem;
  }

  .stat-status.achieved {
    background: rgba(34, 197, 94, 0.3);
    color: #86efac;
  }

  /* ===== SECTION STYLES ===== */
  .dashboard-section {
    margin-bottom: 1.5rem;
  }

  .section-header {
    margin-bottom: 1rem;
  }

  .section-title {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--neutral-dark);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title svg {
    stroke: var(--primary);
  }

  /* ===== TOPIC CARDS GRID ===== */
  .topic-cards-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1.25rem;
  }

  .topic-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 1.25rem;
    border: 2px solid var(--border);
    transition: all var(--transition);
    position: relative;
  }

  .topic-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
    border-color: var(--primary);
  }

  .topic-card.today {
    border-color: var(--primary);
  }

  .topic-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.875rem;
  }

  .topic-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--neutral-dark);
    margin-bottom: 0.375rem;
  }

  .topic-tags {
    display: flex;
    gap: 0.375rem;
    flex-wrap: wrap;
  }

  .topic-tag {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
    background: var(--primary-light);
    color: var(--primary);
  }

  .topic-tag.matching {
    background: #fef3c7;
    color: #d97706;
  }

  .topic-tag.code {
    background: #f3e8ff;
    color: #9333ea;
  }

  .today-chip {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.625rem;
    border-radius: 9999px;
    background: var(--primary);
    color: var(--white);
  }

  .topic-progress {
    margin-bottom: 0.875rem;
  }

  .topic-progress-bar {
    height: 6px;
    background: var(--neutral-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .topic-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, #60a5fa 100%);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .topic-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--neutral);
    margin-bottom: 1rem;
  }

  .topic-result {
    font-weight: 500;
    color: var(--success);
  }

  .topic-actions {
    display: flex;
    gap: 0.5rem;
  }

  .topic-btn {
    flex: 1;
    padding: 0.625rem 1rem;
    border-radius: var(--radius-md);
    font-size: 0.8125rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    border: none;
  }

  .topic-btn-primary {
    background: var(--primary);
    color: var(--white);
  }

  .topic-btn-primary:hover {
    background: var(--primary-dark);
  }

  .topic-btn-secondary {
    background: var(--neutral-light);
    color: var(--neutral-dark);
    opacity: 0;
    transition: opacity var(--transition);
  }

  .topic-card:hover .topic-btn-secondary {
    opacity: 1;
  }

  .topic-btn-secondary:hover {
    background: var(--border);
  }

  /* ===== TWO COLUMN GRID ===== */
  .dashboard-two-col {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .dashboard-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--neutral-dark);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .card-title svg {
    stroke: var(--primary);
  }

  .card-body {
    padding: 1.25rem;
  }

  /* ===== PROGRESS SECTION ===== */
  .progress-item {
    margin-bottom: 1.25rem;
  }

  .progress-item:last-child {
    margin-bottom: 0;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .progress-label {
    font-weight: 500;
    font-size: 0.875rem;
    color: var(--neutral-dark);
  }

  .progress-status {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
  }

  .progress-status.strong {
    background: #dcfce7;
    color: #16a34a;
  }

  .progress-status.improving {
    background: #fef3c7;
    color: #d97706;
  }

  .progress-status.needs-work {
    background: #fee2e2;
    color: #dc2626;
  }

  .progress-bar {
    height: 8px;
    background: var(--neutral-light);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, #60a5fa 100%);
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  /* ===== KPI SECTION ===== */
  .kpi-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .kpi-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    background: var(--neutral-light);
    border-radius: var(--radius-md);
  }

  .kpi-label {
    font-size: 0.875rem;
    color: var(--neutral);
  }

  .kpi-value {
    font-size: 1rem;
    font-weight: 700;
    color: var(--neutral-dark);
  }

  /* ===== ROADMAP SECTION ===== */
  .roadmap-stages {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0;
  }

  .roadmap-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    flex: 1;
    max-width: 140px;
  }

  .stage-indicator {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.75rem;
    background: var(--neutral-light);
    border: 2px solid var(--border);
    transition: all var(--transition);
  }

  .roadmap-stage.completed .stage-indicator {
    background: var(--success);
    border-color: var(--success);
    color: var(--white);
  }

  .roadmap-stage.current .stage-indicator {
    background: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
  }

  .roadmap-stage.current .stage-dot {
    width: 12px;
    height: 12px;
    background: var(--white);
    border-radius: 50%;
  }

  .roadmap-stage.locked .stage-indicator {
    background: var(--neutral-light);
    color: var(--neutral);
  }

  .stage-content {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .stage-number {
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--neutral);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .stage-name {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--neutral-dark);
  }

  .roadmap-stage.locked .stage-name {
    color: var(--neutral);
  }

  .stage-badge {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
    background: var(--primary-light);
    color: var(--primary);
    margin-top: 0.25rem;
  }

  .roadmap-connector {
    flex: 1;
    height: 2px;
    background: var(--border);
    margin: 0 0.5rem;
    margin-bottom: 60px;
  }

  .roadmap-connector.completed {
    background: var(--success);
  }

  .roadmap-connector.current {
    background: linear-gradient(90deg, var(--success) 0%, var(--primary) 100%);
  }

  /* ===== LOADING & EMPTY STATES ===== */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 3rem;
    color: var(--neutral);
    font-size: 0.875rem;
  }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .empty-state {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--neutral);
  }

  .empty-state-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  .empty-state-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
  }

  .empty-state-text {
    font-size: 0.875rem;
    max-width: 300px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1200px) {
    .topic-cards-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 992px) {
    .dashboard-two-col {
      grid-template-columns: 1fr;
    }

    .roadmap-stages {
      flex-wrap: wrap;
      gap: 1rem;
    }

    .roadmap-connector {
      display: none;
    }

    .roadmap-stage {
      flex: 0 0 calc(33.33% - 0.67rem);
      max-width: none;
    }
  }

  @media (max-width: 768px) {
    .content-area {
      padding: 1rem;
    }

    .dashboard-header {
      flex-direction: column;
      text-align: center;
      gap: 1.25rem;
      padding: 1.5rem;
    }

    .header-stats {
      flex-direction: column;
      width: 100%;
    }

    .header-stat {
      justify-content: center;
    }

    .topic-cards-grid {
      grid-template-columns: 1fr;
    }

    .roadmap-stage {
      flex: 0 0 50%;
    }
  }
</style>
