<style>
  /* ===== DASHBOARD VARIABLES ===== */
  :root {
    --primary: #5b6ff8;
    --primary-dark: #4a5ee7;
    --primary-light: #eef1ff;
    --secondary: #ffb020;
    --success: #2fa36b;
    --error: #dc2626;
    --neutral: #718096;
    --neutral-light: #f5f6fa;
    --neutral-dark: #1a202c;
    --white: #ffffff;
    --border: #e6e8f0;
    --font-family: "Inter", -apple-system, sans-serif;
    --transition: 0.2s ease;
    --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
    --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.08);
    --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.12);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  #page-dashboard {
    font-family: var(--font-family);
    background: var(--neutral-light);
    color: var(--neutral-dark);
    min-height: 100vh;
    font-size: 0.9375rem;
  }

  /* ===== DASHBOARD LAYOUT ===== */
  .dashboard-main-content {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    width: 100%;
  }

  /* ===== CONTENT AREA ===== */
  .content-area {
    padding: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  /* ===== WELCOME SECTION ===== */
  .welcome-section {
    background: linear-gradient(135deg, var(--primary) 0%, #7b6cf6 100%);
    color: var(--white);
    padding: 1.75rem 2rem;
    border-radius: var(--radius-xl);
    margin-bottom: 1.5rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 8px 24px rgba(91, 111, 248, 0.25);
  }

  .welcome-title {
    font-size: 1.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
  }

  .welcome-text {
    opacity: 0.9;
    font-size: 0.9375rem;
    max-width: 500px;
  }

  .streak-badge {
    display: flex;
    align-items: center;
    gap: 1rem;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(10px);
    padding: 1.25rem 1.5rem;
    border-radius: var(--radius-xl);
    border: 1px solid rgba(255, 255, 255, 0.2);
  }

  .streak-icon {
    width: 48px;
    height: 48px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .streak-icon svg {
    stroke: #ff6b35;
  }

  .streak-number {
    font-size: 2rem;
    font-weight: 700;
    line-height: 1;
  }

  .streak-label {
    font-size: 0.8125rem;
    opacity: 0.9;
  }

  /* ===== STATS GRID ===== */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--white);
    padding: 1.25rem;
    border-radius: var(--radius-xl);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: all var(--transition);
  }

  .stat-card:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-md);
    border-color: var(--primary);
  }

  .stat-icon-wrapper {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .stat-icon-topics {
    background: #eef1ff;
    color: #5b6ff8;
  }

  .stat-icon-completed {
    background: #e8f7ee;
    color: #2fa36b;
  }

  .stat-icon-score {
    background: #fff4e5;
    color: #ffb020;
  }

  .stat-icon-rank {
    background: #f3e8ff;
    color: #9333ea;
  }

  .stat-content {
    flex: 1;
  }

  .stat-label {
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--neutral);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    margin-bottom: 0.25rem;
  }

  .stat-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--neutral-dark);
    line-height: 1.2;
  }

  .stat-change {
    font-size: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.25rem;
    margin-top: 0.25rem;
  }

  .stat-change.positive {
    color: var(--success);
  }

  .stat-change.negative {
    color: var(--error);
  }

  /* ===== DASHBOARD GRID ===== */
  .dashboard-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 1.25rem;
  }

  .dashboard-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--neutral-dark);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .card-action {
    background: none;
    border: none;
    color: var(--primary);
    font-weight: 600;
    font-size: 0.8125rem;
    cursor: pointer;
    transition: color var(--transition);
    padding: 0.375rem 0.75rem;
    border-radius: var(--radius-md);
  }

  .card-action:hover {
    background: var(--primary-light);
    color: var(--primary-dark);
  }

  .card-body {
    padding: 1.25rem;
  }

  /* ===== PROGRESS CARD ===== */
  .progress-item {
    margin-bottom: 1rem;
  }

  .progress-item:last-child {
    margin-bottom: 0;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 0.5rem;
  }

  .progress-label {
    font-weight: 500;
    font-size: 0.875rem;
    color: var(--neutral-dark);
  }

  .progress-percent {
    color: var(--primary);
    font-weight: 600;
    font-size: 0.875rem;
  }

  .progress-bar {
    height: 8px;
    background: var(--neutral-light);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, #7c8cfb 100%);
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  .progress-loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 2rem;
    color: var(--neutral);
    font-size: 0.875rem;
  }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  /* ===== MOUNTAIN CARD ===== */
  .mini-mountain {
    display: flex;
    flex-direction: column-reverse;
    gap: 0.5rem;
  }

  .mountain-level {
    padding: 0.875rem 1rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    position: relative;
    font-size: 0.875rem;
    transition: all var(--transition);
  }

  .mountain-level:hover {
    background: #e6e8f0;
  }

  .mountain-level.current {
    background: linear-gradient(135deg, var(--primary) 0%, #7b6cf6 100%);
    color: var(--white);
    font-weight: 600;
  }

  .level-number {
    width: 24px;
    height: 24px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.75rem;
  }

  .mountain-level:not(.current) .level-number {
    background: var(--white);
    color: var(--neutral);
  }

  .climber-icon {
    position: absolute;
    right: 1rem;
    display: flex;
    align-items: center;
  }

  /* ===== ACTIVITY CARD ===== */
  .activity-list {
    display: flex;
    flex-direction: column;
    gap: 0.875rem;
  }

  .activity-item {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 0.75rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    transition: all var(--transition);
  }

  .activity-item:hover {
    background: #e6e8f0;
  }

  .activity-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .activity-icon.quiz {
    background: #eef1ff;
    color: #5b6ff8;
  }

  .activity-icon.lesson {
    background: #e8f7ee;
    color: #2fa36b;
  }

  .activity-icon.game {
    background: #fff4e5;
    color: #ffb020;
  }

  .activity-content {
    flex: 1;
    min-width: 0;
  }

  .activity-title {
    font-weight: 500;
    font-size: 0.8125rem;
    color: var(--neutral-dark);
    margin-bottom: 0.125rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .activity-time {
    font-size: 0.75rem;
    color: var(--neutral);
  }

  .activity-points {
    color: var(--success);
    font-weight: 600;
    font-size: 0.8125rem;
    white-space: nowrap;
  }

  /* ===== QUICK ACTIONS ===== */
  .quick-actions-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 0.875rem;
  }

  .quick-action {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.625rem;
    padding: 1.25rem;
    background: var(--neutral-light);
    border-radius: var(--radius-lg);
    text-decoration: none;
    color: var(--neutral-dark);
    transition: all var(--transition);
    border: 1px solid transparent;
  }

  .quick-action:hover {
    background: var(--primary);
    color: var(--white);
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(91, 111, 248, 0.3);
  }

  .action-icon {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--white);
    border-radius: 12px;
    transition: all var(--transition);
  }

  .quick-action:hover .action-icon {
    background: rgba(255, 255, 255, 0.2);
  }

  .action-label {
    font-weight: 600;
    font-size: 0.875rem;
  }

  /* ===== EMPTY STATE ===== */
  .empty-state {
    text-align: center;
    padding: 2rem;
    color: var(--neutral);
  }

  .empty-state svg {
    margin-bottom: 0.75rem;
    opacity: 0.5;
  }

  .empty-state p {
    font-size: 0.875rem;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1200px) {
    .stats-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 768px) {
    .content-area {
      padding: 1rem;
    }

    .stats-grid {
      grid-template-columns: 1fr;
    }

    .dashboard-grid {
      grid-template-columns: 1fr;
    }

    .welcome-section {
      flex-direction: column;
      text-align: center;
      gap: 1rem;
      padding: 1.5rem;
    }

    .welcome-title {
      font-size: 1.25rem;
    }

    .streak-badge {
      width: 100%;
      justify-content: center;
    }

    .quick-actions-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
