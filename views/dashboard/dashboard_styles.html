<style>
  /* ===== DASHBOARD VARIABLES - Knowledge Studio ===== */
  :root {
    --primary: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-light: #eff6ff;
    --secondary: #f59e0b;
    --success: #22c55e;
    --warning: #f97316;
    --error: #ef4444;
    --neutral: #64748b;
    --neutral-light: #f8fafc;
    --neutral-dark: #0f172a;
    --white: #ffffff;
    --border: #e2e8f0;
    --font-family: "Inter", -apple-system, sans-serif;
    --transition: 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
    --shadow-sm: 0 1px 3px rgba(15, 23, 42, 0.04);
    --shadow-md: 0 4px 12px rgba(15, 23, 42, 0.08);
    --shadow-lg: 0 8px 24px rgba(15, 23, 42, 0.12);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
  }

  #page-dashboard {
    font-family: var(--font-family);
    background: var(--neutral-light);
    color: var(--neutral-dark);
    min-height: 100vh;
    font-size: 0.9375rem;
  }

  /* ===== DASHBOARD LAYOUT ===== */
  .dashboard-main-content {
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    width: 100%;
  }

  .content-area {
    padding: 1.5rem;
    max-width: 1400px;
    margin: 0 auto;
    width: 100%;
  }

  /* ===== HEADER SECTION - GALAXY THEME ===== */
  .dashboard-header {
    position: relative;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 2rem 2.5rem;
    background: linear-gradient(
      135deg,
      #030014 0%,
      #0a0520 30%,
      #1a0a3e 60%,
      #0d1b4c 100%
    );
    border-radius: var(--radius-xl);
    margin-bottom: 1.5rem;
    color: var(--white);
    overflow: hidden;
    min-height: 120px;
  }

  /* Galaxy Background Effects */
  .header-galaxy-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .header-stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(
        1px 1px at 20% 30%,
        rgba(255, 255, 255, 0.8) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 40% 70%,
        rgba(168, 216, 255, 0.7) 100%,
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.9) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 80% 50%,
        rgba(201, 168, 255, 0.6) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 60%,
        rgba(255, 255, 255, 0.5) 100%,
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 90% 80%,
        rgba(168, 216, 255, 0.7) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 50% 90%,
        rgba(255, 255, 255, 0.6) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 30% 10%,
        rgba(201, 168, 255, 0.5) 100%,
        transparent
      );
    background-size: 200px 100px;
    animation: headerTwinkle 4s ease-in-out infinite;
    transition: transform 0.3s ease-out;
  }

  @keyframes headerTwinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  .header-nebula {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(
        ellipse 80% 60% at 20% 40%,
        rgba(255, 100, 150, 0.12),
        transparent
      ),
      radial-gradient(
        ellipse 60% 50% at 80% 60%,
        rgba(100, 150, 255, 0.1),
        transparent
      );
    filter: blur(20px);
  }

  /* Header Meteor Effect */
  .header-meteor-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .header-meteor {
    position: absolute;
    width: 2px;
    height: 50px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(168, 216, 255, 0.5),
      rgba(255, 255, 255, 0.9)
    );
    border-radius: 50%;
    transform: rotate(45deg);
    opacity: 0;
    animation: headerMeteorFall 1s ease-in forwards;
  }

  .header-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -1.5px;
    width: 5px;
    height: 5px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px rgba(168, 216, 255, 0.7);
  }

  @keyframes headerMeteorFall {
    0% {
      opacity: 0;
      transform: rotate(45deg) translate(0, 0);
    }
    15% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(45deg) translate(300px, 300px);
    }
  }

  .header-left {
    flex: 1;
    position: relative;
    z-index: 1;
  }

  .header-greeting {
    font-size: 1.625rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  }

  .header-subtitle {
    font-size: 0.9375rem;
    opacity: 0.9;
  }

  .header-subtitle strong {
    color: #a3e635;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(163, 230, 53, 0.5);
  }

  .header-stats {
    display: flex;
    gap: 1.25rem;
    position: relative;
    z-index: 1;
  }

  .header-stat {
    display: flex;
    align-items: center;
    gap: 0.875rem;
    padding: 1rem 1.5rem;
    background: rgba(255, 255, 255, 0.08);
    border-radius: var(--radius-lg);
    border: 1px solid rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px);
    transition: all 0.3s ease;
  }

  .header-stat.glow-stat {
    position: relative;
  }

  .header-stat.glow-stat::before {
    content: "";
    position: absolute;
    inset: -2px;
    border-radius: calc(var(--radius-lg) + 2px);
    background: linear-gradient(
      135deg,
      rgba(255, 100, 50, 0.3),
      rgba(100, 150, 255, 0.2)
    );
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .header-stat.glow-stat:hover::before {
    opacity: 1;
  }

  .stat-icon-wrapper {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.1);
    position: relative;
  }

  .stat-icon-wrapper.fire-glow {
    background: linear-gradient(
      135deg,
      rgba(255, 100, 50, 0.3),
      rgba(255, 150, 50, 0.2)
    );
    box-shadow: 0 0 20px rgba(255, 100, 50, 0.3);
    animation: fireGlow 2s ease-in-out infinite;
  }

  @keyframes fireGlow {
    0%,
    100% {
      box-shadow: 0 0 15px rgba(255, 100, 50, 0.3);
    }
    50% {
      box-shadow:
        0 0 25px rgba(255, 100, 50, 0.5),
        0 0 40px rgba(255, 150, 50, 0.2);
    }
  }

  .stat-icon-wrapper.time-glow {
    background: linear-gradient(
      135deg,
      rgba(100, 150, 255, 0.3),
      rgba(150, 100, 255, 0.2)
    );
    box-shadow: 0 0 20px rgba(100, 150, 255, 0.3);
    animation: timeGlow 2s ease-in-out infinite 0.5s;
  }

  @keyframes timeGlow {
    0%,
    100% {
      box-shadow: 0 0 15px rgba(100, 150, 255, 0.3);
    }
    50% {
      box-shadow:
        0 0 25px rgba(100, 150, 255, 0.5),
        0 0 40px rgba(150, 100, 255, 0.2);
    }
  }

  .header-stat .stat-icon {
    font-size: 1.75rem;
  }

  .header-stat .stat-info {
    display: flex;
    flex-direction: column;
  }

  .header-stat .stat-label {
    font-size: 0.6875rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    opacity: 0.8;
    margin-bottom: 0.25rem;
    text-transform: uppercase;
  }

  .header-stat .stat-value {
    font-size: 1rem;
    font-weight: 700;
  }

  .header-stat .stat-value-large {
    font-size: 1.25rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ffffff 0%, #a8d8ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stat-status {
    font-size: 0.6875rem;
    font-weight: 700;
    padding: 0.375rem 0.75rem;
    border-radius: 9999px;
    background: rgba(255, 255, 255, 0.15);
    margin-left: 0.5rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .stat-status.achieved {
    background: linear-gradient(
      135deg,
      rgba(34, 197, 94, 0.4),
      rgba(163, 230, 53, 0.3)
    );
    color: #86efac;
    border-color: rgba(134, 239, 172, 0.4);
    box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
    animation: achievedPulse 2s ease-in-out infinite;
  }

  @keyframes achievedPulse {
    0%,
    100% {
      box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
    }
    50% {
      box-shadow:
        0 0 20px rgba(34, 197, 94, 0.5),
        0 0 30px rgba(163, 230, 53, 0.2);
    }
  }

  /* ===== SECTION STYLES ===== */
  .dashboard-section {
    margin-bottom: 1.5rem;
  }

  .section-header {
    margin-bottom: 1rem;
  }

  .section-title {
    font-size: 1.125rem;
    font-weight: 600;
    color: var(--neutral-dark);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .section-title svg {
    stroke: var(--primary);
  }

  /* ===== TOPIC CARDS GRID ===== */
  .topic-cards-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
  }

  .topic-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    padding: 1.25rem;
    border: 2px solid var(--border);
    transition: all var(--transition);
    position: relative;
  }

  .topic-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-md);
    border-color: var(--primary);
  }

  .topic-card.today {
    border-color: var(--primary);
    background: linear-gradient(
      135deg,
      rgba(37, 99, 235, 0.03),
      rgba(37, 99, 235, 0.08)
    );
  }

  /* Topic tag styles */
  .topic-tag.view {
    background: rgba(100, 116, 139, 0.1);
    color: #64748b;
  }

  .topic-tag.quiz {
    background: rgba(34, 197, 94, 0.1);
    color: #22c55e;
  }

  .topic-tag.matching {
    background: rgba(168, 85, 247, 0.1);
    color: #a855f7;
  }

  .topic-card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 0.875rem;
  }

  .topic-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--neutral-dark);
    margin-bottom: 0.375rem;
  }

  .topic-tags {
    display: flex;
    gap: 0.375rem;
    flex-wrap: wrap;
  }

  .topic-tag {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
    background: var(--primary-light);
    color: var(--primary);
  }

  .topic-tag.matching {
    background: #fef3c7;
    color: #d97706;
  }

  .topic-tag.code {
    background: #f3e8ff;
    color: #9333ea;
  }

  .today-chip {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.625rem;
    border-radius: 9999px;
    background: var(--primary);
    color: var(--white);
  }

  .topic-progress {
    margin-bottom: 0.875rem;
  }

  .topic-progress-bar {
    height: 6px;
    background: var(--neutral-light);
    border-radius: 3px;
    overflow: hidden;
  }

  .topic-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, #60a5fa 100%);
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  .topic-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--neutral);
    margin-bottom: 1rem;
  }

  .topic-result {
    font-weight: 500;
    color: var(--success);
  }

  .topic-actions {
    display: flex;
    gap: 0.5rem;
  }

  .topic-btn {
    flex: 1;
    padding: 0.625rem 1rem;
    border-radius: var(--radius-md);
    font-size: 0.8125rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition);
    border: none;
  }

  .topic-btn-primary {
    background: var(--primary);
    color: var(--white);
  }

  .topic-btn-primary:hover {
    background: var(--primary-dark);
  }

  .topic-btn-secondary {
    background: var(--neutral-light);
    color: var(--neutral-dark);
    opacity: 0;
    transition: opacity var(--transition);
  }

  .topic-card:hover .topic-btn-secondary {
    opacity: 1;
  }

  .topic-btn-secondary:hover {
    background: var(--border);
  }

  /* ===== TWO COLUMN GRID ===== */
  .dashboard-two-col {
    display: grid;
    grid-template-columns: 1.5fr 1fr;
    gap: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .dashboard-card {
    background: var(--white);
    border-radius: var(--radius-xl);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .card-header {
    padding: 1rem 1.25rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--neutral-dark);
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .card-title svg {
    stroke: var(--primary);
  }

  .card-body {
    padding: 1.25rem;
  }

  /* ===== PROGRESS SECTION ===== */
  .progress-item {
    margin-bottom: 1.25rem;
  }

  .progress-item:last-child {
    margin-bottom: 0;
  }

  .progress-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0.5rem;
  }

  .progress-label {
    font-weight: 500;
    font-size: 0.875rem;
    color: var(--neutral-dark);
  }

  .progress-status {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
  }

  .progress-status.strong {
    background: #dcfce7;
    color: #16a34a;
  }

  .progress-status.improving {
    background: #fef3c7;
    color: #d97706;
  }

  .progress-status.needs-work {
    background: #fee2e2;
    color: #dc2626;
  }

  .progress-bar {
    height: 8px;
    background: var(--neutral-light);
    border-radius: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--primary) 0%, #60a5fa 100%);
    border-radius: 4px;
    transition: width 0.8s ease;
  }

  /* ===== KPI SECTION ===== */
  .kpi-list {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .kpi-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.75rem 1rem;
    background: var(--neutral-light);
    border-radius: var(--radius-md);
  }

  .kpi-label {
    font-size: 0.875rem;
    color: var(--neutral);
  }

  .kpi-value {
    font-size: 1rem;
    font-weight: 700;
    color: var(--neutral-dark);
  }

  /* ===== ROADMAP SECTION ===== */
  .roadmap-stages {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.5rem 0;
  }

  .roadmap-stage {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    flex: 1;
    max-width: 140px;
  }

  .stage-indicator {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 0.75rem;
    background: var(--neutral-light);
    border: 2px solid var(--border);
    transition: all var(--transition);
  }

  .roadmap-stage.completed .stage-indicator {
    background: var(--success);
    border-color: var(--success);
    color: var(--white);
  }

  .roadmap-stage.current .stage-indicator {
    background: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.2);
  }

  .roadmap-stage.current .stage-dot {
    width: 12px;
    height: 12px;
    background: var(--white);
    border-radius: 50%;
  }

  .roadmap-stage.locked .stage-indicator {
    background: var(--neutral-light);
    color: var(--neutral);
  }

  .stage-content {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .stage-number {
    font-size: 0.6875rem;
    font-weight: 600;
    color: var(--neutral);
    text-transform: uppercase;
    letter-spacing: 0.03em;
  }

  .stage-name {
    font-size: 0.8125rem;
    font-weight: 600;
    color: var(--neutral-dark);
  }

  .roadmap-stage.locked .stage-name {
    color: var(--neutral);
  }

  .stage-badge {
    font-size: 0.6875rem;
    font-weight: 600;
    padding: 0.25rem 0.5rem;
    border-radius: 6px;
    background: var(--primary-light);
    color: var(--primary);
    margin-top: 0.25rem;
  }

  .roadmap-connector {
    flex: 1;
    height: 2px;
    background: var(--border);
    margin: 0 0.5rem;
    margin-bottom: 60px;
  }

  .roadmap-connector.completed {
    background: var(--success);
  }

  .roadmap-connector.current {
    background: linear-gradient(90deg, var(--success) 0%, var(--primary) 100%);
  }

  /* ===== LOADING & EMPTY STATES ===== */
  .loading-state {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 3rem;
    color: var(--neutral);
    font-size: 0.875rem;
  }

  .loading-spinner {
    width: 20px;
    height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  .empty-state {
    text-align: center;
    padding: 3rem 2rem;
    color: var(--neutral);
  }

  .empty-state-icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }

  .empty-state-title {
    font-size: 1rem;
    font-weight: 600;
    color: var(--neutral-dark);
    margin-bottom: 0.5rem;
  }

  .empty-state-text {
    font-size: 0.875rem;
    max-width: 300px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 1200px) {
    .topic-cards-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }

  @media (max-width: 992px) {
    .dashboard-two-col {
      grid-template-columns: 1fr;
    }

    .roadmap-stages {
      flex-wrap: wrap;
      gap: 1rem;
    }

    .roadmap-connector {
      display: none;
    }

    .roadmap-stage {
      flex: 0 0 calc(33.33% - 0.67rem);
      max-width: none;
    }
  }

  @media (max-width: 768px) {
    .content-area {
      padding: 1rem;
    }

    .dashboard-header {
      flex-direction: column;
      text-align: center;
      gap: 1.25rem;
      padding: 1.5rem;
    }

    .header-stats {
      flex-direction: column;
      width: 100%;
    }

    .header-stat {
      justify-content: center;
    }

    .topic-cards-grid {
      grid-template-columns: 1fr;
    }

    .roadmap-stage {
      flex: 0 0 50%;
    }
  }
</style>
