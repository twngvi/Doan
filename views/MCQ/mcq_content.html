<div
  class="min-h-screen bg-gradient-to-br from-blue-50 via-purple-50 to-pink-50"
>
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <!-- Back Button -->
    <button
      onclick="backFromQuiz()"
      class="mb-6 flex items-center text-gray-600 hover:text-gray-900 transition-colors"
    >
      <svg
        class="w-5 h-5 mr-2"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M15 19l-7-7 7-7"
        />
      </svg>
      <span id="mcq-back-text">Quay lại</span>
    </button>

    <!-- Quiz Header -->
    <div
      class="card mb-8 bg-gradient-to-r from-blue-500 to-indigo-600 text-white"
    >
      <div class="flex items-center justify-between">
        <div>
          <h1 id="mcq-topic-title" class="text-3xl font-bold mb-2">
            Loading...
          </h1>
          <p class="opacity-90">❓ Kiểm tra kiến thức</p>
        </div>
        <div class="text-6xl">🎯</div>
      </div>
    </div>

    <!-- Quiz Progress -->
    <div class="card mb-6">
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-4">
          <div>
            <span class="text-sm text-gray-600">Câu hỏi</span>
            <p class="text-2xl font-bold text-gray-900">
              <span id="current-question">1</span>/
              <span id="total-questions">10</span>
            </p>
          </div>
          <div class="h-12 w-px bg-gray-300"></div>
          <div>
            <span class="text-sm text-gray-600">Điểm</span>
            <p class="text-2xl font-bold text-green-600" id="current-score">
              0
            </p>
          </div>
        </div>
        <div>
          <span class="text-sm text-gray-600">Thời gian</span>
          <p class="text-2xl font-bold text-blue-600" id="quiz-timer">00:00</p>
        </div>
      </div>
    </div>

    <!-- Quiz Content -->
    <div id="quiz-section" class="card">
      <h2 class="text-2xl font-bold text-gray-900 mb-4">
        ❓ Câu hỏi trắc nghiệm
      </h2>
      <p class="text-gray-600">Quiz content - Coming soon...</p>
      <div class="mt-6 space-y-3">
        <button
          class="w-full text-left p-4 border-2 border-gray-300 rounded-lg hover:border-blue-500 transition-colors"
        >
          A. Đáp án A
        </button>
        <button
          class="w-full text-left p-4 border-2 border-gray-300 rounded-lg hover:border-blue-500 transition-colors"
        >
          B. Đáp án B
        </button>
        <button
          class="w-full text-left p-4 border-2 border-gray-300 rounded-lg hover:border-blue-500 transition-colors"
        >
          C. Đáp án C
        </button>
        <button
          class="w-full text-left p-4 border-2 border-gray-300 rounded-lg hover:border-blue-500 transition-colors"
        >
          D. Đáp án D
        </button>
      </div>
      <div class="mt-6 flex justify-end">
        <button class="btn-primary">Câu tiếp theo →</button>
      </div>
    </div>
  </div>
</div>
