<script>
  /**
   * MCQ Page Scripts - Full Implementation
   * Features:
   * - Topic selection screen
   * - AI-generated questions
   * - Save wrong answers for review
   * - Different question formats on retry
   */

  // ⭐ CACHE để tránh reload không cần thiết (giống Topics page)
  // Sử dụng global cache để chia sẻ với Topics page
  if (!window.globalTopicsCache) {
    window.globalTopicsCache = {
      data: null,
      progress: null,
      lastLoadTime: 0,
      cacheDuration: 60000, // Cache 1 phút
    };
  }

  // ⭐ QUIZ STATS CACHE - thống kê quiz theo từng topicId
  // Format: { topicId: { hasPlayed, bestScore, bestTotal, bestPercent, playCount, lastPlayedAt } }
  if (!window.quizStatsCache) {
    window.quizStatsCache = {
      stats: {},           // Map topicId -> stats
      lastLoadTime: 0,
      cacheDuration: 60000 // Cache 1 phút
    };
  }

  // Fallback local cache nếu cần
  let mcqTopicsCache = null;
  let mcqLastLoadTime = 0;
  const MCQ_CACHE_DURATION = 60000; // Cache 1 phút
  let mcqAllTopicsForSearch = null; // Store all topics for search

  // Search function for MCQ topics
  function searchMcqTopics(query) {
    if (!mcqAllTopicsForSearch) return;
    if (!query.trim()) {
      renderTopicsGrid(mcqAllTopicsForSearch);
      return;
    }
    const searchLower = query.toLowerCase();
    const filtered = mcqAllTopicsForSearch.filter((topic) =>
      topic.title.toLowerCase().includes(searchLower),
    );
    renderTopicsGrid(filtered);
  }
  window.searchMcqTopics = searchMcqTopics;

  // ========== QUIZ STATE ==========

  let quizState = {
    // Entry & topic
    entrySource: null,       // 'mcq' | 'lesson'
    selectedTopic: null,     // full topic object
    topicId: null,
    topicTitle: "",
    contentDocId: "",
    quizMode: "instant",     // 'instant' | 'review'

    // Questions & answers
    questions: [],            // all loaded questions (raw)
    filteredQuestions: [],     // questions after mastered filter
    allQuestionsOriginal: [],  // ⭐ Lưu tất cả câu hỏi gốc (không bị lọc) để dùng khi retake
    currentQuestionIndex: 0,
    userAnswers: [],
    answeredQuestions: [],
    wrongAnswers: [],
    retryQueue: [],
    masteredIds: [],
    score: 0,

    // Timer
    startTime: null,
    elapsedTime: 0,
    timerInterval: null,

    // Session
    quizSession: null,        // structured session object
    resumeSession: null,      // saved progress for resume
    savedProgress: null,      // raw saved progress data

    // UI state
    loading: false,
    error: null,
    isReviewing: false,
    allMastered: false,
    masteredCount: 0,
    autoAdvanceTimer: null,
    isLoadingTopic: false,
    allTopics: [],
  };

  // Legacy alias: gameMode ↔ quizMode
  Object.defineProperty(quizState, 'gameMode', {
    get() { return this.quizMode; },
    set(val) { this.quizMode = val; },
    enumerable: false,
  });

  // ========== 1. ENTRY POINT ==========

  /**
   * detectQuizEntrySource() — Xác định luồng truy cập
   * @returns {'lesson'|'mcq'}
   */
  function detectQuizEntrySource() {
    const params = window.currentPageParams;
    if (params && params.topicId && params.contentDocId) {
      return 'lesson';
    }
    return 'mcq';
  }

  /**
   * initMCQPage() — Entry point, gọi khi page-mcq được hiển thị
   */
  function initMCQPage() {
    console.log("🎯 Initializing MCQ Page...");
    resetQuizState();
    startMCQHeaderMeteors();
    setupMCQHeaderMouseEffect();

    const entrySource = detectQuizEntrySource();
    quizState.entrySource = entrySource;

    if (entrySource === 'lesson') {
      // Vào từ Lesson/Topics → bỏ qua chọn topic & mode, dùng instant
      const params = window.currentPageParams;
      quizState.topicId = params.topicId;
      quizState.topicTitle = params.topicTitle || "Quiz";
      quizState.contentDocId = params.contentDocId;
      quizState.selectedTopic = {
        topicId: params.topicId,
        title: params.topicTitle || "Quiz",
        contentDocId: params.contentDocId,
      };
      quizState.quizMode = "instant";

      console.log("📌 Entry from Lesson → instant mode, loading quiz directly");
      showQuizView();
      loadQuizData(false);
    } else {
      // Vào từ trang MCQ → cần chọn topic
      console.log("📋 Entry from MCQ → showing topic selection");
      showTopicSelection();
      loadAvailableTopics();
    }
  }

  /**
   * resetQuizState() — Reset toàn bộ state về giá trị ban đầu
   */
  function resetQuizState() {
    if (quizState.timerInterval) clearInterval(quizState.timerInterval);
    if (quizState.autoAdvanceTimer) clearTimeout(quizState.autoAdvanceTimer);

    quizState.entrySource = null;
    quizState.selectedTopic = null;
    quizState.topicId = null;
    quizState.topicTitle = "";
    quizState.contentDocId = "";
    quizState.quizMode = "instant";
    quizState.questions = [];
    quizState.filteredQuestions = [];
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = [];
    quizState.answeredQuestions = [];
    quizState.wrongAnswers = [];
    quizState.retryQueue = [];
    quizState.masteredIds = [];
    quizState.score = 0;
    quizState.startTime = null;
    quizState.elapsedTime = 0;
    quizState.timerInterval = null;
    quizState.quizSession = null;
    quizState.resumeSession = null;
    quizState.savedProgress = null;
    quizState.loading = false;
    quizState.error = null;
    quizState.isReviewing = false;
    quizState.allMastered = false;
    quizState.masteredCount = 0;
    quizState.autoAdvanceTimer = null;
    quizState.isLoadingTopic = false;
  }

  // ========== 2. VIEW SWITCHING ==========
  function showTopicSelection() {
    document.getElementById("mcq-topic-selection").style.display = "block";
    document.getElementById("mcq-quiz-view").style.display = "none";
  }

  /**
   * Show quiz view
   */
  function showQuizView() {
    document.getElementById("mcq-topic-selection").style.display = "none";
    document.getElementById("mcq-quiz-view").style.display = "block";
    document.getElementById("mcq-topic-title").textContent =
      quizState.topicTitle;
  }

  /**
   * Load topics for quiz selection - OPTIMIZED with cache
   * Ưu tiên: 1. Global cache (từ Topics page) → 2. Local cache → 3. Load từ server
   * ⭐ Kèm theo: Load quiz stats per topic để hiển thị badge "Đã chơi" + điểm cao nhất
   */
  function loadTopicsForQuiz(forceRefresh = false) {
    console.log("📥 Loading topics for quiz...");
    const now = Date.now();

    // ⭐ Load quiz stats từ server (song song với việc check cache)
    loadQuizStatsIfNeeded(forceRefresh);

    // ⭐ ƯU TIÊN 1: Kiểm tra Global Cache (chia sẻ từ Topics page)
    const globalCache = window.globalTopicsCache;
    if (
      !forceRefresh &&
      globalCache &&
      globalCache.data &&
      now - globalCache.lastLoadTime < globalCache.cacheDuration
    ) {
      console.log("✅ Using GLOBAL cached topics data (from Topics page)");
      quizState.allTopics = globalCache.data;
      mcqTopicsCache = globalCache.data; // Sync với local cache
      mcqLastLoadTime = globalCache.lastLoadTime;
      mcqAllTopicsForSearch = globalCache.data;

      document.getElementById("topics-loading").style.display = "none";

      if (globalCache.data.length === 0) {
        showEmptyTopicsState();
      } else {
        renderTopicsGrid(globalCache.data);
      }
      return;
    }

    // ⭐ ƯU TIÊN 2: Kiểm tra Local cache - nếu còn hiệu lực thì dùng
    if (
      !forceRefresh &&
      mcqTopicsCache &&
      now - mcqLastLoadTime < MCQ_CACHE_DURATION
    ) {
      console.log("✅ Using LOCAL cached MCQ topics data");
      quizState.allTopics = mcqTopicsCache;
      mcqAllTopicsForSearch = mcqTopicsCache;

      document.getElementById("topics-loading").style.display = "none";

      if (mcqTopicsCache.length === 0) {
        showEmptyTopicsState();
      } else {
        renderTopicsGrid(mcqTopicsCache);
      }
      return;
    }

    // ⭐ ƯU TIÊN 3: Load từ server
    // Show loading state
    document.getElementById("topics-loading").style.display = "block";
    document.getElementById("topics-grid").style.display = "none";
    document.getElementById("topics-empty").style.display = "none";

    google.script.run
      .withSuccessHandler(handleTopicsLoaded)
      .withFailureHandler(handleTopicsError)
      .getAllTopics();
  }

  /**
   * ⭐ Load quiz stats per topic từ server nếu cần (cache expired hoặc forceRefresh)
   */
  function loadQuizStatsIfNeeded(forceRefresh = false) {
    const now = Date.now();
    const statsCache = window.quizStatsCache;
    
    // Check if cache is still valid
    if (!forceRefresh && statsCache && statsCache.stats && Object.keys(statsCache.stats).length > 0) {
      if (now - statsCache.lastLoadTime < statsCache.cacheDuration) {
        console.log("✅ Using cached quiz stats per topic");
        return;
      }
    }

    console.log("📊 Loading quiz stats per topic from server...");
    google.script.run
      .withSuccessHandler(function(response) {
        if (response && response.success && response.stats) {
          window.quizStatsCache.stats = response.stats;
          window.quizStatsCache.lastLoadTime = Date.now();
          console.log("✅ Quiz stats loaded for " + Object.keys(response.stats).length + " topics");
          
          // Re-render topics grid với stats mới nếu đang hiển thị
          if (mcqAllTopicsForSearch && mcqAllTopicsForSearch.length > 0) {
            renderTopicsGrid(mcqAllTopicsForSearch);
          }
        }
      })
      .withFailureHandler(function(error) {
        console.warn("⚠️ Failed to load quiz stats:", error);
      })
      .getQuizStatsPerTopic();
  }

  /**
   * ⭐ Helper: Get quiz stats for a specific topic
   * @param {string} topicId 
   * @returns {object|null} - {hasPlayed, bestScore, bestTotal, bestPercent, playCount, lastPlayedAt} or null
   */
  function getQuizStatsForTopic(topicId) {
    const statsCache = window.quizStatsCache;
    if (!statsCache || !statsCache.stats) return null;
    return statsCache.stats[topicId] || null;
  }

  /**
   * ⭐ Helper: Update quiz stats for a specific topic after completing quiz
   * Gọi sau khi nộp bài để cập nhật local cache ngay lập tức
   */
  function updateLocalQuizStats(topicId, score, totalQuestions, percentage) {
    if (!window.quizStatsCache) {
      window.quizStatsCache = { stats: {}, lastLoadTime: 0, cacheDuration: 60000 };
    }
    
    const stats = window.quizStatsCache.stats[topicId];
    const now = new Date().toISOString();
    
    if (!stats) {
      // First time playing this topic
      window.quizStatsCache.stats[topicId] = {
        hasPlayed: true,
        bestScore: score,
        bestTotal: totalQuestions,
        bestPercent: percentage,
        playCount: 1,
        lastPlayedAt: now
      };
    } else {
      // Update existing stats
      stats.playCount++;
      stats.lastPlayedAt = now;
      
      // Update best score only if new percentage is higher
      if (percentage > stats.bestPercent) {
        stats.bestScore = score;
        stats.bestTotal = totalQuestions;
        stats.bestPercent = percentage;
      }
    }
    
    console.log("✅ Updated local quiz stats for topic:", topicId, window.quizStatsCache.stats[topicId]);
  }

  // Alias for entry point usage
  var loadAvailableTopics = loadTopicsForQuiz;

  /**
   * Helper: Show empty topics state
   */
  function showEmptyTopicsState() {
    document.getElementById("topics-empty").style.display = "block";
    document.getElementById("topics-empty").innerHTML = `
      <div class="mcq-empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#A0AEC0" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
            <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <h3>Chưa có chủ đề</h3>
        <p>Hãy tạo chủ đề trước khi làm Quiz</p>
      </div>
    `;
  }

  /**
   * Handle topics loaded - Professional Design
   */
  function handleTopicsLoaded(response) {
    console.log("✅ Topics loaded:", response);

    document.getElementById("topics-loading").style.display = "none";

    // Handle response format from getAllTopics()
    // It returns {success: true, topics: [...], count: N}
    let topics = [];

    if (response && response.success && Array.isArray(response.topics)) {
      topics = response.topics;
    } else if (Array.isArray(response)) {
      // Direct array response
      topics = response;
    } else if (response && !response.success) {
      // Error response
      console.error("❌ Server error:", response.message);
      document.getElementById("topics-empty").style.display = "block";
      document.getElementById("topics-empty").innerHTML = `
        <div class="mcq-empty-state">
          <div class="empty-icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="12"/>
              <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
          </div>
          <h3>Lỗi tải dữ liệu</h3>
          <p>${response.message || "Không thể tải chủ đề"}</p>
          <button onclick="loadTopicsForQuiz(true)" class="btn-primary" style="margin-top:1rem;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
              <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
            </svg>
            Thử lại
          </button>
        </div>
      `;
      return;
    }

    // ⭐ Lưu vào LOCAL cache
    mcqTopicsCache = topics;
    mcqLastLoadTime = Date.now();

    // ⭐ Lưu vào GLOBAL cache (để chia sẻ với Topics page và các page khác)
    if (window.globalTopicsCache) {
      window.globalTopicsCache.data = topics;
      window.globalTopicsCache.lastLoadTime = Date.now();
      console.log(`✅ Cached ${topics.length} topics to GLOBAL cache`);
    }
    console.log(`✅ Cached ${topics.length} topics for MCQ`);

    if (topics.length === 0) {
      showEmptyTopicsState();
      return;
    }

    quizState.allTopics = topics;
    mcqAllTopicsForSearch = topics;
    renderTopicsGrid(topics);
  }

  /**
   * Handle topics error - Professional Design
   */
  function handleTopicsError(error) {
    console.error("❌ Error loading topics:", error);
    document.getElementById("topics-loading").style.display = "none";
    document.getElementById("topics-empty").style.display = "block";
    document.getElementById("topics-empty").innerHTML = `
      <div class="mcq-empty-state">
        <div class="empty-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <h3>Lỗi tải dữ liệu</h3>
        <p>${error.message || "Không thể kết nối server"}</p>
        <button onclick="loadTopicsForQuiz(true)" class="btn-primary" style="margin-top:1rem;">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
            <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
          </svg>
          Thử lại
        </button>
      </div>
    `;
  }

  /**
   * Render topics list - Modern List View Design
   */
  function renderTopicsGrid(topics) {
    const container = document.getElementById("topics-grid");
    container.innerHTML = "";
    container.style.display = "flex";
    container.className = "mcq-topics-list";

    // Concept-based SVG icons mapping with better matching
    const getTopicIcon = (title) => {
      const t = title.toLowerCase();

      // Input/Output
      if (t.includes("input") || t.includes("output") || t.includes("i/o")) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>';
      }
      // Variables & Data types
      if (
        t.includes("biến") ||
        t.includes("kiểu") ||
        t.includes("variable") ||
        t.includes("type")
      ) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>';
      }
      // Logic & Operators
      if (
        t.includes("toán tử") ||
        t.includes("logic") ||
        t.includes("operator")
      ) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><circle cx="12" cy="12" r="10"/><path d="M8 12h8"/><path d="M12 8v8"/></svg>';
      }
      // Math & Random
      if (
        t.includes("math") ||
        t.includes("random") ||
        t.includes("thư viện")
      ) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M4 4h6v6H4z"/><path d="M14 4h6v6h-6z"/><path d="M4 14h6v6H4z"/><circle cx="17" cy="17" r="3"/></svg>';
      }
      // If-Else
      if (t.includes("if") || t.includes("else") || t.includes("điều kiện")) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22v-8.3a4 4 0 0 0-1.172-2.872L3 3"/><path d="m15 9 6-6"/></svg>';
      }
      // Loops
      if (
        t.includes("for") ||
        t.includes("while") ||
        t.includes("vòng lặp") ||
        t.includes("loop")
      ) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>';
      }
      // Arrays & Lists
      if (
        t.includes("mảng") ||
        t.includes("list") ||
        t.includes("array") ||
        t.includes("danh sách")
      ) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>';
      }
      // String
      if (t.includes("chuỗi") || t.includes("string") || t.includes("text")) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>';
      }
      // Dictionary/Map
      if (t.includes("dict") || t.includes("map") || t.includes("cấu trúc")) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/><line x1="8" y1="7" x2="16" y2="7"/><line x1="8" y1="11" x2="14" y2="11"/></svg>';
      }
      // Function
      if (
        t.includes("hàm") ||
        t.includes("function") ||
        t.includes("phạm vi")
      ) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>';
      }
      // Search
      if (t.includes("tìm kiếm") || t.includes("search")) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>';
      }
      // Sort
      if (t.includes("sắp xếp") || t.includes("sort")) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M3 6h18"/><path d="M6 12h12"/><path d="M9 18h6"/></svg>';
      }
      // File I/O
      if (t.includes("file") || t.includes("tệp")) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>';
      }
      // Debug
      if (
        t.includes("debug") ||
        t.includes("tối ưu") ||
        t.includes("tổng hợp")
      ) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>';
      }
      // Code/Programming default
      if (
        t.includes("code") ||
        t.includes("lập trình") ||
        t.includes("tư duy")
      ) {
        return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="26" height="26"><polyline points="16,18 22,12 16,6"/><polyline points="8,6 2,12 8,18"/></svg>';
      }
      // Default icon

  /**
   * Resume quiz from saved progress — uses restoreQuizSession()
   */
  function resumeQuiz() {
    closeResumeModal();
    console.log("▶️ Resuming quiz from saved progress...");

    const savedProgress = quizState.savedProgress;
    if (!savedProgress) {
      showGameModeModal();
      return;
    }

    // Set game mode from saved session
    quizState.quizMode = savedProgress.gameMode || "instant";

    // Switch to quiz view
    showQuizView();

    // Show mode indicator
    const modeIndicator = document.getElementById("quiz-mode-indicator");
    if (modeIndicator) {
      modeIndicator.textContent =
        quizState.quizMode === "instant" ? "⚡ Trả lời nhanh" : "📝 Ôn tập";
      modeIndicator.className = "quiz-mode-indicator " + quizState.quizMode;
    }

    // Load questions then restore state using restoreQuizSession
    showLoading();
    quizState.loading = true;

    google.script.run
      .withSuccessHandler(function (result) {
        quizState.loading = false;

        // Parse questions from AI response
        var questions = null;
        if (result && result.data) {
          var parsedData = result.data;
          if (typeof parsedData === "string") {
            try { parsedData = JSON.parse(parsedData); } catch (e) { parsedData = null; }
          }
          if (parsedData && parsedData.questions && Array.isArray(parsedData.questions)) {
            questions = parsedData.questions.map(function (q, index) {
              var options = q.options;
              if (!Array.isArray(options)) {
                options = [options.A, options.B, options.C, options.D].filter(Boolean);
              }
              var correctAnswer = q.correctAnswer;
              if (typeof correctAnswer === "string") {
                var letterToIndex = { A: 0, B: 1, C: 2, D: 3 };
                correctAnswer = letterToIndex[correctAnswer.toUpperCase()] || 0;
              }
              return {
                id: q.id || "Q" + (index + 1),
                question: q.question,
                options: options,
                correctAnswer: correctAnswer,
                explanation: q.explanation || "",
                hint: q.hint || "",
                difficulty: q.difficulty || "medium",
              };
            });
          }
        }

        if (questions && questions.length > 0) {
          // Use restoreQuizSession to properly restore state
          restoreQuizSession(savedProgress, questions);

          // Start quiz UI with restored state
          startQuizUI();
        } else {
          // Could not parse questions, fall back to game mode selection
          showGameModeModal();
        }
      })
      .withFailureHandler(function (error) {
        quizState.loading = false;
        console.error("Error loading questions for resume:", error);
        showGameModeModal();
      })
      .getAIContentForWeb(quizState.topicId, "questions", false);
  }

  /**
   * Show exit confirmation modal when leaving quiz mid-game
   */
  function confirmExitQuiz(target) {
    // Check if quiz is in progress (has questions and not finished)
    const hasStarted = quizState.questions.length > 0;
    const answeredCount = quizState.userAnswers.filter(
      (a) => a !== null && a !== undefined,
    ).length;
    const isFinished =
      document.getElementById("quiz-results")?.style.display !== "none";

    // If quiz hasn't started or is finished, just navigate directly
    if (!hasStarted || isFinished) {
      if (target === "topic") {
        backToTopicSelection();
      } else {
        showPage("page-dashboard");
      }
      return;
    }

    exitTarget = target;

    // Update modal with current progress
    document.getElementById("exit-answered-count").textContent =
      `${answeredCount}/${quizState.questions.length}`;
    document.getElementById("exit-current-score").textContent =
      quizState.gameMode === "instant" ? quizState.score : "?";

    // Show modal
    const modal = document.getElementById("exit-quiz-modal");
    modal.style.display = "flex";
    setTimeout(() => modal.classList.add("show"), 10);
  }

  /**
   * Close exit modal
   */
  function closeExitModal() {
    const modal = document.getElementById("exit-quiz-modal");
    modal.classList.remove("show");
    setTimeout(() => {
      modal.style.display = "none";
    }, 300);
  }

  /**
   * Confirm exit - actually leave the quiz
   */
  function confirmExit() {
    closeExitModal();
    if (exitTarget === "topic") {
      backToTopicSelection();
    } else {
      showPage("page-dashboard");
    }
  }

    quizState.questions = [];
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = [];

  /**
   * loadQuizData(forceRegenerate) — Entry point thống nhất cho cả 2 luồng
   * Gọi từ: initMCQPage (lesson flow) hoặc startQuizWithMode (mcq flow)
   * Load song song: questions + masteredIds + wrongAnswers
   */
  function loadQuizData(forceRegenerate = false) {
    console.log("📦 loadQuizData called", {
      topicId: quizState.topicId,
      quizMode: quizState.quizMode,
      forceRegenerate,
    });

    quizState.loading = true;
    quizState.error = null;
    loadQuizQuestions(forceRegenerate);
  }

  /**
   * filterMasteredQuestions(allQuestions, masteredIds) — Lọc câu đã thuộc
   * @returns {questions: Array, allMastered: boolean}
   */
  function filterMasteredQuestions(allQuestions, masteredIds) {
    if (!masteredIds || masteredIds.length === 0) {
      return { questions: allQuestions, allMastered: false };
    }
    var filtered = allQuestions.filter(function (q) {
      return !masteredIds.includes(q.id);
    });
    console.log(
      "✅ Filtered: " + allQuestions.length + " → " + filtered.length + " questions",
    );
    if (filtered.length === 0) {
      return { questions: allQuestions, allMastered: true };
    }
    return { questions: filtered, allMastered: false };
  }

  /**
   * createQuizSession(finalQuestions) — Tạo session quiz mới
   * @returns session object
   */
  function createQuizSession(finalQuestions) {
    var sessionId = "QS_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);
    
    // ⭐ Shuffle đáp án của mỗi câu hỏi để random vị trí A/B/C/D
    var shuffledQuestions = finalQuestions.map(function(question) {
      var options = question.options.slice(); // Copy array
      var correctOption = options[question.correctAnswer]; // Lưu đáp án đúng
      
      // Fisher-Yates shuffle
      for (var i = options.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = options[i];
        options[i] = options[j];
        options[j] = temp;
      }
      
      // Tìm vị trí mới của đáp án đúng
      var newCorrectIndex = options.indexOf(correctOption);
      
      return {
        id: question.id,
        question: question.question,
        options: options,
        correctAnswer: newCorrectIndex,
        explanation: question.explanation,
        hint: question.hint,
        difficulty: question.difficulty
      };
    });
    
    console.log("🎲 Shuffled answer options for all questions");
    
    var session = {
      sessionId: sessionId,
      topicId: quizState.topicId,
      contentDocId: quizState.contentDocId,
      quizMode: quizState.quizMode,
      questions: shuffledQuestions,
      currentQuestionIndex: 0,
      userAnswers: new Array(shuffledQuestions.length).fill(null),
      score: 0,
      elapsedTime: 0,
      startedAt: new Date().toISOString(),
      status: "in_progress",
    };

    quizState.quizSession = session;
    quizState.questions = shuffledQuestions;
    quizState.filteredQuestions = shuffledQuestions;
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = session.userAnswers;
    quizState.answeredQuestions = new Array(finalQuestions.length).fill(false);
    quizState.score = 0;
    quizState.loading = false;
    quizState.error = null;

    console.log("🎮 Quiz session created:", sessionId, "with", finalQuestions.length, "questions");
    return session;
  }

  /**
   * restoreQuizSession(savedProgress, questions) — Khôi phục session từ bài dở dang
   * @returns session object
   */
  function restoreQuizSession(savedProgress, questions) {
    var sessionId = "QS_RESUME_" + Date.now();
    var userAnswers = new Array(questions.length).fill(null);
    var answeredQuestions = new Array(questions.length).fill(false);
    var score = savedProgress.score || 0;

    // Restore answers
    if (savedProgress.questionDetails) {
      savedProgress.questionDetails.forEach(function (detail, idx) {
        if (detail.wasAnswered && idx < questions.length) {
          userAnswers[idx] = detail.userAnswer;
          answeredQuestions[idx] = true;
        }
      });
    }

    // Find first unanswered question
    var resumeIndex = savedProgress.currentQuestionIndex || 0;
    for (var i = 0; i < questions.length; i++) {
      if (!answeredQuestions[i]) {
        resumeIndex = i;
        break;
      }
    }

    var session = {
      sessionId: sessionId,
      topicId: quizState.topicId,
      contentDocId: quizState.contentDocId,
      quizMode: savedProgress.gameMode || quizState.quizMode,
      questions: questions,
      currentQuestionIndex: resumeIndex,
      userAnswers: userAnswers,
      score: score,
      elapsedTime: 0,
      startedAt: new Date().toISOString(),
      status: "in_progress",
    };

    quizState.quizSession = session;
    quizState.quizMode = session.quizMode;
    quizState.questions = questions;
    quizState.filteredQuestions = questions;
    quizState.currentQuestionIndex = resumeIndex;
    quizState.userAnswers = userAnswers;
    quizState.answeredQuestions = answeredQuestions;
    quizState.score = score;
    quizState.loading = false;
    quizState.error = null;

    // Delete saved progress from server (we're resuming now)
    google.script.run.deleteSavedQuizProgress(quizState.topicId);

    console.log("▶️ Quiz session restored:", sessionId, "resuming at question", resumeIndex + 1);
    return session;
  }

  /**
   * Load quiz questions from server
   */
  function loadQuizQuestions(forceRegenerate = false) {
    console.log("📥 Loading quiz questions...", {
      topicId: quizState.topicId,
      forceRegenerate,
    });

    showLoading();

    // ⭐ Track loading time for user feedback
    var loadStartTime = Date.now();
    var loadingDots = 0;
    var loadingInterval = setInterval(function () {
      loadingDots++;
      var elapsed = Math.round((Date.now() - loadStartTime) / 1000);
      var hint = document.querySelector("#quiz-loading .quiz-loading-hint");
      if (hint) {
        if (elapsed < 10) {
          hint.textContent = "Đang kiểm tra cache...";
        } else if (elapsed < 30) {
          hint.textContent = "AI đang tạo câu hỏi... (" + elapsed + "s)";
        } else {
          hint.textContent = "Đang xử lý, vui lòng đợi... (" + elapsed + "s)";
        }
      }
    }, 1000);

    // ⭐ PARALLEL LOADING: Load mastered IDs + wrong answers + questions cùng lúc
    var questionsResult = null;
    var masteredIds = [];
    var questionsLoaded = false;
    var masteredLoaded = false;

    function tryProcessResults() {
      if (!questionsLoaded || !masteredLoaded) return;
      clearInterval(loadingInterval);
      processQuestionsWithMastered(questionsResult, masteredIds);
    }

    // PARALLEL 1: Load mastered question IDs
    google.script.run
      .withSuccessHandler(function (ids) {
        masteredIds = ids || [];
        console.log("📋 Mastered IDs loaded:", masteredIds.length);
        masteredLoaded = true;
        tryProcessResults();
      })
      .withFailureHandler(function () {
        masteredIds = [];
        masteredLoaded = true;
        tryProcessResults();
      })
      .getMasteredQuestionIds(quizState.topicId);

    // ⭐ PARALLEL 2: Load questions from AI/cache
    google.script.run
      .withSuccessHandler(function (response) {
        questionsResult = response;
        questionsLoaded = true;
        tryProcessResults();
      })
      .withFailureHandler(function (error) {
        clearInterval(loadingInterval);
        handleLoadError(error);
      })
      .getAIContentForWeb(quizState.topicId, "questions", forceRegenerate);
  }

  /**
   * Process questions + mastered IDs together (called when both are ready)
   */
  function processQuestionsWithMastered(response, masteredIds) {
    console.log("✅ Processing questions with mastered IDs...");
    quizState.loading = false;

    if (!response || response.success === false) {
      quizState.error = response?.message || response?.error || "Không thể tải câu hỏi";
      showError(quizState.error);
      return;
    }

    try {
      // ⭐ Safe JSON parse: handle both string and object
      var parsedData = response.data;
      if (typeof parsedData === "string") {
        try {
          parsedData = JSON.parse(parsedData);
        } catch (parseErr) {
          console.error("❌ JSON parse error:", parseErr);
          quizState.error = "Lỗi parse dữ liệu câu hỏi. Thử tạo lại.";
          showError(quizState.error);
          return;
        }
      }

      if (
        !parsedData ||
        !parsedData.questions ||
        !Array.isArray(parsedData.questions)
      ) {
        console.error("❌ Invalid question format:", parsedData);
        quizState.error = "Dữ liệu câu hỏi không hợp lệ. Nhấn 'Tạo lại câu hỏi' để thử.";
        showError(quizState.error);
        return;
      }

      console.log("📊 Parsed", parsedData.questions.length, "questions");

      // Normalize questions format
      var questions = parsedData.questions.map(function (q, index) {
        var options = q.options;
        if (!Array.isArray(options)) {
          options = [options.A, options.B, options.C, options.D].filter(
            Boolean,
          );
        }

        var correctAnswer = q.correctAnswer;
        if (typeof correctAnswer === "string") {
          var letterToIndex = { A: 0, B: 1, C: 2, D: 3 };
          correctAnswer = letterToIndex[correctAnswer.toUpperCase()] || 0;
        }

        return {
          id: q.id || "Q" + (index + 1),
          question: q.question,
          options: options,
          correctAnswer: correctAnswer,
          explanation: q.explanation || "",
          hint: q.hint || "",
          difficulty: q.difficulty || "medium",
        };
      });

      // Store mastered IDs in state
      quizState.masteredIds = masteredIds || [];
      quizState.masteredCount = quizState.masteredIds.length;

      // ⭐ Lưu tất cả câu hỏi gốc để dùng khi retake (luôn đảm bảo đủ 20 câu)
      quizState.allQuestionsOriginal = [].concat(questions);

      // ⭐ Filter mastered questions using dedicated function
      var filterResult = filterMasteredQuestions(questions, masteredIds);
      quizState.allMastered = filterResult.allMastered;

      if (filterResult.allMastered) {
        console.log("🏆 All questions mastered!");
        // Shuffle for review mode
        quizState.questions = shuffleArray([].concat(questions));
        quizState.filteredQuestions = quizState.questions;
        showAllMasteredModal(masteredIds.length);
      } else {
        // ⭐ Create quiz session with filtered questions
        var finalQuestions = filterResult.questions;
        createQuizSession(finalQuestions);
        startQuizSession();
      }
    } catch (error) {
      console.error("❌ Error processing questions:", error);
      quizState.error = "Lỗi xử lý dữ liệu câu hỏi: " + error.message;
      showError(quizState.error);
    }
  }

  /**
   * Handle load error
   */
  function handleLoadError(error) {
    console.error("❌ Load error:", error);
    quizState.loading = false;
    quizState.error = "Lỗi kết nối: " + (error.message || error);
    showError(quizState.error);
  }

  /**

  function startQuizSession(isRestore) {

      "🎮 Starting quiz session with",
      quizState.questions.length,
      "questions, mode:",
      quizState.quizMode,
      "restore:", !!isRestore,
    );

    // Update session status
    if (quizState.quizSession) {
      quizState.quizSession.status = "in_progress";
    }

    quizState.error = null;

      window.LearningTracker.start("quiz");
    }

    if (!isRestore) {
      quizState.currentQuestionIndex = 0;
      quizState.score = 0;
      quizState.answeredQuestions = new Array(quizState.questions.length).fill(false);
    }

    quizState.startTime = new Date();

    document.getElementById("quiz-error").style.display = "none";

    document.getElementById("quiz-section").style.display = "block";

      modeIndicator.className = `quiz-mode-indicator ${quizState.gameMode}`;
    }

  /**
   * startQuizUI — Alias cho startQuizSession(true), dùng khi khôi phục bài dở dang

  /**
   * Display current question - With state preservation
   */
  function displayQuestion() {
    const questionIndex = quizState.currentQuestionIndex;
    const question = quizState.questions[questionIndex];
    const isInstantMode = quizState.gameMode === "instant";
    const isLocked = quizState.answeredQuestions[questionIndex] === true;
    const userAnswer = quizState.userAnswers[questionIndex];
    const isFillBlank = question.questionType === "fill-blank";
    const isRetryMCQ = question.questionType === "retry-mcq";

    console.log("📝 Displaying question", questionIndex + 1, {
      isLocked,
      userAnswer,
      mode: quizState.gameMode,
      type: question.questionType || "mcq",
    });

    document.getElementById("question-number").textContent = questionIndex + 1;
    document.getElementById("current-question").textContent = questionIndex + 1;
    document.getElementById("progress-current").textContent = questionIndex + 1;

    const progress = ((questionIndex + 1) / quizState.questions.length) * 100;
    document.getElementById("progress-fill").style.width = progress + "%";

    // Display question with retry badge if retry question
    const questionTextEl = document.getElementById("question-text");
    if (isFillBlank || isRetryMCQ) {
      questionTextEl.innerHTML = `<span class="fill-blank-badge">🔄 Ôn lại</span><br>${question.question}`;
    } else {
      questionTextEl.textContent = question.question;
    }

    const hintElement = document.getElementById("question-hint");
    const hintBtn = document.getElementById("btn-hint");
    if (question.hint) {
      hintElement.textContent = "💡 " + question.hint;
      hintElement.style.display = "none";
      hintBtn.style.display = "inline-flex";
      hintBtn.disabled = false;
    } else {
      hintBtn.style.display = "none";
    }

    // Render different format based on question type
    if (isFillBlank) {
      renderFillBlankOptions(question, questionIndex);
    } else {
      renderAnswerOptions(question.options, questionIndex);
    }

    updateNavigationButtons();

    // Hiển thị lại feedback nếu đã trả lời
    if (userAnswer !== null) {
      const isCorrect = isFillBlank
        ? checkFillBlankAnswer(userAnswer, question.correctAnswer)
        : userAnswer === question.correctAnswer;
      showAnswerFeedback(isCorrect, question);
    } else {
      document.getElementById("answer-feedback").style.display = "none";
    }
  }

  /**
   * Render fill-in-blank options for retry questions
   */
  function renderFillBlankOptions(question, questionIndex) {
    const container = document.getElementById("answer-options");
    const isLocked = quizState.answeredQuestions[questionIndex] === true;
    const userAnswer = quizState.userAnswers[questionIndex];
    const isInstantMode = quizState.gameMode === "instant";

    // Show MCQ options with different styling (as hints)
    const labels = ["A", "B", "C", "D"];
    let optionsHtml =
      '<div class="fill-blank-hints"><span class="hint-label">Gợi ý đáp án:</span> ';
    question.options.forEach((opt, idx) => {
      optionsHtml += `<span class="hint-option">${labels[idx]}. ${opt}</span>`;
      if (idx < question.options.length - 1) optionsHtml += " | ";
    });
    optionsHtml += "</div>";

    let inputValue = "";
    let inputClass = "";

    if (isLocked && userAnswer !== null) {
      inputValue =
        typeof userAnswer === "string"
          ? userAnswer
          : question.options[userAnswer] || "";
      const isCorrect = checkFillBlankAnswer(
        userAnswer,
        question.correctAnswer,
      );
      inputClass = isCorrect ? "correct" : "incorrect";
    }

    container.innerHTML = `
      <div class="fill-blank-question">
        ${optionsHtml}
        <input type="text" 
               id="fill-blank-input" 
               class="fill-blank-input ${inputClass}" 
               placeholder="Nhập đáp án của bạn..." 
               value="${inputValue}"
               ${isLocked ? "disabled" : ""}
               onkeyup="handleFillBlankInput(event, ${questionIndex})"
               autocomplete="off">
        ${
          !isLocked
            ? `<button class="btn-submit-fill" onclick="submitFillBlankAnswer(${questionIndex})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m9 12 2 2 4-4"/>
          </svg>
          Kiểm tra
        </button>`
            : ""
        }
      </div>
    `;
    container.className = "answer-options fill-blank-mode";
  }

  /**
   * Handle fill-blank input keyup
   */
  function handleFillBlankInput(event, questionIndex) {
    if (event.key === "Enter") {
      submitFillBlankAnswer(questionIndex);
    }
  }

  /**
   * Submit fill-blank answer
   */
  function submitFillBlankAnswer(questionIndex) {
    const input = document.getElementById("fill-blank-input");
    const answer = input.value.trim();

    if (!answer) {
      input.classList.add("shake");
      setTimeout(() => input.classList.remove("shake"), 500);
      return;
    }

    const question = quizState.questions[questionIndex];
    const isCorrect = checkFillBlankAnswer(answer, question.correctAnswer);

    // Store answer
    quizState.userAnswers[questionIndex] = answer;
    quizState.answeredQuestions[questionIndex] = true;

    // Update score
    if (isCorrect) {
      quizState.score++;
      document.getElementById("current-score").textContent = quizState.score;

      // Mark original question as mastered
      if (question.originalId) {
        saveMasteredQuestion({
          id: question.originalId,
          question: question.question,
        });
      }
    }

    // Update UI
    input.disabled = true;
    input.classList.add(isCorrect ? "correct" : "incorrect");

    // Remove submit button
    const submitBtn = document.querySelector(".btn-submit-fill");
    if (submitBtn) submitBtn.remove();

    // Show feedback
    showAnswerFeedback(isCorrect, question);
    updateNavigationButtons();

    // Auto-advance cho fill-blank trong instant mode
    if (quizState.gameMode === "instant") {
      if (quizState.autoAdvanceTimer) {
        clearTimeout(quizState.autoAdvanceTimer);
      }
      quizState.autoAdvanceTimer = setTimeout(() => {
        quizState.autoAdvanceTimer = null;
        if (quizState.currentQuestionIndex < quizState.questions.length - 1) {
          nextQuestion();
        } else {
          checkAndAddRetryQuestions();
        }
      }, 1500);
    }
  }

  /**
   * Check fill-blank answer (case-insensitive, trimmed)
   */
  function checkFillBlankAnswer(userAnswer, correctAnswer) {
    if (typeof userAnswer !== "string") return false;
    const normalizedUser = userAnswer.trim().toLowerCase();
    const normalizedCorrect = String(correctAnswer).trim().toLowerCase();
    return normalizedUser === normalizedCorrect;
  }

  /**
   * Render answer options - With mode-aware locking
   */
  function renderAnswerOptions(options, questionIndex) {
    const container = document.getElementById("answer-options");
    container.innerHTML = "";
    container.className = "answer-options";

    const labels = ["A", "B", "C", "D"];
    const userAnswer = quizState.userAnswers[questionIndex];
    const question = quizState.questions[questionIndex];
    const isLocked = quizState.answeredQuestions[questionIndex] === true;

    options.forEach((option, index) => {
      const button = document.createElement("button");
      button.className = "answer-option";

      const isSelected = userAnswer === index;
      const isCorrect = index === question.correctAnswer;

      if (isSelected) {
        button.classList.add("selected");
      }

      // Nếu đã trả lời, hiển thị trạng thái đúng/sai và khóa
      if (isLocked) {
        if (isSelected && isCorrect) {
          button.classList.add("correct");
        } else if (isSelected && !isCorrect) {
          button.classList.add("incorrect");
        } else if (isCorrect) {
          button.classList.add("correct-answer");
        }
        button.disabled = true;
      }

      button.innerHTML = `
        <div class="option-letter">${labels[index]}</div>
        <span class="option-text">${option}</span>
        ${
          isLocked && isCorrect
            ? '<span class="option-check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2FA36B" stroke-width="3"><path d="m9 12 2 2 4-4"/></svg></span>'
            : ""
        }
        ${
          isLocked && isSelected && !isCorrect
            ? '<span class="option-cross"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>'
            : ""
        }
      `;

      // Chỉ cho phép click nếu chưa bị khóa
      if (!isLocked) {
        button.onclick = () => selectAnswer(index);
      }

      container.appendChild(button);
    });
  }

  /**
   * Select an answer - Mode-aware
   */
  function selectAnswer(optionIndex) {
    const questionIndex = quizState.currentQuestionIndex;
    const question = quizState.questions[questionIndex];
    const isInstantMode = quizState.gameMode === "instant";

    // Nếu đã trả lời rồi thì không cho chọn lại
    if (quizState.answeredQuestions[questionIndex]) {
      console.log("⚠️ Câu này đã trả lời rồi, không thể thay đổi");
      return;
    }

    const previousAnswer = quizState.userAnswers[questionIndex];
    const isCorrect = optionIndex === question.correctAnswer;

    console.log("✍️ Answer selected:", {
      question: questionIndex + 1,
      selected: optionIndex,
      correct: question.correctAnswer,
      isCorrect: isCorrect,
      mode: quizState.gameMode,
    });

    quizState.userAnswers[questionIndex] = optionIndex;

    // Ở chế độ instant: khóa câu hỏi và tính điểm ngay
    if (isInstantMode) {
      quizState.answeredQuestions[questionIndex] = true;

      // Tính điểm - chỉ tính 1 lần khi trả lời đúng
      if (isCorrect) {
        quizState.score++;
        document.getElementById("current-score").textContent = quizState.score;

        // Lưu câu đúng để không hỏi lại (use originalId for retry questions)
        if (question.originalId) {
          saveMasteredQuestion({ id: question.originalId, question: question.question });
        } else {
          saveMasteredQuestion(question);
        }
      } else {
        // Lưu câu sai để ôn lại
        saveWrongAnswer(question, optionIndex);
      }

      renderAnswerOptions(question.options, questionIndex);
      showAnswerFeedback(isCorrect, question);

      // Auto-advance sau khi hiện feedback ở chế độ instant
      if (quizState.autoAdvanceTimer) {
        clearTimeout(quizState.autoAdvanceTimer);
      }
      quizState.autoAdvanceTimer = setTimeout(() => {
        quizState.autoAdvanceTimer = null;
        if (quizState.currentQuestionIndex < quizState.questions.length - 1) {
          nextQuestion();
        } else {
          submitQuiz();
        }
      }, 1500);
    } else {
      // Ở chế độ review: khóa câu hỏi, tính điểm và hiển feedback
      quizState.answeredQuestions[questionIndex] = true;

      // Tính điểm real-time cho chế độ review
      if (isCorrect) {
        quizState.score++;
        document.getElementById("current-score").textContent = quizState.score;

        // Lưu câu đúng
        if (question.originalId) {
          saveMasteredQuestion({ id: question.originalId, question: question.question });
        } else {
          saveMasteredQuestion(question);
        }
      } else {
        // Lưu câu sai để ôn lại
        saveWrongAnswer(question, optionIndex);
      }

      renderAnswerOptions(question.options, questionIndex);
      showAnswerFeedback(isCorrect, question);
    }

    updateNavigationButtons();
  }

  /**
   * Save mastered (correct) question
   */
  function saveMasteredQuestion(question) {
    const masteredData = {
      topicId: quizState.topicId,
      questionId: question.id,

    };

    console.log("🏆 Saving mastered question:", masteredData);

    google.script.run
      .withSuccessHandler(() => console.log("✅ Mastered question saved"))

  /**
   * Save wrong answer for retry with different format
   */

    const wrongData = {

      selectedAnswer: selectedAnswer,

  /**
   * Create MCQ retry question from wrong MCQ question (shuffled options)
   */
  function createRetryMCQQuestion(originalQuestion) {
    const correctIndex = originalQuestion.correctAnswer;
    const correctAnswer = originalQuestion.options[correctIndex];

    if (!correctAnswer) return null;

    // Shuffle options using Fisher-Yates
    const indexedOptions = originalQuestion.options.map((opt, idx) => ({ text: opt, originalIdx: idx }));
    for (let i = indexedOptions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indexedOptions[i], indexedOptions[j]] = [indexedOptions[j], indexedOptions[i]];
    }

    // Find new correct answer index after shuffle
    const newCorrectIndex = indexedOptions.findIndex(opt => opt.originalIdx === correctIndex);
    const newOptions = indexedOptions.map(opt => opt.text);

    return {
      id: `RETRY_${originalQuestion.id}`,
      originalId: originalQuestion.id,
      question: originalQuestion.question,
      questionType: "retry-mcq",
      correctAnswer: newCorrectIndex,
      hint: originalQuestion.hint || null,
      explanation:
        originalQuestion.explanation || `Đáp án đúng: ${correctAnswer}`,
      difficulty: "retry",
      options: newOptions,
    };
  }

  /**

    if (quizState.retryQueue.length > 0) {
      console.log(
        "📝 Adding retry questions to quiz:",
        quizState.retryQueue.length,
      );

      // Add retry questions to end of questions array
      const retryQuestions = [...quizState.retryQueue];
      quizState.questions.push(...retryQuestions);

      // Extend userAnswers and answeredQuestions arrays
      const additionalAnswers = new Array(retryQuestions.length).fill(null);
      quizState.userAnswers.push(...additionalAnswers);
      quizState.answeredQuestions.push(
        ...new Array(retryQuestions.length).fill(false),
      );

      // Clear retry queue
      quizState.retryQueue = [];

      // Move to next question (first retry question)
      quizState.currentQuestionIndex++;
      displayQuestion();

      // Show notification
      showRetryNotification(retryQuestions.length);
    } else {
      // Không có câu retry → nộp bài
      submitQuiz();
    }

  /**
   * Submit quiz - Calculate final score for review mode
   */
  function submitQuiz() {
    const unansweredCount = quizState.userAnswers.filter(
      (a) => a === null,
    ).length;

    if (unansweredCount > 0) {
      if (
        !confirm(
          `Bạn còn ${unansweredCount} câu chưa trả lời. Bạn có chắc muốn nộp bài?`,
        )
      ) {
        return;
      }
    }

    console.log("📤 Submitting quiz");
    stopTimer();

    // Stop learning time tracker and save remaining time
    if (window.LearningTracker) {
      window.LearningTracker.stop();
    }

    // Note: Điểm đã được tính real-time trong selectAnswer() cho cả 2 chế độ
    const finalScore = quizState.score;
    const totalQuestions = quizState.questions.length;
    const percentage = Math.round((finalScore / totalQuestions) * 100);
    const timeTaken = getElapsedTime();

    // Update recent activity with quiz result
    if (
      typeof window.updateActivityResult === "function" &&
      quizState.currentTopic?.topicId
    ) {
      window.updateActivityResult(
        quizState.currentTopic.topicId,
        finalScore,
        totalQuestions,
      );
    }

    showResults(finalScore, totalQuestions, percentage, timeTaken);
    saveQuizResult(finalScore, totalQuestions, percentage, timeTaken);

    // Save MCQ activity to personal Google Sheet
    google.script.run.saveActivityLog({
      type: "MCQ",
      topicId: quizState.currentTopic?.topicId || quizState.topicId,
      topicTitle:
        quizState.currentTopic?.topicTitle || quizState.topicTitle || "Quiz",
      score: finalScore,
      totalQuestions: totalQuestions,
      percentage: percentage,
    });

    // Notify dashboard to refresh leaderboard + history
    window.dispatchEvent(new Event("dashboard-needs-refresh"));
  }

  /**
   * Retake quiz - Shuffle questions and options for variety
   * ⭐ Với chế độ "instant" (trả lời nhanh): luôn dùng TẤT CẢ câu hỏi gốc (20 câu)
   */
  function retakeQuiz() {
    console.log("🔄 Retaking quiz with shuffled questions...");

    // Track retry count for this topic
    const retryKey = `quiz_retry_${quizState.topicId}`;
    let retryCount = parseInt(sessionStorage.getItem(retryKey) || "0") + 1;
    sessionStorage.setItem(retryKey, retryCount.toString());

    console.log(`📊 Retry count for topic ${quizState.topicId}: ${retryCount}`);

    // ⭐ Với chế độ "instant" (trả lời nhanh): luôn lấy TẤT CẢ câu hỏi gốc
    // để đảm bảo mỗi lần chơi lại đều có đủ 20 câu
    if (quizState.quizMode === "instant" && quizState.allQuestionsOriginal && quizState.allQuestionsOriginal.length > 0) {
      console.log("🎯 Mode instant: Sử dụng tất cả " + quizState.allQuestionsOriginal.length + " câu hỏi gốc");
      // Copy lại tất cả câu hỏi gốc
      quizState.questions = [].concat(quizState.allQuestionsOriginal);
      shuffleQuestionsAndOptions();
      resetQuizForRetry();
      startQuizSession();
    } else if (quizState.questions && quizState.questions.length > 0) {
      // Chế độ review hoặc không có câu gốc: dùng câu hiện tại
      shuffleQuestionsAndOptions();
      resetQuizForRetry();
      startQuizSession();
    } else {
      // Fallback: reload questions if somehow cleared
      loadQuizQuestions(false);
    }
  }

  /**
   * Fisher-Yates shuffle algorithm
   */
  function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }

  /**
   * Shuffle questions order AND shuffle answer options within each question
   */
  function shuffleQuestionsAndOptions() {
    console.log("🎲 Shuffling questions and options...");

    // 1. Shuffle questions order
    quizState.questions = shuffleArray(quizState.questions);

    // 2. Shuffle options within each question
    quizState.questions = quizState.questions.map((question, qIndex) => {
      const options = [...question.options];
      const correctOption = options[question.correctAnswer];

      // Shuffle options
      const shuffledOptions = shuffleArray(options);

      // Find new index of correct answer
      const newCorrectIndex = shuffledOptions.indexOf(correctOption);

      console.log(
        `  Q${qIndex + 1}: Correct answer moved from ${
          question.correctAnswer
        } to ${newCorrectIndex}`,
      );

      return {
        ...question,
        options: shuffledOptions,
        correctAnswer: newCorrectIndex,
      };
    });

    console.log("✅ Questions and options shuffled!");
  }

  /**
   * Reset quiz state for retry (keep questions, clear answers)
   */
  function resetQuizForRetry() {
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = new Array(quizState.questions.length).fill(null);
    quizState.answeredQuestions = new Array(quizState.questions.length).fill(
      false,
    );
    quizState.score = 0;
    quizState.startTime = null;
    quizState.isReviewing = false;
  }

  /**
   * Retake with NEW questions (force AI to regenerate)
   */
  function retakeWithNewQuestions() {
    console.log("🆕 Generating completely new questions...");

    // Reset quiz state completely
    quizState.questions = [];
    quizState.filteredQuestions = [];
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = [];
    quizState.answeredQuestions = [];
    quizState.wrongAnswers = [];
    quizState.retryQueue = [];
    quizState.score = 0;
    quizState.startTime = null;
    quizState.elapsedTime = 0;
    quizState.isReviewing = false;
    quizState.quizSession = null;

    // Hide results screen and show loading
    document.getElementById("quiz-results").style.display = "none";
    document.getElementById("quiz-section").style.display = "none";

    // Use the full loadQuizQuestions flow with forceRegenerate = true
    // This reloads mastered IDs in parallel and properly processes everything
    loadQuizQuestions(true);
  }

  /**
   * Show generating modal
   */
  function showGeneratingModal() {
    const modal = document.getElementById("generating-modal");
    if (modal) {
      modal.style.display = "flex";
      setTimeout(() => modal.classList.add("show"), 10);
    }
  }

  /**
   * Hide generating modal
   */
  function hideGeneratingModal() {
    const modal = document.getElementById("generating-modal");
    if (modal) {
      modal.classList.remove("show");
      setTimeout(() => {
        modal.style.display = "none";
      }, 300);
    }
  }

  /**
   * Exit and save progress
   */
  function exitAndSaveProgress() {
    const answeredCount = quizState.userAnswers.filter(
      (a) => a !== null && a !== undefined,
    ).length;
    const totalQuestions = quizState.questions.length;

    if (answeredCount === 0) {
      // No progress to save, just exit
      confirmExitQuiz("topic");
      return;
    }

    // Calculate current score for instant mode
    let currentScore = 0;
    if (quizState.gameMode === "instant") {
      currentScore = quizState.score;
    } else {
      // Calculate score for review mode
      quizState.questions.forEach((q, idx) => {
        if (quizState.userAnswers[idx] === q.correctAnswer) {
          currentScore++;
        }
      });
    }

    // Save partial progress
    const timeTaken = getElapsedTime();
    const percentage = Math.round((currentScore / totalQuestions) * 100);

    const progressData = {
      topicId: quizState.topicId,
      topicTitle: quizState.topicTitle,
      score: currentScore,
      totalQuestions: totalQuestions,
      answeredCount: answeredCount,
      percentage: percentage,
      timeTaken: timeTaken,
      gameMode: quizState.gameMode,
      status: "partial", // Mark as partial save
      questionDetails: quizState.questions.map((q, idx) => ({
        question: q.question,
        userAnswer: quizState.userAnswers[idx],
        correctAnswer: q.correctAnswer,
        isCorrect: quizState.userAnswers[idx] === q.correctAnswer,
        wasAnswered:
          quizState.userAnswers[idx] !== null &&
          quizState.userAnswers[idx] !== undefined,
      })),
    };

    // Show saving indicator
    const exitBtn = document.getElementById("btn-exit-save");
    if (exitBtn) {
      exitBtn.disabled = true;
      exitBtn.innerHTML = `
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin">
          <circle cx="12" cy="12" r="10" stroke-dasharray="30 60"/>
        </svg>
        Đang lưu...
      `;
    }

    google.script.run
      .withSuccessHandler(function (result) {
        console.log("✅ Progress saved:", result);
        // Show success message briefly then exit
        if (exitBtn) {
          exitBtn.innerHTML = `
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2">
              <path d="M20 6L9 17l-5-5"/>
            </svg>
            Đã lưu!
          `;
        }
        setTimeout(() => {
          backToTopicSelection();
        }, 500);
      })
      .withFailureHandler(function (error) {
        console.error("❌ Error saving progress:", error);
        if (exitBtn) {
          exitBtn.disabled = false;
          exitBtn.innerHTML = `
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/>
              <polyline points="17 21 17 13 7 13 7 21"/>
              <polyline points="7 3 7 8 15 8"/>
            </svg>
            Lưu & Thoát
          `;
        }
        // Still allow exit even if save failed
        if (confirm("Không thể lưu tiến trình. Bạn có muốn thoát không?")) {
          backToTopicSelection();
        }
      })
      .saveQuizResult(progressData);
  }

  /**
   * Timer functions
   */
  function startTimer() {
    quizState.timerInterval = setInterval(() => {
      document.getElementById("quiz-timer").textContent = getElapsedTime();
    }, 1000);
  }

  function stopTimer() {
    if (quizState.timerInterval) {
      clearInterval(quizState.timerInterval);
      quizState.timerInterval = null;
    }
  }

  function getElapsedTime() {
    if (!quizState.startTime) return "00:00";
    const diff = Math.floor((new Date() - quizState.startTime) / 1000);
    const minutes = Math.floor(diff / 60);
    const seconds = diff % 60;
    return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(
      2,
      "0",
    )}`;
  }

  /**
   * UI State functions
   */
  function showLoading() {
    quizState.loading = true;
    document.getElementById("quiz-loading").style.display = "block";
    document.getElementById("quiz-error").style.display = "none";
    document.getElementById("quiz-section").style.display = "none";
    document.getElementById("quiz-stats").style.display = "none";
    document.getElementById("quiz-progress-bar").style.display = "none";
    document.getElementById("quiz-results").style.display = "none";
  }

  function showError(message) {
    quizState.loading = false;
    quizState.error = message;
    document.getElementById("quiz-loading").style.display = "none";
    document.getElementById("quiz-error").style.display = "block";
    document.getElementById("quiz-error-message").textContent = message;
    document.getElementById("quiz-section").style.display = "none";
    document.getElementById("quiz-stats").style.display = "none";
    document.getElementById("quiz-results").style.display = "none";
  }

  function backFromQuiz() {
    stopTimer();
    if (window.currentPageParams?.fromLesson) {
      showPage("page-lesson", {
        topicId: quizState.topicId,
        topicTitle: quizState.topicTitle,
        contentDocId: quizState.contentDocId,
      });
    } else {
      backToTopicSelection();
    }
  }

  // ===== METEOR SHOWER FOR MCQ HEADER =====
  let mcqMeteorInterval = null;

  function startMCQHeaderMeteors() {
    const container = document.getElementById("mcqMeteorContainer");
    if (!container) return;

    // Clear existing interval
    if (mcqMeteorInterval) {
      clearInterval(mcqMeteorInterval);
    }

    // Create meteor every 800ms
    mcqMeteorInterval = setInterval(() => {
      if (!document.getElementById("mcqMeteorContainer")) {
        clearInterval(mcqMeteorInterval);
        return;
      }
      createMCQMeteor();
    }, 800);

    // Create initial meteor
    createMCQMeteor();
  }

  function createMCQMeteor() {
    const container = document.getElementById("mcqMeteorContainer");
    if (!container) return;

    const meteor = document.createElement("div");
    meteor.className = "mcq-header-meteor";

    // Random position from top-left area
    const startX = Math.random() * 40; // 0-40% from left
    const startY = Math.random() * 20; // 0-20% from top

    meteor.style.left = startX + "%";
    meteor.style.top = startY + "%";

    // Random size for variety
    const height = 35 + Math.random() * 35;
    meteor.style.height = height + "px";
    meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

    container.appendChild(meteor);

    // Remove after animation
    setTimeout(() => {
      meteor.remove();
    }, 1500);
  }

  function stopMCQHeaderMeteors() {
    if (mcqMeteorInterval) {
      clearInterval(mcqMeteorInterval);
      mcqMeteorInterval = null;
    }
  }

  // ===== MOUSE-RESPONSIVE STARS EFFECT =====
  function setupMCQHeaderMouseEffect() {
    const header = document.querySelector(".mcq-header");
    const stars = document.getElementById("mcqHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  window.startMCQHeaderMeteors = startMCQHeaderMeteors;
  window.stopMCQHeaderMeteors = stopMCQHeaderMeteors;
  window.setupMCQHeaderMouseEffect = setupMCQHeaderMouseEffect;

  console.log("✅ MCQ scripts loaded");
</script>
