<script>
  /**
   * MCQ Page Scripts - Full Implementation
   * Features:
   * - Topic selection screen
   * - AI-generated questions
   * - Save wrong answers for review
   * - Different question formats on retry
   */

  // ⭐ CACHE để tránh reload không cần thiết (giống Topics page)
  // Sử dụng global cache để chia sẻ với Topics page
  if (!window.globalTopicsCache) {
    window.globalTopicsCache = {
      data: null,
      progress: null,
      lastLoadTime: 0,
      cacheDuration: 60000, // Cache 1 phút
    };
  }

  // ⭐ QUIZ STATS CACHE - thống kê quiz theo từng topicId
  // Format: { topicId: { hasPlayed, bestScore, bestTotal, bestPercent, playCount, lastPlayedAt } }
  if (!window.quizStatsCache) {
    window.quizStatsCache = {
      stats: {}, // Map topicId -> stats
      lastLoadTime: 0,
      cacheDuration: 5 * 60 * 1000, // Cache 5 phút
    };
  }

  // Fallback local cache nếu cần
  let mcqTopicsCache = null;
  let mcqLastLoadTime = 0;
  const MCQ_CACHE_DURATION = 60000; // Cache 1 phút
  const MCQ_TOPICS_PERSIST_KEY = "oq_topics_cache_v1";
  const MCQ_TOPICS_PERSIST_TTL = 10 * 60 * 1000;
  const QUIZ_STATS_PERSIST_KEY = "oq_quiz_stats_cache_v1";
  const QUIZ_STATS_PERSIST_TTL = 5 * 60 * 1000;
  const MCQ_UNLOCKED_TOPICS_PERSIST_KEY = "oq_mcq_unlocked_topics_v1";
  const MCQ_TOPICS_LOAD_TIMEOUT = 12000;
  const MCQ_STATS_PERSIST_KEY = "oq_quiz_stats_cache_v1";
  const MCQ_STATS_PERSIST_TTL = 5 * 60 * 1000; // Cache 5 phút (khớp với server cache)
  let mcqTopicsLoadTimeoutId = null;
  let mcqAllTopicsForSearch = null; // Store all topics for search

  function clearMcqTopicsLoadTimeout() {
    if (mcqTopicsLoadTimeoutId) {
      clearTimeout(mcqTopicsLoadTimeoutId);
      mcqTopicsLoadTimeoutId = null;
    }
  }

  function readMcqUnlockedTopicsCache() {
    try {
      var raw = localStorage.getItem(MCQ_UNLOCKED_TOPICS_PERSIST_KEY);
      if (!raw) return {};
      var parsed = JSON.parse(raw);
      if (!parsed || typeof parsed !== "object") return {};
      return parsed;
    } catch (error) {
      console.warn("⚠️ Failed to read MCQ unlocked topics cache:", error);
      return {};
    }
  }

  function writeMcqUnlockedTopicsCache(unlockedMap) {
    try {
      localStorage.setItem(
        MCQ_UNLOCKED_TOPICS_PERSIST_KEY,
        JSON.stringify(unlockedMap && typeof unlockedMap === "object" ? unlockedMap : {}),
      );
    } catch (error) {
      console.warn("⚠️ Failed to persist MCQ unlocked topics cache:", error);
    }
  }

  function ensureMcqUnlockedTopicsCache() {
    if (!window.mcqUnlockedTopicsCache || typeof window.mcqUnlockedTopicsCache !== "object") {
      window.mcqUnlockedTopicsCache = readMcqUnlockedTopicsCache();
    }
    return window.mcqUnlockedTopicsCache;
  }

  function isMcqTopicPermanentlyUnlocked(topicId) {
    var id = String(topicId || "").trim();
    if (!id) return false;
    var cache = ensureMcqUnlockedTopicsCache();
    return cache[id] === true;
  }

  function markMcqTopicUnlocked(topicId) {
    var id = String(topicId || "").trim();
    if (!id) return;
    var cache = ensureMcqUnlockedTopicsCache();
    if (cache[id] === true) return;
    cache[id] = true;
    writeMcqUnlockedTopicsCache(cache);
  }

  function readMcqPersistedTopicsCache(options) {
    var opts = options || {};
    var allowExpired = !!opts.allowExpired;

    try {
      var raw = localStorage.getItem(MCQ_TOPICS_PERSIST_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      var topics = Array.isArray(parsed && parsed.data) ? parsed.data : null;
      var lastLoadTime = Number(parsed && parsed.lastLoadTime);
      if (!topics || !Number.isFinite(lastLoadTime)) return null;

      var age = Date.now() - lastLoadTime;
      if (!allowExpired && age > MCQ_TOPICS_PERSIST_TTL) return null;

      return {
        topics: topics,
        lastLoadTime: lastLoadTime,
      };
    } catch (error) {
      console.warn("⚠️ Failed to read persisted MCQ topics cache:", error);
      return null;
    }
  }

  function writeMcqPersistedTopicsCache(topics) {
    try {
      localStorage.setItem(
        MCQ_TOPICS_PERSIST_KEY,
        JSON.stringify({
          data: Array.isArray(topics) ? topics : [],
          lastLoadTime: Date.now(),
        }),
      );
    } catch (error) {
      console.warn("⚠️ Failed to persist MCQ topics cache:", error);
    }
  }

  function hydrateMcqGlobalCacheFromPersisted() {
    var globalCache = window.globalTopicsCache;
    if (
      globalCache &&
      Array.isArray(globalCache.data) &&
      globalCache.data.length > 0 &&
      Date.now() - Number(globalCache.lastLoadTime || 0) <
        Number(globalCache.cacheDuration || MCQ_CACHE_DURATION)
    ) {
      return;
    }

    var persisted = readMcqPersistedTopicsCache();
    if (!persisted) return;

    if (globalCache) {
      globalCache.data = persisted.topics;
      globalCache.lastLoadTime = persisted.lastLoadTime;
    }
    mcqTopicsCache = persisted.topics;
    mcqLastLoadTime = persisted.lastLoadTime;
  }

  hydrateMcqGlobalCacheFromPersisted();
  hydrateQuizStatsCacheFromPersisted();
  ensureMcqUnlockedTopicsCache();

  function mergeMcqLocalStorageProgress(progress, options) {
    var merged = Object.assign({}, progress || {});
    var opts = options || {};
    var serverAuthoritative = !!opts.serverAuthoritative;

    try {
      for (var i = localStorage.length - 1; i >= 0; i--) {
        var key = localStorage.key(i);
        if (!key || key.indexOf("lesson_progress_") !== 0) continue;

        var topicId = key.replace("lesson_progress_", "");
        var localData = JSON.parse(localStorage.getItem(key) || "null");
        if (!localData) continue;

        if (serverAuthoritative && !merged[topicId]) {
          localStorage.removeItem(key);
          continue;
        }

        if (!merged[topicId]) {
          merged[topicId] = {
            topicId: topicId,
            completed: false,
            progress: 0,
          };
        }

        merged[topicId].lessonCompleted =
          merged[topicId].lessonCompleted || localData.lessonRead || false;
        merged[topicId].mindmapViewed =
          merged[topicId].mindmapViewed || localData.mindmapViewed || false;
        merged[topicId].flashcardsCompleted =
          merged[topicId].flashcardsCompleted || localData.flashcardsDone || false;
        merged[topicId].miniQuizCompleted =
          merged[topicId].miniQuizCompleted || localData.lessonQuiz || false;

        var count = 0;
        if (merged[topicId].lessonCompleted) count++;
        if (merged[topicId].mindmapViewed) count++;
        if (merged[topicId].flashcardsCompleted) count++;
        if (merged[topicId].miniQuizCompleted) count++;
        merged[topicId].progress = Math.round((count / 4) * 100);
        merged[topicId].completed = count === 4;
      }
    } catch (e) {
      console.warn("⚠️ Could not merge localStorage progress for MCQ:", e);
    }
    return merged;
  }

  function updateMcqHeaderProgress() {
    var baseProgress =
      (window.globalTopicsCache && window.globalTopicsCache.progress) || {};
    var mergedProgress = mergeMcqLocalStorageProgress(baseProgress);
    var completed = Object.values(mergedProgress).filter(function (item) {
      return item && item.completed;
    }).length;

    var completedEl = document.getElementById("completedMcqTopics");
    if (completedEl) {
      completedEl.textContent = completed;
    }
  }

  function refreshMcqProgressFromServer() {
    if (typeof google === "undefined" || !google.script || !google.script.run) {
      updateMcqHeaderProgress();
      return;
    }

    google.script.run
      .withSuccessHandler(function (result) {
        if (result && result.success && result.progress) {
          var merged = mergeMcqLocalStorageProgress(result.progress, {
            serverAuthoritative: true,
          });
          if (window.globalTopicsCache) {
            window.globalTopicsCache.progress = merged;
          }
        }
        updateMcqHeaderProgress();
      })
      .withFailureHandler(function () {
        updateMcqHeaderProgress();
      })
      .getUserTopicProgress();
  }

  function readQuizStatsPersistedCache(options) {
    const opts = options || {};
    const allowExpired = !!opts.allowExpired;
    try {
      const raw = localStorage.getItem(QUIZ_STATS_PERSIST_KEY);
      if (!raw) return null;
      const parsed = JSON.parse(raw);
      const stats = parsed && typeof parsed.stats === "object" ? parsed.stats : null;
      const lastLoadTime = Number(parsed && parsed.lastLoadTime);
      if (!stats || !Number.isFinite(lastLoadTime)) return null;

      const age = Date.now() - lastLoadTime;
      if (!allowExpired && age > QUIZ_STATS_PERSIST_TTL) return null;

      return { stats, lastLoadTime };
    } catch (error) {
      console.warn("⚠️ Failed to read persisted quiz stats cache:", error);
      return null;
    }
  }

  function writeQuizStatsPersistedCache(stats, lastLoadTime) {
    try {
      localStorage.setItem(
        QUIZ_STATS_PERSIST_KEY,
        JSON.stringify({
          stats: stats && typeof stats === "object" ? stats : {},
          lastLoadTime: Number(lastLoadTime) || Date.now(),
        }),
      );
    } catch (error) {
      console.warn("⚠️ Failed to persist quiz stats cache:", error);
    }
  }

  function hydrateQuizStatsCacheFromPersisted() {
    if (!window.quizStatsCache) return;
    const persisted = readQuizStatsPersistedCache();
    if (!persisted) return;

    window.quizStatsCache.stats = persisted.stats;
    window.quizStatsCache.lastLoadTime = persisted.lastLoadTime;
    window.quizStatsCache.cacheDuration = QUIZ_STATS_PERSIST_TTL;
  }

  // ===== QUIZ STATS PERSISTENCE (localStorage) =====
  function readMcqPersistedStatsCache() {
    try {
      var raw = localStorage.getItem(MCQ_STATS_PERSIST_KEY);
      if (!raw) return null;
      var parsed = JSON.parse(raw);
      var stats = parsed && parsed.stats && typeof parsed.stats === "object" ? parsed.stats : null;
      var lastLoadTime = Number(parsed && parsed.lastLoadTime);
      if (!stats || !Number.isFinite(lastLoadTime)) return null;
      var age = Date.now() - lastLoadTime;
      if (age > MCQ_STATS_PERSIST_TTL) return null;
      return { stats: stats, lastLoadTime: lastLoadTime };
    } catch (e) {
      return null;
    }
  }

  function writeMcqPersistedStatsCache(stats) {
    try {
      localStorage.setItem(
        MCQ_STATS_PERSIST_KEY,
        JSON.stringify({ stats: stats || {}, lastLoadTime: Date.now() })
      );
    } catch (e) {}
  }

  function hydrateMcqStatsFromPersisted() {
    var statsCache = window.quizStatsCache;
    if (
      statsCache &&
      statsCache.stats &&
      Object.keys(statsCache.stats).length > 0 &&
      Date.now() - Number(statsCache.lastLoadTime || 0) < Number(statsCache.cacheDuration || 60000)
    ) {
      return; // Đã có cache hợp lệ trong bộ nhớ
    }
    var persisted = readMcqPersistedStatsCache();
    if (!persisted) return;
    if (statsCache) {
      statsCache.stats = persisted.stats;
      statsCache.lastLoadTime = persisted.lastLoadTime;
    }
  }

  hydrateMcqStatsFromPersisted();

  // Search function for MCQ topics
  function searchMcqTopics(query) {
    if (!mcqAllTopicsForSearch) return;
    if (!query.trim()) {
      renderTopicsGrid(mcqAllTopicsForSearch);
      return;
    }
    const searchLower = query.toLowerCase();
    const filtered = mcqAllTopicsForSearch.filter((topic) =>
      String((topic && topic.title) || "")
        .toLowerCase()
        .includes(searchLower),
    );
    renderTopicsGrid(filtered);
  }
  window.searchMcqTopics = searchMcqTopics;

  // ========== QUIZ STATE ==========

  let quizState = {
    // Entry & topic
    entrySource: null, // 'mcq' | 'lesson'
    selectedTopic: null, // full topic object
    topicId: null,
    topicTitle: "",
    contentDocId: "",
    quizMode: "instant", // 'instant' | 'review'

    // Questions & answers
    questions: [], // all loaded questions (raw)
    filteredQuestions: [], // questions after mastered filter
    allQuestionsOriginal: [], // ⭐ Lưu tất cả câu hỏi gốc (không bị lọc) để dùng khi retake
    currentQuestionIndex: 0,
    userAnswers: [],
    answeredQuestions: [],
    wrongAnswers: [],
    retryQueue: [],
    masteredIds: [],
    score: 0,

    // Timer
    startTime: null,
    elapsedTime: 0,
    timerInterval: null,

    // Session
    quizSession: null, // structured session object

    // UI state
    loading: false,
    error: null,
    isReviewing: false,
    allMastered: false,
    masteredCount: 0,
    autoAdvanceTimer: null,
    isLoadingTopic: false,
    allTopics: [],
    topicHistory: [],
  };

  // Legacy alias: gameMode ↔ quizMode
  Object.defineProperty(quizState, "gameMode", {
    get() {
      return this.quizMode;
    },
    set(val) {
      this.quizMode = val;
    },
    enumerable: false,
  });

  // ========== 1. ENTRY POINT ==========

  /**
   * detectQuizEntrySource() — Xác định luồng truy cập
   * @returns {'lesson'|'mcq'}
   */
  function detectQuizEntrySource() {
    const params = window.currentPageParams;
    if (params && params.fromLesson) {
      return "lesson";
    }
    return "mcq";
  }

  /**
   * initMCQPage() — Entry point, gọi khi page-mcq được hiển thị
   */
  function initMCQPage() {
    console.log("🎯 Initializing MCQ Page...");
    resetQuizState();
    startMCQHeaderMeteors();
    setupMCQHeaderMouseEffect();

    const entrySource = detectQuizEntrySource();
    quizState.entrySource = entrySource;

    const params = window.currentPageParams || {};
    console.log("📋 Showing topic selection / topic detail hub");
    showTopicSelection();
    setTopicsListLoadingState(true);
    try {
      loadAvailableTopics();
    } catch (error) {
      console.error("❌ initMCQPage failed to load topics:", error);
      handleTopicsError({ message: error && error.message ? error.message : "Lỗi khởi tạo trang quiz" });
    }

    // Có topicId từ trang trước thì mở trang chi tiết topic, không vào chơi trực tiếp
    if (params.topicId) {
      openQuizTopicHubFromParams(params);
    }
  }

  function openQuizTopicHubFromParams(params) {
    const topicId = String((params && params.topicId) || "").trim();
    if (!topicId) return;

    const allSources = [];
    if (Array.isArray(quizState.allTopics) && quizState.allTopics.length > 0) {
      allSources.push.apply(allSources, quizState.allTopics);
    }
    if (
      window.globalTopicsCache &&
      Array.isArray(window.globalTopicsCache.data) &&
      window.globalTopicsCache.data.length > 0
    ) {
      allSources.push.apply(allSources, window.globalTopicsCache.data);
    }

    var topic = allSources.find(function (t) {
      return String((t && t.topicId) || "").trim() === topicId;
    });

    if (!topic) {
      topic = {
        topicId: topicId,
        title: params.topicTitle || "Quiz",
        contentDocId: params.contentDocId || "",
        category: params.category || "Chung",
        description: "",
        estimatedTime: "Không giới hạn",
      };
    }

    openQuizTopicHub(topic);
  }

  /**
   * resetQuizState() — Reset toàn bộ state về giá trị ban đầu
   */
  function resetQuizState() {
    if (quizState.timerInterval) clearInterval(quizState.timerInterval);
    if (quizState.autoAdvanceTimer) clearTimeout(quizState.autoAdvanceTimer);

    quizState.entrySource = null;
    quizState.selectedTopic = null;
    quizState.topicId = null;
    quizState.topicTitle = "";
    quizState.contentDocId = "";
    quizState.quizMode = "instant";
    quizState.questions = [];
    quizState.filteredQuestions = [];
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = [];
    quizState.answeredQuestions = [];
    quizState.wrongAnswers = [];
    quizState.retryQueue = [];
    quizState.masteredIds = [];
    quizState.score = 0;
    quizState.startTime = null;
    quizState.elapsedTime = 0;
    quizState.timerInterval = null;
    quizState.quizSession = null;
    quizState.loading = false;
    quizState.error = null;
    quizState.isReviewing = false;
    quizState.allMastered = false;
    quizState.masteredCount = 0;
    quizState.autoAdvanceTimer = null;
    quizState.isLoadingTopic = false;
  }

  // ========== 2. VIEW SWITCHING ==========
  function showTopicSelection() {
    document.getElementById("mcq-topic-selection").style.display = "block";
    document.getElementById("mcq-topic-detail-view").style.display = "none";
    document.getElementById("mcq-quiz-view").style.display = "none";
  }

  function showTopicDetailView() {
    document.getElementById("mcq-topic-selection").style.display = "none";
    document.getElementById("mcq-topic-detail-view").style.display = "block";
    document.getElementById("mcq-quiz-view").style.display = "none";
  }

  /**
   * Show quiz view
   */
  function showQuizView() {
    document.getElementById("mcq-topic-selection").style.display = "none";
    document.getElementById("mcq-topic-detail-view").style.display = "none";
    document.getElementById("mcq-quiz-view").style.display = "block";
    const topicTitleEl = document.getElementById("mcq-topic-title");
    if (topicTitleEl) {
      topicTitleEl.textContent = quizState.topicTitle;
      if (typeof window.applyHeaderTitleBounce === "function") {
        window.applyHeaderTitleBounce(topicTitleEl);
      }
    }
  }

  function setTopicsListLoadingState(isLoading) {
    const loadingEl = document.getElementById("topics-loading");
    const gridEl = document.getElementById("topics-grid");
    const emptyEl = document.getElementById("topics-empty");

    if (loadingEl) loadingEl.style.display = isLoading ? "block" : "none";
    if (isLoading) {
      if (gridEl) gridEl.style.display = "none";
      if (emptyEl) emptyEl.style.display = "none";
    }
  }

  /**
   * Load topics for quiz selection - OPTIMIZED with cache
   * Ưu tiên: 1. Global cache (từ Topics page) → 2. Local cache → 3. Load từ server
   * ⭐ Kèm theo: Load quiz stats per topic để hiển thị badge "Đã chơi" + điểm cao nhất
   */
  function loadTopicsForQuiz(forceRefresh = false) {
    console.log("📥 Loading topics for quiz...");
    const now = Date.now();

    hydrateMcqGlobalCacheFromPersisted();
    clearMcqTopicsLoadTimeout();

    // Luôn reset trạng thái loading ngay khi bắt đầu để tránh treo UI cũ.
    setTopicsListLoadingState(true);

    // ⭐ Load quiz stats từ server (song song với việc check cache)
    loadQuizStatsIfNeeded(forceRefresh);

    // ⭐ ƯU TIÊN 1: Kiểm tra Global Cache (chia sẻ từ Topics page)
    const globalCache = window.globalTopicsCache;
    if (
      !forceRefresh &&
      globalCache &&
      globalCache.data &&
      now - globalCache.lastLoadTime < globalCache.cacheDuration
    ) {
      console.log("✅ Using GLOBAL cached topics data (from Topics page)");
      quizState.allTopics = globalCache.data;
      mcqTopicsCache = globalCache.data; // Sync với local cache
      mcqLastLoadTime = globalCache.lastLoadTime;
      mcqAllTopicsForSearch = globalCache.data;

      setTopicsListLoadingState(false);

      if (globalCache.data.length === 0) {
        showEmptyTopicsState();
      } else {
        renderTopicsGrid(globalCache.data);
      }
      refreshMcqProgressFromServer();
      return;
    }

    // ⭐ ƯU TIÊN 2: Kiểm tra Local cache - nếu còn hiệu lực thì dùng
    if (
      !forceRefresh &&
      mcqTopicsCache &&
      now - mcqLastLoadTime < MCQ_CACHE_DURATION
    ) {
      console.log("✅ Using LOCAL cached MCQ topics data");
      quizState.allTopics = mcqTopicsCache;
      mcqAllTopicsForSearch = mcqTopicsCache;

      setTopicsListLoadingState(false);

      if (mcqTopicsCache.length === 0) {
        showEmptyTopicsState();
      } else {
        renderTopicsGrid(mcqTopicsCache);
      }
      refreshMcqProgressFromServer();
      return;
    }

    // ⭐ ƯU TIÊN 3: Load từ server
    // Show loading state
    setTopicsListLoadingState(true);

    mcqTopicsLoadTimeoutId = setTimeout(function () {
      const loadingEl = document.getElementById("topics-loading");
      if (loadingEl && loadingEl.style.display !== "none") {
        handleTopicsError({
          message: "Tải chủ đề quá thời gian. Đang dùng dữ liệu dự phòng nếu có.",
        });
      }
    }, MCQ_TOPICS_LOAD_TIMEOUT);

    google.script.run
      .withSuccessHandler(handleTopicsLoaded)
      .withFailureHandler(handleTopicsError)
      .getAllTopics();
  }

  /**
   * ⭐ Load quiz stats per topic từ server nếu cần (cache expired hoặc forceRefresh)
   */
  function loadQuizStatsIfNeeded(forceRefresh = false) {
    const now = Date.now();
    const statsCache = window.quizStatsCache;

    // Check if cache is still valid
    if (
      !forceRefresh &&
      statsCache &&
      statsCache.stats &&
      Object.keys(statsCache.stats).length > 0
    ) {
      if (now - statsCache.lastLoadTime < statsCache.cacheDuration) {
        console.log("✅ Using cached quiz stats per topic");
        return;
      }
    }

    console.log("📊 Loading quiz stats per topic from server...");
    google.script.run
      .withSuccessHandler(function (response) {
        if (response && response.success && response.stats) {
          var existingStats =
            window.quizStatsCache && window.quizStatsCache.stats
              ? window.quizStatsCache.stats
              : {};
          window.quizStatsCache.stats = mergeQuizStatsMap(existingStats, response.stats);
          window.quizStatsCache.lastLoadTime = Date.now();
          writeQuizStatsPersistedCache(
            window.quizStatsCache.stats,
            window.quizStatsCache.lastLoadTime,
          );
          console.log(
            "✅ Quiz stats loaded for " +
              Object.keys(response.stats).length +
              " topics",
          );

          // ⭐ Lưu vào localStorage để tái sử dụng khi navigate lại trang
          writeMcqPersistedStatsCache(response.stats);

          // Re-render topics grid với stats mới nếu đang hiển thị
          if (mcqAllTopicsForSearch && mcqAllTopicsForSearch.length > 0) {
            renderTopicsGrid(mcqAllTopicsForSearch);
          }
        }
      })
      .withFailureHandler(function (error) {
        console.warn("⚠️ Failed to load quiz stats:", error);
      })
      .getQuizStatsPerTopic();
  }

  /**
   * ⭐ Helper: Get quiz stats for a specific topic
   * @param {string} topicId
   * @returns {object|null} - {hasPlayed, bestScore, bestTotal, bestPercent, playCount, lastPlayedAt} or null
   */
  function getQuizStatsForTopic(topicId) {
    const statsCache = window.quizStatsCache;
    if (!statsCache || !statsCache.stats) return null;
    return statsCache.stats[topicId] || null;
  }

  function getQuizBestPercent(stats) {
    if (!stats || typeof stats !== "object") return 0;

    var byPercent = Number(stats.bestPercent);
    if (Number.isFinite(byPercent) && byPercent >= 0) {
      return Math.max(0, Math.min(100, Math.round(byPercent)));
    }

    var byScore = Number(stats.bestScore);
    var byTotal = Number(stats.bestTotal);
    if (Number.isFinite(byScore) && Number.isFinite(byTotal) && byTotal > 0) {
      return Math.max(0, Math.min(100, Math.round((byScore / byTotal) * 100)));
    }

    return 0;
  }

  function mergeQuizStatEntry(existing, incoming) {
    var oldStat = existing && typeof existing === "object" ? existing : {};
    var newStat = incoming && typeof incoming === "object" ? incoming : {};

    var oldBest = getQuizBestPercent(oldStat);
    var newBest = getQuizBestPercent(newStat);
    var keepIncomingAsBest = newBest >= oldBest;
    var bestSource = keepIncomingAsBest ? newStat : oldStat;

    return {
      hasPlayed: Boolean(oldStat.hasPlayed || newStat.hasPlayed),
      bestScore: Number(bestSource.bestScore || 0),
      bestTotal: Number(bestSource.bestTotal || 0),
      bestPercent: Math.max(oldBest, newBest),
      playCount: Math.max(Number(oldStat.playCount || 0), Number(newStat.playCount || 0)),
      lastPlayedAt: newStat.lastPlayedAt || oldStat.lastPlayedAt || null,
    };
  }

  function mergeQuizStatsMap(existingMap, incomingMap) {
    var merged = {};
    var base = existingMap && typeof existingMap === "object" ? existingMap : {};
    var incoming = incomingMap && typeof incomingMap === "object" ? incomingMap : {};
    var allIds = {};

    Object.keys(base).forEach(function (id) {
      allIds[id] = true;
    });
    Object.keys(incoming).forEach(function (id) {
      allIds[id] = true;
    });

    Object.keys(allIds).forEach(function (id) {
      merged[id] = mergeQuizStatEntry(base[id], incoming[id]);
    });

    return merged;
  }

  /**
   * ⭐ Helper: Update quiz stats for a specific topic after completing quiz
   * Gọi sau khi nộp bài để cập nhật local cache ngay lập tức
   */
  function updateLocalQuizStats(topicId, score, totalQuestions, percentage) {
    if (!window.quizStatsCache) {
      window.quizStatsCache = {
        stats: {},
        lastLoadTime: 0,
        cacheDuration: 60000,
      };
    }

    const stats = window.quizStatsCache.stats[topicId];
    const now = new Date().toISOString();

    if (!stats) {
      // First time playing this topic
      window.quizStatsCache.stats[topicId] = {
        hasPlayed: true,
        bestScore: score,
        bestTotal: totalQuestions,
        bestPercent: percentage,
        playCount: 1,
        lastPlayedAt: now,
      };
    } else {
      // Update existing stats
      stats.playCount++;
      stats.lastPlayedAt = now;

      // Update best score only if new percentage is higher
      if (percentage > stats.bestPercent) {
        stats.bestScore = score;
        stats.bestTotal = totalQuestions;
        stats.bestPercent = percentage;
      }
    }

    console.log(
      "✅ Updated local quiz stats for topic:",
      topicId,
      window.quizStatsCache.stats[topicId],
    );

    window.quizStatsCache.lastLoadTime = Date.now();
    writeQuizStatsPersistedCache(
      window.quizStatsCache.stats,
      window.quizStatsCache.lastLoadTime,
    );

    // ⭐ Lưu vào localStorage để tái sử dụng khi navigate lại trang
    writeMcqPersistedStatsCache(window.quizStatsCache.stats);
  }

    console.log("✅ Topics loaded:", response);

    // It returns {success: true, topics: [...], count: N}
    let topics = [];

    try {

        topics = response.topics;
      } else if (Array.isArray(response)) {

        document.getElementById("topics-empty").innerHTML = `

            </svg>
            Thử lại
          </button>
        </div>
      `;
        return;
      }

      // Chuẩn hóa dữ liệu để tránh crash khi render.
      topics = (Array.isArray(topics) ? topics : [])
        .filter(function (topic) {
          return topic && typeof topic === "object";
        })
        .map(function (topic, index) {
          return {
            topicId: String(topic.topicId || topic.id || ""),
            title: String(topic.title || "Chủ đề chưa đặt tên"),
            description: String(topic.description || ""),
            category: String(topic.category || "Chung"),
            estimatedTime: String(topic.estimatedTime || "Không giới hạn"),
            contentDocId: String(topic.contentDocId || ""),
            order: Number(topic.order) || index + 1,
          };
        });

      // ⭐ Lưu vào LOCAL cache
      mcqTopicsCache = topics;
      mcqLastLoadTime = Date.now();

      // ⭐ Lưu vào GLOBAL cache (để chia sẻ với Topics page và các page khác)
      if (window.globalTopicsCache) {
        window.globalTopicsCache.data = topics;
        window.globalTopicsCache.lastLoadTime = Date.now();
        console.log(`✅ Cached ${topics.length} topics to GLOBAL cache`);
      }
      writeMcqPersistedTopicsCache(topics);
      console.log(`✅ Cached ${topics.length} topics for MCQ`);

      if (topics.length === 0) {
        showEmptyTopicsState();
        refreshMcqProgressFromServer();
        return;

      quizState.allTopics = topics;
      mcqAllTopicsForSearch = topics;
      renderTopicsGrid(topics);
      refreshMcqProgressFromServer();
    } catch (renderError) {
      console.error("❌ Error while processing loaded topics:", renderError);
      handleTopicsError({ message: renderError.message || "Lỗi render chủ đề" });
    } finally {
      // Chốt an toàn: không để loading bị treo dù có lỗi bất ngờ.
      setTopicsListLoadingState(false);
    }
  }

      if (!prevTopic || !prevTopic.topicId) return false;

      if (isMcqTopicPermanentlyUnlocked(topicId)) {
        return true;
      }

      const quizStats =
        window.quizStatsCache && window.quizStatsCache.stats
          ? window.quizStatsCache.stats
          : {};
      const prevStats = quizStats[prevTopic.topicId] || null;

      var unlockedNow = prevStats && getQuizBestPercent(prevStats) >= 80;
      if (unlockedNow) {
        markMcqTopicUnlocked(topicId);

      return unlockedNow;

      const topicStats = quizStats[topicId] || null;
      const hasPlayed = topicStats && topicStats.hasPlayed === true;

        ? window.checkMcqTopicUnlocked(topicId)
        : true;

      item.className = `mcq-topic-item${hasDoc ? "" : " no-content"}${hasPlayed ? " played" : ""}${!isUnlocked ? " locked" : ""}`;

      if (!isUnlocked) {
        item.onclick = () => {
          showMcqLockedTopicModal(topicTitle);

        item.onclick = () =>
          selectTopicForQuiz(
            Object.assign({}, topic, {
              title: topicTitle,
              category: topicCategory,
              topicId: topicId,
              contentDocId: contentDocId,

  function normalizeQuizHistoryTime(value) {
    if (value === null || value === undefined || value === "") return "-";

    if (typeof value === "string") {
      var trimmed = value.trim();
      if (!trimmed) return "-";
      if (trimmed.indexOf(":") >= 0 && trimmed.toLowerCase().indexOf("gmt") < 0) {
        return trimmed;
      }
      var parsedFromString = new Date(trimmed);
      if (!isNaN(parsedFromString.getTime())) {
        return formatQuizDurationFromDate(parsedFromString);
      }
      return trimmed;
    }

    if (value instanceof Date) {
      return formatQuizDurationFromDate(value);
    }

    if (typeof value === "number" && isFinite(value)) {
      if (value > 0 && value < 1) {
        return formatQuizDurationSeconds(Math.round(value * 86400));
      }
      return formatQuizDurationSeconds(Math.round(value));
    }

    return String(value);
  }

  function formatQuizDurationFromDate(dateValue) {
    if (!(dateValue instanceof Date) || isNaN(dateValue.getTime())) return "-";
    return formatQuizDurationSeconds(
      dateValue.getHours() * 3600 + dateValue.getMinutes() * 60 + dateValue.getSeconds(),
    );
  }

  function formatQuizDurationSeconds(totalSeconds) {
    var safe = Math.max(0, Number(totalSeconds) || 0);
    var hours = Math.floor(safe / 3600);
    var minutes = Math.floor((safe % 3600) / 60);
    var seconds = safe % 60;

    if (hours > 0) {
      return (
        String(hours).padStart(2, "0") +
        ":" +
        String(minutes).padStart(2, "0") +
        ":" +
        String(seconds).padStart(2, "0")
      );
    }

    return String(minutes).padStart(2, "0") + ":" + String(seconds).padStart(2, "0");
  }

  function renderQuizHistoryDetailHtml(detail) {
    var d = detail || {};
    var questionItems = Array.isArray(d.questionDetails)
      ? d.questionDetails
          .map(function (q, idx) {
            var labels = ["A", "B", "C", "D", "E", "F"];
            var userLabel =
              q.userAnswer === null || q.userAnswer === undefined
                ? "-"
                : labels[q.userAnswer] || String(q.userAnswer + 1);
            var correctLabel =
              q.correctAnswer === null || q.correctAnswer === undefined
                ? "-"
                : labels[q.correctAnswer] || String(q.correctAnswer + 1);
            var optionsHtml = Array.isArray(q.options)
              ? q.options
                  .map(function (opt, optIdx) {
                    var marker = labels[optIdx] || String(optIdx + 1);
                    var flags = [];
                    if (optIdx === q.userAnswer) flags.push("Bạn chọn");
                    if (optIdx === q.correctAnswer) flags.push("Đáp án đúng");
                    var suffix = flags.length ? " (" + flags.join(" - ") + ")" : "";
                    return (
                      '<div class="mcq-history-option">' +
                      marker +
                      ". " +
                      String(opt || "") +
                      suffix +
                      "</div>"
                    );
                  })
                  .join("")
              : "";

            return (
              '<div class="mcq-history-question">' +
              "<strong>Câu " +
              (idx + 1) +
              ":</strong> " +
              (q.question || "") +
              "<br>" +
              "Bạn chọn: " +
              userLabel +
              " | Đáp án đúng: " +
              correctLabel +
              (q.isCorrect ? " ✅" : " ❌") +
              (optionsHtml ? '<div class="mcq-history-options">' + optionsHtml + "</div>" : "") +
              "</div>"
            );
          })
          .join("")
      : "";

    return (
      '<div class="mcq-history-summary">' +
      "Điểm: <strong>" +
      (d.score || 0) +
      "/" +
      (d.totalQuestions || 0) +
      "</strong> - " +
      (d.percentage || 0) +
      "%<br>" +
      "Thời gian: " +
      normalizeQuizHistoryTime(d.timeTaken) +
      "<br>" +
      "Chế độ: " +
      (d.gameMode || "instant") +
      "<br>" +
      "Hoàn thành: " +
      (d.completedAt ? new Date(d.completedAt).toLocaleString("vi-VN") : "-") +
      "</div>" +
      '<div class="mcq-history-questions">' +
      questionItems +
      "</div>"
    );
  }

  window.openQuizHistoryDetail = function (resultId, triggerButton) {

    if (!quizState.openHistoryDetail) {

        button: null,
      };
    }

    if (triggerButton) {

      if (current.panel) {
        current.panel.remove();
      }
      if (current.button) {
        current.button.textContent = "Chi tiết";
      }

      if (current.id === resultId && current.button === triggerButton) {
        current.id = null;
        current.panel = null;
        current.button = null;
        return;
      }

      var row = triggerButton.closest(".mcq-topic-history-item");
      if (!row || !row.parentNode) return;

      var panel = document.createElement("div");
      panel.className = "mcq-history-inline-detail";
      panel.innerHTML =
        '<div class="mcq-history-inline-loading">Đang tải chi tiết...</div>';
      row.parentNode.insertBefore(panel, row.nextSibling);
      triggerButton.textContent = "Đóng";

      current.id = resultId;
      current.panel = panel;
      current.button = triggerButton;

      google.script.run
        .withSuccessHandler(function (response) {
          if (!quizState.openHistoryDetail || quizState.openHistoryDetail.id !== resultId) {
            return;
          }
          if (!response || !response.success || !response.detail) {
            panel.innerHTML = '<p class="mcq-history-inline-error">Không tìm thấy chi tiết lượt chơi.</p>';
            return;
          }
          panel.innerHTML = renderQuizHistoryDetailHtml(response.detail);

        })
        .withFailureHandler(function () {
          if (!quizState.openHistoryDetail || quizState.openHistoryDetail.id !== resultId) {
            return;
          }
          panel.innerHTML = '<p class="mcq-history-inline-error">Không thể tải chi tiết lượt chơi.</p>';

    modal.style.display = "flex";
    setTimeout(function () {

    body.innerHTML = "<p>Đang tải chi tiết...</p>";

    google.script.run
      .withSuccessHandler(function (response) {
        if (!response || !response.success || !response.detail) {
          body.innerHTML = "<p>Không tìm thấy chi tiết lượt chơi.</p>";
          return;
        }

        body.innerHTML = renderQuizHistoryDetailHtml(response.detail);

      .withFailureHandler(function () {
        body.innerHTML = "<p>Không thể tải chi tiết lượt chơi.</p>";
      })
      .getQuizResultDetailById(resultId);
  };

  /**

  /**
   * filterMasteredQuestions(allQuestions, masteredIds) — Lọc câu đã thuộc
   * @returns {questions: Array, allMastered: boolean}
   */
  function filterMasteredQuestions(allQuestions, masteredIds) {
    if (!masteredIds || masteredIds.length === 0) {
      return { questions: allQuestions, allMastered: false };
    }
    var filtered = allQuestions.filter(function (q) {
      return !masteredIds.includes(q.id);
    });
    console.log(
      "✅ Filtered: " +
        allQuestions.length +
        " → " +
        filtered.length +
        " questions",
    );
    if (filtered.length === 0) {
      return { questions: allQuestions, allMastered: true };
    }
    return { questions: filtered, allMastered: false };
  }

  /**
   * createQuizSession(finalQuestions) — Tạo session quiz mới
   * @returns session object
   */
  function createQuizSession(finalQuestions) {
    var sessionId =
      "QS_" + Date.now() + "_" + Math.random().toString(36).substr(2, 6);

    // ⭐ Shuffle đáp án của mỗi câu hỏi để random vị trí A/B/C/D
    var shuffledQuestions = finalQuestions.map(function (question) {
      var options = question.options.slice(); // Copy array
      var correctOption = options[question.correctAnswer]; // Lưu đáp án đúng

      // Fisher-Yates shuffle
      for (var i = options.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var temp = options[i];
        options[i] = options[j];
        options[j] = temp;
      }

      // Tìm vị trí mới của đáp án đúng
      var newCorrectIndex = options.indexOf(correctOption);

      return {
        id: question.id,
        question: question.question,
        options: options,
        correctAnswer: newCorrectIndex,
        explanation: question.explanation,
        hint: question.hint,
        difficulty: question.difficulty,
      };
    });

    console.log("🎲 Shuffled answer options for all questions");

    var session = {
      sessionId: sessionId,
      topicId: quizState.topicId,
      contentDocId: quizState.contentDocId,
      quizMode: quizState.quizMode,
      questions: shuffledQuestions,
      currentQuestionIndex: 0,
      userAnswers: new Array(shuffledQuestions.length).fill(null),
      score: 0,
      elapsedTime: 0,
      startedAt: new Date().toISOString(),
      status: "in_progress",
    };

    quizState.quizSession = session;
    quizState.questions = shuffledQuestions;
    quizState.filteredQuestions = shuffledQuestions;
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = session.userAnswers;
    quizState.answeredQuestions = new Array(finalQuestions.length).fill(false);
    quizState.score = 0;
    quizState.loading = false;
    quizState.error = null;

    console.log(
      "🎮 Quiz session created:",
      sessionId,
      "with",
      finalQuestions.length,
      "questions",
    );
    return session;
  }

  /**
   * Load quiz questions from server
   */
  function loadQuizQuestions(forceRegenerate = false) {
    console.log("📥 Loading quiz questions...", {
      topicId: quizState.topicId,
      forceRegenerate,
    });

    showLoading();

    // ⭐ Track loading time for user feedback
    var loadStartTime = Date.now();
    var loadingDots = 0;
    var loadingInterval = setInterval(function () {
      loadingDots++;
      var elapsed = Math.round((Date.now() - loadStartTime) / 1000);
      var hint = document.querySelector("#quiz-loading .quiz-loading-hint");
      if (hint) {
        if (elapsed < 5) {
          hint.textContent = "Đang kiểm tra dữ liệu cache...";
        } else if (elapsed < 12) {
          hint.textContent = "Đang đọc tài liệu bài học...";
        } else if (elapsed < 20) {
          hint.textContent = "AI đang phân tích nội dung học thuật... (" + elapsed + "s)";
        } else if (elapsed < 35) {
          hint.textContent = "Đang soạn thảo bộ câu hỏi trắc nghiệm... (" + elapsed + "s)";
        } else if (elapsed < 60) {
          hint.textContent = "Đang kiểm soát chất lượng câu hỏi... (" + elapsed + "s)";
        } else {
          hint.textContent = "Quá trình hoàn tất chậm hơn dự kiến, vui lòng đợi thêm chút... (" + elapsed + "s)";
        }
      }

      // ⭐ GLOBAL TIMEOUT: 120s
      if (elapsed > 120) {
         clearInterval(loadingInterval);
         handleLoadError("Quá trình tạo câu hỏi quá lâu (hơn 2 phút). Vui lòng thử lại sau hoặc kiểm tra kết nối mạng.");
      }
    }, 1000);

    // ⭐ PARALLEL LOADING: Load mastered IDs + wrong answers + questions cùng lúc
    var questionsResult = null;
    var masteredIds = [];
    var questionsLoaded = false;
    var masteredLoaded = false;

    function tryProcessResults() {
      if (!questionsLoaded || !masteredLoaded) return;
      clearInterval(loadingInterval);
      processQuestionsWithMastered(questionsResult, masteredIds);
    }

    // PARALLEL 1: Load mastered question IDs (with TIMEOUT)
    var masteredTimeout = setTimeout(function() {
      if (!masteredLoaded) {
        console.warn("⚠️ Mastered IDs load timeout - proceeding without filters");
        masteredIds = [];
        masteredLoaded = true;
        tryProcessResults();
      }
    }, 8000); // Wait max 8s for mastered IDs

    google.script.run
      .withSuccessHandler(function (ids) {
        clearTimeout(masteredTimeout);
        if (masteredLoaded && masteredIds.length === 0) {
           // Đã bị timeout trước đó, không ghi đè lại nếu đã xử lý
           return;
        }
        masteredIds = ids || [];
        console.log("📋 Mastered IDs loaded:", masteredIds.length);
        masteredLoaded = true;
        tryProcessResults();
      })
      .withFailureHandler(function () {
        clearTimeout(masteredTimeout);
        masteredIds = [];
        masteredLoaded = true;
        tryProcessResults();
      })
      .getMasteredQuestionIds(quizState.topicId);

    // ⭐ PARALLEL 2: Load questions from AI/cache
    google.script.run
      .withSuccessHandler(function (response) {
        questionsResult = response;
        questionsLoaded = true;
        tryProcessResults();
      })
      .withFailureHandler(function (error) {
        clearInterval(loadingInterval);
        if (isMissingGeminiKeyError(error)) {
          showGeminiKeyConfigWarning(error?.message || error?.toString());
        }
        handleLoadError(error);
      })
      .getAIContentForWeb(quizState.topicId, "questions", forceRegenerate, {
        userId: currentUser?.userId || window.currentUser?.userId || "",
      });
  }

  /**
   * Process questions + mastered IDs together (called when both are ready)
   */
  function processQuestionsWithMastered(response, masteredIds) {
    console.log("✅ Processing questions with mastered IDs...");
    quizState.loading = false;

    if (!response || response.success === false) {
      if (isMissingGeminiKeyError(response)) {
        showGeminiKeyConfigWarning(response?.message);
      }
      quizState.error =
        response?.message || response?.error || "Không thể tải câu hỏi";
      showError(quizState.error);
      return;
    }

    try {
      // ⭐ Safe JSON parse: handle both string and object
      var parsedData = response.data;
      if (typeof parsedData === "string") {
        try {
          parsedData = JSON.parse(parsedData);
        } catch (parseErr) {
          console.error("❌ JSON parse error:", parseErr);
          quizState.error = "Lỗi parse dữ liệu câu hỏi. Thử tạo lại.";
          showError(quizState.error);
          return;
        }
      }

      if (
        !parsedData ||
        !parsedData.questions ||
        !Array.isArray(parsedData.questions)
      ) {
        console.error("❌ Invalid question format:", parsedData);
        quizState.error =
          "Dữ liệu câu hỏi không hợp lệ. Nhấn 'Tạo lại câu hỏi' để thử.";
        showError(quizState.error);
        return;
      }

      console.log("📊 Parsed", parsedData.questions.length, "questions");

      // Normalize questions format
      var questions = parsedData.questions.map(function (q, index) {
        var options = q.options;
        if (!Array.isArray(options)) {
          options = [options.A, options.B, options.C, options.D].filter(
            Boolean,
          );
        }

        var correctAnswer = q.correctAnswer;
        if (typeof correctAnswer === "string") {
          var letterToIndex = { A: 0, B: 1, C: 2, D: 3 };
          correctAnswer = letterToIndex[correctAnswer.toUpperCase()] || 0;
        }

        return {
          id: q.id || "Q" + (index + 1),
          question: q.question,
          options: options,
          correctAnswer: correctAnswer,
          explanation: q.explanation || "",
          hint: q.hint || "",
          difficulty: q.difficulty || "medium",
        };
      });

      // Store mastered IDs in state
      quizState.masteredIds = masteredIds || [];
      quizState.masteredCount = quizState.masteredIds.length;

      // ⭐ Lưu tất cả câu hỏi gốc để dùng khi retake (luôn đảm bảo đủ 20 câu)
      quizState.allQuestionsOriginal = [].concat(questions);

      // ⭐ Filter mastered questions using dedicated function
      var filterResult = filterMasteredQuestions(questions, masteredIds);
      quizState.allMastered = filterResult.allMastered;

      if (filterResult.allMastered) {
        console.log("🏆 All questions mastered!");
        // Shuffle for review mode
        quizState.questions = shuffleArray([].concat(questions));
        quizState.filteredQuestions = quizState.questions;
        showAllMasteredModal(masteredIds.length);
      } else {
        // ⭐ Create quiz session with filtered questions
        var finalQuestions = filterResult.questions;
        createQuizSession(finalQuestions);
        startQuizSession();
      }
    } catch (error) {
      console.error("❌ Error processing questions:", error);
      quizState.error = "Lỗi xử lý dữ liệu câu hỏi: " + error.message;
      showError(quizState.error);
    }
  }

  /**
   * Handle load error
   */
  function handleLoadError(error) {
    console.error("❌ Load error:", error);
    quizState.loading = false;
    if (isMissingGeminiKeyError(error)) {
      showGeminiKeyConfigWarning(error?.message || error?.toString());
    }
    quizState.error = "Lỗi kết nối: " + (error.message || error);
    showError(quizState.error);
  }

  function isMissingGeminiKeyError(payload) {
    const code = String(payload?.code || "").toUpperCase();
    const message = String(payload?.message || payload?.toString?.() || "").toLowerCase();
    return (
      code === "AI_KEY_NOT_CONFIGURED" ||
      message.includes("chưa cấu hình gemini api key") ||
      message.includes("chưa gắn gemini api key") ||
      message.includes("profile/settings")
    );
  }

  function showGeminiKeyConfigWarning(message) {
    showToast(
      message ||
        "Bạn chưa gắn Gemini API key cá nhân. Vui lòng vào Profile/Settings để cấu hình.",
      "warning",
    );
    redirectToProfileAiKeySetup();
  }

  function redirectToProfileAiKeySetup() {
    if (typeof window.showPage === "function") {
      window.showPage("page-profile");
    }

    setTimeout(function () {
      if (typeof window.openProfileSection === "function") {
        window.openProfileSection("ai-key");
      }
    }, 220);
  }

  /**
   * Start quiz session
   */
  function startQuizSession() {
    console.log(
      "🎮 Starting quiz session with",
      quizState.questions.length,
      "questions, mode:",
      quizState.quizMode,
    );

    // Update session status
    if (quizState.quizSession) {
      quizState.quizSession.status = "in_progress";
    }
    quizState.loading = false;
    quizState.error = null;

    if (window.LearningTracker) {
      window.LearningTracker.start("quiz");
    }

    quizState.currentQuestionIndex = 0;
    quizState.score = 0;
    quizState.answeredQuestions = new Array(quizState.questions.length).fill(
      false,
    );

    quizState.startTime = new Date();
    quizState.isReviewing = false;

    document.getElementById("quiz-loading").style.display = "none";
    document.getElementById("quiz-error").style.display = "none";
    
    startTimer();
    
    if (quizState.gameMode === "review") {
      document.getElementById("quiz-stats").style.display = "none";
      document.getElementById("quiz-progress-bar").style.display = "none";
      document.getElementById("quiz-section").style.display = "none";

      const subtitleEl = document.querySelector(".mcq-game-subtitle");

    } else {
      document.getElementById("quiz-stats").style.display = "flex";
      document.getElementById("quiz-progress-bar").style.display = "block";
      document.getElementById("quiz-section").style.display = "block";
      document.getElementById("review-questions-list").style.display = "none";
      
      // Update header subtitle
      const subtitleEl = document.querySelector(".mcq-game-subtitle");
      if (subtitleEl) subtitleEl.innerHTML = 'Làm quiz theo chủ đề <span id="quiz-mode-indicator" class="quiz-mode-indicator">INSTANT</span>';
      
      displayQuestion();
    }
  }

  /**
   * Display current question - With state preservation
   */
  function displayQuestion() {
    const questionIndex = quizState.currentQuestionIndex;
    const question = quizState.questions[questionIndex];
    const isInstantMode = quizState.gameMode === "instant";
    const isLocked = quizState.answeredQuestions[questionIndex] === true;
    const userAnswer = quizState.userAnswers[questionIndex];
    const isFillBlank = question.questionType === "fill-blank";
    const isRetryMCQ = question.questionType === "retry-mcq";

    console.log("📝 Displaying question", questionIndex + 1, {
      isLocked,
      userAnswer,
      mode: quizState.gameMode,
      type: question.questionType || "mcq",
    });

    document.getElementById("question-number").textContent = questionIndex + 1;
    document.getElementById("current-question").textContent = questionIndex + 1;
    document.getElementById("progress-current").textContent = questionIndex + 1;

    const progress = ((questionIndex + 1) / quizState.questions.length) * 100;
    document.getElementById("progress-fill").style.width = progress + "%";

    // Display question with retry badge if retry question
    const questionTextEl = document.getElementById("question-text");
    if (isFillBlank || isRetryMCQ) {
      questionTextEl.innerHTML = `<span class="fill-blank-badge">🔄 Ôn lại</span><br>${question.question}`;
    } else {
      questionTextEl.textContent = question.question;
    }

    const hintElement = document.getElementById("question-hint");
    const hintBtn = document.getElementById("btn-hint");
    if (question.hint) {
      hintElement.textContent = "💡 " + question.hint;
      hintElement.style.display = "none";
      hintBtn.style.display = "inline-flex";
      hintBtn.disabled = false;
    } else {
      hintBtn.style.display = "none";
    }

    // Render different format based on question type
    if (isFillBlank) {
      renderFillBlankOptions(question, questionIndex);
    } else {
      renderAnswerOptions(question.options, questionIndex);
    }

    updateNavigationButtons();

    // Hiển thị lại feedback nếu đã trả lời
    if (userAnswer !== null) {
      const isCorrect = isFillBlank
        ? checkFillBlankAnswer(userAnswer, question.correctAnswer)
        : userAnswer === question.correctAnswer;
      showAnswerFeedback(isCorrect, question);
    } else {
      document.getElementById("answer-feedback").style.display = "none";
    }
  }

  /**
   * Handle MCQ answer click in Review Mode
   */
  window.handleReviewAnswerClick = function(qIdx, oIdx, btn) {

  /**
   * Handle fill-blank input in Review Mode
   */
  window.handleReviewFillInput = function(qIdx, value) {
    quizState.userAnswers[qIdx] = value.trim();
    
    // Hide warning if visible
    const warning = document.getElementById("review-warning");
    if (warning) warning.classList.remove("show");

  /**
   * Render fill-in-blank options for retry questions
   */
  function renderFillBlankOptions(question, questionIndex) {
    const container = document.getElementById("answer-options");
    const isLocked = quizState.answeredQuestions[questionIndex] === true;
    const userAnswer = quizState.userAnswers[questionIndex];
    const isInstantMode = quizState.gameMode === "instant";

    // Show MCQ options with different styling (as hints)
    const labels = ["A", "B", "C", "D"];
    let optionsHtml =
      '<div class="fill-blank-hints"><span class="hint-label">Gợi ý đáp án:</span> ';
    question.options.forEach((opt, idx) => {
      optionsHtml += `<span class="hint-option">${labels[idx]}. ${opt}</span>`;
      if (idx < question.options.length - 1) optionsHtml += " | ";
    });
    optionsHtml += "</div>";

    let inputValue = "";
    let inputClass = "";

    if (isLocked && userAnswer !== null) {
      inputValue =
        typeof userAnswer === "string"
          ? userAnswer
          : question.options[userAnswer] || "";
      const isCorrect = checkFillBlankAnswer(
        userAnswer,
        question.correctAnswer,
      );
      inputClass = isCorrect ? "correct" : "incorrect";
    }

    container.innerHTML = `
      <div class="fill-blank-question">
        ${optionsHtml}
        <input type="text" 
               id="fill-blank-input" 
               class="fill-blank-input ${inputClass}" 
               placeholder="Nhập đáp án của bạn..." 
               value="${inputValue}"
               ${isLocked ? "disabled" : ""}
               onkeyup="handleFillBlankInput(event, ${questionIndex})"
               autocomplete="off">
        ${
          !isLocked
            ? `<button class="btn-submit-fill" onclick="submitFillBlankAnswer(${questionIndex})">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="m9 12 2 2 4-4"/>
          </svg>
          Kiểm tra
        </button>`
            : ""
        }
      </div>
    `;
    container.className = "answer-options fill-blank-mode";
  }

  /**
   * Handle fill-blank input keyup
   */
  function handleFillBlankInput(event, questionIndex) {
    if (event.key === "Enter") {
      submitFillBlankAnswer(questionIndex);
    }
  }

  /**
   * Submit fill-blank answer
   */
  function submitFillBlankAnswer(questionIndex) {
    const input = document.getElementById("fill-blank-input");
    const answer = input.value.trim();

    if (!answer) {
      input.classList.add("shake");
      setTimeout(() => input.classList.remove("shake"), 500);
      return;
    }

    const question = quizState.questions[questionIndex];
    const isCorrect = checkFillBlankAnswer(answer, question.correctAnswer);

    // Store answer
    quizState.userAnswers[questionIndex] = answer;
    quizState.answeredQuestions[questionIndex] = true;

    // Update score
    if (isCorrect) {
      quizState.score++;
      document.getElementById("current-score").textContent = quizState.score;

      // Mark original question as mastered
      if (question.originalId) {
        saveMasteredQuestion({
          id: question.originalId,
          question: question.question,
        });
      }
    }

    // Update UI
    input.disabled = true;
    input.classList.add(isCorrect ? "correct" : "incorrect");

    // Remove submit button
    const submitBtn = document.querySelector(".btn-submit-fill");
    if (submitBtn) submitBtn.remove();

    // Show feedback
    showAnswerFeedback(isCorrect, question);
    updateNavigationButtons();

    // Auto-advance cho fill-blank trong instant mode
    if (quizState.gameMode === "instant") {
      if (quizState.autoAdvanceTimer) {
        clearTimeout(quizState.autoAdvanceTimer);
      }
      quizState.autoAdvanceTimer = setTimeout(() => {
        quizState.autoAdvanceTimer = null;
        if (quizState.currentQuestionIndex < quizState.questions.length - 1) {
          nextQuestion();
        } else {
          checkAndAddRetryQuestions();
        }
      }, 1500);
    }
  }

  /**
   * Check fill-blank answer (case-insensitive, trimmed)
   */
  function checkFillBlankAnswer(userAnswer, correctAnswer) {
    if (typeof userAnswer !== "string") return false;
    const normalizedUser = userAnswer.trim().toLowerCase();
    const normalizedCorrect = String(correctAnswer).trim().toLowerCase();
    return normalizedUser === normalizedCorrect;
  }

  /**
   * Render answer options - With mode-aware locking
   */
  function renderAnswerOptions(options, questionIndex) {
    const container = document.getElementById("answer-options");
    container.innerHTML = "";
    container.className = "answer-options";

    const labels = ["A", "B", "C", "D"];
    const userAnswer = quizState.userAnswers[questionIndex];
    const question = quizState.questions[questionIndex];
    const isLocked = quizState.answeredQuestions[questionIndex] === true;

    options.forEach((option, index) => {
      const button = document.createElement("button");
      button.className = "answer-option";

      const isSelected = userAnswer === index;
      const isCorrect = index === question.correctAnswer;

      if (isSelected) {
        button.classList.add("selected");
      }

      // Nếu đã trả lời, hiển thị trạng thái đúng/sai và khóa
      if (isLocked) {
        if (isSelected && isCorrect) {
          button.classList.add("correct");
        } else if (isSelected && !isCorrect) {
          button.classList.add("incorrect");
        } else if (isCorrect) {
          button.classList.add("correct-answer");
        }
        button.disabled = true;
      }

      button.innerHTML = `
        <div class="option-letter">${labels[index]}</div>
        <span class="option-text">${option}</span>
        ${
          isLocked && isCorrect
            ? '<span class="option-check"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#2FA36B" stroke-width="3"><path d="m9 12 2 2 4-4"/></svg></span>'
            : ""
        }
        ${
          isLocked && isSelected && !isCorrect
            ? '<span class="option-cross"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#DC2626" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></span>'
            : ""
        }
      `;

      // Chỉ cho phép click nếu chưa bị khóa
      if (!isLocked) {
        button.onclick = () => selectAnswer(index);
      }

      container.appendChild(button);
    });
  }

  /**
   * Select an answer - Mode-aware
   */
  function selectAnswer(optionIndex) {
    const questionIndex = quizState.currentQuestionIndex;
    const question = quizState.questions[questionIndex];
    const isInstantMode = quizState.gameMode === "instant";

    // Nếu đã trả lời rồi thì không cho chọn lại
    if (quizState.answeredQuestions[questionIndex]) {
      console.log("⚠️ Câu này đã trả lời rồi, không thể thay đổi");
      return;
    }

    const previousAnswer = quizState.userAnswers[questionIndex];
    const isCorrect = optionIndex === question.correctAnswer;

    console.log("✍️ Answer selected:", {
      question: questionIndex + 1,
      selected: optionIndex,
      correct: question.correctAnswer,
      isCorrect: isCorrect,
      mode: quizState.gameMode,
    });

    quizState.userAnswers[questionIndex] = optionIndex;

    // Ở chế độ instant: khóa câu hỏi và tính điểm ngay
    if (isInstantMode) {
      quizState.answeredQuestions[questionIndex] = true;

      // Tính điểm - chỉ tính 1 lần khi trả lời đúng
      if (isCorrect) {
        quizState.score++;
        document.getElementById("current-score").textContent = quizState.score;

        // Lưu câu đúng để không hỏi lại (use originalId for retry questions)
        if (question.originalId) {
          saveMasteredQuestion({
            id: question.originalId,
            question: question.question,
          });
        } else {
          saveMasteredQuestion(question);
        }
      } else {
        // Lưu câu sai để ôn lại
        saveWrongAnswer(question, optionIndex);
      }

      renderAnswerOptions(question.options, questionIndex);
      showAnswerFeedback(isCorrect, question);

      // Auto-advance sau khi hiện feedback ở chế độ instant
      if (quizState.autoAdvanceTimer) {
        clearTimeout(quizState.autoAdvanceTimer);
      }
      quizState.autoAdvanceTimer = setTimeout(() => {
        quizState.autoAdvanceTimer = null;
        if (quizState.currentQuestionIndex < quizState.questions.length - 1) {
          nextQuestion();
        } else {
          submitQuiz();
        }
      }, 1500);
    } else {
      // Ở chế độ review: khóa câu hỏi, tính điểm và hiển feedback
      quizState.answeredQuestions[questionIndex] = true;

      // Tính điểm real-time cho chế độ review
      if (isCorrect) {
        quizState.score++;
        document.getElementById("current-score").textContent = quizState.score;

        // Lưu câu đúng
        if (question.originalId) {
          saveMasteredQuestion({
            id: question.originalId,
            question: question.question,
          });
        } else {
          saveMasteredQuestion(question);
        }
      } else {
        // Lưu câu sai để ôn lại
        saveWrongAnswer(question, optionIndex);
      }

      renderAnswerOptions(question.options, questionIndex);
      showAnswerFeedback(isCorrect, question);
    }

    updateNavigationButtons();
  }

  function saveWrongAnswer(question, selectedAnswer) {

      )
      .saveWrongAnswer(wrongData);
  }

  /**
   * Create MCQ retry question from wrong MCQ question (shuffled options)
   */
  function createRetryMCQQuestion(originalQuestion) {
    const correctIndex = originalQuestion.correctAnswer;
    const correctAnswer = originalQuestion.options[correctIndex];

    if (!correctAnswer) return null;

    // Shuffle options using Fisher-Yates
    const indexedOptions = originalQuestion.options.map((opt, idx) => ({
      text: opt,
      originalIdx: idx,
    }));
    for (let i = indexedOptions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [indexedOptions[i], indexedOptions[j]] = [
        indexedOptions[j],
        indexedOptions[i],
      ];
    }

    // Find new correct answer index after shuffle
    const newCorrectIndex = indexedOptions.findIndex(
      (opt) => opt.originalIdx === correctIndex,
    );
    const newOptions = indexedOptions.map((opt) => opt.text);

    return {
      id: `RETRY_${originalQuestion.id}`,
      originalId: originalQuestion.id,
      question: originalQuestion.question,
      questionType: "retry-mcq",
      correctAnswer: newCorrectIndex,
      hint: originalQuestion.hint || null,
      explanation:
        originalQuestion.explanation || `Đáp án đúng: ${correctAnswer}`,
      difficulty: "retry",
      options: newOptions,
    };
  }

  /**

    if (quizState.autoAdvanceTimer) {
      clearTimeout(quizState.autoAdvanceTimer);
      quizState.autoAdvanceTimer = null;
    }
    if (quizState.currentQuestionIndex < quizState.questions.length - 1) {

      checkAndAddRetryQuestions();

  /**
   * Check and add retry questions when reaching end of quiz
   */
  function checkAndAddRetryQuestions() {
    if (quizState.retryQueue.length > 0) {
      console.log(
        "📝 Adding retry questions to quiz:",
        quizState.retryQueue.length,
      );

      // Add retry questions to end of questions array
      const retryQuestions = [...quizState.retryQueue];
      quizState.questions.push(...retryQuestions);

      // Extend userAnswers and answeredQuestions arrays
      const additionalAnswers = new Array(retryQuestions.length).fill(null);
      quizState.userAnswers.push(...additionalAnswers);
      quizState.answeredQuestions.push(
        ...new Array(retryQuestions.length).fill(false),
      );

      // Clear retry queue
      quizState.retryQueue = [];

      // Move to next question (first retry question)
      quizState.currentQuestionIndex++;
      displayQuestion();

      // Show notification
      showRetryNotification(retryQuestions.length);
    } else {
      // Không có câu retry → nộp bài
      submitQuiz();
    }
  }

  /**

  function showRetryNotification(count) {
    const notification = document.createElement("div");
    notification.className = "retry-notification";

    document.body.appendChild(notification);

    setTimeout(() => {
      notification.classList.add("show");

    const prevBtn = document.getElementById("btn-prev");

    if (!nextBtn || !prevBtn || !submitBtn) return;

    prevBtn.style.display =

    // Nút câu tiếp theo luôn hoạt động
    nextBtn.disabled = false;
    nextBtn.removeAttribute("disabled");

    if (quizState.currentQuestionIndex === quizState.questions.length - 1) {
      nextBtn.style.display = "none";
      submitBtn.style.display = "inline-block";
      const allAnswered = quizState.userAnswers.every((a) => a !== null);
      submitBtn.disabled = !allAnswered;
      if (allAnswered) submitBtn.removeAttribute("disabled");

      nextBtn.style.display = "inline-block";
      submitBtn.style.display = "none";

  /**
   * Submit quiz - Calculate final score for review mode
   */
  async function submitQuiz() {
    // If in review mode, calculate the final score from userAnswers now
    if (quizState.gameMode === "review") {
      let finalReviewScore = 0;
      let unansweredIndices = [];
      
      quizState.questions.forEach((question, index) => {
        const userAnswer = quizState.userAnswers[index];
        if (userAnswer === null || userAnswer === "") {
          unansweredIndices.push(index + 1);
        } else {
          const isCorrect = question.questionType === "fill-blank"
            ? checkFillBlankAnswer(userAnswer, question.correctAnswer)
            : userAnswer === question.correctAnswer;
          if (isCorrect) finalReviewScore++;
        }
      });
      
      quizState.score = finalReviewScore;
      
      // Validation for review mode
      if (unansweredIndices.length > 0) {
        const warning = document.getElementById("review-warning");
        if (warning) {
          warning.textContent = `Bạn còn ${unansweredIndices.length} câu chưa trả lời (Câu: ${unansweredIndices.join(", ")}).`;
          warning.classList.add("show");
          warning.scrollIntoView({ behavior: "smooth", block: "center" });
          return; // Don't submit yet
        }
      }
    }

    const unansweredCount = quizState.userAnswers.filter(
      (a) => a === null || a === "",
    ).length;

    if (unansweredCount > 0) {
      const shouldSubmit =
        typeof window.showAppConfirm === "function"
          ? await window.showAppConfirm(
              `Bạn còn ${unansweredCount} câu chưa trả lời. Bạn có chắc muốn nộp bài?`,
              {
                title: "Xác nhận nộp bài",
                confirmText: "Nộp bài",
                cancelText: "Tiếp tục làm",
              },
            )
          : false;

      if (!shouldSubmit) {
        return;
      }
    }

    console.log("📤 Submitting quiz");
    stopTimer();

    // Stop learning time tracker and save remaining time
    if (window.LearningTracker) {
      window.LearningTracker.stop();
    }

    // Results calculation
    const finalScore = quizState.score;
    const totalQuestions = quizState.questions.length;
    const percentage = Math.round((finalScore / totalQuestions) * 100);
    const timeTaken = getElapsedTime();

    // Update recent activity with quiz result
    if (
      typeof window.updateActivityResult === "function" &&
      quizState.currentTopic?.topicId
    ) {
      window.updateActivityResult(
        quizState.currentTopic.topicId,
        finalScore,
        totalQuestions,
      );
    }

    showResults(finalScore, totalQuestions, percentage, timeTaken);
    saveQuizResult(finalScore, totalQuestions, percentage, timeTaken);
    if (quizState.quizSession) {
      quizState.quizSession.status = "completed";
    }

    // Save MCQ activity to personal Google Sheet
    google.script.run.saveActivityLog({
      type: "MCQ",
      topicId: quizState.currentTopic?.topicId || quizState.topicId,
      topicTitle:
        quizState.currentTopic?.topicTitle || quizState.topicTitle || "Quiz",
      score: finalScore,
      totalQuestions: totalQuestions,
      percentage: percentage,
    });

    // Notify dashboard to refresh leaderboard + history
    window.dispatchEvent(new Event("dashboard-needs-refresh"));
  }

  /**
   * Save quiz result to database - Detailed tracking
   */
  function saveQuizResult(score, total, percentage, timeTaken) {
    console.log("💾 Saving quiz result to database");

    // ⭐ Update local quiz stats cache IMMEDIATELY (optimistic update)
    if (typeof updateLocalQuizStats === "function" && quizState.topicId) {
      updateLocalQuizStats(quizState.topicId, score, total, percentage);
    }

    // Tạo chi tiết từng câu hỏi
    const questionDetails = quizState.questions.map((q, index) => ({
      questionId: q.id,
      question: q.question,
      userAnswer: quizState.userAnswers[index],
      userAnswerText:
        quizState.userAnswers[index] !== null &&
        quizState.userAnswers[index] !== undefined &&
        Array.isArray(q.options)
          ? q.options[quizState.userAnswers[index]] || ""
          : "",
      correctAnswer: q.correctAnswer,
      correctAnswerText:
        q.correctAnswer !== null &&
        q.correctAnswer !== undefined &&
        Array.isArray(q.options)
          ? q.options[q.correctAnswer] || ""
          : "",
      isCorrect: quizState.userAnswers[index] === q.correctAnswer,
      options: Array.isArray(q.options) ? q.options.slice() : [],
    }));

    const resultData = {
      topicId: quizState.topicId,
      topicTitle: quizState.topicTitle,
      score: score,
      totalQuestions: total,
      percentage: percentage,
      timeTaken: timeTaken,
      completedAt: new Date().toISOString(),
      gameMode: quizState.gameMode,
      answers: quizState.userAnswers,
      questionDetails: questionDetails,
    };

    console.log("📤 Sending result data:", resultData);

    google.script.run
      .withSuccessHandler((response) => {
        console.log("✅ Quiz result saved:", response);
        showSaveNotification(true, "Kết quả đã được lưu!");
        if (quizState.topicId) {
          loadQuizTopicHistory(quizState.topicId);
        }
        // ⭐ Invalidate progress cache so Topics page shows updated progress
        if (window.globalTopicsCache) {
          window.globalTopicsCache.progress = null;
          window.globalTopicsCache.lastLoadTime = 0;
        }
        if (typeof window.invalidateTopicsLocalCache === "function") {
          window.invalidateTopicsLocalCache();
        }
        // ⭐ Invalidate quiz stats cache to force reload on next visit
        if (window.quizStatsCache) {
          window.quizStatsCache.lastLoadTime = 0;
          writeQuizStatsPersistedCache(window.quizStatsCache.stats, 0);
        }
        console.log(
          "🔄 Progress & quiz stats cache invalidated after quiz save",
        );
      })
      .withFailureHandler((error) => {
        console.error("❌ Error saving result:", error);
        showSaveNotification(false, "Không thể lưu kết quả: " + error.message);
      })
      .saveQuizResult(resultData);
  }

  /**
   * Retake quiz - Shuffle questions and options for variety
   * ⭐ Với chế độ "instant" (trả lời nhanh): luôn dùng TẤT CẢ câu hỏi gốc (20 câu)
   */
  function retakeQuiz() {
    console.log("🔄 Retaking quiz with shuffled questions...");

    // Track retry count for this topic
    const retryKey = `quiz_retry_${quizState.topicId}`;
    let retryCount = parseInt(sessionStorage.getItem(retryKey) || "0") + 1;
    sessionStorage.setItem(retryKey, retryCount.toString());

    console.log(`📊 Retry count for topic ${quizState.topicId}: ${retryCount}`);

    // ⭐ Với chế độ "instant" (trả lời nhanh): luôn lấy TẤT CẢ câu hỏi gốc
    // để đảm bảo mỗi lần chơi lại đều có đủ 20 câu
    if (
      quizState.quizMode === "instant" &&
      quizState.allQuestionsOriginal &&
      quizState.allQuestionsOriginal.length > 0
    ) {
      console.log(
        "🎯 Mode instant: Sử dụng tất cả " +
          quizState.allQuestionsOriginal.length +
          " câu hỏi gốc",
      );
      // Copy lại tất cả câu hỏi gốc
      quizState.questions = [].concat(quizState.allQuestionsOriginal);
      shuffleQuestionsAndOptions();
      resetQuizForRetry();
      startQuizSession();
    } else if (quizState.questions && quizState.questions.length > 0) {
      // Chế độ review hoặc không có câu gốc: dùng câu hiện tại
      shuffleQuestionsAndOptions();
      resetQuizForRetry();
      startQuizSession();
    } else {
      // Fallback: reload questions if somehow cleared
      loadQuizQuestions(false);
    }
  }

  /**
   * Fisher-Yates shuffle algorithm
   */
  function shuffleArray(array) {
    const shuffled = [...array];
    for (let i = shuffled.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
    }
    return shuffled;
  }

  /**
   * Shuffle questions order AND shuffle answer options within each question
   */
  function shuffleQuestionsAndOptions() {
    console.log("🎲 Shuffling questions and options...");

    // 1. Shuffle questions order
    quizState.questions = shuffleArray(quizState.questions);

    // 2. Shuffle options within each question
    quizState.questions = quizState.questions.map((question, qIndex) => {
      const options = [...question.options];
      const correctOption = options[question.correctAnswer];

      // Shuffle options
      const shuffledOptions = shuffleArray(options);

      // Find new index of correct answer
      const newCorrectIndex = shuffledOptions.indexOf(correctOption);

      console.log(
        `  Q${qIndex + 1}: Correct answer moved from ${
          question.correctAnswer
        } to ${newCorrectIndex}`,
      );

      return {
        ...question,
        options: shuffledOptions,
        correctAnswer: newCorrectIndex,
      };
    });

    console.log("✅ Questions and options shuffled!");
  }

  /**
   * Reset quiz state for retry (keep questions, clear answers)
   */
  function resetQuizForRetry() {
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = new Array(quizState.questions.length).fill(null);
    quizState.answeredQuestions = new Array(quizState.questions.length).fill(
      false,
    );
    quizState.score = 0;
    quizState.startTime = null;
    quizState.isReviewing = false;
  }

  /**
   * Retake with NEW questions (force AI to regenerate)
   */
  function retakeWithNewQuestions() {
    console.log("🆕 Generating completely new questions...");

    // Reset quiz state completely
    quizState.questions = [];
    quizState.filteredQuestions = [];
    quizState.currentQuestionIndex = 0;
    quizState.userAnswers = [];
    quizState.answeredQuestions = [];
    quizState.wrongAnswers = [];
    quizState.retryQueue = [];
    quizState.score = 0;
    quizState.startTime = null;
    quizState.elapsedTime = 0;
    quizState.isReviewing = false;
    quizState.quizSession = null;

    // Hide results screen and show loading
    document.getElementById("quiz-results").style.display = "none";
    document.getElementById("quiz-section").style.display = "none";

    // Use the full loadQuizQuestions flow with forceRegenerate = true
    // This reloads mastered IDs in parallel and properly processes everything
    loadQuizQuestions(true);
  }

  /**
   * Show generating modal
   */
  function showGeneratingModal() {
    const modal = document.getElementById("generating-modal");
    if (modal) {
      modal.style.display = "flex";

   */
  function hideGeneratingModal() {
    const modal = document.getElementById("generating-modal");

      modal.classList.remove("show");
      setTimeout(() => {
        modal.style.display = "none";
      }, 300);
    }

  /**
   * Timer functions
   */
  function startTimer() {
    quizState.timerInterval = setInterval(() => {
      document.getElementById("quiz-timer").textContent = getElapsedTime();
    }, 1000);
  }

  function stopTimer() {
    if (quizState.timerInterval) {
      clearInterval(quizState.timerInterval);
      quizState.timerInterval = null;
    }
  }

  function getElapsedTime() {
    if (!quizState.startTime) return "00:00";
    const diff = Math.floor((new Date() - quizState.startTime) / 1000);
    const minutes = Math.floor(diff / 60);
    const seconds = diff % 60;
    return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(
      2,
      "0",
    )}`;
  }

  /**
   * UI State functions
   */
  function showLoading() {
    quizState.loading = true;
    document.getElementById("quiz-loading").style.display = "block";
    document.getElementById("quiz-error").style.display = "none";
    document.getElementById("quiz-section").style.display = "none";
    document.getElementById("quiz-stats").style.display = "none";
    document.getElementById("quiz-progress-bar").style.display = "none";
    document.getElementById("quiz-results").style.display = "none";
  }

  function showError(message) {
    quizState.loading = false;
    quizState.error = message;
    document.getElementById("quiz-loading").style.display = "none";
    document.getElementById("quiz-error").style.display = "block";
    document.getElementById("quiz-error-message").textContent = message;
    document.getElementById("quiz-section").style.display = "none";
    document.getElementById("quiz-stats").style.display = "none";
    document.getElementById("quiz-results").style.display = "none";
  }

  function backFromQuiz() {
    stopTimer();
    if (window.currentPageParams?.fromLesson) {
      showPage("page-lesson", {
        topicId: quizState.topicId,
        topicTitle: quizState.topicTitle,
        contentDocId: quizState.contentDocId,
      });
    } else {
      backToTopicSelection();
    }
  }

  // ===== METEOR SHOWER FOR MCQ HEADER =====
  let mcqMeteorInterval = null;

  function startMCQHeaderMeteors() {
    const container = document.getElementById("mcqMeteorContainer");
    if (!container) return;

    // Clear existing interval
    if (mcqMeteorInterval) {
      clearInterval(mcqMeteorInterval);
    }

    // Create meteor every 800ms
    mcqMeteorInterval = setInterval(() => {
      if (!document.getElementById("mcqMeteorContainer")) {
        clearInterval(mcqMeteorInterval);
        return;
      }
      createMCQMeteor();
    }, 800);

    // Create initial meteor
    createMCQMeteor();
  }

  function createMCQMeteor() {
    const container = document.getElementById("mcqMeteorContainer");
    if (!container) return;

    const meteor = document.createElement("div");
    meteor.className = "mcq-header-meteor";

    // Random position from top-left area
    const startX = Math.random() * 40; // 0-40% from left
    const startY = Math.random() * 20; // 0-20% from top

    meteor.style.left = startX + "%";
    meteor.style.top = startY + "%";

    // Random size for variety
    const height = 35 + Math.random() * 35;
    meteor.style.height = height + "px";
    meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

    container.appendChild(meteor);

    // Remove after animation
    setTimeout(() => {
      meteor.remove();
    }, 1500);
  }

  function stopMCQHeaderMeteors() {
    if (mcqMeteorInterval) {
      clearInterval(mcqMeteorInterval);
      mcqMeteorInterval = null;
    }
  }

  // ===== MOUSE-RESPONSIVE STARS EFFECT =====
  function setupMCQHeaderMouseEffect() {
    const header = document.querySelector(".mcq-header");
    const stars = document.getElementById("mcqHeaderStars");
    if (!header || !stars) return;

    header.addEventListener("mousemove", (e) => {
      const rect = header.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
    });

    header.addEventListener("mouseleave", () => {
      stars.style.transform = "translate(0, 0)";
    });
  }

  window.startMCQHeaderMeteors = startMCQHeaderMeteors;
  window.stopMCQHeaderMeteors = stopMCQHeaderMeteors;
  window.setupMCQHeaderMouseEffect = setupMCQHeaderMouseEffect;

  console.log("✅ MCQ scripts loaded");
