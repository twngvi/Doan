<div class="pet-management-page">
  <div class="pm-header">
    <div class="pm-header-content">
      <div class="pm-header-icon">
        <span class="material-symbols-sharp">pets</span>
      </div>
      <div class="pm-header-text">
        <h1 class="pm-title">PET</h1>
      </div>
    </div>
  </div>

  <div class="pm-accordion">
    <!-- Accessories Segment -->
    <div class="pm-segment" id="segment-accessories">
      <button class="pm-segment-header" onclick="togglePmSegment('accessories')">
        <div class="header-left">
          <span class="material-symbols-sharp icon-main">apparel</span>
          <span class="header-label">Quản lý Phụ kiện</span>
          <span class="header-count" id="accessory-count">0</span>
        </div>
        <span class="material-symbols-sharp icon-chevron">expand_more</span>
      </button>
      <div class="pm-segment-content">
        <div class="pm-items-grid" id="accessories-grid">
          <!-- Items will be loaded here -->
        </div>
      </div>
    </div>

    <!-- Food Segment -->
    <div class="pm-segment" id="segment-food">
      <button class="pm-segment-header" onclick="togglePmSegment('food')">
        <div class="header-left">
          <span class="material-symbols-sharp icon-main">restaurant</span>
          <span class="header-label">Quản lý Thức ăn</span>
          <span class="header-count" id="food-count">0</span>
        </div>
        <span class="material-symbols-sharp icon-chevron">expand_more</span>
      </button>
      <div class="pm-segment-content">
        <div class="pm-items-grid" id="food-grid">
          <!-- Items will be loaded here -->
        </div>
      </div>
    </div>

    <!-- Pet Variants Segment -->
    <div class="pm-segment" id="segment-variants">
      <button class="pm-segment-header" onclick="togglePmSegment('variants')">
        <div class="header-left">
          <span class="material-symbols-sharp icon-main">pets</span>
          <span class="header-label">Quản lý Hình dạng PET</span>
          <span class="header-count" id="variant-count">0</span>
        </div>
        <span class="material-symbols-sharp icon-chevron">expand_more</span>
      </button>
      <div class="pm-segment-content">
        <div class="pm-items-grid pm-variant-grid" id="pet-variants-grid">
          <!-- Variant cards will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <div class="pm-editor-backdrop" id="pm-editor-backdrop" onclick="closePmEditor()"></div>

  <aside class="pm-editor-sidebar" id="pm-editor-sidebar" aria-hidden="true">
    <div class="pm-editor-header">
      <h2 id="pm-editor-title">Chi tiết sản phẩm</h2>
      <button type="button" class="pm-editor-close" onclick="closePmEditor()" aria-label="Đóng sidebar">×</button>
    </div>

    <div class="pm-editor-body">
      <div class="pm-form-group">
        <label for="pm-field-name">Tên sản phẩm</label>
        <input type="text" id="pm-field-name" placeholder="Nhập tên sản phẩm">
      </div>

      <div class="pm-form-group">
        <label for="pm-field-image">Ảnh (URL hoặc đường dẫn CDN)</label>
        <input type="text" id="pm-field-image" placeholder="VD: Food/food-31.svg hoặc https://...">
        <div class="pm-image-upload-row">
          <label class="pm-image-upload-btn" for="pm-field-image-file">Chọn tệp</label>
          <input
            type="file"
            id="pm-field-image-file"
            accept="image/*,.png,.jpg,.jpeg,.gif,.webp,.svg"
            hidden
          >
          <span class="pm-image-file-name" id="pm-image-file-name">Chưa chọn tệp</span>
        </div>
        <div class="pm-image-preview-box">
          <img id="pm-image-preview" alt="Xem trước ảnh sản phẩm">
        </div>
      </div>

      <div class="pm-form-group">
        <label for="pm-field-price">Giá mua (XQP)</label>
        <input type="number" id="pm-field-price" min="0" step="1" placeholder="0">
      </div>

      <div class="pm-form-group">
        <label for="pm-field-unlock-type">Điều kiện mở khóa</label>
        <select id="pm-field-unlock-type">
          <option value="level">Level pet</option>
          <option value="topic">Topic</option>
          <option value="topic_quiz">Topic của Quiz</option>
          <option value="topic_matching">Topic của Matching</option>
        </select>
      </div>

      <div class="pm-form-group" id="pm-unlock-level-wrap">
        <label for="pm-field-unlock-level">Level pet cần đạt</label>
        <input type="number" id="pm-field-unlock-level" min="1" step="1" placeholder="1">
      </div>

      <div class="pm-form-group" id="pm-unlock-topic-wrap" style="display:none;">
        <label for="pm-field-unlock-topic" id="pm-unlock-topic-label">Chọn topic cần đạt</label>
        <select id="pm-field-unlock-topic"></select>
      </div>

      <div class="pm-form-group" id="pm-food-xp-wrap" style="display:none;">
        <label for="pm-field-food-xp">XP pet nhận được khi ăn</label>
        <input type="number" id="pm-field-food-xp" min="0" step="1" placeholder="0">
      </div>

      <!-- Accessory Position & Size -->
      <div class="pm-form-group" id="pm-accessory-position-wrap" style="display:none;">
        <label>Cấu hình theo tag vị trí</label>
        <div class="pm-accessory-profile-tabs" id="pm-accessory-profile-tabs">
          <button type="button" class="pm-accessory-profile-tab" data-accessory-pos="left">Trái đầu</button>
          <button type="button" class="pm-accessory-profile-tab active" data-accessory-pos="center">Giữa đầu</button>
          <button type="button" class="pm-accessory-profile-tab" data-accessory-pos="right">Phải đầu</button>
        </div>
        <button type="button" class="pm-accessory-reset-btn" id="pm-accessory-reset-profiles">Reset nhanh trái/giữa/phải</button>
        <div class="pm-accessory-nudge-panel is-open" id="pm-accessory-nudge-panel">
          <div class="pm-accessory-nudge-label-row">
            <span id="pm-accessory-active-profile">Đang chỉnh: Giữa đầu</span>
            <span class="pm-accessory-offset-hint" id="pm-accessory-offset-hint">X: 0px · Y: 0px</span>
          </div>
          <div class="pm-accessory-nudge-grid">
            <button type="button" class="pm-nudge-btn" id="pm-accessory-nudge-up" aria-label="Nhích lên">↑</button>
            <button type="button" class="pm-nudge-btn" id="pm-accessory-nudge-left" aria-label="Nhích trái">←</button>
            <button type="button" class="pm-nudge-btn" id="pm-accessory-nudge-down" aria-label="Nhích xuống">↓</button>
            <button type="button" class="pm-nudge-btn" id="pm-accessory-nudge-right" aria-label="Nhích phải">→</button>
          </div>
          <div class="pm-position-inputs">
            <div>
              <label for="pm-accessory-offset-x" style="font-size: 0.75rem;">Offset X (px)</label>
              <input type="number" id="pm-accessory-offset-x" value="0" step="1" placeholder="0">
            </div>
            <div>
              <label for="pm-accessory-offset-y" style="font-size: 0.75rem;">Offset Y (px)</label>
              <input type="number" id="pm-accessory-offset-y" value="0" step="1" placeholder="0">
            </div>
          </div>
          <div class="pm-rotate-control-wrap">
            <label>Góc xoay đối tượng</label>
            <div class="pm-rotate-control-row">
              <button type="button" class="pm-size-btn" id="pm-accessory-rotate-left">↺</button>
              <span class="pm-size-value" id="pm-accessory-rotate-value">0°</span>
              <button type="button" class="pm-size-btn" id="pm-accessory-rotate-right">↻</button>
            </div>
          </div>
        </div>
      </div>

      <div class="pm-form-group" id="pm-accessory-scale-wrap" style="display:none;">
        <label>Kích thước cho tag đang chọn</label>
        <div class="pm-size-control-row">
          <button type="button" class="pm-size-btn" id="pm-accessory-scale-down">-</button>
          <span class="pm-size-value" id="pm-accessory-scale-value">100%</span>
          <button type="button" class="pm-size-btn" id="pm-accessory-scale-up">+</button>
        </div>
      </div>

      <div class="pm-form-group" id="pm-accessory-preview-wrap" style="display:none;">
        <label>Khung test hiển thị</label>
        <div class="pm-accessory-preview-box" id="pm-accessory-preview-box">
          <img class="pm-accessory-preview-base" id="pm-accessory-preview-base" alt="Pet preview">
          <img class="pm-accessory-preview-item" id="pm-accessory-preview-item" alt="Accessory preview">
        </div>
      </div>
    </div>

    <div class="pm-editor-footer">
      <button type="button" class="pm-btn pm-btn-danger" id="pm-delete-btn">Xóa item</button>
      <button type="button" class="pm-btn pm-btn-primary" id="pm-save-btn">Lưu thay đổi</button>
    </div>
  </aside>

  <div class="pm-editor-backdrop" id="pm-variant-editor-backdrop" onclick="closePmVariantEditor()"></div>

  <aside class="pm-variant-editor-sidebar" id="pm-variant-editor-sidebar" aria-hidden="true">
    <div class="pm-editor-header">
      <h2 id="pm-variant-editor-title">Chi tiết hình dạng PET</h2>
      <button type="button" class="pm-editor-close" onclick="closePmVariantEditor()" aria-label="Đóng sidebar">×</button>
    </div>

    <div class="pm-editor-body">
      <div class="pm-form-group">
        <label for="pm-variant-name">Tên pet</label>
        <input type="text" id="pm-variant-name" placeholder="VD: Pet Galaxy">
      </div>

      <!-- Color Picker Section -->
      <div class="pm-form-group">
        <label>Màu đại diện</label>
        <div class="pm-color-picker-container">
          <div class="pm-color-swatch" id="pm-variant-color-swatch" style="background-color: #7c8cff;"></div>
          <input type="color" id="pm-variant-tone" value="#7c8cff" class="pm-color-input">
          <input type="text" id="pm-variant-tone-hex" placeholder="#7c8cff" class="pm-hex-input" maxlength="7">
        </div>
      </div>

      <div class="pm-form-group">
        <label for="pm-variant-description">Mô tả</label>
        <input type="text" id="pm-variant-description" placeholder="Mô tả ngắn cho pet">
      </div>

      <div class="pm-form-group">
        <label>Chỉnh level PET</label>
        <div class="pm-level-edit-tabs" id="pm-variant-edit-level-tabs">
          <button type="button" class="pm-level-edit-tab active" data-edit-level="1">Level 1 (trứng)</button>
          <button type="button" class="pm-level-edit-tab" data-edit-level="2">Level 2 (pet)</button>
        </div>
      </div>

      <div class="pm-form-group" id="pm-variant-level1-wrap">
        <label for="pm-variant-level1">Ảnh Level 1</label>
        <input type="text" id="pm-variant-level1" placeholder="VD: level1-yellow.svg hoặc https://...">
        <div class="pm-image-upload-row">
          <label class="pm-image-upload-btn" for="pm-variant-level1-file">Chọn tệp</label>
          <input type="file" id="pm-variant-level1-file" accept="image/*,.png,.jpg,.jpeg,.gif,.webp,.svg" hidden>
          <span class="pm-image-file-name" id="pm-level1-file-name">Chưa chọn tệp</span>
        </div>
        <div class="pm-image-preview-box">
          <img id="pm-variant-level1-preview" alt="Preview ảnh level 1">
        </div>
      </div>

      <div class="pm-form-group" id="pm-variant-level2-wrap">
        <label for="pm-variant-level2">Ảnh Level 2</label>
        <input type="text" id="pm-variant-level2" placeholder="VD: PET/12.svg hoặc https://...">
        <div class="pm-image-upload-row">
          <label class="pm-image-upload-btn" for="pm-variant-level2-file">Chọn tệp</label>
          <input type="file" id="pm-variant-level2-file" accept="image/*,.png,.jpg,.jpeg,.gif,.webp,.svg" hidden>
          <span class="pm-image-file-name" id="pm-level2-file-name">Chưa chọn tệp</span>
        </div>
        <div class="pm-image-preview-box">
          <img id="pm-variant-level2-preview" alt="Preview ảnh level 2">
        </div>
      </div>

      <div class="pm-form-group">
        <label>Khung test hiển thị</label>
        <div class="pm-variant-preview-box" id="pm-variant-preview-box">
          <div class="pm-variant-preview-head">
            <button type="button" class="pm-preview-toggle active" data-preview-level="1">Level 1</button>
            <button type="button" class="pm-preview-toggle" data-preview-level="2">Level 2</button>
          </div>
          <div class="pm-variant-preview-stage">
            <img id="pm-variant-preview-image" alt="Preview pet variant" loading="lazy">
          </div>
        </div>
      </div>

      <div class="pm-form-group">
        <label for="pm-variant-unlock-type">Điều kiện mở khóa</label>
        <select id="pm-variant-unlock-type">
          <option value="level">Level pet</option>
          <option value="topic">Hoàn thành topic</option>
          <option value="topic_quiz">Hoàn thành Quiz của topic</option>
          <option value="topic_matching">Hoàn thành Matching của topic</option>
        </select>
      </div>

      <div class="pm-form-group" id="pm-variant-unlock-level-wrap">
        <label for="pm-variant-unlock-level">Level cần đạt</label>
        <input type="number" id="pm-variant-unlock-level" min="1" step="1" value="1">
      </div>

      <div class="pm-form-group" id="pm-variant-unlock-topic-wrap" style="display:none;">
        <label for="pm-variant-unlock-topic">Topic cần đạt</label>
        <select id="pm-variant-unlock-topic"></select>
      </div>

      <div class="pm-form-group">
        <label>Kích thước hiển thị</label>
        <div class="pm-size-control-row">
          <button type="button" class="pm-size-btn" id="pm-variant-size-down">-</button>
          <span class="pm-size-value" id="pm-variant-size-value">100%</span>
          <button type="button" class="pm-size-btn" id="pm-variant-size-up">+</button>
        </div>
      </div>

      <div class="pm-form-group">
        <label for="pm-variant-tilt">Độ nghiêng PET</label>
        <div class="pm-range-input-row">
          <input type="range" id="pm-variant-tilt" min="-45" max="45" step="1" value="0">
          <input type="number" id="pm-variant-tilt-number" min="-45" max="45" step="1" value="0" aria-label="Nhập độ nghiêng PET">
        </div>
        <div class="pm-range-value" id="pm-variant-tilt-value">0°</div>
      </div>
    </div>

    <div class="pm-editor-footer">
      <button type="button" class="pm-btn pm-btn-danger" id="pm-variant-delete-btn">Xóa pet</button>
      <button type="button" class="pm-btn pm-btn-primary" id="pm-variant-save-btn">Lưu hình dạng</button>
    </div>
  </aside>
</div>
