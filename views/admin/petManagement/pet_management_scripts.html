    function cloneItem(item) {
      return {
        id: item.id,
        name: item.name,
        file: item.file,
        priceXqp: item.priceXqp,
        petXpGain: item.petXpGain,
        offsetX: item.offsetX || 0,
        offsetY: item.offsetY || 0,
        scalePercent: item.scalePercent || 100,
        positionMode: item.positionMode || 'center',
        unlockCondition: {
          type: item.unlockCondition && item.unlockCondition.type ? item.unlockCondition.type : "level",
          value: item.unlockCondition && item.unlockCondition.value ? item.unlockCondition.value : 1
        }
      };
    }

    function cloneVariant(variant) {
      var safe = variant || {};
      var unlock = safe.unlockCondition || {};
      var unlockType = unlock.type || "level";
      var unlockValue = unlock.value;
      if (unlockType === "level") {
        unlockValue = Math.max(1, parseNonNegative(unlockValue, 1));
      } else {
        unlockValue = String(unlockValue || "");
      }

      var scalePercent = parseNonNegative(safe.scalePercent, 100);
      scalePercent = Math.max(40, Math.min(200, scalePercent));

      return {
        id: String(safe.id || ""),
        name: String(safe.name || ""),
        tone: String(safe.tone || "#7c8cff"),
        description: String(safe.description || ""),
        level1: String(safe.level1 || ""),
        level2: String(safe.level2 || ""),
        eyeOpen: String(safe.eyeOpen || ""),
        eyeClosed: String(safe.eyeClosed || ""),
        unlockCondition: {
          type: unlockType,
          value: unlockValue,
        },
        scalePercent: scalePercent,
      };
    }

    function initializeStateIfNeeded() {
      if (state.accessories.length === 0) {
        state.accessories = ACCESSORY_LIST.map(function (item) {

      if (state.petVariants.length === 0) {
        state.petVariants = PET_VARIANT_LIST.map(function (variant) {
          return cloneVariant(variant);
        });
      }
    }

    function ensureVariantFallbackState() {
      if (!Array.isArray(state.petVariants)) {
        state.petVariants = [];
      }

      if (state.petVariants.length === 0) {
        state.petVariants = PET_VARIANT_LIST.map(function (variant) {
          return cloneVariant(variant);
        });
      }
    }

    function normalizeLoadedItems(items, type) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          var safeItem = item || {};
          var unlock = safeItem.unlockCondition || {};
          var unlockType = unlock.type || 'level';
          var unlockValue = unlock.value;

          if (unlockType === 'level') {
            unlockValue = Math.max(1, parseNonNegative(unlockValue, 1));
          } else {
            unlockValue = String(unlockValue || '');
          }

          var fallbackId =
            type === 'food'
              ? ('food-' + (31 + index))
              : ('acc-' + (index + 1 < 10 ? '0' + (index + 1) : String(index + 1)));

          var normalized = {
            id: String(safeItem.id || fallbackId),
            name: String(safeItem.name || ''),
            file: String(safeItem.file || ''),
            priceXqp: parseNonNegative(safeItem.priceXqp, 0),
            offsetX: parseNonNegative(safeItem.offsetX, 0),
            offsetY: parseNonNegative(safeItem.offsetY, 0),
            scalePercent: Math.max(40, Math.min(200, parseNonNegative(safeItem.scalePercent, 100))),
            positionMode: String(safeItem.positionMode || 'center'),
            unlockCondition: {
              type: unlockType,
              value: unlockValue,
            },
          };

          if (type === 'food') {
            normalized.petXpGain = parseNonNegative(safeItem.petXpGain, 0);
          }

          return normalized;
        })
        .filter(function (item) {
          return !!item.id;
        });
    }

    function normalizeLoadedVariants(items) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          var safe = cloneVariant(item);
          if (!safe.id) {
            safe.id = "variant-" + (index + 1);
          }
          if (!safe.name) {
            safe.name = "Pet " + (index + 1);
          }
          return safe;
        })
        .filter(function (variant) {
          return !!variant.id;
        });
    }

    function buildPersistPayload() {
      return {
        accessories: state.accessories.map(function (item) {
          return cloneItem(item);
        }),
        food: state.food.map(function (item) {
          return cloneItem(item);
        }),
      };
    }

    function persistPetItemsToBackend(showNotice) {
      if (!(window.google && google.script && google.script.run)) {
        return;
      }

      if (isPersisting) {
        return;
      }

      isPersisting = true;
      var payloadJson = JSON.stringify(buildPersistPayload());

      google.script.run
        .withSuccessHandler(function (result) {
          isPersisting = false;
          if (!showNotice) return;

          if (result && result.success && typeof window.showNotification === 'function') {
            window.showNotification('Da luu danh muc PET', 'success');
          }
        })
        .withFailureHandler(function () {
          isPersisting = false;
          if (typeof window.showNotification === 'function') {
            window.showNotification('Khong the luu danh muc PET', 'error');
          }
        })
        .savePetItemsForAdmin(payloadJson);
    }

    function persistPetVariantsToBackend(showNotice) {
      if (!(window.google && google.script && google.script.run)) {
        return;
      }

      var payloadJson = JSON.stringify({
        variants: state.petVariants.map(function (variant) {
          return cloneVariant(variant);
        }),
      });

      google.script.run
        .withSuccessHandler(function (result) {
          if (!showNotice) return;
          if (result && result.success && typeof window.showNotification === 'function') {
            window.showNotification('Da luu danh sach hinh dang PET', 'success');
          }
        })
        .withFailureHandler(function () {
          if (typeof window.showNotification === 'function') {
            window.showNotification('Khong the luu hinh dang PET', 'error');
          }
        })
        .savePetVariantsForAdmin(payloadJson);
    }

    function loadPetItemsFromBackend() {
      if (!(window.google && google.script && google.script.run)) {
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || result.success !== true) {
            ensureVariantFallbackState();
            updateCounts();
            renderAllPmItems();
            return;
          }

          var loadedAccessories = normalizeLoadedItems(result.accessories, 'accessories');
          var loadedFood = normalizeLoadedItems(result.food, 'food');
          var loadedVariants = normalizeLoadedVariants(result.variants);
          var hasPersistedData = loadedAccessories.length > 0 || loadedFood.length > 0;
          var hasVariantData = loadedVariants.length > 0;

          if (hasPersistedData) {
            state.accessories = loadedAccessories;
            state.food = loadedFood;
            if (hasVariantData) {
              state.petVariants = loadedVariants;
            }
            ensureVariantFallbackState();
            updateCounts();
            renderAllPmItems();
            return;
          }

          if (hasVariantData) {
            state.petVariants = loadedVariants;
            ensureVariantFallbackState();
            updateCounts();
            renderAllPmItems();
          }

          // First run with empty sheet: seed current defaults to backend.
          persistPetItemsToBackend(false);
          if (!hasVariantData) {
            persistPetVariantsToBackend(false);
          }
        })
        .withFailureHandler(function () {
          // Keep local default list if backend load fails.
          ensureVariantFallbackState();
          updateCounts();
          renderAllPmItems();
        })
        .getPetItemsForAdmin();
    }

    function getItemsByType(type) {
      return type === 'food' ? state.food : state.accessories;

    function updateCounts() {
      var accCountEl = document.getElementById('accessory-count');
      var foodCountEl = document.getElementById('food-count');
      var variantCountEl = document.getElementById('variant-count');
      var variantCount = Array.isArray(state.petVariants) ? state.petVariants.length * 2 : 0;
      if (accCountEl) accCountEl.textContent = String(state.accessories.length);
      if (foodCountEl) foodCountEl.textContent = String(state.food.length);
      if (variantCountEl) variantCountEl.textContent = String(variantCount);
    }

    function resolveAssetSrc(filePath) {
      if (!filePath) {
        return 'https://api.dicebear.com/9.x/shapes/svg?seed=pm-default';
      }

      var src = String(filePath).trim();
      if (/^(https?:|data:|blob:)/i.test(src)) {
        return src;
      }

      return PET_ASSET_CDN + src.replace(/^\/+/, '');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderPmItems(containerId, items, itemType) {
      var container = document.getElementById(containerId);
      if (!container) return;

      var html = '';
      html += '<button type="button" class="pm-item-card pm-add-card" data-item-type="' + itemType + '" aria-label="Them moi">+</button>';

      items.forEach(function (item, index) {
        var src = resolveAssetSrc(item.file);
        html += '' +
          '<div class="pm-item-card pm-data-card" data-item-type="' + itemType + '" data-item-index="' + index + '">' +
          '  <div class="pm-item-badge"></div>' +
          '  <div class="pm-item-image-box">' +
          '    <img src="' + src + '" alt="' + item.name + '" loading="lazy" onerror="this.src=\'https://api.dicebear.com/9.x/shapes/svg?seed=' + item.id + '\'">' +
          '  </div>' +
          '  <span class="pm-item-name">' + item.name + '</span>' +
          '</div>';
      });

      container.innerHTML = html;
    }

    function renderAllPmItems() {
      renderPmItems('accessories-grid', state.accessories, 'accessories');
      renderPmItems('food-grid', state.food, 'food');
      renderPetVariantItems();
    }

    function renderPetVariantItems() {
      var container = document.getElementById('pet-variants-grid');
      if (!container) return;

      if (!Array.isArray(state.petVariants)) {
        state.petVariants = [];
      }

      var html = '';
      html += '<button type="button" class="pm-item-card pm-add-card" data-variant-add="1" aria-label="Them moi pet">+</button>';

      state.petVariants.forEach(function (variant, index) {
        var safeName = escapeHtml(variant.name || ('Pet ' + (index + 1)));
        var tone = escapeHtml(variant.tone || '#7c8cff');
        [1, 2].forEach(function (level) {
          var src = resolveAssetSrc(level === 1 ? variant.level1 : variant.level2 || variant.level1 || variant.eyeOpen || '');
          var levelLabel = level === 1 ? 'Level 1' : 'Level 2';
          html += '' +
            '<div class="pm-item-card pm-variant-card pm-variant-level-card" data-variant-index="' + index + '" data-variant-level="' + level + '">' +
            '  <div class="pm-item-badge"></div>' +
            '  <div class="pm-item-image-box">' +
            '    <span class="pm-variant-level-badge">' + levelLabel + '</span>' +
            '    <img src="' + src + '" alt="' + safeName + ' ' + levelLabel + '" loading="lazy" onerror="this.src=\'https://api.dicebear.com/9.x/shapes/svg?seed=pet-variant-' + index + '-' + level + '\'\">' +
            '  </div>' +
            '  <span class="pm-item-name">' + safeName + '</span>' +
            '  <div class="pm-variant-meta">' +
            '    <span class="pm-variant-level-pill">' + levelLabel + '</span>' +
            '    <span class="pm-variant-color-dot" style="background:' + tone + '"></span>' +
            '  </div>' +
            '</div>';
        });
      });

      container.innerHTML = html;
    }

    function normalizeVariantUnlockFieldVisibility() {
      if (!editorEls.variantUnlockType || !editorEls.variantUnlockLevelWrap || !editorEls.variantUnlockTopicWrap) {
        return;
      }

      var unlockType = editorEls.variantUnlockType.value || 'level';
      var isLevel = unlockType === 'level';
      editorEls.variantUnlockLevelWrap.style.display = isLevel ? 'flex' : 'none';
      editorEls.variantUnlockTopicWrap.style.display = isLevel ? 'none' : 'flex';
    }

    function syncVariantTopicOptions() {
      if (!editorEls.variantUnlockTopic) return;
      var topics = state.topics.length ? state.topics : TOPIC_FALLBACK;
      editorEls.variantUnlockTopic.innerHTML = topics
        .map(function (topic) {
          return '<option value="' + topic.id + '">' + topic.label + '</option>';
        })
        .join('');
    }

    function updateVariantScaleValue() {
      if (!state.variantEditor.draft) return;
      if (editorEls.variantSizeValue) {
        editorEls.variantSizeValue.textContent = String(state.variantEditor.draft.scalePercent || 100) + '%';
      }
    }

    function updateVariantPreview() {
      if (!editorEls.variantPreviewImage || !state.variantEditor.draft) return;

      var draft = state.variantEditor.draft;
      var useLevel2 = state.variantEditor.previewLevel === 2;
      var src = useLevel2 ? draft.level2 : draft.level1;
      editorEls.variantPreviewImage.src = resolveAssetSrc(src || draft.level1 || draft.level2 || '');
      editorEls.variantPreviewImage.style.transform = 'scale(' + ((draft.scalePercent || 100) / 100) + ')';

      if (editorEls.variantPreviewBox) {
        editorEls.variantPreviewBox.querySelectorAll('.pm-preview-toggle').forEach(function (btn) {
          var lv = parseInt(btn.getAttribute('data-preview-level') || '1', 10);
          btn.classList.toggle('active', lv === state.variantEditor.previewLevel);
        });
      }

      updateVariantScaleValue();
    }

    function closePmVariantEditor() {
      if (!editorEls.page || !editorEls.variantSidebar) return;
      editorEls.page.classList.remove('pm-variant-editor-open');
      editorEls.variantSidebar.setAttribute('aria-hidden', 'true');
      state.variantEditor = {
        index: -1,
        isNew: false,
        draft: null,
        previewLevel: 1
      };
    }

    function openPmVariantEditor(index, isNew, previewLevel) {
      if (!editorEls.page || !editorEls.variantSidebar) return;

      closePmEditor();

      var draft;
      if (isNew) {
        draft = {
          id: 'variant-' + (Date.now()),
          name: '',
          tone: '#7c8cff',
          description: '',
          level1: '',
          level2: '',
          eyeOpen: '',
          eyeClosed: '',
          unlockCondition: { type: 'level', value: 1 },
          scalePercent: 100,
        };
      } else {
        if (index < 0 || index >= state.petVariants.length) return;
        draft = cloneVariant(state.petVariants[index]);
      }

      state.variantEditor = {
        index: index,
        isNew: !!isNew,
        draft: draft,
        previewLevel: previewLevel === 1 ? 1 : 2
      };

      if (editorEls.variantTitle) {
        editorEls.variantTitle.textContent = isNew ? 'Thêm hình dạng PET mới' : 'Chỉnh sửa hình dạng PET';
      }
      if (editorEls.variantName) editorEls.variantName.value = draft.name || '';
      syncColorPickerFromHex(draft.tone || '#7c8cff');
      syncColorHexToInput(draft.tone || '#7c8cff');
      if (editorEls.variantDescription) editorEls.variantDescription.value = draft.description || '';
      if (editorEls.variantLevel1) editorEls.variantLevel1.value = draft.level1 || '';
      if (editorEls.variantLevel1FileName) editorEls.variantLevel1FileName.textContent = draft.level1 ? String(draft.level1).split('/').pop() : 'Chưa chọn tệp';
      if (editorEls.variantLevel1Preview) editorEls.variantLevel1Preview.src = resolveAssetSrc(draft.level1 || '');
      if (editorEls.variantLevel2) editorEls.variantLevel2.value = draft.level2 || '';
      if (editorEls.variantLevel2FileName) editorEls.variantLevel2FileName.textContent = draft.level2 ? String(draft.level2).split('/').pop() : 'Chưa chọn tệp';
      if (editorEls.variantLevel2Preview) editorEls.variantLevel2Preview.src = resolveAssetSrc(draft.level2 || '');
      if (editorEls.variantEyeOpen) editorEls.variantEyeOpen.value = draft.eyeOpen || '';
      if (editorEls.variantEyeOpenFileName) editorEls.variantEyeOpenFileName.textContent = draft.eyeOpen ? String(draft.eyeOpen).split('/').pop() : 'Chưa chọn tệp';
      if (editorEls.variantEyeClosed) editorEls.variantEyeClosed.value = draft.eyeClosed || '';
      if (editorEls.variantEyeClosedFileName) editorEls.variantEyeClosedFileName.textContent = draft.eyeClosed ? String(draft.eyeClosed).split('/').pop() : 'Chưa chọn tệp';
      if (editorEls.variantUnlockType) editorEls.variantUnlockType.value = (draft.unlockCondition && draft.unlockCondition.type) || 'level';
      if (editorEls.variantUnlockLevel) editorEls.variantUnlockLevel.value = String((draft.unlockCondition && draft.unlockCondition.value) || 1);

      syncVariantTopicOptions();
      if (editorEls.variantUnlockTopic && draft.unlockCondition && draft.unlockCondition.type !== 'level') {
        editorEls.variantUnlockTopic.value = String(draft.unlockCondition.value || '');
      }

      normalizeVariantUnlockFieldVisibility();
      if (state.variantEditor.previewLevel === 2) {
        selectLevel2Tab();
      } else {
        selectLevel1Tab();
      }
      updateVariantPreview();

      editorEls.page.classList.add('pm-variant-editor-open');
      editorEls.variantSidebar.setAttribute('aria-hidden', 'false');
    }

    function syncVariantDraftFromForm() {
      var draft = state.variantEditor.draft;
      if (!draft) return;

      draft.name = editorEls.variantName ? editorEls.variantName.value.trim() : draft.name;
      draft.tone = editorEls.variantTone ? editorEls.variantTone.value : draft.tone;
      draft.description = editorEls.variantDescription ? editorEls.variantDescription.value.trim() : draft.description;
      draft.level1 = editorEls.variantLevel1 ? editorEls.variantLevel1.value.trim() : draft.level1;
      draft.level2 = editorEls.variantLevel2 ? editorEls.variantLevel2.value.trim() : draft.level2;
      draft.eyeOpen = editorEls.variantEyeOpen ? editorEls.variantEyeOpen.value.trim() : draft.eyeOpen;
      draft.eyeClosed = editorEls.variantEyeClosed ? editorEls.variantEyeClosed.value.trim() : draft.eyeClosed;

      var unlockType = editorEls.variantUnlockType ? editorEls.variantUnlockType.value : 'level';
      var unlockValue = unlockType === 'level'
        ? Math.max(1, parseNonNegative(editorEls.variantUnlockLevel ? editorEls.variantUnlockLevel.value : 1, 1))
        : (editorEls.variantUnlockTopic ? String(editorEls.variantUnlockTopic.value || '') : '');

      draft.unlockCondition = {
        type: unlockType,
        value: unlockValue,
      };
    }

    function changeVariantScale(step) {
      if (!state.variantEditor.draft) return;
      var next = parseNonNegative(state.variantEditor.draft.scalePercent, 100) + step;
      next = Math.max(40, Math.min(200, next));
      state.variantEditor.draft.scalePercent = next;
      updateVariantPreview();
    }

    function handleSaveVariantEditor() {
      if (!state.variantEditor.draft) return;
      syncVariantDraftFromForm();

      var draft = state.variantEditor.draft;
      if (!draft.name) {
        if (editorEls.variantName) editorEls.variantName.focus();
        return;
      }
      if (!draft.level1 && !draft.level2) {
        if (editorEls.variantLevel1) editorEls.variantLevel1.focus();
        return;
      }

      if (state.variantEditor.isNew) {
        state.petVariants.unshift(cloneVariant(draft));
      } else if (state.variantEditor.index >= 0 && state.variantEditor.index < state.petVariants.length) {
        state.petVariants[state.variantEditor.index] = cloneVariant(draft);
      }

      updateCounts();
      renderAllPmItems();
      persistPetVariantsToBackend(true);
      closePmVariantEditor();
    }

    function handleDeleteVariantEditor() {
      if (state.variantEditor.isNew) {
        closePmVariantEditor();
        return;
      }

      var index = state.variantEditor.index;
      if (index < 0 || index >= state.petVariants.length) return;

      state.petVariants.splice(index, 1);
      updateCounts();
      renderAllPmItems();
      persistPetVariantsToBackend(true);
      closePmVariantEditor();
    }

    function populateTopicOptions() {
      if (!editorEls.unlockTopic) return;
      var topics = state.topics.length ? state.topics : TOPIC_FALLBACK;
      editorEls.unlockTopic.innerHTML = topics
        .map(function (topic) {
          return '<option value="' + topic.id + '">' + topic.label + '</option>';
        })
        .join('');
    }

    function syncUnlockFieldVisibility() {
      if (!editorEls.unlockType || !editorEls.unlockLevelWrap || !editorEls.unlockTopicWrap) return;

      var unlockType = editorEls.unlockType.value;
      var isLevel = unlockType === 'level';

      editorEls.unlockLevelWrap.style.display = isLevel ? 'flex' : 'none';
      editorEls.unlockTopicWrap.style.display = isLevel ? 'none' : 'flex';

      if (!editorEls.unlockTopicLabel) return;
      if (unlockType === 'topic_quiz') {
        editorEls.unlockTopicLabel.textContent = 'Chon topic Quiz can dat';
      } else if (unlockType === 'topic_matching') {
        editorEls.unlockTopicLabel.textContent = 'Chon topic Matching can dat';
      } else {
        editorEls.unlockTopicLabel.textContent = 'Chon topic can dat';
      }
    }

    function updateEditorImagePreview() {
      if (!editorEls.imagePreview || !editorEls.image) return;
      editorEls.imagePreview.src = resolveAssetSrc(editorEls.image.value);
      editorEls.imagePreview.onerror = function () {
        this.src = 'https://api.dicebear.com/9.x/shapes/svg?seed=pm-preview';
      };
    }

    function updateSelectedImageFileLabel(fileName) {
      if (!editorEls.imageFileName) return;
      editorEls.imageFileName.textContent = fileName || 'Chưa chọn tệp';
    }

    function handleImageFileChange(event) {
      var input = event.target;
      var file = input && input.files && input.files[0] ? input.files[0] : null;

      if (!file) {
        updateSelectedImageFileLabel('');
        return;
      }

      var isAccepted = /^image\//i.test(file.type) || /\.(png|jpe?g|gif|webp|svg)$/i.test(file.name || '');
      if (!isAccepted) {
        if (typeof window.showNotification === 'function') {
          window.showNotification('Chỉ cho phép chọn file ảnh', 'error');
        } else {
          alert('Chỉ cho phép chọn file ảnh');
        }
        input.value = '';
        updateSelectedImageFileLabel('');
        return;
      }

      var reader = new FileReader();
      reader.onload = function () {
        if (editorEls.image) {
          editorEls.image.value = String(reader.result || '');
        }
        updateSelectedImageFileLabel(file.name);
        updateEditorImagePreview();
      };
      reader.onerror = function () {
        if (typeof window.showNotification === 'function') {
          window.showNotification('Không thể đọc file ảnh', 'error');
        } else {
          alert('Không thể đọc file ảnh');
        }
      };
      reader.readAsDataURL(file);
    }

    function fillEditorForm() {
      if (!state.editor.draft) return;

      var type = state.editor.type;
      var isNew = state.editor.isNew;
      var draft = state.editor.draft;
      var isFood = type === 'food';

      if (editorEls.title) {
        editorEls.title.textContent = isNew
          ? (isFood ? 'Them Food moi' : 'Them Phu kien moi')
          : (isFood ? 'Chinh sua Food' : 'Chinh sua Phu kien');
      }

      if (editorEls.name) editorEls.name.value = isNew ? '' : (draft.name || '');
      if (editorEls.image) editorEls.image.value = isNew ? '' : (draft.file || '');
      if (editorEls.imageFile) editorEls.imageFile.value = '';
      updateSelectedImageFileLabel(isNew ? '' : (draft.file ? String(draft.file).split('/').pop() : ''));
      if (editorEls.price) editorEls.price.value = isNew ? '' : String(draft.priceXqp || 0);
      if (editorEls.unlockType) {
        editorEls.unlockType.value = (draft.unlockCondition && draft.unlockCondition.type) || 'level';
      }
      if (editorEls.unlockLevel) {
        editorEls.unlockLevel.value = isNew ? '' : String(draft.unlockCondition.value || 1);
      }

      populateTopicOptions();
      if (editorEls.unlockTopic && draft.unlockCondition.type !== 'level') {
        editorEls.unlockTopic.value = String(draft.unlockCondition.value || '');
      }

      if (editorEls.foodXpWrap) editorEls.foodXpWrap.style.display = isFood ? 'flex' : 'none';
      if (editorEls.foodXp) editorEls.foodXp.value = isNew ? '' : String(draft.petXpGain || 0);
      
      // Accessory position and scale
      if (editorEls.accessoryPositionMode) editorEls.accessoryPositionMode.value = normalizeAccessoryPositionMode(draft.positionMode || 'center');
      if (editorEls.accessoryOffsetX) editorEls.accessoryOffsetX.value = String(draft.offsetX || 0);
      if (editorEls.accessoryOffsetY) editorEls.accessoryOffsetY.value = String(draft.offsetY || 0);
      if (editorEls.accessoryPreviewWrap) editorEls.accessoryPreviewWrap.style.display = isFood ? 'none' : 'flex';
      if (editorEls.accessoryScaleValue) editorEls.accessoryScaleValue.textContent = String(draft.scalePercent || 100) + '%';
      syncAccessoryOffsetHint();
      
      if (editorEls.deleteBtn) editorEls.deleteBtn.textContent = isNew ? 'Huy them moi' : 'Xoa item';

      updateAccessoryFieldVisibility();
      syncUnlockFieldVisibility();
      updateEditorImagePreview();
      updateAccessoryPreview();
    }

    function openSidebar() {
      if (!editorEls.page || !editorEls.sidebar) return;
      editorEls.page.classList.add('pm-editor-open');
      editorEls.sidebar.setAttribute('aria-hidden', 'false');
    }

    function closePmEditor() {
      if (!editorEls.page || !editorEls.sidebar) return;
      editorEls.page.classList.remove('pm-editor-open');
      editorEls.sidebar.setAttribute('aria-hidden', 'true');
      state.editor = {
        type: null,
        index: -1,
        isNew: false,
        draft: null
      };
    }

    function generateNextItemId(type) {
      var items = getItemsByType(type);
      var maxNum = 0;
      items.forEach(function (item) {
        var matched = String(item.id || '').match(/(\d+)$/);
        if (!matched) return;
        var n = parseInt(matched[1], 10);
        if (!isNaN(n) && n > maxNum) maxNum = n;
      });

      var next = maxNum + 1;
      if (type === 'food') return 'food-' + next;
      return 'acc-' + (next < 10 ? '0' + next : String(next));
    }

    function startCreateNewItem(type) {
      var defaultId = generateNextItemId(type);
      var isFood = type === 'food';

      state.editor = {
        type: type,
        index: -1,
        isNew: true,
        draft: {
          id: defaultId,
          name: '',
          file: '',
          priceXqp: '',
          petXpGain: isFood ? '' : 0,
          offsetX: 0,
          offsetY: 0,
          scalePercent: 100,
          positionMode: 'center',
          unlockCondition: { type: 'level', value: '' }
        }
      };

      fillEditorForm();
      openSidebar();
    }

    function openPmEditor(type, index) {
      var items = getItemsByType(type);
      if (index < 0 || index >= items.length) return;

      closePmVariantEditor();

      state.editor = {
        type: type,
        index: index,
        isNew: false,
        draft: cloneItem(items[index])
      };

      fillEditorForm();
      openSidebar();
    }

    function parseNonNegative(value, fallback) {
      var n = parseInt(String(value || ''), 10);
      if (isNaN(n) || n < 0) return fallback;
      return n;
    }

    function getAccessoryCatalogItem(fileName) {
      if (!fileName) return null;
      var match = null;
      var i;

      for (i = 0; i < ACCESSORY_LIST.length; i++) {
        if (ACCESSORY_LIST[i].file === fileName) {
          match = ACCESSORY_LIST[i];
          break;
        }
      }

      return match;
    }

    function getAccessoryRule(fileName) {
      // Returns positioning rules for specific accessories
      // Each rule can have: forcedPosition, topOffset, scale
      var rules = {
        // Example: 'Accessories/accessory-01.svg': { forcedPosition: 'left', topOffset: 5, scale: 0.9 }
      };
      return rules[fileName] || { forcedPosition: null, topOffset: 0, scale: 1 };
    }

    function getAccessoryPositionLabel(positionMode) {
      if (positionMode === 'left') return 'Trái đầu';
      if (positionMode === 'right') return 'Phải đầu';
      if (positionMode === 'custom') return 'Tùy chỉnh riêng';
      return 'Giữa đầu';
    }

    function normalizeAccessoryPositionMode(positionMode) {
      if (positionMode === 'left' || positionMode === 'right' || positionMode === 'custom') {
        return positionMode;
      }
      return 'center';
    }

    function syncAccessoryOffsetHint() {
      if (!editorEls.accessoryOffsetHint || !state.editor.draft) return;
      editorEls.accessoryOffsetHint.textContent = 'X: ' + (parseNonNegative(state.editor.draft.offsetX, 0)) + 'px · Y: ' + (parseNonNegative(state.editor.draft.offsetY, 0)) + 'px';
    }

    function applyAccessoryPositionMode(mode, shouldResetOffset) {
      if (!state.editor.draft) return;

      var normalizedMode = normalizeAccessoryPositionMode(mode);
      state.editor.draft.positionMode = normalizedMode;

      if (editorEls.accessoryPositionMode) {
        editorEls.accessoryPositionMode.value = normalizedMode;
      }

      if (normalizedMode !== 'custom' && shouldResetOffset !== false) {
        state.editor.draft.offsetX = 0;
        state.editor.draft.offsetY = 0;
        if (editorEls.accessoryOffsetX) editorEls.accessoryOffsetX.value = '0';
        if (editorEls.accessoryOffsetY) editorEls.accessoryOffsetY.value = '0';
      }

      if (editorEls.accessoryNudgePanel) {
        editorEls.accessoryNudgePanel.classList.toggle('is-custom', normalizedMode === 'custom');
      }

      syncAccessoryOffsetHint();
      updateAccessoryPreview();
    }

    function nudgeAccessoryPosition(deltaX, deltaY) {
      if (!state.editor.draft) return;
      state.editor.draft.positionMode = 'custom';
      state.editor.draft.offsetX = parseNonNegative(state.editor.draft.offsetX, 0) + deltaX;
      state.editor.draft.offsetY = parseNonNegative(state.editor.draft.offsetY, 0) + deltaY;
      if (editorEls.accessoryPositionMode) {
        editorEls.accessoryPositionMode.value = 'custom';
      }
      if (editorEls.accessoryOffsetX) editorEls.accessoryOffsetX.value = String(state.editor.draft.offsetX);
      if (editorEls.accessoryOffsetY) editorEls.accessoryOffsetY.value = String(state.editor.draft.offsetY);
      if (editorEls.accessoryNudgePanel) {
        editorEls.accessoryNudgePanel.classList.add('is-custom');
      }
      syncAccessoryOffsetHint();
      updateAccessoryPreview();
    }

    function updateAccessoryPreview() {
      if (!editorEls.accessoryPreviewItem || !state.editor.draft) return;

      var draft = state.editor.draft;
      var fileName = draft.file || '';
      var previewSrc = resolveAssetSrc(fileName);
      var accessoryItem = getAccessoryCatalogItem(fileName);
      var accessoryRule = getAccessoryRule(fileName);
      var offsetX = parseNonNegative(draft.offsetX, 0);
      var offsetY = parseNonNegative(draft.offsetY, 0);
      var scalePercent = Math.max(40, Math.min(200, parseNonNegative(draft.scalePercent, 100)));
      var positionMode = normalizeAccessoryPositionMode(draft.positionMode);
      var previewPosition = accessoryRule.forcedPosition || (positionMode === 'custom' ? 'center' : positionMode);
      var previewLeft = previewPosition === 'left' ? 42 : previewPosition === 'right' ? 58 : 50;
      var previewTop = 27 + (accessoryRule.topOffset || 0);

      if (editorEls.accessoryPreviewBase) {
        editorEls.accessoryPreviewBase.src = resolveAssetSrc((PET_VARIANT_LIST[0] && PET_VARIANT_LIST[0].level2) || (PET_VARIANT_LIST[0] && PET_VARIANT_LIST[0].level1) || '');
      }

      editorEls.accessoryPreviewItem.src = previewSrc;
      editorEls.accessoryPreviewItem.style.top = previewTop + '%';
      editorEls.accessoryPreviewItem.style.left = previewLeft + '%';
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-offset-x', offsetX + 'px');
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-offset-y', offsetY + 'px');
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-scale', (accessoryItem && accessoryItem.widthPercent ? accessoryItem.widthPercent + '%' : '34%'));
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-scale-factor', String((accessoryRule.scale || 1) * (scalePercent / 100)));
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-rot', '0deg');
      syncAccessoryOffsetHint();
    }

    function syncAccessoryDraftFromForm() {
      if (!state.editor.draft) return;
      state.editor.draft.offsetX = parseNonNegative(editorEls.accessoryOffsetX ? editorEls.accessoryOffsetX.value : 0, 0);
      state.editor.draft.offsetY = parseNonNegative(editorEls.accessoryOffsetY ? editorEls.accessoryOffsetY.value : 0, 0);
      state.editor.draft.scalePercent = Math.max(40, Math.min(200, parseNonNegative(state.editor.draft.scalePercent, 100)));
      state.editor.draft.positionMode = normalizeAccessoryPositionMode(editorEls.accessoryPositionMode ? editorEls.accessoryPositionMode.value : state.editor.draft.positionMode);
      if (editorEls.accessoryNudgePanel) {
        editorEls.accessoryNudgePanel.classList.toggle('is-custom', state.editor.draft.positionMode === 'custom');
      }
      updateAccessoryPreview();
    }

    function selectLevel1Tab() {
      if (!editorEls.levelTabs || !editorEls.levelTabContents) return;
      editorEls.levelTabs.forEach(function (tab) {
        tab.classList.toggle('active', tab.getAttribute('data-level') === '1');
      });
      editorEls.levelTabContents[0].classList.add('active');
      editorEls.levelTabContents[1].classList.remove('active');
    }

    function selectLevel2Tab() {
      if (!editorEls.levelTabs || !editorEls.levelTabContents) return;
      editorEls.levelTabs.forEach(function (tab) {
        tab.classList.toggle('active', tab.getAttribute('data-level') === '2');
      });
      editorEls.levelTabContents[0].classList.remove('active');
      editorEls.levelTabContents[1].classList.add('active');
    }

    function syncColorHexToInput(hexValue) {
      if (editorEls.variantToneHex) {
        editorEls.variantToneHex.value = hexValue;
      }
    }

    function syncColorPickerFromHex(hexValue) {
      if (editorEls.variantTone) {
        editorEls.variantTone.value = hexValue;
      }
      if (editorEls.variantColorSwatch) {
        editorEls.variantColorSwatch.style.backgroundColor = hexValue;
      }
    }

    function setupLevelFileInputHandler(fileInputId, imageInputId, fileNameId, previewId) {
      var fileInput = document.getElementById(fileInputId);
      if (!fileInput) return;

      fileInput.addEventListener('change', function (event) {
        var file = event.target.files && event.target.files[0];
        if (!file) return;

        var fileName = file.name;
        var fileNameEl = document.getElementById(fileNameId);
        if (fileNameEl) fileNameEl.textContent = fileName;

        var reader = new FileReader();
        reader.onload = function (e) {
          var dataUrl = e.target.result;
          if (imageInputId) {
            var imageInput = document.getElementById(imageInputId);
            if (imageInput) imageInput.value = dataUrl;
          }
          var previewEl = document.getElementById(previewId);
          if (previewEl && previewEl.tagName === 'IMG') {
            previewEl.src = dataUrl;
          }
          syncVariantDraftFromForm();
          updateVariantPreview();
        };
        reader.readAsDataURL(file);
      });
    }

    function handleAccessoryScaleChange(step) {
      if (!state.editor.draft) return;
      var currentScale = state.editor.draft.scalePercent || 100;
      var newScale = currentScale + step;
      newScale = Math.max(40, Math.min(200, newScale));
      state.editor.draft.scalePercent = newScale;
      if (editorEls.accessoryScaleValue) {
        editorEls.accessoryScaleValue.textContent = newScale + '%';
      }
    }

    function updateAccessoryFieldVisibility() {
      var isAccessory = state.editor.type === 'accessories';
      if (editorEls.accessoryPositionWrap) {
        editorEls.accessoryPositionWrap.style.display = isAccessory ? 'flex' : 'none';
      }
      if (editorEls.accessoryScaleWrap) {
        editorEls.accessoryScaleWrap.style.display = isAccessory ? 'flex' : 'none';
      }
      if (editorEls.accessoryPreviewWrap) {
        editorEls.accessoryPreviewWrap.style.display = isAccessory ? 'flex' : 'none';
      }
      if (editorEls.accessoryNudgePanel) {
        editorEls.accessoryNudgePanel.classList.toggle('is-custom', isAccessory && state.editor.draft && normalizeAccessoryPositionMode(state.editor.draft.positionMode) === 'custom');
      }
    }

    function handleSaveEditor() {
      if (!state.editor.draft || !state.editor.type) return;

      var type = state.editor.type;
      var index = state.editor.index;
      var isNew = state.editor.isNew;

      var name = editorEls.name ? editorEls.name.value.trim() : '';
      var file = editorEls.image ? editorEls.image.value.trim() : '';
      var priceXqp = parseNonNegative(editorEls.price ? editorEls.price.value : 0, 0);
      var unlockType = editorEls.unlockType ? editorEls.unlockType.value : 'level';
      var unlockValue;

      if (!name) {
        if (editorEls.name) editorEls.name.focus();
        return;
      }
      if (!file) {
        if (editorEls.image) editorEls.image.focus();
        return;
      }

      if (unlockType === 'level') {
        unlockValue = Math.max(1, parseNonNegative(editorEls.unlockLevel ? editorEls.unlockLevel.value : 1, 1));
      } else {
        unlockValue = editorEls.unlockTopic ? editorEls.unlockTopic.value : '';
      }

      var payload = cloneItem(state.editor.draft);
      payload.name = name;
      payload.file = file;
      payload.priceXqp = priceXqp;
      payload.unlockCondition = {
        type: unlockType,
        value: unlockValue
      };
      
      // Accessory position and scale
      if (type === 'accessories') {
        payload.offsetX = parseNonNegative(editorEls.accessoryOffsetX ? editorEls.accessoryOffsetX.value : 0, 0);
        payload.offsetY = parseNonNegative(editorEls.accessoryOffsetY ? editorEls.accessoryOffsetY.value : 0, 0);
        payload.scalePercent = parseNonNegative(state.editor.draft.scalePercent || 100, 100);
        payload.scalePercent = Math.max(40, Math.min(200, payload.scalePercent));
        payload.positionMode = normalizeAccessoryPositionMode(editorEls.accessoryPositionMode ? editorEls.accessoryPositionMode.value : state.editor.draft.positionMode);
      }

      if (type === 'food') {
        payload.petXpGain = parseNonNegative(editorEls.foodXp ? editorEls.foodXp.value : 0, 0);
      }

      var target = getItemsByType(type);
      if (isNew) {
        target.unshift(payload);
      } else if (index >= 0 && index < target.length) {
        target[index] = payload;
      }

      updateCounts();
      renderAllPmItems();
      // closePmEditor(); - Bỏ đóng sidebar khi lưu theo yêu cầu
      persistPetItemsToBackend(true);
    }

    function performDelete() {
      var type = state.editor.type;
      var index = state.editor.index;
      if (!type) return;

      if (state.editor.isNew) {
        closePmEditor();
        return;
      }

      var target = getItemsByType(type);
      if (index < 0 || index >= target.length) return;

      target.splice(index, 1);
      updateCounts();
      renderAllPmItems();
      closePmEditor();
      persistPetItemsToBackend(true);
    }

    function handleDeleteItem() {
      if (typeof window.showAppConfirm === 'function') {
        try {
          var result = window.showAppConfirm('Ban chac chan muon xoa item nay?', {
            title: 'Xac nhan xoa',
            confirmText: 'Xoa',
            cancelText: 'Huy'
          });

          if (result && typeof result.then === 'function') {
            result.then(function (ok) {
              if (ok) performDelete();
            }).catch(function () {});
            return;
          }

          if (result) performDelete();
          return;
        } catch (e) {
          // fall back to native confirm
        }
      }

      if (window.confirm('Ban chac chan muon xoa item nay?')) {
        performDelete();
      }
    }

    function handleGridClick(event) {
      var addCard = event.target.closest('.pm-add-card');
      if (addCard) {
        var addType = addCard.getAttribute('data-item-type');
        if (addType) startCreateNewItem(addType);
        return;
      }

      var dataCard = event.target.closest('.pm-data-card');
      if (!dataCard) return;

      var type = dataCard.getAttribute('data-item-type');
      var index = parseInt(dataCard.getAttribute('data-item-index') || '-1', 10);
      if (!type || isNaN(index) || index < 0) return;

      openPmEditor(type, index);
    }

    function handleVariantGridClick(event) {
      var addCard = event.target.closest('[data-variant-add="1"]');
      if (addCard) {
        openPmVariantEditor(-1, true);
        return;
      }

      var variantCard = event.target.closest('[data-variant-index]');
      if (!variantCard) return;

      var index = parseInt(variantCard.getAttribute('data-variant-index') || '-1', 10);
      if (isNaN(index) || index < 0) return;
      var level = parseInt(variantCard.getAttribute('data-variant-level') || '1', 10);
      openPmVariantEditor(index, false, level === 2 ? 2 : 1);
    }

    function bindPmEvents() {
      if (eventsBound) return;

      var accessoriesGrid = document.getElementById('accessories-grid');
      var foodGrid = document.getElementById('food-grid');
      var variantGrid = document.getElementById('pet-variants-grid');

      if (accessoriesGrid) accessoriesGrid.addEventListener('click', handleGridClick);
      if (foodGrid) foodGrid.addEventListener('click', handleGridClick);
      if (variantGrid) variantGrid.addEventListener('click', handleVariantGridClick);

      if (editorEls.unlockType) editorEls.unlockType.addEventListener('change', syncUnlockFieldVisibility);
      if (editorEls.image) editorEls.image.addEventListener('input', updateEditorImagePreview);
      if (editorEls.imageFile) editorEls.imageFile.addEventListener('change', handleImageFileChange);
      if (editorEls.accessoryPositionMode) {
        editorEls.accessoryPositionMode.addEventListener('change', function () {
          applyAccessoryPositionMode(this.value, true);
        });
      }
      if (editorEls.accessoryOffsetX) editorEls.accessoryOffsetX.addEventListener('input', function () {
        applyAccessoryPositionMode('custom', false);
        syncAccessoryDraftFromForm();
      });
      if (editorEls.accessoryOffsetY) editorEls.accessoryOffsetY.addEventListener('input', function () {
        applyAccessoryPositionMode('custom', false);
        syncAccessoryDraftFromForm();
      });
      if (editorEls.accessoryNudgeUp) {
        editorEls.accessoryNudgeUp.addEventListener('click', function () { nudgeAccessoryPosition(0, -4); });
      }
      if (editorEls.accessoryNudgeDown) {
        editorEls.accessoryNudgeDown.addEventListener('click', function () { nudgeAccessoryPosition(0, 4); });
      }
      if (editorEls.accessoryNudgeLeft) {
        editorEls.accessoryNudgeLeft.addEventListener('click', function () { nudgeAccessoryPosition(-4, 0); });
      }
      if (editorEls.accessoryNudgeRight) {
        editorEls.accessoryNudgeRight.addEventListener('click', function () { nudgeAccessoryPosition(4, 0); });
      }
      if (editorEls.saveBtn) editorEls.saveBtn.addEventListener('click', handleSaveEditor);
      if (editorEls.deleteBtn) editorEls.deleteBtn.addEventListener('click', handleDeleteItem);

      // Accessory scale buttons
      if (editorEls.accessoryScaleDown) {
        editorEls.accessoryScaleDown.addEventListener('click', function () {
          handleAccessoryScaleChange(-5);
          updateAccessoryPreview();
        });
      }
      if (editorEls.accessoryScaleUp) {
        editorEls.accessoryScaleUp.addEventListener('click', function () {
          handleAccessoryScaleChange(5);
          updateAccessoryPreview();
        });
      }

      // Level tabs
      if (editorEls.levelTabs && editorEls.levelTabs.length > 0) {
        editorEls.levelTabs.forEach(function (tab) {
          tab.addEventListener('click', function () {
            var level = parseInt(this.getAttribute('data-level') || '1', 10);
            if (level === 2) {
              selectLevel2Tab();
            } else {
              selectLevel1Tab();
            }
          });
        });
      }

      // Color picker events
      if (editorEls.variantTone) {
        editorEls.variantTone.addEventListener('input', function () {
          var color = this.value;
          if (editorEls.variantColorSwatch) {
            editorEls.variantColorSwatch.style.backgroundColor = color;
          }
          syncColorHexToInput(color);
          syncVariantDraftFromForm();
          updateVariantPreview();
        });
      }

      if (editorEls.variantToneHex) {
        editorEls.variantToneHex.addEventListener('input', function () {
          var hex = this.value;
          if (/^#[0-9A-F]{6}$/i.test(hex)) {
            syncColorPickerFromHex(hex);
            syncVariantDraftFromForm();
            updateVariantPreview();
          }
        });
      }

      // File upload handlers for level and eye images
      setupLevelFileInputHandler('pm-variant-level1-file', 'pm-variant-level1', 'pm-level1-file-name', 'pm-variant-level1-preview');
      setupLevelFileInputHandler('pm-variant-level2-file', 'pm-variant-level2', 'pm-level2-file-name', 'pm-variant-level2-preview');
      setupLevelFileInputHandler('pm-variant-eye-open-file', 'pm-variant-eye-open', 'pm-eye-open-file-name', null);
      setupLevelFileInputHandler('pm-variant-eye-closed-file', 'pm-variant-eye-closed', 'pm-eye-closed-file-name', null);

      if (editorEls.variantUnlockType) editorEls.variantUnlockType.addEventListener('change', function () {
        normalizeVariantUnlockFieldVisibility();
        syncVariantDraftFromForm();
      });
      if (editorEls.variantUnlockTopic) editorEls.variantUnlockTopic.addEventListener('change', syncVariantDraftFromForm);
      if (editorEls.variantUnlockLevel) editorEls.variantUnlockLevel.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantName) editorEls.variantName.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantDescription) editorEls.variantDescription.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantLevel1) editorEls.variantLevel1.addEventListener('input', function () {
        syncVariantDraftFromForm();
        if (state.variantEditor.previewLevel === 1) updateVariantPreview();
      });
      if (editorEls.variantLevel2) editorEls.variantLevel2.addEventListener('input', function () {
        syncVariantDraftFromForm();
        if (state.variantEditor.previewLevel === 2) updateVariantPreview();
      });
      if (editorEls.variantEyeOpen) editorEls.variantEyeOpen.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantEyeClosed) editorEls.variantEyeClosed.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantSizeDown) editorEls.variantSizeDown.addEventListener('click', function () {
        changeVariantScale(-5);
      });
      if (editorEls.variantSizeUp) editorEls.variantSizeUp.addEventListener('click', function () {
        changeVariantScale(5);
      });
      if (editorEls.variantSaveBtn) editorEls.variantSaveBtn.addEventListener('click', handleSaveVariantEditor);
      if (editorEls.variantDeleteBtn) editorEls.variantDeleteBtn.addEventListener('click', handleDeleteVariantEditor);
      if (editorEls.variantPreviewBox) {
        editorEls.variantPreviewBox.querySelectorAll('.pm-preview-toggle').forEach(function (btn) {
          btn.addEventListener('click', function () {
            if (!state.variantEditor.draft) return;
            state.variantEditor.previewLevel = parseInt(this.getAttribute('data-preview-level') || '1', 10) === 2 ? 2 : 1;
            updateVariantPreview();
          });
        });
      }

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          closePmEditor();
          closePmVariantEditor();
        }
      });

      eventsBound = true;
    }

    function loadTopicsForConditions() {
      if (!(window.google && google.script && google.script.run)) {
        populateTopicOptions();
        syncVariantTopicOptions();
        return;
      }

      google.script.run
        .withSuccessHandler(function (topics) {
          var parsed = (topics || []).map(function (topic) {
            var id = String(topic.topicId || topic.id || '').trim();
            var label = String(topic.title || topic.topicName || id).trim();
            if (!id) return null;
            return { id: id, label: label || id };
          }).filter(function (item) {
            return !!item;
          });

          if (parsed.length > 0) state.topics = parsed;
          populateTopicOptions();
          syncVariantTopicOptions();
        })
        .withFailureHandler(function () {
          populateTopicOptions();
          syncVariantTopicOptions();
        })
        .getAllTopicsForAdmin();
    }

    function autoInitPetManagement() {
      var root = document.querySelector('.pet-management-page');
      if (!root) return;
      if (!state.initialized && typeof window.initPetManagement === 'function') {
        window.initPetManagement();
      }
    }

    window.initPetManagement = function () {
      initializeStateIfNeeded();
      ensureVariantFallbackState();
      cacheEditorElements();
      bindPmEvents();
      loadTopicsForConditions();
      updateCounts();
      renderAllPmItems();
      loadPetItemsFromBackend();
      closePmEditor();
      closePmVariantEditor();
      window.togglePmSegment('accessories');
      state.initialized = true;
    };

    window.togglePmSegment = function (segmentId) {
      var segments = document.querySelectorAll('.pm-segment');
      var targetSegment = document.getElementById('segment-' + segmentId);
      if (!targetSegment) return;

      var isOpening = !targetSegment.classList.contains('active');
      segments.forEach(function (s) {
        s.classList.remove('active');
      });
      if (isOpening) targetSegment.classList.add('active');
    };

    window.closePmEditor = closePmEditor;
    window.closePmVariantEditor = closePmVariantEditor;

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', autoInitPetManagement);
    } else {
      setTimeout(autoInitPetManagement, 0);
    }
  })();
</script>
