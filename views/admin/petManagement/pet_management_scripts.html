    function parseSignedInteger(value, fallback) {
      var n = parseInt(String(value == null ? '' : value), 10);
      if (isNaN(n)) return fallback;
      return n;
    }

    function normalizeUnlockConditionEntry(condition) {
      var safeCondition = condition || {};
      var unlockType = String(safeCondition.type || 'level').trim() || 'level';
      var unlockValue = safeCondition.value;

      if (unlockType === 'level') {
        unlockValue = Math.max(1, parseNonNegative(unlockValue, 1));
        return {
          type: 'level',
          value: unlockValue,
        };
      }

      unlockValue = String(unlockValue || '').trim();
      if (!unlockValue) return null;

      return {
        type: unlockType,
        value: unlockValue,
      };
    }

    function normalizeUnlockMode(mode) {
      return String(mode || 'all') === 'any' ? 'any' : 'all';
    }

    function normalizeUnlockConditionData(unlockCondition) {
      var raw = unlockCondition || {};

      if (raw && Array.isArray(raw.conditions)) {
        var mode = normalizeUnlockMode(raw.mode);
        var conditions = raw.conditions
          .map(normalizeUnlockConditionEntry)
          .filter(Boolean);

        if (conditions.length === 0) {
          return { type: 'level', value: 1 };
        }
        if (conditions.length === 1) {
          return conditions[0];
        }

        return {
          mode: mode,
          conditions: conditions,
        };
      }

      return normalizeUnlockConditionEntry(raw) || { type: 'level', value: 1 };
    }

    function unlockConditionToList(unlockCondition) {
      var normalized = normalizeUnlockConditionData(unlockCondition);
      if (Array.isArray(normalized.conditions)) {
        return normalized.conditions.slice();
      }
      return [normalized];
    }

    function getUnlockConditionMode(unlockCondition) {
      var normalized = normalizeUnlockConditionData(unlockCondition);
      return Array.isArray(normalized.conditions) ? normalizeUnlockMode(normalized.mode) : 'all';
    }

    function unlockConditionFromList(conditions, mode) {
      var normalizedConditions = (Array.isArray(conditions) ? conditions : [])
        .map(normalizeUnlockConditionEntry)
        .filter(Boolean);
      var normalizedMode = normalizeUnlockMode(mode);

      if (normalizedConditions.length === 0) {
        return { type: 'level', value: 1 };
      }
      if (normalizedConditions.length === 1) {
        return normalizedConditions[0];
      }

      return {
        mode: normalizedMode,
        conditions: normalizedConditions,
      };
    }

    function normalizeAccessoryPositionMode(positionMode) {
      return ACCESSORY_POSITIONS.indexOf(positionMode) >= 0 ? positionMode : 'center';
    }

    function normalizeAccessoryProfile(profile, fallback) {
      var safeProfile = profile || {};
      var safeFallback = fallback || {};
      var scalePercent = parseNonNegative(safeProfile.scalePercent, parseNonNegative(safeFallback.scalePercent, 100));
      scalePercent = Math.max(40, Math.min(220, scalePercent));
      var rotDeg = parseSignedInteger(safeProfile.rotDeg, parseSignedInteger(safeFallback.rotDeg, 0));
      rotDeg = Math.max(-180, Math.min(180, rotDeg));

      return {
        offsetX: parseSignedInteger(safeProfile.offsetX, parseSignedInteger(safeFallback.offsetX, 0)),
        offsetY: parseSignedInteger(safeProfile.offsetY, parseSignedInteger(safeFallback.offsetY, 0)),
        scalePercent: scalePercent,
        rotDeg: rotDeg,
      };
    }

    function buildDefaultAccessoryProfiles(item) {
      var safeItem = item || {};
      var baseProfile = normalizeAccessoryProfile({
        offsetX: safeItem.offsetX,
        offsetY: safeItem.offsetY,
        scalePercent: safeItem.scalePercent,
        rotDeg: safeItem.rotDeg,
      }, {
        offsetX: 0,
        offsetY: 0,
        scalePercent: 100,
        rotDeg: 0,
      });

      return {
        left: normalizeAccessoryProfile(safeItem.positionProfiles && safeItem.positionProfiles.left, baseProfile),
        center: normalizeAccessoryProfile(safeItem.positionProfiles && safeItem.positionProfiles.center, baseProfile),
        right: normalizeAccessoryProfile(safeItem.positionProfiles && safeItem.positionProfiles.right, baseProfile),
      };
    }

    function buildZeroedAccessoryProfiles() {
      return {
        left: { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 },
        center: { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 },
        right: { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 },
      };
    }

    function cloneAccessoryProfiles(profiles) {
      var safeProfiles = profiles || {};
      return {
        left: normalizeAccessoryProfile(safeProfiles.left, { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 }),
        center: normalizeAccessoryProfile(safeProfiles.center, { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 }),
        right: normalizeAccessoryProfile(safeProfiles.right, { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 }),
      };
    }

    function getAccessoryProfileByPosition(profiles, position) {
      var normalizedPosition = normalizeAccessoryPositionMode(position);
      var safeProfiles = cloneAccessoryProfiles(profiles);
      return safeProfiles[normalizedPosition];
    }

    function getAccessoryPositionLabel(positionMode) {
      if (positionMode === 'left') return 'Trái đầu';
      if (positionMode === 'right') return 'Phải đầu';
      return 'Giữa đầu';
    }

    function cloneItem(item) {
      var safeItem = item || {};
      var positionMode = normalizeAccessoryPositionMode(safeItem.positionMode || 'center');
      var positionProfiles = buildDefaultAccessoryProfiles(safeItem);
      var activeProfile = getAccessoryProfileByPosition(positionProfiles, positionMode);

      return {
        id: safeItem.id,
        name: safeItem.name,
        file: safeItem.file,
        priceXqp: safeItem.priceXqp,
        petXpGain: safeItem.petXpGain,
        offsetX: activeProfile.offsetX,
        offsetY: activeProfile.offsetY,
        scalePercent: activeProfile.scalePercent,
        rotDeg: activeProfile.rotDeg,
        positionMode: positionMode,
        positionProfiles: positionProfiles,
        unlockCondition: normalizeUnlockConditionData(safeItem.unlockCondition)
      };
    }

    function cloneVariant(variant) {
      var safe = variant || {};
      var unlockCondition = normalizeUnlockConditionData(safe.unlockCondition);

      var scalePercent = parseNonNegative(safe.scalePercent, 100);
      scalePercent = Math.max(40, Math.min(200, scalePercent));

      return {
        id: String(safe.id || ""),
        name: String(safe.name || ""),
        tone: String(safe.tone || "#7c8cff"),
        description: String(safe.description || ""),
        level1: String(safe.level1 || DEFAULT_LEVEL1_FILE),
        level2: String(safe.level2 || ""),
        secondPetPriceXqp: parseNonNegative(safe.secondPetPriceXqp, 500),
        unlockCondition: unlockCondition,
        scalePercent: scalePercent,
      };
    }

    function ensureVariantFallbackState() {

    function normalizeLoadedItems(items, type) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          var safeItem = item || {};

          var fallbackId =
            type === 'food'
              ? ('food-' + (31 + index))
              : type === 'backgrounds'
                ? ('bg-' + (index + 1))
              : ('acc-' + (index + 1 < 10 ? '0' + (index + 1) : String(index + 1)));

          var normalized = {
            id: String(safeItem.id || fallbackId),
            name: String(safeItem.name || ''),
            file: String(safeItem.file || ''),
            priceXqp: parseNonNegative(safeItem.priceXqp, 0),
            offsetX: parseSignedInteger(safeItem.offsetX, 0),
            offsetY: parseSignedInteger(safeItem.offsetY, 0),
            scalePercent: Math.max(40, Math.min(220, parseNonNegative(safeItem.scalePercent, 100))),
            positionMode: normalizeAccessoryPositionMode(String(safeItem.positionMode || 'center')),
            positionProfiles: buildDefaultAccessoryProfiles(safeItem),
            unlockCondition: normalizeUnlockConditionData(safeItem.unlockCondition),
          };

          if (type === 'food') {
            normalized.petXpGain = parseNonNegative(safeItem.petXpGain, 0);
          }

          return normalized;
        })
        .filter(function (item) {
          return !!item.id;
        });
    }

    function normalizeLoadedVariants(items) {
      if (!Array.isArray(items)) return [];

      return items
        .map(function (item, index) {
          var safe = cloneVariant(item);
          if (!safe.id) {
            safe.id = "variant-" + (index + 1);
          }
          if (!safe.name) {
            safe.name = "Pet " + (index + 1);
          }
          return safe;
        })
        .filter(function (variant) {
          return !!variant.id;
        });
    }

    function buildPersistPayload() {

    function persistPetItemsToBackend(showNotice, callbacks) {
      if (!(window.google && google.script && google.script.run)) {
        if (callbacks && typeof callbacks.onFailure === 'function') {
          callbacks.onFailure(new Error('Google Script API unavailable'));
        }
        return;
      }

      var persistCallbacks = callbacks || {};

      if (isPersisting) {
        pendingItemPersistRequest = {
          showNotice: showNotice,
          callbacks: persistCallbacks,
        };
        return;
      }

      isPersisting = true;
      var payloadJson = JSON.stringify(buildPersistPayload());

      google.script.run
        .withSuccessHandler(function (result) {
          isPersisting = false;
          if (typeof persistCallbacks.onSuccess === 'function') {
            persistCallbacks.onSuccess(result);
          }

          if (pendingItemPersistRequest) {
            var nextRequest = pendingItemPersistRequest;
            pendingItemPersistRequest = null;
            persistPetItemsToBackend(nextRequest.showNotice, nextRequest.callbacks);
          }

          if (!showNotice) return;

          if (result && result.success && typeof window.showNotification === 'function') {
            window.showNotification('Da luu danh muc PET', 'success');
          }
        })
        .withFailureHandler(function (error) {
          isPersisting = false;
          if (typeof persistCallbacks.onFailure === 'function') {
            persistCallbacks.onFailure(error);
          }

          if (pendingItemPersistRequest) {
            var nextRequest = pendingItemPersistRequest;
            pendingItemPersistRequest = null;
            persistPetItemsToBackend(nextRequest.showNotice, nextRequest.callbacks);
          }

          if (typeof window.showNotification === 'function') {
            window.showNotification('Khong the luu danh muc PET', 'error');
          }
        })
        .savePetItemsForAdmin(payloadJson);
    }

    function persistPetVariantsToBackend(showNotice, callbacks) {
      if (!(window.google && google.script && google.script.run)) {
        if (callbacks && typeof callbacks.onFailure === 'function') {
          callbacks.onFailure(new Error('Google Script API unavailable'));
        }
        return;
      }

      var persistCallbacks = callbacks || {};

      if (isPersistingVariants) {
        pendingVariantPersistRequest = {
          showNotice: showNotice,
          callbacks: persistCallbacks,
        };
        return;
      }

      isPersistingVariants = true;

      var payloadJson = JSON.stringify({
        variants: state.petVariants.map(function (variant) {
          return cloneVariant(variant);
        }),
      });

      google.script.run
        .withSuccessHandler(function (result) {
          isPersistingVariants = false;

          if (typeof persistCallbacks.onSuccess === 'function') {
            persistCallbacks.onSuccess(result);
          }

          if (pendingVariantPersistRequest) {
            var nextRequest = pendingVariantPersistRequest;
            pendingVariantPersistRequest = null;
            persistPetVariantsToBackend(nextRequest.showNotice, nextRequest.callbacks);
          }

          if (!showNotice) return;
          if (result && result.success && typeof window.showNotification === 'function') {
            window.showNotification('Da luu danh sach hinh dang PET', 'success');
          } else if (typeof window.showNotification === 'function') {
            var message = result && result.message ? String(result.message) : 'Khong the luu hinh dang PET';
            window.showNotification(message, 'error');
          }
        })
        .withFailureHandler(function (error) {
          isPersistingVariants = false;

          if (typeof persistCallbacks.onFailure === 'function') {
            persistCallbacks.onFailure(error);
          }

          if (pendingVariantPersistRequest) {
            var nextRequest = pendingVariantPersistRequest;
            pendingVariantPersistRequest = null;
            persistPetVariantsToBackend(nextRequest.showNotice, nextRequest.callbacks);
          }

          if (typeof window.showNotification === 'function') {
            window.showNotification('Khong the luu hinh dang PET', 'error');
          }
        })
        .savePetVariantsForAdmin(payloadJson);
    }

    function loadPetItemsFromBackend() {
      if (!(window.google && google.script && google.script.run)) {
        return;
      }

      google.script.run
        .withSuccessHandler(function (result) {
          if (!result || result.success !== true) {
            ensureVariantFallbackState();
            updateCounts();
            renderAllPmItems();
            return;
          }

          var loadedAccessories = normalizeLoadedItems(result.accessories, 'accessories');
          var loadedFood = normalizeLoadedItems(result.food, 'food');
          var loadedBackgrounds = normalizeLoadedItems(result.backgrounds, 'backgrounds');
          var loadedVariants = normalizeLoadedVariants(result.variants);
          var hasPersistedData = loadedAccessories.length > 0 || loadedFood.length > 0 || loadedBackgrounds.length > 0;
          var hasBackgroundData = loadedBackgrounds.length > 0;
          var hasVariantData = loadedVariants.length > 0;

          if (hasPersistedData) {
            state.accessories = loadedAccessories;
            state.food = loadedFood;
            if (hasBackgroundData) {
              state.backgrounds = loadedBackgrounds;
            }
            if (hasVariantData) {
              state.petVariants = loadedVariants;
            }
            ensureVariantFallbackState();
            updateCounts();
            renderAllPmItems();

            if (!hasBackgroundData) {
              // Backfill legacy sheets with default backgrounds.
              persistPetItemsToBackend(false);
            }
            return;
          }

          if (hasVariantData) {
            state.petVariants = loadedVariants;
            ensureVariantFallbackState();
            updateCounts();
            renderAllPmItems();
          }

          // First run with empty sheet: seed current defaults to backend.
          persistPetItemsToBackend(false);
          if (!hasVariantData) {
            persistPetVariantsToBackend(false);
          }
        })
        .withFailureHandler(function () {
          // Keep local default list if backend load fails.
          ensureVariantFallbackState();
          updateCounts();
          renderAllPmItems();
        })
        .getPetItemsForAdmin();
    }

      if (type === 'food') return state.food;
      if (type === 'backgrounds') return state.backgrounds;
      return state.accessories;
    }

    function updateCounts() {
      var accCountEl = document.getElementById('accessory-count');
      var foodCountEl = document.getElementById('food-count');
      var bgCountEl = document.getElementById('background-count');
      var variantCountEl = document.getElementById('variant-count');
      var variantCount = Array.isArray(state.petVariants) ? state.petVariants.length * 2 : 0;
      if (accCountEl) accCountEl.textContent = String(state.accessories.length);
      if (foodCountEl) foodCountEl.textContent = String(state.food.length);
      if (bgCountEl) bgCountEl.textContent = String(state.backgrounds.length);
      if (variantCountEl) variantCountEl.textContent = String(variantCount);
    }

    function resolveAssetSrc(filePath) {
      if (!filePath) {
        return 'https://api.dicebear.com/9.x/shapes/svg?seed=pm-default';
      }

      var src = String(filePath).trim();
      if (/^(https?:|data:|blob:)/i.test(src)) {
        return src;
      }

      return PET_ASSET_CDN + src.replace(/^\/+/, '');
    }

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderPmItems(containerId, items, itemType) {
      var container = document.getElementById(containerId);
      if (!container) return;

      var html = '';
      html += '<button type="button" class="pm-item-card pm-add-card" data-item-type="' + itemType + '" aria-label="Them moi">+</button>';

      items.forEach(function (item, index) {
        var src = resolveAssetSrc(item.file);
        html += '' +
          '<div class="pm-item-card pm-data-card" draggable="true" data-item-type="' + itemType + '" data-item-index="' + index + '" data-sort-index="' + index + '" title="Kéo để đổi vị trí">' +
          '  <div class="pm-item-badge"></div>' +
          '  <div class="pm-item-image-box">' +
          '    <span class="material-symbols-sharp pm-drag-handle" aria-hidden="true">drag_indicator</span>' +
          '    <img src="' + src + '" alt="' + item.name + '" loading="lazy" onerror="this.src=\'https://api.dicebear.com/9.x/shapes/svg?seed=' + item.id + '\'">' +
          '  </div>' +
          '  <span class="pm-item-name">' + item.name + '</span>' +
          '</div>';
      });

      container.innerHTML = html;
    }

    function renderAllPmItems() {
      renderPmItems('accessories-grid', state.accessories, 'accessories');
      renderPmItems('food-grid', state.food, 'food');
      renderPmItems('backgrounds-grid', state.backgrounds, 'backgrounds');
      renderPetVariantItems();
    }

    function renderPetVariantItems() {
      var container = document.getElementById('pet-variants-grid');
      if (!container) return;

      if (!Array.isArray(state.petVariants)) {
        state.petVariants = [];
      }

      var html = '';
      html += '<button type="button" class="pm-item-card pm-add-card" data-variant-add="1" aria-label="Them moi pet">+</button>';

      state.petVariants.forEach(function (variant, index) {
        var safeName = escapeHtml(variant.name || ('Pet ' + (index + 1)));
        [1, 2].forEach(function (level) {
          var src = resolveAssetSrc(level === 1 ? (variant.level1 || DEFAULT_LEVEL1_FILE) : (variant.level2 || ''));
          var levelLabel = level === 1 ? 'Level 1' : 'Level 2';
          html += '' +
            '<div class="pm-item-card pm-variant-card pm-variant-level-card" draggable="true" data-variant-index="' + index + '" data-sort-index="' + index + '" data-variant-level="' + level + '" title="Kéo để đổi vị trí hoặc bấm để chỉnh sửa">' +
            '  <div class="pm-item-badge"></div>' +
            '  <div class="pm-item-image-box">' +
            '    <span class="material-symbols-sharp pm-drag-handle" aria-hidden="true">drag_indicator</span>' +
            '    <span class="pm-variant-level-badge">' + levelLabel + '</span>' +
            '    <img src="' + src + '" alt="' + safeName + ' ' + levelLabel + '" loading="lazy" onerror="this.src=\'https://api.dicebear.com/9.x/shapes/svg?seed=pet-variant-' + index + '-' + level + '\'\">' +
            '  </div>' +
            '  <span class="pm-item-name">' + safeName + '</span>' +
            '  <div class="pm-variant-meta">' +
            '    <span class="pm-variant-level-pill">' + levelLabel + '</span>' +

    function normalizeVariantUnlockFieldVisibility() {
      if (!editorEls.variantUnlockType || !editorEls.variantUnlockLevelWrap || !editorEls.variantUnlockTopicWrap) {
        return;
      }

      var unlockType = editorEls.variantUnlockType.value || 'level';
      var isLevel = unlockType === 'level';
      editorEls.variantUnlockLevelWrap.style.display = isLevel ? 'flex' : 'none';
      editorEls.variantUnlockTopicWrap.style.display = isLevel ? 'none' : 'flex';

    function buildTopicOptionsHtml(selectedId) {
      var selected = String(selectedId || '');
      var topics = state.topics.length ? state.topics : TOPIC_FALLBACK;
      return topics
        .map(function (topic) {
          var topicId = String(topic.id || '');
          var selectedAttr = topicId === selected ? ' selected' : '';
          return '<option value="' + topicId + '"' + selectedAttr + '>' + topic.label + '</option>';
        })
        .join('');
    }

      if (!editorEls.variantUnlockTopic) return;

      editorEls.variantUnlockTopic.innerHTML = buildTopicOptionsHtml(currentValue);
