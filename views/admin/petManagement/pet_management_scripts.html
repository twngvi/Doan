    function toggleUnlockExtraRowValueFields(rowEl) {
      if (!rowEl) return;

      var typeSelect = rowEl.querySelector('.pm-unlock-extra-type');
      var levelInput = rowEl.querySelector('.pm-unlock-extra-level');
      var topicSelect = rowEl.querySelector('.pm-unlock-extra-topic');
      if (!typeSelect || !levelInput || !topicSelect) return;

      var defaultType = typeSelect.querySelector('option[value="level"]') ? 'level' : 'topic';
      var unlockType = String(typeSelect.value || defaultType);
      var isLevel = unlockType === 'level';
      levelInput.style.display = isLevel ? 'block' : 'none';
      topicSelect.style.display = isLevel ? 'none' : 'block';
    }

    function createUnlockExtraRow(condition, options) {
      var opts = options || {};
      var allowLevel = opts.allowLevel !== false;
      var normalized = normalizeUnlockConditionEntry(condition) || { type: 'level', value: 1 };
      if (!allowLevel && normalized.type === 'level') {
        normalized = { type: 'topic', value: '' };
      }

      var rowEl = document.createElement('div');
      rowEl.className = 'pm-unlock-extra-row';
      rowEl.innerHTML =
        '<select class="pm-unlock-extra-type">' +
          (allowLevel ? '<option value="level">Đạt level thanh tiến độ</option>' : '') +
          '<option value="topic">Hoàn thành bài học của topic</option>' +
          '<option value="topic_quiz">Hoàn thành Quiz của topic</option>' +
          '<option value="topic_matching">Hoàn thành Matching của topic</option>' +
        '</select>' +
        '<input class="pm-unlock-extra-level" type="number" min="1" step="1" value="1">' +
        '<select class="pm-unlock-extra-topic"></select>' +
        '<button type="button" class="pm-unlock-extra-remove" aria-label="Xóa điều kiện">×</button>';

      var typeSelect = rowEl.querySelector('.pm-unlock-extra-type');
      var levelInput = rowEl.querySelector('.pm-unlock-extra-level');
      var topicSelect = rowEl.querySelector('.pm-unlock-extra-topic');

      if (topicSelect) {
        topicSelect.innerHTML = buildTopicOptionsHtml(normalized.type === 'level' ? '' : normalized.value);
      }
      if (typeSelect) {
        typeSelect.value = normalized.type;
        if (!typeSelect.value) {
          typeSelect.value = allowLevel ? 'level' : 'topic';
        }
      }
      if (levelInput && String(typeSelect && typeSelect.value || normalized.type) === 'level') {
        levelInput.value = String(Math.max(1, parseNonNegative(normalized.value, 1)));
      }

      if (typeSelect) {
        typeSelect.addEventListener('change', function () {
          toggleUnlockExtraRowValueFields(rowEl);
        });
      }

      toggleUnlockExtraRowValueFields(rowEl);
      return rowEl;
    }

    function setUnlockExtraRows(listEl, conditions, options) {
      if (!listEl) return;
      var opts = options || {};
      var allowLevel = opts.allowLevel !== false;
      listEl.innerHTML = '';

      (Array.isArray(conditions) ? conditions : [])
        .filter(function (condition) {
          if (allowLevel) return true;
          var normalized = normalizeUnlockConditionEntry(condition);
          return !!normalized && normalized.type !== 'level';
        })
        .forEach(function (condition) {
          listEl.appendChild(createUnlockExtraRow(condition, opts));
      });
    }

    function collectUnlockExtraRows(listEl, options) {
      if (!listEl) return [];
      var opts = options || {};
      var allowLevel = opts.allowLevel !== false;

      var conditions = [];
      listEl.querySelectorAll('.pm-unlock-extra-row').forEach(function (rowEl) {
        var typeSelect = rowEl.querySelector('.pm-unlock-extra-type');
        var levelInput = rowEl.querySelector('.pm-unlock-extra-level');
        var topicSelect = rowEl.querySelector('.pm-unlock-extra-topic');
        if (!typeSelect) return;

        var unlockType = String(typeSelect.value || (allowLevel ? 'level' : 'topic'));
        if (!allowLevel && unlockType === 'level') return;
        var unlockValue = unlockType === 'level'
          ? Math.max(1, parseNonNegative(levelInput ? levelInput.value : 1, 1))
          : String(topicSelect ? topicSelect.value || '' : '');

        var normalized = normalizeUnlockConditionEntry({
          type: unlockType,
          value: unlockValue,
        });
        if (normalized) {
          conditions.push(normalized);
        }
      });

      return conditions;
    }

    function refreshUnlockExtraTopicOptions() {
      document.querySelectorAll('.pm-unlock-extra-topic').forEach(function (topicSelect) {
        var currentValue = String(topicSelect.value || '');
        topicSelect.innerHTML = buildTopicOptionsHtml(currentValue);
      });
    }

    function updateVariantScaleValue() {
      if (!state.variantEditor.draft) return;
      if (editorEls.variantSizeValue) {
        editorEls.variantSizeValue.textContent = String(state.variantEditor.draft.scalePercent || 100) + '%';
      }
    }

    function updateVariantPreview() {
      if (!editorEls.variantPreviewImage || !state.variantEditor.draft) return;

      var draft = state.variantEditor.draft;
      var useLevel2 = state.variantEditor.previewLevel === 2;
      var src = useLevel2 ? draft.level2 : draft.level1;
      editorEls.variantPreviewImage.src = resolveAssetSrc(src || draft.level1 || draft.level2 || '');
      editorEls.variantPreviewImage.style.transform = 'scale(' + ((draft.scalePercent || 100) / 100) + ')';

      if (editorEls.variantLevel1Preview) {
        editorEls.variantLevel1Preview.src = resolveAssetSrc(draft.level1 || DEFAULT_LEVEL1_FILE);
      }
      if (editorEls.variantLevel2Preview) {
        editorEls.variantLevel2Preview.src = resolveAssetSrc(draft.level2 || '');
      }

      if (editorEls.variantPreviewBox) {
        editorEls.variantPreviewBox.querySelectorAll('.pm-preview-toggle').forEach(function (btn) {
          var lv = parseInt(btn.getAttribute('data-preview-level') || '1', 10);
          btn.classList.toggle('active', lv === state.variantEditor.previewLevel);
        });
      }

      updateVariantScaleValue();
    }

    function setVariantEditLevel(level, syncPreview) {
      var normalizedLevel = level === 2 ? 2 : 1;
      state.variantEditor.editLevel = normalizedLevel;

      if (editorEls.variantEditLevelTabs) {
        editorEls.variantEditLevelTabs.querySelectorAll('[data-edit-level]').forEach(function (btn) {
          var btnLevel = parseInt(btn.getAttribute('data-edit-level') || '1', 10);
          btn.classList.toggle('active', btnLevel === normalizedLevel);
        });
      }

      if (editorEls.variantLevel1Wrap) {
        editorEls.variantLevel1Wrap.style.display = normalizedLevel === 1 ? 'flex' : 'none';
      }
      if (editorEls.variantLevel2Wrap) {
        editorEls.variantLevel2Wrap.style.display = normalizedLevel === 2 ? 'flex' : 'none';
      }

      if (syncPreview !== false) {
        state.variantEditor.previewLevel = normalizedLevel;
        updateVariantPreview();
      }
    }

    function closePmVariantEditor() {
      if (!editorEls.page || !editorEls.variantSidebar) return;
      editorEls.page.classList.remove('pm-variant-editor-open');
      editorEls.variantSidebar.setAttribute('aria-hidden', 'true');
      state.variantEditor = {
        index: -1,
        isNew: false,
        draft: null,
        previewLevel: 1,
        editLevel: 1
      };
    }

    function openPmVariantEditor(index, isNew, previewLevel) {
      if (!editorEls.page || !editorEls.variantSidebar) return;

      closePmEditor();

      var draft;
      if (isNew) {
        draft = {
          id: 'variant-' + (Date.now()),
          name: '',
          tone: '#7c8cff',
          description: '',
          level1: DEFAULT_LEVEL1_FILE,
          level2: '',
          secondPetPriceXqp: 500,
          unlockCondition: { type: 'level', value: 1 },
          scalePercent: 100,
        };
      } else {
        if (index < 0 || index >= state.petVariants.length) return;
        draft = cloneVariant(state.petVariants[index]);
      }

      state.variantEditor = {
        index: index,
        isNew: !!isNew,
        draft: draft,
        previewLevel: previewLevel === 2 ? 2 : 1,
        editLevel: previewLevel === 2 ? 2 : 1
      };

      var unlockMode = getUnlockConditionMode(draft.unlockCondition);
      var unlockConditions = unlockConditionToList(draft.unlockCondition);
      var primaryUnlock = unlockConditions[0] || { type: 'level', value: 1 };
      var extraUnlockConditions = unlockConditions.slice(1);

      if (editorEls.variantTitle) {
        editorEls.variantTitle.textContent = isNew ? 'Thêm hình dạng PET mới' : 'Chỉnh sửa hình dạng PET';
      }
      if (editorEls.variantName) editorEls.variantName.value = draft.name || '';
      if (editorEls.variantDescription) editorEls.variantDescription.value = draft.description || '';
      if (editorEls.variantSecondPrice) editorEls.variantSecondPrice.value = String(parseNonNegative(draft.secondPetPriceXqp, 500));
      if (editorEls.variantLevel1) {
        editorEls.variantLevel1.value = draft.level1 || DEFAULT_LEVEL1_FILE;
        editorEls.variantLevel1.readOnly = false;
      }
      if (editorEls.variantLevel1FileName) editorEls.variantLevel1FileName.textContent = draft.level1 ? String(draft.level1).split('/').pop() : 'Chưa chọn tệp';
      if (editorEls.variantLevel1Preview) editorEls.variantLevel1Preview.src = resolveAssetSrc(draft.level1 || DEFAULT_LEVEL1_FILE);
      if (editorEls.variantLevel2) editorEls.variantLevel2.value = draft.level2 || '';
      if (editorEls.variantLevel2FileName) editorEls.variantLevel2FileName.textContent = draft.level2 ? String(draft.level2).split('/').pop() : 'Chưa chọn tệp';
      if (editorEls.variantLevel2Preview) editorEls.variantLevel2Preview.src = resolveAssetSrc(draft.level2 || '');
      if (editorEls.variantUnlockType) editorEls.variantUnlockType.value = primaryUnlock.type || 'level';
      if (editorEls.variantUnlockLevel) editorEls.variantUnlockLevel.value = String(primaryUnlock.value || 1);
      if (editorEls.variantUnlockMode) editorEls.variantUnlockMode.value = unlockMode;

      syncVariantTopicOptions();
      if (editorEls.variantUnlockTopic && primaryUnlock.type !== 'level') {
        editorEls.variantUnlockTopic.value = String(primaryUnlock.value || '');
      }
      setUnlockExtraRows(editorEls.variantUnlockExtraList, extraUnlockConditions);

      normalizeVariantUnlockFieldVisibility();
      setVariantEditLevel(state.variantEditor.editLevel, false);
      updateVariantPreview();

      editorEls.page.classList.add('pm-variant-editor-open');
      editorEls.variantSidebar.setAttribute('aria-hidden', 'false');
    }

    function syncVariantDraftFromForm() {
      var draft = state.variantEditor.draft;
      if (!draft) return;

      draft.name = editorEls.variantName ? editorEls.variantName.value.trim() : draft.name;
      draft.description = editorEls.variantDescription ? editorEls.variantDescription.value.trim() : draft.description;
      draft.level1 = editorEls.variantLevel1 ? editorEls.variantLevel1.value.trim() : draft.level1;
      draft.level2 = editorEls.variantLevel2 ? editorEls.variantLevel2.value.trim() : draft.level2;
      draft.secondPetPriceXqp = parseNonNegative(editorEls.variantSecondPrice ? editorEls.variantSecondPrice.value : draft.secondPetPriceXqp, 500);

      var unlockType = editorEls.variantUnlockType ? editorEls.variantUnlockType.value : 'level';
      var unlockValue = unlockType === 'level'
        ? Math.max(1, parseNonNegative(editorEls.variantUnlockLevel ? editorEls.variantUnlockLevel.value : 1, 1))
        : (editorEls.variantUnlockTopic ? String(editorEls.variantUnlockTopic.value || '') : '');
      var unlockMode = editorEls.variantUnlockMode ? normalizeUnlockMode(editorEls.variantUnlockMode.value) : 'all';

      var conditions = [{
        type: unlockType,
        value: unlockValue,
      }].concat(collectUnlockExtraRows(editorEls.variantUnlockExtraList));

      draft.unlockCondition = unlockConditionFromList(conditions, unlockMode);
    }

    function changeVariantScale(step) {
      if (!state.variantEditor.draft) return;
      var next = parseNonNegative(state.variantEditor.draft.scalePercent, 100) + step;
      next = Math.max(40, Math.min(200, next));
      state.variantEditor.draft.scalePercent = next;
      updateVariantPreview();
    }

    function handleSaveVariantEditor() {
      if (!state.variantEditor.draft) return;
      syncVariantDraftFromForm();

      var draft = state.variantEditor.draft;
      if (!draft.name) {
        if (editorEls.variantName) editorEls.variantName.focus();
        return;
      }
      if (!draft.level1) {
        if (editorEls.variantLevel1) editorEls.variantLevel1.focus();
        return;
      }

      var savedIndex = 0;
      if (state.variantEditor.isNew) {
        state.petVariants.push(cloneVariant(draft));
        savedIndex = state.petVariants.length - 1;
      } else if (state.variantEditor.index >= 0 && state.variantEditor.index < state.petVariants.length) {
        state.petVariants[state.variantEditor.index] = cloneVariant(draft);
        savedIndex = state.variantEditor.index;
      }

      updateCounts();
      renderAllPmItems();
      persistPetVariantsToBackend(true);
      openPmVariantEditor(savedIndex, false, state.variantEditor.previewLevel);
    }

    function handleDeleteVariantEditor() {
      if (state.variantEditor.isNew) {
        closePmVariantEditor();
        return;
      }

      var index = state.variantEditor.index;
      if (index < 0 || index >= state.petVariants.length) return;

      var deleteVariant = function () {
        var deletedVariant = state.petVariants[index];
        var deletedVariantName = deletedVariant && deletedVariant.name ? String(deletedVariant.name) : 'hinh dang PET';
        state.petVariants.splice(index, 1);
        updateCounts();
        renderAllPmItems();
        persistPetVariantsToBackend(false);
        closePmVariantEditor();

        if (typeof window.showNotification === 'function') {
          window.showNotification('Da xoa ' + deletedVariantName, 'success');
        }
      };

      requestDeleteConfirm('Ban chac chan muon xoa hinh dang PET nay?', {
        title: 'Xac nhan xoa',
        confirmText: 'Xoa',
        cancelText: 'Huy'
      }).then(function (ok) {
        if (ok) deleteVariant();
      });
    }

    function hasAppDialogElements() {
      return !!(
        document.getElementById('app-dialog-overlay') &&
        document.getElementById('app-dialog-title') &&
        document.getElementById('app-dialog-message') &&
        document.getElementById('app-dialog-ok') &&
        document.getElementById('app-dialog-cancel')
      );
    }

    function requestDeleteConfirm(message, options) {
      var text = String(message || 'Ban chac chan muon xoa item nay?');
      var opts = options || {};

      if (typeof window.showAppConfirm === 'function' && hasAppDialogElements()) {
        try {
          var result = window.showAppConfirm(text, opts);
          if (result && typeof result.then === 'function') {
            return result
              .then(function (ok) { return !!ok; })
              .catch(function () { return window.confirm(text); });
          }
          if (typeof result === 'boolean') {
            return Promise.resolve(result);
          }
        } catch (e) {
          // Fall back to native confirm below.
        }
      }

      return Promise.resolve(window.confirm(text));
    }

    function populateTopicOptions() {
      if (!editorEls.unlockTopic) return;
      var currentValue = String(editorEls.unlockTopic.value || '');
      editorEls.unlockTopic.innerHTML = buildTopicOptionsHtml(currentValue);
    }

    function syncUnlockFieldVisibility() {
      if (!editorEls.unlockType || !editorEls.unlockLevelWrap || !editorEls.unlockTopicWrap) return;

      var unlockType = editorEls.unlockType.value;
      var isLevel = unlockType === 'level';

      editorEls.unlockLevelWrap.style.display = isLevel ? 'flex' : 'none';
      editorEls.unlockTopicWrap.style.display = isLevel ? 'none' : 'flex';

      if (!editorEls.unlockTopicLabel) return;
      if (unlockType === 'topic_quiz') {
        editorEls.unlockTopicLabel.textContent = 'Chọn topic cần hoàn thành Quiz';
      } else if (unlockType === 'topic_matching') {
        editorEls.unlockTopicLabel.textContent = 'Chọn topic cần hoàn thành Matching';
      } else {
        editorEls.unlockTopicLabel.textContent = 'Chọn topic cần hoàn thành bài học';
      }
    }

    function updateEditorImagePreview() {
      if (!editorEls.imagePreview || !editorEls.image) return;
      editorEls.imagePreview.src = resolveAssetSrc(editorEls.image.value);
      editorEls.imagePreview.onerror = function () {
        this.src = 'https://api.dicebear.com/9.x/shapes/svg?seed=pm-preview';
      };
    }

    function updateSelectedImageFileLabel(fileName) {
      if (!editorEls.imageFileName) return;
      editorEls.imageFileName.textContent = fileName || 'Chưa chọn tệp';
    }

    function handleImageFileChange(event) {
      var input = event.target;
      var file = input && input.files && input.files[0] ? input.files[0] : null;

      if (!file) {
        updateSelectedImageFileLabel('');
        return;
      }

      var isAccepted = /^image\//i.test(file.type) || /\.(png|jpe?g|gif|webp|svg)$/i.test(file.name || '');
      if (!isAccepted) {
        if (typeof window.showNotification === 'function') {
          window.showNotification('Chỉ cho phép chọn file ảnh', 'error');
        } else {
          alert('Chỉ cho phép chọn file ảnh');
        }
        input.value = '';
        updateSelectedImageFileLabel('');
        return;
      }

      if (typeof window.showNotification === 'function') {
        window.showNotification('Đang tải ảnh lên...', 'info');
      }

      var reader = new FileReader();
      reader.onload = function (e) {
        var base64Data = e.target.result.split(',')[1];
        var mimeType = file.type;
        var fileName = file.name;

        if (window.google && google.script && google.script.run) {
          google.script.run
            .withSuccessHandler(function (result) {
              if (result.success) {
                if (editorEls.image) {
                  editorEls.image.value = result.imageUrl;
                }
                updateSelectedImageFileLabel(fileName);
                updateEditorImagePreview();
                if (typeof window.showNotification === 'function') {
                  window.showNotification('Tải ảnh lên thành công', 'success');
                }
              } else {
                if (typeof window.showNotification === 'function') {
                  window.showNotification('Lỗi khi tải ảnh: ' + result.message, 'error');
                }
              }
            })
            .withFailureHandler(function (err) {
              if (typeof window.showNotification === 'function') {
                window.showNotification('Lỗi tải ảnh lên Drive', 'error');
              }
            })
            .uploadImageToDrive(base64Data, fileName, mimeType);
        } else {
          // Fallback to base64 if not in Apps Script (local dev)
          if (editorEls.image) {
            editorEls.image.value = String(e.target.result || '');
          }
          updateSelectedImageFileLabel(fileName);
          updateEditorImagePreview();
        }
      };
      reader.onerror = function () {
        if (typeof window.showNotification === 'function') {
          window.showNotification('Không thể đọc file ảnh', 'error');
        } else {
          alert('Không thể đọc file ảnh');
        }
      };
      reader.readAsDataURL(file);
    }

    function fillEditorForm() {
      if (!state.editor.draft) return;

      var type = state.editor.type;
      var isNew = state.editor.isNew;
      var draft = state.editor.draft;
      var isFood = type === 'food';
      var isAccessory = type === 'accessories';
      var isBackground = type === 'backgrounds';
      var unlockMode = getUnlockConditionMode(draft.unlockCondition);
      var unlockConditions = unlockConditionToList(draft.unlockCondition);
      var primaryUnlock = unlockConditions[0] || { type: 'level', value: 1 };
      var extraUnlockConditions = unlockConditions.slice(1);

      if (editorEls.title) {
        if (isBackground) {
          editorEls.title.textContent = isNew ? 'Them Nen PET moi' : 'Chinh sua Nen PET';
        } else {
          editorEls.title.textContent = isNew
            ? (isFood ? 'Them Food moi' : 'Them Phu kien moi')
            : (isFood ? 'Chinh sua Food' : 'Chinh sua Phu kien');
        }
      }

      if (editorEls.name) editorEls.name.value = isNew ? '' : (draft.name || '');
      if (editorEls.image) editorEls.image.value = isNew ? '' : (draft.file || '');
      if (editorEls.imageFile) editorEls.imageFile.value = '';
      updateSelectedImageFileLabel(isNew ? '' : (draft.file ? String(draft.file).split('/').pop() : ''));
      if (editorEls.price) editorEls.price.value = isNew ? '' : String(draft.priceXqp || 0);
      if (editorEls.unlockType) {
        editorEls.unlockType.value = primaryUnlock.type || 'level';
      }
      if (editorEls.unlockMode) {
        editorEls.unlockMode.value = unlockMode;
      }
      if (editorEls.unlockLevel) {
        editorEls.unlockLevel.value = (isBackground || !isNew)
          ? String(primaryUnlock.value || 1)
          : '';
      }

      populateTopicOptions();
      if (editorEls.unlockTopic && primaryUnlock.type !== 'level') {
        editorEls.unlockTopic.value = String(primaryUnlock.value || '');
      }
      setUnlockExtraRows(
        editorEls.unlockExtraList,
        isBackground ? [] : extraUnlockConditions,
        { allowLevel: !isAccessory }
      );

      if (editorEls.foodXpWrap) editorEls.foodXpWrap.style.display = isFood ? 'flex' : 'none';
      if (editorEls.foodXp) editorEls.foodXp.value = isNew ? '' : String(draft.petXpGain || 0);

      if (isAccessory) {
        draft.positionProfiles = buildDefaultAccessoryProfiles(draft);
        draft.positionMode = normalizeAccessoryPositionMode(draft.positionMode || 'center');
        setActiveAccessoryProfileTab(draft.positionMode);
      }
      
      if (editorEls.deleteBtn) editorEls.deleteBtn.textContent = isNew ? 'Huy them moi' : 'Xoa item';

      updateAccessoryFieldVisibility();
      if (isBackground) {
        if (editorEls.unlockLevelWrap) editorEls.unlockLevelWrap.style.display = 'flex';
        if (editorEls.unlockTopicWrap) editorEls.unlockTopicWrap.style.display = 'none';
      } else {
        syncUnlockFieldVisibility();
      }
      updateEditorImagePreview();
      if (isAccessory) {
        updateAccessoryPreview();
      }
    }

    function openSidebar() {
      if (!editorEls.page || !editorEls.sidebar) return;
      editorEls.page.classList.add('pm-editor-open');
      editorEls.sidebar.setAttribute('aria-hidden', 'false');
    }

    function closePmEditor() {
      if (!editorEls.page || !editorEls.sidebar) return;
      editorEls.page.classList.remove('pm-editor-open');
      editorEls.sidebar.setAttribute('aria-hidden', 'true');
      state.editor = {
        type: null,
        index: -1,
        isNew: false,
        draft: null
      };
    }

    function generateNextItemId(type) {
      var items = getItemsByType(type);
      var maxNum = 0;
      items.forEach(function (item) {
        var matched = String(item.id || '').match(/(\d+)$/);
        if (!matched) return;
        var n = parseInt(matched[1], 10);
        if (!isNaN(n) && n > maxNum) maxNum = n;
      });

      var next = maxNum + 1;
      if (type === 'food') return 'food-' + next;
      if (type === 'backgrounds') return 'bg-' + next;
      return 'acc-' + (next < 10 ? '0' + next : String(next));
    }

    function startCreateNewItem(type) {
      var defaultId = generateNextItemId(type);
      var isFood = type === 'food';

      state.editor = {
        type: type,
        index: -1,
        isNew: true,
        draft: {
          id: defaultId,
          name: '',
          file: '',
          priceXqp: '',
          petXpGain: isFood ? '' : 0,
          offsetX: 0,
          offsetY: 0,
          scalePercent: 100,
          positionMode: 'center',
          positionProfiles: {
            left: { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 },
            center: { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 },
            right: { offsetX: 0, offsetY: 0, scalePercent: 100, rotDeg: 0 },
          },
          unlockCondition: { type: 'level', value: '' }
        }
      };

      if (type === 'backgrounds') {
        state.editor.draft.priceXqp = 0;
        state.editor.draft.unlockCondition = { type: 'level', value: 1 };
      }

      fillEditorForm();
      openSidebar();
    }

    function openPmEditor(type, index) {
      var items = getItemsByType(type);
      if (index < 0 || index >= items.length) return;

      closePmVariantEditor();

      state.editor = {
        type: type,
        index: index,
        isNew: false,
        draft: cloneItem(items[index])
      };

      fillEditorForm();
      openSidebar();
    }

    function parseNonNegative(value, fallback) {
      var n = parseInt(String(value || ''), 10);
      if (isNaN(n) || n < 0) return fallback;
      return n;
    }

    function getAccessoryCatalogItem(fileName) {
      if (!fileName) return null;
      var match = null;
      var i;

      for (i = 0; i < ACCESSORY_LIST.length; i++) {
        if (ACCESSORY_LIST[i].file === fileName) {
          match = ACCESSORY_LIST[i];
          break;
        }
      }

      return match;
    }

    function getAccessoryRule(fileName) {
      // Returns positioning rules for specific accessories
      // Each rule can have: forcedPosition, topOffset, scale
      var rules = {
        // Example: 'Accessories/accessory-01.svg': { forcedPosition: 'left', topOffset: 5, scale: 0.9 }
      };
      return rules[fileName] || { forcedPosition: null, topOffset: 0, scale: 1 };
    }

    function syncAccessoryOffsetHint() {
      if (!editorEls.accessoryOffsetHint || !state.editor.draft) return;
      var currentPosition = normalizeAccessoryPositionMode(state.editor.draft.positionMode || 'center');
      var currentProfile = getAccessoryProfileByPosition(state.editor.draft.positionProfiles, currentPosition);
      editorEls.accessoryOffsetHint.textContent = 'X: ' + currentProfile.offsetX + 'px · Y: ' + currentProfile.offsetY + 'px';
      if (editorEls.accessoryRotateValue) {
        editorEls.accessoryRotateValue.textContent = String(currentProfile.rotDeg || 0) + '°';
      }
      if (editorEls.accessoryActiveProfile) {
        editorEls.accessoryActiveProfile.textContent = 'Đang chỉnh: ' + getAccessoryPositionLabel(currentPosition);
      }
    }

    function setActiveAccessoryProfileTab(positionMode) {
      if (!state.editor.draft) return;

      var normalizedMode = normalizeAccessoryPositionMode(positionMode);
      state.editor.draft.positionMode = normalizedMode;

      if (editorEls.accessoryProfileTabs) {
        editorEls.accessoryProfileTabs.querySelectorAll('[data-accessory-pos]').forEach(function (tab) {
          var pos = tab.getAttribute('data-accessory-pos') || 'center';
          tab.classList.toggle('active', pos === normalizedMode);
        });
      }

      var activeProfile = getAccessoryProfileByPosition(state.editor.draft.positionProfiles, normalizedMode);
      if (editorEls.accessoryOffsetX) editorEls.accessoryOffsetX.value = String(activeProfile.offsetX);
      if (editorEls.accessoryOffsetY) editorEls.accessoryOffsetY.value = String(activeProfile.offsetY);
      if (editorEls.accessoryScaleValue) editorEls.accessoryScaleValue.textContent = String(activeProfile.scalePercent) + '%';
      if (editorEls.accessoryRotateValue) editorEls.accessoryRotateValue.textContent = String(activeProfile.rotDeg || 0) + '°';
      syncAccessoryOffsetHint();
      updateAccessoryPreview();
    }

    function nudgeAccessoryPosition(deltaX, deltaY) {
      if (!state.editor.draft) return;

      var currentPosition = normalizeAccessoryPositionMode(state.editor.draft.positionMode || 'center');
      var currentProfile = getAccessoryProfileByPosition(state.editor.draft.positionProfiles, currentPosition);
      currentProfile.offsetX += deltaX;
      currentProfile.offsetY += deltaY;
      state.editor.draft.positionProfiles[currentPosition] = currentProfile;

      if (editorEls.accessoryOffsetX) editorEls.accessoryOffsetX.value = String(currentProfile.offsetX);
      if (editorEls.accessoryOffsetY) editorEls.accessoryOffsetY.value = String(currentProfile.offsetY);
      syncAccessoryOffsetHint();
      updateAccessoryPreview();
    }

    function changeAccessoryRotation(step) {
      if (!state.editor.draft) return;

      var currentPosition = normalizeAccessoryPositionMode(state.editor.draft.positionMode || 'center');
      var currentProfile = getAccessoryProfileByPosition(state.editor.draft.positionProfiles, currentPosition);
      var nextRot = parseSignedInteger(currentProfile.rotDeg, 0) + step;
      nextRot = Math.max(-180, Math.min(180, nextRot));
      currentProfile.rotDeg = nextRot;
      state.editor.draft.positionProfiles[currentPosition] = currentProfile;
      state.editor.draft.rotDeg = nextRot;

      if (editorEls.accessoryRotateValue) {
        editorEls.accessoryRotateValue.textContent = String(nextRot) + '°';
      }

      updateAccessoryPreview();
    }

    function updateAccessoryPreview() {
      if (!editorEls.accessoryPreviewItem || !state.editor.draft) return;

      var draft = state.editor.draft;
      var fileName = draft.file || '';
      var previewSrc = resolveAssetSrc(fileName);
      var accessoryItem = getAccessoryCatalogItem(fileName);
      var accessoryRule = getAccessoryRule(fileName);
      var currentPosition = normalizeAccessoryPositionMode(draft.positionMode || 'center');
      var currentProfile = getAccessoryProfileByPosition(draft.positionProfiles, currentPosition);
      var previewPosition = accessoryRule.forcedPosition || currentPosition;
      var previewLeft = previewPosition === 'left' ? 42 : previewPosition === 'right' ? 58 : 50;
      var previewTop = 27 + (accessoryRule.topOffset || 0);

      if (editorEls.accessoryPreviewBase) {
        editorEls.accessoryPreviewBase.src = resolveAssetSrc((PET_VARIANT_LIST[0] && PET_VARIANT_LIST[0].level2) || (PET_VARIANT_LIST[0] && PET_VARIANT_LIST[0].level1) || '');
      }

      editorEls.accessoryPreviewItem.src = previewSrc;
      editorEls.accessoryPreviewItem.style.top = previewTop + '%';
      editorEls.accessoryPreviewItem.style.left = previewLeft + '%';
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-offset-x', currentProfile.offsetX + 'px');
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-offset-y', currentProfile.offsetY + 'px');
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-scale', (accessoryItem && accessoryItem.widthPercent ? accessoryItem.widthPercent + '%' : '34%'));
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-scale-factor', String((accessoryRule.scale || 1) * (currentProfile.scalePercent / 100)));
      editorEls.accessoryPreviewItem.style.setProperty('--pm-accessory-preview-rot', String(currentProfile.rotDeg || 0) + 'deg');
      syncAccessoryOffsetHint();
    }

    function syncAccessoryDraftFromForm() {
      if (!state.editor.draft) return;
      var currentPosition = normalizeAccessoryPositionMode(state.editor.draft.positionMode || 'center');
      var currentProfile = getAccessoryProfileByPosition(state.editor.draft.positionProfiles, currentPosition);
      currentProfile.offsetX = parseSignedInteger(editorEls.accessoryOffsetX ? editorEls.accessoryOffsetX.value : currentProfile.offsetX, currentProfile.offsetX);
      currentProfile.offsetY = parseSignedInteger(editorEls.accessoryOffsetY ? editorEls.accessoryOffsetY.value : currentProfile.offsetY, currentProfile.offsetY);
      currentProfile.scalePercent = Math.max(40, Math.min(220, parseNonNegative(currentProfile.scalePercent, 100)));
      state.editor.draft.positionProfiles[currentPosition] = currentProfile;
      state.editor.draft.offsetX = currentProfile.offsetX;
      state.editor.draft.offsetY = currentProfile.offsetY;
      state.editor.draft.scalePercent = currentProfile.scalePercent;
      state.editor.draft.rotDeg = currentProfile.rotDeg;
      updateAccessoryPreview();
    }

    function resetAccessoryProfilesToDefault() {
      if (!state.editor.draft || state.editor.type !== 'accessories') return;

      state.editor.draft.positionProfiles = buildZeroedAccessoryProfiles();
      state.editor.draft.positionMode = 'center';
      state.editor.draft.offsetX = 0;
      state.editor.draft.offsetY = 0;
      state.editor.draft.scalePercent = 100;
      state.editor.draft.rotDeg = 0;

      setActiveAccessoryProfileTab('center');
      updateAccessoryPreview();

      if (typeof window.showNotification === 'function') {
        window.showNotification('Da reset nhanh trai/giua/phai ve mac dinh', 'success');
      }
    }

    function setupLevelFileInputHandler(fileInputId, imageInputId, fileNameId, previewId) {
      var fileInput = document.getElementById(fileInputId);
      if (!fileInput) return;

      fileInput.addEventListener('change', function (event) {
        var file = event.target.files && event.target.files[0];
        if (!file) return;

        var fileName = file.name;
        var fileNameEl = document.getElementById(fileNameId);
        if (fileNameEl) fileNameEl.textContent = fileName;

        if (typeof window.showNotification === 'function') {
          window.showNotification('Đang tải ảnh lên...', 'info');
        }

        var reader = new FileReader();
        reader.onload = function (e) {
          var base64Data = e.target.result.split(',')[1];
          var mimeType = file.type;

          if (window.google && google.script && google.script.run) {
            google.script.run
              .withSuccessHandler(function (result) {
                if (result.success) {
                  var dataUrl = result.imageUrl;
                  if (imageInputId) {
                    var imageInput = document.getElementById(imageInputId);
                    if (imageInput) imageInput.value = dataUrl;
                  }
                  var previewEl = document.getElementById(previewId);
                  if (previewEl && previewEl.tagName === 'IMG') {
                    previewEl.src = dataUrl;
                  }
                  syncVariantDraftFromForm();
                  updateVariantPreview();
                  if (typeof window.showNotification === 'function') {
                    window.showNotification('Tải ảnh lên thành công', 'success');
                  }
                } else {
                  if (typeof window.showNotification === 'function') {
                    window.showNotification('Lỗi khi tải ảnh: ' + result.message, 'error');
                  }
                }
              })
              .withFailureHandler(function (err) {
                if (typeof window.showNotification === 'function') {
                  window.showNotification('Lỗi tải ảnh lên Drive', 'error');
                }
              })
              .uploadImageToDrive(base64Data, fileName, mimeType);
          } else {
            var dataUrl = e.target.result;
            if (imageInputId) {
              var imageInput = document.getElementById(imageInputId);
              if (imageInput) imageInput.value = dataUrl;
            }
            var previewEl = document.getElementById(previewId);
            if (previewEl && previewEl.tagName === 'IMG') {
              previewEl.src = dataUrl;
            }
            syncVariantDraftFromForm();
            updateVariantPreview();
          }
        };
        reader.readAsDataURL(file);
      });
    }

    function handleAccessoryScaleChange(step) {
      if (!state.editor.draft) return;
      var currentPosition = normalizeAccessoryPositionMode(state.editor.draft.positionMode || 'center');
      var currentProfile = getAccessoryProfileByPosition(state.editor.draft.positionProfiles, currentPosition);
      var currentScale = currentProfile.scalePercent || 100;
      var newScale = currentScale + step;
      newScale = Math.max(40, Math.min(220, newScale));
      currentProfile.scalePercent = newScale;
      state.editor.draft.positionProfiles[currentPosition] = currentProfile;
      state.editor.draft.scalePercent = newScale;
      if (editorEls.accessoryScaleValue) {
        editorEls.accessoryScaleValue.textContent = newScale + '%';
      }
      updateAccessoryPreview();
    }

    function updateAccessoryFieldVisibility() {
      var isAccessory = state.editor.type === 'accessories';
      if (editorEls.accessoryPositionWrap) {
        editorEls.accessoryPositionWrap.style.display = isAccessory ? 'flex' : 'none';
      }
      if (editorEls.accessoryScaleWrap) {
        editorEls.accessoryScaleWrap.style.display = isAccessory ? 'flex' : 'none';
      }
      if (editorEls.accessoryPreviewWrap) {
        editorEls.accessoryPreviewWrap.style.display = isAccessory ? 'flex' : 'none';
      }

      if (editorEls.unlockType && editorEls.unlockType.parentElement) {
        editorEls.unlockType.parentElement.style.display = state.editor.type === 'backgrounds' ? 'none' : 'flex';
      }
      if (editorEls.price && editorEls.price.parentElement) {
        editorEls.price.parentElement.style.display = state.editor.type === 'backgrounds' ? 'none' : 'flex';
      }
      if (editorEls.unlockExtraGroup) {
        editorEls.unlockExtraGroup.style.display = state.editor.type === 'backgrounds' ? 'none' : 'flex';
      }
      if (editorEls.unlockModeWrap) {
        editorEls.unlockModeWrap.style.display = state.editor.type === 'backgrounds' ? 'none' : 'flex';
      }
    }

    function handleSaveEditor() {
      if (!state.editor.draft || !state.editor.type) return;

      var type = state.editor.type;
      var index = state.editor.index;
      var isNew = state.editor.isNew;

      var name = editorEls.name ? editorEls.name.value.trim() : '';
      var file = editorEls.image ? editorEls.image.value.trim() : '';
      var priceXqp = parseNonNegative(editorEls.price ? editorEls.price.value : 0, 0);
      var unlockType = editorEls.unlockType ? editorEls.unlockType.value : 'level';
      var unlockMode = editorEls.unlockMode ? normalizeUnlockMode(editorEls.unlockMode.value) : 'all';
      var unlockValue;

      if (!name) {
        if (editorEls.name) editorEls.name.focus();
        return;
      }
      if (!file) {
        if (editorEls.image) editorEls.image.focus();
        return;
      }

      if (type === 'backgrounds') {
        unlockType = 'level';
        unlockValue = Math.max(1, parseNonNegative(editorEls.unlockLevel ? editorEls.unlockLevel.value : 1, 1));
      } else if (unlockType === 'level') {
        unlockValue = Math.max(1, parseNonNegative(editorEls.unlockLevel ? editorEls.unlockLevel.value : 1, 1));
      } else {
        unlockValue = editorEls.unlockTopic ? editorEls.unlockTopic.value : '';
      }

      var payload = cloneItem(state.editor.draft);
      payload.name = name;
      payload.file = file;
      payload.priceXqp = type === 'backgrounds' ? 0 : priceXqp;
      var unlockConditions = [{
        type: unlockType,
        value: unlockValue
      }];
      if (type !== 'backgrounds') {
        unlockConditions = unlockConditions.concat(
          collectUnlockExtraRows(editorEls.unlockExtraList, { allowLevel: type !== 'accessories' })
        );
      }
      payload.unlockCondition = unlockConditionFromList(unlockConditions, unlockMode);
      
      // Accessory position and scale
      if (type === 'accessories') {
        syncAccessoryDraftFromForm();
        payload.positionMode = normalizeAccessoryPositionMode(state.editor.draft.positionMode || 'center');
        payload.positionProfiles = cloneAccessoryProfiles(state.editor.draft.positionProfiles);
        var activeProfile = getAccessoryProfileByPosition(payload.positionProfiles, payload.positionMode);
        payload.offsetX = activeProfile.offsetX;
        payload.offsetY = activeProfile.offsetY;
        payload.scalePercent = activeProfile.scalePercent;
        payload.rotDeg = activeProfile.rotDeg;
      }

      if (type === 'food') {
        payload.petXpGain = parseNonNegative(editorEls.foodXp ? editorEls.foodXp.value : 0, 0);
      }

      var target = getItemsByType(type);
      if (isNew) {
        target.push(payload);
      } else if (index >= 0 && index < target.length) {
        target[index] = payload;
      }

      updateCounts();
      renderAllPmItems();
      // closePmEditor(); - Bỏ đóng sidebar khi lưu theo yêu cầu
      persistPetItemsToBackend(true);
    }

    function performDelete() {
      var type = state.editor.type;
      var index = state.editor.index;
      if (!type) return;

      if (state.editor.isNew) {
        closePmEditor();
        return;
      }

      var target = getItemsByType(type);
      if (index < 0 || index >= target.length) return;

      var deletedItem = target[index];
      var deletedName = deletedItem && deletedItem.name ? String(deletedItem.name) : 'item';
      target.splice(index, 1);
      updateCounts();
      renderAllPmItems();
      closePmEditor();
      persistPetItemsToBackend(false);

      if (typeof window.showNotification === 'function') {
        window.showNotification('Da xoa ' + deletedName, 'success');
      }
    }

    function handleDeleteItem() {
      requestDeleteConfirm('Ban chac chan muon xoa item nay?', {
        title: 'Xac nhan xoa',
        confirmText: 'Xoa',
        cancelText: 'Huy'
      }).then(function (ok) {
        if (ok) performDelete();
      });
    }

    function isClickSuppressed() {
      return Date.now() < suppressClickUntil;
    }

    function resetDragState() {
      dragState.active = false;
      dragState.listType = null;
      dragState.fromIndex = -1;
      dragState.dropIndex = -1;
      dragState.moved = false;
      dragState.cardEl = null;
    }

    function clearDropTargets() {
      document.querySelectorAll('.pm-item-card.pm-drop-target').forEach(function (el) {
        el.classList.remove('pm-drop-target');
      });
    }

    function moveArrayItemInPlace(items, fromIndex, toIndex) {
      if (!Array.isArray(items)) return;
      if (fromIndex < 0 || toIndex < 0 || fromIndex >= items.length || toIndex >= items.length) return;
      if (fromIndex === toIndex) return;

      var movedItem = items.splice(fromIndex, 1)[0];
      items.splice(toIndex, 0, movedItem);
    }

    function mapIndexAfterMove(index, fromIndex, toIndex) {
      if (index === fromIndex) return toIndex;
      if (fromIndex < toIndex && index > fromIndex && index <= toIndex) return index - 1;
      if (fromIndex > toIndex && index >= toIndex && index < fromIndex) return index + 1;
      return index;
    }

    function resolveCardListType(cardEl) {
      if (!cardEl) return '';
      if (cardEl.classList.contains('pm-variant-level-card')) return 'variants';
      if (cardEl.classList.contains('pm-data-card')) {
        return String(cardEl.getAttribute('data-item-type') || '');
      }
      return '';
    }

    function resolveCardSortIndex(cardEl) {
      if (!cardEl) return -1;
      var index = parseInt(cardEl.getAttribute('data-sort-index') || '-1', 10);
      return isNaN(index) ? -1 : index;
    }

    function queueReorderNotice(message, type, token) {
      if (token !== reorderNoticeToken) return;

      if (reorderNoticeTimerId) {
        clearTimeout(reorderNoticeTimerId);
      }

      reorderNoticeTimerId = setTimeout(function () {
        if (token !== reorderNoticeToken) return;
        if (typeof window.showNotification === 'function') {
          window.showNotification(message, type || 'success');
        }
        reorderNoticeTimerId = null;
      }, 650);
    }

    function applyListReorder(listType, fromIndex, toIndex) {
      if (fromIndex === toIndex) return false;

      var targetList = listType === 'variants' ? state.petVariants : getItemsByType(listType);
      if (!Array.isArray(targetList)) return false;
      if (fromIndex < 0 || toIndex < 0 || fromIndex >= targetList.length || toIndex >= targetList.length) {
        return false;
      }

      moveArrayItemInPlace(targetList, fromIndex, toIndex);

      if (state.editor && state.editor.type === listType && !state.editor.isNew && state.editor.index >= 0) {
        state.editor.index = mapIndexAfterMove(state.editor.index, fromIndex, toIndex);
      }
      if (listType === 'variants' && state.variantEditor && !state.variantEditor.isNew && state.variantEditor.index >= 0) {
        state.variantEditor.index = mapIndexAfterMove(state.variantEditor.index, fromIndex, toIndex);
      }

      updateCounts();
      renderAllPmItems();

      var currentToken = ++reorderNoticeToken;
      var onPersistSuccess = function (result) {
        if (result && result.success) {
          queueReorderNotice('Da luu thu tu', 'success', currentToken);
        } else {
          queueReorderNotice('Khong the luu thu tu', 'error', currentToken);
        }
      };
      var onPersistFailure = function () {
        queueReorderNotice('Khong the luu thu tu', 'error', currentToken);
      };

      if (listType === 'variants') {
        persistPetVariantsToBackend(false, {
          onSuccess: onPersistSuccess,
          onFailure: onPersistFailure,
        });
      } else {
        persistPetItemsToBackend(false, {
          onSuccess: onPersistSuccess,
          onFailure: onPersistFailure,
        });
      }

      return true;
    }

    function bindSortableGrid(gridEl, listType) {
      if (!gridEl) return;

      gridEl.addEventListener('dragstart', function (event) {
        var cardEl = event.target.closest('.pm-data-card, .pm-variant-level-card');
        if (!cardEl) return;

        var cardListType = resolveCardListType(cardEl);
        if (cardListType !== listType) return;

        var fromIndex = resolveCardSortIndex(cardEl);
        if (fromIndex < 0) return;

        dragState.active = true;
        dragState.listType = listType;
        dragState.fromIndex = fromIndex;
        dragState.dropIndex = fromIndex;
        dragState.moved = false;
        dragState.cardEl = cardEl;

        if (event.dataTransfer) {
          event.dataTransfer.effectAllowed = 'move';
          event.dataTransfer.setData('text/plain', String(fromIndex));
        }

        cardEl.classList.add('pm-dragging');
      });

      gridEl.addEventListener('dragover', function (event) {
        if (!dragState.active || dragState.listType !== listType) return;

        var cardEl = event.target.closest('.pm-data-card, .pm-variant-level-card');
        if (!cardEl) return;
        if (resolveCardListType(cardEl) !== listType) return;

        var dropIndex = resolveCardSortIndex(cardEl);
        if (dropIndex < 0) return;

        event.preventDefault();
        if (event.dataTransfer) {
          event.dataTransfer.dropEffect = 'move';
        }

        dragState.dropIndex = dropIndex;
        clearDropTargets();
        cardEl.classList.add('pm-drop-target');
      });

      gridEl.addEventListener('drop', function (event) {
        if (!dragState.active || dragState.listType !== listType) return;
        event.preventDefault();

        var applied = applyListReorder(listType, dragState.fromIndex, dragState.dropIndex);
        if (applied) {
          dragState.moved = true;
        }

        clearDropTargets();
      });

      gridEl.addEventListener('dragend', function () {
        if (dragState.cardEl) {
          dragState.cardEl.classList.remove('pm-dragging');
        }
        clearDropTargets();

        if (dragState.moved) {
          suppressClickUntil = Date.now() + 300;
        }

        resetDragState();
      });
    }

    function handleGridClick(event) {
      if (isClickSuppressed()) return;

      var addCard = event.target.closest('.pm-add-card');
      if (addCard) {
        var addType = addCard.getAttribute('data-item-type');
        if (addType) startCreateNewItem(addType);
        return;
      }

      var dataCard = event.target.closest('.pm-data-card');
      if (!dataCard) return;

      var type = dataCard.getAttribute('data-item-type');
      var index = parseInt(dataCard.getAttribute('data-item-index') || '-1', 10);
      if (!type || isNaN(index) || index < 0) return;

      openPmEditor(type, index);
    }

    function handleVariantGridClick(event) {
      if (isClickSuppressed()) return;

      var addCard = event.target.closest('[data-variant-add="1"]');
      if (addCard) {
        openPmVariantEditor(-1, true);
        return;
      }

      var variantCard = event.target.closest('[data-variant-index]');
      if (!variantCard) return;

      var index = parseInt(variantCard.getAttribute('data-variant-index') || '-1', 10);
      if (isNaN(index) || index < 0) return;
      var level = parseInt(variantCard.getAttribute('data-variant-level') || '1', 10);
      openPmVariantEditor(index, false, level === 2 ? 2 : 1);
    }

    function bindPmEvents() {
      if (eventsBound) return;

      var accessoriesGrid = document.getElementById('accessories-grid');
      var foodGrid = document.getElementById('food-grid');
      var backgroundsGrid = document.getElementById('backgrounds-grid');
      var variantGrid = document.getElementById('pet-variants-grid');

      if (accessoriesGrid) accessoriesGrid.addEventListener('click', handleGridClick);
      if (foodGrid) foodGrid.addEventListener('click', handleGridClick);
      if (backgroundsGrid) backgroundsGrid.addEventListener('click', handleGridClick);
      if (variantGrid) variantGrid.addEventListener('click', handleVariantGridClick);
      bindSortableGrid(accessoriesGrid, 'accessories');
      bindSortableGrid(foodGrid, 'food');
      bindSortableGrid(backgroundsGrid, 'backgrounds');
      bindSortableGrid(variantGrid, 'variants');

      if (editorEls.unlockType) editorEls.unlockType.addEventListener('change', syncUnlockFieldVisibility);
      if (editorEls.unlockMode) {
        editorEls.unlockMode.addEventListener('change', function () {
          // Item editor reads unlock mode on save; this keeps UI behavior consistent.
        });
      }
      if (editorEls.addUnlockConditionBtn && editorEls.unlockExtraList) {
        editorEls.addUnlockConditionBtn.addEventListener('click', function () {
          var isAccessoryEditing = state.editor && state.editor.type === 'accessories';
          var defaultCondition = isAccessoryEditing
            ? { type: 'topic', value: '' }
            : { type: 'level', value: 1 };
          editorEls.unlockExtraList.appendChild(
            createUnlockExtraRow(defaultCondition, { allowLevel: !isAccessoryEditing })
          );
        });
      }
      if (editorEls.unlockExtraList) {
        editorEls.unlockExtraList.addEventListener('click', function (event) {
          var removeBtn = event.target.closest('.pm-unlock-extra-remove');
          if (!removeBtn) return;
          var rowEl = removeBtn.closest('.pm-unlock-extra-row');
          if (rowEl) rowEl.remove();
        });
      }
      if (editorEls.image) editorEls.image.addEventListener('input', updateEditorImagePreview);
      if (editorEls.imageFile) editorEls.imageFile.addEventListener('change', handleImageFileChange);
      if (editorEls.accessoryProfileTabs) {
        editorEls.accessoryProfileTabs.querySelectorAll('[data-accessory-pos]').forEach(function (tab) {
          tab.addEventListener('click', function () {
            setActiveAccessoryProfileTab(this.getAttribute('data-accessory-pos') || 'center');
          });
        });
      }
      if (editorEls.accessoryResetProfilesBtn) {
        editorEls.accessoryResetProfilesBtn.addEventListener('click', resetAccessoryProfilesToDefault);
      }
      if (editorEls.accessoryOffsetX) editorEls.accessoryOffsetX.addEventListener('input', function () {
        syncAccessoryDraftFromForm();
      });
      if (editorEls.accessoryOffsetY) editorEls.accessoryOffsetY.addEventListener('input', function () {
        syncAccessoryDraftFromForm();
      });
      if (editorEls.accessoryNudgeUp) {
        editorEls.accessoryNudgeUp.addEventListener('click', function () { nudgeAccessoryPosition(0, -4); });
      }
      if (editorEls.accessoryNudgeDown) {
        editorEls.accessoryNudgeDown.addEventListener('click', function () { nudgeAccessoryPosition(0, 4); });
      }
      if (editorEls.accessoryNudgeLeft) {
        editorEls.accessoryNudgeLeft.addEventListener('click', function () { nudgeAccessoryPosition(-4, 0); });
      }
      if (editorEls.accessoryNudgeRight) {
        editorEls.accessoryNudgeRight.addEventListener('click', function () { nudgeAccessoryPosition(4, 0); });
      }
      if (editorEls.accessoryRotateLeft) {
        editorEls.accessoryRotateLeft.addEventListener('click', function () { changeAccessoryRotation(-5); });
      }
      if (editorEls.accessoryRotateRight) {
        editorEls.accessoryRotateRight.addEventListener('click', function () { changeAccessoryRotation(5); });
      }
      if (editorEls.saveBtn) editorEls.saveBtn.addEventListener('click', handleSaveEditor);
      if (editorEls.deleteBtn) editorEls.deleteBtn.addEventListener('click', handleDeleteItem);

      // Accessory scale buttons
      if (editorEls.accessoryScaleDown) {
        editorEls.accessoryScaleDown.addEventListener('click', function () {
          handleAccessoryScaleChange(-5);
          updateAccessoryPreview();
        });
      }
      if (editorEls.accessoryScaleUp) {
        editorEls.accessoryScaleUp.addEventListener('click', function () {
          handleAccessoryScaleChange(5);
          updateAccessoryPreview();
        });
      }

      // Level editor toggles in right sidebar
      if (editorEls.variantEditLevelTabs) {
        editorEls.variantEditLevelTabs.querySelectorAll('[data-edit-level]').forEach(function (tab) {
          tab.addEventListener('click', function () {
            var level = parseInt(this.getAttribute('data-edit-level') || '1', 10);
            setVariantEditLevel(level, true);
          });
        });
      }

      // File upload handlers for level images
      setupLevelFileInputHandler('pm-variant-level1-file', 'pm-variant-level1', 'pm-level1-file-name', 'pm-variant-level1-preview');
      setupLevelFileInputHandler('pm-variant-level2-file', 'pm-variant-level2', 'pm-level2-file-name', 'pm-variant-level2-preview');

      if (editorEls.variantUnlockType) editorEls.variantUnlockType.addEventListener('change', function () {
        normalizeVariantUnlockFieldVisibility();
        syncVariantDraftFromForm();
      });
      if (editorEls.variantUnlockMode) {
        editorEls.variantUnlockMode.addEventListener('change', syncVariantDraftFromForm);
      }
      if (editorEls.addVariantUnlockConditionBtn && editorEls.variantUnlockExtraList) {
        editorEls.addVariantUnlockConditionBtn.addEventListener('click', function () {
          editorEls.variantUnlockExtraList.appendChild(createUnlockExtraRow({ type: 'level', value: 1 }));
          syncVariantDraftFromForm();
        });
      }
      if (editorEls.variantUnlockExtraList) {
        editorEls.variantUnlockExtraList.addEventListener('click', function (event) {
          var removeBtn = event.target.closest('.pm-unlock-extra-remove');
          if (!removeBtn) return;
          var rowEl = removeBtn.closest('.pm-unlock-extra-row');
          if (rowEl) rowEl.remove();
          syncVariantDraftFromForm();
        });
        editorEls.variantUnlockExtraList.addEventListener('change', syncVariantDraftFromForm);
        editorEls.variantUnlockExtraList.addEventListener('input', syncVariantDraftFromForm);
      }
      if (editorEls.variantUnlockTopic) editorEls.variantUnlockTopic.addEventListener('change', syncVariantDraftFromForm);
      if (editorEls.variantUnlockLevel) editorEls.variantUnlockLevel.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantName) editorEls.variantName.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantDescription) editorEls.variantDescription.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantSecondPrice) editorEls.variantSecondPrice.addEventListener('input', syncVariantDraftFromForm);
      if (editorEls.variantLevel1) editorEls.variantLevel1.addEventListener('input', function () {
        syncVariantDraftFromForm();
        if (state.variantEditor.previewLevel === 1) updateVariantPreview();
      });
      if (editorEls.variantLevel2) editorEls.variantLevel2.addEventListener('input', function () {
        syncVariantDraftFromForm();
        if (state.variantEditor.previewLevel === 2) updateVariantPreview();
      });
      if (editorEls.variantSizeDown) editorEls.variantSizeDown.addEventListener('click', function () {
        changeVariantScale(-5);
      });
      if (editorEls.variantSizeUp) editorEls.variantSizeUp.addEventListener('click', function () {
        changeVariantScale(5);
      });
      if (editorEls.variantSaveBtn) editorEls.variantSaveBtn.addEventListener('click', handleSaveVariantEditor);
      if (editorEls.variantDeleteBtn) editorEls.variantDeleteBtn.addEventListener('click', handleDeleteVariantEditor);
      if (editorEls.variantPreviewBox) {
        editorEls.variantPreviewBox.querySelectorAll('.pm-preview-toggle').forEach(function (btn) {
          btn.addEventListener('click', function () {
            if (!state.variantEditor.draft) return;
            var targetLevel = parseInt(this.getAttribute('data-preview-level') || '1', 10) === 2 ? 2 : 1;
            setVariantEditLevel(targetLevel, true);
          });
        });
      }

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          closePmEditor();
          closePmVariantEditor();
        }
      });

      eventsBound = true;
    }

    function loadTopicsForConditions() {
      if (!(window.google && google.script && google.script.run)) {
        populateTopicOptions();
        syncVariantTopicOptions();
        return;
      }

      google.script.run
        .withSuccessHandler(function (topics) {
          var parsed = (topics || []).map(function (topic) {
            var id = String(topic.topicId || topic.id || '').trim();
            var label = String(topic.title || topic.topicName || id).trim();
            if (!id) return null;
            return { id: id, label: label || id };
          }).filter(function (item) {
            return !!item;
          });

          if (parsed.length > 0) state.topics = parsed;
          populateTopicOptions();
          syncVariantTopicOptions();
          refreshUnlockExtraTopicOptions();
        })
        .withFailureHandler(function () {
          populateTopicOptions();
          syncVariantTopicOptions();
          refreshUnlockExtraTopicOptions();
        })
        .getAllTopicsForAdmin();
    }

    function autoInitPetManagement() {
      var root = document.querySelector('.pet-management-page');
      if (!root) return;
      if (!state.initialized && typeof window.initPetManagement === 'function') {
        window.initPetManagement();
      }
    }

    window.initPetManagement = function () {
      initializeStateIfNeeded();
      ensureVariantFallbackState();
      cacheEditorElements();
      bindPmEvents();
      loadTopicsForConditions();
      updateCounts();
      renderAllPmItems();
      loadPetItemsFromBackend();
      closePmEditor();
      closePmVariantEditor();
      window.togglePmSegment('accessories');
      state.initialized = true;
    };

    window.togglePmSegment = function (segmentId) {
      var segments = document.querySelectorAll('.pm-segment');
      var targetSegment = document.getElementById('segment-' + segmentId);
      if (!targetSegment) return;

      var isOpening = !targetSegment.classList.contains('active');
      segments.forEach(function (s) {
        s.classList.remove('active');
      });
      if (isOpening) targetSegment.classList.add('active');
    };

    window.closePmEditor = closePmEditor;
    window.closePmVariantEditor = closePmVariantEditor;

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', autoInitPetManagement);
    } else {
      setTimeout(autoInitPetManagement, 0);
    }
  })();
</script>
