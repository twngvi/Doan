<style>
  .pet-management-page {
    padding: 2.5rem;
    max-width: 1200px;
    margin: 0 auto;
    color: var(--theme-text);
  }

  /* Header Section */
  .pm-header {
    margin-bottom: 2.5rem;
  }

  .pm-header-content {
    display: flex;
    align-items: center;
    gap: 1.5rem;
  }

  .pm-header-icon {
    width: 64px;
    height: 64px;
    background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
    border-radius: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 10px 20px rgba(26, 115, 232, 0.2);
  }

  .pm-header-icon span {
    font-size: 32px;
    color: white;
  }

  .pm-title {
    font-size: 2.25rem;
    font-weight: 800;
    margin: 0;
    background: linear-gradient(135deg, var(--theme-text) 0%, var(--theme-text-secondary) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .pm-subtitle {
    margin: 0.25rem 0 0;
    color: var(--theme-text-muted);
    font-size: 1rem;
  }

  /* Accordion Container */
  .pm-accordion {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  .pm-segment {
    background: var(--theme-surface-glass, rgba(255, 255, 255, 0.05));
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid var(--theme-border-subtle, rgba(255, 255, 255, 0.1));
    border-radius: 24px;
    overflow: hidden;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .pm-segment:hover {
    border-color: var(--theme-primary-alpha, rgba(26, 115, 232, 0.3));
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  }

  .pm-segment.active {
    background: var(--theme-surface-active, rgba(26, 115, 232, 0.05));
    border-color: var(--theme-primary, #1a73e8);
  }

  /* Segment Header */
  .pm-segment-header {
    width: 100%;
    padding: 1.5rem 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    transition: background 0.2s ease;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .icon-main {
    font-size: 1.75rem;
    color: var(--theme-primary, #1a73e8);
  }

  .header-label {
    font-size: 1.25rem;
    font-weight: 700;
  }

  .header-count {
    padding: 0.2rem 0.75rem;
    background: var(--theme-surface-lighter, rgba(0, 0, 0, 0.05));
    border-radius: 10px;
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--theme-text-muted);
  }

  .icon-chevron {
    transition: transform 0.3s ease;
    color: var(--theme-text-muted);
  }

  .pm-segment.active .icon-chevron {
    transform: rotate(180deg);
    color: var(--theme-primary, #1a73e8);
  }

  /* Segment Content */
  .pm-segment-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .pm-segment.active .pm-segment-content {
    max-height: 2000px; /* Adjust as needed */
    padding: 0 2rem 2rem;
  }

  /* Items Grid */
  .pm-items-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(73px, 1fr));
    gap: 0.65rem;
    padding-top: 1rem;
  }

  /* Item Card */
  .pm-item-card {
    background: var(--theme-surface, rgba(255, 255, 255, 0.05));
    border: 1px solid var(--theme-border-thin, rgba(255, 255, 255, 0.05));
    border-radius: 4px;
    padding: 0.52rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.4rem;
    transition: all 0.2s ease;
    position: relative;
    cursor: pointer;
  }

  .pm-item-card:hover {
    transform: translateY(-2px);
    background: var(--theme-surface-hover, rgba(255, 255, 255, 0.1));
    border-color: var(--theme-primary-alpha, rgba(26, 115, 232, 0.2));
  }

  .pm-item-image-box {
    width: 100%;
    aspect-ratio: 1;
    background: rgba(0,0,0,0.05);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  .pm-item-image-box img {
    max-width: 80%;
    max-height: 80%;
    object-fit: contain;
    transition: transform 0.3s ease;
  }

  .pm-item-card:hover .pm-item-image-box img {
    transform: scale(1.1);
  }

  .pm-item-name {
    font-size: 0.68rem;
    font-weight: 600;
    text-align: center;
    color: var(--theme-text-secondary);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }

  .pm-item-badge {
    position: absolute;
    top: 0.25rem;
    right: 0.25rem;
    width: 5px;
    height: 5px;
    background: var(--theme-success, #22c55e);
    border-radius: 50%;
    box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
  }

  .pm-add-card {
    justify-content: center;
    cursor: pointer;
    color: var(--theme-primary, #1a73e8);
    font-size: 1.45rem;
    font-weight: 700;
    line-height: 1;
  }

  .pm-add-card:focus-visible {
    outline: 2px solid var(--theme-primary, #1a73e8);
    outline-offset: 1px;
  }

  .pm-editor-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(5, 15, 30, 0.45);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
    z-index: 999;
  }

  .pm-editor-sidebar {
    position: fixed;
    top: 0;
    right: 0;
    width: min(420px, 94vw);
    height: 100vh;
    background: var(--theme-surface, #ffffff);
    border-left: 1px solid var(--theme-border-subtle, rgba(0, 0, 0, 0.08));
    box-shadow: -16px 0 30px rgba(0, 0, 0, 0.18);
    transform: translateX(100%);
    transition: transform 0.25s ease;
    z-index: 1000;
    display: flex;
    flex-direction: column;
  }

  .pet-management-page.pm-editor-open .pm-editor-backdrop {
    opacity: 1;
    pointer-events: auto;
  }

  .pet-management-page.pm-editor-open .pm-editor-sidebar {
    transform: translateX(0);
  }

  .pm-editor-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.1rem;
    border-bottom: 1px solid var(--theme-border-thin, rgba(0, 0, 0, 0.08));
  }

  .pm-editor-header h2 {
    margin: 0;
    font-size: 1.1rem;
  }

  .pm-editor-close {
    border: none;
    background: transparent;
    font-size: 1.6rem;
    line-height: 1;
    cursor: pointer;
    color: var(--theme-text-muted, #666);
  }

  .pm-editor-body {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.1rem;
    display: flex;
    flex-direction: column;
    gap: 0.95rem;
  }

  .pm-form-group {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .pm-form-group label {
    font-size: 0.82rem;
    font-weight: 600;
    color: var(--theme-text-secondary);
  }

  .pm-form-group input,
  .pm-form-group select {
    width: 100%;
    border: 1px solid var(--theme-border-subtle, rgba(0, 0, 0, 0.14));
    border-radius: 4px;
    padding: 0.62rem 0.65rem;
    font-size: 0.88rem;
    color: var(--theme-text);
    background: var(--theme-surface-lighter, rgba(255, 255, 255, 0.9));
  }

  .pm-image-preview-box {
    width: 100%;
    min-height: 120px;
    border: 1px dashed var(--theme-border-subtle, rgba(0, 0, 0, 0.2));
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.03);
    overflow: hidden;
  }

  .pm-image-preview-box img {
    max-width: 92%;
    max-height: 140px;
    object-fit: contain;
  }

  .pm-editor-footer {
    display: flex;
    justify-content: space-between;
    gap: 0.6rem;
    padding: 1rem 1.1rem;
    border-top: 1px solid var(--theme-border-thin, rgba(0, 0, 0, 0.08));
  }

  .pm-btn {
    border: none;
    border-radius: 4px;
    padding: 0.66rem 0.85rem;
    font-weight: 700;
    cursor: pointer;
  }

  .pm-btn-primary {
    background: var(--theme-primary, #1a73e8);
    color: #fff;
    flex: 1;
  }

  .pm-btn-danger {
    background: rgba(220, 38, 38, 0.1);
    color: #dc2626;
    border: 1px solid rgba(220, 38, 38, 0.25);
  }

  /* Responsive Adjustments */
  @media (max-width: 768px) {
    .pet-management-page {
      padding: 1.5rem;
    }
    .pm-title {
      font-size: 1.75rem;
    }

    .pm-editor-sidebar {
      width: 100vw;
    }
  }
</style>
