<!-- Admin Sidebar Scripts -->
<script>
  // ========================================
  // ADMIN SIDEBAR CONTROLLER
  // ========================================

  // State
  let isAdminSidebarCollapsed = false;
  let isMobileView = window.innerWidth <= 768;
  const ADMIN_SEARCH_LIMIT = 20;
  let adminUserSearchList = [];
  let adminUserEntries = [];
  let adminSearchResultsCache = [];
  let adminSearchActiveIndex = -1;
  const ADMIN_LAST_PAGE_KEY = 'adminLastActivePage';

  const adminStaticSearchEntries = [
    {
      id: 'admin-page-online-stats',
      group: 'pages',
      title: 'Tổng quan',
      subtitle: 'Xem số liệu online tổng hợp',
      tag: 'Trang',
      tagClass: 'tag-page',
      keywords: 'tong quan overview dashboard online dang online user nguoi dung',
      action: { type: 'page', pageId: 'page-online-stats' },
    },
    {
      id: 'admin-page-content-management',
      group: 'pages',
      title: 'Quản lý Nội dung',
      subtitle: 'Quản lý bài học, chủ đề và nội dung',
      tag: 'Trang',
      tagClass: 'tag-page',
      keywords: 'quan ly noi dung content bai hoc lesson topic tao moi them create',
      action: { type: 'page', pageId: 'page-content-management' },
    },
    {
      id: 'admin-page-quiz-management',
      group: 'pages',
      title: 'Thống kê khóa học',
      subtitle: 'Theo dõi thống kê và tiến độ khóa học',
      tag: 'Trang',
      tagClass: 'tag-page',
      keywords: 'thong ke khoa hoc course stats course analytics lesson stats',
      action: { type: 'page', pageId: 'page-quiz-management' },
    },
    {
      id: 'admin-page-user-stats',
      group: 'pages',
      title: 'Thống kê người dùng',
      subtitle: 'Phân tích dữ liệu người dùng',
      tag: 'Trang',
      tagClass: 'tag-page',
      keywords: 'thong ke thong ke nguoi dung user stats analytics nguoi dung',
      action: { type: 'page', pageId: 'page-user-stats' },
    },
    {
      id: 'admin-page-pet-management',
      group: 'pages',
      title: 'Quản lý PET',
      subtitle: 'Quản lý thông tin và dữ liệu PET',
      tag: 'Trang',
      tagClass: 'tag-page',
      keywords: 'quan ly pet pet management thu cung',
      action: { type: 'page', pageId: 'page-pet-management' },
    },
  ];

  const adminSearchGroupLabels = {
    pages: 'Trang',
    users: 'Người dùng',
  };

  // Initialize Admin Sidebar
  function initAdminSidebar() {
    setupAdminSidebarEvents();
    loadAdminSidebarState();
    updateOnlineCount();
    startOnlineCountUpdater();
  }

  // Setup Event Listeners
  function setupAdminSidebarEvents() {
    // Toggle Button
    const toggleBtn = document.getElementById('adminSidebarToggleBtn');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', toggleAdminSidebar);
    }

    // Navigation Items
    document.querySelectorAll('.admin-sidebar .nav-item').forEach(item => {
      item.addEventListener('click', (e) => {
        e.preventDefault();
        const page = item.dataset.page;
        if (page) {
          showAdminPage(page);
          setActiveNavItem(item);
          
          // Close mobile sidebar
          if (isMobileView) {
            closeAdminMobileSidebar();
          }
        }
      });
    });

    // Logout Button
    const logoutBtn = document.getElementById('adminLogoutBtn');
    if (logoutBtn) {
      logoutBtn.addEventListener('click', showAdminLogoutModal);
    }

    // Logout Modal
    const logoutConfirmBtn = document.getElementById('adminLogoutConfirmBtn');
    const logoutCancelBtn = document.getElementById('adminLogoutCancelBtn');
    const logoutOverlay = document.getElementById('adminLogoutModalOverlay');

    if (logoutConfirmBtn) {
      logoutConfirmBtn.addEventListener('click', handleAdminLogout);
    }

    if (logoutCancelBtn) {
      logoutCancelBtn.addEventListener('click', hideAdminLogoutModal);
    }

    if (logoutOverlay) {
      logoutOverlay.addEventListener('click', (e) => {
        if (e.target === logoutOverlay) {
          hideAdminLogoutModal();
        }
      });
    }

    // Back to User Button
    const backBtn = document.getElementById('backToUserBtn');
    if (backBtn) {
      backBtn.addEventListener('click', (e) => {
        e.preventDefault();
        navigateToUserSite();
      });
    }

    // Mobile Overlay
    const overlay = document.getElementById('adminSidebarOverlay');
    if (overlay) {
      overlay.addEventListener('click', closeAdminMobileSidebar);
    }

    // Search
    setupAdminSearch();

    // Window Resize
    window.addEventListener('resize', handleAdminResize);

    // Keyboard Shortcuts
    document.addEventListener('keydown', handleAdminKeyboard);
  }

  // Toggle Sidebar
  function toggleAdminSidebar() {
    const sidebar = document.getElementById('adminSidebar');
    if (!sidebar) return;

    isAdminSidebarCollapsed = !isAdminSidebarCollapsed;
    sidebar.classList.toggle('collapsed', isAdminSidebarCollapsed);
    document.body.classList.toggle('admin-sidebar-collapsed', isAdminSidebarCollapsed);

    // Save state
    localStorage.setItem('adminSidebarCollapsed', isAdminSidebarCollapsed);
  }

  // Load Sidebar State
  function loadAdminSidebarState() {
    const saved = localStorage.getItem('adminSidebarCollapsed');
    const sidebar = document.getElementById('adminSidebar');

    if (saved === 'true') {
      isAdminSidebarCollapsed = true;
      if (sidebar) {
        sidebar.classList.add('collapsed');
      }
      document.body.classList.add('admin-sidebar-collapsed');
    } else {
      isAdminSidebarCollapsed = false;
      if (sidebar) {
        sidebar.classList.remove('collapsed');
      }
      document.body.classList.remove('admin-sidebar-collapsed');
    }
  }

  // Set Active Navigation Item
  function setActiveNavItem(activeItem) {
    document.querySelectorAll('.admin-sidebar .nav-item').forEach(item => {
      item.classList.remove('active');
    });
    activeItem.classList.add('active');
  }

  // Show Admin Page
  function showAdminPage(pageId) {
    // Hide only admin sub-pages (avoid hiding global app pages like #page-admin)
    document.querySelectorAll('#admin-panel .admin-page').forEach(page => {
      page.style.display = 'none';
    });

    // Show selected page
    const targetPage = document.getElementById(pageId);
    if (targetPage) {
      targetPage.style.display = 'block';

      // User stats is loaded dynamically to avoid raw template directives rendering as text.
      if (pageId === 'page-user-stats') {
        inituserstats();
      } else {
        // Trigger page-specific init if exists
        const initFn = window[`init${pageId.replace('page-', '').replace(/-/g, '')}`];
        if (typeof initFn === 'function') {
          initFn();
        }
      }
    }

    // Update URL hash
    window.location.hash = pageId;
    if (targetPage) {
      localStorage.setItem(ADMIN_LAST_PAGE_KEY, pageId);
    }
  }

  // Logout Modal
  function showAdminLogoutModal() {
    const modal = document.getElementById('adminLogoutModalOverlay');
    if (modal) {
      modal.classList.add('show');
    }
  }

  function hideAdminLogoutModal() {
    const modal = document.getElementById('adminLogoutModalOverlay');
    if (modal) {
      modal.classList.remove('show');
    }
  }

  function handleAdminLogout() {
    // Clear session/token
    window.currentUser = null;
    localStorage.removeItem('currentUser');
    localStorage.removeItem('adminToken');
    localStorage.removeItem('userSession');
    localStorage.removeItem('isLoggedIn');
    localStorage.removeItem('userId');
    localStorage.removeItem('lastActivePage');
    localStorage.removeItem(ADMIN_LAST_PAGE_KEY);
    localStorage.removeItem('authToken');
    sessionStorage.removeItem('authPanelOpen');
    sessionStorage.removeItem('authFormType');
    
    // Remove admin sidebar classes
    document.body.classList.remove('has-admin-sidebar');
    document.body.classList.remove('admin-sidebar-collapsed');
    
    // Reset landing CTA if available
    if (typeof resetLandingCTA === 'function') {
      resetLandingCTA();
    }
    
    // Navigate to landing page
    if (typeof showPage === 'function') {
      showPage('page-landing');
    } else {
      // Reload current page without parameters
      var baseUrl = window.location.href.split('?')[0];
      window.location.href = baseUrl;
    }
  }

  // Navigate to User Site
  function navigateToUserSite() {
    // Remove admin sidebar classes
    document.body.classList.remove('has-admin-sidebar');
    document.body.classList.remove('admin-sidebar-collapsed');
    
    // Show dashboard page
    if (typeof showPage === 'function') {
      showPage('page-dashboard');
    } else {
      var baseUrl = window.location.href.split('?')[0];
      window.location.href = baseUrl;
    }
  }
  function openAdminMobileSidebar() {
    const sidebar = document.getElementById('adminSidebar');
    const overlay = document.getElementById('adminSidebarOverlay');
    
    if (sidebar) sidebar.classList.add('mobile-open');
    if (overlay) overlay.classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeAdminMobileSidebar() {
    const sidebar = document.getElementById('adminSidebar');
    const overlay = document.getElementById('adminSidebarOverlay');
    
    if (sidebar) sidebar.classList.remove('mobile-open');
    if (overlay) overlay.classList.remove('show');
    document.body.style.overflow = '';
  }

  // Handle Resize
  function handleAdminResize() {
    const wasMobile = isMobileView;
    isMobileView = window.innerWidth <= 768;

    if (wasMobile && !isMobileView) {
      closeAdminMobileSidebar();
    }
  }

  // Keyboard Shortcuts
  function handleAdminKeyboard(e) {
    // Ctrl/Cmd + B to toggle sidebar
    if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
      e.preventDefault();
      toggleAdminSidebar();
    }

    // Escape to close modal
    if (e.key === 'Escape') {
      hideAdminLogoutModal();
      if (isMobileView) {
        closeAdminMobileSidebar();
      }
    }

    // Ctrl/Cmd + K to focus search
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      const searchInput = document.getElementById('adminSearchInput');
      if (searchInput) {
        searchInput.focus();
      }
    }
  }

  // Admin Search
  function setupAdminSearch() {
    const searchInput = document.getElementById('adminSearchInput');
    const searchResults = document.getElementById('adminSearchResults');
    const searchBox = document.getElementById('adminSearchBox');
    const sidebar = document.getElementById('adminSidebar');

    if (!searchInput || !searchResults || !searchBox || !sidebar) return;

    fetchAdminUsersForSearch();

    searchBox.addEventListener('click', () => {
      if (isAdminSidebarCollapsed) {
        toggleAdminSidebar();
        setTimeout(() => searchInput.focus(), 300);
      }
    });

    searchInput.addEventListener('input', (e) => {
      runAdminSearch(e.target.value || '');
    });

    searchInput.addEventListener('focus', () => {
      if (searchInput.value && searchInput.value.trim()) {
        runAdminSearch(searchInput.value);
      }
    });

    searchInput.addEventListener('keydown', (e) => {
      if (!adminSearchResultsCache.length) {
        if (e.key === 'Escape') {
          clearAdminSearchResults();
          searchInput.blur();
        }
        return;
      }

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        adminSearchActiveIndex = Math.min(
          adminSearchActiveIndex + 1,
          adminSearchResultsCache.length - 1,
        );
        updateAdminSearchActiveResult();
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        adminSearchActiveIndex = Math.max(adminSearchActiveIndex - 1, 0);
        updateAdminSearchActiveResult();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const selected =
          adminSearchActiveIndex >= 0
            ? adminSearchResultsCache[adminSearchActiveIndex]
            : adminSearchResultsCache[0];
        if (navigateWithAdminSearchResult(selected)) {
          searchInput.value = '';
          clearAdminSearchResults();
        }
      } else if (e.key === 'Escape') {
        clearAdminSearchResults();
        searchInput.blur();
      }
    });

    searchResults.addEventListener('click', (e) => {
      const item = e.target.closest('.sidebar-search-result-item');
      if (!item) return;

      const index = Number(item.getAttribute('data-result-index'));
      if (Number.isNaN(index) || !adminSearchResultsCache[index]) return;

      if (navigateWithAdminSearchResult(adminSearchResultsCache[index])) {
        searchInput.value = '';
        clearAdminSearchResults();
      }
    });

    // Close on outside click
    document.addEventListener('click', (e) => {
      if (!sidebar.contains(e.target)) {
        clearAdminSearchResults();
      }
    });

    window.addEventListener('admin-user-stats-cache-updated', () => {
      fetchAdminUsersForSearch();
    });
  }

  function normalizeAdminSearchText(value) {
    return String(value || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .trim();
  }

  function scoreAdminPrefixMatch(text, normalizedQuery, baseScore) {
    if (!normalizedQuery) return -1;

    const normalizedText = normalizeAdminSearchText(text);
    if (!normalizedText) return -1;

    if (normalizedText.startsWith(normalizedQuery)) return baseScore + 20;

    const words = normalizedText.split(/[^a-z0-9]+/).filter(Boolean);
    if (words.some((word) => word.startsWith(normalizedQuery))) {
      return baseScore;
    }

    return -1;
  }

  function escapeAdminSearchHtml(text) {
    return String(text || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function normalizeAdminUserSearchList(users) {
    return (users || [])
      .map((user) => {
        const id = String(user && (user.id || user.userId || user.email) || '').trim();
        const email = String(user && user.email || '').trim();
        const name = String(user && (user.name || user.displayName || email || id) || '').trim();

        if (!id) return null;
        return { id, name, email };
      })
      .filter(Boolean);
  }

  function rerunAdminSearchIfInputHasValue() {
    const input = document.getElementById('adminSearchInput');
    if (input && input.value && input.value.trim()) {
      runAdminSearch(input.value);
    }
  }

  function setUsersForAdminSearch(users) {
    adminUserSearchList = normalizeAdminUserSearchList(users);
    adminUserEntries = buildAdminUserEntries(adminUserSearchList);
    rerunAdminSearchIfInputHasValue();
  }

  function buildAdminUserEntries(users) {
    const entries = [];

    (users || []).forEach((user) => {
      const userId = String(user.id || '').trim();
      if (!userId) return;
      const userName = String(user.name || user.email || userId).trim();
      const userEmail = String(user.email || '').trim();

      entries.push({
        id: `admin-user-${userId}`,
        group: 'users',
        title: userName,
        subtitle: userEmail ? `User - ${userEmail}` : `User ID - ${userId}`,
        tag: 'User',
        tagClass: 'tag-user',
        keywords: `user nguoi dung thong ke user stats ${userId} ${userName} ${userEmail}`,
        action: {
          type: 'user',
          pageId: 'page-user-stats',
          user: {
            id: userId,
            name: userName,
            email: userEmail,
          },
        },
      });
    });

    return entries;
  }

  function fetchAdminUsersForSearch() {
    if (
      Array.isArray(window.__adminUserStatsSearchCache) &&
      window.__adminUserStatsSearchCache.length
    ) {
      setUsersForAdminSearch(window.__adminUserStatsSearchCache);
      return;
    }

    if (typeof callAppsScript === 'function') {
      callAppsScript('getAdminUserLearningStats')
        .then((result) => {
          const users =
            result && result.success && Array.isArray(result.data)
              ? result.data
              : (Array.isArray(result) ? result : []);
          setUsersForAdminSearch(users);
        })
        .catch(() => {
          adminUserSearchList = [];
          adminUserEntries = [];
        });
      return;
    }

    if (
      typeof google === 'undefined' ||
      !google.script ||
      !google.script.run
    ) {
      return;
    }

    google.script.run
      .withSuccessHandler((response) => {
        let users = [];
        if (response && response.success && Array.isArray(response.data)) {
          users = response.data;
        } else if (Array.isArray(response)) {
          users = response;
        }
        setUsersForAdminSearch(users);
      })
      .withFailureHandler(() => {
        adminUserSearchList = [];
        adminUserEntries = [];
      })
      .getAdminUserLearningStats();
  }

  function buildAdminSearchEntries() {
    return adminStaticSearchEntries.concat(adminUserEntries);
  }

  function scoreAdminSearchEntry(entry, normalizedQuery) {
    if (!normalizedQuery) return -1;

    return Math.max(
      scoreAdminPrefixMatch(entry.title, normalizedQuery, 120),
      scoreAdminPrefixMatch(entry.keywords, normalizedQuery, 90),
      scoreAdminPrefixMatch(entry.subtitle, normalizedQuery, 60),
    );
  }

  function clearAdminSearchResults() {
    const searchResults = document.getElementById('adminSearchResults');
    if (!searchResults) return;
    searchResults.classList.remove('open');
    searchResults.innerHTML = '';
    adminSearchResultsCache = [];
    adminSearchActiveIndex = -1;
  }

  function updateAdminSearchActiveResult() {
    const resultEls = document.querySelectorAll(
      '#adminSearchResults .sidebar-search-result-item',
    );
    resultEls.forEach((el) => el.classList.remove('active'));

    if (
      adminSearchActiveIndex < 0 ||
      adminSearchActiveIndex >= adminSearchResultsCache.length
    ) {
      return;
    }

    const activeEl = document.querySelector(
      `#adminSearchResults .sidebar-search-result-item[data-result-index="${adminSearchActiveIndex}"]`,
    );
    if (activeEl) {
      activeEl.classList.add('active');
      activeEl.scrollIntoView({ block: 'nearest' });
    }
  }

  function activateAdminNavByPageId(pageId) {
    const navItem = document.querySelector(
      `.admin-sidebar .nav-item[data-page="${pageId}"]`,
    );
    if (navItem) {
      setActiveNavItem(navItem);
    }
  }

  function applyAdminUserStatsTarget(target) {
    if (!target) return;
    window.__adminUserStatsSearchTarget = target;

    let attemptCount = 0;
    const maxAttempts = 30;
    const tryApply = () => {
      if (!window.__adminUserStatsSearchTarget) return;
      if (typeof window.selectUserStatsUser === 'function') {
        const didSelect = window.selectUserStatsUser(
          window.__adminUserStatsSearchTarget,
        );
        if (didSelect) {
          window.__adminUserStatsSearchTarget = null;
          return;
        }
      }

      attemptCount += 1;
      if (attemptCount < maxAttempts) {
        setTimeout(tryApply, 120);
      }
    };
    setTimeout(tryApply, 80);
  }

  function navigateWithAdminSearchResult(result) {
    if (!result) return false;

    const action = result.action;
    if (!action || typeof action !== 'object') return false;

    if (action.type === 'page') {
      showAdminPage(action.pageId);
      activateAdminNavByPageId(action.pageId);
      return true;
    }

    if (action.type === 'user') {
      showAdminPage(action.pageId);
      activateAdminNavByPageId(action.pageId);
      applyAdminUserStatsTarget(action.user || {});
      return true;
    }

    return false;
  }

  function groupAdminSearchResults(results) {
    const grouped = {
      pages: [],
      users: [],
    };

    (results || []).forEach((entry) => {
      if (grouped[entry.group]) {
        grouped[entry.group].push(entry);
      }
    });

    return grouped;
  }

  function indexAdminSearchMap(results, id) {
    return results.findIndex((entry) => entry.id === id);
  }

  function renderAdminSearchResults(results) {
    const searchResults = document.getElementById('adminSearchResults');
    if (!searchResults) return;

    if (results.length === 0) {
      searchResults.innerHTML =
        '<div class="sidebar-search-empty">Không có kết quả phù hợp</div>';
    } else {
      const grouped = groupAdminSearchResults(results);
      const order = ['pages', 'users'];
      const html = [];

      order.forEach((groupKey) => {
        const items = grouped[groupKey];
        if (!items || items.length === 0) return;

        html.push(
          `<div class="sidebar-search-group"><div class="sidebar-search-group-label">${adminSearchGroupLabels[groupKey]}</div>`,
        );
        items.forEach((item) => {
          const resultIndex = indexAdminSearchMap(results, item.id);

          html.push(`
            <button class="sidebar-search-result-item" data-result-index="${resultIndex}">
              <div class="sidebar-search-result-main">
                <div class="sidebar-search-result-title">${escapeAdminSearchHtml(item.title)}</div>
                <div class="sidebar-search-result-subtitle">${escapeAdminSearchHtml(item.subtitle)}</div>
              </div>
              <div class="sidebar-search-result-side">
                <span class="sidebar-search-result-tag ${item.tagClass}">${item.tag}</span>
              </div>
            </button>
          `);
        });
        html.push('</div>');
      });

      searchResults.innerHTML = html.join('');
    }

    searchResults.classList.add('open');
  }

  function runAdminSearch(query) {
    const normalizedQuery = normalizeAdminSearchText(query);
    if (!normalizedQuery || normalizedQuery.length < 2) {
      clearAdminSearchResults();
      return;
    }

    adminSearchResultsCache = buildAdminSearchEntries()
      .map((entry) => ({
        entry: entry,
        score: scoreAdminSearchEntry(entry, normalizedQuery),
      }))
      .filter((item) => item.score >= 0)
      .sort((a, b) => b.score - a.score)
      .slice(0, ADMIN_SEARCH_LIMIT)
      .map((item) => item.entry);

    adminSearchActiveIndex = -1;
    renderAdminSearchResults(adminSearchResultsCache);
  }

  // Online Count Updater
  function updateOnlineCount() {
    const badge = document.getElementById('onlineCountBadge');
    if (!badge) return;

    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      return;
    }

    google.script.run
      .withSuccessHandler((result) => {
        if (!result || !result.success || !result.data) return;
        const count = Number(result.data.totalOnline || 0);
        badge.textContent = count;
      })
      .withFailureHandler((error) => {
        console.error('Failed to update online badge:', error);
      })
      .getAdminOnlineUsersData();
  }

  function startOnlineCountUpdater() {
    // Update every 30 seconds
    setInterval(updateOnlineCount, 30000);
  }

  // Update Admin Info
  function updateAdminInfo(adminData) {
    const avatar = document.getElementById('admin-avatar');
    const username = document.getElementById('admin-username');

    if (avatar && adminData.avatar) {
      avatar.src = adminData.avatar;
    }

    if (username && adminData.name) {
      username.textContent = adminData.name;
    }
  }

  // Initialize on DOM Ready
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', initAdminSidebar);
  } else {
    initAdminSidebar();
  }

  // Handle hash navigation on load
  window.addEventListener('load', () => {
    const hash = window.location.hash.slice(1);
    const storedPage = localStorage.getItem(ADMIN_LAST_PAGE_KEY);
    const targetPage = (hash && hash.startsWith('page-'))
      ? hash
      : (storedPage && storedPage.startsWith('page-') ? storedPage : 'page-online-stats');

    if (targetPage) {
      showAdminPage(targetPage);

      // Set active nav item
      const navItem = document.querySelector(`.admin-sidebar .nav-item[data-page="${targetPage}"]`);
      if (navItem) {
        setActiveNavItem(navItem);
      }
    }
  });

  // ========================================
  // TOPIC EDITOR DYNAMIC LOADER
  // ========================================

  let topicEditorLoaded = false;

  function inittopiceditor() {
    if (topicEditorLoaded) {
      // Check if we need to enter edit mode first
      if (typeof initEditMode === 'function') {
        initEditMode();
      } else {
        // Fallback or if edit mode not applicable
        const editor = document.getElementById('contentEditor');
        if (editor) editor.focus();
      }
      return;
    }

    loadTopicEditorContent();
  }

  function loadTopicEditorContent() {
    const container = document.getElementById('topic-editor-container');
    if (!container) return;

    // Check if google.script.run is available
    if (typeof google === 'undefined' || !google.script || !google.script.run) {
      container.innerHTML = '<div style="padding:40px;text-align:center;color:#d93025;">Lỗi: Không thể kết nối với server</div>';
      return;
    }

    google.script.run
      .withSuccessHandler(function(html) {
        container.innerHTML = html;
        topicEditorLoaded = true;

        // Execute scripts that were inserted via innerHTML
        // (scripts inserted via innerHTML are not executed automatically)
        executeScriptsInContainer(container);

        // Initialize editor after content is loaded
        setTimeout(function() {
          if (typeof initializeTopicEditor === 'function') {
            initializeTopicEditor();
          } else {
            // Fallback: init editor elements directly
            initTopicEditorFallback();
          }
        }, 100);
      })
      .withFailureHandler(function(error) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:#d93025;">Lỗi tải Topic Editor: ' + error.message + '</div>';
      })
      .getTopicEditorFullHtml();
  }

  /**
   * Execute scripts inside a container
   * Scripts inserted via innerHTML are not executed by default
   */
  function executeScriptsInContainer(container) {
    const scripts = container.querySelectorAll('script');
    scripts.forEach(function(oldScript) {
      const newScript = document.createElement('script');

      // Copy attributes
      Array.from(oldScript.attributes).forEach(function(attr) {
        newScript.setAttribute(attr.name, attr.value);
      });

      // Copy inline script content
      newScript.textContent = oldScript.textContent;

      // Replace old script with new one (this will execute it)
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  function initTopicEditorFallback() {
    const editor = document.getElementById('contentEditor');
    if (editor) {
      editor.focus();

      // Handle paste - clean up pasted content
      editor.addEventListener('paste', function(e) {
        e.preventDefault();
        const text = e.clipboardData.getData('text/plain');
        document.execCommand('insertText', false, text);
      });
    }

    // Setup drag and drop for images
    const uploadZone = document.getElementById('imageUploadZone');
    if (uploadZone) {
      uploadZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        this.classList.add('dragover');
      });

      uploadZone.addEventListener('dragleave', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');
      });

      uploadZone.addEventListener('drop', function(e) {
        e.preventDefault();
        this.classList.remove('dragover');

        const files = e.dataTransfer.files;
        if (files.length > 0 && files[0].type.startsWith('image/')) {
          if (typeof handleImageUpload === 'function') {
            handleImageUpload(files[0]);
          }
        }
      });
    }
  }
