<!-- Admin Global Sidebar - Fixed for all admin pages -->
<aside class="admin-sidebar" id="adminSidebar">
  <div class="sidebar-header">
    <div class="logo">
      <img id="adminSidebarLogo"
           src="https://cdn.jsdelivr.net/gh/twngvi/Doan@main/Image/landing/LOGO.svg"
           alt="Terracode"
           style="max-width: 100%; height: auto; cursor: pointer;"
           onclick="if(typeof showAdminPage === 'function') showAdminPage('page-online-stats')" />
    </div>
  </div>

  <!-- Search Box -->
  <div class="sidebar-search-wrapper">
    <div class="sidebar-search-item" id="adminSearchBox">
      <span class="search-icon material-symbols-sharp">search</span>
      <input
        type="text"
        class="sidebar-search-input"
        id="adminSearchInput"
        placeholder="Tìm kiếm..."
        autocomplete="off"
      />
    </div>
    <div class="sidebar-search-results" id="adminSearchResults" aria-live="polite"></div>
  </div>

  <nav class="sidebar-nav">
    <!-- Online Statistics -->
    <a href="#" class="nav-item" data-page="page-online-stats">
      <span class="nav-icon material-symbols-sharp">group</span>
      <span class="nav-label">Tổng quan</span>
      <span class="nav-badge online-badge" id="onlineCountBadge">0</span>
    </a>

    <!-- Content Management -->
    <a href="#" class="nav-item" data-page="page-content-management">
      <span class="nav-icon material-symbols-sharp">library_books</span>
      <span class="nav-label">Quản lý Nội dung</span>
    </a>

    <!-- Course Statistics -->
    <a href="#" class="nav-item" data-page="page-quiz-management">
      <span class="nav-icon material-symbols-sharp">manage_accounts</span>
      <span class="nav-label">Thống kê khóa học</span>
    </a>

    <!-- User Statistics -->
    <a href="#" class="nav-item" data-page="page-user-stats">
      <span class="nav-icon material-symbols-sharp">bar_chart</span>
      <span class="nav-label">Thống kê người dùng</span>
    </a>

    <!-- Pet Management -->
    <a href="#" class="nav-item" data-page="page-pet-management">
      <span class="nav-icon material-symbols-sharp">pets</span>
      <span class="nav-label">Quản lý PET</span>
    </a>

  </nav>

  <!-- Toggle Button -->
  <button class="sidebar-toggle-btn" id="adminSidebarToggleBtn" title="Thu gọn/Mở rộng sidebar">
    <span class="toggle-icon material-symbols-sharp">keyboard_double_arrow_left</span>
  </button>

  <div class="sidebar-footer">
    <!-- Admin Avatar -->
    <div class="sidebar-user-profile" id="adminUserProfile" title="Hồ sơ Admin">
      <img
        src="https://api.dicebear.com/9.x/bottts/svg?seed=Admin"
        alt="Admin"
        class="sidebar-avatar"
        id="admin-avatar"
      />
      <div class="sidebar-user-info">
        <span class="sidebar-username" id="admin-username">Admin</span>
        <span class="sidebar-role">Quản trị viên</span>
      </div>
    </div>

    <!-- Logout Button -->
    <button class="sidebar-logout-btn" id="adminLogoutBtn" title="Đăng xuất">
      <span class="logout-icon material-symbols-sharp">logout</span>
      <span class="logout-label">Đăng xuất</span>
    </button>
  </div>
</aside>

<!-- Admin Logout Confirmation Modal -->
<div class="logout-modal-overlay" id="adminLogoutModalOverlay">
  <div class="logout-modal">
    <div class="logout-modal-icon">
      <span class="material-symbols-sharp">logout</span>
    </div>
    <h3 class="logout-modal-title">Xác nhận đăng xuất</h3>
    <p class="logout-modal-text">Bạn có chắc chắn muốn đăng xuất khỏi trang quản trị?</p>
    <div class="logout-modal-buttons">
      <button class="btn-cancel" id="adminLogoutCancelBtn">Hủy</button>
      <button class="btn-confirm" id="adminLogoutConfirmBtn">Đăng xuất</button>
    </div>
  </div>
</div>

<!-- Mobile Overlay -->
<div class="sidebar-overlay" id="adminSidebarOverlay"></div>
