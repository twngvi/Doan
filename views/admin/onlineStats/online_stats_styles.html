<!-- Online Statistics Page Styles -->
<style>
  /* ========================================
     BASE & BACKGROUND EFFECTS
     ======================================== */
  #page-online-stats {
    min-height: 100vh;
    position: relative;
    overflow-x: hidden;
    padding: 0;
    margin: 0;
    background: var(--theme-dashboard-bg);
    background-attachment: fixed;
  }

  .online-stats-page {
    position: relative;
    min-height: 100vh;
    padding: 0;
    margin: 0;
    background: var(--theme-dashboard-bg);
    background-attachment: fixed;
  }

  /* Galaxy Stars Effect */
  .online-stats-page::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      radial-gradient(2px 2px at 20% 30%, rgba(255, 255, 255, 0.5), transparent),
      radial-gradient(2px 2px at 40% 70%, rgba(147, 197, 253, 0.4), transparent),
      radial-gradient(1.5px 1.5px at 60% 20%, rgba(255, 255, 255, 0.6), transparent),
      radial-gradient(2px 2px at 80% 50%, rgba(196, 181, 253, 0.4), transparent),
      radial-gradient(1px 1px at 10% 80%, rgba(255, 255, 255, 0.3), transparent),
      radial-gradient(1.5px 1.5px at 90% 10%, rgba(147, 197, 253, 0.5), transparent),
      radial-gradient(1px 1px at 30% 90%, rgba(255, 255, 255, 0.25), transparent),
      radial-gradient(1.5px 1.5px at 70% 40%, rgba(196, 181, 253, 0.35), transparent);
    background-size: 350px 250px;
    pointer-events: none;
    z-index: 0;
    animation: onlineStatsTwinkle 6s ease-in-out infinite;
  }

  @keyframes onlineStatsTwinkle {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* Animated Background Orbs */
  .online-stats-bg-effects {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  .online-stats-gradient-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.3;
    animation: onlineStatsOrbFloat 20s ease-in-out infinite;
  }

  .online-stats-gradient-orb.orb-1 {
    width: 400px;
    height: 400px;
    background: var(--theme-gradient);
    top: -100px;
    right: -100px;
    animation-delay: 0s;
  }

  .online-stats-gradient-orb.orb-2 {
    width: 300px;
    height: 300px;
    background: var(--theme-gradient-accent);
    bottom: 20%;
    left: -80px;
    animation-delay: -7s;
  }

  .online-stats-gradient-orb.orb-3 {
    width: 250px;
    height: 250px;
    background: linear-gradient(135deg, var(--theme-primary) 0%, var(--theme-secondary) 100%);
    bottom: -50px;
    right: 20%;
    animation-delay: -14s;
  }

  @keyframes onlineStatsOrbFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    25% { transform: translate(30px, -30px) scale(1.05); }
    50% { transform: translate(-20px, 20px) scale(0.95); }
    75% { transform: translate(40px, 10px) scale(1.02); }
  }

  /* ========================================
     METEOR SHOWER EFFECT
     ======================================== */
  .online-stats-meteor-container {
    position: fixed;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
    z-index: 1;
  }

  .online-stats-meteor {
    position: absolute;
    width: 2px;
    height: 120px;
    background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.3), rgba(255, 255, 255, 0.8));
    border-radius: 50%;
    transform: rotate(-45deg);
    opacity: 0;
    animation: onlineStatsMeteorFall 1.5s ease-in forwards;
  }

  .online-stats-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -2px;
    width: 6px;
    height: 6px;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 50%;
    box-shadow: 0 0 12px 4px rgba(255, 255, 255, 0.7), 0 0 30px 8px rgba(147, 197, 253, 0.5);
  }

  @keyframes onlineStatsMeteorFall {
    0% {
      opacity: 1;
      transform: rotate(-45deg) translateY(-150px);
    }
    70% { opacity: 1; }
    100% {
      opacity: 0;
      transform: rotate(-45deg) translateY(calc(100vh + 200px));
    }
  }

  /* ========================================
     CONTAINER
     ======================================== */
  .online-stats-container {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
  }

  /* ========================================
     HEADER SECTION
     ======================================== */
  .online-stats-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.5rem 2rem;
    background: var(--theme-card);
    border-radius: 16px;
    border: 1px solid var(--theme-card-border);
    backdrop-filter: blur(10px);
    animation: fadeSlideIn 0.5s ease-out;
  }

  .header-content {
    display: flex;
    align-items: center;
    gap: 1.25rem;
  }

  .header-icon {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
  }

  .header-icon.gradient-blue {
    background: var(--theme-gradient);
    box-shadow: 0 4px 20px var(--theme-primary-alpha30);
  }

  .header-text {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .page-title {
    font-size: 1.75rem;
    font-weight: 800;
    color: var(--theme-text);
    margin: 0;
  }

  .page-subtitle {
    font-size: 0.95rem;
    color: var(--theme-text-secondary);
    margin: 0;
  }

  .header-stats {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .stat-badge {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1.25rem;
    background: var(--theme-surface);
    border-radius: 12px;
    border: 1px solid var(--theme-border-light);
  }

  .stat-badge.online .stat-dot {
    width: 10px;
    height: 10px;
    background: #22c55e;
    border-radius: 50%;
    animation: pulseOnline 2s ease-in-out infinite;
  }

  @keyframes pulseOnline {
    0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
    50% { box-shadow: 0 0 0 8px rgba(34, 197, 94, 0); }
  }

  .stat-number {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--theme-text);
  }

  .stat-label {
    font-size: 0.875rem;
    color: var(--theme-text-muted);
  }

  /* ========================================
     STATS CARDS ROW
     ======================================== */
  .stats-cards-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1rem;
  }

  .stat-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1.25rem 1.5rem;
    background: var(--theme-card);
    border-radius: 14px;
    border: 1px solid var(--theme-card-border);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
    animation: fadeSlideIn 0.5s ease-out backwards;
  }

  .stat-card:nth-child(1) { animation-delay: 0.1s; }
  .stat-card:nth-child(2) { animation-delay: 0.2s; }
  .stat-card:nth-child(3) { animation-delay: 0.3s; }

  .stat-card:hover {
    transform: translateY(-3px);
    border-color: var(--theme-primary);
    box-shadow: 0 8px 25px var(--theme-shadow);
  }

  .stat-card-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    flex-shrink: 0;
  }

  .stat-card-icon.gradient-green {
    background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
  }

  .stat-card-icon.gradient-yellow {
    background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
    box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3);
  }

  .stat-card-icon.gradient-purple {
    background: linear-gradient(135deg, #a855f7 0%, #7c3aed 100%);
    box-shadow: 0 4px 15px rgba(168, 85, 247, 0.3);
  }

  .stat-card-icon.gradient-red {
    background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
    box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
  }

  .stat-card-content {
    display: flex;
    flex-direction: column;
    gap: 0.25rem;
  }

  .stat-card-value {
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--theme-text);
  }

  .stat-card-label {
    font-size: 0.875rem;
    color: var(--theme-text-muted);
  }

  /* ========================================
     SEARCH & FILTER SECTION
     ======================================== */
  .search-filter-section {
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 1rem 1.5rem;
    background: var(--theme-card);
    border-radius: 14px;
    border: 1px solid var(--theme-card-border);
    backdrop-filter: blur(10px);
  }

  .search-box {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex: 1;
    min-width: 250px;
    padding: 0.75rem 1rem;
    background: var(--theme-surface);
    border-radius: 10px;
    border: 1px solid var(--theme-border-light);
    transition: all 0.3s ease;
  }

  .search-box:focus-within {
    border-color: var(--theme-primary);
    box-shadow: 0 0 0 3px var(--theme-primary-alpha20);
  }

  .search-box svg {
    color: var(--theme-text-muted);
    flex-shrink: 0;
  }

  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-size: 0.95rem;
    color: var(--theme-text);
  }

  .search-input::placeholder {
    color: var(--theme-text-muted);
  }

  .filter-buttons {
    display: flex;
    gap: 0.5rem;
  }

  .filter-btn {
    padding: 0.6rem 1.25rem;
    background: var(--theme-surface);
    border: 1px solid var(--theme-border-light);
    border-radius: 8px;
    color: var(--theme-text-secondary);
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .filter-btn:hover {
    background: var(--theme-hover);
    border-color: var(--theme-primary);
  }

  .filter-btn.active {
    background: var(--theme-gradient);
    border-color: transparent;
    color: white;
  }

  .refresh-btn {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.6rem 1.25rem;
    background: var(--theme-gradient);
    border: none;
    border-radius: 8px;
    color: white;
    font-size: 0.875rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .refresh-btn:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 15px var(--theme-primary-alpha30);
  }

  .refresh-btn svg {
    transition: transform 0.5s ease;
  }

  .refresh-btn:hover svg {
    transform: rotate(180deg);
  }

  /* ========================================
     ONLINE USERS SECTION
     ======================================== */
  .online-users-section {
    background: var(--theme-card);
    border-radius: 16px;
    border: 1px solid var(--theme-card-border);
    backdrop-filter: blur(10px);
    overflow: hidden;
  }

  .section-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 1.5rem;
    border-bottom: 1px solid var(--theme-border-light);
  }

  .section-title {
    font-size: 1.25rem;
    font-weight: 700;
    color: var(--theme-text);
    margin: 0;
  }

  .section-count {
    font-size: 0.875rem;
    color: var(--theme-text-muted);
    background: var(--theme-surface);
    padding: 0.4rem 0.75rem;
    border-radius: 6px;
  }

  .online-users-list {
    padding: 1.5rem;
  }

  /* Loading State */
  .loading-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    gap: 1rem;
  }

  .loading-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--theme-border-light);
    border-top-color: var(--theme-primary);
    border-radius: 50%;
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  .loading-state p {
    color: var(--theme-text-muted);
    margin: 0;
  }

  .ai-usage-section {
    padding: 1rem 1.25rem 1.25rem;
  }

  .ai-usage-actions {
    display: flex;
    align-items: center;
    gap: 0.6rem;
  }

  .ai-usage-select {
    min-width: 110px;
    border: 1px solid var(--theme-border-light);
    border-radius: 8px;
    padding: 0.5rem 0.7rem;
    background: var(--theme-surface);
  }

  .ai-usage-summary-row {
    margin-top: 0.75rem;
    margin-bottom: 0.75rem;
  }

  .ai-usage-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 1rem;
  }

  .ai-usage-panel {
    background: var(--theme-surface);
    border: 1px solid var(--theme-border-light);
    border-radius: 12px;
    padding: 0.9rem;
  }

  .ai-usage-panel h3 {
    margin: 0 0 0.6rem;
    font-size: 0.95rem;
    color: var(--theme-text);
  }

  .ai-usage-list {
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
    max-height: 260px;
    overflow: auto;
  }

  .ai-usage-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 0.75rem;
    padding: 0.55rem 0.65rem;
    border-radius: 8px;
    background: var(--theme-card);
    border: 1px solid var(--theme-card-border);
    font-size: 0.84rem;
    color: var(--theme-text-secondary);
  }

  .ai-usage-item strong {
    color: var(--theme-text);
    font-weight: 600;
  }

  .ai-usage-errors {
    margin-top: 1rem;
  }

  .ai-error-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    max-height: 300px;
    overflow: auto;
  }

  .ai-error-item {
    border: 1px solid rgba(239, 68, 68, 0.25);
    border-radius: 8px;
    padding: 0.6rem 0.7rem;
    background: rgba(239, 68, 68, 0.08);
    color: var(--theme-text);
    font-size: 0.83rem;
  }

  .ai-error-meta {
    color: var(--theme-text-secondary);
    margin-top: 0.2rem;
    font-size: 0.78rem;
  }

  /* Empty State */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 3rem;
    gap: 1rem;
  }

  .empty-state svg {
    color: var(--theme-text-muted);
    opacity: 0.5;
  }

  .empty-state p {
    color: var(--theme-text-muted);
    margin: 0;
    font-size: 1rem;
  }

  /* Users Grid */
  .users-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1rem;
  }

  /* User Card */
  .user-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.25rem;
    background: var(--theme-surface);
    border-radius: 12px;
    border: 1px solid var(--theme-border-light);
    transition: all 0.3s ease;
    cursor: pointer;
  }

  .user-card:hover {
    transform: translateY(-2px);
    border-color: var(--theme-primary);
    background: var(--theme-hover);
  }

  .user-avatar {
    position: relative;
    flex-shrink: 0;
  }

  .user-avatar img {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--theme-border);
  }

  .user-avatar .status-indicator {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 2px solid var(--theme-surface);
  }

  .user-avatar .status-indicator.active {
    background: #22c55e;
  }

  .user-avatar .status-indicator.idle {
    background: #fbbf24;
  }

  .user-avatar .status-indicator.offline {
    background: #94a3b8;
  }

  .user-avatar .status-indicator.disabled {
    background: #ef4444;
  }

  .user-info {
    flex: 1;
    min-width: 0;
  }

  .user-name {
    font-size: 1rem;
    font-weight: 600;
    color: var(--theme-text);
    margin: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .user-meta {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    margin-top: 0.25rem;
  }

  .user-activity {
    font-size: 0.8rem;
    color: var(--theme-text-muted);
  }

  .user-time {
    font-size: 0.75rem;
    color: var(--theme-text-muted);
    opacity: 0.8;
  }

  .user-actions {
    display: flex;
    gap: 0.5rem;
  }

  .user-action-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--theme-card);
    border: 1px solid var(--theme-border-light);
    color: var(--theme-text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .user-action-btn:hover {
    background: var(--theme-primary);
    border-color: var(--theme-primary);
    color: white;
  }

  /* ========================================
     ACTIVITY TIMELINE SECTION
     ======================================== */
  .activity-timeline-section {
    background: var(--theme-card);
    border-radius: 16px;
    border: 1px solid var(--theme-card-border);
    backdrop-filter: blur(10px);
    overflow: hidden;
  }

  .view-all-btn {
    padding: 0.5rem 1rem;
    background: transparent;
    border: 1px solid var(--theme-border-light);
    border-radius: 8px;
    color: var(--theme-text-secondary);
    font-size: 0.875rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .view-all-btn:hover {
    background: var(--theme-hover);
    border-color: var(--theme-primary);
    color: var(--theme-primary);
  }

  .timeline-container {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* Timeline Item */
  .timeline-item {
    display: flex;
    align-items: flex-start;
    gap: 1rem;
    padding: 1rem 0;
    border-bottom: 1px solid var(--theme-border-light);
    transition: background 0.3s ease;
  }

  .timeline-item:last-child {
    border-bottom: none;
  }

  .timeline-item:hover {
    background: var(--theme-surface);
    margin: 0 -1.5rem;
    padding-left: 1.5rem;
    padding-right: 1.5rem;
  }

  .timeline-icon {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .timeline-icon.login {
    background: rgba(34, 197, 94, 0.15);
    color: #22c55e;
  }

  .timeline-icon.logout {
    background: rgba(239, 68, 68, 0.15);
    color: #ef4444;
  }

  .timeline-icon.activity {
    background: rgba(147, 197, 253, 0.15);
    color: #93c5fd;
  }

  .timeline-content {
    flex: 1;
  }

  .timeline-text {
    font-size: 0.95rem;
    color: var(--theme-text);
    margin: 0;
  }

  .timeline-text strong {
    font-weight: 600;
    color: var(--theme-text);
  }

  .timeline-time {
    font-size: 0.8rem;
    color: var(--theme-text-muted);
    margin-top: 0.25rem;
  }

  /* ========================================
     ANIMATIONS
     ======================================== */
  @keyframes fadeSlideIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* ========================================
     RESPONSIVE
     ======================================== */
  @media (max-width: 768px) {
    .online-stats-container {
      padding: 1rem;
    }

    .online-stats-header {
      flex-direction: column;
      gap: 1rem;
      text-align: center;
    }

    .header-content {
      flex-direction: column;
    }

    .search-filter-section {
      flex-direction: column;
      align-items: stretch;
    }

    .search-box {
      min-width: unset;
    }

    .filter-buttons {
      justify-content: center;
      flex-wrap: wrap;
    }

    .refresh-btn {
      width: 100%;
      justify-content: center;
    }

    .users-grid {
      grid-template-columns: 1fr;
    }

    .stats-cards-row {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 600px) {
    #page-online-stats,
    .online-stats-page {
      background-attachment: scroll;
    }

    .online-stats-container {
      padding: 0.85rem;
      gap: 1.1rem;
    }

    .online-stats-header {
      padding: 1rem;
      border-radius: 12px;
      text-align: left;
    }

    .header-content {
      align-items: flex-start;
      gap: 0.75rem;
    }

    .page-title {
      font-size: 1.4rem;
    }

    .page-subtitle {
      font-size: 0.85rem;
    }

    .header-stats {
      width: 100%;
    }

    .stat-badge {
      width: 100%;
      justify-content: center;
    }

    .stat-card {
      padding: 1rem 1.1rem;
    }

    .stat-card-icon {
      width: 42px;
      height: 42px;
      border-radius: 10px;
    }

    .stat-card-value {
      font-size: 1.4rem;
    }

    .search-filter-section {
      padding: 0.85rem;
      gap: 0.6rem;
