<!-- Online Statistics Page Content -->
<div class="online-stats-page">
  <!-- Animated Background -->
  <div class="online-stats-bg-effects">
    <div class="online-stats-gradient-orb orb-1"></div>
    <div class="online-stats-gradient-orb orb-2"></div>
    <div class="online-stats-gradient-orb orb-3"></div>
    <!-- Meteor Shower Container -->
    <div class="online-stats-meteor-container" id="onlineStatsMeteorContainer"></div>
  </div>

  <div class="online-stats-container">
    <!-- Header Section -->
    <div class="online-stats-header">
      <div class="header-content">
        <div class="header-icon gradient-blue">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
            <circle cx="9" cy="7" r="4"/>
            <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
            <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="page-title">Người dùng đang online</h1>
          <p class="page-subtitle">Theo dõi hoạt động người dùng trong thời gian thực</p>
        </div>
      </div>
      <div class="header-stats">
        <div class="stat-badge online">
          <span class="stat-dot"></span>
          <span class="stat-number" id="totalOnline">0</span>
          <span class="stat-label">Đang online</span>
        </div>
      </div>
    </div>

    <!-- Stats Cards Row -->
    <div class="stats-cards-row">
      <div class="stat-card">
        <div class="stat-card-icon gradient-green">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <polyline points="12 6 12 12 16 14"/>
          </svg>
        </div>
        <div class="stat-card-content">
          <span class="stat-card-value" id="activeNow">0</span>
          <span class="stat-card-label">Hoạt động</span>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-card-icon gradient-yellow">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
        </div>
        <div class="stat-card-content">
          <span class="stat-card-value" id="idleUsers">0</span>
          <span class="stat-card-label">Không hoạt động</span>
        </div>
      </div>
      
      <div class="stat-card">
        <div class="stat-card-icon gradient-purple">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2L2 7l10 5 10-5-10-5z"/>
            <path d="M2 17l10 5 10-5"/>
            <path d="M2 12l10 5 10-5"/>
          </svg>
        </div>
        <div class="stat-card-content">
          <span class="stat-card-value" id="todayPeak">0</span>
          <span class="stat-card-label">Cao điểm hôm nay</span>
        </div>
      </div>
    </div>

    <!-- Search & Filter Section -->
    <div class="search-filter-section">
      <div class="search-box">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="searchUser" placeholder="Tìm kiếm người dùng..." class="search-input">
      </div>
      <div class="filter-buttons">
        <button class="filter-btn active" data-filter="all">Tất cả</button>
        <button class="filter-btn" data-filter="active">Đang hoạt động</button>
        <button class="filter-btn" data-filter="idle">Không hoạt động</button>
      </div>
      <button class="refresh-btn" onclick="refreshOnlineUsers()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="23 4 23 10 17 10"/>
          <polyline points="1 20 1 14 7 14"/>
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        <span>Làm mới</span>
      </button>
    </div>

    <!-- Online Users List -->
    <div class="online-users-section">
      <div class="section-header">
        <h2 class="section-title">Danh sách người dùng online</h2>
        <span class="section-count" id="displayedCount">0 người dùng</span>
      </div>
      
      <div class="online-users-list" id="onlineUsersList">
        <!-- Loading State -->
        <div class="loading-state" id="loadingState">
          <div class="loading-spinner"></div>
          <p>Đang tải danh sách...</p>
        </div>
        
        <!-- Empty State (hidden by default) -->
        <div class="empty-state" id="emptyState" style="display: none;">
          <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M8 15h8"/>
            <circle cx="9" cy="9" r="1"/>
            <circle cx="15" cy="9" r="1"/>
          </svg>
          <p>Không có người dùng nào đang online</p>
        </div>
        
        <!-- User Cards Container -->
        <div class="users-grid" id="usersGrid">
          <!-- User cards will be dynamically inserted here -->
        </div>
      </div>
    </div>

    <!-- Activity Timeline -->
    <div class="activity-timeline-section">
      <div class="section-header">
        <h2 class="section-title">Hoạt động gần đây</h2>
        <button class="view-all-btn">Xem tất cả</button>
      </div>
      <div class="timeline-container" id="activityTimeline">
        <!-- Timeline items will be dynamically inserted here -->
      </div>
    </div>
  </div>
</div>
