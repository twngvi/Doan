<!-- Online Statistics Page Scripts -->
<script>
  // ========================================
  // ONLINE STATS PAGE CONTROLLER
  // ========================================

  // State
  let onlineUsers = [];
  let recentActivities = [];
  let onlineSummary = {
    totalOnline: 0,
    activeNow: 0,
    idleUsers: 0,
    offlineUsers: 0,
    disabledUsers: 0,
  };
  let currentFilter = 'all';
  let searchQuery = '';
  let refreshInterval = null;
  let meteorInterval = null;
  let aiUsageStats = null;
  let onlineStatsInitialized = false;

  function getOnlineStatsCurrentUser() {
    try {
      return window.currentUser || JSON.parse(localStorage.getItem('currentUser') || 'null');
    } catch (e) {
      return window.currentUser || null;
    }
  }

  function isOnlineStatsPageActive() {
    const adminPage = document.getElementById('page-admin');
    const adminVisible = !!(
      adminPage &&
      window.getComputedStyle(adminPage).display !== 'none'
    );
    const user = getOnlineStatsCurrentUser();
    const role = String(user?.role || '').trim().toUpperCase();
    return adminVisible && role === 'ADMIN';
  }

  // Initialize page
  function initOnlineStatsPage() {
    if (!isOnlineStatsPageActive()) {
      stopAutoRefresh();
      return;
    }

    if (!onlineStatsInitialized) {
      setupEventListeners();
      onlineStatsInitialized = true;
    }

    loadOnlineUsers();
    loadAIUsageStats();
    startAutoRefresh();
    initMeteorEffect();
  }

  // Setup event listeners
  function setupEventListeners() {
    // Search input
    const searchInput = document.getElementById('searchUser');
    if (searchInput) {
      searchInput.addEventListener('input', debounce((e) => {
        searchQuery = e.target.value.toLowerCase();
        filterAndRenderUsers();
      }, 300));
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        filterAndRenderUsers();
      });
    });

    const aiDays = document.getElementById('aiUsageDays');
    if (aiDays) {
      aiDays.addEventListener('change', () => {
        loadAIUsageStats();
      });
    }
  }

  // Load online users from server
  async function loadOnlineUsers() {
    if (!isOnlineStatsPageActive()) return;
    showLoading(true);
    
    try {
      const result = await callAppsScript('getAdminOnlineUsersData');
      if (!result || !result.success) {
        throw new Error((result && result.message) || 'Không thể tải dữ liệu online users');
      }

      onlineUsers = (result.data && result.data.users) ? result.data.users : [];
      recentActivities = (result.data && result.data.activities) ? result.data.activities : [];
      onlineSummary = {
        totalOnline: Number((result.data && result.data.totalOnline) || 0),
        activeNow: Number((result.data && result.data.activeNow) || 0),
        idleUsers: Number((result.data && result.data.idleUsers) || 0),
        offlineUsers: Number((result.data && result.data.offlineUsers) || 0),
        disabledUsers: Number((result.data && result.data.disabledUsers) || 0),
      };
      
      updateStats();
      filterAndRenderUsers();
      renderActivityTimeline();
    } catch (error) {
      console.error('Error loading online users:', error);
      showError('Không thể tải danh sách người dùng');
    } finally {
      showLoading(false);
    }
  }

  async function loadAIUsageStats() {
    if (!isOnlineStatsPageActive()) return;
    try {
      const daysEl = document.getElementById('aiUsageDays');
      const days = Number((daysEl && daysEl.value) || 7);
      const result = await callAppsScript('getAdminAIUsageStats', { days });
      if (!result || !result.success) {
        throw new Error((result && result.message) || 'Không tải được AI usage stats');
      }

      aiUsageStats = result.data || null;
      renderAIUsageStats();
    } catch (error) {
      console.error('Error loading AI usage stats:', error);
      renderAIUsageError(error?.message || 'Không tải được AI usage stats');
    }
  }

  function renderAIUsageStats() {
    if (!aiUsageStats) return;

    const setText = (id, value) => {
      const el = document.getElementById(id);
      if (el) el.textContent = value;
    };

    setText('aiTotalRequests', Number(aiUsageStats.totalRequests || 0));
    setText('aiSuccessRate', `${Number(aiUsageStats.successRate || 0)}%`);
    setText('aiFailedRequests', Number(aiUsageStats.failedRequests || 0));
    setText('aiAvgDuration', Number(aiUsageStats.avgDurationMs || 0));

    renderUsageList('aiUsageByUser', aiUsageStats.byUser, (item) => {
      return `
        <div class="ai-usage-item">
          <strong>${escapeHtml(item.userName || item.userId || '(unknown)')}</strong>
          <span>${item.total || 0} req | ${item.successRate || 0}%</span>
        </div>
      `;
    });

    renderUsageList('aiUsageByTopic', aiUsageStats.byTopic, (item) => {
      return `
        <div class="ai-usage-item">
          <strong>${escapeHtml(item.topicId || '(none)')}</strong>
          <span>${item.total || 0} req | ${item.successRate || 0}%</span>
        </div>
      `;
    });

    renderUsageList('aiUsageByModel', aiUsageStats.byModel, (item) => {
      return `
        <div class="ai-usage-item">
          <strong>${escapeHtml(item.model || '(unknown)')}</strong>
          <span>${item.total || 0} req | ${item.successRate || 0}%</span>
        </div>
      `;
    });

    renderUsageList('aiUsageErrors', aiUsageStats.recentErrors, (item) => {
      return `
        <div class="ai-error-item">
          <div><strong>${escapeHtml(item.userName || item.userId || '(unknown)')}</strong>: ${escapeHtml(item.errorMessage || 'Unknown error')}</div>
          <div class="ai-error-meta">Topic: ${escapeHtml(item.topicId || '(none)')} | Model: ${escapeHtml(item.model || '(unknown)')} | ${formatTimeAgoSafe(item.createdAt)}</div>
        </div>
      `;
    }, '<div class="ai-usage-item">Không có lỗi trong khoảng thời gian đã chọn</div>');
  }

  function renderAIUsageError(message) {
    const html = `<div class="ai-usage-item">${escapeHtml(message || 'Không tải được dữ liệu')}</div>`;
    ['aiUsageByUser', 'aiUsageByTopic', 'aiUsageByModel', 'aiUsageErrors'].forEach((id) => {
      const el = document.getElementById(id);
      if (el) el.innerHTML = html;
    });
  }

  function renderUsageList(elementId, list, renderItem, emptyHtml) {
    const el = document.getElementById(elementId);
    if (!el) return;

    if (!Array.isArray(list) || list.length === 0) {
      el.innerHTML = emptyHtml || '<div class="ai-usage-item">Không có dữ liệu</div>';
      return;
    }

    el.innerHTML = list.slice(0, 10).map(renderItem).join('');
  }

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  // Update statistics
  function updateStats() {
    const totalOnline = onlineSummary.totalOnline;
    const activeUsers = onlineSummary.activeNow;
    const idleUsers = onlineSummary.idleUsers;
    const offlineUsers = onlineSummary.offlineUsers;
    
    animateNumber('totalOnline', totalOnline);
    animateNumber('activeNow', activeUsers);
    animateNumber('idleUsers', idleUsers);
    animateNumber('offlineUsers', offlineUsers);
  }

  // Animate number change
  function animateNumber(elementId, targetValue) {
    const element = document.getElementById(elementId);
    if (!element) return;
    
    const currentValue = parseInt(element.textContent) || 0;
    const increment = (targetValue - currentValue) / 20;
    let current = currentValue;
    
    const timer = setInterval(() => {
      current += increment;
      if ((increment > 0 && current >= targetValue) || (increment < 0 && current <= targetValue)) {
        element.textContent = targetValue;
        clearInterval(timer);
      } else {
        element.textContent = Math.round(current);
      }
    }, 30);
  }

  // Filter and render users
  function filterAndRenderUsers() {
    let filteredUsers = [...onlineUsers];
    
    // Apply status filter
    if (currentFilter === 'active') {
      filteredUsers = filteredUsers.filter(u => u.status === 'active');
    } else if (currentFilter === 'idle') {
      filteredUsers = filteredUsers.filter(u => u.status === 'idle');
    } else if (currentFilter === 'offline') {
      filteredUsers = filteredUsers.filter(u => u.status === 'offline');
    } else if (currentFilter === 'disabled') {
      filteredUsers = filteredUsers.filter(u => u.status === 'disabled');
    }
    
    // Apply search filter
    if (searchQuery) {
      filteredUsers = filteredUsers.filter(u => 
        (u.name || '').toLowerCase().includes(searchQuery) ||
        (u.email || '').toLowerCase().includes(searchQuery)
      );
    }
    
    renderUsers(filteredUsers);
    updateDisplayedCount(filteredUsers.length);
  }

  // Render users grid
  function renderUsers(users) {
    const grid = document.getElementById('usersGrid');
    const emptyState = document.getElementById('emptyState');
    const loadingState = document.getElementById('loadingState');
    
    if (!grid) return;
    
    // Always hide loading state when rendering users
    if (loadingState) loadingState.style.display = 'none';
    
    if (users.length === 0) {
      grid.innerHTML = '';
      grid.style.display = 'none';
      if (emptyState) emptyState.style.display = 'flex';
      return;
    }
    
    if (emptyState) emptyState.style.display = 'none';
    grid.style.display = window.innerWidth <= 600 ? 'flex' : 'grid';
    
    grid.innerHTML = users.map(user => `
      <div class="user-card" data-user-id="${user.id}">
        <div class="user-avatar">
          <img src="${user.avatar || ''}" alt="${user.name}">
          <span class="status-indicator ${user.status}"></span>
        </div>
        <div class="user-info">
          <h4 class="user-name">${user.name}</h4>
          <div class="user-meta">
            <span class="user-activity">${user.activity}</span>
            <span class="user-time">• ${formatTimeAgoSafe(user.lastActivity)}</span>
          </div>
        </div>
      </div>
    `).join('');

    if (window.innerWidth <= 600) {
      grid.scrollTop = 0;
    }
  }

  // Update displayed count
  function updateDisplayedCount(count) {
    const countElement = document.getElementById('displayedCount');
    if (countElement) {
      countElement.textContent = `${count} người dùng`;
    }
  }

  // Format time ago
  function formatTimeAgo(date) {
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);
    
    if (seconds < 60) return 'Vừa xong';
    if (seconds < 3600) return `${Math.floor(seconds / 60)} phút trước`;
    if (seconds < 86400) return `${Math.floor(seconds / 3600)} giờ trước`;
    return `${Math.floor(seconds / 86400)} ngày trước`;
  }

  function formatTimeAgoSafe(date) {
    if (!date) return 'Không có dữ liệu';
    const parsed = new Date(date);
    if (Number.isNaN(parsed.getTime())) return 'Không có dữ liệu';
    return formatTimeAgo(parsed);
  }

  // Render activity timeline
  function renderActivityTimeline() {
    const timeline = document.getElementById('activityTimeline');
    if (!timeline) return;

    if (!recentActivities || recentActivities.length === 0) {
      timeline.innerHTML = `
        <div class="timeline-item">
          <div class="timeline-content">
            <p class="timeline-text">Chưa có hoạt động gần đây</p>
          </div>
        </div>
      `;
      return;
    }

    timeline.innerHTML = recentActivities.map(act => {
      let iconHtml = '';
      let text = '';
      
      switch (act.type) {
        case 'login':
          iconHtml = `
            <div class="timeline-icon login">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
                <polyline points="10 17 15 12 10 7"/>
                <line x1="15" y1="12" x2="3" y2="12"/>
              </svg>
            </div>
          `;
          text = `<strong>${act.user}</strong> đã đăng nhập`;
          break;
        case 'logout':
          iconHtml = `
            <div class="timeline-icon logout">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
              </svg>
            </div>
          `;
          text = `<strong>${act.user}</strong> đã đăng xuất`;
          break;
        case 'activity':
          iconHtml = `
            <div class="timeline-icon activity">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
              </svg>
            </div>
          `;
          text = `<strong>${act.user}</strong> ${act.action}`;
          break;
        default:
          iconHtml = `
            <div class="timeline-icon activity">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
              </svg>
            </div>
          `;
          text = `<strong>${act.user}</strong> ${act.action || 'có hoạt động'}`;
          break;
      }
      
      return `
        <div class="timeline-item">
          ${iconHtml}
          <div class="timeline-content">
            <p class="timeline-text">${text}</p>
            <p class="timeline-time">${formatTimeAgo(act.time)}</p>
          </div>
        </div>
      `;
    }).join('');
  }

  function callAppsScript(functionName, ...args) {
    return new Promise((resolve, reject) => {
      if (typeof google === 'undefined' || !google.script || !google.script.run) {
        reject(new Error('google.script.run chưa sẵn sàng'));
        return;
      }

      let runner = google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler((error) => {
          reject(error instanceof Error ? error : new Error(String(error)));
        });

      if (typeof runner[functionName] !== 'function') {
        reject(new Error(`Không tìm thấy hàm server: ${functionName}`));
        return;
      }

      runner[functionName](...args);
    });
  }

  // Show/hide loading state
  function showLoading(show) {
    const loadingState = document.getElementById('loadingState');
    const usersGrid = document.getElementById('usersGrid');
    const emptyState = document.getElementById('emptyState');
    
    if (show) {
      if (loadingState) loadingState.style.display = 'flex';
      if (usersGrid) usersGrid.style.display = 'none';
      if (emptyState) emptyState.style.display = 'none';
    } else {
      if (loadingState) loadingState.style.display = 'none';
      if (usersGrid) usersGrid.style.display = window.innerWidth <= 600 ? 'flex' : 'grid';
    }
  }

  // Show error message
  function showError(message) {
    // You can implement a toast or notification system here
    console.error(message);
  }

  // Refresh online users
  function refreshOnlineUsers() {
    const refreshBtn = document.querySelector('.refresh-btn svg');
    if (refreshBtn) {
      refreshBtn.style.transition = 'transform 0.5s ease';
      refreshBtn.style.transform = 'rotate(360deg)';
      setTimeout(() => {
        refreshBtn.style.transform = 'rotate(0deg)';
      }, 500);
    }
    
    loadOnlineUsers();
  }

  function refreshAIUsageStats() {
    loadAIUsageStats();
  }

  // Start auto refresh
  function startAutoRefresh() {
    stopAutoRefresh();
    // Refresh every 30 seconds only when admin page is active
    refreshInterval = setInterval(() => {
      if (!isOnlineStatsPageActive()) return;
      loadOnlineUsers();
      loadAIUsageStats();
    }, 30000);
  }

  // Stop auto refresh
  function stopAutoRefresh() {
    if (refreshInterval) {
      clearInterval(refreshInterval);
      refreshInterval = null;
    }
  }

  // View user detail
  function viewUserDetail(userId) {
    const user = onlineUsers.find(u => String(u.id) === String(userId));
    if (user) {
      console.log('View user detail:', user);
      // Implement user detail modal or navigation
    }
  }

  // Send message to user
  function sendMessageToUser(userId) {
    const user = onlineUsers.find(u => String(u.id) === String(userId));
    if (user) {
      console.log('Send message to:', user);
      // Implement messaging functionality
    }
  }

  // Meteor effect
  function initMeteorEffect() {
    const container = document.getElementById('onlineStatsMeteorContainer');
    if (!container) return;
    if (!isOnlineStatsPageActive()) return;
    
    // Check if galaxy effects should be hidden
    if (document.body.classList.contains('hide-galaxy-effects')) return;
    
    function createMeteor() {
      const meteor = document.createElement('div');
      meteor.className = 'online-stats-meteor';
      meteor.style.left = `${Math.random() * 100}%`;
      meteor.style.top = `${Math.random() * 30}%`;
      meteor.style.animationDuration = `${1 + Math.random() * 0.5}s`;
      
      container.appendChild(meteor);
      
      setTimeout(() => {
        meteor.remove();
      }, 2000);
    }
    
    if (meteorInterval) {
      clearInterval(meteorInterval);
    }

    // Create meteors periodically
    meteorInterval = setInterval(() => {
      if (!isOnlineStatsPageActive()) return;
      if (Math.random() > 0.7) {
        createMeteor();
      }
    }, 2000);
  }

  // Debounce utility
  function debounce(func, wait) {
    let timeout;
    return function executedFunction(...args) {
      const later = () => {
        clearTimeout(timeout);
        func(...args);
      };
      clearTimeout(timeout);
      timeout = setTimeout(later, wait);
    };
  }

  // Expose hook so admin sidebar navigation can init this page lazily.
  window.initonlinestats = initOnlineStatsPage;

  // Initialize only if admin page is currently active.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', () => {
      if (isOnlineStatsPageActive()) initOnlineStatsPage();
    });
  } else if (isOnlineStatsPageActive()) {
    initOnlineStatsPage();
  }

  // Cleanup on page unload
  window.addEventListener('beforeunload', () => {
    stopAutoRefresh();
    if (meteorInterval) {
      clearInterval(meteorInterval);
      meteorInterval = null;
    }
  });

  window.refreshAIUsageStats = refreshAIUsageStats;
</script>
