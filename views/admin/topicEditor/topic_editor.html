<!-- Topic Editor - Main HTML Layout -->

<div class="topic-editor-container">
  <!-- Header -->
  <div class="topic-editor-header">
    <h1>✨ Tạo Topic mới</h1>
    <button class="btn btn-secondary" onclick="goBackToAdmin()">
      ← Quay lại
    </button>
  </div>

  <!-- Topic Info Form -->
  <div class="topic-form-section">
    <div class="form-row">
      <div class="form-group">
        <label>Topic ID <span class="required">*</span></label>
        <input type="text" id="topicId" placeholder="VD: js_variables_01" />
      </div>
      <div class="form-group">
        <label>Tiêu đề <span class="required">*</span></label>
        <input type="text" id="topicTitle" placeholder="Tên bài học" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Danh mục <span class="required">*</span></label>
        <select id="topicCategory">
          <option value="">-- Chọn danh mục --</option>
          <option value="JavaScript Basics">JavaScript Basics</option>
          <option value="JavaScript Advanced">JavaScript Advanced</option>
          <option value="HTML & CSS">HTML & CSS</option>
          <option value="React">React</option>
          <option value="Node.js">Node.js</option>
          <option value="Database">Database</option>
          <option value="Other">Khác</option>
        </select>
      </div>
      <div class="form-group">
        <label>Thứ tự hiển thị</label>
        <input type="number" id="topicOrder" placeholder="VD: 1, 2, 3..." min="1" />
      </div>
    </div>

    <div class="form-group">
      <label>Mô tả ngắn</label>
      <textarea id="topicDescription" rows="2" placeholder="Mô tả ngắn gọn về bài học này..."></textarea>
    </div>
  </div>

  <!-- Content Editor Section -->
  <div class="editor-section">
    <div class="editor-section-title">📝 Nội dung bài học</div>
    
    <!-- Toolbar -->
    <div class="editor-toolbar">
      <!-- Headings -->
      <div class="toolbar-group">
        <select class="toolbar-select" id="headingSelect" onchange="formatHeading(this.value)">
          <option value="">Heading</option>
          <option value="h1">H1 - Tiêu đề chính</option>
          <option value="h2">H2 - Tiêu đề phụ</option>
          <option value="h3">H3 - Tiêu đề nhỏ</option>
          <option value="p">Paragraph</option>
        </select>
      </div>

      <!-- Text formatting -->
      <div class="toolbar-group">
        <button class="toolbar-btn" onclick="formatText('bold')" title="Đậm (Ctrl+B)">
          <b>B</b>
        </button>
        <button class="toolbar-btn" onclick="formatText('italic')" title="Nghiêng (Ctrl+I)">
          <i>I</i>
        </button>
        <button class="toolbar-btn" onclick="formatText('underline')" title="Gạch chân (Ctrl+U)">
          <u>U</u>
        </button>
      </div>

      <!-- Lists -->
      <div class="toolbar-group">
        <button class="toolbar-btn" onclick="formatText('insertUnorderedList')" title="Danh sách bullet">
          •
        </button>
        <button class="toolbar-btn" onclick="formatText('insertOrderedList')" title="Danh sách số">
          1.
        </button>
      </div>

      <!-- Code -->
      <div class="toolbar-group">
        <button class="toolbar-btn" onclick="insertInlineCode()" title="Code inline">
          <code>&lt;/&gt;</code>
        </button>
        <button class="toolbar-btn" onclick="openCodeModal()" title="Code block">
          { }
        </button>
      </div>

      <!-- Callouts -->
      <div class="toolbar-group">
        <button class="toolbar-btn" onclick="insertCallout('note')" title="Ghi chú">
          💡
        </button>
        <button class="toolbar-btn" onclick="insertCallout('warning')" title="Cảnh báo">
          ⚠️
        </button>
        <button class="toolbar-btn" onclick="insertCallout('info')" title="Thông tin">
          ℹ️
        </button>
        <button class="toolbar-btn" onclick="insertCallout('danger')" title="Nguy hiểm">
          🚫
        </button>
      </div>

      <!-- Link & Image -->
      <div class="toolbar-group">
        <button class="toolbar-btn" onclick="openLinkModal()" title="Chèn link">
          🔗
        </button>
        <button class="toolbar-btn" onclick="openImageModal()" title="Chèn hình ảnh">
          📷
        </button>
      </div>
    </div>

    <!-- Content Editor (contenteditable) -->
    <div 
      class="content-editor" 
      id="contentEditor" 
      contenteditable="true"
      spellcheck="false"
    ></div>
  </div>

  <!-- Action Buttons -->
  <div class="editor-actions">
    <button class="btn btn-secondary" onclick="previewContent()">
      👁️ Xem trước
    </button>
    <button class="btn btn-primary" onclick="publishTopic()">
      🚀 Publish
    </button>
  </div>
</div>

<!-- Preview Modal -->
<div class="preview-modal" id="previewModal">
  <div class="preview-content">
    <div class="preview-header">
      <h3>👁️ Xem trước bài học</h3>
      <button class="preview-close" onclick="closePreviewModal()">✕</button>
    </div>
    <div class="preview-body" id="previewBody">
      <!-- Preview content will be inserted here -->
    </div>
  </div>
</div>

<!-- Image Upload Modal -->
<div class="image-modal" id="imageModal">
  <div class="image-modal-content">
    <h3>📷 Chèn hình ảnh</h3>
    
    <div class="image-upload-zone" id="imageUploadZone" onclick="document.getElementById('imageFileInput').click()">
      <input type="file" id="imageFileInput" accept="image/*" onchange="handleImageUpload(this.files[0])" />
      <p>📤 Click để chọn hoặc kéo thả ảnh vào đây</p>
      <p style="font-size: 12px; color: #666;">Hỗ trợ: JPG, PNG, GIF (tối đa 5MB)</p>
    </div>
    
    <div style="text-align: center; margin: 10px 0; color: #999;">— hoặc —</div>
    
    <div class="image-url-input">
      <input type="text" id="imageUrlInput" placeholder="Nhập URL hình ảnh..." />
      <button class="btn btn-primary" onclick="insertImageFromUrl()">Chèn</button>
    </div>
    
    <div class="image-modal-actions">
      <button class="btn btn-secondary" onclick="closeImageModal()">Hủy</button>
    </div>
  </div>
</div>

<!-- Link Modal -->
<div class="link-modal" id="linkModal">
  <div class="link-modal-content">
    <h3>🔗 Chèn liên kết</h3>
    
    <div class="form-group">
      <label>Văn bản hiển thị</label>
      <input type="text" id="linkText" placeholder="VD: Click vào đây" />
    </div>
    
    <div class="form-group">
      <label>URL</label>
      <input type="text" id="linkUrl" placeholder="https://..." />
    </div>
    
    <div class="link-modal-actions">
      <button class="btn btn-secondary" onclick="closeLinkModal()">Hủy</button>
      <button class="btn btn-primary" onclick="insertLink()">Chèn link</button>
    </div>
  </div>
</div>

<!-- Code Block Modal -->
<div class="code-modal" id="codeModal">
  <div class="code-modal-content">
    <h3>💻 Chèn Code Block</h3>
    
    <div class="form-group">
      <label>Ngôn ngữ</label>
      <select id="codeLanguage">
        <option value="javascript">JavaScript</option>
        <option value="html">HTML</option>
        <option value="css">CSS</option>
        <option value="python">Python</option>
        <option value="json">JSON</option>
        <option value="sql">SQL</option>
        <option value="bash">Bash/Shell</option>
        <option value="text">Plain Text</option>
      </select>
    </div>
    
    <textarea id="codeContent" placeholder="Nhập code ở đây..."></textarea>
    
    <div class="code-modal-actions">
      <button class="btn btn-secondary" onclick="closeCodeModal()">Hủy</button>
      <button class="btn btn-primary" onclick="insertCodeBlock()">Chèn code</button>
    </div>
  </div>
</div>

<!-- Loading Overlay -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-spinner"></div>
  <div class="loading-text" id="loadingText">Đang xử lý...</div>
</div>

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>
