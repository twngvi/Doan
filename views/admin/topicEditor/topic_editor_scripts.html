<script>
/**
 * Topic Editor Scripts
 * Xử lý logic cho Rich Text Editor tạo Topic
 */

// ========================================
// GLOBAL VARIABLES
// ========================================

let savedSelection = null;
let isEditMode = false;
let editingTopicId = null;

// ========================================
// INITIALIZATION
// ========================================

document.addEventListener('DOMContentLoaded', function() {
  initializeTopicEditor();
  setupDragAndDrop();
  setupKeyboardShortcuts();
});

function initializeTopicEditor() {
  const editor = document.getElementById('contentEditor');
  
  // Handle paste - clean up pasted content
  editor.addEventListener('paste', function(e) {
    e.preventDefault();
    const text = e.clipboardData.getData('text/plain');
    document.execCommand('insertText', false, text);
  });

  // Check edit mode
  initEditMode();

  // Focus editor after init (delay to allow edit mode to load)
  if (!isEditMode) {
    editor.focus();
  }
}

// ========================================
// TEXT FORMATTING
// ========================================

function formatText(command) {
  document.execCommand(command, false, null);
  document.getElementById('contentEditor').focus();
}

function formatHeading(tag) {
  if (!tag) return;
  document.execCommand('formatBlock', false, tag);
  document.getElementById('headingSelect').value = '';
  document.getElementById('contentEditor').focus();
}

function clearTextFormatting() {
  document.execCommand('removeFormat', false, null);
  // Reset block type to paragraph after clearing inline styles
  document.execCommand('formatBlock', false, 'p');
  var headingSelect = document.getElementById('headingSelect');
  if (headingSelect) headingSelect.value = '';
  document.getElementById('contentEditor').focus();
}

// ========================================
// INLINE CODE
// ========================================

function insertInlineCode() {
  const selection = window.getSelection();
  if (selection.rangeCount > 0) {
    const range = selection.getRangeAt(0);
    const selectedText = range.toString() || 'code';
    
    const codeElement = document.createElement('code');
    codeElement.textContent = selectedText;
    
    range.deleteContents();
    range.insertNode(codeElement);
    
    // Move cursor after code element
    range.setStartAfter(codeElement);
    range.setEndAfter(codeElement);
    selection.removeAllRanges();
    selection.addRange(range);
  }
  document.getElementById('contentEditor').focus();
}

// ========================================
// CODE BLOCK MODAL
// ========================================

function openCodeModal() {
  saveSelection();
  document.getElementById('codeModal').classList.add('active');
  document.getElementById('codeContent').value = '';
  document.getElementById('codeContent').focus();
}

function closeCodeModal() {
  document.getElementById('codeModal').classList.remove('active');
  restoreSelection();
}

function insertCodeBlock() {
  const language = document.getElementById('codeLanguage').value;
  const code = document.getElementById('codeContent').value;
  
  if (!code.trim()) {
    showToast('Vui lòng nhập code', 'warning');
    return;
  }
  
  const codeBlockHtml = `
    <div class="code-block" data-language="${language}">
      <div class="code-header" contenteditable="false">
        <span class="language-tag">${language}</span>
      </div>
      <pre><code>${escapeHtml(code)}</code></pre>
    </div>
    <p><br></p>
  `;
  
  closeCodeModal();
  restoreSelection();
  document.execCommand('insertHTML', false, codeBlockHtml);
  document.getElementById('contentEditor').focus();
}

// ========================================
// CALLOUTS
// ========================================

function insertCallout(type) {
  const icons = {
    note: '💡',
    warning: '⚠️',
    info: 'ℹ️',
    danger: '🚫'
  };
  
  const titles = {
    note: 'Ghi chú',
    warning: 'Cảnh báo',
    info: 'Thông tin',
    danger: 'Lưu ý quan trọng'
  };
  
  const calloutHtml = `
    <div class="callout callout-${type}">
      <span class="callout-icon" contenteditable="false">${icons[type]}</span>
      <div class="callout-content">
        <strong>${titles[type]}:</strong> Nhập nội dung ở đây...
      </div>
    </div>
    <p><br></p>
  `;

  document.execCommand('insertHTML', false, calloutHtml);
  document.getElementById('contentEditor').focus();
}

// ========================================
// BLOCK MARKERS (for Google Doc syntax)
// ========================================

function toggleBlockMarkersMenu() {
  const menu = document.getElementById('blockMarkersMenu');
  menu.classList.toggle('active');

  // Close menu when clicking outside
  if (menu.classList.contains('active')) {
    document.addEventListener('click', closeBlockMarkersMenuOnClickOutside);
  }
}

function closeBlockMarkersMenuOnClickOutside(e) {
  const menu = document.getElementById('blockMarkersMenu');
  const toggle = e.target.closest('.toolbar-dropdown');

  if (!toggle) {
    menu.classList.remove('active');
    document.removeEventListener('click', closeBlockMarkersMenuOnClickOutside);
  }
}

function insertBlockMarker(type) {
  const menu = document.getElementById('blockMarkersMenu');
  menu.classList.remove('active');

  const blockConfig = {
    'NOTE': { icon: '📌', label: 'Ghi chú', placeholder: 'Ghi chú của bạn ở đây...' },
    'TIP': { icon: '💡', label: 'Mẹo', placeholder: 'Mẹo hữu ích ở đây...' },
    'WARNING': { icon: '⚠️', label: 'Cảnh báo', placeholder: 'Cảnh báo quan trọng ở đây...' },
    'HIGHLIGHT': { icon: '✨', label: 'Lưu ý', placeholder: 'Nội dung cần nhấn mạnh...' },
    'EXAMPLE': { icon: '📖', label: 'Ví dụ', placeholder: 'Ví dụ minh họa ở đây...' },
    'CHECKPOINT': { icon: '✅', label: 'Kiểm tra', placeholder: 'Câu hỏi kiểm tra hiểu bài...' },
    'TASK': { icon: '📋', label: 'Nhiệm vụ', placeholder: 'Mô tả nhiệm vụ cần thực hiện...' },
    'QA': { icon: '❓', label: 'Hỏi & Đáp', placeholder: 'Câu hỏi: ...\nTrả lời: ...' },
    'RESOURCES': { icon: '📚', label: 'Tài nguyên', placeholder: '• Link tài liệu 1\n• Link tài liệu 2' },
  };

  // Handle special block types
  if (type === 'TERMINAL') {
    insertTerminalBlock();
    return;
  }
  if (type === 'OUTPUT') {
    insertOutputBlock();
    return;
  }
  if (type === 'CMD') {
    insertCmdBlock();
    return;
  }
  if (type === 'GRID') {
    insertGridBlock();
    return;
  }

  const config = blockConfig[type];
  if (!config) return;

  const selection = window.getSelection();
  const selectedText = selection.toString().trim() || config.placeholder;

  const html = `
    <div class="visual-block visual-block-${type.toLowerCase()}" data-block-type="${type}" contenteditable="false">
      <span class="visual-block-icon">${config.icon}</span>
      <div class="visual-block-content" contenteditable="true"><span class="visual-block-label">${config.label}:</span> ${selectedText}</div>
      <button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="Xóa block">✕</button>
    </div>
    <p><br></p>
  `;

  document.execCommand('insertHTML', false, html);
  document.getElementById('contentEditor').focus();
}

function insertTerminalBlock() {
  const selection = window.getSelection();
  const selectedText = selection.toString().trim() || '>>> print("Hello World")\nHello World';

  const html = `
    <div class="visual-terminal-block" data-block-type="TERMINAL" contenteditable="false">
      <div class="visual-terminal-label">🖥️ Terminal Output</div>
      <div class="visual-terminal-content" contenteditable="true">${selectedText}</div>
      <button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="Xóa block">✕</button>
    </div>
    <p><br></p>
  `;

  document.execCommand('insertHTML', false, html);
  document.getElementById('contentEditor').focus();
}

function insertOutputBlock() {
  const selection = window.getSelection();
  const selectedText = selection.toString().trim() || 'Kết quả hiển thị ở đây...';

  const html = `
    <div class="visual-output-block" data-block-type="OUTPUT" contenteditable="false">
      <div class="visual-output-label">📄 Output Block</div>
      <div class="visual-output-content" contenteditable="true">${selectedText}</div>
      <button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="Xóa block">✕</button>
    </div>
    <p><br></p>
  `;

  document.execCommand('insertHTML', false, html);
  document.getElementById('contentEditor').focus();
}

function insertCmdBlock() {
  const selection = window.getSelection();
  const selectedText = selection.toString().trim() || '$ python main.py';

  const html = `
    <div class="visual-cmd-block" data-block-type="CMD" contenteditable="false">
      <div class="visual-cmd-label">⌨️ CMD Block</div>
      <div class="visual-cmd-content" contenteditable="true">${selectedText}</div>
      <button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="Xóa block">✕</button>
    </div>
    <p><br></p>
  `;

  document.execCommand('insertHTML', false, html);
  document.getElementById('contentEditor').focus();
}

function insertGridBlock() {
  const selection = window.getSelection();
  const selectedText = selection.toString().trim() || '• Item 1\n• Item 2\n• Item 3';

  const html = `
    <div class="visual-grid-block" data-block-type="GRID" contenteditable="false">
      <div class="visual-grid-label">📊 Grid Cards</div>
      <div class="visual-grid-content" contenteditable="true">${selectedText}</div>
      <button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="Xóa block">✕</button>
    </div>
    <p><br></p>
  `;

  document.execCommand('insertHTML', false, html);
  document.getElementById('contentEditor').focus();
}

function deleteVisualBlock(btn) {
  const block = btn.closest('[data-block-type]');
  if (block) {
    block.remove();
  }
}

function insertColorMarker(color) {
  const menu = document.getElementById('blockMarkersMenu');
  menu.classList.remove('active');

  const selection = window.getSelection();
  const selectedText = selection.toString().trim() || 'Nội dung có màu ở đây...';

  const html = `<span class="visual-color-block visual-color-${color.toLowerCase()}" data-color-type="${color}">${selectedText}</span>&nbsp;`;

  document.execCommand('insertHTML', false, html);
  document.getElementById('contentEditor').focus();
}

// Code Marker Modal
function openCodeMarkerModal() {
  const menu = document.getElementById('blockMarkersMenu');
  menu.classList.remove('active');

  saveSelection();
  document.getElementById('codeMarkerModal').classList.add('active');
  document.getElementById('codeMarkerContent').value = '';
  document.getElementById('codeMarkerContent').focus();
}

function closeCodeMarkerModal() {
  document.getElementById('codeMarkerModal').classList.remove('active');
  restoreSelection();
}

function insertCodeMarker() {
  const language = document.getElementById('codeMarkerLanguage').value;
  const code = document.getElementById('codeMarkerContent').value;

  if (!code.trim()) {
    showToast('Vui lòng nhập code', 'warning');
    return;
  }

  closeCodeMarkerModal();
  restoreSelection();

  // Escape HTML for display
  const escapedCode = code.replace(/</g, '&lt;').replace(/>/g, '&gt;');

  const html = `
    <div class="visual-code-block" data-block-type="CODE" data-language="${language}" contenteditable="false">
      <div class="visual-code-header">
        <span class="visual-code-lang">${language}</span>
      </div>
      <pre class="visual-code-content" contenteditable="true">${escapedCode}</pre>
      <button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="Xóa block">✕</button>
    </div>
    <p><br></p>
  `;

  document.execCommand('insertHTML', false, html);
  document.getElementById('contentEditor').focus();
}

// Figure Modal
function openFigureModal() {
  const menu = document.getElementById('blockMarkersMenu');
  menu.classList.remove('active');

  saveSelection();
  document.getElementById('figureModal').classList.add('active');
  document.getElementById('figureCaption').value = '';
  document.getElementById('figureCaption').focus();
}

function closeFigureModal() {

  restoreSelection();
}

  }

    <div class="visual-figure-block" data-block-type="FIGURE" data-caption="${escapeHtml(caption)}" contenteditable="false">
      <div class="visual-figure-content" contenteditable="true">(Chèn hình ảnh ở đây)</div>
      <div class="visual-figure-caption">📷 ${caption}</div>
      <button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="Xóa block">✕</button>
    </div>
    <p><br></p>

  document.execCommand('insertHTML', false, html);

// ========================================
// LINK MODAL
// ========================================

function openLinkModal() {
  saveSelection();
  
  // Get selected text if any
  const selection = window.getSelection();
  const selectedText = selection.toString();
  
  document.getElementById('linkText').value = selectedText || '';
  document.getElementById('linkUrl').value = '';
  document.getElementById('linkModal').classList.add('active');
  
  if (selectedText) {
    document.getElementById('linkUrl').focus();
  } else {
    document.getElementById('linkText').focus();
  }
}

function closeLinkModal() {
  document.getElementById('linkModal').classList.remove('active');
  restoreSelection();
}

function insertLink() {
  const text = document.getElementById('linkText').value.trim();
  const url = document.getElementById('linkUrl').value.trim();
  
  if (!text || !url) {
    showToast('Vui lòng nhập đầy đủ thông tin', 'warning');
    return;
  }
  
  closeLinkModal();
  restoreSelection();
  
  const linkHtml = `<a href="${escapeHtml(url)}" target="_blank">${escapeHtml(text)}</a>`;
  document.execCommand('insertHTML', false, linkHtml);
  document.getElementById('contentEditor').focus();
}

// ========================================
// IMAGE MODAL & UPLOAD
// ========================================

function openImageModal() {
  saveSelection();
  document.getElementById('imageModal').classList.add('active');
  document.getElementById('imageUrlInput').value = '';
}

function closeImageModal() {
  document.getElementById('imageModal').classList.remove('active');
  restoreSelection();
}

function setupDragAndDrop() {
  const uploadZone = document.getElementById('imageUploadZone');
  
  if (!uploadZone) return;
  
  uploadZone.addEventListener('dragover', function(e) {
    e.preventDefault();
    this.classList.add('dragover');
  });
  
  uploadZone.addEventListener('dragleave', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
  });
  
  uploadZone.addEventListener('drop', function(e) {
    e.preventDefault();
    this.classList.remove('dragover');
    
    const files = e.dataTransfer.files;
    if (files.length > 0 && files[0].type.startsWith('image/')) {
      handleImageUpload(files[0]);
    }
  });
}

function handleImageUpload(file) {
  if (!file) return;
  
  // Validate file
  if (!file.type.startsWith('image/')) {
    showToast('Vui lòng chọn file hình ảnh', 'error');
    return;
  }
  
  if (file.size > 5 * 1024 * 1024) {
    showToast('File quá lớn. Tối đa 5MB', 'error');
    return;
  }
  
  showTopicEditorLoading('Đang upload hình ảnh...');
  
  // Convert to base64
  const reader = new FileReader();
  reader.onload = function(e) {
    const base64Data = e.target.result.split(',')[1];
    const mimeType = file.type;
    const fileName = file.name;
    
    // Upload to Google Drive
    google.script.run
      .withSuccessHandler(function(result) {
        hideTopicEditorLoading();
        if (result.success) {
          closeImageModal();
          restoreSelection();
          insertImageToEditor(result.imageUrl);
          showToast('Upload thành công!', 'success');
        } else {
          showToast('Lỗi upload: ' + result.message, 'error');
        }
      })
      .withFailureHandler(function(error) {
        hideTopicEditorLoading();
        showToast('Lỗi: ' + error.message, 'error');
      })
      .uploadImageToDrive(base64Data, fileName, mimeType);
  };
  reader.readAsDataURL(file);
}

function insertImageFromUrl() {
  const url = document.getElementById('imageUrlInput').value.trim();
  
  if (!url) {
    showToast('Vui lòng nhập URL hình ảnh', 'warning');
    return;
  }
  
  closeImageModal();
  restoreSelection();
  insertImageToEditor(url);
}

function insertImageToEditor(imageUrl) {
  const imageHtml = `
    <div class="image-wrapper" contenteditable="false">
      <img src="${escapeHtml(imageUrl)}" alt="Hình ảnh" />
      <button class="image-delete-btn" onclick="deleteImage(this)">✕</button>
    </div>
    <p><br></p>
  `;
  
  document.execCommand('insertHTML', false, imageHtml);
  document.getElementById('contentEditor').focus();
}

function deleteImage(btn) {
  const wrapper = btn.closest('.image-wrapper');
  if (wrapper) {
    wrapper.remove();
  }
}

// ========================================
// PREVIEW
// ========================================

function previewContent() {
  const title = document.getElementById('topicTitle').value || 'Chưa có tiêu đề';
  let content = document.getElementById('contentEditor').innerHTML;

  // Cleanup visual blocks for preview (remove delete buttons, contenteditable)
  content = cleanupVisualBlocksForPreview(content);

  // Render old-style block markers thành HTML đẹp (backward compatibility)
  content = renderBlockMarkers(content);

  const previewHtml = `
    <div class="lesson-content-wrapper">
      <h1 style="color: #1a73e8; border-bottom: 2px solid #e0e0e0; padding-bottom: 10px;">${escapeHtml(title)}</h1>
      ${content}
    </div>
  `;

  document.getElementById('previewBody').innerHTML = previewHtml;
  document.getElementById('previewModal').classList.add('active');
}

/**
 * Cleanup visual blocks for preview (remove delete buttons, contenteditable)
 */
function cleanupVisualBlocksForPreview(html) {
  // Create a temporary container
  const temp = document.createElement('div');
  temp.innerHTML = html;

  // Remove all delete buttons
  temp.querySelectorAll('.visual-block-delete').forEach(function(btn) {
    btn.remove();
  });

  // Remove contenteditable attributes
  temp.querySelectorAll('[contenteditable]').forEach(function(el) {
    el.removeAttribute('contenteditable');
  });

  return temp.innerHTML;
}

/**
 * Render block markers thành HTML đẹp cho preview
 * Xử lý nested blocks bằng cách render từ trong ra ngoài (innermost first)
 */
function renderBlockMarkers(html) {
  let result = html;

  // Icons và titles cho các loại callout
  const calloutConfig = {
    'NOTE': { icon: '📌', title: 'Ghi chú' },
    'TIP': { icon: '💡', title: 'Mẹo' },
    'WARNING': { icon: '⚠️', title: 'Cảnh báo' },
    'HIGHLIGHT': { icon: '✨', title: 'Lưu ý' },
    'EXAMPLE': { icon: '📖', title: 'Ví dụ' },
    'CHECKPOINT': { icon: '✅', title: 'Kiểm tra' },
    'TASK': { icon: '📋', title: 'Nhiệm vụ' },
    'QA': { icon: '❓', title: 'Hỏi & Đáp' },
    'RESOURCES': { icon: '📚', title: 'Tài nguyên' }
  };

  const allBlockTypes = ['NOTE', 'TIP', 'WARNING', 'HIGHLIGHT', 'EXAMPLE', 'CHECKPOINT', 'TASK', 'QA', 'RESOURCES', 'CODE', 'TERMINAL', 'OUTPUT', 'CMD', 'GRID', 'FIGURE', 'COLOR'];

  // Hàm tìm innermost block (block không chứa block khác bên trong)
  function findInnermostBlock(text) {
    let bestMatch = null;
    let bestIndex = -1;

    // Tìm tất cả các opening tags (match cả uppercase và lowercase)
    const openingRegex = /\[\[(NOTE|TIP|WARNING|HIGHLIGHT|EXAMPLE|CHECKPOINT|TASK|QA|RESOURCES|TERMINAL|OUTPUT|CMD|GRID|CODE:\w+|FIGURE:[^\]]*|COLOR:\w+)\]\]/gi;

    // Tìm tất cả các cặp opening-closing và chọn cặp innermost
    let match;
    while ((match = openingRegex.exec(text)) !== null) {
      const openTag = match[0];
      const openIndex = match.index;
      const tagType = match[1].split(':')[0].toUpperCase(); // Lấy type (CODE, FIGURE, COLOR, etc.)

      // Tìm closing tag tương ứng (case insensitive)
      const closeRegex = new RegExp('\\[\\[\\/' + tagType + '\\]\\]', 'gi');
      closeRegex.lastIndex = openIndex + openTag.length;

      const closeMatch = closeRegex.exec(text);
      if (closeMatch) {
        const closeIndex = closeMatch.index;
        const content = text.substring(openIndex + openTag.length, closeIndex);

        // Kiểm tra xem content có chứa opening tag khác không
        const hasNestedBlock = /\[\[(NOTE|TIP|WARNING|HIGHLIGHT|EXAMPLE|CHECKPOINT|TASK|QA|RESOURCES|TERMINAL|OUTPUT|CMD|GRID|CODE:\w+|FIGURE:[^\]]*|COLOR:\w+)\]\]/i.test(content);

        if (!hasNestedBlock) {
          // Đây là innermost block
          if (bestMatch === null || openIndex < bestIndex) {
            bestMatch = {
              fullMatch: text.substring(openIndex, closeIndex + closeMatch[0].length),
              openTag: openTag,
              closeTag: closeMatch[0],
              tagInfo: match[1],
              tagType: tagType,
              content: content,
              startIndex: openIndex,
              endIndex: closeIndex + closeMatch[0].length
            };
            bestIndex = openIndex;
          }
        }
      }
    }

    return bestMatch;
  }

  // Hàm render một block thành HTML
  function renderSingleBlock(blockInfo) {
    const { tagType, tagInfo, content } = blockInfo;

    // Xử lý callout blocks - giữ nguyên content (có thể chứa nested blocks đã render)
    if (calloutConfig[tagType]) {
      const config = calloutConfig[tagType];
      // Chỉ strip <p> tags wrapper, giữ nguyên nội dung bên trong (bao gồm nested blocks đã render)
      const cleanContent = content
        .replace(/^(\s*<\/?p[^>]*>\s*)+/gi, '')  // Strip leading <p> tags
        .replace(/(\s*<\/?p[^>]*>\s*)+$/gi, '') // Strip trailing <p> tags
        .trim();
      return '<div class="preview-callout preview-callout-' + tagType.toLowerCase() + '">' +
        '<span style="font-size: 20px; flex-shrink: 0;">' + config.icon + '</span>' +
        '<div><strong>' + config.title + ':</strong> ' + cleanContent + '</div>' +
      '</div>';
    }

    // Xử lý CODE blocks
    if (tagType === 'CODE') {
      const lang = tagInfo.split(':')[1] || 'TEXT';
      let cleanCode = content
        .replace(/<\/?p[^>]*>/gi, '\n')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/?pre[^>]*>/gi, '')
        .replace(/<\/?code[^>]*>/gi, '')
        .replace(/<\/?div[^>]*>/gi, '')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&')
        .replace(/&nbsp;/g, ' ')
        .replace(/^\n+|\n+$/g, '')
        .trim();

      return '<div class="preview-code-block">' +
        '<div class="preview-code-header"><span class="preview-code-lang">' + lang + '</span></div>' +
        '<pre class="preview-code-content">' + escapeHtml(cleanCode) + '</pre>' +
      '</div>';
    }

    // Xử lý TERMINAL / OUTPUT / CMD blocks
    if (tagType === 'TERMINAL' || tagType === 'OUTPUT' || tagType === 'CMD') {
      let previewClass = 'preview-' + tagType.toLowerCase();
      let cleanContent = content
        .replace(/<\/?p[^>]*>/gi, '\n')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/^\n+|\n+$/g, '')
        .trim();
      return '<div class="' + previewClass + '"><pre style="margin:0; white-space:pre-wrap;">' + cleanContent + '</pre></div>';
    }

    // Xử lý GRID blocks
    if (tagType === 'GRID') {
      let items = content
        .replace(/<\/?p[^>]*>/gi, '\n')
        .replace(/<br\s*\/?>/gi, '\n')
        .split(/[•\n]+/)
        .filter(function(item) { return item.trim(); });

      let gridHtml = '<div class="preview-grid">';
      items.forEach(function(item) {
        gridHtml += '<div class="preview-grid-item">' + item.trim() + '</div>';
      });
      gridHtml += '</div>';
      return gridHtml;
    }

    // Xử lý FIGURE blocks
    if (tagType === 'FIGURE') {
      const caption = tagInfo.split(':').slice(1).join(':') || '';
      return '<div class="preview-figure">' +
        '<div>' + content + '</div>' +
        '<div class="preview-figure-caption">' + caption + '</div>' +
      '</div>';
    }

    // Xử lý COLOR blocks
    if (tagType === 'COLOR') {
      const color = tagInfo.split(':')[1] || 'BLUE';
      const cleanContent = content.replace(/<\/?p[^>]*>/gi, '').trim();
      return '<span class="preview-color-' + color.toLowerCase() + '">' + cleanContent + '</span>';
    }

    return content;
  }

  // Lặp lại xử lý từ trong ra ngoài cho đến khi không còn block nào
  let maxIterations = 100; // Prevent infinite loop
  let iterations = 0;

  while (iterations < maxIterations) {
    const innermostBlock = findInnermostBlock(result);
    if (!innermostBlock) break;

    const renderedHtml = renderSingleBlock(innermostBlock);
    result = result.substring(0, innermostBlock.startIndex) +
             renderedHtml +
             result.substring(innermostBlock.endIndex);
    iterations++;
  }

  // Xóa các paragraph tags rỗng
  result = result.replace(/<p[^>]*>\s*<\/p>/gi, '');

  return result;
}

  document.getElementById('previewModal').classList.remove('active');

/**
 * Convert visual blocks thành text markers để gửi lên Google Doc
 * Xử lý nested blocks từ trong ra ngoài (innermost first)
 */
function convertVisualBlocksToMarkers(html) {
  const temp = document.createElement('div');
  temp.innerHTML = html;

  // Xử lý từ trong ra ngoài: tìm innermost visual block và convert
  function findInnermostVisualBlock(container) {
    // Tìm tất cả visual blocks
    const allBlocks = container.querySelectorAll('[data-block-type], [data-color-type]');

    for (const block of allBlocks) {
      // Kiểm tra xem block này có chứa visual block khác bên trong không
      const nestedBlocks = block.querySelectorAll('[data-block-type], [data-color-type]');
      // nestedBlocks bao gồm chính nó nếu nó match, nên kiểm tra length > 1 hoặc kiểm tra khác
      let hasNestedBlock = false;
      for (const nested of nestedBlocks) {
        if (nested !== block && block.contains(nested)) {
          hasNestedBlock = true;
          break;
        }
      }

      if (!hasNestedBlock) {
        return block;
      }
    }
    return null;
  }

  // Hàm convert một block thành marker
  function convertBlockToMarker(block) {
    const blockType = block.getAttribute('data-block-type');
    const colorType = block.getAttribute('data-color-type');

    if (colorType) {
      // Color block
      const content = block.innerHTML;
      const marker = document.createTextNode(`[[COLOR:${colorType}]]${content}[[/COLOR]]`);
      block.replaceWith(marker);
      return;
    }

    if (!blockType) return;

    // Callout blocks (NOTE, TIP, WARNING, etc.)
    if (['NOTE', 'TIP', 'WARNING', 'HIGHLIGHT', 'EXAMPLE', 'CHECKPOINT', 'TASK', 'QA', 'RESOURCES'].includes(blockType)) {
      const contentEl = block.querySelector('.visual-block-content');
      let content = contentEl ? contentEl.innerHTML : '';

      // Remove label span but keep the rest
      const labelSpan = contentEl ? contentEl.querySelector('.visual-block-label') : null;
      if (labelSpan) {
        content = content.replace(labelSpan.outerHTML, '').trim();
      }

      const wrapper = document.createElement('div');
      wrapper.innerHTML = `<p>[[${blockType}]]</p><div>${content}</div><p>[[/${blockType}]]</p>`;
      block.replaceWith(wrapper);
      return;
    }

    // Code block
    if (blockType === 'CODE') {
      const language = block.getAttribute('data-language') || 'JAVASCRIPT';
      const codeEl = block.querySelector('.visual-code-content');
      let code = codeEl ? codeEl.textContent : '';

      const wrapper = document.createElement('div');
      wrapper.innerHTML = `<p>[[CODE:${language}]]</p><pre>${escapeHtml(code)}</pre><p>[[/CODE]]</p>`;
      block.replaceWith(wrapper);
      return;
    }

    // Terminal, Output, CMD blocks
    if (['TERMINAL', 'OUTPUT', 'CMD'].includes(blockType)) {
      const contentEl = block.querySelector('.visual-terminal-content, .visual-output-content, .visual-cmd-content');
      let content = contentEl ? contentEl.innerHTML : '';

      const wrapper = document.createElement('div');
      wrapper.innerHTML = `<p>[[${blockType}]]</p><div>${content}</div><p>[[/${blockType}]]</p>`;
      block.replaceWith(wrapper);
      return;
    }

    // Grid block
    if (blockType === 'GRID') {
      const contentEl = block.querySelector('.visual-grid-content');
      let content = contentEl ? contentEl.innerHTML : '';

      const wrapper = document.createElement('div');
      wrapper.innerHTML = `<p>[[GRID]]</p><div>${content}</div><p>[[/GRID]]</p>`;
      block.replaceWith(wrapper);
      return;
    }

    // Figure block
    if (blockType === 'FIGURE') {
      const caption = block.getAttribute('data-caption') || '';
      const contentEl = block.querySelector('.visual-figure-content');
      let content = contentEl ? contentEl.innerHTML : '';

      const wrapper = document.createElement('div');
      wrapper.innerHTML = `<p>[[FIGURE:${caption}]]</p><div>${content}</div><p>[[/FIGURE]]</p>`;
      block.replaceWith(wrapper);
      return;
    }
  }

  // Lặp lại convert từ trong ra ngoài
  let maxIterations = 200;
  let iterations = 0;

  while (iterations < maxIterations) {
    const innermostBlock = findInnermostVisualBlock(temp);
    if (!innermostBlock) break;

    convertBlockToMarker(innermostBlock);
    iterations++;
  }

  // Remove delete buttons that might still exist
  temp.querySelectorAll('.visual-block-delete').forEach(function(btn) {
    btn.remove();
  });

  return temp.innerHTML;
}

async function publishTopic() {
  // Validate form
  const topicId = document.getElementById('topicId').value.trim();
  const title = document.getElementById('topicTitle').value.trim();
  const category = document.getElementById('topicCategory').value;
  const description = document.getElementById('topicDescription').value.trim();
  const order = document.getElementById('topicOrder').value || 999;
  let content = document.getElementById('contentEditor').innerHTML.trim();

  // Convert visual blocks to text markers for Google Doc
  content = convertVisualBlocksToMarkers(content);

  // Validation
  if (!topicId) {
    showToast('Vui lòng nhập Topic ID', 'error');
    document.getElementById('topicId').focus();
    return;
  }

  if (!title) {
    showToast('Vui lòng nhập tiêu đề', 'error');
    document.getElementById('topicTitle').focus();
    return;
  }

  if (!category) {
    showToast('Vui lòng chọn danh mục', 'error');
    document.getElementById('topicCategory').focus();
    return;
  }

  if (!content || content === '<br>' || content === '<p><br></p>') {
    showToast('Vui lòng nhập nội dung bài học', 'error');
    document.getElementById('contentEditor').focus();
    return;
  }

  // Confirm publish
  const shouldPublish =
    typeof window.showAppConfirm === 'function'
      ? await window.showAppConfirm(
          'Bạn có chắc muốn publish topic này?\n\nTopic: ' + title,
          {
            title: 'Xác nhận publish',
            confirmText: 'Publish',
            cancelText: 'Hủy'
          }
        )
      : false;

  if (!shouldPublish) {
    return;
  }

  showTopicEditorLoading('Đang tạo và publish topic...');

  const topicData = {
    topicId: topicId,
    title: title,
    description: description,
    category: category,
    order: parseInt(order),
    content: content
  };

  console.log('📤 Publishing topic:', topicData);

  // Check if google.script.run is available
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    hideTopicEditorLoading();
    showToast('Lỗi: Không thể kết nối với server. Vui lòng tải lại trang.', 'error');
    console.error('google.script.run not available');
    return;
  }

  // Set a timeout to prevent infinite loading
  const publishTimeout = setTimeout(function() {
    hideTopicEditorLoading();
    showToast('⏱️ Quá thời gian chờ (60s). Vui lòng kiểm tra Apps Script Logs và thử lại.', 'error');
    console.error('Publish timeout - server took too long to respond');
  }, 60000); // 60 seconds timeout

  google.script.run
    .withSuccessHandler(function(result) {
      clearTimeout(publishTimeout);
      hideTopicEditorLoading();
      console.log('✅ Server response:', result);

      try {
        if (result && result.success) {
          showToast('🎉 Publish thành công!', 'success');

          // Show success message with doc link - use simple alert if dialog fails
          setTimeout(function() {
            try {
              var message = '✅ Topic đã được publish thành công!\n\n' +
                '📄 Doc ID: ' + result.docId + '\n' +
                '🔗 Link: ' + result.docUrl + '\n\n' +
                'Topic đã được thêm vào MasterDB.';

              if (typeof window.showAppAlert === 'function') {
                window.showAppAlert(message, { title: 'Publish thành công', confirmText: 'Đã hiểu' })
                  .then(function() {
                    askCreateNew();
                  })
                  .catch(function(e) {
                    console.warn('showAppAlert error:', e);
                    askCreateNew();
                  });
              } else {
                alert(message);
                askCreateNew();
              }
            } catch (e) {
              console.error('Success dialog error:', e);
              askCreateNew();
            }

            function askCreateNew() {
              try {
                if (typeof window.showAppConfirm === 'function') {
                  window.showAppConfirm('Bạn có muốn tạo topic mới?', {
                    title: 'Tạo topic mới',
                    confirmText: 'Tạo mới',
                    cancelText: 'Không'
                  }).then(function(shouldCreateNew) {
                    if (shouldCreateNew) resetForm();
                  }).catch(function(e) {
                    console.warn('showAppConfirm error:', e);
                  });
                }
              } catch (e) {
                console.warn('askCreateNew error:', e);
              }
            }
          }, 500);
        } else {
          showToast('Lỗi: ' + (result ? result.message : 'Không có phản hồi từ server'), 'error');
        }
      } catch (e) {
        console.error('Success handler error:', e);
        showToast('Có lỗi xảy ra khi xử lý kết quả', 'error');
      }
    })
    .withFailureHandler(function(error) {
      clearTimeout(publishTimeout);
      hideTopicEditorLoading();
      console.error('❌ Server error:', error);
      var errorMsg = error && error.message ? error.message : String(error);
      showToast('Lỗi: ' + errorMsg, 'error');

      try {
        if (typeof window.showAppAlert === 'function') {
          window.showAppAlert('Chi tiết lỗi:\n\n' + errorMsg, { title: 'Lỗi publish topic' })
            .catch(function(e) { console.warn('Alert error:', e); });
        }
      } catch (e) {
        console.warn('Failure handler alert error:', e);
      }
    })
    .createAndPublishTopic(topicData);
}

/**
 * Populate form fields with topic data for editing
 */
function populateEditForm(data) {
  var topic = data.topic;
  var content = data.content || '';

  console.log('[TopicEditor] Populating edit form:', topic.topicId);

  // Fill form fields
  document.getElementById('topicId').value = topic.topicId || '';
  document.getElementById('topicTitle').value = topic.title || '';
  document.getElementById('topicCategory').value = topic.category || '';
  document.getElementById('topicDescription').value = topic.description || '';
  var orderField = document.getElementById('topicOrder');
  if (orderField) orderField.value = topic.order || '';

  // Set content in editor
  var editor = document.getElementById('contentEditor');
  if (content) {
    editor.innerHTML = content;
    // Neutralize legacy callout classes from imported HTML to avoid persistent left colored borders.
    neutralizeLegacyCalloutStyles(editor);
    // Force-remove all legacy left-edge artifacts on normal loaded content
    hardResetLoadedContentLeftEdge(editor);
    // Parse text markers into visual blocks
    parseMarkersToVisualBlocks(editor);
    // Heal accidental over-capture where following headings are swallowed into a block
    normalizeVisualBlockBoundaries(editor);
    // Ensure loaded Doc content is readable in editor (always black text)
    normalizeLoadedDocTextColors(editor);
    // Final guard: remove any remaining effective left border/indent from normal text nodes
    forceNormalizeComputedLeftEdge(editor);
    // Strict guard: ensure color text after heading always starts on a new line
    enforceHeadingColorLineBreak(editor);
  }

  editor.focus();
  console.log('[TopicEditor] Edit form populated successfully');
}

/**
 * Normalize inline text colors from loaded Doc content to black.
 * This prevents white/invisible text caused by imported inline styles.
 */
function normalizeLoadedDocTextColors(editor) {
  if (!editor) return;

  // Phase 1: hard reset normal content to black, even when color is inherited
  // from previously inserted dark blocks.
  var normalNodes = editor.querySelectorAll('*');
  for (var n = 0; n < normalNodes.length; n++) {
    var normalNode = normalNodes[n];
    if (normalNode.closest(
      '.visual-terminal-block, .visual-code-block, .visual-code-content, .visual-terminal-content, pre, code, .code-block'
    )) {
      continue;
    }
    normalNode.style.setProperty('color', '#000000', 'important');
    normalNode.style.setProperty('-webkit-text-fill-color', '#000000', 'important');
  }

  // Phase 2: normalize explicit inline styles from imported Doc HTML.
  // In edit mode, Google Doc export can bring left border/indent styles that create
  // a vertical colored column on the left. Strip those to match create mode layout.
  var nodes = editor.querySelectorAll('[style], font[color]');
  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];

    // Keep intentional code/terminal/output/cmd styling
    if (node.closest('pre, code, .code-block, .visual-code-block, .visual-terminal-block, .visual-output-block, .visual-cmd-block')) {
      continue;
    }

    if (node.style) {
      var hasColor = !!node.style.getPropertyValue('color');
      var hasTextFillColor = !!node.style.getPropertyValue('-webkit-text-fill-color');

      if (hasColor) {
        node.style.setProperty('color', '#000000', 'important');
      }
      if (hasTextFillColor) {
        node.style.setProperty('-webkit-text-fill-color', '#000000', 'important');
      }

      // Remove imported layout/typography artifacts that often leak from Google Doc HTML.
      var stripProps = [
        'border-left',
        'padding-left',
        'margin-left',
        'text-indent',
        'background',
        'background-color',
        'font-family',
        'font-size',
        'line-height',
        'white-space',
        'display'
      ];
      for (var sp = 0; sp < stripProps.length; sp++) {
        if (node.style.getPropertyValue(stripProps[sp])) {
          node.style.removeProperty(stripProps[sp]);
        }
      }

      // Cleanup empty style attribute after normalization
      if (!node.style.cssText || !node.style.cssText.trim()) {
        node.removeAttribute('style');
      }
    }

    if (node.tagName === 'FONT' && node.hasAttribute('color')) {
      node.setAttribute('color', '#000000');
    }
  }

  // Keep the editor root readable too.
  editor.style.setProperty('color', '#000000', 'important');
  editor.style.setProperty('-webkit-text-fill-color', '#000000', 'important');

  // Restore intended dark-block text colors (must run after black normalization).
  var terminalNodes = editor.querySelectorAll('.visual-terminal-block, .visual-terminal-block *, .visual-terminal-content');
  for (var t = 0; t < terminalNodes.length; t++) {
    var nodeT = terminalNodes[t];
    // Label has its own grey color, the rest is white/light-grey
    if (nodeT.classList.contains('visual-terminal-label')) {
      nodeT.style.setProperty('color', '#8b949e', 'important');
      nodeT.style.setProperty('-webkit-text-fill-color', '#8b949e', 'important');
    } else {
      nodeT.style.setProperty('color', '#c9d1d9', 'important');
      nodeT.style.setProperty('-webkit-text-fill-color', '#c9d1d9', 'important');
    }
  }

  var outputNodes = editor.querySelectorAll('.visual-output-block, .visual-output-block *, .visual-output-content');
  for (var o = 0; o < outputNodes.length; o++) {
    var nodeO = outputNodes[o];
    if (nodeO.classList.contains('visual-output-label')) {
      nodeO.style.setProperty('color', '#888888', 'important');
      nodeO.style.setProperty('-webkit-text-fill-color', '#888888', 'important');
    } else {
      nodeO.style.setProperty('color', '#ffffff', 'important');
      nodeO.style.setProperty('-webkit-text-fill-color', '#ffffff', 'important');
    }
  }

  var cmdNodes = editor.querySelectorAll('.visual-cmd-block, .visual-cmd-block *, .visual-cmd-content');
  for (var m = 0; m < cmdNodes.length; m++) {
    var nodeM = cmdNodes[m];
    if (nodeM.classList.contains('visual-cmd-label')) {
      nodeM.style.setProperty('color', '#565f89', 'important');
      nodeM.style.setProperty('-webkit-text-fill-color', '#565f89', 'important');
    } else {
      nodeM.style.setProperty('color', '#ffffff', 'important');
      nodeM.style.setProperty('-webkit-text-fill-color', '#ffffff', 'important');
    }
  }

  var codeContentNodes = editor.querySelectorAll('.visual-code-content, .visual-code-content *');
  for (var c = 0; c < codeContentNodes.length; c++) {
    codeContentNodes[c].style.setProperty('color', '#d4d4d4', 'important');
    codeContentNodes[c].style.setProperty('-webkit-text-fill-color', '#d4d4d4', 'important');
  }

  // Safety net: ensure normal headings/paragraphs never keep legacy left border.
  var normalTextBlocks = editor.querySelectorAll('h1, h2, h3, h4, h5, h6, p');
  for (var b = 0; b < normalTextBlocks.length; b++) {
    var blockNode = normalTextBlocks[b];
    if (blockNode.closest('.visual-block, .callout, .visual-color-block')) continue;
    blockNode.style.removeProperty('border-left');
    blockNode.style.removeProperty('padding-left');
    blockNode.style.removeProperty('margin-left');
    blockNode.style.removeProperty('text-indent');
  }
}

/**
 * Remove legacy callout visual classes from loaded content in edit mode.
 * Old content may include .callout-info/.callout-* wrappers that keep a blue left border.
 */
function neutralizeLegacyCalloutStyles(editor) {
  if (!editor) return;

  var legacyCallouts = editor.querySelectorAll('.callout, .callout-note, .callout-warning, .callout-info, .callout-danger');
  for (var i = 0; i < legacyCallouts.length; i++) {
    var node = legacyCallouts[i];
    node.classList.remove('callout', 'callout-note', 'callout-warning', 'callout-info', 'callout-danger');
    node.style.removeProperty('border-left');
    node.style.removeProperty('padding-left');
    node.style.removeProperty('margin-left');
    node.style.removeProperty('background');
    node.style.removeProperty('background-color');
  }
}

/**
 * Hard reset left-edge artifacts from imported HTML so edit mode matches create mode.
 * Keeps intentional block styles because those are re-applied by visual block classes.
 */
function hardResetLoadedContentLeftEdge(editor) {
  if (!editor) return;

  var targets = editor.querySelectorAll('*');
  for (var i = 0; i < targets.length; i++) {
    var node = targets[i];
    if (node.closest('.visual-code-block, .visual-terminal-block, .visual-grid-block, .visual-figure-block, .visual-block')) {
      continue;
    }

    if (node.tagName && node.tagName.toLowerCase() === 'blockquote') {
      // Unwrap blockquote to plain flow content (blockquote often exports with left border).
      var frag = document.createDocumentFragment();
      while (node.firstChild) frag.appendChild(node.firstChild);
      node.parentNode.replaceChild(frag, node);
      continue;
    }

    if (node.style) {
      node.style.removeProperty('border-left');
      node.style.removeProperty('padding-left');
      node.style.removeProperty('margin-left');
      node.style.removeProperty('text-indent');
      node.style.removeProperty('border');
      node.style.removeProperty('outline');
      if (!node.style.cssText || !node.style.cssText.trim()) {
        node.removeAttribute('style');
      }
    }
  }
}

/**
 * Final guard using computed style (catches class-based borders, not just inline style).
 */
function forceNormalizeComputedLeftEdge(editor) {
  if (!editor || typeof window.getComputedStyle !== 'function') return;

  var nodes = editor.querySelectorAll('*');
  for (var i = 0; i < nodes.length; i++) {
    var node = nodes[i];
    if (node.closest('.visual-block, .visual-code-block, .visual-terminal-block, .visual-grid-block, .visual-figure-block, .visual-color-block')) {
      continue;
    }

    var cs = window.getComputedStyle(node);
    var borderLeft = parseFloat(cs.borderLeftWidth || '0') || 0;
    var marginLeft = parseFloat(cs.marginLeft || '0') || 0;
    var paddingLeft = parseFloat(cs.paddingLeft || '0') || 0;
    var textIndent = parseFloat(cs.textIndent || '0') || 0;

    if (borderLeft > 0 || marginLeft > 0 || paddingLeft > 0 || textIndent !== 0) {
      node.style.setProperty('border-left', 'none', 'important');
      node.style.setProperty('margin-left', '0', 'important');
      node.style.setProperty('padding-left', '0', 'important');
      node.style.setProperty('text-indent', '0', 'important');
      node.style.setProperty('border', 'none', 'important');
      node.style.setProperty('outline', 'none', 'important');
    }
  }
}

/**
 * Ensure any color marker immediately after heading is block-separated.
 */
function enforceHeadingColorLineBreak(editor) {
  if (!editor) return;

  var headings = editor.querySelectorAll('h1, h2, h3, h4, h5, h6');
  for (var i = 0; i < headings.length; i++) {
    var heading = headings[i];
    var next = heading.nextElementSibling;
    if (!next) continue;
    if (!next.classList || !next.classList.contains('visual-color-block')) continue;

    next.classList.add('visual-color-block-section');
    next.style.setProperty('display', 'block', 'important');
    next.style.setProperty('margin-top', '8px', 'important');
  }
}

/**
 * Prevent block wrappers from swallowing subsequent headings when imported marker boundaries are imperfect.
 * If a callout-like visual block contains H1-H6, move that heading and following nodes outside the block.
 */
function normalizeVisualBlockBoundaries(editor) {
  if (!editor) return;

  var blockContents = editor.querySelectorAll('.visual-block .visual-block-content');
  for (var i = 0; i < blockContents.length; i++) {
    var contentEl = blockContents[i];
    var parentBlock = contentEl.closest('.visual-block');
    if (!parentBlock) continue;

    var headingNode = contentEl.querySelector('h1, h2, h3, h4, h5, h6');
    if (!headingNode) continue;

    var overflowFragment = document.createDocumentFragment();
    var cursor = headingNode;
    while (cursor) {
      var next = cursor.nextSibling;
      overflowFragment.appendChild(cursor);
      cursor = next;
    }

    // Keep a clean line break between block and moved content
    var spacer = document.createElement('p');
    spacer.innerHTML = '<br>';
    parentBlock.parentNode.insertBefore(spacer, parentBlock.nextSibling);
    parentBlock.parentNode.insertBefore(overflowFragment, spacer.nextSibling);
  }

  // Legacy callout blocks (insertCallout) can also wrap following headings when pasted/imported.
  // Split them the same way to avoid left blue border bleeding into subsequent content.
  var legacyCallouts = editor.querySelectorAll('.callout .callout-content');
  for (var j = 0; j < legacyCallouts.length; j++) {
    var calloutContent = legacyCallouts[j];
    var parentCallout = calloutContent.closest('.callout');
    if (!parentCallout) continue;

    var calloutHeading = calloutContent.querySelector('h1, h2, h3, h4, h5, h6');
    if (!calloutHeading) continue;

    var calloutOverflow = document.createDocumentFragment();
    var cursor2 = calloutHeading;
    while (cursor2) {
      var next2 = cursor2.nextSibling;
      calloutOverflow.appendChild(cursor2);
      cursor2 = next2;
    }

    var spacer2 = document.createElement('p');
    spacer2.innerHTML = '<br>';
    parentCallout.parentNode.insertBefore(spacer2, parentCallout.nextSibling);
    parentCallout.parentNode.insertBefore(calloutOverflow, spacer2.nextSibling);
  }
}

/**
 * Parse [[BLOCK]] markers from Doc HTML into visual editable blocks
 * Reuses the same innermost-first approach from preview parsing
 */
function parseMarkersToVisualBlocks(container) {
  var html = container.innerHTML;

  // === Normalize brackets (same as preview) ===
  html = html.replace(/&#91;/g, '[');
  html = html.replace(/&#93;/g, ']');
  html = html.replace(/&lbrack;/g, '[');
  html = html.replace(/&rbrack;/g, ']');
  html = html.replace(/&#x5B;/gi, '[');
  html = html.replace(/&#x5D;/gi, ']');
  html = html.replace(/[\u27E6\u301A\uFF3B]/g, '[');
  html = html.replace(/[\u27E7\u301B\uFF3D]/g, ']');
  html = html.replace(/[\u200B\u200C\u200D\uFEFF]/g, '');

  // Remove ONLY inline/formatting tags between/around brackets.
  // Preserve block-level tags (h1-h6, div, p, ul, ol, li, pre, table, tr, td, th,
  // blockquote, img, br, hr, section, article, nav, header, footer, figure, figcaption)
  // so that headings after blocks are not accidentally destroyed.
  var inlineTagPattern = '<\\/?(?:span|b|i|u|em|strong|font|a|s|sub|sup|mark|abbr|small|big|del|ins|cite|q|dfn|var|samp|kbd|wbr|bdo|bdi|ruby|rt|rp|data|time|output)(?:\\s[^>]*)?>'; 
  var inlineTagsRe = new RegExp('(' + inlineTagPattern + ')*\\[(' + inlineTagPattern + ')*', 'gi');
  html = html.replace(inlineTagsRe, '[');
  var inlineTagsReClose = new RegExp('(' + inlineTagPattern + ')*\\](' + inlineTagPattern + ')*', 'gi');
  html = html.replace(inlineTagsReClose, ']');

  // Clean inside [[ and ]]
  html = html.replace(/\[\[([^\[\]]*?)\]\]/g, function(match, inner) {
    var cleanInner = inner.replace(/<[^>]*>/g, '').trim();
    return '[[' + cleanInner + ']]';
  });

  // Normalize closing/opening tags
  html = html.replace(/\[\[\s*\/\s*(\w+)\s*\]\]/gi, '[[/$1]]');
  html = html.replace(/\[\[\s*(\w+(?::\w+)?)\s*\]\]/gi, '[[$1]]');

  console.log('[EditMode] Parsing markers. Found:',
    (html.match(/\[\[(\w+(?::\w+)?)\]\]/g) || []).length, 'opening,',
    (html.match(/\[\[\/\w+\]\]/g) || []).length, 'closing');

  // === Find innermost block ===
  function findInnermostBlock(text) {
    var bestMatch = null;
    var bestIndex = -1;
    var openingRegex = /\[\[(NOTE|TIP|WARNING|HIGHLIGHT|EXAMPLE|CHECKPOINT|TASK|QA|RESOURCES|TERMINAL(?::\w*)?|GRID|CMD|OUTPUT|CODE(?::\w+)?|FIGURE:[^\]]*|COLOR:\w+)\]\]/gi;
    var match;
    while ((match = openingRegex.exec(text)) !== null) {
      var openTag = match[0];
      var openIndex = match.index;
      var tagInfo = match[1];
      var tagType = tagInfo.split(':')[0].toUpperCase();
      var closeRegex = new RegExp('\\[\\[\\/' + tagType + '\\]\\]', 'gi');
      closeRegex.lastIndex = openIndex + openTag.length;
      var closeMatch = closeRegex.exec(text);
      if (closeMatch) {
        var closeIndex = closeMatch.index;
        var innerContent = text.substring(openIndex + openTag.length, closeIndex);
        var hasNested = /\[\[(NOTE|TIP|WARNING|HIGHLIGHT|EXAMPLE|CHECKPOINT|TASK|QA|RESOURCES|TERMINAL(?::\w*)?|GRID|CMD|OUTPUT|CODE(?::\w+)?|FIGURE:[^\]]*|COLOR:\w+)\]\]/i.test(innerContent);
        if (!hasNested) {
          if (bestMatch === null || openIndex < bestIndex) {
            bestMatch = {
              fullMatch: text.substring(openIndex, closeIndex + closeMatch[0].length),
              openTag: openTag,
              closeTag: closeMatch[0],
              tagInfo: tagInfo,
              tagType: tagType,
              content: innerContent,
              startIndex: openIndex,
              endIndex: closeIndex + closeMatch[0].length
            };
            bestIndex = openIndex;
          }
        }
      }
    }
    return bestMatch;
  }

  // === Render a block as a visual editable block ===
  function renderEditableBlock(blockInfo) {
    var tagType = blockInfo.tagType;
    var tagInfo = blockInfo.tagInfo;
    var content = blockInfo.content;

    // Clean content: strip surrounding <p> tags but keep inner HTML
    var cleanContent = content
      .replace(/^(\s*<\/?p[^>]*>\s*)+/gi, '')
      .replace(/(\s*<\/?p[^>]*>\s*)+$/gi, '')
      .trim();

    // CODE blocks
    if (tagType === 'CODE') {
      var lang = tagInfo.split(':')[1] || 'JAVASCRIPT';
      var cleanCode = cleanContent
        .replace(/<\/p>/gi, '\n')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<\/div>/gi, '\n')
        .replace(/<[^>]*>/g, '')
        .replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&')
        .replace(/^\n+|\n+$/g, '');
      return '<div class="visual-code-block" data-block-type="CODE" data-language="' + lang + '" contenteditable="false">' +
        '<div class="visual-code-header"><span class="visual-code-lang">' + lang + '</span></div>' +
        '<pre class="visual-code-content" contenteditable="true">' + escapeHtml(cleanCode) + '</pre>' +
        '<button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="X\u00f3a block">\u2715</button>' +
        '</div>';
    }

    // CMD / OUTPUT / TERMINAL blocks
    if (tagType === 'TERMINAL' || tagType === 'CMD' || tagType === 'OUTPUT') {
      var markerType = tagType;
      var visualClass = 'visual-' + tagType.toLowerCase() + '-block';
      var labelText = tagType === 'TERMINAL' ? '\ud83d\udda5\ufe0f Terminal Output' : 
                      tagType === 'CMD' ? '\u2328\ufe0f CMD Block' : '\ud83d\udcc4 Output Block';
      var labelClass = 'visual-' + tagType.toLowerCase() + '-label';
      var contentClass = 'visual-' + tagType.toLowerCase() + '-content';

      var monoContent = cleanContent
        .replace(/<\/p>/gi, '\n')
        .replace(/<br\s*\/?>/gi, '\n')
        .replace(/<[^>]*>/g, '')
        .replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<')
        .replace(/&gt;/g, '>')
        .replace(/&amp;/g, '&')
        .replace(/^\n+|\n+$/g, '');

      return '<div class="' + visualClass + '" data-block-type="' + markerType + '" contenteditable="false">' +
        '<div class="' + labelClass + '">' + labelText + '</div>' +
        '<div class="' + contentClass + '" contenteditable="true">' + escapeHtml(monoContent) + '</div>' +
        '<button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="X\u00f3a block">\u2715</button>' +
        '</div>';
    }

    // GRID blocks
    if (tagType === 'GRID') {
      return '<div class="visual-grid-block" data-block-type="GRID" contenteditable="false">' +
        '<div class="visual-grid-label">\ud83d\udcca Grid Cards</div>' +
        '<div class="visual-grid-content" contenteditable="true">' + cleanContent + '</div>' +
        '<button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="X\u00f3a block">\u2715</button>' +
        '</div>';
    }

    // FIGURE blocks
    if (tagType === 'FIGURE') {
      var caption = tagInfo.split(':').slice(1).join(':') || '';
      return '<div class="visual-figure-block" data-block-type="FIGURE" data-caption="' + escapeHtml(caption) + '" contenteditable="false">' +
        '<div class="visual-figure-content" contenteditable="true">' + cleanContent + '</div>' +
        '<div class="visual-figure-caption">\ud83d\udcf7 ' + caption + '</div>' +
        '<button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="X\u00f3a block">\u2715</button>' +
        '</div>';
    }

    // COLOR blocks
    if (tagType === 'COLOR') {
      var color = tagInfo.split(':')[1] || 'BLUE';
      var sectionContent = cleanContent.replace(/\n/g, '<br>');
      return '<div class="visual-color-block visual-color-block-section visual-color-' + color.toLowerCase() + '" data-color-type="' + color + '">' + sectionContent + '</div>';
    }

    // Callout blocks (NOTE, TIP, WARNING, HIGHLIGHT, EXAMPLE, CHECKPOINT, TASK, QA, RESOURCES)
    var blockConfig = {
      'NOTE': { icon: '\ud83d\udccc', label: 'Ghi ch\u00fa' },
      'TIP': { icon: '\ud83d\udca1', label: 'M\u1eb9o' },
      'WARNING': { icon: '\u26a0\ufe0f', label: 'C\u1ea3nh b\u00e1o' },
      'HIGHLIGHT': { icon: '\u2728', label: 'L\u01b0u \u00fd' },
      'EXAMPLE': { icon: '\ud83d\udcd6', label: 'V\u00ed d\u1ee5' },
      'CHECKPOINT': { icon: '\u2705', label: 'Ki\u1ec3m tra' },
      'TASK': { icon: '\ud83d\udccb', label: 'Nhi\u1ec7m v\u1ee5' },
      'QA': { icon: '\u2753', label: 'H\u1ecfi \u0026 \u0110\u00e1p' },
      'RESOURCES': { icon: '\ud83d\udcda', label: 'T\u00e0i nguy\u00ean' }
    };

    var config = blockConfig[tagType];
    if (config) {
      return '<div class="visual-block visual-block-' + tagType.toLowerCase() + '" data-block-type="' + tagType + '" contenteditable="false">' +
        '<span class="visual-block-icon">' + config.icon + '</span>' +
        '<div class="visual-block-content" contenteditable="true"><span class="visual-block-label">' + config.label + ':</span> ' + cleanContent + '</div>' +
        '<button class="visual-block-delete" onclick="deleteVisualBlock(this)" title="X\u00f3a block">\u2715</button>' +
        '</div>';
    }

    // Fallback: return content as-is
    return cleanContent;
  }

  // === Process blocks from innermost to outermost ===
  var maxIterations = 200;
  var iterations = 0;
  while (iterations < maxIterations) {
    var innermostBlock = findInnermostBlock(html);
    if (!innermostBlock) break;
    console.log('[EditMode] Converting block:', innermostBlock.tagType);
    var rendered = renderEditableBlock(innermostBlock);
    html = html.substring(0, innermostBlock.startIndex) + rendered + html.substring(innermostBlock.endIndex);
    iterations++;
  }
  console.log('[EditMode] Total blocks converted:', iterations);

  container.innerHTML = html;
}

/**
 * Update existing topic (edit mode)
 */
async function updateTopic() {
  // Validate form
  var topicId = editingTopicId;
  var title = document.getElementById('topicTitle').value.trim();
  var category = document.getElementById('topicCategory').value;
  var description = document.getElementById('topicDescription').value.trim();
  var order = document.getElementById('topicOrder').value || 999;
  var content = document.getElementById('contentEditor').innerHTML.trim();

  // Convert visual blocks to text markers for Google Doc
  content = convertVisualBlocksToMarkers(content);

  // Validation
  if (!title) {
    showToast('Vui l\u00f2ng nh\u1eadp ti\u00eau \u0111\u1ec1', 'error');
    document.getElementById('topicTitle').focus();
    return;
  }
  if (!category) {
    showToast('Vui l\u00f2ng ch\u1ecdn danh m\u1ee5c', 'error');
    document.getElementById('topicCategory').focus();
    return;
  }
  if (!content || content === '<br>' || content === '<p><br></p>') {
    showToast('Vui l\u00f2ng nh\u1eadp n\u1ed9i dung b\u00e0i h\u1ecdc', 'error');
    document.getElementById('contentEditor').focus();
    return;
  }

  // Confirm update
  var shouldUpdate =
    typeof window.showAppConfirm === 'function'
      ? await window.showAppConfirm(
          'B\u1ea1n c\u00f3 ch\u1eafc mu\u1ed1n c\u1eadp nh\u1eadt b\u00e0i h\u1ecdc n\u00e0y?\n\nTopic: ' + title,
          {
            title: 'X\u00e1c nh\u1eadn c\u1eadp nh\u1eadt',
            confirmText: 'C\u1eadp nh\u1eadt',
            cancelText: 'H\u1ee7y'
          }
        )
      : confirm('B\u1ea1n c\u00f3 ch\u1eafc mu\u1ed1n c\u1eadp nh\u1eadt b\u00e0i h\u1ecdc n\u00e0y?');

  if (!shouldUpdate) return;

  showTopicEditorLoading('\u0110ang c\u1eadp nh\u1eadt b\u00e0i h\u1ecdc...');

  var topicData = {
    title: title,
    description: description,
    category: category,
    order: parseInt(order),
    content: content
  };

  console.log('\ud83d\udce4 Updating topic:', topicId, topicData);

  // Check google.script.run
  if (typeof google === 'undefined' || !google.script || !google.script.run) {
    hideTopicEditorLoading();
    showToast('L\u1ed7i: Kh\u00f4ng th\u1ec3 k\u1ebft n\u1ed1i v\u1edbi server.', 'error');
    return;
  }

  var updateTimeout = setTimeout(function() {
    hideTopicEditorLoading();
    showToast('\u23f1 Qu\u00e1 th\u1eddi gian ch\u1edd (60s). Vui l\u00f2ng ki\u1ec3m tra l\u1ea1i.', 'error');
  }, 60000);

  google.script.run
    .withSuccessHandler(function(result) {
      clearTimeout(updateTimeout);
      hideTopicEditorLoading();
      console.log('\u2705 Update response:', result);

      if (result && result.success) {
        showToast('\ud83c\udf89 C\u1eadp nh\u1eadt th\u00e0nh c\u00f4ng!', 'success');

        setTimeout(function() {
          try {
            var docInfoText = '';
            if (result.docOperation === 'created' && result.contentDocId) {
              docInfoText =
                '\n\n📄 Đã tạo Google Doc mới cho topic này.' +
                '\nDoc ID: ' + result.contentDocId +
                (result.contentDocUrl ? ('\nLink: ' + result.contentDocUrl) : '');
            }

            if (typeof window.showAppAlert === 'function') {
              window.showAppAlert(
                '✅ Bài học đã được cập nhật thành công!\n\nTopic: ' + title + docInfoText,
                { title: 'Cập nhật thành công', confirmText: 'Đã hiểu' }
              ).then(function() {
                resetForm();
                goBackToAdmin();
              }).catch(function() {
                resetForm();
                goBackToAdmin();
              });
            } else {
              alert('✅ Bài học đã được cập nhật thành công!' + docInfoText);
              resetForm();
              goBackToAdmin();
            }
          } catch (e) {
            console.error('Success dialog error:', e);
            goBackToAdmin();
          }
        }, 500);
      } else {
        showToast('L\u1ed7i: ' + (result ? result.message : 'Kh\u00f4ng c\u00f3 ph\u1ea3n h\u1ed3i t\u1eeb server'), 'error');
      }
    })
    .withFailureHandler(function(error) {
      clearTimeout(updateTimeout);
      hideTopicEditorLoading();
      console.error('\u274c Update error:', error);
      var errorMsg = error && error.message ? error.message : String(error);
      showToast('L\u1ed7i: ' + errorMsg, 'error');
    })
    .updateTopicWithContent(topicId, topicData);
}

function resetForm() {
  document.getElementById('topicId').value = '';
  document.getElementById('topicTitle').value = '';
  document.getElementById('topicCategory').value = '';
  document.getElementById('topicDescription').value = '';
  document.getElementById('topicOrder').value = '';
  document.getElementById('contentEditor').innerHTML = '';

  // Reset edit mode state
  isEditMode = false;
  editingTopicId = null;
  localStorage.removeItem('editTopicId');

  // Restore create mode UI
  var titleEl = document.getElementById('topicEditorTitle');
  if (titleEl) titleEl.textContent = '\u2728 T\u1ea1o Topic m\u1edbi';

  var btnPublish = document.getElementById('btnPublish');
  var btnUpdate = document.getElementById('btnUpdate');
  if (btnPublish) btnPublish.style.display = 'inline-flex';
  if (btnUpdate) btnUpdate.style.display = 'none';

  var topicIdInput = document.getElementById('topicId');
  if (topicIdInput) {
    topicIdInput.readOnly = false;
    topicIdInput.style.opacity = '1';
    topicIdInput.style.cursor = '';
  }
  var topicIdHint = document.getElementById('topicIdEditHint');
  if (topicIdHint) topicIdHint.style.display = 'none';
}

// ========================================
// KEYBOARD SHORTCUTS
// ========================================

function setupKeyboardShortcuts() {
  document.addEventListener('keydown', function(e) {
    // Only when editor is focused
    const editor = document.getElementById('contentEditor');
    if (!editor.contains(document.activeElement) && document.activeElement !== editor) {
      return;
    }
    
    // Ctrl/Cmd + B = Bold
    if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
      e.preventDefault();
      formatText('bold');
    }
    
    // Ctrl/Cmd + I = Italic
    if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
      e.preventDefault();
      formatText('italic');
    }
    
    // Ctrl/Cmd + U = Underline
    if ((e.ctrlKey || e.metaKey) && e.key === 'u') {
      e.preventDefault();
      formatText('underline');
    }
    
    // Ctrl/Cmd + K = Insert Link
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      openLinkModal();
    }
  });
}

// ========================================
// SELECTION HELPERS
// ========================================

function saveSelection() {
  const selection = window.getSelection();
  if (selection.rangeCount > 0) {
    savedSelection = selection.getRangeAt(0).cloneRange();
  }
}

function restoreSelection() {
  const editor = document.getElementById('contentEditor');
  editor.focus();
  
  if (savedSelection) {
    const selection = window.getSelection();
    selection.removeAllRanges();
    selection.addRange(savedSelection);
  }
}

// ========================================
// UTILITY FUNCTIONS
// ========================================

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function showTopicEditorLoading(text) {
  try {
    var loadingText = document.getElementById('loadingText');
    var loadingOverlay = document.getElementById('loadingOverlay');
    if (loadingText) loadingText.textContent = text || 'Đang xử lý...';
    if (loadingOverlay) {
      loadingOverlay.classList.add('active');
      loadingOverlay.style.display = 'flex'; // Force show
      console.log('[TopicEditor] Loading shown:', text);
    }
  } catch (e) {
    console.error('showTopicEditorLoading error:', e);
  }
}

function hideTopicEditorLoading() {
  try {
    var loadingOverlay = document.getElementById('loadingOverlay');
    if (loadingOverlay) {
      loadingOverlay.classList.remove('active');
      loadingOverlay.style.display = 'none'; // Force hide
      console.log('[TopicEditor] Loading hidden');
    } else {
      console.warn('loadingOverlay element not found');
    }
  } catch (e) {
    console.error('hideTopicEditorLoading error:', e);
  }
}

function showToast(message, type) {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + (type || '');
  toast.innerHTML = message;
  container.appendChild(toast);
  
  // Auto remove after 3 seconds
  setTimeout(function() {
    toast.style.animation = 'slideIn 0.3s ease reverse';
    setTimeout(function() {
      toast.remove();
    }, 300);
  }, 3000);
}

async function goBackToAdmin() {
  // Check if there's unsaved content
  const content = document.getElementById('contentEditor').innerHTML.trim();
  if (content && content !== '<br>' && content !== '<p><br></p>') {
    const shouldLeave =
      typeof window.showAppConfirm === 'function'
        ? await window.showAppConfirm('Bạn có nội dung chưa lưu. Bạn có chắc muốn thoát?', {
            title: 'Xác nhận thoát',
            confirmText: 'Thoát',
            cancelText: 'Ở lại'
          })
        : confirm('Bạn có nội dung chưa lưu. Bạn có chắc muốn thoát?');
    if (!shouldLeave) {
      return;
    }
  }

  // Clear form when leaving
  resetForm();

  // Navigate back to Content Management page
  if (typeof showAdminPage === 'function') {
    showAdminPage('page-content-management');
    // Update active nav item
    const navItem = document.querySelector('.admin-sidebar .nav-item[data-page="page-content-management"]');
    if (navItem && typeof setActiveNavItem === 'function') {
      setActiveNavItem(navItem);
    }
  } else {
    // Fallback: try to use hash navigation
    window.location.hash = 'page-content-management';
  }
}
