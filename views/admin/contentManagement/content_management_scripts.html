<script>
// ===== Content Management Scripts - Enhanced Version =====

// State variables
let allTopics = [];
let filteredTopics = [];
let currentPage = 1;
const itemsPerPage = 10;
let topicToDelete = null;
let currentView = 'table'; // 'table' or 'cards'
let categoriesList = [];
let isDataLoaded = false; // Flag để track data đã load chưa
const TOPICS_DATA_CHANGED_KEY = 'topics_data_changed_at';
let latestTopicsLoadRequestId = 0; // Tránh race condition khi gọi load nhiều lần

// ===== Initialize =====
function initContentManagement() {
  console.log('[ContentManagement] Initializing...');

  // Khôi phục view preference TRƯỚC KHI load data (chỉ set UI, không render)
  const savedView = localStorage.getItem('cm-view-preference');
  if (savedView && (savedView === 'table' || savedView === 'cards')) {
    currentView = savedView;
    // Chỉ update UI buttons và visibility, không render content
    document.getElementById('view-table-btn').classList.toggle('active', savedView === 'table');
    document.getElementById('view-cards-btn').classList.toggle('active', savedView === 'cards');
    document.getElementById('cm-table-view').style.display = savedView === 'table' ? 'block' : 'none';
    document.getElementById('cm-cards-view').style.display = savedView === 'cards' ? 'block' : 'none';
  }

  // Setup search input events
  const searchInput = document.getElementById('cm-search-input');
  if (searchInput) {
    searchInput.addEventListener('input', function() {
      const clearBtn = document.getElementById('cm-search-clear');
      if (clearBtn) {
        clearBtn.style.display = this.value ? 'flex' : 'none';
      }
    });
  }

  // Load data - sẽ tự render khi load xong
  loadCategories();
  loadTopicsList();
}

// ===== Load Categories for Filter =====
function loadCategories() {
  google.script.run
    .withSuccessHandler(function(categories) {
      const select = document.getElementById('cm-category-filter');
      if (select && categories) {
        categoriesList = categories;
        select.innerHTML = '<option value="">Tất cả danh mục</option>';
        categories.forEach(function(cat) {
          const option = document.createElement('option');
          option.value = cat;
          option.textContent = cat;
          select.appendChild(option);
        });
        updateStats();
      }
    })
    .withFailureHandler(function(error) {
      console.error('[ContentManagement] Failed to load categories:', error);
    })
    .getTopicCategories();
}

// ===== Load Topics List =====
function loadTopicsList() {
  const requestId = ++latestTopicsLoadRequestId;
  showLoading(true);
  isDataLoaded = false;

  google.script.run
    .withSuccessHandler(function(topics) {
      // Bỏ qua response cũ để không ghi đè data mới hơn
      if (requestId !== latestTopicsLoadRequestId) return;

      allTopics = topics || [];
      filteredTopics = [...allTopics];
      currentPage = 1;
      isDataLoaded = true;
      updateStats();
      renderContent();
      showLoading(false);
      console.log('[ContentManagement] Loaded', allTopics.length, 'lessons');
    })
    .withFailureHandler(function(error) {
      // Bỏ qua lỗi của request cũ
      if (requestId !== latestTopicsLoadRequestId) return;

      console.error('[ContentManagement] Failed to load topics:', error);
      showLoading(false);

      // Giữ nguyên dữ liệu cũ nếu đang có để tránh danh sách "biến mất" khi lỗi tạm thời
      if (allTopics.length > 0) {
        isDataLoaded = true;
        renderContent();
        if (typeof showNotification === 'function') {
          showNotification('Không thể tải lại danh sách từ server. Đang giữ dữ liệu hiện tại.', 'warning');
        }
        return;
      }

      // Chỉ rỗng khi chưa từng có data
      isDataLoaded = true; // Vẫn set true để cho phép hiện empty state
      allTopics = [];
      filteredTopics = [];
      showEmptyState(true);
    })
    .getAllTopicsForAdmin();
}

// ===== Update Statistics =====
function updateStats() {
  const totalEl = document.getElementById('stat-total-topics');
  const activeEl = document.getElementById('stat-active-topics');
  const lockedEl = document.getElementById('stat-locked-topics');
  const categoriesEl = document.getElementById('stat-categories');

  const total = allTopics.length;
  const active = allTopics.filter(t => !(t.isLocked === true || t.isLocked === 'TRUE')).length;
  const locked = allTopics.filter(t => t.isLocked === true || t.isLocked === 'TRUE').length;
  const uniqueCategories = [...new Set(allTopics.map(t => t.category).filter(Boolean))];

  // Animate numbers
  animateValue(totalEl, 0, total, 500);
  animateValue(activeEl, 0, active, 500);
  animateValue(lockedEl, 0, locked, 500);
  animateValue(categoriesEl, 0, uniqueCategories.length, 500);
}

function animateValue(element, start, end, duration) {
  if (!element) return;

  const startTime = performance.now();

  function update(currentTime) {
    const elapsed = currentTime - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const easeOut = 1 - Math.pow(1 - progress, 3);
    const current = Math.floor(start + (end - start) * easeOut);
    element.textContent = current;

    if (progress < 1) {
      requestAnimationFrame(update);
    }
  }

  requestAnimationFrame(update);
}

// ===== View Toggle =====
function switchView(view, save = true) {
  currentView = view;

  // Update buttons
  const tableBtn = document.getElementById('view-table-btn');
  const cardsBtn = document.getElementById('view-cards-btn');
  const tableView = document.getElementById('cm-table-view');
  const cardsView = document.getElementById('cm-cards-view');

  if (tableBtn) tableBtn.classList.toggle('active', view === 'table');
  if (cardsBtn) cardsBtn.classList.toggle('active', view === 'cards');

  // Toggle views
  if (tableView) tableView.style.display = view === 'table' ? 'block' : 'none';
  if (cardsView) cardsView.style.display = view === 'cards' ? 'block' : 'none';

  // Save preference
  if (save) {
    localStorage.setItem('cm-view-preference', view);
  }

  // Chỉ render nếu đã có data (tránh render empty khi data chưa load)
  if (allTopics.length > 0 || filteredTopics.length > 0) {
    renderContent();
  }
}

// ===== Render Content =====
function renderContent() {
  if (currentView === 'table') {
    renderTopicsTable();
  } else {
    renderTopicsCards();
  }
}

// ===== Render Topics Table =====
function renderTopicsTable() {
  const tbody = document.getElementById('cm-topics-tbody');
  if (!tbody) return;

  // Chỉ hiển thị empty state nếu data đã load xong và thực sự rỗng
  if (filteredTopics.length === 0) {
    tbody.innerHTML = '';
    if (isDataLoaded) {
      showEmptyState(true);
    }
    const pagination = document.getElementById('cm-pagination');
    if (pagination) pagination.style.display = 'none';
    return;
  }

  showEmptyState(false);

  // Calculate pagination
  const totalPages = Math.ceil(filteredTopics.length / itemsPerPage);
  const startIndex = (currentPage - 1) * itemsPerPage;
  const endIndex = Math.min(startIndex + itemsPerPage, filteredTopics.length);
  const pageTopics = filteredTopics.slice(startIndex, endIndex);

  // Render rows with staggered animation
  tbody.innerHTML = pageTopics.map(function(topic, index) {
    const rowNum = startIndex + index + 1;
    const categoryClass = getCategoryClass(topic.category);
    const isLocked = topic.isLocked === true || topic.isLocked === 'TRUE';
    const statusClass = isLocked ? 'locked' : 'active';
    const statusText = isLocked ? 'Đang ẩn' : 'Đang hiển thị';
    const updatedAt = formatDate(topic.updatedAt);

    return `
      <tr data-topic-id="${topic.topicId}" style="animation: fadeInRow 0.3s ease ${index * 0.05}s both;">
        <td><strong>${rowNum}</strong></td>
        <td>
          <div class="topic-info">
            <div class="topic-icon">
              ${topic.iconUrl
                ? `<img src="${topic.iconUrl}" alt="${topic.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                   <span class="material-symbols-sharp" style="display: none;">article</span>`
                : '<span class="material-symbols-sharp">article</span>'
              }
            </div>
            <div class="topic-details">
              <h4>${escapeHtml(topic.title)}</h4>
              <p title="${escapeHtml(topic.description || '')}">
                ${escapeHtml(topic.description || 'Chưa có mô tả')}
              </p>
            </div>
          </div>
        </td>
        <td>
          <span class="category-badge ${categoryClass}">${escapeHtml(topic.category || 'Chưa phân loại')}</span>
        </td>
        <td>
          <span class="time-badge">
            <span class="material-symbols-sharp">schedule</span>
            ${topic.estimatedTime || '-'}
          </span>
        </td>
        <td>
          <span class="status-badge ${statusClass}">${statusText}</span>
        </td>
        <td>${updatedAt}</td>
        <td>
          <div class="action-buttons">
            <button class="action-btn view" title="Xem trước" onclick="viewTopic('${topic.topicId}')">
              <span class="material-symbols-sharp">visibility</span>
            </button>
            <button class="action-btn edit" title="Chỉnh sửa" onclick="editTopic('${topic.topicId}')">
              <span class="material-symbols-sharp">edit</span>
            </button>
            <button class="action-btn delete" title="Xóa" onclick="deleteTopic('${topic.topicId}', '${escapeHtml(topic.title).replace(/'/g, "\\'")}')">
              <span class="material-symbols-sharp">delete</span>
            </button>
          </div>
        </td>
      </tr>
    `;
  }).join('');

  // Add animation keyframes if not exists
  if (!document.getElementById('cm-animations')) {
    const style = document.createElement('style');
    style.id = 'cm-animations';
    style.textContent = `
      @keyframes fadeInRow {
        from { opacity: 0; transform: translateX(-10px); }
        to { opacity: 1; transform: translateX(0); }
      }
      @keyframes fadeInCard {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
    `;
    document.head.appendChild(style);
  }

  // Render pagination
  renderPagination(totalPages, startIndex + 1, endIndex, filteredTopics.length);
}

// ===== Render Topics Cards =====
function renderTopicsCards() {
  const grid = document.getElementById('cm-cards-grid');
  if (!grid) return;

  // Chỉ hiển thị empty state nếu data đã load xong và thực sự rỗng
  if (filteredTopics.length === 0) {
    grid.innerHTML = '';
    if (isDataLoaded) {
      showEmptyState(true);
    }
    const pagination = document.getElementById('cm-pagination');
    if (pagination) pagination.style.display = 'none';
    return;
  }

  showEmptyState(false);

  // Calculate pagination
  const totalPages = Math.ceil(filteredTopics.length / itemsPerPage);
  const startIndex = (currentPage - 1) * itemsPerPage;
  const endIndex = Math.min(startIndex + itemsPerPage, filteredTopics.length);
  const pageTopics = filteredTopics.slice(startIndex, endIndex);

  // Render cards
  grid.innerHTML = pageTopics.map(function(topic, index) {
    const categoryClass = getCategoryClass(topic.category);
    const isLocked = topic.isLocked === true || topic.isLocked === 'TRUE';
    const statusClass = isLocked ? 'locked' : 'active';
    const statusText = isLocked ? 'Đang ẩn' : 'Đang hiển thị';
    const updatedAt = formatDate(topic.updatedAt);

    return `
      <div class="cm-topic-card" data-topic-id="${topic.topicId}" style="animation: fadeInCard 0.4s ease ${index * 0.08}s both;">
        <div class="cm-card-header">
          <div class="cm-card-icon">
            ${topic.iconUrl
              ? `<img src="${topic.iconUrl}" alt="${topic.title}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                 <span class="material-symbols-sharp" style="display: none;">article</span>`
              : '<span class="material-symbols-sharp">article</span>'
            }
          </div>
          <div class="cm-card-title-wrapper">
            <h4 class="cm-card-title" title="${escapeHtml(topic.title)}">${escapeHtml(topic.title)}</h4>
            <p class="cm-card-desc">${escapeHtml(topic.description || 'Chưa có mô tả')}</p>
          </div>
        </div>

        <div class="cm-card-meta">
          <span class="category-badge ${categoryClass}">${escapeHtml(topic.category || 'Chưa phân loại')}</span>
          <span class="status-badge ${statusClass}">${statusText}</span>
          ${topic.estimatedTime ? `
            <span class="time-badge">
              <span class="material-symbols-sharp">schedule</span>
              ${topic.estimatedTime}
            </span>
          ` : ''}
        </div>

        <div class="cm-card-footer">
          <span class="cm-card-date">
            <span class="material-symbols-sharp">update</span>
            ${updatedAt}
          </span>
          <div class="action-buttons">
            <button class="action-btn view" title="Xem trước" onclick="viewTopic('${topic.topicId}')">
              <span class="material-symbols-sharp">visibility</span>
            </button>
            <button class="action-btn edit" title="Chỉnh sửa" onclick="editTopic('${topic.topicId}')">
              <span class="material-symbols-sharp">edit</span>
            </button>
            <button class="action-btn delete" title="Xóa" onclick="deleteTopic('${topic.topicId}', '${escapeHtml(topic.title).replace(/'/g, "\\'")}')">
              <span class="material-symbols-sharp">delete</span>
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  // Render pagination
  renderPagination(totalPages, startIndex + 1, endIndex, filteredTopics.length);
}

// ===== Pagination =====
function renderPagination(totalPages, start, end, total) {
  const pagination = document.getElementById('cm-pagination');
  const controls = document.getElementById('cm-pagination-controls');

  if (total <= itemsPerPage) {
    pagination.style.display = 'none';
    return;
  }

  pagination.style.display = 'flex';
  document.getElementById('cm-showing-start').textContent = start;
  document.getElementById('cm-showing-end').textContent = end;
  document.getElementById('cm-total-count').textContent = total;

  let html = '';

  // Previous button
  html += `
    <button class="cm-page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">
      <span class="material-symbols-sharp">chevron_left</span>
    </button>
  `;

  // Page numbers
  const maxVisiblePages = 5;
  let startPage = Math.max(1, currentPage - Math.floor(maxVisiblePages / 2));
  let endPage = Math.min(totalPages, startPage + maxVisiblePages - 1);

  if (endPage - startPage < maxVisiblePages - 1) {
    startPage = Math.max(1, endPage - maxVisiblePages + 1);
  }

  if (startPage > 1) {
    html += `<button class="cm-page-btn" onclick="goToPage(1)">1</button>`;
    if (startPage > 2) {
      html += `<span style="padding: 0 8px; color: var(--text-muted);">...</span>`;
    }
  }

  for (let i = startPage; i <= endPage; i++) {
    html += `
      <button class="cm-page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">
        ${i}
      </button>
    `;
  }

  if (endPage < totalPages) {
    if (endPage < totalPages - 1) {
      html += `<span style="padding: 0 8px; color: var(--text-muted);">...</span>`;
    }
    html += `<button class="cm-page-btn" onclick="goToPage(${totalPages})">${totalPages}</button>`;
  }

  // Next button
  html += `
    <button class="cm-page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">
      <span class="material-symbols-sharp">chevron_right</span>
    </button>
  `;

  controls.innerHTML = html;
}

function goToPage(page) {
  currentPage = page;
  renderContent();
  // Smooth scroll to top of content
  const wrapper = document.querySelector('.cm-content-wrapper, .cm-cards-container');
  if (wrapper) {
    wrapper.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

// ===== Search & Filter =====
function handleSearchTopics() {
  const searchTerm = document.getElementById('cm-search-input').value.toLowerCase().trim();
  applyFilters(searchTerm);
}

function handleFilterChange() {
  const searchTerm = document.getElementById('cm-search-input').value.toLowerCase().trim();
  applyFilters(searchTerm);
}

function clearSearch() {
  const input = document.getElementById('cm-search-input');
  input.value = '';
  document.getElementById('cm-search-clear').style.display = 'none';
  applyFilters('');
}

function applyFilters(searchTerm) {
  const categoryFilter = document.getElementById('cm-category-filter').value;
  const statusFilter = document.getElementById('cm-status-filter').value;

  filteredTopics = allTopics.filter(function(topic) {
    // Search filter
    const matchesSearch = !searchTerm ||
      (topic.title && topic.title.toLowerCase().includes(searchTerm)) ||
      (topic.topicId && topic.topicId.toLowerCase().includes(searchTerm)) ||
      (topic.description && topic.description.toLowerCase().includes(searchTerm));

    // Category filter
    const matchesCategory = !categoryFilter || topic.category === categoryFilter;

    // Status filter
    const isLocked = topic.isLocked === true || topic.isLocked === 'TRUE';
    const matchesStatus = !statusFilter ||
      (statusFilter === 'active' && !isLocked) ||
      (statusFilter === 'locked' && isLocked);

    return matchesSearch && matchesCategory && matchesStatus;
  });

  currentPage = 1;
  renderContent();
}

// ===== Topic Actions =====

// View topic - Load and display doc content
function viewTopic(topicId) {
  const topic = allTopics.find(function(t) { return t.topicId === topicId; });
  if (!topic) return;

  document.getElementById('preview-topic-title').textContent = topic.title;
  document.getElementById('preview-topic-content').innerHTML = `
    <div class="cm-loading">
      <div class="cm-loading-spinner">
        <div class="spinner-ring" style="border-right-color: #6366f1;"></div>
        <div class="spinner-ring" style="border-right-color: #8b5cf6;"></div>
        <div class="spinner-ring" style="border-right-color: #4f46e5;"></div>
      </div>
      <p style="margin-top: 20px; color: rgba(255,255,255,0.6);">Đang tải nội dung bài học...</p>
    </div>
  `;
  document.getElementById('cm-preview-overlay').classList.add('active');

  // Check if topic has contentDocId
  if (!topic.contentDocId) {
    document.getElementById('preview-topic-content').innerHTML = `
      <div class="cm-preview-empty">
        <div class="cm-preview-empty-icon">
          <span class="material-symbols-sharp">description</span>
        </div>
        <h4>Chưa có nội dung</h4>
        <p>Bài học này chưa được liên kết với tài liệu Google Doc.</p>
        ${topic.contentDocUrl ? `
          <a href="${topic.contentDocUrl}" target="_blank" class="cm-btn cm-btn-primary" style="margin-top: 16px;">
            <span class="material-symbols-sharp">edit_document</span>
            Mở Google Doc
          </a>
        ` : ''}
      </div>
    `;
    return;
  }

  // Load doc content from server
  google.script.run
    .withSuccessHandler(function(response) {
      if (response && response.success && response.content) {
        // CLEAN CONTENT: Strip inline styles from Google Doc HTML
        const cleanHtml = stripInlineStyles(response.content);
        
        // RENDER: Convert markers to high-fidelity blocks
        const finalHtml = renderBlockMarkersAsClient(cleanHtml);
        
        document.getElementById('preview-topic-content').innerHTML = finalHtml;
      } else {
        document.getElementById('preview-topic-content').innerHTML = `
          <div class="cm-preview-empty">
            <div class="cm-preview-empty-icon error">
              <span class="material-symbols-sharp">error</span>
            </div>
            <h4>Không thể tải nội dung</h4>
            <p>${response?.message || 'Đã xảy ra lỗi khi tải nội dung bài học.'}</p>
            <button class="cm-btn cm-btn-secondary" onclick="viewTopic('${topicId}')" style="margin-top: 16px; color: #fff; border-color: #fff;">
              <span class="material-symbols-sharp">refresh</span>
              Thử lại
            </button>
          </div>
        `;
      }
    })
    .withFailureHandler(function(error) {
      console.error('[ContentManagement] Failed to load topic content:', error);
      document.getElementById('preview-topic-content').innerHTML = `
        <div class="cm-preview-empty">
          <div class="cm-preview-empty-icon error">
            <span class="material-symbols-sharp">error</span>
          </div>
          <h4>Lỗi tải nội dung</h4>
          <p>${error?.message || 'Không thể kết nối với server.'}</p>
          <button class="cm-btn cm-btn-secondary" onclick="viewTopic('${topicId}')" style="margin-top: 16px; color: #fff; border-color: #fff;">
            <span class="material-symbols-sharp">refresh</span>
            Thử lại
          </button>
        </div>
      `;
    })
    .getTopicContentByDocId(topic.contentDocId);
}

function closeContentPreviewModal() {
  document.getElementById('cm-preview-overlay').classList.remove('active');
}

/**
 * Strip inline styles from HTML (color, background, font-family)
 * Prevents light theme styles from breaking dark theme preview
 */
function stripInlineStyles(html) {
  const temp = document.createElement('div');
  temp.innerHTML = html;
  const elements = temp.querySelectorAll('[style]');
  elements.forEach(el => {
    el.style.color = '';
    el.style.backgroundColor = '';
    el.style.background = '';
    el.style.fontFamily = '';
  });
  return temp.innerHTML;
}

/**
 * Render block markers into client-matching HTML
 * High-fidelity rendering matching the topic editor preview
 */
function renderBlockMarkersAsClient(html) {
  let result = html;
  
  // Basic normalization
  result = result.replace(/&#91;/g, '[').replace(/&#93;/g, ']');
  result = result.replace(/&lbrack;/g, '[').replace(/&rbrack;/g, ']');
  result = result.replace(/\[\[\s+/g, '[[').replace(/\s+\]\]/g, ']]');

  function findInnermostBlock(text) {
    let bestMatch = null;
    let bestIndex = -1;
    const openingRegex = /\[\[(NOTE|TIP|WARNING|HIGHLIGHT|EXAMPLE|CHECKPOINT|TASK|QA|RESOURCES|TERMINAL(?::\w*)?|GRID|CMD|OUTPUT|CODE:\w+|FIGURE:[^\]]*|COLOR:\w+)\]\]/gi;
    let match;
    while ((match = openingRegex.exec(text)) !== null) {
      const openTag = match[0];
      const openIndex = match.index;
      const tagInfo = match[1];
      const tagType = tagInfo.split(':')[0].toUpperCase();
      const closeRegex = new RegExp('\\[\\[\\/' + tagType + '\\]\\]', 'gi');
      closeRegex.lastIndex = openIndex + openTag.length;
      const closeMatch = closeRegex.exec(text);
      if (closeMatch) {
        const closeIndex = closeMatch.index;
        const content = text.substring(openIndex + openTag.length, closeIndex);
        const hasNested = /\[\[(NOTE|TIP|WARNING|HIGHLIGHT|EXAMPLE|CHECKPOINT|TASK|QA|RESOURCES|TERMINAL(?::\w*)?|GRID|CMD|OUTPUT|CODE:\w+|FIGURE:[^\]]*|COLOR:\w+)\]\]/i.test(content);
        if (!hasNested) {
          if (bestMatch === null || openIndex < bestIndex) {
            bestMatch = {
              fullMatch: text.substring(openIndex, closeIndex + closeMatch[0].length),
              openTag, closeTag: closeMatch[0], tagInfo, tagType, content,
              startIndex: openIndex, endIndex: closeIndex + closeMatch[0].length
            };
            bestIndex = openIndex;
          }
        }
      }
    }
    return bestMatch;
  }

  function renderSingleBlock(blockInfo) {
    const { tagType, tagInfo, content } = blockInfo;

    if (tagType === 'COLOR') {
      const color = tagInfo.split(':')[1] || 'BLUE';
      const colorMap = {
        ORANGE: 'lesson-section-orange', RED: 'lesson-section-red',
        BLUE: 'lesson-section-blue', GREEN: 'lesson-section-green',
        PURPLE: 'lesson-section-purple', CYAN: 'lesson-section-cyan'
      };
      const className = colorMap[color.toUpperCase()] || 'lesson-section-blue';
      return '<div class="' + className + '">' + content + '</div>';
    }

    if (tagType === 'CODE') {
      const lang = tagInfo.split(':')[1] || 'TEXT';
      let cleanCode = content
        .trim()
        .replace(/<\/p>/gi, '\n').replace(/<br\s*\/?>/gi, '\n').replace(/<\/div>/gi, '\n')
        .replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')
        .replace(/^\n+|\n+$/g, '');
      return '<div class="code-block-wrapper">' +
        '<div class="code-block-header">' +
          '<span class="code-block-lang">' + lang.toUpperCase() + '</span>' +
          '<div class="code-block-actions">' +
            '<button class="btn-copy-code" onclick="copyPreviewCode(this)">📋 Copy</button>' +
          '</div>' +
        '</div>' +
        '<pre><code class="language-' + lang.toLowerCase() + '">' + escapeHtml(cleanCode) + '</code></pre>' +
      '</div>';
    }

    if (tagType === 'EXAMPLE') {
      return '<div class="example-block">' + content + '</div>';
    }

    var calloutTypes = {
      'NOTE': 'callout-note', 'TIP': 'callout-tip', 'WARNING': 'callout-warning',
      'CHECKPOINT': 'callout-checkpoint', 'TASK': 'callout-task',
      'QA': 'callout-qa', 'HIGHLIGHT': 'callout-highlight'
    };
    if (calloutTypes[tagType]) {
      return '<div class="' + calloutTypes[tagType] + '">' + content + '</div>';
    }

    if (tagType === 'RESOURCES') {
      return '<div class="resource-links">' + content + '</div>';
    }

    if (tagType === 'FIGURE') {
      const caption = tagInfo.split(':').slice(1).join(':') || '';
      return '<figure>' + content + '<figcaption>' + caption + '</figcaption></figure>';
    }

    if (tagType === 'GRID') {
      return '<div class="grid-cards-section">' + content + '</div>';
    }

    if (tagType === 'TERMINAL') {
      let cleanContent = content
        .trim()
        .replace(/<\/p>/gi, '\n').replace(/<br\s*\/?>/gi, '\n').replace(/<\/div>/gi, '\n')
        .replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')
        .replace(/^\n+|\n+$/g, '');
      return '<div class="terminal-block">' +
        '<div class="terminal-header">' +
          '<div class="terminal-dots"><span class="terminal-dot red"></span><span class="terminal-dot yellow"></span><span class="terminal-dot green"></span></div>' +
          '<span class="terminal-title">Terminal</span>' +
        '</div>' +
        '<pre class="terminal-body"><code>' + escapeHtml(cleanContent) + '</code></pre>' +
      '</div>';
    }

    if (tagType === 'CMD') {
      let cleanContent = content
        .trim()
        .replace(/<\/p>/gi, '\n').replace(/<br\s*\/?>/gi, '\n').replace(/<\/div>/gi, '\n')
        .replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')
        .replace(/^\n+|\n+$/g, '');
      return '<div class="cmd-block"><pre class="cmd-body"><code>' + escapeHtml(cleanContent) + '</code></pre></div>';
    }

    if (tagType === 'OUTPUT') {
      let cleanContent = content
        .trim()
        .replace(/<\/p>/gi, '\n').replace(/<br\s*\/?>/gi, '\n').replace(/<\/div>/gi, '\n')
        .replace(/<[^>]*>/g, '').replace(/&nbsp;/g, ' ')
        .replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&amp;/g, '&')
        .replace(/^\n+|\n+$/g, '');
      return '<div class="output-block"><pre class="output-body"><code>' + escapeHtml(cleanContent) + '</code></pre></div>';
    }

    return content;
  }

  let maxIterations = 200;
  let iterations = 0;
  while (iterations < maxIterations) {
    const innermostBlock = findInnermostBlock(result);
    if (!innermostBlock) break;
    const renderedHtml = renderSingleBlock(innermostBlock);
    result = result.substring(0, innermostBlock.startIndex) + renderedHtml + result.substring(innermostBlock.endIndex);
    iterations++;
  }

  return result;
}

/**
 * Copy code from preview block
 */
function copyPreviewCode(btn) {
  const wrapper = btn.closest('.code-block-wrapper, .terminal-block');
  const codeEl = wrapper.querySelector('code');
  const text = codeEl.textContent;

  navigator.clipboard.writeText(text).then(() => {
    const originalContent = btn.innerHTML;
    btn.innerHTML = '✅ Copied!';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = originalContent;
      btn.classList.remove('copied');
    }, 2000);
  });
}

// Edit topic
function editTopic(topicId) {
  console.log('[ContentManagement] Edit topic:', topicId);
  localStorage.setItem('editTopicId', topicId);
  showAdminPage('page-topic-editor');
}

// Delete topic
function deleteTopic(topicId, topicTitle) {
  topicToDelete = topicId;
  document.getElementById('delete-topic-name').textContent = topicTitle;
  document.getElementById('cm-delete-modal').style.display = 'flex';
}

function closeDeleteModal() {
  document.getElementById('cm-delete-modal').style.display = 'none';
  topicToDelete = null;
}

function confirmDeleteTopic() {
  if (!topicToDelete) return;
  const deletingTopicId = topicToDelete;

  const deleteBtn = document.querySelector('.cm-btn-danger');
  const originalBtnHtml = deleteBtn.innerHTML;
  deleteBtn.disabled = true;
  deleteBtn.innerHTML = '<span class="material-symbols-sharp">hourglass_empty</span> Đang xóa...';

  // Gọi API xóa topic và document
  google.script.run
    .withSuccessHandler(function(result) {
      deleteBtn.disabled = false;
      deleteBtn.innerHTML = originalBtnHtml;
      closeDeleteModal();

      if (result && result.success) {
        // Đồng bộ cache giữa các page để buộc Topics page reload từ DB
        markTopicsDataChanged();
        if (window.globalTopicsCache) {
          window.globalTopicsCache.data = null;
          window.globalTopicsCache.progress = null;
          window.globalTopicsCache.lastLoadTime = 0;
        }

        // Reload lại data từ server để UI luôn khớp DB
        loadTopicsList();

        // Hiển thị thông báo thành công
        if (typeof showNotification === 'function') {
          showNotification(result.message || 'Đã xóa bài học thành công!', 'success');
        } else {
          alert(result.message || 'Đã xóa bài học thành công!');
        }

        // Log nếu doc cũng bị xóa
        if (result.docDeleted) {
          console.log('[ContentManagement] Document cũng đã được chuyển vào thùng rác');
        }
      } else {
        // Hiển thị lỗi
        if (typeof showNotification === 'function') {
          showNotification(result?.message || 'Không thể xóa bài học', 'error');
        } else {
          alert(result?.message || 'Không thể xóa bài học');
        }
      }

      topicToDelete = null;
    })
    .withFailureHandler(function(error) {
      deleteBtn.disabled = false;
      deleteBtn.innerHTML = originalBtnHtml;
      closeDeleteModal();

      console.error('[ContentManagement] Delete failed:', error);
      if (typeof showNotification === 'function') {
        showNotification('Lỗi khi xóa bài học: ' + (error?.message || error), 'error');
      } else {
        alert('Lỗi khi xóa bài học: ' + (error?.message || error));
      }

      topicToDelete = null;
    })
    .deleteTopicWithDoc(deletingTopicId);
}

// ===== Navigate to Create Topic =====
function goToCreateTopic() {
  localStorage.removeItem('editTopicId');
  showAdminPage('page-topic-editor');
}

// ===== Refresh =====
function refreshTopicsList(e) {
  const searchInput = document.getElementById('cm-search-input');
  const searchClear = document.getElementById('cm-search-clear');
  const categoryFilter = document.getElementById('cm-category-filter');
  const statusFilter = document.getElementById('cm-status-filter');

  if (searchInput) searchInput.value = '';
  if (searchClear) searchClear.style.display = 'none';
  if (categoryFilter) categoryFilter.value = '';
  if (statusFilter) statusFilter.value = '';

  // Add rotation animation to refresh button
  const refreshBtn = e ? e.currentTarget : null;
  if (refreshBtn) {
    const icon = refreshBtn.querySelector('.material-symbols-sharp');
    if (icon) {
      icon.style.animation = 'spin 0.5s ease';
      setTimeout(() => {
        icon.style.animation = '';
      }, 500);
    }
  }

  // Reset flag và load lại data
  isDataLoaded = false;
  loadTopicsList();
}

// ===== Helper Functions =====
function showLoading(show) {
  const loadingEl = document.getElementById('cm-loading-state');

  if (show) {
    loadingEl.style.display = 'flex';
  } else {
    loadingEl.style.display = 'none';
  }
}

function showEmptyState(show) {
  const emptyEl = document.getElementById('cm-empty-state');
  emptyEl.style.display = show ? 'flex' : 'none';
}

function getCategoryClass(category) {
  if (!category) return '';
  const lowerCat = category.toLowerCase();
  if (lowerCat.includes('javascript') || lowerCat.includes('js')) return 'javascript';
  if (lowerCat.includes('python')) return 'python';
  if (lowerCat.includes('html') || lowerCat.includes('css')) return 'html-css';
  return '';
}

function formatDate(dateStr) {
  if (!dateStr) return '-';
  try {
    const date = new Date(dateStr);
    return date.toLocaleDateString('vi-VN', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric'
    });
  } catch (e) {
    return dateStr;
  }
}

function escapeHtml(text) {
  if (!text) return '';
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function markTopicsDataChanged() {
  try {
    localStorage.setItem(TOPICS_DATA_CHANGED_KEY, String(Date.now()));
  } catch (e) {
    console.warn('[ContentManagement] Could not persist topics changed marker:', e);
  }
}

// ===== Parse Content Markers for Preview (Legacy) =====
// This logic is now handled by renderBlockMarkersAsClient but kept for safety if any direct calls exist
function parseContentMarkersForPreview(container) {
  const html = container.innerHTML;
  container.innerHTML = renderBlockMarkersAsClient(html);
}

window.initcontentmanagement = initContentManagement;
