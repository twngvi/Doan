<style>
/* ===== Content Management Styles ===== */

.content-management-container {
  padding: 24px;
  max-width: 1400px;
  margin: 0 auto;
}

.content-management-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
  flex-wrap: wrap;
  gap: 16px;
}

.content-management-header h2 {
  font-size: 24px;
  font-weight: 600;
  color: var(--text-primary, #1a1a2e);
  margin: 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.content-management-header h2 .material-symbols-sharp {
  font-size: 28px;
  color: var(--primary-color, #6366f1);
}

/* ===== Toolbar ===== */
.cm-toolbar {
  display: flex;
  gap: 12px;
  align-items: center;
  flex-wrap: wrap;
  margin-bottom: 20px;
  padding: 16px;
  background: var(--card-bg, #ffffff);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
}

.cm-search-box {
  position: relative;
  flex: 1;
  min-width: 250px;
  max-width: 400px;
}

.cm-search-box input {
  width: 100%;
  padding: 10px 14px 10px 42px;
  border: 1px solid var(--border-color, #e2e8f0);
  border-radius: 8px;
  font-size: 14px;
  transition: all 0.2s ease;
  background: var(--input-bg, #f8fafc);
}

.cm-search-box input:focus {
  outline: none;
  border-color: var(--primary-color, #6366f1);
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
  background: #fff;
}

.cm-search-box .search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted, #94a3b8);
  font-size: 20px;
}

.cm-filter-select {
  padding: 10px 14px;
  border: 1px solid var(--border-color, #e2e8f0);
  border-radius: 8px;
  font-size: 14px;
  background: var(--input-bg, #f8fafc);
  cursor: pointer;
  min-width: 160px;
}

.cm-filter-select:focus {
  outline: none;
  border-color: var(--primary-color, #6366f1);
}

.cm-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s ease;
}

.cm-btn-primary {
  background: var(--primary-color, #6366f1);
  color: #fff;
}

.cm-btn-primary:hover {
  background: var(--primary-hover, #4f46e5);
  transform: translateY(-1px);
}

.cm-btn-secondary {
  background: var(--secondary-bg, #f1f5f9);
  color: var(--text-primary, #1a1a2e);
}

.cm-btn-secondary:hover {
  background: var(--secondary-hover, #e2e8f0);
}

.cm-btn .material-symbols-sharp {
  font-size: 18px;
}

/* ===== Topics Table ===== */
.cm-table-wrapper {
  background: var(--card-bg, #ffffff);
  border-radius: 12px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  overflow: hidden;
}

.cm-table {
  width: 100%;
  border-collapse: collapse;
}

.cm-table th,
.cm-table td {
  padding: 14px 16px;
  text-align: left;
  border-bottom: 1px solid var(--border-color, #e2e8f0);
}

.cm-table th {
  background: var(--table-header-bg, #f8fafc);
  font-weight: 600;
  font-size: 13px;
  color: var(--text-muted, #64748b);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.cm-table tbody tr {
  transition: background 0.15s ease;
}

.cm-table tbody tr:hover {
  background: var(--row-hover, #f8fafc);
}

.cm-table tbody tr:last-child td {
  border-bottom: none;
}

/* Topic Info Cell */
.topic-info {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topic-icon {
  width: 40px;
  height: 40px;
  border-radius: 8px;
  background: var(--icon-bg, #e0e7ff);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.topic-icon img {
  width: 24px;
  height: 24px;
  object-fit: contain;
}

.topic-icon .material-symbols-sharp {
  font-size: 22px;
  color: var(--primary-color, #6366f1);
}

.topic-details h4 {
  margin: 0 0 4px 0;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-primary, #1a1a2e);
}

.topic-details p {
  margin: 0;
  font-size: 12px;
  color: var(--text-muted, #94a3b8);
  max-width: 300px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Category Badge */
.category-badge {
  display: inline-block;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  background: var(--badge-bg, #e0e7ff);
  color: var(--badge-text, #4338ca);
}

.category-badge.javascript {
  background: #fef3c7;
  color: #92400e;
}

.category-badge.python {
  background: #d1fae5;
  color: #065f46;
}

.category-badge.html-css {
  background: #fee2e2;
  color: #991b1b;
}

/* Status Badge */
.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
}

.status-badge.active {
  background: #d1fae5;
  color: #065f46;
}

.status-badge.locked {
  background: #fee2e2;
  color: #991b1b;
}

.status-badge::before {
  content: '';
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: currentColor;
}

/* Action Buttons */
.action-buttons {
  display: flex;
  gap: 8px;
}

.action-btn {
  width: 34px;
  height: 34px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s ease;
  background: var(--action-bg, #f1f5f9);
  color: var(--text-muted, #64748b);
}

.action-btn:hover {
  transform: translateY(-2px);
}

.action-btn.view:hover {
  background: #dbeafe;
  color: #1d4ed8;
}

.action-btn.edit:hover {
  background: #fef3c7;
  color: #92400e;
}

.action-btn.delete:hover {
  background: #fee2e2;
  color: #dc2626;
}

.action-btn .material-symbols-sharp {
  font-size: 18px;
}

/* ===== Pagination ===== */
.cm-pagination {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px;
  border-top: 1px solid var(--border-color, #e2e8f0);
  background: var(--card-bg, #ffffff);
}

.cm-pagination-info {
  font-size: 14px;
  color: var(--text-muted, #64748b);
}

.cm-pagination-controls {
  display: flex;
  gap: 4px;
}

.cm-page-btn {
  width: 36px;
  height: 36px;
  border: 1px solid var(--border-color, #e2e8f0);
  border-radius: 8px;
  background: #fff;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: var(--text-primary, #1a1a2e);
  transition: all 0.2s ease;
}

.cm-page-btn:hover:not(:disabled) {
  border-color: var(--primary-color, #6366f1);
  color: var(--primary-color, #6366f1);
}

.cm-page-btn.active {
  background: var(--primary-color, #6366f1);
  color: #fff;
  border-color: var(--primary-color, #6366f1);
}

.cm-page-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ===== Loading State ===== */
.cm-loading {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-muted, #64748b);
}

.cm-loading .spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border-color, #e2e8f0);
  border-top-color: var(--primary-color, #6366f1);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.cm-loading p {
  margin-top: 16px;
  font-size: 14px;
}

/* ===== Empty State ===== */
.cm-empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  color: var(--text-muted, #64748b);
}

.cm-empty-state .material-symbols-sharp {
  font-size: 64px;
  color: var(--border-color, #e2e8f0);
  margin-bottom: 16px;
}

.cm-empty-state h3 {
  margin: 0 0 8px 0;
  font-size: 18px;
  color: var(--text-primary, #1a1a2e);
}

.cm-empty-state p {
  margin: 0;
  font-size: 14px;
}

/* ===== Responsive ===== */
@media (max-width: 1024px) {
  .cm-table th:nth-child(4),
  .cm-table td:nth-child(4),
  .cm-table th:nth-child(5),
  .cm-table td:nth-child(5) {
    display: none;
  }
}

@media (max-width: 768px) {
  .content-management-container {
    padding: 16px;
  }

  .cm-toolbar {
    flex-direction: column;
    align-items: stretch;
  }

  .cm-search-box {
    max-width: none;
  }

  .cm-table th:nth-child(3),
  .cm-table td:nth-child(3) {
    display: none;
  }
}
</style>
