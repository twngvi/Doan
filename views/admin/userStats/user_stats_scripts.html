<!-- User Statistics Page Scripts -->
<script>
  // ========================================
  // USER STATS PAGE CONTROLLER
  // ========================================

  let userStatsState = {
    users: [],
    filteredUsers: [],
    selectedUserId: null,
    selectedLessonByUser: {},
    searchQuery: '',
    sortBy: 'progress-desc',
    initialized: false,
  };

  function initUserStatsPage() {
    if (!userStatsState.initialized) {
      bindUserStatsEvents();
      userStatsState.initialized = true;
    }

    loadUserStatsData();
    setTimeout(consumePendingAdminUserStatsSearchTarget, 0);
  }

  // Compatible with current dynamic init resolver in admin sidebar scripts.
  window.inituserstats = initUserStatsPage;

  function bindUserStatsEvents() {
    const searchInput = document.getElementById('userStatsSearchInput');
    const sortSelect = document.getElementById('userStatsSortSelect');
    const refreshBtn = document.getElementById('userStatsRefreshBtn');
    const topicHistoryCloseBtn = document.getElementById('userStatsTopicHistoryCloseBtn');
    const topicHistoryBackdrop = document.getElementById('userStatsTopicHistoryBackdrop');
    const attemptDetailCloseBtn = document.getElementById('userStatsAttemptDetailCloseBtn');
    const attemptDetailBackdrop = document.getElementById('userStatsAttemptDetailBackdrop');

    if (searchInput) {
      searchInput.addEventListener('input', debounce((event) => {
        userStatsState.searchQuery = String(event.target.value || '').trim().toLowerCase();
        applyUserStatsFilters();
      }, 250));
    }

    if (sortSelect) {
      sortSelect.addEventListener('change', (event) => {
        userStatsState.sortBy = event.target.value;
        applyUserStatsFilters();
      });
    }

    if (refreshBtn) {
      refreshBtn.addEventListener('click', loadUserStatsData);
    }

    if (topicHistoryCloseBtn) {
      topicHistoryCloseBtn.addEventListener('click', closeTopicLearningHistoryModal);
    }

    if (topicHistoryBackdrop) {
      topicHistoryBackdrop.addEventListener('click', closeTopicLearningHistoryModal);
    }

    if (attemptDetailCloseBtn) {
      attemptDetailCloseBtn.addEventListener('click', closeAttemptDetailModal);
    }

    if (attemptDetailBackdrop) {
      attemptDetailBackdrop.addEventListener('click', closeAttemptDetailModal);
    }

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        const attemptDetailModal = document.getElementById('userStatsAttemptDetailModal');
        if (attemptDetailModal && attemptDetailModal.style.display !== 'none') {
          closeAttemptDetailModal();
          return;
        }
        closeTopicLearningHistoryModal();
      }
    });
  }

  async function loadUserStatsData() {
    showUserStatsLoading(true);

    try {
      const result = await getUserStatsFromServer();
      const users = (result && result.success && Array.isArray(result.data)) ? result.data : [];

      userStatsState.users = users;
      userStatsState.filteredUsers = users.slice();
      window.__adminUserStatsSearchCache = users.map((user) => ({
        id: String(user && (user.id || user.userId || user.email) || ''),
        name: String(user && (user.name || user.displayName || user.email || user.id) || ''),
        email: String(user && user.email || ''),
      }));
      window.dispatchEvent(new CustomEvent('admin-user-stats-cache-updated'));
      if (!users.find((user) => user.id === userStatsState.selectedUserId)) {
        userStatsState.selectedUserId = null;
      }

      applyUserStatsFilters();
      consumePendingAdminUserStatsSearchTarget();
    } catch (error) {
      console.error('loadUserStatsData error:', error);
      userStatsState.users = [];
      userStatsState.filteredUsers = [];
      window.__adminUserStatsSearchCache = [];
      renderUserList();
      renderUserDetail(null);
    } finally {
      showUserStatsLoading(false);
    }
  }

  async function getUserStatsFromServer() {
    if (typeof callAppsScript === 'function') {
      return callAppsScript('getAdminUserLearningStats');
    }

    // Fallback mock data for UI testing when server API is not wired yet.
    return Promise.resolve({
      success: true,
      data: buildUserStatsMockData(),
    });
  }

  function applyUserStatsFilters() {
    const query = userStatsState.searchQuery;
    const sortBy = userStatsState.sortBy;

    let users = userStatsState.users.filter((user) => {
      if (!query) return true;
      const name = String(user.name || '').toLowerCase();
      const email = String(user.email || '').toLowerCase();
      return name.includes(query) || email.includes(query);
    });

    users.sort((a, b) => compareUserStats(a, b, sortBy));

    userStatsState.filteredUsers = users;

    if (!userStatsState.selectedUserId && users.length > 0) {
      userStatsState.selectedUserId = users[0].id;
    }

    if (userStatsState.selectedUserId && !users.find((user) => user.id === userStatsState.selectedUserId)) {
      userStatsState.selectedUserId = users.length ? users[0].id : null;
    }

    renderUserList();
    const selectedUser = users.find((user) => user.id === userStatsState.selectedUserId) || null;
    renderUserDetail(selectedUser);
  }

  function compareUserStats(a, b, sortBy) {
    if (sortBy === 'name-asc') {
      return String(a.name || '').localeCompare(String(b.name || ''), 'vi');
    }

    const aStats = getUserSummaryStats(a);
    const bStats = getUserSummaryStats(b);

    if (sortBy === 'lessons-desc') return bStats.learnedLessons - aStats.learnedLessons;
    if (sortBy === 'attempts-desc') return bStats.totalAttempts - aStats.totalAttempts;

    return bStats.overallProgress - aStats.overallProgress;
  }

  function normalizeUserStatsSearchText(value) {
    return String(value || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .trim();
  }

  function selectUserStatsUser(userTarget) {
    const target = userTarget && typeof userTarget === 'object' ? userTarget : {};
    const targetId = String(target.id || target.userId || '').trim();
    const targetEmail = String(target.email || '').trim();
    const targetName = String(target.name || target.displayName || '').trim();
    const users = Array.isArray(userStatsState.users) ? userStatsState.users : [];

    if (!users.length) return false;

    let selectedUser = null;
    if (targetId) {
      selectedUser = users.find((user) => String(user && user.id || '').trim() === targetId) || null;
    }
    if (!selectedUser && targetEmail) {
      selectedUser = users.find((user) => String(user && user.email || '').trim().toLowerCase() === targetEmail.toLowerCase()) || null;
    }
    if (!selectedUser && targetName) {
      const needle = normalizeUserStatsSearchText(targetName);
      selectedUser = users.find((user) => normalizeUserStatsSearchText(user && user.name).includes(needle)) || null;
    }

    if (!selectedUser) return false;

    userStatsState.selectedUserId = selectedUser.id;
    userStatsState.searchQuery = '';
    const searchInput = document.getElementById('userStatsSearchInput');
    if (searchInput) {
      searchInput.value = '';
    }

    applyUserStatsFilters();

    setTimeout(() => {
      const userList = document.getElementById('userStatsUserList');
      if (!userList) return;
      const activeItem = Array.from(userList.querySelectorAll('.user-list-item')).find(
        (item) => String(item.dataset.userId || '') === String(selectedUser.id || ''),
      );
      if (activeItem) {
        activeItem.scrollIntoView({ block: 'nearest' });
      }
    }, 0);

    return true;
  }

  function consumePendingAdminUserStatsSearchTarget() {
    if (!window.__adminUserStatsSearchTarget) return;
    const didSelect = selectUserStatsUser(window.__adminUserStatsSearchTarget);
    if (didSelect) {
      window.__adminUserStatsSearchTarget = null;
    }
  }

  window.selectUserStatsUser = selectUserStatsUser;

  function renderUserList() {
    const userList = document.getElementById('userStatsUserList');
    const emptyState = document.getElementById('userStatsEmptyState');
    const count = document.getElementById('userStatsDisplayedCount');

    if (!userList || !emptyState || !count) return;

    const users = userStatsState.filteredUsers;
    count.textContent = `${users.length} người dùng`;

    if (!users.length) {
      userList.innerHTML = '';
      userList.style.display = 'none';
      emptyState.style.display = 'flex';
      return;
    }

    emptyState.style.display = 'none';
    userList.style.display = 'flex';

    userList.innerHTML = users.map((user) => {
      const stats = getUserSummaryStats(user);
      const isActive = user.id === userStatsState.selectedUserId;

      return `
        <button class="user-list-item ${isActive ? 'active' : ''}" type="button" data-user-id="${escapeHtml(user.id)}">
          <div class="user-item-main">
            <h4 class="user-item-name">${escapeHtml(user.name)}</h4>
            <span class="user-item-chip">${stats.overallProgress}%</span>
          </div>
          <p class="user-item-email">${escapeHtml(user.email || '')}</p>
          <p class="user-item-email">Học ${stats.learnedLessons} bài • Quiz ${stats.totalAttempts} lượt</p>
        </button>
      `;
    }).join('');

    userList.querySelectorAll('.user-list-item').forEach((item) => {
      item.addEventListener('click', () => {
        userStatsState.selectedUserId = item.dataset.userId;
        applyUserStatsFilters();
      });
    });
  }

  function renderUserDetail(user) {
    const placeholder = document.getElementById('userStatsDetailPlaceholder');
    const content = document.getElementById('userStatsDetailContent');

    if (!placeholder || !content) return;

    if (!user) {
      placeholder.style.display = 'flex';
      content.style.display = 'none';
      closeTopicLearningHistoryModal();
      return;
    }

    placeholder.style.display = 'none';
    content.style.display = 'flex';

    renderSummaryCards(user);
    renderLessonProgress(user);
  }

  function renderDetailHeader(user) {
    const header = document.getElementById('userStatsDetailHeader');
    if (!header) return;

    header.innerHTML = `
      <h2 class="detail-user-name">${escapeHtml(user.name)}</h2>
      <p class="detail-user-meta">${escapeHtml(user.email || '')}</p>
    `;
  }

  function renderSummaryCards(user) {
    const summaryCards = document.getElementById('userStatsSummaryCards');
    if (!summaryCards) return;

    const summary = getUserSummaryStats(user);

    summaryCards.innerHTML = `
      <div class="summary-user-info">
        <h2 class="detail-user-name">${escapeHtml(user.name)}</h2>
        <p class="detail-user-meta">${escapeHtml(user.email || '')}</p>
      </div>
      <article class="summary-card">
        <p class="summary-label">Bài đã học</p>
        <p class="summary-value">${summary.learnedLessons}</p>
      </article>
      <article class="summary-card">
        <p class="summary-label">Chi tiết làm bài</p>
        <p class="summary-value"><button type="button" class="summary-action-btn" id="userStatsQuizDetailBtn">Xem ${summary.totalAttempts} lượt làm</button></p>
      </article>
    `;

    const quizDetailBtn = document.getElementById('userStatsQuizDetailBtn');
    if (quizDetailBtn) {
      quizDetailBtn.addEventListener('click', () => {
        openUserQuizHistoryModal(user);
      });
    }
  }

  function renderLessonProgress(user) {
    const container = document.getElementById('userStatsLessonProgressList');
    if (!container) return;

    const lessons = Array.isArray(user.lessons) ? user.lessons : [];
    if (!lessons.length) {
      container.innerHTML = '<div class="lesson-progress-item"><p class="lesson-meta">Chưa có dữ liệu bài học</p></div>';
      closeTopicLearningHistoryModal();
      return;
    }

    const selectedKey = userStatsState.selectedLessonByUser[user.id] || getLessonKey(lessons[0]);
    if (!userStatsState.selectedLessonByUser[user.id]) {
      userStatsState.selectedLessonByUser[user.id] = selectedKey;
    }

    container.innerHTML = lessons.map((lesson) => {
      const progress = normalizePercent(lesson.progressPercent);
      const lessonKey = getLessonKey(lesson);
      const isSelected = lessonKey === userStatsState.selectedLessonByUser[user.id];
      return `
        <button class="lesson-progress-item lesson-progress-button ${isSelected ? 'active' : ''}" type="button" data-lesson-key="${escapeHtml(lessonKey)}">
          <div class="lesson-progress-top">
            <p class="lesson-name">${escapeHtml(lesson.lessonTitle || lesson.lessonId || 'Bài học')}</p>
            <p class="lesson-meta">${progress}%</p>
          </div>
          <div class="progress-track">
            <div class="progress-fill" style="width: ${progress}%;"></div>
          </div>
          <p class="lesson-meta">Số lần làm bài ${Number(lesson.attemptCount || 0)} lần • Điểm TB: ${Number(lesson.avgScore || 0)}</p>
        </button>
      `;
    }).join('');

    container.querySelectorAll('.lesson-progress-button').forEach((item) => {
      item.addEventListener('click', () => {
        userStatsState.selectedLessonByUser[user.id] = item.dataset.lessonKey || '';
        renderLessonProgress(user);
        const selectedLesson = lessons.find((lesson) => getLessonKey(lesson) === userStatsState.selectedLessonByUser[user.id]) || lessons[0];
        openTopicLearningHistoryModal(user, selectedLesson);
      });
    });
  }

  function openTopicLearningHistoryModal(user, lesson) {
    const modal = document.getElementById('userStatsTopicHistoryModal');
    if (!modal) return;

    renderTopicLearningHistoryModal(user, lesson);
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
  }

  function closeTopicLearningHistoryModal() {
    const modal = document.getElementById('userStatsTopicHistoryModal');
    if (!modal || modal.style.display === 'none') return;

    closeAttemptDetailModal();
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden', 'true');
  }

  function renderTopicLearningHistoryModal(user, lesson) {
    const title = document.getElementById('userStatsTopicHistoryModalTitle');
    const container = document.getElementById('userStatsTopicHistoryModalList');
    if (!container || !title) return;

    if (!lesson) {
      title.textContent = 'Lịch sử học';
      container.innerHTML = '<div class="topic-history-item"><p class="lesson-meta">Chưa có bài học để hiển thị lịch sử</p></div>';
      return;
    }

    const lessonName = lesson.lessonTitle || lesson.lessonId || 'Bài học';
    title.textContent = `Lịch sử học: ${lessonName}`;
    const attempts = Array.isArray(user.attempts) ? user.attempts : [];
    const lessonAttempts = attempts.filter((attempt) => isSameLesson(attempt, lesson) && isCountableUserAttempt(attempt));

    if (!lessonAttempts.length) {
      container.innerHTML = '<div class="topic-history-item"><p class="lesson-meta">Chưa có lịch sử học cho bài này</p></div>';
      return;
    }

    lessonAttempts.sort((a, b) => {
      const aTime = new Date(a.completedAt || 0).getTime();
      const bTime = new Date(b.completedAt || 0).getTime();
      return (Number.isNaN(bTime) ? 0 : bTime) - (Number.isNaN(aTime) ? 0 : aTime);
    });

    container.innerHTML = lessonAttempts.map((attempt, index) => `
      <article class="topic-history-item clickable" data-attempt-index="${index}">
        <div class="topic-history-top">
          <p class="lesson-name">${formatAttemptActionLabel(attempt)}: ${escapeHtml(attempt.lessonTitle || attempt.lessonId || lessonName)}</p>
          <p class="topic-history-score">${Number(attempt.score || 0)} điểm</p>
        </div>
        <p class="lesson-meta">Kết quả: ${formatAttemptCorrectTotal(attempt)} • Loại: ${normalizeQuizModeLabel(attempt.quizMode)}</p>
        <p class="lesson-meta">Thời gian làm: ${formatDateTime(attempt.completedAt)}</p>
        <p class="lesson-meta attempt-hint">Nhấn để xem chi tiết lần làm</p>
      </article>
    `).join('');

    bindAttemptDetailEvents(container, lessonAttempts);
  }

  function openUserQuizHistoryModal(user) {
    const modal = document.getElementById('userStatsTopicHistoryModal');
    if (!modal) return;

    renderUserQuizHistoryModal(user);
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
  }

  function renderUserQuizHistoryModal(user) {
    const title = document.getElementById('userStatsTopicHistoryModalTitle');
    const container = document.getElementById('userStatsTopicHistoryModalList');
    if (!container || !title) return;

    const attempts = Array.isArray(user.attempts)
      ? user.attempts.filter((attempt) => isCountableUserAttempt(attempt)).slice()
      : [];
    title.textContent = `Chi tiết làm bài: ${user.name || user.email || 'Người dùng'}`;

    if (!attempts.length) {
      container.innerHTML = '<div class="topic-history-item"><p class="lesson-meta">Người dùng này chưa có lượt làm quiz hoặc matching nào</p></div>';
      return;
    }

    attempts.sort((a, b) => {
      const aTime = new Date(a.completedAt || 0).getTime();
      const bTime = new Date(b.completedAt || 0).getTime();
      return (Number.isNaN(bTime) ? 0 : bTime) - (Number.isNaN(aTime) ? 0 : aTime);
    });

    container.innerHTML = attempts.map((attempt, index) => `
      <article class="topic-history-item clickable" data-attempt-index="${index}">
        <div class="topic-history-top">
          <p class="lesson-name">${formatAttemptActionLabel(attempt)}: ${escapeHtml(attempt.lessonTitle || attempt.lessonId || 'Quiz')}</p>
          <p class="topic-history-score">${Number(attempt.score || 0)} điểm</p>
        </div>
        <p class="lesson-meta">Kết quả: ${formatAttemptCorrectTotal(attempt)} • Loại: ${normalizeQuizModeLabel(attempt.quizMode)}</p>
        <p class="lesson-meta">Thời gian làm: ${formatDateTime(attempt.completedAt)}</p>
        <p class="lesson-meta attempt-hint">Nhấn để xem chi tiết lần làm</p>
      </article>
    `).join('');

    bindAttemptDetailEvents(container, attempts);
  }

  function bindAttemptDetailEvents(container, attempts) {
    if (!container) return;

    container.querySelectorAll('.topic-history-item.clickable').forEach((item) => {
      item.addEventListener('click', () => {
        const index = parseInt(item.dataset.attemptIndex || '-1', 10);
        if (index < 0 || !attempts[index]) return;
        openAttemptDetailModal(attempts[index]);
      });
    });
  }

  function openAttemptDetailModal(attempt) {
    const modal = document.getElementById('userStatsAttemptDetailModal');
    const title = document.getElementById('userStatsAttemptDetailModalTitle');
    const list = document.getElementById('userStatsAttemptDetailModalList');
    if (!modal || !title || !list) return;

    title.textContent = `Chi tiết lần làm: ${formatAttemptActionLabel(attempt)} - ${attempt.lessonTitle || attempt.lessonId || 'Bài làm'}`;
    list.innerHTML = buildAttemptDetailMarkup(attempt);
    modal.style.display = 'flex';
    modal.setAttribute('aria-hidden', 'false');
  }

  function closeAttemptDetailModal() {
    const modal = document.getElementById('userStatsAttemptDetailModal');
    const list = document.getElementById('userStatsAttemptDetailModalList');
    if (!modal || modal.style.display === 'none') return;

    if (list) list.innerHTML = '';
    modal.style.display = 'none';
    modal.setAttribute('aria-hidden', 'true');
  }

  function buildAttemptDetailMarkup(attempt) {
    const activityType = String(attempt && attempt.activityType || '').trim().toLowerCase();
    const detail = attempt && attempt.detail ? attempt.detail : null;

    if (!detail) {
      return '<p class="lesson-meta">Chưa có dữ liệu chi tiết cho lần làm này.</p>';
    }

    if (activityType === 'quiz' && Array.isArray(detail)) {
      const rows = detail.map((item, idx) => {
        const question = escapeHtml(item.question || `Câu ${idx + 1}`);
        const userAnswer = escapeHtml(
          item.userAnswerText || item.userAnswer || 'Chưa trả lời',
        );
        const correctAnswer = escapeHtml(
          item.correctAnswerText || item.correctAnswer || '-',
        );
        const status = item.isCorrect ? 'Đúng' : 'Sai';

        return `
          <div class="attempt-detail-row">
            <p class="attempt-detail-question">${idx + 1}. ${question}</p>
            <p class="lesson-meta">Bạn chọn: ${userAnswer}</p>
            <p class="lesson-meta">Đáp án đúng: ${correctAnswer}</p>
            <p class="lesson-meta">Kết quả: ${status}</p>
          </div>
        `;
      }).join('');

      return `<div class="attempt-detail-list">${rows}</div>`;
    }

    if (activityType === 'matching' && Array.isArray(detail)) {
      const rows = detail.map((item, idx) => {
        const leftText = escapeHtml(
          item.leftText || item.left || item.term || item.word || `Cặp ${idx + 1}`,
        );
        const userMatch = escapeHtml(
          item.userMatch || item.userAnswer || item.selected || item.right || '-',
        );
        const correctMatch = escapeHtml(
          item.correctMatch || item.correctAnswer || item.correct || '-',
        );
        const isCorrect = item.isCorrect === true || userMatch === correctMatch;

        return `
          <div class="attempt-detail-row">
            <p class="attempt-detail-question">${idx + 1}. ${leftText}</p>
            <p class="lesson-meta">Bạn ghép: ${userMatch}</p>
            <p class="lesson-meta">Đáp án đúng: ${correctMatch}</p>
            <p class="lesson-meta">Kết quả: ${isCorrect ? 'Đúng' : 'Sai'}</p>
          </div>
        `;
      }).join('');

      return `<div class="attempt-detail-list">${rows}</div>`;
    }

    return `<pre class="attempt-detail-pre">${escapeHtml(JSON.stringify(detail, null, 2))}</pre>`;
  }

  function formatAttemptActionLabel(attempt) {
    const activityType = String(attempt && attempt.activityType || '').trim().toLowerCase();
    return activityType === 'matching' ? 'Làm matching' : 'Làm quiz';
  }

  function formatAttemptCorrectTotal(attempt) {
    const activityType = String(attempt && attempt.activityType || '').trim().toLowerCase();
    if (activityType === 'matching') {
      const accuracy = Math.max(0, parseInt(attempt && attempt.accuracy, 10) || 0);
      const correct = Math.max(0, parseInt(attempt && attempt.correctAnswers, 10) || 0);
      const total = Math.max(0, parseInt(attempt && attempt.totalQuestions, 10) || 0);
      if (total) return `${correct}/${total} cặp đúng (${accuracy}%)`;
      return `${accuracy}% chính xác`;
    }

    const correct = Math.max(0, parseInt(attempt && attempt.correctAnswers, 10) || 0);
    const total = Math.max(0, parseInt(attempt && attempt.totalQuestions, 10) || 0);
    if (!total) return '-';
    return `${correct}/${total} câu đúng`;
  }

  function normalizeQuizModeLabel(mode) {
    const value = String(mode || '').trim().toLowerCase();
    if (value === 'matching') return 'matching';
    if (value === 'review') return 'review';
    if (value === 'instant') return 'instant';
    return value || 'instant';
  }

  function getLessonKey(lesson) {
    return String(lesson.lessonId || lesson.lessonTitle || '').trim().toLowerCase();
  }

  function isSameLesson(attempt, lesson) {
    const attemptId = String(attempt.lessonId || '').trim().toLowerCase();
    const attemptTitle = String(attempt.lessonTitle || '').trim().toLowerCase();
    const lessonId = String(lesson.lessonId || '').trim().toLowerCase();
    const lessonTitle = String(lesson.lessonTitle || '').trim().toLowerCase();

    return Boolean(
      (lessonId && attemptId && lessonId === attemptId) ||
      (lessonTitle && attemptTitle && lessonTitle === attemptTitle) ||
      (lessonId && attemptTitle && lessonId === attemptTitle) ||
      (lessonTitle && attemptId && lessonTitle === attemptId)
    );
  }

  function showUserStatsLoading(isLoading) {
    const loading = document.getElementById('userStatsLoadingState');
    const list = document.getElementById('userStatsUserList');
    if (!loading || !list) return;

    loading.style.display = isLoading ? 'flex' : 'none';
    list.style.display = isLoading ? 'none' : 'flex';
  }

  function getUserSummaryStats(user) {
    const lessons = Array.isArray(user.lessons) ? user.lessons : [];
    const learnedLessons = lessons.filter((item) => Number(item.progressPercent || 0) > 0).length;
    const overallProgress = lessons.length
      ? Math.round(lessons.reduce((sum, item) => sum + normalizePercent(item.progressPercent), 0) / lessons.length)
      : 0;

    const attempts = Array.isArray(user.attempts) ? user.attempts : [];
    const countableAttempts = attempts.filter((attempt) => isCountableUserAttempt(attempt));
    const avgQuizScore = countableAttempts.length
      ? Math.round((countableAttempts.reduce((sum, attempt) => sum + Number(attempt.score || 0), 0) / countableAttempts.length) * 100) / 100
      : 0;

    return {
      learnedLessons,
      overallProgress,
      totalAttempts: countableAttempts.length,
      avgQuizScore,
    };
  }

  function isCountableUserAttempt(attempt) {
    const activityType = String((attempt && attempt.activityType) || '').trim().toLowerCase();
    const quizMode = String((attempt && attempt.quizMode) || '').trim().toLowerCase();

    if (activityType === 'matching' || quizMode === 'matching') {
      return true;
    }

    if (activityType === 'quiz') {
      return quizMode === 'review' || quizMode === 'instant' || !quizMode;
    }

    return false;
  }

  function normalizePercent(value) {
    const number = Number(value || 0);
    if (Number.isNaN(number)) return 0;
    return Math.max(0, Math.min(100, Math.round(number)));
  }

  function formatDateTime(value) {
    if (!value) return '-';

    try {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return '-';
      return date.toLocaleString('vi-VN');
    } catch (_error) {
      return '-';
    }
  }

  function escapeHtml(input) {
    return String(input || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/\"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

    let timeout;
    return function debounced(...args) {
      clearTimeout(timeout);
      timeout = setTimeout(() => fn.apply(this, args), wait);
