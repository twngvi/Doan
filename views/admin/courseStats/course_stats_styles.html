<!-- Course Statistics Page Styles -->
<style>
  .course-stats-page {
    min-height: 100vh;
    padding: 24px;
    background: var(--theme-dashboard-bg, #f4f6fb);
  }

  .course-stats-container {
    max-width: 1200px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .course-stats-header {
    background: var(--theme-card, #ffffff);
    border: 1px solid var(--theme-card-border, #e5e7eb);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .course-stats-header h1 {
    margin: 0 0 6px;
    font-size: 1.6rem;
    color: var(--theme-text, #111827);
  }

  .course-stats-header p {
    margin: 0;
    color: var(--theme-text-secondary, #4b5563);
  }

  .course-stats-timeframe {
    margin-top: 8px;
    font-size: 0.88rem;
    color: #0f766e;
    font-weight: 600;
  }

  .course-stats-header-controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .course-stats-filter-label {
    font-size: 0.88rem;
    color: var(--theme-text-muted, #6b7280);
    font-weight: 600;
  }

  .course-stats-range-select {
    border: 1px solid var(--theme-card-border, #d1d5db);
    border-radius: 10px;
    background: #ffffff;
    color: #000000;
    padding: 9px 12px;
    font-size: 0.9rem;
    min-width: 160px;
  }

  .course-stats-range-select option {
    color: #000000;
    background: #ffffff;
  }

  .course-stats-refresh-btn {
    border: 0;
    border-radius: 10px;
    padding: 10px 16px;
    background: linear-gradient(135deg, #0f766e 0%, #0e7490 100%);
    color: #fff;
    font-weight: 600;
    cursor: pointer;
  }

  .course-stats-summary {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
  }

  .course-stats-card {
    background: var(--theme-card, #ffffff);
    border: 1px solid var(--theme-card-border, #e5e7eb);
    border-radius: 14px;
    padding: 16px;
  }

  .course-stats-label {
    margin: 0 0 8px;
    font-size: 0.9rem;
    color: var(--theme-text-muted, #6b7280);
  }

  .course-stats-value {
    margin: 0;
    font-size: 1.2rem;
    color: var(--theme-text, #111827);
    font-weight: 700;
  }

  .course-stats-table-section {
    background: var(--theme-card, #ffffff);
    border: 1px solid var(--theme-card-border, #e5e7eb);
    border-radius: 16px;
    padding: 16px;
  }

  .course-stats-section-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
    gap: 8px;
  }

  .course-stats-section-head h2 {
    margin: 0;
    font-size: 1.1rem;
    color: var(--theme-text, #111827);
  }

  .course-stats-count {
    color: var(--theme-text-muted, #6b7280);
    font-size: 0.9rem;
  }

  .course-stats-table-wrap {
    overflow-x: auto;
    overflow-y: auto;
    max-height: 420px;
    border: 1px solid var(--theme-border-subtle, #eef0f5);
    border-radius: 12px;
  }

  .course-stats-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 640px;
  }

  .course-stats-table th,
  .course-stats-table td {
    text-align: left;
    padding: 10px 8px;
    border-bottom: 1px solid var(--theme-border-subtle, #eef0f5);
    color: var(--theme-text-secondary, #374151);
  }

  .course-stats-table th {
    color: var(--theme-text, #111827);
    font-weight: 700;
  }

  .course-stats-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 999px;
    font-size: 0.8rem;
    font-weight: 700;
  }

  .course-stats-badge.high {
    color: #14532d;
    background: #dcfce7;
  }

  .course-stats-badge.medium {
    color: #854d0e;
    background: #fef3c7;
  }

  .course-stats-badge.low {
    color: #991b1b;
    background: #fee2e2;
  }

  .course-stats-loading,
  .course-stats-empty {
    padding: 30px;
    text-align: center;
    color: var(--theme-text-muted, #6b7280);
  }

  .course-stats-spinner {
    width: 34px;
    height: 34px;
    margin: 0 auto 12px;
    border: 3px solid #d1d5db;
    border-top-color: #0e7490;
    border-radius: 50%;
    animation: courseStatsSpin 0.8s linear infinite;
  }

  @keyframes courseStatsSpin {
    to {
      transform: rotate(360deg);
    }
  }

  @media (max-width: 768px) {
    .course-stats-page {
      padding: 16px;
    }

    .course-stats-header {
      flex-direction: column;
      align-items: stretch;
    }

    .course-stats-header-controls {
      justify-content: stretch;
    }

    .course-stats-range-select {
      width: 100%;
    }

    .course-stats-refresh-btn {
      width: 100%;
    }

    .course-stats-table-wrap {
      max-height: 360px;
    }
  }
</style>
