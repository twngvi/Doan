<!-- Course Statistics Page Styles -->
<style>

    color: var(--theme-text, #111827);

    overflow-y: auto;
    flex: 1;
    min-height: 0;
    max-height: none;
    border: 1px solid var(--theme-border-subtle, #eef0f5);
