<!-- Course Statistics Page Scripts -->
<script>
  let courseStatsState = {
    initialized: false,
    users: [],
    topicRows: [],
    matchingRows: [],
    totalTopicsInDb: 0,
    timeRange: '30',
    topicLearnerSortOrder: 'desc',
    matchingSortOrder: 'desc',
    selectedStatsType: '',
    selectedStatsKey: '',
    selectedLearnerId: '',
  };

  function initCourseStatsPage() {
    ensureCourseStatsModalsOnBody();

    if (!courseStatsState.initialized) {
      bindCourseStatsEvents();
      courseStatsState.initialized = true;
    }

    loadCourseStatsData();
    setTimeout(consumePendingCourseStatsSearchTarget, 0);
  }

  window.initcoursestats = initCourseStatsPage;

  function ensureCourseStatsModalsOnBody() {
    const modalIds = ['courseStatsTopicUsersPanel', 'courseStatsAttemptDetailPanel'];
    modalIds.forEach((id) => {
      const modal = document.getElementById(id);
      if (!modal) return;
      if (modal.parentElement === document.body) return;
      document.body.appendChild(modal);
    });
  }

  function bindCourseStatsEvents() {
    const refreshBtn = document.getElementById('courseStatsRefreshBtn');
    const rangeSelect = document.getElementById('courseStatsRangeSelect');
    const topicTableBody = document.getElementById('courseStatsTopicTableBody');
    const matchingTableBody = document.getElementById('courseStatsMatchingTableBody');
    const topicLearnerSortBtn = document.getElementById('courseStatsTopicLearnerSortBtn');
    const matchingSortBtn = document.getElementById('courseStatsMatchingSortBtn');
    const closeTopicUsersBtn = document.getElementById('courseStatsTopicUsersCloseBtn');
    const topicUsersBackdrop = document.getElementById('courseStatsTopicUsersBackdrop');
    const topicUsersList = document.getElementById('courseStatsTopicUsersList');
    const closeAttemptDetailBtn = document.getElementById('courseStatsAttemptDetailCloseBtn');
    const attemptDetailBackdrop = document.getElementById('courseStatsAttemptDetailBackdrop');

    renderCurrentTimeframeLabel(courseStatsState.timeRange);
    renderCourseStatsSortIndicators();

    if (rangeSelect) {
      rangeSelect.value = courseStatsState.timeRange;
      rangeSelect.addEventListener('change', (event) => {
        courseStatsState.timeRange = String(event.target.value || '30');
        renderCurrentTimeframeLabel(courseStatsState.timeRange);
        const aggregated = aggregateCourseStats(courseStatsState.users, courseStatsState.timeRange);
        courseStatsState.topicRows = aggregated.topicRows;
        courseStatsState.matchingRows = aggregated.matchingRows;
        ensureSelectedStatsExists();
        renderAllCourseStats(aggregated);
      });
    }

    if (refreshBtn) {
      refreshBtn.addEventListener('click', loadCourseStatsData);
    }

    if (topicLearnerSortBtn) {
      topicLearnerSortBtn.addEventListener('click', () => {
        courseStatsState.topicLearnerSortOrder = courseStatsState.topicLearnerSortOrder === 'desc' ? 'asc' : 'desc';
        renderCourseStatsSortIndicators();
        renderCourseStatsTables({
          topicRows: courseStatsState.topicRows,
          matchingRows: courseStatsState.matchingRows,
        });
      });
    }

    if (matchingSortBtn) {
      matchingSortBtn.addEventListener('click', () => {
        courseStatsState.matchingSortOrder = courseStatsState.matchingSortOrder === 'desc' ? 'asc' : 'desc';
        renderCourseStatsSortIndicators();
        renderCourseStatsTables({
          topicRows: courseStatsState.topicRows,
          matchingRows: courseStatsState.matchingRows,
        });
      });
    }

    if (topicTableBody) {
      topicTableBody.addEventListener('click', (event) => {
        const row = event.target.closest('tr[data-stats-key][data-stats-type]');
        if (!row) return;

        courseStatsState.selectedStatsType = String(row.dataset.statsType || '');
        courseStatsState.selectedStatsKey = String(row.dataset.statsKey || '');
        renderCourseStatsTables({
          topicRows: courseStatsState.topicRows,
          matchingRows: courseStatsState.matchingRows,
        });
      });
    }

    if (matchingTableBody) {
      matchingTableBody.addEventListener('click', (event) => {
        const row = event.target.closest('tr[data-stats-key][data-stats-type]');
        if (!row) return;

        courseStatsState.selectedStatsType = String(row.dataset.statsType || '');
        courseStatsState.selectedStatsKey = String(row.dataset.statsKey || '');
        renderCourseStatsTables({
          topicRows: courseStatsState.topicRows,
          matchingRows: courseStatsState.matchingRows,
        });
      });
    }

    if (closeTopicUsersBtn) {
      closeTopicUsersBtn.addEventListener('click', () => {
        closeCourseStatsAttemptDetailModal();
        courseStatsState.selectedStatsType = '';
        courseStatsState.selectedStatsKey = '';
        renderCourseStatsTables({
          topicRows: courseStatsState.topicRows,
          matchingRows: courseStatsState.matchingRows,
        });
      });
    }

    if (topicUsersBackdrop) {
      topicUsersBackdrop.addEventListener('click', () => {
        closeCourseStatsAttemptDetailModal();
        courseStatsState.selectedStatsType = '';
        courseStatsState.selectedStatsKey = '';
        renderCourseStatsTables({
          topicRows: courseStatsState.topicRows,
          matchingRows: courseStatsState.matchingRows,
        });
      });
    }

    if (topicUsersList) {
      topicUsersList.addEventListener('click', (event) => {
        if (courseStatsState.selectedStatsType !== 'matching') return;

        const row = event.target.closest('.course-stats-topic-user-item[data-learner-id]');
        if (!row) return;

        const learnerId = String(row.dataset.learnerId || '');
        if (!learnerId) return;

        openCourseStatsAttemptDetailModal(learnerId);
      });
    }

    if (closeAttemptDetailBtn) {
      closeAttemptDetailBtn.addEventListener('click', closeCourseStatsAttemptDetailModal);
    }

    if (attemptDetailBackdrop) {
      attemptDetailBackdrop.addEventListener('click', closeCourseStatsAttemptDetailModal);
    }

    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Escape') return;
      if (courseStatsState.selectedLearnerId) {
        closeCourseStatsAttemptDetailModal();
        return;
      }
      if (!courseStatsState.selectedStatsKey) return;

      courseStatsState.selectedStatsType = '';
      courseStatsState.selectedStatsKey = '';
      renderCourseStatsTables({
        topicRows: courseStatsState.topicRows,
        matchingRows: courseStatsState.matchingRows,
      });
    });
  }

  async function loadCourseStatsData() {
    setCourseStatsLoading(true);

    try {
      const result = await getCourseStatsFromServer();
      const users = result && result.success && Array.isArray(result.data) ? result.data : [];
      const totalTopicsInDb = result && result.meta ? Math.max(0, Number(result.meta.totalTopicsInDb || 0)) : 0;
      courseStatsState.users = users;
      courseStatsState.totalTopicsInDb = totalTopicsInDb;

      const aggregated = aggregateCourseStats(users, courseStatsState.timeRange);
      courseStatsState.topicRows = aggregated.topicRows;
      courseStatsState.matchingRows = aggregated.matchingRows;
      ensureSelectedStatsExists();

      renderAllCourseStats(aggregated);
    } catch (error) {
      console.error('loadCourseStatsData error:', error);
      courseStatsState.users = [];
      courseStatsState.topicRows = [];
      courseStatsState.matchingRows = [];
      courseStatsState.totalTopicsInDb = 0;
      renderAllCourseStats({ topicRows: [], matchingRows: [] });
    } finally {
      setCourseStatsLoading(false);
    }
  }

  function getCourseStatsFromServer() {
    if (typeof callAppsScript === 'function') {
      return callAppsScript('getAdminUserLearningStats');
    }

    return Promise.resolve({
      success: true,
      data: [],
    });
  }

  function aggregateCourseStats(users, timeRange) {
    const topicMap = {};
    const matchingMap = {};
    const windowStart = getWindowStartDate(timeRange);

    users.forEach((user) => {
      const userId = String(user.id || user.email || Math.random());
      const learnerMeta = getCourseStatsLearnerMeta(user, userId);
      const engagedTopicKeys = {};

      const lessons = Array.isArray(user.lessons) ? user.lessons : [];
      lessons.forEach((lesson) => {
        const key = resolveCourseStatsKey(lesson.lessonId, lesson.lessonTitle);
        if (!key) return;

        const item = getOrCreateStatItem(topicMap, key, lesson.lessonTitle || lesson.lessonId || 'Topic');
        const hasProgress = Number(lesson.progressPercent || 0) > 0;
        if (windowStart === null && hasProgress) {
          engagedTopicKeys[key] = true;
        }
      });

      const attempts = Array.isArray(user.attempts) ? user.attempts : [];
      attempts.forEach((attempt) => {
        const completedAt = parseCourseStatsDate(attempt.completedAt);
        if (!isDateInWindow(completedAt, windowStart)) return;

        const key = resolveCourseStatsKey(attempt.lessonId, attempt.lessonTitle);
        if (!key) return;

        const item = getOrCreateStatItem(topicMap, key, attempt.lessonTitle || attempt.lessonId || 'Topic');
        item.playCount += 1;
        const learnerDetail = getOrCreateCourseStatsLearnerDetail(item, userId, learnerMeta);
        learnerDetail.totalAttempts += 1;
        if (isCourseStatsQuizOrMatchingAttempt(attempt)) {
          item.quizMatchingAttemptCount += 1;
          learnerDetail.quizMatchingCount += 1;
        }
        addCourseStatsLearnerEvent(learnerDetail, {
          time: completedAt,
          text: buildCourseStatsAttemptEventText(attempt),
        });
        engagedTopicKeys[key] = true;
      });

      const plays = Array.isArray(user.plays) ? user.plays : [];
      plays.forEach((play) => {
        const playedAt = parseCourseStatsDate(play.playedAt);
        if (!isDateInWindow(playedAt, windowStart)) return;

        const key = resolveCourseStatsKey(play.topicId, play.topicTitle);
        if (!key) return;

        const playCount = Math.max(0, Number(play.playCount || 0));
        const title = play.topicTitle || play.topicId || 'Topic';

        const topicItem = getOrCreateStatItem(topicMap, key, title);
        topicItem.playCount += playCount;
        const topicLearnerDetail = getOrCreateCourseStatsLearnerDetail(topicItem, userId, learnerMeta);
        topicLearnerDetail.totalPlays += playCount;
        if (playCount > 0) {
          addCourseStatsLearnerEvent(topicLearnerDetail, {
            time: playedAt,
            text: buildCourseStatsPlayEventText(play, playCount),
          });
        }

        if (playCount > 0) {
          engagedTopicKeys[key] = true;
        }

        const mode = String(play.mode || '').toUpperCase();
        if (mode === 'MATCHING') {
          const matchingItem = getOrCreateStatItem(matchingMap, key, title);
          matchingItem.playCount += playCount;
          const matchingLearnerDetail = getOrCreateCourseStatsLearnerDetail(matchingItem, userId, learnerMeta);
          matchingLearnerDetail.totalPlays += playCount;
          if (playCount > 0) {
            addCourseStatsLearnerEvent(matchingLearnerDetail, {
              time: playedAt,
              text: buildCourseStatsPlayEventText(play, playCount),
            });
          }
        }
      });

      Object.keys(engagedTopicKeys).forEach((key) => {
        if (topicMap[key]) {
          getOrCreateCourseStatsLearnerDetail(topicMap[key], userId, learnerMeta);
        }
      });
    });

    // Matching table keeps matching topics, but playCount only counts
    // quiz attempts (review/instant) + matching attempts.
    Object.keys(matchingMap).forEach((key) => {
      if (!topicMap[key]) return;
      matchingMap[key].playCount = Math.max(0, Number(topicMap[key].quizMatchingAttemptCount || 0));
    });

    const topicRows = finalizeCourseStatsRows(topicMap);
    const matchingRows = finalizeCourseStatsRows(matchingMap);

    return {
      topicRows,
      matchingRows,
      topTopic: topicRows[0] || null,
      topMatching: matchingRows[0] || null,
      topicsWithLearners: topicRows.filter((item) => item.learnerCount > 0).length,
    };
  }

  function renderAllCourseStats(aggregated) {
    renderCourseStatsSummary(aggregated);
    renderCourseStatsTables(aggregated);
    consumePendingCourseStatsSearchTarget();
  }

  function getOrCreateStatItem(map, key, title) {
    if (!map[key]) {
      map[key] = {
        title: String(title || key),
        playCount: 0,
        quizMatchingAttemptCount: 0,
        learners: {},
      };
    } else if (title && title.length > map[key].title.length) {
      map[key].title = String(title);
    }

    return map[key];
  }

  function finalizeCourseStatsRows(map) {
    return Object.keys(map)
      .map((key) => {
        const item = map[key];
        return {
          key,
          title: item.title,
          playCount: Math.max(0, Number(item.playCount || 0)),
          learnerCount: Object.keys(item.learners || {}).length,
          learners: Object.keys(item.learners || {}).map((learnerId) => {
            const learner = item.learners[learnerId] || {};
            return {
              id: String(learner.id || learnerId),
              name: String(learner.name || learner.email || learnerId),
              email: String(learner.email || ''),
              totalAttempts: Math.max(0, Number(learner.totalAttempts || 0)),
              totalPlays: Math.max(0, Number(learner.totalPlays || 0)),
              quizMatchingCount: Math.max(0, Number(learner.quizMatchingCount || 0)),
              lastLearnedAt: learner.lastLearnedAt || '',
              events: Array.isArray(learner.events) ? learner.events.slice(0, 8) : [],
            };
          }).sort((a, b) => {
            if (b.totalAttempts !== a.totalAttempts) return b.totalAttempts - a.totalAttempts;
            if (b.totalPlays !== a.totalPlays) return b.totalPlays - a.totalPlays;
            return String(a.name || '').localeCompare(String(b.name || ''), 'vi');
          }),
        };
      })
      .sort((a, b) => {
        if (b.playCount !== a.playCount) return b.playCount - a.playCount;
        if (b.learnerCount !== a.learnerCount) return b.learnerCount - a.learnerCount;
        return String(a.title || '').localeCompare(String(b.title || ''), 'vi');
      });
  }

  function renderCourseStatsSummary(aggregated) {
    const learnedTopics = Number(aggregated.topicsWithLearners || 0);
    const totalTopicsInDb = Math.max(0, Number(courseStatsState.totalTopicsInDb || 0));
    const totalDisplay = totalTopicsInDb > 0 ? totalTopicsInDb : Number((aggregated.topicRows || []).length);
    setTextContent('courseStatsTotalTopics', `${learnedTopics}/${totalDisplay}`);
    setTextContent('courseStatsTopTopic', formatTopCourseStatsText(aggregated.topTopic));
    setTextContent('courseStatsTopMatching', formatTopCourseStatsText(aggregated.topMatching));
  }

  function renderCourseStatsTables(aggregated) {
    const topicRowsRaw = Array.isArray(aggregated.topicRows) ? aggregated.topicRows : [];
    const matchingRowsRaw = Array.isArray(aggregated.matchingRows) ? aggregated.matchingRows : [];
    const topicRows = sortTopicRowsByLearner(topicRowsRaw, courseStatsState.topicLearnerSortOrder);
    const matchingRows = sortCourseStatsRows(matchingRowsRaw, courseStatsState.matchingSortOrder);

    setTextContent('courseStatsTopicCount', `${topicRowsRaw.length} topic`);
    setTextContent('courseStatsMatchingCount', `${matchingRowsRaw.length} quiz`);
    renderCourseStatsSortIndicators();

    renderCourseStatsTable('courseStatsTopicTableBody', topicRows, { selectableType: 'topic' });
    renderCourseStatsTable('courseStatsMatchingTableBody', matchingRows, { selectableType: 'matching' });
    renderSelectedStatLearners(topicRows, matchingRows);

    const hasData = topicRows.length > 0 || matchingRows.length > 0;
    const emptyState = document.getElementById('courseStatsEmptyState');
    if (emptyState) {
      emptyState.style.display = hasData ? 'none' : 'block';
    }
  }

  function renderCourseStatsTable(tbodyId, rows, options) {
    const tbody = document.getElementById(tbodyId);
    if (!tbody) return;

    const selectableType = options && typeof options === 'object' ? String(options.selectableType || '') : '';
    const isSelectable = Boolean(selectableType);

    if (!rows.length) {
      tbody.innerHTML = `<tr><td colspan="${selectableType === 'topic' ? 2 : 3}">Chưa có dữ liệu</td></tr>`;
      return;
    }

    if (selectableType === 'topic') {
      tbody.innerHTML = rows.map((row) => {
        const isSelected = row.key === courseStatsState.selectedStatsKey && selectableType === courseStatsState.selectedStatsType;
        return `
          <tr data-stats-key="${escapeCourseStatsHtml(row.key)}" data-stats-type="${escapeCourseStatsHtml(selectableType)}" class="${isSelected ? 'is-selected' : ''}">
            <td>${escapeCourseStatsHtml(row.title)}</td>
            <td>${Number(row.learnerCount || 0)}</td>
          </tr>
        `;
      }).join('');
      return;
    }

    tbody.innerHTML = rows.map((row) => {
      const isSelected = isSelectable
        && row.key === courseStatsState.selectedStatsKey
        && selectableType === courseStatsState.selectedStatsType;
      return `
        <tr${isSelectable ? ` data-stats-key="${escapeCourseStatsHtml(row.key)}" data-stats-type="${escapeCourseStatsHtml(selectableType)}"` : ''} class="${isSelected ? 'is-selected' : ''}">
          <td>${escapeCourseStatsHtml(row.title)}</td>
          <td>${Number(row.playCount || 0)}</td>
          <td>${Number(row.learnerCount || 0)}</td>
        </tr>
      `;
    }).join('');
  }

  function sortCourseStatsRows(rows, order) {
    const normalized = order === 'asc' ? 'asc' : 'desc';
    const list = Array.isArray(rows) ? rows.slice() : [];

    list.sort((a, b) => {
      const playDelta = Number(b.playCount || 0) - Number(a.playCount || 0);
      if (playDelta !== 0) return normalized === 'desc' ? playDelta : -playDelta;

      const learnerDelta = Number(b.learnerCount || 0) - Number(a.learnerCount || 0);
      if (learnerDelta !== 0) return normalized === 'desc' ? learnerDelta : -learnerDelta;

      return String(a.title || '').localeCompare(String(b.title || ''), 'vi');
    });

    return list;
  }

  function sortTopicRowsByLearner(rows, order) {
    const normalized = order === 'asc' ? 'asc' : 'desc';
    const list = Array.isArray(rows) ? rows.slice() : [];

    list.sort((a, b) => {
      const learnerDelta = Number(b.learnerCount || 0) - Number(a.learnerCount || 0);
      if (learnerDelta !== 0) return normalized === 'desc' ? learnerDelta : -learnerDelta;

      const playDelta = Number(b.playCount || 0) - Number(a.playCount || 0);
      if (playDelta !== 0) return normalized === 'desc' ? playDelta : -playDelta;

      return String(a.title || '').localeCompare(String(b.title || ''), 'vi');
    });

    return list;
  }

  function renderCourseStatsSortIndicators() {
    const topicIcon = document.getElementById('courseStatsTopicLearnerSortIcon');
    const matchingIcon = document.getElementById('courseStatsMatchingSortIcon');
    const topicSortBtn = document.getElementById('courseStatsTopicLearnerSortBtn');
    const matchingSortBtn = document.getElementById('courseStatsMatchingSortBtn');

    const topicIsDesc = courseStatsState.topicLearnerSortOrder !== 'asc';
    const matchingIsDesc = courseStatsState.matchingSortOrder !== 'asc';

    if (topicIcon) {
      topicIcon.textContent = topicIsDesc ? '↓' : '↑';
    }
    if (matchingIcon) {
      matchingIcon.textContent = matchingIsDesc ? '↓' : '↑';
    }

    if (topicSortBtn) {
      topicSortBtn.setAttribute('aria-label', topicIsDesc ? 'Sắp xếp số người học giảm dần' : 'Sắp xếp số người học tăng dần');
    }
    if (matchingSortBtn) {
      matchingSortBtn.setAttribute('aria-label', matchingIsDesc ? 'Sắp xếp lượt chơi giảm dần' : 'Sắp xếp lượt chơi tăng dần');
    }
  }

  function renderSelectedStatLearners(topicRows, matchingRows) {
    const panel = document.getElementById('courseStatsTopicUsersPanel');
    const title = document.getElementById('courseStatsTopicUsersTitle');
    const subtitle = document.getElementById('courseStatsTopicUsersSubtitle');
    const list = document.getElementById('courseStatsTopicUsersList');
    if (!panel || !title || !subtitle || !list) return;

    if (!courseStatsState.selectedStatsKey || !courseStatsState.selectedStatsType) {
      panel.style.display = 'none';
      closeCourseStatsAttemptDetailModal();
      document.body.classList.remove('course-stats-modal-open');
      return;
    }

    const selectedRows = courseStatsState.selectedStatsType === 'matching' ? matchingRows : topicRows;
    const selectedItem = (selectedRows || []).find((item) => item.key === courseStatsState.selectedStatsKey);
    const topicSourceItem = (topicRows || []).find((item) => item.key === courseStatsState.selectedStatsKey);
    if (!selectedItem) {
      panel.style.display = 'none';
      closeCourseStatsAttemptDetailModal();
      document.body.classList.remove('course-stats-modal-open');
      return;
    }

    const learners = Array.isArray(selectedItem.learners) ? selectedItem.learners : [];
    const isMatchingPanel = courseStatsState.selectedStatsType === 'matching';
    if (!isMatchingPanel) {
      closeCourseStatsAttemptDetailModal();
    }
    panel.style.display = 'flex';
    document.body.classList.add('course-stats-modal-open');
    title.textContent = courseStatsState.selectedStatsType === 'matching'
      ? `${learners.length} người dùng đã chơi Matching: ${selectedItem.title}`
      : `${learners.length} người dùng đã học topic: ${selectedItem.title}`;
    subtitle.textContent = '';
    subtitle.style.display = 'none';

    if (!learners.length) {
      subtitle.style.display = 'none';
      list.innerHTML = courseStatsState.selectedStatsType === 'matching'
        ? '<p class="course-stats-topic-users-subtitle">Chưa có người chơi Matching cho topic này.</p>'
        : '<p class="course-stats-topic-users-subtitle">Chưa có người dùng học topic này.</p>';
      return;
    }

    list.innerHTML = learners.map((learner) => {
      const topicLearner = topicSourceItem && Array.isArray(topicSourceItem.learners)
        ? topicSourceItem.learners.find((item) => String(item.id || '') === String(learner.id || ''))
        : null;
      const countSource = topicLearner || learner;
      const totalActionCount = Math.max(0, Number(countSource.quizMatchingCount || 0));
      const leftMatchingText = `${learner.name || 'Người dùng'} (${totalActionCount} lần làm bài)`;
      const rowClasses = isMatchingPanel ? 'course-stats-topic-user-item is-clickable' : 'course-stats-topic-user-item';
      const rowAttrs = isMatchingPanel
        ? `data-learner-id="${escapeCourseStatsHtml(learner.id || '')}" role="button" tabindex="0" aria-label="Xem chi tiết lần làm bài của ${escapeCourseStatsHtml(learner.name || 'Người dùng')}"`
        : '';
      return `
        <article class="${rowClasses}" ${rowAttrs}>
          <div class="course-stats-topic-user-left">
            <p class="course-stats-topic-user-name">${escapeCourseStatsHtml(isMatchingPanel ? leftMatchingText : (learner.name || 'Người dùng'))}</p>
            ${isMatchingPanel ? '' : `<p class="course-stats-topic-user-email">${escapeCourseStatsHtml(learner.email || '-')}</p>`}
          </div>
          <p class="course-stats-topic-user-time">${learner.lastLearnedAt ? escapeCourseStatsHtml(formatCourseStatsTimeDateLabel(learner.lastLearnedAt)) : 'Thời gian: -, ngày: -'}</p>
        </article>
      `;
    }).join('');
  }

  function openCourseStatsAttemptDetailModal(learnerId) {
    const panel = document.getElementById('courseStatsAttemptDetailPanel');
    const title = document.getElementById('courseStatsAttemptDetailTitle');
    const subtitle = document.getElementById('courseStatsAttemptDetailSubtitle');
    const list = document.getElementById('courseStatsAttemptDetailList');
    if (!panel || !title || !subtitle || !list) return;

    const selectedRows = courseStatsState.selectedStatsType === 'matching'
      ? courseStatsState.matchingRows
      : courseStatsState.topicRows;
    const selectedItem = (selectedRows || []).find((item) => item.key === courseStatsState.selectedStatsKey);
    const topicSourceItem = (courseStatsState.topicRows || []).find((item) => item.key === courseStatsState.selectedStatsKey);
    if (!selectedItem || !Array.isArray(selectedItem.learners)) return;

    const selectedLearner = selectedItem.learners.find((item) => String(item.id || '') === String(learnerId || ''));
    const topicLearner = topicSourceItem && Array.isArray(topicSourceItem.learners)
      ? topicSourceItem.learners.find((item) => String(item.id || '') === String(learnerId || ''))
      : null;
    const learner = topicLearner || selectedLearner;
    if (!learner) return;

    courseStatsState.selectedLearnerId = String(learner.id || '');
    title.textContent = `Chi tiết lần làm bài: ${learner.name || 'Người dùng'}`;
    const detailAttempts = buildCourseStatsLearnerDetailAttempts(
      courseStatsState.selectedStatsType,
      courseStatsState.selectedStatsKey,
      courseStatsState.selectedLearnerId
    );

    if (courseStatsState.selectedStatsType === 'matching') {
      subtitle.textContent = `${learner.email || 'Không có email'} • ${detailAttempts.length} lần (quiz review/instant + matching)`;
    } else {
      subtitle.textContent = `${learner.email || 'Không có email'} • ${detailAttempts.length} lần làm bài`;
    }

    const events = detailAttempts;
    if (!events.length) {
      list.innerHTML = '<p class="course-stats-attempt-detail-empty">Chưa có chi tiết lần làm bài.</p>';
    } else {
      list.innerHTML = events.map((eventItem) => {
        const eventText = String(eventItem && eventItem.text || 'Làm bài');
        const eventTime = eventItem && eventItem.time ? formatCourseStatsTimeDateLabel(eventItem.time) : 'Thời gian: -, ngày: -';
        return `
          <article class="course-stats-attempt-detail-item">
            <p class="course-stats-attempt-detail-item-title">${escapeCourseStatsHtml(eventText)}</p>
            <p class="course-stats-attempt-detail-item-time">${escapeCourseStatsHtml(eventTime)}</p>
          </article>
        `;
      }).join('');
    }

    panel.style.display = 'flex';
    document.body.classList.add('course-stats-modal-open');
  }

  function buildCourseStatsLearnerDetailAttempts(statsType, statsKey, learnerId) {
    const user = (courseStatsState.users || []).find((item) => {
      const itemId = String((item && (item.id || item.email)) || '');
      return itemId === String(learnerId || '');
    });
    if (!user) return [];

    const attempts = Array.isArray(user.attempts) ? user.attempts : [];
    const windowStart = getWindowStartDate(courseStatsState.timeRange);
    const normalizedType = String(statsType || '');
    const normalizedKey = String(statsKey || '');

    return attempts
      .filter((attempt) => {
        const completedAt = parseCourseStatsDate(attempt && attempt.completedAt);
        if (!isDateInWindow(completedAt, windowStart)) return false;

        const key = resolveCourseStatsKey(attempt && attempt.lessonId, attempt && attempt.lessonTitle);
        if (!key || key !== normalizedKey) return false;

        if (normalizedType === 'matching') {
          return isCourseStatsQuizOrMatchingAttempt(attempt);
        }

        return true;
      })
      .map((attempt) => ({
        time: attempt && attempt.completedAt ? String(attempt.completedAt) : '',
        sortTime: parseCourseStatsDate(attempt && attempt.completedAt)
          ? parseCourseStatsDate(attempt && attempt.completedAt).getTime()
          : 0,
        text: buildCourseStatsDetailedAttemptText(attempt),
      }))
      .sort((a, b) => Number(b.sortTime || 0) - Number(a.sortTime || 0));
  }

  function buildCourseStatsDetailedAttemptText(attempt) {
    const activityType = String(attempt && attempt.activityType || '').trim().toLowerCase();
    const quizMode = String(attempt && attempt.quizMode || '').trim().toLowerCase();

    if (activityType === 'matching' || quizMode === 'matching') {
      return 'Matching • Làm bài';
    }

    if (activityType === 'quiz') {
      if (quizMode === 'review') return 'Quiz Review • Làm bài';
      if (quizMode === 'instant') return 'Quiz Instant • Làm bài';
      return 'Quiz • Làm bài';
    }

    return buildCourseStatsAttemptEventText(attempt);
  }

  function closeCourseStatsAttemptDetailModal() {
    const panel = document.getElementById('courseStatsAttemptDetailPanel');
    if (panel) {
      panel.style.display = 'none';
    }
    courseStatsState.selectedLearnerId = '';
  }

  function ensureSelectedStatsExists() {
    if (!courseStatsState.selectedStatsType || !courseStatsState.selectedStatsKey) return;

    const targetRows = courseStatsState.selectedStatsType === 'matching'
      ? courseStatsState.matchingRows
      : courseStatsState.topicRows;
    const exists = targetRows.some((row) => row.key === courseStatsState.selectedStatsKey);
    if (!exists) {
      courseStatsState.selectedStatsType = '';
      courseStatsState.selectedStatsKey = '';
      closeCourseStatsAttemptDetailModal();
    }
  }

  function getCourseStatsLearnerMeta(user, fallbackId) {
    const id = String((user && (user.id || user.email)) || fallbackId || '');
    const email = String((user && user.email) || '');
    const name = String((user && user.name) || email || id || 'Người dùng');
    return { id, name, email };
  }

  function getOrCreateCourseStatsLearnerDetail(item, userId, learnerMeta) {
    if (!item || !item.learners) return { totalAttempts: 0, totalPlays: 0, quizMatchingCount: 0, events: [] };

    if (!item.learners[userId]) {
      item.learners[userId] = {
        id: learnerMeta.id,
        name: learnerMeta.name,
        email: learnerMeta.email,
        totalAttempts: 0,
        totalPlays: 0,
        quizMatchingCount: 0,
        lastLearnedAt: '',
        events: [],
      };
    }

    return item.learners[userId];
  }

  function addCourseStatsLearnerEvent(learnerDetail, eventData) {
    if (!learnerDetail || !eventData) return;

    const time = eventData.time instanceof Date ? eventData.time : parseCourseStatsDate(eventData.time);
    const text = String(eventData.text || '').trim();
    if (!text) return;

    learnerDetail.events.push({
      time: time ? time.toISOString() : '',
      sortTime: time ? time.getTime() : 0,
      text,
    });

    learnerDetail.events.sort((a, b) => Number(b.sortTime || 0) - Number(a.sortTime || 0));
    if (learnerDetail.events.length > 12) {
      learnerDetail.events = learnerDetail.events.slice(0, 12);
    }

    if (time && (!learnerDetail.lastLearnedAt || time.getTime() > new Date(learnerDetail.lastLearnedAt).getTime())) {
      learnerDetail.lastLearnedAt = time.toISOString();
    }
  }

  function buildCourseStatsAttemptEventText(attempt) {
    const score = Number(attempt && (attempt.scorePercent || attempt.score || attempt.bestScore || 0));
    return score > 0 ? `Quiz • Điểm ${Math.round(score)}%` : 'Quiz • Làm bài';
  }

  function buildCourseStatsPlayEventText(play, playCount) {
    const mode = String((play && play.mode) || '').toUpperCase();
    const label = mode === 'MATCHING' ? 'Matching' : 'Quiz';
    return `${label} • ${Math.max(0, Number(playCount || 0))} lượt`;
  }

  function isCourseStatsQuizOrMatchingAttempt(attempt) {
    const activityType = String(attempt && attempt.activityType || '').trim().toLowerCase();
    const quizMode = String(attempt && attempt.quizMode || '').trim().toLowerCase();

    if (activityType === 'matching' || quizMode === 'matching') {
      return true;
    }

    if (activityType === 'quiz') {
      return quizMode === 'review' || quizMode === 'instant' || !quizMode;
    }

    return false;
  }


  function setCourseStatsLoading(isLoading) {
    const loading = document.getElementById('courseStatsLoadingState');
    const sections = document.querySelectorAll('.course-stats-summary, .course-stats-tables-grid');

    if (loading) {
      loading.style.display = isLoading ? 'block' : 'none';
    }

    sections.forEach((section) => {
      if (isLoading) {
        section.style.display = 'none';
        return;
      }

      if (section.classList.contains('course-stats-summary')) {
        section.style.display = 'grid';
        return;
      }

      section.style.display = section.classList.contains('course-stats-tables-grid') ? 'grid' : 'block';
    });

    if (isLoading) {
      const panel = document.getElementById('courseStatsTopicUsersPanel');
      const detailPanel = document.getElementById('courseStatsAttemptDetailPanel');
      if (panel) {
        panel.style.display = 'none';
      }
      if (detailPanel) {
        detailPanel.style.display = 'none';
      }
      courseStatsState.selectedLearnerId = '';
      document.body.classList.remove('course-stats-modal-open');
    }
  }

  function getWindowStartDate(timeRange) {
    if (String(timeRange || '') === 'all') return null;

    const days = Number(timeRange || 30);
    if (!days || isNaN(days) || days <= 0) return null;

    const now = new Date();
    return new Date(now.getTime() - days * 24 * 60 * 60 * 1000);
  }

  function parseCourseStatsDate(value) {
    if (!value) return null;
    const date = new Date(value);
    return isNaN(date.getTime()) ? null : date;
  }

  function isDateInWindow(dateValue, windowStart) {
    if (windowStart === null) return true;
    if (!dateValue) return false;
    return dateValue.getTime() >= windowStart.getTime();
  }

  function formatTopCourseStatsText(item) {
    if (!item) return '-';
    return `${item.title} (${item.playCount} lượt)`;
  }

  function formatCourseStatsDateTime(value) {
    const date = parseCourseStatsDate(value);
    if (!date) return 'Không rõ thời gian';

    return date.toLocaleString('vi-VN', {
      hour12: false,
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
      hour: '2-digit',
      minute: '2-digit',
    });
  }

  function formatCourseStatsTimeDateLabel(value) {
    const date = parseCourseStatsDate(value);
    if (!date) return 'Thời gian: -, ngày: -';

    const timeText = date.toLocaleTimeString('vi-VN', {
      hour12: false,
      hour: '2-digit',
      minute: '2-digit',
    });
    const dateText = date.toLocaleDateString('vi-VN', {
      day: '2-digit',
      month: '2-digit',
      year: 'numeric',
    });
    return `Thời gian: ${timeText}, ngày: ${dateText}`;
  }

  function resolveCourseStatsKey(topicId, topicTitle) {
    const id = String(topicId || '').trim();
    const title = String(topicTitle || '').trim();
    const base = id || title;
    return base ? base.toLowerCase() : '';
  }

  function setTextContent(id, value) {
    const el = document.getElementById(id);
    if (el) {
      el.textContent = String(value || '');
    }
  }

  function escapeCourseStatsHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function renderCurrentTimeframeLabel(timeRange) {
    const label = document.getElementById('courseStatsCurrentTimeframe');
    if (!label) return;

    label.textContent = `Đang xem ${formatTimeRangeText(timeRange)}`;
  }

  function formatTimeRangeText(timeRange) {
    const value = String(timeRange || '30');
    if (value === '7') return '7 ngày gần đây';
    if (value === '30') return '30 ngày gần đây';
    if (value === 'all') return 'toàn bộ dữ liệu';
    return `${value} ngày gần đây`;
  }

  function normalizeCourseStatsSearchText(value) {
    return String(value || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .trim();
  }

  function selectCourseStatsEntryByTopic(topicTarget) {
    const target = topicTarget && typeof topicTarget === 'object' ? topicTarget : {};
    const targetId = String(target.topicId || target.id || '').trim();
    const targetTitle = String(target.title || target.topicTitle || '').trim();
    const preferredKey = resolveCourseStatsKey(targetId, targetTitle);
    const topicRows = Array.isArray(courseStatsState.topicRows) ? courseStatsState.topicRows : [];
    const matchingRows = Array.isArray(courseStatsState.matchingRows) ? courseStatsState.matchingRows : [];

    if (!topicRows.length && !matchingRows.length) return false;

    let selectedType = 'topic';
    let selectedRow = preferredKey
      ? topicRows.find((row) => String(row.key || '') === preferredKey)
      : null;

    if (!selectedRow && preferredKey) {
      selectedType = 'matching';
      selectedRow = matchingRows.find((row) => String(row.key || '') === preferredKey);
    }

    if (!selectedRow) {
      const needle = normalizeCourseStatsSearchText(targetTitle || targetId);
      if (!needle) return false;

      selectedType = 'topic';
      selectedRow = topicRows.find((row) => {
        const title = normalizeCourseStatsSearchText(row && row.title);
        return title.includes(needle);
      });

      if (!selectedRow) {
        selectedType = 'matching';
        selectedRow = matchingRows.find((row) => {
          const title = normalizeCourseStatsSearchText(row && row.title);
          return title.includes(needle);
        });
      }
    }

    if (!selectedRow) return false;

    courseStatsState.selectedStatsType = selectedType;
    courseStatsState.selectedStatsKey = String(selectedRow.key || '');
    ensureSelectedStatsExists();
    renderCourseStatsTables({
      topicRows: courseStatsState.topicRows,
      matchingRows: courseStatsState.matchingRows,
    });

    setTimeout(() => {
      const tableBodyId = selectedType === 'matching'
        ? 'courseStatsMatchingTableBody'
        : 'courseStatsTopicTableBody';
      const tableBody = document.getElementById(tableBodyId);
      if (!tableBody) return;

      const targetRow = Array.from(tableBody.querySelectorAll('tr[data-stats-key]')).find((row) =>
        String(row.dataset.statsKey || '') === String(selectedRow.key || '')
      );
      if (targetRow) {
        targetRow.scrollIntoView({ block: 'center' });
      }
    }, 0);

    return true;
  }

  function consumePendingCourseStatsSearchTarget() {
    if (!window.__adminCourseStatsSearchTarget) return;
    const didSelect = selectCourseStatsEntryByTopic(window.__adminCourseStatsSearchTarget);
    if (didSelect) {
      window.__adminCourseStatsSearchTarget = null;
    }
  }

  window.selectCourseStatsEntryByTopic = selectCourseStatsEntryByTopic;
</script>
