<style>
  /* ===== TERRACODE AUTH PAGES - DESIGN SYSTEM ===== */

  /* CSS Variables - Design Tokens (Knowledge Studio Theme) */
  :root {
    /* Primary Colors - Studio Blue */
    --primary-blue: #2563eb;
    --primary-dark: #1d4ed8;
    --primary-gradient: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    --hero-gradient: linear-gradient(
      135deg,
      #0b1220 0%,
      #0b2a6f 45%,
      #2563eb 100%
    );

    /* Accent Colors */
    --accent-lime: #a3e635;
    --accent-amber: #f59e0b;
    --green-success: #22c55e;
    --orange-warning: #f97316;

    /* Neutral Colors */
    --bg-main: #f8fafc;
    --card-bg: #ffffff;
    --border-color: #e2e8f0;
    --text-primary: #0f172a;
    --text-secondary: #334155;
    --text-muted: #64748b;

    /* Border Radius */
    --radius-card: 16px;
    --radius-button: 12px;
    --radius-small: 8px;

    /* Shadow */
    --shadow-card: 0 8px 24px rgba(15, 23, 42, 0.08);
    --shadow-hover: 0 12px 32px rgba(15, 23, 42, 0.12);

    /* Transition */
    --transition-fast: 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  /* Login Page Container */
  .auth-login-container {
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 100vh;
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI",
      sans-serif;
  }

  /* Left Side - Illustration with Primary Gradient */
  .auth-illustration {
    background: var(--hero-gradient);
    color: white;
    padding: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .auth-illustration::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.5;
  }

  .illustration-content {
    position: relative;
    z-index: 1;
    max-width: 480px;
    text-align: center;
  }

  /* Logo Section - Matching Sidebar */
  .logo-section {
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0;
    font-size: 2.5rem;
    font-weight: 400;
    margin-bottom: 2.5rem;
    font-family: "Fredoka One", "Baloo 2", "Nunito", sans-serif;
  }

  .logo-section .logo-letter {
    color: #ffffff;
    display: inline-block;
  }

  .logo-section .logo-o {
    font-size: 2.8rem;
  }

  .logo-section .logo-dot {
    color: var(--accent-amber);
    font-size: 2.5rem;
    font-weight: 400;
    display: inline-block;
    margin-left: -4px;
    margin-right: 2px;
    animation: dotLand 2s ease-in-out infinite;
    transform-origin: bottom center;
  }

  @keyframes dotLand {
    0% {
      transform: translateY(-8px);
      opacity: 0.7;
    }
    15% {
      transform: translateY(0);
      opacity: 1;
    }
    25% {
      transform: translateY(-3px);
    }
    35%,
    100% {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .logo-section .logo-text {
    color: #ffffff;
    display: inline-block;
  }

  .illustration-title {
    font-size: 2.5rem;
    font-weight: 800;
    margin-bottom: 1rem;
    line-height: 1.2;
  }

  .illustration-description {
    font-size: 1.125rem;
    opacity: 0.9;
    margin-bottom: 2.5rem;
    line-height: 1.7;
  }

  .illustration-image {
    margin: 2.5rem 0;
  }

  /* Knowledge Studio Scene */
  .studio-scene {
    position: relative;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 2rem;
  }

  .studio-dashboard {
    font-size: 4rem;
    animation: float 3s ease-in-out infinite;
    filter: drop-shadow(0 8px 16px rgba(0, 0, 0, 0.2));
  }

  .studio-progress {
    position: absolute;
    top: 30px;
    right: 60px;
    font-size: 2.5rem;
    animation: float 3s ease-in-out 0.5s infinite;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
  }

  .studio-badge {
    position: absolute;
    bottom: 40px;
    left: 60px;
    font-size: 2.5rem;
    animation: float 3s ease-in-out 1s infinite;
    filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.15));
  }

  /* Legacy Mountain Scene (keep for backwards compat) */
  .mountain-scene {
    position: relative;
    height: 220px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .mountain {
    width: 0;
    height: 0;
    border-left: 130px solid transparent;
    border-right: 130px solid transparent;
    border-bottom: 180px solid rgba(255, 255, 255, 0.15);
    position: relative;
    animation: scaleUp 1s ease-out;
  }

  .climber {
    position: absolute;
    bottom: 130px;
    font-size: 2.5rem;
    animation: climb 2s ease-in-out infinite;
  }

  .stars {
    position: absolute;
    top: 20px;
    right: 60px;
    font-size: 1.75rem;
    animation: twinkle 2s ease-in-out infinite;
  }

  .email-icon-large {
    font-size: 5rem;
    animation: float 3s ease-in-out infinite;
  }

  .verification-badge {
    position: absolute;
    top: 40px;
    right: 80px;
    font-size: 2.5rem;
    animation: twinkle 2s ease-in-out infinite;
  }

  .illustration-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
  }

  .stat-box {
    background: rgba(255, 255, 255, 0.15);
    -webkit-backdrop-filter: blur(10px);
    backdrop-filter: blur(10px);
    padding: 1.25rem;
    border-radius: var(--radius-card);
    display: flex;
    align-items: center;
    gap: 1rem;
    transition: all var(--transition-fast);
  }

  .stat-box:hover {
    background: rgba(255, 255, 255, 0.2);
    transform: translateY(-2px);
  }

  .stat-icon {
    font-size: 1.75rem;
  }

  .stat-number {
    font-size: 1.375rem;
    font-weight: 700;
  }

  .stat-label {
    font-size: 0.8125rem;
    opacity: 0.85;
  }

  /* Right Side - Form Container */
  .auth-form-container {
    background: var(--bg-main);
    padding: 3rem;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .auth-form-wrapper {
    width: 100%;
    max-width: 420px;
  }

  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    color: var(--text-secondary);
    text-decoration: none;
    font-weight: 500;
    margin-bottom: 2rem;
    transition: color var(--transition-fast);
  }

  .back-link:hover {
    color: var(--primary-blue);
  }

  .back-icon {
    font-size: 1.25rem;
  }

  .form-header {
    margin-bottom: 2rem;
  }

  .form-title {
    font-size: 1.875rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.5rem;
  }

  .form-description {
    color: var(--text-secondary);
    font-size: 0.9375rem;
    line-height: 1.6;
  }

  .auth-form {
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  /* Google Button */
  .btn-google {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.75rem;
    padding: 0.875rem;
    background: var(--card-bg);
    border: 2px solid var(--border-color);
    border-radius: var(--radius-button);
    font-size: 0.9375rem;
    font-weight: 600;
    color: var(--text-primary);
    cursor: pointer;
    transition: all var(--transition-fast);
    box-shadow: var(--shadow-card);
  }

  .btn-google:hover {
    background: var(--card-bg);
    border-color: var(--primary-blue);
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }

  .google-icon {
    width: 22px;
    height: 22px;
    background: linear-gradient(
      45deg,
      #ea4335 25%,
      #fbbc05 25%,
      #fbbc05 50%,
      #34a853 50%,
      #34a853 75%,
      #4285f4 75%
    );
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-weight: 700;
    font-size: 13px;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 1rem;
    color: var(--text-muted);
    font-size: 0.8125rem;
    font-weight: 500;
  }

  .divider::before,
  .divider::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border-color);
  }

  /* Form Groups */
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .form-label {
    font-size: 0.875rem;
    font-weight: 600;
    color: var(--text-primary);
  }

  .input-wrapper {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 1rem;
    font-size: 1.125rem;
    pointer-events: none;
    color: var(--text-muted);
  }

  .form-input {
    width: 100%;
    padding: 0.875rem 1rem 0.875rem 3rem;
    border: 2px solid var(--border-color);
    border-radius: var(--radius-button);
    font-size: 0.9375rem;
    color: var(--text-primary);
    background: var(--card-bg);
    transition: all var(--transition-fast);
  }

  .form-input:focus {
    outline: none;
    border-color: var(--primary-blue);
    box-shadow: 0 0 0 3px rgba(91, 111, 248, 0.12);
  }

  .form-input::placeholder {
    color: var(--text-muted);
  }

  .form-input.error {
    border-color: #ef4444;
  }

  .form-input.error:focus {
    box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.12);
  }

  .toggle-password {
    position: absolute;
    right: 1rem;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 1.125rem;
    padding: 0.25rem;
    opacity: 0.5;
    transition: opacity var(--transition-fast);
    color: var(--text-secondary);
  }

  .toggle-password:hover {
    opacity: 1;
  }

  .form-error {
    font-size: 0.8125rem;
    color: #ef4444;
    display: none;
  }

  .form-error.show {
    display: block;
  }

  .form-options {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.875rem;
  }

  .checkbox-wrapper {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
  }

  .checkbox-wrapper input[type="checkbox"] {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--primary-blue);
  }

  .checkbox-label {
    color: var(--text-secondary);
  }

  .forgot-link {
    color: var(--primary-blue);
    text-decoration: none;
    font-weight: 600;
    transition: color var(--transition-fast);
  }

  .forgot-link:hover {
    color: var(--purple-accent);
    text-decoration: underline;
  }

  /* Submit Button */
  .btn-submit {
    width: 100%;
    padding: 0.9375rem;
    background: var(--primary-gradient);
    color: white;
    border: none;
    border-radius: var(--radius-button);
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.5rem;
    box-shadow: 0 4px 12px rgba(91, 111, 248, 0.25);
  }

  .btn-submit:hover:not(:disabled) {
    filter: brightness(1.08);
    transform: translateY(-2px);
    box-shadow: 0 8px 20px rgba(91, 111, 248, 0.35);
  }

  .btn-submit:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  .btn-loader {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }

  /* Form Messages */
  .form-message {
    padding: 1rem;
    border-radius: var(--radius-button);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.875rem;
    font-weight: 500;
    display: none;
  }

  .form-message.error {
    background: rgba(239, 68, 68, 0.1);
    color: #ef4444;
    border: 1px solid rgba(239, 68, 68, 0.3);
  }

  .form-message.success {
    background: rgba(60, 203, 127, 0.1);
    color: var(--green-success);
    border: 1px solid rgba(60, 203, 127, 0.3);
  }

  .form-message.info {
    background: rgba(91, 111, 248, 0.1);
    color: var(--primary-blue);
    border: 1px solid rgba(91, 111, 248, 0.3);
  }

  .message-icon {
    font-size: 1.25rem;
  }

  .message-text {
    color: inherit !important;
  }

  .form-hint {
    display: block;
    margin-top: 0.5rem;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .form-footer {
    margin-top: 1.5rem;
    text-align: center;
  }

  .footer-text {
    color: var(--text-secondary);
    font-size: 0.875rem;
  }

  .footer-link {
    color: var(--primary-blue);
    text-decoration: none;
    font-weight: 600;
    transition: color var(--transition-fast);
  }

  .footer-link:hover {
    color: var(--purple-accent);
    text-decoration: underline;
  }

  /* Password Strength Indicator */
  .password-strength {
    margin-top: 0.5rem;
  }

  .strength-bar {
    height: 4px;
    background: var(--border-color);
    border-radius: 9999px;
    overflow: hidden;
    margin-bottom: 0.375rem;
  }

  .strength-fill {
    height: 100%;
    width: 0;
    border-radius: 9999px;
    transition: all 0.3s ease;
  }

  .strength-fill.weak {
    width: 33%;
    background: #ef4444;
  }

  .strength-fill.medium {
    width: 66%;
    background: var(--orange-warning);
  }

  .strength-fill.strong {
    width: 100%;
    background: var(--green-success);
  }

  .strength-text {
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  /* Verification Code Input */
  .verification-inputs {
    display: flex;
    gap: 0.75rem;
    justify-content: center;
  }

  .verification-input {
    width: 52px;
    height: 60px;
    text-align: center;
    font-size: 1.5rem;
    font-weight: 700;
    border: 2px solid var(--border-color);
    border-radius: var(--radius-button);
    background: var(--card-bg);
    color: var(--text-primary);
    transition: all var(--transition-fast);
  }

  .verification-input:focus {
    outline: none;
    border-color: var(--primary-blue);
    box-shadow: 0 0 0 3px rgba(91, 111, 248, 0.12);
  }

  .resend-section {
    text-align: center;
    margin-top: 1.5rem;
  }

  .resend-text {
    color: var(--text-secondary);
    font-size: 0.875rem;
  }

  .resend-link {
    color: var(--primary-blue);
    text-decoration: none;
    font-weight: 600;
    cursor: pointer;
    transition: color var(--transition-fast);
  }

  .resend-link:hover {
    color: var(--purple-accent);
    text-decoration: underline;
  }

  .resend-link.disabled {
    color: var(--text-muted);
    cursor: not-allowed;
    pointer-events: none;
  }

  /* Animations */
  @keyframes float {
    0%,
    100% {
      transform: translateY(0);
    }
    50% {
      transform: translateY(-15px);
    }
  }

  @keyframes scaleUp {
    from {
      transform: scale(0);
      opacity: 0;
    }
    to {
      transform: scale(1);
      opacity: 1;
    }
  }

  @keyframes climb {
    0%,
    100% {
      bottom: 130px;
    }
    50% {
      bottom: 150px;
    }
  }

  @keyframes twinkle {
    0%,
    100% {
      opacity: 1;
      transform: scale(1);
    }
    50% {
      opacity: 0.5;
      transform: scale(1.2);
    }
  }

  @keyframes spin {
    to {
      transform: rotate(360deg);
    }
  }

  /* Responsive Design */
  @media (max-width: 1024px) {
    .auth-login-container {
      grid-template-columns: 1fr;
    }

    .auth-illustration {
      display: none;
    }

    .auth-form-container {
      padding: 2rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .auth-form-wrapper {
      width: 100%;
      max-width: 420px;
    }
  }

  @media (max-width: 640px) {
    .auth-form-container {
      padding: 1.25rem;
    }

    .auth-form-wrapper {
      max-width: 100%;
    }

    .form-title {
      font-size: 1.5rem;
    }

    .form-description {
      font-size: 0.875rem;
    }

    .illustration-stats {
      grid-template-columns: 1fr;
    }

    .form-input {
      padding: 0.75rem 1rem 0.75rem 2.75rem;
      font-size: 1rem;
    }

    .btn-submit {
      padding: 0.875rem;
      font-size: 0.9375rem;
    }

    .btn-google {
      padding: 0.75rem;
      font-size: 0.875rem;
    }

    .verification-input {
      font-size: 1.25rem !important;
      letter-spacing: 0.5rem !important;
      padding: 0.75rem !important;
    }

    .back-link {
      margin-bottom: 1.5rem;
    }

    .form-header {
      margin-bottom: 1.5rem;
    }

    .auth-form {
      gap: 1rem;
    }

    .form-footer {
      margin-top: 1.25rem;
    }
  }

  @media (max-width: 380px) {
    .auth-form-container {
      padding: 1rem;
    }

    .form-title {
      font-size: 1.375rem;
    }

    .form-label {
      font-size: 0.8125rem;
    }

    .form-options {
      flex-direction: column;
      gap: 0.75rem;
      align-items: flex-start;
    }

    .forgot-link {
      align-self: flex-end;
    }
  }

  /* ===== HIDE DEMO BADGES/LINKS IN AUTH PAGES ===== */
  /* Ẩn các badge MCQ, Matching, Code Lab trong trang auth */
  .auth-form-wrapper .demo-badges,
  .auth-form-wrapper .quick-demo-links,
  .auth-form-wrapper .demo-links,
  .form-footer + div:not(.form-footer),
  .auth-form-container [class*="demo"],
  .auth-form-container [class*="badge"]:not(.studio-badge) {
    display: none !important;
  }
</style>
