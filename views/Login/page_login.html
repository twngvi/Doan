<!-- Login Page -->
<div class="auth-login-container">
  <!-- Left Side - Illustration -->
  <div class="auth-illustration">
    <div class="illustration-content">
      <div class="logo-section">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Doanv3</span>
      </div>
      <h1 class="illustration-title">Chào mừng trở lại!</h1>
      <p class="illustration-description">
        Tiếp tục hành trình chinh phục núi tri thức của bạn
      </p>
      <div class="illustration-image">
        <div class="mountain-scene">
          <div class="mountain"></div>
          <div class="climber">🧗</div>
          <div class="stars">✨</div>
        </div>
      </div>
      <div class="illustration-stats">
        <div class="stat-box">
          <div class="stat-icon">📚</div>
          <div>
            <div class="stat-number">1000+</div>
            <div class="stat-label">Chủ đề học tập</div>
          </div>
        </div>
        <div class="stat-box">
          <div class="stat-icon">👥</div>
          <div>
            <div class="stat-number">5000+</div>
            <div class="stat-label">Học viên</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side - Login Form -->
  <div class="auth-form-container">
    <div class="auth-form-wrapper">
      <a
        href="#"
        class="back-link"
        onclick="showPage('page-landing'); return false;"
      >
        <span class="back-icon">←</span>
        <span>Quay lại</span>
      </a>

      <div class="form-header">
        <h2 class="form-title">Đăng nhập</h2>
        <p class="form-description">Nhập thông tin của bạn để tiếp tục</p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="auth-form" onsubmit="return false;">
        <!-- Google Login Button -->
        <button type="button" class="btn-google" id="googleLoginBtn" onclick="handleGoogleLoginClick()">
          <svg class="h-5 w-5 mr-2" style="display: inline-block; vertical-align: middle; margin-right: 8px;" viewBox="0 0 24 24" width="24" height="24" xmlns="http://www.w3.org/2000/svg">
            <g transform="matrix(1, 0, 0, 1, 27.009001, -39.238998)">
              <path fill="#4285F4" d="M -3.264 51.509 C -3.264 50.719 -3.334 49.969 -3.454 49.239 L -14.754 49.239 L -14.754 53.749 L -8.284 53.749 C -8.574 55.229 -9.424 56.479 -10.684 57.329 L -10.684 60.329 L -6.824 60.329 C -4.564 58.239 -3.264 55.159 -3.264 51.509 Z"/>
              <path fill="#34A853" d="M -14.754 63.239 C -11.514 63.239 -8.804 62.159 -6.824 60.329 L -10.684 57.329 C -11.764 58.049 -13.134 58.489 -14.754 58.489 C -17.884 58.489 -20.534 56.379 -21.484 53.529 L -25.464 53.529 L -25.464 56.619 C -23.494 60.539 -19.444 63.239 -14.754 63.239 Z"/>
              <path fill="#FBBC05" d="M -21.484 53.529 C -21.734 52.769 -21.864 51.959 -21.864 51.129 C -21.864 50.299 -21.734 49.489 -21.484 48.729 L -21.484 45.639 L -25.464 45.639 C -26.284 47.269 -26.754 49.129 -26.754 51.129 C -26.754 53.129 -26.284 54.989 -25.464 56.619 L -21.484 53.529 Z"/>
              <path fill="#EA4335" d="M -14.754 43.749 C -12.984 43.749 -11.404 44.369 -10.154 45.579 L -6.744 42.169 C -8.804 40.249 -11.514 39.009 -14.754 39.009 C -19.444 39.009 -23.494 41.709 -25.464 45.639 L -21.484 48.729 C -20.534 45.879 -17.884 43.749 -14.754 43.749 Z"/>
            </g>
          </svg>
          <span>Đăng nhập bằng Google</span>
        </button>

        <div class="divider">
          <span>Hoặc đăng nhập với email</span>
        </div>

        <!-- Email Input -->
        <div class="form-group">
          <label for="login-email" class="form-label">📧 Địa chỉ Email</label>
          <div class="input-wrapper">
            <input
              type="email"
              id="login-email"
              name="email"
              class="form-input"
              placeholder="vidu@email.com"
              required
            />
          </div>
          <span class="form-error" id="emailError">Email không hợp lệ</span>
        </div>

        <!-- Password Input -->
        <div class="form-group">
          <label for="login-password" class="form-label">🔒 Mật khẩu</label>
          <div class="input-wrapper">
            <input
              type="password"
              id="login-password"
              name="password"
              class="form-input"
              placeholder="Nhập mật khẩu của bạn"
              required
            />
            <button type="button" class="toggle-password" id="togglePassword">
              <span class="eye-icon">👁️</span>
            </button>
          </div>
          <span class="form-error" id="passwordError"
            >Mật khẩu không hợp lệ</span
          >
        </div>

        <!-- Remember Me & Forgot Password -->
        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="rememberMe" />
            <span class="checkbox-label">Ghi nhớ đăng nhập</span>
          </label>
          <a
            href="#"
            class="forgot-link"
            onclick="showPage('page-forgot-password'); return false;"
          >
            Quên mật khẩu?
          </a>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-text">Đăng nhập</span>
          <span class="btn-loader"></span>
        </button>
      </form>

      <!-- Register Link -->
      <div class="form-footer">
        <p class="footer-text">
          Chưa có tài khoản?
          <a
            href="#"
            class="footer-link"
            onclick="showPage('page-register'); return false;"
          >
            Đăng ký ngay
          </a>
        </p>
      </div>
    </div>
  </div>
</div>
