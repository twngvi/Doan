<!-- Topics Page Styles -->
<style>
  /* ========================================
     PAGE TOPICS - FULL HEIGHT
     ======================================== */
  #page-topics {
    height: 100%;
    overflow-y: auto;
    overflow-x: hidden;
  }

  /* ========================================
     TOPICS CONTAINER - GALAXY THEME
     ======================================== */
  .topics-container {
    min-height: 100%;
    padding: 1.5rem;
    padding-bottom: 2rem;
    /* Galaxy Background */
    background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
    background-attachment: fixed;
    position: relative;
  }

  /* Galaxy Stars Effect */
  .topics-container::before {
    content: "";
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background-image:
      radial-gradient(
        2px 2px at 20% 30%,
        rgba(255, 255, 255, 0.5),
        transparent
      ),
      radial-gradient(
        2px 2px at 40% 70%,
        rgba(147, 197, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.6),
        transparent
      ),
      radial-gradient(
        2px 2px at 80% 50%,
        rgba(196, 181, 253, 0.4),
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 80%,
        rgba(255, 255, 255, 0.3),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 90% 10%,
        rgba(147, 197, 253, 0.5),
        transparent
      ),
      radial-gradient(
        1px 1px at 30% 90%,
        rgba(255, 255, 255, 0.25),
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 70% 40%,
        rgba(196, 181, 253, 0.35),
        transparent
      );
    background-size: 350px 250px;
    pointer-events: none;
    z-index: 0;
    animation: topicsGalaxyTwinkle 6s ease-in-out infinite;
  }

  @keyframes topicsGalaxyTwinkle {
    0%,
    100% {
      opacity: 0.7;
    }
    50% {
      opacity: 1;
    }
  }

  /* Ensure content is above stars */
  .topics-container > * {
    position: relative;
    z-index: 1;
  }

  /* ========================================
     PAGE HEADER - GALAXY THEME (Prominent)
     ======================================== */
  .topics-header {
    position: relative;
    /* More Prominent Gradient - Lighter & More Colorful */
    background: linear-gradient(
      135deg,
      #1a0a3e 0%,
      #2d1b69 30%,
      #1e3a5f 60%,
      #0d2847 100%
    );
    border-radius: 16px;
    padding: 1.5rem 2rem;
    margin-bottom: 1.5rem;
    font-family:
      "Inter",
      "Segoe UI",
      -apple-system,
      "Helvetica Neue",
      sans-serif;
    /* Glowing Border Effect */
    border: 1px solid rgba(139, 92, 246, 0.4);
    box-shadow:
      0 8px 32px rgba(139, 92, 246, 0.2),
      0 0 60px rgba(59, 130, 246, 0.1),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    overflow: hidden;
    color: #ffffff;
  }

  /* Galaxy Background Effects for Topics Header */
  .topics-header-galaxy-bg {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }

  .topics-header-stars {
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(
        1px 1px at 20% 30%,
        rgba(255, 255, 255, 0.8) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 40% 70%,
        rgba(168, 216, 255, 0.7) 100%,
        transparent
      ),
      radial-gradient(
        1.5px 1.5px at 60% 20%,
        rgba(255, 255, 255, 0.9) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 80% 50%,
        rgba(201, 168, 255, 0.6) 100%,
        transparent
      ),
      radial-gradient(
        1px 1px at 10% 60%,
        rgba(255, 255, 255, 0.5) 100%,
        transparent
      );
    background-size: 200px 100px;
    animation: topicsHeaderTwinkle 4s ease-in-out infinite;
    transition: transform 0.3s ease-out;
  }

  @keyframes topicsHeaderTwinkle {
    0%,
    100% {
      opacity: 0.6;
    }
    50% {
      opacity: 1;
    }
  }

  .topics-header-nebula {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(
        ellipse 80% 60% at 20% 40%,
        rgba(255, 100, 150, 0.12),
        transparent
      ),
      radial-gradient(
        ellipse 60% 50% at 80% 60%,
        rgba(100, 150, 255, 0.1),
        transparent
      );
    filter: blur(20px);
  }

  /* Header Meteor Effect - 45 degree from left to right */
  .topics-header-meteor-container {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .topics-header-meteor {
    position: absolute;
    width: 2px;
    height: 80px;
    background: linear-gradient(
      to bottom,
      transparent,
      rgba(255, 255, 255, 0.28),
      rgba(255, 255, 255, 0.63)
    );
    border-radius: 50%;
    transform: rotate(-45deg);
    opacity: 0;
    animation: topicsMeteorFall 1s ease-in forwards;
  }

  .topics-header-meteor::after {
    content: "";
    position: absolute;
    bottom: 0;
    left: -1px;
    width: 4px;
    height: 4px;
    background: rgba(255, 255, 255, 0.9);
    border-radius: 50%;
    box-shadow: 0 0 8px 3px rgba(255, 255, 255, 0.6);
  }

  @keyframes topicsMeteorFall {
    0% {
      opacity: 1;
      transform: rotate(-45deg) translateY(-100px);
    }
    70% {
      opacity: 1;
    }
    100% {
      opacity: 0;
      transform: rotate(-45deg) translateY(300px);
    }
  }

  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    position: relative;
    z-index: 1;
    flex-wrap: wrap;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    flex-wrap: wrap;
  }

  .header-search {
    position: relative;
    width: 200px;
  }

  .header-search .search-input {
    width: 100%;
    height: 38px;
    padding: 0 1rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    font-size: 0.85rem;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.08);
    color: white;
    backdrop-filter: blur(5px);
  }

  .header-search .search-input:focus {
    outline: none;
    border-color: rgba(139, 92, 246, 0.5);
    background: rgba(255, 255, 255, 0.12);
    box-shadow: 0 0 15px rgba(139, 92, 246, 0.2);
  }

  .header-search .search-input::placeholder {
    color: rgba(255, 255, 255, 0.45);
  }

  .header-filter-tabs {
    display: flex;
    gap: 0.375rem;
    flex-wrap: wrap;
  }

  .btn-back {
    background: none;
    border: none;
    color: rgba(255, 255, 255, 0.8);
    font-weight: bold;
    font-size: 0.875rem;
    cursor: pointer;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 4px;
    padding: 0.375rem 0;
    transition: all 0.3s ease;
  }

  .btn-back:hover {
    color: #22d3ee;
    transform: translateX(-4px);
  }

  .btn-back:active {
    transform: translateX(-2px);
  }

  .page-title {
    font-size: 1.75rem;
    font-weight: 700;
    color: #ffffff;
    margin: 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
  }

  .title-icon {
    font-size: 2rem;
  }

  .page-subtitle {
    font-size: 0.9375rem;
    color: rgba(255, 255, 255, 0.7);
    margin: 0;
  }

  .user-progress-summary {
    display: flex;
    gap: 1rem;
  }

  .progress-item {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.5rem 0.875rem;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 10px;
    color: white;
    backdrop-filter: blur(10px);
  }

  .progress-item.progress-item-highlight {
    background: rgba(47, 163, 107, 0.15);
    border: 1px solid rgba(74, 222, 128, 0.35);
    padding: 0.375rem 0.75rem;
    gap: 0.375rem;
    flex-shrink: 0;
  }

  .progress-item.progress-item-highlight .progress-icon {
    color: #4ade80;
    display: flex;
    align-items: center;
  }

  .progress-item.progress-item-highlight .progress-icon svg {
    width: 18px;
    height: 18px;
  }

  .progress-item.progress-item-highlight .progress-value {
    font-size: 1.25rem;
    font-weight: 700;
    color: #4ade80;
    line-height: 1;
  }

  .progress-item.progress-item-highlight .progress-label {
    font-size: 0.75rem;
    font-weight: 500;
    opacity: 0.85;
  }

  .progress-icon {
    font-size: 1.25rem;
  }

  .progress-value {
    font-size: 1.25rem;
    font-weight: 700;
  }

  .progress-label {
    font-size: 0.75rem;
    opacity: 0.85;
  }

  .filter-tabs {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .filter-tab {
    padding: 0.375rem 0.875rem;
    border: 1px solid rgba(255, 255, 255, 0.2);
    background: rgba(255, 255, 255, 0.08);
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
    color: rgba(255, 255, 255, 0.8);
    cursor: pointer;
    transition: all 0.3s ease;
    backdrop-filter: blur(5px);
  }

  .filter-tab:hover {
    border-color: rgba(139, 92, 246, 0.6);
    color: white;
    background: rgba(139, 92, 246, 0.3);
    transform: translateY(-2px);
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
  }

  .filter-tab.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-color: transparent;
    color: white;
    box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
  }

  /* Level-specific badge colors */
  .filter-tab[data-filter="beginner"].active {
    background: linear-gradient(135deg, #2fa36b 0%, #22c55e 100%);
    box-shadow: 0 4px 20px rgba(47, 163, 107, 0.5);
  }

  .filter-tab[data-filter="intermediate"].active {
    background: linear-gradient(135deg, #5b6ff8 0%, #667eea 100%);
    box-shadow: 0 4px 20px rgba(91, 111, 248, 0.5);
  }

  .filter-tab[data-filter="advanced"].active {
    background: linear-gradient(135deg, #ff9800 0%, #f97316 100%);
    box-shadow: 0 4px 20px rgba(255, 152, 0, 0.5);
  }

  .filter-divider {
    width: 1px;
    height: 24px;
    background: rgba(255, 255, 255, 0.2);
    margin: 0 0.5rem;
  }

  /* View Toggle Switch - Galaxy Toggle Design */
  .view-toggle-switch {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.1);
    border: 1px solid rgba(255, 255, 255, 0.2);
    border-radius: 10px;
    padding: 3px;
    position: relative;
    height: 36px;
  }

  .view-switch-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 38px;
    height: 30px;
    border: none;
    background: transparent;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.3s ease;
    color: rgba(255, 255, 255, 0.6);
    position: relative;
    z-index: 2;
  }

  .view-switch-btn:hover {
    color: white;
  }

  .view-switch-btn.active {
    color: white;
  }

  .toggle-slider {
    position: absolute;
    width: 38px;
    height: 30px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 7px;
    box-shadow: 0 2px 12px rgba(102, 126, 234, 0.4);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    left: 3px;
    z-index: 1;
  }

  .view-toggle-switch[data-active="journey"] .toggle-slider {
    transform: translateX(38px);
  }

  .filter-right {
    display: flex;
    align-items: center;
    gap: 1rem;
  }

  .filter-search {
    position: relative;
    width: 220px;
  }

  .search-input {
    width: 100%;
    height: 44px;
    padding: 0 1.25rem;
    border: 2px solid rgba(255, 255, 255, 0.2);
    border-radius: 12px;
    font-size: 0.9rem;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.1);
    color: white;
    backdrop-filter: blur(5px);
  }

  .search-input:focus {
    outline: none;
    border-color: rgba(139, 92, 246, 0.6);
    background: rgba(255, 255, 255, 0.15);
    box-shadow: 0 0 20px rgba(139, 92, 246, 0.3);
  }

  .search-input::placeholder {
    color: rgba(255, 255, 255, 0.5);
  }

  /* ========================================
     LOADING & ERROR STATES
     ======================================== */
  .loading-container,
  .error-container,
  .empty-container {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    padding: 3rem 1.5rem;
    text-align: center;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    display: none; /* Ẩn mặc định */
  }

  /* ========================================
     IN-PAGE LOADING STATE - Logo O...
     ======================================== */
  .topics-loading-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 350px;
    padding: 3rem 1rem;
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    margin: 1rem 0;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
  }

  .topics-loading-container .quiz-loading-popup {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .topics-loading-container .quiz-loading-logo {
    font-family: "Fredoka One", "Baloo 2", "Nunito", sans-serif;
    font-size: 3rem;
    font-weight: 400;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0;
  }

  .topics-loading-container .quiz-loading-logo .logo-o {
    color: #5b6ff8;
    font-size: 3.5rem;
  }

  .topics-loading-container .quiz-loading-logo .logo-dots {
    display: flex;
    align-items: flex-end;
    gap: 3px;
    margin-left: 2px;
  }

  .topics-loading-container .quiz-loading-logo .dot {
    width: 8px;
    height: 8px;
    background: #ffb020;
    border-radius: 50%;
    animation: topicsDotDrop 1.2s ease-in-out infinite;
  }

  .topics-loading-container .quiz-loading-logo .dot:nth-child(1) {
    animation-delay: 0s;
  }
  .topics-loading-container .quiz-loading-logo .dot:nth-child(2) {
    animation-delay: 0.2s;
  }
  .topics-loading-container .quiz-loading-logo .dot:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes topicsDotDrop {
    0% {
      transform: translateY(-12px);
      opacity: 0;
    }
    30% {
      transform: translateY(0);
      opacity: 1;
    }
    50% {
      transform: translateY(-4px);
    }
    70%,
    100% {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .topics-loading-container .quiz-loading-text {
    color: #5b6ff8;
    font-size: 0.9375rem;
    margin-top: 1rem;
    font-weight: 500;
  }

  .topics-loading-container .quiz-loading-hint {
    color: #a0aec0;
    font-size: 0.8125rem;
    margin-top: 0.5rem;
  }

  .dual-ring-spinner {
    position: relative;
    width: 72px;
    height: 72px;
    margin: 0 auto;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border-style: solid;
    border-color: transparent;
  }

  .ring-outer {
    width: 72px;
    height: 72px;
    border-width: 3px;
    border-top-color: #5b6ff8;
    border-right-color: #5b6ff8;
    animation: spin-clockwise 1.5s linear infinite;
    top: 0;
    left: 0;
  }

  .ring-inner {
    width: 54px;
    height: 54px;
    border-width: 3px;
    border-bottom-color: #7b6cf6;
    border-left-color: #7b6cf6;
    animation: spin-counter 1s linear infinite;
    top: 9px;
    left: 9px;
  }

  @keyframes spin-clockwise {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(720deg);
    }
  }

  @keyframes spin-counter {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(-720deg);
    }
  }

  .error-icon,
  .empty-icon {
    font-size: 3.5rem;
    margin-bottom: 0.875rem;
  }

  .error-container h3,
  .empty-container h3 {
    font-size: 1.25rem;
    color: #1a202c;
    margin-bottom: 0.375rem;
  }

  .error-message,
  .empty-container p {
    color: #718096;
    font-size: 0.9375rem;
    margin-bottom: 1.25rem;
  }

  .btn-retry {
    padding: 0.625rem 1.5rem;
    background: linear-gradient(135deg, #5b6ff8 0%, #7b6cf6 100%);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .btn-retry:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 16px rgba(91, 111, 248, 0.4);
  }

  /* ========================================
     ANIMATION KEYFRAMES
     ======================================== */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes shimmer {
    0% {
      background-position: -1000px 0;
    }
    100% {
      background-position: 1000px 0;
    }
  }

  @keyframes pulse {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.5;
    }
  }

  /* ========================================
     TOPICS GRID
     ======================================== */
  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 220px));
    gap: 1.25rem;
    margin-bottom: 1.5rem;
    justify-content: start;
  }

  /* ========================================
     SKELETON LOADING
     ======================================== */
  .topic-card.skeleton {
    pointer-events: none;
    cursor: default;
    animation: none;
  }

  .skeleton .skeleton-line {
    height: 14px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 3px;
    margin-bottom: 8px;
  }

  .skeleton .skeleton-icon {
    width: 54px;
    height: 54px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 10px;
    margin-bottom: 0.875rem;
  }

  .skeleton .skeleton-badge {
    width: 72px;
    height: 22px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 10px;
    display: inline-block;
    margin-right: 6px;
  }

  .skeleton .skeleton-button {
    width: 100%;
    height: 40px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 8px;
    margin-top: 0.875rem;
  }

  .skeleton .skeleton-stats {
    display: flex;
    gap: 0.875rem;
    margin: 0.875rem 0;
    padding-top: 0.875rem;
    border-top: 1px solid #e2e8f0;
  }

  .skeleton .skeleton-stat {
    flex: 1;
    height: 36px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 6px;
  }

  /* ========================================
     TOPIC CARD - Professional Design (Vertical) - PROMINENT
     ======================================== */
  .topic-card {
    background: linear-gradient(145deg, #ffffff 0%, #f8faff 100%);
    border: 2px solid rgba(91, 111, 248, 0.15);
    border-radius: 16px;
    padding: 1.25rem;
    box-shadow:
      0 4px 15px rgba(91, 111, 248, 0.1),
      0 1px 3px rgba(0, 0, 0, 0.05);
    cursor: pointer;
    transition:
      box-shadow 0.3s ease,
      border-color 0.3s ease;
    position: relative;
    overflow: visible;
    opacity: 0;
    animation: gridCardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    display: flex;
    flex-direction: column;
    min-height: 280px;
    height: 100%;
    width: 100%;
    max-width: 240px;
    transform-style: preserve-3d;
    will-change: transform;
  }

  @keyframes gridCardPop {
    0% {
      opacity: 0;
      transform: scale(0.85) translateY(20px);
    }
    60% {
      opacity: 1;
      transform: scale(1.03) translateY(-4px);
    }
    100% {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  /* Fast staggered animation delay */
  .topic-card:nth-child(1) {
    animation-delay: 0.03s;
  }
  .topic-card:nth-child(2) {
    animation-delay: 0.06s;
  }
  .topic-card:nth-child(3) {
    animation-delay: 0.09s;
  }
  .topic-card:nth-child(4) {
    animation-delay: 0.12s;
  }
  .topic-card:nth-child(5) {
    animation-delay: 0.15s;
