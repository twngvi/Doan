<!-- Topics Page Styles -->
<style>
  /* ========================================
     TOPICS CONTAINER
     ======================================== */
  .topics-container {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 2rem;
  }

  /* ========================================
     PAGE HEADER
     ======================================== */
  .topics-header {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 2rem;
    margin-bottom: 2rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  }

  .header-content {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
  }

  .header-left {
    flex: 1;
  }

  .btn-back {
    background: none;
    border: none;
    color: #667eea;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 0.5rem 0;
    transition: all 0.3s ease;
  }

  .btn-back:hover {
    color: #764ba2;
    transform: translateX(-5px);
  }

  .btn-back:active {
    transform: translateX(-3px);
  }

  .page-title {
    font-size: 2.5rem;
    font-weight: 800;
    color: #1a202c;
    margin: 0 0 0.5rem 0;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .title-icon {
    font-size: 2.5rem;
  }

  .page-subtitle {
    font-size: 1.1rem;
    color: #718096;
    margin: 0;
  }

  .user-progress-summary {
    display: flex;
    gap: 2rem;
  }

  .progress-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 1rem 1.5rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    border-radius: 12px;
    color: white;
  }

  .progress-icon {
    font-size: 2rem;
  }

  .progress-value {
    font-size: 1.8rem;
    font-weight: 700;
  }

  .progress-label {
    font-size: 0.9rem;
    opacity: 0.9;
  }

  /* ========================================
     FILTER SECTION
     ======================================== */
  .topics-filter {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 2rem;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
  }

  .filter-tabs {
    display: flex;
    gap: 0.5rem;
  }

  .filter-tab {
    padding: 0.75rem 1.5rem;
    border: 2px solid transparent;
    background: transparent;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    color: #4a5568;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .filter-tab:hover {
    background: rgba(102, 126, 234, 0.1);
    color: #667eea;
  }

  .filter-tab.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
  }

  .filter-search {
    position: relative;
    width: 300px;
  }

  .search-input {
    width: 100%;
    padding: 0.75rem 3rem 0.75rem 1rem;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    font-size: 1rem;
    transition: all 0.3s ease;
  }

  .search-input:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .search-icon {
    position: absolute;
    right: 1rem;
    top: 50%;
    transform: translateY(-50%);
    font-size: 1.2rem;
  }

  /* ========================================
     LOADING & ERROR STATES
     ======================================== */
  .loading-container,
  .error-container,
  .empty-container {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 4rem 2rem;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    display: none; /* Ẩn mặc định */
  }

  /* ========================================
     QUIZ LOADING POPUP - Logo O...
     ======================================== */
  .quiz-loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(102, 126, 234, 0.15);
    backdrop-filter: blur(4px);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 9999;
  }

  .quiz-loading-overlay.show {
    display: flex;
  }

  .quiz-loading-popup {
    background: white;
    border-radius: 20px;
    padding: 2.5rem 3.5rem;
    box-shadow: 0 20px 60px rgba(102, 126, 234, 0.3);
    text-align: center;
    animation: popupBounceIn 0.4s ease;
  }

  @keyframes popupBounceIn {
    0% {
      opacity: 0;
      transform: scale(0.8) translateY(20px);
    }
    50% {
      transform: scale(1.05) translateY(-5px);
    }
    100% {
      opacity: 1;
      transform: scale(1) translateY(0);
    }
  }

  .quiz-loading-logo {
    font-family: "Fredoka One", "Baloo 2", "Nunito", sans-serif;
    font-size: 3.5rem;
    font-weight: 400;
    display: flex;
    align-items: baseline;
    justify-content: center;
    gap: 0;
  }

  .quiz-loading-logo .logo-o {
    color: #1e4fba;
    font-size: 4rem;
  }

  .quiz-loading-logo .logo-dots {
    display: flex;
    align-items: flex-end;
    gap: 4px;
    margin-left: 2px;
  }

  .quiz-loading-logo .dot {
    width: 10px;
    height: 10px;
    background: #38bdf8;
    border-radius: 50%;
    animation: dotDrop 1.2s ease-in-out infinite;
  }

  .quiz-loading-logo .dot:nth-child(1) {
    animation-delay: 0s;
  }

  .quiz-loading-logo .dot:nth-child(2) {
    animation-delay: 0.2s;
  }

  .quiz-loading-logo .dot:nth-child(3) {
    animation-delay: 0.4s;
  }

  @keyframes dotDrop {
    0% {
      transform: translateY(-15px);
      opacity: 0;
    }
    30% {
      transform: translateY(0);
      opacity: 1;
    }
    50% {
      transform: translateY(-5px);
    }
    70%,
    100% {
      transform: translateY(0);
      opacity: 1;
    }
  }

  .quiz-loading-text {
    color: #667eea;
    font-size: 1rem;
    margin-top: 1rem;
    font-weight: 500;
  }

  .dual-ring-spinner {
    position: relative;
    width: 80px;
    height: 80px;
    margin: 0 auto;
  }

  .ring {
    position: absolute;
    border-radius: 50%;
    border-style: solid;
    border-color: transparent;
  }

  .ring-outer {
    width: 80px;
    height: 80px;
    border-width: 4px;
    border-top-color: #667eea;
    border-right-color: #667eea;
    animation: spin-clockwise 1.5s linear infinite;
    top: 0;
    left: 0;
  }

  .ring-inner {
    width: 60px;
    height: 60px;
    border-width: 4px;
    border-bottom-color: #764ba2;
    border-left-color: #764ba2;
    animation: spin-counter 1s linear infinite;
    top: 10px;
    left: 10px;
  }

  @keyframes spin-clockwise {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(720deg);
    }
  }

  @keyframes spin-counter {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(-720deg);
    }
  }

  .error-icon,
  .empty-icon {
    font-size: 4rem;
    margin-bottom: 1rem;
  }

  .error-container h3,
  .empty-container h3 {
    font-size: 1.5rem;
    color: #1a202c;
    margin-bottom: 0.5rem;
  }

  .error-message,
  .empty-container p {
    color: #718096;
    font-size: 1.1rem;
    margin-bottom: 1.5rem;
  }

  .btn-retry {
    padding: 0.75rem 2rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s ease;
  }

  .btn-retry:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
  }

  /* ========================================
     ANIMATION KEYFRAMES
     ======================================== */
  @keyframes fadeInUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  @keyframes shimmer {
    0% {
      background-position: -1000px 0;
    }
    100% {
      background-position: 1000px 0;
    }
  }

  @keyframes pulse {
    0%,
    100% {
      opacity: 1;
    }
    50% {
      opacity: 0.5;
    }
  }

  /* ========================================
     TOPICS GRID
     ======================================== */
  .topics-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 2rem;
    margin-bottom: 2rem;
  }

  /* ========================================
     SKELETON LOADING
     ======================================== */
  .topic-card.skeleton {
    pointer-events: none;
    cursor: default;
    animation: none;
  }

  .skeleton .skeleton-line {
    height: 16px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 4px;
    margin-bottom: 10px;
  }

  .skeleton .skeleton-icon {
    width: 60px;
    height: 60px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 12px;
    margin-bottom: 1rem;
  }

  .skeleton .skeleton-badge {
    width: 80px;
    height: 24px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 12px;
    display: inline-block;
    margin-right: 8px;
  }

  .skeleton .skeleton-button {
    width: 100%;
    height: 44px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 10px;
    margin-top: 1rem;
  }

  .skeleton .skeleton-stats {
    display: flex;
    gap: 1rem;
    margin: 1rem 0;
    padding-top: 1rem;
    border-top: 1px solid #e2e8f0;
  }

  .skeleton .skeleton-stat {
    flex: 1;
    height: 40px;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
    background-size: 2000px 100%;
    animation: shimmer 2s infinite;
    border-radius: 8px;
  }

  /* ========================================
     TOPIC CARD WITH ANIMATION
     ======================================== */
  .topic-card {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 16px;
    padding: 1.5rem;
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeInUp 0.6s ease forwards;
    /* Đồng bộ kích thước card */
    display: flex;
    flex-direction: column;
    min-height: 320px;
    height: 100%;
  }

  /* Staggered animation delay for each card */
  .topic-card:nth-child(1) {
    animation-delay: 0.1s;
  }
  .topic-card:nth-child(2) {
    animation-delay: 0.2s;
  }
  .topic-card:nth-child(3) {
    animation-delay: 0.3s;
  }
  .topic-card:nth-child(4) {
    animation-delay: 0.4s;
  }
  .topic-card:nth-child(5) {
    animation-delay: 0.5s;
  }
  .topic-card:nth-child(6) {
    animation-delay: 0.6s;
  }
  .topic-card:nth-child(7) {
    animation-delay: 0.7s;
  }
  .topic-card:nth-child(8) {
    animation-delay: 0.8s;
  }
  .topic-card:nth-child(9) {
    animation-delay: 0.9s;
  }
  .topic-card:nth-child(n + 10) {
    animation-delay: 1s;
  }

  .topic-card::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    transform: scaleX(0);
    transition: transform 0.3s ease;
  }

  .topic-card:hover {
    transform: scale(1.05);
    box-shadow: 0 12px 35px rgba(102, 126, 234, 0.3);
  }

  .topic-card:hover::before {
    transform: scaleX(1);
  }

  .topic-card-header {
    display: flex;
    justify-content: space-between;
    align-items: start;
    margin-bottom: 1rem;
  }

  .topic-icon {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }

  .topic-badges {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }

  .badge {
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .badge-journey {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .badge-category {
    background: #e2e8f0;
    color: #4a5568;
  }

  .badge-locked {
    background: #fc8181;
    color: white;
  }

  .badge-completed {
    background: #48bb78;
    color: white;
  }

  .topic-title {
    font-size: 1.4rem;
    font-weight: 700;
    color: #1a202c;
    margin: 0.5rem 0;
    /* Giới hạn 2 dòng */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 2.8rem;
  }

  .topic-description {
    color: #718096;
    font-size: 0.95rem;
    line-height: 1.6;
    margin-bottom: 1rem;
    /* Giới hạn 2 dòng và truncate */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    text-overflow: ellipsis;
    min-height: 3rem;
    flex-grow: 1;
  }

  .topic-stats {
    display: flex;
    gap: 1rem;
    margin-bottom: 1rem;
    padding-top: 1rem;
    border-top: 1px solid #e2e8f0;
    margin-top: auto; /* Đẩy stats xuống cuối card */
  }

  .stat {
    flex: 1;
    text-align: center;
  }

  .stat-value {
    font-size: 1.2rem;
    font-weight: 700;
    color: #667eea;
  }

  .stat-label {
    font-size: 0.8rem;
    color: #718096;
    margin-top: 0.25rem;
  }

  .topic-progress {
    margin-top: 0.5rem;
  }

  .progress-bar {
    height: 8px;
    background: #e2e8f0;
    border-radius: 10px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
    border-radius: 10px;
    transition: width 0.5s ease;
  }

  .progress-text {
    font-size: 0.85rem;
    color: #718096;
    margin-top: 0.5rem;
    text-align: right;
  }

  .topic-action {
    margin-top: 1rem;
    width: 100%;
    padding: 0.75rem;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .topic-action:hover {
    transform: scale(1.02);
    box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
  }

  .topic-action.locked {
    background: #cbd5e0;
    cursor: not-allowed;
  }

  .topic-action.locked:hover {
    transform: none;
    box-shadow: none;
  }

  /* ========================================
     JOURNEY VIEW
     ======================================== */
  .topics-journey {
    display: flex;
    flex-direction: column;
    gap: 3rem;
  }

  .journey-section {
    background: rgba(255, 255, 255, 0.95);
    border-radius: 20px;
    padding: 2rem;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
  }

  .journey-header {
    margin-bottom: 2rem;
  }

  .journey-title {
    font-size: 2rem;
    font-weight: 800;
    color: #1a202c;
    margin: 0 0 0.5rem 0;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .journey-icon {
    font-size: 2rem;
  }

  .journey-description {
    font-size: 1.1rem;
    color: #718096;
    margin: 0;
  }

  .journey-topics {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 1.5rem;
  }

  /* ========================================
     VIEW TOGGLE
     ======================================== */
  .view-toggle {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    display: flex;
    gap: 0.5rem;
    background: white;
    padding: 0.5rem;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
  }

  .toggle-btn {
    padding: 0.75rem 1.25rem;
    background: transparent;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    font-weight: 600;
    color: #4a5568;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .toggle-btn:hover {
    background: rgba(102, 126, 234, 0.1);
  }

  .toggle-btn.active {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  /* ========================================
     MODAL
     ======================================== */
  .modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 2rem;
  }

  .modal-content.topic-modal {
    background: white;
    border-radius: 20px;
    max-width: 600px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
  }

  .modal-header {
    padding: 2rem;
    border-bottom: 2px solid #e2e8f0;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .modal-title {
    font-size: 1.8rem;
    font-weight: 700;
    color: #1a202c;
    margin: 0;
  }

  .modal-close {
    width: 40px;
    height: 40px;
    border: none;
    background: #e2e8f0;
    border-radius: 50%;
    font-size: 1.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .modal-close:hover {
    background: #cbd5e0;
    transform: rotate(90deg);
  }

  .modal-body {
    padding: 2rem;
  }

  .detail-badge-group {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .topic-detail-info .topic-description {
    font-size: 1.1rem;
    line-height: 1.8;
    margin-bottom: 2rem;
  }

  .topic-stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: linear-gradient(
      135deg,
      rgba(102, 126, 234, 0.1) 0%,
      rgba(118, 75, 162, 0.1) 100%
    );
    padding: 1.5rem;
    border-radius: 12px;
    text-align: center;
  }

  .stat-card .stat-icon {
    font-size: 2rem;
    margin-bottom: 0.5rem;
  }

  .stat-card .stat-value {
    font-size: 1.5rem;
    font-weight: 700;
    color: #667eea;
  }

  .stat-card .stat-label {
    font-size: 0.9rem;
    color: #718096;
    margin-top: 0.25rem;
  }

  .topic-progress-section h4 {
    font-size: 1.2rem;
    color: #1a202c;
    margin-bottom: 1rem;
  }

  .modal-footer {
    padding: 1.5rem 2rem;
    border-top: 2px solid #e2e8f0;
    display: flex;
    gap: 1rem;
    justify-content: flex-end;
  }

  .btn-secondary,
  .btn-primary {
    padding: 0.75rem 2rem;
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .btn-secondary {
    background: #e2e8f0;
    color: #4a5568;
  }

  .btn-secondary:hover {
    background: #cbd5e0;
  }

  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
  }

  /* ========================================
     RESPONSIVE
     ======================================== */
  @media (max-width: 768px) {
    .topics-container {
      padding: 1rem;
    }

    .header-content {
      flex-direction: column;
      align-items: flex-start;
    }

    .page-title {
      font-size: 2rem;
    }

    .topics-filter {
      flex-direction: column;
      gap: 1rem;
    }

    .filter-search {
      width: 100%;
    }

    .topics-grid,
    .journey-topics {
      grid-template-columns: 1fr;
    }

    .view-toggle {
      bottom: 1rem;
