<!-- Topics Page Content - Professional Learning System -->
<div class="topics-container">
  <!-- Page Header -->
  <div class="topics-header">
    <!-- Galaxy Background Effects -->
    <div class="topics-header-galaxy-bg">
      <div class="topics-header-stars" id="topicsHeaderStars"></div>
      <div class="topics-header-nebula"></div>
      <div class="topics-header-meteor-container" id="topicsMeteorContainer"></div>
    </div>
    <div class="header-content">
      <div class="header-left">
        <h1 class="page-title">
          Chủ Đề Học Tập
        </h1>
      </div>
      <div class="header-right">
        <div class="header-search">
          <input 
            type="text" 
            id="searchTopics" 
            class="search-input" 
            placeholder="Tìm kiếm chủ đề..." 
            autocomplete="off"
            oninput="searchTopics(this.value)" 
          />
        </div>
        <div class="header-filter-tabs">
          <button class="filter-tab active" data-filter="all" onclick="filterTopics('all')">
            Tất cả
          </button>
        </div>
        <div class="view-toggle-switch">
          <button class="view-switch-btn active" data-view="grid" onclick="toggleView('grid')" title="Grid View">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="3" width="7" height="7"/>
              <rect x="14" y="3" width="7" height="7"/>
              <rect x="14" y="14" width="7" height="7"/>
              <rect x="3" y="14" width="7" height="7"/>
            </svg>
          </button>
          <button class="view-switch-btn" data-view="journey" onclick="toggleView('journey')" title="Journey View">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </button>
          <div class="toggle-slider"></div>
        </div>
        <div class="progress-item progress-item-highlight">
          <span class="progress-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </span>
          <span class="progress-value" id="completedTopics">0</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Topics Grid -->
  <!-- In-Page Loading State -->
  <div id="topicsLoading" class="topics-loading-container">
    <div class="quiz-loading-popup">
      <div class="quiz-loading-logo">
        <span class="logo-o">O</span>
        <div class="logo-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
      <div class="quiz-loading-text">Đang tải danh sách chủ đề...</div>
      <p class="quiz-loading-hint">Vui lòng chờ trong giây lát</p>
    </div>
  </div>

  <!-- Error State -->
  <div id="topicsError" class="error-container" style="display: none">
    <div class="error-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#EF4444" stroke-width="2">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
    </div>
    <h3>Không thể tải danh sách chủ đề</h3>
    <p class="error-message"></p>
    <button class="btn-retry" onclick="loadTopics()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M23 4v6h-6M1 20v-6h6"/>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
      </svg>
      Thử lại
    </button>
  </div>

  <!-- Empty State -->
  <div id="topicsEmpty" class="empty-container" style="display: none">
    <div class="empty-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#9CA3AF" stroke-width="2">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
        <line x1="9" y1="10" x2="15" y2="10"/>
      </svg>
    </div>
    <h3>Chưa có chủ đề nào</h3>
    <p>Hệ thống đang được cập nhật thêm nội dung học tập</p>
  </div>

  <!-- Topics Grid -->
  <div id="topicsGrid" class="topics-grid" style="display: none">
    <!-- Topics will be dynamically loaded here -->
  </div>

  <!-- Journey List View (Simple List Layout) -->
  <div id="topicsJourney" class="topics-journey-list" style="display: none">
    <div class="journey-list-container" id="journeyListContainer">
      <!-- Topics will be dynamically loaded as list items -->
    </div>
  </div>
</div>

<!-- Topic Detail Modal -->
<div id="topicDetailModal" class="modal-overlay" style="display: none" onclick="closeTopicDetail(event)">
  <div class="modal-content topic-modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-topic-icon" id="modalIcon"></div>
        <div>
          <h3 id="modalTopicTitle" class="modal-title">Topic Title</h3>
          <div class="detail-badge-group">
            <span class="level-badge" id="modalJourney">Beginner</span>
            <span class="category-badge" id="modalCategory">Category</span>
          </div>
        </div>
      </div>
      <button class="modal-close" onclick="closeTopicDetail()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="modal-body">
      <p class="topic-description" id="modalDescription">Description here...</p>

      <div class="topic-stats-grid">
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5B6FF8" stroke-width="2">
              <path d="M12 2L2 7l10 5 10-5-10-5z"/>
              <path d="M2 17l10 5 10-5"/>
              <path d="M2 12l10 5 10-5"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="modalTotalStages">0</div>
            <div class="stat-label">Stages</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5B6FF8" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="modalMinAI">1</div>
            <div class="stat-label">Min AI</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#5B6FF8" stroke-width="2">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22,4 12,14.01 9,11.01"/>
            </svg>
          </div>
          <div class="stat-info">
            <div class="stat-value" id="modalMinAccuracy">0%</div>
            <div class="stat-label">Min Acc</div>
          </div>
        </div>
      </div>

      <div class="topic-progress-section">
        <h4>Tiến độ của bạn</h4>
        <div class="progress-bar-modal">
          <div class="progress-fill" id="modalProgressFill" style="width: 0%"></div>
        </div>
        <p class="progress-text" id="modalProgressText">0% hoàn thành</p>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="closeTopicDetail()">Đóng</button>
      <button class="btn-primary" id="modalStartBtn" onclick="startTopic()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polygon points="5 3 19 12 5 21 5 3"/>
        </svg>
        Bắt đầu học
      </button>
    </div>
  </div>
</div>
