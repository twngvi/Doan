<!-- Topics Page Scripts -->
<script>
  (function () {
    console.log("🚀 Topics page scripts loading...");

    // ========================================
    // MODULE VARIABLES (in closure)
    // ========================================
    let allTopics = [];
    let filteredTopics = [];
    let currentFilter = "all";
    let currentView = "grid";
    let selectedTopic = null;
    let userProgress = {};

    // ⭐ CACHE để tránh reload không cần thiết
    let topicsCache = null;
    let progressCache = null;
    let lastLoadTime = 0;
    const CACHE_DURATION = 60000; // Cache 1 phút
    const TOPICS_DATA_CHANGED_KEY = "topics_data_changed_at";
    let lastTopicsDataChangeStamp = 0;

    // ⭐ Expose function to invalidate LOCAL cache from other pages
    window.invalidateTopicsLocalCache = function () {
      progressCache = null;
      topicsCache = null;
      lastLoadTime = 0;
      console.log("🔄 Topics LOCAL progress cache invalidated");
    };

    function getTopicsDataChangedStamp() {
      try {
        const raw = localStorage.getItem(TOPICS_DATA_CHANGED_KEY);
        if (!raw) return 0;
        const stamp = Number(raw);
        return Number.isFinite(stamp) ? stamp : 0;
      } catch (e) {
        console.warn("⚠️ Could not read topics changed marker:", e);
        return 0;
      }
    }

    /**
     * ⭐ Merge localStorage lesson progress into progress map
     * Reads lesson_progress_<topicId> keys written by Lesson page
     * Options:
     * - serverAuthoritative: if true, topics missing on server will be removed from localStorage
     */
    function mergeLocalStorageProgress(progress, options) {
      var merged = Object.assign({}, progress || {});
      var opts = options || {};
      var serverAuthoritative = !!opts.serverAuthoritative;

      try {
        for (var i = localStorage.length - 1; i >= 0; i--) {
          var key = localStorage.key(i);
          if (!key || key.indexOf("lesson_progress_") !== 0) continue;

          var topicId = key.replace("lesson_progress_", "");
          var localData = JSON.parse(localStorage.getItem(key) || "null");
          if (!localData) continue;

          // If server is source of truth and topic no longer exists there (e.g. reset), clear stale local cache.
          if (serverAuthoritative && !merged[topicId]) {
            localStorage.removeItem(key);
            continue;
          }

          if (!merged[topicId]) {
            merged[topicId] = {
              topicId: topicId,
              completed: false,
              progress: 0,
            };
          }

          // Merge: true values from either source win
          merged[topicId].lessonCompleted =
            merged[topicId].lessonCompleted || localData.lessonRead || false;
          merged[topicId].mindmapViewed =
            merged[topicId].mindmapViewed || localData.mindmapViewed || false;
          merged[topicId].flashcardsCompleted =
            merged[topicId].flashcardsCompleted ||
            localData.flashcardsDone ||
            false;
          merged[topicId].miniQuizCompleted =
            merged[topicId].miniQuizCompleted || localData.lessonQuiz || false;

          // Recalculate progress percentage
          var count = 0;
          if (merged[topicId].lessonCompleted) count++;
          if (merged[topicId].mindmapViewed) count++;
          if (merged[topicId].flashcardsCompleted) count++;
          if (merged[topicId].miniQuizCompleted) count++;
          merged[topicId].progress = Math.round((count / 4) * 100);
          merged[topicId].completed = count === 4;
        }
      } catch (e) {
        console.warn("⚠️ Could not merge localStorage progress:", e);
      }
      return merged;
    }

    // ========================================
    // INITIALIZATION
    // ========================================
    window.initTopicsPage = function () {
      console.log("✅ Initializing Topics Page...");
      setupEventListeners();
      loadTopics();
      // Start meteor shower for header
      startTopicsHeaderMeteors();
      setupTopicsHeaderMouseEffect();
    };

    function setupEventListeners() {
      // Search input debounce
      const searchInput = document.getElementById("searchTopics");
      if (!searchInput) {
        console.warn("Search input not found, skipping event listener setup");
        return;
      }

      let searchTimeout;
      searchInput.addEventListener("input", function (e) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchTopics(e.target.value);
        }, 200); // Giảm debounce từ 300ms xuống 200ms
      });
    }

    // ========================================
    // LOAD TOPICS FROM DATABASE - OPTIMIZED
    // ========================================
    function loadTopics(forceRefresh = false) {
      console.log("Loading topics from database...");

      const now = Date.now();
      const topicsChangedStamp = getTopicsDataChangedStamp();
      const hasTopicsDataChanged = topicsChangedStamp > lastTopicsDataChangeStamp;
      if (hasTopicsDataChanged) {
        console.log("🔄 Topics data changed marker detected, forcing fresh reload...");
        forceRefresh = true;
        lastTopicsDataChangeStamp = topicsChangedStamp;
        topicsCache = null;
        progressCache = null;
        lastLoadTime = 0;
        if (window.globalTopicsCache) {
          window.globalTopicsCache.data = null;
          window.globalTopicsCache.progress = null;
          window.globalTopicsCache.lastLoadTime = 0;
        }
      }

      // ⭐ Hiện loading state trước khi check cache
      if (!forceRefresh) {
        showLoadingState();
      }

      // ⭐ ƯU TIÊN 1: Kiểm tra GLOBAL cache cho topics data (có thể đã load từ MCQ page)
      const globalCache = window.globalTopicsCache;
      if (
        !forceRefresh &&
        globalCache &&
        globalCache.data &&
        now - globalCache.lastLoadTime <
          (globalCache.cacheDuration || CACHE_DURATION)
      ) {
        console.log(
          "✅ Using GLOBAL cached topics data, refreshing progress...",
        );
        allTopics = globalCache.data;
        topicsCache = globalCache.data;
        lastLoadTime = globalCache.lastLoadTime;
        filteredTopics = [...allTopics];

        // Use cached progress for instant render, then refresh from server
        userProgress = mergeLocalStorageProgress(globalCache.progress || {});
        progressCache = userProgress;
        renderTopics();
        updateProgressStats();
        hideLoadingState();

        // ⭐ Always fetch fresh progress in background
        refreshProgressFromServer();
        return;
      }

      // ⭐ ƯU TIÊN 2: Kiểm tra LOCAL cache cho topics data
      if (!forceRefresh && topicsCache && now - lastLoadTime < CACHE_DURATION) {
        console.log(
          "✅ Using LOCAL cached topics data, refreshing progress...",
        );
        allTopics = topicsCache;
        filteredTopics = [...allTopics];

        // Use cached progress for instant render, then refresh from server
        userProgress = mergeLocalStorageProgress(progressCache || {});
        renderTopics();
        updateProgressStats();
        hideLoadingState();

        // ⭐ Always fetch fresh progress in background
        refreshProgressFromServer();
        return;
      }

      // ⭐ ƯU TIÊN 3: Load từ server
      // Show loading state
      showLoadingState();

      // ⭐ LOAD SONG SONG: Topics và Progress cùng lúc
      let topicsLoaded = false;
      let progressLoaded = false;
      let topicsResult = null;
      let progressResult = null;

      function tryRender() {
        // Chỉ render khi cả 2 đã load xong
        if (topicsLoaded && progressLoaded) {
          processAndRender(topicsResult, progressResult);
        }
      }

      // Call 1: Get Topics
      google.script.run
        .withSuccessHandler(function (result) {
          topicsResult = result;
          topicsLoaded = true;
          tryRender();
        })
        .withFailureHandler(function (error) {
          topicsLoaded = true;
          topicsResult = { success: false, error: error };
          tryRender();
        })
        .getAllTopics();

      // Call 2: Get User Progress (song song)
      google.script.run
        .withSuccessHandler(function (result) {
          progressResult = result;
          progressLoaded = true;
          tryRender();
        })
        .withFailureHandler(function (error) {
          progressLoaded = true;
          progressResult = { success: false, progress: {} };
          tryRender();
        })
        .getUserTopicProgress();
    }

    // ⭐ XỬ LÝ VÀ RENDER - Gộp logic, render 1 lần duy nhất
    function processAndRender(topicsResult, progressResult) {
      console.log("Processing topics and progress...");

      // Xử lý lỗi topics
      if (!topicsResult) {
        console.error("❌ Topics result is null");
        showErrorState("Lỗi: Server không trả về dữ liệu.");
        return;
      }

      if (!topicsResult.success) {
        console.error("❌ Topics request failed:", topicsResult.message);
        showErrorState(topicsResult.message || "Lỗi không xác định từ Server.");
        return;
      }

      if (!topicsResult.topics || topicsResult.topics.length === 0) {
        console.warn("⚠️ No topics found");
        showEmptyState();
        return;
      }

      // ⭐ Lưu vào biến và LOCAL cache
      allTopics = topicsResult.topics;
      topicsCache = topicsResult.topics;

      // Xử lý progress
      const hasTrustedServerProgress = !!(
        progressResult && progressResult.success
      );
      if (hasTrustedServerProgress && progressResult.progress) {
        userProgress = progressResult.progress;
      } else {
        userProgress = {};
      }
      // ⭐ Chỉ coi server là nguồn đúng khi call progress thành công
      userProgress = mergeLocalStorageProgress(userProgress, {
        serverAuthoritative: hasTrustedServerProgress,
      });
      progressCache = userProgress;

      lastLoadTime = Date.now();

      // ⭐ Lưu vào GLOBAL cache (để chia sẻ với MCQ, Matching và các page khác)
      if (!window.globalTopicsCache) {
        window.globalTopicsCache = {
          data: null,
          progress: null,
          lastLoadTime: 0,
          cacheDuration: 60000,
        };
      }
      window.globalTopicsCache.data = topicsResult.topics;
      window.globalTopicsCache.progress = userProgress;
      window.globalTopicsCache.lastLoadTime = Date.now();
      console.log(`✅ Saved ${allTopics.length} topics to GLOBAL cache`);

      console.log(`✅ Loaded ${allTopics.length} topics with progress`);

      filteredTopics = [...allTopics];

      // ⭐ RENDER 1 LẦN DUY NHẤT (không có setTimeout delay)
      renderTopics();
      updateProgressStats();
      hideLoadingState();
    }

    function onTopicsLoadError(error) {
      console.error("❌ Error loading topics:", error);
      showErrorState(
        error.message ||
          error.toString() ||
          "Không thể kết nối với server. Vui lòng thử lại sau.",
      );
    }

    /**
     * ⭐ Refresh progress from server in background (uses cached topics)
     * Re-renders topics after getting fresh data
     */
    function refreshProgressFromServer() {
      console.log("🔄 Refreshing progress from server...");
      google.script.run
        .withSuccessHandler(function (result) {
          if (result && result.success && result.progress) {
            // ⭐ Merge localStorage data, but keep server as source of truth after resets
            var merged = mergeLocalStorageProgress(result.progress, {
              serverAuthoritative: true,
            });
            var hasChanges =
              JSON.stringify(userProgress) !== JSON.stringify(merged);
            userProgress = merged;
            progressCache = merged;
            // Update global cache
            if (window.globalTopicsCache) {
              window.globalTopicsCache.progress = merged;
            }
            if (hasChanges) {
              console.log("✅ Progress updated from server, re-rendering...");
              renderTopics();
              updateProgressStats();
            } else {
              console.log("✅ Progress unchanged from server");
            }
          }
        })
        .withFailureHandler(function (error) {
          console.warn("⚠️ Failed to refresh progress:", error);
        })
        .getUserTopicProgress();
    }

    // ========================================
    // RENDER TOPICS - OPTIMIZED
    // ========================================
    function renderTopics() {
      if (currentView === "grid") {
        renderGridView();
      } else {
        renderJourneyView();
      }
    }

    function renderGridView() {
      const grid = document.getElementById("topicsGrid");
      const emptyState = document.getElementById("topicsEmpty");

      if (filteredTopics.length === 0) {
        showEmptyState();
        return;
      }

      // ⭐ Hide empty state if showing topics
      if (emptyState) {
        emptyState.style.display = "none";
      }

      // ⭐ SỬ DỤNG DOCUMENT FRAGMENT để tránh reflow nhiều lần
      const fragment = document.createDocumentFragment();

      filteredTopics.forEach((topic) => {
        const card = createTopicCard(topic);
        fragment.appendChild(card);
      });

      // ⭐ Clear và append 1 lần duy nhất
      grid.innerHTML = "";
      grid.appendChild(fragment);

      grid.style.display = "grid";
      document.getElementById("topicsJourney").style.display = "none";

      // ⭐ Setup 3D tilt effect on grid cards
      setupGridCardTilt();
    }

    function renderJourneyView() {
      const journeyContainer = document.getElementById("topicsJourney");
      const listContainer = document.getElementById("journeyListContainer");
      const emptyState = document.getElementById("topicsEmpty");

      if (filteredTopics.length === 0) {
        showEmptyState();
        return;
      }

      // ⭐ Hide empty state if showing topics
      if (emptyState) {
        emptyState.style.display = "none";
      }

      // ⭐ Giữ nguyên thứ tự như dạng lưới (không sắp xếp theo bảng chữ cái)
      // Create list items using fragment
      const fragment = document.createDocumentFragment();
      filteredTopics.forEach((topic, index) => {
        fragment.appendChild(createTopicListItem(topic, index + 1));
      });

      // Clear and append
      listContainer.innerHTML = "";
      listContainer.appendChild(fragment);

      // ⭐ Stagger list item animations
      listContainer.querySelectorAll(".topic-list-item").forEach((item, i) => {
        item.style.animationDelay = i * 0.04 + "s";
      });

      document.getElementById("topicsGrid").style.display = "none";
      journeyContainer.style.display = "block";
    }

    // Create compact list item for journey view
    function createTopicListItem(topic, index) {
      const item = document.createElement("div");
      const status = getTopicStatus(topic, window.currentPageParams);
      const hasContent = topicHasContent(topic);
      item.className =
        "topic-list-item status-" + status + (hasContent ? "" : " no-content");
      item.onclick = () => startTopicDirect(topic);

      const progress = userProgress[topic.topicId] || {
        completed: false,
        progress: 0,
      };
      const isLocked = status === "locked";
      const journeyClass = getJourneyClass(topic.journey);
      const progressPercent = progress.progress || 0;
      const topicIcon = getTopicIcon(topic);

      let statusIndicator = "";
      if (isLocked || !hasContent) {
        statusIndicator = `
          <div class="list-item-status locked" aria-label="Đang khóa">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </div>`;
      } else if (progress.completed) {
        statusIndicator = `
          <div class="list-item-status completed" aria-label="Đã hoàn thành">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
              <polyline points="22 4 12 14.01 9 11.01"/>
            </svg>
          </div>`;
      } else {
        statusIndicator = `
          <div class="list-item-status ready" aria-label="Có thể vào học">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <polygon points="10 8 16 12 10 16 10 8" fill="currentColor"/>
            </svg>
          </div>`;
      }

      // Progress circle SVG
      let progressCircle = "";
      if (progress.completed) {
        progressCircle = `
          <div class="list-item-progress-circle completed">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="16" fill="none" stroke="#e8f7ee" stroke-width="3"/>
              <circle cx="18" cy="18" r="16" fill="none" stroke="#2fa36b" stroke-width="3"
                stroke-dasharray="100.5" stroke-dashoffset="0" stroke-linecap="round"
                transform="rotate(-90 18 18)"/>
              <path d="M12 18l4 4 8-8" fill="none" stroke="#2fa36b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>`;
      } else if (progressPercent > 0) {
        const dashOffset = 100.5 - (progressPercent / 100) * 100.5;
        progressCircle = `
          <div class="list-item-progress-circle in-progress">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="16" fill="none" stroke="#eef1ff" stroke-width="3"/>
              <circle cx="18" cy="18" r="16" fill="none" stroke="#5b6ff8" stroke-width="3"
                stroke-dasharray="100.5" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
                transform="rotate(-90 18 18)"/>
              <text x="18" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#5b6ff8">${progressPercent}%</text>
            </svg>
          </div>`;
      } else {
        progressCircle = `
          <div class="list-item-progress-circle not-started">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="16" fill="none" stroke="#e2e8f0" stroke-width="3"/>
            </svg>
          </div>`;
      }

      item.innerHTML = `
        <div class="list-item-index ${journeyClass}">${index}</div>
        <div class="list-item-icon">${topicIcon}</div>
        <div class="list-item-content">
          <div class="list-item-title">${topic.title}</div>
          <div class="list-item-meta">
            <span class="list-item-category">${topic.category || "Chung"}</span>
          </div>
        </div>
        ${progressCircle}
        ${statusIndicator}
        <div class="list-item-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      `;

      if (isLocked) item.classList.add("locked");
      if (progress.completed) item.classList.add("completed");

      return item;
    }

    // ⭐ TỐI ƯU CARD CREATION - Professional Design with SVG Icons
    function createTopicCard(topic) {
      const card = document.createElement("div");
      const status = getTopicStatus(topic, window.currentPageParams);
      const hasContent = topicHasContent(topic);
      card.className =
        "topic-card status-" + status + (hasContent ? "" : " no-content");
      // ⭐ SKIP POPUP - Go directly to lesson
      card.onclick = () => startTopicDirect(topic);

      // Get user progress for this topic
      const progress = userProgress[topic.topicId] || {
        completed: false,
        progress: 0,
      };
      const isLocked = status === "locked";
      const topicIcon = getTopicIcon(topic);
      const journeyClass = getJourneyClass(topic.journey);
      const progressPercent = progress.progress || 0;

      // SVG icons for buttons
      const playIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
      const lockIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
      const checkIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;
      const comingSoonIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>`;

      card.innerHTML = `
      <div class="topic-card-header">
        <div class="topic-icon-wrapper">
          <div class="topic-icon">${topicIcon}</div>
        </div>
        <div class="topic-badges">
          ${
            topic.category
              ? `<span class="badge badge-category">${topic.category}</span>`
              : ""
          }
          ${
            status === "completed"
              ? '<span class="badge badge-completed">Hoàn thành</span>'
              : status === "current"
                ? '<span class="badge badge-current">Đang học</span>'
                : ""
          }
        </div>
      </div>
      <h3 class="topic-title">${topic.title}</h3>
      <p class="topic-description">${truncateText(topic.description, 120)}</p>
      ${
        !isLocked && hasContent
          ? `
        <div class="topic-progress">
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progressPercent}%"></div>
          </div>
          <p class="progress-text">${progressPercent}% hoàn thành</p>
        </div>
      `
          : ""
      }
      <button class="topic-action status-${status} ${
        !hasContent ? "coming-soon" : ""
      }"
              onclick="event.stopPropagation(); ${
                status === "locked" ? "" : `startTopic('${topic.topicId}')`
              }">
        ${
          status === "locked"
            ? `${lockIcon} Đang khoá`
            : status === "completed"
              ? `${checkIcon} Ôn tập`
              : progressPercent > 0
                ? `${playIcon} Tiếp tục học`
                : `${playIcon} Bắt đầu học`
        }
      </button>
    `;

      return card;
    }

    // ========================================
    // FILTER & SEARCH
    // ========================================
    function filterTopics(journey) {
      currentFilter = journey;

      // Update active tab
      document.querySelectorAll(".filter-tab").forEach((tab) => {
        tab.classList.remove("active");
        if (tab.dataset.filter === journey) {
          tab.classList.add("active");
        }
      });

      // Filter topics
      if (journey === "all") {
        filteredTopics = [...allTopics];
      } else {
        filteredTopics = allTopics.filter((topic) => topic.journey === journey);
      }

      // Apply search if active
      const searchValue = document.getElementById("searchTopics").value;
      if (searchValue) {
        searchTopics(searchValue);
      } else {
        renderTopics();
      }
    }

    function searchTopics(query) {
      if (!query.trim()) {
        filteredTopics =
          currentFilter === "all"
            ? [...allTopics]
            : allTopics.filter((t) => t.journey === currentFilter);
      } else {
        const searchLower = query.toLowerCase();
        const baseTopics =
          currentFilter === "all"
            ? allTopics
            : allTopics.filter((t) => t.journey === currentFilter);

        // Chỉ tìm theo tên topic
        filteredTopics = baseTopics.filter((topic) =>
          topic.title.toLowerCase().includes(searchLower),
        );
      }

      renderTopics();
    }

    // ========================================
    // VIEW TOGGLE - Toggle Switch with Animation
    // ========================================
    function toggleView(view) {
      currentView = view;

      // Update active button
      document
        .querySelectorAll(".view-switch-btn, .view-btn, .toggle-btn")
        .forEach((btn) => {
          btn.classList.remove("active");
          if (btn.dataset.view === view) {
            btn.classList.add("active");
          }
        });

      // Update toggle slider position
      const toggleSwitch = document.querySelector(".view-toggle-switch");
      if (toggleSwitch) {
        toggleSwitch.setAttribute("data-active", view);
      }

      renderTopics();
    }

    // ========================================
    // TOPIC DETAIL MODAL
    // ========================================
    function showTopicDetail(topic) {
      selectedTopic = topic;
      const progress = userProgress[topic.topicId] || {
        completed: false,
        progress: 0,
      };
      const status = getTopicStatus(topic, window.currentPageParams);

      // Populate modal
      document.getElementById("modalTopicTitle").textContent = topic.title;
      document.getElementById("modalJourney").textContent = topic.journey;
      document.getElementById("modalCategory").textContent =
        topic.category || "General";
      document.getElementById("modalDescription").textContent =
        topic.description;
      document.getElementById("modalTotalStages").textContent =
        topic.totalStages || 0;
      document.getElementById("modalMinAI").textContent = topic.minAILevel || 1;
      document.getElementById("modalMinAccuracy").textContent = `${
        topic.minAccuracy || 0
      }%`;
      document.getElementById("modalProgressFill").style.width = `${
        progress.progress || 0
      }%`;
      document.getElementById("modalProgressText").textContent = `${
        progress.progress || 0
      }% completed`;

      // Update start button based on unified status
      const startBtn = document.getElementById("modalStartBtn");
      if (status === "locked") {

      } else {
        const progressPct = progress.progress || 0;
        const btnLabel =
          status === "completed"
            ? "Ôn tập"
            : progressPct > 0
              ? "Tiếp tục học"
              : "Bắt đầu học";
        const btnIcon =
          status === "completed"
            ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`

        startBtn.innerHTML = `${btnIcon} ${btnLabel}`;
        startBtn.disabled = false;
        startBtn.style.background = "#5B6FF8";
        startBtn.style.color = "white";
        startBtn.style.cursor = "pointer";
      }

      // Update modal icon based on topic
      const modalIcon = document.getElementById("modalIcon");
      if (modalIcon) {
        modalIcon.innerHTML = getTopicIcon(topic);

      const journeyBadge = document.getElementById("modalJourney");
      if (journeyBadge) {
        journeyBadge.className = `level-badge ${getJourneyClass(

    /**
     * Check if topic has content (lesson or quiz)
     */
    function topicHasContent(topic) {
      return (
        topic.contentDocId &&
        topic.contentDocId.trim() !== "" &&
        topic.contentDocId !== "undefined" &&
        topic.contentDocId !== "null"
      );
    }

    /**
     * ⭐ Get unified topic status
     * @param {object} topic - Topic object
     * @param {object} [currentParams] - window.currentPageParams to detect 'current' topic
     * @returns {'current'|'completed'|'locked'|'available'} status string
     */
    function getTopicStatus(topic, currentParams) {
      // 1. Đang xem (lesson page đang mở topic này)
      if (
        currentParams &&
        currentParams.topicId &&
        currentParams.topicId === topic.topicId
      ) {
        return "current";
      }

      // 2. Đã hoàn thành
      const progress = userProgress[topic.topicId] || {};
      if (progress.completed) {
        return "completed";
      }

      // 3. Khoá — không có nội dung HOẶC bị lock bởi điều kiện
      if (!topicHasContent(topic) || !checkTopicUnlocked(topic)) {
        return "locked";
      }

      // 4. Có thể học
      return "available";
    }

        showNotification("Topic not found", "error");

        showNotification(
          "Chủ đề này đang bị khóa. Hoàn thành bài học trước để mở khóa.",
          "warning",
        );
        return;
      }

      // ⭐ Check if topic has content
      if (!topicHasContent(topic)) {
        showNotification(
          '⚠️ Chủ đề "' +
            topic.title +
            '" chưa có nội dung. Sẽ được cập nhật sớm!',
          "warning",
        );

      }

    // ========================================

    // ========================================
    function checkTopicUnlocked(topic) {
      if (!allTopics || allTopics.length === 0) return true;

      // Tìm index của topic hiện tại trong danh sách
      const index = allTopics.findIndex((t) => t.topicId === topic.topicId);

      // Topic đầu tiên (index 0) luôn được mở
      if (index <= 0) return true;

      // Kiểm tra progress của topic ngay phía trước
      const prevTopic = allTopics[index - 1];
      const prevProgress = userProgress[prevTopic.topicId];

      // Phải hoàn thành 100% topic trước đó mới được mở topic này
      if (!prevProgress || !prevProgress.completed) {
        return false;
      }

      return true;
    }

        title.includes("loop") ||
        title.includes("for") ||
        title.includes("while") ||

      ) {

    // ========================================
    // CARD TILT EFFECT
    // ========================================
    function setupCardTiltEffect() {
      const container = document.querySelector(".topics-grid, .journey-view");
      if (!container) return;

      container.addEventListener("mousemove", function (e) {
        const card = e.target.closest(".topic-card");
        if (!card) return;

        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const centerX = rect.width / 2;
        const centerY = rect.height / 2;

        const rotateY = ((x - centerX) / centerX) * 8;
        const rotateX = ((centerY - y) / centerY) * 6;

        card.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
        card.style.transition = "transform 0.1s ease, box-shadow 0.3s ease";
      });

      container.addEventListener(
        "mouseleave",
        function (e) {
          const card = e.target.closest(".topic-card");
          if (card) {
            card.style.transform = "";
            card.style.transition = "transform 0.4s ease, box-shadow 0.3s ease";
          }
        },
        true,
      );

      container.addEventListener("mouseout", function (e) {
        const card = e.target.closest(".topic-card");
        if (card && !card.contains(e.relatedTarget)) {
          card.style.transform = "";
          card.style.transition = "transform 0.4s ease, box-shadow 0.3s ease";
        }
      });
    }

    // ===== MOUSE-RESPONSIVE STARS EFFECT =====
    function setupTopicsHeaderMouseEffect() {
      const header = document.querySelector(".topics-header");
      const stars = document.getElementById("topicsHeaderStars");
      if (!header || !stars) return;

      header.addEventListener("mousemove", (e) => {
        const rect = header.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;

        stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
      });

      header.addEventListener("mouseleave", () => {
        stars.style.transform = "translate(0, 0)";
      });
    }

    window.startTopicsHeaderMeteors = startTopicsHeaderMeteors;
    window.setupTopicsHeaderMouseEffect = setupTopicsHeaderMouseEffect;

    // ========================================
    // ⭐ 3D TILT EFFECT FOR GRID CARDS
    // ========================================
    function setupGridCardTilt() {
      const cards = document.querySelectorAll("#topicsGrid .topic-card");
      cards.forEach((card) => {
        card.addEventListener("mousemove", function (e) {
          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          const rotateY = ((x - centerX) / centerX) * 12;
          const rotateX = ((centerY - y) / centerY) * 8;
          card.style.transform = `perspective(600px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.03)`;
        });
        card.addEventListener("mouseleave", function () {
          card.style.transform =
            "perspective(600px) rotateX(0) rotateY(0) scale(1)";
          card.style.transition = "transform 0.4s ease";
          setTimeout(() => {
            card.style.transition = "";
          }, 400);
        });
        card.addEventListener("mouseenter", function () {
          card.style.transition = "transform 0.15s ease-out";
          setTimeout(() => {
            card.style.transition = "transform 0.08s ease-out";
          }, 150);
        });
      });
    }

    // Create aliases for compatibility with different calling patterns
    window.initTopics = window.initTopicsPageOnShow;
    window.loadTopicsPage = window.initTopicsPageOnShow;

    console.log("✅ Topics page scripts loaded successfully");
    console.log("- window.initTopicsPage:", typeof window.initTopicsPage);
    console.log(
      "- window.initTopicsPageOnShow:",
      typeof window.initTopicsPageOnShow,
    );
  })();
</script>
