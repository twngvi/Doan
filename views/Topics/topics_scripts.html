<!-- Topics Page Scripts -->
<script>
  (function () {
    console.log("🚀 Topics page scripts loading...");

    // ========================================
    // MODULE VARIABLES (in closure)
    // ========================================
    let allTopics = [];
    let filteredTopics = [];
    let currentFilter = "all";
    let currentView = "grid";
    let selectedTopic = null;
    let userProgress = {};

    // ⭐ CACHE để tránh reload không cần thiết
    let topicsCache = null;
    let progressCache = null;
    let lastLoadTime = 0;
    const CACHE_DURATION = 60000; // Cache 1 phút

    // ========================================
    // INITIALIZATION
    // ========================================
    window.initTopicsPage = function () {
      console.log("✅ Initializing Topics Page...");
      setupEventListeners();
      loadTopics();
      // Start meteor shower for header
      startTopicsHeaderMeteors();
      setupTopicsHeaderMouseEffect();
    };

    function setupEventListeners() {
      // Search input debounce
      const searchInput = document.getElementById("searchTopics");
      if (!searchInput) {
        console.warn("Search input not found, skipping event listener setup");
        return;
      }

      let searchTimeout;
      searchInput.addEventListener("input", function (e) {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          searchTopics(e.target.value);
        }, 200); // Giảm debounce từ 300ms xuống 200ms
      });
    }

    // ========================================
    // LOAD TOPICS FROM DATABASE - OPTIMIZED
    // ========================================
    function loadTopics(forceRefresh = false) {
      console.log("Loading topics from database...");

      const now = Date.now();

      // ⭐ Hiện loading state trước khi check cache
      if (!forceRefresh) {
        showLoadingState();
      }

      // ⭐ ƯU TIÊN 1: Kiểm tra GLOBAL cache (có thể đã load từ MCQ page)
      const globalCache = window.globalTopicsCache;
      if (
        !forceRefresh &&
        globalCache &&
        globalCache.data &&
        now - globalCache.lastLoadTime <
          (globalCache.cacheDuration || CACHE_DURATION)
      ) {
        console.log("✅ Using GLOBAL cached topics data");
        allTopics = globalCache.data;
        userProgress = globalCache.progress || {};
        topicsCache = globalCache.data; // Sync với local cache
        progressCache = globalCache.progress || {};
        lastLoadTime = globalCache.lastLoadTime;
        filteredTopics = [...allTopics];
        renderTopics();
        updateProgressStats();
        hideLoadingState();
        return;
      }

      // ⭐ ƯU TIÊN 2: Kiểm tra LOCAL cache - nếu còn hiệu lực thì dùng luôn
      if (!forceRefresh && topicsCache && now - lastLoadTime < CACHE_DURATION) {
        console.log("✅ Using LOCAL cached topics data");
        allTopics = topicsCache;
        userProgress = progressCache || {};
        filteredTopics = [...allTopics];
        renderTopics();
        updateProgressStats();
        hideLoadingState();
        return;
      }

      // ⭐ ƯU TIÊN 3: Load từ server
      // Show loading state
      showLoadingState();

      // ⭐ LOAD SONG SONG: Topics và Progress cùng lúc
      let topicsLoaded = false;
      let progressLoaded = false;
      let topicsResult = null;
      let progressResult = null;

      function tryRender() {
        // Chỉ render khi cả 2 đã load xong
        if (topicsLoaded && progressLoaded) {
          processAndRender(topicsResult, progressResult);
        }
      }

      // Call 1: Get Topics
      google.script.run
        .withSuccessHandler(function (result) {
          topicsResult = result;
          topicsLoaded = true;
          tryRender();
        })
        .withFailureHandler(function (error) {
          topicsLoaded = true;
          topicsResult = { success: false, error: error };
          tryRender();
        })
        .getAllTopics();

      // Call 2: Get User Progress (song song)
      google.script.run
        .withSuccessHandler(function (result) {
          progressResult = result;
          progressLoaded = true;
          tryRender();
        })
        .withFailureHandler(function (error) {
          progressLoaded = true;
          progressResult = { success: false, progress: {} };
          tryRender();
        })
        .getUserTopicProgress();
    }

    // ⭐ XỬ LÝ VÀ RENDER - Gộp logic, render 1 lần duy nhất
    function processAndRender(topicsResult, progressResult) {
      console.log("Processing topics and progress...");

      // Xử lý lỗi topics
      if (!topicsResult) {
        console.error("❌ Topics result is null");
        showErrorState("Lỗi: Server không trả về dữ liệu.");
        return;
      }

      if (!topicsResult.success) {
        console.error("❌ Topics request failed:", topicsResult.message);
        showErrorState(topicsResult.message || "Lỗi không xác định từ Server.");
        return;
      }

      if (!topicsResult.topics || topicsResult.topics.length === 0) {
        console.warn("⚠️ No topics found");
        showEmptyState();
        return;
      }

      // ⭐ Lưu vào biến và LOCAL cache
      allTopics = topicsResult.topics;
      topicsCache = topicsResult.topics;

      // Xử lý progress
      if (progressResult && progressResult.success && progressResult.progress) {
        userProgress = progressResult.progress;
        progressCache = progressResult.progress;
      } else {
        userProgress = {};
        progressCache = {};
      }

      lastLoadTime = Date.now();

      // ⭐ Lưu vào GLOBAL cache (để chia sẻ với MCQ, Matching và các page khác)
      if (!window.globalTopicsCache) {
        window.globalTopicsCache = {
          data: null,
          progress: null,
          lastLoadTime: 0,
          cacheDuration: 60000,
        };
      }
      window.globalTopicsCache.data = topicsResult.topics;
      window.globalTopicsCache.progress = userProgress;
      window.globalTopicsCache.lastLoadTime = Date.now();
      console.log(`✅ Saved ${allTopics.length} topics to GLOBAL cache`);

      console.log(`✅ Loaded ${allTopics.length} topics with progress`);

      filteredTopics = [...allTopics];

      // ⭐ RENDER 1 LẦN DUY NHẤT (không có setTimeout delay)
      renderTopics();
      updateProgressStats();
      hideLoadingState();
    }

    function onTopicsLoadError(error) {
      console.error("❌ Error loading topics:", error);
      showErrorState(
        error.message ||
          error.toString() ||
          "Không thể kết nối với server. Vui lòng thử lại sau.",
      );
    }

    // ========================================
    // RENDER TOPICS - OPTIMIZED
    // ========================================
    function renderTopics() {
      if (currentView === "grid") {
        renderGridView();
      } else {
        renderJourneyView();
      }
    }

    function renderGridView() {
      const grid = document.getElementById("topicsGrid");
      const emptyState = document.getElementById("topicsEmpty");

      if (filteredTopics.length === 0) {
        showEmptyState();
        return;
      }

      // ⭐ Hide empty state if showing topics
      if (emptyState) {
        emptyState.style.display = "none";
      }

      // ⭐ SỬ DỤNG DOCUMENT FRAGMENT để tránh reflow nhiều lần
      const fragment = document.createDocumentFragment();

      filteredTopics.forEach((topic) => {
        const card = createTopicCard(topic);
        fragment.appendChild(card);
      });

      // ⭐ Clear và append 1 lần duy nhất
      grid.innerHTML = "";
      grid.appendChild(fragment);

      grid.style.display = "grid";
      document.getElementById("topicsJourney").style.display = "none";
    }

    function renderJourneyView() {
      const journeyContainer = document.getElementById("topicsJourney");
      const listContainer = document.getElementById("journeyListContainer");
      const emptyState = document.getElementById("topicsEmpty");

      if (filteredTopics.length === 0) {
        showEmptyState();
        return;
      }

      // ⭐ Hide empty state if showing topics
      if (emptyState) {
        emptyState.style.display = "none";
      }

      // Sort topics: by journey order (Beginner -> Intermediate -> Advanced), then by name
      const journeyOrder = { Beginner: 1, Intermediate: 2, Advanced: 3 };
      const sortedTopics = [...filteredTopics].sort((a, b) => {
        const orderDiff =
          (journeyOrder[a.journey] || 4) - (journeyOrder[b.journey] || 4);
        if (orderDiff !== 0) return orderDiff;
        return (a.title || "").localeCompare(b.title || "");
      });

      // Create list items using fragment
      const fragment = document.createDocumentFragment();
      sortedTopics.forEach((topic, index) => {
        fragment.appendChild(createTopicListItem(topic, index + 1));
      });

      // Clear and append
      listContainer.innerHTML = "";
      listContainer.appendChild(fragment);

      document.getElementById("topicsGrid").style.display = "none";
      journeyContainer.style.display = "block";
    }

    // Create compact list item for journey view
    function createTopicListItem(topic, index) {
      const item = document.createElement("div");
      item.className = "topic-list-item";
      item.onclick = () => startTopicDirect(topic);

      const progress = userProgress[topic.topicId] || {
        completed: false,
        progress: 0,
      };
      const isLocked = !checkTopicUnlocked(topic);
      const journeyClass = getJourneyClass(topic.journey);
      const progressPercent = progress.progress || 0;
      const topicIcon = getTopicIcon(topic);

      // Progress circle SVG
      let progressCircle = "";
      if (progress.completed) {
        progressCircle = `
          <div class="list-item-progress-circle completed">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="16" fill="none" stroke="#e8f7ee" stroke-width="3"/>
              <circle cx="18" cy="18" r="16" fill="none" stroke="#2fa36b" stroke-width="3"
                stroke-dasharray="100.5" stroke-dashoffset="0" stroke-linecap="round"
                transform="rotate(-90 18 18)"/>
              <path d="M12 18l4 4 8-8" fill="none" stroke="#2fa36b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>`;
      } else if (progressPercent > 0) {
        const dashOffset = 100.5 - (progressPercent / 100) * 100.5;
        progressCircle = `
          <div class="list-item-progress-circle in-progress">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="16" fill="none" stroke="#eef1ff" stroke-width="3"/>
              <circle cx="18" cy="18" r="16" fill="none" stroke="#5b6ff8" stroke-width="3"
                stroke-dasharray="100.5" stroke-dashoffset="${dashOffset}" stroke-linecap="round"
                transform="rotate(-90 18 18)"/>
              <text x="18" y="22" text-anchor="middle" font-size="10" font-weight="600" fill="#5b6ff8">${progressPercent}%</text>
            </svg>
          </div>`;
      } else {
        progressCircle = `
          <div class="list-item-progress-circle not-started">
            <svg width="36" height="36" viewBox="0 0 36 36">
              <circle cx="18" cy="18" r="16" fill="none" stroke="#e2e8f0" stroke-width="3"/>
            </svg>
          </div>`;
      }

      item.innerHTML = `
        <div class="list-item-index ${journeyClass}">${index}</div>
        <div class="list-item-icon">${topicIcon}</div>
        <div class="list-item-content">
          <div class="list-item-title">${topic.title}</div>
          <div class="list-item-meta">
            <span class="list-item-category">${topic.category || "Chung"}</span>
          </div>
        </div>
        ${progressCircle}
        <div class="list-item-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </div>
      `;

      if (isLocked) item.classList.add("locked");
      if (progress.completed) item.classList.add("completed");

      return item;
    }

    // ⭐ TỐI ƯU CARD CREATION - Professional Design with SVG Icons
    function createTopicCard(topic) {
      const card = document.createElement("div");
      card.className = "topic-card";
      // ⭐ SKIP POPUP - Go directly to lesson
      card.onclick = () => startTopicDirect(topic);

      // Get user progress for this topic
      const progress = userProgress[topic.topicId] || {
        completed: false,
        progress: 0,
      };
      const isLocked = !checkTopicUnlocked(topic);
      const topicIcon = getTopicIcon(topic);
      const journeyClass = getJourneyClass(topic.journey);
      const progressPercent = progress.progress || 0;

      // SVG icons for buttons
      const playIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
      const lockIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>`;
      const checkIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`;

      card.innerHTML = `
      <div class="topic-card-header">
        <div class="topic-icon-wrapper">
          <div class="topic-icon">${topicIcon}</div>
        </div>
        <div class="topic-badges">
          ${
            topic.category
              ? `<span class="badge badge-category">${topic.category}</span>`
              : ""
          }
          ${
            progress.completed
              ? '<span class="badge badge-completed">Hoàn thành</span>'
              : ""
          }
          ${isLocked ? '<span class="badge badge-locked">Khoá</span>' : ""}
        </div>
      </div>
      <h3 class="topic-title">${topic.title}</h3>
      <p class="topic-description">${truncateText(topic.description, 120)}</p>
      ${
        !isLocked
          ? `
        <div class="topic-progress">
          <div class="progress-bar">
            <div class="progress-fill" style="width: ${progressPercent}%"></div>
          </div>
          <p class="progress-text">${progressPercent}% hoàn thành</p>
        </div>
      `
          : ""
      }
      <button class="topic-action ${isLocked ? "locked" : ""} ${
        progress.completed ? "completed" : ""
      }"
              onclick="event.stopPropagation(); ${
                isLocked ? "" : `startTopic('${topic.topicId}')`
              }">
        ${
          isLocked
            ? `${lockIcon} Đang khoá`
            : progress.completed
              ? `${checkIcon} Ôn tập`
              : `${playIcon} Bắt đầu học`
        }
      </button>
    `;

      return card;
    }

    // ========================================
    // FILTER & SEARCH
    // ========================================
    function filterTopics(journey) {
      currentFilter = journey;

      // Update active tab
      document.querySelectorAll(".filter-tab").forEach((tab) => {
        tab.classList.remove("active");
        if (tab.dataset.filter === journey) {
          tab.classList.add("active");
        }
      });

      // Filter topics
      if (journey === "all") {
        filteredTopics = [...allTopics];
      } else {
        filteredTopics = allTopics.filter((topic) => topic.journey === journey);
      }

      // Apply search if active
      const searchValue = document.getElementById("searchTopics").value;
      if (searchValue) {
        searchTopics(searchValue);
      } else {
        renderTopics();
      }
    }

    function searchTopics(query) {
      if (!query.trim()) {
        filteredTopics =
          currentFilter === "all"
            ? [...allTopics]
            : allTopics.filter((t) => t.journey === currentFilter);
      } else {
        const searchLower = query.toLowerCase();
        const baseTopics =
          currentFilter === "all"
            ? allTopics
            : allTopics.filter((t) => t.journey === currentFilter);

        // Chỉ tìm theo tên topic
        filteredTopics = baseTopics.filter((topic) =>
          topic.title.toLowerCase().includes(searchLower),
        );
      }

      renderTopics();
    }

    // ========================================
    // VIEW TOGGLE - Toggle Switch with Animation
    // ========================================
    function toggleView(view) {
      currentView = view;

      // Update active button
      document
        .querySelectorAll(".view-switch-btn, .view-btn, .toggle-btn")
        .forEach((btn) => {
          btn.classList.remove("active");
          if (btn.dataset.view === view) {
            btn.classList.add("active");
          }
        });

      // Update toggle slider position
      const toggleSwitch = document.querySelector(".view-toggle-switch");
      if (toggleSwitch) {
        toggleSwitch.setAttribute("data-active", view);
      }

      renderTopics();
    }

    // ========================================
    // TOPIC DETAIL MODAL
    // ========================================
    function showTopicDetail(topic) {
      selectedTopic = topic;
      const progress = userProgress[topic.topicId] || {
        completed: false,
        progress: 0,
      };
      const isLocked = !checkTopicUnlocked(topic);

      // Populate modal
      document.getElementById("modalTopicTitle").textContent = topic.title;
      document.getElementById("modalJourney").textContent = topic.journey;
      document.getElementById("modalCategory").textContent =
        topic.category || "General";
      document.getElementById("modalDescription").textContent =
        topic.description;
      document.getElementById("modalTotalStages").textContent =
        topic.totalStages || 0;
      document.getElementById("modalMinAI").textContent = topic.minAILevel || 1;
      document.getElementById("modalMinAccuracy").textContent = `${
        topic.minAccuracy || 0
      }%`;
      document.getElementById("modalProgressFill").style.width = `${
        progress.progress || 0
      }%`;
      document.getElementById("modalProgressText").textContent = `${
        progress.progress || 0
      }% completed`;

      // Update start button
      const startBtn = document.getElementById("modalStartBtn");
      if (isLocked) {
        startBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Đang khoá`;
        startBtn.disabled = true;
        startBtn.style.background = "#E6E8F0";
        startBtn.style.color = "#A0AEC0";
        startBtn.style.cursor = "not-allowed";
      } else {
        const btnIcon = progress.completed
          ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>`
          : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"/></svg>`;
        startBtn.innerHTML = progress.completed
          ? `${btnIcon} Ôn tập`
          : `${btnIcon} Bắt đầu học`;
        startBtn.disabled = false;
        startBtn.style.background = "#5B6FF8";
        startBtn.style.color = "white";
        startBtn.style.cursor = "pointer";
      }

      // Update modal icon based on topic
      const modalIcon = document.getElementById("modalIcon");
      if (modalIcon) {
        modalIcon.innerHTML = getTopicIcon(topic);
      }

      // Update level badge class
      const journeyBadge = document.getElementById("modalJourney");
      if (journeyBadge) {
        journeyBadge.className = `level-badge ${getJourneyClass(
          topic.journey,
        )}`;
      }

      // Show modal
      document.getElementById("topicDetailModal").style.display = "flex";
    }

    function closeTopicDetail(event) {
      if (!event || event.target === event.currentTarget) {
        document.getElementById("topicDetailModal").style.display = "none";
        selectedTopic = null;
      }
    }

    /**
     * ⭐ Start topic directly without popup
     */
    function startTopicDirect(topic) {
      if (!topic) {
        showNotification("Topic not found", "error");
        return;
      }

      if (!checkTopicUnlocked(topic)) {
        showNotification(
          "Chủ đề này đang bị khóa. Hoàn thành bài học trước để mở khóa.",
          "warning",
        );
        return;
      }

      console.log("🚀 Starting topic directly:", topic.topicId);

      // Navigate directly to lesson
      if (topic.contentDocId && topic.contentDocId !== "") {
        navigateToLesson(topic);
      } else {
        navigateToQuiz(topic);
      }
    }

    /**
     * Start topic - Show lesson content first
     */
    function startTopic(topicId) {
      const topic = topicId
        ? allTopics.find((t) => t.topicId === topicId)
        : selectedTopic;

      if (!topic) {
        showNotification("Topic not found", "error");
        return;
      }

      if (!checkTopicUnlocked(topic)) {
        showNotification(
          "This topic is locked. Complete prerequisites first.",
          "warning",
        );
        return;
      }

      console.log("Starting topic:", topic.topicId);

      // ⭐ KIỂM TRA XEM CÓ CONTENT DOC KHÔNG
      if (topic.contentDocId && topic.contentDocId !== "") {
        console.log("Topic has lesson content, navigating to Lesson page...");
        navigateToLesson(topic);
      } else {
        console.log("No lesson content, navigate to Quiz directly");
        navigateToQuiz(topic);
      }

      closeTopicDetail();
    }

    /**
     * ⭐ Navigate to Lesson page (NEW)
     */
    function navigateToLesson(topic) {
      console.log(
        "🔍 ==================== NAVIGATE TO LESSON ====================",
      );
      console.log("🔍 Topic object:", topic);
      console.log("📄 contentDocId:", topic.contentDocId);
      console.log("📄 contentDocId type:", typeof topic.contentDocId);
      console.log(
        "📄 contentDocId length:",
        topic.contentDocId ? topic.contentDocId.length : 0,
      );
      console.log("📄 contentDocId value:", JSON.stringify(topic.contentDocId));

      if (
        !topic.contentDocId ||
        topic.contentDocId === "" ||
        topic.contentDocId === "undefined" ||
        topic.contentDocId === "null"
      ) {
        console.error("❌ Invalid contentDocId");
        showNotification("Lỗi: Không có Doc ID cho bài học này", "error");
        return;
      }

      const params = {
        topicId: topic.topicId,
        topicTitle: topic.title,
        contentDocId: topic.contentDocId.trim(),
      };

      console.log("✅ Calling showPage with params:", params);

      // Save to recent activities
      if (typeof window.saveRecentActivity === "function") {
        window.saveRecentActivity({
          topicId: topic.topicId,
          topicTitle: topic.title,
          activityType: "view",
        });
      }

      showPage("page-lesson", params);

      console.log(
        "🔍 ==================== END NAVIGATE TO LESSON ====================",
      );
    }

    /**
     * Navigate to Quiz directly (no lesson)
     */
    function navigateToQuiz(topic) {
      // Save to recent activities
      if (typeof window.saveRecentActivity === "function") {
        window.saveRecentActivity({
          topicId: topic.topicId,
          topicTitle: topic.title,
          activityType: "quiz",
        });
      }

      showPage("page-mcq", {
        topicId: topic.topicId,
        topicTitle: topic.title,
        mode: "quiz",
      });
    }

    // ========================================
    // HELPER FUNCTIONS
    // ========================================
    function checkTopicUnlocked(topic) {
      // TODO: Implement actual unlock logic based on user's AI level and accuracy
      // For now, return true to allow all topics
      return true;
    }

    /**
     * Get concept-based SVG icon for topic
     * Icons represent the concept/function, not decorative elements
     */
    function getTopicIcon(topic) {
      const title = (topic.title || "").toLowerCase();
      const category = (topic.category || "").toLowerCase();

      // Icon mapping based on topic concepts
      const iconMap = {
        // Programming & I/O
        terminal: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>`,
        code: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>`,

        // Variables & Data Types
        database: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>`,
        layers: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>`,

        // Operators & Logic
        calculator: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="10" y2="10"/><line x1="14" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="10" y2="14"/><line x1="14" y1="14" x2="16" y2="14"/><line x1="8" y1="18" x2="16" y2="18"/></svg>`,
        sigma: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 4H6l6 8-6 8h12"/></svg>`,

        // Conditions (If-Else)
        "git-branch": `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="6" y1="3" x2="6" y2="15"/><circle cx="18" cy="6" r="3"/><circle cx="6" cy="18" r="3"/><path d="M18 9a9 9 0 0 1-9 9"/></svg>`,
        split: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M16 3h5v5"/><path d="M8 3H3v5"/><path d="M12 22V8L3 3"/><path d="M12 8l9-5"/></svg>`,

        // Loops
        repeat: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>`,
        loop: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2a10 10 0 1 0 10 10"/><polyline points="12 2 12 8 18 8"/></svg>`,

        // Arrays & Lists
        list: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>`,
        table: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>`,

        // Functions
        function: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M10 4h4l-1 8h5l-7 9v-7h-4l3-10z"/></svg>`,
        box: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>`,

        // Default/Book icon
        book: `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>`,
      };

      // Match topic title/category to icon
      if (
        title.includes("lập trình") ||
        title.includes("i/o") ||
        title.includes("input") ||
        title.includes("output") ||
        title.includes("nhập") ||
        title.includes("xuất")
      ) {
        return iconMap["terminal"];
      }
      if (
        title.includes("biến") ||
        title.includes("kiểu") ||
        title.includes("variable") ||
        title.includes("data type")
      ) {
        return iconMap["database"];
      }
      if (
        title.includes("toán tử") ||
        title.includes("logic") ||
        title.includes("operator") ||
        title.includes("phép tính")
      ) {
        return iconMap["calculator"];
      }
      if (
        title.includes("if") ||
        title.includes("else") ||
        title.includes("điều kiện") ||
        title.includes("condition") ||
        title.includes("rẽ nhánh")
      ) {
        return iconMap["git-branch"];
      }
      if (
        title.includes("vòng lặp") ||
        title.includes("loop") ||
        title.includes("for") ||
        title.includes("while") ||
        title.includes("lặp")
      ) {
        return iconMap["repeat"];
      }
      if (
        title.includes("mảng") ||
        title.includes("danh sách") ||
        title.includes("array") ||
        title.includes("list")
      ) {
        return iconMap["list"];
      }
      if (
        title.includes("hàm") ||
        title.includes("function") ||
        title.includes("chương trình con")
      ) {
        return iconMap["function"];
      }
      if (
        title.includes("chuỗi") ||
        title.includes("string") ||
        title.includes("ký tự")
      ) {
        return iconMap["code"];
      }

      // Category-based fallback
      if (category.includes("programming") || category.includes("lập trình")) {
        return iconMap["code"];
      }
      if (category.includes("data") || category.includes("dữ liệu")) {
        return iconMap["layers"];
      }

      // Default icon
      return iconMap["book"];
    }

    function getJourneyClass(journey) {
      const classes = {
        Beginner: "beginner",
        Intermediate: "intermediate",
        Advanced: "advanced",
      };
      return classes[journey] || "";
    }

    function truncateText(text, maxLength) {
      if (text.length <= maxLength) return text;
      return text.substring(0, maxLength) + "...";
    }

    function updateProgressStats() {
      const completed = Object.values(userProgress).filter(
        (p) => p.completed,
      ).length;

      const completedEl = document.getElementById("completedTopics");
      if (completedEl) {
        completedEl.textContent = completed;
      }
    }

    // ========================================
    // SKELETON LOADING
    // ========================================
    function createSkeletonCard() {
      const card = document.createElement("div");
      card.className = "topic-card skeleton";
      card.innerHTML = `
        <div class="topic-card-header">
          <div class="skeleton-icon"></div>
          <div>
            <div class="skeleton-badge"></div>
            <div class="skeleton-badge" style="width: 60px;"></div>
          </div>
        </div>
        <div class="skeleton-line" style="width: 80%;"></div>
        <div class="skeleton-line" style="width: 100%;"></div>
        <div class="skeleton-line" style="width: 90%;"></div>
        <div class="skeleton-stats">
          <div class="skeleton-stat"></div>
          <div class="skeleton-stat"></div>
          <div class="skeleton-stat"></div>
        </div>
        <div class="skeleton-button"></div>
      `;
      return card;
    }

    function showSkeletonLoading() {
      const grid = document.getElementById("topicsGrid");
      grid.innerHTML = "";
      grid.style.display = "grid";

      // Create 6 skeleton cards
      for (let i = 0; i < 6; i++) {
        grid.appendChild(createSkeletonCard());
      }

      document.getElementById("topicsLoading").style.display = "none";
      document.getElementById("topicsJourney").style.display = "none";
      document.getElementById("topicsError").style.display = "none";
      document.getElementById("topicsEmpty").style.display = "none";
    }

    // ========================================
    // UI STATE MANAGEMENT
    // ========================================
    function showLoadingState() {
      // Hiện in-page loading spinner
      const loading = document.getElementById("topicsLoading");
      if (loading) {
        loading.style.display = "flex";
      }
      // Ẩn các container khác
      document.getElementById("topicsGrid").style.display = "none";
      document.getElementById("topicsJourney").style.display = "none";
      document.getElementById("topicsError").style.display = "none";
      document.getElementById("topicsEmpty").style.display = "none";
    }

    function hideLoadingState() {
      // Ẩn in-page loading spinner
      const loading = document.getElementById("topicsLoading");
      if (loading) {
        loading.style.display = "none";
      }
    }

    function showErrorState(message) {
      hideLoadingState();
      document.getElementById("topicsError").style.display = "block";
      document.querySelector(".error-message").textContent = message;
    }

    function showEmptyState() {
      hideLoadingState();
      // Hide both grid and journey views when showing empty state
      document.getElementById("topicsGrid").style.display = "none";
      document.getElementById("topicsJourney").style.display = "none";
      document.getElementById("topicsEmpty").style.display = "block";
    }

    function showNotification(message, type = "info") {
      // Reuse existing notification system
      if (typeof window.showNotification === "function") {
        window.showNotification(message, type);
      } else {
        alert(message);
      }
    }

    // ========================================
    // EXPORT GLOBAL FUNCTIONS
    // ========================================

    // Export functions to window for onclick handlers
    window.filterTopics = filterTopics;
    window.searchTopics = searchTopics;
    window.toggleView = toggleView;
    window.showTopicDetail = showTopicDetail;
    window.closeTopicDetail = closeTopicDetail;
    window.startTopic = startTopic;
    window.startTopicDirect = startTopicDirect;
    window.navigateToLesson = navigateToLesson;
    window.navigateToQuiz = navigateToQuiz;

    // ========================================
    // AUTO-INITIALIZE SETUP
    // ========================================

    // Global initialization flag to prevent multiple inits
    window.topicsPageInitialized = false;

    // Function to be called when page is shown
    window.initTopicsPageOnShow = function () {
      console.log(
        "initTopicsPageOnShow called, initialized:",
        window.topicsPageInitialized,
      );

      if (!window.topicsPageInitialized) {
        console.log("Initializing Topics Page for the first time...");
        window.topicsPageInitialized = true;
        loadTopics();
        startTopicsHeaderMeteors();
        setupTopicsHeaderMouseEffect();
      } else {
        console.log("Topics Page already initialized, using cache if valid...");
        // ⭐ Không reload nếu đã có cache còn hiệu lực
        loadTopics(false); // false = không force refresh
        startTopicsHeaderMeteors();
        setupTopicsHeaderMouseEffect();
      }
    };

    // ⭐ Force refresh function để user có thể reload khi cần
    window.refreshTopics = function () {
      console.log("Force refreshing topics...");
      loadTopics(true); // true = force refresh, bỏ qua cache
    };

    // ===== METEOR SHOWER FOR TOPICS HEADER =====
    let topicsMeteorInterval = null;

    function startTopicsHeaderMeteors() {
      const container = document.getElementById("topicsMeteorContainer");
      if (!container) return;

      // Clear existing interval
      if (topicsMeteorInterval) {
        clearInterval(topicsMeteorInterval);
      }

      // Create meteor every 800ms
      topicsMeteorInterval = setInterval(() => {
        if (!document.getElementById("topicsMeteorContainer")) {
          clearInterval(topicsMeteorInterval);
          return;
        }
        createTopicsMeteor();
      }, 800);

      // Create initial meteor
      createTopicsMeteor();
    }

    function createTopicsMeteor() {
      const container = document.getElementById("topicsMeteorContainer");
      if (!container) return;

      const meteor = document.createElement("div");
      meteor.className = "topics-header-meteor";

      // Random position from top-left area
      const startX = Math.random() * 40; // 0-40% from left
      const startY = Math.random() * 20; // 0-20% from top

      meteor.style.left = startX + "%";
      meteor.style.top = startY + "%";

      // Random size for variety
      const height = 35 + Math.random() * 35;
      meteor.style.height = height + "px";
      meteor.style.animationDuration = 0.8 + Math.random() * 0.4 + "s";

      container.appendChild(meteor);

      // Remove after animation
      setTimeout(() => {
        meteor.remove();
      }, 1500);
    }

    // ===== MOUSE-RESPONSIVE STARS EFFECT =====
    function setupTopicsHeaderMouseEffect() {
      const header = document.querySelector(".topics-header");
      const stars = document.getElementById("topicsHeaderStars");
      if (!header || !stars) return;

      header.addEventListener("mousemove", (e) => {
        const rect = header.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width - 0.5;
        const y = (e.clientY - rect.top) / rect.height - 0.5;

        stars.style.transform = `translate(${x * 15}px, ${y * 15}px)`;
      });

      header.addEventListener("mouseleave", () => {
        stars.style.transform = "translate(0, 0)";
      });
    }

    window.startTopicsHeaderMeteors = startTopicsHeaderMeteors;
    window.setupTopicsHeaderMouseEffect = setupTopicsHeaderMouseEffect;

    // Create aliases for compatibility with different calling patterns
    window.initTopics = window.initTopicsPageOnShow;
    window.loadTopicsPage = window.initTopicsPageOnShow;

    console.log("✅ Topics page scripts loaded successfully");
    console.log("- window.initTopicsPage:", typeof window.initTopicsPage);
    console.log(
      "- window.initTopicsPageOnShow:",
      typeof window.initTopicsPageOnShow,
    );
  })();
</script>
