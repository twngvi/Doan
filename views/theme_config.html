<script>
  /**
   * theme_config.html - Centralized Theme Configuration
   *
   * All theme tokens (colors, shadows, gradients) are defined here.
   * Pages read from CSS custom properties set by applyThemeConfig().
   * To add a new theme: add an object to THEME_CONFIG, add a card in profile_content.html,
   * and add the theme name to allowedThemes in auth/profile.js.
   */

      background: "#0f0c29",

      card: "rgba(255, 255, 255, 0.05)",
      cardBorder: "rgba(255, 255, 255, 0.1)",
      cardShadow: "0 2px 12px rgba(0, 0, 0, 0.3)",
      cardHoverShadow: "0 8px 24px rgba(0, 0, 0, 0.4)",
      // Primary / Secondary
      primary: "#667eea",
      primaryHover: "#764ba2",
      secondary: "#764ba2",
      // Text
      text: "#ffffff",
      textSecondary: "rgba(255, 255, 255, 0.7)",
      textMuted: "rgba(255, 255, 255, 0.5)",
      // Borders
      border: "rgba(255, 255, 255, 0.1)",
      borderLight: "rgba(255, 255, 255, 0.06)",
      // Status
      success: "#4ade80",
      warning: "#fbbf24",
      danger: "#f87171",
      // Effects
      shadow: "rgba(0, 0, 0, 0.3)",
      hover: "rgba(255, 255, 255, 0.12)",
      gradient: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
      gradientSoft: "linear-gradient(135deg, #0f0c29 0%, #302b63 100%)",
      gradientAccent: "linear-gradient(135deg, #764ba2 0%, #f093fb 100%)",
      // Input
      inputBg: "rgba(255, 255, 255, 0.06)",
      inputBorder: "rgba(255, 255, 255, 0.15)",
      inputFocusBg: "rgba(255, 255, 255, 0.1)",
      inputDisabledBg: "rgba(255, 255, 255, 0.03)",
      inputDisabledText: "rgba(255, 255, 255, 0.35)",
      primaryAlpha10: "rgba(102, 126, 234, 0.1)",
      primaryAlpha30: "rgba(102, 126, 234, 0.3)",
      primaryAlpha40: "rgba(102, 126, 234, 0.4)",
      // Sidebar
      sidebarBg:
        "linear-gradient(180deg, #0a0a1a 0%, #12122a 30%, #1a1a3e 70%, #0f0f2a 100%)",
      sidebarBorder: "rgba(139, 92, 246, 0.3)",
      sidebarShadow: "4px 0 20px rgba(139, 92, 246, 0.15)",
      sidebarText: "#e0e7ff",
      sidebarAccent: "#667eea",
      sidebarAccentSecondary: "#8b5cf6",
      sidebarIconColor: "#22d3ee",
      sidebarHeaderBorder: "rgba(139, 92, 246, 0.2)",
      sidebarItemBg:
        "linear-gradient(135deg, rgba(139, 92, 246, 0.1) 0%, rgba(59, 130, 246, 0.1) 100%)",
      sidebarItemBorder: "rgba(139, 92, 246, 0.15)",
      sidebarItemHoverBg: "linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%)",
      sidebarItemHoverBorder: "rgba(139, 92, 246, 0.4)",
      sidebarItemHoverShadow: "0 4px 12px rgba(59, 130, 246, 0.4)",
      sidebarActiveShadow: "0 4px 16px rgba(59, 130, 246, 0.5)",
      // Scrollbar
      scrollbarTrack: "rgba(15, 12, 41, 0.6)",
      scrollbarThumb: "linear-gradient(135deg, #667eea 0%, #764ba2 100%)",
      scrollbarThumbHover: "linear-gradient(135deg, #764ba2 0%, #f093fb 100%)",
      // Dashboard specific
      dashboardBg:
        "linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%)",
      // Toggle galaxy-specific effects
      showGalaxyEffects: true,
    },

    forest: {
      id: "forest",
      name: "Forest",
      // Backgrounds
      background: "#f0f5f0",
      backgroundSecondary: "#e8efe4",
      surface: "rgba(45, 90, 61, 0.06)",
      // Card
      card: "#ffffff",
      cardBorder: "#dce8dc",
      cardShadow: "0 2px 12px rgba(45, 90, 61, 0.1)",
      cardHoverShadow: "0 8px 24px rgba(45, 90, 61, 0.15)",
      // Primary / Secondary
      primary: "#2d5a3d",
      primaryHover: "#1e4a2e",
      secondary: "#3a7a52",
      // Text
      text: "#1a3328",
      textSecondary: "#4a6b5a",
      textMuted: "#7a9b8a",
      // Borders
      border: "#c8d8c8",
      borderLight: "#dce8dc",
      // Status
      success: "#4a9b5f",
      warning: "#c4a35a",
      danger: "#b85c4a",
      // Effects
      shadow: "rgba(45, 90, 61, 0.1)",
      hover: "rgba(45, 90, 61, 0.06)",
      gradient: "linear-gradient(135deg, #2d5a3d 0%, #3a7a52 100%)",
      gradientSoft: "linear-gradient(135deg, #e8f0e8 0%, #f0f5f0 100%)",
      gradientAccent: "linear-gradient(135deg, #3a7a52 0%, #6b8f5e 100%)",
      // Input
      inputBg: "#f9fafb",
      inputBorder: "#c8d8c8",
      inputFocusBg: "#ffffff",
      inputDisabledBg: "#e8efe4",
      inputDisabledText: "#7a9b8a",
      primaryAlpha10: "rgba(45, 90, 61, 0.1)",
      primaryAlpha30: "rgba(45, 90, 61, 0.15)",
      primaryAlpha40: "rgba(45, 90, 61, 0.25)",
      // Sidebar
      sidebarBg:
        "linear-gradient(180deg, #1a3328 0%, #213d30 30%, #2a4e3a 70%, #1e3b2c 100%)",
      sidebarBorder: "rgba(74, 155, 95, 0.3)",
      sidebarShadow: "4px 0 20px rgba(45, 90, 61, 0.15)",
      sidebarText: "#c8e6c9",
      sidebarAccent: "#4a9b5f",
      sidebarAccentSecondary: "#6b8f5e",
      sidebarIconColor: "#8bc34a",
      sidebarHeaderBorder: "rgba(74, 155, 95, 0.2)",
      sidebarItemBg:
        "linear-gradient(135deg, rgba(74, 155, 95, 0.1) 0%, rgba(107, 143, 94, 0.1) 100%)",
      sidebarItemBorder: "rgba(74, 155, 95, 0.15)",
      sidebarItemHoverBg: "linear-gradient(135deg, #2d5a3d 0%, #3a7a52 100%)",
      sidebarItemHoverBorder: "rgba(74, 155, 95, 0.4)",
      sidebarItemHoverShadow: "0 4px 12px rgba(74, 155, 95, 0.4)",
      sidebarActiveShadow: "0 4px 16px rgba(74, 155, 95, 0.5)",
      // Scrollbar
      scrollbarTrack: "#e8efe4",
      scrollbarThumb: "linear-gradient(135deg, #2d5a3d 0%, #3a7a52 100%)",
      scrollbarThumbHover: "linear-gradient(135deg, #3a7a52 0%, #6b8f5e 100%)",
      // Dashboard specific
      dashboardBg:
        "linear-gradient(135deg, #f0f5f0 0%, #e8efe4 50%, #dce8dc 100%)",
      // Toggle galaxy-specific effects
      showGalaxyEffects: false,
    },
  };

  /**
   * Get theme list for validation and UI
   */
  window.getAvailableThemes = function () {
    return Object.keys(window.THEME_CONFIG);
  };

  /**
   * Get theme data by id
   */
  window.getThemeData = function (themeId) {
    return window.THEME_CONFIG[themeId] || window.THEME_CONFIG["default"];
  };

  /**
   * Apply theme config: sets CSS custom properties and body class
   * @param {string} themeId - theme key from THEME_CONFIG
   */
  window.applyThemeConfig = function (themeId) {
    var theme = window.THEME_CONFIG[themeId];
    if (!theme) {
      theme = window.THEME_CONFIG["default"];
      themeId = "default";
    }

    var root = document.documentElement;

    // Map theme tokens to CSS custom properties
    var mapping = {
      "--theme-bg": "background",
      "--theme-bg-secondary": "backgroundSecondary",
      "--theme-surface": "surface",
      "--theme-card": "card",
      "--theme-card-border": "cardBorder",
      "--theme-card-shadow": "cardShadow",
      "--theme-card-hover-shadow": "cardHoverShadow",
      "--theme-primary": "primary",
      "--theme-primary-hover": "primaryHover",
      "--theme-secondary": "secondary",
      "--theme-text": "text",
      "--theme-text-secondary": "textSecondary",
      "--theme-text-muted": "textMuted",
      "--theme-border": "border",
      "--theme-border-light": "borderLight",
      "--theme-success": "success",
      "--theme-warning": "warning",
      "--theme-danger": "danger",
      "--theme-shadow": "shadow",
      "--theme-hover": "hover",
      "--theme-gradient": "gradient",
      "--theme-gradient-soft": "gradientSoft",
      "--theme-gradient-accent": "gradientAccent",
      "--theme-sidebar-bg": "sidebarBg",
      "--theme-sidebar-border": "sidebarBorder",
      "--theme-sidebar-shadow": "sidebarShadow",
      "--theme-sidebar-text": "sidebarText",
      "--theme-sidebar-accent": "sidebarAccent",
      "--theme-sidebar-accent-secondary": "sidebarAccentSecondary",
      "--theme-sidebar-icon-color": "sidebarIconColor",
      "--theme-sidebar-header-border": "sidebarHeaderBorder",
      "--theme-sidebar-item-bg": "sidebarItemBg",
      "--theme-sidebar-item-border": "sidebarItemBorder",
      "--theme-sidebar-item-hover-bg": "sidebarItemHoverBg",
      "--theme-sidebar-item-hover-border": "sidebarItemHoverBorder",
      "--theme-sidebar-item-hover-shadow": "sidebarItemHoverShadow",
      "--theme-sidebar-active-shadow": "sidebarActiveShadow",
      "--theme-scrollbar-track": "scrollbarTrack",
      "--theme-scrollbar-thumb": "scrollbarThumb",
      "--theme-scrollbar-thumb-hover": "scrollbarThumbHover",
      "--theme-dashboard-bg": "dashboardBg",
      "--theme-input-bg": "inputBg",
      "--theme-input-border": "inputBorder",
      "--theme-input-focus-bg": "inputFocusBg",
      "--theme-input-disabled-bg": "inputDisabledBg",
      "--theme-input-disabled-text": "inputDisabledText",
      "--theme-primary-alpha10": "primaryAlpha10",
      "--theme-primary-alpha30": "primaryAlpha30",
      "--theme-primary-alpha40": "primaryAlpha40",
    };

    var keys = Object.keys(mapping);
    for (var i = 0; i < keys.length; i++) {
      var cssVar = keys[i];
      var tokenKey = mapping[cssVar];
      if (theme[tokenKey] !== undefined) {
        root.style.setProperty(cssVar, theme[tokenKey]);
      }
    }

    // Manage body theme class (for component-specific CSS that still needs it)
    var allThemes = Object.keys(window.THEME_CONFIG);
    for (var j = 0; j < allThemes.length; j++) {
      if (allThemes[j] !== "default") {
        document.body.classList.remove("theme-" + allThemes[j]);
      }
    }
    if (themeId && themeId !== "default") {
      document.body.classList.add("theme-" + themeId);
    }

    // Toggle galaxy effects visibility
    if (theme.showGalaxyEffects === false) {
      document.body.classList.add("hide-galaxy-effects");
    } else {
      document.body.classList.remove("hide-galaxy-effects");
    }

    // Store active theme
    window.ACTIVE_THEME = themeId;

    console.log("Theme config applied:", themeId, theme.name);
  };

  // Apply default theme CSS vars immediately so styles.html can use them
  window.applyThemeConfig("default");
</script>
