<!-- Register Page -->
<div class="auth-login-container">
  <!-- Left Side - Illustration -->
  <div class="auth-illustration">
    <div class="illustration-content">
      <div class="logo-section">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">Doanv3</span>
      </div>
      <h1 class="illustration-title">Bắt đầu hành trình!</h1>
      <p class="illustration-description">
        Tham gia cùng hàng ngàn học viên chinh phục tri thức
      </p>
      <div class="illustration-image">
        <div class="mountain-scene">
          <div class="mountain"></div>
          <div class="climber">🚀</div>
          <div class="stars">🌟</div>
        </div>
      </div>
      <div class="illustration-stats">
        <div class="stat-box">
          <div class="stat-icon">📚</div>
          <div>
            <div class="stat-number">1000+</div>
            <div class="stat-label">Bài học</div>
          </div>
        </div>
        <div class="stat-box">
          <div class="stat-icon">👥</div>
          <div>
            <div class="stat-number">5000+</div>
            <div class="stat-label">Học viên</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right Side - Register Form -->
  <div class="auth-form-container">
    <div class="auth-form-wrapper">
      <a
        href="#"
        class="back-link"
        onclick="showPage('page-landing'); return false;"
      >
        <span class="back-icon">←</span>
        <span>Quay lại</span>
      </a>

      <div class="form-header">
        <h2 class="form-title">Đăng ký tài khoản</h2>
        <p class="form-description">Điền thông tin để tạo tài khoản mới</p>
      </div>

      <!-- Register Form -->
      <form id="register-form" class="auth-form" onsubmit="return false;">
        <!-- Full Name -->
        <div class="form-group">
          <label for="register-fullname" class="form-label"
            >👤 Họ và tên đầy đủ</label
          >
          <div class="input-wrapper">
            <span class="input-icon">👤</span>
            <input
              type="text"
              id="register-fullname"
              name="fullName"
              class="form-input"
              placeholder="Nguyễn Văn A"
              required
            />
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="register-email" class="form-label"
            >📧 Địa chỉ Email</label
          >
          <div class="input-wrapper">
            <span class="input-icon">✉️</span>
            <input
              type="email"
              id="register-email"
              name="email"
              class="form-input"
              placeholder="vidu@email.com"
              required
            />
          </div>
          <span class="form-hint"
            >Bạn sẽ nhận email xác thực sau khi đăng ký</span
          >
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="register-password" class="form-label">🔒 Mật khẩu</label>
          <div class="input-wrapper">
            <span class="input-icon">🔑</span>
            <input
              type="password"
              id="register-password"
              name="password"
              class="form-input"
              placeholder="Tối thiểu 6 ký tự"
              required
              minlength="6"
            />
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="register-confirm-password" class="form-label"
            >🔐 Xác nhận mật khẩu</label
          >
          <div class="input-wrapper">
            <span class="input-icon">🔑</span>
            <input
              type="password"
              id="register-confirm-password"
              name="confirmPassword"
              class="form-input"
              placeholder="Nhập lại mật khẩu"
              required
            />
          </div>
        </div>

        <!-- Terms & Conditions -->
        <div class="form-options">
          <label class="checkbox-wrapper">
            <input type="checkbox" id="acceptTerms" required />
            <span class="checkbox-label">
              Tôi đồng ý với
              <a href="#" class="forgot-link">Điều khoản sử dụng</a>
            </span>
          </label>
        </div>

        <!-- Submit Button -->
        <button
          type="submit"
          class="btn-submit"
          id="btn-register"
          onclick="handleRegisterFormSubmit()"
        >
          <span class="btn-text">Đăng ký ngay</span>
          <span class="btn-loader"></span>
        </button>
      </form>

      <!-- Login Link -->
      <div class="form-footer">
        <p class="footer-text">
          Đã có tài khoản?
          <a
            href="#"
            class="footer-link"
            onclick="showPage('page-login'); return false;"
          >
            Đăng nhập ngay
          </a>
        </p>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    "use strict";

    const registerForm = document.getElementById("register-form");
    const btnRegister = document.getElementById("btn-register");
    const fullNameInput = document.getElementById("register-fullname");
    const emailInput = document.getElementById("register-email");
    const passwordInput = document.getElementById("register-password");
    const confirmPasswordInput = document.getElementById(
      "register-confirm-password"
    );
    const acceptTermsCheckbox = document.getElementById("acceptTerms");

    // Handle register form submission
    window.handleRegisterFormSubmit = function () {
      // Validate inputs
      const fullName = fullNameInput?.value.trim();
      const email = emailInput?.value.trim();
      const password = passwordInput?.value;
      const confirmPassword = confirmPasswordInput?.value;
      const acceptTerms = acceptTermsCheckbox?.checked;

      if (!fullName || !email || !password || !confirmPassword) {
        if (typeof window.showToast === "function") {
          window.showToast("Vui lòng điền đầy đủ thông tin", "error");
        }
        return;
      }

      if (!acceptTerms) {
        if (typeof window.showToast === "function") {
          window.showToast("Vui lòng đồng ý với điều khoản sử dụng", "error");
        }
        return;
      }

      if (password !== confirmPassword) {
        if (typeof window.showToast === "function") {
          window.showToast("Mật khẩu xác nhận không khớp", "error");
        }
        return;
      }

      if (password.length < 6) {
        if (typeof window.showToast === "function") {
          window.showToast("Mật khẩu phải có ít nhất 6 ký tự", "error");
        }
        return;
      }

      // Set loading state
      if (btnRegister) {
        btnRegister.disabled = true;
        const btnText = btnRegister.querySelector(".btn-text");
        const btnLoader = btnRegister.querySelector(".btn-loader");
        if (btnText) btnText.style.display = "none";
        if (btnLoader) btnLoader.style.display = "block";
      }

      if (typeof window.showToast === "function") {
        window.showToast("Đang đăng ký...", "info");
      }

      // Call backend
      google.script.run
        .withSuccessHandler(function (response) {
          console.log("✅ ========== REGISTER RESPONSE ==========");
          console.log("Full response:", JSON.stringify(response, null, 2));
          console.log("response.success:", response.success);
          console.log(
            "response.requiresVerification:",
            response.requiresVerification
          );
          console.log("response.message:", response.message);
          console.log("========================================");

          // Reset button state
          if (btnRegister) {
            btnRegister.disabled = false;
            const btnText = btnRegister.querySelector(".btn-text");
            const btnLoader = btnRegister.querySelector(".btn-loader");
            if (btnText) btnText.style.display = "block";
            if (btnLoader) btnLoader.style.display = "none";
          }

          if (response.success) {
            if (typeof window.showToast === "function") {
              window.showToast(
                response.message ||
                  "Đăng ký thành công! Vui lòng kiểm tra email để xác thực.",
                "success"
              );
            }

            // ALWAYS check requiresVerification
            console.log("🔍 Checking requiresVerification...");
            if (response.requiresVerification === true) {
              console.log(
                "✅ YES - Requires verification, will redirect to verify page"
              );

              // Save email for verification page
              const verificationData = {
                email: email,
                timestamp: new Date().getTime(),
              };
              localStorage.setItem(
                "pendingVerification",
                JSON.stringify(verificationData)
              );

              console.log("💾 Saved to localStorage:", verificationData);
              console.log(
                "📦 Verify localStorage:",
                localStorage.getItem("pendingVerification")
              );

              // Redirect to verification page
              setTimeout(() => {
                console.log("🔄 NOW calling showPage('page-verify-email')...");
                if (typeof showPage === "function") {
                  showPage("page-verify-email");
                  console.log("✅ showPage called successfully");
                } else {
                  console.error("❌ ERROR: showPage function not found!");
                  alert("Lỗi: Không thể chuyển trang. Vui lòng F5 và thử lại.");
                }
              }, 1000);
            } else {
              console.log(
                "❌ NO - requiresVerification is FALSE or undefined, going to login"
              );
              // If no verification required, go to login
              setTimeout(() => {
                if (typeof showPage === "function") {
                  showPage("page-login");
                }
              }, 1500);
            }
          } else {
            console.error("❌ Registration failed:", response.message);
            if (typeof window.showToast === "function") {
              window.showToast(response.message || "Đăng ký thất bại", "error");
            }
          }
        })
        .withFailureHandler(function (error) {
          console.error("Register error:", error);

          // Reset button state
          if (btnRegister) {
            btnRegister.disabled = false;
            const btnText = btnRegister.querySelector(".btn-text");
            const btnLoader = btnRegister.querySelector(".btn-loader");
            if (btnText) btnText.style.display = "block";
            if (btnLoader) btnLoader.style.display = "none";
          }

          if (typeof window.showToast === "function") {
            window.showToast("Có lỗi xảy ra. Vui lòng thử lại.", "error");
          }
        })
        .registerWithEmailPassword({
          fullName: fullName,
          email: email,
          password: password,
          confirmPassword: confirmPassword,
        });
    };
  })();
</script>
