<!-- Register Page -->
<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-cyan-600 via-teal-500 to-emerald-600 px-4 relative overflow-hidden"
>
  <!-- Mountain Peak SVG -->
  <div class="absolute inset-0 opacity-10">
    <svg
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 1440 320"
      class="absolute bottom-0"
    >
      <path
        fill="#15919B"
        fill-opacity="0.8"
        d="M0,160L48,144C96,128,192,96,288,106.7C384,117,480,171,576,165.3C672,160,768,96,864,90.7C960,85,1056,139,1152,149.3C1248,160,1344,128,1392,112L1440,96L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"
      ></path>
    </svg>
  </div>

  <div class="max-w-md w-full relative z-10">
    <!-- Header -->
    <div class="text-center mb-8 animate-fade-in">
      <div
        class="inline-block bg-white/90 backdrop-blur-sm rounded-full p-4 mb-4 shadow-xl"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="h-16 w-16 text-emerald-600"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            stroke-width="2"
            d="M13 10V3L4 14h7v7l9-11h-7z"
          />
        </svg>
      </div>
      <h1 class="text-5xl font-bold text-white mb-2 drop-shadow-lg">Doanv3</h1>
      <p class="text-cyan-50 text-lg font-medium">
        Bắt đầu hành trình chinh phục
      </p>
    </div>

    <!-- Register Form Card -->
    <div
      class="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 animate-slide-in-left border-2 border-emerald-100"
    >
      <div class="flex items-center mb-6">
        <div
          class="h-1 flex-1 bg-gradient-to-r from-emerald-500 to-teal-500 rounded-full"
        ></div>
        <h2 class="text-2xl font-bold text-gray-800 mx-4">Đăng ký</h2>
        <div
          class="h-1 flex-1 bg-gradient-to-l from-emerald-500 to-teal-500 rounded-full"
        ></div>
      </div>

      <form id="register-form" onsubmit="return false;">
        <!-- Full Name -->
        <div class="mb-4">
          <label
            for="register-fullname"
            class="block text-sm font-semibold text-gray-700 mb-2"
          >
            👤 Họ và tên đầy đủ
          </label>
          <input
            type="text"
            id="register-fullname"
            name="fullName"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-emerald-200 focus:border-emerald-500 transition-all duration-300"
            placeholder="Nguyễn Văn A"
            required
          />
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label
            for="register-email"
            class="block text-sm font-semibold text-gray-700 mb-2"
          >
            📧 Địa chỉ Email (dùng để đăng nhập)
          </label>
          <input
            type="email"
            id="register-email"
            name="email"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-emerald-200 focus:border-emerald-500 transition-all duration-300"
            placeholder="vidu@email.com"
            required
          />
          <p class="text-xs text-gray-500 mt-1">
            ℹ️ Bạn sẽ nhận email xác thực sau khi đăng ký
          </p>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label
            for="register-password"
            class="block text-sm font-semibold text-gray-700 mb-2"
          >
            🔒 Mật khẩu (tối thiểu 6 ký tự)
          </label>
          <input
            type="password"
            id="register-password"
            name="password"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-emerald-200 focus:border-emerald-500 transition-all duration-300"
            placeholder="Tạo mật khẩu mạnh"
            required
            minlength="6"
          />
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label
            for="register-confirm-password"
            class="block text-sm font-semibold text-gray-700 mb-2"
          >
            🔐 Xác nhận mật khẩu
          </label>
          <input
            type="password"
            id="register-confirm-password"
            name="confirmPassword"
            class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:ring-4 focus:ring-emerald-200 focus:border-emerald-500 transition-all duration-300"
            placeholder="Nhập lại mật khẩu"
            required
          />
        </div>

        <!-- Terms & Conditions -->
        <div class="mb-6">
          <label class="flex items-start cursor-pointer">
            <input
              type="checkbox"
              class="form-checkbox h-5 w-5 text-emerald-600 rounded border-gray-300 focus:ring-emerald-500 mt-1"
              required
            />
            <span class="ml-3 text-sm text-gray-600">
              Tôi đồng ý với
              <a
                href="#"
                class="text-emerald-600 hover:text-teal-700 font-semibold hover:underline"
              >
                Điều khoản sử dụng
              </a>
              và
              <a
                href="#"
                class="text-emerald-600 hover:text-teal-700 font-semibold hover:underline"
              >
                Chính sách bảo mật
              </a>
            </span>
          </label>
        </div>

        <!-- Register Button -->
        <button
          type="submit"
          id="btn-register"
          class="w-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-300 flex items-center justify-center space-x-2"
          onclick="handleRegisterFormSubmit()"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            class="h-6 w-6"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="2"
              d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"
            />
          </svg>
          <span class="text-lg">Bắt đầu leo núi</span>
        </button>

        <!-- Login Link -->
        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Đã có tài khoản?
            <a
              href="#"
              class="text-emerald-600 hover:text-teal-700 font-bold text-lg hover:underline"
              onclick="showPage('page-login')"
            >
              Đăng nhập ngay
            </a>
          </p>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-6 text-white text-sm font-medium drop-shadow">
      <p>&copy; 2025 Doanv3. Chinh phục mọi đỉnh cao tri thức.</p>
    </div>
  </div>
</div>
