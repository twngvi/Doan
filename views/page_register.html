<!-- Register Page -->
<div
  class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-50 to-teal-100 px-4"
>
  <div class="max-w-md w-full">
    <!-- Header -->
    <div class="text-center mb-8 animate-fade-in">
      <h1 class="text-4xl font-bold text-gray-800 mb-2">Doanv3</h1>
      <p class="text-gray-600">Tạo tài khoản mới</p>
    </div>

    <!-- Register Form Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8 animate-slide-in-left">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Đăng ký</h2>

      <form id="register-form" onsubmit="return false;">
        <!-- Full Name -->
        <div class="mb-4">
          <label
            for="register-fullname"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Họ và tên <span class="text-red-500">*</span>
          </label>
          <input
            type="text"
            id="register-fullname"
            name="fullName"
            class="input-field"
            placeholder="Nguyễn Văn A"
            required
          />
        </div>

        <!-- Email -->
        <div class="mb-4">
          <label
            for="register-email"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Email <span class="text-red-500">*</span>
          </label>
          <input
            type="email"
            id="register-email"
            name="email"
            class="input-field"
            placeholder="example@gmail.com"
            required
          />
          <p class="text-xs text-gray-500 mt-1">
            Bạn sẽ nhận email xác thực tài khoản
          </p>
        </div>

        <!-- Password -->
        <div class="mb-4">
          <label
            for="register-password"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Mật khẩu <span class="text-red-500">*</span>
          </label>
          <input
            type="password"
            id="register-password"
            name="password"
            class="input-field"
            placeholder="••••••••"
            required
            minlength="6"
          />
          <p class="text-xs text-gray-500 mt-1">Tối thiểu 6 ký tự</p>
        </div>

        <!-- Confirm Password -->
        <div class="mb-6">
          <label
            for="register-confirm-password"
            class="block text-sm font-medium text-gray-700 mb-2"
          >
            Xác nhận mật khẩu <span class="text-red-500">*</span>
          </label>
          <input
            type="password"
            id="register-confirm-password"
            name="confirmPassword"
            class="input-field"
            placeholder="••••••••"
            required
          />
        </div>

        <!-- Terms & Conditions -->
        <div class="mb-6">
          <label class="flex items-start">
            <input
              type="checkbox"
              class="form-checkbox h-4 w-4 text-blue-600 rounded mt-1"
              required
            />
            <span class="ml-2 text-sm text-gray-600">
              Tôi đồng ý với
              <a href="#" class="text-blue-600 hover:text-blue-700"
                >Điều khoản sử dụng</a
              >
              và
              <a href="#" class="text-blue-600 hover:text-blue-700"
                >Chính sách bảo mật</a
              >
            </span>
          </label>
        </div>

        <!-- Register Button -->
        <button
          type="submit"
          id="btn-register"
          class="btn-success w-full"
          onclick="handleRegisterFormSubmit()"
        >
          Đăng ký
        </button>

        <!-- Divider -->
        <div class="relative my-6">
          <div class="absolute inset-0 flex items-center">
            <div class="w-full border-t border-gray-300"></div>
          </div>
          <div class="relative flex justify-center text-sm">
            <span class="px-2 bg-white text-gray-500">Hoặc</span>
          </div>
        </div>

        <!-- Google Sign-Up Button -->
        <!-- ✅ AUTO-PROVISIONING: Tự động tạo tài khoản mới nếu chưa tồn tại -->
        <button
          type="button"
          class="w-full flex items-center justify-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm bg-white hover:bg-gray-50 transition-colors"
          onclick="handleGoogleSignup()"
          title="Đăng ký hoặc đăng nhập bằng Google"
        >
          <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24">
            <path
              fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            />
            <path
              fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            />
            <path
              fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            />
            <path
              fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            />
          </svg>
          <span class="text-gray-700 font-medium">Đăng ký với Google</span>
        </button>

        <!-- Info: Same as login -->
        <div class="mt-2 text-center">
          <p class="text-xs text-gray-500">
            ℹ️ Nút này có tác dụng giống "Đăng nhập với Google"
          </p>
        </div>

        <!-- Login Link -->
        <div class="mt-6 text-center">
          <p class="text-gray-600">
            Đã có tài khoản?
            <a
              href="#"
              class="text-blue-600 hover:text-blue-700 font-semibold"
              onclick="showPage('page-login')"
            >
              Đăng nhập ngay
            </a>
          </p>
        </div>
      </form>
    </div>

    <!-- Footer -->
    <div class="text-center mt-8 text-gray-600 text-sm">
      <p>&copy; 2025 Doanv3. All rights reserved.</p>
    </div>
  </div>
</div>
