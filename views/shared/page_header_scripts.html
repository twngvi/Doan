<script>
  (function () {
    "use strict";

    /**
     * Update page header with user info
     */
    function updatePageHeader() {
      const user =
        window.currentUser ||
        (sessionStorage.getItem("currentUser")
          ? JSON.parse(sessionStorage.getItem("currentUser"))
          : null);

      if (!user) return;

      // Update user name
      const headerUserName = document.getElementById("headerUserName");
      if (headerUserName) {
        headerUserName.textContent =
          user.fullName || user.displayName || user.username || "User";
      }

      // Update avatar
      const headerAvatar = document.getElementById("header-avatar");
      if (headerAvatar) {
        if (user.avatarUrl) {
          headerAvatar.src = user.avatarUrl;
        } else {
          const name =
            user.fullName || user.displayName || user.username || "User";
          headerAvatar.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(
            name
          )}&size=80&background=random`;
        }
      }
    }

    /**
     * Set page title
     */
    function setPageTitle(title) {
      const pageTitle = document.getElementById("pageTitle");
      if (pageTitle) {
        pageTitle.textContent = title;
      }
    }

    // Listen for avatar updates
    window.addEventListener("avatar-updated", function (e) {
      const headerAvatar = document.getElementById("header-avatar");
      if (headerAvatar && e.detail && e.detail.url) {
        headerAvatar.src = e.detail.url;
      }
    });

    // ⭐ Listen for user info updates (from Profile page)
    window.addEventListener("user-info-updated", function (e) {
      console.log("🔄 Header detected user update:", e.detail);
      if (e.detail) {
        // Update global variables
        window.currentUser = e.detail;
        if (typeof currentUser !== "undefined") {
          currentUser = e.detail;
        }

        // Update header UI
        updatePageHeader();
      }
    });

    // Export functions
    window.updatePageHeader = updatePageHeader;
    window.setPageTitle = setPageTitle;

    // Auto update on load
    setTimeout(updatePageHeader, 100);
  })();
</script>
